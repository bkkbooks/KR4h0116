body:
  text: 吳都文粹續集卷二明錢穀撰城池人物平江路新築郡城記鄭元祐吳自泰伯至壽夢而始大及闔閭用子胥而城郭宮室遂為東南雄藩世言泰伯城僅三里二百步在今梅里平墟夫伯以天下讓宜不肯自大其城也及闔閭徙都於是子胥築城周圍四十五里象天法地城邑既完府庫既充遂觀兵上國一傳至夫差子胥諌死未幾吳為越併更江左六朝以迄唐末五季前後宋皆以吳為大藩屏世祖皇帝一天下六合為宫不設險于區區城郭也至正十一年紅巾賊起汝陽明年春浙東海冦劫崑山廉訪使者朝鮮李公深惟平江賦役供國家經費什之七郡無城郭何以禦冦乃謀於監郡六十公太守高公時百需出於吳者日不暇給不得已會司屬僚佐驗民之家資厚薄計量城之長短高下分築之罷弱户則汰去之豪強而常時役不及者則糾率之寧夏髙公為南臺御史大夫庸田僉事馬公董之馬公首捐官帑千錠憲漕水司總府皆捐資以助然太平日久一旦興大工役民十餘萬當盛暑揮鉏如雲下鍤如雨城之大綿延數百雉漫不知何從列楨幹於是公曉以程度矩範而勉以誠慤必若是而後無善崩之憂民志既齊遂經始於是年夏四月畢工於秋八月城四向一仍子胥之舊水門則仍宋之舊獨啓胥門上建忠孝王廟餘五門上亦皆祠神蓋役興時慮暑雨疾癘為民害乃禱於神以祈祐故列祠以答神貺城之髙以尺計凡二十有三其趾三十有五疊石三層以為固城之面廣丈六尺皆甃以甓大瓦作水溝每門建戍樓以謹斥堠嚴烽燧當人馬陟降處皆列置蛾眉甬道門之內外構屋設官居之以察非常城於是備矣其先又用中統鈔二百五十貫米一千斛至是合官民用財凡若干萬錠米若干萬斛城既完民大喜有依衛則又相與嘆息曰亷訪公非有一㕓之宅在吳也然苦心焦思以完斯城者蓋上以為國下以為民也况吳東北瀕大海西南枕震澤於澤國四通五達之衢也郛郭之內官糧貯於廩庾者歲數百萬設城郭不完冦攘逼近將何以為國計乎今既完城以為衛繼今所以守禦之者則在乎明有司承流宣化蘇民之力以固結其心使吳民愛戴其上如子弟之親父兄夫然後其民以仁義為干櫓禮樂為甲胄人心既固則與此金城湯池併為天險於無窮也已李公名某字某云吳都詩虞世南畫野通淮泗星躔應斗牛玉牒宏圖表黃旗美氣浮三分開霸業萬里宅神州髙臺臨茂苑飛閣跨澄流江濤如素蓋海氣似珠樓吳趨自有樂還似鏡中遊同前駱賔王維舟皆楚服振䇿下吳畿盛德宏三讓雄圖枕九圍黃池通霸業赤壁暢戎威文物俄遷謝英靈有盛衰行嘆鴟夷沒遽惜湛盧飛地古煙塵暗年深館宇稀山川四望是人事一朝非懸劍空留信亡珠尚識機鄭風遙可託關月渺難依西北雲逾滯東南氣轉微徒懷伯通隱多謝買臣歸唯有荒臺露薄暮濕征衣吳門崔融洛渚間吳潮吳門草色饒晚煙楊栁岸春水木蘭橈城邑南溟近星辰北斗遙無因生羽翼輕舉託還飇登吳古城歌劉長卿登古城兮思古人感賢達兮同埃塵望平原兮寄逺目歎姑蘇兮聚麋鹿黃池髙會事未終滄海橫流人蕩覆伍員殺身誰不寃竟看暮樹如所言越王嘗膽安可敵逺取石田何所益一朝空謝會稽人萬古猶傷甬東客黍離離兮城圮陀牛羊踐兮牧豎歌野無人兮秋草緑園為墟兮古木多白楊蕭蕭悲故柯黃雀啾啾爭晚禾荒阡斷兮誰重過孤舟逝兮愁若何天寒日暮江楓落葉去辭風水自波吳古城姚合江城吹角水茫茫曲引邉城怨思長驚起暮天沙上鴈海門斜去兩三行登闔閭古城武元衡登髙望逺自傷情栁發花開映古城全盛已隨流水去黃鸝空囀舊春聲吳城覽古陳羽吳王舊國水煙空香徑無人蘭葉紅春色似憐歌舞地年年先發館娃宫吳門夢故山趙嘏心熟家山夢不迷孤峰寒繞一條溪秋忩覺後情無限月墮館娃宫樹西吳門王安石朝遊盤門東暮出閶門西四顧茫無人但見白日低荒林帶昏煙上有歸鳥啼物皆得所託而我無安棲同前文天祥樓臺俯舟楫城郭滿干戈故吏歸心少遺民出涕多鳩居無鵲在魚網有鴻過使遂睢陽志安危今若何過姑蘇城二首張羽片帆迢遞入吳煙竹溆蘆洲斷復連栁影濃遮官道上蟬聲多傍驛樓前近湖漁舍皆懸網向浦人家盡種蓮行到吳王夜遊處滿川芳草獨堪憐故國有荒臺登臨一愴哉屧廊風落蠧香徑雨生苔苑廢民家占城摧客弔來伍員當日語千古尚堪哀城門曲楊維楨諜報越王兵城門夜不扄孤臣睛不死門月照人青過蘇州劉基姑蘇臺下垂楊栁曾為張王護禁城今日淡煙芳草裏暮蟬猶作管絃聲姑蘇臺下垂楊栁落葉蕭蕭日暮風天地山河有真主迎來送往總成空憶昔吳宫無事時滿城楊栁舞西施如今栁盡西施死恨殺當年陌上兒陌上清歌最可聽誰知此是斷腸聲就中更有楊枝曲恨殺昏鴉及曉鶯虎邱山下月朦朧閶闔門前動地風子夜一聲琴一闋杜鵑聲在碧雲中燈映忩前紙不鳴四鄰無語犬號聲南陽已死為霖了何用人間更得名滿地寒風滿面塵荒煙白草舊通津宴安鴆毒俱亡國可但西施解誤人成敗由天總所知烏須拔劍更何疑誰言碧海剸蛟手也學臨春井底兒小雨如膏漬陌塵一溝寒碧曉生鱗餘年已自無多子更向途中見早春夜發吳門趙孟俯吳樹依依吳水流吳中舟楫好夷猶多情最是吳門月又送行人下秀州吳門張泰萬井煙花繞故都闔閭宫苑自荒蕪江魂吼浪空讐越山黛顰秋已破吳臺下草深無過鹿城頭月落已啼烏英雄老去年華在海日曈曈水滿湖吳門懷古顧璘南眺荒原思惘然闔閭城古淡蒼煙吳宫已沒彈絲處胥渚猶傷賜劍年渺渺晴湖浮逺岫萋萋春草下平田長洲廢苑那堪問落日祗餘麋鹿眠閶門米芾蘋風忽起吹舟悍雨打圖書藏裹亂閶門咫尺不安流何况盟津與江漢非無輕楫與長篙逆風逆水適相遭須臾風回水流順星宿浮槎趂月高同前吳王故苑古長洲潮汐池邊一佇留秀蕙芳蘭無處所亂莞叢葦滿清流同前朱長文九曲堙淪茂苑荒吳人誰復怨吳王莫嫌故國千秋逺知是仙家幾日長湖上只誇浮海相里中休笑效顰娘舊時芳徑依然在但屬漁樵自採香閶門調行客范成大日夜飛帆與跨鞍閶門川陸路漫漫人生自苦身餘幾天色無情歲又寒萬事誰堪六如觀一杯莫信四并難重陽雖過黃花少尚有遲開玉雪團自閶門騎馬入越城二首日影穿雲亦未濃夜來踈雨洗晴空村前村後東風滿略數桃花一萬重斷橋隤岸數家村雨少晴多減漲痕雪白鵝兒緑楊栁日髙猶自掩柴門閶門范仲淹吳門聳閶闔迎送每躋攀一水帝鄉路片雲獅子山落鴻漁釣外斜栁别離間白傅歸休處盤桓幾厚顔同前倪瓉望中煙草古長洲不見當時麋鹿遊滿目越來溪上水流將春夢過杭州登五城門髙啓登城望神州風塵暗淮楚江山帶睥睨烽火接樓櫓并吞何時休百骨易寸土向來禾黍地雨露長榛莽不見征戰場那知邊人苦馬驚西風笳鳥散落日鼓嗚呼城下水流恨自今古同前徐有貞閶闔門開近帝州麗譙新建倚髙秋人間盡看三千界天上移來十二樓往事名傳吳伍相平生心在漢留侯斗牛宫闕當頭是何必乘槎海外遊碧城樓子聳秋空聲振江山鼓角雄髙下亭臺花霧裡往來舟楫水雲中賦才世豈無王粲飲興時應有庾公雙手可將紅日捧扶桑只在畫欄東閶門城樓蔡羽吳苑已多樹髙臺聞急砧千門開國意落日一登臨南去帆檣亂西來秀色新不須孤角起把酒思難禁月夜登閶門城樓王寵列雉森海甸麗譙屹中天山川振襟帶方位周幅員華月鏡千里覽見東南偏蒼蒼寶玉氣靄靄都虛煙霸迹幾興伏徂運悲逝川惜哉萬夫雄隨彼往化遷唯有烏棲曲哀怨至今傳閶門行袁帙閶門巍巍連紫極疊雉崇墉控疆域飛梁作鎮限關津廣市開場通貨殖土風清嘉想端委里閈驕奢誇鼎食城中綺構排雲起城外青槐當路植梁鴻橋下栁千條泰伯祠前花萬色紅塵日晚驅雕輦碧草春來迷玉勒魚鑰彤彤開宅第夾道雲甍對迢遞鴛鴦織就綴文茵翡翠裁來粧寶髻橫塘二月春氣濃中流畫鷁看搖曳陌上行行霧縠紛花間往往牙檣繫公子前溪唱艷詞佳人子夜翻新製朝朝簫鼓出城闉夜夜蘭燈迎水裔憶昔夫差全盛時離宫望幸駐行麾錦帆涇逺菱歌緩消夏灣深綵仗移走狗鬬雞心未厭穿池鑿石遊難遍初從雲嶠起髙臺更向花洲開别殿屧廊香徑何容與水簾水檻疑無暑晝觀劍客舞青萍夜引西施歌白苧爭長黃池干夏盟檇李曾棲徑越兵舟師電發艅艎出壁壘星攢組練明自謂千秋長若斯豈意一朝人事改愁見荒臺麋鹿遊可憐故國山河在吳王昔日超閶門法象天樞擬至尊豪華轉燭寧終極世事悠悠詎足論閶門夜景伊乘釣橋通郭俯清流月照朱簾捲畫樓醉裏笙歌喧夜市千家燈火似揚州與啓南同登城樓皇甫信忽因懷舊擁多愁縱步來登鼓角樓惟有石田知己者相逢一笑亦同遊登城樓劉珏髙樓百尺與雲齊白首登臨日未低人語亂喧城內外客船都泊水東西空中鐵笛神仙過壁上瑶詞學士題畫角一聲歸興動醉扶明月下丹梯入閶門有懷蕭太守若愚胡纘宗晴日梅開花覆山梅花仙子白雲間扁舟相訪不相及夜夜閶門月滿灣胥門王安石誤褫雲巾别故山抵吳由越兩間關千家漁火秋風市一葉歸舟暮雨灣旅病愔愔如困酒鄉愁脈脈似連環情知帶眼從前緩更恐顛毛自此斑同前陳植長堤栁線弄春柔姑蘇臺下馬如流春波溶漾緑潑油官船撾鼓百花洲旌旗􅀈黲城上樓煙中雉堞髙山邱嗚嗚清角行人愁盤門許渾無處登臨不繫情一憑春酒醉髙城暫移羅綺見山色才駐管絃聞水聲花落西亭添别夢栁隂南浦促歸程前期迢遞今宵短更倚朱闌待月明晚入盤門范成大人語嘲喧晚吹涼萬忩燈火轉河塘兩行碧栁籠官渡一簇紅樓壓女墻何處采菱聞度曲誰家拜月認飄香輕裘駿馬慵穿市困倚蒲團入睡鄉盤門觀兵張紳朝出盤洲門觀兵具區外黃龍分兩翼玄甲列五衛軍威畫角振殺氣飛鳥退三門將已發三壘法更祕秋清太白髙天黑攙搶墜犀從蛟室騰蛇向馬脊蛻雲翻風伯旗雨雜川后珮無戰乃天功六合不足制盤門吳地記云舊云蟠門蓋嘗刻木為蟠龍以厭越也後記云以水陸縈回屈曲改字為盤吳門忠告即蛇門胡舜申吳城以乾亥山為主陽山是也山在城西北屹然獨髙為衆山祖傑立三十里之外其餘岡阜纍纍如羣馬南馳皆其支隴城居隴前平夷如掌所謂勢來形止全氣之地也如祗自城中觀之則城中之地亦惟西北最髙是乾亥無疑乾為天亥則紫微帝座所次是謂貴龍此城既主是山法當用金局乾亥於本五行屬金故也山如此水則當與山相應此邦水勢自東南貪狼西南及正西武曲以至西北巨門等位來其來皆原於太湖由正北亷真及正東東北祿存而去以入於江而歸之海其來去無一不合金局之法故自古常為大郡國今為行都藩輔而吳中人物繁夥冠蓋崢嶸所以常甲於東南今觀水之流派常自閶盤二門入即西南西北水也由葑婁齊三門出即正東正北東北水也其於來去之法固合然所以導迎善祥氣者尚有缺然蓋胥塘自正西帝旺來是謂武曲之水本由胥門入運河自吳江東南長生來是謂貪狼之水由蛇門入頃歲乃塞胥蛇二門而生旺之水遂不得朝向城中此其為害明隂陽風水者常嘆息於斯胥塘之水尚由閶盤二門委曲而入城東南長生之水乃環城而東徑由葑門之外以出於城中了不相關此尤可嘆息故自頃以來城市蕭條人物衰歇富室無幾且無三世能保其安居士宦達者比承平時浸少至建炎之禍一切掃滅至舉城無區宅能存數百十年未之有也按地理法生旺二水利害最切猶人身血氣榮衛今塞絶之能安強乎明知者願圖回其事復開二門導水入城以幸此邦可也胥門適當姑蘇新館勢不可動又武曲但主財富而已蛇門之水為貪狼主文筆官職之事於理為重復門之便政和修城於諸故門雖已塞然皆刻石於右以識今石刻具存但襲府圖之誤以蛇門為赤門爾蛇門在城之已方故以蛇名赤門以在城正南正陽之地其義可考况蛇門直南正對吳江運河今舟船自南來非東入葑門即西入盤門皆迂逺十數里於水行非便昔吳王闔閭始作城伍子胥實規畫之立水陸門各八其後諸門開閉不常吳時欲以絶越遂不開東南門即蛇門也不知塞絶生氣故終為越所滅兹亦明效大驗至吳晉李唐時諸門未嘗不開故左太沖賦吳都有通門二八水道陸衢之語劉夢得詩亦曰二八城門開道路故晉唐時吳下最為雄盛今所啓門者五餘皆閉塞而甚不可塞者惟蛇門究所以閉塞圖經之説為其多途艱於守衛幾禁噫抑末矣今清蹕暫駐錢塘吳尤當開東南之門以伸朝拱之義焉吳城門不常啓閉舊矣昔年蓋嘗於八門之外又開赤平二門而葑門陸衢蓋嘗塞矣范文正公守郡始命闢之往來至今為便誠能逺迹晉唐近效文正復闢蛇門東南虛秀之氣疏導迅發儒道亨利文物之盛非復今日吳下矣蛇門在已方故云又吳越春秋云闔閭立蛇門以象地户欲并越故立此以制之紹興中胡舜申請開此門作吳門忠告乾道甲申冬沈度守郡與舜申舊同僚將闢有異志者以為擾民度避謗乃止淳熙乙未春韓彥古為守其秋邦人申請彥古欣然從之卜以九月十二日庚寅差役八月彥古罷是時舜申年八十五矣慨然惋惜謂天時人事難合如此復為後序告來者詞贅不録葑門葉適遺墨固藏神希聖非立我斷後輒無前實右則虛左品定賦纎洪義明分勇懦端木語衛文洙泗皆仰左孔子敘夷齊後進尚嵬瑣從來一大事幾作鴻毛荷知非言所及結網魚受課誰持空空質放縱無不可兹門小精廬荒寂衆萬過欣豫二三子拙力守飢卧楊花安得攬飛去天隅唾唯有露垂垂滿畦紅葉墮葑門續記云吳有葑田謂茭土樛結可以種殖者此門外瀕水故名或謂之封門取故永安縣封禺山名又名鱄䱐門門嘗湮塞范文正公守郡闢之婁城晚眺張泰髙城一望思茫茫潮轉婁江入海長邊境到今非漢縣古倉何處積吳糧鷗棲淺渚寒蘆淨鴈落平疇晚稻香野水間雲吟不盡玉峰西面看斜陽婁門道中與陳户侯蘇門何處是晚樹集雲煙夾水路逾窄逆風船且牽蟲聲依岸草星影動江天未厭秋衣薄相知同醉眠婁門以直秦婁縣而名吳地記婁别作疁范志云今崑山縣東北三里許有聚落尚名婁縣憶舊遊齊門城樓因寄建賢朱敬之憶上北城樓雲物何悠悠連雲百萬户疑是崑崙丘俯瞰滄海東秀色眼前逼遙挹鏡湖水於兹洗八極知爾情緒好我亦心神融窮愁千萬端飄散如飛蓬邇來居山中駒算倏二百大觀固無從幽境聊順適地僻儔更稀思君比玉液何當道術成飄然生羽翼齊門吳越春秋云闔閭十年即破齊齊以女為質吳為太子波聘之齊女少日夜號泣成疾闔閭乃造北門令女往遊其上因名曰望齊門平門王賔商家太戊有賢臣葬在平門野水濵寒食杏花風雨裏一杯椒醑奠何人平門一名巫門吳地記云平門水陸並通出毗陵等道吳伐齊從此出軍因號平門今有平門塘一云巫咸所葬故又號巫門或謂平巫字畫近耳吳江城記王鏊大盜南窺三吳騷動鯨奔狶突人莫自保而城居者獨晏然恃以無恐時蘇之屬縣無城者四崑山嘉定常熟吳江初以巡撫移文皆欲築城為保障而凋敝之餘公私罄縣相視莫敢發吳江尹蕭君九成獨曰吾其試為之吳江故有城始自吳越王鏐而拓於張士誠國朝承平百五十年民不見兵革城日就圯君召匠計之費以萬計君曰吾其試行之時城之西北殘堞頽壠尚存十之一二而東南已為民廬君諭之一旦遷去君且行且度丈挈尋計手摩心畫卑髙廣狹各有度程已而裁減均徭節省冗費奬勸巨室共得六千餘金曰是亦足矣乃量田賦民量民賦役民各受分僝則歸之圮則坐之於是民競勸無敢怠工必堅無敢窳始事於正德癸酉二月至九月壬午而城成矣城周五里有竒四向為門門之上有鼓樓以警昏曉有戍舍以扞冦偷旁有水門以通舟楫髙廣皆如其舊而壯麗過之於是吳江父老請豫紀其事夫城以衛民也而築之為費且勞則反以厲民且因以興謗况當久困之餘乎此有司所以相視而莫敢發也君獨能自修奮然不顧為之為之績果有成財不費民不擾人知樂其成而亦孰知其始也君蓋深於愛民而勇於興事其籌之也審故慝無自而作其持之也堅故浮言無得而搖其履之也親又公且均焉故民樂趨事而忘其勞也夫天下事固有大於一城者矣能推是而行之尚何事之不舉乎城之役春秋屢書之豫安得而無記也佽是役者為縣丞趙源清太倉州新建城樓記𢎞治十年詔建州治於太倉初太倉與鎮海為衛並治一城戎伍編氓錯峙紛糅至是始以州大夫臨之且割崑山嘉定常熟旁近地𨽻焉文武並建軍民遂安太倉故無城偽吳張士誠始城之周十四里有竒城髙而堅池深而廣識者謂雖立於僭偽而實為無窮之保障豫嘗登其城樓以眺則萬屋鱗次檣帆雲集海天遼廓雲濤滉漾壯哉其為州也而西北之樓獨缺正德十年監察御史邵陽唐君鳯儀按其地則命建之莆田黃君廷宣適知州事鳩工庀材不期月而樓成其餘城樓亦皆修飾嶷然為一州顯觀間屬豫記豫於兹樓之建竊獨嘆夫地之盛衰興廢信有時乎夫太倉古婁縣之惠安鄉耳至元朱清張瑄創海運於此而諸蕃湊集為市國初由此而漕定遼由此而使西洋遂為東南巨州豈非以其時哉然地盡東海海冦出沒昔方國珍嘗由海道入冦故元有水軍萬户府之設而士誠亦由此而城往時盜劉通施天泰冦海上三吳騷然發動至劇賊劉七據狼山睥睨全吳賴重兵宿其地扼其吭掩其不備而莫肆其螫不然蓋岌岌矣則城之設豈可以承平無事而莫之敕乎豫故備書之以警動在位而二君兹樓之建未為無意也重建太倉南城樓記金鎔明皇受天眷命奄有萬方乃疆乃宇要衝之地屯兵以禦外侮此誠聖世億萬載鞏固之鴻圖也吳元年始置太倉衛治於蘇州之東三舍許實因崑山州之舊城洪武己未復建鎮海衛相為守禦維時城門咸建樓櫓瞻烽堠歲月浸久盡為風雨所蝕廢而不治已六十年成化戊戌備倭都指揮合肥郭公鋐來鎮三吳嘗念太倉東瀕大海實當要衝而防禦之備尤所加意先是南樓舊址尚存欲圖而新之則匠作之需無所取給公乃夙夜靡寧罄其區畫遂以城之四壕咸蓄以魚俟其滿尺則鬻於市歲暮復取城內外薪木而售之得其值皆貯於官甫二載所積既盈公則喜曰吾事濟矣於是首命把總指揮使武政太倉衛指揮僉事郭煒董其事於以庀工度材殫力經營其棟宇之峻起簷阿之軒翔基址之廣袤則有加於昔也經營於成化壬寅之春落成於是年之秋竊惟古之名臣凡立勛業於當代者必紀其實以傳之永久矧兹樓之建不糜於公不擾於下誠足以光前休而垂後者也昔唐之李德裕鎮四川之時作籌邊樓日召父老於軍旅習邊事訪以山川城邑道路險易未踰月皆若身涉厯既而練士卒葺保障積糧儲卒能成一代備邊之功炳炳琅琅照耀簡册使後世景仰之不衰今總戎公立志忠勤慕效先哲上有以副聖主之委託下有以慰邊民之倚賴其功業之盛又豈在德裕之下哉宜書此以詔後人焉過鎮海城夏原吉曉發崑山邑宵過鎮海城潮聲兩岸響月色半忩明王事未能盬舟程敢暫停沙頭鷗與鷺穩睡莫猜驚過婁城伍文定草年重到太倉城門巷村園幾變更燕子識軍衝節逺楊花如雨落衣輕青環麥隴連桑柘白裊晴雲麗甲兵已喜海邦霑化穩編氓從此樂深耕閲城次韻陳鳯梧滄海遙連舊鎮城桑田今古幾紛更楊花日照遊絲靜麥隴風搖翠浪輕官忝拊循頻閲武時承全盛不知兵東南沃壤環千里時雨時暘喜勸耕登南門清逺樓清逺樓髙壓郡城隂晴風雨四時更萬家南國人煙盛五兩薰風市舶輕雲外滄波遙望海沙頭官戍尚屯兵兵農相寓今猶古遍野桑麻總閲耕登清逺樓倪宗正笑倚南樓醉眼舒東溟烽火久消除新秋光景今應未此日風流愧不如孤雲閣雨斜陽外流水環城十里餘元帥開筵聲樂集琵琶曲落玉盤珠太倉城元至正十七年張士誠築髙二大廣三丈周一十四里濠深一丈五尺廣八尺陸門七曰大東小南大南小西大西小北大北水門三曰大東小西大西其後門與樓俱廢成化十八年都指揮同知郭鋐復建大南門樓重建常熟縣城記瞿景淳國家疆理天下海隅日出罔不供賦而歲入之國計每取足焉者則蘇州為最蘇州之城領州縣凡八北控大江東漸瀛海為府治後户稱重地者則常熟為最縣故有城久廢不治每有冦竊居人不寧一時守土之臣與一二縉紳亦時議修築多撓浮議幸事稍平則棄置不復講率以為常嗟夫天下無事則關隘盡除外户不閉萬一潢池有警而城守不設亦何以禁暴亂安黎庶哉我聖祖肇造區夏中外罔不臣服而近海州城特設備倭官軍先事之慮蓋如此近來倭夷倡亂雖旋就撲滅而蜂蠆竊發為毒不少我一二縉紳乃以城事白邑令王公王公讓曰城吾責也然不敢專將聽命焉乃白郡守林公林公曰兹邑邇江而不城是延冦也乃遂推白巡撫都御史彭公操江都御史蔡公巡按御史孫公巡江御史汪公凡承命秉憲有事兹土者皆以次白先是孫公陳海防事宜以上海嘉定常熟俱介海濵繫要衝而無城可守具疏於朝逮縉紳議入彭公蔡公汪公僉以為然遂相與定計下其事於王公公乃卜以六月甲午興事度基立表鳩工斂材量能授任先城丈許以凖其費出納有稽勤惰有督拊之摩之課之責之趨事之民罔不競勸不數月而城成其西枕山麓迤北而東而南則阻水為固四向各門門各有樓旁為水門四以通舟楫虞山一門上據山岡仍冠以樓瞭望便焉襟抱周密風氣益完近而察之則樓櫓內嚴溪山外周倉庾獄市區分不擾逺而望之則連引吳會控制江海形勢雄張隆然巨防登城四顧山若增髙水若增深屹為望縣公乃告成事於諸公諸公各嘉乃績進而奬之維我一二縉紳乃相率造於庭採民歌謡以為公頌謂豫職載筆且獲與觀其成也屬豫紀其事豫謂非常之功固非拘攣之士所能決即有過人之才非先有以服衆心則不能決一蔽何也一蔽於私則羣議易撓也邑城傾圮日久一旦作而新之功同創始且居民業已侵為田廬不便改作故前令率以為難王公初亦重此役然亷潔無私自下車以來剗削浮費不以一毫煩民城事既起雖錙金斂散必慎必明令行而人不敢挽亦其有以先服衆心也撫按諸公亦相與協謀無復異同使公得展布四體以樹保障之績是皆可以為決大䇿定大事者之法矣城周一千六百六十六丈有竒髙二十有四尺厚加三之一費以金計者四萬九千七百六十有竒王公名鈇東陽人以庚戌進士來令兹邑他善政不可勝書城其最大者云賜進士及第翰林院侍讀前國史編修會典纂修官兼管誥敕邑人瞿景淳謹撰長洲文徴明書嘉靖甲寅三月既望立常熟縣城宋為木柵元土築之周一萬四千八百四十丈闢門十一至元十六年張士誠重甃以磚髙二丈二尺厚一丈二尺周九里三十步復增闢小東門今門六漸廢至國朝嘉靖三十二年倭冦竊發知縣王鈇復築之甃以磚周一千六百六十六丈髙二丈有四尺厚加三之一陸門四水門四事具瞿會元景淳築城記中郡守鄭霖會三學同舍序淳祐已酉月正人日郡守鄭霖會三學同舍序拜於天慶齋堂會者四十二人天台鄭霖景説參持志諭存心長服􅈾學諭吳門顔嚴世光節性應天滕嚞景初養正天台周公明元德養正吳門孔煜明仲觀化學諭吳門盛文韶景聲率履吳門詹次騤平叟持志吳門滕照德明養正會稽楊珍庭玉允蹈三衢鄭英傑德秀養正婺女吳邃囦仲誠意吳門張經德常節性過存心服􅈾習是會稽李士特竒父果行吳門錢振祖季玉篤言嘉禾趙與理子正宗學立愛過懷德三山趙綰夫景揚宗學懷德學録吳門趙震亨子東果行過時中吳門朱杲晦叔務本興化陳壽翁仁父篤信過果行學諭三山陳夢圓宗震務本嚴陵諸葛克念師聖循理三山陳桂巖肖持志三山林應炎光逺習是吳門陳伯章煥文誠意吳門吕直之道夫持志三山陳龍炎剛伯誠意毗陵李煓子明存心吳門范爽邦景哲守約三山鄭宏洪甫率履吳門干天麟仁仲習是合陽侯爟季立持志通川髙仁立仲立立禮吳門陳由之子是誠意吳門趙時璿德玉明賢過懷德通川髙仁洽君澤立禮吳門張應髙仰之貫通天台范應時和甫習時金華范士表仲端服􅈾南劍陳洧有之率履臨安章昌期文叔經德三山陳玉伯堅養正通川陸應霆伯聲服􅈾序曰淳祐九年歲在已酉天基慶宴之後二日三學同舍序拜於吳門天慶觀禮成宴於郡之春雨堂有執爵而祝者三始酌曰侯自製錦而厯符節加惠此邦尚矣願守五年之信終始如一毋廢甘棠又酌曰仕而行義敬共厥職毋愧羔羊又酌曰學優則仕時當其可願毋負豐芑於是合席皆作而謝曰凡我同盟有味斯言是集也序以齒交以禮會以文隱然鄉飲之遺風依然齋廬之舊習歡然相愛而又有規焉古之人飲食必祝歌詩以見志其庶幾乎春雨堂即事鄭霖十年隨牒訪三髙不覺星星上鬢毛尚憶虀鹽形夜夢聊因椒柏薦春醪文盟再會知何日臭味相投屬我曺總是虞庠舊培植致君當不愧夔臯西莊雅集圖記杜瓊長洲沈君孟淵居東婁之東地名相城之西莊其地襟帶五湖控接原隰有亭館花竹之勝水雲煙月之娛孟淵攻書飭行郡之龎生碩儒多與之相接凡佳景良辰則招邀於其地觴酒賦詩嘲風咏月以適其適而衣冠偉如珮玦鏘如于于而趨雍雍而居主賔揖遜之有餘儀陪臺趨侍之維謹人望見之若丹臺紫府仙人之列也既而羣公相繼而興仕於永樂朝孟淵亦受察舉待詔公車復得與諸公胥會焉其預於斯會者則有青城王文靖公春官亞卿恥菴金公怡菴先生陳太史夢菴張髙士中書舍人金尚素葵丘翁謝孔昭左綿蘇太守臞樵沈公濟吳山金維則與孟淵氏凡十人焉其不至京者夢菴維則二人而已至若臞樵葵丘雖不祿仕亦皆抱其材藝出入禁近遨遊公卿間流光易邁今四十年矣向之諸公今已仙去惟二沈年皆耄耊而存孟淵因觀元人顧仲瑛玉山雅集圖而謂公濟曰自吾與子親接諸儒之雅好而今不可復得矣雖不可復得吾未嘗不往來於懷也子其為我效而圖之公濟遂想像其人物與其景趣移入丹青曲極其妙題曰西莊雅集圖儼然諸公之在目前也仍疏諸君子之平生大略於左後之覽者得考見焉王文靖公其先蜀之青城山人幾世祖來蘇遂占蘇籍公諱璲字汝玉以字行其天分最髙讀書強記為文頃刻數千言其文妙絶當世以校官薦升左春坊左贊善兼翰林編修卒贈太子賔客諡文靖金恥菴吳人諱問字公素年二十二方事讀書與陳太史為鄰賴其奬勵遂肆力於學不數年間為文與前輩相追逐作字出入顔歐為後世師法以能書舉授司經局正字仁宗在東朝甚見寵遇既登極纍升太常少卿兼翰林侍讀學士進南京禮部侍郎年將八十卒張髙士諱肯字繼孟一字寄夢夢菴其别號也少從金華宋承旨學為文有光焰作詩長於古風書效薛稷而酷似之為南詞新聲樂府一一臻妙好棊奕不嗜飲酒美丰度廣顙修髯衣冠楚楚若神仙中人然隱約不仕終壽八十太史先生姓陳氏字嗣初其先江右廬山人元季避地來蘇即吳城而家焉先生少孤刻志於學務求實踐為詩文與王文靖相上下而義理則勝焉宣宗皇帝聞其名遣使驛召之即日授國子監博士為四方學者之資既而上欲自資改翰林五經博士日賜清問以修史功成進檢討乞致仕還家詩有耕樂集二十卷文有怡菴集四十卷行世金尚素松郡人諱鉉字文鼎以子貴封徴仕郎中書舍人常往來吳中善山水師張以文而加溫潤字師宋仲溫而稍變其法為人龎重謙抑口不言利七十餘終於家謝孔昭諱晉號蘭庭生一號深翠道人晚年遂稱葵邱翁與金恥菴陳怡菴同里閈為髫年交善詩有唐人格律作畫初師王蒙趙原既精詣則益以爛熳千岩萬壑愈出愈竒奮袂揮毫無所凝滯尋丈之軸不日而成其畫遂名世性樂易與人交人人得其歡心稠人廣坐談詩論文之餘變為謔浪滿座為之絶倒所著有蘭庭集二十卷行世左綿太守姑蘇蘇復性初也以俊髦肄業序庠業成充貢成均授蜀之綿州守習字有晉人筆意作畫師盛懋子昭自蜀致政歸得川陜山水之趣盡變舊習然不茍作必煆煉精神經營位置非年歲之久不能脫一幀其遲疾殆與葵邱相反然皆得其妙矣年七十有五而終金維則諱永維則字也吳縣吳山人學詩丁敏先生入其閫奧出句吐詞清新俊逸無半點塵埃之氣勇於義事有排難解紛之能於孟淵為姊夫實異姓兄弟惜其未及下壽而終然有子若孫不斷讀書種子臞樵姓沈氏名遇字公濟逺祖肖鑑擅寫照之術於勝國時傳至公濟則博通諸家之畫加以詩學效晉宋之體平生多疾而羸故自號臞樵今年八十有一與絸菴老人徜徉桑榆猶能日督子孫之學孟淵名澄號介軒由賢才徴赴京師試事大府復銜命浙江亷績著聞將授官職以疾乞歸性嗜詩酒酒酣吐語益竒絶蓋以二者而陶其情焉家素厚封好義不倦歲飢出粟千斛賑之部使者承例授以一命之官二子諸孫皆富文藝今年八十有二飲啖起處如壯歲者嘗築壽藏自號絸菴云姑蘇人物小記謝會昔尹吉甫之送申伯則必言夫嵩嶽之降神韓昌黎之送廖道士則必言其衡山之鍾秀是則人材之生豈無自哉一氣之英靈充之乎宇宙凝之乎河嶽餘氣菀勃而泄乎人物焉故泄乎材拔擢而偉俊泄乎學疏敏而富茂可以建功業可以達政事可以利人物可以名當時可以譽後世皆有此以為之也君子觀乎人物必驗之於其地焉今蘇之為郡長江北枕洪海東抱西有石城虎阜之蟠鬱南有笠澤金鼎之洶湧以至具區夫椒朝雲暮濤吞吐萬狀誠英靈之氣藪也非有豪傑之士産於其間其何以當如是之發露哉是故春秋以前則請觀周樂季札能之伐楚征越伍員能之其在聖門則言偃之文學滅明之持身其他隱而未彰計多矣然猶未當其盛也自漢以來踵出迭興遂不勝紀向為跫然之音今為遼東之豕矣故能文則嚴助之䇿賢良買臣之言楚辭翰采足用則裴欽文藻宏麗則陸雲能兵則周瑜之走曹操吕蒙之襲荆州有獨斷之明如魯肅有謀略之竒如陸遜壯節矯矯有國士風則范謹華融節概梗梗有丈夫格則潘濬陸凱臨風而思蓴鱸豈無先見之張季鷹避召而淹江湖豈無髙尚之陸魯望剡溪之秦系注老子以自娛苕溪之陸羽著茶經以自得虞翻陸績以竒偉稱吳範趙達以術數顯論諫數百皆本仁義陸宣公之愛君也專對數語敵人知敬趙咨之不辱命也斥夷簡之非以諫諍名遊安定之門以純明稱又堂堂乎文正忠宣之父子始冠多士為時名臣厯仕三朝始終一節又炳炳乎黃由衛涇之兩魁於乎何其盛哉以至當今之世內曹外秩之所列文章政事之所施蓋不可一二數則又非在昔之比矣吾知今山川之秀益以鍾天地之氣益以聚而人材之盛又不止乎是者蒼姬之所荒服當不為萬世文華之靈域哉謝氏世睦記徐禎卿昔仲尼論次聖賢之德稱泰伯之德至矣余生吳中去泰伯二千餘年登仲雍之邱望泰伯之鄉愾然猶見其人降觀於俗其人美而遜説而文巽而不毅泱泱與其有泰伯之遺風乎又尚考諸記傳得季札伯通之徒曰非泰伯其何以及此及退訪於忠信仁讓之士得世睦之族二曰范氏謝氏范氏希文之後也顯於志豫故不表表其微焉謝氏者其先陽夏人也唐未徙吳越始祖崇禮為中吳節度推官子濤嗣入宋為太子賔客濤子絳嗣為知制誥絳子景初嗣為大理評事景溫寶文閣直學士景平祕書丞大理評事景初子載補太廟齋郎載子蕃蕃子昭昭嗣子寬次實實子東由崇禮至東凡九世更吳越涉宋厯元而世不衰由東而來凡八世世居於吳樂安里中無髙門重奧聚子姓婦女以居竈不易薪孥不易財雞犬不易食庭無間言歡如也然吳人稍稍知之不為大章暴於世君子曰甚矣俗之衰也今人朝稅褐纓冠夕達於閭邑誦於天下嫠婦死志仁人死孝蓬艾隕而弗明此誰為輕重者哉自文武沒而大道隱人人慕功利而薄節義恥仁讓一尺之帛兄弟或毆而褫乃敢謂其共家室井臼於世世耶或有誦詩書秉節義聞先生之風而興者此其人不足尚哉曰彼哉矯飾情耳其何為勸乎豫憂乎文武之道其遂豗乎將不可振也於是次其世之賢者著於篇以俟乎後之人祐字佑之逸士有道風文彥字彥達母老有未疾每抱持以行事兄甚恭平生未嘗異服食源字以澄兄歿事嫂有禮臨終著遺令言甚長厚會字惟真兩試進士不第有文與弟朴甚友讓並早世二婦盧陳皆不二操昺字明仲以孝友稱謝氏世德記祝允明長洲有世美之族曰謝氏自其始祖贈吏部侍郎崇禮生太子賔客濤濤生知制誥絳絳生大理評事景初五傳至東山代引令緒東山生佑之沖夷守道元季離騷寄尚林壑入國朝終老間散稽嶽王彛作松泉居古序贊稱其視天下理亂欣戚猶寒暑晝夜之相代一不動於中有道者也是生彥達兄弟執義母嬰末疾保之如嬰兒欲有行則抱擁以往踰十年無少懈卒葬如禮事兄文華極恭順皓顛同服食不少相違兄卒子亦先死哀撫孤嫠尤為懇欵擇士為姪女館贅於家以慰亡志為人沉毅質厚而不循枉或與物忤鄉有無賴子欲撓侮之彥達報之以直無賴子遂誣以匠役赴京盡瘁二十年不怨尤同事有欲妄援怨家者彥達曰吾為人誣以及此而又誣人乎自號真誠事具真誠道人小傳生以澄資性敏利動必以先人為法工算數祿命雜藝美計事而不愆禮義繼匠事於京他人惰且黠率愆期覬幸免以澄獨不失尺寸然家不以匱而彼更不及焉從兄淵歿事嫂湯有禮教二子讀書修行長子成名將卒留訓大率謂吾宗數世持孝義以為家吾少厯艱劬從兄早世二子淪謝雖其間嘗竊科名吾視之猶煙雲之過眼人間事若不足然自揆素日所為無大不善者寧人負我我無負人且喜二孫能順吾指趨吾實無厚積以纍之所望同心庀宗不得棄先人敝廬分門析爨以辱世敗家耳以澄生會及朴會字惟真朴字惟德惟真稟抱尤超傑少有逺志從先參政維清受易勵志勤苦母恐其疲憊每為節縮膏蠟惟真默坐帳中登正統甲子鄉薦入太學一日內旨拔為風憲官命下先一日死矣立行卓特巋然老宿之氣有容菴集存家吳文定公原博為之序其行槩見杜淵孝先生用嘉所為墓志與惟德守先訓敦友于之誼惟真在京惟德思之不置徑往候視號為難弟兄皆早卒二婦盧與陳皆守操不二豫頃志廬墓嘗道其事惟真子昺惟德子勳雖隔一從無别同氣昺字明仲外訥中朗含淳道坦澄然莊雅而孝友特甚堂有連服室無私藏勳字賢仲其為人亦稱是終身無一日誶語明仲二男曰雍曰睦元和幼和其字也元和子三幼和子二賢仲嘗育而天以元和之季嗣蓋自東山至於元和之行已厯七世而房户不析饔飱無二譜於家籍於官傳志題贊咏歌於君子之言同然無異詞者而其第八世亦既五人駸駸長立聨情協勢固世美之濟可徴不誣庶幾張公藝家噫至矣哉其何積而至於斯也余嘗謂是有二道焉有懸諸天有維諸人不可謂天之自然不可謂人之矯強謂天自然何彼不然謂人之矯何循之者若竊脂騶虞若是乎其利也蓋嘗觀諸稼者而得之種之良者天之固也穫之豐者人之力也恃天而弗人不藝苗者也倍力於磽確闢荒者也不藝苖者罔闢荒者薄故種之良則力愈效力之深則穫愈穰相古先民乃多有之謝氏其允紹矣自羲堯遐逝風不盡醇聖人踵而承之表里樹聲其制繼立蓋聖人之慮後世萬古畢於一矚矣豫故私列而竊傳之非敢必期徹諸上下有聞而興亦作者衛世功也嗚呼天無易運人不遷性嘵嘵之言不為謝氏吳都文粹續集卷二
