body:
  text: 吳都文粹續集卷五十一明錢榖撰詩詞胥門伍行人廟和節推祝皓十年遺廟郡城陬感慨令人弔未休霸主豪華無復見荒臺麋鹿至今遊愁雲慘照青山晚野水寒禽古木秋昭代旌揚明祀永煙波誰問五湖舟送廷美之京送君行酌君酒折斷長亭短亭桞長亭短亭路幾何山長水遠離思多丈夫不作兒女别要使功名昭日月方今天子急賢才章逄濟濟如雲來君今早獻劉蕡䇿我亦行登郭隗臺送楊長史先生致仕還吳翥早歲適湘漢厠迹戎伍間偃蹇健兒伍心在孔與顔晦養非一朝賢聲重丘山岩廊倐徵起秉筆隨馬班親藩勞輔匡鬢髮日以斑兹辰荷休命謝事遂南還逍遙三讓里指日叩柴關姻朋聚故歡松菊同餘間即此以永日髙風邈難攀寄贈陳都御史鎰間氣生英傑明時出俊賢神由嵩嶽降慶自太丘傳發迹逰庠校潛心事簡編文章深潤澤禮樂久陶甄黃甲髙登第青雲早著鞭沾恩逢聖主拜賜及韶年烏府風霜肅龍墀雨露偏仁心恆辨獄直道每繩愆外臬勞周歷中臺喜再遷精神通法象地位逼台躔肅政遙臨陜司戎坐鎮邉股肱資屏翰耳目寄旬宣文武才猷重彌綸體用全英聲通草木風采照山川茂績徵三考褒封自九天龍章頒烜赫驛騎走駢闐歡賀延朝野謳歌遍市㕓位隆心益下寵盛操彌堅翼翼忠誠著肫肫禮義傳臯夔期接武韓范允齊肩庸劣慚無似帡幪幸有緣蒹葭非玉並桑梓實珠聫依藉心方切睽違思獨牽甘棠存賦咏菉竹有詩篇聊托風人意緘詞代剡鐫集句寄慰韓永熙憲副故園髙士日相親何用浮名絆此身獨在異鄉為異客世情誰是舊雷陳哭施宗銘狀元四海文名振一時才長年短信堪悲王曽已際明君出李賀仍為上帝知秋雨太湖波渺渺夕陽孤冢草離離更憐痛絶親朋處遺腹親殤繼後兒喜允明生兒二首就以曽孫名孩已亥七月三日生平百拙無堪紀獨賴君親覆育恩七十五齡三品秩眼前尤喜見曽孫眼前尤喜見曽孫桂竇槐王敢自倫但願書香長似舊綿綿清白保儒門踏莎行沈同齋舟中贈小妓綵雲花嶼初分蘭舟重駐綵雲驀地來何處當筵欲下又悠揚盈盈似怕人留住艷似桃花輕如栁絮東風勾引還飛去陽臺回首杳無蹤多情宋玉空留句况太守鍾挽詩杜瓊天産英豪弼聖君又來吳下福吳民十年威令能移俗百道封章不顧身生受國恩期作相死當廟食定為神蘇臺重見羊公石未讀遺文淚滿紳上方晚眺分題送行春風湖上試登山好景都歸晚眺間嵐氣半空藏梵宇波光一鑑隔塵寰人從疏樹隂中過鳥向斜陽影裏還話别正須窮勝覽不妨今夜宿禪關送徐武功赴貶雲南殷勤相勸且加餐臨别何須動慨嘆李廣數竒封爵逺賈生年少得君難青雲多士誰推轂白草三邉獨據鞍幸遇八荒同樂土不勞書札問平安俞尚書挽詩公昔棄時凌綵雲直上九天朝聖君手扶日月攀星辰足蹴雷電旋乾坤倒捲渤海相吐吞散為甘澤滋九垠坐令萬谷回陽春有時上下御飈輪又與下土靖妖氛朅來騎箕還漢津世人可望不可親空抱弓劍生哀吟佳城鬱鬱環髙墳華表兩兩撑秋旻宰木萬本如雲屯石麟對卧虎豹蹲翁仲式稱呵護神神龜出水負蒼珉上勒天語旌華勳龍光奕奕照墓門千秋萬古英名存登姑蘇郡樓有感獨倚危樓思欲迷蒹葭何處越來溪豪華盡逐東流去形勝空存刺史題萬井轆轤秋草沒幾家煙火夕陽低蕭條千古長洲苑風雨年年鳥自啼過海虞吳下琴川古有名放舟落日偶經行七溪流水皆通海十里青山半入城齊女墓荒秋草色言公家在舊書聲我來正值中秋夜一路吟詩看月生送賈伯起還吳林屋蕭蕭薜荔懸故園風景尚依然壺觴喜對歸來日鄉曲驚看老大年緑罩曉煙門外栁碧涵秋水墓前田我家相去無多路莫惜頻頻放酒船賦得石湖送沈復入監越來溪上五湖東十里行春有路通伯業已隨流水去御書猶在野亭空千峰秋色孤帆外萬頃波光一鏡中今日送君從此去恩波應自浩無窮送王孟顒還吳倚門愁老白頭親一棹容歸莫暫停千里還家心自樂十年為客夢初醒河兼易水秋逾碧山入吳門晚更青若見江南舊知已煩君與我道安寧贈徐公望張林山徐孺湖邊事事宜幾番同醉豈無期留連自喜知音在酩酊應慚得句遲潮落渡頭歸去後風生席上笑談時明朝有意來城郭莫惜相過一賦詩送周仲遜告老還吳幾年趨事客神京忽挾青囊别我行優詔既容辭老去故園才得遂歸耕山中白酒隨時釀爐內丹砂指日成千里到家秋正美黃花不減舊風情送丘寺副丁憂還吳朝冠忽解理扁舟知是歸丁母氏憂千里江山魂易斷一身衰絰淚難收晨昏定省空勞夢風雨蕭條獨慘愁扶櫬到家寒食近想應廬傍舊松楸修郡志畢太守丘公集宴寶林寺有作賀甫周禮姬旦作魯史仲尼修法古述郡志無乃仕而優于焉聘儒碩我來獨懷羞空空一餒腹昏昏雙老眸勝已不見鄙針芥還相投鳯樓讓大手户牖豫綢繆薄技少得施厚意庶少酬倘不慎斯舉其能免其尤光隂易流邁招提三月留乃當端陽節為樂頓忘憂肴核雜然陳笑呼錯觥籌頽然一醉眠此外復何求邵侯決防詩吳為水國多大川三江五湖遙相連吳中之水雖浩大罕曽淹沒湖鄉田奈何連年雨為戾多至旬月或半嵗下流居民無逺圖築隄障水為近利遂令積水阻不通一望百里波濤中鷺浴屋頭蛙産竈民生聊與魚蝦同官府誰論旱與水催徵急復施鞭箠民無完衣更無食老弱纍纍寒餓死侯言積水亦可泄所慮而今民力竭不免役民數十輩盡把諸隄一時決諸隄一決水駿奔奔流遙遙入海門等間水去露平壤迅速橋成通逺村東村西村經幾度悽慘風煙隨水去舍邊翳翳蔽桑麻野外茫茫長禾黍侯之惠政今已成損一利百真足稱民無水患嵗常稔我侯多福如川增送劉繡衣還朝吳中大旱復大水水旱相仍彌一載水蓄田間又大霖下流壅塞難歸海稻禾成實多腐爛罷種牟麥安種菜今嵗民間已乏食不知何以待來嵗當世憂民獨我侯是以民心多愛戴我侯還朝當進言臺閣諸公大冢宰諸公併力勸至尊安民之法必有在我想安民有何法無過移粟救飢餒損上益下終成益天地不交非是泰民不飢兮盜不生赤子亦得免于罪君臣上下安其位老夫白首百無用願歌太平揚盛美送郡守李公述職詩使君來為吾郡主允矣賢如仲山甫一時寮寀盡推崇七邑人民俱安堵從來善政非一端日增月積那能殫老生跧伏在林下略書一二傳人間前年居民乏生理宰殺耕午鬻諸市馬牛有功人所知胡為視之等羊豕吳俗婦女多好遊山乘肩輿水乘舟綺羅鮮妍著遍體金珠磊落粧滿頭使君聞見加憫惻民俗不善思變易乃出禁令張通衢男使耕田女居室今年淫雨浹一春湖波浩蕩連通津下民墊溺稻淹沒田家老稚含悲辛商羊才去旱魃至長夏驕陽如火熾三旬不雨其奈何豆種南山亦枯瘁使君此際心愈憂巡行省視不少休名山大川躬自禱不謀方士并緇流精誠感假乃如許祈晴輒晴雨即雨從兹水旱不為災千村萬落生禾黍使君三年政有成翩翩五馬朝神京但恐留作公與卿誰為慈母安吳氓誰為慈母安吳氓瑞雪為徐推府作冬令有愆陽賢侯事禱禳一言才布悃六出遂呈祥已賴滋牟麥終期去旱蝗人間和氣應歌頌喜洋洋逰海雲觀茶屏海雲菴裏種雲擁翠重層閲歷數百嵗消磨多少僧鬼神常護衛樵牧敢憑凌春日花開遍渾疑錦作屏送郡守劉公臺憲超遷守郡城嚴威從此變和平民安農畝歌謡起吏散公庭獄訟清屬邑自當師儉德鄰封誰不慕亷名三年述職趨朝去補衮行看到上卿送李員外貞伯馬頭山色擔頭書千里朝天豈畏途此去陳言同賈董將來治道似唐虞胸中素有丈夫志海內齊稱君子儒臨别不能同一飲吾家今嵗米如珠送陳僉憲粹之西江憲節昔遙臨王事驅馳雪鬢侵自保百年憂國念天知一片愛人心深嫌酷吏頻施杖更笑貪夫每受金千里上京何所挾行囊惟有短長吟仲子恩以會試入京卒于吳翰林第聞訃二首十五年來一解元解元名好也徒然青雲違别鼇頭客碧海追隨鶴背仙瞑目不瞻天咫尺逰魂空返路三千我今向老人間住入地誰知汝在先携書千里上楓宸端為驅馳病此身自信我心惟樂隱誰知汝意欲榮親全歸不作道傍殣大義得逢天上人自古有生皆有死豈堪衰朽重悲辛感義詩兒子恩以會試入京遇有疾鄉友吳翰林匏菴先生留止于家而二孫收放亦在焉未幾恩死匏菴為之棺殮如禮撫教二孫甚至豫深德之因作詩曰感義狀頭今在鳯皇池故舊心存久不移一子淪亡勞殯殮兩孫孱弱賴扶持草萊老我生無報犬馬憐渠死有知髙義自能成薄俗人間千古令名垂郡守况公挽詩花外東風不動塵行春無復擁朱輪黎民感德思賢守聖主論功惜老臣千古封章名不泯九重頒誥墨猶新凜然生氣瞻遺像誰謂羅池獨有神送陳永之分教湖州其從兄立之亦司訓湖州鄉書新領上神京角藝俄登乙榜名魏闕承恩辭聖主湖庠分教並難兄還家正值三秋景之任才過百里程莫道廣文官獨冷鱣堂曽見出公卿過虎丘朱氏花園朱氏園林近水濱王孫公子往來頻若將金帛來行賞須與東家種麥人遊虎丘嘲同遊者穿盡幽林鳥道微間情適處自忘機同來不解遊山意一見青山便欲歸在吳中久將北還寄親友少小生身在逺方歸來翻使客心傷故鄉雖好不能住却望他鄉作故鄉宿虎丘僧院曉起題壁吟邊虎阜生春夢裏羅浮易曉起來欲問東風滿院落花啼鳥送陳山人還吳徐有貞煙樹津頭雨恰晴放舟齊發棹謳聲别來不斷山中夢歸去渾忘世上情應有壺觴招故舊豈無方術授諸生于今多少思鄉者誰復如君得遂行送陳主簿還吳久聞佐邑振清風有子登科復亢宗老鳯未應栖枳棘祥鵷今已集梧桐九重樓閣晴雲裏千里山川夕照中念我吳中桑梓在送君獨覺思無窮送蕭教諭欒赴長洲儒學欒季父編修孟勤嘗與余為同官有文名欒亦克世其學詩以送之丹穴無凡雛渥水無凡駒靈氣有所鍾毛骨固自殊西昌文獻區况子世為儒諸父詞林彥光價重璠璵子才復似之妙年振芳譽蔚然竒秀質不與常流俱兹焉官學拔重是入仕初勉旃厲髙志升彼青雲衢敝鄉文教弛振起在師儒子今持鐸行所望良不虛聊將一尊酒送子都城隅微雨生朝涼清風動衣裾欲别復不忍執袂少踟蹰贈言情正厚獨愧非瓊琚送朱文奂經歷還崑山宦轍驅馳嵗月遙秋風兩鬢覺蕭蕭獨求間地依田父不恨才髙老幕僚祖道一杯桑落酒滄江千里木蘭橈讀書堆下幽栖處松菊蒼蒼晚未凋送徐以寧上舍還崑山省親角巾綵服泛仙舟歸省仍欣是盡遊充貢己申觀國志承顏應慰倚門憂蒹葭洲渚黃昏月橘柚園林白露秋早晚鶴書當趣召故山未許久淹留送汝兵馬思聰歸吳江焚黃衣錦還鄉日焚黃上冢時吳人應共羡汝氏有佳兒江水浮歌棹梅花照酒巵長橋風月夜乘興好裁詩吳門送徐南伯之京吳門美酒春一壺送君千里之皇都皇都勝概壯且麗天開閶闔青雲衢聖明天子正當寧臣工贊輔皆文儒三俊九德並登用寸長尺善收無餘男兒立身當此日可復栖遲在蓬蓽取人今也非一途有才俱得為時出孫陽廄裏麒麟多匠石肆中梧檟集鵬擊天池風九萬魚躍龍門浪三級憐君才調已出竒入仕此行應可期駿足由來有法相良才未必無人知東風淡淡江波微明當擊楫浮渡之壯懷不及戀鄉土莫向尊前言别離登穹窿峯二首平生自是好竒人每上竒峯不厭頻洞祕陽精生赤汞雲盤仙磴挂青旻仰看南斗懸三尺俯瞰齊州眇一塵好笑退之胸次小却登華頂淚沾巾吳中竒勝説穹窿却喜登臨興不窮秀色敻分羣巘上孤標髙出大江東雲連澤國城微見洞與蓬壺路暗通此境人間應自少題詩况有浣花翁寄施堯卿兼簡杜用嘉平生心趣在依仁特築園廬為卜鄰宦迹愧如王給事柴門今亦鎖松筠憶同間步竹林時曾許分栽屋後池秋至緑雲知己密獨憐詩酒負幽期秋深藥圃菊花黃應念鄰人在異卿杜老會間多賦咏莫教嘲誚到西莊别後無時不憶君憶君情緒只紛紛玉堂退日憑軒望目盡江東一片雲送衛儀曹以嘉還崑山省墓十解君家玉峰下我住虎丘傍相違無百里所重是同鄉一解同鄉情自親况有斯文好憐君道誼深能忘我年少二解君先登祕閣我亦入翰林雖云不同事却得與同心三解我昔丁艱去離郡嵗三閲重見幾何時君奚復言别四解别君無限情喜是錦衣行聊將五言咏送入棹歌聲五解灤河氷解餘春波蘸衣緑東風吹片帆去如飛隼速六解懸知到家日應不逺清明上隴人爭羡鄉閭亦有榮七解好過讀書堆重尋野王墓山川不改觀風景應如故八解婁東桃與栁遙帶百花洲想見行春樂無因得共遊九解殷勤贈言意何惜為君道官守不可虛還朝定須早十解送談生還吳談家瀆溪在余光福先隴之東北隅三十里春早都門送客還栁條柔弱不勝攀白雲飛處知親舍明月圓時到故山草色煙蕪吳苑路桃花水漲瀆溪灣我如轉省重過此凖擬尋君一扣關送章御史圭罷歸常熟分韻得國字孝子不辱親忠臣不負國平生讀書志舍此安所適明時闢言路重是風紀職激濁必揚清錯枉須以直古今理共然賢者當自擇涼風應秋至驚見鷹隼擊霜威一以厲陽和斂餘澤憐君今罷去亦已塞言責家居奉慈母還能慰顔色鬱豫鄉里情懷抱豈云懌臨岐無可贈悵然空嘆息送陳都憲有戒出鎮陜西君不見吾鄉先正范希文西陲經略收竒勳安邦筆掃三千字制敵胸藏十萬軍希文一去四百載芳名偉烈今猶在吳中人物久寂寥却喜于君見風采君才自是當時傑早嵗曽將桂枝折雲霄獨步榮繡衣江漢十年持玉節向因陜右民失寧帝心簡在命君行行臺霜肅中丞府出塞風振將軍營民間熙熙兵患息寒者有衣飢有食威行河隴萬里餘豺狼狐虺皆潛迹去年承召初還京今年拜命復西征聖主深存倚毗意邉氓不釋去思情皇州二月春正好白馬翩翩踏芳草都門冠蓋集如雲羣公出祖東郊道鵲印腰懸大如斗弓騎繽紛擁前後丈夫至此亦以竒明良際遇應非偶嗟豫小子真狂簡每慕希文恨生晚知已平生幸有君心獨相親迹何逺臨岐握手語諄諄即别何須淚灑巾願將勳業聨青史應信吾鄉不乏人聞陳都憲有戒陜西救荒之政喜而有賦因其來訊遂寄以賀焉自君按節出皇畿陜右軍民得所依甘雨故隨驄馬注青霜偏傍繡衣飛便宜發粟今應少專制安邉古亦稀他日大書青史上還於鄉里有光輝不瞻風采别懷深忽聽西人報好音旌節過時消沴氣馬蹄到處施甘霖飢民免作溝中瘠行旅羞攘道上金正是愁餘還躍喜緘題千里慰子心送鄉先生張養正醫師韓雍君子抱道德所志恆在民達則善天下窮亦思濟人濟人伊何切醫道體至仁先生吳中彥醫名冠時紳早承家世傳羣書探其真療病固本元制藥分君臣死生一脈決其應若有神沉痾一劑起竒效時能臻且其不責報貴欲先賤貧所以賢大夫禮遇隆嘉賓宋清韓伯休鄙哉何足論越人與元化足以繼後塵况其卓犖才髙談妙經綸斯人茍出仕所志回陽春偉哉張先生醫中之鳯麟作詩寄遐思用候觀風陳世儒堂為俞山人石澗後人作昔承俞山人遺我參同契因之訪南國知是儒者裔華胄遙遙來傳書十餘世隱顯雖弗同守業不少替卦探伏羲畫辭講三聖繫踐履無愧怍著述有文藝手澤尚如新遺像猶未敝山人益克肖講學了生計阿母守貞節旌書表門第見重瀛洲仙名堂與佳製賢聲震三吳慶澤衍千歲朂哉子若孫箕裘謹終勵次韻留别徐武功先生公昔秉鈞軸清班領斯文明良契魚水慶會乘風雲忠誠帝簡知譽望誰不聞松筠振節操蘭桂揚芳芬何期麟鳯姿誤陷豺虎羣一時暫爾屈四海知名尊人情自惡薄世事多紛紜而今媢嫉徒屈指有幾存揮毫迹已富著書業尤勤欽仰懸九州韜晦居海濆我慚拜嘉命南陲統三軍餞送有佳章深感知已恩駑駘逐驥足蔦蘿附松根我欲助聲光相與流八垠請看周與召同著萬世勳次韻留别祝大參惟清金門同待漏紫塞同行春倐忽三十年流光如隔晨君昔總邉賦與我常相因籌謀鼓士氣談笑清風塵我有朝天行送别桑乾津桑乾水清淺難垂任子綸還期釣東溟斯得橫海鱗君乃獨勇退風節超羣倫金帶橫緋袍還鄉敘交親湖山稱雅志詩酒娛間身良會屢見招義氣髙雷陳若雖樂取友我豈能輔仁而今忽逺違相望如參辰贈我有佳製鏗然鳴韶鈞陽春和難作魚目慚混珍葑溪雜興霜重林已空風髙木愈凋荒園一散步暮景覺蕭條忽見古梅樹斜橫出籬落攬衣看枝柯相將綻紅蕚嵗寒幸有此氣味儘可託與馮憲副朱揮使昆玉遊東禪幽懷不能遣與客遊東禪東禪景如何繚繞水竹籠雲煙東堂長老號玉田精采矍鑠神氣全忽聞門外車馬聲倒屣迎我欣欣然自言門外好杉樹親手栽植今參天登堂坐我蒲團上妙香香茗時時傳喚來髙徒聰上人頥指氣使勤周旋須臾開筵列尊爼欵留甚覺心誠虔英豪憲副天下士老成揮使人中賢更誇玉雪美公子好詩好禮今無前携得仙家施小童長歌大雅聲清圓玉田歡感呼行者青天歌舞齊聨翩一派仙香衆側耳重斟美酒烹肥鮮案前石研壓錦箋墨漿如膏筆如椽諸僧羅拜不肯起闌門索我留詩篇君不見逺公結社住白蓮一招清節賢名傳又不見昌黎有書遺大顛美譽烜赫垂千年愧我無能繼古作愛此光景徒留連草草留題拂衣去何須更問三生緣訪沈南齋東禪無聞上人方丈有作昨曽訪東禪東禪方丈居西偏羣僧瑣瑣不足數但覺玉田和尚賢今晨復訪東方丈無聞長老尤髙尚三寸龎眉映雪顛純誠實有真人相人言無聞世少雙一生戒行如氷霜沾泥栁絮吹不動春風上下空顛狂南齋詩伯常來住好詩好畫留無數促我題詩驚衆僧衆僧酣臥知何處送周漢章還吳轅門一相見聲價重南金獻我平蠻䇿憐君為國心别違還錦里崇報待綸音無限思鄉意題詩淚滿襟寄贈吳中諸友皇華使者日邉來叨拜綸音總內臺四海澄清元有志百僚表率愧非才風霜敢謂搖山嶽雨露終期振草萊却嘆君恩無可報惟將三尺效涓埃寄鄉郡朱太守一郡黎元仰福星已魁循吏傳中名愛民不數劉寬恕律已還髙伯起清莫嘆長才淹白髮終期入相慰蒼生獨慚淺薄登清要補報無能負聖明送陳善還吳相門才子吳中彥袖挾天風遍九圍萬里好山吟不盡滿船明月載將歸陶潛徑裏香醪熟張翰江頭晚稻肥君去養親吾未得葑城空望白雲飛送劉主事昌奉使還京便道歸故鄉髙第雖登不燕安寫騷亭上日忘餐文章漸入歐蘇室風雅將登李杜壇廬嶽雲開瞻秀爽吳江月滿照清寒思家無計相從去東望空勞一永嘆送崑山趙進士博還京畫舫南遊始盍簮錦衣東望又分襟一天風月供清操滿目江山伴醉吟歸路不辜題柱意到家應慰倚閭心吾鄉自古多豪傑接武相期振好音挽劉詹事宗器詞林璧水久蜚聲晚輔春宫重老成操履一生行古道文章千載占時名調元未見登黃閣觀化俄聞上玉京惆悵東風招不起懶揮鐵筆寫鄉評送常熟章主事律歸省一門榮顯世稱良拜寵寧親更有光海上臥龍猶未起天邊鳴鳯忽來翔花迎宫錦秋容好人醉黃封暮景長我亦懷歸歸莫遂不堪回首白雲鄉成化巳丑九月八日鄉友朱良德邀武功伯徐閣老暨祝大參維清劉僉憲廷美逰石湖諸名公聨句成章良德懇求豫和故依韻和之吳下衣冠集勝逰扁舟逰遍五湖秋未能執筆陪聨句懶得逢人説運籌緑野文章傳在洛赤松心事棄封留賡歌趣我歸來興莫道非才尚黑頭遊玄墓次趙行恕大參韻萬松徑裏寺門開故舊來遊喚我陪侣伴煙霞空有約品題風物愧無才寒光極目天邊水秋氣橫空月滿臺海內湖山此竒絶何須更擬訪天台贈陳省菴孟賢幾年不到醒菴宅今日來臨興自豪愧我文情成簡慢喜君詩思益清髙古松嵗晚凌千尺泰嶽秋空見一毫况有森森鳯毛在吟壇誰不讓風騷成化己丑丁先人憂守制甫半載十二月二十一日忽奉恩詔奪情起復進階右都御史總督兩廣軍務兼理巡撫事上章辭免升秩乞留終制不蒙俞允感而有作苫凷餘生心已灰誰知恩命又來催不堪騎馬迎丹詔安忍臨戎被墨衰孤子上章空有願聖皇注意莫能回滿懷無限君親感圖報惟應罄謭才次韻答鄉里諸耆舊聽司藐藐視枚枚知命年來百病催利鎖名韁苦羈絆石田茆屋恐荒頽平蠻已喜干戈息辭老行看節鉞回却憶江湖衆仙友今辰又醉菊花杯近得文兒書報數年間置有田若干畝豫竊自思念平生官拙未嘗有私積遺文南京惟以常祿付文置産亦未必遽能如此之多誠賴吾兒幹瑾才優節縮日用所致也昌黎先生嘗有言中世士大夫以官為家罷則無所于歸吾今乃有所歸志則遂矣喜甚賦詩美之且期望之鄉井良田二十丘吾兒何力遽能求積金自愧元無計幹蠱誰知儘有謀半世苦心天不負滿懷歸興我何憂老來惟是書香願願見成名慰白頭江行懷鄉里天全侗軒諸老偶成西江北塞嶺南壖奔走風塵三十年勇退未能心巳倦專征才歇夢猶懸自緣衰體纒多病敢向明時話獨賢苦憶鄉園諸大老西風先泛五湖船其二五湖煙景擅江東諸老歡逰有古風鳳吹鵾絃范成大筆牀茶竈陸龜蒙全拋俗事水雲外盡付間情詩酒中愧我求盟未能得海天長嘯思無窮贈鄉郡丘太守吾鄉太守真豪傑節操文章有古風伯道清名傳海外樂天佳句滿吳東一麾撫字催科內千里謳歌德化中却恐邦人留不住飛騰還建濟時功次韻酬沈陶菴四絶髙卧東林絶世紛昂昂野鶴在雞羣三吳人物多相重重爾能詩又喜文東吳詩客競紛紛沈老詩才自不羣聖主當天現鳴鳯朝陽光彩爛成文連城白璧出藍田文彩溫溫美具全堪羡陶菴好詩句更多髙義薄雲天十畝家園萬頃田稻粱蔬果四時全有時放棹濯纓去水滿平湖月滿天次韻酬徐武功先生髙臥東山夢正酣相親無計䇿歸驂交情不改忘年舊珠玉時時下嶺南賜還軒冕自南蠻海內常時憶謝安相業終期駕伊吕文名今已並歐韓東吳南越斗牛分夜夜遙瞻憶相君萬里何時遂初願君為龍去我為雲海內人龍繫我思我思未見忽成詩召司有召今將至且莫臨風讀楚詞次韻答祝參政維清紫薇堂上解機權歸臥江湖一棹煙想與陶朱醉吟處世間萬事兩茫然敵平南越欲辭權歸向東吳避瘴煙翻笑當時竇車騎空將名字勒燕然寶幢院小池謝會空寮斷垢氛一片石間分寒色涵松影秋光漲蘚紋定回看浸月行處見浮雲長日烹佳茗山童汲取勤上刑科祝先生曽於鄉國仰華風迹判雲泥西復東依戀門墻徒怏怏賢勞王事久匆匆江南深臘梅將放薊北隆寒雪未融一寸山溪有茅塞掃除何日受深功赴都留别餞席諸公故園風物晚蕭蕭愁見新霜脆栁條逺嶂秋清山月小長江雲盡水天遙忍看壯志臨岐路更引深情到咏謡先報來期二三月勞君相候記楓橋送太守况公考績之京十年父母在吳中草木能知化育功厚德自能敦薄俗虛心尤急振文風兒童惜去隨偏逺天子知名賞定隆為國可行民可止心懸彼此頌難工金臺感舊歌東吳自古名都會人物江山共稱最太湖春漲拍天藍茂苑煙銷泛空翠憶昔逰觀樂未窮連巾接袂數君同山登每著謝公屐水浴還乘點也風魏收才氣多英卓謖謖翩翩聳雞鶴有時醮水灑黃素元氣淋漓蓋丘壑繼文才子子美孫幽居宛似浣花村青年已作擅場客遺韻悠悠百世存辭宇誰當號雙絶玉質金相有王烈春空麗文蟠彩雲秋海澄懷散華月北郭西城日往來蒙蒙心眼幾回開那知一别西風裏回首相望四千里故園歡洽想依然逆邸蕭條思無巳寒盡天涯嵗又新一尊孤賞帝城春緣知江畔尋梅路踏雪行吟少一人過南園俞氏書隱次劉祭酒韻吳寬鷗渚茅堂古樹秋校書人去幾人逰山林白日無車馬一老窗間著孔邱芳草橋頭小路斜書聲隱隱識君家醉玄方丈坐終日黃菊秋深未著花陳僖敏公挽章勾吳山水秀人物見英姿特出斯人類端為後輩師萬間當柱石四海仰綱維執法星辰應行威草木知常令三尺謹不使百工隳鐡面嚴風彩修髯足表儀若金須汝作豫采每疇咨雅量蠡難測清心涅不緇忘家安社稷鎮俗坐邉陲破膽驚西賊知名誦小兒方平留畫像仁傑立生祠春雨渾無迹秋霜詎有私希文應接武堯叟是連枝德業昭書傳功名付鼎彛一身思進退萬室繫安危已覺知幾早誰云見事遲懸車心尚素解組鬢如絲赤子誰依恃蒼天不憗遺朝廷終北極江漢自東馳鄉里嗟豫晚臨文淚滿頥悼沈癯樵畫史秣陵春日厭驅馳投老吳門白髮垂燈下解衣褩礴處山中持斧嘯歌時一貧比憲元非病三絶如虔不數癡落日髙堂開繐帳雪峯煙樹使人悲過大姚陳玉汝宅飲散宿大覺寺追和趙與哲韻月出平湖積水空上方仙梵隱仙宫似聞薝蔔林間雨總是芙容浦外風有客題詩先到我向僧分榻幾人同敲門自怪來何暮投轄傳杯惱孟公寄題陽山澄照寺令威稟仙骨化鶴去遼東傳聞有遺井乃在青山中山深草木盛苔徑誰能窮爰有釋氏子于此稱蓬宫殿閣頗雄傑林杪見青紅髙崖石色古小洞雲氣通神龍室其地上下雨兼風嵗時郡長吏祈禱屢年豐我昔過東麓落日明丹楓所恨足力弱徒然望巃嵸何時躡其巔歷覽無匆匆回頭發長嘆深愧南飛鴻送盛訓術還吳江一舸東南去望望故里門夕陽煙市影秋水雪灘痕製藥當書案彈琴罷酒尊相過官舍裏應是史西村送劉寺正約之江西審刑天子齋居罷舞雩使臣承命出皇都朝端法吏誰為最江右寃民自此無雨腳隨車應不斷麥苗蔽野未全枯漢庭治獄多超擢拭目相看立要途賦黃樓送李貞伯維河有源星宿同導河積石思神功濁流汗漫忽失道積石却與澶淵通平郊脫轡萬馬逸一夜徑度徐州洪徐州太守蘇長公夜呼禁卒登城墉一身未足捍大患豈無木柵兼竹籠戲馬臺傍二十里有堤橫亘長如虹髙城不浸三版耳挽回魚鱉仍耆童防河録成天有功黃樓髙起城之東五行有土可制水底用四壁塗青紅太守登樓賓客從舉杯酹水臨長風河伯稽首受約束不敢更與城爭雄水流滔滔向東去紆徐演漾殊從容負薪投壁竟何用漢家浪築宣房宫自公去後五百載水流有盡思無窮我生慕公公不逢安得置我此樓中穎濱淮海獨何幸留得兩賦摩蒼穹鳯池舍人今李雍南行别我何匆匆登髙眺逺必能賦封題須付冥飛鴻送文宗儒知永嘉用唐人方干送王永嘉韻同年出宰聨翩去大邑爭誇浙水東選士初行常法外期君當在古人中竹房夜照江心月栁浪朝翻海面風此地從來詩景勝還聞拔擢論民功題釋子芳草堂出吳閶門走山塘山塘北去七里長平郊崛起虎丘寺雲樹一簇攢青蒼我昔家居絶塵事兩足只有登山忙舟楫搖搖掠岸去尋竒探勝時徜徉舍舟登岸縱所適四尺古墩當道旁道旁父老説遺迹劉公佐邑殊循良邑人此地曽拜送相與聚土示不忘我欲題詩紀其事碑亭淡淡餘殘陽倐然欲去更回首忽見側畔依僧房青松夾道蔭寺額大書金字何煌煌竹隂蕭然槿花合中有丈室并回廊一從京師住三載南方引領徒相望旦朝忽有僧來謁自言來自胥臺鄉我師出家修苦行吳下知名芳草堂今年新領祠部檄劉公墩邉開道場敢持絹素乞一語南還留作山門光嗟哉後世重異教三吳尤云熾而昌穹樓傑閣塗金碧直以壯麗充緇黃其間號稱彼善者屈指一二無留藏白雲寺建為范老表忠觀改因嶽王只今此寺雖儉朴寺名却為劉公彰此墩可夷碑可仆有僧世守庸何傷投簮還鄉會有日擬便入寺尋支郎舊時詩句如可補坐我草堂焚瓣香同年吳克明知嘉定為題馬圖吳卿别我吳門去手把橫圖索題句開圖見馬如見人逸氣稜稜百尺身圉人騎度燕河水萬里長風生兩耳歸來飽餤玉山禾吳門草青奈爾何次韻天全翁書遺光祿徐用莊雪湖觀梅永和人物數諸王曲水難勝一野航得似太湖三萬頃梅花灣裏作家鄉不逰雁蕩即鱸鄉又被五湖勾引忙舉棹落梅春雪亂開尊臨水玉泉香吳城西有雁蕩村吳江有鱸鄉亭我愛涪翁與放翁此翁應在二之中登山臨水當年事北郭移舟舊約儂快雪初晴氷滿灣長溪未許放舟還坐移月裏千株樹臥看湖邉萬玉山新築湖西白玉城城中常作看梅行錦袍更向船頭坐便有神仙世外情不向山人道姓名詞中裴度晚年情江南風月無人管天府新除老上卿天落平湖見鬢絲旁人休笑放舟遲杜陵野老愁泥滓只許青鞋布襪知雪後船窗向晚開孤山杖履勝徘徊戛然何處玄裳影想見坡仙化鶴來湖口無人踏斷槎石梁新築臥銀沙如今要識經營意信步前山看好花太湖莫作鏡湖看聚塢銅坑地更寬日暮最髙峰上立青天尺五即長安良宵朗月在清空始悟身居氷雪中莫唱霓裳羽衣曲人間自有廣寒宫為報春風萬樹梅年年為汝費深杯徐卿况復能相引不盡青山不擬回過沈啓南有竹别業是日觀李成畫又觀商乙父尊下有銘繫舟髙栁下又是十年餘遙踏無塵徑重尋有竹居筆精如宋畫器古鑑商書前輩題名在風流邈不如送孔憲副赴廣西十年大夫官亦榮蕭然被服仍儒生胸中自有萬人敵何勞擐甲兼操兵嶺南羣蠻昔猖獗干戈滿眼尸縱橫連民竄伏遍荒野髙州殘破餘空城是時君來作民牧仰天誓欲安黎民身騎羸馬從孱卒瘴嶺惡溪循數程羣蠻望見遙相驚我來惟仗信與誠片言開諭才脫口馬前羅拜咸輸情腰懸木牌悉聽命手斷藥矢誰違盟弱男寡婦免係纍山谷日昏猶哭聲惟連惟髙我守令汝獞汝猺我父兄軍中主帥驕心萌謂此已降皆可刑獨將一身保萬口訖今軍旅休南征君于異類且有德斯民眷眷能相傾祝良張喬世重見人物信是吳中英外臺遷擢終借寇上國追隨爭識荆同鄉數聆情話好偏怪不肯誇功成邇來用兵貴神速時有威寧海之襲下僚旋踵登公卿以君纍嵗出死力有司豈合先知名迢迢桂管古所置領􅊾再作西南行投荒歷險自無怨公道籍籍歸時評功勳聊爾録二四碑文敢擬淮西平分服字韻送薑恆俯御史赴南京便養落花芳草連平陸驄馬行行入南服豈無斗酒可留君白頭髙堂懷就祿婁水雲低異太行秣陵天近如韋曲過庭莫道諌書稀手中自削三千牘送伊德載赴南京刑部闕下爭看進士袍南行又喜入刑曹青雲濶步空塵土丹鳯孤飛好羽毛茂苑百年門巷舊先世吳人甲科兩世姓名髙叔侃丙辰進士不須分祿遙為養甘旨公餘手自操送沈良臣家有宋髙宗書良惠堂扁杏苑春風後車塵帶落花儒衣初出郭御扁舊傳家易許丁寬講詩從沈約誇扁舟明日路江上暮雲遮寄李貞伯金母橋頭置隱居近來清思復何如遙知舶趠風吹盡燕子催人好束書分韻得肅字送林朝信十年戴法冠能使百僚肅共瞻風裁髙鵷班聳孤鵠平生獻替心奏草惟自讀聖皇記老成昨喜批薦牘議從吏曹公初起假夢卜輟君副臬司萬里騁遐躅章服增輝煌金貂映朱襮雅志在澄清姦邪首仍觸昔聞走豺狼今見蟄蛇蝮團團八桂林得此一枝足薰風吹雙旌欲渡江水緑餞别雜交親天氣適炎燠酒闌橫槊喧醉墨已盈軸羡君有兹行晝錦非所欲實惟家慶全樂哉難具録送沈晉州材美賢名曽是故鄉聞壯嵗髙科靜不羣座上誰為黃叔度榜中吾愛沈休文鞭蒲此去猶無用符竹從來豈易分吏散午衙公事簡定將書史對爐熏送僧永岡歸吳住白馬寺石縫梅泉一縷清早年依此學無生紫藤垂塢人迂步白馬馱經寺得名法席坐揮棕拂短官河去上木杯輕山中試茗何時好擬借禪房折腳鐺得賀美之書言吳民被災書來吳下少浮沈入手猶疑得好音泉客美珠俄化血田家新榖巳剜心附毛却恨皮何在竭澤安知水不深肉食詞林無寸補短吟聊復代官針送賀其厚迎其弟解元其榮喪南歸臨别匆匆把客裳愛君誰比四明狂只從門外看扶柩肯信詩中咏鬩墻諸子讀書應不廢故人沿路定相將明朝我更成寥落西館塵生六尺牀分題豐樂亭送文宗儒太僕何處亭成樂嵗豐琅邪山在亂雲中西南林壑誇尤美六一文詞信獨工幽谷泉鳴琴操古石屏路轉酒船通幸當歸馬滁陽日此地來逰興不空送楊君謙子有好學名得之直從幼矻矻忘其疲每以夜為晝誰令不自愛坐與簡編鬬旋致心腹間有病肝肺候鄉豫嘗謂子文筆真似舅欽謨舅也昔養痾亦在掇科後七日儀部官在告月且又服藥未見功具疏遂入奏昨朝獲俞旨顔面喜欲皺西風作新寒南去不可逗相過一何疏相别一何驟子去固欣然孰與針老謬惟豫有書癖舍書莫能救譬如病酒人戒飲貌愈瘦何如稍飲之病去漸復舊子病偶類兹簡編實醇酎茹多仍吐之紙上發竒秀三年當復來觀子所成就丁未春試畢送吳中四進士歸省毛珵貞甫春榜名髙第幾行自誇毛義出吾鄉班聨玉陛通朝籍政試銀臺挾奏章新製衣冠歸故里近將舟楫倚回塘君恩浩蕩應難忘仰見門前進士坊陸完全卿鄉書髙薦赴南宫又見名題甲榜中王弼易編真有得陸機文賦早偏工身辭霄漢天門近宅傍江湖水路通却藉君恩為母夀綵衣頻著舞春風楊錦尚絅禮闈曽忝校文章筆勢如流欲擅場已向天門看放榜又傳恩詔許還鄉畫船得意春風順綵服承顔白日長為語時人莫相羡晏嬰心不在揚揚吳鋆汝礪逺承恩詔許寧親誰是髙堂具慶人逺去不勞東道主暫留真作北都賓賢科始覺文章貴仕版髙題姓字新總道故鄉風物好壯年為國在經綸送趙栗夫歸省生當全盛時仍遇至樂事豈因掇髙科不在登貴仕故園寄吳江遊釣舊為戲别來餘七年往往入夢寐家有大父母八帙行且至手題數行書昨者附鄉使書云我衰矣久望汝歸侍汝父母猶壯歸日尚可遲老人風中燭此語真善譬此意豈不知此願獨不遂明主勤萬幾曠職警有位故緩歸省期俾盡匪懈義而况宵旰間切切在法吏私情苦難伸如縶千里驥遙望天之南安得插雙翅終推舜文心天下以孝治一朝恩詔頒跪聽殊足慰又如驥欲奔始脫銜與轡匆匆治行裝舊館視若棄戴感明主恩仍給道里費長河引輕舟連日風更利鱸鄉適新秋水芳散荷芰日出垂虹橋駢肩看乘駟登堂問起居稱夀先舉觶此髫者吾兒彼冠者汝季各令向前拜起立亦以次鄰里爭入門感嘆共驚異班白映錦衣三世一堂備此樂難具陳盡出上所賜努力在他年圖報端可冀送彭教諭道赴長洲學先任吳縣學逺為鄉邦賀得師扁舟南去莫遲遲還從蘇郡更新學重見胡公舉舊規難弟追思如昨曰諸生相候已多時清門久忝斯文契贈别安能惜賦詩送賀御史出守蘇州吳民方切九重憂祖道休將五馬留朝著久稱才御史封疆還屬古諸侯香凝燕寢韋郎咏舟過花橋白傅遊我忝郡人無以頌擬叨循吏傳重修送原已還南京分依字韻溽暑猶未退頗覺槐隂稀栖燕久相識鳴蜩靜還飛昨者冒江雨逺來自京畿重念交親意時時疑我扉晚涼理舊話海月流清輝西堂設臥榻夜永風褰幃惟子官醫院績美誰能譏入朝復陛見咫尺瞻天威銓曹已書最旅舍仍言歸諒亦戀老拙所重定省違幸哉被封典恩光照庭闈白頭自足樂無勞製斑衣行旌向晚動酒盡情依依次韻沈啓南自治生壙見寄二首射瀆西行水路斜細論形勢見隆窪宋儒尚作山林議郭氏真稱地理家親手銘文鐫白石鄰僧香火傍丹霞久知詩骨偏強健曳枝何妨閲嵗華倚壙髙歌對斷崖鄰人安得此襟懷門深拱木栽培遍山近浮雲坐卧偕曽子啓豫言不妄莊生息我意終乖司空自有藏身地不學劉伶説便埋夏太常挽章鳯池宣詔荷文皇書藝當年獨擅場蕺嶺逺師王逸少鑑湖終賜賀知章垣西筆翰傳中舍海上樓船載太常幽室築成方晝寢誰將前輩擬清狂送李貞伯致仕引去誰謀及故人買田陽羡遂成真張公洞口終期我金母橋邉早置身郡志續修知舊事鄉筵初會得嘉賓百年風節人爭仰笑對清波白髮新送仲山赴廣東參政久從夏官卿分署專典選幕府纍上功鑒别殊不倦吏胥服精強寮寀推老練以兹績屢書有最却無殿屬當黜幽時諸省多獲譴山公重人才啓事遂登薦御批由論定豈藉氣力援參政三品官後世號方面坐鎮惟大藩宣化及州縣孰云瀕海遙炎蒸少霜霰民物誇繁雄此地今稱善米粟出要荒賦入同禹甸公田况早收積蓄總饒羡已不煩催科况乃免鞫讞中年始入廣身已脫俗唁鯨波就再涉瘴海亦乘傳章服耀金緋真不忝恩眷公餘適情暇發篋得詩研山川有諸竒題咏語頃遍此行信堪喜更喜過家便十載别吳門親友幸相見衣錦當晝行璽書目爭眩行哉不可緩我獨重戀戀平生托心知故舊莫豫先都下嘗合並秋社異鴻燕時往過園居辨析啓文卷海月故延留盤蔬雜藜莧往往入夜還行歌共羣彥孤懷今何如誰復容鄙狷久旱得微雨南風特狂煽城東大道旁樹暗時節變嚶嚶求友聲黃鳥聽百囀臨别心惘然舉酒未能餞送朱堯民陳雨起涼颸新秋迎溽暑匆匆即言旋晚共園亭語泥淖一尺深驢軍在郊墅路人勿相疑不是從遷舉永定寺在豫家西唐韋刺史集有咏間齋北池等古詩至元髙季迪等又有經永定廢寺詩厥後構造復完而堂揭海印舊榜乃元台哈布哈所書極雄偉可觀今年秋寺忽燬于火豫少嘗讀書于此者因為詩惜之廢寺經行處前人句裏來一朝不戒火百嵗幾掄材齋閣空春樹池塘滿劫灰舊逰真不忘誰掃讀書臺過先塋登南橫山絶頂時表弟吳子髙侄奎奕及兒子奭奐侍行南山翠色與雲齊萬級登攀石作梯水入太湖縈白練樹依重嶺簇青藜雊鳴麥隴聞田雉角解松林遇野麑日莫載瞻塋域近恩光新沐首頻低送濟之歸省氷花欲結潞河灣驛棹南行未許間恩賜已知千鎰重夀容應見兩眉彎天髙鴻燕難相值豫再入翰林而濟之適去春到江湖及早還安得從行仍作伴勝遊當共了西山范石湖遊洞庭山詩云西山才了又東山豫往年己遊東山獨欠西山之遊耳哀文宗儒吾鄉沈衢州逺致尺書在發書報文侯有疽發于背我憂體肥人此病恐為害猶冀有良醫或倚以致瘥憂懷適浹旬浙疏馳獨快乃六月七日死期特兼載哀哉此良牧天奪真可怪念昔為永嘉勤政略不懈豪民户先鋤淫鬼祠必壞撫下自仁術百里免凋瘵及此領郡將先聲過疆界窮谷爭入迎耄倪總羅拜君初聞再起仕路厭行邁因察民情歡下車始無悔爬梳積弊源一旦決欲潰坐堂日孜孜訪問及細碎孰為狼所貪孰為蚊所嘬犴獄滿寃囚親手為破械去嵗東海涯光氣作妖怪橫飛類鬼車數丈無首戴具疏即自劾遂及弊事概謂此如許除吾寧自引退有司格不行當道有窒礙公退長太息空負民所愛吾惟盡職業庶償為守債使民自安堵守法勿就逮百家立為約禮義相告戒民曰賢侯言敢不各敬佩君終抱憂思弊事卒吾敗大者如鎔鐡骨髓竭稱貸彼力固已窮吾體亦真憊遙遙走一使去求乃至再知已總愛才不使投匭內孰知今日事俄有此變態凡君求歸休民輒嘆無賴羣情達銓曹以及寮與寀今也魂茫茫棺歸只空廨豈惟民無依失侣嗟我輩久為晚年期几杖作鄉會對酒乏清言臨事無善誨城西多舊遊山色愁晚對有穴未及臨淚盡繼以慨美曹太守毁淫祠神邪妖邪我不知相版五色錯雜施墻隅小廟瓦數片吳下人家家有之家人有病問卦師師云汝病神所為殺豬烹羊陳祭品謳歌贊嘆上酒巵侑以吹竹仍彈絲獻以茶筵具酒席宛如生人宴會時有酒自豐病自危吳人豈皆白鬚眉如何至死猶不悟惡俗信鬼不信醫豈惟生死于神聽商賈出入聽指撝賢哉黃堂曹太守諭民此事何不思聰明正直者為神焉肯嗜汝酒與犧祭者得生不祭死神道所好何偏私且彼為神既尊貴身居小廟嗟何卑汝民愚昧誠可憫憫汝徒費空家資太守升堂朝出令民心敬信猶蓍龜爭持神像出門毁烈火三日焚無遺端如人醉今始醒風化頓覺隨時移唐有狄公任巡使美政先聞毁淫祠後來入朝作賢相邪鬼安敢侮與欺我願吳人常奉令自此崇正無復疑祖先為祭祭勿薄五祀當祭祭勿遲遂成美俗載郡志當與賢守名同垂題沈良德送行圖不用髙歌陟屺篇賜歸真慰母心懸翟冠自送雙笄總綵服重裁兩袖翩九世醫名多積德一門科第總稱賢吳中秋到慈幃啓盡説宜將盛事傳送文侍御宗嚴奉使河南盡説文家好弟兄更誇仲氏繡衣明憲臺此日官為重軍政多年例巳成花下莫辭清酒薄津頭遙望畫船輕從來練達民間事不負朝廷是此行吳都文粹續集卷五十一
