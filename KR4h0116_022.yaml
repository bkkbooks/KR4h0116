body:
  text: 吳都文粹續集卷二十二明錢榖撰山水遊石蛇山記蔡羽龜黿龍蛇之山大抵皆花石之材嵌者空竅灂者亷利然皆不於山之腹特出於波濤龜黿龍蛇皆負林麓走飲於湖惟蛇山為不然當太湖之西北背龍頭而迎風濤截乎大洋故境愈險而愈竒世少得而觀焉正德己巳清明日與客放舟龍頭西踰小洞庭還見聚落十餘家為烏沙井厥石萬狀恍恍焉洞洞焉緣於巑岏不敢搖動然去蛇山尚十里客請乘東風之便乃從烏沙井解舟纜薄蛇山之東還見大石劃下若有門闕而無人迹顧其勢斗峭水尚急舟不能停緣壁里許則山之陽也岸始舒水始緩若有里墟而無煙火鳥巢獸窟以竄其間者大抵皆采石之人厥崖惟廬厥坎惟炊厥寢惟磯以漬以飲維石之宜始舟人與岸人見獲通語言而沙潭詰曲未可進投竿測之視岸人所指而行焉始獲登登其丘山空地險舉足有聲躡其巔梯斷石滑側身而不能前復舉帆去則山之西麓矣壁愈高石愈亦若芙容開花魚龍蛻甲上者屏列下者橋卧隱隱波底者不可窮狀所見既異而境復迂僻由是鎖舟壁下環臥涯滸客皆引滿載歌晨徂而暮忘返夫蛇山掌石耳其勝顧出龜黿龍頭之上余與甚邇而平生不聞其勝一日跨波濤觸煙霧獲覩其竒則古之不言石蛇而言龜黿者有以也噫物愈竒則遇愈難余志石蛇之竒俾好竒者覽焉遊石蛇後記山林之與臺閣其味不相堪非止甘苦也間有勉嗜之者得之必不深與之必不能相忘惟太傅王公則不然去臺閣投山林釋軒冕憩泉石若返古踐真曽無纎芥耳與目惟恐其不遠情與度惟恐其不廣一日聞濟陽蔡羽言石蛇之竒欣動不已即其歲己巳之臘八挾小舸載輕麾奮發乎銷夏灣之上以羽侑座二之以扣舷之客緣大小明月灣絶流西去瞬息而達蛇山簫管一鳴林谷振響山精水怪潛匿而不敢出乃與客冥搜乎巖穴循環乎溪澗扶搖乎梯磴之間高駕乎洪濤之上以吐納煙霧履峭絶跨蓁莽與健夫爭先而公不知倦於是水聲洋洋萬籟俱和通乎耳矣東過霅溪西過夫椒通乎目矣仰周八表俯接九淵通乎度矣鼉呼而鱉歡羽翔而鱗集通乎情矣山不必高王公一踐之三萬頃之勝可以撫而有也雖老於山林者不如又何嫌於臺閣日欲落公手剝石衣書名於壁而去蔡羽記過石公山王寵島嶼屢崩奔石林突參錯朝雲正吐秀冬水亦漸涸槎牙熊豹蹲蜷曲蛟龍蠖波濤激中洞嵐靄紛上薄金膏赤日流石鏡青天廓表靈徵名圖延賞諧幽諾蒼鼠不驚人丹楓時自落兹焉可投綸畢志甘場藿思夫山高啓江上曽看望夫石湖中今見憶夫山夫君好采山中藥獨得長生去不還不似蕭郎與秦女乘鸞同去彩雲間同前周南老峨峨湖中山山崦開石扉應知避秦者遠與世事違良人採藥去歲久不復歸天寒翠袖薄日夕勞夢思化作山頭石引頸雲依依山石或可轉妾心終不移同前王賔夫來采藥避秦苛妻守空廬獨淚多非是妾身甘憶死恐夫憔悴在山阿思夫山相傳秦時有人採藥不返其妻思之至死故名望大小二貢山王逢大貢如大人小貢如小臣大人方正笏小臣亦垂紳太湖七十山而此我所珍清淑萃間氣端厚凝風神嶽露蓮一朵海偃月半輪遠分馬迹秀近奪蛾眉真岫幌蔽素夕雲蓋擁高晨深谷虎豹隱幽絶狐兔鄰將軍雖相望邈若越與秦我行柯村外紫翠忽鮮新不無靈異栖飛度招隱淪洶洶白水波杳杳清路塵芳蓴被中沚采之淚盈巾父老昧知識謂我諸侯賔我豈諸侯賔均是天王民琴山蔡升誰將太古琴橫向洞庭隂山泉泠泠響倣佛絲桐音白浮山水面有浮山色白勢突兀浮焉胡不流非浮胡不沒五浮山有客報我五星流隕向太湖為石頭下有巨鼇負之浮羅列水面如仙洲不識其語誠然不誠然亦逾萬萬秋我欲泛彼木蘭舟五處岩壑皆尋幽只恐上帝不肻留故遣夸娥二子收收去人間何所投五嶽各與添一丘山靈如此先當愁烏蚌山烏蚌在湖水水流蚌不移圓月出山頂疑是吐珠時緑石山南山層層石非紫亦非白寒暑亘千古長是莓苔色芙蓉峰一朵金芙蓉雲根在土久伊誰能折之擘山巨靈手玄龜山山根有玄龜曵尾將若行夜雨長石髮倣佛緑毛生西湖灣湖水清湖堤平薰風芰荷氣急雨菰蒲聲灣中漁人夜吹笛宿雁飛起眠鷗驚禹期山相傳禹會諸侯於此王賔堯時神禹會山巔洪水滔滔勢接天今日三州租賦地秋風禾稻自年年射鶚山吳敏東山空濶原野平吳王飬雞築高城秋天飢鶚未飽食側翅下攫殊無情守城武士心孔惡旦夕窺兹捕雞鶚雕弓一展羽箭發鶚也時從半空落山人學射藝漸精遂使山無鶚鳥鳴却思勾踐侵吳日何不令之射越兵大小竹山竹繞山山映竹山色長青竹長緑大小兩山何處同瀟湘􅜌頭淇水澳昨朝山上清風生翠梢遙動鳳凰翎今日山前晴旭照緑隂滿地鷓鴣聲鷓鴣聲啼未絶兩山雨溼琅玕節登西湖小洞庭吳鳴翰卷波飛雪打芳汀扶醉來登小洞庭金闕芙蓉千疊嶂玉壺天地一孤亭直須橫槊歌明月更擬浮槎作使星不獨坡仙誇嶺海兹遊還許冠平生題煉墩三江引去桃花水露出波心小玉屏四面海天涵地白一方煙霽破湖青登臨有客驚浮世今古無詩咏落星若使湖州仍見此便應添箇看鷗亭鎮下放船過東山范成大打頭風急鼻雷鼾醉夢間心鐵石頑惟有愛山貪未厭西山才了又東山老禪竿木各逢場詩客端來共葦航一任顛風聒高浪滿船歡笑和詩忙社山放船社下鐘聲送客船凌波撾鼓轉滄灣橫煙裊處雞豚社落日濃邊橘柚山八表茫茫孤鳥去萬生擾擾一舟間湖心行路平如鏡陸地風波却險艱東山渡湖渡船帆飽如張弓倐忽世界寒浺瀜堪輿無垠日夜泛浩浩元氣蓬蓬風湖光日色不可辨但見水精火齊合集成虛空波臣川后敬愛客約東祕怪驅魚龍大千總作大圓鏡光中飛度迷西東蒼茫一身無四壁八方上下惟孤篷毛仙出迎笑相問何乃自苦荒寒中吾生蓋頭乏片瓦到處漂搖如寓公猶嫌塵土礙人眼兹遊勝絶餘難同九衢車馬恍昨夢付與一笑隨飛鴻歸自西洞庭阻風登黿山頂王鏊親朋挽衣留不住逆風舟向平灘駐灘頭寂莫誰與言青鞋飛縱顛崖步黿頭有山山不崩東望東海西吳興羣峰羅列七十二如拱如立如奔騰我行天下亦多矣所至有山或無水其間有水却無山何處能兼山水美蒼茫萬頃浮孱顔惟有海上三神山杳然可望不可到不如此地日夕隨我往與還胡為十年才一到風乎爾知吾所好登縹眇峰仄徑盤空艱復艱快哉七十二孱顔星辰可摘九天上吳越平分一水間日轉林梢看鳥背煙橫谷口辨人寰居然自可小天下誰道吳中無泰山明月灣石坡巨石陂陀板樣平三山當面看雲生何當子夜重來此濯足滄浪對月明石公山石洞石公之景殊不惡巨石懸空欹不落爭知不是補陀山中有仙人儼纓絡石公山試劍石懸崖峭壁立千尺有洞虛明忽中坼吳王寶劍烏能然恐是巨靈神斧劈石公山石公幽處無來迹亦有人家散阡陌我船欲開還不開愛此孱顔蒼雪色崑山滕繼一水浹辰外乍晴如酒醒臨溪照淨練陟巘到高青翠靄俯深樾黃雲迷遠坰超然信塵表風袂襲泠泠同前孫實絶頂地平易軒忩風怒號半空垂象緯四面湧波濤洞僻荒苔蘚泉深冷骨毛登臨欲忘返城市厭煩勞登玊峰陳省華四望平川獨一峰前峰瀟灑是蓮宫松聲竹韻千年冷水色山光萬古同客到每憐樓閣異僧言因得鬼神功縣民遙喜行春至鼓腹間歌夕照中同前范周萬疊青鴛壓巨昆四垂空濶水天分夜光晴帶三江月春色隂藏百里雲桂子鶴驚空半落天香僧出定中聞不將此境評張孟三百年來屬老文夜發崑山范成大歲寒人墐户霜裏獨登舟弱櫓搖孤夢踈篷蓋百憂但吟今不樂寧計幾宜休慚愧沙湖月年年照薄遊施元光在崑山病中遠寄長句次韻答之四海飄蓬客舍邊幾多雲水與風煙絶無膂力驅長轡空有孤忠誓大川參月忽垂征馬上斗牛應挂故山前親交情話知何許詩到天涯喜欲顛舟過崑山與顧仲瑛姚子章張叔厚于彥成郯九成聨句楊維楨二月二十日樓船下婁江破浪擊長艫楊驚颷簸高杠梅峰遙古色姚石樹鳴悲腔躡磴屐齒齒張登堂鼓逄逄地險立孤柱郯天嶽開八忩烏升海光浴于鳶鶱風力降畨賦夾閩估顧越謡雜吳嚨仙樵椎結萃姚胡佛凹眉厖婆律噴獅鼎楊琉璃照龍釭曽軒坐疊浪郯落筆飛流淙愛此韞玉石豈曰取大矼文脈貫琬琰顧密韻含􅑥缸驅羊欲成萬楊種璧得無雙多今文章伯張萃此禮義邦龍駒幸識陸姚鳳雛亦知龎翠笄掉文舌顧茜衲折㡢幢敏思抽連繭雄心鬬孤鏦句神躍冶劍才捷下水艭磬聲重寡和鼎力輕羣扛昆渠詩已就誰誚隴頭瀧楊登玉峰夏原吉崑阜遙看小一拳登臨渾欲接青天神鍾二陸人林秀勢壓三吳地位偏岩溜下通僧舍井林霏近雜市㕓煙幾時重著遊山屐來訪當年種玉仙同前沈以潛嵯峨千仞驀凌空滄海西來茂苑東勢轉江流三里外翠分嵐影半城中岩前有洞仙家近溪口無花釣艇通聞説幽人茅屋底捲簾相對咏無窮陪徐天全夏仲昭遊玉峰劉珏青峰高聳白雲頭今日來陪上相遊甫里晚煙縈茂苑洞庭春水接湖州山中未乏連城玉海上空聞萬斛舟勝會况逢全盛日蘭亭不減晉風流登玉峰吳寬崑岡玉石未俱焚木樹危藤帶白雲小洞煙霞藏木客下方簫鼓賽山君千家居屋黃茅蓋百里行人白露分更上雙峰最高處滄溟東去渺斜曛賦得玉峰春霽張適玉峰小朵芙蓉秀嵐氣晴分翠接人一鳥啼殘蘿徑曉萬花開遍石岩春洞雲已出從龍去海燕仍來與客親此日登臨文學彥酒酣離思欲沾巾秋日舟過崑山蘋末起輕颷楓林葉漸凋孤村煙樹鳥遠徑夕陽樵估客收村市舟人候夜潮偶因山水勝暫此繫蘭橈舟中望崑山王鏊雲外孤峰欲墮江船頭風浪共低昂草年舊事空回首山自間間水自忙玉山辭為顧仲瑛作陳基山堪嵁兮磅礴太古木蔥蔥兮雲英英而欲雨日朝出兮在戶光輝輝兮水流其下非君子兮夫誰與處采我蘭兮為佩搴我荷兮為蓋從子于山兮聊逍遙以卒歲郎官柏詩序金問蘇之崑山古之婁縣也地大物盛為今圻內望邑按郡志城本吳子壽夢所築山在城中而石多因似玉因以得名自昔靈區奧壤紺園琳宇環布其下傳厯滋久完葺弗紹則委頓於荒煙野草之間至若名人達士高墳大冢皆厯厯在望仁人孝子於其先塋封樹等威禮所得為者宜無所不用其極矣其或世澤告衰而殘碑賸枿見欺於狐兔而增過客倣徨者自非有忠厚之人居可為之地烏能興起哉正統丙辰廣陽羅延齡由兵馬副指揮來宰是邑既視篆即進父老詢民利病而興除之曽未浹期政和歲稔輿情大悅暇日復從吏民循山之麓顧瞻徘徊喟然嘆曰山為一邑之鎮民賴以安而凋敝若此非古人教護屬功之意乃率其民相與植柏於上鑿石通路而塞其旁路疆理既嚴樵蘇絶迹且方事之際隂雲蔽虧霡霂時至未幾而條枚四合蒼翠彌望邑人感之名其所植為郎官柏儒林君子即其題為詩以美之兵科給事中王用節等謁豫文以序其實詩不云乎維桑與梓必恭敬止靡瞻匪父靡依匪母蓋人之思慕其親而不見則寄情桑梓而不能已焉矧體魄之所安乎漢天子以之而來趙陀安君平以之而激密人之忿天理民彛有不容已者不待丁寧訓告而自然之應捷於桴鼓此郎官柏之名所由著也嘗憶徂徠新甫使無生植則亦魯邦之培塿耳而詩人咏之萬邦誦之千古之下傳之者豈徒然哉然則延齡之德與兹山兹柏同於不朽者寧不本於諸君子之言乎郎官柏張和君不見河陽花胡為蹴踏餘塵沙君不見栁江栁一夕霜風變枯朽何如羅侯種柏盈吾崑佳氣鬱鬱山長春草間翁仲仰深庇泉下髑髏懷至仁層隂扶踈覆荒土夜半精神作人語喬柯秀拂寒空雲黛色遙連翠微雨穹碑用表吳民情大刻遂著郎官名我歌狂歌頌侯德千載芳聲播南國馬鞍山在昆山縣西北廣袤三里高七十丈一名崑山實因華亭之昆山而名縣境連接湖海而孤峰特秀上有浮圖其陽有慧聚寺東偏有山神祠西有文筆峰相傳孝宗時有魁星現於此山巔有華藏寺南有桃源洞北有鳳凰石及春風亭夏太常昶建正統間知縣羅永年植柏千章名郎官柏登秦望山薛據南登秦望山目極大海空朝陽半蕩浴晃朗天水紅溪壑爭噴薄江湖遞相通而多漁商客不悟歲月窮振緡早迎潮弭棹候逺風豫本萍泛者乘流任西東茫茫天際帆栖泊何時同將尋會稽迹從此訪任公秦柱山在縣南三十里千墩浦南帶海上有烽火樓基吳時望海冦一名秦望山輿地志始皇嘗登因名綽墩高啓淳于曽解救齊城優孟還能念楚卿嗟爾只教天子笑不言憂在祿兒兵同前周南老詼諧多滑稽啓寵納慢侮笑取玉環歡拍按育胡舞天寶志欲滿侈心日益蠱宫車逺播遷魄喪漁陽鼓胡為王門優有此一抔土遂令村之氓猶能三反語綽墩在縣西十八里相傳唐黃幡綽葬此虞山孫應時長嘯虞山迥天開風氣清南窺五湖近北覽大江橫厯厯三吳地悠悠萬古情雄觀有如此聊復記平生遊虞山倪瓚陳蕃懸榻處徐孺過門時甘冽言遊井荒涼虞仲祠看雲聊㺯翰把酒更題詩此日交歡意依依去後思巫咸山王賔舊説巫咸已上天楚人歌裏亦千年相傳住處今何在一座青山縣郭邊同前王汝玉平生不識海虞山覽秀曽因圖畫間雲入空濛開倒影僧依蒼翠閉禪關湖田種熟秋千頃煙浦舟行路幾灣天上歸來暫停轡何當留我老年間登虞山絶頂有懷吳思菴周忱晴登孤嶂俯郊原指點東吳遠近村齊女墓荒枯樹老言遊祠古斷碑存一泓白水通湖口數點蒼山近海門此地舊傳多勝迹重來期與故人論遊虞山吳寬夜宿相川口清晨喚舟人舟人請所之指點虞山垠山如知我來笑迓野水濵藹藹春雨餘翠洗雲中身我本重兹山竦然正冠巾虞仲骨已朽高名宛如新悠悠松間路弔古在兹辰放舟轉山塘行行自知津春服亦既成庶以適此春同前沈周虞山我鄰壤欲往路非遙比來有好抱風日虛春朝兹藉佳友興理舟訪嶤岧漸喜蒼翠近豁眼嵐霏消上有古松杉落落旌幢標其下見行人往來雜僧樵我坐意亦馳豈倐雙屐超何異謝康樂巫湖眺且遨三月九日舟泊虞山下霽色澄虞山正與遊人偶一年無多月春三及秋九勿厭傾郭人隨俗悅親友春風若招邀處處閙花栁林華競妍新無復見惡醜間見叢緑中遠映紅裙婦休云惱山谷點綴亦可取摳趨識壯步屢頓驗皓首尚有散逸流列石自俎豆老夫目中盡未在逐逐走况當氣力衰孤坐還可酒拂水巖李傑六月西巖上南風拂石湍無雲何處雨灑面作輕寒同前沈周只有看山是勝緣青鞋布襪且輕便天收雨腳賖今日我趂花時遣老年絶壁雲扶將墮石豁崖風勒下奔泉此來不愧空歸去旋構新篇揀竹鐫陪邑尹沈侯遊拂水禪菴陳言百丈崖翻白雪堆下穿雲磴線縈回元陽六月宜飛雨靜夜三冬忽隱雷花墮真疑龍女散地靈直訝虎跑開八風不動摩尼淨藥我塵心入茗杯遊拂水巖黃省曽玉趾遵虞嶺松途轉泬寥覓泉回島曲攀嶂厯空遙雲壁懸垂漢風珠細拂霄王孫遊意遠命酒始相招其二振䇿凌丹壑珠琲散紫氛翠嵐浮峻日瑶髓下層雲榻借蒼崖卧琴將玉澗聞萬重湖樹回杯酒接氤氲舟中望虞山吳寬蜿蜒平野臥青山相見令人獨厚顔徒有詩篇曽記詠已無筋力再躋攀船頭旋轉憑黃帽水面低迷擬翠鬟舊日同遊者誰在欲從東老學清間與啓南遊虞山斜日下嶺西落日滿川上晚色催人還輕舟復搖漾佳山難為别持酒忽惆悵悠然忽回首舟尾疊青浪故人知我懷捉筆寫其狀懷土心未除移山力何壯便如王維詩終南亦可望流觀入中夜鼓枻起高唱舟中望虞山陳基一望虞山一悵然楚公曽此將樓船間關百戰捐軀地慷慨孤忠罵寇年填海欲銜精衛石驅狼願假祖龍鞭至今父老猶垂淚花落春城泣杜鵑遊虞山陳蒙野店杏花紅滿枝江南天氣早春時青山笑我來何晚白髮催人老不知雲竇雪消龍澗滿星壇樹偃鶻巢危明朝欲盡登臨興還赴雲間羽士期和計大尹虞山雅集楊循吉鼓棹琴川來駕言為近遊覽今化方洽豈俟即余謀張宴山之巔有酒滑如油雲開見百里南望古蘇州尚湖當其前揆時惟杪秋仁政召佳瑞岐禾鬱盈疇我醉屬公飲勿遺此遐陬言子本邑産古今契良投有月照松杉賔客起互酬擇勝重移席撫遠還登樓粲粲新篇咏迥若風馬牛良會誠亦難餘歡渺滄洲次韻計明府虞山雅集王鼎西蜀春星杜老堂此軒高檜與天長且尋蕭鼎讀書處莫問夫椒是戰場空谷葉聲流晚翠遠湖雲影鬭秋光品題消得羅池客名勝如今定不荒晚次虞山皇甫涍清溪杳無際望望遡行舟海縣雲歸市山城樹滿樓桂餘投紱興菊近授衣秋夜發東林磬泠然破客愁虞山溪行朝從虞阜出終日愛溪行鷗近看疑下雲遙望若迎嵐昏作海氣風滿助江聲莫恨三山隔東看煙樹平寺門望虞山王寵禪門吐雲氣前與虞山通大海蒸巨壑煙嵐日蘢蔥蓮花挺秀壁繡幛羅高空飛泉四時雨福地千年宫蛟蜃時出沒青天乍舒虹是節屬夏首灌木敷丰茸鶯啼紫岩曲鹿騖青林中薰風蕩蔦蘿沃雨鮮篁叢蹇豫抱沉瘵未得窺玲瓏還期覽日出夜半千崖紅虞山在常熟縣西北一里高一百六十丈周四十六里六十六步吳地記云孫權置虞農都尉於此故名按吳越春秋吳太子娶齊女病而死曰必葬我虞山之巔以望齊國越絶書云虞山巫咸所居則虞山吳越時已有之或云虞仲葬此得名一名海虞或云海嵎以東臨滄海又名烏目山雖無峰巒而蜿蜒起伏略如卧龍上有土垤磈礧或疑其古冢而不可考也山麓有老君殿舊名乾元宫宫側有池宋嘉定間鑿又有雪井南有仲雍墓有維摩菴太公石屋傍有石洞天將雨則雲氣出于中又西北為拂水岩崖石陡峻水奔注如虹凌風飛濺最為竒勝自南循山而西有致道觀又西有招真宫昭明太子讀書臺又西則嶽祠諸廟過吳王廟五六里有試劍石又有三沓石與石城石門諸峰錯峙下有石壇周八十步又西則寶嚴灣其北六里為破山遊破山僧皎然雙峰百戰後真界滿塵埃蔓草緣空壁悲風起古臺野花寒更發山月暝還來何事池中水東流獨不回破山山居八咏僧常達身間依祖寺志僻性多慵少室遺真旨層樓起暮鐘啜茶思好水對月數諸峰有問山中趣庭前是古松其二晚望立虛庭心心見祖情煙開分嶽色雨霽減泉聲遠樹猿長嘯層岩日乍明更堪論的旨林下笋初生其三一室塵埃外翛然秪麼長睡來開寢帳鐘動下禪牀溪浸山光冷秋凋木葉黃時題諸祖意欹石看斜陽其四西來真祖意秪在見聞中寒雁一聲過踈林幾葉空心間憐水石身老怯霜風為報參玄者山山月色同其五真性寂無機塵塵佛祖師日明庭砌暖霜苦藥苖衰汲水和煙酌栽松帶雪移好聽玄旨處猿嘯嶺南枝其六古寺憑闌危時聞舉妙機庭空月色淨夜迥磬聲移漏轉寒更急燈殘冷熖微太虛同萬象相會話玄徽其七老僧論的旨物物唱圓成踈栁春來翠幽窗日漸明禪心親石室蝶趐覆花隂好聽談玄處喬松鶴數聲其八祖祖惟心旨春融日漸長霜輕莎草緑風細藥苖香月滿真如淨花開覺樹芳谷前鶯囀處時聽話圓常烏目山五題序李堪余被物役塗汙故羈於人務網於吏位誠此身為官府有也今四十加六年始覺老非欲而已至病不期而自來生何常而本空死如歸而共寂由是登水木之虛室過煙霞之美夜聞經梵之清韻覽香花之實會則心悅以情動目爽以言發綺靡以文著氷釋以意達前月中隨漕挽牒治金榖事至常熟縣過烏目山其山左右前後僧居佛宇者有五因成題五皆率爾所作非高妙也大中祥符三年四月五日序龍院林下金仙坊苔門掩夕陽花飛殿塔頂池照雲霞光松老鶴仍下洞枯龍已翔中宵動清響一磬發虛堂餘題興福寺延福院淨居院永慶寺散見諸寺下破山八咏序劉極元豐元年蘇州常熟縣沙門思雅謁豫言曰海虞之勝鍾於破山然林泉之勢遊觀之繁無近與遠傳之盛矣自倪郴州捨宅為寺數百年間偉人竒士往往間出而人無知者願有以發明之余因而咏興福寺峨峨烏目山曽臨貴侯宅重房昔珠翠峻宇煥金碧泉激晨霞明松搖暮雲白宜爾山中人日輪自朝夕救虎閣三昧遊深恩結宇依蒼崖猛虎伏危閣拔箭非忘骸窮獸雖覆車危雀猶投懷况我見已忘而彼猶其儕宗教院妙義傳天台迷雲淨如掃初終雖五時修短自三草結隱非此峰獲藏亦真寶秋來月正圓獨照僧已老龍鬭澗白龍鬬危峰長澗落千尺靈泉應竒蹤高連暮雲碧寒影凌蒼崖清流動危石八月苖正枯猶能變甘澤常逵塔圓昔探雙林巵言發南華萬里歸一空誰云正非邪門影搖青松曽回貴侯車猶遺數層塔岌岌凌飛霞懷述塔妙理悟三伊巍巍抗竒節千尺岩下松蕭然獨凌雪珠影雖青黃月輪豈圓缺危石揚寒泉至今伴清絶空心潭碧潭發幽石瀟灑無纎塵寒光湛秋月有物難比倫羅鈎况無魚千尺徒垂綸到此心已空何用濯吾纓御賜鐘大聲扣洪鐘萬里為彤庭鳥間樓影重星淡雲氣清餘響繞岩壑林葉如回驚有客發深省塵耳非謾傾題龍山高九萬古澗滄浪外精藍縹眇間木枯曽閲世龍老解分山鳥道秋迷迹禪房晝掩關詩成遊子去流水自潺湲破山世傳龍鬭而山破故名上有興福寺又有鬬龍澗旁有硃砂洞放生池慶元志引山海經曰虞山之北岡壠相接即烏目山今頂山之南有烏目澗疑即此也自此東北九十步有空心潭取唐人常建詩潭影空人心之句又有舜井秋晚有懷頂山孫應時小山搖落故凄涼想像登臨野興長萬里晴空初雁入一年好景又橙黃極須痛飲償秋節生怕踈鐘報夕陽搔首故園歸未得籬邊寒菊為誰香秋晨至頂山散目秋郊趂早涼纎雲不點鏡天長松杉沐露連天碧粳稻眠風萬頃黃可惜文書妨勝日又還時節近重陽小山叢桂相撩得故故隨人作陳香中夏獨遊上方澗水有竒觀山蟬發清歌穹林翠光合深谷涼風多孤遊轉寂厯佇立久婆娑吾生正須此欲去意如何六月宿山禱晴鵲為初晴喜山如秋夜涼蟬聲起竽瑟雲影散牛羊神理應難昧民憂敢自康平生靜中趣未厭宿僧房詰旦喜晴一壑有幽意三年幾獨來龍鱗松薜荔翠羽石莓苔潤喜朝光動清知嵐氣開山前迎父老同作笑顔回宿頂山白龍祠梅詢千株碧樹插雲立一線紅泉透石飛童子怕寒爭閉戶夜深風雨有龍歸頂山上方程凖雨歇黃梅後秋生麥熟前偶因金馬客來訪玉龍泉竹葉一尊酒榴花五月天不妨扶拄杖行到白雲邊頂山周霞賔路轉清風徑泉通古石橋規模靈隱小景像上方遙書壁藤牽袂尋源草沒腰每懷登覽日東海暮生潮遊頂山龍潭李光招提清絶冠諸方溪繞山圍勝氣藏好在池塘存舊址依然花木隱禪房風生殿閣元無暑雨後松篁自有香日暮不教清興盡更登絶頂瞰微茫頂山在破山北十二里上有齊女峰相傳齊景公女葬此白龍池在焉西北有水簾洞兩水合流從石崖下注漫流若簾云福山徐有貞冒雨衝風泛綵舟共君載酒七峰遊海門東望天連水江市西來樹隱洲喜有錢劉新著作能無王謝舊風流登樓莫漫題詩句留與山僧作話頭同前李傑九日携壺上釡峰海天萬里淨秋容百年幾度尋清樂草載重來認舊蹤漠漠水雲開復合離離霜樹淡還濃當時老衲今何在窗下依然偃一松福山在縣治西北四十里高九十五丈周五里本名覆釡唐天寶六載改為金鳳後梁乾化三年又改今名山麓有東嶽行祠鳯山徐恪家林原在鳳山前緑野茫茫際讓川直道曽遭展禽黜知機不似季鷹先悠悠往事今何較落落虛懷我自便卧起兩峰如濯翠爐薰聊復對遺篇遊秀峰即河陽山楊維楨河陽山色畫圖開絶壑懸崖亦壯哉華表不聞仙鶴語醴泉曽引鳳凰來玉魚金碗埋黃土石獸豐碑長緑苔獨有桓桓丘隴在秀峰相對讀書臺同前陳繹曽平生丘壑愛躋攀此日披圖意任間江浙去題龍虎榜海虞行看鳳皇山鶴來華表千年後雲在丹崖萬壑間聞有青囊書卷在訪仙求術待秋還登鳳皇山次徐亞卿韻王鼎身世平生此石坳只應猿鶴是心交謾勞神物護丹鼎豈有文章奪鳳巢山鬼吹燈扄夜户石泉分茗趂齋庖苦吟未就渾忘寐雲外霜鍾莫浪敲河陽山一名鳯皇山在縣西北四十里高一百二十丈周七里山頂有井嘗出醴泉見永慶寺碑又有梁朝古檜及唐狀元陸器讀書臺登穿山劉珏屼立晴沙翠作堆是誰移得小蓬萊雙崖不逐秦鞭去一穴渾疑禹鑿開挾雨龍從雲裏出看花人自洞中回酒酣倚杖層巔上笑指滄溟水一杯馬進士抑之穿山送别用前韻五典三墳滿案堆君才不讓吕東萊池邊夜月蘭舟泊花裏春風綘帳開已見陳蕃待徐孺還期孔子鑄顔回多情最是穿山色飛入離筵送别杯穿山徐有貞一拳秋水骨兀立浦雲邊地僻通靈島門開似玉關碧分芳草色蒼入古苔斑為有劉安客題詩咏小山同前陸昶早朝天上黃金闕墮落腰間白玉環愁殺奚奴尋不見却來此地作穿山同前陳蒙石門空虛誰鑿闢薜荔挂影蒼苔積懸崖偃樹鶻栖巢古洞出雲龍啓蟄穿山在州東北五十里高一十七丈周二百五十步中有石洞前後通徹故名臨海記曰海虞穿山下有洞穴高十餘丈昔有海行者舉帆經其中今考其洞上猶通人往來而其下為地去海已遠舊屬常熟縣今分𨽻太倉州鎮洋山記在州治後壘土為之祝允明𢎞治十年蘇州府新建太倉州成遵詔命也堪輿肆其樞蒸黎矢其鏌而巡撫右副都御史朱公瑄建白之太守曹公鳳主維之同知萬公祥等申畫之所以造規考工凝績垂遠咸出於州守李公也初治廨既立百具皆作而相維沿州之東滄溟環輸搖汨滔溔萬古不休雄邦屹然傲睨踞壓而萬井衡夷無標極之形於是即廨宇後築為崇巒肖像三山中隆夾亞堅壤豐積樂石竒疊材木蔚章鳥獸馴集岌乎摩蒼霄嶷乎跨黃祗風蟠氣回情愜勢到足以聨絡地軸支控鯨渤而又為亭者三居山之前者曰迎仙次曰來仙西偏曰遊仙為洞一居山之麓曰集仙既成州人歡聳征商歸矚夷倭附服艅舶安流伯若興寶龍魚帖居乃稽勳名山謂之鎮洋同知州事周君明令義官鄭餘慶請記夫兩儀育物而川嶽奠位王公設險而城隍作藩肇州封山其來久矣又况維洛食而周鼎定咸陽峙而漢闕依形相之方孰可違廢然而不藉賢宰疇匡聖圖故龍門砥石禹成舜功南交銅柱援標漢業厥今沙海漸暨揚波不聞所謂龜筮協從神鬼受職困民而利職競由人然非深不足以經遠非明勿庸以輔幽有如兹州俶構斯山罔興化機物情未云周審今則地理順謐水土平康物性充而形勢強隂陽和而陵犯解易曰后以財成天地之道輔相天地之冝以左右民臣也者承君之義以致之民者也則鎮洋之創我后知始羣公作成乾坤交冝人物攸賴豈不謂財成輔相者歟非天下至深至明其孰能與於此惟李公抱英荷傑直氣凛凛殆乎海其知而山其仁者也蚤由進士簡擢御史繡斧所指霜憲峻肅當道驅豺黜落仗馬廟堂揚明特起兹任然臥治東壖絃歌雞割非大賢之路明辰大行獨留巍聲共山無折則民之懷矣永以有託公名端字表正棗陽人董其役者隂陽典術瞿坤醫學典科杜璧也允明既纂瑑勒懿綴為銘詩詩曰繹繹新州嶟嶟崇丘拊寧大流厚土崔崔剛民差差坎絡坤維三壺委形日觀授明五嶽連衡陽侯效職波臣屏息其究安宅都臺建勳羣公秉鈞凝於州君六府維修人謀鬼謀以承天休乾清坤夷蒼生熙熙重譯秪一股肱其良庶事其康獻於天王又記桑悅孔子曰譬如為山又曰為山九仭傳曰丘陵學山然則山猶可為可學者歟太倉前橫婁江東接巨海元之至元十九年宣慰朱清張瑄於此通海漕兼市易海畨遂成華市延祐元年以崑山州治徙之於此後因海盜陸梁州復移崑山我朝吳元年立太倉衛洪武十二年分立鎮海並治一城荷戈與操耒者遊居歲久芒頓弗倫怯膏餧強𢎞治十年巡撫右都御史朱公瑄奏聞欲割崑山常熟嘉定三邑地之切近太倉者立為州以扶抑之上曰俞廟議僉曰驁悍欲斂跅弛欲繩纒紐欲劃攭裕展拓克勝厥任者毋慮屈一人以伸全州人咸以湖廣之棗陽李侯端素以學行名於時登黃甲官六察平生直道而行有忤權貴久淹下僚非斯人勿克料理是州其驥足又滯一方混同衆寡算利害不足為侯惜乃推侯為州守侯至任經營百方整齊州治凡門堂牢庫學校壇宇之屬煥然一新又念州中山寡密邇巨浸惟土足以勝水效東坡治徐造黃樓意遂於州後隙地因陵為高命典術瞿坤董工採土築為三峰下連坡坂點以竒石山成侯名之曰鎮洋蓋欲兹山運神畜靈利如五兵之在庫險如長城之臨鄙威如宿將之坐帷幄而凡浮泡微沫足以􅀈途扤屨與夫鯨波陸飛蕩析居民之禍永永其無有也侯心其厚矣哉方為山之初侯與豫相其向址告豫曰豫欲於其處為山山之上下植以錦卉并後凋難老之木絡以亭館公暇與州士夫觴咏其間論道古今斟酌民瘼不亦可乎豫應之曰侯廊廟之具浮沉州縣多厯年所公道不泯近司銓衡者舉侯為四川監司官名聞於上不久將為圖南之舉正王元之所謂未知明年又在何處者侯能一日樂於兹山歟侯笑而不答雖然已之與人相為盛衰草盛則衰榖已盛則衰人故為已千歲計者則不為人一日計計人於千歲者則不計已於一日理之必然者也侯自為吏持亷秉公信於老稚已不待言及治兹州興衰舉廢立綱陳紀恆如不及至於重繁纓惜餼羊辦一身以當是非毁譽之衝凡百建立懇懇若為曽玄計者正與為此山同果望身享其樂邪使凡為吏者皆能克其為已之心克之又克馴至於無己已無己斯人皆已如是則利與天下同樂害與天下同憂堯舜君民之道有外是哉若侯者亦可謂不負於吏者矣豫舊常熟人新徙名數於州知侯心事最詳因州判官浙江之蘭溪龔侯詔求豫言勒石以垂永久遂為紀其事如此嗚呼開州鼻祖侯功不刋州人後世亦為美談曰猶望高子可望是山贊陸晨巍乎高哉惟兹鎮洋三峰拔秀五嶽獻祥一簣之土一拳之石積之絫之成此茂績卓哉李侯出計孔竒夸娥巨靈天實相之鎮我海陬固我地軸壯我一州登我百榖路不拾遺海不揚波四境奠安所藉者多龍蟠虎伏鬼護神守巉巉岩岩蒼蒼茫茫有玉可韞有豹可藏紆紆徐徐盤盤曲曲路轉峰回深奧幽獨旁栽嘉樹雜植幽花恩流雨露秀發煙霞雲氣結構嵐光澒洞韓詩態狀諸或兼共侯惟公餘委蛇徜徉一躋其巔俯觀四方民有顛連舉在侯目照被窮隂侯心似燭思玄桑子文章大家為侯紀功上磨其崖小子昭甫目擊其盛歌頌攸冝蕪詞罔稱投之山靈侯德用昭地久天長山無動搖登鎮洋山沈周水滙風衝海渺茫新州東壓示雄強白滔萬里登臨近青並三山指顧長歲久魚龍扶地軸春深草樹發天香邦侯卜築功成後從此波濤不敢狂太宗文皇帝御製寶山文碑嘉定瀕海之墟當江流之會外即滄溟浩渺無際凡海舶往來最為衝要然無大山高嶼以為之表識遇晴晝風靜舟徐而入則安坐無虞其或晝夜煙雲晦冥長風巨浪帆檣迅疾倐忽千里舟師勿戒瞬息差失觸堅膠淺遄取顛躓朕恆慮之今年春乃命將士相地之冝築土山焉以為往來之望其趾東西各廣百丈南北如之高三十餘丈上建烽堠晝則舉煙夜則明火海洋空濶遙見千里於是咸樂其便不旬日而成周圍樹以嘉木間以花竹蔚然竒觀先是未築之前居民恆見其地有山影及是築成適在其處如民之所見者衆曰蓋有神明以相之故其兆先見皆稱之曰寶山因名其所稱而不易遂刻石以志之詩曰滄溟巨浸渺無垠混含天地相吐吞洪濤駕山㠍嶫奔巨靈贔屭相噓噴揮霍變化朝為昏駭神禠魄目黯眢蒼黃拊髀孰為援乃啓兹山當海門孤高靚秀猶昆崘千里示表鬱㶿燉永令帆濟無憂屯寶山之名萬古存勒石悠久同乾坤永樂五年四月初九日寶山晴雲高宗本馳驅萬卒一山成寶藏含輝雲自生隱約壺天浮瑞彩依微海市㺯新晴從龍目駭畨船客捧日歡騰水寨兵珍重吾皇灑宸翰千年草木被光榮寶山在嘉定縣東南八十里依仁鄉永樂十年三月平江伯陳瑄督海運築為表識上建烽火高三十餘丈周圍一十五里震澤賦有序朱右按禹貢震澤底定在揚州之地説者謂太湖也國語太湖韋昭注即五湖也書謂之震澤爾雅謂之具區周官職方楊州藪曰具區浸曰五湖又似與之不同吳越春秋又名笠澤吳地記云五湖者菱湖遊湖莫湖貢湖胥湖漢貨殖傳吳有五湖三江之利太史公自序亦云登姑蘇望五湖愚意震澤以其震蕩不定而名具區以其既定而草藪聚為義而五湖者又太湖東岸五灣瀦水之别溆今連屬巳春秋時釣笠澤漢傳吳志指為五湖皆即今之太湖也於是推本作震澤賦以極庶類之繁衍明禹德於不朽其辭曰客有鄒陽生號遠遊公子俶儻瑋瑰超竒拔偉衣白雲之翩翩峩巍冠之韡韡神恍恍以欲逸風飄飄而凝佇於是上會稽探禹穴訪遺蹤超洞壑軺車前驅輜重紛錯王子進之以笙鶴江令贈之以芍藥遂乃揚帆錢塘鼓枻中吳將欲窮覽山川壯遊江湖造松陵主人而歡然從豫主人曰子號厯覽亦嘗聞澤之大有三萬六千頃者乎生曰未也可得聞歟主人曰唯唯夏名震澤周曰具區下屬三江實為五湖右接天目宣歙出溪之源左通松婁中江入海之洳衆流之委羣利之儲苕溪出其南溧水經其西五灣瀦其東垂虹界其堤流甘泉之清液隱雪灘於北隈洞庭中起林屋天開渺彭蠡吞雲夢駕雷夏軼孟諸杳不知其幾千里之遠疇能記三萬頃之有餘其澤則汪洋浩瀚洶湧奫潾瀰漫涬溟渙渙沄沄流颷吹波結絡龍鱗日光玉潔澄澶氤氲清瀾凝漪錦花成文浪濤噴濆澎湃汯粼出雷騰虹蒸雨生雲吸呼隂陽吞吐乾坤如潮汐之不測或早暮而異觀飛揚蕩薄迅復汨淪千態萬狀蓋不可殫論其藪則碧沙漫衍黃石碔砆莎薜蒹葭白萍青蒲荇芹藴藻茭菰荻蘆蔓菁杜若江蘺蘼蕪芡實雞頭草長龍須芰荷翠沃蓮藕芬敷衆物居之何可勝圖其土埂則塗泥微露埤溼就乾葴菥藨蒿茝芷蘅蘭菖蒲馬荔荃蓀射干圬楊絮白水柳葉丹蘋蓼早緑榆楓暮殷朱橘火齊黃柑金九連枝並秀駢集乎其間爾乃周流梗概溥覽斕斑兩兩相峙蔚乎崇山其山則層巒崑崙疊嶂嶙峋岑嶔參差如陵如墳崔嵬崷崒陂陀糾紛上拔仭岡下臨湄濵控地軸以磅礴逐水曲而折旋馬迹屹立以嶷嶷翠峰峻拔以盤桓戞浮雲之流景俯蛟龍之深淵空谷谽谺以無底磴道蜿蜒以相連其中乃有奉真之祠供佛之堂琳宫道觀梵宇禪房雲煙縹眇金碧焜煌黃冠緇衣來往而尚羊談玄贊空學幻言哤或登座以演法或擊鮮而稱觴駕白魚之飛艎泝重洑之流光水産則黏蠔旋螺土蛤石花􅗫鱧鯽鯉鱖鱮鱨鯋縮項之鯿頳尾之魴細鱗之鱸紫甲之蝦稻蟹盈尺腯螯載車長蛟巨黿穹龜靈鼉周遊涵泳其樂無涯羽禽則晨鵠莊雞鶄鸛鳬鷖交兼鴇鶂鸂鷘鸕鷀羣鴻來賔陽鳥攸居駕鵝遠舉鷗鷺忘機王睢並鶩屬玉交飛振翮刷羽以遨以嬉來如風飄去似煙晞若乃絶岸之濵漸水之石或伏或倚或側或立或方如圭或圓如璧或矗如峰巒或平如几席或滑如脂肪或廉如劍戟或頳而赤或蒼而碧或皎如玉或黝如漆為中流之砥柱若逆河之碣石怪怪竒竒熒熒礫礫斯又天造之神功而出於兹水之蕩激也思昔夫差競伯圖勳鏖戰於此勝負未分旌旗蔽空舴艋如雲始魚鱉以為樂終麋鹿以成羣乃若歸釣之徒著書之士去國鴟夷泛舟西子亦復渺渺滄波茫茫白水主人之辭未終鄒陽生肅乎改容喟然而嘆曰甚矣世道愈下而人心之不古也吾子好學頗識典策不述職方之經邦而盛稱兹澤之庶殖不思禹績之胼胝而徒嘆英賢於戰國皆非所以極遊覽之望而察五行之至德也遐思往古擊節太息請即主人所聞而陳豫之所得嗚呼噫嘻浩蕩方割懷襄未平九域混而莫辨百潦壅而不行支祁崛強於淮甸天吳披猖於海溟時維兹水震蕩靡寧浡浡洶洶砉砉轟轟疑撼天而動地猶駕雷而鞭霆類不周觸而天柱折若巨鰲抃而洲島傾斯震澤之所以錫名也逮夫九載既南庶土交正波神受職川后奉令應龍畫地以效功庚辰持戟而制命導吳淞以安流别淮海而表境於時澤安其所水順其性鳴者自停動者自靜斯震澤之所以砥定也千載之下美哉禹功昏墊之害既遠灌輸之利無窮故漁人舟子之出入豪商薄宦之經從擊楫鼓浪引帆隨風莫不連檣接舳往來乎其中斯又具區所以出萬民惟正之供也方今海宇清明朝廷寧謐內宣民化外修貢職農安其耕女效其織工習其業商估其直士守遺經民食餘力風不揚波水不濫泆方鎮以寧土地墾闢開禹之疆廣禹之績是以九州之外咸仰聖育沾濡乎仁義涵泳乎道德浹洽恩波沐浴膏澤漸摩浸潤流衍洋溢天無亢燥之災人樂沃土之俗試言其故則辟雍湯湯聖化行矣靈沼洋洋聖澤汪矣御溝溶溶生意茫矣溥德川流達要荒矣下視一隅寧不隘杯水於坳堂矣主人於是竦乎樂聞憮然自失仰禹功之長存慨餘子其何益相與鼓枻乎滄浪曽不芥蒂於胸臆乃起為詩歌以頌德詩曰於赫禹功配天比隆生我遺民宅於土中原隰畇畇江漢為東萬世永賴惟禹功是崇於皇禹德立我民極手胼足胝救焚拯溺鑿井而飲耕田而食靡謝天功焉知帝力於昭太上示民以應眷祐我皇與民立命開禹疆土繼禹作聖其混合四大維民之正於穆聖皇惟上帝不常敬哉有土亹亹不敢康五嶽四瀆七澤九岡各修其職來享來王來享來王受天之祐于萬斯年眷我有土有土有民有子有孫有引勿替以頌斯文太湖賦王鵬吳之有太湖倣佛乎三萬六千頃實水德之所鍾乃江南之佳境跨三州而無限納大象而絶迥𨽻淮海之維揚賴禹疏而克靜匪歸虛之可方或雲夢之堪並觀其浩溔潢洋瀰漫渺茫沉沉隱隱訇磕砰磅動蕩地軸噴薄穹蒼尋源委而未涯混朝宗而有常鄙綱絡之羣流包涓滴之濫觴鼓洪濤之激逸沃玉蟾之盛光扇大塊之怒氣蕩陽烏於扶桑灔灔乎不可以際飄飄乎莫之能傍滃焉如霧勃焉如煙汯澄淡沱泓漭綿延陽侯崛強而起立馮夷織翠而周旋象未凝之胚渾器已極之幅隕曠矣哉習坎之道不可以計往而𢎞兮罔知津來而濶兮渺無備此則太湖之大略也若夫大魚崢嶸老蜃蟉蚌巨鱗濯錦而展綃長鬛拂雲而捎斗其靜也則風煙帖寂四望一碧其動也則驚濤觸天高浪沃日撇捩而林谷俱振吞噬而舟航若失其潏湟之際璇環之中玄隂連屋而燭夜珠光抹電而燒空神鰲怪鼉間見詫出聳兮可怖邈兮可蹤復有豪漁旅旅千檣萬櫓挾任公之竒能效龍伯之步武運若林之筌笭列排雲之網罟然後鬛掉尾振迅倏撇砉曝采赤腮晃淵起溺大者丈餘小者數尺或迎網而自獻或飲鈎而可得腥煙蔽昏數不可極其山則有東洞庭嶷然如立其上則有神人之府真仙之宅乃左神幽虛之天南接羅浮北通岱嶽王屋東連蛾眉西達故謂之洞庭地脈及有招提蘭若丹青烜赫其石則如煤如鐵谽谺􅌑瓏透眼穿穴龍虬蟠結虎豹嶻嵲文士卑以楚辭諂人貢之魏闕其松則連雲卧島捫參厯昴修百仞廣合抱材中棟梁勢凌穹昊上有白鶴飛翔下有蒼麕出沒其中民居如城如市鱗次櫛比駢甍連墁華榱接址大者則有陶朱猗頓之流海賈畨商之侣絫貨如阜鬻産成庾靡分耄倪惟利是務間有以經史為生涯付光隂於膏晷道宗程朱詩法李杜作為詞章雲騰川鶩亦有務光巢許之徒長沮桀溺之輩待玉帛如塵囂覩爵祿為泥滓樂考槃以自適耐枕流而成趣家必有園則千頭木奴飽霜爛目其他櫻桃枇杷楊梅盧橘梅杏桃李蒲萄椒栗絫絫如綴照曜風日翳遊目之觀瞻實卒歲之衣食更有餘峰七十有二燦焉如羣螺之墮玉盤者又豈勝悉舉其迹哉辭既客有舟而過者曰子之知太湖之樂者如此而可懼者則有未知也是猶知火可燃炙而不顧其燬裂之禍知水之可飲可滌而不顧其沉溺之患者也先生曰噫豫非不知也經不云乎飄風不終朝驟雨不終夕天地尚不能久於其常吾惟謹於涉而簡於出寧掩關高卧之固守何知揚帆騁興之取忒故當順其變之足慮難保乘其勝之偶得也歟客喜而歌曰奫奫太湖其波漣兮覃及四方王道平兮先生於是乃賡再歌曰太湖之深兮可以養我之心兮太湖之浩兮可以泰吾之道兮客乃胡盧舒襟揮袂再揖辭謝鼓枻而去吳都文粹續集卷二十二
