body:
  text: 吳都文粹續集卷十三明錢榖撰書院學道書院記陳宜中昔者夫子講道齊魯從遊多北方之士由句吳之墟登聖門者獨吳公子遊一人今常熟其故里也宋興崇文尚治吾夫子之祠遍天下雖關洛大儒乾淳諸公得聖學於千載之後凡其過化之鄉悉示表章存矜式吳為今輔郡公實東南道學之宗也吳故有祠紫陽先生嘗記之矣而郡則未講非前此司風者缺歟今樞密趙公順孫守吳卜地於府治文正坊之南甫經始即受代去黃侯鏞繼之鳩工庀材三閲月而堂成請於朝扁以學道書院取愛人易使之義而屬豫記之余按公以文學列四科嘉言善行可傳者不一獨二語乃親得於聖人而見於用復以印可於聖人者夫學為儒者事人所知也武城絃歌乃合君子小人而使聞斯道夫子莞爾之笑又直與説開與點意同是其為義豈與後之言學者異哉思昔盛際聖教流行滿天地之間無非道舉天下之人無非學康衢童子如咏舞雩中林武夫如見大賓漢廣遊女如奉懿教由後世言雖若未嘗學問而其所得所見訓詁章句豈能傳之哉流風未逺列國遺民塗歌巷咏發乎情而止乎先王之澤夫子拾其斷句殘篇而存之若非疏越遺音寥寥逸響而其吟咏性情於辭意之外亦非尋行數墨者所能知也道在天下終古常新何昔能為天下公而今幾為君子隱耶此余所以慨然正學絶續之際想絃歌之聲而不可得聞猶幸登斯堂者能有感於命名之義人以未喪斯文或因之而興起也嗟夫人知學則知道雖窗草池蓮亦足以起吾意何異親炙昔賢而師事之夫非聖人之所望歟其白首窮年而卒無得於此曾不若日用飲食耕鑿之中琢磨雖未加焉而璞固存也吳亦泰伯所居邦人至今質而無華伯之遺也記曰甘受和白受采吳人有其質矣使知以公之學而文以采進於道者其不彬彬矣乎豫故樂書之庶居是邦者人人有士君子之行云咸淳七年四月朔日朝奉郎新除尚書户部侍郎兼中書舍人同修國史實録院同修撰兼侍讀陳宜中記重建學道書院記胡纘宗吳有學道書院尚矣孔門言子吳人也封吳公宋咸淳間郡守黃公鏞奏立書院以祀公而教肓其子孫故址在郡城西南隅直錦帆涇之上元初奪於豪僧至元間山長祖宗震輩改創之元末復奪於僧國朝又百五十餘年久不克復迹益湮晦矣嘉靖初纘宗受命來守郡從按故籍得其槩竊嘆曰事有若緩而實急者其是謂乎雖然無所因而為之吾懼其勞且侈也既而行視其佛老之宫有曰景德寺者去故址數百武而近南臨通衢形勢宏敞欲即是改為之然不敢専也則以請於巡撫都御史廬陵陳公暨巡按御史髙安朱公提學御史光山盧公皆報可歲乙酉四月爰始興工撤其像設剗去其丹雘追琢之踰制者而增葺之其南為門稍北為儀門又北為堂中肖公像曰學孔堂堂之北為師生講授之所曰文學堂堂之東西增作齋舍以居諸生之學道者凡若干間又北為樓曰絃歌樓堲而垣之周四垣凡若干丈須其成以聞於朝歲修祀事而擇弟子之俊秀者講讀其中焉功既訖纘宗從博士弟子釋菜以告成事燕而歌泮宫之詩以落之僉曰書院之廢垂三百年及今而復不可無記豫惟周道衰先王之教廢賴孔子及其門弟子傳而守之惟吳公起南服北學於中國裒然以髙弟稱聖門盛矣顧其曰文學云者非盡於今之君子所能而已蓋聖道之精藴諸心見之言而達之政事凡其粲然者皆是也而公獨得之故其治民則以禮樂為教曰君子學道則愛人小人學道則易使也彼所謂識其大者非歟今去聖益逺雖政與代移俗隨化易而吳之文每先天下蓋非公則誰啓之君子揆禮意原人情循報本之義則今日之舉固不可緩哉惟人才之作養則學校存焉條貫品式亦既具備宜若無事乎此然玩常愒故則勸督作興之意當有出於法令之外者於是乎拔其尤而儲焉以待天下之用亦識治之所不廢歟若夫尚論景行以追前人之懿以求所謂學道之實則諸君子所有事者先正有言沒不俎豆其間非夫也諸君子於是亦有所感乎纘宗不敏願相與勗之以觀其成用為記而鑱諸石且以勸夫嗣政者俾勿壞學道書院學孔堂記天不可以象名孔子之道不可以科名日月星辰象也德行政事言語文學科也謂天盡於日月星辰是小天也謂孔子之道盡於德行政事言語文學是小孔子之道矣學孔子者不得其全而各得其性之近似乃名以科而不知孔子之道何可以科名哉雖然學孔子者非得其門吾未見其入也夫茍不欲知天則已茍欲知天在璇璣玉衡以觀日月星辰幾乎天矣茍不欲學孔子之道則已茍欲學孔子之道由博文約禮以達德行政事言語文學幾乎孔子矣言子子遊孔門髙弟也其稱於同列也以文學而其治武城也以禮樂禮樂固文學之見乎外者也其德也政也言也文也無不序焉之謂禮德也政也言也文也無不和焉之謂樂子遊學於孔門而獨得乎禮樂之傳亦微矣夫禮樂孔子之道之一也學禮樂以入道孔門之教之一也故學子遊所以學孔子也學至於子遊具孔子之一體矣而顧曰文學云者是所謂學焉而得其精華焉者也子遊吳人也吳之先啓於泰伯泰伯以讓風子遊以禮樂風吳之文實彬彬矣夫豈後世之所謂文哉亦豈後世之所謂學哉後子遊而興起者唐有若陸公贄宋有若范公仲淹贄曰上不負天子下不負所學仲淹曰先天下之憂而憂後天下之樂而樂文章勳業度越一世雖未敢上擬孔門其亦學子遊而有得者歟學子遊所以學孔子也故吳之文稱盛者聖曰泰伯賢曰子遊先正曰敬輿希文焉爾其以文擅當時名後世者不與焉吳故有學道書院創於宋復於元逮至我朝湮廢已久纘宗忝守兹邦乃因佛廬之隙而鼎建之外為書院內為堂旁為周廬於是擇郡中子弟之良者肄其中而以孔子之道相切劘焉諸士子學敬輿希文以至子遊學子遊以至孔子亦庶幾矣傳有之士希賢賢希聖聖希天其尚勗之哉其尚勗之哉學道書院周南老有美吳公祠宋敕書院名奕奕燕居宫傍臨錦帆涇地接浮屠鄰設講終侵陵聖學日以湮異端勢可乘舊貫不可復貪夫猶可憎永言紀故實後人或有徴學道書院為吳公言偃立初在府城東北隅宋咸淳五年知府趙順孫營度武狀元坊北普賢院之故址未成而去黃鏞繼之奏以學道為額選言氏先賢後及民間俊秀教之有先聖燕居殿師友淵源堂並四齋撥官田以贍士又别有育材莊専充孔顔言氏子孫費六年落成七年常琳建先賢祠於西元初僧楊總統據為僧司田悉奪去至元二十九年山長祖宗震金德修共買徐貴子橋南髙氏園改創儒職劉德剛訴復學田不果又廢國朝嘉靖一年知府胡纘宗乃以景德寺建書院前門扁曰東南鄒魯儀門曰學道書院堂曰學孔塑吳公子遊像於中夾以兩廊後又有樓曰絃歌今嘉靖三十年復改督糧參政府書院遷於雍熙寺西橋之右社學焉文學書院記黃溍昔州縣未有學先儒或擇勝地建精舍以講授為政者輒就而褒表之號曰書院宋初天下書院惟白鹿睢陽舊有田僅見於傳記皆上之人以是而厚其養未有以一鄉之善士専任其事者其後命州縣咸立學而學校之宫遍天下書院之創置日益增多我朝尊右儒術以風厲乎海內聞者莫不知勸有力而好事之家往往構廣厦以崇禮祠輟良田以豐廩食其為書院者遂與州縣學參立布滿於四方既奉濂洛乾淳二三大儒以為先賢而於前代名臣山林髙蹈之士有所弗遺凡尸而祝之者非仕其國則其鄉邑孔子之門從遊三千升堂七十獨子遊為吳人今常熟縣實其所居里南州之先賢孰有加於子遊乎故為縣時餘姚孫侯應時知縣事嘗為位於學宫祀之後百五十年為至順二年邑人曹善誠始買地立祠宇而闢講堂於其後列齋廬於其傍有司因以為請於中特設師弟子員而揭以新額曰文學書院曹公贍以田一千六百畝有竒恐旱乾水溢之不虞將割田以繼者疑為苗避征徭未敢自言大名王侯侃來守是州力勸相之於是曹君益之畀以田二千六百畝有竒事聞於郡未報而王侯以秩滿去曹君亦入掾太師府今守張侯術聞故牘而得其始末亟命故吏賈天瑞諭郡關白自是其田有苗稅而無力役春秋之事得不匱乏為士者亦有所蒙賴而優遊於誦絃俎豆以鄉貢進士之賢者為之山長未至攝書院事者儒學教授徐夢吉以為曹君有功於名教與兩侯之成始終皆不可以無述爰狀其實屬溍記之溍竊觀孫侯舉曠古之闕典意甚美而為事殊簡略特以先師朱子之記傳之至今曹君乃能不愛其所有而汲汲焉致力於孫侯之所不及固己不易以一鄉之善士而専任樂育人才之責亦古所無有也文學書院在常熟縣行春坊內元至順三年縣人曹善誠建有司上其事省部準設山長今廢文正書院記李祁吳郡祀范文正公舊矣自公貴顯時置義田義學以淑其族之人公歿而子孫世守之不廢然而未有専祠也咸淳甲戌郡守潛公説友始請建祠而割田以供祀事公之子孫亦世守之不廢然而未有書院也至正丙戌郡守吳公秉彛建議請以書院易祠僉憲趙公承禧按行吳中是其議遂得請於行省行省上之中書中書議以茲事有關世道且不設教官而以其子孫之居嫡者世主之於事便乃下從其請公八世孫文莫適主祀事専力殫慮改制增擴下既宏且逺矣祁時佐領江浙儒學以公事來謁祠下式睹其成衆謂不可以無紀而祁也幸際其會宜為文辭既不獲則取其家傳而徴之公之生當宋端拱己丑其沒也以皇祐壬辰至潛公為守時二百二十年天下郡縣公足之所至蒙其澤而聞其風者率為公立祠而於吳獨為缺典至吳公為守時又七十年他郡縣且有以祠為書院者矣而於吳尚仍舊規蓋吳為公父母之邦公之父祖墳墓在焉子孫居焉族之人比屋而羣處焉所以表異而褒崇之者宜有加於他郡而反若不及者是宜賢郡守之有請也是宜廟堂之上之從之也昔公以正大之學早冠羣賢以忠義之氣振厲天下其功之被當時而澤及後世者固不可遍舉獨舉其切而近之者則公於所在開設學校以教育多士至吳郡則以已地建學規制崇廣逮公之子恭獻公復割地以成公之志當是時天下郡縣未嘗皆置學也而學校之遍天下自公始若其察泰山孫氏於貧窶中使得以究其業延安定胡公入太學為學者師卒之泰山以經術大鳴于時安定之門人才輩出而河南程叔子尤遇賞拔公之造就人才已如此其後橫渠張子以盛氣自負公復折之以儒者名教且授之以中庸卒之關陜之教與伊洛相表裏蓋自六經晦蝕聖人之道不傳為治者不知所尊尚寥寥以至于公而後克興學校隆師儒誘掖奬勸以成就天下之士且以開萬世道統之傳則公之有功於名教夫豈少哉夫以公之有功名教如此則後世之宗而祀之為學校以廣之固宜與夫子之道相為無窮蓋夫子之道與天地為無窮而公之功則與夫子之道為無窮也此書院之所以立也雖然祠則改矣書院則既立矣凡范氏之子弟與夫四方之來者宜何如亦曰誦其詩讀其書為其人之為而已公之為夫人之所能為也以公為不可為而不為者自棄也為之而弗力者自畫也髙山仰止遺歌凜然必有寤寐我公於千百載之上者承務郎浙江等處儒學副提舉李祁撰嘉議大夫中書禮部尚書郡人干文傳書翰林侍讀學士中奉大夫知制誥同修國史台哈布哈篆額至正十年八月日立文正書院在禪興寺橋西咸淳中郡守潛説友立祠祀公撥公田三百餘畝以公大宗子孫主奉祠事歲時率僚屬致祭元至正六年總管吳秉彛奏請改祠為書院國朝列於祀典子孫世守之附范氏義莊申嚴規式記髙矩物本天人本祖閭閻之人有視其祖之子孫如路人相毁訾相並兼如仇敵者不知本爾矩少讀范文正遺事公居平語子弟曰吾吳中宗族甚衆於吾固有親疏然吾祖宗視之則均是子孫固無親疏也吾安得不惜其飢寒哉且自祖宗以來積德百餘年始發於吾得至大官若富貴而不恤宗族何顔以入家廟矩斂袵歎曰公之行百世之標的公之言薄俗之針砭也吾鄉居家遇有不如人意事即因公言以自愧責不敢有一毫恚心官中都獲與公之孫左司諫公之柔遊見其處已靜而明際物莊而和雖姿稟之懿亦家法所自來一日於公几間得文正公與其兄推官帖問以遣女乏資共甘苦通有無不啻已子使人嘆玩不去手司諫公因言先祖所創義田今幾二百年聚族數千百指雖甚窶者賴以無離散之患義莊故址曩因兵火為居民侵據之柔與吾兄良器極力經理為屋以棲義廩餘以處族入之無家者浸還吾祖之舊惟是義莊規式歲久易隳請之朝屬之鄉郡勒之堅珉俾世守而傳之無窮者吾猶不敢懈也幸備位諫垣當具本末奏陳乞申嚴行飭庶不負文正公所以責望子孫之意暨得旨遂丏豫文以記不容以不敏辭抑聞之士尚志志有大小功業利澤亦如之方文正未遇讀書長白山凍粟糜而食人不堪其憂而公貫通古今經濟之略已具於此時及率言官叩閽爭事自請鎮靈夏迄破戎人之膽功烈焜耀則其惠宗族者抑餘事也忠宣公致身台輔忠賢是紹想其捐所載麥歸亳時文正公已心知其有子矣嗚呼有文正則有監簿忠宣右丞侍郎數賢子厥後不熾昌競爽尚得為有天理邪諫垣所以立身承家固己無愧於乃祖願益以文正忠宣之𢎞猷大節自勉公之族人又當相與扶植以成諫垣之志則范氏之門益大義廩之儲益闢義居之族益貴達富盛相望將不止如今之所見云嘉定四年三月一日中奉大夫權尚書吏部侍郎兼權給事中兼侍講髙矩記朝議大夫權尚書禮部侍郎兼中書舍人兼太子左諭德兼同修國史實録院同修撰兼國子祭酒曾從龍書並題蓋朝散郎左司諫兼侍講范之柔立石義學記牟巘古者二十五家為閭閭左右各設孰鄉先生為之師褒衣博帶晨坐閭門教其民之出入田畝者有教有養誠為良法自井田廢閭左右古制蕩除漢以來或為講堂為精舍而養則未之聞也范文正公常建義宅置義田義莊以救其宗族又設義學以教教養咸備意最近古夷考厥初宋時天下有四書院應天府書院為首先是郡人戚同文聚徒講授方不逺千里而至文正公亦依之以學同文為人質直尚信義宗族貧乏則賙給之喪則賑恤之不積財不營居室或勉之輒曰人生以行義為貴安用是義之一字實與公意合暨公登第立朝為守為帥以至大用名位日盛祿賜日厚遂成義莊義學為其宗族者宅於斯學於斯所耕者義田所由者義路何適不宜嘉惠後人可謂篤至繼繼承承亦惟成規是守粵已亥兵戈俶擾未遑兹事至元丁丑主祭邦瑞提管士貴共議興學卜地于吳縣三讓里距祖塋二里所涓日庀工為屋三十楹祀文正公於其中會講之堂扁曰清白東齋曰知本西齋曰敬身外闢室為教諭偃息之處庖湢廩廥蔬茹之圃咸在外為周垣扁其大門曰義學清溪松竹之間昉聞絃誦聲是役也義莊掌計之勞為多提管又撙節助濟浮用增山田僅百畝備師資束修之禮子弟筆札之費一有以勸大德戊戌朝旨以義莊義學有補世教申飭攸司禁治煩擾常加優恤無復干吾籓者可肆志於學矣至大戊申提管馳書來霅俾為之記昔錢公輔嘗記義田巘也何敢與斯文竊聞文正公早歲就學應天時夜以繼旦冬月憊甚以水沃面食糜度日人不堪其憂其苦心勞形者如此博通六經尤長於易學者從之叩質樂與往復無微弗究其難疑答問者又如此用力何啻十倍今人耶咨爾來學書爾佩襟盍益追思先志俯焉孳孳母以寒暑而為作輟庶幾他日業精行成式克有立得名為儒以應選用以副二范君惓惓興學之意其年七月旦日前朝奉大夫牟巘撰集賢直學士朝列大夫前江浙等處儒學提舉趙孟俯書並篆額文正書院記書院在蘇城中吳縣西隅通衢之上祀宋大賢范公之祠也按范之先世自北徙南而居於吳公生於武寧官舍長仕中朝而薨于徐子孫奉其柩葬河南萬安山而祠於是者以公父母之邦且地基本范氏舊業公嘗經理作義莊以贍宗族者也當宋咸淳丙戌太守潛説友始請於朝立専祠祀公元末至正甲戌郡守吳秉彛又奏改為書院而以公之贈諡表其門閭舉其族之嫡嗣主奉祠事義莊田宅悉附天平山三太師所建墓際昌朝大新禮制遂以書院登諸祀典春秋祭享郡之官屬師生與其族之子姓咸集祠下行禮著為定規彰彰詳備可謂盛矣然自國初至今百有餘年而祠宇室堂日入於壞時雖修治而功費浩穰率未能完美如舊今主奉從規與其族人屢欲經營顧力弗逮所賴郡守劉侯為之規畫又值歲祲公私多故未克就緒適監察御史劉公持節按臨爰自下車洞燭幽隱發姦摘伏而下無遁情洗寃滌漏而犴無留獄且不翕翕希同矯矯務異數加延訪以革猜二故政不迷而廢墜畢舉於是郡守得以祠事白公公曰事神治民敦崇教化郡邑首務有或不勤非憲所當究乎夫事有經權時有可否貴在變通使無偏廢可也矧先賢祠宇風化所關宜亟行之勿怠吾亦為之處焉用是親誼中纎悉必視默運冥思酌量措置悉付長洲縣令劉輝典史張灝董之而責其成令廉慎老成謹於趨事曾未踰時凡祠之敞者一撤而新之言言赫赫加於舊觀邦之士庶來瞻來仰靡不驚嘆而莫究所由蓋是圖也材給於上而官不加費力役於下而民不告勞神享其成而族賴以庇一舉而衆美悉具非善於謀敏於事而公於心者未易臻此衆方落成會監察御史戴公巡厯至郡詣祠見之加稱賞曰盛事也不可無記於是令與主奉數過邱園以記為請豫惟文正公髙風大節彌兩間而冠百世者登諸國史載諸郡乘而雜出於譜傳紛播於品題者不可勝書至今庸人孺子一聞公名皆知敬仰故其平生所至存有生祠歿有廟祀者不約而同於以見秉彛好德之誠不以古今彼此而有間也況公父母之邦精神手澤所在則凡生於斯仕於斯者有不加之意乎是宜賢監司良守令之用情於是也第顧晚生末學淺見寡聞不能加毫末以光盛事為歉然嘗聞記者取記其事實信今傳後不失其真乃可故敢原其始末略其彌文而為文之直書云侍御公名魁字士元高唐人戴公名仁字以德句容人郡侯名瑀字汝器蠡吾人皆以進士厯顯融所至有聲不係諸此不書文正書院周南老濟族日有田聚族居有宅即宅嚴公祀承承綿世澤施于八葉孫勵志偉前迹建學請朝旨錫以文正額表辭著忠烈流慶方舄奕嗟爾牟利徒胡肯念往昔新建和靖書院記劉宰祕書丞永嘉曹君提舉常平茶鹽事於浙西權斂散之宜而水旱有儲究阜通之理而公私有裕持受輸之平而輸者恱申義役之勸而役者安既田里晏然臺無留事一日領客登虎邱致敬于先正和靖先生尹公焞祠下慨然有懷以為方紹興五六年間中原震蕩南土末安內之所急者帷幄決勝之謀外所急者奔走禦侮之力先生惸然一老漂泊蜀中猶鳬之飛於江湖何算而我髙宗一聞侍臣之舉求之惟恐不及猶慮其出之難既飭宣司具禮以勸行金幣絡繹於中途漕使肅迎於候館修門未入而列之經筵講席未溫而升至禁從禮貌之隆冠絶當代髙宗之意夫豈徒哉二老歸而周興四皓來而漢定天命人心之去留固有非人力之能與者異時經筵密勿志意交孚危微精一之旨既有以續堯舜禹湯文武六七聖人之傳緝熙光明之學又以垂我宋聖子神孫億萬斯年之式皇乎休哉初先生退自經筵教館於此猶榜曰三畏齋其持敬不倦如此後以其壻居會稽迎以就養殁葬其地嘉定中郡守陳君芾始因郡人黃士毅等請即三畏齋之舊繪像建祠君以為貌像之有嚴雖有慰典刑之仰而佩襟之益逺寧能無城闕之嗟擬以積纍之贏略倣先朝四書院之制立祠築室以舍學者買田收穀以食之而儲書其中庶履其地必思其人誦其書必求其旨事方權輿而知府事真定張嗣古提點刑獄前使者浚儀趙君立夫後使者南豐曾君穎秀從旁復從臾之且各捐資以助材不靳值工不靳庸指期而成不愆於素繼自今朋簮日盍户屨日滿有學聚問辨之益無孤陋寡聞之蔽斯文未喪於此有觀焉既成而屬豫以記豫方病吳人迷於佛而不知返以為曹君此舉不惟有以光昭我髙宗皇帝之聖德抑有以美教化移風俗不孤使者之職故不辭而為之書曹公名豳今官朝散大夫余為漫塘劉宰時端平乙未八月中浣日真定張嗣古書重建和靖書院記鄭元祐宋禮部侍郎和靖忠肅河南尹公紹興七年用崇政殿説書召遄奉外祠居吳虎邱先生沒七十有五年吳守陳君芾乃始繪像建祠而勉齋先生黃公幹為之記端平間提舉常平曹君豳請於朝易祠為書院乃始買田為經久計江南內附書院奪於僧有司以尊前賢勵後學不可泯泯遂已也於是度府治東南陬故宋檢法廳事及常平提幹廳事基大德十一年山長王達即檢法廳基建大成殿前無門徑旁無兩廡後雖克復故址而仍就簡陋士蓋病焉元統二年新安吳晞顔來為山長剔蠧弊撙浮濫積力稍久有志重建然猶懼或中阻於是請今大府時中書右丞耿公督餫吳下聞而善之公既被召復請于張侯其後入為吏部尚書今郡守道公童廉公剛明古稱第一晞顔請新書院公曰治不本於學豈稽古崇德之謂哉即選從事某董程役而籍書院之粒米在廩者糶之得中統鈔八千六百貫輦大成殿即新址而前為儀門門少西為先生祠又西為土祠又西臨廣衢為外門翼殿為兩廡殿後習堂堂東齋廬曰六有總為屋若干楹工告經始於六月甫冬蓋十月而書院落成初先生卒於越越亦有先生書院先是晞顔嘗為越之書院長亦既盡瘁完葺及今再調而入吳故晞顔每每太息曰先生學繼濂洛道被海宇所恃者斷不係於一祠宇之興墜然已何幸而一再獲長先生祠下哉既不佞無以紹隆斯道之統緒若區區祠宇而復不能殫盡心力則豈承學小子之謂哉斯其志有可尚者已若夫先生師友淵源出處大致皆具勉齋先生記茲不敢瀆而槩言其修建始末云遂昌鄭元祐記和靖書院周南老肅公讀書堂昔在劒池下宋季立書院祠祀來昭假教闡伊洛源于以集儒雅雲巖日廣寺僧占作蘭若疏請屢上陳口衆我力寡斯道或好還豫將冀來者尹和靖遷書院記袁帙和靖書院舊在虎邱西菴遺基之湮久矣胡公纘宗來守兹土考道之暇大懼荒沒為往哲羞抑無以法將來即故地祠而祀焉又以僻在郊外學者罕至乃徙祠於龍興寺榜其門曰和靖書院扁其堂曰三畏列楹周阿揭虔妥靈顧瞻辨裳聳焉起敬又以香火於緇衣懼歲久浸怠乃選縣膠弟子員絃誦其中修皇王之業趨孔孟之軌以無忘和靖先生之意公暇則遊焉橫經析疑躬督肄習設俎豆盞斚於堂上懸夏楚朴箠於堂下董以學官申以科條將使四方則之後世傳之曰蘇湖之教其再見乎公之志也初尹肅公師事伊川先生為程門髙弟遭宋不造闔室嬰兵刃之害沉淵逃劉豫之聘振鐸於兹卒以窮死所居齋亭又復圯壞使其不得志於當時者又將無聞於後世惜哉公是舉也蓋兼三善焉屛淫昏之鬼以攘異教崇往哲以修典刑振黌校以訓育羣胄後之人能率其故典時加敦勸俾無遺墜則觀旗之什協于閟宫矣諸生誦法孔子而不知相勸于古道者其何賴於兹院成命帙記其事而鑱之於石和靖書院祀宋尹肅公初公讀書虎邱西菴題齋曰三畏嘉定七年士人黃士毅請於知府陳芾繪象祀之端平二年胡淳請即其地為學司倉曹豳因奏立書院以和靖為額齋凡四曰三省務本朋來時習提舉馬述建君子堂嘉熙四年提舉陳振孫作藏書堂景定二年陳淳祖建曹豳祠堂咸淳初提舉李芾建燕居堂以奉先聖建時習齋持敬亭元初為雲巖寺僧所據延祐元年移置長洲縣治東烏鵲橋北即宋常平提舉司故址郡守道童重建殿廡門堂又廢至國朝嘉靖二年郡守胡纘宗以吳縣治西龍興寺改創焉堂廡門舍仍其舊而修飾之鶴山書院記虞集昔者儒先君子論道統之傳自伏羲神農黃帝堯舜禹湯文武周公至於孔子而後學者傳焉顔子沒其學不傳曾子以其傳授之聖孫子思而孔子之精微益以明著孟子得以擴而充之後千五百年以至於宋汝南周氏又深有取於曾子之學以成己而教人而張子厚氏又多得於孟子者也顔曽之學均出於夫子夫子豈有異哉因其資之所及而用力有不同焉者爾然則所謂道統者其可以妄議乎哉朱元晦氏始論定諸君子之言而集其成蓋天運也而一時小人用事惡其厲已倡邪説以為之禁士大夫身蹈其禍而學者甘自絶以茍全及其禁開則又皆竊取緒餘以僥仕進而已論世道者能無䀌然於兹乎方是時蜀之臨邛有魏華父氏起于白鶴山之下奮然有以倡其説於摧廢之餘拯其弊於口耳之末故其立朝惓惓焉以周程張朱四君易名為請尊其統而接其傳非直為之名也及既得列祀孔廟而贊書乃以屬諸魏氏士君子之公論固以與之矣及我聖朝奄有區夏至於延祐之歲文治益盛所以四君子並河南邵氏涑水司馬氏新安朱氏廣漢張氏東萊吕氏與我朝許文正公十儒者皆在從祀之列魏氏之曾孫曰起者隱居吳中讀詔書而有感焉曰此吾曽大父之志也何幸復親見諸聖明之朝哉今天下學校宜興凡儒先之所經厯往往列為學官而我先世鶴山書院者臨邛之灌莽莫之翦治其僑諸靖州者存亦無幾而曾大父實葬吳先廬在焉願規為講誦之舍奉祀先君子而推明其學雖然不敢専也泰定甲子之秋乃來京師將有請焉徘徊久之莫伸其説至順元年八月乙亥皇帝在奎章之閣思道無為博士柯九思得侍左右因及魏氏所傳之學與其孫起之志上嘉念焉命臣集題鶴山書院著記以賜之臣聞魏氏之為學即物以明義反身以求仁審夫小學文藝之細以推致乎典禮會通之大本諸平居屋漏之隱而充極於天地鬼神之著儼然立朝之大節不以夷險而少變而立言垂世又足以作新乎斯人蓋庶幾乎不悖不惑者矣若夫聖賢之書實由秦漢以來諸儒誦而傳之得至於今其師弟子之所授受以専門相尚雖卒莫得其要然而古人之遺制前哲之緒言或者存乎其間蓋有不可廢者自濂洛之説行朱氏祖述而發明之於是學知趨乎道德性命之本廓如也而從事於斯者誦習其成言惟日不足所謂博文多識之事若將略焉則亦有所未盡者矣況乎近世之弊好為鹵莽其求於巳者或未切於身心而致其知者曾弗及於詳博於是傳注之所存者其舛訛抵牾之相承既無以明辨其是非而名物度數之幸在者又不察其本原誠使有為於世何以徴聖人制作之意而為因革損益之器哉魏氏又有憂於此也故其致知之日加意於儀禮周官大小戴之記及取諸經注疏正義之文據事别類而録之謂之九經要義其志將以見夫道器之不離而有以正其臆説聚訟之惑世此正張氏以禮為教而程氏所謂徹上徹下之語者也而後人莫究其説以兼致其力焉昔之所謂鹵莽日以彌甚甘心自棄於孤陋寡聞之歸嗚呼魏氏之學其可不謙乎今起之言曰起幸甚身逢聖天子文治之盛追念先世深自奮勵起將於斯與明師良友教其族人子孫昆弟及鄉黨州閭之俊秀庶乎先君子之遺意而魏氏子孫克世奉其祀事精神血氣之感通亦於是乎在其有托於永久而不墜也不亦信乎臣之曾大父實與魏氏同學於蜀西故臣得粗知如此敢輒書以為記魏氏名了翁字華父臨邛人故宋慶元己未成進士歷官至資政殿大學士參知政事僉書樞密院事都督江淮軍馬贈太師封秦國公諡文靖而學者稱為鶴山先生云翰林學士虞集記題鶴山書院張雨寂寂茅堂晝掩門藤隂花氣野池渾情知建業青精飯不到臨邛白髮孫同前周南老學遡濂洛源道倡摧廢餘誦居五溪人窮經萃華腴姑蘇有賜地歸葬吳山隅即吳奉祠祭建學宏規模題額侈上榮著記懷永圖仰止白鶴山胡忍忘厥初鶴山書院在南宫坊內宋魏文靖公了翁之賜第也公蜀人仕至參知政事學者稱為鶴山先生端平三年理宗親書鶴山書院四字賜之元至順元年曽孫起即故居教學奉祀金鄉書院寓公堂記胡纘宗昔周之季孔子講業齊魯之郊中國之俊士知自振者大抵皆其羣弟子也當是時吳猶以蠻夷擯然言子子遊躬跋山川而北學於孔氏其宰武城所自與以為得人者曰淡臺滅明東遊而寓吳今吳有淡臺湖及其墓是也夫子遊孔門髙弟也其所與即孔氏之流也夫子嘗云以貌取人失之子羽淡臺氏殆親及孔門者乎夫吳僻在海隅其君不得與中國諸侯會盟或者陋焉而子遊北學而得其精華子羽東遊而樹其風聲其遺蹤故址千載而下使人有慨焉嚮往之志人知子遊之開源於吳而孰知子羽之風亦不可誣也哉夫士必有倡也夫學必有本也夫政必有綱也夫禮必有報也士倡則從學本則邃政綱則舉禮報則稱舍是而言治未見其為善治也舍是而言化未見其為善化也吳故有學道書院専祀子遊厯唐宋元以入國朝或存或廢而淡臺氏無聞焉纘宗忝守吳既復學道書院爰因佛廬之廢者復創金鄉書院金鄉固子羽之封也中為寓公堂奉子羽像而嚴事焉復得吳賢之寓吳者曰尹和靖焞魏鶴山了翁遂用祔之後為正大堂旁列書舍以郡之良子弟肄其中而以孔氏之道切劘焉庶仕者咸知所勉而學者知所勸孔氏之風其有興乎事既竣因文而記諸壁間俾後來者勿有斁金鄉書院在西市坊內國朝嘉靖二年郡守胡纘宗即永定寺改建殿堂門廡因舊而改創焉文正書院記鄭元祐至正五年龍集乙酉夏六月吉廉訪僉事趙公承僖分巡吳中至則首謁范文正公祠下拜瞻廟貌起敬起慕作而言曰文正公以德以功既無忝伊傅之為輔相以學以識則有功於洙泗道統之傳故其具文武全才出將則安邊却敵入相則尊主庇民其先憂後樂與先知覺覺後知覺者何以異豈非聖之任者乎其平生論諌直道正言剴切人主至上百官圖詆宰執為張禹觸犯盛怒雖坐摧抑曾弗少阻詎不猶木從繩則正而欲后之克聖者乎當時天下郡縣未嘗皆置學公至吳首以已地建學故學校遍天下者自公始識泰山孫明復於貧賤中授以春秋遂大明聖道於時延安定胡公入為太學師而河南二程子實遇奬拔其後橫渠張子以盛氣自負公折之而授以中庸卒之關陜之教與伊洛相表裏蓋自六經湮晦聖人之道不傳為治者貿貿焉罔知適從以至於公而後開學校隆師儒造就士類作成忠義之風以致道統之傳則夫公之學識於名教豈小補哉公之薨也所在廟食一以忠烈錫名顧兹中吳公父母之邦所宜大建祠廟萬世血食如之何而僅享之於私第況今國朝崇德報功在在有書院以祠先賢豈有豐功偉德正學卓識如文正公而書院莫之建則是缺典豈有大於此者乎公八世孫文英具辭於趙公以為先公之功德學識誠如公所言顧惟范宗仰食於義廩食指幾千餘使建書院則官除山長有山長則有廩稍之奉矣今藐焉義廩不自給使但建書院以祀公愼選族人之賢者充主奉祠足矣官除山長則乞免焉於是公從其言時總管古燕吳侯秉彛聞公之所建明即敘公所書請於行省上之中書議有關世道且不設教官而以居嫡者世主祠而行教於事便由是二公商出公帑羡餘命工益址而崇制既宏且固甫完屬元祐記之祐以蕞爾膚謭烏敢厠一喙於大賢之門雖然公之功德學識憲僉公知而言之則凡天下之士皆知道之也知其人而不思效之可乎子朱子謂人之立志必當以公自期待況遊於公之門乎況郡人乎若然庶於公可無負所謂尚友者此也元祐言不腆謹用復諸憲僉公俾書之石焉遂昌鄭元祐撰吳都文粹續集卷十三
