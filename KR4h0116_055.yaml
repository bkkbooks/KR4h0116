body:
  text: 呉都文粹續集巻五十五明錢榖撰詩文集序唐張司業詩集序張垍司業諱籍字文昌蘇州吳郡人也貞元十五年丞相渤海公卞及第歴官太祝秘書郎國子博士水部員外郎國子司業公為古風最善自李杜之後風雅道䘮繼其美者唯公一人故白太傅讀公集曰張公何為者業文三十春尤工樂府詞章代少其倫又姚秘監嘗讀公詩云妙絶江南曲淒涼怨女詩古風無手敵新語是人知其為當時文士推服也如此元和中公及元丞相白樂天孟東野歌詞天下宗匠謂之元和體律詩貞元以前作者間出大扺互相祖尚拘於常態迨公一變而後章句之妙冠於流品矣自唐末多故臶經離亂公之遺集十不存一予自丙午嵗迨至乙丑嵗相次緝綴僅得四百餘篇釐為五巻藏諸篋笥餘則更俟博訪以廣其遺闕云爾翰林學士中書舎人張垍編次唐贈兵部尚書宣公陸公贄翰苑集序權徳輿嘗讀賈誼書觀其經制人文鋪陳帝業術亦至矣待之宣室恨得後時遇亦深矣然竟不能達四聰而盡其善排羣議而試厥謀道之難行也亦巳久矣東陽絳灌何代無之嘻一薫一蕕善齊不能同其器方鑿圓枘良工無以措巧心所以治世少而亂日多大雅衰而正聲寢漢道未融既失之於賈傅吾唐不幸復擯棄於陸公公諱贄字敬輿吳郡蘇人漂陽令偘之子年十八登進士第應博學宏辭科授鄭縣尉非其好也省母歸夀春刺史張鎰有名於時一獲晤言大加賞識曁别鎰以泉貨數萬為贐曰願以此奉太夫人一日之膳公悉辭之領新搽一串而巳是嵗以書判㧞萃調渭南主簿御史府以監察捜之徳宗皇帝春宫時知名召對翰林即日為學士由祠部員外轉考功郎中朱泚之亂從幸奉天時車駕播遷詔書旁午公灑翰即成不復𧺫草初若不經思慮及成而奏無不曲盡事情中於機㑹倉卒填委同職者無不拱手歎伏不能復有所助嘗從容奏曰此時詔書陛下宜痛自引過以感人心昔禹湯以罪巳勃興楚昭以善言復國陛下誠能不恡改過以言謝天下俾臣草辭無諱庶㡬羣盜革心上從之故行在詔書始下雖武人悍卒無不揮涕激發議者以徳宗克平寇亂不惟神武之功爪牙宣力蓋亦資文徳腹心之助焉及還京師李抱真來朝奏曰陛下在山南時山東士卒聞書詔之辭無不感激思奮臣節時臣知賊不足平也公自行在帶本職拜諫議大夫中書舎人精敏小心未嘗有過艱難扈從行在輙隨啟沃謀猷特所親信有時燕語不以公卿指名但呼陸贄而巳初幸梁洋棧道危狹從官前後相失上夜次館召公不至泫然號於禁旅曰得陸贄者賞千金頃之公至太子親王皆賀初公既職内署母韋氏尚在呉中上遣中使迎至京師道路置驛文士榮之丁韋夫人憂去職持䘮於洛遣人䕶溧陽之柩附於河南上遣中使監䕶其事四方賻遺數百萬公一無所取素與蜀帥韋南康布衣友善韋令每月置遺公奏而受之服闋復内職權知兵部侍郎覲見之日天子為之興改容叙予優禮如此内外屬望旦夕俟其輔政為竇參忌疾故緩之真拜兵部侍郎知貢舉得人之盛公議稱之貞元八年拜中書侍郎平章事公以少年入侍内殿特䝉厚遇不可與世浮沉茍且自愛事有不可必諍之上察物太精躬臨庶政失於大體動與公違奸諛從而間之屢至不悦親友或規之公曰吾上不負天子下不負吾所學不䘏其他公精於吏事斟酌剖決不爽錙銖其經綸制度具在徳宗實録及竇參納劉士寧之賂為李巽所發得罪左遷横議者以公與參素不恊歸罷相之議於公戸部侍郎判度支裴延齡以奸回得幸害時蠧政物議莫敢指言公獨以身當之屢言不可翰林學士呉通𤣥忌公先達每切中傷隂結延齡互言公短宰相趙憬公之引㧞昇為同列以公排邪守正心復異之羣邪沮謀直道不勝十年公退為賔客罷政事明年夏旱芻糧不給軍校訴於上延齡奏曰此皆陸贄軰怨望鼔煽軍人也貶公忠州别駕上怒不可測賴陽城張萬福救之獲免蜀帥韋令抗表請以贄代巳嵗賂資糧公在南賔閉門却掃郡人稀識其面復避謗不著書唯考校醫方撰集驗方五十巻行於世江峽十稔永貞初與鄭餘慶陽城同徴還公已薨時年五十二公之秉筆内署也𣙜古揚今雄文藻思敷之為文誥申之為典謨俾􅘀狡向風懦夫增氣則有制誥集一十巻覽公之作則知公之為文也潤色之餘論思獻納軍國利害巨細則有奏章七巻覽公之奏則知公之為臣也其在相位也推賢與能舉直錯枉將斡璿衡而揭日月清氛沴而平泰階敷其道也與伊説爭衡考其文也與典謨接軫則有中書奏議七巻覽公之奏議則知公之事君也古人以士之遇也其要有四焉才位時命也仲尼有才而無位其道不行賈生有時而無命終於一慟惟公才不謂不長位不謂不達逢時而不盡其道非命歟裴氏之子焉能使公不遇哉説者又以房魏姚宋逢時遇主克致清平陸君亦獲幸時君而不能與房魏爭列盖道未至也應之曰道能自吾𢎞之在人蜚蝗竟天農稷不能善稼奔車覆轍孔孟亦廢規行若使四君與公易時而相則一否一臧未可知也而致君不及貞觀開元者盖時不幸也豈公不幸哉以為其道未至不亦誣乎公之文集有詩文賦集表狀為别集十五巻其闗於時政昭昭然與金石不朽者惟制誥奏議乎雖巳流行多謬編次今以類相從冠於編首兼畧書其官氏景行以為序引俾後之君子覽公制作效之為文為臣事君之道不其偉歟叢書序陸龜䝉叢書者叢脞之書也叢脞猶細碎也細而不遺大可知其所容矣自乾符六年春卧病於笠澤之濱敗屋數間盖蠧魚十餘篋伯男兒纔三尺許長䃣音毁齒猶未徧教以藥劑象梧子大小外研墨泚筆供紙扎而巳體中不堪羸耗時亦隠几强坐内抑鬱則外揚為聲音歌詩頌賦銘記傳序往往雜發不類不次混而載之稱為叢書自當援䕫之一物非敢露世家耳目故凡所諱中畧無避焉笠澤松江之名松陵集序皮日休詩有六義其一曰比比者定物之情狀也則必謂之才才之備者於聖為六藝在賢為聲詩噫春秋之後頌聲寖亾降及漢氏詩道若作然二雅之風委而不興矣在詩有三言四言五言六言七言八言九言之作三言者曰振振鷺鷺于飛是也五言者曰誰謂雀無角何以穿我屋是也六言者曰我姑酌彼金罍是也七言者曰交交黄鳥止於桑是也九言者曰洞酌彼行潦挹彼注兹是也盖古詩率以四言為本而漢氏方以五言七言為之也其句亦岀於毛詩五言者曰攜手上河梁是也七言者漢武曰日月星辰和四時是也爾後盛于建安建安以後江左君臣競以浮艶勝然詩之六義微矣逮及吾唐開元之世易其體為律焉始切儷偶拘於聲勢然詩云覯憫既多受侮不少其對也工矣堯典曰聲依永律和聲其為律也甚矣由漢及唐詩之道盡矣吾又不知千祀之後詩之道止於斯而巳邪後有變而作者予不得以知之夫才之備者猶天地之氣乎氣者止乎一也分而為四時其為春則煦枯發枿如育如䕶百蒔融冶酣人肌骨其為夏則赫曦朝升天地如窑草焦木渇若燎毛髮其為秋則涼颸髙瞥若露天骨景爽夕清神不蔽形其為冬則霜陣一㨗萬物皆瘁雲沮日慘若憚天責夫如是豈拘於一哉亦變之而巳人之有才者不變則巳茍變之豈異於是乎故才之用也廣之為滄溟細之為溝竇髙之為山嶽碎之為礫瓦美之為西子惡之為敦治壯之為武賁弱之為處女大則八荒之外不可窮小則一毫之末不可見茍其才如是復能用之則庖丁之牛慶之輪郢之斤不足善謂其神解也意古之士窮達必形乎歌詠茍欲見乎志非文不能宣也於是為其詞詞之作固不能獨善必須人以成之昔周公為詩以貽成王吉甫作頌以贈申伯詩之酬贈其來尚矣後每為詩必多以斯為事咸通七年㑹兵部令狐員外在淮南今中書舎人𢎞農守毗陵日休皆以詞獲幸悉䝉以所製命之和各盈編軸亦有名其首者十年大司諫清河公出牧於呉日休為部從事居一月有進士陸龜蒙字魯望者以其業見造凡數編其才之變真天地之氣也近代稱温飛卿李義山為之最以魯望參之未知其孰為之先後也太𤣥曰稽其門闢其户眼其鍵然後乃應况其否者乎予遂以詞誘之果復之不移刻由是風雨晦明蓬蒿蘙薈未嘗不以其應而為事茍其詞之來食則輟之而自飫寢則聞之而必驚凡一年為往體各九十三首今體各一百九十三首雜體各三十八首聨句問答各十有八篇其在外合之凡六百五十八首南陽廣文潤卿隴西侍御徳師或旅泊之際善其所為皆以詞致師詞之不多去之速也大司諫清河公有作或命之和亦著焉其餘則吳中名士又得三十首除詩外有序十九首總錄之得十通載詩六百八十五首漢書曰古者諸侯卿大夫交以鄰國以微言相感當揖讓之時必稱詩以喻其志蓋以别賢不肖也予之與生道義志氣窮達是非莫不見於是士君子或為之覽賢不肖可不别乎哉噫古之將有交綏而退者今生之於予豈是邪生既編其詞請於予曰爾有文當為吾序詩道兼日通以名之日休曰諾由是為之序松江呉之望也别名曰松陵請目之曰松陵集甫里陸先生文集序樊開唐賢陸龜蒙字魯望三呉人也幼而聰悟通六籍尤長於春秋嘗體江謝賦事名振江右與顔蕘皮日休羅隠吳融友性髙潔家貧親老屈與張博為湖蘇二郡佐嘗至饒州三月無所詣刺史率官屬就見之龜蒙不樂拂衣去居松江甫里多所論撰著呉興實録四十巻松陵集十巻笠澤叢書八十餘篇自謂江湖散人或號天隨子甫里先生唐末以左拾遺授之詔下日疾終贈右補闕本朝宋景文公重修唐書仍列於隠逸傳今蜀中惟松陵集盛行笠澤叢書未有是書家藏久矣愚謂貯之篋笥以私一人之觀覽不若鏤版而傳諸好事度斯文之不墜而魯望之名復振亦儒者之用心也時聖宋元符庚辰嵗仲秋月郫人樊開題後序朱衮進退取舎君子之大節惟循於道而不悖然後無媿於聖人之門非明輕重之理知好惡之正者未有不為物所勝也天隨子居衰亂之世仕不茍合家於松江躬勞苦甘淡泊而以讀書考古為事所養者厚故其文氣完而志直言辨而意深一歸於尊君愛民崇善沮惡兹非所謂循於道而不悖者邪世所傳叢書多舛謬衮既至其邑想其遺風因求善本校証刻之于版俾覽者非獨玩其辭而巳矣於其志節將取焉政和改元季夏四月毘陵朱衮記同前葉茵甫里先生吾鄉先賢也出處大節巳見本傳獨著述散漫未有善本今傳於世者笠澤叢書松陵集以篇計之僅四百八十一茵居其鄉誦其文且和其絶句百八十餘首遂於文集中裒集得一百七十一篇合叢書松陵集計六百五十二篇凡可助此書以流行者聚於巻末名曰附錄總為二十巻刋寘義莊以廣觀覽其間字畫疑者存之舛訛者正之文之有遺逸者行且增補之庶可酬先生泉下之望亦可見茵景慕先哲之意云寶祐五年閏月日葉茵謹識甫里先生文集序林希逸漢而下史錄諸名家集其殘缺不完失滅不可見如歐陽公所嘆者不知其幾百氏也方其存時或托以交遊授之門人付之子孫豈不欲其必傳傳之必遠要之皆不可必其間乃有出於破囊敗庋之中幾廢而幸存者子雲不必侯芭太白不必陽冰退之不必李漢子厚不必禹錫千載而後往往不期而進之是豈偶然哉甫里先生之没去今幾百載矣遺稿所存僅有松陵笠澤二書其詩似陳拾遺其文似元道州平居以文章自怡雖憂虞疾病無旬日生計未嘗暫輟塗竄則其平生所著豈應止爾嘗以棄珠遺璧為恨今呉江葉君茵乃作意掇拾而裒益之懇懇勤勤若褚先生之於史記張處度之於冲虚經網羅放失將必有續得而未巳者於先生何忠哉先生之亡研墨泚筆者雖穉紫溪翁鹿門子諸賢皆平昔所深交者豈無一人可任此責苟有焉亦不至散軼如此視葉君殊有媿矣然史稱盧攜李蔚素與善及當國召拜拾遺詔方下而先生卒以史考之盧李皆相於乾符元年五年皆罷而叢書自序乃曰乾符六年卧病笠澤是二人既罷而先生猶無恙也若曰六年之冬攜等再相則與李蔚無與矣然攜附田令孜以進卒為所擠死使先生猶在亦豈斯人可致哉史氏之云若以此為先生惜者誤矣寶祐六年冬十有一月朝請郎直寶謨閣林希逸叙重刋甫里先生文集序陸釴長洲甫里為唐陸魯望先生之隠處故自號甫里先生盖以地也去今六百餘祀而流風未冺舊跡猶存遺文俱墜崑山嚴景和氏居松江之滸密邇甫里素欽甫里之文乃訪而重刋之謂余不可以無序也予知陸氏為呉郡四姓之舊晉平原内史陸士衡之詩曰四姓實名家者為可徴焉至先生以髙節稱而世並貴其文當時殷文珪覽其舊集曰文價沸乎三呉而類唐賦者至於裴晉公白文公之作同編其所著有呉興實録四十巻松陵集十卷晁氏曰凡六百五十八首笠澤叢書四巻陳氏曰甲乙丙丁詩文雜編朱衮刋於呉江未有四賦用蜀本增入蜀本七巻樊開所序按開序止曰八十餘篇而不曰四巻與陳氏所計七巻之數不合叢書松陵集總六百五十二篇並附錄為二十巻閲晁氏所校松陵集六巻刋於寶祐中厯勝國以來嵗久板廢景和所為重刋者繼前賢之勝事誠義舉也而叢書四巻八十餘篇之數無從補刋矣先生自言平居以詩文自怡㸃竄塗抹厯年不能寫一本或為好事者取去鄱陽馬氏録書有小名録三巻周密齊東野語曰先生祠在白蓮寺中像設皆唐物咸淳中盛氏子醉仆其像於水滿腹皆平生詩文新稿知府倪普更為像腹稿不可復得矣序列先生所著書無小名錄集中亦不見序述或在所逸之中豈同與詩文為好事者取去後出而傳於今邪抑如晁氏所論無異聞而不書耶所謂腹藏新稿或叢書等成集之故先生既沒尚有未及編次者邪殷文珪所覽舊集或呉興實錄或叢書或松陵集盖不可知豈巳編者為舊集末集為新稿因置腹中故有新舊之分邪是知先生之制作不獨遺逸於當時復遭棄毁於後代為可惜也然其所以為貴者豈専在於文哉惟其立節之髙而巳夫文以昭其節也節以表其文也使徒文焉而節有不立則文者流於一勢又何足貴乎先生之生適丁季唐一不中進士舉知世之不可為也以髙士召不至史稱盧攜李蔚當國召拜左拾遺詔下而卒林希逸辯其不然且曰有之決不為盧李軰所致可謂得其心矣至于楊文公談苑所紀内養鴨事詩家多喜引用茵即故實辨其為誣又以談苑為别有所據考之文公亦曰出於相傳由其一時輕信耳豈别有所據耶以予觀於司空圖咸通中及第避亂隠中條山僖宗以中書舍人徴拜禮户二部侍郎皆不起又以疾辭朱梁禮部尚書之徴梁史書之殊為失真頼王元之據事考言明其制行之卓幸不汚曲筆其事殆與魯望類而節幸亦相似譬猶天麟不觸世網雪鶴自起雞羣也方之王維鄭䖍皆能文詞書畫皆入妙品皆汚偽官不能行鄭相如守節可免之言以至於失身後雖皆以詩畫得免而良史氏黼衮鈇鉞褒貶之公安可廢哉因牽聨以書用存素王勸懲之法皮襲美稱魯望之才不減温庭筠李商隠蘇長公稱表聖詩文髙雅有承平之遺風可謂確論矣表聖之集曰一鳴景和尚求之藏書之家偶刋並傳俾讀之者因其言而得其節行之詳知其不為徒文而明於出處之義流播千載為不朽事則於名教之益也豈小小哉成化丁未春正月之吉賜進士及第奉訓大夫右春坊右諭徳邑人陸釴書刻松陵集䟦都穆古松陵即今之吳江予同年濟寧劉君濟民來為邑令謂是集為其邑故物而人未之見授儒士盧雍校勘捐俸刋之予觀詩人多尚次韻至元白而益盛唐時萃而成編則有漢上題襟㫁金及是三集按皮氏自序謂一嵗之中詩凡六百五十八首其富如此則又題襟㫁金之所無者况其遊燕題咏類多呉中之作後之希賢懷古者將於是乎考固呉人所當寶也劉君為政不減古人其刻是集豈直私於一邑盖將公之天下者也𢎞治壬戍九月二日前進士呉都穆記范文正公集啟蘇軾慶厯三年軾始總角入鄉校士有自京師來者以魯人石守道所作慶厯聖德詩示鄉先生軾從旁竊觀則能誦習其詞問先生以所頌十一人者何人也先生曰童子何用知之軾曰此天人也邪則不敢知若亦人耳何為其不可先生竒軾言盡以告之且曰韓范富歐陽此四人者人傑也時雖未盡了則已私識之矣嘉祐二年始舉進士至京師則范公殁既葬而墓碑出讀之至流涕曰吾得其為人盖十有五年而不一見其面豈非命也歟是嵗登第始見知於歐陽公因公以識韓富皆以國士待軾曰恨子不識范文正公其後三年過許始識公之仲子今丞相堯夫又六年始見其叔彛叟京師又十一年遂與其季德孺同僚於徐皆一見如舊且以公之遺稿見屬為叙又十三年乃克為之嗚呼公之功德盖不待文而顯其文亦不待叙而傳然不敢辭者自以八嵗知愛敬公今四十七年矣彼三傑者皆得從之遊而公獨不識以為平生之恨若獲掛名其文字中以自托於門下士之末豈非疇昔之願也哉古之君子如伊尹太公管仲樂毅之流其王伯之畧皆定於畎畆之中非仕而後學者也淮隂侯見髙皇帝於漢中論劉項短長畫取三秦如指掌及佐帝定天下漢中之言無不酬者諸葛孔明卧草廬中與先主策曹操孫權規取劉璋因蜀之資以爭天下終身不易其言此豈口傳耳受嘗試為之而僥倖其或成也哉公在天聖中居太夫人喪已有憂天下致太平之意故為萬言書以遺宰相天下傳誦至用為將擢為執政考其平生所為無出此書者今其集二十巻為詩賦二百六十八為文一百六十五其於仁義禮樂忠信孝悌盖如饑渇之於飲食須臾忘而不可得如火之熱如水之溼盖其天性有不得不然者雖㺯翰戲語率然而作必歸於此故天下信其誠爭師尊之孔子曰有徳者必有言非有言也徳之發於口者也又曰我戰則克祭則受福非能戰也徳之見於事者也元祐四年四月二十一日龍圖閣學士朝奉郎親知杭州軍州事蘇軾叙鄱陽顔范二公序俞翊鄱陽在江左號古郡昔之為守者固多以賢稱者九人而傑出於九賢之中又止唐之顏魯公本朝之范文正公可謂難得也巳二公名氏在史官大節在天下至於文章散人間雖筆端游戲之餘而典雅純實可以經世而出治垂久而行逺盖其所養得天地之正氣故文亦如之然是邦實二公舊治獨無墨本而間見於他處誠闕典也翊攝乏來此首訪而得之鳩工鏤板以傳不朽斯人之眷眷二公雖不係於文集之有無然使學士大夫家有其書如潮人之於退之栁人之於子厚因書以致其師仰敬慕之意不猶召南有甘棠之思乎乾道丁亥五月既望邵武俞翊謹識鄱陽刋文正公集引綦煥鄱陽郡齋州學有文正范公集奏議嵗久板多漫滅殆不可讀判府太冲先生嘗謂此郡太守名徳如日月之照終古不冺者在唐則顔魯公本朝則范文正公文正之集士大夫過郡者莫不欲見其可不整治乎於是委屬僚以舊京本丹陽集參校且捐公帑刋補之又得詩文三十七篇為遺集附於後其間尚有舛誤更俟後之君子訪善本訂正焉淳熙丙午十二月日郡從事北海綦煥謹識文正公尺牘刋䟦張栻右文正范公帖得之文定胡公家以刋於桂林郡者栻聞君子言有教動有法其於文正公見之矣觀帖雖一時書帖之間亦足以扶世教而垂後法非盛徳者其能然乎敢敬志之以詔來世淳熙三年元日廣漢張栻書文正公與兄弟書䟦朱子右范文正公與其兄弟之書其言近而易知世之仕者得其説而謹守之亦足以檢身而及物矣然所謂仕未嘗營私者必若公之先天下之憂而憂後天下之樂而樂事上遇人一以自信不擇利害而取舍然後足以充其名而其所論親僚友以絶壅蔽之萌禁防以杜奸私之漸者引而伸之亦非獨効一官者所當知也某年新安朱熹書范忠宣公文集序樓鑰惟昔賢者皆後世之師表而學者之慕古人則自處有不同如汲黯之慕袁盎司馬長卿之慕藺相如若有不可解於心者本朝先正名徳相繼如泰山喬岳景星鳳凰事近而易考嘉言善行皆當取則而區區之愚少而讀元祐丞相忠宣范公言行錄反復終始正學大節偉識宏度贊嘆不已於諸鉅公間尤願執鞭欲追隨其萬一而不可得也如奏議國論等書如責人責巳助亷成徳之訓又若避好名之嫌則無為善之路等語皆當終身誦之每恨未見其家集也嘉定五年三月甲戍公之從𤣥孫中書舍人之柔見過謂鑰曰忠宣文集未行於世晚而謫居永州三年邦人至今懷仰比因沈史君圻赴郡以家藏本屬之既巳刋就而舊無序引徑以見委鑰謹謝之且曰托名不腐豈非晚進之幸豈非平日之願顧年衰學落何足以與此三辭不獲則取而伏讀越二日而盡得之盖公天資誠篤確志學問承文正公之親傳博之以泰山孫明復徂徠石守道盱江李泰伯三先生師友之益發為詞章根柢六經切於論事無一長語而一出於文正蘇文忠序文正公集有曰其於仁義禮樂忠信孝悌如饑渇之於飲食欲須臾忘而不可得又曰雖㺯翰戲語率然而作必歸於此故天下信其誠爭師尊之公真是似者哉而鑰之所尊敬者此又其餘事自朝出鎮廟謨相業具載史冊不待贅言惟公平日忠恕得吾道之功用深入吾夫子閫域非淺丈夫所能窺者温恭惟謹無異稠人遇有當為勇決過於賁育此其大過人者然亦尚可勉也心平而寛慮周而逺喜怒哀樂所發而必中克伐怨欲不止於不行包含太虚無所適莫姑以其見於外者一二言之鄧綰嘗奏罷公襄州及言者攻綰則極力爭之謂巳經先朝責降不應再有所貶公亦非有意於以徳報怨自謂上惜朝廷事體下以安人情反側蘇黄門誦揚畏憚章而公去相位他日哲宗面斥黄門從容為解黄門謂公為佛地位中人章子厚得罪父年九十議與一便郡公言當置往咎而念其親公本以議新法不合而去及温公將盡改熙豐之法公謂特當去其太甚又須徐徐經理差役二事尤不可暴操心類如此公既喪明而責知隨州尋竄永州葢子厚必欲寘之死地而公素安義命無一語怨之家人猶未平也風雨中覆舟於江以救僅免拭面而語家人曰此亦子厚所為耶嗚呼使之從夫子於陳蔡當亦有不容何病之言此非他人所及也蔡新州負罪至公力救之上忤簾中下違同列賢如劉元城亦以吳處厚為義存君親詆公不遺餘力公不為動卒貰其死一時不以為快及事之變呂汲公劉忠肅等雖終於貶所其得免於巳甚者始知公之不寘新州於死之力也汲公軰初竄嶺表時郊敕未頒先謂難從恩宥公齋戒九州防等年老衰病何以自存迹其所罪亦因持心未恕好惡任情以異巳為怨仇以疑似為訕謗誤國害公覆車可鑒此不惟次寤泰陵正欲感動子厚輩使之革心而從善也嗚呼自煕豐元祐以至元符紹聖之間世事屢變反覆非一徽皇踐祚改建中靖國流人悉歸四海望太平於朝莫欽聖憲肅皇后與徽皇待公而為政致遣中使逺至湖外賜好牽復迎勞不絶公時在瞽廢風痺中知上果用我亦欲感激自奮而病不可為矣嗚呼天乎倘延以三數年之壽使再得政則必能混一天下可以仰副建中靖國之意豈復有後日之禍哉公既去矣而蔡呂俱召呂又為蔡所排而任蔡愈専矣此所以撫巻長懐而繼之太息流涕也後之君子欲多識前言往行以蓄其徳者於此書可不熟復而力行之以代弦韋之佩乎文正四子長監簿以病早殁忠宣與二季俱顯衣冠蟬聫然自忠宣以來一百二十有四年而後中書舍人始紹科第世實監簿之𤣥孫范氏之興未艾也四月丁丑朔正奉大夫參知政事兼太子賔客四明樓鑰謹序刻政府奏議䟦范文英先文正公奏議十七巻韓魏公為序在昔板行於世雖不復存其政府奏議二帙巻中不載兹得舊本惜多漫滅將繕寫鋟梓而鄉士錢翼之見焉樂為之書於是命工刋置於家塾期世傳之元統二年甲戌九月八世孫文英謹識石湖居士集䟦范莘先人嘗為莘等言自十四五始為詩文晚而彌篤或寢疾醫以勞心見止亦以政自不能不爾謝之手編僅成帙而棄不肖之孤其尚忍言哉當從九京游而未敢者以先人之志未承也詩文凡百有三十巻求序於楊先生誠齋求校於龔編修芥隠而刋於家之壽櫟堂春秋霜露思其志意思其所樂僾然如見愾然如聞庶得藉口以告我先生云泰嘉二年十二月初三日莘謹書夷白齋稿序戴良夷白齋稿合若干篇臨海陳敬初先生所著予既訪之先生盡得其稿而編次之以為三十四巻而復序其篇目曰世道有升降風氣有盛衰而文運隨之故自周衰聖人之遺言既熄諸子雜陳而汨亂之漢興董生司馬遷揚雄劉向之徒出而斯文始近於古迨其後也曹劉沈謝之刻鏤王楊盧駱之纖艶又靡然於當時至唐之久而昌黎韓子以道徳仁義之言起而麾之然後斯文幾於漢奈何元氣僅還而剥䘮戕賊已浸滛於五代之陋至宋之劉楊猶務妃青儷白錯綺交繡以自衒後七十餘年廬陵歐陽氏又起而麾之而天下文章復侔於漢唐之盛未幾歐志弗克遂伸學者又習於當時之所謂經義者分裂牽綴氣日以卑而南渡之末卒至經史文義判為専門士風頽弊於科舉之業而我朝輿地之廣曠古所未有學士大夫乘其雄渾之氣以為文者固未易以一二數然自大厯以來擅名於海内惟蜀郡虞公豫章楊公及金華栁公黄公而已盖四公之在當時皆涵淳茹和以鳴太平之盛治其摛詞則擬之漢唐説理則本諸宋氏而學問則優柔於周之衰學者咸宗尚之並稱之曰虞楊栁黄而本朝之盛極矣繼是而後以文名家者猶不下數十如莆田陳公之俊邁則有得於虞公新安程公之古潔則有得於楊公而臨川危公之浩博則又兼得四公之指授者耶郁郁彬彬何可及哉近年以來獨危公秉筆居中朝自餘數公嘗想見其丰采習聞其謦欬邈然其不可接者久矣於是淪謝殆盡而得先生以紹其聲光也先生黄公之高第弟子嘗負其所有渉濤江游吳中久之又自吳踰淮泝河而北達於燕趙角輦轂之下久之於時雖未有所遇然自京師及四方之士不問識與不識見其文者莫不稱美之不置則其得之黄公者深矣後由京師還吳適值兵興藩輔不次用賢即以樞府都事起於家後又用之省幕用之公府跡愈顯而文愈工人之求皆隨而應葢燦乎其可觀矣夫自周衰以來至於今幾二千載其渉世非不逺也厯年非不久也能言之士非不夥且衆也斯文能自振㧞以進於古者惟漢唐及宋及吾朝此四世而巳而四世之中士之卓卓可稱者又嘗不過數人焉何世之不古而人之難得若是歟於此有人焉能以卓卓可稱者自期待世其可不為之貴重歟余於先生之文讀之累月曾莫有所去取於其間雖片言半簡咸附而錄之者所以明求一字畫之微皆可為斯世之貴重也先生名基字敬初夷白其自號也故以題其稿云九靈山人戴良叙䟦夷白齋拾遺朱存理尚寶李公前修郡乘時先得海虞士人家本一冊復有遺文三十五篇余悉錄之今得王氏本相校異同於海虞本錄出為拾遺一巻吳中尤氏藏遺墨數紙内有陳基傳一通謝徽詩一首並存拾遺後缶鳴集序胡翰人生而形具矣形具而聲發矣因其聲而名之則有言矣因其言而名之則有文矣故文者言之精也而詩又文之精者以其取聲之韻合言之文而為之也豈易言哉近之於身遠之於物矢之為天地變之為鬼神與凡古今治政民俗之不同史氏之不及具載者取而咏歌之載賡之不費辭説而極乎形容之妙比興之微若是者豈非風雅之遺意哉宜君子有以取之吳郡髙君季迪少有俊才始予得其詩於金華見之未嘗不愛及來京師同在史局又得其所謂缶鳴集者閲之累日不倦合古今體數百首其事雖微可以考得失備史氏之所懲勸其辭則予之所欲摹擬而莫之工者鏗鏘振發而曲折窅如也果何自而得之方吳郡未入版籍不幸為僭竊者據之擅其利者十年矣士於是時孰不茍升斗之祿以自活鬵釡間季迪日與之處曾不凂焉顧乃率其儔類倡和乎山之厓水之涘取世俗之所不好者而好之含毫伸牘吟聲吚吚及其得意又自以為天下之樂舉不足以易其樂焉此其所得為何如哉吾聞鐘聲鏗而立號石聲磬而立辨絲聲哀而立亷竹聲濫而立㑹鼓鼙之聲讙而立動若缶鳴之聲果何音也其西音乎南音乎抑太古之遺音乎不然則天下將治正始之音將作而此其兆乎何為一旦而及吾耳也得乎天者不求知於人求知於人者不得乎天季廸不求知於予而予知之者商聲之歌不必出乎已也而曾子歌之奚斯之頌不必費辭也而後世稱之則季廸之樂亦予樂也嗟夫憧憧往來朋從爾思孰能為余發其吟風之趣乎季廸由是求之其於道也亦幾矣洪武二年秋七月長山病叟胡翰序又序王禕高季廸詩十二巻凡為樂府五七言近體古九百三十七首余為叙而評之曰季廸之詩俊逸而清麗如秋空飛隼盤旋自折招之不肯下又如碧水芙蓉不假雕飾翛然塵外有君子之風焉以余之所言而余之所不言從可知已然則季廸之詩集不可不傳歟季廸中吳人予嘗論中吳之士唐有陸魯望宋有范至能夫魯望之詩寄興幽逺而其音響則駸駸已廹於晚唐至能之詩措辭温縟然其格調特宋焉耳在勝國時余適吳則陳子平詩其為言平寔而流麗揆之陸范吾不知其孰先孰後也吳之詩在元惟子平而知者益鮮吾於是復得季廸之詩焉今季廸年方壯志氣偉然其所自見殆不止於詩而其於詩則已能自成家與唐宋以來作者又不知孰先孰後也嗟乎詩之道微矣世之有志於斯者莫不鞠明䆒曛疲心思於簡牘間而後為言乃或有可傳其不可傳者固不可勝數是不可不謂之難也以詩之難能如此而季廸乃以此自成家追古之作者以為並豈非其才之過人也歟而傳之世必有因其詩而知其才者矣季廸名啟季廸字也頃承詔與予同修元史尋入内府教胄子授翰林國史編修云洪武庚戌三月翰林侍講制金華王褘序又序謝徽言之精者謂之文詩又文之最精者何以知其然耶二氣為之槖籥而鼓之以風霆然後天之聲出焉衆竅為之呼吸而盪之以江河然後地之聲出焉受形於兩間而靈於物者為人然氣至混然天成發宣鴻鬱然後人之聲出焉凡人有聲斯有言有言斯有文文至於詩包括品彚陶冶化工根乎性情之真達於音響之妙宫商間作金石並鳴由是而聲之用極矣世皆知以詩而觀詩或未知以文而觀詩因謂詩特文章之末技庸詎知聲成文謂之音而詩之中文巳具焉韓退之之言曰李杜文章在光燄萬丈長斯言也其善論詩者巳然非天機悟入識見超詣亦何足以語此哉渤海高君季廸疎爽俊邁警敏絶人無書不讀而尤邃於羣史與余交二十年余知季廸之能言也久然未嘗不以其詩而得之也始季廸之為詩不務同流俗直欲趨漢魏以還及唐諸家作者之林每一篇出見者傳誦名隠隠起諸公間及游四方不懈益勤刮磨潄滌日新月異紳衿諸老咸自以為不及季廸之於詩誠精矣然其意則自謂古風人之辭不如是也三百篇之傳豈皆出於一人之手哉著其一二皆可遺之後來尚奚以多為哉吾非欲成一家言亦性焉而嗜之之篤殆與人之躭悦世好者同一肆志用情而其樂盖未能以此而易彼也聞者以為然當其一室燕坐圖書左右離别拂拭塵几埃案間冥黙靜思神與趣融景與心會魚龍出沒巨海中殆難以測度或花間月下引觴獨酌酒酣氣豪放竒作楚調已而吟思俊發湧若源泉捷如風雨頃刻數百言落筆勿能休故季廸之詩緣情隨事因物賦形横縱百出開合變化而不拘拘於一體之長其體製雅醇則冠冕委蛇佩玊而長裾也其思致清逺則秋空素鶴迴翔欲下而輕雲霽月之連娟也至其文采縟麗如春花翹英蜀錦新濯其才氣逸俊如泰岳秋隼之孤鶱崑崙八駿追風躡電而馳也季廸之於詩可謂能盡心焉爾季廸之詩甚多有吹臺集缶鳴集鳯臺集凡為詩幾二千首皆當世之儒先君子序其端今年冬予訪之吳淞江上季廸出其詩示余盖取舊所集諸詩益加刪改彚粹為一總題曰缶鳴集自古樂府歌行而下至五七言諸體得詩三百餘篇皆其精選富矣哉亦可謂不易矣然是編也特以今年庚戌冬而止後有所作當别自為集季廸不以予不肖屬予序之庸敢叙諸編端以俟季廸家姑蘇嘗應召修元史教西學弟子員入翰林為編修擢户部侍郎賜歸鄉里云洪武三年十二月既望史官吳郡謝徽序髙太史大全集序劉昌故嘉議大夫户部侍郎前翰林國史院編修官授諸王經青丘先生高啟文集二十四巻舊一千若干篇今二千若干篇儒士徐庸字用理之所廣也用理既以類廣先生文集乃以示昌昌謹為之序曰夫將以所學明先王之道救當世之弊則必著於言焉庶幾見者之用聞者之有考也六經更聖人之手其言粹然一出於正要之所以存鑑戒者亦多聖人歿縱横捭闔之説興而大義微漢廣游學之路董生賈誼始各以其學自見著書數千萬言沈雄簡奥其明先王之道陳當世之務畧備矣唐韓愈起力變八代之衰習故其言雅醇而杜甫李白又各以其學自見明王道具時政謂之詩史宋歐陽修博學力行本論之言有益於治至朱元晦則根據六經之㫖攘斥百氏之非巋然為世儒宗其大要使人審王伯之畧致義利之辯而巳今諸家之言具存考之可知用之猶尚可行也盖三代而下漢唐宋之所以聳徳著業而繼焉以稱治者有賴於是焉先生生元丙子少稟神慧長讀六經諸家之言融而通之會而成之又取而力行之其發之於言則浩乎如大水之決防也鏘乎如洞庭之張樂也儵乎如幽壑之舞蛟也致之於用則如射者之於的凖乎其無疑也然值國歩之既促不見用隠於青邱登高望逺撫時懷古其言多激烈慷慨若將與世無所求者及我太祖高皇帝定鼎建業肆詔徵賢先生起與元史之修録善醜惡儒者之功庶幾彰施史成授諸王經進户部侍郎尊顯極至先生感之頌先王之道以匡濟世務言多雄偉竒古足以聳張徳業神益治化時甚賴之未久即辭去去後蹇連以死嗚呼殆天所以厄斯文也嘗竊論焉天道惡滿取之不可以全然詘其身必信其聲是以董賈貶逐而名用長甫白窮放而詩傳韓愈歐陽修朱元晦雖號通顯而未免罷斥然其言至於今誦習而師承者不衰正柳宗元所云生而不遇死則垂聲者也方先生死始三十有九使少優游而待之則學將止於是乎言將止於是乎行將止於是乎嗚呼天實為之謂之何哉用理師學於先生之言得之既深遂勤圖傳之亦使聞者考之而可知見者用之而可行以明其言之果有賴於世也嗚呼厚矣景泰元年庚午冬十二月望日賜進士出身吳人劉昌序眉菴詩集序江朝宗予布衣時雅聞楊孟載先生盛名及入翰林為史官奉勅纂修大明一統志攷先生先世於蜀嘉州人因大父仕江左而生吳中遂家焉又誦先生詩云我家岷山更西住正見岷山發源處於是乎益知先生雖生吳中實蜀人也先生生于元末仕於國初宏逺之器淳正之學初任滎陽令再謫鍾離間居江寧句容久之被薦陞江西省幕賓復使湖南廣右累官山西按察使誌載先生讀書日記數千言尤工於詩與高啟徐賁張羽為詩友故時有高楊張徐之稱云先生所著有眉菴集五七言古律五七言古體及歌行排律絶句詞曲總若干篇教授鄭綱編集巳板行矣字多訛謬先後失序而缺畧尤甚識者惜焉吳中張公企翺以名進士累官廣東僉憲素重先生之詩每遇公暇輙研究之補其缺畧次其先後履厯之字之謬訛者悉考正之釐為十二巻繡梓以廣其傳其用心亦厚矣哉間以示余俾為之序夫詩言志也三百篇之後變而為漢魏為六朝宋元以前惟唐為盛今先生之詩穠麗纖蔚藹然正大和平之音殆有唐人風味夫豈易得者哉僉憲公能俾先生之詩大顯於天下後世天下後世即其詩可以知其志知其志可以知其人然則先生不但有光於吳而且有光於蜀也余後生小子因僉憲公之命不敢以謬悠辭而僭序之其景仰之誠得不於是而少舒哉成化二十年夏六月既望賜進士奉直大夫廣東市舶提舉前翰林侍讀學士經筵官兼太子講讀江朝宗書眉菴集後志張習眉菴楊先生孟載吾蘇之吳邑人家天平山南赤山之下自幼敏悟絶人日記數千言弱冠工文詞議論古者亦數萬言謂之論鑒嘗絜以試儀曹值元季兵興勿果就職當時文章大家若參政饒介之周左丞伯温見皆竒之會稽楊亷夫以詩伯一時少所推可僑雲間往來吳下以所號鐵笛謂先生能歌之乎先生曰不惟為作鐵笛歌尤且效老鐵體翌日成以呈亷夫不覺自失曰吾意詩道巳蕪今復得子老鐵當退歩讓爾一頭地也遂偕之東遊呼從者曰吾在吳又得一鐵來矣若等就之學優於老鐵學也交與成忘年故當時有老楊小楊之稱云避兵圍城中日與才友高季廸王正仲朱來儀徐幼文輩倡和以自適迨我聖祖肇基之初即受薦任河南滎陽令尋謫鍾離間居秣陵江濱久之又用薦為江西省幕賓以累復落職處句曲山中又起奉使河南廣右既而擢山西按察副使陞按察使而卒此履厯聞諸故老驗諸詩所載特其大概緣當時無有筆其行實者故莫克致詳然先生平日之詩甚富皆率意為之畧不存稿嘗見先生自序一帙云因吾友方君不得余全集為恨故留此以示之爾則是先生盛年稿已散失今流傳人間者十無二三况皆抄本又無序志家異而人殊後至天順間郡人鄭教授嘗為刋行間多訛謬矧諸竒作失載識者病焉習在髫齡即授誦先生之詩徧假抄錄覬圖彌盈及長而仕偕以出入有年猶每隨訪隨錄卒莫致其全兹官嶺表念齒已邁爰命庠生顔恭文起會各本錄就請前翰林學士西蜀江君序諸首重圖鍥梓以傳噫文章在穹壤間譬之精金美玉不求乎人而人自即之無有久暫而異所好然好金玉之寶者世人之常情而文章雅談非有景賢好古之心莫克以致其所好之篤也習為鄉人晚生敬慕前哲之賢自幼抵老不忍冺冺是固庸陋無文不能表章乎幽潛則區區素願詎不由之少慰哉若夫先生學力之充才氣之雄以致詩之清豪自成一家言者覽是集當自得之兹不凟成化乙巳秋桂月胐同邑後學張習志靜居集後志張習吾吳之詩自唐皮陸倡和為一盛再盛于元季自王元俞鄭元祐張伯雨龔子敬陳子平宋子虚錢翼之陳敬初顧仲瑛輩各出所長以追匹乎古者繼而張仲簡杜彦正王正仲楊孟載高季廸宋仲温徐幼文陳維寅丁遜學王汝器釋道衍輩附和而起故極天下之盛數詩之能必指先屈於吳也維時張來儀先生自江右來與高楊徐相友善聚首之際未嘗不以詩為事積之既盛名為大家輿論比唐之四傑故老言不惟文才之似而其攸終亦不相逺眉菴盈川令終如一太史存心無疵而斃則同乎賓王北郭雖不溺海僅全要領而非首邱先生竄嶺表尋召還以對内政之不恊恐禍及已遽投龍江以没又與照鄰無異噫詩在天壤間患惟不工耳茍工而名家則凡具人心者罔不知好之故不欲其傳而人自無不傳詩之存人之存也是知先生之年雖不永於當世而自有以延於後世未可以彼而易此吳中鈔本所謂靜居集者什惟二三生自幼抵老求之冀得其全不克文梓垂畢又得吳興本較之雖曰加倍猶未克備亦並刋入尚期博識同志畀足成之尤為幸甚𢎞治辛亥秋八月十二日吳晚生張習謹志翠寒集序鄧光薦詩惡乎變三百篇後變乎攜手上河梁下迨建安齊梁數變至唐洎宋季之詩大變而絶何邪詩闗乎風化繫乎氣數士昔騖于時文視詩為長物雖有不工工不及唐矣非詩之變乃時之變也吁詩貴乎變不守一律千變萬化變之不窮惟子美能當之豈惟詩文亦然宋之詩病非膠攣淺易則窒泥狂怪蒐獵竒事穿穴異聞失豐厚而就儉約趨窘局而棄高逺不能平澹蕭散雍容和緩求如晚唐杜荀鶴方干輩斯可矣吳逸士宋子虚詩則不然子虚生景定間未弱冠時已廢科舉學故惟詩是學大篇如天孫織絹雲經霧緯自出機柚小律則日光虹彩渾然尺璧穠麗縝密而不艶含鬱靜婉而不怨其深於變之也余客江東會西溪王公稱其才學茂異弗就觀其人淵黙似不能言者其詩超邁而自勁後得所寄天馬歌諸作乃益嘆服盖本於學㴠養有力不汲汲於成名其行業皆然不獨詩然也余將泝九江子虚始出稿畀余序余所知子虚者淺矣子虚之不屑為者深嗚呼作詩難序詩尤難子虚之詩顯果在予序則唐之三百家無序者其詩皆能晦乎係其詩之工拙爾少陵云清詩句句盡堪傳奚在予序子虚之詩足以重予言也故序之子虚名无翠寒其齋扁云嵗在屠雍赤奮若清明日廬陵鄧光薦中父叙又序趙孟頫吳古為都會山水富甲東南長材秀民間出層見以濟時需獨唐皮日休陸魯望隠松陵為詩文相倡酬故吳之山川自西子館娃宮鹿遊胥臺殘花遺草烟霾日噎悒鬰千載間皆能發而化之為詩余先子昔處是邦嘗往來吳中皮陸之風尚可想見辛夘秋客燕子虚與予遊甚稔每話具區山水之勝出所為詩風流藴籍膾炙可喜皆不經人道語子虛年未艾有能聲詩且通史西溪王中丞以茂才舉之辭不就余觀子虚多子負雖時以巻舒豈若唐之皮陸真能隠於詩邪使子虚仕與詩並進大篇長什當有寫御屏者子虚姓宋舊以晞顔字行世居晉陵家值兵難遷吳冒朱姓云元貞乙未中秋吳興趙孟頫子昻又序又序馮子振天詘西北曰无曠古未有有姓而以无為之名者吳人宋子虚乃以无為之名斯名也子虚殆始自亡是公烏有先生乎盧仝異自異之對待相與莫逆於是不能無仝自仝異自異之對待吾欲取某姓而姑名之曰有為子虚之對待而三千載之有姓氏不聞單无之隻字為之名者徐無鬼公子無忌之屬生戰國者無之且必連綴某字者以為名未若宋子虚之无有獨無對之特出茍求其故毋巳則春秋之冉有乎或曰以冉有對宋无與盧仝對馮異固無以異而嵗月卜之吾東家聖師之闕里則去冉有也惜逺矣有無姑置吾讀子虚所為詩則求之吳中殆無詘第二指然則五茸三泖之地望不但無能名子虚者並與子虚之詩無之此邦不可無斯人可無其詩乎其烏夜啼公無渡河戰城南公莫舞至妾薄命古研歌詩諸家古錦神林鬼家外帶三分鳳麟洲山飛仙羽翮格力其五字律風調悽惋不勝江哀浦思之情悰如承恩金馬詔失意玉環詞落月今誰弔長庚夜自明雖使太白復生亦應為子虚擊節七言律楊栁黄昏曉西月梨花明白夜東風秋千庭院人初下春半園林酒正中五言如乙鳥歸來社辛夷開過春如身黄松上䑕頭白竹間禽七言如桃葉歌殘秣陵酒梨花夢斷景陽鐘五言如采藥逢毛女焚香對羽人客愁三月盡春夢五更初七言如縮地日愁龍作杖卧雲時約鳳吹笙五言若蜀魄花成血山魈樹隠身竹枝歌峽夜椰子醉蠻春如空悲祖龍死但覺鮑魚腥如織女支機穏山人作枕便異或稱羊化疑應訝虎眠不湏填碧海直欲補青天如勒銘留水寺應供宿江城夏減游方興秋添住岳情標致極似唐人諸詩而對偶之工興寄之永飄飄然自異於金陵含風鴨綠𥻘粼起㺯日鵝黄裊裊垂北風吹樹動西日照窓涼之類至其絶句雅淡清潔一字不可易豈但吳中無子之詩乎子虚有韻人之姿而天壤間知子虚最晚恨予老無能為矣姑取其詩集而序之好事者寫之於圖有味乎其言而時諷誦之彼韻春風㺯涼月之客主豈特可摽而出諸大門之外雖引却百驛數十日猶俗氣溷人也子虚嘗舉茂材於王西溪平生獨刻意於詩宦情雲薄以故不肯輕就籠絡弊弊焉追逐時好以取世資其胷中泊然無營殆眼中真無其匹者太湖三萬六千頃寧當無真識子虚者也異時白醉吟生七月能識之無二字是孩提時巳識宋子虚云矣醉吟晚守姑蘇惜子虚不當是時如子虚當其盛時持其詩納之白傳則翠寒之集若不嘘而奏之白玉之堂他日亦應俎豆洛社諸人之右寧當别有識子虚者其未能如醉吟翁方孩提識之無者勿以語之翠寒詩集之雅號云延祐庚申冬孟一日海一粟馮子振序翠寒集䟦錢良右子虚先余廿年雖知嗜吟其亦未始置齒牙間自其壯年遊江東首見知中丞王公侍御鄧公今承㫖趙公皆序其巻最後集賢馮公聞其詩欲行將有以資之而亦未嘗見其巻也公一日過子虚索稿子虚不容已遂出稿公疾視黙覽遇佳句輙首肯而聲誦之謂子虚曰子詩真刻意於唐者明當為子序之翌旦子虚袖二紙請焉公欣然援毫不煩脱稿一掃千餘言昨所聲誦亹亹出筆下至於題之前後句之次第畧不少差其一二所許可皆子虚平生得意句世所謂膾炙者子虚亟拜且喜坐客皆為之嘆服吁士之處世能不逐聲利而獨嗜片言隻字以陶寫其心腹不求人知有終其身而詩不傳者乎今子虚是也馮公序其詩時年巳踰耳順何一覽其巻而盡能黙記佳句於俄頃之間抑子虚之詩如正聲雅樂入耳而不忘邪序雖擷其英為公論余意翠寒集其堪擊節者恐不翅若是也因徴予書獲識巻末且以紀馮之才之强記云至治二年六月一日里人錢良右謹書吳都文粹續集巻五十五
