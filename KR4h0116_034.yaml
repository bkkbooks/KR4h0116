body:
  text: 吳都文粹續集巻三十四明錢榖撰寺院慧聚寺東亭張方平夜色秋光共泬寥水村籬落晩烟交拄笻回就下山路行㸔斜陽隠樹梢題西隠趙彦端西風數客倚䦨干野色蕭然得細㸔潦水倍知秋事早夕陽更覺晩山寒小留待月鐘無遽半醉題詩燭未殘憶得向来幽獨處黄精初熟客衣單翠㣲山居八首閒来石上卧長松百衲袈裟破又縫今日不愁明日飯生涯只在鉢盂中臨溪草草結茒堂靜坐安然一炷香不是息心除妄想都縁無事可思量老老山僧不下階雙眉恰似雪分開世人若問枯松樹我作沙彌親見栽幼入空門絶是非老来學道轉精㣲鉢中貧富千家飯身上寒暄一衲衣一池荷葉衣無盡數樹松花食有餘却被世人知住處更移茒舍作深居茒檐靜坐千山月竹戸閒棲一片雲莫送往来名利客堦前踏破緑苔紋爐中無火已多時早起惟將一衲披莫怪山僧常冷淡夜深無處拾松枝豈是栽松待茯苓且圖山色鎮長青他年行脚不歸去留與人間作畫屏訪翠㣲上人郟僑行客倦奔馳尋師到翠㣲相㸔無俗語一笑任天機曲沼淡寒玉横山鎖落暉情根枯未得愛此幾忘歸同前姚舜明僧臘俗年俱老大儒書佛教舊精勤姑蘇一帶披緇客四事無如彼上人同前葢嶼聖宋吟詩只九僧詩成往往比陽春翠㣲閣上今朝見格老詞清又一人訪凌峰閣賢上人郟僑步入凌峰閣尋師師未歸凭䦨寂無語惟見白雲飛慧聚寺和唐人韻二首高啓鳴鐘警迷方枯僧兀趺牀石姿生寒稜松子落古香殿鎖山雨氣樓迎海暾光遥望蒼蒼城愁是車馬塲其二烟斂城初出潮来野欲吞危樵縁磴角倦衲憇松根刹表藏林寺鐘聞隔海村畫龍飛去久空掩殿堂門慧聚寺周南老梁寺依山險叠構傳鬼役殿左隨龍化遺基尚神跡雲歸海氣昏石潤蘚花碧林壑生春隂鐘魚鳴午寂僧房見山圖佳勝皆目擊獨有雷火篆靈異人莫識夕秀軒李乘逍遥金地與人踈山靜嵐光碧有餘卜築當年飛鍚卓焚修今日徳星居靈株瑞草人難識明月清風室更虚坐乆半天瓊珮響泠泠此理屬真如華藏寺張景修白雲原未高香砌等林梢側足隨山徑低頭認鶴巢客清茶破睡僧瘦笋供庖詩句非吾祖何人繼孟郊和韻僧冲邈礎潤藏雲族檐虚壓樹梢有井龍應蟄無泥燕不巢經常逢夜講齋不過中庖登臨增野興四望盡寒郊又和朱榖行行身漸高長袖掠花梢一線道縈鳥千年居等巢地嚴金襯步天近玉分庖撫掌棲松鶴驚飛雪㸃郊新建華藏寺易恒兹山奠海堧高處宅金仙厯刼浮圖聳經時古寺遷煙霞深一徑樓閣近諸天翠積祗園樹蒼擎華岳蓮巨鼇當勝地孤鷲起平川玉氣隂晴見燈光晝夜傳空花皆是幻水月不離禪暮景飛蓬逝殘花落照懸獨尋方外友巳斷世間縁坐乆談𤣥理松花落麈前逰崑山華藏寺沈以潛崑崙千里鬱岧嶤一壑東吳玉未消石為向陽多出火井因通海暗生潮花明曉嶂深藏寺雨漲春溪欲㫁橋三島十洲應不逺海天高望興偏饒題馬鞍山寺集句葛次仲全吳臨巨浸皮日休青山天一隅李頎靜境林麓好陸龜䝉勝概凌方壺李白泓泓野泉潔曖曖烟谷虚攀雲造禪扃韋應物躋隂築幽居謝靈運道人刺猛虎李白復来薙榛蕪杜甫咄嗟檀施開杜甫以有此屋廬韓愈側叠萬古石李白功就豈斯須賈島磥砢成廣殿龜䝉鬼功不可圖日休有窮者孟郊韓愈過此亦躊躇孟郊賦詩留巖屏李白詞律響瓊琚錢起我訪岑寂境龜䝉幸與高士俱應物時升翠㣲上李白涼閣對紅蕖岸幘偃東齋果藥襍芬敷應物上方風景清華敞綽有餘居易高窗瞰逺郊應物萬壑明晴和齊巳賞愛未能去應物赭霞照桑榆宋孝武老僧道機熟閒持貝葉書栁宗元秉心識本源杜甫高談出有無茗酌待幽客李白頓令煩抱舒應物儒道雖異門浩然意合不為殊李白抖擻垢穢衣居易惟有摩尼珠杜甫餘生願依止賈島投䇿謝歸途錢起華藏講寺原在馬鞍山頂舊名般若宋宣和間信法師者易今名本在山之北麓國朝洪武十三年僧大雅移建于此夜步東寺之西范成大人家簾幙夜香飄燈火蕭疎照市橋滿院月明春意好小樓吹笛近元宵東禪廊夜二絶澹雲如水霧如塵殘雪和霜凍瓦鱗織女無言千古恨素娥有意十分春一聲黄鵠夜深歸棲雀驚鳴觸殿扉北斗半垂樓閣外風幡直欲上雲飛薦嚴資福寺在縣治東南唐天祐三年鎮撫使劉璠捨宅建匡禪師開山五代梁開平三年改崑福院宋大中祥符元年敕改惠嚴院尋賜今額寺有普照堂高宗書扁又有法堂曾􅌈記泰定二年燬後至元四年僧希賢重建國朝永樂九年僧道良重修逰報國寺沈周東崑不到兩年強六月来逰是趂忙城裏誰家無暑地水邉人說有僧房入門認竹天光晩借榻眠雲夜氣涼造次題詩纔一過不知三過幾時償報國講寺在縣西南常熟縣慧日寺修造記張珽梁僧慧嚮造大寺三在淮南曰慧照在崑山曰慧聚在常熟曰慧日環常熟之境他佛廬無慮數十所或背岡巒而深隐或面江湖而舒曠其得勝槩固宜獨慧日在縣西稍北九十步一殿屹立檜柏葱翠當闤闠中乃有山林瀟洒意鐘磬石鼓之音時徹縣齋為令者藉以少清胸次為不易得也院從昔名重甲諸刹栴檀林率贍二千指非但為展鉢計頗知相勉參請或在定累日無少懈怠以故主席者必當世龍象然後心恱而誠服嘉定丙子夏五比丘子幸以少師樞使大丞相魯公之命来住兹土始至之日旱蝗積逋舍宇就敝緇袍稍稍雲散幸與佛為謀奮空拳而一新之凡所得施利悉以助修設毫髪無私焉居無何甑中之塵銷而戸外之屨滿矣於是首興造事聞者響合富室至捐百金窶人子亦分錐刀至若法堂若庫若庖湢若衆寮若華嚴閣若水陸殿既巳次第補葺復製幡幢二十四首以嚴冥陽之儀剏經函六百餘枚以足大藏之數三門両廡舊為賈區卜肆喧啾冗雜亟聞諸公而麾斥之塗以丹雘輝如也繼此来者欵門而容改升堂而意消使人折不善之萌者固多謂佛法無益世教不厚誣哉珽来試邑既喜與蘭若鄰壁故因其求記而有考焉自梁天監初院為十方禪林幾千載于此矣中更鬱攸碑碣無有老宿或謂三錫勅額曰壽聖曰晏安曰慧日亦口相傳以熟爾乾道間僧宜意建佛殿淳熙間僧宗璉建法堂嘉泰間僧祖印慧光又建寢堂丈室皆未就去間關至今乃迄于成是必有數存乎其間斷非偶然之故也抑嘗誦須菩提經云菩提莊嚴佛土不尚也世尊何以故莊嚴佛土者即非莊嚴是名莊嚴夫靈山六年鵲頂蘆膝佛自處也金碧晃耀十二由旬人奉佛也二者並行初不相悖今慧日奉佛之道備矣若夫離相莊嚴則在比邱而自得之嘉定十二年解夏日宣教郎知平江府常熟縣主𬋩勸農公事兼兵馬監押龍泉張珽記慧日寺周霞賔盡說梁朝寺誰參嚮老禪莊嚴存象教汨沒悵塵緣七寳祗園樹雙金佛地蓮海鄉烟霧裏月落曙鐘傳慧日寺在常熟縣治西稍北梁天監間吳興僧慧嚮開山名夀聖又名晏安又名慧日禪院宋紹興間燬乾道九年僧宜意嘉定間僧子幸先後重修寳嚴院新建佛殿記陸綘近代儒家流以韓退之擠佛老賢與不賢皆欲隨而去之未熟思之甚矣夫受天命者莫大于君中國其間哲后辟王治亂興亡之主接迹而不可勝數至于治而興者則諸儒必曰非人事也天之厯數輔治世而興者也亂而亡者則諸儒亦曰非人事也天之厯數厭亂徳而亡者也夫如是則治亂興亡之運莫不推之于天韓退之唐之鉅儒也以堯舜禹湯文武周孔之道不行於當世而釋氏之教獨盛於中國故力排而擠之若原道篇佛骨表皆著辭深切疾痛時君奉之太過者也其所以然者誠欲抑之捄其寖盛未始不為釋氏福殆非納而黜之彼得益其惑遂有㑹昌之禍豈非道隆則汙物盛則衰之效歟天意若曰蠧中國害生民則使大中履㑹昌之迹如韓文公之比者佐而輔之固當㧞本塞源矣豈㑹昌廢之未數年而大中復之易如走丸疾如反掌得非天之未厭其教哉噫大道喪而有仁義仁義衰而尚權詐故堯舜禹湯文武周孔之道塞于時襍于覇金仙氏之說其有不興乎由是源于漢流于魏波于晉宋齊梁間與吾儒老子之教鼎峙于中國若夫本空寂破迷妄以出生入死之説為興善滅惡之筌蚩蚩之氓從而逺罪則如来真意深乎救世者也而時君奉之或多立寺宇以徼福或廣厦崇居以崇教上焉者接之下焉者化之如之何不為後世弊葢崇之者反於其道耳文中子曰齋戒修而梁祚亡非釋迦之罪此誠得之我國家四聖御宇燭知化源寺觀沿舊而存率禁其剏置僧道限年而入必試以行能故名山勝槩或有所旌異者非道存乎人孰能與于此哉姑蘇北走有邑曰常熟邑之西偏有佛宇曰寳嚴即梁天監中所建也倚山面湖繡若屏障嘗有希辨禪師者心悟大乘是焉棲處錢氏覇國時以名聞召歸餘杭普門寺目為慧照禪師及錢氏獻土隨召請見賜紫方袍號曰慧明大師維時厭居京國歸隠舊刹錢氏以師人境俱勝復賜金五百兩建七級浮圖一座淳化中太宗皇帝詔賜急就章逍遥咏秘藏詮太平聖惠方凡一百四十三巻奬高風旌善地也院舊名延福天禧中邑尹胡公順之飛章上請帝可其奏改賜今額焉院有佛殿者積其嵗月了無尺椽明道中武陵龔顯始發信心崇修妙果次有東京禪慧院僧清鑒浮杯至止苦行自修謀兹勝縁有若符合復有邑人諸葛頔李仁夀樊福僉恱所聞贊成其事且曰仁祠之興為我福地今紺宇不立粹容無覩則吾儕何所起信哉由是捐厚施貿良材庀徒僝工審曲面埶即其舊址隆以新創經始于景祐之丙子落成于慶厯之乙酉凡數年而能事畢矣觀其壯而不華嚴而不陋巍乎中者其宇一所以納高廣之座而宅乎毫相也翼其旁者其舍二所以容儀衛之位而列乎寳位也逺而望之若太㣲之凝帝宇聳在雲端迫而察之猶列仙之立漢宫来從方外其為功徳殊勝可思議哉武陵公帑無多藏屋無餘潤獨以興敝補廢皇皇於佛事人所難能矣若夫辨師興之前鑒公繼之後事有冥契豈誣也哉綘里人也因熟于兹山之逰目擊諸公之善以文見託得以直書時聖宋慶厯六年嵗在閹茂王正月一日將仕郎守真州揚子縣令陸絳記逰寳嚴院王伯廣平湖鏡淨中背貼青峰巒去郭二十里金碧輝波瀾是曰寳嚴境萬象鬱以盤壯哉窣堵波一瞰天地寛誰懐墮塵鞅幾欲招飛鸞我生眇何能山水情所安扁舟幾来斯不為開愁端意到自行樂尊酒那追歡何如結青蓮起適心外安塵迹身兩忘浩然天地間同前姚愈浮圖挿雲表列嶂環古刹平湖渺澄波萬態天光發我来陟層巔秀色助毫末扁舟返明月萬頃玻璃滑同前陸曦出屋蕭蕭竹數竿入門襟袖便生寒相期更待梅英發醉棹短篷来細㸔過寳嚴萬緑山居陳言曉暾劃林扉朝隮散巖翠藤輿過山莊藜杖訪蕭寺水竹湛清華檉椐宻隂翳紫筍擘錦綳紅櫻摘火齊濁酒長鬚沽細鱗纎手劙松軒漫敲碁蘿徑聊息騎安巢羨林鴉照影愛山鷩保我露電軀脫渠風波地且免𤣥髮催肯貽素絲涕衣食喜有餘身心幸無事放歌歸去来踈散任羣議寳嚴禪寺在縣西十六里梁天監中建初名延福禪院宋天禧間改今額錢氏時高僧希辨居此後隨國入朝賜號慧明大師歸隠故處寺有浮圖七層相傳泗洲僧伽塔第一此為第二仁宗朝賜銅鑄東岳聖帝像為伽藍按中呉紀聞吳越錢王之子祝髮於此太宗賜御書急就章逍遥咏聖惠方于寺中而陸綘記所云賜書乃希辨不云錢氏子豈辨即錢氏子耶景祐中重建國朝永樂初始改為寺近為邑人侵占為墓僅有畆餘介于其間僧營小屋以棲縣令楊子器撰記空心亭記段天祐海虞山循常熟州治西北十里而近曰破山直破山之麓有寺曰興福澗流絶山而下潴為深潭潭之上有空心亭山以厓斷石裂得破山之名亭以唐少府常建詩得空心之名海虞之勝萃于破山而破山之秀鍾于斯亭孱顔峙其前泠冽渟其下設置既宜而稱謂也當人知少府之詩之工而不知所以為工一登斯亭不言而喻矣亭之始莫知為誰嵗月滋久風雨弗支至正五年寺僧澂上人謀撒其故而更剏焉走邑士鄒君天㳺侯君議皆許諾二君人望也既相為先後聞者樂趨而朱君其倡者也落成宏敞雅潔十倍其舊先是崔后二君嘗與寺昌上人取少府詩析為韻授四方名士大夫各賦五言一詩至是悉刻梓掲之亭冠以少府詩亭所宜為者始大備以天祐佐是州而山若亭實所逰厯致書屬為記惟元氣結而為山其秀且竒者所不乏非有文章才藝之士發之未必顯于世破山之以秀傑稱宜矣必少府詩出而後人知之又必空心之亭立而後人人信之地有待夫人而事有待夫時如此檐甍翬飛棟宇雲涌晴隂雨雪光景變幻㳺者脫塵鞅縱清躅䕃林樾之薈蔚睇谷巖之硱磳寓聴於琴筑而致迹於氷雪平昔寵榮勢利之膠乎中者蕩然火燼烟滅其靈臺虚明直與潭水相為洞照名亭空心儔曰不宜天祐不敏方將命杖履載筆札從諸君子之後崔君名元方后君名克正朱君名士昭八年九月應奉翰林文字儒林郎同知制誥兼國史院編修官叚天祐記破山寺莫儔久聞勝地有蓮宫乘興来逰杖瘦笻庭老樛枝翠瓔珞池生並蒂玉芙蓉飛仙何意来題柱開澗當年想鬬龍歸騎回㸔樓閣處雲深隐隐度疎鐘同前李光招提清絶冠諸方溪繞山圍勝氣藏好在池塘存舊址依然花木隠禪房風生殿角元無暑雨後松篁自有香日暮不教清興盡更登絶頂瞰㣲茫同前陳與義不到龍門十載強斷崖依舊掛斜陽金銀佛地浮佳氣花木禪房接上方羸馬暫来還竟去流鶯多處最難忘老僧不作留人意㸔水㸔山白髮長破山寺雙頭白蓮陳掞湘南夜永風露清明月耿耿破益平嬋娟有人步羅韤瓊璫玉佩雙娉婷可憐玉骨埋藏久腸斷人間無復有豈知化作蘭若蓮宿契未忘猶並首想應快意洗塵縁不向謝池爭取妍玻璃盤中浮玉頰一心稽首西方仙請君以圖獻天子當與佳禾並周史毋令寂寞墮空山泣月悲雲清夜殘破山後院周霞賔一路入青山禪房樹木間竹泉和雨釀梅壑倚雲攀塔冷高僧骨嵐清俗士顔夕陽鐘磬逺相趂采樵還興福院晤秦文仲學士二首陳基蘭若臨江次層城北海壖地通重譯貢門泊孝亷船人事桑田後春光榖雨前未忘栖遯迹来此欲逃禪兵革艱虞際思君減帶圍折衝存俎豆贊畫忝樞機交義陳雷古功名管晏微江城花爛漫莫惜典春衣破山興福寺在虞山北嶺下齊始興五年邑人郴州刺史倪徳光捨宅為寺名曰大慈梁大同三年改興福寺舊有飛橋石泉修廊複閣氣象雄古多唐時屋堂三柱皆有雷篆倒書竒怪不可識庭有瓔珞樹左開花右結實池産白蓮千葉香色異常有巨鐘相傳為僖宗咸通九年所賜寺有通幽軒空心亭葢取唐常建詩語厯歳久其跡皆廢獨石梁外尊勝石幢猶存其上經刻乃宋平原陸展書清勁有法妙蹟也寺址修廣自官路外山門皆僧業兵火後僧徒散去為人佔而為墳比嵗豪右據者不巳地理家以為山破敗稱不利塟地僧舎故得僅存東靈寺莊田記陸徽之壽聖東靈寺天台教院教院者肇修于天台六年涉二紀而告備焉基自講師光瑞而成於今闍黎梵崇佛舎中嚴講堂後邃學徒聞而至者無慮百數嵗比不登邑民艱食崇師患無以贍學徒則每推施利之應巳有者悉歸之衆猶不能給也然而人皆知崇師之能導矣於是僧道賢率諸檀信等買田二百一十畆永為常住供崇師感檀越之厚施也則欲鑱石刻其名銜而屬為之記予謂吾儒言人情者聖王之田而舉修禮陳義講學本仁以為耕耨播植之喻至於佛說福田亦不過種諸善根而已合而言之其理一也夫方寸之地人皆有之果能極精進之力以致穮蓘芟欲惡之萌以絶萑葦則信善之心生焉可巳也充信善之心無施而不可則所以為利益者廣矣且衆生以愛故入生死由于愛境有逆有順而生喜怒造種種業所謂情田福田者于此荒蕪矣展轉六趣至千萬刼本所從来惟有一愛更無餘病佛大醫王對病為藥唯有一捨更無餘藥常以此藥而治此病如水救火應手當滅故當世導師必破人愛欲之萌而起人喜捨之意使人皆知情田福田之說而内自得焉則彼區區在外者何足靳邪况夫檀則能施越則能度生死是諸檀越充信善之心以捨施則將絶愛境而脱生死矣予故言情田福田之利益而歸之于導師之救病也壽聖東靈寺在縣治西北梁大同中建唐嗣聖二年為中興寺舊在吳縣界神龍元年賜今額移于此宋熙寧元年重修有子院曰延福端平中重建今城隍廟即其地也頂山龍堂記皮日休禮山林川谷邱陵能出雲為風雨見怪物皆曰神禮之宜矣常熟澤國也風雨怪物日作于民祀之則民被其利汝南周君為令之初夏且旱禱於頂山之潭上雨果應于是命工肖其象為宫以䕃之著之于典以潔其祀連嵗以穰春秋書雩勤民之祀也日休嘉其勤民故書重建龍湫亭王同祖海虞于吳鉅邑也陳州沈公以名進士出宰期月而政成三年而化大行威愛並敷允讓咸則優優瞿瞿惟直諒是崇惟恭慎是秉凡境内名山大川以暨羣祠厥有禆于民載在令典者公躬事禋望惟寅罔有弗秋惟虞山之西北曰頂山有龍神祠自天監始代著靈異春秋水旱雩畛禮有加焉務民義也祠旁上方院中涵方池曰龍湫水清瑩可鑑無旱澇盈涸實龍所窟也宋令趙崇惠秋旱即湫禱雨輙應乃構亭翼湫之上以介神貺後數更除葺嵗久隳圮不復存矣丙申春沈公以嵗事祼獻于祠睹遺址儼然咨嗟警惕曰龍神之靈能為民禦災捍患祀典所飾亭之建所以事神事神所以為民也今廢不治曷稱所以事神為民之意乃召見邑耆舊王君澄曰亭不建則慢神建則勞民慢神勞民令胥懼焉奈何爾邑之良父老也其圖之澄曰敢不式克欽承以事事乃獨任其役以故亭翼湫善崩矧湫既龍所窟翼之使山澤之氣鬱而不宣非宜也爰度湫之北得隙地營之為堅永計亭作于是嵗某月某日浹旬而成夏秋之交甘㴻應時逺邇欣暢僉謂公之誠感召之也王君於是詣同祖屬記其事曰庶以彰公勤民意也竊惟古人善政往往于令見之何也令之職最為親民其所施為舉措無據傳下逮輙響應焉是役也嚴祀事以重民社不為凟鬼興義舉以紓民力不為傷財沈公循良惠愛及民之政可槩見矣夫豈不足以感召神貺哉同祖居鄰邦亦與被河潤之澤樂聞是舉之成且重王君之好義也故為之記嘉靖十五年仲秋望前進士翰林國史編修文林郎崑山王同祖書留題頂山僧居范仲淹吾師仁智心隠然一山起中有白龍泉可洗人間耳平湖數百里愛茲山水音結茅三十年不道日月深笑我名未巳来問無端理却指嶺邉雲斯焉贈君子頂山周霞賔路轉青楓徑泉通古石橋規模靈隠小景象上方遥書壁藤牽袂尋源艸沒腰每懐登覽日東海暮生潮同前㓂凖雨歇黄梅後秋生麥熟前偶同金馬客来訪玉龍泉竹葉一尊酒榴花五月天不妨扶拄杖行到白雲邉頂山夀聖禪寺在頂山之麓梁大同三年石使君捨宅為之因名頂山院宋治平四年改頂山夀聖院後改今名送安公歸頂山瑞石菴王琪談空一紀餘重出訪巖居身是汾陽嗣囊惟郭璞書公侯倒屣後泉石結茒初山頂收榛栗經秋信莫疎中峰林逋中峰一徑分盤折上幽雲夕照全村見秋濤隔嶺聞長松含古翠衰藥尚㣲薰自愛蘇門嘯懐賢事不羣同前王伯廣躡徑登高亭天逺不敢局疎簾捲危檐飛泉漱寒玉江横縞帶明山隠螺髻緑啼鳥破長烟百里在舉目雲回猛虎嘯清風繞巖谷颼颼入青松古淡琴一曲倚闌更凝望斜陽上修竹欲去更遲遲勝槩那可足瑞石菴中峰寺俱在頂山福山大慈寺訪僧不遇黄清老欲扣禪關未有詩滿山空翠濕人衣竹間倚杖到西日試問白雲歸未歸鷲嶺雲深杖履幽竹風松影共悠悠何人分得僧家榻坐㸔南山一片秋大慈寺楊子器朝来騎馬入禪闗萬頃滄江指顧間芳艸青青春雨歇長松落落暮雲閒仙家誰道無蓬島塵海人言有福山分付老僧休出院居然北往又南還同前徐濙上方突兀擁層樓竹影扶疎曲徑幽花栁年年幾春事乾坤日日此江流半窓月色中宵夢千里鄉心兩地秋撫景只應開口笑牛山何必淚盈眸同諸君子逰大慈寺徐有貞冒雨衝風泛綵舟共君載酒七峰逰海門東望天連水江市西来樹隠洲喜有錢劉新製作能無王謝舊風流登樓莫謾題詩句留與山僧作話頭大慈教寺在西北四十里福山鎮梁太清元年僧普明建天監中又為法水院宋大中祥符元年改今額相傳海中有巨木出沒波中諸寺求不可得大慈禱而得之遂以為棟名泛海梁元燬國朝洪武初僧善持重建勝法寺孫應時古刹精廬隠茂林斷雲疎雨正秋隂黄花又見一年事枯木依然千嵗心病酒未能忺獨酌懐人無與共清吟僧窓夢覺鐘魚靜聴徹寒蛩語夜深同前李光舍南舍北竹千竿鏡淨無塵碧玉寒中有老人清似水晩来相對倚䦨干逰勝法寺兼簡深公陸綰道傍有古寺巋然聳梅林邇来衣褐徒包禍嵗月深埋伏狡兔穴嘯聚惡木隂安得智慧劔力斬奸邪心吾師曹溪流所在人依欽郡邑兩交疏来發雲雷音初如碎瓦礫乃見真球琳瞽者破其瞽瘖者破其瘖有若鸞鳳巢無復䲭梟禽嗟予困吏役海㟁宜投簪扁舟扣船户清風滿衣襟高論松桂間為師揮玉琴勝法寺在梅李鎮唐元和中閻將軍捨宅為寺院乾元元年置離火宅寺晋開運中改為境寧宋大中祥符元年賜今額至和初更名禪院閻將軍今為寺中伽藍神頗著靈騐人有移家以居者必有蛇蚖見箱篋牀席間寺之東即將軍墓也嵗時寺僧設蒲饌祀之西北有洗馬池池側有小冡葢其劍甲所藏也寺廢五十年國朝嘉靖中僧某人重建于故處與友人維摩寺小飲王鼎暫依禪榻息塵機墻外東風晝掩扉欲上高峰尋舊蹟輕衫短帽不禁吹維摩寺錢仁夫蔓草芊芊沒寺門墻根殘刻巳無文敗檐猶滴夜来雨高樹尚屯窓外雲佳境故容僧管領禪床時許客來分傳呼且莫穿空谷下有松間飲鹿羣維摩寺在虞山上宋隆興元年僧法運建遊智林寺李光扁舟來訪小叢林花木通幽院落深旋拂胡牀成午夢閒持貝葉動秋吟竹聲瑟瑟生虚籟山意峩峩入素琴更喜老剛能㑹事手携爐銚自相尋智林寺在李墓村唐乾元元年建初名永安宋大觀四年為犯宣祖陵改今額寺舊在地名岡身後以鐘聲不聞於近而聞於李墓遂徙于此異僧了通嘗居之遊鷙山寺徐恪香刹藏深紫翠坳巖亭長見薜蘿交翻經葉上蟲書字挂衲枝頭鳥寄巢誰似金仙留賜帶先參玉版向齋庖日斜茶臼林間響疑是松門過客敲鷙山法輪寺在縣西四十五里鷙山南麓養疴白雀寺王寵香雨洒金沙輕隂蔽日華山蒸飛殿靄海潤簇樓霞地僻偏喧鳥林深尚落花載窺清淨理牽志梵王家宿白雀寺木魚聲起梵音長子夜焚香禮道塲病客齋心渾不寐萬縁都掃事空王繙遍華嚴㡬巻經殿堂突兀帶春星此身已集禪林侣破衲枯藤野鶴形白雀寺在縣治北三十里僧如瑶建吳江聖夀寺羅處約漁翁沙鳥傍迴塘携杖閒吟繞寺廊逺岫不離青草渡片帆時過緑苔墻風狂林木生清籟日煖漣漪動畫梁張翰思鄉應有意幾多屏障水為鄉同前王禹偁松江江寺對峰巒檻外生池接野灘幽鷺靜翹春草碧病僧閒說夜濤寒晨齋施笋惟溪叟國忌行香只縣官盡日門前照流水濯纓無便淚䦨干吳江聖夀寺九日冩懐徐衍自笑覊縻作楚囚登高誰復共清游黄花籬外無人至白酒尊前有客愁世事浮雲俱滚滚禪心流水兩悠悠輕裘肥馬徒為爾得似烟霞一釣舟聖壽禪寺在縣治西北延夀坊故名北寺吳赤烏間建梁開平間改興寳院天福七年重修宋天聖三年賜今額淳熙三年重建陳武子記報恩寺風雨與張憲聨句高啟盲風簸天興憲凍雨翻海㵼魚蝦落半空啟蛟龍鬬中野勢吞九河黄憲功潤千里赭怒疑決沙囊啟振訝欲摧瓦横行天兵駛憲大笑電女哆乾坤發生多啟道路暍死寡潦漲湧濤川憲旱去滅烟野谷號竟誰嘘啓木撼不自把必變其聖乎憲弗迷維舜也隂岑氣如炊啓高葉聲苦打陽烏韜不見憲乾鵲噤皆啞重翳晦復明啓餘㸃歇還洒雖恱灌園人憲應愁渡江者侍玉笑楚賦啟及我慚周雅避思泰山顛憲戰憶昆陽下既霑想大田憲廣庇思巨厦桔槔向晩停啟紈扇未秋捨亂號官私蛙憲莫辨来去馬卧驚浪喧耳啟歸恐泥沒踝勿憂捲茅屋憲且喜憇蘭若民期嵗有登啟國荷天錫嘏沛澤宜載歌憲斯篇試姑寫啟宿庉村報恩僧院朱存理野寺荒烟暮色蒼偶来一宿照公房秋深客裏知何夕年少僧中有此郎漫説江鄉鱸正美試行籬落菊初芳安排詩句歸航上白鳥滄波引興長報恩寺在二十七都唐大中間頋文通捨宅建無礙院牡丹宋和儀霜氣稜稜草木窮花王忽綻曲䦨中鮮妍首作三吳瑞裁剪何須二月風芳艶巳依銀色界清香不斷白蓮宫出羣品格無雙譽珍重人天造化工題月禪師方丈蔣堂我到雲房是有縁坐移蓮刻聴禪詮江邉異日人應記吏部曾来見大顛阻風宿吳江無礙寺陳基龍伯留人暫艤舟偶過西寺得詩流僧窓烟景五湖晩澤國雨聲三月秋我欲棄官来釣雪誰能作賦共登樓此身何日都無礙共向毘盧性海逰無礙講寺在常樂坊西故名西寺梁開平間僧本遂建晉天福七年賜額華嚴賢首講寺吳越王嘗浴于此故名無礙浴池猶存潮音堂詩張景修安得并州剪半江詩翁吟就筆頭樁過橋漁艇初收釣傍水僧軒不下窓南北虹垂具區濶東西雲起洞庭雙道人施石心無礙龍鬼應須向此降西軒王摩歩躡霜莎入梵宫一軒佳趣屬支公剰開青瑣延明月疎植修篁待好風笠澤波聲春雨裏洞庭山色夕陽中江頭景物牢籠盡欲寄琴尊此養䝉西軒洗竹楊維楨華嚴寺裏斷雲師許我来題洗竹詩未論竿頭能進步且教節外莫生枝定回午夜秋聲減經罷西軒暝色遲從此一塵無染著嵗寒惟有此君知過華嚴寺贈斷雲師成廷珪斷雲老師如斷雲無心舒卷自氤氲空山與之結為侶逺道也堪持贈君黑夜雨隨龍聽法青天風引鶴同羣江湖我亦忘機者半榻今宵喜見分宿吳江墖院張鎡宿雲蔽空谿溟濛我船曉繫紅蓼叢宿雨滑道樹瀝漉我車早轉青泥衝破程約涉一舍外逺目未快千山供岸傍小店換馬去氊裘障冷披䝉茸須臾巾葢不容展莽莽暗霧逢逢風偕行客輿屢掀簸適值官騎来幢幢刀弓負帶競硉矹驙駟􅀈驖騅騟騘爭前迭進步殊窘迫暮始望橋垂虹石塘百丈捍駭浪間有灘磧紛魚筒雅羣黑白混鷗起帆影亂㸃還波中筆牀茶竈住此地得句未必慚龜蒙浮圖老屋且投宿解擔正聽黄昏鐘紗籠炙燈照佛古蘭席布榻便吾慵恍驚足履未游地欲記倦著新篇工呼僮温酒立懦志逸興恐失難重逢案邉紙盡莫翻寫不覺紅日㸔生東登吳江塔王守仁天深北斗望不見更躡丹梯最上層太華之西目雙斷衡山以南䦨獨凭漁舟渺𣺌去欲盡客子依依愁未勝夜乆月出海風冷飄然思欲登雲鵬登吳江塔王鏊吳江高塔在與客試来登欲盡五湖勝還升第一層寧境華嚴寺在東門外梁衛尉卿陸僧瓚捨莊基建嚴法師開山名華嚴院東魏太平初重建宋元祐中邑人姚得瑄捨錢四十萬緡建浮圖七層其鄰舊有寧境院紹興五年併華嚴為一賜今額並存二院之舊也國朝永樂十三年重修游圓明寺吳復不到禪宫二十年庭前古柏已參天衰容自哂多華髪故舊相逢亦白顛勸客新醅春未煮留人苦茗夜重煎一忩風雨催歸興好向溪頭問釣船圓明寺訪吕山人高啟憐君不出户結厦與僧同隂竹行廊逺香花揜殿空飯分齋鉢裏書寄藏函中茶宴歸来晩西林一磬風圓明寺在二十三都宋乾徳間僧月覺建寄頋仲瑛寓法喜寺謝應芳客来喜得平安信蕭寺樓居日掩扃湖近浪揺忩影白地偏苔泛履㾗青羣賢方結蓮花社小楷猶鈔貝葉經嵗晩歸舟經甫里好尋漁父過寒汀宿同里法喜寺華幼武九里湖邉寺參差樓閣重空林初落月深殿已聞鐘門揜溪流靜橋分野色濃暫来生逸興無計削塵踪法喜寺在二十六都九里村唐武徳中僧西遇建登崇吳寺樓望太湖錢惟善西望洞庭青挿天蛾眉兩㸃秀娟娟勢翻震蕩蛟龍窟氣浸高寒牛斗躔支遁每招過野寺龜䝉曾約種湖田凭䦨不盡登臨興更駕長風萬里船崇吳教寺在充浦村梁開平二年僧妙義建吳江普濟寺初到湖邉寺相逢有徹師深悲十年事朗誦四懐詩高栁窺春早寒燈照夜遲寧無一杯酒慰我鬢如絲普濟禪寺在震澤鎮宋元豐中僧夀善建㳺吳江永樂寺高啟鬢隨鶴羽總秋零幾日江行思𣺌冥夜卧客舟聞咏史朝過僧榻共談經沙洲雨足蓴初紫林隖霜遲橘尚青後欲尋公曾到處留詩應在竹間亭永樂寺在雙楊村宋淳祐間僧無際建栁貫記寳覺寺張適留衣山館乆飛䇿海城秋迹逐初来雁情親欲下鷗晩雲黄葉渡斜日碧江流正是懐思處聴鐘獨倚樓寳覺寺在曹村宋紹興十年僧佛光建寄羅漢寺僧伏虎林朱良實我將八耋斷塵緣愛聽松風㸔瀑泉和靖吟懐梅瘦損濓溪生意草芊綿謀生未許全抛俗問話那能不離禪長想知音在何處他時定汎剡溪船和伏虎林黎里人家石上緣幸師来往古林泉夢回竹榻聴猿嘯定起松軒㸔鶴眠暇日每留香積飯長年不離苦空禪老夫亦是幽棲者乆欲相尋共釣船羅漢講寺在黎里鎮宋淳熙三年僧法燈建過吳江永定寺高啟亂後僧何去門閒葉落時畫昏蟲蠧老齋斷午禽飢罷說傳心法猶㸔賜額碑不知興壊理来此豈無悲永定教寺在充村浦吳江泗洲寺二首易恒幽尋林壑間春暝䕶禪關到寺過頭杖開門對面山燈傳清晝永僧與白雲閒欲覔泗洲老高風詎可攀開士僧中彦繙經晝揜關禪心秋水觀詩景夕陽山鶴下松雲破鹿眠苔徑閒老尋棲息地著意欲追攀泗洲寺在蘆墟村宋開熙間建接待寺劉濤江滸收㠶試倚䦨目圍平野望尤寛氣吞四澤鵬相近路入三山鶴夢寒壓曉㡬思㸔浴日凌秋誰許傍觀瀾應憐低首邉塵客何日風枝得暫安和張澂小檻超然著曲䦨登臨聊使壯懐寛浮天野水東南折照座雲山紫翠寒風定綵虹銜落照夜清紺塔卧㣲瀾自公休暇宜来數寄傲南窓膝易安接待寺在東門外南津口俗稱南寺宋紹熙二年僧寂照建名承天萬夀禪寺元至元間僧正夀重建改今名題梅堰顯忠寺壁景奎千古梅塘寺山門面水開地清塵不到僧好客頻来澹墨詩題壁殘碑字沒苔桫欏樹下石云是講經臺顯忠教寺在梅堰宋王樞宻祠堂也長橋寺化修造疏釋大訓開山佛祖焚目祈雨感觀音授以藥目復明朝廷為建寺昔聞大旱金石流而土山焦爰感精誠天雲垂而海水立盡謂暴尫之何益獨徴眢目之重明有功生民在祀典猶修其禮大徳我祖而後人不葺其居頋予心之何知視其顙而有泚塔鈴自語况多舶趠之風土偶相憐益甚瓢傾之雨尚想美哉輪奐豈曰嗟乎權輿長橋卧波依舊虹蜺天矯高岸為谷向来雨露淋漓敢圖逭責亦庶幾焉當見勇為而興起者使黄金同土價願希一語之仁得白璧照夜光不待立談之頃百堵皆作萬福攸同呉江州水月院記呉江州南五十里有湖數百頃湖中有土阜隆然廣可五畆曠古莫有居之者宋嘉熙間僧覺春廬其上曰水月菴六傳至允諒諒築隄以廣之作殿堂樓閣悉完好請於帝師易菴為院而求記於予且曰世以良田美宅貴粥豪奪私積之寖廣而官之賦役益重於是有不勝其用而病且覆者相望也故吾祖取人所棄而有之以至於吾吾以一身之㣲寄於水月之上汎汎如虚舟之淩滉瀁何往而不自得哉予謂志卑者徇利樂閒曠者徇境其誘於外而為物所勝一也若是則子之媚夫水月以居之吾為子記之皆外物也能歛念以返觀乎内雖宇宙之大虚空之無窮曾無一漚之量而彼水月者又不啻隙中過影耳則子之居將無所寄庸寄吾喙於其間哉雖然虚已必觀物則物皆吾用不冺於空不窒乎有中道然也如是而子之媚夫水月以居之吾為子記之載歌水月之章以遺之其孰曰不然辭曰水之逝乎有潮有汐維月之恒亦朏而魄有生遄化孰不如物不有至人㑹萬若一爰執其樞以游化初物我無朕水乎月乎長橋寺與水月寺未知何所今録二文于蒲室集嘉定縣崑福講寺僧懐瑾峩峩跨蒼穹登臨豈辭陡冷風天外来陽鳥檻前走縱目春正妍蹊桃紅間栁徙倚漫裁詩不覺日在酉樹景感舊懐臨風一搔首恍焉凌太虚煩襟復何有崑福講寺在縣西梁天監中監建圓通寺留題楊貢曾向疁城跨玉騘又乘五馬到圓通僧房有榻懸初解暮夜無金睡正濃當道豺狼休躑躅號寒兒女且從容莫言亷范從来少尚有今人可繼宗圓通講寺在拱星坊内至元間里人高氏子為僧名明了捨宅為寺嘉定州南翔寺藏經記釋大訢至道無為無言也而所以為以言者將埏埴羣生陶鑄聖賢其有為而然乎以本覺明妙之性淪于六趣散于萬類形氣情欲相禪以生相感以化以蕩流無垠故因情而訓之以刳情絶欲澄瑩精一求返于初而甚矣情之蔽錮性之不克復也乃酌其機隨器所授示六趣以果因影響使之逺惡進善以超于聖賢之域導二乘以四諦十二縁榮菩薩以六度萬行逮人人妙覺物物全真以備一代化儀而猶曰彰其迹耳若夫顯本歸舊雖聖罔知豈世智凡識所能擬度哉况性之精㣲言所不及惟善言言者能言于無言而後可以達無言之言于是有月指筌蹄之喻而啟迪將来非教莫宣斯三藏之文為世法寳聖凡顯幽所共戴仰如日月于晝夜賴之以為向導也蘇之嘉定南翔寺僧祖勝以已别業為經堂庋經于中嵗選淨行僧閱之復施田五頃給其費餘以備繕修而求記於予予禪者故取直指見性之道與經契合者告之而申以辭曰餉空于缾酌水于缶而水與空非大非小如性囿形形不能囿瞬閱萬世芥視八表有覺瞿曇稱性而譚虚空為舌萬象交參彼昧罔覺或聾而瘖善啟其機爰得我心如屬于耳如接面命彌隠而顯鳥飛魚泳花雨風清海天如鏡孰為檀度曰比丘勝勝即我謀妙斡其樞不有作者徳山之徒視佛不為火書壊廬冥行同趨不既韙與題南翔寺葛天民南翔建自梁天監白鶴不歸江自轉深禪空憶祖師齊昔有老堪今有逺我趂江鷗訪逺公逺公不有湖天晩七嵗驅鳬有幾房三百苾蒭無半面殿閣參差高入雲一堂可着千僧飯古柏槎牙不記年柯如屈鐵色蒼蘚古意偏關倦客懐歸舟有句無人遣明日中流遇阿英連宵細說南翔院少待崇蓮寳塔成春風共㸔巢梁燕我欲婆娑借數椽子當力學如吾願一任江花惱殺人閒邉自數飛花片和韻僧普洽白鶴南翔何日返香雲不動春風轉屋為鱗次枕江安江作蛇行到門逺的的明燈金殿寒沉沉複道長廊晩老翁矍鑠皎須眉愛客將迎笑盈面自言天監拓基来食指數千猶共飯斷碑壁下試摩挲龜趺剝落生苔蘚茫茫往事比寒潮蒼烟落日愁難遣遣中何處愜深深玉甃新池開别院二齊已去老堪殂故壘空来巢舊燕吾宗有弟知此懐炊黍功名豈云願便呼阿買寫新詩研池澁擁清氷片南翔寺楊維楨三生石上有因依雙鶴偏從石上飛自笑老禪能事畢不隨雙去復雙歸同前道衍齊師不返鶴南翔梵刹如雲始自梁䕶法天臨朝擁殿放禪僧出夜循廊碑殘亭下思皇宋檜老堦前識李唐事業已經千載久空王誰道有興亡保寧寺鐘樓記徐冲樂一嵗為十二鐘武事以鐘為伐葢鐘與鼓等鼓陽主進鐘隂主退樂以鐘配地戰以金為歛吾儒用鐘大矣西方教尚金聲鐃鈸鉦磬亦梵部樂寂滅之訓宜有取于靜退之音其書謂罽賔叱積辠化為九頭魚刀輪舞波斷首復生循環不息聞鐘少停此縁起也流入中國則曰魄行中隂假聲進步人死不滅業通三世悉為因果設余童時見隣有虎適野者童聚戯泥其竅將困鐘一聲出雲杪遂闃然弱冠侍親謫婺㸑獲自經夜出罔蒙隣寺鐘鳴始去扣一夕少止良騐矣世習以鐘警迷暴戾潛消乆矣猶樂通和鉦退師比也况佛祖誓願天龍統攝通神明齊生死皆由人心發鼎鑄姦屏鐘鳴山應吾儒不為竒佛家藉以立教士不揣本羨之曰吾不及也鄙之曰吾恥言也是皆不知倫類出姑蘇葑門沿吳江百滙為青龍江距海三十六里曰商量灣三精藍獨保寧以石晉天福建屋老而大長廊重樓方一新有吳越鐘四百觔開寳九年諸葛氏為報恩山中峰寺作不知何年歸于此舊樓且隤法喜聴天台觀嘆曰吾徒二千指號聾聵司昏曉者庳陋若斯可恥也猛欲撤而新之裘媪申明為倡檀施趨和遂以嘉定壬午嵗嘉平上澣成廣三尋縮二尺高七尋盈六尺栱藻重檐四牖咸備予頻年以王事往返一夕法喜炷香㵸茗求為記余指樓而告之曰幻土木之竒焜金碧之輝掲盛時之聲鐘懸百尺之崔嵬穿逸響于天外振阿含之執儀昔為墜典今登濟斯爾所以懽喜衆所以難息歟曰然又告之曰東鐘西鼓尚隂折陽示無生意以柔剛腸暮息萬籟靜而清長晨雞未嘒作而鏗鏘息者付道業之全缺作者抑妄念之披猖痴扄破鐍夜景發光律心萬法豈徒釋爭訟于曲直之場施形百斛何啻罷怨懟于矛盾之傷繼今以始午鼓並鏜食輪轉法輪翔入耳著心化㓙反良兆我一身為世津梁此示衆未盡知其以語而宣揚合仄曰法喜作樓本心也敢垂樂石四衆受持嘉定癸未八月既望記遊保寧寺薛松心工曲蕭梁寺山僧晝掩扉土花封石甃翠竹上人衣海近潮聲促廊空木葉飛我来味禪寂相對兩忘歸保寧教寺在江灣鎮石晉天福三年東京大相國寺僧智光所謂龍樹法師者駐錫于此募建後周廣順二年賜額元至正八年僧惟正重修國朝永樂六年再建西隠寺空翠亭張南渠人間風日不到處林石照衣顔色鮮半天六月雨蒼雪隔水一僧吟白蓮座中得趣成三笑竹上題詩今七賢他年此㑹或可再須借北忩供醉眠夀樂亭鄭元祐西隠西邉夀樂亭六時天樂語檐鈴傍人馴鶴行穿竹掠水飛魚出聴經月到中庭開碧落星從南極上滄溟千年一息那伽定長結慈雲擁帝青直節軒楊維楨西枝林中訪遺直况有文采錦斑如誰參枯禪到玉版自愛此君如史魚彭澤風高印綬解空廬雪冷節毛疎道人詩似春秋筆大字琅玕節下書西隠教寺在縣西北清教塘元泰定元年僧可悦建僧圓照記普濟教寺重修記略曾棨崑山距縣治之東一舍餘為太倉其城之南門外有普濟寺其先當宋季時有僧結菴于此然舊無田産唯募粮以贍衆至元間有五臺僧曰普明大師者東逰卓錫于此日擊木魚化募婁江之上時有朱左丞者厭其煩聒令奪木魚棄擲水中已而泝流而上左丞驚異遂捐貲改今額張士誠據有姑蘇寺悉焚蕩獨存靈山聖像靈屋祥師思欲重創弗憚勞勩俄而神光屢見施者雲集即鳩工庀材構堂五間以居衆僧國朝洪武辛酉建大佛寳殿癸亥作方丈併為叢林永樂戊子昌梵與梵衍各捐貲并募重建造圓通殿佛氏之教以慈愍濟衆為心故世之人贍奉向仰以求福田利益者日滋月盛况于其徒克崇奉而歸向之以樹立而振作之歟普濟教寺在州南一里宋末五臺僧普明止此遂卓錫建寺元末燬惟靈山一㑹佛像存焉國朝永樂六年僧梵衍重修淮雲寺趙孟頫淮雲三十里見者以為竒而况于淮雲逺被浙水湄其上聳樓觀丹碧何絢麗子孫有如雲咸能嗣厥事老我作是詩刋之于樂石庶爾保令名照映滄江色淮南精舎言懐二首張泰幽獨卧禪林經年輟醉吟乆知書可讀不耐病相尋鳴鳥夜還曙落花春又深餘生憑藥餌又感問朝簪年年春不改風雨是花時弱葉終遮樹鮮英且附枝屏心居對景隨意步臨池聊用忘吾病憂中一較詩登淮雲毘盧閣陸㫤危樓高入白雲層拂袖閒来試一凭紅葉城樓聞斷角夕陽溪路見歸僧地偏不着塵埃氣心逺應超大小乘安得吟邉添兩腋九重霄漢快飛騰淮雲教寺在城北二里陳涇橋北元大徳六年江浙軍器提舉頋善夫營祖墓于此建為養夀蘭若以其家世淮人不忘其始奏賜今額趙孟頫書扁國朝永樂中平江伯陳瑄重修崇明縣奉聖寺程用昭霜落平沙楓葉丹可人情意滿空山江梅瘦褪猶疎放山鳥驚猜亦往還孺于興同秋水逺支郎心與白雲閒此時野寺題詩處昨夜穉寒湘竹斑訪奉聖寺二首劉秩白馬䭾經日本西偶来此地訪招提長廊松樹何年種别舘梅花後夜題結社東林思靖節留衣南海愧昌黎江風山月今如此拚得今宵醉似泥海國瀛洲别有天上人駐錫住經年三花樹繞眠雲榻七寳池通洗鉢泉清磬響時晨聴講名香爇罷夜參禪何時来問無生話喚醒人間醉夢縁奉聖禪寺在崇明縣東沙唐貞元間僧道成建宋紹興初里人陸思閒謝之剛拓而大之元泰定甲子至正甲午重修鄭元祐記吳都文粹續集巻三十四
