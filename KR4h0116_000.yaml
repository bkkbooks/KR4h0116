body:
  text: 吳都文粹續集總集類提要臣等謹案吳都文粹續集五十六卷補遺二卷明錢榖撰榖字叔寶長洲人是書乃續宋鄭虎臣吳都文粹而作朱彞尊詩話稱榖貧無典籍逰文徴明之門日取插架書讀之手抄異書最多至老不倦倣虎臣文粹輯成續編聞有三百卷其子功父繼之吳中文獻藉以不墜云云所稱卷數與此不符疑合功父續編言之或榖舊稿原有此數後復加刪汰以成今本彞尊乃據其初稿言之歟此本第五十三卷五十四卷俱佚第五十卷亦有殘缺檢勘他本並同流傳既久不免脫遺已非完本其中所標二十一門分類亦多未確蓋能博而未能精者然書中所載自說部類家詩編文稿以至遺碑斷碣無不甄羅其採輯之富視鄭書幾增至十倍學者欲徴文考獻要必於是乎取資焉乾隆四十三年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:ac4f2bf002d77e77db319fb36ccf2ab50d8123910de7727599f0df2748439853
