body:
  text: 呉都文粹續集巻四十九明錢穀撰詩次韻寄錢翼之楊載有聲呉下頗多年長把漁竿釣海邊李賀才名過杜牧魯公書法繼張顛塵沙撲面驚吾老星宿蟠胷媿子賢嵗晩著書言足妙青青林竹正宜編和孟東野題崑山寺蘭谷負崑岡鑿崖安佛牀梯雲石磴滑入厨泉水香旦寒鳥相聚月黑龍放光舟行苦局促卒憇殊勝塲次韻髙季廸别後見寄之作張羽客中原少寐看月上林端雁叫楓江夜人棲野艇寒浮蹤憐斷梗攪夢怯奔湍不是孤吟懶離羣自少懽約徐隱君幼文同隱呉興吴興好山水子我盍遷居繞郭羣峰列廻波一鑑如蠶餘即宜稼樵罷亦堪漁結屋雲林下殘年共讀書畊漁軒寄題徐良夫之子住銅坑人傳好事名如何同甲子翻遣昧平生野岸風中釣湖田雨後耕秋天漸凉冷或可赴前盟送人之平江投刺李守送君何䖏逰一劍古蘇州螃蠏黄花節鱸魚碧水秋尋碑松隖寺按曲酒家樓况爾多能者膺門必見留寄王正仲髙季廸秪恨孤城未觧圍圍開翻遣别相知夕陽江上悤悤酒細雨燈前草草詩有夢直從花落後無書空過雁来時郭西古寺題名處今日重逰却共誰别後吟成許寄無定知詩境不荒蕪新詞典雅推摩詰古體優長羨達夫華岳羣峯雲霽出梁園萬縐日晴敷肯從大厯開元事重擬清談擊唾壺過何山廢寺千峯寂寂寺門開石逕春風長緑苔佛閣丹青餘瓦礫禪房花木變蒿莱繙經室壊僧應散施食臺空鳥自来誰料空門亦如此獨臨斜日重徘徊悼髙青丘季迪燈前把巻淚雙垂妻子驚看那得知江上故人身已沒篋中尋得寄來詩消息初傳信又疑君亡誰復可言詩中郎㓜女今癡小遺稿千篇付與誰生平意氣竟何為無祿無田最可悲賴有聲名消不得漢家樂府盛唐詩寄叔方倪瓉乖阻方徂秋忽然已改年櫻桃花樓前開落春風顛乘船到家日雨砌溜涓涓緑酒仍滿眼素琴久無絃呼我共斟酌歡極更惘然處窮則已固言達誰當先俯仰嘆鳶魚浮沉各天淵慎勿傷本性木雕而土埏鸞翔安可挽青雲氣翩翩猶羨羲皇人清風北窗眠江南春汀洲夜雨生蘆筍日出曈曚簾幙靜驚禽蹴破杏花烟陌上東風吹鬢影逺光揺曙劍光冷轆轤水咽青苔井落紅飛燕觸衣巾沉香火微縈緑塵春風顛春雨急清淚泓泓江竹濕落花辭枝悔何及絲梧哀鳴亂朱碧嗟我胡為去鄉邑相如家徒四壁立桞花入水化緑萍風波浩蕩心怔營送虞勝伯之雲間求先世遺書川谷沄沄浙水波雍公勛業未消磨况當異代求文字尚有聞孫校舛訛京國不聞收汗馬草萊終見沒銅駝誰陳聖主賢臣頌奈爾隂山敇勒歌故虞勝伯徴君隱居竹義居甫里垂二十年不屑以姓名求知于時之聞人道園先生其叔祖也先世雍公所遺文道園先生欲求而不可得勝伯必欲竭意以購取之可謂有志而不忘其所自矣聞此書舊藏平江俞子中推官宅推官沒已久而子俊州尹其弟輒能假以歸勝伯非仁人義士之存心乎州尹瓚之故人也因書以為之請陶蓬大尹見之當有以教吾者矣倪瓉頓首次韻答陳叔方早春見懐隔江山翠晩依微隱映江邊白板扉事往依依驚歲改老來念念覺前非已看庭草侵行徑漸有汀花拂釣磯慚愧詩篇慰幽獨白頭從此莫乖違清夜哦詩手自書也應把燭倩官奴瘦牛犖确荒田隴肥馬蹣跚笑瓠壺且釀松花江水碧更分芝朮嶺雲腴人間誰覔𤣥真子春雨扁舟釣緑蒲白馬寺通長老修圓覺期化緣惠逺深心白蓮社湯休麗句碧雲篇懴摩不懈香燈供般若仍通文字禪雨後春池芹細細月明寒渚竹娟娟東林門外聞鐘返惟有陶公妙入𤣥貞壽堂詩為吳縣尹楊彞作貞壽堂前風日遲夭夭寸草答春暉兒兮事育心無怍母氏康強志不違後日腰懸季子印只今身著老萊衣熈然鶴髪照緑酒金鴨火温香靄微烟雨中過石湖烟雨山前度石湖一奩秋影鏡平鋪何須更剪松江水好染空青作畫圖姑蘇城外短長橋烟雨空濛又晩潮載酒曽經此行樂醉乗江月卧吹簫愁不能醒已白頭滄江波上狎輕鷗鷗情與老初無染不棄輕軀總是愁蘇臺懐古望中烟草古長洲不見當時麋鹿逰滿目越来溪上水流將春夢過揚州吳中絶句醉喚呉姬踏舞筵風闌花陣亦回旋愁生細雨寒烟外詩在青蘋白鳥邊發吳江一望洞庭秋水相逢南浦孤篷江千有興騷客閒居久釣漁翁泛太湖遥接太湖惘然尚留赤壁圖景越来溪水東西香雪寒梅飄影登姑胥山呉王館娃西子兩情斷送長流麋鹿淚沾荒草故人汗漫重逰過盤門将軍南鎮勾吳魚龍跳下江潮無限吁嗟神迹怕聞凄凉洞簫歸闔閭浦極目烟江盡頭屈指姚城渡口世人不理曲肱自餉黄鷄白酒吳鈎行楊維楨吳人殺二子釁成雙吳鈎吳王下賞令不識鈎中愁臨鈎呼二子飛来父心頭百金何足報萬户當封侯佩雙鈎比明月為君嬖者斬䜛者刖制諸侯開伯烈千秋萬嵗光不滅長洲曲長洲水引東江潮潮生暮暮還朝朝只見潮頭起郎拖不見潮尾回郎橈昨夜西溪買雙鯉恐有郎緘寄連理金刀剖腹不忍食尺素無憑膾還委西溪之水到長洲明日啼紅臨上頭五湖逰鴟夷湖上水仙舟舟中仙人十二樓桃花春水連天浮七十二黛吹落天外如青虬道人謫世三千秋手折一枝青玉虯東扶海日紅桑樛海風約住吴王洲呉王洲前校水戰水犀十萬如浮漚水聲一夜入臺沼麋鹿已無臺上逰歌呉歈舞呉劍招鴟夷兮狎陽侯樓船不須到蓬邱西施鄭旦坐兩頭道人卧舟吹鐵笛仰看青天天倒流商老人橘幾奕東方生桃幾偷精衛填海成甌窶海盪邙山漂髑髏胡為不飲成春愁吳城怨吳兵夜入郢小弟驕父兄彎弓射天日輦土築長城長城築未竟客主老蠻荆夏駕石鼓辭鼓在夏駕山髙一丈徑三尺下有磐石為足古諺云石鼓鳴三吳兵周家十圜鼓散落陳倉野猶有夏駕石盤盤駕之下秦鞭血出骨呉獵焦野火夏鼔建不㧞石鳴知者寡父老懼䜟言山空石長啞虎丘篇路出女墳湖警蹕伯王驅靈池飛霹靂枯冢走於莵老禪猶㸃石仙鬼只疑狐祖龍来發閟銀海又飛鳬香山篇放舟脂塘曲盤逰湖上雷雷鳴湖雨作還泊香山隈美人鬬香草上有九畹栽美人在何所搴芳招歸来露下荆棘草鹿上姑蘇臺金處士歌吳郡人金可父賢智有才藝而自埋于民衆皆嘖嘖以處士稱之權貴人以丘園科起處士處士遽絶之曰予幸有廬一區在市闗可以避風雨田一㕓在郭外亦可以給衣食學聖人之道可以自樂不願求仕也且仕榮利祿隱樂貞素茍以相易彼此兩乖乖而欲強合吾不能已吁處士如可父信其逸而貞者歟維時集賢舊老相與署牒錫號曰貞逸會稽楊維禎乃為之賦詩曰蘇州古隱君實始虞仲隱居放言中乎清與權次曰澹臺氏言不枝行不徑未嘗匐足諸侯前五噫之夫将其匹聨耕織為業不廢誦與絃亦有天隨仙配䲭夷子理釣船去之五百年求繼者孰賢闔閭古城隱曰有處士氏曰金長身而美髯叶壬風局孤古古貎疏且沉家不失箴里不失任有餘推與人矧肯賣祿入心心闕下足終南叶吟貧賤易屈富貴易滛故大隱在闗市不在壑與林鳯皇不能引髙神龍不能深叶沁深人呼為處士更加貞與逸號焉知古不如来今吾嗟今之士科隱丘復事王侯行無補闕言無裨謀惟祿食是媒叶牟詭貞而隱詭逸而休以為吾人憂放而還澗恚岳隴羞聞處士風其不泚然在顙豈吾人儔城門曲諜報越王兵城門夜不扄孤臣睛不死明月照人青吴農謡吴農竭力耕王田王賦已供常卧眠鄧通董賢何為者一生長用水衡錢吴下竹枝歌三箬春深草色齊花間蕩漾勝耶溪採菱三五唱歌去五馬行春駐大堤家住越来溪上頭胭脂塘裏木蘭舟木蘭風起飛花急只逐越来溪上流寳帶橋西江水重寄郎書去未回儂莫令錯送回文錦不答鴛鴦字半封馬上郎君雙結椎百花洲下買花枝罟罛冠子髙一尺能唱黄鶯舞燕兒白翎鵲噪手雙彈舞罷胡笳十八般銀馬杓中勸郎酒看郎色似赤瑛盤騎馬當軒鵠觜靴西風馬上鼔琵琶内家隊裏新通籍不是南州百姓家小娃十歲唱桑中盡道吴風似鄭風不信桞娘身不嫁珍珠長絡守宫紅夜發吴門趙孟頫吴樹依依吴水流吴中舟楫好夷猶多情最是吴門月又送行人下秀州次姚子敬懷王子慶往吴中闔閭城郭鎮姑蘇弔古登臺百感俱秋水逺隨潮影沒江雲長傍客帆孤吴時花草于今在晉代風流世絶無别後故人須有得已應懐寳問歸途姑蘇懐古和鮮于伯機韻陸文圭會稽俯伏遣行人吴國池臺日日新幙下盟歸金甲散宫中舞罷翠眉顰悠悠今古三江水寂寂英雄一窖塵笑問䲭夷身退後漁商何苦効齊民虎丘留題辛邜三月書于劍池伯業荒丘春草長只聴兒女話真娘虎来墓上猶應怪鹿入宫中儘可傷太息乾坤空浩蕩不留豪傑管興亡屬鏤抱恨沉江底潭碧猶生古劍光龔子敬同逰桃花塢趙中時適至郭祥卿麥光繞郭撓青浪華氣浮空散紫霞小院碧桃留客醉隔林修竹問誰家清明過了春将暮濁酒傾殘日又斜一笑相逢誠不易人生看得幾韶華呉中寒食龔璛寒食清明賣酒家酒瓶亂挿白紅花江南蠶子非一種日暖蜂房報午衙八十漁翁罾半破往来醉客路三叉村中女伴無忙事疎雨小塘収漾紗登姑蘇臺丁復白日初髙瓦影黑姑蘇臺前春拍塞百花緣洲水曲尺小浪羣吹度㳺鯽晴烟漲暖野荒荒箇箇西山淡疎碧海風東來揚短篷吴兒􅜌坐長歌發逸興遥将白波去送目飛鴻倦低翮扁舟甚有五湖思風雨漂揺從所泊幸逢大國全盛日地極蒼生無裂坼向來時運數更變河山南北烽火隔人攀岩穴恐不險樂土不居何暇擇只今城雉多墾鑿麋鹿所逰盡桑麥自笑生來但為客五十有家無土著有酒不作懐抱悉明日日出已非昨次可立詩霞邊浮玉青霏霏吴中景物天下稀三江入海作春浪五湖滿地揺夕暉孤鶴忽與白雲起神龍或挾赤鯉飛胡牀抱膝但長嘯丈夫安得為輕肥天平山陳方東吴水為州西山兹獨秀上有百歲松下有千尺溜况當泉石間野花亂如繡頓足忘僕勞長歌發予陋沉沉范公祠肅肅香火舊碑猶鞏洛時寺當風雨後嗚呼一代尊廟食今誰守寂寞壯士懐松風動清晝登姑蘇臺二首薩都拉閶門楊桞自春風水殿幽花泣露叢飛絮年年滿城郭行人不見館娃宫野水滿城飛燕子誰家小艇載呉姬姑蘇臺上一尊酒落日昏鴉無限悲夏駕湖鄭元祐吴王城西夏駕湖至今草木青扶疎想見呉王来避暑後宫濯濯千芙渠紺紅矗翠總殊絶誰似西施天下無西施醉凭水窓睡曼衍魚龍張水戯月上湖頭王醉醒歸舟蓮炬繁明星不知左擁右扇者越人日夜窺吳不暫捨魏公祠天平寺裏魏公祠翼翼蒸嘗奠荐時廟享百年亡國後道求千古聖人知山侵鳥道盤風磴石㧞鯨牙揷羽旗更上髙亭望吴下墓田秋實正離離送劉長洲中吴號沃土壯縣推長洲秋糧三十萬民力罷誅求苛時兼并家夜宴彈箜篌今乃呻吟聲未語淚先流委肉餓虎蹊于今三十秋畆田昔百金爭買奮智謀安知徴歛急召禍死不休髙腴不論值低窪寧望酬賣田復有獻惟恐不見収日覺鄉胥肥吏臺起髙樓坐令力本農命輕波上鷗天意憫困劇南轅卯金侯侯有萬金劑探囊令病瘳躄者起雀躍瘖者言嘲啁坐令百里邑姦回息彫鎪是皆仁侯惠頌聲滿道周清朝攷功選賞典無滯留願侯登廊廟一洗蒼生憂玉山佳處為顧仲瑛賦東里東呉積水深海天削出青瑶岑肅侯諸孫有基構界涇築室如小林石根孚尹音浮筠蒸玉氣􅜌曲窈窕來跫音籠鶴教馴合舞節池魚出㳺聴鼓琴樓臺花雨衆香國書畫芸香千古心按歌寧辭夜投轄彈冠又須朝盍簮已傍苔磯學釣弋更上風磴窮登臨竹梧參天鳳鸞集老夫為爾長歌吟崑山石崑岡曽韞玉此石尚涵輝龍伯珠璣服仙靈薜荔衣一泓天景動九節劍苖肥閱世忘吾老蒼寒意未違靈岩涵空閣吴王宫闕草萋萋飛閣重登意轉迷洗硯池邊雲欲暝拜郊臺上日平西湖涵逺浪千帆沒樹響悲風一鶻栖江海䲭夷招不返荒煙野草鷓鴣啼逰嘉定道院芙蓉洲上集仙宫環珮聲聞縹緲中桂閣吹香天樂下稻田疎脉海潮通呼龍起舞迎初日跨鶴歸来御晩風大藥已成金鼎堕丹光猶得兆年豐簡張仲舉待制宵占兩兩使星東川后迎恩啟閟宫海上天燈涵寳月惟中神語䬃泠風雲團芝盖香烟直春入衢尊酒味同况是詞臣工致祝鯨波永息歲恒豐送沈仲説逰杭錢塘湖上水西頭歴歴山人舊釣逰相府猶餘秋水觀酒旗多挂夕陽樓春喧車馬松間寺夜載笙歌月下舟見説于今總消歇休文到目重凄愁俞石澗讀易處先生注易隱南城激石松風答澗聲式玉式金王度在一寒一暑嵗功成要參未畫須心悟洞徹羣疑貴理明蔀屋見星元是晝寰瀛捩柁可無程義精詎忍辭捫舌樂大何妨枕曲肱雨露每滋庭草緑雲霞不㫁晩山横成林詎舎千章木求友難忘百囀鶯歲月推遷陳迹在啟蒙常憶酒同傾石湖十二詠石湖滄波𣺌千頃何處覔䲭夷同姓千年後流芳著斷碑新郭闔閭劍成郭俄徙傍河山酒斾千家寳今猶作市闤拜郊臺吴子築圓丘祀帝存遺址魯亦取聖譏大禘同失禮行春橋醉擁捧心過韶華艶綺羅至今湖觜上彩霓卧滄波越來溪始由嘗膽鑿戰艦逐波通今日憑誰占漁家一笛風觀音岩碧潭通海眼崖設大士座宛如訪天台石梁飛度過治平寺雲鴻藴招提開窓面湖渚時發鐘磬音驚散沙鷗侣茶磨嶠孤嶼突蒼翠波環鬱盤盤誰嗜先春味當来製鳳團楞伽塔危峰峭浮圖七級雕闌曲影落湖波心魚龍駭常伏越公井隋将移城時鑿供萬夫飲清冷尋丈餘倒浸青天影御書亭敕賜宋名臣穹碑載奎畫至今孤亭中紅光照山白紫薇村公退紫薇省宅種紫薇花千樹臨山麓秋来粲晩霞賦採香徑送吴邑張令陞佐嘉定州泰伯常採藥深溪入芳菲攀桂作帷帳紉蘭製裳衣坐令文身俗悉從端委歸支𦙍後世君禮譲日漸違迷陽行棘足蘼蕪露沾衣三秀不改度齋房耀靈輝擷之荐瑶席神享民是依寄吴江知州千壽道熈熈愛日仰髙亭亭外天寒渚栢青晩駕朱旛理公事夜燒銀燭校餘經吹烟白際魚龍國野稻黄鋪雁鶩汀三載政成儒業騐玉堂親擢暫須停徐良夫耕漁軒逰題幽館夏初度清林暑氣中開軒對流水坐石待薰風花落隖中側鳥啼山幾空耕漁者誰子散髮奏絲桐天平祠西望層巒草木青魏公祠下拜儀刑經綸有䇿廻天地憂樂無時忘闕庭異代蒸嘗遵典禮故山香火下神靈浮雲變滅知何在閒聴松風語塔鈴龍門龍門嶻櫱倚天開㸃額神龍幾度来雲起樞中成五色星從罅裏見三台更無鐵檻嗤山鬼可有金鋪上石苔李范黨同勲業異御車千古意悠哉發吴門陳基少壮不解武衰老却從軍将相北出師歩伍各駿奔伐鼔震城闕樹羽隠秋旻水師歘龍驤鐵騎紛紜屯軍容亦已肅士氣悉欲伸載咏東山什感激為逡廵顧予麋鹿姿辱參熊虎羣頹然介胄間見此逢掖臣微祿不逮飬匪材胡足珍驅馳寵辱途俯仰媿君親秋風吹海濤落木滿江津去去勿踟蹰浩歌天宇新平望下田不憂旱髙田正宜雨四野已足霖三吴復無暑盂酒及豚蹄盤箸雜雞黍擊鼓樂社翁燒燈御田祖分題得劍池送夏副樞寳劍斮山石石斷餘劍㾗靈池泄海眼絶壁㧞天根轆轤巻晴雪洶若崑崙翻積厚早彌冽波深夕不渾上馴伏丘虎下飲垂枝猿君行心不渝瑩徹鑒兹源訪北寺無言講主留題秋風日蕭爽散策入空林有竹心已清無言意彌深襍花不容把疎磬有餘音逍遥毘盧境落景駐遥岑昭明寺山居有餘樂縱逰良不孤生多濟勝具豈辭足力劬處處青蓮座人人僧寳珠雨花無宿蒂玉樹盡新株天池我覽天池作名篇如刺珉搴手亦何為未嘗造其濵清詩入朗咏洒然清我身何當托髙翮去訪解空人范氏莊田家近芒種客至已黄昏開門列芳席稍稍羅盤飱忠厚有餘訓詩書彌所敦琴詠衡門下聊復却塵煩咏歸操并序呉興沈仲説築室呉江之曲養其祖母又鑿池構亭室之西偏曰咏歸毎服田事親之暇輙挾琴書絃歌其中仲説之言曰昔者孔子感鳯鳥之不至慨圖書之不出退而修詩書禮樂之教于洙泗間其徒身通六藝者七十二人孟軻氏曰孔子賢於堯舜又曰禹稷顔回同道嗟乎使孔子得聖人之位其徒固有宅百揆如禹播五榖如棄敷教如契為士如咎繇典禮樂如伯夷如䕫其所試將不止子冉求之方六七十如五六十公西赤之為小相而致治之效又不止于仲由之所謂三年有勇者已周末造知徳者鮮臨河之嘆君子盖知道之不行矣于斯時也侍坐之頃乃有如曾㸃者雖或行有所不掩其所志顧能合于聖人而異于三子者拘拘焉思欲用人之國而其所以浩然與天地上下同流于萬物之表者曾不過即其所居之位樂其日用之常而已一時動靜雍容見于鏗爾舍瑟之際千載而下尚能使人想象興起宛如衣春服從童冠而風于舞雩之下則夫夫子所以深與之者又詎可以言語形容哉方今聖神御極丕闡人文本詩書而施教原禮樂而敷治必徳如顔淵位之輔相勇如季路任之將帥辯如子貢使使諸侯藝如冉有俾居官尹其下亦且為方岳為百執事由是羣生異類囿形兩間者並沐仁義之澤可謂盛矣故走也藐焉一介栖遲壟畆獲于事育之餘自記狂獧之末咏歌孔子于熈洽之世尚志曾㸃于咏歌之所其得于天者亦厚矣尚何所願於外乎臨安陳基聞其言而韙之乃為咏歸操我朝于田我暮于室曷以自娯有琴有瑟我服惟春我樂惟親我欲浴乎沂濆匪舟兮孰先我津我欲風乎舞雩匪若人兮孰為我徒我葺我廬我讀我書我啜有菽我食有蔬我非恱此新構我咏歸兮匪夕伊晝我非愛彼流水我搴衣兮欲沿其沚聖如可作兮我從夫子呉儂謡時至正十四年秋七月海道都漕運萬戸府達嚕噶齊明善公方糴米賑吴呉民徳之作呉儂謡城上日出走匍匍呉儂負米行且呼漕府君侯長萬夫糴米食儂如哺雛君侯運粟輸京都都人食税復衣租又以餘力甦焦枯連年和糴喧九衢呉儂有粟不得哺遂令斗米如斗珠不貴楮幣貴青蚨非侯哀儂釡生魚昨日兒飢苦嗚嗚今日飯飽走如駒君侯長漕非剖符不忍赤子坐艱虞使君歸朝掌誥謨濟世昇平樂有餘天下米賤酒可沽上及父母下妻孥天子行當賜絳車君侯幸勿馳且驅送姪讓還呉西風蕭蕭鴻雁鳴行子悠悠随斾旌百年衣食仰奔走四海甲兵紛戰爭猥将筆札事卿相叨備戎行陪俊英軍中草檄吾何有馬上操觚汝所能人稱阿買八分好吾愛永興戈法精吾女吚嗄學言語汝兒讀書知姓名中年竊祿正為此使有石田歸力耕汝今還家我羇旅各勸加餐調寢興升堂冄拜謁從母兒妹踉蹌欣走迎扁舟石湖先上隴霜露既降草木零丁寧為我戒樵牧慎勿剪傷松柏青我欲還山結茒屋五岳逍遥期向平乞身時宰苦未許南望白雲傷我情分題太湖送鄭同夫朝飲太湖水暮咏太湖秋太湖三萬六千頃七十二峯居上頭上稟咸池五車氣下浸日月㴠斗牛䲭夷之舟從此逝功成身退合天道聲名萬古齊伊周江東步兵輕冕旒長揖齊王歸故丘蓴羮鱸魚何足道上與造物同遨逰唐家拾遺巢許流躬畊湖上食杞菊不與濁世俱沉浮三人之生不並世出䖏雖異心則侔至今血食太湖上上下雲氣蟠蒼虬今君遥别太湖渚鼓枻三髙祠下路借得龍威一夕風送君彭蠡湖頭去青絲絡馬頭送李彦章青絲絡馬頭㳺宦古蘇州蘇州城東萬斛舟前年運粟直沽口送别江亭折楊桞承恩頭挿上陽花錫宴尊傾光祿酒江上今年楊桞黄辟書千里有輝光勇騎閫外将軍馬飽食閩中荔子漿閩中兒女歌白苧把酒勸君為君舞将軍好文不好武自古閩中稱樂土八里荘寄呉中兄弟晩泊清淮口臨風一振衣長河吞巨海平楚沒斜暉未覺鯨波險惟憂羽檄飛故園兄與弟歡樂我多違送姪讓從軍武安送爾徐州去秋風幾日程水通彭子國山擁楚王城虎帳氍瑜煖犀船五兩輕從軍古云樂今我不勝情其二世亂難為别他鄉復暮秋媿予叨入幕念汝獨登舟季子裘空敝班生筆誤投恨無田二頃歸老石湖頭癸夘三月十一日常熟阻雨寄呉門分省同官一棹琴川路頻年此往還海風寒挾雨戍火夜連山澤國龍分節邊城虎㩀闗故人南省幕退食珮珊珊琴川懷古揖讓思虞仲絃歌憶子㳺學文須到魯議禮必宗周俎豆今如此干戈苦未休慚非割雞手安敢話屠牛寄沈仲説欲采芙蓉寄所思秋風江露正離離每因見月懐𤣥度可但看詩説項斯溪上燕辭華屋早槎頭魚上碧波遲太平無事差科了歸共原泉理釣絲其二野人籬落並江濆竹裏流泉竹外雲好學槖駝惟種樹莫誇司馬最能文小橋斜接漁樵路落日爭呼雁鶩羣獨憶咏歸亭上客久留城府思紛紛寄家兄敬徳庭闈一月違温凊兄弟終年嘆别離落日有時成獨立秋江無䖏不相思雲邊白雁初傳信籬下黄花預有期甚欲卜隣依北郭故人誰送草堂資秋懐寄玉山江上秋隂十日多思君不見奈愁何風髙澤國来鴻雁雨入汀洲落芰荷公子文章裁瑞錦美人衣袖剪輕羅畫船亦欲溪頭去聴唱花間緩緩歌次韻鄭遂昌奉謁范魏公祠皇皇巻服儼尊祠生氣渾如未死時天下功名韓相並闗西威烈夏人知英雄未盡匡君䇿父老頻瞻出牧旂昭代尚賢嚴祀事詩人聊得薦江籬次韻答秦文中學古艤舟復向三江口載酒欣逢二仲来丘園束帛已加璧将相求賢無棄才桞色緑欺頭上雪桃花紅映掌中杯也應别後無知己從此柴門不浪開其二婁江繫䌫已十日故舊獨逢秦與文氣壓元龍餘子服賦髙司馬九重聞西山柱笏聊容我東閣招賢欲待君解却金貂換官酒賞花時節正春分送成夫使呉門督漕事兼寄分院同幕諸公友挂帆南斗畧扶桑奉使寧辭道路長轉漕復輸滄海粟勤王爭羨紫薇郎風生漢節蛟龍避花繞吴宫雨露香同幕故人如見問為言憔悴鬢毛蒼次韻謝搃管送梅州判還崑山畫船撾鼓待潮回山色留人不受催官酒醉淹羅袖溼離筵愁聴竹枝哀秋風老憶淮南桂暑雨晴収海上埃莫學君家子真叟變稱名姓不歸來九日簡同幕諸公兼寄吴中兄弟官舎蕭條淮水濵一尊九日漫相親那知黄菊籬邊客不笑紫薇花下人秋鬢白嗔烏帽側衰顔紅愛緑醅新吴中兄弟應相憶悵倚春風北望頻癸邜二月十一日官軍發吳門去年移戍秋将半今歲度江春正分晉國偏禆歸宿将漢庭旗鼓屬元勲戈船十萬盡犀弩鐵騎三千皆虎賁却笑髙陽老狂客謾慿口舌下齊軍送嘉定偰知州偰家公子白狐裘兩度出為江海州誅求不廢農桑業撫字曾分社稷憂公勤職守古能吏清白傳家漢列侯老我叨居玉堂署送君欲泛練川舟哭夷白二首夷白即陳基也白髮江湖一病身平生積力瘁斯文師門偉器今餘幾藩國竒才獨數君共愛辭華追董賈肯将出處累機雲生芻不到黄瓊墓目極五湖西日曛老我歸來托逺林仙橈猶泛五湖深身名已喜全離亂生死俄聞變古今懸榻空餘徐孺恨絶絃真亂伯牙心無端又向溪橋立望斷秋鴻淚滿衿陪方厓翁緑水園㳺矚姚廣孝熟㳺境已常偶到興偏適園廬依古闉門扉掃塵迹芳景變清和羣植欣滋息雲浮曲渠水苔漬隂階石叢筠減舊緑蔓草餘新碧㳺蜂却乘霽歸禽自知夕臨幽憇煩跼遥思展芳席雖怡靜邊趣未達喧中寂兹因逢髙士庶以樂無斁奉答髙啟季廸清晨長松下聴禽坐逾深蘭章忽逺寄光華麗空林諷詠得宻意展玩慰離心春晴見猶簡况兹逢暮隂奉答楊基孟載恓恓泊城南春深抱幽獨餘花猶綴紅衆樹已滋緑兹因塵内居始憶山中屋何時陪騎㳺吟看舊題竹送友之松江得曙字潮來沙磧平月落海門曙汀蒲轉風葉堤栁揺烟絮江頭春可憐天涯人獨去有歌送君行無酒留君住雪浪沒沙鷗雲帆出江樹回首讀書堆青山不知處蠡口夜歸日沒渡口昏水風著人熱漁燈帶螢火㣲光互明滅舟人報水程路遥行欲歇故山不分明目盡心力絶遥想山中人待人仍看月蘿徑為陳維寅賦輿騎隘難通縈縈循磵曲蔓引行樵歩葉宻邀禽宿影分夜蟾白色帯春烟緑何當携孤琴閒行追妙䠱登錦峯竒峯起蒼旻秀色鬱可采靈石麗文華晴空炫霞彩斕斑駁青暈絪緼襍芳靄朝陽映猶輝夕隂膏還藹或云神丹仙鞭驅過滄海不經野火焚詎逐年歳改肅履曉飛陟昻然立如待延矚動幽抱架元時有在琴臺崇臺起雲岑夫差日逰宴七絃石上弹閒花落餘片風清答松響烟茸草成荐至今想餘音泠泠散秋院劍池湛盧埋伏深厓際立危壁波含金氣清苔吐鐵花碧龍光日夕浮蛙黽俱潜迹臨玩復何時吟餘慨今昔白雲泉隂泄自溶溶錦流仍脈脈輸練隔山青飛瓊混天白澗草帯幽香壁蘚漬餘澤昔曾汲飲來依松駐金䇿與王正仲㳺穹窿山㽞題顯忠寺隄楊飛花三月後殘紅已無穠緑有湖山風物尚可人登臨又喜同心友巒迴徑仄不用輿凌空曵杖盤旋走峯飛天外曉雲騰瀑流谷底春雷吼烟蘿葉蔽啼鳥羽風林果落飢猱手望中隠隠蘭若出僧子相逢信非偶暫留倦足憇孤榻欲豁吟眸啟孤牖詩聫美景意逾畫乳攪新茶味勝酒笑歌俯仰真自得盤桓不計時交酉去來奚足滯予心臧否何曾挂君口却嗟昔日不羈人今得微官即鉗杻我于竒勝儘窮討再理謝屐君須趣只恐天公忤人意風雨顛連不堪久明當歸去草堂眠輕橈仍繫沙邊栁送李煉師還呉薦紳吴下真澗藪獨欣東郭多交友我著田衣共頡頏形骸相忘歲年久閒止文章力追古宗常學問曽無茍來儀才廣班馬倫縱横筆下蛟龍走吹臺倜儻如達夫豈特百萬成斗酒萊過讀書猶滿腹議論風飛鉗衆口幼文詞翰俱清俊處敬温潤渾如琇仲亷居富曽無驕為學孜孜能謹守吁嗟諸子皆妙年自信黄鐘非瓦缶一時聲譽震乾坤萬丈光芒射牛斗鶴瓢先生清且秀深探道術持樞紐山房每與吾儕會茫然共入無何有我念披緇道不同豈知見愛情尤厚何如簡寂慕惠逺至今髙名傳不朽原修乃是先生姪道學向之能授受先生尸解已多年不意原修今白首余客朔方將廿稔故交零落存誰某形影相看我尚留命危脆若經霜栁原修忽作燕山㳺此會須知信非偶燈前笑語不肯歇舊好難忘常握手今秋欲返江南去鶴馭凌風如馬趣嗟我老矣不同歸雨泣如傾風夜吼八月二十日出城西眺望過楓橋登天平白雲寺謁圭上人翌日到西麓時林園靚深庭桂盛開天香滿屋可愛因懐韓奕先生不得共玩遂賦此詩以寄我年已老宜逍遥北還未得心遥遥盡言山中秋正好眺望不待山人招清晨拂衣出城去籃輿直過江村橋橋西衆山環紫翠隴坂惟見芃芃苗人家門巷盡桑苧經過始覺先蕭條沿流路狹曲難認僕子每問肩柴樵虎岩深伏樹蓊蔚龍門斗起山岧嶤白雲泉頭暫㳺目飛樓湧殿凌層霄主翁留我共禪悦且向竹所開山寮果傳石鉢貯圓眼飯來香積炊長腰盤桓自足世外樂兩鬢不計清霜凋行行又復過西麓山深那得聞喧囂松堂晝閒人不到庭桂花發蘿烟消沄沄泉底日影動冉冉雲外天香飄此時獨恨無良友豪吟謔浪從通宵䝉菴先生舊曽約路逺忍使兒童要先生有道我所愛眎身不寔如芭蕉逃禅往往入深谷交往霅畫并杭標何由乗興忽來此把手歡笑今應饒便當沽酒效慧逺且留靖節傾山瓢舟次松陵一上松陵道秋懐便不同櫓鳴漁浦雨帘曵酒家風沙鳥雙飛白江楓半帯紅離人千萬意都在短亭中重經常熟鉅邑當呉北官無接送勞水多歸海近城半在山髙僧寺餘庭栢人家盡野蒿重㳺逢日暮惆悵促回舠寄髙編修季迪濟濟登明日雍雍際盛時朝回仍載酒講罷却刪詩尋竹思龍阜看花戀鳳池自忘形服外㳺咏不須期送蘇州府都綱還呉綱教臨吴郡安僧自有方北山松桂秀茂苑芰荷香杖錫辭天闕袈裟上野航相看嗟别去渺渺水雲鄉題張山人適樂圃林館十首去官歸故里僑隱倚髙林花月尊前友松風席上琴幽通西崦曲凉入北風深此䖏堪清賞時來一觧衿其二巷僻無車馬閒扉掩薜蘿籠馴傳信鶴池養換書鵞開徑曽妨竹移梁欲避荷子雲真好古載酒屢相過其三虗館何幽絶深藏世少知桞雲堆夕檻蘭雨積春池戀客瓶存酒頥神局罷碁餘生無一事不用慕安期其四室中無異物左右盡圖書不共漁樵侣還同水竹居弟曾呈蠟鳳客欲棄銀魚我獨長來此清談得緒餘其五開牖依林樾迢迢去市遥翠低承雨竹緑碎受風蕉夕嶺還侵戸春流欲斷橋主人縁愛客時為出山瓢其六逺逺依山郭荆扉向竹開聚螢兒懶出相鶴客頻來坐飲杯浮月行吟屐破苔春深花滿徑蜂蜨為遲回其七花徑斜通巷榆林逺隔溪曉庭輕騎集春閣亂鶯啼野水流城北雲山峙屋西晩來吟興發獨往杖青藜其八一軒開小圃近水更悠然杏棟縈花霧芸忩宿篆烟竹藏鳩子哺苔襯鶴雛眠此地多風景悠然似輞川其九松桂圍林屋遥知處士家踈簾宵進月虗幌晩承霞藥味園中木詩材檻外花尋幽來到此母惜去程賒其十林居無俗韻琴史引來賔逕狹難容轍池深可縱禽登山新製屐漉酒舊裁巾我亦耽幽者他年願托鄰寄周鶴林廿載離呉下人傳少俊豪久羈燕地逺長想鶴林髙池影涵秋月松聲鼓夜濤南還如有日尋訪肯辭勞寄王光菴學優何不仕奉母向桑榆今古書千巻乾坤宅一區竹臨窓更宻蘿繞徑偏紆坐上賔朋少無營且自娱羊祜廟在吴城南大雲菴東沿河探環桑下悟前身幼節知君不酖人祗使才猷扶晉室肯施徳澤被吴民荒祠積雨爐生蘚古屋無風壁受塵今日經過思峴首舊碑剝落淚沾巾亂後入城有感槐桞隂殘第宅隳行看不忍歩頻移歌鐘寂寂無今日樵鼔鼕鼕似舊時人改衣冠逢罕識寺亡臺殿到還疑故交况盡東西去獨立斜陽倍感悲王汝玉省廬墓回京除翰林院編修兼春坊賛善賦此為賀賜歸上冢已還京復喜新除慰友情翰苑修文多寵貴春坊輔賛更恩榮墨濡彩筆松煤膩香染羅袍桂子清行見聖朝應大用不惟吴下播佳聲百花洲上逢陸五雲間小陸喜能文戯彩娱親是䖏聞今日百花洲上見蘋香荷影思紛紛送昻上人逰洞庭諸山西風飛錫度如舟來向湖山作勝㳺七十二峯青一色君看何處獨宜秋經無量壽院齊女門邊古佛祠小橋流水樹參差偶来看竹逢佳士指㸃園林説舊時十二月廿一日舟出楓橋遇大風河凍河邊三宿復歩歸西山海雲蘭若曉發楓橋上野航官河氷合路茫茫岸邊食宿連三日誰道家鄉是客鄉寄陳嗣初王汝玉昭代鮮遺逸夫人尚沉淪豈無乗時志華髮有慈親傾家具甘㫖勵操守清貧蹉跎四十載抱㓗将終身嗟我媿非才叨陪侍從臣荐章豈所惜知子情未伸滄海風霜晩故苑芳華新勉焉慎自保綵服髙堂春贈鶴林周𤣥初鶴林先生紫烟客丰神秀朗雙瞳碧早年學道逃人羣呉越名山遍逰歴靜中黙悟天地真却歸髙卧桃花春河東姹女未騰化滄溟回首揚紅塵丹書召入麒麟殿身披羽衣承燕見從此聲華傾上都五侯七貴爭迎餞西方神岳髙崢嶸詔遣先生祠百靈道旁奔走二千石人訝真仙降玉京禮成俯伏拜大庭珮環拂地風泠泠四門閎開對黄道五雲回綵垂金城是時君王方穆清龍顔顧盼喜氣生賜以石髓所和之大羮賈生前席何足榮罷朝上疏陳悃誠臣願乞身終素情綸音重降芙蓉闕特許先生返岩穴路出龍盤山外雲帆開揚子江心月青鸞白鳳來參差仙之子兮繽紛而相隨洞天㝠㝠兮千秋一時先生歸去兮猶未遲丹臺舊種金光草此際花葉方紛披懸知先生交構功已成欲将身與元化并長生之術倘可授我願相從閬苑行寄耕漁子徐良夫理世無遺逸君何獨遁逃方知唐虞盛乃遂巢由髙耕田中吴野下釣五湖濤帝力我安有熈然縱逰遨和徐髙尚同陳胡二文學虎丘逰集中呉饒佳逰兹山極殊觀磅礴踞臯陸㠝岏軼霄漢靈岩南蔽虧震澤西衍曼岧嶤見城堞參差瞻里閈飛甍凌巘出紺宇横林奐餘霞皎夕隂初旭縟晴旦宗周昔無象四國爭發難闔閭紹遺業傲倪霸東翰雄圖未終畢宫車忽云宴年遥代祠忽世變物情換深藏閟雨花曲池羃烟蔓崩厓留鑿紋石駮餘劍斷諸君美無度假日窮幽玩凭峭信多覽弔古亦増嘆重尋倘能卜偕行願相賛初辭長洲縣庠潜鱗貴幽沉迅翮當上征伊抱孱陋質俯仰難為情進趣既匪任退武復懐驚念往感多變顧始媿将傾兹焉幸返舊㳺息在柴荆谷行晨晻曖嶺眺夕澄明紅泉演紅澗碧磴披丹英時升烟霞表恍若凌長清素心自昭曠外物徒紛榮願同戰勝者觀化保嘉貞古磚篆文歌洪武某年范陽盧公武氏嘗過予城南舊居道出僧坊見甃壁古磚上有篆文隠起勢甚竒偉公武欲求得之時僧塗堊方飾吝損壊弗肯予今年余復見之因抉壁豪取而公武沒已數載遂歸于公武猶子次農并作歌紀焉夫此磚不知綿歴幾千百年始獲發于公武今公武沒又數載不為他人持去而余獲歸于次農是豈物之遇有其時亦世之好事者恒鮮得耶今年實洪武丁邜也范陽盧君好竒古羅網前聞用心苦荒岩窮澤遍探求斷畫殘鈎總裒聚昔過僧宇見陶甓上隱遺書可瞻覩斑㾗不假琢石磨缺角寧煩煉金補剝苔剜蘚試研尋浣土滌塵細摩拊未知纎悉無舛訛已覺縱横合規矩疑從盆缶窺禹鼎似向雀蒲獲荆楛世逺那能究源委紋完尚可推編部詭形轉摺龍盤拏逸態飛騰鳳騫舞整如康衢駕列駟踞若髙岡蹲怒虎氣吞鄢郢練三千價陋咸陽城十五蛇奔虺走莫徒誇劍㧞弩張安足數範撫既不類臣斯體骨未應同詛楚恍驚孔壁得科斗真訝岐陽逢石鼓吁嗟篆法久變化惆悵簡書趨莽鹵不知此字誰揮洒欲與籀史爭參伍緬想東呉稱伯強曽聞季札聴韶濩一時文物豈無傳千古字書當有祖後人自合重千金故物不宜充百堵擬令僕夫遂携挾無奈主僧猶吝予中心往來累朝暮躔次周流更子午我昨重来經舊地盧君已沒歸荒土壁傾僧去物幸存水濯雨淋文不窳巴人那識貴陽春甌駱由來賤章甫世無博雅同賞鑑獨發長吁為収取終然雄劍起豐城畢竟明珠還合浦可憐盧君難復生頼有阮咸能嗣武嘗臨滄海眺三韓曽入青徐弔梁父篋裏富儲金石錄胷中宏闢圖書府願言持送歸寳藏請共知音辨魚魯送人歸吴相逢不計别来年君鬢如蓬我皓然親友凋零知幾在江湖飄蕩喜俱全九重請告承新寵五桞還家老舊田明發京華又分别春風應送洞庭船寄呉中故人鄉心離思共依依吴水吴山悵久違客裏頻看流景換老来偏感故人稀百花僧舎思攜酒細雨春林憶采薇一枕漂零江海夢夜深空趂蝶交飛題畫送陳孟敷君家門掩綠隂低古木叢篁水郭西我向京華望呉苑桃花只隔武陵溪送趙友同之松江畫船曉發鳯城東江上青山雲幾重秋水遥天三百里片帆一夜到吴松送謝雪坡防禦出郭團練楊基朝催築城夫暮㸃團結兵民民皆動揺一日十數驚所賴官長賢撫勞得衆情防禦出郊来父老拜且迎垂髫及戴白羅列車下聴官家百萬師自足與寇爭汝自守汝鄉汝自保汝生閒暇茍不虞倉卒恐見傾我當習汝勞薄爾賦税征父老共感激闐然動歡聲旌旗洎甲矛五色稍鮮明豈惟備抄掠大敵固可嬰問君何能然子弟衛父兄平川雨初収馬嘶鼓鼕鼕相送不同往極目秋鷹横茂苑思二首輦路秋蓬滿野香圑緑濕嬪娥粉黛愁花鉛松露泣鶯聲舊時好玉砌秋歸早東家蝴蝶飛烟姿滿芳草白門答髙二聘君戊申之秋余謫大梁季廸嘗夢余與語若平生明日道路傳余已死季廸有夢余詩已酉春正月余獲侍親東歸季廸亦應召来京師相對驚喜因出示所賦夢予之作予既感季廸之念而復疑猶夢也歌以答之結交貴知巳不在早與遲嗟予識子晩淺深惟子知每于朋儕間擊節賞我辭前年呉城破子居我西馳交逰非不多獨念與子離相去日已逺數與禍患罹道路傳我死可信子尚疑日暮過我廬為我涕交頥今年我還京適子應詔来叶握手發長嘆示我夢我詩我昔患難中精爽無不之而子獨夢我與子若有期方子夢我初正我念子時春風鳥嚶嚶花發滿故枝為賣一斗酒痛飲春江湄生死固常理勿為達士嗤食燒笋留題陳惟寅竹間春雷一聲萬簮玉參差亂迸莓苔緑斬来掃葉當徑燃何異燃萁煮秋菽登盤查牙玉版肥焦尾碎剝蒼龍皮山人大嚼無物報寫作林間燒笋詩過陳湖贈寄周明府蘭苕參差桑柘緑細雨岡頭啼布穀人家破産給丁夫麥未上塲蠶已熟無蠶催絲綿無麥督税錢民間此愁誰見憐君侯為我解倒懸聞玉雪将還呉門桑葉重重戴勝飛行人多報故人歸鬢從别後星星出花到春深樹樹稀詩喜官閒能不廢身縁謀拙事多違便須出郭相迎迓遮莫南風雨滿衣懐王隱君正仲小几支頥却揜書身閒復喜見秋初山林自此縱横落絺綌于人次第疎沙鳥浴江明白鷺水花揺雨淡紅蕖相知獨有王摩詰兩月無詩寄草廬附王半軒次韻寄答懐刺歸來卧枕書白雲滿榻閉門初草𤣥未信楊雄病禮法從知阮籍疎短障夕陽悲蟋蟀方塘秋水老芙蕖南村口燥呼難得一任狂風攪敝廬懐髙著作季廸坐看清江飲白虹不知樓閣又秋風瀰漫禾黍蒼烟外零落芙蓉暮雨中富貴逼人驚變豹文章鳴世豈雕蟲清時欲草征西檄只有陳留阮瑀工徴趣赴京亂後人如冄得生敢于世上望聲名詩吟白屋惟安隱詔落丹厓陡失驚鳳闕有心求柱棁鯫材何量祗瓶罌不堪故舊愁分手楊桞楓橋第一程送周鍊師𤣥初還呉𤣥都春暖碧桃開鳴佩朝天到鳳臺夜檄雨龍江上發曉呼雲鶴洞中来黄精却老和泉煮丹橘娱親繞舎栽為問長生應有術早修真籙進蓬萊送僧住蘇州北禪寺六年江海一論心又聼鐘聲出禁林歸路暖風芳草合講堂春雨落花深未誇葛老三編論獨愛韋郎五字吟水月傍人塵不染待君重振海潮音哭髙季廸舊知鸚鵡才髙竟殞身思君别我愈傷神每憐四海無知已頓覺中年少故人祀托友生香稻糈魂歸邱隴杜鵑春文章穹壌成何用哽咽東風淚滿衿舟泊潯陽懐申屠衡江烟漠漠草毿毿且泊蘭舟近水南一鷺暝投槎外石雙鴻低拂樹邊嵐夢随春雨歸華屋愁逐東風上短簮桞色漸深人漸逺幾時花裏共停驂舟中聞鄰船吴歌有懐幼文來儀輕帆短楫泝烟波叠渚回舟奈逺何一路詩從愁裏得二分春向客中過江通漢水晴偏綠山入湘雲晩更多何䖏思君腸欲斷楚妃祠下聴吳歌天平山十四題龍門天開一罅通石古雙厓破中有波浪㾗知是龍飛過石室六丁運神斤鑿石為巨屋風雨繞入窓夜夜山鬼宿五丈石星落長百尺風雨忽中斷至今雷火焦突兀猶存半白雲泉冷冷白雲泉流向白雲邊泉水流不斷白雲飛上天一線泉石竇小如針泉飛一縷金天風吹不斷穿過白雲深卓筆峯露蘚凝斑管烟蘿束紫毫山靈罷揮洒卓立萬山髙釣魚磯父老兆作熊遺石此山久誰摻百丈竿重試連鰲手蟾蜍石神蟇月下来化作千嵗石曽吞玉杵霜清露時時滴頭陀岩頭陀不可見岩石似當時草長齊眉髮雲裁百衲衣華盖松飛盖結龍形斜扛九曲青流螢枝上落疑是紫㣲星飛来峯髙峯似玉臺何䖏忽飛来定向西天竺曇花頂上開四時亭泉聲四時清山色四時好不知寒暑移但覺松山老宿雲軒盈盈山中雲就我簷下宿昨夜雲不歸空閒半間屋照湖鏡團團山中石下照太湖影如何一鑑中三萬六千頃初歸吴中感事附郭好山逺近繞城流水東西人哭人歌夜月花開花落春風赤山閒居荷鍤繞籬栽菊解衣上石觀松甘分簞食瓢飲底須千駟萬鍾抱膝長吟梁父折腰寧媿鄉兒酒呼白堕朝飲米雜雕胡晩炊寄陳惟寅惟允坐有重氊食有魚眼能識字手能書山於秋水船頭看家在春波門外居氷連日困毒熱思氷不可得因賦五言排律一首書箑上亦庶幾望梅止渇之意也仍邀来儀季廸幼文三文學同詠凌室啟深藏殊恩錫上方壺清迷練色甌薄耀寒光當座人俱素登筵體共凉瑩含銀汞㓗甘荐蜜脾香淺碧迎歌扇微紅映舞裳明愁難作鑑堅恐易成漿瑞擬金窓雪勛髙玉井霜屏慚雲母熱簾詫水晶凉醉客狂思聶詞臣渇願嘗南峰宴坐僧空岩槁木形入定揜松扄鶴供銜來果猿看誦罷經雲霞埋衲重苔蘚上鞋青只有樵人識曽因采茯苓泰伯廟古者魯夫子曾稱三讓名後來秦失鹿劉項苦相爭寄錢翼之作賦擬相如何人誦子虗琴彈中散操扇玩右軍書北闕青雲近南冠白髮疏煩君傳遺逸著我入樵漁江南曲遥天碧蕩蕩逺草綠愔愔併作相思海春來一様深簡錢翼之碧樹綠蕪空亂雲故人何䖏隔江村舊書在手再三讀新恨從頭又一畨竹幘随行家具活蘭亭摹出典刑存幾時定訪楊雄宅為問太𤣥經裏言南峰歸雲菴雲伴老僧居翠㣲老僧應共白雲飛杖藜西去雲東去日暮僧歸雲亦歸吴中菊花盛開菊花三百六十種處處名園花不同安得化身千百億一花著取一吟翁呉江石橋新成五色何年補泬寥百弓無地架瓊瑶老龍千尺卧寒玉雌霓半空横彩綃天路行看星象逼江濤怒息水犀囂騎鯨便欲超銀漢直踐台階挹斗杓竹枝詞莫折閶門楊桞條帶将離恨過楓橋向道春愁不禁蕩蘭舟長放艫輕揺吳都文粹續集巻四十九
