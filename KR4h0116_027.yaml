body:
  text: 吳都文粹續集卷二十七明錢榖撰花果食品徭役園中牡丹盛開園丁折七品以獻格韻並勝各賦一絶范成大單葉御袍黃舟前鵝羽映酒塞上駝酥截肪春工若與多葉應入姚家雁行水晶毬輕盈嫌媚不耐風日又名醉西施又名風嬌又名玉勝璚縹眇醉魂夢物嬌嬈輕素輕紅若非風細日薄直恐雲銷雪融壽安紅深色粉紅多葉易種且耐久豐肌弱骨自喜醉暈粧光總宜獨立風前雨裏嫣然不要人持疊羅紅開遲旬日始放盡襞積剪裁千叠深藏愛惜孤芳若要韶華展盡東風細細商量崇寧紅勻染十分艷絶當年欲占春風曉起籹光沁粉晚來醉靣潮紅鞓紅猩唇鶴頂太赤榴萼梅腮弄黃帶眼一般官樣祇愁瘦損東陽紫中黃沉沉色與露滴泥泥香隨日烘滿眼艷籹紅袖紫綃終是仙風深紅牡丹王禹稱渥丹容貌著霓裾何事僧軒秖一株應是吳宮歌舞罷西施因醉悮施朱同前朱長文竒姿須賴接花工未必妖華恨洛中應是春皇偏重色却教仙女愧乘風朱䦨共約他年賞翠幄休嗟數日空誰就東吳為品第清晨子細閲芳叢新栽牡丹開遲有作沈周爛漫東鄰醉牡丹也持杯酒待花看却疑有為偏教慢亦料終開底作難貴介莫遊知地僻美人初聘耐家寒我無羯鼓相催發祇撚吟鬚日憑䦨賞玉樓春牡丹白頭杯酒重臨軒喜見名花又一畨春粉膩霞微著暈露紅濺玉淡生痕酷憐似醉還饒笑儘是多情尚缺言老眼相看聊見在逺謀何暇為兒孫咏白菊陸龜䝉還是延年一種材却將瑶朵冒霜開不如紅艷臨歌扇欲伴黃英入酒杯陶令接䍦堪􅜌著梁王高屋好欹來梁朝有白紗高屋帽月中若有閒田地為勸嫦娥著意栽和張賁雪彩氷姿號女華寄身都是地仙家有時南國和霜立幾處東籬伴月斜謝客瓊枝空貯恨袁郎金鈿不成夸自知終古清香在更出梅粧弄晚霞和皮日休已過重陽半月天琅華千㸃照寒烟蕊香亦似浮金靨花樣還如鏤玉錢玩影馮妃堪比艷鍊形蕭史好爭妍無由摘向牙箱裏飛上方諸贈列仙和鄭璧白艷輕明帶露痕始知佳色重難羣終朝凝笑梁王雪盡日慵飛蜀帝雲燕雨似翻瑶渚浪雁風疑卷玉綃紋璚妃若為寬裁剪堪作蟾宫夜舞裙和司馬都耻共金英一例開素芳須待曉霜催繞籬會見成瑶圃泛酒初宜傍玉杯映水好將蘋作伴犯寒疑與雪為媒夫君每向風流事應為徐妃致此栽蒔菊沈周合瓦圑圑縛小盆烟叢分蒔繞秋軒先教辨葉方知種更慮澆泉太漬根寒送餘甘歸藥籠晚投薄分與柴門開花解向天涯笑逰子何時憶故園寄題石湖海棠范成大手開芳徑越城頭紅錦屠蘇結綺樓不把萬枝銀燭照淡雲微月替人愁老懶居家似出家園林春色雨霑沙海棠尚有無心看天女何須更散花生色海棠沈周粉合胭脂作曉粧富於顔色吝於香東風不肯全分付相對梅花各斷腸海棠皆單葉别有蓮花海棠重葉豐腴如小蓮花范成大自蜀移歸吳中遂有此種吳人沈立嘗撰海棠記一卷石湖芍藥盛開因記舊事范成大萬里歸程許過家移將二十四橋花石湖從此添春色莫把蒲萄苜蓿誇竹西歌吹荻花秋遺老垂洟送逺逰羌笛夜䦨吹出塞當年如此夢揚州芍藥范成大北使過維揚買栽於石湖有深紅紫白諸色千葉重臺數種山茶朱長文柏葉元同翠桃顔未比紅留芳占春月弄蕊耐秋風自稱庭階玩休煩帟幕籠佳篇補韋白流品重吳中其二珍木何年種繁英滿舊枝開從殘雪裏盛過牡丹時對日心全展凌風幹不欹藥階如賦咏缺此尚相思山茶辭沈周惟兹古株以孤立兮后土敏樹根器固謐兮燦如渥若枝葉孔翕兮奕緑圑欒朱榮赩兮嵗寒雪霰芳斯發兮衆植搖落倮孑孑兮顧彼華滋裒然襲衣兮君子有常小人中非兮外縝內貞羌有此淑行兮材倨不振知受命兮物曲尚利工弗能遷兮繇棄而完遂生樂天兮敬以為圗賢足友豫兮山空無人聊與爾居兮山茶開於雪中有單葉千葉之異别有深紅者名寶珠山茶又有黃白色辛夷朱長文楚客曽留詠吳都獨擅竒風霆存老幹桃李避芳時名入文房夢功資妙手醫紫薇顔色好先占鳯皇池辛夷葉如柿正二月生花色白帶紫春夏再開初開如筆故又謂之木筆又一種花正白有香幹葉與辛夷一般以辛夷本接者吳中近來盛賞玉蘭沈周貞花為妖艷白賁幽除前杪枝愛兀贅叢玉天匠鐫清馥揚逺風標度逸於仙我生具素懷眼謝桃李妍㫖酒通微辭願言修淨緣錦帶花一名海仙王禹稱一堆絳雪壓春叢嫋嫋長條弄晚風借問開時何所似好將錦被覆熏籠何年移植在僧家一簇叢條綴彩霞錦帶為名卑且俗為君呼作海仙花郁李花賦陸龜䝉試問花翁得郁李之芳叢移來砌下出自山中長沾澗雨迥灑巖風曽不得次玉堂而展低艷承畫閣而逞微紅虛在芳菲之數徒干造化之工弱植欹危繁梢襞積一枝上能萬其膚蕚一蕚中自參其丹白且桃以夭而蕣以華芍藥為贈兮芙蓉可嘉誰為剪緗綺碎明霞鳯葆蘢蔥於水殿霓襟掩苒於雲車靜倚庭楹徐飄蕊氣落幽閨怨别之夢寫空谷遺榮之思初侍東陵聖母冶態嫣妍近辭北燭仙人愁容委墮嗟其結莓苔之地抱林麓之姿蝶喜舞而相掠鶯能言而見欺香憐墜少蒂戀飄遲當杯者不顧守道者應知請看嵇康高士傳莫信長安輕薄兒郁李花小花繁縟可愛吳郡送水仙花二大本黃庭堅折送南園栗玉花并移香本到寒家何時持上玉宸殿乞與宫梅定等差水仙花葉自強水晶宫闕雲母軿列仙夜宴曉未䦨仙妃倚竹翠袖寒捧黃金杯白玉盤勸酬未足雲中歡天門叫班奏祥鸞驚此綽約落塵寰嫣然花面明雕欄天香宮態氷雪顔江梅避舍不敢干肯與噲伍羞山礬說似詩伯平章看次韻龔養正送水仙花范成大色界香塵付八還正觀不起又斜觀花前猶有詩情在還作凌波步月看詠水仙花劉鉉山中有幽花姿容都且閒水仙之名本洞府何時移出來人間密葉垂垂冷愈碧烟霏作圑曉來積緑羅捲帶未周圍蒼玉簪長已盈尺齊紈魯縞綴繁英微風回雪飄輕盈湘靈玩月珮環墮神女戲水驪珠明江天搖落氷霜裏開共梅兄與礬弟欲集芳聲厭􅉅蘭肯逐穠華效桃李上人慧性奪仙機毫端幻化多神竒生絹聨幅寫數本倣佛仙子盟瑶池或持金杯倒醽醁或著黃裳面如玉或向雲邉下素鸞或去山頭乘白鹿天然巧相各有為不是爭妍效凡俗門徒得此久珍藏間持索我題詩章我今習靜愧饒舌披圖坐對渾相忘道心由來本空照有言那如不言妙茶餘捲軸客出門獨對南山成一笑水仙花賦徐有貞百花之中此花獨仙孕形秋水發采霜天極纎穠而不妖含素華而自妍骨則清而容腴外若脆而中堅匪凡工之雕刻伊𤣥造之自然敻獨出乎風塵之表兮憺幽貞以忘言爾其族生璚洲分植琪榭華宫琳館靡所不舍先春而開後春而謝粧不改于粉黛香何藉乎蘭麝時從變乎炎凉景無殊于畫夜若乃芳敷南澤翠發中坁儼如王母宴於瑶池秀挺芳田英翹蕙畹又如上元遊於閬苑至于微雲細雨乍伏乍起倣佛巫靈夢彼楚子輕隂薄陽半露半藏恍惚宓妃見彼陳王或倚修竹露華朝濕一似湘娥掩袂以泣或傍寒梅月影宵浮亦如漢女弄珠而遊或侣幽蘭碧霞之壇有若文簫之遇綵鸞或依蕉緑層臺之曲有若蕭史之偕弄玉皎皎乎其若飛璚粲粲乎其若雙成綽約乎其若神人之處姑射淡泊乎其若素娥之居廣庭或踈或密或信或屈叢者如隱擢者如出千姿萬態狀莫能悉然此特舉其形似之末而未究其理趣之實也是故氷玉其質水月其神挾梅兄與礬弟接蘭桂之芳鄰宜紉佩于君子亦結縭於幽人臭不奪于蕕香不染於薰操靡摧於霜雪氣超軼乎埃氛懷清芬而弗眩兮乃獨全其天真非夫至德之世上器之人孰為比擬而與之倫哉亂曰清兮直兮貞以白兮發采揚馨含芳澤兮仙人之姿君子之德兮水仙花有單葉千葉者紅薔薇陸龜䝉倚墻當户自橫陳遮得貧家似不貧外布芳菲雖笑日中含芒刺欲傷人清香往往生遙吹狂蔓看看及四鄰遇有客來堪玩處一端晴綺晚烟新和韻皮日休誰繡連延滿户陳暫因遮得陸郎貧紅芳掩斂將迷蝶翠蔓飄颻欲挂人低拂地時如墮馬高臨墻處似窺鄰秖應是董雙成戲剪得神霞寸寸新薔薇紅白雜色多生水邉别有金沙寶相刺紅紫玫瑰金樓子佛見笑皆其類也又一種黃薔薇格韻尤高木香項彥同天遣司花寶笈開鮫綃散剪碧雲堆芳根移自蠶叢逺薰釀曽隨鳳詔來秖恐飄風撼新竹却驚殘雪觸蒼苔水仙欲逞幽香壓山谷似無詮品才木香細朵垂條匝地有黃白二種黃香淡而白濃窗前木芙蓉范成大辛苦孤花破小寒花心應似客心酸更憑青女留連得未作愁紅怨緑看擕家石湖賞拒霜水上晴雲綵蝀橫許多蜂蝶趂船行漁樵引入新花塢兒女扶登小錦城艷粉明粧朝日麗溼紅浮影晚波清誰知搖落霜林畔一段韶光畫不成九日無菊賞芙蓉沈周芙蓉九日爛尊前籬腳黃花苦未鮮素謂及時翻落後本開遲者却當先紅粧風露秋無價白髮年光醉有緣今許滿頭還亂插齊山笑口不須偏芙蓉紅白二種生多傍水陸者為木芙蓉一名拒霜瑞香花范成大萬粒叢芳破雪殘曲房深院閉春寒紫紫青青雲錦被百叠薰籠晚不翻酒惡休拈花蕊嗅花氣醉人醲勝酒大將香供惱幽禪恰在蘭枯梅落後瑞香花紫色而細一叢千朵生葉之中香極穠馥次王正之提刑韻謝袁起巖知府送茉莉二檻范成大千里移根自海隅風帆破浪走天吳散花忽到毗邪室似欲橫機試病夫燕寢香中暑氣清更煩雲鬢插瓊英明粧暗麝俱傾國莫與礬仙品弟兄再賦二首薰蒸沉水意微茫全樹飛來爛漫香休向寒鴉看日影秖今飛燕侍昭陽憶曽把酒泛湘灕茉莉毬邉擘荔枝一笑相逢雙玉樹花香如夢鬢如絲茉莉海南來者花香而白今吳中家家有之次韻袁起巖郡沼雙蓮圗珠淵玉水折方圓湧出雙蓮照酒邉壓倒小湖三級草增光後沼兩重蓮苕華名字元相並桃葉根枝本自連好把吳歈翻楚些陽阿新曲勝當年洞庭小湖寺舊得瑞象有草繞之投草湖中生三級紅蓮皮日休有木蘭后池重臺蓮云兩重元是一重心皆吳中瑞故事而未有雙蓮之傳也再賦郡沼雙蓮三絶館娃魂散碧雲沉化作雙葩寄恨深千載不償連理怨一枝空有合歡心池光䦨檻倚斜暉把酒看花醉不歸但許鴛鴦相對浴休驚翡翠一雙飛兩岐秀罷已蒿萊春意還從菡萏來不是使君和氣勝此花應向别人開小松陸龜䝉擢秀逋客巖遺根飛鳥徑因求飾清閟遂得辭危敻貞同柏有心立若珠無脛枝形短未怪鬛數差難定况密三天風方遵四時柄那興培塿嘆免答鄰里病微霜靜可分片月踈堪映竒當虎頭筆韻叶通明性㑹拂陽鳥胸掄材膺帝命名山記云松有兩鬛三鬛七鬛言如馬鬛形也言粒者非和韻皮日休婆娑只三尺移來白雲徑亭亭向空意已解凌遼敻葉健似虬鬚枝脆如鶴脛清音猶未成紺綵空不定隂圓小芝蓋鱗澀修荷柄先愁被鷃搶預恐遭蝸病結根幸得地且免離離映磊砢不難遇在保晚成性一日造明堂為君當畢命栝子松俗名剔牙松雖産他郡而吳中為多故家有踰百年者或盤結盆盎尤竒可沉子而生又有檜樹亦可盤結二種僅可供庭除之玩耳小桂一子落天上生此青璧枝歘從山之幽斸斷雲根移徑挺隱圭質盤珊緹油姿葉彩碧髓融花狀白毫蕤稜層立翠節偃蹇樛青螭影淡雪霽後香泛風和時吾祖在月竁孤貞能見怡願老君子地不敢辭喧卑和韻陸龜蒙諷賦輕八植擅名方一枝才高不滿意更自寒山移宛宛别雲態蒼蒼出塵姿烟歸助華杪雪㸃迎芳蕤青條坐可結白日如奔螭諒無􅞑音鶯翦憂那是蕭森時洛浦雖有䕃騷人聊自怡終為濟川楫豈在論高卑嵓桂范成大風簾踈爽月徘徊悵望人家把酒杯病著幽窗知幾日瓶花兩見木樨開越城芳徑手親栽紅淺黃深次第開不用小山招隱賦身如強健日千回一株蕭索倚宣華東苑香風屬內家丹碧屠蘇銀燭照平生竒絶象山花少城圃中有一株建康東御園有亦不多四明丹桂特竒州宅所種尤茂蔚嘗與魏丞相飲其下詠庭前桂沈周庭前有芳桂聳立自孤生時當風露淒顧發黃金榮翹處羣植間悠悠揚德馨衆穢豈不忘氣稟莫相能桂與木樨當是二種今吳中秖有桂新竹皮日休笠澤多異竹移之植後楹一架三百本緑沉森冥冥圎緊珊瑚節欹斜翡翠翎儼若青帝仗矗如紫姑屏槭槭微風度漠漠輕靄生如神語鈞天似樂奏洞庭一玩九藏冷再聞百骸醒有根可以執有􅘽音福竹譜云竹實也可以馨願稟君子操不敢先凋零和韻陸龜蒙别塢破苔蘚嚴城樹軒楹恭聞稟璇璣化質離青冥竹璇璣玉精受氣于𤣥軒之宿色可定雞脛實可招鳳翎立窺五嶺秀坐對三都屏晴月窈窕入曙烟霏微生昔者尚借宅况來處賔庭金罍縱傾倒碧露還鮮醒若非抱苦節何以偶惟馨徐觀稚龍出更賦錦苞零食楊梅薛章憲南村諸楊傳自古人道卞山勝聚塢吳船已備宿舂糧盡說道逺且多虎闔閭城中十日留捨得二南東道主鵓鴣饒舌管隂晴意在布榖宜甘雨物無兩便可奈何忍見紛紛委泥土荷擔入市走歷碌憔悴滿筐多呰窳終朝傴僂手自掇尚冀拔十可得五猶勝居家不出門日日檐頭俱莽鹵醉後還求茗醉君繫船門外垂楊浦主人好事甘足繭走使山中懸重估倏見堆盤置我前出自望外喜欲舞屬國還憐得乳羝詩人肯信無童羖省煩不及閔仲叔刻畫從人笑傖父初食楊梅楊循吉楊梅本是我家果歸來相對嘆先作往來南北將十年久不食汝已忘却憶從年小在吳中食已成傷難療藥年年端午即有之街頭賣新先附郭初間生酸帶青色次見熟從枝上落吳儂好竒不論錢一味才逢須倒槖生時薰蒸喜烈日所怕狂風隂雨虐有紅有白紫者佳大如彈丸圎可握生芒刺口易破碎到牙甘露先流齶王船奉貢畫夜走數枚出賜惟臺閣其餘官小那得預說著江南懷頗惡吳人鹽蜜百計收不知本味終枯涸肉存液去但有名奪以酸甜無可嚼我今到家又遇夏正是高林雨方濯滿盤新摘恣狂啖十指染丹如茜著細思口食亦小事其來乃以微官博使豫不有故山歸安得香鮮列堆錯人生百嵗在適意忍口勞勞何足樂薰楊梅沈周摘落髙林帶雨枝碧烟蒸處紫纍纍肉都不走丸微瘦津略加乾味轉滋鳥口奪生鮮恐爛龍睛藏熟久還宜珍飱品作楊家臘報寄須當費我辭楊梅吳中名品不減閩之荔枝出光福山銅坑第一聚塢次之人家以此薰之薦客尤妙枇杷賦薛章憲皇有嘉實貽于富媼剛徑外挺堅貞內抱實玉顆兮彈丸葉金刀兮剛卯爾其舒花耀日擢穎凌霜褫素縞被黃裳剖雉膏截鵝肪薦雕爼侑玉觴摶瑞露咀璚漿陋道旁之苦李失召南之甘棠故夫千百綴枝十五並蒂熒熒水蒼纍纍火齊獸有王孫兮朵頤而諦窺鳥有公子兮駭目而增逝酢失緑橙甘分丹荔皓齒咀兮犀欲動纎手剝兮蟬自蛻若夫淵材抱恨子京獨嘆氷水晶熒兮溶暖蔗霜璀錯兮流寒珊瑚木難兮槎牙而麗網夜光明月兮鑿落而走盤既乃移根上林投種下土琅玕周廬翡翠當戶列亞夫之棨㦸植寄奴之葆羽巴橘寧論卭蒟奚取沾雨露以濡沃凌雪霜而徑度若夫牡丹朝酣海棠夜睡卿雲旖旎以零亂緋霞紛紜而剪製倐忽殞穫須臾淪替借兒女之戲玩發壯夫之深喟豈若遊龍夭矯修蛇詰屈四時不凋凜貞松之操一朝而盡笑柔桑之菀匪光榮易歇而德焉二三蓋深固難遷而志則専一樛枝婆娑聳幹兀律謝春紅之灼灼含晚翠之鬱鬱者歟枇杷出洞庭山初接則核小再接無核摘櫻桃賦蔚含桃之嘉樹兮藹彌望而不極青絲幄兮翠綃羃之青兮水之碧粲含桃之甘實兮紛磊砢而漈渿紫璚膚兮青玉蒂日光珠兮火色貝炯纍纍兮丹更圓煥離離兮蠟作丸素手擎兮銀絲籠丹膚映兮赤瑛盤鳳之啄兮絳實破鶯之含兮紅豆殘翠筠筐兮野人玻瓈碗兮大官措大異耳富媼同焉委大順兮樂復樂譏夫君兮然復然菱唐東嶼交遊萍荇似菰蒲懷玉藏珍類隱儒葉底只因頭角露此生不得老江湖菱王氏武陵記云兩角曰菱三角四角曰芰其葉似荇白花赤實其花晝合宵開隨月轉移猶葵之向日舊說鏡謂之菱花以其面平光影所成又有紅白二種白者為餽飩菱惟長洲一種出顧邑墓特大而美謂之顧窑蕩崑山一種如顧窑蕩而味略減謂之婁縣菱今訛為留逺芡實楊萬里江妃有訣煮珍珠菰飰牛酥軟不如手擘雞腮金五色盤傾驪頷琲千餘夜光明月供朝嚼水府靈宫恐夕虛好與藍田餐玉法歸編辟榖赤松書芡葉似荷而大俗名雞頭狀類雞首也出吳江者殼軟色緑味腴出長洲車坊者色黃有粳糯之分蓴菜鮫人直下白龍潭剖得龍宫滑碧髯晚起相傳蕊珠闕夜來失却水晶簾一杯淡煮宜醒酒千里何須更下鹽可是士衡殺風景却將粘膩比清纎同前高啓紫絲浮半滑波上泛秋風憶共香菰薦吳江葉艇中同前韓奕采蓴春浦作羮嘗玉滑絲柔帶露香却笑張翰未知味秋風起後却思鄉蓴菜出吳江味甘滑四月生葉似鳬葵莖如叉股短長隨水淺深名絲蓴即張翰所思者茭白許景迂翠葉森森劍有稜柔條鬆甚此輕氷江湖若借秋風便好與蓴鱸伴季鷹茭白即菰也八九月間生水中味美可啖中心生薹如小兒臂名茭手或名茭首以根為首也各縣有之惟吳縣梅灣村一種四月生名呂公茭茭中生米可作飯即菰米飯也然今未有作飯者芹高啓飯煮憶青泥羮炊思碧澗無路獻君門對案成三嘆芹生春澤中潔白有節其氣芬芳鱸魚蘇軾金橙縱使里人知不見鱸魚價自低須是松江烟雨裏小船燒薤搗香虀同前楊萬里鱸出鱸鄉蘆葉前垂虹亭上不論錢買來玉尺如何短鑄出銀梭直是圎白質黑章三四㸃細鱗巨口一雙鮮秋風想見真風味秪是春風己迥然鱸魚即四腮鱸出吳江長橋南者味美肉緊縷而為膾經日不變出橋北者三腮味鹹肉慢隋煬帝謂金虀玉膾東南佳味也鯉魚張雨桃花鱖魚世常有蓴菜鱸魚浪得名試喫江南鯉魚尾侯家無此一杯羮鯉魚諸魚中惟鯉最壽且大吳人謂其小者曰鯉花河肫魚梅聖俞春洲生荻芽春岸飛楊花河肫當是時貴不數魚蝦其狀亦可怪其毒亦莫加忿腹若封豕怒目如吳蛙庖煎茍失所入嘴為莫邪若此喪軀體何須資齒牙持問南方人黨護復矜誇皆言美無度誰謂死如麻我語不能屈自思空咄嗟退之來潮陽始憚食龍蛇子厚居柳州而甘食蝦蟆二物雖可憎性命無舛差斯味曽不比中藏禍無涯甚美惡亦稱此言誠可嘉河肫嘆范成大鯫生藜莧腸食事一飽足腥腐色所難况乃𠂻鴆毒彭亨強名魚殺氣孕慘黷既非養生具宜謝砧几酷吳儂真差事網索不遺育捐生決下筯縮手汗童僕朝來里中子饞吻不待熟濃睡喚不譍已落新鬼録百年三寸咽水陸富殽䔩一物不登爼未負將軍腹為口忘計身叨死何足哭作俑者誰歟至今走末俗或云先王意除惡如藝菽逆梟與毒獍嵗嵗參幣玉芟夷入薦羞蓋欲殱種族死生有定數短命烏可續適丁是時者未易一理局黿鼎公子怒羊羮華元衄異味古所珍無事苦畏縮駢頭證此語戒諭秖取瀆聾盲死不悟明智諒己燭河肫魚有毒烹調失宜能殺人吳人甚珍之謂其脅為西施乳蟹志陸龜䝉蟹水族之微者其為蟲也有藉見於禮經載於國語揚雄太𤣥辭晉春秋勸學等篇考於易象為介類與龜與鱉剛其外者皆乾之屬也周公所謂旁行者歟參于藥録食疏蔓延乎小說其智則未聞也惟左氏紀其為災子雲譏其躁以為郭索後蚓而已蟹始窟穴於沮洳中秋冬交必大出江東人云稻之登也率執一穗以朝其魁然後從其所之早夜觱沸指江而奔漁者緯蕭承其流而障之曰蟹斷煆斷短其江之道焉爾然後扳援越軼遁而去者十六七既入于江則形質寢大于舊自江復趨于海如江之狀漁者又斷而求之其越軼遁去者又加多焉既入於海形質益大海人亦異其稱謂矣嗚呼執穗而朝其魁不近于義耶捨沮洳而之江海自微而務著不近於智耶今之學者始得百家小說而不知孟軻荀楊氏之道或知之又不汲汲于聖人之言求大中之要何也百家小說沮洳也孟軻荀楊氏聖人之瀆也六籍者聖人之海也苟不捨沮洳而求瀆由瀆以至于海是人之智反出于水蟲下能不悲夫吾是以志蟹蟹寄陸魯望皮日休紺甲青筐染菭衣島夷初寄北人時離居定有石帆覺失伴惟應海月知族類分明連瑣蛣形容好箇似蟛蜞病中無用雙螯處寄與夫君左手持和陸龜䝉藥杯應阻蟹螯香却乞江邊採捕郎自是揚雄知郭索且非何𦙍敢餦餭骨青猶似含春靄沫白還疑帶海霜强作南朝風雅客夜來偷醉早梅旁謝客惠吳蟹宋祁秋水江南紫蟹生寄來千里佐吳羮楚人故使𠂻留甲齊客何妨死願烹下筯未休資快嚼持螯有味散朝酲定知不作蟛蜞誤曽厠西都博士名謝吳正仲遺蟹梅堯臣年年收稻買江蟹二月得從何處來滿腹紅膏肥似髓貯盤青殼大于杯定知有口能噓沫休信無腸便畏雷幸與陸機還往熟每分吳味不嫌猜寄賈耘老沈偕黃粳稻熟墜西風肥入江南十月雄橫跪蹣珊鉗齒白圎臍噓吸斗膏紅虀須園老香研柚羮藉庖娘細劈蔥分寄橫塘溪上客持螯莫放酒杯空洞庭蟹高似孫天雨洞庭霜寒驅蟹力忙全然空俗味只是作詩香酒已方才熟橙猶未肯黃讓渠茶竈火和月煮滄浪蟹凡數種出太湖大而色黃殼軟曰湖蟹冬月益肥美謂之十月雄出吳江汾湖者曰紫須蟹出昆山蔚洲者曰尉遲蟹又江蟹黃蟹皆出諸品下吳中以稻秋蟹食既足腹芒朝江為樂蟹采捕於江浦間承峻流緯蕭以障之名曰蟹斷蛤蜊梅堯臣紫緑常為海錯珍吳鄉傳入楚鄉新尊前已奪霜螯味當日蓴羮枉對人蛤蜊産於海口紫緑者佳蟶沈周海户求仙食填筐管族繁杴泥深詣窟緣殼暗尋門撱玉容生摘凝酥怯過燔著薑相打合漬酒與溫存角聳蠻娃髻纑纒拙婦魂味叨人口腹菑纍爾兒孫比類憐吹詬含津憶吐吞庭霜委故蛻沙雨沒虛痕薦爽山杯後休將蠣蛤論蟶出海邊似蜆而長襲美以魚箋見寄因謝成篇陸龜䝉搗成霜粒細鱗鱗知作愁吟幸見分向日乍驚新繭色臨風時辨白萍文魚子曰白萍好將花下承金粉堪送天邊咏碧雲見倚小窗親襞染畫圖春色寄夫君奉酬見答魚箋之什皮日休輕如隱起膩如飴除却鮫工解製稀欲寫恐成河伯詔試裁疑是水仙衣毫端白獺脂猶溼指下氷蠶子欲飛若用莫將閒處去好題春思贈江妃砑花箋李衡三月江南花滿枝風輕簾幕燕初飛遊人休惜夜秉燭楊柳隂濃春正歸其二崔嵬霜幹欲凌雲俯映寒梢數尺春須信蒼然明信老坐中客有散花人箋唐有魚子箋宋顔方叔嘗創製諸色箋有杏紅露桃紅天水碧俱砑花竹鱗羽山林人物精妙如畫亦有金縷五色描成者士夫甚珍之范成大云蜀中粉箋正用吳法元有春膏水玉二箋魫色尤竒又以絸紙見䗶色兩面光瑩多寫大藏經傳流于世故有宋箋元箋之稱近年所造者幅小于昔雖便用而無古法萬眼羅范成大龍綜繅氷繭魚文縷玉英雨絲風外皺雲網日邉明叠暈重重見分光面面呈不深閒裏趣爭識箇中情琉璃毬弱骨千絲結輕毬萬錦裝彩雲籠月魄寶氣繞星芒檀㸃紅嬌小梅粧粉細香等閒三夕看消費一年忙吳燈兩品最髙鏤氷影裏百千光剪綵毬中一萬窗不是齊人誇管晏吳中風物竟難雙老人燈華幼武熠熠衣冠勝後生青藜入市賀升平掃除白髮三千丈透徹丹心一㸃明側耳笙歌疑有聽凝眸珠翠獨無情時人莫道風中燭南極星辰自有名走馬燈周庚何人刻紙作遊龍尾似流星耳逐風皎皎練光馳隙過紛紛逸景過羣空溝分楚漢驚圍突陳接燕齊訝火紅一躍便當三萬里不知局促在環中鬪雞燈吳寬坐上初看吐綬紅夜深童子忽開籠羽毛爭訝分明處烽火都歸踴躍中句到孟韓猶覺晦力如劉項慢爭雄獨持一炬當尊爼輸與朱翁善折衝走馬燈鐵騎交馳映落暉長戈應藉魯陽揮真成烽火連三月早築金城已四圍矢石聲沉堅莫破旌旗影轉疾如飛伯仁一炬非相戲信落兵家第二機燈往時最多范成大詩有琉璃毬萬眼羅二燈為竒絶他如荷花梔子葡萄鹿犬走馬之狀及擲空有毬燈滚地有毬燈又有魚魫鐵絲及麥幹為之者一種名柵子燈在魚行橋盛氏造今不傳即雲南所謂繚絲燈也近有作羊角燈酒府五絶白居易變法自慚到府來周嵗惠愛威稜一事無惟是改張官酒法漸從濁水作醍醐招客日午微風且暮寒春風冷峭雪乾殘碧氊帳下紅爐畔試為來嘗一盞看辨味甘露太甜非正味醴泉雖潔不芳馨杯中此物何人别柔㫖之中有典刑自勸憶自饑貧應舉年脫衣典酒出江邉十千一斗猶賒飲何况官供不著錢諭妓燭淚夜粘桃葉袖酒痕香涴石榴裙莫辭辛苦供歡笑老後思量悔殺君看壓新醅寄懷襲美陸龜䝉曉壓糟床漸有聲旋如荒澗野泉清身前古態燻應出世上愁痕滴合平飲啄斷年同鶴儉風波終日看人爭尊前若使常能渌兩綬通侯總強名和韻皮日休一簀松花細有聲旋將渠碗撇寒清秦吳只恐篘來近劉項真能釀得平酒德有神多客頌醉鄉無貨沒人爭五湖烟水郎山月合向尊前問底名謝姑蘇學士寄木蘭堂官醞梅堯臣公田五十畝種秫秋未成杯中無濁酒案上惟丹經忽有洞庭客美傳烏與程言盛木蘭露釀作甕間清木蘭香未歇玉盎貯華英正值菊初折便來花下傾一飲為君醉誰能解吾酲吾酲已不解百日毛骨輕洞庭春色蘇軾二年洞庭秋香霧長噀手今年洞庭春玉色疑非酒賢王文字飲醉筆蛟蛇走既醉念君醒逺餉為我壽瓶開香浮座盞凸光照牖方傾安仁醽莫遣公逺嗅要當立名字未用問升斗應呼釣詩鉤亦號掃愁帚君知葡萄惡正是嫫母黝須君灔海杯澆我談天口酒唐有五酘酒宋有木蘭堂洞庭春今其法不傳惟煮酒以臘月釀貯小瓶旋賣名生泔蒸過泥封為煮酒可以經嵗或入木香豆蔲金橘諸品則各以其類名之香冽超勝轉販四方謂蘇州酒别有白酒名秋露白蓮花社茅柴茶塢皮日休閒尋堯氏山遂入深深塢種荈已成園栽葭寧記畝石窪泉似掬岩罅雲如縷好是夏初時白花滿烟雨和陸龜蒙茗地曲隈回野行多繚繞向陽就中密背澗差還少遙盤雲髻慢亂簇香篝小何處好幽期滿岩春露曉煮茶皮日休香泉一合乳煎作連珠沸時看蟹目濺乍見魚鱗起聲疑帶松雨浡恐生烟翠倘把瀝山中必無千日醉和陸龜蒙閒來松間坐看煮松上雪時於浪花裏併下藍英末傾餘精爽健忽似氛埃滅不合别觀書但宜窺玉札茶出吳縣西山榖雨前采焙極細者販於市爭先騰價以雨前為貴也昔洞庭出茶嘗入貢水月院茶載茶經續記松花餅張雨怪來粔籹作鵝黃渾是蒼髯九粒香甜味中邉唯食蜜苦心早晚待休糧仙人騏驥留看取道士嵩陽逺寄將笑比紅綾春餤巧齒牙根底嚼糖霜松花餅春夏之交山人取松花調蜜作餅頗為佳勝僧家尤貴之油堆吳寬膩滑津津色未乾聊因佳節助杯盤畫圗莫使依寒具書信何勞送月圑曽見范公登雜記獨逢吳客勸加餐當筵一嚼誇甘美老大無成憶膽丸油堆用粉下酵裹糖製如餅煎食之堆一作䭔團子淨淘細碾玉霏霏萬顆完成素手稀鬚上輕圓真易拂腹中磊磈便堪圍不勞劉裕呼方旋若使陳平食更肥既飽有人頻咳唾席間往往落珠璣圑子撚粉為丸范成大詩撚粉圑圎憶二品俱為元宵節物徭役承愛寺院事件自熙寧行保甲罷耆戶長壯丁而法始變至元祐復耆戶長壯丁猶以保甲而法大變及紹聖而後以耆户長壯丁錢盡歸公上而法盡變民避役如避寇舉世盡然端平既正經界而按籍選差于是因數都義役之舊一以乾道詔書從事排年任役率田供費條畫列之規約宸㫖丁寧一一具載之曽未二十年更革幾無復移而受害者大抵如故今托義役省劄著之據平江府狀據常熟縣知縣王議申竊惟賦役二事關於民生利害最大本縣戶版龎亂奸吏縱橫官督虛籍之賦民苦破家之役追惟其弊不忍復言當職自初到官亟圖所以救之修復經界整比版籍民按實産受常賦貧富大小幸就明實倘不及時圑結義役則作僞詭寄以自利尚氣者紛糾前功盡廢抑恐後患滋多乃分委鄉官勸率役産參合都分主客之勢斟酌地理寬窄之宜量役費之輕重准助田之多寡經始于端平丙申四月竣事於嘉熙丁酉五月繕寫成帙申府僉印發下外其間更有數條事體稍重關于義役修廢乞從本府備省朝札下本縣遵守併札提舉常平使司㑹施行一本縣九鄉五十都義役田地共五萬五百二十畝一角五十八步五尺五寸嵗收租米麥共二萬四千九百九十八石六斗四升一合一勺已隨都分大小分撥與保正聽其任便收之以助役費有餘不足官司更不復干預其田並係常平物業不許公私典賣亦不許移易轉換違者按法坐罪其助田之家將來富者不加增貧者不許收入仕而免者不給還一諸都舊亦各有役田止緣役首掩取田租或獻納本縣板帳庫或獻納常平司旋即鬼名侵佃官司茍目前之微利不暇為赤子深謀庸錢不除役費日重在板帳庫者二百餘畝在常平司者見議申乞所有今來見管義田日後並不許奸民獻納官司亦不當收受一保正長向來充役之費最為浩輸保長既為産去稅存逃亡户絶等戶代納稅租保正者亦抑之催科例行賠納其他色目尤多如保正則有科供竹木科取􅀢果科買糟酒節序燈油接官器具檢尸定勘之費保長則有著役召保請結虛限出豁簿書除夕冬至二節供送吏胥之費加以上落牌頭開拆司苗稅按誅求無藝已一切禁戢蠲免其申本府及諸司永與蠲除後如吏胥更有纎毫科擾即仰役人與機察糾率衆戶經縣及經上司理訴一今將各都新排經界田籍備録二本印押交付機察謹密收藏每遇人戶典賣田産並許具狀經縣陳乞送下機察仰置簿打號發下保正役主內係起催夏稅以後入狀者即責付新苗保長內係新催秋苗以後即責付新除保長令取責契照及兩家砧基㸃對保明類申機察類申本縣送鄉戞局參對官籍移割其詭名寄産者繳回原狀嘉熙元年八月二日奉聖㫖王爚修復經界義役職事修舉與轉一官並下浙西提舉司平江府常熟縣永逺遵行宋職田則例給與文武官飬亷地民佃起糧上自八斗七升下至六斗三合三勺宋咸平二年復唐制吏得職田供祭祀六縣通管六萬六百八十畝有竒租一萬八千二百石有竒知軍府事八百六十石有通判軍府事句僉判句教授句節推添差節推句察權句知録句司理司法司户監糧科院監糴納倉監都稅監在城稅務監贍軍庫監都酒務監比較務句排岸巡司轄司句總管句路鈴添差路鈴句路分添差路分東南第二正將句南一廂官南二廂官北一廂官北二廂官常平司提幹茶鹽司提幹文臣支鹽官武臣支鹽官黃姚押袋官江灣押袋官監黃姚鹽場監江灣鹽場監南倉鹽場各有差知吳縣事三百石知長洲縣事三百六十石知崑山縣事四百四十石知常熟縣事六百八十石知吳江縣事三百八十石知嘉定縣事一百五十石各有竒縣丞主簿尉及巡塘官巡檢句監酒務監稅務以下各有差元則平江路達嚕噶齊總管各一員每員田八頃同知治中府判推官經歷知事提控案牘照磨承發架閣蒙古教授兩醫學教授録事司達嚕噶齊縣尹録事句録判各有差吳縣長洲二縣達嚕噶齊縣尹每貟職田二頃縣丞縣尉典史巡檢各有差崑山常熟吳江嘉定四州達嚕噶齊知州每員職田四頃同知州判提控案牘都目各有差海道都漕運萬戶府達嚕噶齊正萬户副萬户經歷知事照磨檢校通事驛史鎮撫千尸達嚕噶齊正千尸副千户止有祿米無田國初蘇州衛太倉衛指揮僉事亦有撥賜田嵗收米一百六十石今無寬恤稅糧詔㫖洪武四年中書省宣使張彬賫詔開讀免過秋糧二百四十二萬六千八百石有竒六年八月奉㫖今年三四月間蘇州各縣小民缺食曽教府縣鄉里接濟我想那小百姓好生生受原借的糧米不須還官都免了七年中書省劄付奉㫖體知蘇州松江嘉興三府百姓每好生缺食生受今年夏稅合納的絲綿錢麥等物盡行蠲免恁省家便出榜去教百姓知道有司糧長毋得科擾按洪武初官田重額止於七斗三升而今民間乃有一石三斗一石六斗或二石者蓋莫知其所始豈所謂抄沒官田者乎固非定則也且洪武中正耗不過二百一十四萬然猶屢下寬貸之詔均徭巡撫都御史崔恭劄付據長洲縣老人呈先䝉巡撫侍郎周公念蘇松稅糧繁重百姓艱難深惟民情均其徭役將鄉都通縣排年里長編成定次一應差役每名出銀一兩輪當一年歇息二年酌量輕重多寡朋合造冊在官猶如車輪而轉吏無那移之弊民得輕鮮易完至今民有去思之念後䝉本府知府汪滸編作上中下九則之法上戶重役中户中役下戶輕役然其中以病民者有四九萬人户付在吏胥之手年月無拘名數不定難以稽考易生奸弊一也數年之內消長難期二也年直部𨽻兵正副出銀一十二兩尚有往回使用不計中等之家卒難收集三也今本縣以從九則之冊㸃選戶役其豐盈庫子併各倉斗級俱應於九則册內㸃選今又著里長保選非惟重叠錯亂抑且奸弊復生假如本區人户王韋關里長保殷實人戶納花紅價銀二兩九錢則冊內㸃出貼𨽻兵銀四兩上下難以相照重役多端者四也如䝉允乞照侍郎周公所立法及弔本縣原造文冊詳看仍舊施行參照所呈有理合行劄付本府轉屬從公查勘計議停當開列前件定奪施行馬頭利病呈稿成化十四年巡按劉魁問及馬頭利病有吳縣二十八都耆民陸伯良具呈竊思洪武年間原是北方土民買馬當夫後太宗文皇帝憫土民買馬艱難故此聖㫖暫借南方百姓買馬當夫過三年仍著土民買馬替他回來欽此至今百有餘載因循不曽改正又南方百姓不習水土不諳馬性多是雇倩土民養馬既費庸直身又不得歸農况又不才驛官串同南北馬頭故將馬匹空餓倒死以規買之利以致市鬻兒女破蕩家産莫若照依欽㫖事理仍著土民養馬當夫止令南方百姓買辦馬價鋪陳等件不拘馬匹高下例以三年五年為限如馬過期不死亦是本驛官吏畜馬有方即以其價歸之如不及期亦是本驛官吏人等不行用心或揑病死之故必先期給與事體既定則土民自然用心養馬無妄揑倒死之弊南方百姓亦情願辦直以免著役當差之苦南北皆便又聞前巡撫侍郎周忱設法前項馬價鋪陳已于秋糧中科取謂之義役米後官府于秋糧中既徵義役米又取辦馬價實為重復亦望查考舊案仍於義役米中或積出餘米內取辦尤為便益等因未得施行楊侯清理賦記周倫國賦莫要於田均賦莫善於井井田之法廢也久矣而國之用日殷征斂之法橫焉溢出雖田之名棼然雜糅重者曰官田輕者曰民田賦則重輕頓相倍蓰近世仍之未之裁酌遂為成法務在取盈以足常賦不均之嘆溢于道路莫之能告也然賦莫重於蘇松崑山又蘇松之重者民勿能勝弊源益漫宣德間周文襄公忱受命董其事而撫綏之凡由區以領圖圖以領墟墟以字拆號以數編賦以則定其冊曰流水圖曰魚鱗以序姓氏以正封洫於是田有定數賦有常額其間肥瘠高下之等未遑創議嵗久籍殘胥徒倚奸規制紊亂甲乙飛詭宕懸濫若倒瀾㑹計不足則加賦於民羡積之餘則歸諸私槖遂使純良小民賦贏而産薄産去而賦存者訟牘蝟興逋案山積監司安其常守令制于分豪強沃利訾議沮撓欲湔滌而一新之難矣同安楊侯逢春尹崑之明年洞惻民隱核之父老告之明神力主清查之議毅然任之靡所顧忌令邑民陳表以供役遣蚤夜自厲搜輯故圗籍稽之故額索弊端而比之法其自首者聽發匿伏之奸釐減增之弊一圗籍可慿燦若指掌巧者靡容其喙拙者獲享其成計其清出之數得米二千九百石有竒雖不能盡復文襄之舊而今日圗籍真後日之文獻也豈曰小補之哉或曰若之何而後可以均田均賦以立不刋之典曰夫田固有髙而瘠有下而瘠者亦千百中之一二也請於上責之良有司有察其瘠之甚者而酌之而薄其賦於是盡取其餘酌而均之夫疇曰不可侯今既辟夙駕在道耆民盛信輩攀不可得請紀其績於石以告來者吳都文粹續集卷二十七
