body:
  text: 吳都文粹續集卷九明錢榖撰公廨倉場恭儉齊說徐有貞吳邑丞金華鮑君宗誠嘗以恭儉二字揭之官舍之楣使來請言以敷其義余為之嘆曰鮑君其知所以修身之道哉人之過恆生于惰慢而患恆生于侈肆過與患并而欲身之善且無危不可得矣君子知其然故修之以恭儉恭以持巳儉以制用古之道也王者以恭儉治天下諸侯以恭儉治其國卿大夫以恭儉治其家士庶人以恭儉治其身然恭儉之為恭儉也其行之要必有禮義焉恭中乎禮儉合乎義此恭儉之善者也恭而不中乎禮則勞矣儉而不合乎義則固矣孔子入公門而鞠躬如也過位而色勃如也君在而踧踖如也朝與上大夫言誾誾與下大夫言而侃侃鄉黨而恂恂燕居而申申夭夭此恭之中禮者也顔路請車為子淵之椁而弗與遇舊館人之喪則脫驂以賻之冉求請粟饋子華之母而弗從于原思之貧則與之粟九百此儉之合義者也故凡聖賢之言恭儉必以禮義為之主焉不然共工之象恭公孫𢎞之詐儉何以别乎此君子之所當辨者也余又聞先聖之傳易有曰致恭以存其位是守位莫若恭也而近世名卿亦曰惟儉可以助亷是養亷莫若儉也夫養亷守位君子有官之大節而泰侈者之藥石也豫故重為鮑君言之鮑君生長文獻之邦熟聞儒紳之論而又嘗遊于京師從事名公巨卿之間其所知見廣矣于是勉焉以禮義自修而致其恭儉之行則聖賢可學而登爵與位可得而守也况于佐邑乎邑令葉君𤣥圭余之斯文交蓋博雅君子而以亷名也鮑君于其政務之間從而質之其尚有所益哉泰民堂記陸德輿長洲龔令君作堂縣圃摘翰林王公壁記語扁以泰民既屬豫書且諗以記豫懼專斯堂之美遜者再請益切豫不可得而遜在易上坤下乾泰陽氣下降隂氣上騰隂陽欣合萬物生遂天地之泰也王澤下流物情上達上下相孚百姓恱豫君民之泰也天地之泰天地不能自泰也必有賴于贊化之主君民之泰君民不能自泰也必有賴于宣化之臣宣化之臣其最近于民者莫令若也令最近民使民之泰則易然盍即泰之卦觀泰之象思所以致泰之由乎泰之六爻惟九二言治道為詳其曰包荒用馮河不遐遺朋亡者包荒含容也馮河斷制也不遐遺無忽于小朋亡無牽于私交泰之兆實繫于此反是則不交不交否矣然則令之于民庸可忽乎必也居之以寬納之以仁學愛之化如彼武城率之以信斷之以明不擾之政如彼蒲庭毋頑之忿毋細之鄙當若上蔡視之如子毋邪爾思毋側爾蹈當若姑臧不改其操如是則氣之所通和之所致薰為嘉祥以蟠以際民其不泰乎其或弗操弗鉏弗究弗慮如彼曲阿徒事求譽為酷為豺為暴為鷙如彼義縱直法行治愁歎不聞疾疚不顰有若惠南罔念恤人利障不屏欲源不澄有若陳倉率斂自營如是則氣之所閼怨之所鍾形為咎徴是萃是叢民其可泰乎天下者一邑之積也一邑之泰天下之泰所由推也一令之賢一邑之泰所由致也董子曰今之郡守縣令民之師帥也夫惟聖明在上師帥之賢參錯天下則天下之民胥泰矣長洲地大物繁臺府鼎立夙號難治君處之裕如知所先後户庭無滯訟田野無寃聲始至撤犴狴新之將去以空囹圄蓋數十年來未有如公所謂生民之泰其有漸乎幾之矣觀君名堂可以知君之用後之來者毋第以零陵三亭視是役也經始于淳祐庚戌八月落成于十月為楹若干為費若干役成而民不知又可書也已君名潗今淮東常平使者基先之子其賦政固有源流云中奉大夫新改差知溫州軍州事陸德輿記并書泰民堂在縣圃淳祐十年龔潗建長洲縣重建丞㕔記方杍國家建官倣唐舊制自九寺三監萬家之邑率置丞員所以重其任二其長也邑于民為最近丞于邑無所不當理漢後元之詔曰縣丞長吏也長洲為縣創于唐天后朝乾元中置為長洲軍至大厯五年而復舊國朝中興吳居三輔長洲土廣民衆素號難治為丞者非材術兼茂有理人之績莫得而著稱焉浚儀趙君帝室之胄沈酣經學挾其所有取甲科佐江隂幕淳熙改元轉而丞兹邑視民如愛子馭吏如束溼興利除害邑人宜之君蒞民葉再黃矣政成而民有餘力年豐而物不疵癘視事之所棟宇欹橈榱桷朽蠧上漏下溼殆弗可居于是發私財以佐其用度故地以全其基役以麇至工以巧獻無損于公無憂于民㕔事廊廡輪奐一新為三十餘間塈塗整密瓴甓淨滑髙其閈閎固其垣墉使後之居者得以賴其利焉工既告成邑士願紀其嵗月以傳示將來杍居是邦見聞君之政稔矣今之人視官舍猶逆旅顧弗毁而加葺已無幾積在官餘祿為居間之助亦理然也君秩行滿又斥家財以給費求古循吏罕見儔比貪者聞風庶亦知勸噫昔之建一堂創一亭猶侈其事以詒後人若君謨之清暑子瞻之喜雨是矣觀君此舉匪為逰玩之所加于人數等其可無書乎君所以設施于一邑特其小小者爾推而上之庸可既哉姑書以為記云淳熙四年三月朔莆陽方杍記丞㕔在縣治西淳熙初重建主簿題名記周南天下雄鎮校一歲征賦之夥若姑蘇者不一二而支縣長洲苗以石計者九萬二千三百有畸自占籍五等而上應輸之户五萬通歲合夏秋輸為鈔萃於邑者六七萬簿應時據案小吏執牘曰此為甲此為乙稽其籍米鈎之凡一户之賦有輕重等色輸有先後不相均齊非一閲再閲輒隨手可了也簿筆不停未日晏腕欲脫巳離立缺伸索憩去簿間有志頃不離局不追逐人事不數數上官籖調而後能專或其人以曠達自解或憒憒弗強或情隔勢阻而所委事衆則其職廢此豫耳目所接往往皆然嘉定庚午春陽羡周君大猷始刻壁記而屬文于豫噫設官者固未有若近民者之重也今仕者習于簿而憚為尉何哉豈非以尉之事難工而簿之事易偷耶然尉不才盜不發明不求尉也簿失職民重輸根本且剝矣然何必壯縣如長洲者簿為重凡欲厚下而平賦者雖十室之邑必自丞若簿始矣大猷字允叔亷行而文故資政殿大學士簡惠公孫也初紹興十三年部使者得廩人刻弗深考建請出隱剩益秋賦為七十萬詔即州創經界司行之將推其法于天下㑹簡惠自湖移蘇守難之且辭其所以然部使者屈始以圗志之舊為三十四萬至今所在猶言經界方量之為便而不見增賦之為永患者實自簡惠爭之始也則其為德豈止是邦而已哉然公卒坐論斥餘十年而龍學徐公稚山亦自里居議使者括田謫矣豫少時長老猶能道簡惠之事而歌思之者今去之七十年矣而大猷世其科而來仕姑因其請既為之識其官之當勉者且并著其先世之遺恩以永邦人之思焉記始于尚書郎豐公誼而下其前則歲月弗可考矣周南記主簿㕔密邇縣西紹興十七年尹機重建重建長洲簿㕔記黃士特長洲主簿㕔在縣治少西紹興十七年縣長尹侯機所建也經始茍簡計不及逺矮屋數椽陋甚歲久蓋障穿缺支柱欹危潦雨至上漏下溼坐榻一日數易夜聞聲􅒂然則懼其覆之壓也慶元丁巳仲冬上浣豫承乏庀職既弛瞻顧鬱悒則有意圗新焉然簿職卑力凉毫髮公費皆仰給于縣曩時長官或秦越相視居此者憚煩避謗蓄縮不敢謀因循嵗月則弃去若傳舍亦勢然也豫獨癡不自止試令梓人平章以圗來諗竹瓦木石計㑹􅊏悉略巳素定越一年乃以請于今大夫黃公宜公治縣有聲而友僚佐如兄弟喜曰此公家事耳子能躬其勞吾何靳焉于是考日鳩工昉于季秋之戊申迄于仲冬之己丑貿材于市募傭于肆民不與知而工以辦告糜縣帑之緡四百五十有八廩斛二十有四余亦捐俸百千以佐用前門一間廊屋八楹㕔東西偏翼以兩軒可待賔至寢之後為丈室安明窗四面時暄凉啓門甓以禦溼于娛親為宜繚以垣墻髙丈餘闢小徑通縣圃其西有敗屋數間撤舊取新為圊湢庖爨之所是居也不侈不庳于今若未足視音則已夸豫且滿去後之來者無忘營創之難以時增葺其將多于前功不則因敝塞墐亦可為數十年之利然非豫所料也書生每事欲為無窮之思正與北山愚公可同一笑姑識豫意于石時六年庚申三月初吉長樂黃士特記山隂孫應時書長洲丞題名記滕宬自秦孝公集小都鄉邑聚為縣置令丞至今襲之凡丞以承其長為職不以一職稱令能且專則丞無職丞能職或過于令令職號最繁不越其邑丞或為郡守部使者所才則牒紛至雖其郡事與旁邑與旁郡之邑事皆或與聞之至往來無常處令丞之職顧不繁于令哉屬籍趙仲權為吾鄉之長洲丞長洲與吳分治郡下俱劇邑多督領郡之雜務而邑諸鄉訟理逋租嵗且盡輒麇至塞庭廡則與令分丞之職雖繁精力常有餘謂吳有丞㕔壁記長洲不可獨缺乃考居前者得二十四人記于石仲權至官書再考餘七月餘矣今又攝縣事凡上官委以事弗辭遇事輒辦治弗為疾聲厲色拒人人亦莫敢凂以私者夫介不逺物潔不亢已勤不苛撓敏不遺忽吏能盡此矣仲權有焉可記也仲權名彥綰今為從事郎在任政績居官以文行亷吏薦者五人考滿當擢京秩仲權之嚴君右司公以清節稱宬幸一識氣骨徑直目光瞭然仲權蓋肖之慶元三年七月上浣滕宬記長洲縣續題名記史顯卿古者壁記非特志爵秩到罷嵗月而己唐元次山作道州刺史㕔記彰善指惡寓鑒戒隱然有春秋褒貶法當時貪黷苛刻者挂名其下寧不愧死乎縣視郡不侔也然生植齒類欲其能撫摩休養則同長洲縣題名始立于天禧王公嘉言續于紹興石公珵今續記涉厯兩政不暇識顯卿不敢廢也命石刻之往者不可諫來者猶可追其無忘次山之訓云紹定改元二月上浣承議郎知縣事史顯卿記長洲縣續題名記謝鳯長洲以縣名自唐萬歲通天中有縣以來不知令凡幾畨政凡幾新矣皇朝天禧間廷評王公嘉言蒞政于兹始揭題名石于㕔事建炎之亂官舍焚蕩石亦隳壞自是軍興草創更數十政不暇議逮儀真石公領邑事之二年新作茂苑堂顧題名闕然無復舊事乃訪録遺文得斷石于瓦礫間倣佛可續其存者熙寧四年五月以前而己如其文刋之于石改置于堂之左又搜次補綴自元豐三年以來僅得其官秩姓名者二十有五人其到罷嵗月槩不可得而詳别刻石以刋于後俾來者續而書之尚永永無替紹興九年六月日主簿謝鳳記縣尉司題名記周復尉與丞簿咸贊而長然各有攸司弗相侵也使盜不入境户不扃夜惟尉能爾也長洲縣北邑江湖所瀦盜鼓枻出沒尉曠弗治則人靡寧居擬注者必銓擇乃授顧不重歟大梁趙公汝滂奮跡儒紳志趣髙潔乃不卑是而辱臨之威望悚聞境內以肅吏事明敏百廢修舉暇日悉取前任姓名而次第之其到罷升遷則繫之于下將鑱石以傳逺使來者視前有考而景慕夫官達者兹非賢乎豫幸得與名其間且屬以序屢辭不獲夫題名公廨古咸有勸戒之意存此闕弗具豈前人未之思耶抑力有不逮欲為之而未能邪二者必居一焉兹用自愧姑掇大槩以成公志云慶元丙辰季夏庚申承直郎差充髙郵軍軍學教授周復序長洲尉㕔記曾復姑蘇之屬邑五皆壯哉縣惟茂苑實治郡之東北隅自齊門北出一里其鄉曰金鵝里曰金杯是為尉治㕔宇隘陋蓋建炎兵火間所作舉簷與桷則偏墜如張弓他木類是南榮下垂過者率傴僂否則觸首是懼厯五十餘年更二十餘政弗改作也豫始至官欲撤而新之慮其勞民以自奉乃弗果今計兩月即滿去顧不可以纍後官則請邑長白事陽羡邵君軾欣然領㑹乃剟錢五萬粟數斛相是役又征地租於富民趙升得錢六萬豫蒞官三年凡六修小長橋有餘材輒儲以俟用異時鬻私販者沒官船物得錢則鼎分之一以給捕者一以充公費通計三嵗所入凡十萬有竒豫乘敝壞之後鉦鼓旟幟弧弓戈鋋之屬悉亡焉三年之間儲繕略備而此錢所餘什之一乃諏剛辰乃撤敗屋乃增故基木石竹葦磚甓丹雘所需百物悉撡幣以貿其徒蒸蒸相率趨事甫匝旬㕔事告具前軒後廡不華不儉又以退材益以新木作新竒軒屋合六間修東西兩廡合十間又兩旬告成自經始以至訖事凡役二徒合九百七十二人計口給粟課工酬直又時酌醪醴以勞苦之人不告罷事用告成有賀厦者曰惟尉于民是親向也廷宇弗治階等無辨于焉臨民奚以起敬一旦輪奐若斯望者肅然吾不惟矜子之勞且以尚子之能請為子記豫曰凡物之興廢有時時之當興雖庸人亦能集事吾適與時㑹耳敢誇于前人哉奚其記如曰更造孔難宜以告來者俾加葺焉庶勿壞則吾能奚以煩執事客曰然則子志之乃伐石以志淳熙十一年甲辰立夏日桐川曽復記尉㕔祥符圗經云在齊門外去縣三里續志云在齊門外緣塘一里許淳熙中曽復重建㕔西有臺下臨塘岸扁曰竒軒帥正堂記韓雍濟寧陳君文淵景泰間為監察御史以言事得左遷今上復寶位之初起君宰蘇之長洲君感激思所以報稱乃名其出政之堂曰帥正蓋取孔子之言之意欲正其身以道邑之人皆正也致書屬豫記豫嘗觀之物焉南山之陽有松厯嵗既久凌空直上日升而中中而昃隂雖時移而亭亭之勢未嘗見其欹側也樛木盤枝屈節容光之處從而印之是知表之正與不正影必隨焉守令為民師帥職皆親民而令于民尤親民之表率也令之邪正民罔不從是故令能仁則民尚忠厚能亷則民重亷恥能儉則民息豪奢能勤則民戒荒惰能恭謹則民無干犯之非能安靜則民無奔競之恥與凡一舉止之美一禁令之善民皆是效是從不然彼將曰令長民且有祿位而其為人若斯吾屬何不可哉吾蘇為江南名郡齒姓之繁賦稅之重物産之美且盛雖提封百里非他方大郡所能及故守令之選嘗難其人君起家為名進士為良御史再轉為今官下車未踰年和平簡易之治邑之人無老稚賢不肖踴躍愛戴靡然從風非帥之以正豈易能哉孔子曰上好禮則民莫敢不敬上好義則民莫敢不服上好信則民莫敢不用情于斯足徴矣然豫將少進焉士君子讀書明道致用于時有志于為德為民者孰不欲趨于正哉然崇其名者或違其實謹于初者或懈于終君尚當守之以恆使嚴苛峻刻不發于情竒巧玩好不萌于念侈靡之風不作于日用宴安之氣不設于平居禮以接人不長其驕道以守身不慕乎外凡所為無不正焉則吾民耳濡目染久而化成其風比隆于淳古君亦可以方古之循吏無疑矣古之循吏非一人論者以卓魯稱首卓令密儒術為治道不拾遺魯令中牟德化為理孺子有仁心固皆帥之以正而然後卓封褒德侯魯位司徒至今嘖嘖傳聲名君誠以古人自期則名位所至孰能禦之哉否則名實不符登斯堂者指而議之矣君尚畏之崑山初秋觀稼回縣署與同寮及示姑蘇幕府張方平邑民三萬家四邉湖海繞家家勤稼穡市井嬉逰少荐嵗逢水沴飢勞何擾擾我來忝撫字見此心如搗去秋僅有年髙田尚停潦今幸風雨調皆話天時好春喜鵲巢低夏更蟬聲早吳民以此候旱潦飢穰拏船袂參差葑岸縈回繚藝插暮更急車聲達清曉紡筥猶掛壁何暇張魚鳥我時行近郊小艇穿萍藻渚長葭薍深野沃𥝧稏倒孺子逺餉歸閒暇顔色飽預喜省敲笞租賦可時了歸來軒館清曠蕩盈懷抱衙退人吏散庭廡閒窈窈露篠映孤亭風荷動幽沼置身木雁間兹焉願終老顛蹶走榮利况豫拙非巧鱸鱠飯紫芒鵝脂酒清醥悵然懷友生虗齊為誰掃題縣圃藴輝亭周承勛瓦礫頻年積鋤耰十輩功旋移低地碧頗雜亞枝紅對酒逢寒食憑䦨接暖風墻慳天自濶堪送北飛鴻崑山縣重修察院記楊循吉𢎞治癸亥嵗春監察御史彬陽馮公祗奉上命按于蘇松常鎮四府所至振舉憲度紀綱一新吏民奉法無敢犯乃七月行部至崑山是邑也直蘇東境七十里巡必首先公入居行臺覩弊漏狀召邑令吳君議將修之曰吾聞昔之賢雖一日必葺其垣宇况兹出令地乎于是吳君諾惟謹公為下文書斥帑餘為經費蓋始于其秋而成于明春作閲七月訖功厥有㕔以蒞政門以啓閉堂寢以燕食廂廡庖湢各事其事凡為楹間三十五大仍小更豐約有道木材塊甓咸𨽻于工師蓋終事而民不知勞焉公既以吳君為能且謂兹役之作所以嚴等威修制度謹防間而非得已也于是乎有書石之命惟我國家採用漢制嵗遣憲臣按行天下刺舉不法因達民隱而布之德惠實天子所倚以圗治者而于畿內加詳故分四郡特設以蒞之然則威之所加在郡郡重在邑邑重豈其居府而容有玩略焉此公作興之盛心也雖然修室于此而有腐焉必去之有良焉必植之作而有法在政斯類公其然乎且公之至冬嵗適荒歉飢民嗷嗷公疏請于皇上免稅六十八萬有竒又自裁革均徭二千餘役凡省鏹幾二萬緡其明年又奏䝉恩准輸折色糧三十三萬省米三十萬石留為賑濟公之功大矣哉公名允中字執之成化甲辰進士建白屢上克恢大猷蓋其心存經濟若此吳君名祺豐城人𢎞治壬戌進士慎以有為觀其績可知也用敢併書于是庶他日得有考焉常熟縣記陳映上方駐蹕臨安于時吳門視周畿內漢三輔唐同華我舊京之陳鄭也衣冠之所鱗集兵甲之所雲萃一都之㑹五方之聚上腴沃壤占籍者衆雖前代與全盛時猶不可同年而語府邑之事宜其獨重况乎府庫之出內獄市之浩穰蓋不待較而知者環府之邑五而常熟居其望焉時邑籍以户計者八千九百七十有二而今五萬一千一百三十八夏賦金錢為緡二千八百其幣帛匹合萬二千六百而竒弗詳秋租穀粟七萬六千餘斛乃合折帛為緡者十萬二千三百而斛財損其舊二千邑之事其倍稱何如哉今其邑從事于民者如是而邑復濵海道直故疆沂密萊全齊在望刺利規恢舟師所宿則實居今日之要害風檣連林夜嚴震海資糧巨萬以日饋給營繕百須以時調度茍有不至責且交萃若兵民之事又如是重以府所倚集月四大萬版輸委風雨寒暑不渝比為令者材或不濟負罪投劾而去項背相望也則壁記之不列何以自警朝夕庸少惰乎映不佞爰來既厯年所事定得間始閲次中興以來為令者至映之名氏授受之月日謹鑱石壁端以告來者噫令秩比京寺月俸十餘萬廪逾四斛歲入圭田直過六百石其顧一巳之利害去就而不思其責之塞將不特能禍其身千室之邑亦必有受其弊者而映其敢墮哉今吾邑之人或知映有不敢墮也率以淳風簡孚交相為治將由是日進庶乎列名下方其無辱若夫邑之望則巫咸所止之山太伯所葬之墟言偃所居之里龔景材所表之閭其風俗之美猶可概見而邑之升置凡附于府者有職方氏不記記其今昔之同異云淳熙元年邑令陳映記常熟縣丞題名記張溉琴川吳都之劇邑也賦稅之重獄訟之繁非他邑比以纍致大夫數更易而二令者類不得少休溉再轉而丞兹又適多事之秋攝事幾年所謂松竹佳趣乃變為鞭笞之地庭槐無存㕔宇漏壞俱未暇過而問焉兹幸令尹葉君來此年餘百廢具舉政平事簡僚佐得以少安遂可留心悉與葺理皆成倫緒獨不見有題名記心竊疑焉因灑掃書齊得二斷碑于塵埃間拂拭視之則其記也歲久字泯漫不可覽殊失所以重前賢之意易以琬琰而刋前後賢者之芳字豫亦得以托不朽顧不幸歟嘉定改元歲在戊辰首夏望日錫山張溉書常熟縣主簿題名記趙汝郕邑令丞而次有簿古職員令也掌凡邑之簿籍勾稽之事糾正縣內之治外此無責職若甚簡然豈知户籍有升降産稅有去留悉關筆削一有不謹則墮吏奸民且受病矧琴川繁劇甲于中吳去臺府才三舍逺財賦分督牒訴委決檄命驅馳靡日不殷職亦未為簡也汝郕冒承兹乏汲汲救過自惟無足以傳後惡有所謂光于前者試求前人之名氏稽其行事以質其窮通而壁記闕然漫不可尋往者莫知究訪之故老僅得今尚書蕭公而下十有三人焉前乎此者莫知也將立石以記之或乃謂人材短長政事臧否民言士論亦可以考惡用是為哉余應之曰公議誠足信然閲歲滋久名且不著實將安考今之所訪巳若此余恐後之訪今益不如今之訪昔也奚以詔方來僉曰然乃鑱之石嘉定戊寅十一月初三日雲間趙汝郕記簿㕔在縣治西與丞㕔對常熟縣尉題名記徐次鐸縣有尉居丞簿下然號劇曹與縣令埒厯代選用常艱其人強者作聰明苛察操切以擾吾民弱者不勝任縱奸長惡以害吾民其當官以威畏稱職聞者異時以之宰邑刺史司察一道皆可判然迎刃而解常熟為浙右壯縣地巨事叢吏狡民猾並江濵海而東界為盜藪古有二尉分治長老傳聞廢置歲月無考爰自合并以來舊矣雖仕于此者材名文士往往間見然未聞有卓然超越為當世聞人者用是奔走巡徼日不暇給率弗遑問其逺者大者此壁記所以不立而前事之師後事之鑒來者泯無觀焉今尉黃君應酉建安竒士也由始蒞職洎兹垂滿寬而栗威而不猛加惠黔庶芟除豪強黠吏束手受制所𨽻弓兵不寒而栗部內賊發輒搜捕得其主名逺鄉鄰境藉其威聲巨奸大盜漸以屏息今兹盜賞踰格將換京秩行脫迹泥蟠而強弩之末猶賈餘勇植志敻邈去如始至大懼題名未創無以傳後自我作古勒兹堅珉豫見其材諝之華政事之美嘉其替之迫而請之堅也于是乎書嘉定元年奉議郎知常熟縣事徐次鐸記尉㕔在縣治北二里鄰順民倉宣風樓記王伯廣樓以宣風名紀政也易于㢲其象為風其位為東南其時為長養萬物有虞氏得之以阜民財于是有薰風之歌尹吉甫得之以美大臣于是有穆如之訓罪無輕重功無大小使言偃弦歌之化當太平有道之國雍雍乎和可知矣常熟古南沙也今為姑蘇望邑土博賦衍民繁事劇綰縣章者每難其人紹興之二十二年政五六易規矩準繩莫一所守冬十有二月乙卯今曽大夫以王命來知足以知勇足以行禦灾如西門之治鄴愛民如子産之治鄭指顧之間政以善聞邑人宜之凡廢未舉蘄一新焉先是縣治之坤隅民居有架崇庋于上其左蓋闕如也相其隂陽厥有低昻士庶雅有創樓議矣至是以請大夫曰止止吾至未幾遑急爾耶衆曰我食我力我木我石無費于公以慰我私大夫乃命卜筮乃經乃理乃徹其庫乃建其址巧者舉斧壯者攢杵無煩戒約其來不可禦也蓋度材于二十一年之夏四月至五月己巳工以畢告近逺少長奔走瞻望惟時歊暑泠泠之風自樓而下咸用欣快乃有皤皤然被黃髮者歌而過曰風之仁兮物之春兮風之德兮物之植兮誰其布宣大夫賢兮繄大夫賢樂堯天兮衆鼓舞和之因托其辭以名斯樓且告鄉人王伯廣請文于石以係他日甘棠之思者大夫名構字叔重清源人大丞相宣靖魯國公之曽孫其為政蓋有家法云內曽構一作曽慎宣風樓在縣治西紹興辛未令曽慎建紹興四年令葉知幾更曰慶豐乃𣙜酤之所願治堂記王恕余以願治扁堂之明日有客來訪而問曰聖天子授公以保釐之任而有便宜從事之璽書凡撫內善良者公得而扶持之強禦者公得而禁遏之賢才有益于國家者公得而薦引之奸貪有害于政事者公得而斥逐之田野未闢公得而闢之學校未興公得而興之賦役有未均詞訟有未息公得而均之息之以至周窮恤困伸寃理枉皆公分內事也今皆舉而行之亦可以言治矣而猶以願治名其堂何歟豫曰善良者固多矣豫豈能盡扶持之強禦者亦衆矣豈能盡禁遏之賢才當舉而或不能盡知奸貪當斥而或不能盡察田野當闢而或流亡之未復學校當興而或教養之無方里書作弊賦役如之何得盡均教化不行詞訟如之何得盡息縱使盡扶持之盡禁遏之盡知之盡察之盡闢之盡興之盡均之而盡息之茍有一民之失所一事之不理亦不得謂之治治豈易能哉非但才之罪勢使然也余以菲才受厥命食厥祿豈敢怠厥事是以夙夜孜孜願治焉而未之能也願而未能其可忘乎故以願治二字揭諸堂欲其常目見之而求所以治之也客唯唯而退遂書之以為記巡撫行臺在縣治東北即文學書院宣德間移吳公祠于學以為巡撫公署侍郎周忱改稱學道書院成化十九年都御史王恕扁其堂曰願治𢎞治十年縣令楊子器以其地隘請于都御史彭禮遷于西山巷左市地常熟縣重建都憲行臺記謝遷太祖髙皇帝定鼎金陵凖古王畿之制凡郡邑之近𨽻者則十有一焉而蘇郡古吳㑹也在禹貢揚州之域厥田中下厥賦甲于東南太宗文皇帝遷都幽燕國用仰給于兹實為根本重地敕巡撫大臣以總糧儲常熟蘇之劇邑也大臣巡厯則以學道書院為駐節之所𢎞治十年吾浙水楊侯子器以名進士來知縣事謂書院創于勝國意當時隨地勢以為規制前蔽民居後傍官道左鄰學宮右通市肆門道出入若委巷然夫以大臣受天子委任之重于此焉居似非所以崇國體肅憲度康兆民也特擇地于縣治衍慶坊西百步許而改建焉為料價二用之廣出于公取于民為不便以各年所餘均徭錢之侵于民者追以供費乃通具其故請于都御史彭公如其請俾量計從事以十一年十二月龜吉日鳩羣工聚衆材以委縣丞張君翰董其役時省月考審曲面藝木以良斫陶以厚覆石以方甃塗以丹堊厯三時告厥成功中為㕔翼以廡後為堂夾以室前闢門中直道外繚垣𨽻人瞻事車馬有所基地以丈計長五十有七濶二十有六料價銀以兩計八百有四屋以間計三十有四更湫隘為爽塏易淺近為嚴邃治迂曲為平直揆理考制莫不如式請所以為名而署之并記以明逺竊按周禮御史掌邦國都鄙及萬民之政令以贊冡宰凡治者受法令焉掌贊書凡數從政者秦漢而下立法創制因革不一有御史大夫御史中丞殿中侍御史治書侍御史監察御史其署名曰府寺憲臺御史臺殿院諌院察院之不同而其任則專諫諍繩糾激揚蓋已異于周官之制矣皇朝設都察院于兩京以都御史掌風憲自永樂洪熙宣德正統景泰以來巡撫者兼督水利若尚書侍郎都御史差遣不一自天順成化及今𢎞治雖間有兼官實專以都御史則有合于周官掌邦國都鄙及萬民之政令者矣宜名曰都憲行臺于以見差遣之一而有其實于以異兩京之署而有所據也國體以崇憲度以肅兆民以康而楊侯興工不為過大臣之居髙明豈為泰哉遂不辭而為之記時𢎞治十三年春三月之吉賜進士及第資政大夫太子少保兵部尚書兼東閣大學士餘姚謝遷記吳江縣敕書樓記李處全松陵令趙君伯虛為邑二年其農桑勸其獄訟簡其簿書錢穀治辦學有新田三髙有祠百廢具興不為茍歲月計先是建炎中國步方艱而邑當要衝祝融回祿相其虐自後踰四十年廨宇庳陋夷于編氓乾道強圉大淵獻蘇公始撤為新門培基取材百用先具梓人執斧斤以聽畫至瓦甓坯釘亦出于公之指授焉其始于秋而落成于冬遲速之程不愆于素飛樓干霄與江山長雄環視具區笠澤之廣雲烟卷舒濤瀾吞吐舞鴻鵠而嘯魚鳥為三吳壯觀君乃以季冬之月盛服率僚佐更奉詔敕其上用以鎮撫其社稷億寧其神人遺民故老告語子弟咸謂役不踰時而功倍于音微令尹不復見此矣是時公距受代止旬月公不以欲去怠其事朝夕于斯迄用輯成真古人之用心也使今人之用心皆如君公家之事尚有不樂成者乎故豫樂為之記乾道元年贊皇李處全記敕書樓在縣門紹定五年李椿新之琴堂記李椿邑治之陋歲月尚矣因陋而居亦尚矣紹定庚寅良月椿承乏兹邑訪諸故老莫知始創規模逼隘基址卑下矮簷敗壁不逮民居震凌之餘岌岌將壓屋古而蛇虺成穴地洳而蚯蟻為壤棲止其下殆不可以為朝夕安再瞻再歎尚容復因陋乎于是節浮費計實用市材木聚瓴甓銖積寸纍踰歲而備不敢掊取不敢科役髙下大小鼎新三十餘楹以昔之正堂為今之遺愛姑存舊也琴堂向在寢室之東北隅愈陋而僻不足為公餘偃息之地前此帥未暇問夫琴者所以正人心也堂以琴名置此偏隅將何取哉余正堂既新所居必正則琴以正心為義容可以偏隅之舊觀而不易以居其正乎使出入乎斯居處乎是方寸之間無往不正琴之義盡在是矣昔宰武城以絃歌為愛民之政宰單父以鳴琴而成自治之化椿之不才何敢希前賢事業之萬一乃所願竊有志焉將書扁庾使袁先生遺以珍墨揭示不朽抑又有光于斯堂者歲在壬寅鳩工于季春落成于季夏從事土木與匠石較分隂于繩尺間自笑其愚者屢矣然君子之居一日必葺是猶有望于後人毋徒曰傳舍云八月既望維揚李椿記琴堂紹定中令李椿重建于東袁肅題扁吳江縣重建譙樓記桂宗儒吳江東南巨邑四明栁公臻來丞是邑之三年政平人和百廢具舉惟譙樓工侈費廣而未暇及邑之父老陳景祥等進告于庭曰譙樓一邑之壯觀而政令之所關也圯壞越二十餘年矣而官莫之舉邑民莫不與之興歎于路募民財以構之俾官不需財民不需役而落成敢請縣丞公㑹議其所請于同寅王公懋本馬公驥僉曰善遂允之尋白于太府暨按臨大臣亦然之遂命匠務工營于舊址之上于是輸財樂施之士肩摩而踵接趣事赴工之民蟻聚而雲集不半載而落成朱甍畫棟之翬飛而髙插天半雕檐翠桷之赫曄而照輝日月則有以度越前制者逺矣至于形勢之據吳淞而瞰太湖引江浙而俯姑蘇洞庭諸山映帶左右烟波雪浪撼乎几席此一邑之巨觀也㑹永嘉葉公來尹兹土既喜其有成又美其壯麗也于公暇登臨而歎之曰不惟有以縱其觀覽實足以玩心于髙明宣情于鬱滯以舒暢其政治也樓之建有補于世教也大矣不可無記遂命使致書請文于豫譙樓者古制也自皇都至于郡縣皆有之所以具鼓角憑髙以警衆則其聲韵感慨激烈以肅官府之號令限士林之休息者鼓角也寓之于鼓角者政也政平訟理邑無不寧民安物阜官無逋稅于以見絃歌比屋頌聲滿途其鼓角瀏亮皆由政之所發也豈徒恃其樓之壯麗聲之感慨激烈而巳乎當今聖明在上四海清寧正士君子汲汲修德蒞政之秋若夫萬籟俱寂之頃夜氣方清之初耳靈鼉之韸韸聆梅引之鳴以清其政本胥於是乎在嗚呼聲者政之所發也故曰聞其聲而知其政余因其請遂詳書重建之始末俾有考云正統元年夏五月行在翰林院修撰董溪桂宗儒書譙樓在縣門吳江州官題名記顧儒寶古者立國則有州邑稽古而建官皆所以推君之令而致之于民者也蕭規曹隨往周來續使民心起甘棠之思故題名之記不可無之皇元混一升縣為州越二十星霜矣吳江之地襟帶江湖馳驛南北適當孔道州牧之勞與他州異其間政事文學之才往往無傳何以為勸耆老有請俾鐫諸石以垂方來爰命儒寶為之記抑聞夫子曰道之以政齊之以刑民免而無恥道之以德齊之以禮有恥且格蓋徒政不能以自行而必及于化政能使民逺罪而已化則使民遷善而不自知先化而輔之以政循名而責其實庶不失題名之意云延祐五年夏儒學教授顧儒寶記吳江州官題名碑記張天英在昔官府書聨事之姓名者所以記歲月識臧否重黜陟垂不朽也凡為天子吏天下之民休戚繫焉吏循則民安吏酷則民病吏亷則民阜吏貪則民窮且敝吁可畏也哉元貞朝制升吳江縣為中州秩正五品官六人當是時已嘗樹題名之石于㕔事矣五十餘年人物同異千古之下毁譽隨之昭昭然其不可掩也夫有官守者可不慎與髙昌諾海公長是州有德政官當遷乃伐石刻名如前人故事俾來者知所勸懲云至正七年四月吉旦清河張天英記仰髙亭記留元剛吳江雪灘三髙越范將軍晉張曹掾唐陸補闕之祠也間者邑屋以繪像刋石置諸㕔事之右越淳熙辛丑後二十有六年令尹羅君勳展來于兹恪瞻遺範懼弗稱景則之意屬時方輸錯出納經營未暇閲二年民困少紓􅊏悉餘偫作亭奉之名以仰髙既成書來請記余謂三髙者記其名也仰髙者慕其實也聖賢盡性之學亦曰事君致身仕以行義人受天地之命則當任天地之寄敝屣世故傲然獨善庸可為訓哉噫少伯復讎不遺餘智薄逰從辟庶幾有為退亡保身之道進無益國之功或爾違之其心可諒也而有嗜榮則覬嘗試則居勳莫掩口禍亦踰福附離患失矧執權乎介紹從行矧就見乎世變降而下之甚矣豫于仰髙有以得羅君之心請遂志之松江集自南渡以來作者弗與至是裒粹續集鋟梓于亭其顛末具于三髙記者弗書嘉定改元仲冬甲寅日奉議郎祕閣校理兼翰林權直留元剛記仰髙亭在縣圃中嘉定創縣記髙衍孫嘉定十年嵗在丁丑秋九月吳郡太守集英修撰二卿趙彥橚浙右憲使今左右司業王棐奏為平江所統五縣惟崑山素號難治蓋邑之為鄉者十有四都者五十有二縣治僻處西北而東鄉最為隔絶奪權矯處相率成風其害有三好勇鬭狠或刑人殺人追逮不從至有經年不可決者則獄訟淹延之害東至于海南至于松江寇竊奸宄憑負險阻則盜賊出沒之害豪民慢令傲不服役有二十年無里正者逋積秋苗四萬餘石他賦稱是則賦役捍格之害有是三害邑遂不可為元欲增置一尉望輕不足以鎮之僉以為立縣便今宜割安亭春申臨江平樂醋塘五鄉二十八保作新邑于練祁之滙且援昔之慶元例請以年紀名丞相魯國史公當軸列上報可就令辟吏衍孫適試兹邑及瓜當代臺府不以其不才猥以姓名聞俾主創邑事衍孫遜至再而命已下竊謂嘉定分創與慶元之事不侔慶元出于上户之申請則公家固所樂聞嘉定始于臺府之奏陳則民情不無疑懼以所疑懼之民一切之政魚爛禽駭不潰則逸為先之以優容使民自悛守之以不擾使民自安則迹無詭異而人斯馴服然東鄉之所以成習頑獷者有由然也逋違稅租詭挾戶籍積歲既久愆犯益深往往重足適市或聞追呼而行死不願出雖有淳良之質未免玉石俱焚衍孫稔知其故遂白臺府今日之後咸與維新凡八年九年五鄉畸零二稅先後倚閣十年者添助本縣營造使民少寬新賦納自十一年始如減秋苗之納耗免夏稅之增絍罷財斛司絶橫斂之擾淳頑籍以示勸懲如此等類皆䝉聽從戊寅五月衍孫稟來此一意奉行敲撲不敢以輕施吏胥不容苛擾意向所在民輒先信舉欣欣然而相告曰官府寬恤如此我輩何其幸歟毋怙頑毋作慝毋狃前以絶自新之路民聽既孚始欲興作冒霜露披荆棘役民于農暇取材于他郡經始于戊寅之仲冬越歲餘而落成屋以楹計者縣百有竒若丞若簿四十有五若尉五十有五學宮四十倉廪惟半祠社有壇宇賔餞有驛舍郊設門關巷植名表酒館花圃以次備具若夫營造之費則有朝廷撥賜五千緡本府給助一萬緡共丁丑歲畸零苗稅一萬四千五百餘緡米一千三百餘斛足以充所費三分之二其餘斡旋酒稅僅僅給用迄于告成而民謂無擾今才兩載四閲月前之三害幸遂屏息是皆憑藉朝廷之威德奉行臺府之教條所以致此衍孫何力之有焉顧惟民性一也胡昔頑而今淳轉移闔闢蓋自有道茍為政者忿其頑嚴刑峻法以繩之故民有競心愈激而不可革若能撫摩其疾苦啓迪其所趨向則良心善性孰不油然而生衍孫惟不敢鄙夷其民也而年穀屢登麥秀兩岐皇天其密祐斯邑作新之效當不止是將見魁竒忠信材德之民羣生其間毋徒曰曩日東鄉之俗云嘉定十三年九月朔日宣教郎嘉定縣主管勸農公事兼兵馬監押髙衍孫撰重建州治記貢嵩大江以南地廣物衆莫吳郡若嘉定舊吳屬邑邑始于宋嘉定析崑山東五鄉練祁鎮為治因年以紀名在郡境江海際壤浮力薄産貢擬他邑為下皇元混一區宇化被幽遐俯視陬隅如在畿甸田野日以闢户口日以增元貞詔下劇邑率升州嘉定以户口計應中州之制遂升為州自此以來品秩崇矣號令新矣獨于州治隘狹漫漶仍舊憚于改作因循十年之積以至于是大德丁未達嚕噶齊托里穆爾朱公知州事髙源同知州事蘇爾約蘇哈雅公郭公偉判官趙公允中李公德暨提控董友直都目陳玉先後繼至克相協贊力行善政以導迎和氣歲則大熟民暇且豫乃謀建公宇顧費無所於出曷濟登兹于是州巨室聞而相與言曰吾儕小人皆有門廬以避燥濕寒暑豈邦侯吾父母而可無爽塏之居乎則皆折捐粟布以助刋木于崖浮竹于津厥材既堅厥土惟剛上殫其功徒既其力經營不數月而成堂階言言廊廡巖巖有門秩然有軒翼然觀者改視蓋時其使節其用集于一朝而不為勞須十年之久而不為遲始謀終就髙公良屬意焉然亦不自有其功落成之日率㑹僚友文學掾貢嵩言于衆曰昔者聖人作為宮室蓋取之壯觀矧太守實古諸侯而不壯厥居豈惟無以養威重示表儀且將無以疏視達聼融暢心神為勵精出治之本兹宇之成美哉輪奐後之登斯堂者其亦曰堂之建民之力也民既出租稅以食我又為屋室以居我吾其可以忘之乎利惠未遍斯溥之疾苦未瘳斯除之徭賦未省斯均之獄訟未決斯靖之政聲流聞達于京師明明天子聽豈其逺哉州之人善其言而頌之請記斯堂以彰政理惟春秋之法事始必書今州始升堂始建是宜書以刻諸石至大改元冬十月望日貢嵩記嘉定郝侯政績記黃溍昔成周寓軍政于鄉遂故兵與民一後世析而二之為將帥者往往知有兵而不知有民善乎荀卿子之論曰兵要于附民而以為將帥不思所以恤民可乎若平江十字路萬戶郝侯蓋知兵之要而得先王軍政之遺意也初余在金華聞侯奉省檄巡鹽浙東所過無秋毫擾心巳志之及仕于朝往吳下見士大夫咸曰郝侯賢今年春官于儒司嘉定州父老沈銘等以侯政績請記于石豫既知侯久重以耆老請誼不得辭因諏其詳則曰嘉定為吳要地襟帶江海每歲萬戶府分官出鎮茍非撫馭有方則士譁卒囂適以病吾民耳今郝侯之來紀律嚴賞罰信凡麾下士不得以一毫撓吾民海隅宴安奸寇屏跡近歲知兵者何以加此然古之名將有愛士伍而驕士大夫有愛禮君子而日鞭撻健兒後皆不能無弊今侯于卒伍既懷以恩而又能好賢下士不倦是又賢于古人者矣至于考其事業推其所從來則雖先猷祖訓有足取法而其好古嗜學之功亦不可誣也昔晉文公謀元帥于趙衰曰郤縠可以其說禮樂而敦詩書也孫權之雄才大略而自云孤嘗讀書大有所益及呂䝉奉權教始就學魯肅過潯陽輒稱其才略非吳下比則侯之德業又獨非好古嗜學之功歟侯名天麟世居宣德自元帥公定河南因家宛丘豫既為叙其事如左乃為之銘銘曰海陬之邦控延大江飇驚濤奔藉兵以防桓桓萬夫闞如虓虎匪帥之良孰靖其旅猗歟郝侯孔惠孔仁匪惟馭兵實綏我民我有水旱惟侯之惻是禱是禜保我稼穡歲時豐穰海壖樂康廏馬不譁叢矢在房乃作大府其庭有殖我出我資匪藉民力民曰宜哉侯豈我需我懷侯惠曷不相諸侯燕賔士淵淵伐鼓有瑟有琴籩豆攸叙邦人來視為侯勸呼豈弟君子胡不樂胥昔侯祖父曰維元勳功載盟府裕于後人曽孫孝恭克紹其猷匪維世美實豫民休天子明聖宜褒爾績惟藩惟宣以惠四國赫赫厥聲宜公宜卿百祿是膺子孫繩繩我匪侯私人則具知德音不忘永觀厥辭黃溍記嘉定縣廣儲庫記董鏞凡郡邑設置倉庫上所以供國用下所以恤民財皆有司之急務也厥今姑蘇東南大府屬縣有七而嘉定最為繁劇歲計所入租賦常不下五十餘萬石折輸布以匹計者二十餘萬畸其繁矣乎然而租之入各區置有倉囤比輸粟之期運赴各倉收貯其後糧長轉輸漕運達于京師等倉事不愆期官民兩益貢法之詳莫善于此矣惟折粟之布其數亦浩瀚逮徴令一出輸者蟻集而聚輒充棟或寄頓于僧寺或收貯于民居其間風雨蟲鼠之損傷水旱盜賊之不測深貽所司之慮其時扆侯昭始來知縣事欲興處置之規而未敢專也今年夏奉敕冬官侍郎周公巡撫至邑首慮貢賦之失期而民事或有未妥者諄諄告諭宣上德意惟恐官不加謹而舊弊之未盡革也于是侯合丞簿而下即以歲輸之布具白于公公曰租與布皆公賦也奈何不效置倉之法乎邑之左右或曠閒之地創一庫俾聚而藏之以伺輸納庸何傷侯等承命惟謹繼往陳于郡守况公允協其議然後度地于縣治西一里許即西隱寺廢址周有通渠居民鮮甚遂擇日鳩工創庫一所錮鐵為墉壘甓為牖前構一㕔事以為官署翼以小屋若干楹以處主守之人仍闢門于前繚以修垣凡若干丈其在官糧里人等靡不欣然趨赴經始于正統丁巳秋訖工于是年冬十月朔用約于官不費于民陶堅材美締構嚴縝于是可悉聚歲輸之布度支亦有法出納亦有次俾各有專守之責誠經久之良規也侯乃貽書于鏞曰兹役也吾何力焉自非巡撫大臣與郡侯區畫之餘曷足以完之然亦關于國家興作歲月不可以無記遂授鏞以顛末俾為之記鏞善是庫之作于西成之日既得其時位于邑之西也又得其地藏貢賦所以安民也而役不勞于民安民所以奉國也而財賦無廢于國其斯為奉上恤下之有道乎禮曰君子將有所營必以廄庫為先于居室釋之者曰重國用也且今官府之治故宇當葺者不知幾何執政大臣知國用為重而先其所急者有司執事者又能承順其意有合于禮所可記者奚止歲月土木之美而已矣用是書之俾刻諸石侯解州人由監察御史出宰是邑處事亷謹而民悅之贊是役者縣丞俞侯觀張侯鑑主簿徐侯子臯典史閻侯麟任程督而始終其役者則主簿蕭侯學敏也董鏞記嘉定縣令題名記袁袠余讀漢循吏傳而歎治道之難也漢有天下四百年吏以最稱者幾人哉今天下吏親民莫如令權一而職專茍心乎愛民奚所弗濟故先哲以未嘗親民為恥意深逺矣皇朝統有萬邦列聖重守令之選由是循良相望光掩前策而百八十年來其赫赫可稱紀者猶僅僅也嗟乎難哉難哉嘉定古婁東地也距郡治百四十里志曰故崑之疁城鄉縣治在春申鄉練祁市宋嘉定置縣元為州皇朝初因之乃洪武二年復縣置令而迄今未有題名不其闕歟順義張侯重以進士來令兹邑期而政成謂是弗可已也乃搜郡乘詢黃髮由洪武以迄嘉靖得若干人將鐫其名字爵里于石而以記屬􅐆惟嘉定瀕海而襟江數患盜警且土無異産舟車艱塞百賈罕逰民苦重賦令于兹者不尤難哉按郡志宦跡載偰傒斯下凡六公𢎞德以來雖未及纂續然吏治精核而純實亦少衰矣豈漸靡使然哉張侯之亟是也其有感也夫夫古者今之鑑也往者來之轍也辨體以經治者存乎典彰往以詔來者存乎文典以軌物文以永世公署之有題名古也以觀以典以勸以戒賢則企而型焉否則擲而訕焉其庸庸者則恥並列焉是先民之所以旌淑而警忒者也非所以崇侈飾觀也張侯之亟是也亦由行古之道夫覩兹石者沿近以遡逺規今以準古雖百世可知也吳都文粹續集卷九
