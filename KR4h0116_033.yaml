body:
  text: 吳都文粹續集卷三十三明錢榖撰寺院天平山白雲禪寺重興碑姚廣孝天下佳山水固有矣必遇乎名公偉人以發其跡然後境益勝而名乃著也興壞理亂措諸事業必賴乎才能智謀有足為者然後見其成效也山水雖佳微名公偉人以發其跡則境之蕪沒而名之昧昧者蓋多矣興壞理亂微才能智謀有足為者必不能見其效也非惟不能見其效而反致於顛覆隕墜者往往亦多矣故山水事業顯隱成壞在乎其人若汲汲欲得其人而人卒不可必得或數千百年之間不求而自得者何也蓋物之顯隱成壞關乎氣運屬乎時緣而致然爾豈在有意而為之者哉天平山白雲禪寺創於唐寶厯間至宋天聖寶諦大師來是山見寺之基構狹陋不足容廣衆始開拓其場地以成大剎慶厯中文正范公愛其泉石清麗林園茂密故奏請為香火院忠宣公繼父之志遴主法席者謀諸蘇長公子瞻遂延致逺録公始革律為禪矣寺之住持非有德有言者不足以當之故厯代皆名沙門也元末丙午天兵臨吳城寺燬於燹罄無所有但荒烟茂草鞠為狐虺之囿矣洪武七年復菴圭禪師來領是寺復菴乃先住持士瞻公之大弟子也其戒行兼優操略並善故寺衆與文正公子孫謀曰起寺之廢者非復菴不可也於是相率耆彥禮請主之雖寺恆産而賦役甚劇復菴夙夜酬應弗有勞苦况東序比邱智在左右羽翼支費撙羡以興厥功故大雄之殿方丈之室說法之堂栖禪之所山門廊廡庫庾庖湢鐘魚鼓板之設熏炬瓜華之供草年之間無不備具而未嘗持一疏干一人恍然成此大業若地設天造可謂能事畢矣噫天平泉石之清麗甲於中吳文正公為之主維故境益竒而名益振寺極其廢得復菴為之中興而有以見其成效也以斯論之山水雖佳不遇乎名公偉人則境湮而名替興壞理亂不賴乎才能智謀有足為者必不能見其成效也審矣今復菴之中興是寺雖經營措集彌嵗不寧略不見其艱難困苦之狀可謂才能智謀有足為者矣今年秋以書來北平求豫述之以示其後豫吳人也天平乃熟遊之地復菴與豫友頗切知寺之興廢惟詳故弗讓而為之書乃復系之以詩曰天平之高冠於吳山林木茂蒨雲泉潺湲巖巖龍門是為𤣥關雄虓既伏猿狖寧攀勝妙境界佛剎是宜乃創于唐寶諦載治堂構靚深緇徒皈依偉乎范公朝請主維敬延紫石始習禪儀境益其勝名益其彰靡有碩德莫據猊牀歷代繼席皆非尋常人境俱絶可抗大方越嵗丙午天兵臨吳歘罹鬱攸百燬一無錦繡園林化為邱墟有來遊者無不長吁復菴振起效其才能不草年間衆廢具興比邱智在乃同厥心左右贊襄其力孔任棟宇蔚如丹碧爛然有物畢備一如其先濟濟真侣安居彌堅寅夕禪修天子萬年遊天平白雲禪寺錢藻小港通行三十里亂花深淺到山西誰知絶徑無閒地還有幽人向此棲簷上泉聲龍虎動階前林影日星低高僧不放白雲出欲構巖巒與閣齊再遊天平有懷舊事呈夀老范成大訪舊光隂二十年殘僧相對兩依然木蘭已老無花發石竹依前有麝眠萬户直須龜手藥一龕何用買山錢從今半坐須分我共說昏昏一覺禪題天平寺袁桷青鞋高挂天平壁遙指雲門三兩峰禪榻已容黃葉覆詩瓢從把緑苔封曉風殘月千村櫓細雨踈烟隔水舂我向京師宜老矣吳山清淺越山濃同前倪瓚龍門秋月影茶室白雲泉不與世人賞瑶草自年年復有天池水松風舞淪漣何當躡飛鳬一采池中蓮送圭復菴還天平寺釋來復白雲泉上逺公菴我首棲禪借一龕夜壑松濤寒作雨春林花霧溼浮嵐龍門客賦詩成軸虎阜僧來頌有函楚些難回南麓定蒲圑詩與話同參江左多年不得書范公祠下往來踈義田無恙徵科後梵剎重新劫燒餘火擁芋爐寒榻靜水添蓮漏夜堂虛袈裟曾習西方觀幾聽晨齊報木魚天平謁范祠陳基古木蒼藤開寺門清泉白石駐華軒丹青不改天平廟閥閲猶知慶厯尊四面峰巒旗鼓列一村桑柘子孫蕃皇皇冠冕餘生氣再拜令人愧後昆登天平山訪圭禪師姚廣孝逺歸吳下寺重上白雲泉勝地游非偶名山到是緣僧行晴雪裏虎嘯夕陽邉開士情何厚茶餘話昔年夏日遊白雲寺二十韵地靈山勝絶觸熱試幽探斗近龍門險巖深虎穴嵌崕懸藤絡石波靜竹林潭谷響風前澗巒光雨後嵐松騫華蓋麗泉出白雲甘夏實知青李冬枯識老柟蟒窺嵁匿鼆鸇搏草棲䳺操徑猱行疾遮途蟻戰酣岫伸眉細細苔布髮毶毶沼旭疑盤沐湖天訝鏡含歸樵仍佩斧游子每停驂一澗分高下雙峰自北南煌煌忠烈廟寂寂逺公菴桂聚香為室蘿縈翠作龕函文殊貝葉遮萼異優曇剎影晴標逺鐘聲夕度韽東西廊兩兩前後衆三三法自齊餘說禪從浴罷參厯竒寧有倦玩勝已成耽便欲攜瓶錫相依詎不堪春日過天平輿上口占樂遊那厭去程賖穩穩籃輿勝小車烟栁青邉疑野店露桃紅處是山家澗分燕尾泉來細嶺轉羊腸路入斜趣既有餘吟亦就此行應不負韶華次韻答天平復菴師二首清晨荷笠出江城乘興來參肯待晴雲起東山藏剎影水流西澗帶鐘聲茶燒活火嘗新味詩寄長箋寫舊情便欲泉頭分半榻相依談笑盡餘生獨客燕山近薊邱隨身瓶錫數年留昨朝過魯非無樂今日還吳却有愁屋老郊園蛙産竈忩寒風雨鼠侵裘故交猶得師存愛握手歡呼慰白頭寄天平復菴不到天平二十秋老禪宜是雪盈頭白雲泉上青松下惆悵年來幾夢逰題天平夀老方丈范成大二十三年再入山此山於我有前緣時人不用憐衰病天與丹房一線泉送夀老往雲間行化天平船子過華亭舍衛城中次第行留取鉢盂歸院洗東巖新出一泉清天平寺蔡羽石壁如仙掌行人輕路長千重翠巒秀百畝緑隂涼紫磴連瑶闕青岑控石梁白雲泉味冽得共逺公嘗自吳門至天平白雲泉晚興皇甫涍鐘聲緬回䇿秀色餘西岑微徑不知處白雲長自深松窗散花雨溪牖搖峰隂獨夜泉亭月寥寥期此心白雲泉寺在天平山一名天平寺唐寶厯二年僧永安建名白雲菴以山有白雲泉也宋慶厯間范仲淹以先墓所在奏為功德寺因賜今額元末燬國朝洪武初僧復菴重建秋日重逰穹窿山海雲精舍姚廣孝昔年曾駐錫此地喜重逰樹影兼雲合蟬聲帶雨收澗循松下砌峰繞竹邉樓到後嗟難偶吟踪去復留其二厯厯青山裏層崕倚曲房竹雲時駐影桂露夕圑香未暮先垂暝方秋已薦涼莫言今索寞自可勝他鄉其三巖棲還傍塢復嶺自層層叩户頻來佃尋蹊每到僧苔深終隱甃樹老尚懸藤但可行吟處題詩記我曾其四林屋藏深密盤盤石徑斜過樵驚睡犬回牧亂鳴鴉垣碧蘿藏葉籬紅槿綴花到時須放浪莫問是他家其五迢遞青村外﨑嶇紫邏間過林才見日到渡不逢山一室依巖險雙扉傍竹閒曾看雲際鶴向暮獨飛還其六勝處初逰日長疑别有天樓開扉納月庖接筧通泉鐘散羣峰外禽回雙樹邉也知宜眺望不獨可安禪其七地逺塵難到人家半隔溪放禪還候磬起曉却憑雞雲度隨山窈泉行趂澗低披叢尋蘚壁更為刻新題其八積雨秋初霽林園蘚護扉葵妍花愈盛橘病實還稀徑露香沾屐嵐烟翠上衣山翁能引客徐步向斜暉其九一徑通林遠時聞長者來水光搖定室松影落香臺楥為防彪設軒因放鶴開若將吟適興滿眼是詩材其十山人無所事沿堵只栽松黃葉深深屋青烟逺逺峰苔蹊屯鳥跡石廠宿雲蹤留客同迂步乘昏欲聽鐘訪道衍上人時寓海雲張羽尋僧自補屐古寺夏雲中聽鳥明聞性看花悟色空風傳烟磬逺竹引野泉通便欲捐塵纍香燈事逺公宿海雲上人房韓奕古剎松間寺閒遊夢裏身雨聲留杖履香氣暖牀茵僧話禪心靜交情道誼真老來偏好佛從此往來頻留海雲菴年老人間事不求每從方外樂清游雲深古寺疑無暑雨足山田望有秋嘉木千章當徑合懸泉十丈下溪流也知賔主相忘久竹杖籃輿任去留頻年度夏此僧房眠食清便禮數忘盤出楊梅堪薦酒瓶添薝蔔罷薰香滿階松影齊鐘午繞榻泉聲客枕涼况有諸生皆向學時時列坐論文章寄海雲僧香暗燈明佛殿深梵筵僧散夜沉沉庭梅影轉經窗月誰伴高人擁被吟庭雪初消蕙草香日晴便覺有春光老來事事心皆懶獨有登山興未忘海雲院觀連理山茶吳寬奉慈山茶好標格花開如杯呈玉色海雲山茶更竒絶竒處不論紅與白兩株並植東軒前翠葉如屏遮几席枝柯一一相交加為是同根忍分拆初疑一人獨叉手忽作兩人仍促膝少焉掉臂才跬步又獨控拳當肘腋碧玉磨沙成玦環青絲綯索分徽纆我來庭除稍摩挲引此青蛇受毒螫試量旁幹得三圍每掃落花凡一石風霜飽厯三百年未識何人手中植尋常繞樹多詩客階下莓苔留古迹河中曾辱昌黎文西蜀休誇孔明柏世間大樹儘有之似此山茶何處得前題次匏翁韻伊乘匏翁詩存古風格譬則毛施真國色滌除烟粉市門粧綽約肌膚天下白海雲禪院賦山茶文采風流傾合席兩間淑氣逄交暢殊本連柯豈輕拆邇來誰遣異榮悴坐減賞心空抱膝常侍貂璫耀左耳詩老偏枯傷右腋揚眉意氣彯華纓垂首幽憂係縲纆修容想為過客妍解腕疑逢毒蛇螫分留物色供品題且免隨綱入花石百年存歿感交情滿紙縱橫遺墨迹靈山黃面憶曾拈淨土緇衣舊煩植地脈潛通上世塋古形作配前朝柏從知物理有興衰休徇人情量失得海雲寺王寵名山時訪舊絶壑愛觀泉徑隱千重竹林窺一帶天疏花遲候發幽鳥好音傳悟得無生樂行藏不離禪暮春過海雲寺寫竹石古槎倪瓚春盡湖濵偶獨來高僧煮茗得談諧鳥啼花落忽如夢水影苔文渾上階空咏逺逰悲世俗聊將曠望遣情懷竹林生笋還相别人事睽離亦易乖海雲寺在吳縣穹窿山北麓宋熙寧間僧性海建姚廣孝為僧時常住此內有連理山茶堯峰山佛殿記王鏊吳橫山之西南有峰名堯莫知其所始或曰堯時民於此避水也蘇子美詩西南登堯峰俗云堯所基洪水不能沒上有萬衆栖唐末慧禪師者始建精舍曰免水院宋改曰壽聖寺有寶雲禪師繼居之㑹學去來恆數百人元涉國初久茀不治𢎞治初有雲谷禪師諱茝始謀居之與其徒文通披叢剔薈支傾葺頽嵗餘人漸知之雲谷軌行峻特通亦戒律清修逺近參謁者日衆始相與立山門繚以石垣觀音龍王之殿寶雲碧玉之沼東齊西隱以次修復而大雄殿費巨未遽議也久之雲谷示寂通矢卒先志乞諸檀越一時巨公名士亦多禮焉於是富者施財貧者施力豫章瓴甓無脛而自至不召而雲集大雄之殿倐還舊觀矣初豫自內閣告歸間一造焉峭壁梯空側足而上及至其顛曠然平夷林壑巖洞之縈紆池沼泉石之秀麗却而望之則太湖萬頃浩蕩在前而吳興雲間諸峯亦隱隱可見信地之高且勝者也則洪荒之世民聚居以免懷襄之患亦或然歟地雖勝而其蕪也久得人焉居之則蕪者治頽者起事之興廢其不在人乎今天下之事廢而不舉者亦多矣彼獨何修有若易易然者乎豫誠嘉焉為記其事嵌諸壁堯峰寺高啓堯帝何年到名猶在此峰巖留千尺井寺發兩時鐘僧出因尋菌人來為看松白雲深洞裏聞有聽經龍同前周南老橫山聳别峰仰陟高岧堯佛宫古唐宇照耀山之椒老松偃翠蓋澗壑回鮮飈沼澄碧玉瑩龍歸白雲飄開軒面平湖清輝日可招尋僧特相問峯名何以堯題堯峰寺茝公山房伊乘我生素有烟霞癖筍輿清暇窮幽僻隔嶺猶聞鐘磬音荒苔似斷漁樵跡山居老宿霜滿髯蒲圑遮眼看楞嚴神龍聽講出深洞野鹿銜花常近檐人烟曠絶非凡境石湖倒落晴天影千年文字留斷碑百尺轆轤牽古井小童座上送茶甌軟語接耳爐熏浮羮藜飯糗度晨夕草生木落為春秋幻相偶然分主客姓名免使磨崖刻來朝回首白雲深半空飛鳥青山色宿堯峰寺王鏊堯峰自在諸天上半醉來登不用扶思入湖天同浩蕩望窮雲樹轉糢糊五更客夢侵雲冷一片禪心對月孤自是世緣猶未了幾時同此結跏趺堯峰寺在橫山即唐之免水院暑中遷寓甫里精舍栁貫城隅亦有果園坊容得幽人借草堂何必漁樵之笠澤故多水石近滄浪過橋稍接魚蝦市泛艇遙連雁鶩鄉秋雨幾時能破塊夜燈休負讀書牀夜投白蓮寺徐賁飲别東家叟行投西寺僧無風收閣慢有月罷廊燈竹夜聲偏集池寒色似凝無端值詩景清興覺逾增白蓮講寺在長洲縣二十都甫里即陸龜䝉别業祠堂在焉宋熙寧六年僧惟吉建覺海菴徐有貞游興殊未盡強君還共行登山身特健看竹眼偏明醉覺人寰小閒知世事輕芳時莫辜負難得是升平宿覺海菴沈周幽居嫌未邃窈窕藉雲重地溼千莖菌門隂十箇松古厨寒食飯虛谷夜分鐘起坐月當午推窗見碧峰早起茒峰舊到今又宿一夜頓忘行力勞隔橋虎跡林雨過聒枕鳥聲山日高自知狂客興不淺豈是老禪吾愛逃悠悠竹閣盥潄際恰有微風吹鬢毛下蓮峰尋山登覺海皇甫涍蓮峰攀陟罷獨下虎溪湄鐘動閒雲外春濃落日時去携泉竹淨行厯石苔滋更踐無人境烟霞與興隨覺海菴在賀九嶺之東元至元間僧志仁建過磧砂寺吳寬日斜湖上過野寺倦登臨老樹風聲合頽垣雨跡深蛟龍潛近浦鳥雀避叢林不見筠溪叟詩禪久絶音同前沈周雙幢落日倚漁汀北下孤舟此暫停野客偶驚雲外犬老僧隨掩石邉經沙洲古樹藤蘿紫大殿遺基薺麥青今夜試留湖上枕疏鐘高浪不堪聽磧砂禪寺舊名延聖禪院在長洲縣二十六都陳湖北宋乾道間僧道原建元僧圓至記寺有大藏經坊僧云鳥雀不入坊中元時詩僧天隱自江右來居此號筠溪有詩集接待寺八詠姚廣孝𤣥音堂道本靜中心秋潭皎月沉無言得真趣何用覔𤣥音含暉樓樓高逼層雲遙瞰東湖境香斷客不來斜陽半簾影挹清閣虛閣映漣漪禪龕隔蕙帷夜寒深雪裏正是挹清時止息齊悟得西來意高齊閉止息欲語衆人知流雲去無跡雲深處靄靄復𡨕𡨕晨昏不斷生欲尋支遁宅須待有鐘聲一掬軒蕉葉度窗隂池春緑漲深誰將一掬水大地作甘霖松花室翠雲壓真松涼影涵花埒晝靜鳥聲幽風窗墮晴雪聽聞室誰讀貝多文疏簾捲夕曛來聼無礙理江上冷秋雲接待教寺在婁門外寺有八景永樂初姚廣孝留題宣德中燬重修遊金碧山記皇甫信吳多佳山水莫不可逰觀子生於其間未能盡識未嘗不以為恨嵗丙戌三月十日與友人陸君儀吉賀君澤民王君濟之輩逰於西山諸君各乘小肩輿入天平豫與澤民濟之漫步僅一里有寺曰普賢寺之後有山曰金碧崇巖危岑聳插雲霧飛泉瀑布清映珠璧回峰盤紆花木秀麗意者非人間世耶其有神仙輩寓其間也於是入深林渡曲澗窮高而止濯纓溪流箕踞遐睇則與吳之山川厯厯如在足膝而輕雲微靄綴青襲翠眇接逺近四望如一而不覺恍然遺去塵氛飄飄然意吾三人者非所謂仙者耶已而日色莽蒼林䕃交密歸鳥飛止鳴聲無人於是喜而飲飲而醉醉而卧卧而忘其歸也既去儀吉與諸君始自天平還酒罄肴絶力既疲矣謂澤民曰舍車而徒亦有得乎澤民笑曰將輿不若步逺不若近矣乎諸君以為恨夫事有偶得而時有適逢例而廣之人生行止動靜固不異是歟遂書之以為記普賢教寺在天平山之東牛頭峰塢內宋景定間僧智贇建顔汝勳記國朝永樂十三年僧可立曇萼重建陽山大石雲泉菴記吳寬吳城西山連延不絶曰陽山山稍北雄偉特甚其隂石巉然起如人負竒骨而傴者當嶔崟磊硊間有僧居焉名曰雲泉菴成化間豫與太僕少卿李貞伯吳興張子靜松陵史明古往逰自許市北轉入小溪舍舟從平田行仰見石勢欲墮舉足甚恐入門竹樹幽茂薜荔滿墻僧緣崕架木有小屋在石下益竒客喜而就宿聨為長句明日太僕大書屋壁復題名石上而去後二十年豫再還吳中則太僕以下相繼而逝自嘆不能獨逰而徒得沈啓南所作巨圖時取而玩之耳一日有僧來謁問其名曰智韜則菴之主人也曰山居辱公題詠後逰者接踵而至大石菴之名暴著於世此皆詩人和篇也豫既為書其末智韜復請曰菴未有為記者更乞為書之蓋山之有菴相傳為宋珍護禪師所創其扁則銀青光祿大夫齊國公德剛所題然莫能考其為何人也石之大且竒者剒列不一當時與客議此可亭此可堂且軒者尚多今嵗久其地如夢中事不能了了况余且老未知他日歸休再能逰否所幸主僧有開拓志來逰者或能成之當再為書之刻崖石上通議大夫吏部左侍郎前詹事府少詹事兼翰林院學士専知制誥長洲吳寬撰吳興張君淵松陵史君鑑長洲李君甡潁川陳君瑄同觀陽山大石聨句吳寬巖巖者大石甡竒觀人所誦遐想十載餘寬來逰五人共捨舟始登陸淵杖䇿不持鞚是時日當夕鑑兹山氣逾滃入門信突兀甡拾級駭空洞落星何破碎寬靈鷲宜伯仲仰觀神欲飛淵俯瞰心屢恐鱗皴苔蘚剝骨立氷雪凍鑑神驅道撝訶甡鬼劈紋錯綜尊嚴凜君臨寬張拱儼賔送環列盡兒孫淵擁護等僕從欲假愚公移鑑諒匪雍伯種卧鼓慨桴亡甡對臼怯杵重猊吻呀未收寬龍鬛怒難控凝血宜痛鞭淵立肺詎寃訟上漏還啓窗鑑中通自成弄大惟補天功小可砭肌用分矢肅慎來甡浮磬泗濵貢淵亷利並攢劍兀臬側倚甕嶧山辱嬴秦寬艮嶽遺汴宋節彼民具瞻淵壯哉客難奉鑑落照紅抹赭歸雲白流汞僧講㸃頭譍甡將射沒羽中塵緣契三生寬陳圖懷七縱淵在懸太師擊攻玉詩人諷仙煮充腹飢鑑俗搘免腰痛瑶琨産惟揚寬琅玕出乃雍高題少室名甡怪作東坡供半空見玉蝙千仞附青鳯淵棲禪餘百年問僧僅三衆憑虛回曲闌寬架壑出飛棟竹幽補堂坳鑑樹古嵌崕縫竇黑炊烟熏甡坎平鐘乳擁盤盤棧道危寬㶁㶁水泉動淵登頓足力疲眺望眼界空鑑松雪髮欲濡潭月手可弄寬窮攀任生皸甡醉吟微帶齆列坐對彎跧淵大呼應鍠䃔嗜癖牛李愚鑑詩戰鄒魯鬨拜竒得顛名憂墜成噩夢試與叩山靈儻售捐薄俸甡與唐子畏逰陽山大石聨句王鏊峻極惟嵩高嘗聞吉甫誦寅石今者何為勢若與之共偶來試春衣暫爾解塵鞚鏊登原路屢回入門樹爭滃寅叠處譬為山呀然忽成洞鏊橫陳類涅槃分峙儼翁仲寅啾啾猿度悲跕跕鳥飛恐鏊躍冶祥金流摧鋒聖鐵凍寅化工孰燃爐氣機潛理綜鏊一整還一欹誰迎復誰送寅陽山劃中開虎阜凛旁從鏊靈壁豈同儕岐陽真異種寅仰窺天闕低側壓坤維重鏊蹲猊怒將齧奔馬猛難控寅有並若肩隨或分如鬬訟鏊龍象整法筵鼪鼯失家弄寅鑿須神禹功煉待媧皇用巖巖揖孟軻侃侃立子貢洲邉樓碎槌江上城臥甕鏊憑焉或言晉砰爾倏隕宋寅五丁安能驅百神互相奉鏊負戴賴鯤鯨㸃化謝鉛汞寅支傾力巳疲任大材堪中鏊攫拏鬼亦驚秀傑天所縱寅好事來重尋佳句時一諷鏊寧能辭腳繭且得愈頭痛寅秦禪偶遺吳漢封當始雍鏊扛非九鼎雄富比八珍供鏊咄叱起老羝搏拊來儀鳯寅太湖隱見微逺山朝揖衆鏊沉船露危檣敗屋橫折棟寅苔古積成衣藤枯倒穿縫鏊贔屭下倒懸嵌空旁或擁寅凌兢步難移瑟縮心屢動鏊幔亭危冠顛梵宇巧補空寅舉酒欲浩歌援琴時一弄鏊闕雲生殿閣浮風發鐘磬䃔寅上帝闕九重下界市一鬨鏊目中無全吳胸次有雲夢寅便當結幽廬採擷當月俸鏊次匏庵陽山大石聫句韻楊循吉巍乎此陽山有石怪可誦形將水怪截勢與蓮花共仰觀一何髙輕陟不可鞚鳥飛必回翔雲出自騰滃孤圓外成嶠空朗中含洞瘦如辟榖良清若食蚓仲深思殆天設乍至令人恐濃蘿誰作隂寒泉滴為凍戴菴亦顛危携觴更反綜耳脅忽駢攢勒拳時獨送巍巍上少林森森下多從荒崕始誰開倒樹諒非種在兹三吳間當以九鼎重崇巖借冠冕卑巒聽提控勞呼猿固匿被壓松堪訟曲躬始得門側身還入弄拂苔劣容眠收乳兼資用志猶記秦餘材曷遺禹貢立久氣溼袍嘯高聲答甕論年越殷周言時晦唐宋一為佛者居永作逰人奉病宜謐著史寐稱摶養汞四方傳不誣諸公評切中臨谷足還酸乘嶺目偏縱支頥詎厭看極口難竭諷鬼鑿手須胼鯨負背應痛東岱徒小魯西華謬推雍懸磬風發鳴香爐烟結供曝沙伏靈黿食岡停逺鳯是知隆拔羣所貴秀合衆偷餘殿容榱就隙亭閣棟枯藤蔓穿竅長蛇舌撩縫輕清受指彈玲瓏脫泥擁芾拜本無忝羽撼乍得動栽培稀尺閒構架靡寸空炎伏涼自生清秋月堪弄林深必賴燭嵐酷能作齆星化猶立芒龍吟殊叶䃔嶺獅馴已賔阜虎獰敢鬨久嗟隔勝賞頻勞落清夢即欲營終棲其奈懷微俸觀陽山大石沈周望望秦餘杭首尾行不了大石突其凥翹然一拳嬌山體厚藏骨吐秀此特表正類抱中嬰頭頂露於褓形大氣則散趣足喜在小其深雖未即接目逺已好頃來莫能窮繼至敢草草循墻道林麓記曲乃遺杳登登覺向峻漸漸駕木杪猊峰據門左呵禁口欲咬有磴沿百級有殿嵌山造正殿跨偃石懸身龍嫋矯行人目其下恍惚布四爪轉高蹐其背股栗身亦掉鎮腦結佛亭所仗力可擾四壁滿題句貴賤成雜掃同逰懲涉險旋踵促及早次尋石間寮蜂房互窈窕緣勢盡西向局地窄接橑雲棧中貫穿所厯平地少山靜日自長石瘠人亦槁坐僻覬居安傳竒被逰攪陽崕詫唇掀隂竇疑目窅虛含風泠泠濕映雲稍稍衆皺不可尉亂璺龜拆兆層叠百寶合正紺或側縹亘此金剛座千古不可勦危椒壓屋脊雷雨常怯倒草木亦作怪牢絡萬蘿蔦蒼松長深縫本矮枝節老斜見山桃花微紅映叢篠草異傳多藥采掇未諳曉欲宿償三過衾裯悔忘抱既夕氣更佳延月象倍皎尚缺一踏雪意先有瑶島情狀要細述言語未獲巧東坡昔袖去援例我非狡山僧苦著相便覺生煩惱同前徐源兹山有竒觀巍峩設形勝神禹刋木避女媧補天剩磷磷柱國臣鈞力倏與競日華生錦繡烟雲罩苔徑盤桓上中峰仰睇復危磴絶頂諒捫天筋力顧不徑岱宗不可磨此石宜自慶同前徐縉陽山宿稱竒大石更靈怪崕峭忽中空巖連復縈帶烟霞斂夕霏荔薜留霧靄未經神禹鑿冀受米生拜曰豫抱幽僻薄逰竟誰礙攀蘿躡巉岏采芳越森薈道以沉毅超賞與孤高㑹想念山中人秋空發虛籟虛籟能娛人客心殊未艾何當謝塵紛乘雲弄烟瀣同前方鳳殷勤挾小艇迤邐登大石怪險若神造幽闃真鬼宅凌漢龍頭昻負重龜背磔倒拽萬牛喘列坐千人窄眇視笑一拳端拜俯半額憑肩護脛酸呼酒鎮心忒古壁剝舊題灰竇礙頽屐甫快雨忽晴剛醉日欲夕老禪嗜文詞短卷盈咫尺揮毫神欲飛雲開萬峰碧同前薛章憲隕星自天著山巔與天作石知何年谽谺贔屭斷復裂欲墮不墮相鈎連硄然蹄股躩且跧霜叨雪虐成堅頑夸娥負山跂一足罔象拔河聳兩肩嵌空窒罅鬼手刓蜂房聨絡僧廬懸崚嶒石磴蛇倒退決往未省愁攀援還從青衣駕赤犢更覔小有窮兜𤣥同前朱節山深閟竒跡步散漫探索春盡強登臨與衆信云樂𤣥𤣥豈渺茫去去還咨度伊誰嗚玉琴飛瀑出幽壑捫蘿苦多岐躡磴恃輕屫繞耳響松筠瞥眼惜花萼眺逺挹湖光興逸超魚躍倚馬擅三長得鳥在一博穿雲衣自濡嚼茗泉堪酌薄暝忘言旋餘情戀酬酢明月脫沙中清風下飛閣此會良不虛重來訂初約與諸寮登大石胡纘宗昔聞大石大於圜今見大石大於山崚嶒絶頂壘初出縹眇中泓橋欲懸波湧洞庭高入座帆圍滸墅近當筵氅衣兩兩隨𤣥鶴天路紆回望若仙欲别子循登大石雲泉菴皇甫涍惜别向何處山龕到竹林以豫獨往意憐爾倦遊心石壁飛殘葉蘿軒下夕隂清溪一回首惆悵白雲深大石雲泉菴在陽山之北麓上方寺置田疇記僧淮海具區為東南之勝湖以頃者三萬六千山以名者七十有二天光上下烟雲有無風帆出沒渺乎蓬嶠之可到者也夫差留連于銷夏毛公栖遲于林屋蓋洞庭佳絶處也草木葱蒨居民淳古業以漁釣藝植五峰尤為崒秀文岡蔓麓佛仙多依而廬孤園寺在其下梁將軍吳猛所施盛時衆至無所容僧有厭憒鬧者陟上方構别業數椽高明澄逺宜禪誦唐㑹昌六年也厥後嵗增月建成院乾淳間有無證修善師出自閩遍參訪方遷基考室矻矻垂三十年所當有者必具嘉泰開禧無證再主萬夀衲子歸心信風傾向曇秀上人復佩師道力於彈指間聳大樓閣於門庋奉血書華嚴經乃師舊所業也上方之名始著師曰美哉吾莵裘也微恆産曷能久安傾囊尚得千緡屬其徒可任者曰元素糾壇立局置畝僅二百入租斛倍之香積院饒雲行水至平等無礙永香火於深雲傳鐘鼓於下界巍然窣堵無證固已頂雪垂垂素亦老矣念厥艱難庸詔來者請記余曰道非人不𢎞人非倉不支行乞吾法也當時已有過午餒况農末兼并嫉吾病民者夥矣於戲井賦既開病民非一端也今上方營二頃田存千指之衆安居而暇食五觀之餘罔或逸豫盍思所以淑民者而去其所以病民者則素之心可塞也若田鄉都比界備載于劵豫書其序如此西山之逰栩栩飛動尋香山之留詠訪角里之遺跡穿幽透深窮高極逺他日尚能賦之上方寺范成大艤棹古銷夏搘笻新上方珠灣鎖圓折氷鏡沉空光楓纈醉晴日橘黃明早霜閉門松竹徑隨處有清涼同前張雨橘林千黃金林盡路逾僻忽臨銷夏灣雲海浩如積綺季不可追空餘騏驥跡同前王寵山水雲門會林篁石徑微毫光空翠落花雨瀑泉飛麋鹿參金鏡莓苔積寶衣浮沉竟何益轉覺此生非上方教寺在洞庭西山唐會昌六年僧道徹開山本名孤園寺宋嘉泰間萬夀寺僧無證重建始著今額復置田疇僧淮海記祗園寺記李居仁釋氏稱給孤園祇陀太子之園也以黃金布地得八十畝施為寺南朝散騎常侍施所居為寺名孤園其心必有契於祇陀之心而以名寺耶不然則他人以其事符於施給孤園之事而以寺名耶抑猛之名多載儒典豫嘗求猛之行夏月不驅蚊恐去已嚙親夫愛親好善也崇釋好善也若猛信善人矣施所居為寺宜乎有其事也復聞猛好道術回豫章江急莫可濟畫水成陸路而行夫猛好道學長生也好釋求不死也若猛者釋道兼好者焉施所居為寺宜乎有其事也寺在陳隋間規模壯麗棲僧半千唐初有徹道師者脫俗其間宗風大振實居猛之居既而以人夥務繁無以成學乃作别室於北山麓今上方院也廣明間巢冦作寺弛僧絶惟上方克存無恙宋咸淳年僧有名能名門名輝者欲興其廢共力為之遂募緣於鄉之巨室銖積寸纍成五十餘楹亦以猛之址也工畢請記于余余嘗閲郡乘知寺肇於猛故不辭而書之祇園寺蔡羽空白靜雲水古木亦蕭森鐘鼎丹砂厚碑文緑字深溪光動靈籟野曠颯秋隂放棹過湖去青天叠翠岑祇園寺在五峰嶺下本名孤園寺一名下方寺華山寺記僧懷深洞庭華山觀音院者本在胥湖之北宋元嘉中會稽內史張裕請於朝而立焉初裕嘗事應真謹甚感池産千葉蓮因名院曰華山隋大業間廢唐開成四年遷於此往時浚治得會昌斷石碑其略云羅浮常安禪師卜其地即里人徐正甫所施也咸通十五載奏賜今名再廢於會昌至是復興有屋十楹視洞庭西峰諸剎最為勝絶處主僧維照篤志學佛材氣足以立事嘗語其徒曰兹院號觀音蓋未覩其像名存實亡於是用紫旃檀八百兩造像飾以黃金工妙天下并刻諸天十六為大殿以居之規模雄偉動人心目費錢三百萬毫纍銖積閲二十年厥功乃就弟子維監實左右之既而照公欲刻諸石自太湖泛舟登靈巖謁慈受叟懷深求記其事懷深曰華嚴經云海上有山多聖賢衆寶所成極清淨是大寶殿起於層波中鬼工神運豈異此耶請試宴坐反聽默觀則風濤澎湃水石相薄林木鳥獸粥魚齊鼓由此也喜照公能以成就故樂為之書像造於崇寧五年二月工休於四月殿作於靖康二年之二月落成於建炎改元之七月記以是冬之十月初八日也華山寺即觀音院在龍頭山之西宋元嘉二年會稽內史張裕池生千葉蓮奏建本在胥湖之旁唐開成四年通𤣥寺僧契元移置於此宋僧懷深有圓通殿記福源寺田記王公振田疇利天下尚矣神農作耒耜后稷教稼穡一或去食人類絶矣釋氏雖以虛無為教非田疇則何以哉福源肇於梁之大同廢於隋之大業復於唐之貞觀大於國朝之紹興殿宇巍然古迹僅存東西廊廡映帶皆比年草創之規模也寺之初未有阡陌慶元改元比邱志寧矢心發願營浮屠宫抵儀真會里人勞公檀越相與言曰學道無有自虛空入者常住二時蓋謀饘粥之計乃慷慨興念與錢三十萬歸今之常住慧通戮力營置田二十一畝有竒慧明又募衆積勤纍年合為八十餘畝嵗有常産以充淨供始免謀食之憂有金穰之應無水旱之災彼給孤施園知末而不知本妙意設食可暫而不可常視此孰勝恆沙有竭此食無竭勞氏之德溥矣豫逰西山十二年知寺僧亦不妄食人之施者於是乎書嘉慶十二年二月望日三山黃公振撰福源寺在毛公壇之南攢雲嶺梁大同二年吳縣令黃禎捨山園置僧普國開山隋廢唐貞觀中興華山寺范成大五湖西岸孤絶處栴檀大士來同住性空真水遍清涼隨緣出現無方所䝉泉新潔鑑泉明瀹茗羮藜甘似乳何須苦問蓮開未桂子菖花了今古三翁彩筆照青霞從此他山都不數我今閒行作閒客暫借雲窗解包具魂清骨冷不成眠徹曉跏趺聽粥鼓腳力有餘西塢盡明日灣頭更鳴櫓却上東山喚德雲别峰應在銀濤許寺在西山盡處多泉泓僧房中數處有之有湯岐公胡茂老孫仲益題詩同孟文質弟元大游華山寺陸川嶺畔華山仄徑通新年遊興有人同桂垂玉筯消殘雪壑湧松濤㵼晚風鳥背日斜屏嶂緑巖腰泉落鏡潭空雲深更是幽棲處修竹竒杉翠不窮西小湖寺記曾棨姑蘇太湖有山焉磅礴峭拔屹然特立湖中山頂有小湖泓渟澄徹炯若寶鏡每太湖風生浪湧則小湖必相應梁大同間達法師始以其地創為寺唐乾符中有沉香觀音像泛湖而來諸山具舟爭迎莫能動獨西小湖寺僧誠禱像忽隨波低昻一舉而上遂至寺像旁楊枝水下滴皆生千葉蓮花由是四方水旱疾疫禱莫不驗寺遂大興宋元之際弛于火棟宇無遺泰定中昌法師始創觀音殿國朝平張氏中山武寧王駐兵於此號令嚴肅寺得不廢永樂初僧惟寅主寺事十餘年出其先師康伯寧遺資興造聞者爭以施始建三聖殿暨廊廡方丈衆室像設靡不備高甍巨棟金碧煥發湖波嶺岫光彩浮動於是西湖一寺之勝悉復其舊西湖為東南名剎唐白居易宋孫覿咸嘗題詠兹來京請記其事遂為之書西小湖寺白居易湖上山頭别有湖芰荷香氣占仙都夜涵星斗分乾象曉映雲霓作畫圖風動白蘋天上浪鳥栖寒沼日中烏若非物外多靈跡爭得長年水不枯西小湖天台教寺在縹眇北二里乃觀音教院也嶺有一小湖名海眼每太湖波濤起此中波浪亦涌蓋水脉相通云相傳唐時有沉香觀音像浮波而來諸寺院迎之不可得西小湖晚來迎得之像上有水滴路皆生旱蓮至寺有草少許繞像棄之池中即開重臺蓮花後人殺犬汚其池花不復發國朝永樂十四年僧惟寅重建包山寺范成大仙塢遜半坐精廬遷古幢槁衲昔開山至今坐道場熾然說慈忍禪海薰戒香稚竹暗寒碧飛松盤老蒼船鼓入宴坐紅塵隔滄浪藤杖懶歸去共倚蒲團牀同前徐震休屋下清泉屋上山薜蘿深處扣禪關尋僧欲問三生話使我能偷半日閒雁沒浦雲秋色外鶴歸庭樹夕陽間人生為惜歡逰少石壁題詩記往年過包山寺贈旭東明杜瓊東明八十守枯禪不出包山已數年聞道我來門口坐兩人扶掖下山顛包山寺王寵百嶺自回合天開寶樹林雲藏靈影曳風竹澗泉吟白石參龍象青山習道心網羅空繾綣吾意在高深宿法華寺王鏊法華我曾來懸崖縱飛步長松高參天修竹亂無數北岡瞰空濶風帆在其下橫隂紹千山厯厯皆可睹蓬萊亦咫尺神仙在何處安得乘長風飄然從此渡坐法華後石上望逺寄王元德午烟孤起碧山崖瓦室參差日影斜只隔盈盈衣帶水不知何處是君家法華寺在金鐸山之嶺與陸無蹇宿資慶寺蔡羽空壁聞啼鳥雲深冷石房春隨落花去人自采茶忙葉暗翻經室泉虛㸃易牀陸郎溪壑主假榻久何妨資慶寺在涵村之陽訪翠峰寺和樂天韻李彌大山浮羣玉碧空沉萬傾光涵幾許深梵剎樓臺噓氣蜃洞天日月浴丹金秋林結緑流連賞春塢藏紅次第吟擬泛一舟追范蠡從來世味不關心題翠峰寺范成大來從第九天橘社繫歸船借問翠峰路誰參雪竇禪應真庭下木說法井中泉公案新翻出諸方一任傳寄翠峰寺敏仲謙釋子賢敏公遙住洞庭西咫尺烟波路欲迷落日斷霞山疊疊揚舲鼓枻風凄凄魚龍出沒隨潮上橘柚參差壓樹低東崦人家更清絶也思來此作幽栖入翠峰寺吳寬步轉危峰路豁然梅花叢裏見青天春泥不涴登山屐又過長松啜冷泉題翠峰寺吳鳴翰野服乘春到梵宫上方佳境似崆峒藤蘿翠掃千峰雪薝蔔香傳一殿風閒聽磬聲知定起靜依潭影覺情空清時未許投簪紱此意還應問逺公遊翠峰寺雪竇道場徐禎卿香燈閒照古堂虛日午桐隂上井遲嘗橘客求藏甕法煮茶僧乞啜泉詩聽經猶剩當年鹿好事誰摹宿草碑陳迹半銷何處問令人空憶翠峰師謝吳東澗惠悟道泉吳寬試茶曽憶草年前抱甕傾來味宛然踏雪故穿東澗屐迎風遙附太湖船題詩寥落懷諸友悟道分明見老禪自愧無能為水記遍將名品與人傳和沈周彭亨一器置堂前思此泠泠久缺然借取白雲朝幕甕載兼明月夜同船小分東澗聊知味大吸西江亦喻禪紗帽籠頭烟繞鬢煎茶有法是盧傳酌悟道泉王寵名泉真乳穴滴滴滲雲膚白石支丹鼎青山調水符靈仙餐玉法人世獨醒徒長嘯千林竹清風來五湖翠峰禪寺在莫釐峰之隂唐將軍席溫捨宅置蘇州志云宋初明覺顯禪師住茲山說法時有龍出井羅漢亦隱樹而聽寺有悟道泉興福寺記吳寬吳地多水其最巨者曰太湖太湖中多山其最巨者曰洞庭洞庭為山周可百五十里中有穴相傳禹藏治水符於此因名其東十里又一山相距而差小其勝略等人稱東洞庭以别之當波濤浩渺間兩山對峙鬱然蒼翠儼如畫圖殆道家所謂蓬萊方丈者民環山而居善植果木世擅其利而屋宇閭巷聨絡映帶忽不知其為山林也其尤勝處往往有佛寺據之成化十五年二月既望豫與兵部李公為東洞庭之遊自岱心吳氏肩輿行十里許入俞塢得寺曰興福主僧恩復出迓客延登其後小閣是時梅花方盛開彌望如白雲崕谷莫辨山有九塢九塢之水合流循寺門而行松根石罅水聲㶁㶁意甚樂之豫既留詩而去未幾北來京師車馬塵埃間未嘗不思東洞庭之遊之樂也一日有僧叩門來謁豫熟其貌則昔者復公之徒也其言曰興福寺久矣甚恨無文字刻石可考往者幸辱逰覽惟終畀之此智勤所以來者豫嘗愛其寺據山水深逺處殊為幽僻宜學佛者居其徒嵗食田園所入可以自足而豫所接如復如勤輩又皆恭謹能守戒律稱學佛者豫何愛一言不為之記耶寺建于梁天監二年傳有于將軍者所捨宅故在山之麓始居者曰清禪師至唐遷於此嵗久興廢皆莫能知可知者廢於國初而深谷邃公復興之二傳仍廢而僧亦絶矣景泰間今復公始自其山法海寺從里人之請而來凡建門堂殿閣數十楹而佛像咸具蓋智勤實相其事而成之是為記興福寺山居記王鏊浮屠氏之道有合乎吾儒之所謂靜何也達摩西來傳佛語心心或撓焉則安得而寂或淆焉則安得而清或翳焉則安得而明是故亦有資乎靜也靜斯定矣慧矣然後惟其所之靜亦動也動亦靜也洞庭有湖山之勝而恆患於逼狹所謂俞塢者窈然而深坦然而夷長松參天竒花異果紛峙羅列而興福寺又據其勝占其幽勤上人又擇其巉絶之處作山居焉旦暮焚修終年蔬食年且九十而貌如少壯者非有得於靜耶若吾人之所治者由靜而安而慮而得其素講也顧擾擾焉日馳乎外非名則利有若勤之靜且専乎是不能無愧於彼也然吾有問焉若勤之靜惺惺然専一之中其有所主乎其無所主乎有所主則倚無所主則蕩則所謂靜而定者其亦難乎故因其居之成為記諸壁而因以問之興福寺小憩吳寬九塢寒泉一澗流遙從木末望山頭春風未掃禪林雪更為梅花半日留興福寺在俞塢之南梁天監二年于將軍捨宅建清禪師開山國朝成化中僧智勤重修靈源寺葉顒散花丈室靜焚香小小雲龕穩勝牀須信定中還有定莫言方外更無方青蓮滿眼非真色白月流金只慧光今日相逢陪軟語塵緣俗慮一時忘同前碧螺峰下靈源寺草木無多屋半荒一自先生來卜築山雲山霧盡文章宿靈源寺徐禎卿江城歲晚欲回舟山寺擕衾作夜逰愛月不妨寒步影岸冠微覺露濡頭蒲團對語僧圍燭菊宴分題客咏秋怪是思清還廢寢鐘聲為破小堂幽靈源寺在碧螺峰下逰能仁彌勒二寺古殿秋荒落晚曛叩門先怕鹿驚羣靈池石亂金龍隱梵磬聲清石洞聞逰客到稀塵裹鉢高僧化後鶴哀雲飯石禪師舊居于此幽懷未吐煩君問何日禪牀許見分能仁寺在長圻嶺之東彌勒寺在飯石峰下宿華嚴寺王鏊歸來每向招提宿心若閒雲著處安已到家山無去住偶聞塵世有悲歡烟霞自可通禪觀草木還應識宰官少小來逰今白髮幾回欲去更盤桓華嚴寺在翠峰之陽飯法海寺吳寬行盡松杉嶺漸平日高深谷喜新晴山棲飯罷渾無事獨倚危䦨聽水聲法海寺在莫釐峯之陽三峰寺莊田記曹熙三峰古剎也四面皆平湖遙岑屏列空際山屹乎其中孤絶而巧世人名為小蓬萊以其與人境隔也鐘鼓三百年風月三萬六千頃勝槩甲於吳中清高之士往往萃焉由是二時之供常苦不繼朝營暮求出者勞力居者勞心不知清淨之為樂移念慮于米鹽細故者多矣上人惠因者欣然有衛道計乃罄囊中物轉鬻長生田為善士倡此邦之人爭割巳以助成之得田百畝者視嵗乏之數而僅充焉使同堂大德開單轉鉢不必乞諸長舍城中而能具足圓滿豈不美歟夫田百畝有限福利無邉嵗月有期齊供無盡食輪既轉道心益堅推原所自烏能無紀耶噫事莫難於有始而上人倡之事尤難於有終而善信繼之是田也無時而巳是福也亦無時而已西方之聖人教行於中國果且如是而已乎果且不如是巳乎三峯寺在三山唐咸通十三年僧真銓開山徐氏襲慶菴重修記徐有貞禮不墓祭墓而為之享祠禮乎曰禮無之也其義則有取焉先王之世卿大夫士之祭有廟士庶人之祭有寢固無事乎墓祭也漢立原廟後世因之而卿大夫士庶始有為祠以享于墓者其於禮則逺矣然原其為心則固有孝子順孫追逺報本之意焉君子於此其可深非之耶光福徐氏吳之望族也家於鄧尉之陽而墓於其山之隂以昭穆而數之者餘十世焉國初季清之曾大父建寧司訓良輔始建享祠于墓左春秋合族而祭即今之襲慶菴是也菴之建距今蓋七十餘年而日就隳圮季清顧之歎曰先祖之祠子孫坐視其廢吾罪多矣遂請於族汝航而新之其祭享之儀一循良輔之規焉季清乃具始末謁豫請記以示子孫嗚呼季清其賢矣哉世之不肖子孫藉先世之業而莫之能振觀祖父墳墓有如路傍之廢塜荆榛不剪狐不驅薪其樹而貨其田曾無感戚於中亦獨何心哉觀於季清之拳拳以奉祠為意而惟恐弗逮其順悖豈不逺乎君子於是乎有以賢夫季清也雖然豫猶有所告於季清古之所謂孝子順孫者以其克繼承乎父祖之志也乃曾祖之為是菴而以襲慶名之固將以貽慶於爾子孫而冀之世繼其志焉耳易曰積善之家必有餘慶是慶之致必以積善也善不積慶何由而致季清於是孜孜焉以善繼之乃子乃孫又孜孜焉以善繼之則天之福善必世祐之徐氏之慶其可量乎是為記襲慶菴在鄧尉山北題善惠菴八詠劉溥潛心堂松堂坐來久脈脈夜方永明月上寒城不照塔輪影覽勝橋修梁擬虎溪野色分南北逰人來復去羣峯聳寒碧緑雲軒羃羃晝隂合重重涼影浮清風吹不散灑然孤磬秋翠濤林潮音出東海風灑松梢夕聽耳久無聞喧來詎忘寂白蓮治水花涵玉香苦心愜幽素入社方有戒不著窺魚鷺紫蘭室一室大如斗中有萬古春罣罥終為纍畢竟許誰紉梅窗月南枝本無影皓魄閒自照橫斜上踈楞相對成一笑桂苑風西林釀天香鼻端來陳陳僧厨飯初熟適此吹花信善惠菴在長洲縣九都元大德間僧明本開山郟天如記有施茶亭天池寂鑑禪院記釋克新距姑蘇城西一舍皆山五峰環峙者曰華山峰之趾有泉泓然曰天池大旱不涸池北為寂鑑禪院沙門在公環庵所創者以至正丁酉避兵來愛其地而賢首師别聞聰公施財因巗為屋以居道侶正堂無竭募衆資之於是作石殿三間就石肖釋迦藥師彌陀像其菩薩侍衛之神與供養之具皆石為之又琢石為五十三參於三門左右壁纍石作外門門上為重屋夜置膏火其中曰天燈樓磨崕刻三十五佛名鑿池左右立石為彌勒彌陀而屋焉署曰兜率宫極樂國前樹梵塔對峙巍然他及禪誦之室庖湢之所賔客之館咸具如式既成而在以基地為大覺寺業為未備今年大覺以致閏號山五十畝售在在偕其徒菩澤傾槖買之乃來請書其事于石昭示來者按山舊志劉宋時為㑹稽太守張裕私第裕事佛甚謹因供羅漢而池有千葉青蓮花之異復有鏡法師於此著書曰法華𤣥義行世趙宋乾道間為張祕監别墅有亭館曰浮槎望湖滌煩釣灘者十餘所造圓通像於蒼玉洞又肖巳像侍焉由是山名益著以降而寂寥者二百年今環庵於兵戈擾攘之際荆榛莽蒼之中不數年化成蘭若非夙乘願力疇克如是耶所謂前身後身未可知也開基日方舉一石則泉隨石而湧瀦之可給二百人其有以夫環庵名道在京口人得度於普應國師中峯本公師事既久遂升堂奧所至士民向化嘗築菴武庚之上柏丹陽之環溪二邑之人逮今思之行年七十有七精力強健可喜故樂為書之今年洪武二年己酉也其智文辨大禪師蘇州府承天能仁禪寺住持克新撰前資善大夫江浙等處行中書省左丞周伯琦書并篆住持沙門端文菴主正敏副菴道隱西序契端性實同立石華山天池院記趙同魯天池在華山之麓距郡城西二舍許巖石竒秀望之如屏池生千葉蓮昔人服之羽化老子枕中記云此地可避難有十一景之目誠三吳靈秀之區也院創於劉宋時㑹稽太守張裕舍宅為之復有鏡法師者著書於此宋乾道間為張祕監别墅既而廢弛踰三百祀至正間有環菴在師中峯本公髙弟也始來居之創菴曰寂鑑建石殿肖石像壘石為門劖石摹五十三參相磨崖勒三十五佛名天燈有樓兜率有宫侔大叢林無所不備自後鐘魚不鳴法龍不吼逮將百年𢎞治初寺僧清古潭誓欲修之而力不逮聞天目山有異僧普惠師寓蘇之寒山寺將往迎之未果而古潭示寂其徒淵天泉慨然曰吾師之願不可不竟也謀諸鄉耆德蔣廷用輩偕往禮請師乃幡然赴之法幢一建四衆雲集貧者效力巧者獻伎富貴者投金帛善人龎彥誠首施白金二鎰衢工江友文力甃石壁三百餘文遂于今年三月八日起建大雄殿莊嚴三世諸佛旁列阿羅漢像講法有堂棲禪有所增飾兩廡庖庫圊湢以次修舉落成之日天泉以為惠師之願力檀施之良心興建之嵗月不可無記乃礱密石手疏顛末介豫友翁君景和謁文為記余少時嘗觀黃子久所繪天池石壁圖及高太史諸公之什恨不一覽其勝逮今未遑間嘗夢入一山瞻石室像而浴清泠之淵尋得其疏并菴記讀之其與夢境若合符節吁竒矣哉惠師出大願力作如幻事化草莽為金碧山川為之改觀雲烟為之動色豫以夢寐之頃獲接真境若身履之以償素願非其教所謂一切有為法如夢幻泡影者歟雖然土木成壞有數而有不成不壞者存蓋佛之為言覺也將以覺羣生沙門之言息也將以息諸妄師能演其教啓羣迷為正覺轉惑見為真智其有功于象教為何如遂書以復於天泉俾勒諸石系之偈曰顧諟天池水湛然浸虛空虛空原不壞萬劫為如是其中青蓮花亭亭出泥滓有如清淨身色相無染著嘗聞枕中記此地可避難龍蛇縱起陸是中常自在劫火熾欲然至此即消滅屏去諸煩惱屏去諸惡業是謂兜率宫是謂極樂國惠師化利功成此希有事檀越爭駭奔神輸鬼復運棟宇極翬飛莊嚴最壯麗天人阿修羅一切皆供養凡百供張具種種無不備阿含經有云能補故寺者是為二梵福故寺且云然是非故寺比功德當云何無量亦無邉以至不可議𢎞治五年八月中秋郡人趙同魯撰文住山道淵立石吳都文粹續集卷三十三
