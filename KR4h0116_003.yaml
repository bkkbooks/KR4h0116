body:
  text: 吴都文粹續集巻三明錢穀撰學校平江府修學記鄭億年上之紹興十四年春詔以工部侍郎王公㬇為寶文閣直學士出守平江既至吏以令白請謁先聖先師于學顧瞻咨嗟曰夫學不可廢于時而士不可以不學其來久矣傳曰家有塾黨有庠遂有序國有學此三代之制也百世取法焉今蕪廢不治如此使民無所瞻仰因陋就簡漫不加飭殆守土者之罪也敢以不敏憚于改作于是闢而葺之講誦有堂休宿有齋至庖湢莫不有所經始于四月落成于九月吏不告勞民不知役而顯敞宏大首出旁郡且將請于朝給公田數十百畝以益其用使餱糧常不乏于是就學者日益衆矣先是上深惟天下弊于兵革民不得休息揆自獨志惇好鄰壤而邊鄙不聳乃即駐蹕之地建太學令有司討論三舍取士之制萬幾之暇親御翰墨書孝經周易詩書刻之堅珉頒之郡國所以寵異學者甚厚郡太守能丕應徯志者幾希其人哉學在府治西南隅景祐中文正范公所建蓋熈朝極盛之時也仁宗方垂拱而視兆民之阜獨以學校為先務而文正范公入輔出藩勳德並隆為世宗工望重天下其所創立後之人詎可忽諸逮今百有餘年矣値聖主楙建中興之治増光祖烈寳學公㬇精白一意以承休德且不敢墮文正之為鼎新學宫物議歸重士之㳺息于此者思所以稱宜其人自勉勵期于有成金玉其相追琢其章以進德而修業彼頑鈍無恥詬無節者曽不得容跡于其間使天下後世謂姑蘇為多士豈不美歟資政殿大學士朝請郎提舉臨安府洞霄宫鄭億年記平江路重修儒學記楊載天下州縣之學莫盛于江浙之間江浙之間之學莫盛于吳前代之制州縣有文宣王廟而無學宋景祐間范文正公守郷郡始割錢氏南園地而剏為之又擇沃壤為贍學田及公參預大政首為仁宗言詔州縣皆立學然則天下之有學自吳郡始也後五十餘年當元祐四年公之子純禮為江淮發運使因過家上冢疏請朝廷復割南園地以益之由是學制大備當文正公立學時首迎安定胡先生以為學者師自漢唐以來公卿大臣才兼文武以忠孝著節如文正公幾何人哉自孔孟以來為五經大儒能傳聖人之學唯河南二程先生二程先生則嘗逰安定胡先生之門吳郡之學重之以二大賢之遺跡後來郡守之有識者進謁祠宇顧瞻儀型躍然于心未論他政事必以興學為先務建炎間烏珠過吳學為邱墟紹興十一年梁侯汝嘉重建禮殿十五年王侯㬇繼造兩廡講堂齋舍承平舊觀至是盡復淳熈十六年趙侯彦操増造御書閣五賢堂寶祐間趙侯與􅊸盛有所増飭有元大德二年治中王都中以殿宇廢久謀諸前兩浙都轉鹽運使朱侯虎慨然用其私財撤而新之則又前此所未有也今僅二十餘年廟學之屋俱有損者門廡墻壁日就頹剥今總管師侯始至奠謁先聖先賢周覽徘徊嘆曰是學也嘗謂天下之甚盛幸今未及大壞承事在予不亟修葺以遺後人他日必用力百倍其困弗能之矣謂非予之責不可也于是木之朽者悉易之墻壁之缺者悉作之廟瓦破漏者多盡代其藉之之物而更覆之増飾塑像而新其藻繪始事以四月十二日卒事以五月二十八日侯屬載為文以記之且曰必厯叙前人之有功者今日之事則毋庸過褒侯意如此將以觀于無窮也載承命唯謹姑記其實侯之他善政則不敢及焉侯之志也摠管托里圗姓師名克恭字敬之寧夏河西人至治元年五月記承務郎前饒州路同知梁州事楊載記平江路儒學大成殿記燕公楠皇帝即位之初年首詔郡國敦學修廟越五年是為大德二年戊戌秋八月平江郡大成殿成前浙都轉鹽運使朱虎所造也三日丁巳郡侯戎益帥其長貳若屬詣新廟行釋奠禮文武司之在郡者咸集諸生駿奔走執籩豆六民聚觀謂有學未始有此侯成禮退顧教授蕭以道陳紹佐曰偉哉朱君之績也毋忘盍記諸于是公楠以朝命實來杭歸道于學二教授請記以道言曰學雄浙右尚矣而廟不稱自宋紹興辛酉之歲建于今丁酉三十七年矣終視其梁麗修之未之有改以道始至即郡别駕王都中謀焉别駕曰是謀非郡士與他人所能及也其朱都運乎乃約東嘉蔡延辛偕請焉都運嘅曰吾為吳人二十年未聞有為是殿謀者其數邪今日之事先聖事也曷敢不力欣然援筆書重建字畀以道歸示諸生盡驚復疑信半㑹都運有母喪浮言胥動謂殿事格矣乃孟冬之日馳告者曰朱運使木蔽江至矣羣工雲集即日肇役凡七月而舉梁舉梁之日去歲始議之日也謂非數乎舊基三尺其棟不過十之今通為丈者五蓋嘗慿虗望東西諸樓閣巋然者無不及而翼然者過之矣學乃以米廩之積為三門兩廡髙下深廣悉稱其殿丹青漆堊之䴡垣壁瓦石之壯無不可久是役勤矣㣲都運不及此而欿然不自功也記非都運意獨願得一言載侯意示學者予心諾之顧悤悤未暇李侯戡來廟訖事復速記予辭不獲乃言曰聖人之道如天地父母在人日用飲食間無時或息者也嘗思有以自盡茍吾黨而有所不知不能媿已都運之為此不朽二三子忘之杏壇其忘之乎雖然廟自孔子所以為道非徒壯其居也易于渙萃俱言廟廟者所以収人心之渙而成其萃夫廟髙矣大矣美矣今之萃其抑猶昔之渙乎子曰薄于德于禮虗又曰制度在禮文為在禮行之其在人乎此子㳺之所傳習也東西匹士自通洙泗上附青雲衮冕萬世非二三子之東家與誰謂華髙企其齊而尚其自厲以一洗荀卿子子㳺氏之儒之誚則為無負都運新美之功郡長貳勉勵之意以式克欽承聖天子之明詔而廟不朽矣十月望日立資德大夫河南江北等處行中書省右丞燕公楠記觀德亭記王景齊歲在柔兆執徐孟春壬寅節齋觀相趙公先生再鎮吳門報政之正月以是日行鄉飲于郡學粤四月壬午合鄉射于學之圃禮也古卿大夫射必先行飲酒之禮飲所以序長幼射所以觀德歟夫揖讓而無所争不中而不怨勝已惟有德者能之由其安行乎恭遜之節習熟乎和順之體者有素也不然血氣之性能無争物欲之情能無怨乎故三揖三讓昭其敬五豆六豆昭其等也由是而貴賤明隆殺辨則以之備志體之正直持弓矢而審固争且怨何有哉然則先飲後射古人以此觀德行而亦世教所關歟吳故泰伯之國也莫大于天下而讓者三其去揖升下飲之争逺矣厥後二千年間忠信之教雖㣲而禮遜之士不乏我朝文正范公始建鄉校古道復振嘗自謂曰士當先天下之憂而憂後天下之樂而樂被其教者寧復勝已為怨乎先生憇棠隂于衮繡之鄉德爵無慊于范公而政教有加于往昔猶念風漓俗靡浸不如古思欲一變而還其初謂學莫先于崇化而道莫易于觀鄉既咨郡博士四明林君潛考經定式備諸郡之彌文復命幕屬趙君孟憲王君次丑聨事合治摠庻務之靡宻前期舍菜于先聖先師越夕㑹鄉之耋老暨大夫士齒于飲所以撰禮延至憲使𢎞齋包公恢庾使雲岩洪公燾而先生實主之三行百拜觀德一新且班教給費命諸邑傚行如郡庠威儀盛美矣林君曰古人射禮必繼鄉飲之後蓋有為也可舉一廢一哉撤射亭而新之俾佩衿逰于斯習于斯無何決拾既閑正鵠命中君曰可矣乃曰請莅射先生後為之集衣冠合臺府旗旄戾止立司馬射人以節其進退之儀雝雝于于升降以叙發彼有的行同乎賓筵舍矢既均藝修乎行葦先生喟然曰禮無古今歟何轉移習俗之易也射可以觀德信矣遂大書二字以扁亭蓋與吳學相為不朽也噫先生之化宏矣士當何如哉是必味繹志之義學采蘩之節孝弟好禮篤學稱道無媿于矍圃揚觶之言可也他日試于天子之澤宫而中者多與焉盛豈直進爵益地為先生榮哉當知士者民之表也禮者化之樞也昔文翁招子弟立學官而蜀郡化于文韓延壽命諸生執俎豆而潁川化于禮矧吳素號文物之邦既辱賢師帥作成之又得名師儒講行之目擊心喻俗其不古乎嘗謂世固有言政而不及化者未有化行而政不修者也先生下車以來蠲散糴以甦民録巨奸而戢吏行兵而増備核賦以寛征政之大者無不修此化之所以易行也雖然風動教化用之鄉人用之邦國一也先生豈又私于鄉校哉挈斯世于三代之隆特一飲射之推耳先取先生作棟梁指日事也其次乃及桷與榱廣文二幙何遜焉景齊吳人也且受之師門偶綴末班弗獲聽政役幸前廡諸君有請輙誦所聞以詔來者云門生朝議大夫軍器少監兼權金部郎官兼資善堂直講王景齊記重修大成殿記鄭仲熊郡邑置夫子廟于學以歲時釋奠蓋自唐貞觀以來未之或改我宋有天下因其制而損益之姑蘇當浙右要區規模尤大當建炎戎馬蕩然無遺雖修學宫于荆榛瓦礫之餘獨殿宇未遑議也每春秋展禮于齋廬已則置不問殆為闕典今寶文閣直學士括蒼梁公來牧之明年實紹興十又一禩也二月上丁修祀既畢乃惕然自咎揖諸生告之曰天子不以汝嘉為不肖俾再守兹土顧治民事神皆守之職惟是夫子之祀教化所基尤宜嚴且謹而拜跪薦祭之地卑陋乃爾其何以揭䖍妥靈汝嘉也不敢避其責曩嘗去此彌年若有所負尚安得以罷輭自恕復累後人乎他日或克就緒願與諸君落之于是謀之僚吏捜故府得遺材逾千枚取贏貲以給其費鳩工庀役各舉其伍幾月訖功民不知與像設禮器百用具修至于堂室廊序門牖垣墻皆一新之無復兵火凋殘之像既而公求去甚力士子德公之賜隂圗挽之者計百出不果仲熊客逰之久嘗從公廡下壯其閎偉徘徊不能去退而竊有述焉夫樂因循而重改作最天下之大患當承平無事法令備具上下恬嬉往往負材抱藝之流欲有施設亦無因以見若艱難多故雖賢智馳騖猶日不暇給倘復一切茍且則浸淫跅弛無所不至矣自國家兵興之後天下廟學厪厪有之類因陋就寡者以為迂濶不急之務漫不加省縱有意吾黨事者猶縮手畏避不敢為蓋嘗深鄙焉惜其不振也去年夏邊郵繹騷朝廷以此邦江淮之衝亟起公琳館以鎭撫之下車未久一境晏然廼獨以學校為急除舊起廢以飭祀典且修文正范公安定胡先生二祠以為邦人之勸公之用意至於如此可謂知所先矣此役也雖未足以窺公規畫一二然使為師帥者率以是為務吾知其有廢皆舉何事不濟哉故叙其實以告來者且系之以詩曰巍巍夫子道侔天地久而彌光于今奉祀中原雲擾俎豆靡餘旁風上雨以窘厥居兩楹之奠鮮克中禮弗恭弗蠲吾道是恥玩歲愒日孰為經營奕奕斯廟非公莫成神棲孔嚴遂還舊觀峩峩儒冠載瞻咏嘆維昔僖公實修頖宫千載相望蔚其髙風猗歟斯舉能使吳重我作此詩以繼魯頌尊經閣記楊載宋康定間吳學始造六經閣請浙東帥張公伯玉為之記以屬其佐曽公鞏文成置弗用伯玉自為之曽鞏歎服其文傳天下至今淳熈間郡守趙彦操即其地改造御書閣有元大德五年東海有颶風之災閣碎為虀粉延祐五年鄧公文原持部使者節來勉勵學校誦伯玉之文歎是閣之不復見也則語教官陳君伯曰吾聞吳郡學租頗多茍畢入無負以之贍士不寧尚有餘也取以營閣則前賢之遺跡不終冺矣陳君克己自勵敏于應事往時學租之不可責者唯陳君能責之由是聚米如山倉廩皆溢明年鄧公復來以此責郡守宜奉行詔書興起學校檄郡幕官之長使董凡役事是時為郡守相繼則必巴實侯及曹侯晉幕官之長則李君仲英也屬議咸曰嘉定義士沈君文輝以漕海有功拜忠翊校尉其人樂于施捨為鄉里造學又割田以給教養之費强力有幹習于工役之事遂具禮以聘焉沈君承命惟謹召大匠陸文隆與定制掄材李君屬徒以㑹其役舊閣前距大池僅半歩後廹明倫堂嶷然為屏蔽雖正晝陽景不下燭居常憒憒然稍北五十歩當止善堂之後有亭曰聽雨有堂曰傳道移構稍北二十歩即其地造閣三間兩翼三簷二十八楹為髙八十尺東西一百尺南北五十六尺倚檻而望郡郭之内浮屠老子之宫雖樓觀相連凌虚特起然而其勢皆詘伏在下無敢與之争為長雄其剏制也竒偉如此屬役方殷曹侯移守毘陵師侯克恭承之凡六閱月而閣成七年六月之晦是其成日也用中統鈔千五百四十錠有竒米五百五十石沈君所捐以相之者復二百錠府中嘗意其用財之㤗也使吏復其籍迄無毫髪負由是師使加禮于陳君而稱之以為賢蓋往時之為教官者多矣歲租所入悉之以贍士恒有所不足陳君在官四年已建是閣復修大成殿重造明倫堂學廩恒充牣有餘不賢而能之乎沈君亦以此義聲聞于東南師侯不滿秩被召為京尹而趙侯鳳儀承之謂宜加功土木而中輙已久侯悉董而成之又増置外垣地五百四十丈環植松栢萬餘株為屋以周于四阿經史子集各以其函櫝刻以金石絲竹匏土革木八字以識之又大書尊經閣以掲于楣間壯䴡特絶與閣相稱善後至此侯之力也已至屬筆于載使記其顛末由部使者郡守之賢下至于教官有功于學校並著不忘傳之永久所以勸也藏經于此將以為學者之資不愛厚費建立非常將以寓尊崇之意使學者觀之而興起之也不然是徒擁虗器營締雖勤復何補哉學者其愼思之至治二年良月日立新修平江路學記栁貫吳郡有學起范文正公而學有教法起胡安定先生當是時天下固未有學蒞教事者以禮聘不以選授學非常有則甚重矣其後文正公上天章閣十事仁宗慨然命天下郡縣皆立學又取安定學法為太學法學校因得著為令至于今不廢其端蓋自文正公發之而吳郡實為之權輿焉吳大邦也生齒之夥賦入之饒視他郡或相倍蓰朝廷常選重臣畀之司牧其任弊獄訟詰憲禁愼簡稽時貢輸疲心力于簿書期㑹間日恐弗給非才敏用裕者尚安有餘智及于學哉故觀文教之廢舉而知郡政之弛張于吳為尤切矣乃至順二年冬彭城錢侯光弼自大梁移牧斯郡至之三日以故事修禮于先聖先師顧瞻堂庭荒茀弗治退即教授趙晉之問其故晉之曰比歲吳田敗于水廩粟之不贏二三吾興土木其將疇資公能責其逋租而視其不可緩者葺之學得不毁而功則有繼侯曰然為擇謹敏吏鉤校計簿而督其當輸不輸者得中統鈔五十餘錠侯曰以是濟弊不猶愈于已乎既撤仰髙采芹二亭而一新之乃相禮殿講堂門廡齋館及尊經閣先賢祠易撓腐為堅良化刓缺為麗宻而以其餘力築垣墉維一千五百尺侯曰此如痿廢之人形稍立矣使天幸賜一稔吾當嗣為之明年歲則小熟侯益節浮緝剰首議以講堂西閒屋曰成德堂者改祠先賢自一瓦一椽皆革其弊故而為新美迴廊繚如觚棟翼如制雖由舊而功則倍于經始又謂靈星門實備臯應之制宜髙抗而不宜卑陋掄材庀工重作三門六扉以壯禮容塗塈堊雘擇于度而止凡所經營必諦必審圖為可久毋徼速成厥既僝工釋菜于先聖卒徹觴客貫時與在賔席學之師生揖貫曰自侯之至歲屬薦飢軺傳沓來符檄叢委人謂侯將爬梳綜理之不暇而暇加意于學侯則不然凡所以惠綏吾學者愈于整暇之時今考成有薦薦已有宴子實執爵以酬幸為我著之以示方來嗟乎不可必得者人之時而可以必致者人之才時茍不偶則挾强忍之力濟通敏之才亦何事之不立而何為之不成方庚午辛未間吳中道殣相枕藉大家巨室困于征需而丘民之自能拔于溝瘠者百無二三侯之授節南來適承其餘此何如時哉侯既殫慮畢智為之勞徠安輯而天終祐民克相有秋吾黨之士言觀魯侯之樂樂飲在泮之酒尚論學政而知其不屈于時以能為所欲為者才也才敏則用裕廢者可舉弛者可張才豈能幸以致之哉吳故禮義之區自泰伯逃荒端委以治周禮為教始立子㳺北學聖門因文學以得聖人之一體而教滋以章下逮文正蓋去之千有餘年立朝大節光明俊偉先憂後樂終始是心守郡而建鄉學立師而得安定知孫明復張子厚之賢而開之以學問文正之學聖人之學也然則濬吳學之淵源鼓士氣之槖籥而使之强于為善者侯之志也是可没而無傳哉因併識之以諗多士四年癸酉秋九月壬辰建太常博士栁貫謹製重修平江路儒學記鄭元祐維吳有學肇自文正公名父子更宋南渡而吳之文廟與學宫始大備至國家大一統興學勸士累詔郡國六七十年之間所在學校誦聲相聞顧吳為東南雄藩學校興于范文正宜特盛于東諸侯然更頻年郡非不大也而土力實耗于往時民非不多也而貲力實罷于昔日則夫學校之教禮樂之文亦有所不逮也事稍上聞廟堂慎選守臣而燕人吳侯由彰德路摠管仍授大中大夫即拜平江中書遣使以堂帖賫起馬璽書得乘驛南下用示特恩既至首謁大成殿仰見殿脊勢將傾圯甍桷欹墊欲壓尊像自聖師以下彩繪䵝剥忩户䦨楯髹漆舊暗侯乃惕焉疚心即裒稽贏節冗濫悉徵每歲廩入之畸度積可敵費乃鳩工庀材一新禮殿并兩廡㦸門自聖門以至從祀諸賢衮冕圭珮五采煥發如日䴡天重建外門掲示文廟采芹亭官臣之所戾止也至是亦一新之禮殿前舊設樂軒久撤去廹近香案殊失廟貌深嚴之意侯命復之雄渾沈沈而廟益以邃宻僉謂吳學自數年來支柱庳傾茍遮目前率多具文無教養之實豈若侯誠慤一忱興學養士為己任哉乃礱石紀辭以章侯修舉廢墜之實謹按中吳自泰伯端委以臨其民其後于㳺生于海虞乃能北學于聖人之門風氣既開賢者輩出由其山川之秀不可閟若夫庠序之教則尚未大備也至范文正雖生長北方及歸典鄉郡深惟桑梓之故莫先學校之教由是大興吳學今宋社已墟而學宫成于公父子者迄今不墜雖其間張弛有時不同然閲久而人心愈益嚴重則以公父子里閈之故也今侯敭厯中外而以才望為吳守臣其潔白之操豈弟之政要其心不以文正自期待者固不能若是也因紀侯修學之實而侯之德美因牽連得書謹記至正五年歲乙酉十二月望立石建大成殿軒記周伯琦東南之學校莫盛于吳㑹矣學之有殿以崇祀也殿之有軒以合樂也殿作于大德戊戌修于延祐戊午聲容叙秩每病其隘蓋將七十年矣郡守海陵王侯時䖍奠謁惕焉于懐爰重改作誕謀恢益廼乘露臺伉南甍而増作新軒起手于至正二十六年丙午之歲四月至七月而訖功其制三間中廣二丈左右各殺三尺四寸棟隆二丈七尺六寸深殺隆一丈一尺藻井中帟八觚齊緻金鱗錦羽蛟拏鸞鶱文版夾覆五采輝絢遐睇山立仰瞻雲升軒以殿崇殿以軒邃體勢宏䴡庭陛肅嚴于是簴業之設鐘磬之縣琴瑟搏拊之陳簫管笙籥塤篪柷敔之列秩乎其倫粲乎其章登歌合聲協律諧節以逹薦饗以熈獻酬陟降旋折綽如裕如所以昭格欽報者儀文咸具然則新軒之作其可緩乎先是以版為軒風雨摧撓隨時葺理至是撤而更之王侯視事之初軍旅未戢供億百出獨能以興學校為治民之本勸農儉用抑浮尚質奬掖師儒廩餼周給經生充貢黔庻向慕首戒弟子肄大成樂既而營度工材不貸于官不漁于民一瓦一木必庚其直故是役也不日而成又以餘力繕完東西兩廡易其飛櫩木版之朽圮者凡聖賢大儒塑像歲久黫昧則重繪飾之靈星㦸門彤雘一新學政序舉先後適宜議欲廣厥學宫講堂齋館旁室叢庄器用悉如規度期以德禮風化提封不徒屑屑于政刑之末如世俗之能吏而已於乎詩書禮樂四代之學所以立教淑人者也詩言志書紀事誦而習之博文力踐禮之節以經邦紀民樂之和以移風變俗其功用廣矣大矣釋奠于先聖先師尊其道報其德禮之隆者也翕五聲六音以致敬享貫神明章教化樂之殷者也古者典教用樂故樂正崇四術立四教以造士升其賢秀材而官之内則臣功外則民社以是成已以是成人馴致雍熈而人人有士君子之行王侯之有功于學校其以古道自任者哉殿軒之作雖一役也可以槩見其政矣校官貢穎之傳著請文于石以憲方來乃述其成功俾職教者知夫作軒之始侯名椿年壽伯其字也慈祥而惇義勤敏而篤仁由郡倅二三遷為都轉鹽運使最勞擢郡守不離郡者八年民戴之如召杜云是歲七月既望記時董工者平江路吏蔣德潤崑山州吏陸志道也資政大夫江西諸道行御史臺侍御史鄱陽周伯琦撰宫墻記魏俊民吳郡之西南偏孔子廟學在焉廟居學之左繚以宫墻九百餘尺舊學築土為之雨淋日炙弗克堅久教授徐震學正徐昭文學録邾經一日相與慨然曰廟自舊宋以來迄于今三百餘年而宫墻之廣歲必加墁飾始免頹圮計其費幾萬貫矣殆不為浮費耶乃謀易以磚石為悠久計即言于監郡六十公經厯白公樞二公曰是吾志也爰命教授偕府吏劉鼎計工度程躬董其事其費一出于廩粟歲用之餘不虧于公不損于民墻之基内外為石三層凡五百七十丈其袤九十五丈髙盈丈而隆其三下廣殺髙之數丈有六寸上廣如下之數而又殺十之三磚一十五萬瓦三萬九千六百役傭二千三百他物稱是用粟一千斛始事于至正十五年之六月告成于其年八月工既成典教者俾俊民記其顛末謹按吳學肇基于范文正公更宋南渡而其制始備至我朝崇尚文教詔興學校而宏敞偉䴡遂為江浙之冠廟宇堂廡齋廩食廬靡不完羙獨宫墻之制未備因循于百年之久累葺而累壊非虧一簣之功與一旦鳩工聚材撤而更之髙廣堅厚一如矩度厯數百載可弗壊雖事之興舉有數要非郡監之言參佐之良教官之多才亦未暇理此俾後之人仰數仭之髙咸指而言曰是某守郡所成也是某教授所營也豈不足為方來者之勸云是年冬十月甲子立石添助學田記謝南國家駐蹕錢唐吳為股肱郡涵濡文教人材日盛校官養士歲費益廣宜以不足聞也嘉定戊寅判待制趙公彦橚出在官之餘田三百畆歲可得米二百石有畸以助經費且作簡謂冷曹曰養成美材為明時須㫖哉斯言公之愛士乃所以愛國其仁豈有既哉是秋提刑攝府事即今右史王先生棐也叅稽前比弛其征入由是學宫益沾全惠而終始贊其決者僉判趙君與􅊸為有力焉南不才分教䝉此巨助幸廹終更何敢没其實用叙大畧併與公帖存之庻幾來者有攷云謝南記吳學義廩記戴溪東陽倪千里起萬以紹熈癸丑分教姑蘇始至計糧食不足以養士攷核宿弊學有羨積増養士貟彬彬咸集矣起萬慨然曰學校義之聚非徒養士也事關風教非學校誰實主之顧財力不可為爾漫不度贏縮侵費養士曰我將為義是又好名者過非吾志也因以告諸部使者今右司郎中黄公適得廢寺没官田餘一頃先有佃學田者多取贏或不平争之訟久不決黄公歸其田于學使自為官庄視舊額増米三百石合前所得田為米三百五十石有竒起萬曰是可行吾義矣請𨽻職于學者九人使得學正録錢糧官同主之因定其規約歲取其入祠祀范文正公及教養其遺三人士有入太學與薦名登科第者助其費有差文武士宗子皆預焉止至㑹拜春秋釋奠其與行禮者凡費于此乎取又將斥其餘以助士貧而親不能𦵏與嬰孩之遺棄者約既定學以其議上于府守王公溉素盡心學校與合府咸稱善俾刻諸學宮與後人共守之起萬以書來求予文為記余嘗掌教湖學意有所欲為力不能給也起萬顧能之余誠愧焉夫事非始創之難而善終者不易也其始創焉者徒有是心因人成事未足多也萬一有後之人謂議不出已而忌焉則廢事非急務而㤀焉則廢歲朘月削則漸不可繼廢左兑右易則茍逭目前廢雖規約縷縷大書深刻無益也後來者不忘前不怠後益増廣之使為可繼謹守成約雖甚急不易兑此非信義君子慈祥勤篤平心無我未易及此余是以知善繼者不易也然姑蘇之學為天下最素擇能文士有行義學業者為之師固將由是推而大之非但善繼而已如前所云特淺之為過慮爾起萬且受代書來益勤故以其説質諸來者而以規約載于下方云慶元丙辰元日永嘉戴溪記蘇學復租田記何林景定初元庚申之臘林來庀吳泮時農扈告登先兩月已納稼交印之日廩有餘粟獨所謂長洲縣陳公等鄉圍田一頃民頑罪歲弗即輸而餉所急之符旁午于道適舟運水澁至移他租折金納不受攬家于京口糶客米應期限土人豈知此哉迨辛酉秋大水吳門上腴淹没大半學田低下訴澇者日相環也圍田又可知矣諸友相顧愀然曰使餉臺不恤尚可移他租乎涉暑糧絶折助于臺府生意漸春諸友又曰雨巖先生吾黨之元氣也昨歲持節過吳謁夫子殿拜先公芳刻下顧瞻槐杏之隂徘徊若不忍去青青子佩豈不在公懐抱間盍請諸林曰請粟者有限之恩歸田者無窮之利衆曰唯遂退而裁書越五日而書徹又五日而報下又浹旬而公牒頒霜鐘之感不如是之速也然先生不以吾士病吾兵方且搜括他租以五補一而後撥其用心何如哉昔庠校之得是田也歲大熟時固不為無補五七年來飢饉薦臻往往移他租以輸餉所今先生能移他租以補兵食移餉租以給士食使兵無減租之慮而先生得以遂移租之仁士有増租之喜而庠校永免移租之害一舉而兩得之顧不偉歟且農士兵之分其殆起于田之不井歟成周盛時度民以授田其秀者為士勇者為兵旅卒兩伍之衆即比閭黨族之所聚出塾而耕荷戈而戰周旋乎同井之田薫染乎同門之訓養之所至教亦至焉是士與兵之養一出于上今兵食皆仰給于縣官上之人惴惴焉惟恐其不足而士則自養而自學甚至于去里巷背父兄流離顛沛有不能以自給者猶幸而郡縣有學又以食不續而員有限毋恠乎士風之愈不古也公以兵食為職又能以士食之不贍為心其得周官井田之遺意歟雖然良法美意待人而後行吳學之興經始于文正范公典藩之初恢廣于恭獻公持節之後今先生篤念先正振鐸之地増給吳泮贍士之租僉謂先正養心先生即昔之范公先生即今之恭獻也公節溪人名勢卿字安道自號雨巖以摠餉奏最陞直華文閣除畿曹提學事又諸生之一幸也諸生德公之賜請勒堅珉以詔後世于是乎書景定壬戌重陽日廸功郎特差充平江府府學教授何林記平江路儒學祭器記李淦大成殿祭器者教授李淦方文豹所造也金屬大尊二山尊二著尊二壺尊十有二像尊如壺尊之數罍四洗四勺二十爵百七十有二坫二百有二豆三百四十有四簠百二十有六簋如簠之數爐一缶二檠二十有四竹屬篚十有一籩三百二十有九木屬俎五十有五餘仍舊貫初至元二十有九年十有二月望淦祗事顧兹器非度明年考朱文公釋奠釋菜禮改為之十有一月方君來明年偕方君為之元貞元年十月竣事首尾凡三年鳩工更學正凡五人費伯華林桂龍白淵唐天澤朱嗚謙凡四人楊如山洪焱祖文一覺俞真卿㑹記更直學凡五人潘梅孫計志道魏埜沈伯祥齊國俊費中統鈔凡四千貫有竒而後成蓋難且久如此後之人尚敬守之哉盱江李淦撰嚴陵方文豹書蘇州府重修孔子廟學碑宋濂蒲圻魏公守姑蘇之明年鉏暴樹良德綏化孚上下洽和百廢具興孔子廟學顛危弗治顧瞻良久喟然而嘆曰皇帝大興文教詔頒明經六藝諸科嘉惠多士將以人文化成天下今弊陋至是非所以重承上意公即捐俸為倡唯興修是圖其僚屬與郡之人士驩然而趨功以廟言之穹殿修廊敞以靈星之門以學言之講堂中居兩廡相向挾以六齋以逹于前門至善之堂尊經之閣又巍然而聳其後向也棟撓級夷䵝昧而無輝今焉丹雘炳煥簷牙而翬飛已而泮池有梁采芹有亭先賢有祠亦皆次第就緒而公拜蜀參政之命將之官有㫖還守姑蘇民大欣慶公復命補其墻墉四千八百尺有竒唯廟學之前乃吳江甯開之園局于封畛蹙廹殊甚至是從化盡以其地六百尺入于學宫始獲闕門于前用正地勢内厯洗馬來秀二池架梁以通往來外臨康莊左右有坊曰狀元晝錦其嘉名符契若有開必先者閣後之地奪于比鄰公察知其奸稽官書以為証比鄰詞服其地乃歸又懼逺而或湮也遂圖學廟四疆勒石志之始事于洪武六年正月甲子訖功十一月較之承平舊觀或有過無不及焉公帥其屬執豆籩具脯醢以成功告觀者莫不咨嗟自兵興以來學校所在蹂踐為墟而姑蘇幸僅存非公之至幾何不與之俱廢乎教授貢穎之既宣力始終復使訓導張田請記其事以垂不朽惟蘇之有學實始于范文正公蓋公景祐初出守鄉郡遴擇南園請于廟而建焉為其師者則安定胡文昭公也計當時人物固嘗盛矣數百載之下仰其聲光慕其風烈每使人發不可企及之嘆自時厥後雖有賢愚學之興廢靡常二公過化之地流風遺俗終未冺也况今遭逢有道之朝得良二千石為之師帥豈徒然哉然公興學之志不下范公者也則夫坐臯比而談經藝者其必將取學于文昭乎明體適用之學吾知駸駸然向盛在家則孝于親出仕則忠于君而無負公興作之意茍不務知此摘英搴華而為譁世取寵之具非區區所敢聞請以是刻之䴡牲之碑蘇之人士庶幾知自朂哉公名觀字杞山碑為修學作前代興造各自有記皆不書系之以詩曰姑蘇之墟有川滮滮折趣南園滙而東流靈氛中啟煥爛弗収自非聖師疇協其休昔有哲人出綰郡章乃構學宫乃建廟堂學宫煌煌廟堂洋洋衿佩將將來翺來翔盛衰相因揆理則然風摧雨蝕上漏旁穿矧丁囏虞烽火相連誰一舉臂持危扶顛大明當天九服同光攙搶歛翳奎壁吐芒眷我魏公來涖大邦屢形于言我敢怠遑既率部封復登府僚分勞授事具乃教條曽不一期厥功孔昭化此朽腐欝為岧嶤孰敦化原孰築教基孰牖民彛匪學曷為我語蘇人公豈爾私耳目茍具必致其思思之如何法孝與忠二者無媿行將天通震澤有石其堅比銅史官勒詞用昭永終蘇州府孔子廟學新建南門記王彛惟蘇州學肇基于范文正公父子學之左别有廟而靈星門南不十數歩即畫于鄰垣于是旁趨東偏以為門而地勢菀塞大弗稱蓋鄰垣之地廣袤若干畆在宋為錢氏園及元而業更甯氏先後為郡者屢欲拓之然不可以力得至正間郡守六十公乃以學廩之羨貿其地與甯開得其三之一暨入國朝前國子祭酒魏公以正學碩德出守兹土政修令行大修廟學而宏博壯䴡實踰舊貫未幾開説公化盡以其地歸焉公因命教授貢頴之繪圖而經營之郡人士願出私錢以助乃通道自櫺星門以極于南城之塗凡若干地故有洗馬池適當其前又有狀元晝錦兩坊適拱左右遂表文廟之道于洗馬池南而架梁以入其道南北之半故又有假山山之隂有池曰來秀其水自太湖入南城之池注之來秀自南流則滙之洗馬而止其北流則歸學之泮池而止又即來秀池南闢假山遺址為門以正南面焉至是而廟也學也出入之道殊矣故入其門則循池之東以趨于廟出其門則折而西又折而北為梁渠上者再以達泮池之梁始趨于學示神人之不可雜也方廟告成翰林侍講學士金華宋公既為之記頴之以為此一役也范公所未得為而魏公乃得為之始終幾三百年而廟學大備有不可不特書者爰以狀使彛記之彛也幸從公㳺不敢固辭于是具書公建門之績與歸地始終俾刻焉至如孔子之道萬世遵行者孰不知之兹不敢勦説而凟言之也門之新作在洪武六年正月甲子至十月丙申落成糜錢若干工役若干魏公名觀字杞山武昌蒲圻人世之學者皆稱之曰蒲圻先生云洪武六年歲在乙邜春正月丁卯朔㑹稽王彛撰蘇州府重修儒學記胡儼姑蘇東吳大郡也學宫又東吳之冠也五十年前余嘗至其處而周覽焉喜其地勢之廣衍而惜其堂宇卑俯有弗稱也時典教者對余徒有興嘆而已今年秋九月教授豐城何澄校藝還自閩述其郡守况侯伯律興作之勤求為之記大成殿及兩廡作于正統丙辰明年作至善堂作後堂又明年作明倫堂作齋舍作射圃凡為屋百間度材庀工載石陶甓與夫經費所需咸得變通之宜越三年而役成髙明壯觀敻超于昔丹碧輝映光彩聿新况侯之奉揚文治以淑邦人者于斯盛矣而師友之朝夕相從得以依乎廣居以安其息㳺以移其氣體者何其幸耶學宫之建久矣唐刺史李栖筠始増置學廬至宋景祐初范文正公典鄉郡嘆學政之廢因州人朱公綽之請上其事于朝得賜田五頃乃割錢氏南園之地以建焉初公得地于南園將徙居術者謂世出公卿公曰與其貴吾子孫于一家孰若吳士之多賢也遂以其地充學宫延師儒教育生徒而安定胡先生首居之嚴師資立教條經術治道明體適用之學表見當時實肇于兹而文正公之嘉惠斯文其用心不亦仁且廣乎今况侯協謀侍郎周公重為興建蓋亦聞文正之風而興起者歟大抵國家以育賢為致治之本賢者以務學為致用之資而守令又所以承流宣化者也夫為政者既能盡其職矣而士君子之居業于斯者可不知所務乎必也息紛華功利之心以求夫聖賢之本領盡切磋磨礱之益無忽乎師友之講明由是以德行尊顯則禮義興而風俗厚以經術進用則心術正而功業著矣况侯余鄉人也其善政既已誦于吳人而斯舉尤為知務故藥為之書俾來者有所徵焉正統四年二月初吉前史官國子祭酒兼翰林侍講嘉議大夫太子賔客致仕豫章胡儼撰重修蘇州府廟學記金幼孜蘇為東南都㑹學校人材實為諸郡先昔宋景祐間范文正公仲淹請于朝始建先聖廟學于吳蓋割錢氏南園之地而為之者也荏苒三百餘祀薦厯兵燹屢興屢廢而比年以來其學舍文廟傾圮漸不可支永樂甲辰秋臨江陳孟浩來典教是郡顧而嘆曰學校風化之本乃不振若此其何以稱仰崇以作興士類適監察御史李立按治吳中孟浩以其事白之乃力贊其成為裒大家富室之有力者俾出金穀而協助焉孟浩復與訓導馬壽錢紳韓陽各捐已俸以為之倡于是鳩工庀材首新大成殿増飾塑像次新明倫堂旁飾齋廡室廬次及池橋亭檻階戺垣墉靡不繕完是役也工不勞民費不出官而巋然更新于一旦之頃往來者但視其成而不知其所以成也孟浩請予記其事予不敢辭則為之言曰學所以明人倫人倫不可一日廢學校其可一日廢邪士㳺于其間其理則仁義禮智其器則君臣父子夫婦長幼朋友其文則易詩書春秋禮樂若是者豈徒托之空言蓋欲明其道以充其性宻察于幾㣲致謹于踐履積累以至乎浹洽擴充而極于廣大此則學之之要而所以成已成物者不外是矣吳素稱禮義之鄉宗工鉅儒先後相望他未暇論有若吾文正公之清修博雅文章事業光明俊偉至今為天下後世重士生于斯㳺于斯必取法于公無眩于邪説無奪于利誘充其内以達于外他日出而臨民則思為良吏立朝則思為名臣眞履實踐以求無負于所學無愧于先逹則吾孟浩所以拳拳于斯文者豈空言而已哉因悉記其事并書其説如此俾歸而刻諸石且以示後之典教事者尚思自勉以繼于無窮焉是為記宣德五年歲在庚戌三月吉日資善大夫太子少保禮部尚書兼武英殿大學士臨江金幼孜蘇郡儒學興修記徐有貞蘇為郡甲天下而其儒學之規制亦甲乎天下是蓋有泰伯至德之化子㳺文學之風安定師法之傳在焉不徒財賦之强衣冠之盛也學之建自有宋越有元至于我有明幾五百載其間廢而復興毁而復修惟牧守之賢是頼其人在郡志可攷已然近自正統景泰之際國家多故學寖以敝爰厯數政皆常有意興修而弗遂成化初元今巡撫都憲瓊臺邢公之為守也因荒圖豐革故圖新曽不期月百為具諧于是教授南昌程君蘭司訓餘干張君憲山隂李君璞駱君㢲協議以請于公公曰是吾志也乃相舊規有仍有改而一新之若大成殿若㦸門靈星門若尊經閣若明倫堂則皆仍而新之者也若先賢祠若㑹膳堂若四齋暨直廬若射圃若泮池之橋則皆改而新之者也經始于丙戌之夏落成于丁亥之秋凡在學者忻忭胥慶㑹邢公既升而巴渝賈公來繼其政謂斯文盛事不可無記之者因率學職諸君來以為請予郡人也而有子在學于學之興修亦同其慶焉乃進諸生而語之曰夫學之作興在乎君長化導在乎師儒而進修之功則在諸生之自勉焉爾凡為學者所以學乎聖與賢也學乎聖與賢者蓋將希至乎聖與賢也希至乎聖與賢者而可茍哉其必也由乎詩書六藝之文以通乎唐虞三代之道處焉進修焉而為之德業出焉施設焉而為之政事堂堂焉表表焉以立乎天下若陸敬輿之于唐范希文之于宋庶幾哉始而希賢終而希聖不惟其言惟其行不惟其名惟其實窮維斯逹維斯憂樂維斯成于巳也惟斯成乎物也惟斯使世之論者謂吾蘇也郡甲天下之郡學甲天下之學人才甲天下之人才偉哉其有文獻之足徴也斯于作興化導之意為無負矣蘇州府重修儒學記王直國家稽古定制建學立師以陶鑄天下之英才使名成一器而天子垂拱于上以收平治之功其義逺矣人生顓䝉方其幼也茍無禮義以漸摩之逮血充氣盛慾竇漸開鮮不傷倫而敗度先賢之為政者緩于刑戮而急于教養良有以也蘇為東南大郡土沃民繁家衣冠而户絃誦泰伯揖讓之風儼存然性頗輕脱閒好争訟亦有夫差之遺意焉茍非學校之教提撕警覺又何以矯其輕而歸諸厚哉學宫在郡治之南可一里許舊傳為錢氏南園文正范公購得其地而創之厯年既久雖屢經營繕卒未惬大方之觀今太守四明姚侯下車以來政化大行毅然以修舉廢墜為己任視篆三日敬謁吾夫子之廟而拜之次及四配十哲兩廡諸賢見其神像欹側柱礎傾斜至有不蔽風日者慨然歎曰為郡者之責也亟欲一新因白巡撫都憲萬安劉公巡按侍御南郡袁公咸韙其言或曰年歲未豐人尚缺食驟興土木之工第恐事未成而憂先至也侯曰不然吾上不虧府藏之蓄下不庸科歛之財以義制事而身先之胡為不可况此名邦寧無一二仗義者而副我乎于是首出俸資若千為衆人勸既而聞者四起争先投刺惟恐居後因命訓導周謐以董之斧者鋸者髹者塗者不期年間厥功告成大成殿明倫堂兩廡四齋尊經閣至善毓賢二堂道山觀德二亭靈星門學門儀門罔不修治復彩飾聖賢及厯代諸儒神像築杏壇一區立狀元解元二坊皆親書其扁徹文昌文正二祠移諸爽塏見者駭愕郡之耆艾私相謂曰吏不驚而民無擾何成功之若是也教授臨川黎擴與予有鄰郡之誼走書謁文以紀其事予自謝病南歸久疎筆研固辭之而不可乃勉為言唐虞之世比屋可封無他教之至也三代以降雖沿革不同其文獻猶有可觀者自秦罷侯置守為吏者止知簿書敲扑而已尚何暇以歌青衿采芹乎侯之為此度越前人逺矣侯名堂字彦容由進士拜冬官主事陞郎中出知廣信累著能聲因丁内艱蘇守告闕都憲崔公時巡撫江南每難其人方㑹議京師聞侯服闋立請于天官冢宰而假之衆論稱屈崔公曰屈之者所以伸之也不遇盤錯利器何甄兹而果能稱其言而光闡之不趨衆向顯揚名教激厲風俗雖文翁造蜀豈是過哉吾知蘇之人材過此必倍蓰矣他日棟明堂器清廟楫大川必有勝其任者則侯之功豈可冺乎因書以告來者大明天順五年歲次辛巳冬十月吉旦資德大夫正治上卿吏部尚書前翰林院侍讀學士國史摠裁兼經筵講官致仕泰和王直撰修蘇州府儒學記陸釴詩稱既作泮宫春秋書丹桓公之楹夫泮宫實修之而云作者以見修廢之功擬于創制而一楹之丹孔子不遺者豈非以尊室在所當愛哉蘇州郡學自范文正公割南園地為之而規模始著自後好義之士尋源索本往往歸重于兹故或為之増置齋閣或為之附益田租開建恢擴日新月盛而豐碑大刻紀載鋪張者亦不敢後焉其意豈不昭然哉國朝文制日興崇奬尤甚學宫之侈殆逾百楹生徒之衆亦克稱之教化之隆于兹見矣成化甲辰襄城張公邦鎭來按兹土視學之暇徘徊顧瞻見其規模雖宏而朽弊相繼棟宇雖完而凋落漸興以為天下之事為于其細者易為于其大者難與其為于其難孰若為于其易于是審其輕重緩急之宜而圖起廢更新之意視其可易者易之可因者因之晦者飾之腐者剔之揺者築之經始于談笑之餘而隂益前人之功成永固之業信哲人之為有見干幾先哉學功告成而公以代去貳守毛公廷美實䕶其事覩成功之難歎曰襄城公兹舉非徒上安神祀下悦衆心實所以詔我後人而興起後學也蓋君子所重人咸重之君子所忽人咸忽之公重于學校如此所以感發奮厲者已在于不言之表且其規畫財用出于散漫收贖之餘而選徒用人在三時閒曠之日事成而人不勞吾徒不知所重焉豈理也哉于是伐石走書幣詣余求文其上予時方負罪憂居謝不敢受而諸生皇甫信朱華道毛公意懃懇諄複累累不已余曰古人大功廢業又曰三年之䘮對而不問孤豈敢為毛公惜哉顧其情有未安而禮不敢違耳于是二生據余庭柱間相持者移日務于得請余乃重違毛公之命又感二生之專勤以為若兹者將安所處乎古人為邦君之命固有要絰而從事者吾敢取以為口實可乎于是再拜而受之竊惟儲養樂育登崇俊良此上之所以寤寐而不忘者然勢不能周悉而憲臣者耳目所司所以延訪而博求者也張公其知此者乎自余家居聞公修崑山學太倉學又修郡學三學頼以完整而生徒有歸教學得所張公之功也異時歌菁莪而咏棫樸者非公其誰與歸公能舉職毛公能承命不忘其艱是二公者皆所當書而復附予辭受之説者蓋其事關風教余茍得所處則諸生將頷于余使其失焉必將以咎于余而余因得以自省豈不可乎故併書之為記蘇州府重修文廟記吳寛蘇有學于城南實創于魏國范文正公更五百年來所以修葺而開拓者惟賢守是頼至于今日規模益壯天下之言學者莫能過之故四方賢士大夫之道郡中以一逰其地為快然猶病文廟與學之弗稱也蓋其制作非特視學為陋歲久且敝爾乃成化壬辰鄱陽邱侯霽來知府事政既克舉境内悉治嘆曰事神吾職也有如文廟敝陋孰任其過然吾未敢專也乃請于廵撫右副都御史洛陽畢公公從之則計財度工擇日而從事始改作大成殿于舊址之北而侵于西者二丈有竒復作靈星門南與殿直以甲午三月興工工垂完而報政于京遂去任矣其年蠡吾劉侯瑀自監察御史超擢來代政治益善視此舉非得已而前功所當繼也未幾殿與門竟成既而若兩廡若㦸門若神厨皆以次改作崇卑廣陿悉合程度言言潭潭逈異舊規而廟與學始稱矣他日知長洲縣劉君輝知吳縣文君貴暨教授林君智合言于寛以二侯之功不可冺者願記之以示後人嗟夫孔子之道大如天地與之相參髙如日月無得而踰萬世之下被其膏澤者區區土木所能報其功邪而人復為此無亦盡所以尊崇之禮以免有司之過爾蓋比歲儒臣建請有欲加以籩豆佾舞之數者下羣臣議議者亦謂此不足為孔子輕重而朝廷竟從其請行于天下惟所以尊崇之者無所不致其極也詔下為丙申之秋適吳縣丞陶節長洲縣典史劉慶皆嘗承命董役以功完告及丁祭之期籩豆既陳佾舞斯列而棟宇深廣足以有容觀禮者美之雖然二侯之意豈徒為是勞費以充郡中美觀者哉禮行于斯樂奏于斯致尊崇于斯固所以申其報本之私若夫瞻拜之頃廟貌尊嚴洋洋乎如在其上如在其左右豈無油然興其希賢希聖之心者乎易曰觀盥而不薦有孚顒若二侯之深意安知不出于此且是廟之作凡以事神也惟夫前後之相濟彼此之無嫌而一出乎公其功遂不至廢推此道以治民此民所以同歸于治也歟寛故學之諸生也于二侯無能為役因諸君之請敢忘其淺陋而書之初學門在廟街之東凡出入于學者必涉街以行邱侯以神人之分當嚴也顧旁近多居民民既喻其意皆樂徙去乃徙其門于靈星之西更為門于泮池之北以逹于廟然後廟左學右截然以正後有賢守以廟學為事者其尚修之葺之以無隳其成功也哉翰林院修撰儒林郎吳寛著宫墻記何澄我國家列聖相承深仁厚德洽于人心迄今七八十年之久而學校之政尤惓惓焉設風紀之官以專提督而郡守縣令尤必致意于是者于以體朝廷興學育才之盛心祗奉德意而不敢忽焉者也姑蘇之為郡宻邇京甸郡之有學實宋范文正公舍南園之地為之其子純禮因其舊而増益焉自宋至今二百餘年郡守學官因其敝而輒加修葺號為東南列郡之冠正統癸亥巡按直𨽻監察御史錢唐鄭公顒行部至郡謁于廟廷顧瞻宮墻頹毁弗稱乃謂知府李公從智購隙地而増築之未及數月百堵皆興數仞之墻嚴翼端正僉謂余忝膺學職宜述其事以示永久夫學校育才有國之先務然而作興振舉惟繫于風紀之司與夫守令之賢蘇之學近日巡撫侍郎周公忱知府况公鍾倡而新之至于鄭公相繼興舉又得今知府李公奉承惟謹始完以偹豈非貞元㑹合自有其時而斯文之在天地間未嘗一日而消歇與夫綱常之道所以厚人倫美教化者雖亘千萬古同一時厯千萬人同一心也自今以始凡我士子㳺歌于斯沐盛朝之化育瞻夫子之宫墻尚益思自奮勵以毋忘君上之賜聖人之教與夫公所以率厲作興之意哉若夫窺其墻而自謂不得其門而入不見宗廟之美百官之富者可謂自畫者也非聖人所以為教也非國家建學育才之深意也吾黨之士當與共勉之墻之役經始于正統癸亥之秋訖工于明年二月董其事者長洲知縣王瓘吳縣知縣葉錫墻以丈計六百三十髙盈丈凡費錢以緡計五百遂刻石以記正統九年歲在甲子春三月吉日直𨽻蘇州府儒學教授劍江何澄撰文范文正公祠堂記汪澤民吳學之興始于文正范公此所以專祀公也宋景祐初天下郡縣未有學公守吳請而建焉吳為公父母之邦向得錢氏南園地將居之或謂是必世生公卿即以其地為學宫公之子恭獻公持節過郡益新學給田由是立祠禮殿後忠宣公恭獻公從祀尚賢報本典禮宜稱至元再元年春正月鬰攸及祀屋幾毁明年文學掾蔣君伯昇至顧瞻摧圮懼神弗居告諸郡守掄才木陶甓瓦易撤故朽完補踈漏棟宇隆敞像設儼肅秋九月始事冬十有二月工乃告成工為日凡若干錢為緡凡若干郡守通儀道童公為署祠之扁蔣君偕公八世孫文英來言曰公之祠于是也久矣若稽歲月紀載闕焉不書諸石曷以永圖願記之澤民惟閒氣哲人學問本乎六經蹈履合乎仁義元勲鉅德蔑以形容方慶厯中召對天章閣奏十事三曰積貢舉既用其説學校遍天下矧常聘安定胡先生主教吳士嗟乎興學立師羽翼斯道豈淺淺哉祭法禦大災扞大患于一時猶得祀之若公之功施于天下後世豈惟吳學宜祀之凡有學者皆可祀也夫奉祀固以致嚮往隆報効士之朝夕仰瞻又豈無感發其希賢之心者乎澤民夙仰公之髙風隨牒公之鄉屢常拜公之像今以文字寓名祠下何其幸邪遂不辭而為之記又明年歲在丁丑正月壬子立石承德郎平江路摠管推官汪澤民為文新遷范文正公祠記黎擴蘇州府學有宋大賢范文正公祠者蓋以公嘗典鄉郡割所得錢氏南園之地建學而立之也祠及公之子忠宣恭獻者以其復割前園之地益廣大其基而入之也祠舊在大成殿之後入路迂曲落地隂潤每經一雨草輙侵堦以致朔望之晨行香掲䖍人跡罕至習為故常今太守四明姚公堂治蘇之明年政通人和田穀大登乃嘆曰文正父子建學之功如此其大而其祠屋之地如此其僻可能報其功之萬一乎于是相址于二門之内泮池之南入道之右厥位面陽厥土燥剛鳩工築基卜日遷于其上棟楹梁桷之腐黒者易之蓋瓦級磚之破缺者補之増以藻飾繚以垣墻書以題扁中塑公像傍公子神儼然一家之氣象也思昔日范文正公為當時第一流人物忠義滿朝廷功名滿天下事業滿邊郵在他邦異域者尚欲效其為人况生于其鄉者乎凡育材于兹學者將以供君上致治之用也必目有所接則心有所動矣而我太守姚公既遷公祠于兹而在學之士出入往來無有不在其目目既有見心可得無動乎必思他日學成材就出為時用以文正父子上義下利之心如此可不則而效之乎以文正出將入相之才如此可不企而及之乎以文正先憂後樂之志如此可不力而行之乎效慕于幼學之時致用于壯行之日俾蘇學之人才益感而益揚者實由乎一遷祠之所致也然則姚公興學作人之功庸有既乎用是勒兹于石以示來者趙公生祠記陳仁玉古者釋奠必有合凡建學先聖先師各因其國之故今郡國祀先賢于學宫猶古志也吳人自言子㳺氏北學于洙泗以文學稱千數百載間碩大光明卓然見者若陸宣公范文正公至今凛凛生氣文正公以景祐初守鄉國始建吳學公子純禮元祐中持節過家奏請成之邦人德焉因並祀之宜也南渡學再建餘百年已弊陋寳祐三年觀文殿學士趙公與􅊸再守吳始即泮宫行鄉飲射禮序賔以賢習鄉尚齒使民知教明年政通惠洽百廢具舉乃先興學校委校官林君替是究是圖自殿堂廊廡横舍撤腐易新或因或革梁于池垣于逵臺于桂亭干芹疏敞儼整光景閎邃設像視聽恍失其舊増創登俊興賢二齋博士與弟子員講道誼于斯養志氣于斯魚魚雅雅絃誦清亮相與歎曰誰之賜也于是欲生祠趙公以公之父正惠公諱希懌舊守是邦廉正有遺愛法當以所祠范公父子之禮祀之來俾余記或問生祠古有諸乎曰有昔漢王堂守巴郡吏民生為立祠韋義為廣都長廣都為生立廟此其始也今為牧守者生而能以神明自待法施于民澤加于物應祀典矣豈以在為嫌哉世固有畏威繆敬規以為佞者要諸久乃見若趙公再世三為守德吳者厚尸而祝之無異詞者然祠不祠于趙公無豫咨爾學其能砥節礪行立道成德忠君孝親建功植業増光于前聞人則所以報趙公者不但香火之情而已也此公修建學宫之本意而仁玉言之母忽開慶元年五月丙寅門生通直郎軍器監丞兼國史實録院校勘陳仁玉記髙文忠公專祠碑髙若鳳天地間貞元之㑹嘗曠世而不一遇其遇之也必有非常之人出乎其間以為天地立心生民立命以繼絶學以開太平故孟軻氏云五百年必有王者興其閒必有名世者孟氏以命世之材而不遇貞元之㑹厥後漢之興髙帝以馬上得天下而有陸賈説以詩書唐之興太宗定天下秉白旄黄鉞而有房杜以文學為之相三代而下漢唐有國皆數百年興王之運明良際遇非偶然也孟氏之説至是而益騐洪惟皇元太祖皇帝以神武興朔方太宗皇帝夷滅西夏龍戰鷹揚時方以驍勇相尚而髙公智耀獨守儒術隱賀蘭山中太宗雅聞其賢召見為陳帝王之道驚曰如此好言前此所未聞也世祖皇帝混一朔南尤被寵遇呼為髙秀才公專以儒道啟沃聖衷嘗奏儒士師聖人之道今没為𨽻不可官為給價贖為良民者凡三千餘又奏儒士教人以禮義宜復其家遂蠲儒徭役且各著于令或以冒議公公曰儒辟則金也謂金色有淺深則可謂非金則不可也上嘉納焉由是許文正公諸儒相繼登崇儒道之顯于皇元實自公發之也世祖皇帝授提刑按察使行且大用尋卒天下學校不忘公之德與許公並祀公之子睿仕至南臺御史中丞公之孫納琳見任江浙省右丞世共稱其賢朝廷贈公崇文贊治功臣金紫光禄大夫司徒柱國寧國公諡文忠至元後庚辰春正月儒學教授謝亨祖上諸儒議謂諸郡于公皆有專祠且公之子孫世居此邦則公之神㳺八極昭格貫通寧不眷戀于吳而獨闕然于專祠之奉甚失所以崇明祀之意遂移公牘援杭學例設專祠以春秋仲丁日祭以少牢肖像設主祀事孔䖍且俾余紀之使來者有所攷按禮經法施于民則祀之以勞定國則祀之今公以儒道佐我太宗皇帝世祖皇帝使二帝三皇之治三綱五常之道粲然大明于世則于施民之法定國之勞孰有加于此哉緬惟此邦在宋仁宗范文正公仲淹以儒術叅大政其子純仁位至丞相而文正專祀之奉三百年如一日今公之德業照耀史冊而子孫名位世濟其美與范氏等則此邦有文正之專祠顯其前有文忠公專祠繼其後二專祠之奉相為無窮凡過祠下而仰瞻者寧有不起敬而以為儒道之可尊者乎或曰公之子孫蒸嘗之祭有家廟在在公寧能舍家廟之祭而歆學校之祀乎曰家所獨也專祠所同也公之神靈在天下如月在天但有此水即有此月月之于水豈有所擇乎于是系之詩曰皇奮厥武威震穹垠天戈所指悉主悉臣不有元哲孰開人文貞元之㑹篤生異人隱于賀蘭韞玉席珍赫赫太宗徵召是勤世皇撫運寵頋殊倫從容獻納非道不陳士脱囚奴儒蠲徭役誦詩讀書人臯家稷茅拔茹連我公是力惟兹吳㑹專祠肇闢肖像儼然有嚴有翼祀事孔䖍以報明德勒詩貞珉永永無斁至正元年二月立石中書右丞浙西道宣慰使㳺資德生祠記陳立武大元混一天下至元乙亥冬師壓吳境今中書右丞浙西道宣慰使㳺資德自軍前隻身渡畧彴徑抵城下諭宣聖朝不殺之仁言焉而孚翌日舉城歸附公乃遍厯閭巷家至户曉告語諄諄市不易肆民皆按堵咸曰生我者父母也更生者公也既而撫治吳郡安集勞來使寧爾家使畋爾田流逋有歸矜寡有養直枉抑姦扶傷揜骸民生死無憾公之有德于民者甚大至于葺營砦而師之勞者安給糧米而軍之散者聚維揚駐兵飛漕六十餘萬石其在江隂通江者亦餉以二十萬而羸師用宿飽馬騰士歌公之有德于軍者甚深公曰非吾實能乃上恩也歸美報上吾其為士民先乃徧詣緇黄之居悉奉粢盛供設俾各以其教祝天子萬壽興俯跪起咫尺天威示民有尊咸震咸悚公又曰尊君親上然後興學古制也曷敢不承暇日下車庠序禮祠先聖勉勵儒生繼粟繼肉均得其養學舊有田多入于兼并公使各復歸期于深衣韋帶之士莫不欣戴菁莪樂育之恩越二稔公持節浙右士吏軍民兒童耆老擁馬首願留公亦為遲行諭以肅將明命罔敢宿留既視事聲名不減治郡時吳人之舉手加額曰吳屬郡也猶幸被公之德于無窮歲壬午春入覲過吳重臨學宫丁寧諸生學不修且壊吾佐若費因得以葺故益新丹雘炳煥為他學最政事教化可以並行而不悖矣自昔有大功德者當世導之百世誦之公之治民似龔黄馭軍似李郭興學似魯僖對揚王命似召穆公眞足以耀當今而垂後世盛美未述非闕典歟邦之人士相與謀立生祠于學俾立武屬辭而刻之石學者有天子萬壽之宫凡公之所以盡忠報國者無非為敬祈億萬斯年之地吾道永有頼焉祠而祝之夫何慊立武義不敢以蕪陋辭敬摭其實而書之公名顯字子明汴人也至元十九年正月人日浙西儒學副提舉陳立武記吳都文粹續集巻三
