body:
  text: 吳都文粹續集卷一明錢穀撰都邑書籍吳都賦左思東吳王孫囅然而咍曰夫上圖景宿辨於天文者也下料物土析於地理者也古先帝代曾覽八紘之洪緒一六合而光宅翔集遐宇鳥策篆素玉牒石記烏聞梁岷有陟方之館行宫之基歟而吾子言蜀都之富禺同之有瑋其區域美其林藪矜巴漢之阻則以為襲險之右徇蹲鴟之沃則以為世濟陽九齷齪而算固亦曲士之所嘆也旁魄而論都抑非大人之壯觀也何則土壤不足以攝生山川不足以周衛公孫國之而破諸葛家之而滅兹乃喪亂之丘墟顛覆之軌轍安可以儷王公而著風烈也玩其磧礫而不窺玉淵者未知驪龍之所蟠也習其敝邑而不覩上邦者未知英雄之所躔也子獨未聞大吳之巨麗乎且有吳之開國也造自泰伯宣於延陵蓋端委之所彰高節之所興建至德以創洪業世無得而顯稱由克讓以立風俗輕脫屣于千乘若率土而論都則非列國之所觖望也故其經略上當星紀拓土畫疆卓犖兼并包括於越跨躡蠻荆婺女寄其曜翼軫寓其精指衡嶽以鎮野目龍川而帶坰爾其山澤則嵬嶷嶤屼巊溟鬱􅔍潰渱泮汗滇㴐渺漫或涌川而開瀆或吞江而納漢磈磈磈磈滮滮涆涆嶔碒乎數州之間灌注乎天下之半百川派别歸海而會控清引濁混濤并瀨濆薄沸騰寂寥長邁濞焉洶洶隱焉礚礚出乎大荒之中行乎東極之外經扶桑之中林包暘谷之滂沛潮波汩起回復萬里歊霧漨浡雲蒸昏昧泓澄奫潫澒溶沆漾莫測其深莫究其廣澶湉漠而無涯惣有流而為長瑰異之所叢育鱗甲之所集往於是乎長鯨吞航修鯢吐浪躍龍騰蛇蛟鯔琵琶王鮪鯸鮐鮣龜鱕䱜烏賊擁劍􅔢鼊鯖鰐涵泳乎其中葺鱗鏤甲詭類舛錯泝洄順流噞喁沉浮鳥則鵾雞鸀鳿鸘鵠鷺鴻雞鶋避風候鴈造江鸂鷘鷛􅖥鶄鶴鶖鶬鸛鷗鷁鸕汜濫乎其上湛淡羽儀隨波參差理翮整翰容與自玩雕啄蔓藻刷蕩漪瀾魚鳥聱耴萬物蠢生芒芒黖黖慌罔奄歘神化翕忽函幽育明窮性極形盈虛自然蚌蛤珠胎與月虧全巨鼇贔屓首冠靈山大鵬繽翻翼若垂天振蕩注流雷抃重淵殷動宇宙胡可勝原島嶼綿邈洲渚憑隆曠瞻迢遞回眺冥濛珍怪麗竒隙充徑路絶風雲通洪桃屈盤丹桂灌叢瓊枝抗莖而敷蘂珊瑚幽茂而玲瓏層岡重阻列真之宇玉堂對霤石室相距藹藹翠幄嫋嫋素女江婓於是往來海童於是宴語斯實神妙之響象嗟難得而覼縷爾乃地勢坱圠卉木镺蔓遭藪為圃值林為苑異荂蓲蘛夏曄冬蒨方志所辨中州所羡草則藿蒳豆蔲薑彚非一江蘺之屬海苔之類綸組紫絳食葛香茒石帆水松東風扶留布濩臯澤蟬聯陵丘夤緣山嶽之岊羃䍥江海之流扤白蒂銜朱㽔鬱兮䓲茂曄兮菲菲光色炫晃芬馥肸蠁職貢納其包匭離騷詠其宿莽木則楓柙櫲樟栟櫚枸榔綿杬杶櫨文欀楨檀平仲桾櫏松梓古度楠榴之木相思之樹宗生髙岡族茂幽阜擢本千尋垂隂萬畝攢柯拿莖重葩殗葉輪囷虯蟠􅕜㙷鱗接榮色雜糅綢繆縟繡宵露霮䨴旭日暗㫲與風颻揚䬀瀏颼飀鳴條律暢飛音響亮蓋象琴築并奏笙竽俱唱其上則猿父哀吟􅏈子長嘯狖鼯猓然騰趠飛超爭接縣垂競遊逺枝驚透沸亂牢落翬散其下則有梟羊麡狼猰貐貙象烏莵之族犀兕之黨鈎爪鋸牙自成鋒穎精若曜星聲若震霆名載於山經形鏤於夏鼎其竹則篔簹籃箊桂箭射筒柚梧有篁篻簩有叢苞筍抽節往往縈結緑葉翠莖冒霜停雪橚矗森萃蓊茸蕭瑟檀欒蟬蜎玉潤碧鮮梢雲無以踰嶰谷弗能連鸑鷟食其實鵷雛擾其間其果則丹橘餘甘荔枝之林檳榔無柯椰葉無隂龍眼橄欖棎榴禦霜結根比景之隂列挺衡山之陽素華斐丹秀芳臨青壁系紫房鷓鴣南翥而中留孔雀綷羽以翺翔山雞歸飛而來棲翡翠列巢以重行其琛賂則琨瑶之阜銅鍇之垠火齊之寶駭雞之珍赬丹明璣金華銀朴紫貝流黃縹碧素玉隱賑崴㠢雜插幽屏精曜潛穎哲陊山谷崎岸為之不枯林木為之潤黷隋侯於是鄙其夜光宋玉於是陋其結緑其荒陬譎詭則有龍穴內蒸雲雨所儲陵鯉若獸浮石若桴雙則比目片則王餘窮陸飲木極沉水居泉室潛織而卷綃淵客慷慨而泣珠開北戶以向日齊南冥於幽都其四野則畛畷無數膏腴兼倍原隰殊品窊隆異等象耕鳥耘此之自與穱秀菰穗於是乎在煮海為鹽採山鑄錢國稅再熟之稻鄉貢八蠶之綿徒觀其郊隧之內奧都邑之綱紀霸王之所根柢開國之所基址郛郭周匝重城結隅通門二八水道陸衢所以經始用纍千祀也憲紫宫以營室廓廣庭之漫漫寒暑隔閡於邃宇虹霓回帶於雲館所以跨跱煥炳萬里也造姑蘇之髙臺臨四逺而特建帶朝夕之濬池佩長洲之茂苑窺東山之府則瓌寶溢目䚕海陵之倉則紅粟流衍起寢廟於武昌作離宫於建業闡闔閭之所營采夫差之遺法抗神龍之華殿施榮楯而捷獵崇臨海之崔嵬飾赤烏之韡曄東西膠葛南北崢嶸房櫳對櫎連閣相經閽闥譎詭異出竒名左稱彎崎右號臨硎雕欒鏤楶青瑣丹楹圖以雲氣畫以仙靈雖兹宅之夸麗曾未足以少寧思比屋於傾宫畢結瑶而構瓊髙闈有閌洞門方軌朱闕雙立馳道如砥樹以青槐亘以緑水玄蔭耽耽清流亹亹列寺七里俠棟陽路屯營櫛比解署棊布橫塘查下邑屋隆夸長干延屬飛甍舛互其居則髙門鼎貴魁岸豪傑虞魏之昆顧陸之裔岐嶷繼體老成奕世躍馬疊迹朱輪纍轍陳兵而歸蘭錡內設冠蓋雲蔭閭閻闐噎其鄰則有任俠之靡輕訬之客締交翩翩儐從奕奕出躡珠履動以千百里燕巷飲飛觴舉白翹關扛鼎拚射壺博鄱陽暴謔中酒而作於是樂只衎而歡飫無匱都輦殷而四奧來暨水浮陸行方舟結駟唱棹轉轂昧旦永日開市朝而並納橫闤闠而流溢混品物而同廛并都鄙而為一士女佇眙商賈駢坒紵衣絺服雜沓傱萃輕輿按轡以經隧樓船舉帆而過肆果布輻湊而常然致逺流離與珂珬䌖賄紛紜器用萬端金鎰磊砢珠琲闌干桃笙象簟韜于筒中蕉葛升越弱于羅紈㒊譶澩㺒交貿相競喧譁喤呷芬葩蔭映揮袖風飄而紅塵晝昏流汗霡霂而中逵泥濘富中之氓貨殖之選乘時射利財豐巨萬競其區宇則并疆兼巷矜其宴居則珠服玉饌趫材悍壯此焉比廬捷若慶忌勇若專諸危冠而出竦劍而趨扈帶鮫函扶揄屬鏤藏鍦於人去􅚛自閭家有鶴膝户有犀渠軍容蓄用器械兼儲吳鈎越棘純鈎湛盧戎車盈於石城戈船掩乎江湖露往霜來日月其除草木節解鳥獸腯膚觀鷹隼誡征夫坐組甲建祀姑命官帥而擁鐸將校獵乎具區烏滸狼㬻夫南西屠儋耳黑齒之酋金鄰象郡之渠驫賊飍矞靸霅警捷先驅前塗俞騎騁路指南司方出車檻檻被練鏘鏘吳王乃巾玉輅軺驌驦旗魚須常重光攝烏號佩千將羽旄揚㽔雄戟耀芒貝胄象弭織文烏章六軍袀服四騏龍驤峭格周施罿罻普張罼罕瑣結罠蹄連綱阹以九疑禦以沅湘輶軒蓼擾彀騎煒煌袒裼徒摶拔距投石之部猿臂駢脅狂趭獷猤鷹瞵鶚視䟃𧽼翋􅢣若離若合者相與騰躍乎莽䍚之野干鹵殳鋋暘夷勃盧之旅長􅧿短兵直髮馳騁儇佻坌並銜枚無聲悠悠斾旌者相與聊浪乎昧莫之坰鉦鼓疊山火烈熛林飛爓浮煙載霞載隂菈擸雷硠崩巒弛岑鳥不擇木獸不擇音􅕝甝虪􅀈麋麖驀六駮追飛生彈鸞鶁射猱㹶白雉落黑鴆零陵絶嶛嶕聿越巉險跇踰竹柏㺦猭杞柟封狶􅀢神螭掩剛鏃潤霜刃染於是弭節頓轡齊鑣駐蹕徘徊徜徉寓目幽蔚覽將帥之拳勇與士卒之揚抑羽族以觜距為刀鈹毛羣以齒角為矛鋏皆體著而應卒所以挂扢而為創痏衝踤而斷筋骨莫不衄鋭挫芒拉捭摧藏雖有石林之岝崿請攘臂而靡之雖有雄虺之九首將抗足而跐之顛覆巢居剖破窟宅仰攀鵕鸃俯蹴豺獏劫剞熊羆之室剽掠虎豹之落猩猩啼而就擒􅍛􅍛笑而被格屠巴蛇出象骼斬鵬翼掩廣澤輕禽狡獸周章夷猶狼跋乎紭中忘其所以睒眻失其所以去就魂禠氣懾而自踼䟮者應弦而飲羽形僨景僵者纍積而增益雜襲錯繆傾藪薄倒岬岫岩穴無豜豵翳薈無􅣩鷚思假道於豐隆披重霄而髙狩籠烏兔於日月窮飛走之栖宿嶰澗闃岡岵童罾罘滿效獲衆回靶乎行睨觀魚乎三江泛舟航於彭蠡渾萬艘而既同𢎞舸連舳巨艦接艫飛雲蓋海制非常模疊華樓而島峙時倣佛於方壺比鷁首而有裕邁餘皇於往初張組幃構流蘇開軒幌鏡水區篙工楫師選自閩禺習御長風狎玩靈胥責千里於寸隂聊先期而須臾棹謳唱簫籟鳴洪流響渚禽驚弋磻放稽鷦䳟虞機發留鵁鶄鈎餌從橫網罟接緒術兼詹公巧傾任父筌䱎𩶶麗鱨鯋罩兩魪巢鰝蝦乘鱟黿鼉同罛共羅沉虎潛鹿􅎗龓僒束鰴鯨輩中于羣犗攙搶暴出而相屬雖復臨河而釣鯉無異射鮒於井谷結輕舟而競逐迎潮水而振緡想萍實之復形訪靈夔於鮫人精衛銜石而遇繳文鰩夜飛而觸綸北山亡其翔翼西海失其遊鱗雕題之士鏤身之卒比飾虬龍蛟螭與對簡其華質則亄費錦繢料其虓勇則雕悍狼戾相與昧潛險搜瓌竒摸蝳蝐捫觜􅏲剖巨蚌於回淵濯明月於漣漪畢天下之至異訖無索而不臻溪壑為之一罄川瀆為之中貧哂淡臺之見謀聊襲海而徇珍載漢女於後舟追晉賈而同塵汩乘流以砰宕翼颸風之飀飀直衝濤而上瀨常沛沛以悠悠汔可休而凱歸揖天吳與陽侯指包山而為期集洞庭而淹留數軍實乎桂林之苑饗戎旅乎落星之樓置酒若淮泗積肴若山丘飛輕軒而酌緑酃方雙轡而賦珍羞飲烽起釂鼓震士遺倦衆懷欣幸乎館娃之宫張女樂而娛羣臣羅金石與絲竹若鈞天之下陳登東歌操南音胤陽阿詠韎任荆豔楚舞吳歈越吟翕習容裔靡靡愔愔若此者與夫唱和之隆響動鐘鼓之鏗耾有殷坻頽於前曲度難勝皆與謡俗汁協律吕相應其奏樂也則木石潤色其吐哀也則凄風暴興或超延露而駕辨或踰渌水而采菱軍馬弭髦而仰秣淵魚竦鱗而上升酣湑半八音并歡情留良辰征魯陽揮戈而髙麾回曜靈於太清將轉西日而再中齊既往之精誠昔者夏后氏朝羣臣於兹土而執玉帛者以萬國蓋亦先王之所髙會而四方之所軌則春秋之際要盟之主闔閭信其威夫差窮其武內果伍員之謀外騁孫子之竒勝強楚於柏舉棲徑越於會稽闕溝乎商魯爭長于黃池徒以江湖險陂物産殷充繞霤未足言其固鄭白未足語其豐士有陷堅之鋭俗有節槩之風睚眥則挺劍喑嗚則彎弓擁之者龍騰據之者虎視麾城若振稿搴旗若顧指雖帶甲一朝而元功逺致雖纍葉百疊而富強相繼樂湑衎其方域列仙集其土地桂父練形而易色赤須蟬蛻而附麗中夏比焉畢世而罕見丹青圖其珍瑋貴其寶利也舜禹遊焉沒齒而忘歸精靈留其山阿玩其竒麗也剖判庶士商榷萬俗國有鬱鞅而顯敞邦有湫厄而踡局伊兹都之函𢎞傾神州而韞櫝仰南斗以斟酌兼二儀之優渥由此而揆之西蜀之於東吳小大之相絶也亦猶棘林螢耀而與夫樳木龍燭也否泰之相背也亦猶帝之懸解而與桎梏疏屬也庸可共世而論巨細同年而議豐確乎暨其幽遐獨邃寥廓間奧耳目之所不該足趾之所不蹈倜儻之極異誳詭之殊事藏埋於終古而未寤於前覺也若吾子之所傳孟浪之遺言略舉其梗槩而未得其要妙也左思字太沖齊國人少博覽文史欲作三都賦乃詣著作郎張載訪岷卭之事遂搆思十稔門庭藩溷皆著紙筆遇得一句即疏之徵為祕書賦成張華見而咨嗟都邑豪貴競相傳寫三都者劉備都益州號蜀孫權都建業號吳曹操都鄴號魏思作賦時吳蜀已平見前賢文之是非故作斯賦以辨衆惑弔闔閭賦王鏊昔闔閭之霸吳兮卒託體乎兹丘慨往迹之日湮兮曾不可乎復求峯巒紛其環合兮浮屠臺殿鬱以相樛叶忽平岡之拆裂兮劍池奫淪而深黑俯莫測其所窮兮仰不見乎白日兩崖嶔崟而鬬囓兮又巉岩而斗絶信天造之險巇兮為神怪之窟穴將舉首而闖其淺深兮先魂驚而慘栗彼吕政之雄哮兮力驅石而填海將破山而求之兮藐不知其所在宜元之之不信兮謂往牒之我紿歲正德之協洽兮劍池忽焉其枯涸何昔日之奫淪兮今山徑之磽確伊水旱之常數兮非豫人之所度石谽谺而雙蔽兮類墓門之頽駁試往造乎其間兮將舉武而旋却始沮洳以忽明兮諒欲退而不可儼湊題之可捫兮森怪石之欲墮豈漆燈之將滅兮若有俟乎王果唉吳王之物化兮求倣佛其不見想澒池之既塵兮何有玉鳬與金鴈彼槃郢與扁諸兮疑此語之為幻何千年之神閟兮忽一朝而呈露也旋黯然而復閉兮殆神物之呵護也昔驪山之強項兮後會稽之妖珈錮南山其猶有隙兮信多藏之為害獨空空以保全兮因兹丘而增慨吳子城賦每過吳故墟未嘗不慨想其盛而悼其衰也故為之賦泰伯遺墟干將故里臺閣翬飛冠蓋鱗次喟彼荒郊羌何為乎城之裏但見愁煙鬱而四積悲風慘而時起頽墉突阜剩水殘濠野雉朝雊鵂鶹夜號沉牙折戟墮珥遺翹漸漸惟麥之秀離離彼稷之苖父老告豫曰此吳王之遺宫也方吳盛時志大功髙入楚柏舉敗越夫椒城規方於八卦門僣擬於三朝跨長洲之茂苑館苧蘿之艷妖帶以錦帆之涇壓以金母之橋爰有涼臺溫室鏤楣繡栭風亭月榭碝壁椒塗飾以璆琳琅玕間以木難珊瑚鳴佩鳬簉髙冠鵠趨自謂百世君之豈意至於是耶吳祿既更厯代崇飾春申桃夏秦皇刻石危亭岌夷雕闌紆直齊雲之樓凝香之室木蘭之堂交映翕赫疊石則嶻嶪嶕嶢鑿沼則囦潾澄碧蘭芷羅生乎其間竹松駢列於其側羅綺爭春而妖冶歌鐘入夜而嘈雜韋白耽於吟玩皮陸侈於酬答逮宋迄元更為治所雙蓮四照池光春雨歲時觀遊麗無踰者而何至於是耶蓋自元政隳羣雄鶩白駒鹺酋乘間竊據挾嘉湖杭以自雄擢黃蔡葉而為輔盛稷下之文儒忽太湖之飛渡煬戀迷樓卓矜郿塢倐天兵四面以重圍金陵百雉而莫固技殫九攻倉皇一炬厯代繁華可憐焦土遂使燕巢再燬麛鹿重遊竭南國之脂膏坐受其困激東溟之波浪莫洗其羞且夫傾宫阿房非不麗也巨橋璚林非不富也崤關鞏洛非不固也自古如斯曷之故也豈仁義不修燕安之可畏耶將氣運靡常盈虛之有數耶惟是吳墟殷鑒斯在前既顛隮後仍荒殆登兹城以徘徊寄千古之一慨弔故宫賦徐禎卿陟墟原兮望迤靡倚國門荒衍寥廓宫闕燒殘墉雉㠍嶪垝土蔓延馳道傾圯鞠為陌阡秀麥含榮麻菽芊芊雜草蒙歙叢葛幡幡菲兮散兮鬱鬱連連鳴雉于飛竹樹蓊蕃烏燕黃雀羣飛翾翾疾風揚塵決曖蔽天四望鬱兮愴可憐也念彼壯夫亦可嘆也繁華狼籍不可還也失任滅智嗟何怨也百歲之後又誰為寃也吳郡圖經續記序朱長文方志之學先儒所重故朱贛風俗之條顧野王輿地之記賈耽十道之録稱於前史蓋聖賢不出户知天下矧居是邦而可懵於古今哉按唐六典職方氏掌天下之地圖凡地圖命郡府三年一造與版籍偕上省聖朝因之有閏年之制蓋城邑有遷改政事有損益户口有登降不可以不察也吳為古郡其圖志相傳固久自大中祥符中詔修圖經每州命官編輯而上其詳略蓋繫乎其人而諸公刋修者立類例據所録而刪撮之也夫舉天下之經而修定之其文不得不簡故陳迹異聞難于具載由祥符至今踰七十年矣其間近事未有紀述也元豐初朝請大夫臨淄晏公出守是邦公乃故相國元獻公之子好古博學世濟其美嘗顧敝廬語長文曰吳中遺事與古今文章湮落不收今欲綴輯而吾所善練定以為惟吾子能為之也長文自念屏迹陋巷未嘗出庭户於求訪為艱而練君道晏公意屢見趣勉於是參考載籍探托舊聞作圖經續記三卷凡圖經已備者不録素所未知則缺如也會晏公罷郡乃藏於家今太守朝議大夫武寧章公治郡三年以政最被命再任比因臨長文所居謂曰聞子嘗為圖經續記矣豫願觀焉於是稍加潤飾繕寫以獻置諸郡府用備咨閲固可以質凝滯根利病資議論不為虛語也方聖上睿謨神烈聲教光被海隅出日罔不率俾廣地開境增為郡縣倘或申命方州更定圖籍則此書庶幾有取也事有缺略猶當刋補其古今文章别為吳公總集云元豐七年九月十五日州民前許州司户參軍朱長文上書吳郡圖經續記後常安民昔揚子雲嘗有言仲尼多愛愛義也子長多愛愛竒也豫嘗患之今記述類多博收泛採譬如廣㕓大肆百物羣品雜然陳立於前而無所别異此記述者之公患也辭曹朱伯原少以文學第進士退居吳郡博覽載籍多所見聞因為圖經續記以補缺遺觀其論户口則繼之以教陳風俗則終之以節至於辨幻玉之悲正語兒之妄紀談生之譏其議論深切著明皆要之禮義與夫守牧之賢人物之美事為之善凡前言往行有足稱者莫不褒嘉嘆異重復演説信乎所謂君子於言無所茍者豫每至伯原隱居愛其林圃臺沼逍遙自樂及得斯記觀之然後又愛其趣識志尚灑然有異于人使逢辰彚征則其所攄發豈易量哉惜其遺逸沉晦而獨見於斯記故為書其後以身待知伯原者元祐元年四月十五日臨卬常安民書圖經續記後序林虙余家自伯父皇考洎諸父奉王大母大母來居於蘇著籍此州者五十年矣今帶城橋儒學坊為吾家榜也橫山之寶華華山之博士塢吾家二母之所葬也余雖少長於蘇而山川城邑津梁園觀往往未知其所由來嘗以問樂圃先生先生出所為圖經續記以示我曰此一覽盡之矣退而觀之千數百載之廢興千數百里之風土燦然如指諸掌嗚呼何其備哉先生之書三卷若干條而所包括者古今圖籍不可勝數雖浮圖方士之書小説里諺之言可以證古而傳久者亦畢取而並録先生豈欲矜淹博而耀華藻哉舉昔時牧守之賢冀來者之相承也道前世人物之盛冀後生之自力也溝瀆條浚水之方倉庾記裕民之術論風俗之習尚夸户口之蕃息遂及於教化禮樂之大備於是見先生之志素在於天下者也豈可徒以方域輿地之書視之哉先生未冠而擢第英聲振於士林不幸以末疾卧家不得建其志於斯民然而潛心古道篤於著述其所撰次成帙如是書者非一竊嘗探測其淵源而妄論其規制以謂黃鍾大吕不足以比其清陽阿激楚不足以方其妙齊紈蜀錦不足以埒其華崑玉南金不足以麗其美長江巨河不足以况其逺輕車駿馬不足以侔其逸意者左丘非失明國語不成虞卿非窮困春秋不作一何發揮之妍麗也不然天將激先生以鳴斯文是以固厄之耶雖然先生之疾損矣無害其可以亨舉于天衢也昔者劉向非大發天祿石渠之藏不能盡論分野之風物賈耽非博詢遐陬絶域之衆不能悉知華夷之道里先生之才不歉於二子特處非其所而已與其陳四境之形勝孰若使志四海之封畛與其論千里之事物孰若使綜萬方之利害况史觀經始品藻才難當筆削之任者非先生而誰可哉伏讀終篇感先生之未遇輒書卷末庶幾萬一有警於朝廷今日當為官而擇人者元祐七年十二月朔大雲編户林虙序圖經續記後序祝安上祕書省正字樞密院編修朱公伯原嘗為前太守晏公作吳郡圖經續記三卷既成而晏公罷去遂藏於家其後太守章公雖求其本以置郡府而見之者尚鮮也元符改元安上以不才濫綰倅符到郡之後周覽城邑顧瞻山川竊欲究古今興替盛衰之迹而舊經事簡文繁考證多缺方欲博訪舊聞稍加增綴而得此書於公之子耜讀之終卷惜其可傳而未傳也於是不敢自祕偶以承乏郡事俾鏤板於公庫以示久逺若乃著述之本意則詳於自序而攄辭之博贍指意之深逺則又詳於常林二君之後序矣兹不重見姑志其刻鏤之嵗月云越明年嵗在庚辰八月望日朝請郎通判蘇州權管軍州事祝安上書圖經續記後序孫佑自庚辰八月權州祝君鏤板題跋之後距今紹興甲寅實三十五年佑被命假守時兵燹之餘圖籍散亡秉筆凝滯觸事面墻每賢士大夫相過必以咨訪未幾前湖州通判陳能千自青龍泛舟携此書相訪開卷欣躍因授學官孫衛補葺校勘復為成書以傳異日職方氏纘新中興新書當亦有取於斯則樂圃先生之志不泯矣紹興四年六月初十日漣水孫佑書蘇州府志序宋濓吳在周末為江南小國秦屬會稽郡及漢中世人物財賦為東南最盛厯唐越宋以至於今遂稱天下大郡然其因革盛衰之際紀載於簡册者自吳越春秋越絶書以下若晉張勃顧夷隋虞世基唐陸廣微等所述及元和郡縣志寰宇記各有所明逮宋之時羅處約有圖經朱長文有續記范成大趙與皆撰類成書厥後有章哲者病其未完作吳事類補宋亡書頗散軼元趙鳯儀為總管嘗集諸儒論次遺闕會改官不果成入國朝吳縣教諭盧熊閔前志之乖紛以為茍不合而一之恐不足以示來者乃攬衆記托遺事芟繁取要族别類分為志以述地理都邑文學祠祀食貨兵衛之屬為列傳以見古昔人物之美其目曰名宦名臣儒林藝文良吏忠義孝友髙行隱逸而列女之節方技之良及其事有不可棄者附焉前為畫圖以著疆域之異同後有集文以備古今之制作總之為五十卷於是數百里之內二千載之間其事可按書而得矣洪武十一年知府廬陵李侯亨嘉是書之有繫於政也將命工刻板以傳丁內艱去已而髙郵湯侯德來繼其職遂督成之熊用薦者出由工部照磨為中書舍人以豫有同朝之好請敘其首古者列國皆有史官下至州閭莫不有之然不過記言書事而已及漢司馬遷班固創為序記傳志年表之法由是四海之內無復遺事信史氏之善者也後世郡得專社稷山川之祭遂有政令教化之施儼如古諸侯之國固不宜無所紀述而况於吳嘗為封國非他郡之比者哉厯漢至今雖間有所作而無完文以考其事物之全誠政之缺者也熊獨毅然以筆削為已任效史漢之法損益舊典為一郡成書豈非好古之士乎李湯二侯能知所重而圖其傳亦可謂達於政體者矣後之人覽此書治身居官取前人之成憲以為法將見道德興而習俗美勾吳之區與鄒魯無異矣則是書之為教不亦大哉豫喜熊能急於世俗之所緩篤於好古也為序其槩俾刻傳焉洪武十二年四月既望前翰林承旨嘉議大夫知制誥兼修國史兼太子贊善大夫金華宋濓序姑蘇郡邑志序劉昌鄱陽邱侯守姑蘇之再明年豫歸自嶺南適中書舍人李應禎貞伯陽武訓導陳頎永之皆以告家居以嘗有斯文之契也相與理姑蘇遺迹而及於禮文典則之事侯曰吳自泰伯以禮讓立國至言遊北學於孔子而仁義道德之説益推達而充周其後若嚴助朱買臣之詞華陸澄陸元朗之博浹范仲淹父子之忠賢尹焞魏了翁之學道他如髙人逸士則有張翰陸龜蒙皆出于斯郡而望於天下者文獻之實有徴不誣今既千有餘年出為等倫之魁列為法從之賢而鬱為儒宗者且若山立水湧前者導而後者繼也不亦盛哉當時領節鎮如李栖筠如李德裕典郡邑如鄧攸如韋應物如白居易以及我朝諸聞卿又復俊偉光大足以名今而垂後風聲所被而俗效之姑蘇文獻之成宜非一朝夕也然盛則衰醇則漓轉移之機厥有所寄矣吾欲考求遺禮訂正古樂以隆時祀以表章鄉賢齊整風俗此必有所師資而名物遺矩載於前志多散逸缺漏無所稽裁補而葺之實惟二三君子有賴豫謝不敏李君曰此侯之惠教吾蘇也於是相與諾之侯復聘髙年延俊彥志意真確期於克協乃法范文穆公成大所撰志參以百家禆以羣史人以代著文以事從郡總而邑分之凡一百卷李君陳君諸俊彥之功為多發凡證例余亦豈敢抑討論紬繹則竊欲勉焉耳矣侯名霽字時雍天順庚辰進士以刑部主事拜今官髙年文學之士則杜瓊用嘉陳寬孟賢鄉貢進士施文顯奐伯陳璚汝玉儒士賀甫美之周京元基成化十年正月既望重修姑蘇志序王鏊夫志何為也者紀載郡之封域山川户口物産人才風俗以至城池廨字井邑第宅前賢遺迹下至佛老之廬皆類次族分使四境之內可按籍而知而一代之文獻不至無徴焉如斯而已者也姑蘇為東南大郡其風土亦已略見於禹貢周職方爾雅諸書其後如子貢之越絶書趙曄之春秋張勃之録陸廣微之記羅處約朱長文之圖經龔明之輩紀聞紀事則備矣彚而成書則有范成大盧熊二志由今而觀范志該而整盧志詳而贍其間亦不能無異同焉况國家百三十年人物文章制度因革損益尚皆缺焉識者病之成化間鄱陽邱侯霽守蘇則有志修述時則有若劉參政昌李中舍應禎陳訓導頎各應聘修纂會邱罷去事遂已𢎞治中河南史侯簡曹侯鳯又皆繼為之時則有若張僉事習都進士穆而裁決於吳文定公寬久之二侯相繼去文定公不祿書竟不就然文定之惓惓是書也雖病在告未嘗釋手淡墨細書積滿箱案今廣東林侯世逺由近侍來守才優政舉化行訟息積弊盡剗文書聿興一日抱文定遺稿屬豫曰敢以溷子矣豫謝非其人且郡多文士有楊儀部循吉輩在焉盍以屬諸而儀部固辭豫以侯之美意文定苦心使缺焉泯沒則豫誠若有罪焉者乃延聘文學得同志者七人相與討論合范盧二志參以諸家禆以近事閲八月成得六十卷以復於侯發凡舉例一依文定之舊搜遺闡隱芟繁訂訛則諸君子之功居多豫何能焉其亦會其要而折其衷者也獨念是志之續厯三十餘年更六七郡守而卒成於侯豫乃適值其時獲玷名其間信豫之幸也顧學殖荒落且於吳事素多懵焉又以趨召事嚴不克殫力占畢以足私心之所志以成一郡之典以副林侯之望此豫之所自愧而嗟也續而正之能無望於後之君子乎姑蘇山名在城西南昔以名郡故今以名其志正德紀元二月之吉嘉議大夫吏部右侍郎國史副總裁震澤王鏊序姑蘇志後序杜啓啓卧病却掃之三月忽劉都憲與清欵扉而入告曰郡守林公且至啓乃憑几而見客公至曰某將有事於郡志已得請於少宰王先生及延諸彥某某輩僉謂不可無君君固疾也不可辭况館所與君鄰牀設具存亦可調攝君不可以疾辭既去啓竊念之蘇志之修屢矣景泰間前守隴西汪公嘗有意焉而淵孝先君實董其事後不果成成化間鄱陽邱公復舉之時先君且老復與校讐將成亦廢遺稿有一二存者矧林公之辭也懇遂携枕席藥餌赴之至則少宰首出吳文定公之稿中間改竄更定皆出手筆觀之有不忍置者嗚呼文定哉又取劉李陳三公稿會萃之與范盧二志相較對立例舉凡分類定秩周旋筆研者踰月病復作乃歸凡五閲月矣一日林公復至曰志已成請君序其後啓驚起曰是何速也又二月少宰赴召且行持稿授啓曰煩君次第之或尚有缺當為足成耳啓曰諾遂與原事諸君編次入梓云林公字思紹文章政事競美無二而一時僚佐皆雅尚文事故舉此不難於前耳正德元年四月朔奉議大夫福建等處提刑按察司僉事致仕前南京山西道監察御史杜啓序蘇郡志洪武十二年郡人盧熊所撰共五十卷郡守髙郵湯侯德嘗刻之名蘇州志正德元年廣東林侯世逺請守溪相國王公鏊修之共六十卷名姑蘇志刻於府庫嘉靖十八年四月府庫被災板燬二十年順慶王侯廷復刻之一依舊本特增歲貢一表專為翰林待詔文徴明也崑山縣志序方鵬國朝修崑志者三人季志逺矣蔣不足徴也惟顧為近之而大略為補其所遺續其所不及以成一邑之完書此其時乎顧豫非其人耳前令楊侯仁甫不知豫之非其人也而專委之編次垂成而侯適以召去今侍御王侯子正繼至請於郡守肅齋王公刻而傳焉將使吏兹土者得有所考以行其政是故按城社則思守焉核民數則思養焉訪習俗則思教焉修貢賦則思敬焉稽祀典則思正焉前乎吏兹土者善必特書之則思齊焉或不書則思懼焉此二侯之深意也抑吾崑民生物産與他邑等耳惟人才之盛則實倍之故於是獨詳焉將使承胤緒者起象賢之心共閭井者奮向往之志巨公碩儒接迹而出以增兹邑之重斯其上也其次一命之榮一藝之善亦得以厠名其間則夫人亦當感發而興起以求自異於齊民而後已也豈可生無益死無聞而負此文獻之地哉此則操筆者之微意也鵬也抱痾衡門舊學荒落深懼采擇不精紀載不備勸懲無法以孤盛舉然秉公持正之心則不敢不自盡矣以此獲罪吾知不免焉而亦不敢辭也是役也楊侯倡之王侯成之皆能以文飾吏者而揭三尹夔梁文學介亦與有勞焉法得附書皇明嘉靖十七年歲次戊戌夏四月吉旦賜進士出身中順大夫右春坊右庶子兼翰林院修撰經筵講官編纂御札同修會典前山西按察司副使奉敕提督學政致仕邑後學方鵬序常熟縣志序李傑姑蘇為南都輔郡而常熟其屬邑也倚虞山以為城環江海以為池實東吳要害之地其土膏腴其田平衍其物産殷盛若粳秫布枲魚鹽蔬果水陸之珍竒所以供國賦而給民用者充然有餘而不資外助自闔閭夫差雄據一方虎視諸夏而俗尚豪侈自泰伯子遊禮讓風行文學化洽而人才彚出是固江南名區非特為一郡六邑之冠而已惜前志毁於宋紹興兵燹自吳通上國以來二千餘年故實漫無紀載良可慨也慶元間縣令孫應時始一修之元至正間知州盧鎮又復修之然文獻無徴遺佚不少若人物一類自漢迄唐寂寥無聞他可知己𢎞治丙辰慈溪楊侯來尹兹邑蒞政之初百廢具舉以邑志久不修輯廢無甚焉者乃旁搜典記近取見聞詢遺老以正舛訛委文士以司考校於是山經水志之所述陳庋收篋之所藏殘碑斷簡之所寓幾無良留矣編次既成謂豫為邑人宜有言以志顛末夫三代盛時九州山川記於禹貢天下圖籍掌於職方後世因之而郡國有書寰宇有志坤元有録風土有記皆所以存古證今以為考求治具損益事宜之張本其於從政者不為無助而乃困於簿書期會之繁顧視此為不急之務宜吾邑廢典必有待於通才卓識如楊侯者而後成也侯名子器字名父成化丁未進士厯任崑山髙平二縣皆有異政兹以當道論薦更任常熟其嚮用未易量也賜進士出身中順大夫太常少卿兼翰林侍讀學士經筵講官兼東宫講讀官同修國史會典副總裁前南京國子祭酒邑人李傑序重修嘉定縣志序龔𢎞按創縣宋寧宗十年至元順帝至元六年厯一百四十七年邑人秦輔之始作練川志逮今又一百八十一年更無續之者國朝洪武十一年戊午詔天下郡縣纂修志書永樂戊戌景泰甲戌嘗遣使督成之天順間命官巡行采輯始萃成志吾邑訖無應詔之人於兹老者失傳則少者無聞致上下三百餘年之事日淪沒矣後有慕古君子奮起例以老者失傳之罪罪之在余惡得而辭焉乃上稽下察元以前踵秦本入國朝其體要一遵大明一統志也積久成類將以待知遇者洛陽蔡侯淑仁以名進士令斯邑一日謂豫曰顧安得志之詳乎余出稿請校之俾余為序夫地里有志昉於禹貢周職方然特紀其大至秦郡縣天下厯代相沿始各為志美惡並收以昭勸戒世之有事於此者不曰續曰修輒任作者事擅一已之見筆削千載以上之紀述惡者隱之恐非長民者之義若人之為不善則賣諂不録後何懲焉觀侯之政若於是志有先得者掃前官之失擇其是者行之潔矩惟公得民心之好惡矣首除巨冦境土安矣得天時耕者獲矣核征役則民力寬矣若學校尤為侯所重刻期造學偕教諭羅文訓導劉元慶趙子瑛砥礪士業雖冗不能奪風化開而人文著矣侯倡於上一時分治者縣丞蕭鉞魯邦本談玕主簿周尚文吳瑛曰水利曰民兵曰催科據今徴昔造有成績若典史安志髙從事於侯無怠由是聞監司達郡國邑清事罕政教一丕變矣噫余修久闕之典誠有待今日侯為允躬實蹈之書侯取而刻之又有待後之官師土著之人起而並諸已矣二者之論君子必有取焉豈曰空言鼓佞者哉述逺續志者盍於是求之嘉靖四年九月重陽日賜進士出身榮祿大夫前都察院右副都御史奉敕總督三省黃河水患兼理通州直抵揚州一帶漕河工部尚書致仕進階一品玉帶邑人龔𢎞書重修嘉定縣志後序蔡復元自志書作而地理可考降至我朝大明一統志則省郡州縣之建置備載之矣然各自有志也嘉定昔未有志至邑人秦輔之始修之而未成逮至正德己巳吳郡都穆修焉年餘乃成惜其類郡志也約而未詳先是蒲川龔老先生為嘉定先達厯階尚書居官清苦鄉行表正留心志書幾三十餘年未嘗對人言者豫來兹土已二載政暇因思志大略乃請教於先生先生曰志已成矣為之奈何豫曰志也者一方之大典也惟先生其裁之先生曰諾吾有志焉而未遂也將有待焉吾老矣吾留心於志也久矣雖厯官數載政暇輒提筆潛修博收野史遍考典籍可入者入之可去者去之稿已粗成未及校正惟不吝取以覽焉豫再拜領去坐靜室觀其條理詳密去取精當真史筆也三四讀不欲釋手遂告於先生請命工鋟諸梓以彰厥志使知所以復修之意云嘉靖乙酉歲孟冬月知嘉定縣事洛陽蔡復元序太倉州新志序祝允明慎哉劉侯之作其州之史也其古之遺教乎書與春秋之志也都氏之筆亦有以成其志焉舜肇州封山濬川禹敷土作貢貞田賦盤庚治亳周人宅洛政之大倫也右史紀其績仲尼述以垂訓又筆削魯紀城社山川宫廟門觀臺榭廄囿軍戍稅甲之間粲然矣而特加意於人才務褒善斥惡二典者立功與言之法程也今之從政君子自孔氏者類知所範模善矣其或未盡者訛其政詡其言言卑若貨券髙若鳯鷙不知慎也故君子難之劉侯之為政與言也覽斯策志可睹矣侯越人也字允卿以進士來三年政成而史都君名穆字玄敬仕太僕少卿吳人也始州未建陸大參容作太倉志陳丞伸作事迹其他散在崑山常熟嘉定三邑書李君端初守州即屬桑倅悅為志今書蓋總諸策而登黜之王生梁實贊焉其旨主簡核故寡要而可觀書成都且病革不及自序故稍為詳之雖然書春秋天子之事也劉侯事功以位限不盡見見者其志嗣此執之以往易之翼升曰南征吉志行也其漸曰進得位往有功也然則九官十亂兹其階也與嘉靖五年歲丙戌正月既望前應天府通判承直郎長洲祝允明序太倉州志序王積嘉靖丁未太倉州新志成明年戊申春二月同知州事浦陽周侯裒葺為帙虛其首簡屬於豫豫得而讀之凡天文地理人事之紀肇自往昔迄於今兹域於方隅而可信諸永久者不啻備矣乃作而言曰甚盛幸哉吾州文獻之有徴也古者紀事之官莫詳於周蓋自王朝以達里閭莫不有之君之言動民之臧否法得備書是故上有道揆下知法守治功之盛鮮不由兹自秦罷侯置守而史官盡廢漢唐以降雖王朝太史牽於避忌有所紀載率都失實而况郡邑乎郡邑之史既廢而又無志以昭文獻則凡可以彰往而察來信今而傳後者掃地盡矣今自皇朝以達郡莫不假志以寓史志存而史之末緒猶有稽焉君子所以慎之也夫崇文則掩實貴簡則昧詳偏好則侈譽偏惡則誣毁有一於斯志寧無作而况考或弗精知或弗審偽或亂真疑或間信則斯志也乃所以深病夫文獻者也而君子奚取焉太倉有志肇自𢎞治丁巳迄今才五十年守更十九二倅五十七掾幕十一而志且三易矣初志出於桑栁州再志出於都太僕皆名流巨筆非無足證以今考之數者之敝其有與無將不可知抑其歲月彌久事緒日增失今不載後將無考此新志之所以作也夫風則有自微必達顯逺者近之推也大者小之積也國家惟不作史作則必徴諸部院諸司部院諸司必徴諸監司列郡監司列郡必徴諸方州下邑故州邑之志國史之楨幹也其可忽歟兹新志所述為卷者十為類二十有四益以圖考存其舊序體則備矣昭逺闡幽闕疑傳信核而有文詳而不贅法則嚴矣且於辨川原釐賦役謹兵防表風節數事尤惓惓三致意焉宛然史氏家法也夫假志以寓史謹之一方達之天下政若有經家若有乘後有述者於兹考焉因文以稽實探賾而鉤深可以昭勸戒可以示範則豈惟海隅文獻永永有徴他日觀風問俗之使執而憑之固正史實録之所待而有者也夫豈無因強作得己而不己者哉是舉也二守君自刑部尚書郎左駕入婁得請於兵備憲使新喻敖公開局延賔引繩發墨已有定緒矣而州守姚江周侯修覲典畢復任周旋其間懇惻篤至未幾以憂去二守君竟圖厥終任筆削之責者春坊司直張君參考分述則州庠文學陸氏伯仲也司直君以太史矩矱施諸里志敬慎周詳罔或出入陸氏文學則皆世迪文軌積久未試其所稱述咸彬彬可慿君子於此蓋可以觀衆美矣守曰士佐二守曰鳯岐司直曰寅文學曰之箕之裘惟時州倅閻君儀金君江州幕王君德符樂志之成咸知翊贊是宜備書以昭來許嘉靖戊申春三月朔旦賜進士出身亞中大夫福建等處承宣布政使司右參政奉敕提督糧儲州人王積撰太倉州志後序張寅序太倉新志有若虛齋王大參若思質王侍御暨我州二守仰峯先生言之美斯溢矣則寅豈敢然有不能已於言者乃復之曰嗚呼志豈易為哉亦豈偶然哉寅自丁亥歲謝政歸前守見湖萬公委以志事交議闢局未閲月見湖改任去遂已嗣是弗克舉者又數歲仰峯先生以刑部尚書郎出二吾州政多暇豫式於文獻是究是圖州志刻行有如桑栁州都太僕所為者桑務才華不假遺事都值危病或託他手寥寥簡編括其梗概觀者少之惟龔氏太倉考為近而末梓故前所不載後所未修者奚啻數倍仰峯先生因屬寅重輯之周守鳯南先生入覲歸謀益協兼得陸氏伯仲文學之士乃彚集崑嘉常三縣宣德成化間志本及搜閲典籍摹拓諸廨宇金石之文訪之故老參之羣議期月而書成為卷十目草有七附草有五簡帙重大釐為四册册凡百餘幅視曩者加十之七猶懼未悉也夫周禮職方氏與小史外史所掌以周知廣輪之度而民物政治得有所稽故郡邑之有志猶國之有史固也然郡所志國史不得而什一焉州縣所志郡志不得而什一焉國史舉其要郡次之州縣該其博不然則脫漏淪沒以胥於澌滅也可勝歎哉太倉當天下海道之衝如運餉以足國通番以威逺而朝廷東南憂顧迄無寧歲豈他郡邑比耶此寅等仰承作者之意必使事無遺迹物無遺軌人無遺善官無遺政耳無遺聞目無遺見光前信後以俟司國史者采擇於兹焉是故紀載之詳戒略也分類之嚴戒紊也去取之公戒偏也貴勢不怵親昵不比疏逺不忘議論不惑愛憎不任戒私且小也然豈敢執一已之見哉要諸人心之同然者而已矣振一方之墜典使文獻足徴鳯南仰峰二公之功於是為大維倅暨幕則閻君儀金君江王君德符咸與聞之嘉靖戊申二月望賜進士第右春坊右司直兼翰林院國史檢討致仕州人張寅撰重修崇明縣志序張慶邑之有志凡諸事物皆載焉官於是者不可以不知蓋其山川之險易物産之豐約貢賦之多寡與夫户口登耗人材顯微風俗美惡莫不僃焉覽之則可以為治昔李吉甫居相甚重此也崇明縣主簿臨海陳公知乎此而每有心於纂輯焉一日謀之大尹張公二守祝公曰舊志殘缺文獻復不足徴茍不修以續之則前元至於今僅百年之典故何所考稽甚非為政之存心也乃於正統甲子夏致書幣延請舊知前教諭琴川季仲怡來治其事仍命西洲儒士施克賔等搜訪事實付之裁之書成縣大夫慮後湮沒遂捐資俸命工鋟梓以傳悠久而克賔等屬豫題識於首豫惟國史係天下之廣所言在乎約圖經具一邑之事所載尚其詳今閲是志詳而不泛簡而不陋實而不謬深得乎紀述之體異日聖朝纂修大一統之志固不能外此而他求也吁璆琳琅玕珊瑚木難人皆知其為寶然産於山海之幽深孰得而盡觀焉有能聚之於府庫則一啓戶皆可類别而名辨乃知觀者非難而聚者之功為難也吾於是見縣大夫慮事之深文士採托之勤而季公編輯之勞悉不可泯其迹也故為之書崇明縣儒學教諭樂清張慶序又序陳梗崇明舊志一帙編簡殘缺不足以觀豫與大尹張君叔孚二守祝君以道商論其地桑滄屢變與他郡邑不同欲重編摩乏操觚染翰之才於是相與邀請海虞季仲怡先生下席於兹命儒士施克賔等采訪事迹增新芟舊期月而書成凡一十卷卷各有條辭達而不冗事詳而有據俾後之君子與夫宦遊於此者欲知風俗沿革土産景物名宦人物一覽而盡得之亦可謂永久不刋之美事也然而季先生修輯參訂之勞施克賔等采訪助資鋟梓之勤皆可嘉焉於是乎書正統九年甲子孟秋縣主簿天台陳梗用直書又序季篪圖經為外史之屬記其郡邑沿革山川勝槩人物出處與夫土産貢賦之類所係實重不可不作也然歲月推遷世異事殊不繼輯之則無以紹前躅而詔將來蓋又不可以曠缺也崇明處大海中四繞鯨波傾圮湧漲地無一定視之他境其迹易於成廢不加纂述亦何由考索而知其然縣大尹金華張侯叔孚判簿天台陳侯用直聽政之餘檢閲前志病其事緒缺略易運以來荒昧莫稽以篪嘗遊其地知其風土一二乃走書幣延致而編之篪名沾一介才乏三長安敢與其觚翰以是辭之不獲爰因西洲士人施克賔等所采事迹參之李良玉所藏官修志禍據以朱禎朱曄舊編芟之托之臚分彚聚上續至正甲午以迄於今九十年之遺逸凡為數卷旁搜博訪爰實而書思所以昭信悠逺不敢用私其意妄為損益稿成二侯將謀鍥梓俾敘於端嗚呼地輿遼濶事類糾紛坐環堵而綜核所聞寧免漏遺之誚博雅君子能足其所不及則與人為善之美抑何偉哉正統九年甲子六月望前山東曹縣儒學教諭海虞季篪仲怡書於崇庠寓舍吳江縣志序莫旦昔大明一統志之纂也朝廷先期遣使采天下事實吳江縣奉文集耆儒開局於聖壽寺時旦與今致仕何訓導升俱為邑庠生為掌教陳先生賔所命往總其事稿成上郡郡又類總進於朝時丙戌也後旦二人私相與議曰奉文纂修者乃天下之書其法當略至其一邑之中亦自有書其紀宜詳今略者就緒而詳者可遂已乎况吳江為南畿重地迭為州縣餘五百年而志書未聞有板行者其疆域山川風俗人才户口田賦學校科名牧守政治與夫城池坊市官宇橋梁及詩文著述之類忍使其日就泯滅乎泯滅無聞後人興慨非吾輩責乎何君曰然於是訪得舊圖經一册記載皆國朝以前事而簡略無文既又得洪武戊午與永樂戊戌奉文纂修者凡二册而傳寫舛訛視前益略然亦為之喜曰得此三者書不患其不成也未幾何君以舉業不暇辭去旦獨不渝初志謬加筆削合而成書凡十卷時嘉禾士人懷悅見之遂為捐資鋟梓以傳焉天順丁丑也已而嚴君在任所聞之以書來曰古人著書多在暮年如孔子年六十餘方定六經汝為此書何遽刋行之驟也旦始悔之遂停其板成化乙酉忝科名待次數年因暇再加編輯重立例目參以郡志諸書與凡殘碑斷碣無不搜剔遺編故紙無不檢閲鮐背兒齒無不訪問手録心思至忘寢食於是聞者致譏見者竊笑以為迂謬旦亦自笑其愚者屢矣日積月纍總成二十二卷比前加詳會提學陳御史選行文立鄉賢祠時王尹迪詢謀於衆得前輩之學行卓異者十五人為之立祠且以入志方欲梓行而王以升任不果繼為邱守霽取以參修郡志未成而邱去官稿亦隨失丙申忝教新昌重録成書而馮尹衡行文關取鋭意欲刋馮亦以事去官又不果乙已以內艱解官而還女壻趙員外寬書來且曰吾邑新尹孫侯顯陜之華州人早歲登科有治材其來志書之獲遇也必也幸留意焉旦因綴拾舊稿益以新聞新見再纂成書已而侯至即捐俸梓行而邑人好義者咸樂相焉謂旦宜有序因竊笑曰嗟乎天下之事為不為者人也而遇不遇者時也雖曰遇之有時然亦不貴於成之之速焉始旦之為是書也少年氣鋭每有不遇時之歎屢起屢仆轉三十五年始有遇於吾侯使吳江千百年之事一旦顯然傳之不朽夫豈偶然者哉寬可謂知人而侯可謂達於政體者矣然則前日之所以不遇者蓋天使有待於今日也不然安得若是之粗備哉至此而嚴君昔日之言方驗然遇則遇矣竊念德不加修學無寸進安知後之視今不猶今之視昔續而筆之尚有望於後之君子𢎞治元年戊申春正月望莫旦序吳邑志序楊循吉邑視古比諸侯邦邦必有史志史類也所以識也今志之作其多不可勝計而工者鮮若夫吾吳則以泰伯舊壤創邑於秦蓋雄峙以表者幾二千年宜得專書審矣然迄未有述焉不其闕歟明天子法乾中興文教誕敷海內向風於是七年知邑事濮陽蘇君祐祇𢎞德化旁及此書乃介判簿張君即愚謀之愚辭不敏者再又竊自念身邑産也既皤顛矣曾無補於鄉人今幸從事而執筆焉豈非願也既啓局事且中止最後蘇君以守制去任又滯於刋刻為分已粟周之然後克完厥惟艱哉今書為十六卷凡八萬言詞義膚淺仍同俗手然於尊賢訂古亦無敢不竭焉乃若歲月始末不容以無書故又僣題首簡云爾時在嘉靖八年冬十一月長至日東吳支硎山人楊循吉薰沐謹序蘇郡學志序王鏊國家學校之設遍於海隅而蘇學獨名天下於是吾友蔡君惟中始為之志惟中之言曰蘇學創自宋景祐魏國文正范公割地為之而安定胡先生實為之師今去二公五百餘年髙風遺烈猶一日也且其地故為吳越廣陵王元璙之南園特幽且勝由今觀之大成之殿明倫之堂尊經之閣髙壯巨麗固已雄視他郡其間方池旋浸突阜錯峙幽亭曲榭穹碑古刻原隰鱗次松檜森鬱又他郡所無也况自宋以來科第往往取先天下名臣碩輔亦多發迹於斯則其盛豈獨地哉夫物盛則必傳盛而不傳蓋有之矣則以無紀籍故也昔四代之學見於戴記魯之泮水詠於詩蜀之學官紀於史今吾學之盛於四代雖未敢望於魯與蜀豈遽出其下哉而紀籍獨缺昂誠不佞少遊於兹窮搜細勘得其顛末彚為四卷間以示豫豫蓋與君同遊於學者也嘉其志之勤且郡之文獻有足徴者故為序之首惟繼是而司教者有若安定者人才之出有若文正者吾且老矣尚當嗣書之長洲新學志序吳世良是録也世良暨蕭子文佐掇拾微言編次歲月既而越海虞謁我雲川舒公於江隂公署公不以鄙無似曲加筆削凡兩月成録世良再拜閲數四見中所藏載首沿革次形勝次禮儀次祠宇次職官次科貢次碑刻次文章典籍次田租廩餼刪繁以比事拾遺以補亡發凡例以舉其綱遵條緒以疏其目作而言曰維宗工郢斫道以經法法以紀事事以貫詞詞以宣意是故充類以廣義即聞以擴知則道𢎞而淵法嚴而正詞藻而則意融而該事詳而實是故會吉應竒天運章矣孕靈宅勝地勢别矣述往法來張弛見矣惇典秩禮軌物備矣以類人倫瑕瑜畢露勸戒寓矣以樹風聲顛末咸陳教養繫矣以示愛敬尊親弗失王道明矣世良聞之異同之議酌一存乎識興廢之機致健觀乎才盛衰之際挽數歸乎理長洲學宫風土偏薄垂百餘年福寧殿宇壯麗兼玉珂飛虹之勝理所當革與勢之易革其論倡自味翁顧元老更熾於玉峯翁崦西翁衡山貞山寓山諸縉紳之倡和馴至師弟子敦請圖遷要非朝夕第匪我公以理定數而不泥以才決機而不搖以識酌議而不瞀疇能密籌於期月震發於崇朝膚功碩德與天無疆可仰而不可及耶蓋天造地設必待人以成而禎祥兆於蓍龜輿情協於夢卜信乎文明之象天啓我公真與巡撫松泉夏公督學裁菴楊公篤勤造育虔需時利交懋精白肆郡伯王公南岷相可則經協志丕績斡旋酬酢飭率上下維力同守玉君桂東通府包君白崖牛君松澗邉君野石節推陳君梓梧與吳令張子道殫慮廣諏輸忠畫度奔走服職效勞夙夜維敏用是大小迅激厥費與役不取諸有衆時未三月峻功落成自東吳厯有改作未見神速若兹役者也夫士自見於世貴久不忘古稱不忘有三太上立德其次立功其次立言言也者所以宣功敷德紀久傳信與日月而並逺者也天志史之流也學未有志有志自兹學始人之言曰旌庸抑惰風采薄於匡劉組華博依史學宗於遷固立忱尚方倡率偶於蘇湖圖永逖浮遺規想於嵩麓斥凡通變更化法於仲舒集思拓猷成人祖於希文此固觀德漸教天理人心之公論自不容掩固有不假於言而自後凡奮庸兹校能擴聖賢易簡之學以成久大德業足光國家而不失其為忠孝人才利賔連茹視向者有彬彬之盛者皆我公功德所及是固合理與才識而一以貫之真古所謂不忘者也下吏與諸屬其何能贊一詞因我公撝謙出於天性尚不自有其功德也遂僣識諸首用託餘潤於不朽耳是為序長洲縣知縣吳世良頓首拜書志引蕭文佐夫志者識也識有所以垂逺俾可嘉也嘉靖歲辛丑長洲新遷學成我長洲令吳君世良暨文佐先後奉代巡雲川舒公督學裁菴楊公巡撫松泉夏公命纂修學志乃恪率諸生博采輿議視禹貢以發凡例本周禮以訂綱目而事以時僃言以道彰首繪圖定規制也次沿革命建置也次形勝辨方域也次文廟示祖法也次釋奠釋菜備禮儀也次祠宇坊牌官廨敕紀度也次器物示所重也次書籍示所教也次卧碑示所遵也次鄉飲鄉射示所習也次俸廩示所養也而人物科貢興矣文移載當時之行事文類集古今之典章題咏起於頌美附録兼乎衆善而志斯成焉可以垂不朽矣是作長洲新遷學志教諭萬安蕭文佐著越絶書序越絶復仇之書也子胥夫差以父之仇勾踐以身之仇而皆非其道焉夫君天也君有臣而君殺之尚可仇乎故子胥鞭平王之墓為不義闔閭之死夫差使人謂已曰而忘越王之殺而父乎則對曰不敢忘三年乃報越故夫椒之敗釋越而不誅為不孝會稽之棲苦心焦思嘗膽而食卒以滅吳不知越實得罪於吳而吳之赦已也故其却公孫雄之請為不仁春秋書子胥之事曰吳入郢狄吳而諱楚也於夫椒之戰則不書蓋不足乎書也於黃池之會書於越入吳狄越而咎吳也春秋之末復仇之事莫大於斯三者越絶實僃之有國有家者可以鑒觀焉跋丁黼隋經籍志越絶紀十六卷崇文總目則十五卷注司馬遷史記者屢引以為據豫紹熙壬子遊吳中得許氏本訛舛特甚嘉定壬申令餘杭又得陳正卿本乙亥官中都借本祕閣以三本互相參考擇其通者從之乃粗可讀然猶未也念前所見者皆謄寫失真不板行則其傳不廣傳不廣則各私其所藏莫克是正遂刻之夔門以俟來者庚辰七月望日東徐丁黼書又跋汪綱越絶書苦無善本近得於丁文伯以蜀中所刋者見示參考粗為可讀因刋置郡齋以補越中之缺云嘉定甲申八月旦日新安汪綱書又跋都穆是書宋嘉定庚辰嘗刻於夔門後四年知紹興府汪綱仲舉再以蜀本刻置郡齋厯世既逺皆不復見豫家藏舊録本頗為完善吉水劉君以名進士來知吳縣謂是書之古而吳中罕傳遂割俸刻之君名恆字以貞觀此可以知其政矣正德已巳三月之望南京兵部主事吳人都穆記吳越春秋序徐天祐吳越古稱東南僻逺之邦然當其盛強往往抗衡上國黃池之會夫差欲尊天子自去其僣號稱子以告令諸侯及越既有吳勾踐大盟四國以共輔王室要其志皆歸於尊周其知所天矣孔子作春秋雖小國猶録而書之而况以世言則禹稷之裔以地言則會稽具區其川其浸周職方氏列為九州之首皆足以望於天下故記可缺而不傳乎吳越春秋趙曄所著隋唐經籍志皆云十二卷今存者十卷殆非全書二志又云楊方撰吳越春秋削繁唐志作煩五卷皇甫遵撰吳越春秋傳十卷隋志缺傳字此二書今人罕見獨曄書行於世曄傳在儒林中觀其所作乃不類漢文按邯鄲李氏圖書十志目亦謂楊方嘗刋削曄所為書至皇甫遵遂合二家考正為之傳注又按史記注有徐廣所引吳越春秋語而索隱以為今無此語者他如文選注引李子見遺金事吳地記載闔閭時夷亭事及水經注嘗載越事數條類皆援據吳越春秋今曄本咸無其文亦無所謂傳注豈楊方所已刋削而皇甫所未考正者耶曄書最先出東都時去古未甚逺曄又山隂人故綜述視他書所紀二國事為詳取節焉可也其言上稽天時下測物變明微推逺燎若蓍蔡至於盛衰成敗之迹則彼已君臣反覆上下其論議種蠡諸大夫之謀迭用則伯子胥之諌一不聽則亡皆鑿鑿然可以勸戒萬世豈獨為是邦二千年故實哉曄書越舊嘗鋟梓歲久不復存汴梁劉侯來治越奬勵學校搜遺文修墜典乃輟義田廩羡財重刻於學不鄙謏聞屬以考訂且命序其石端夫越人宜知越之故則是舉也於所闕不為無補遂不得辭厥既判正疑訛過不自量復為之音注并考其與傳記同異者附見於下而互存之惜其間文義猶有滯礙不可訓知不敢盡用臆見更定又無皇甫本可證姑從其舊以俟後之君子考焉侯名克昌世大其字云郡人前進士徐天祐受之序重刋吳越春秋序錢福古者列國皆有史官以掌記時事若孔子因魯史以修春秋者是也吳越春秋乃作於東漢趙曄後世補亡之書耳大抵本國語史記而附以所傳聞者為之元徐天祐謂其去古未逺又越人宜知越之故視他書所記二國事為詳得之矣天祐之所考注亦精當第謂其不類漢文者其字句間或似小説家觀儒林傳稱其所著復有所謂詩細者蔡雍讀而歎息以為長於論衡今論衡故在也鄙俚怪誕者不少則東漢末亦自有此文氣矣謂其非全書則吳越顛末亦備矣隋唐經籍志多二卷意者西施之至吳范蠡之去越矣若附會於讖緯夢卜之説則固當時所尚而左氏傳春秋亦多述焉不可盡謂其無據也其大旨誇越之多賢以矜其故都而所編傳乃內吳而外越則又不可曉矣自科舉帖括之學興而古書散佚無留意者雖好古博雅之士厯代傳志所載亦或不能舉其顛末故有志於集古者皆在所取也去年秋監察御史寧鄉袁公大倫奉命來按吳體正而蠧剔威加而惠流乃本古觀風之法訪吳之故於吳邑侯任邱鄺廷瑞侯素稱稽古尚文厯舉郡乘所載者以對公問其所本始侯辭焉公乃手出是編授之侯讀之曰命之矣古者使於其國仕於其邦不能舉其地之故君子恥焉吾乃今知吳山川城郭之所名也吾乃今知封疆因革之所始也吾乃今知民情土俗之所由也吾不忍自私當重梓以行於吳人俾無忘本乃屬郡吏馮弋等録而刻之既成走書屬豫序蓋侯第進士時以豫為知己而袁公亦吾榜進士之傑也嗚呼孟軻氏稱入則無法家拂士出則無敵國外患者國恆亡然後知生於憂患而死於安樂也觀二國之興而僨僨而興斯昭昭矣驕畏之殊興亡所係忠讒之判禍福攸分可畏哉豫竊怪夫大言無術自暇以怠人者曰大數已定無庸人力又曰天子有道守在四夷此英雄駕馭之言非臣子思患預防之䇿也禹益警惕于三苖之師成康不忘乎戎兵之詰其見逺矣是書所載若胥之忠蠡之智種之謀包胥之論戰孫武之論兵越女之論劍陳音之論弩勾踐之畏天自苦臣吳之别辭伐吳之戒語五大夫之自效世亦胡可少哉所載孔子子貢事不可據要其謀亦在當時遊説之至髙者也相傳越絶書為子貢撰抑亦有所本云噫書稱軾怒蛙尚足以激士而况讀其書論其世能不少動於衷者其亦非夫也夫至於司職方掌外史地里所在必有所因而名附會以成其説者多不可辨驗然與其信乎今不若傳諸古與其徴諸逺不若考乎近是又今日鄺侯崇信此書之意而袁公博古之功不可誣也因附豫所欲言為序𢎞治十四年歲在辛酉夏五月朔旦賜進士及第翰林國史修撰儒林郎華亭錢福與謙序吳都文粹續集卷一
