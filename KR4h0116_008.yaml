body:
  text: 吳都文粹續集卷八明錢穀撰風俗令節公廨續吳趨蔡羽層䦨轉重叠畫橋何曲折物華冠中州冠帶服吳越逺髙州來風亦執言公業藹藹南州士煌煌鼎台列雄劍常宵鳴紅塵夜不滅紈袴白鼻騧通都萬軫接姑蘇髙臺荒伍胥精魂結但聼清且嘉亦聼悲且烈白紵辭陸龜䝉吳宫夜長宫漏短簾幕四垂燈熖暖西施自歌王自管雲紵翻翻鶴翎散促節牽繁舞腰懶舞腰懶王罷飲蓋覆西施鳯花錦身作匡牀臂作枕朝珮瑽瑽王宴寢醒來閣門報無事子胥死後言為諱近王之臣喻王意共笑越王窮惴惴夜夜抱氷寒不睡白紵舞紵本吳中物用以制衣故俳歌古辭甚多耒耜經陸龜䝉農之言也民之習通謂之犂冶金而為之者曰犂鑱曰犂壁斫木而為之者曰犂底曰壓鑱曰䇿額曰犂箭曰犂轅曰犂梢曰犂評曰犂建曰犂槃木金凡十有一事耕之土曰墢墢猶塊也起其墢者鑱也覆其墢者壁也草之生必布於墢不覆之則無以絶其本根故鑱引而居下壁偃而居上鑱表上利壁形圓其負鑱者曰底底初實於鑱中工謂之鱉肉底之次曰壓鑱背有二乳係於壓鑱之兩旁鑱之次曰䇿額言其可以扞其壁也皆貤然相戴自䇿額達於犂底縱而貫之曰箭前如程而樛者曰轅後如柄而喬者曰梢轅有越如箭可弛張焉轅之下又有如槽形亦如箭焉刻為級前高而後卑故曰箭以其淺深類可否故曰評評之上曲而衡者曰建建揵也所以柅其轅轅與評無是則二物躍而出箭不能止橫於轅之前末曰槃言可轉也左右係以樫乎軛也轅之後末曰梢中在手所以執耕者也轅車之胸梢取舟之尾止乎此也鑱長一尺四寸廣六寸壁廣長皆尺微橢底長四尺廣四寸評底過壓鑱二尺䇿減壓鑱四寸廣狹與底同箭髙三尺評尺有三寸槃增評尺七焉建惟稱轅修九尺梢得其半轅至梢中間掩四尺犂之終始丈有二耕而後有爬渠疏之義也散墢去芟者為爬而有礰礋焉有碌碡焉自爬至礰礋皆有齒碌碡觚稜而已咸以木為之堅而重者良江南之田器盡於是吳中田器纎悉皆有名號具於是迎春賦王寵欣陽和之來馭穆上皇於東方眷山河以占氣羌朝霽而蒼蒼淡萬里之風烟靄容與而含光何芳春之乍臨而膏沐之滂汪也於是皇風載夷長吏崇規矧三吳之靈境表都會於南陲山川環帶風景雍熙百花洲上春雲麗烏鵲橋邊春日遲春雲春日共交輝無數樓臺向景披紛九衢之紆直貫會城而交馳抗飛梁於螭首跨緑水之逶迤若個陌頭無擁面若個游人不解眉共傳春色天涯至爭道春光今日宜龍銜寶勝飛雙隊鳳吐流蘇拂四垂粲綵花之厯亂紛羅葉之葳蕤窮剪綴於萬態絢丹碧之陸離玉叉弄影娉婷女紈袴棲香輕薄兒髙調遏雲而羣奏繁絃應手以逞竒莫不目眩神竦耳觸心悲則有王孫接騎公子交嬉千金換馬尾搖絲八寶裝鞍光照地飛鞭誤觸綺羅車敲鐙誰知臺府吏慕鴛鴦之野偶願鸞皇而接翅弄袖粧妍傾身佯醉冀目成之我與又恍惚而靡遂雲開朱閣對芙蓉日射彤簾藏翡翠芙蓉翡翠一時新總是江東絶世人動館娃之春思慕西子之芳塵蟬鬢新傳宫掖樣雲光恰似洛波神每嬌羞而掩態或搖曳以呈身翩翩飛燕能輕舉裊裊遊神不可親默含情而未吐恨菀思以何伸祇道春歸春意濃寧知春到春心亂嘆佳期之寂寞悲年華之屢換朝朝璚圃愛花開夜夜蘭堂看月滿花月娟娟能幾時榮華冉冉嗟將半信春思之飄揚亦春愁之瀰漫年年風景倍傷春嵗嵗凋零無故伴於是僕本賤人沉淪江海見沙際之春歸驚天南之嵗改紫禁春光不可攀朱顔春色那能待悵日月之易遒撫功名之安在齊雲樓下幾逢春祇是當年原憲貧差池春羽慚黃鳥憔悴春衣懸紫鶉吁嗟乎弱桞絲絲拂建章宫花朵朵艷長楊人生不及春花桞長得天池繞鳳皇迎春日啖春餅春糕競看土牛集於卧龍街老稚走空里上元紀吳下節物俳諧體三十二韻范成大斗野豐年屢吳臺樂事並酒壚先叠鼓歲後即旗亭先擊鼓不已以迎節意燈市早投瓊臘月即有燈市竒珍者數人醵買之相與呼盧彩勝者得燈價喜膏油賤祥占雨雪晴篔簹仙子洞坊巷以連枝竹縛成洞門多處數十重菡萏化人城蓮花燈最多檣炬疑龍見舟人接竹桅檣之表置一燈望之如星橋星訝鵲成橋燈小家厖獨踞犬燈髙閈鹿雙撐鹿燈屛展輝雲母琉璃屛風簾垂晃水精琉璃簾萬窗花眼密萬眼燈以碎羅紅白相間砌成工夫妙天下多至萬眼千隙玉虹明琉璃毬燈每一隙映成一花亦妙天下薝蔔丹房桂梔子燈蒲萄緣蔓縈蒲萄燈方縑翻史册生絹糊方燈畫史册故事圗人喜看圓魄綴門衡月燈擲燭騰空穩小毬燈時擲空中推毬滚地輕大滚燈映光魚隱見琉璃壺瓶貯水養魚以燈映之轉影騎縱橫馬騎燈輕薄行歌遇顛狂社舞呈民間鼓樂謂之社火不可悉記大抵以滑稽取笑村田蓑笠野村田樂街市管絃清街市細樂里巷分題句每里門作長燈題好句其上官曹别扁名官府名額多以絹或琉璃照映旱船遙似泛夾道陸行為競渡之樂謂之划旱船水儡近如生水戲照以燈鉗赭裝牢户獄燈嘲嗤繪樂棚山棚多畫一時可嘲誚之人堵觀瑶席隘喝道綺羅爭禁鑰通三鼓歸鞭任五更蠶桑春繭勸春繭自臘月即入食次所以為蠶事之兆花蝶夜蛾迎大白鵝花無貴賤悉戴之亦以迎春物也鳬子描丹筆畫紅鴨子相餽遺鵝毛剪雪英剪鵝毛為雪花與夜蛾並戴寶糖珍粔籹鎚指吳中謂之寶糖䊚特為脆美烏膩美飴餳烏膩糖即白餳俗言能去烏膩撚粉團欒意團子熬稃腷膊聲炒糯穀以卜俗名孛婁北人號糯米花筳篿巫志怪香火婢輸誠俗謂正月百草靈故帚葦針箕之屬皆卜焉多婢子之輩為之帚卜拖裙驗弊帚繫裙以卜名掃帚姑箕詩落筆驚即古紫姑今謂之大仙俗名筲箕仙微如針屬尾以針姑卜伺其尾相屬為兆名針姑賤及葦分莖葦莖分合為卜名葦姑末俗難訶止佳辰且放行此時紛僕馬有客靜柴荆幸甚歸長鋏居然照短檠生涯惟病骨節物尚鄉情捃托成俳體咨詢逮里氓誰修吳地志聊以助譏評吳燈兩品最高鏤氷影裏百千光剪綵毬中一萬窗不可齊人誇管晏吳中風景竟難雙臘月村田樂府十首並序豫歸石湖往來田家得歲暮十事採其語各賦一詩以識土風號村田樂府其一冬舂行臘月舂米為一歲計多聚杵臼臘中畢事藏之土瓦倉中經年不壞謂之冬舂米其二燈市行風俗尤競上元一月前巳賣燈謂之燈市價貴者數人聚博勝則得之喧盛不減燈市其三祭竈詞臘月二十四夜祀竈其說謂竈神翌日朝天白一歲事故前期禱之其四口數粥行二十五日煮赤豆作糜暮夜合家同饗云能辟瘟氣雖逺出未歸者亦留貯口分至襁褓小兒及僮僕皆預故名口數粥豆粥本正月望日祭門故事流傳為此其五爆竹行此他郡所同而吳中特甚惡鬼蓋畏此聲古以歲朝而吳以二十五夜其六燒火盆行爆竹之夕人家各又於門首燃薪滿盆無貧賤皆爾謂之相暖熱其七照田蠶詞與燒火盆同日村落則以秃帚若麻䕸竹枝輩燃火炬縛長竿之杪以照田爛然遍野以祈絲穀其八分歲詞除夜祭其先竣事長幼聚飲祝頌而散謂之分歲其九賣癡呆詞分歲罷小兒繞街呼呌云賣汝癡賣汝呆世傳吳人多呆故兒輩諱之欲賈其餘益可笑其十打灰堆詞除夜將曉雞且鳴婢獲持杖擊糞壤致詞以祈利市謂打灰堆此本彭蠡湖洪君廟中如願故事惟吳下至今不廢云冬舂行臘中儲蓄百事利第一先舂年計米羣呼步碓滿門庭連杵成風雷動地篩勻箕健無粞糠百斛只費三日忙齊頭圎潔箭子長隔籬輝日雪生光土倉瓦龕分蓋藏不蠧不腐常新香去年薄收飯不足今年頓頓炊白玉春耕有種夏有糧接到明年秋刈熟鄰叟來觀還嘆嗟貧人一飯不可賖官租私債紛如麻有米冬舂能幾家燈市行吳臺今古繁華地偏愛元宵燈影戲春前臘後天好晴已向街頭作燈市叠玉千絲似鬼工剪羅萬眼人力窮兩品爭光最先出不待三五迎春風兒童種麥荷鋤倦偷閒也向城中看酒壚博塞雜歌呼夜夜長如正月半灾傷不及十之三歲寒民氣如春酣農家亦幸豐年少始覺城中燈市好祭竈詞古傳臘月二十四竈君朝天欲言事雲車風馬小留連家有杯盤豐腆祀猪頭爛熟雙魚鮮豆砂甘鬆粉餅圓男兒酌獻女兒避酹酒燒錢竈君喜婢子爭鬬君莫聞猫狗觸穢君莫嗔送君醉飽登天門杓長杓短勿復云乞取利市歸來分口數粥行家家臘月二十五淅米如珠和豆煮大杓轑鐺分口數疫鬼聞香走無處鎪姜屑桂澆蔗糖滑甘無比勝黃粱全家團圓罷晚飯在逺行人亦留分褓中孩子强教嘗餘波遍沾獲與臧新元叶氣調玉燭天行已過來萬福物無疵癘年穀熟長向臘殘分豆粥爆竹行嵗朝爆竹傳自昔吳儂正用前五日食殘豆粥掃罷塵截筒五尺煨以薪節間汗流火力透健僕取將仍疾走肥兒却立避其鋒當街擊地雷霆吼一聲兩聲百鬼驚三聲四聲鬼巢傾十聲百聲神道寧八方上下皆和平却拾焦頭叠牀底猶有餘威可驅厲屛除藥裹添酒杯盡日嬉游夜濃睡燒火盆行春前五日初更後排門燃火如晴晝大家薪乾勝豆䕸小家帶葉燒生柴青烟滿城天半白棲鳥驚飛啼格磔兒孫圍坐雞犬忙鄰曲歡笑遙相望黃宫氣應才兩月嵗隂猶驕風栗烈將迎陽艷作好春政要火盆生暖熱照田蠶行鄉村臘月二十五長竿燃炬照南畝近似雲開森列星逺如風起飄流螢今春雨雹繭絲少秋日雷鳴稻堆小儂家今夜火最明的知新嵗田蠶好夜䦨風熖西復東此占最吉餘難同不惟桑賤穀芃芃仍前苧麻無節菜無蟲分嵗詞質明奉祠今古同吳儂用昏蓋土風禮成席徹夜未艾飲福之餘即分嵗地爐火暖蒼术香飣盤餌果如蜂房就中脆餳専節物四座齒頰鏘氷霜小兒但喜新年至頭角長成添意氣老翁把杯心茫然增年翻是減吾年荆叉勸酒仍祝願願翁尊前且强健君看今嵗舊交親大有人無此杯分老翁飲罷笑撚鬚明朝重來醉屠蘇賣癡呆詞除夕更䦨人不睡厭禳滯鈍迎新嵗小兒呼呌走長街云有癡呆召人買二物於人誰獨無就中吳儂仍有餘巷南巷北賣不得相逢大笑相揶揄櫟翁塊坐重簷下獨要買添令問價兒云翁買不須錢奉賒癡呆千百年打灰堆詞除夜將闌曉星爛糞掃堆頭打如願杖敲灰起飛撲籬不嫌灰涴新節衣老媪當前再三祝只要我家常富足輕舟作商重船歸大牸引犢雞哺兒野繭可繅麥兩岐短衲換著長衫衣當年婢子挽不住有耳猶能聞我語但我如願不汝呼一任汝歸彭蠡湖祀竈解陸龜䝉竈之壞者請新之既成又請擇吉日以祀之曰竈在祀典聞之舊矣祭法曰王為羣姓立七社其一曰竈達於庶人庶士立一祀或立户或立竈飲食之事先自竈火化以來生民賴之祀之可也說者曰其神居人間伺察小過作譴告者又曰竈鬼以時録人功過上白於天當祀之以祈福祥此僅出漢武帝時方士之言耳行之惑也茍行君子之道養老而慈幼寒同而飽均喪有哀祭有敬不忘禮以約已不忘樂以和心室闈不欺屋漏不愧雖嵗不一祀竈其誣我哉茍行小人之道盡反君子之行父子兄弟人執一㸑以自糊口専利以飾詐崇奸而樹非雖一嵗百祀竈其福我乎天至髙竈至下帝至尊嚴鬼至幽仄果能欺而告之是不忠也聽而受之是不明也下不忠上不明又果以為天帝乎除夜雜詠楊循吉嵗除當此夜灑掃事匆匆井上皆封草門前盡畫弓祠堂神影挂客座佛筵崇撒豆禱兒疾存炊忌釡空辟瘟燒木暖承俗燎柴紅啓篋新衣振除塵舊室攻買餳迎竈帝酌水祀床公春帖題鄉究年書誦學童插籩皆柏葉戲火有梨筒殘厯收年盡深缸洗臘終市闤驕物貴鄰里餽糕通未識他州節於斯異與同重建瞻儀堂記陳振莆陽陳侯之治吳也振受㕓屬縣一再詣黃堂上謁侯與之為禮且辱臨其客舍從容坐語而命之曰郡稍闢瞻儀堂既成而未有以識吾將以簡授子何如振竦然曰合郡名勝士如林不可蓋走非其人也敢辭侯不可振又曰走不佞未嘗學為古文金石非古文懼不能以傳信敢固辭侯不可於是蹴踖承命退求諸掌故訂其事加祓飾秉翰而書之初瞻儀之建實紹興嵗辛巳鄱陽洪公即郡治西北結屋三間萃前後郡太守像圖之宫堵揭而名焉參政文穆范公秩時財八品家食於吳洪公特命重為之記後五十有二年侯自浙西部刺史擢領府事暇日登堂指計洪公以上百有二人距侯又三分其一蓋以八之數覽觀左右念接武殊未艾也而位置鱗次餘地可續録越明年度材庀工翼以兩廡中締新堂附益之列肖貌來者有容其外剡木為櫺以謹呵護髹棐几以嚴香火奉祠二月甲戌經始九月戊申訖工蓋凡瞻儀顛末之緒暨圖像之改作如此竊嘗妄論昔之君子建牙授任用千里之國盛心美意有所設張不皆保其往也嵗遷年運將遂湮微當是時一君子者振而起之譬諸物剝遇陽之復而後造化生生而不窮顧以智自矜者恥襲人後大抵有不屑為至材力弗贍急符蜂午漏刻思救過則人雖勉之為亦奚暇以為哉今侯殿大邦以勤濟敏日無留事材與力固踰人逺甚而能不矜其智廣視斯堂嗣鄱陽之功俾勿墜精識𢎞度豈直尋常土木甃庭塗勤朴斫鮮漫漶而已也按太平興國初吳越錢忠懿王奉其版籍上諸職方氏今牧守題名昉自至道陳公公字善則三子兩登輔佐其後更入政而後文正范公又入政康靖越公繼之至建中靖國而御史豐公實來文正自邠徙吳吳蓋公鄉郡公道德勛烈載在國史為巨宋一代宗臣康靖服事三朝樂易寬博先正以謂合於易之大人詩書之老成而心休休焉者御史抗論連斥巨奸辨元祐垂簾誣謗風烈侃侃迄今凜有生氣雖剖符懷綬為時名卿者未易殫舉然緬昔人而儀其大節宜無尚於三公者侯文懿少師公之子篤學有文拜大理丞寓直中祕由是而躋升顯美見之行事決不泯沒若夫投筆而歎名節阿附而比四凶談禮義而擯忠賢性非不善也而去之為不善非利欲有以汨其中乎侯一寓目焉丹青繪事莫能掩也故因侯命掇拾前記之遺以復於侯而諗其書之可否侯曰可哉遂刋諸石嘉定六年癸酉閏月承議郎陳振記並書瞻儀堂見前集嘉定六年陳芾並撤堂後逍遙閣廣而新之寶祐五年趙與重建端平三年張嗣古奉安韋應物王仲舒白居易劉禹錫范仲淹五賢像于內齊雲樓記周南老齊雲樓即飛雲樓也在子城州治後今城樓三面為譙樓西為觀風又名望市齊雲直子城北豈摘古人西北髙樓之詩以名之歟先是韋應物詩稱郡閣白樂天始改號齊雲其後夢得述郡齊碧池華閣之勝是知今之池自唐則固其所矣當元和間樂天以詩人領郡登臨宴咏落紙爭傳又知當時民俗之淳簡而兹樓為中吳之傑觀矣世多傳郡廨即吳故墟綴文者襲用春申黃堂事績志因之然吳越春秋稱子城十里唐陸廣微吳記乃八里不同若是貞觀間歐陽率更載虞氏記闔閭小城有樓至秦時宫焚而樓存不知虞氏其地何所指耶按樂天賦東城桂謂古都在蘇東地己廢而為樵刈之場是樂天已不詳為吳之故宫矣蓋世事綿邈文獻不足雖則陵谷之變遷不可得而識者多矣獨宫室也乎哉今故城舊址其傳疑而齊雲得名近則因樂天之詩而有證愚然後知斯文之可以行逺而不可己也夫人處乎郛郭之中而日接乎囂埃之隘則雖游化人之城而不能以自知今登斯樓而俯眺則帶山縈澤所謂十萬家之夥朱甍碧瓦菀乎參差若鱗次而鋪陳之者亦足以見吳郡之大與夫中興百年涵養休息之澤矣樓再建又幾年嘉定六年太守陳公大飭材命扶傾易蠧以還輪桷之舊夫不待其圯且廢而葺之役不煩而利逺是孟子所謂事半而功倍也公之智於是達乎為政矣可不書乎凡為屋中五楹兩旁三楹翼以修廊皆繕而新之其髙廣則仍其舊故不記公名芾字明可四明人今為度支郎其材通博强敏為郡一年民歌舞之五月州民周南老記重修齊雲樓記大德初元嵗在丁酉太守某郡某人來治吳之二年顧兹樓頽圮弗治乃命修之以工計自去嵗十月迄於夏六月凡二百餘日以丹堊甃石計費為二萬餘以鈔計凡五百餘侯既出其帑藏為倡郡之好事者咸助焉鳥翼翬飛棟宇丹碧建椽甃砌角立鱗比視前觀有光落成侯乃諗於衆曰兹樓之設肇自有唐劉禹錫韋應物出守元和間號為風流觴咏其間以其品題也故兹樓之風物播於天下瞭然與嶽陽落星同美然以景言之近則槐市栁橋車輪馬跡市聲滚滚終日不息逺則西山諸祠層巒深壑白雲孤飛清晝如畫而其為勝槩意者非有劉禹錫白樂天之品題亦不泯也今之牧守簿書期會日擾擾不給其能如侯興廢補弊以遇江山勝概雍容談笑放浪於風塵之外能幾人哉不但兹樓之可記也然因兹樓之勝並記其美以傳後之人則不可辭衆曰然遂以為之記齊雲樓在郡治後子城上相傳即古月華樓也吳地記云唐曹恭王所建白公有詩亦云改號齊雲樓蓋取西北有髙樓上與浮雲齊之義擬此則自樂天始也故其詩云欲辭南國去再上北城觀治平中裴煜建為飛雲閣政和五年重作齊雲樓成紹興十四年王㬇重建兩挾循城為屋數間有二小樓翼之輪奐雄峙甲於兩浙後陳芾沈皞史宅之重修大德中重修見前文而失郡守並撰文名姓姑俟考焉春雨堂記應㒡淳祐二年春平江府治作新堂於池上秋工役告備顯謨閣直學士通奏大夫知軍府事兼浙西兩淮發運使史宅之拜疏聞於上曰臣䝉恩再領蘇郡賴天子仁聖格於上下物不疵癘而年穀熟獲與民相安郡治北池舊有亭曰池光郡太守澡心雪神思政慮善之地陋且圯焉深惟一日必葺之義捐餐錢節冗費更建為堂堂成顧名弗稱竊伏惟念昔者幸備推擇守藩於兹粗知究心牧養叨被聖奬遣使賜御書家有膏雨户有陽春八大字昭回下飾吳人以為榮臣不佞敢敬奉春雨二字冠斯堂以揚寵光以撢德意以丕迪聖訓惟陛下裁幸上覽疏可其奏錫以宸奎使得揭扁於戲祉哉謹按吳郡志郡治後圃有北池韋白之所賦咏一名後池池光亭在其北紹興十七年守鄭滋重建然則尚矣三十一年洪公遵葺之距重建未久也而多厯年至今始撤而新之若有待池光舊名莫考所從始淳熙中涑水司馬家孫曾至則以嫌故借木蘭以名池之東木蘭固在其何可復出厥今度宏規成廣厦崇聖翰標嘉名春雨一堂遂為吳中巨麗之觀益非偶然者其庀役也因舊址厚培而勢若負山倚屛然堂髙三十二尺橫從視之淵如曠如四面皆架軒三間展如昭如南俯大池浮水觀以受荷薰北與齊雲相值如闢穹如膴如上棟下宇五間起乎中央數嬴五十尺焉人莫不曰偉哉堂也堂名我不敢私雲章天筆賁如濡如豈直以夸榮耀聳觀瞻而已自公退食言登斯堂因名而思義愛民澤物之念油然以生充而大之仁不可勝用矣仁之於四端猶四德之元四時之春偏言之主一事専言之包四者故春者春之生夏者春之長秋者春之成冬者春之藏何莫非春也乾坤之有六子動散潤烜止說互為之用雲行雨施乃獨見於乾而所為元者非春乎君天也乾也四時之行六子之運則臣也天朝選建嶽牧臣子對揚休命均此臣也公既以自任又以規將來堂之名㫖哉公天資髙淵綜覽廣博天子以為烈考是以治吳有美政選表而入且踐台斗矣屬時以實塞為急吳中薦饑遂命公奉使典州公再至能為人作豐年以其飽邊兵而活都民天子嘉之兹堂所謂見吾善者機也公歸參化鈞穆天縡家有膏雨户有陽春又將為天下誦之冬十月朝奉郎應㒡記春雨堂在後池北初池光亭圯淳祐二年重建堂成史宅之乃以理宗書額揭之以侈君賜通判西㕔記王遂平江通判西㕔在子城西南最髙處宜隆而汚宜豁而拘宜整齊嚴肅而雜處閭閻甚不稱夫通都輔郡之體治中别駕之居翁君過遂言曰余佐郡一年矣而假室廬於人其何以尊君命而寧親心且堂扁題以淳熙十六年東偏則次年施君邁之所營嵗月非不深而事力微矣會將斤而丈之舍舊而圖其新能無懼余力之不任乎遂矍然而起曰君之及此言吾郡之福也乃與提舉趙公崇暉總領吳公淵桂公如琥合六縣之長鳩材以助之而君以其力僝功其間一日往視之則堂崇成矣未幾又過之則㕔事立矣門屋閎矣闢其東軒翼以後序髙燥逺過其舊而營築斂退於初面藝朝揖莫不就正毫釐尋丈秩秩不差於是汚者隆拘者豁而整齊嚴肅隱然題輿泥軾之氣象偉哉其斯舉也謁記於遂因為之言曰吳古之建國也自太伯季札以禮遜先天下至於晉唐千有餘年之間騷人墨客之所登臨忠臣義士之所感慨不為不多矣而力未有以贍才又未足以給今居於此建官府而臨庶民坐堂皇而理百事於以出入王命經理兵事不亦偉歟入侍潘輿怡怡衎衎有雋不疑范滂所不能及者豈非天下之至樂乎抑吏退賓閒舉酒屬客拍手而歌吳趨以訪闔閭之舊游尋龜䝉之遺跡其樂有人不與知而已獨知之者又非言語之所能及也乃為之書君名逢龍字際可甬東人號龜翁登嘉定丁丑第詩思清越出大厯貞元畦徑之表而長於吏才費之大小役之逺近不書余之為此者非但喜兹屋之成又以幸斯文之得所托也嘉熙改元七月丙辰朝奉大夫煥章閣待制知平江軍府事兼管內勸農使節制許浦水軍賜紫金魚袋王遂記通判西廰在子城西南隅城隍廟後淳熙十六年施邁始立石題名嘉熙初翁逢龍重修逢龍又有足清堂種書堂詩不詳所在景定五年趙與鑑撰續題名記淳祐三年謝堂作屛星堂吳邃撰記城上有小樓見西山名湧翠平江府僉判廰勤繼堂記石如塤皇帝龍飛改元春官收郡國賢能永嘉木公待問以大魁授僉書平江軍節度判官廰公事以乾道元年九月二十有四日庚午至皇帝在位四祀矣眷治道之方興想中原之未復以為未有不先內修而遽能外振者於是絀懦柔斥媕婀諏民瘼革政疵本農桑懷歸附繕戎械肅邊徼剗文務實崇厚黜浮無逺近小大莫不改慮易圖趨上意之攸向木公拊瑑而歎曰求治在朝應治在州一州不治也實虧天下治太守總州治之略而已别駕二州治之略而已六曹有參邑有令丞簿尉復各自治其職而已匪守匪倅而守倅以之簡匪曹匪邑而曹邑以之諧此僉書之所以不可廢虧其間也歟是州今股肱郡吾其敢易廰事之西有堂可以燕可以息可以思可以為則名之曰勤繼蓋取古聖賢勤則有繼之義也求法書於郡人括蒼太守范成大而題之且謂仲尼沒吾道中否無為之說滿天下而勤為鄙天下不見唐虞三代之治者知有無為而不知有勤也舜以無為贊舜之無為者聞其有臣五人而後天下治不聞其無臣而天下自治也吾聞其恭已正南面而已矣不聞其已之不恭已而南面之不正也五臣各得其職而又已之必恭南面之必正舜有一日之不勤哉舜不如是不能無為而治也杜元凱曰勤則功繼之人臣之功莫大於禹稷禹乘四載隨山刋木禹無為乎黍稷重穋稙稚菽麥稷無為乎禹稷不能以無為事舜後之人君臣俱欲無為非奸則諛夫何修名之能立也木公胸中之藴將至萬國升平豈適為州設耶寓名斯堂則不小乎州而弗為也不小乎州者且何大於天下粵明年五月召去如塤以散才承乏偶屬後塵時太守則惟吳興沈公介精白惠綏不可以弗勤事也外臺在郡使者實今太守直閣會稽姚公憲風規振肅尤不敢弗勤今憲使者司諫丹邱陳公良翰器閎道直凡州縣屬惟恐勤之弗至二年之內出親吏師之儀退味繼勤之㫖雞鳴而興功非所幾也在易蹇之六二者敢不以之顧將及瓜矣而大魁同郡蕭公國梁實來是固嘗茂明勤而舜俞之者也居斯堂也事斯上官也是殆相須以行乎禹稷之道者也是殆相須以禮樂斯民者也且何州之弗治天下之州皆有是吾無外輕之憂矣補偏救弊區區中興之䇿奚為哉維四年龍游困敦辰在析木之津二十有二日庚戌吉長樂石如塤記虎林之農林東書僉判廰在儀門西舊名都廰淳熙十三年重建廰西有勤繼堂重修觀察推官廰記李卞平江觀察推官廰故在子城之南隅去郡庭才數十步早暮入幕為良便淳熙間有去官者代未即至庾臺圖假以處幕屬久而不歸遂以麗譙南廢缺酒庫為治所即今廨也有屋數間介於民居敗椽破壁支柱交午每大風雨則岌岌然若將壓焉纍政相仍弗果葺吕君蒞事之三月慨然曰郡從事為今從八品官雖卑郡政無大小皆與聞焉異時由此登顯途者項背相望而所居庳陋若此非所以稱幕府待賓僚之意縱未能撤而新之獨不可為之以漸乎乃相地之宜即廰事之左闢屋數椽窗户疏達四座顯敞繚以修竹為燕坐之所然後為壁為廡下至庖圊皆以次畢具經始於癸亥之末夏訖工於首冬凡為屋十有四間基堅材良不侈不陋視前日子城故廨規橅逺甚君將代去求文以記嵗月卞竊聞昔之叔孫婼羈於晉其所館雖一日必葺去如始至況在官乎今之仕者多安於茍且重於改為視官舍如傳舍玩愒因循既幸其滿始飭胥徒旋加丹堊以遺來者棟宇之摧腐庭户之湫隘謾不加省視婼有愧矣吕君來未暖席方僕僕奔走應簿書期會剔拔蠧弊以贊郡綱乃能謀其室於從容談笑間井井而辦客至則杯酒相屬吏退則書史自娛受職三載而遺後人以安嗚呼可以觀政矣故樂為之書吕公名伯誾字正之申公五世孫也開禧丙寅夏五月壬辰朝奉大夫新權發遣安慶軍府兼管內勸農營田屯田事借紫李卞記右記官無崇卑居之者必有以記其到罷之嵗月其來尚矣平江為藩輔觀察推官為幕屬中興今逾百年獨無紀載不其缺歟觀察推官廰祥符圖經云在州衙門內西後遷子城南紹興間于平橋南舊酒庫改為之嘉定三年吕伯誾重修紹定二年吕祖忞撰題名記府院簡孚堂記陳之茂平江録事參軍吳明可作堂於廰事之西友人陳之茂一日過之愛其闃然幽深與公齊不類明可徐謂曰僕猥以不肖典兹獄市嘗以人命至重大懼不明以抵纍於非辜究懷怵惕夙夜靡敢自安兹堂之作非晏樂是圖蓋將為訊鞫論囚之便焉客有取周書五辭簡孚之說以名者願得子一言之茂戄然起而前曰嘻明可不茍於其官如此哉夫君子之任無大小舉得以忠恕仁厚施諸人而功甚速者莫如獄然巽懦不事諉可否於吏吏因緣邀賕執爰書捃托微細考一連十玩嵗月不報否則觀勢利所鄉肆請託之私為豪猾囊槖而羸弱寒寠卒以纎芥文致不減幸而强敏可喜往往舞智苛察鍥薄慘刻務以威猛立名烏乎獄君子所盡心也使持法者一有是則刑失其平而銜恨䝉寃無所赴訴寧忍之乎是以哀矜欽慎巨細坐折皆得其實等惟寬平之歸則食息俯仰庶幾無愧屋漏明可學通世務介而有守居官以來明允篤實之譽隱然在人則斯堂之義固已從容躬蹈僕尚奚云明可行為中都删修之官陪相國餘論筆則筆削則削一字輕重利害相萬願無忘今日用心明可宜以此言請刋於石並以告夫來者明可名芾丹邱人紹興十一年七月旦梁溪陳之茂記簡孚堂在府院㕔事西紹興十一年録事參軍吳芾作院在子城內東南平江府司户㕔壁記鄭霖户曹之官㕔壁記尚矣吳君天澤受事於兹既兩年㑹辟置醴幕趣代不容緩辭余以續記為請余竊觀今之仕者其迹如寄於其職分所當為者往往漫不之察既去若素不曾到又何暇此為哉豫與吳君昆弟交久矣素知其家學有守相繼登上科又能發明外氏龍川文藝公之學同志皆推之豫來假守得君為寮助我多矣君雖初筮其諳究官業如素然而職掌版籍之外郡日受户婚之訟皆賴以決犂然當乎人心余恨挽之不可得情之依依尤甚也觀君之所存未易涯涘然猶拳拳於此記者蓋不以獨善為喜又將以詒來者壁故有記他不復贅言姑道吳君之志云淳祐十年七月朔郡守天台鄭霖記司户廰在府院西慶元二年重建廰西小圃有玩花池采香徑秀芳亭飛雲閣廰東有小山亭曰小蓬瀛池北有長嘯堂皆建人袁申儒所葺治并撰題名記濟民藥局記吳淵淵猶及見先生長者談乾淳間事其言曰聖朝體列聖好生之德每以民命為重一念懇惻無所不用其至乃至濟藥療病亦加宸慮一日忽遣中使宣索太平局龍虎丹既進御命捐其價十之九蓋聖意謂親嘗則主者不敢茍直廉則貧者易以得烏乎神農氏日試百藥周官醫師掌醫之政令自十全以至十失必次第而躬行誅賞實此意也近世天下郡國臺府開設廣惠局以便民服餌皆所以廣此意也姑蘇城大人衆余領郡適有春疫亟幸郡醫之良分比閭而治某人某坊某人某里家至户到悉給以藥寠而無力者則豫錢粟疾不可為者復與周身之具由二月至七月其得不夭者一千七百四十九人因念倉卒取藥於市既非其真非惟不真且不可以繼乃創濟民一局為屋三十有五楹炮澤之所修和之地監臨之司庫廩庖湢爐磑鼎臼翼然井然罔不畢具總夫匠木石之費錢以緡計者七千八百四十五米以石計者三百二十三既落成復以二萬緡實之為市材費凡川廣水陸之産金石草木之品無珍不致無逺不取冀有益於人故真其劑弗求贏於官故輕其值料置豐盈薌味芳烈較市衒玉賈石者相去不啻萬萬列肆闤闠過者歡喜他日設遇流行之灾四時之沴則分醫以療捐藥以濟其為吳門之利蓋未有已也恭惟聖天子仁同阜陵視四海之癢痾疾痛如在一體淵幸叨選擇出守是邦求牧與芻不敢不勉此局之設蓋亦所以推廣德意萬分之一云紹定四年八月奉議郎直煥章閣知平江軍府事就除浙西提刑吳淵記濟民藥局在魚行橋東紹定四年吳淵創於廣惠坊之左自為記開慶元年馬楊祖重于子城內路分廰之故址建之繼又遷於其北重建居養安濟院記盧瑢三代明君賢牧相與立治大抵以優老為先漢興詔賜束帛牛酒耄年月給粟嵗加絮恩意詳矣然于鰥寡㷀獨未聞奠其居而粒之終身者也國初民夀踰七十咸獲優詔蓋仁發之政列聖相授迄於四方慕義存恤由是居養安濟院興焉建炎厄兵火遺踪故址所向無存父母雖淪亡恩洽膚髓粵百世而德不泯中吳囊括千里拱日幾連江澤土膏而民夥自中興以來仁風四洽列户者今草餘萬守臣率用當世偉人淳熙乙未秋八月直徽猷閣陳公峴自東浙轉運判官秉麾來鎮檢抳奸欺撫摩疲弱吏畏敏强民懷靖寬境野熙盈無夜吠之警謹條節尚風化索民之隱得居養安濟事即象院基之舊而勇為之經始於二月己丑落成於九月甲午官為備費民不知役為屋六十有五為楹三百有十為室三十長廊還礎對關列序集癃老之無子妻婦人無夫親者分處之幼失怙恃皆得舍焉籍官民疇千六百六十畝募民以耕嵗得米七百石有竒旁著三廩浚二井庖舍蔬閭食用寓具舉無一遺又立僧坊主其供病給醫藥死給槥櫝入叢塜以葬民胥歎仰道路歌祝公賢明篤厚有志天下士至於減苗斛之耗蠲賦賞之負嚴屠牛禁網捕葺漏澤之費增土以葬骨其所施類如此昔黃霸治潁川為政尤異至使郵亭鄉官皆畜雞豚贍助鰥寡貧窮棺其無葬與其無祭竟以治行入為丞相公之政恤孤賑乏養生送死視潁川尤有異矣邦人咸曰是不可不書瑢一㕓梓里得事之始末最詳敢書其實後此者無私壅惠利而茍安之則公之心也吳邑大夫曰黃君直中長洲大夫曰李君機繼之以吕君存中俱佐事而協成者淳熙三年十月癸酉宣教郎充兩浙西路提舉常平茶鹽司幹辦公事浚儀盧瑢記並書居養安濟院在社稷壇東建炎以來廢淳熙三年陳峴重建安養院記陳耆卿安養院在州鈐廰後舊曰醫院寶慶中改今名安養院尚書郎林公之使浙右也決而和威而愛罪自死以下周慮熟讞不得其情不止焉既而曰死於刑吾不忍而有死於病者若之何忍之於是安養院成郡府院四獄之以病告者而治其醫之政令大槩屋百礎田三頃飲食卧藉熏燎之物靡不具護視典領臨督之人靡不力貯藏頒給激犒之法靡不臧簡良材萃名方以授大小醫而精煉治之囚氣略不舒識之厯厯至囚亦至既至醫拯療如法洎愈囚與厯歸爭喜曰吾病憂死爾遇公今得不死果死可無憾況生乎且吾昔之病未若今之病之愈之速也果死信無憾也或曰囚有罪者也果死死有罪者也醫有罪使不死豈過歟豫曰不然均是民也均是耳目肢體也其罪至死者法也欲生之者吾心也縱不可生當死於法而不當死於病也或罪不至死而亦死於病官實使之也夫不能生其所可死而至於死其所可生是假獄以穽也如公之心惟見其可生不見可死視其有罪也猶其有疾也則視其有疾而欲生之尤甚於有罪而欲生之之亟也洪惟皇上御極以來天覆春育尤拳拳岸獄事乃四月制下飭監司郡守以審充縷縷三百言公未讀訓詞蚤知德意院之成今已一嵗成而不墜可百世蓋好生之君與宅生之刺史相吻合如此今而後囚固無憾公亦無憾也哉公名介紹熙名御史之子御史按行東浙有異績先後輝映其克清謹庶獄有自來云寶慶二年八月天台陳耆卿記安養院在州鈐廰後舊曰醫院提舉林介建改稱廣惠坊記吳淵淵不肖少聞先君子之訓曰先儒有云志伊尹之所志學顔子之所學又云自一命已上茍有志於及物於人必有所濟此吾之所以終身拳拳服膺而勿失者也書曰一夫不獲時豫之辜孟子曰思天下之民有不被堯舜之澤者若已推而納之溝中此伊尹之所志也小子識之淵入耳注心三十年於此矣故自領一簿宰一邑以至二一州佐一臺未嘗不日思先君子言求所以及物濟斯民者乃庚寅之冬被命守姑蘇道過吳江橋下因延見所部吏艤舟焉時夜雪凝栗霜風凜冽襲裘不知其為溫附火不知其為炎於是惻然動心進左右而問之曰爾邦城大民夥鰥寡孤獨癃老廢疾顛連而無告者其多乎曰然郡有廬以聚之有廩以食之乎曰否因獨念言窮州陋縣猶有所謂居養安濟之所吳門夾三輔多名守富課租不應有此缺典既領印即括夫田之沒入于王官者廢絶於緇黃者未足則以公財市民之膏腴者寸積尺纍厥數既登乃卜地鳩材為屋七十程總土木夫役費錢緡九千六百八十米石三百一十七既成扁曰廣惠坊廰堂耽如廊廡翼如男子婦人各有位置倉廩庖湢井臼牀几鼎鼐備具無一乏缺適然而疾病者又别室以居之大者人日粟一升半錢三十有三小者半之米則三殺其一焉夏有湯沐冬有裘纊病有藥死有槥額以二百人為率亡者得續此其大略也竊嘗考祖宗時在京有四福田院外郡有居飬安濟院當時奉行惟謹甚者至有設帟帳具酒食其所全活不可勝紀深仁厚澤與天同普此國家運祚之所以久長州縣長吏之所當遵守而廣惠坊之所由以作也後之人與我同志尚思先儒之言益而侈之是亦上不負天子下不負所學之一端云若夫租入多寡别石具載兹故不書紹定四年八月既望吳淵記廣惠坊在魚行橋東紹定四年創吳淵記提幹廰重建超然堂記趙希邁水心葉先生負天下重名淳熙十年官浙右提點刑獄幕士爭宗師川赴谷應暇時賦詩超然堂上庭下檜雙幹又手自種植從是堂名四播而草木聲價隨重矣先生前建堂才八年後二十二年山隂陸君子虞嘗經理葺治距今又二十二年風毁日剝摧破弗支後人撐持茍延嵗月庭檜蓊蔚怪梢穿簷亦莫事修剪超然堂名在而已秦溪林公介從庾節易繡斧數月四明趙君時侑來幕下主和而賓敬政肅而事省一日詣曹從容以新堂請林公喜從曰吾志久矣亟命吏市良材鄰郡且屬君務偉舊觀給工料度不計也越月堂成後堂復創屋曰晝永東西偏各有新書房曰盡心曰一經移巨檜一株與先生手植檜䦨楯對峙蔽以花栁翼以牆垣觀者目駭心動而超然堂名迹始相稱君屬希邁曰子游先生門最久又辱林公知識顛末非子事乎夫聽宫室之圮壞不事改作者常人所安也至於承廢處陋求作新而卒莫遂者志士所未滿也豈作新一念與茍安者同哉蓋力之勤惰在人而事之興廢在時時副人則可人勝時則不可超然欹傾非一日作新者又不知幾人時或尼之人力難至何益也君於林公一相晤語而新堂之志頓遂得非時在林公而君之人力因者乎始吳人宗文正范公學後和靖尹公讀書虎邱山士亦知慕向至先生以良冶端範陶甄學者於是人所鋪張皆正嚮真脈而吳之士乃盛林公方弭節首命僚屬拜文正祠未幾祀和靖且饋存其孫子昔先生淑教地又拓新之林公謹於率履蓋在此不在彼也君林公門人超然既新而無復前日之卑隘淺陋于焉持蹈于焉辨書而敢以游觀答其長乎堂南浚井寒列可食檜隂覆其上君命曰雙檜泉尊慕往哲之心益不自懈也書得隱歟寶慶三年八月朔儒林郎平江府嘉定縣尉東甌趙希邁記希邁一作布䢍超然堂在幹辦公事廰之東廰後淳熙十年葉適在任賦詩開禧初陸子虞葺之及創題名記寶慶三年趙時侑再新之趙布䢍記常平司幹廰東齊記李知退繇浙水而西其郡八內拱行都如漢三輔澄按之權視他賦為重提舉常平茶鹽治吳中列屬為二𨽻常平者視鹺茗為尤重使者總其綱而勾校纎瑣以身任勞則其屬之責也晨入幕府文書盈几帑廩之藏稽其盈虛而鰥寡孤獨恐不得養也户婚力役聽其辨訟而是非曲直恐不得其平也陂澤之利何者當興者然乎否也勞其至矣而其退也必有藏修游息之地嗇精神舒心目安形體乃可以應方來之事常平之屬其廨宇雖略備乃未有一室以便其私此非缺歟紹定庚寅季冬之月豫弟致中既服官次計月廩之入頗取其盈銖纍而寸積之明年四月得緡錢若干鳩工度材即廰事之北闢地為屋二楹而以東齊名之以書來曰窗虛明而研几可設矣户開通而風月可延矣室寬潔而賓友可接矣其於嗇精神舒心目安形體今得其宜矣兄其為我記之豫每嘆今之從政者溺志淺近顧影岌岌秩滿而舉于格掉臂去爾託宿蘧廬雖巗牆之立不暇顧補苴罅漏尚或難之其肯闢地建屋以遺後人乎篋櫝之未豐田園之未備第宅之未立是吾之憂甚者豪奪巧取而其甚以他木易屋之良材者有之其不撤而為薪亦云幸矣其肯捐私材以營公宇乎致中為人所難非律身以亷視公如私安能辦此然名齊之義尚有可言曰齊心曰齊莊中正曰齊戒沐浴曰齊明盛服齊之為義其嚴如此今揭名東齊居其齊思其名則齊之建也非專以逸其身也非專以燕閒之地也服勞乃可以居逸職業之修乃可燕閒之適警戒䇿勵常若嚴師畏友之在前必無荒怠逸豫以昏吾志也必無便僻側媚以奪吾守也非心邪念潛消於未發之先大公至正流行於泛應之際推是心也以之參天地贊化育可也豈但一屬官稱職而已豫不敢以語他人獨以告吾弟致中勉之哉若夫公事既畢吏散庭空涼竹簟之暑風曝茅簷之冬日好天良夜樽酒論文其樂無涯他日書來盍為我言之六月庚申承議郎新差鎮江府推官貨務都茶湯李知退東齊在提舉常平茶鹽司內平江路新建惠藥局記湯彌昌人物並生天地間人之所以絲身而穀腹飽肉而食鮮以為生生之資者取諸物而悉備至於隂陽之變暑寒晦明之感或節宣不時而致疾則又産靈藥以療之天之惠爾民也至矣古昔聖人代天司牧胞與推念休戚由已亦既教之樹藝佃漁以養其生且惟疾之憂思有以扶持安全之成周醫師設官凡邦之有病者咸造焉分授病醫之屬俾療以草木蟲石穀之五藥而稽其十全之功是以國無疵癘民不天折子民之人如天之惠也聖朝以仁得天下嘉惠黎民纎悉周密大德已亥詔路府設惠民藥局官給鈔本散諸藥市月取其息以資制劑責任守長提其綱擇良醫主之嵗一更代法誠良意誠美矣吳郡為大藩府生齒滋繁謁醫者無虛日初闠市有故酒樓嘗以為行用鈔庫已而庫他徙遂葺斯樓為之延祐三年春郡奉命增設用庫有司請仍舊貫而局設於醫學卑陋逼仄製藥無所總管必巴實正議惕然曰以大府而一局弗克建其何以嚴醫事而稱隆㫖始議改作諗諸同僚諏諸幕屬議克協得頒春亭廢址於麗譙東南十步地居巽維氣鍾溫厚卜者曰吉瓦礫既夷厥基隆然總管首捐俸為一郡僚屬倡下委録事孫良佐董役俾主局顧某施某經營之構美材傭良工經始于四年七月逮良月落成高門北向重屋後峙各四楹堅壯完美髙朗爽塏官不糜帑民不知役一旦龍角驤舉翬翼飛鶱卓為一郡壯觀甚盛舉也欽惟聖天子體乾元之仁溥安民之惠命良二千石殫心赤子而圖其安吳郡得賢侯布宣上恩汲汲惟民病之是瘳局成而惠無窮矣然侯之為政豈鄭子産濟涉之小惠而已哉其發政出令利興害除惟恐一毫或病爾民推是心以往使病痿者奮困者蘇呻者謠富夀安逸各得所欲而藥劑之惠特其一端爾郡之士民欲紀其事而來徴文遂托其實並附作興嵗月而書之俾刻堅珉以垂不朽長沙湯彌昌記惠民藥局在府治東南吳會坊側初以舊和豐樓為局延祐五年建於此吳郡詩石記白居易貞元初韋應物為蘇州牧房孺復為杭州牧皆豪人也韋嗜詩房嗜酒每與賓友一醉一咏其風流雅韻多播於吳中或目韋房為詩酒仙豫始年十四五旅二郡以幼賤不得與游宴尤覺其才調髙而郡守尊以當時言志異日蘇杭茍獲郡足矣乃今自中書舍人閒領二州去年脫杭印今年佩蘇印既醉於彼又吟於此酣歌狂什亦往往在人口中則蘇杭之風景韋房之詩酒兼有之矣豈始願及此哉然二郡之物狀人情與曩時不異前後相去三十七年江山是而齒髮非又可嗟矣韋在此州歌詩甚多有郡宴詩云兵衛森畫㦸燕寢凝清香最為警䇿今刻此篇於石傳貽將來因以豫旬宴一章亦附於後雖雅俗不類各咏一時之志偶書石背且償其初心焉寶厯元年七月二十日蘇州刺史白居易題郡齊旬假命宴呈座客示羣僚公門日兩衙公假月三旬衙用決簿領旬以會親賓公多及私少勞逸常不均況為劇郡長安得筵宴頻下車已二月開筵始今晨初黔軍厨突一拂郡榻塵既備獻酬禮亦具水陸珍萍醅箬溪醑水鱠松江鱗侑食樂懸動佐歡妓席陳風流吳中客佳麗江南人歌節點隨袂舞香遺在茵清奏凝未闋􅋳顔氣已春衆賓勿遽起羣僚且逡巡無輕一日醉用犒九日勤微彼九日勤何以治吾民微此一日醉何以樂吾身郡中西園閒園多芳草春夏香靡靡深樹足佳禽旦暮鳴不已院門閉松竹庭徑穿蘭芷愛彼池上橋獨來聊徙倚魚依藻長樂鷗見人暫起有時舟隨風盡日蓮照水誰知郡府內景物閒如此始悟喧靜緣何嘗繫逺邇北亭臥樹緑晚隂合池涼朝氣清蓮開有佳色鶴唳無凡聲唯此閒寂境愜我幽獨情病假十五日十日卧兹亭明朝更呼起還復視黎氓平江府譙樓門上梁文陳克伏以東南奧壤安堵者垂二百年表裏湖山環居者踰十萬户當寧搜賢持麾出守干戈甫定年穀屢登增修城郭之雄浸復閭閻之舊惟譙閣之宏模尤㑹都之仰止非加偉壯曷表寅恭爰因衆志之樂為遂建雄居而望幸層臺霞映曉角風傳從容卧治之餘際㑹樂成之日篇章閒發森畫㦸以凝香僚佐交歡據胡床而嘯月共慶中興之盛行躋極治之風敢奏歌謡以伸善頌拋梁東十萬人家烟瓦中海色澄波春淡蕩日華披霧曉曈曨拋梁西閭里斜陽一望迷月竁會瞻星緯動玉關新報燧烟低拋梁南春入滄浪水漲藍寒食故園猶舞蝶薰風新令欲宜蠶拋梁北虎寺蒼蒼呈瑞色窮儒聞道奏除書野老定知䝉帝力拋梁上百尺齊雲誇大壯風傳飛將定神京日望回鑾駐天仗拋梁下萬頃湖光連緑野聖德幽通玉燭明天河逺接銀河㵼伏願上梁之後皇風逺暢睿澤咸䝉穆穆嚴衷仰一人之端拱丕丕寶厯享萬福以延洪寵賴専城之重風移澤國之雄野無犬吠囹圄皆空歌鹿鳴于大雅噦鸞聲于泮宫然後率勵在官之守盡同戴履之忠享榮名于有永保休寵於無窮退思堂記陳孟浩蘇州府治舊名平江在長洲縣東北後徙于縣之西南今治所是也自洪武經今七十餘年來守是郡者非一人其勤民之政行事之善惜未有聞焉宣德五年天子命舉在部賢臣為天下郡守禮部郎中況侯其一也侯以能聲薦拜蘇州太守奉璽書來牧于兹委以重寄蒞政之始視官事如家事且急於修舉廢墜郡有太伯伍相城隍廟及陽山白龍祠內外館驛惠民藥局皆欹仄敝漏侯見而太息曰事神治人我之責也亟擇善治事者董工盡撤而新之俱不費民力而成至於府堂蓮幕吏舍弗具治者悉令究舊益新又與僚佐謀於府治之後構公廨一區以為退食之所意未敢擅作乃請於朝朝許之請於是鳩材僝工經始於庚戌之秋訖工於是嵗之冬深奧親密窗戶疏達復自扁曰退思堂翰林侍書程南雲大書三字揭於兩楹之間其意以政有所未逮則退於此而致思也且屬豫記之豫告之曰心之官主乎思也思則智慧生而是非得失判然於胸中而無疑也故思之於人大矣哉凡天下之事未有不思而得者以周公之聖一有不得於心猶且仰而思之夜以繼日況衆人乎蘇為郡領縣七當東南之都會地大物衆生齒繁夥錢穀稅糧甲於他郡素號難治故為郡於蘇者施政事於此不能熟思而審處則未有得其平者矣如欲平其政如之何而弗思此為政所以貴乎思也想侯日退斯堂神氣清明坐而思之民情欲夀則思若何而保其生民情欲富則思若何而厚其生訟獄之興弊若蜂午則思何以決之租稅之重徴輸愆期則思何以集之顛連無告者思有以恤之也賦役不平者思有以均之也事有可否思與僚佐而協謀定論理有顛倒思從公議而明辨是非某也廉介有守思舉其善而揚之於衆某也奸諛挾詐思聲其罪而懲之於衆孰為可用而思進之孰為可疑而思退之在已之有過則將速改其過折獄之不正則必審克其情動靜云為不離乎道舉措施設必協乎中事事於此退而思之審而施之庶幾政平訟理則鮮有過舉而無忝厥職矣嗟夫侯朝斯夕斯兢兢業業上竭忠於國以圖補報下施澤於民以盡撫安他日報政於朝書最上考託以大任鋪張鴻猷黼黻治化則光輝斯堂不其偉哉吾故不辭而特書之俾刻諸石俟後之來繼守於是者誦斯文為政皆以侯之心為心則斯堂之光豈有窮乎退思堂在府堂後正統間郡守況鍾建今府治在織里橋東元初為江淮財賦提舉司後改都水營田使司復為平江路總管府國朝吳元年就建府治洪武二年有㫖加闢知府何質陳寧相繼成之來鶴樓記魏驥今工部尚書廬陵周公為左侍郎時巡撫浙西諸郡按部至姑蘇寓於宋大儒魏文靖公了翁之鶴山書院正統十一年十一月二十有一日集郡縣官僚民庶授以約束忽雙鶴自南而來翔集于庭衆環視喜愕咸相慶曰鶴乃尚書所服之制公必自此而升歟又曰鶴乃仙禽能調息引年其為公長夀之徴歟衆方議未定而郡守古婺朱公知是日乃公初度之辰遂躍然而喜曰斯鶴之來不來於曠地而來於衆目所視之庭不來於他日而來於公慶誕之辰是為公之瑞無疑斯不可以不記乃首捐已俸為倡率僚屬於鶴所止之地萃材鳩工創樓三楹既落成大書來鶴二字以顔之且因郡人翰林檢討王君具顛末索豫記豫惟瑞不徒瑞必因人而瑞公發身賢科為翰林庶吉士䝉太宗文皇帝選拔二十八人之列績學文淵閣才器大成遂膺擢任踐揚中外屢有成績頃以浙西水患民食官賦皆有不足武斷鄉曲者由之而起郡守縣令或莫能制公膺簡命巡撫其地宣布教條民翕然從令所謂民食官賦皆不勞而給足强梁跋扈皆不治而銷靡數郡之內人和神恱莫不感戴以為朝廷任用得人所致也昔人有孝友於其一家者其園林尚有鳥不擇子而哺不爭巢而棲之應況公之德化洽於數郡然則鶴之來庭豈偶然哉易曰鳴鶴在隂其子和之蓋言誠之感於下也詩曰鶴鳴于九皋聲聞于天蓋言誠之格于上也今公之巡撫東南也夙夜惓惓専以愛民澤物為心其誠之感於下者從可知矣公爾忘私國爾忘家其誠之格於上者又可見焉斯鶴之來其為公之所感召也必矣公今位躋六卿康寧無恙福夀之來無有涯涘誠不可以不紀也且朱公之人練達有為誠東南之賢守若公德化之成蓋亦與有力焉他日清風髙節豈不可與昔人一鶴自隨者同其聲光於無窮哉公名忱字恂如朱公名勝字仲髙故並記之來鶴樓在巡撫行臺之後正統十年知府朱勝建行臺即鶴山書院永樂宣德間為巡撫大臣治事之所觀風題名記徐有貞惟皇明有天下當髙皇肇大一統之初定鼎金陵以蘇松常鎮為京輔郡如漢扶風馮翊之于長安也其地大人衆事力之强控制江海屛翼天室而財賦所出國用所資最天下視扶風馮翊為加重以是天子之命御史出任巡按以察吏治而觀民風於斯四郡常加之意焉乃成化三年監察御史古滄張海朝宗實來以斯四郡皆京輔而蘇為會府凡國初以來厯政交成承舊章成業之籍於是乎在顧兹察院規制雖備而題名之典猶缺乃於治事之餘考求前政得五十有七人列其姓名而刻之石命之曰觀風題名將待從政者總而題焉以昭垂於來世來請記豫謂觀風者御史出巡之一事爾若舉其所職豈止是哉蓋其官天子耳目之官也自成周始建秦漢以下代因之而於其制有所崇益分三院綜核曹監列郡司六察斯已重矣至我朝乃合厯代之制而一之故其官視厯代為加重入則廣天子之聰明於內辨正邪别淑慝公是非使朝無幸位國無寃人奸宄無所投其隙而四門有穆穆之風焉出則廣天子之聰明於外究利病審枉直慎舉措使吏無廋弊民無隱情􅕝墨無所容其間而四方有平平之化焉是其所職若耳之職聽清濁之不淆而雅鄭有可察也若目之職視白黑之不混而妍媸有可察也茍為不然則不職矣夫四體有不職在耳目以察之耳目之可以不職乎哉彼聰有不及則聾明有不及則瞽聾瞽為其有所蔽也蔽之由人且不可矧可自蔽耶聰明蔽於上而事物亂於下君德將焉正國是將焉定官邪將焉警民隱將焉達耶是故天子之於御史任之常重而御史之自任亦重其所以重者蓋厯代然矣豈惟我朝而我朝為加重於天下然矣豈惟京輔而京輔為加重誠以首善之地其近於天子譬猶在乎耳輪之內目睫之間也承乎德音而被乎德輝實有加於天下視聽所及因所當先而可後哉朝宗賢其有志於斯也必矣故於斯舉蓋將即前政之臧否為後政之勸懲孰其稱職而可師孰其不職而可鄙必有辨之者在然則題名之記豈惟表章風憲為觀美於一時而已萬世之下於我朝制度尚有所考焉巡按察院在聞德坊即元海道都漕運萬户府至正末張士誠改為分樞密院洪武元年知府何質改置後有池亭東為射圃軒宇靚敞特勝他廨成化三年御史張海立題名碑武功伯徐有貞記廉石記吳寬石之産於吳者竒形怪狀不可書述良工采之好事者賞之君子則藐之於此有石焉頑然數尺重而不竒蠢而不怪盡山中皆是物也良工棄之好事者藐之君子則賞之又從而貴之敬之視其物殆與魯璜秦璧等非物也人也蓋當漢末吳郡陸公績仕於孫氏為鬱林太守相傳泛海歸吳舟輕恐覆取巨石為裝蓋其廉如此公家婁門之內臨頓里之北石留民家至今猶存而埋沒土中僅露其背過者猶能指而稱之曰此漢陸公鬱林石也然未有表識之者今監察御史胙城樊君祉巡按吳中聞而美之謂知府史侯簡曰先哲遺物固宜表識且有可以風勵乎人者在顧其石僻在東城非官吏朝夕屬目之所其為埋沒等耳吾將有以易置之侯以為然於是吳縣知縣鄺璠長洲縣丞王綸相與督役夫舁置察院之側作亭覆之而樊君為名之曰廉石石始僻而通久湮而顯觀者鬨然而足跡不絶皆曰古之才御史必以揚清為事樊君此舉雖去之千四百年之久猶且揚之况其近者乎且御史之職在乎舉賢舉賢者可以激乎一時石之不朽雖至于千萬年可也其有功於風紀甚大且久惟昔南中有貪泉飲之者遇寶貨以兩手攫而懷之物之能移人心如此今之廉石正與此戾自兹以往凡過而視之者其廉士固欣然摩挲愛玩以益勵其操若夫貪者將俯首頳顔趨而過之有不動心而改行者尚得為人類也乎石之立為𢎞治丙辰四月二日越月而亭成樊君既題其楣曰漢鬱林太守陸公廉石復别琢石請豫為記豫美其事故樂而助成之跋馬録豫讀廉石記未嘗不善樊柱史昭兹訓也嗚呼士之廉也猶女子之貞也女非貞雖施嬙之姱蔡衛之伎國之人且醜之士而弗廉雖才美肖管晏君子弗取焉何也才耀乎外而本之弗修也嗚呼吾觀陸績氏苦節哉可以化士行矣夫弗訓而有攸向者上也訓而知之者次也訓之弗喻日且甚焉吾弗知之矣孟子曰聞伯夷之風者頑夫廉懦夫有立志夫人若頑懦品斯下矣且知向化也觀陸氏石而弗化焉者其性猶犬馬與我弗類也或曰記所云近矯也非所以訓也録曰過矣不愈於亡賴者乎彼留犢縣魚雖非中庸然而令名施於後世夫矯者訾之是佐貪也豫故曰善樊柱史昭兹訓也謂其可以風凡為吏者也不但蘇州爾矣嘉靖元年二月吉汝南馬録百愚撰廉石即鬱林石在婁門孫吳時鬱林太守陸績罷政歸官廉無裝船輕不能道海取石為重世愛其廉鬱林石湮於民家𢎞治中御史樊祉舁至察院門左創亭蓋而立之狀元吳寬作廉石記治水分司題名記張習天之生人藉水土而水過多則為患神禹氏治之功與天地凖代職水者雖小大不侔其得一日而廢耶故周有地官稻人漢有水衡水司空宋有都水監元有都水使司莫非為是設也我朝初不置専官然於三吳之水則惓惓焉才遇潦溢必遣廷臣出治待其平而後已洪武永樂間皆然自宣德來始用巡撫大臣兼之郡邑各添治水二倅丞簿猶莫能統於一成化初復設憲臣提督其官係浙臬去吳頗逺未便𢎞治辛亥三吳水至壬子為甚甲寅尤甚近臣奏命工部亞卿徐公蒞吳首決吳江之壅田次濬常熟之淤港而水漸疏泄事竣還朝以謂平治水土我部司職也烏可簡忽以遺宵旰之憂乃奏革憲臣而輪選本部屬之賢者一員専治焉初得主事貴溪姚君文灝不久以病免廷臣會議須老成練達如都水司郎副新喻傅公為稱遂陛升正郎領璽書而來身任其事遍厯所轄相地宜究委源即分司之在蘇者處之其松常嘉湖等六郡以時巡之於焉開陂塘浚浦港鑿溝澮築堤防以至輿梁之備運河之通凡有益於官民者慮之無不周而行之無不敏矧疆宇之廣往返動數十百里其為工非可以尋丈計時日論也如是勤渠三年而治功告成雖遇水溢弗為患嵗屢登而民咸恱舉祝頌公公以分司之名實本都司分設而得其政不敢不勉不可不為後政鑑也用題名之石授習記之習耄何言哉竊觀天下之水皆流動不息惟三吳在東南最卑下書所謂土惟塗泥田惟下下故水常滙而不流雖流亦不甚湍急所以沮而宜稼惟其宜稼故生齒為甚繁貢賦亦重而吾蘇又為六郡之甚繁而甚重者故三吳之水所當治而吾蘇尤所當先也且蘇之境切臨太湖湖受寧國等八郡之水積霖泛濫蘇必先當之茍欲疏泄亦不過即是境以導瀹俾注之海而後殺夫滔天之勢故蘇之水治則三吳之水無不治矣分司之設於蘇已挈其綱領而致治之功亟成宜哉嗟夫水得其治然後田有秋田有秋然後民生遂而貢賦充貢賦充則用無不足國家視此猶倉庾也帑藏也兹治既成豈惟足國之用而已上有以副聖天子委任賢臣之盛意下有以安列郡億兆之民生忠愛並施而不相悖矣孟子曰禹之行水行其所無事也行其所無事順理也治水之職本諸順天之理未有順於理而利有不興害有不除者由是而知三吳之民自今以往莫有昏墊而無訴者矣然則題名之舉詎徒表章一時治功為觀美百世之下於我朝設司任賢思患預防之意無非益乎民為有所考焉爾望湖閣記浦應祥𢎞治十一年冬聖天子授敇於工部郎中傅公潮總督江南諸水道自淮抵浙凡數十郡邑公受命惟謹星馳驛駛陸輿水楫遍觀博訪於水之為民利且患者殫心瘁力務濬導而隄防之皆經逺計三年來民忘旱潦之虞嵗享豐穰之慶公之功偉矣而吾郡形勢考之圖經三江五湖之所浸滙地最卑下而賦役之繁反甲天下郡往時一經雨潦七邑告灾下困上憂遂致阽危此尤公注意之深者今而袪灾釐害去壅剔淤我合郡士民感公之功較之他郡奚啻倍蓰也公分曹𨽻郡第廡之後地甚卑陋乃凌架一閣題曰望湖閣嘗登覽焉而具區陽城諸巨浸隱隱在望爰命豫記於壁豫辱公之知愛頗久不敢以文辭惟古先哲一有所存省於中則盤盂几杖門榻坐臥之所悉有銘志所以示不忘也公自臨涖以來憂勤惕勵不鋭始而怠終致事舉而功就若可少紓其志矣兹髙揭是扁朝夕斯顧公之心何如哉誠安不忘危之盛心也挾此以往則他日之相天下推是心而有餘矣公之兄大宗伯先生德望為天下先行大拜而公才美昔嘗在內翰兹以芳績重譽進擢復居詞禁則兄弟草制俾韓持國故事不得専美於前此又當代昆季莫伍之榮盛也敢於繆說之後並記之以驗祝望之私云水利分司在明澤橋東舊為館驛廏坊成化中設提水利僉事始居此今専為水利官居燕思堂記楊循吉國家立鈔關一在蘇滸墅以户部主事一員司其入今天子龍飛之九年劉君堯章實至至則克殫厥心賢聲茂著商旅莫不願出於其途而賦亦倍登惟是公衙之宇不足無退食之室賓至茗於㕔事弗便慨將畫之顧視厥後有廡相直惟闢石式宜闕則室於其北牖其南垣其外中設揖讓之位而且以為息焉節費而亟成易規而大備既成題曰燕思之堂於是延涼納溫冬夏咸宜圖史在座花石盈庭客之登者莫不樂之他日以其意命豫以記曰官政之修惟思乃克然非偃仰優柔之地則思亦無寄焉自吾之來兹夙夜匪懈惟將勉其職是圖然而南檣北柁日勾校不暇雖欲覽古今以求通於務有弗能矣故吾之為斯堂蓋以思而不以豫也敢弗志乎且是途居津要之會巨公魁士由四方而來者無不得以接見吾堂日有人焉彼皆天下之賢俊吾宜思而與之齊庶其及也夫燕居燕也燕會亦燕也一名二義皆用吾心故謂之燕思也子其書之君名煥真定藁城人癸丑進士蒞官清尤洽文史達於治而厚於德識者期以逺大其為是堂廣已之道而遺後之益抑非無謂以為也遂謹受而記焉若其槩君所云皆具書事貴核故不復立吾言云户部分司即鈔關在滸墅監收船鈔主事居焉𢎞治中主事劉煥一作􅀈作燕思堂於內楊循吉記吳都文粹續集卷八
