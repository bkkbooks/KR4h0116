body:
  text: 吳都文粹續集卷五十二明錢榖撰詩詞送陸全卿浙江憲副伊䇿金紫遙瞻故里還佩環才出殿中間臺端章疏開丹悃柱下風霜凜舊顔鳯鳥一時真可瑞葭莩先世尚容攀長才擬副為霖望豈學間雲只戀山雨泛長蕩夜歸閶門二絶句一舟長蕩衝煙雨山光樹色空濛裏驚人白鷺過前灘枯葦搖風浸寒水釣橋通郭俯清流月照朱簾捲畫樓醉裏笙歌喧夜市千家燈火似揚州拜查山先塋熊從行京華遊宦迹淹留回首吳門是故丘先世本源懷水木幾年魂夢繞松楸酒澆宿土山將寂碑翳寒煙草自秋稚子成名重拜掃鄉村父老記行騶閶門楊栁枝三首館娃宫外弄春柔露葉如顰不奈秋往事總隨歌舞散雨餘明月照枝頭一樹鶯聲破曉煙濃隂晝滿畫樓前長條莫遣風霜折留繫儂家浪子船憔悴街頭車馬塵輕盈非復向時春幾回偷眼東風裏看取中年勇退人夏御史德乾年及五十告病歸居閶門外謝楊儀部儀部人中英篇章溢竒氣虞敦與周彝居然存古制時時獲寓目不覺心自醉摩壘堅莫犯引退三舍避未及始仕年封章俄致仕從容進退間士固各有志紛彼齷齪徒焉能識胸次在昔負髙才亦頗遭時忌下筆不一言推奬逮五世後有知子雲家聲重關繫麗藻堪華國胡為置間地狗監尚有人文園豈容滯官軍平海寇二沙環巨浸數里出填淤填音田填淤出秦鑿渠下險艱曠人迹寇賊萃攸居蒲盧望無際鮮鱗繁可漁専利不知厭力本陋災畬凌波恣殺掠黨類日淪胥奕世濟凶惡逋逃百年餘犯順速厥戾虐焰肆狂噓奉辭行天罰豈遑惜軍儲簡徒除戎器艅艎耀千旟疾雷破山嶽天網頓不疏昔為橫海鯨今為鼎中魚巢穴于以空根蔓于以除顯戮懲淫慝九土同晏如服獠圖善治履霜謹其初蘇武慢蘇臺懷古物換人非千年俯仰伯業竟歸何處寶劍埋精銅棺斂魄墓上氣銷金虎抉目忠魂捧心妖態身後化為塵土嘆人間陳迹茫茫零落斷碑平楚空剩取麋鹿荒臺蘼蕪廢苑曽貯當時歌舞紅樓夜月畫舫春風還逐太平簫鼓五湖煙景那有人爭自在漁翁領取醉來時一曲滄浪不管是非今古念奴嬌風雪遊虎丘同雲羃野飛鳥盡千里遙空垂雪幾度曽逰誰信道不似今番竒絶山削瑶峯路穿瓊樹此景分明别萬羣舞鶴梅花堪並髙潔一兩踏凍芒鞋窮幽極險歷盡水晶宫闕憑仗酒兵添氣力鏖戰風威凜冽收拾滿懷乾坤清氣不向旁人説明朝短棹剡溪髙興重發與二弟泛舟遊吳氏東莊因寄匏翁文林緣城畛流水榆栁緑蔭門艤船信登陟忽得吳公園小亭面髙岡蘿徑隱可捫青山出墻頭白雲宿籬根歌鶯滯池曲遊魚戲波渾繁景當首夏過雨氣微溫老我獨已樂偕有弟與昆清唱散林木起行歷郊原日斜亂人影眷戀忘歸轅水木余夙好况兹故情敦故人方宦達樂事誰與論室邇人則遐相忘黯銷魂出處各有會一笑覆餘尊戊午春將赴溫州楊君謙禮部邀餞于虎丘同集者為沈啓南韓克贊二老幅巾杖藜韓君從子夀椿與朱性甫青袍方巾唐子畏徐昌國則皆舉子巾服而豫與君謙獨紗帽相對會凡八人而人各為侣適四類不雜鳥歌當離筵東風逼微雨會合飲中仙兩兩各相侣二老行紆徐二妙足髙舉儒袍聨尊生紗烏對賓主酒半散林壑尋詩鏤肝腑詞峯挽落暉酣戰走旁午冥搜隘八極光熖互吞吐珠璣落吾手拾襲誰敢侮悠悠大塊內何物不參伍嗟余獨行邁棄斥無所與喜桑民懌至自吳門奔走卑官嵗再更江湖偏重别離情逢君怒罵為知已顧我摧頽負此生細雨燈花消午夢青山詩思繞孤城自慚不是臨卭令潦倒安能重長卿舊研寄宗嚴壬辰嵗豫試禮部杜用嘉以小端研相贈其唇有竅可以引繩携持自銘其隂為余廷對之兆是嵗果忝進士携研入對大廷及今丁未又十六年矣宗嚴弟復試禮部遂以付之并寄此詩期廷對之後轉以付宗質云短硯稜稜紫玉膚杜陵投贈手親刳曽携對䇿朝金闕還擬傳家代玉符兄弟登庸輸及爾子孫發軔計同吾殷勤付去傳臚後轉與三郎入仕途江浦道中憶吳中故人回首江南思欲迷夢中談笑故人違不辭行役青山笑但怪傳呼白鳥飛世態昔經多事悟官情今入暮年微何當載酒橫塘路扶醉村家看月歸還家十韻中外驅馳二十年暫依桑梓息塵緣豈無薄祿終非計幸喜還家莫問田嵗久先廬從敝甚水邉喬木故依然過從喜有貧親戚檢理尤存舊簡編千載秋風三徑菊一篙春水五湖船飯抄雲子長腰米羮煮銀絲縮項鯿繞屋溪聲林下樂滿忩花影日髙眠晚于世味駸駸淡靜覺間居事事賢作計已逃多辱外收功能及未衰前只應今夜西齋夢不到紅雲北斗邉邢長洲見顧贈詩次韻奉答寂寞城居恰似村一溪新漲護寒雲空嗟葵藿心如炙常佩芝蘭手自薰滿地江湖期我老大家風月許誰分歸來未遣門羅雀車馬時時枉使君荷花蕩夜歸次吳水部德徵韻采芳日暮未言歸處處村家掩杼機水漫蓮洲愁路斷月明沙渚覺鷗飛髙歌小海風波急回首橫塘煙火微蘭棹屢移尊屢倒不知露下已霑衣陪李瑞卿太守登玄墓旁湖髙閣千山繞映寺長松一徑分偏喜故人來燕集都教宿雨洗塵氛江湖汗漫年俱老冠蓋從容酒半醺看遍梅花又歸去不知何曰重論文滸墅别李子陽莫歸有感野墅沈沈更漏絶美人去去隔山隂輕橈蕩月波光碎春樹連雲夜色深萬里秋風黃鵠舉五湖煙水白鷗沈乾坤此際元無礙出處從容各有心送吕都憲幾年宦海挹光塵今日離筵得暫親天地酒杯還舊約江湖舟楫正通津何人可寄安危事聖主方求社稷臣見説長安春爛漫江南猶有抱飢民赴溫留别停雲館書館不能别凝情撫曲闌心知為樂淺祗覺去家難水石性終在菊松盟又寒殷勤向兒子好護碧琅玕金華道中憶君謙逺别輕千里經行歷萬山思君終夕坐出守幾時還隄栁吹花盡溪雲過雨間南峯著書處夢裏更躋攀憶石田回首未千里相思猶十年逺情收短札近事夢離筵忽忽頭都白悠悠心更玄兒曹能活計家事好拋捐溪面浮林圃山頭壘石田與君偶符合來此了前緣京邸秋日懷歸京國流塵撲馬黃西風都敝客衣裳漫聨班列非通籍悔獵科名去故鄉愁外亂雲秋渺渺夢中山色夜蒼蒼遙知寂寞南忩下叢菊無人只自芳次韻石田理墳二首春雲撩亂石橫斜鑿破乾坤氣一窪早脫雞羣方傲世老思蟬蛻更為家羣山奠玉看新鬛孤鶩悲空送斷霞封禪無書生自挽幾年齊物誦南華吾拾吾形委石崖此民此日入無懷青山同穴于飛願白首何心造化偕退覺獨間忘世味老應自慰任時乖知君辛苦如君志為殉從將筆札埋用韻送宗儒進士還吳張泰燕南莎草入秋黃都下閨人搗練裳客計蹉跎將問寢主恩珍重許還鄉安危逺慮知君素淺薄愁顔愧我蒼晝錦相逢耆舊減江湖何處擇年芳宗儒有永嘉之行往餞客樓奉贈長句此來曽並暮江帆一宦看君再向南尊酒乾坤懷往路扁舟吳越謝征驂月中馴鶴孤標逺天下亷泉此味甘左掖星郎元近御東家詩景豈成耽城樓海色寬秋望水寺鐘聲節夜談公暇未妨書裏醉道存何惜府中參幽崖白日羣情喜明府青春百事諳見説蛟龍能大小隔年雲雨起江潭混堂沈周混堂鳴版日初紅懷垢人人向此中君子欲修除祓事小夫翻習裸裎風未能潔已嗟先亂亦復隨波惜衆同慚德應多難浣濯不容便論水無功次韻天全翁雪湖賞梅十二咏台垣賜老荷君王山上籃輿湖上航如此湖山晝逰地梅花開遍客還鄉少在城中多在鄉尋梅猶抵候朝忙新詩似與梅相約詩到成時梅恰香不是春愁鶴髮翁風流人物義熙中遙知觴咏清遊處小筆湖山似欠儂重巒疊疊水彎彎雪舫尋春醉未還因省玉堂為客夜如今不是夢中山緑尊沽酒出春城春日尋梅湖上行聞道衝風又衝雪旁人不識醉翁情一代文章百代名鼎司綸閣已忘情近來熟理農桑計似謫江南作稼卿湖上尋詩舟去穩尊前賞雪酒行遲優遊正是居東日自遣春風人不知梅撲玉缸春酒開雪湖山水共徘徊風流舊屬林君復人道先生是再來泛雪吳航勝月槎深深杯色照銀沙寒梅鍾得平生愛重是江南第一花玉樹瑶山畫裏看乾坤不似酒壺寬醉來草聖三千紙漫使人驚索幼安清遊不放酒杯空雪共梅花落酒中玉帶朱衣有仙骨畫船更在水晶宫黃帽歸舟且莫催雪山留客好銜杯梅花况是堪題咏今夜春城判不回憫禾薄禾今兹計狼籍尚栖畝借問胡為爾先時已罹咎五月風雨大潢潦卑莫受田稚俯就沒濁浪扼其首排濯潏蕩間性命存亦茍天日赫赫出水熱烹羣醜二日色已變三日虀在臼我時往撈觀覬活從中剖心存根巳撥欲棄難解手欲拯卒何及愴食內若疚掘土窒滲塍倩車仰鄰佑督戽靡日夜救死豈容久併力役老少足絸筋亦糾水面青針芒稍出九死後氣力與生意委頓類産婦一一補傷爛行行十八九過時強經營安望如常茂事多于悔禍始竒終變偶七月尋遭風弱本被拗揉折處氣當沮虗房但含滫間或見成穗秃秸臥敗帚何能畢公租亦莫彀飢口對此發長咨細雨浹昏酉枵腹不堪鼓併欲歌止酒割稻我家低田水沒肚五男割稻凍栗股勞勞似共雨爭奪稻芽漸向鎌頭吐蓬蓬纂纂綴青針稻既生芽米應腐腐餘割得尚歡喜計利當存十之五小家伶仃止夫婦稻爛水深無力取口中之食眼中飽忍見穗頭沈著土波間粒粒付魚雁一年生計空辛苦但憂兩口不聊生未暇徵租慮官府老翁坐對沈竈哭婆亦號咷向空釡雲昏月黑忘關門隔壁咆哮一聲虎理墳二首官竹園頭春曰斜手開新土漸成窪觀生似寄誰非客視死如歸此是家白髮暫存餘電露青山長臥有煙霞慰勞自假間詩酒且弄年華與物華卜墳已喜傍雲崖未老先曽有是懷鶴表虛名待誰録狐丘宿約與妻偕百年齋裏參諸妄一鍤泥邊打早乖免向君王乞骸骨自山生長自山埋寄宗儒碧雲渺渺一江分聞道滁山盡屬君愛是醉翁亭最好每思遊燕讀遺文阻雨雙娥僧舍與宗儒夜話十宿僧房春未晴故人為我踏泥行老隨年去詩成感話引杯長酒在情鈴語報風聲落落燭枝銷跋火熒熒浮生蹤迹真鴻雪何况于今有宦程聞宗儒除溫州喜而有作青陽布區宇庶品樂化工亦聞剖符竹起子髙臥中臥者固自髙恐世卑黃龔功名要人立生才天自庸會至亦何辭達懷乘時通雙旌及行日奔走來野翁聞溫州消息奉寄白叟黃童擁道周提封百里候華輈國人皆好真難事山水重臨是舊遊康樂篇章動髙興希文襟抱憶先憂故園野老偏相慰喜極深思漫倚樓喜宗儒寺丞令弟宗嚴春試得雋吕常淶水尊翁慶澤深九原真遂髙門心春塘好夢酒連日香土馬輕花滿簮且置元兄説西抹况聞季弟亦南金家聲如此官何物為作丞哉不負吟題畫送文太僕宗儒還吳杜堇南國分司品位清歐陽人望是先生封章激烈公卿畏納諌如流聖主明隨柳傍花吟興逺敝車羸馬去途輕春寒病起還相送二十年前過愛情送吳汝器下第歸吳江王鏊羊家裙上墨如新兄弟才名自昔均其兄汝礪新第進士二鳥出為南國瑞一枝回羡曲江春戰場有作還推子當局多迷莫笑人笠澤湖邉平望里且將書卷伴絲綸送楊尚絅楊名甫毛貞甫陸全卿四進士歸省朱書樺燭夜縱橫忽見篇章眼獨明暗裏投珠人莫顧空中懸鑑我何情相逢一笑平生友此去重來幾日程路指婁江東下急夷亭斜日莫潮生右尚絅南宫筆勢見翩翩固也平生意豈然不伐子甘為孟後虛名我自愧盧前杏花燕市春隨馬楓葉錢塘夜泊船舊日和凝今老矣登庸衣鉢尚須傳右名甫接官長傍驛邉河來往君家較獨多已向交情知鮑叔豈因筆勢誤東坡還家未覺關河逺感舊無如嵗月何南望吳門君獨去西風落木洞庭波右貞甫文章一見一回妍玉樹分明在眼前記得陸機年二十親看賈誼䇿三千杏花燕月人俱逺楓葉吳霜思獨懸南去河流乾欲斷關津先放綵衣船右全卿送趙栗夫歸省吳江秋入吳江一葉飛歸來遊子著朝衣鄉人始識文章貴仕路休嫌定省稀寶帶橋邉舟泛汛白雲司裏樹依依路經震澤人應問太史周南胡不歸送僧歸洞庭好古多遊寺懷山喜見僧此來成北道好去問南能施飯逢溪濾函經被雨騰誰同西崦裏竹屋夜深燈送蔡進之還洞庭夢魂長繞太湖邉折柳官亭又一年家世西來峰縹眇客心東去水潺湲林間詩社誰為長吳下鄉音我亦便撩亂煙花遇寒食東風胥口喚行船送姪寵逺别憂不忘病别憂其那病也在汝身痛也仍在我道途歷﨑嶇風濤恣軒簸欲留諒不能欲去夫豈可起居飲食間安得盡帖妥出入戒垂堂旦暮親藥裹安心是良方坡老語非左我生本衰遲我命亦轗軻子行從此歸我去幾時果霜天笠澤帆夜月楓橋火故鄉風土宜見此病亦頗到家平安書早寄北來舸送秉之還吳不見倐七年相見只三月不知三月後又作幾時别别離苦多會苦少風雨蕭蕭竹忩曉自笑間官日日忙夜短情長談未了我生迂僻寡朋儔坡云海內一子由只今子由又欲去何以慰我平生愁子今去矣我何有為置湖濱田十畝下栽禾黍上木奴菱芡荷花繞前後讀書稍暇來朝班我却歸臥湖山間吳禹疇副使使便還吳江覲省重明瞻麗正𢎞治建初元聖作羣方覩星流使節奔費蒙頒道里便喜過家門晝日方三接寒暄豈一言趨庭嘗獨立加飯為平反王事真無暇親恩亦未諼銀魚羞笠澤彩鷁動湘沅石建裙方滌王延被未溫法冠驚豸立官誥訝鸞鶱鄉里恩光滿人生樂事繁􅐜羮莫留戀候吏待行軒送韓勛都憲孫先公老去我猶及鐡面長身碧眼稜海內安危真可倚軍中韓范復誰能精忠已見回枯竹竒事曽聞斷大藤昭代象賢多不薄獨無雨露到雲仍送周院判原巳還任南京得杲字前年送君城東亭今年送君城南道年年長作送行人每見君歸被君惱君生何好只好詩捆載東歸總詩草玉延半舫最留連共月菴前亦傾倒醉中勸我不如歸只道金陵山水好人生出處誰得知世路東西難自保難自保雲𡨕𡨕日杲杲顧氏三辰堂顧野王家學有傳一經休説漢韋賢風雲慣得從龍便嶺嶠爭夸覩鳯先天上星躔真有數吳中讖語不其然髙堂要見三為四屈指從今又幾年朱天昭始第進士主豫家至明年移居西鄰因索賦兩年不厭草堂低頗愛晨昏出入齊長日經過無主客秪今相見有東西濁醪尚可墻頭過歸院那愁柳下迷廏馬似知人意思臨岐回首再三嘶送錢正術還姑蘇西館橋邊竹隱居昔年曽受異人書不知官爵惟求子可自塵埃早識豫忽地相逢還宛若再煩推看定何如韓蘇總被虛名誤試問三星是也無送周進士炯還常熟省親同年近仁子南宫此日謬持衡一見髙文眼為明正喜故人能有子忽聞逺别得無情名因實起何妨早理會心傳不厭精此去海虞誰復見讀書長日掩柴荆送盛進士應期歸娶吳中終生文彩棄繻辰建業秋風擢桂新闕下杏花還屬子召南桃葉正宜人上章許得天顔笑奠雁光生故里春大小登科俱入手髙堂况有黑頭親送仲山之任廣東參政十年盡送南歸人今日誰知還送君歸來寂寂掩關臥無語目睇南飛雲與君相從亦云久對語真如飲醇酒朱絃疏越音有餘明水著鹽味多有君才于我真得師簿書堆裏還題詩詩詞鬱硉古鼎器字法瘦徑枯藤枝嶺南此去無多路目極燕山天盡處青山杳杳不見人秋雁飛來復飛去政成幾時召還闕還對共月菴前月贈楊君謙時君謙有歸志夙懷抱悄獨行與世多忤京華二十年壯志遂遲暮悠悠深巷中盡日斷來屨楊子獨何為逝言逺相顧移家濁溝上破屋終不去人問何以然無乃以吾故朝過講道玄暮過話情素君慕哀駘它我思王叔度相見各忺然誰能詰其故我欲永從君君且為我住無為忽去兹雲山恣髙翥蓬蒿仲蔚宅依然還魂處一雲亂石槎丫幾折旋畏途歷盡是平川髙林細點催詩雨深屋方塘悟道泉僧為知名如舊識地疑曽到豈前緣萬竿修竹蒼煙外欲借琅玕紀嵗年洞庭新居成歸來築室洞庭原十二峯巒正繞門五畝漸成投老計三台誰信野人言郊原便自為鄰里水木猶知向本源莫笑吾廬吾自愛簷間燕雀日喧喧過故狀元施宗銘墳後生何敢望餘芬斗酒還過董相墳行指岡巒低偃月公葬偃月岡坐疑文彩上成雲兩山已雪將軍耻郡志舊傳東西洞庭皆將軍始居之故兩山無文士四海猶傳制䇿文賈誼天年人莫恨孔光張禹亦徒云吳文定公挽詞四海文章伯三朝侍從臣世方遲至理天遽奪斯人沖漠髙難問煩寃臆少伸道從元末獻文向國初純東里淵源近天全授受真正音驚鸑鷟恢網漏麒麟纍躓名逾起先登氣益振聲華當翰苑德義重儒紳格律維沖淡言詞自雅馴時流皆自鄶古制或先秦書法顔公逼詩篇杜老鄰綸音騰涣汗碑版照嶙峋講向東朝切規從後殿諄從容天仄聽仁義日前陳內外同瞻嶽賢愚但飲醇汪洋從混濁堅白謝緇磷自不驚榮辱何緣睹笑嗔吳山從此重燕谷鎮長春在古無蘇子於今有伯淳間情多落莫要路每逡巡見説年頻引俄嗟嵗在辰九重恩絶等八座望殊倫尚未酬公議寧須秉國鈞公身今可贖我分昔尤親先後官曹接卑髙契誼勻上陵行並馬待漏坐聨茵倡和辭盈帙招邀醉洽旬看花常入夜玩月或侵晨送我清風埭期公震澤濱疏聞心獨苦書至澤猶新豈謂終天别空含兩地辛玉亭盟已散板屋迹俱陳盛德難為繪髙風不可泯儒林誰作傳誰刻隴頭珉過子畏别業十月心齋戒未開偷間先訪戴逵來清溪詰曲頻回棹矮屋空明淺送杯生計城東三畝菜吟懷墻角一株梅棟梁榱桷都收盡此地何緣有佚材送尤宗陽進士之京南宫昔日謬持衡叶筆勢曽驚古戰場今日林間還送别九霄一鶚看南翔吳中世德紀延之喜見春風入彀時莫怪崔公多自説美莊三百在于斯送吳縣簿董仁之任鄞丞自頃權姦偷國柄一時在位貪相競剝民膏血輸權門亷耻掃地寧復存誰知小官之中乃有吳縣簿守法亷平獨如故三年佐縣民愛深視金如土民如金每言吳人窮到骨為此朘削吾何心吳縣簿真難得我欲言之顧非職一朝擢官向寧波嗚呼奈此吳民何豫伏林下睹閭閻之疾苦憫征求之繁多而傷循吏之難得也每以為恨癸酉六月客有過豫盛稱海虞胡令之政者為賦詩有客談胡令炎歊座上清吳儂咸感德漢吏不求名正自催科拙無如折獄平懷哉不可借送子若為情贈錢元抑詩裏休誇五字城一生文字學西京馬蹄蹀躞東風裏踏遍燕南幾十程天平范氏墳衰年不減登臨興福地靈山搜欲罄城西諸峯吾所嘉就中尤愛天平勝亭亭一蓋荷蒼冥儼若端人人自敬獅山奔伏象山回支硎秦臺皆退聽橫山當面橫作屛背湧蓮花互相映林林萬石相拄撑倚插斗天欹不定蹲如虎豹奮攫噬鶱如鵬鯨恣豪橫勇如武士力贔屓秀如女子色娟靚我來敬拜太史墳松柏隂森趨一徑忽瞻萬笏森向天真氣噴薄凛猶徑乃思范公立朝時正色危言拄邪佞兹山固合生兹人嵩嶽降賢尼孕聖吳山第一稱天平宋家第一稱文正髙風千古允作合仰止巖巖續前咏與謝憲副德溫逰陽山箭缺至半山寺而止因賦此箭缺攙天知幾重半山聊復憩吾慵孤臣何處埋幽憤夫差殺公孫勝于此髙閣間來坐晏舂深院潺湲鳴剖竹懸崖矹硉偃長松回船又過楓橋去臥聽寒山寺裏鐘喜玄敬少卿致仕似我歸來亦未遲夫君得謝又先之清朝况是懸髙位白社多緣赴夙期到處溪山同載酒故園風物儘裁詩一場好夢今朝覺却任旁人道是癡四月九日與弟秉之進之過通安橋顧氏莊因偕玄敬登陽山絶頂陽山髙哉幾千丈箭缺遙瞻在天上一朝置我箭缺旁坐覺諸山皆退讓太湖汀瀅平于杯夫椒包山近相望山腰鳥道何盤盤十步九折行且嘆昌黎正逄衡嶽霽太白休歌蜀道難夫差悔悟苦不早公孫白骨纒芳草子胥伯嚭兩丘墟天地茫茫人易老劃然長嘯來悲風一杯敬酹浮丘公何時借我緑玉杖從此拄過扶桑東詩成西日下山去回視山椒但煙霧次韻沈方伯良臣為豫七十之夀沈與豫同生于庚午又同在郡今同致仕黃髮歸來共理田食貧終不羡逢年泮宫燈火憐相並祕閣功名愧獨先紅藥花翻分陜路白鷗沙占太湖邊年來太極當吳分莫怪鄉人擬二仙贈葉巡按忠鄱陽漏網觸奔鯨南國烽煙徹夜明江上貔貅雄逺戍浙西士女賴長城鑄山久訝吳王濞斷􅀈誰憐郭子橫見説臺端峻風采草間狐兔不須驚送王守會試雙珠出南國光耀珊瑚枝一入天府選一嗟滄海遺連城總無價韞匱亦有時雁行先後耳去去勿復疑送毛百朋之北京應舉幾年白下避車塵此去爭誇脫穎新桂子已傳蟾府種杏花還醉曲江春題名早覺光生里捧檄懸知喜為親八月南來鴻雁便音書寄我莫嫌頻送大行人柯君使畢還閩中省親豫竊伏草野無復當世之望忽承九重遣使銜命下賁丘園此三代養老引年之盛禮也斯禮也不見于天下久矣顧豫何人而際其盛君使既竣便道歸拜太夫人于堂感激之餘無以為報因賦詩贈之天王出震萬方新草莽還能念老臣誥賜紫泥銜鳯觜服裁文綺損魚鱗未嫌五馬歸朝趣且喜雙魚入饌頻衰病自憐無補報寸忠還仗達楓宸送盛斯徵都憲巡撫江南鴻都兵後望來蘇江左來旬此大夫入夜災星方退舍訖明甘雨又隨車風稜舊仰搴帷外河潤新傳視篆初文肅家聲真不負尚能把筆為君書奉送都堂韓公南征皇甫信秉鉞出神京麾旄動太白百蠻烽火生五嶺兵戈積遐荒屬聖慮始計降邊䇿揚舲盡炎海耀德敷周澤塗塈被文命力耕易袵革禽聲悅山溪草色榮江磧疆場無重憂銘彞有𢎞績歸來笑伏波何為久勞役奉送三原王公徵拜冢宰二首矯矯人中龍飛躍當明時邦楨視羽翰隆棟帝所師三宣既邁臯一德乃同伊濟物性所任𢎞化及餘遺譬彼青陽發萬象含其輝秉鞭妙經綸赫赫康世夷垂紳佑隆理導主居無為皇明闢昌運宿德登要津寰區滌洪爐化理成陶鈞久膺濟川任具瞻在斯民論道展調燮申章極敷陳鄙薄值眷顧魚目謬承珍臨岐不能别惻惻傷我神清宵動飛眺仰首惟北辰病起登道山亭杖藜扶我上幽亭萬物經心感慨生城郭巳非吳越事江山不改古今情雨餘碧草連天色風送黃鸝隔樹聲眺罷忽驚歸去晚馬蹄催趂月華明和仲山東吳懷古圖伯人亡不紀年荒臺寂寂草含煙錦帆想像寒涇上響屧虛無野寺邊水漲石池涵寶劍雨銷香徑落金鈿故城斜抱忠臣廟夜夜流光燭上天楊柳枝詞五首過吳王故宫作憶昔長條更短條漫將春色試多嬌齊雲樓上三千寵也向東風學舞腰青絲裊裊拂輕塵翠輦曽經此問津一自闔閭埋虎後淡煙疏雨幾番春金色含煙拂畫橋曽隨輕吹舞宫腰只今道上無人問惟有寒鴉伴寂寥八千歌舞棹闌洲翠拂雲鬟金鳯頭人面只今何處去淡煙深樹亂鶯流千古豪華事巳休暗風斜雨幾春秋惟應煬帝宫前種同帶吳王一片愁簡啓南老去相如苦病纒絳紗籠燭不成眠故人相近如相逺黃耳空教到石田寄薛朝英與君為别意重重談笑依然夢裏逢此夜病身驚起坐小忩風雨隔林鐘送濟之多少交遊君最親明朝又欲與君分澘然灑淚西風裏不為悲秋祗為君吳江懷舊舟次吳江重感傷吳江江上樹蒼蒼夜深獨有娟娟月曽照山人舊草堂和答緝熙先生新詩裁寄故人收句有金聲墨欲流為想撚鬚安字處一天涼月坐髙樓逆旅京華嵗月深枕邊愁聽搗寒砧不知閶闔城頭客亦有砧聲搗客心長劍隨身客異鄉留連詩酒易星霜舊時門下多桃李還傍春風數仭墻送文宗儒太僕還南寺李東陽豐山東面琅邪北官寺臨山枕溪側泉甘石冷花樹香幻出春花與秋色東吳才子洋州裔情比琅邪長數尺錦囊繡句壓騷人玉麈雄談驚座客誰令散地容渠懶儘有餘才供世劇十年溷迹走風塵三載髙飛未云極問君何曹似是馬丞不負君人自惜知君自抱憂國心豈為承平倦芻櫪南方一匹纍數金方且按圖為驥索州官縣吏盡日輸營下老兵曽未識書生經濟須實用誰為吾民苦區畫聞君獻納有嘉言肯避旁人嗔越職朝聞吏部書上考耻以徵催買資格嗟豫竊祿今無能誤向雲霄問泉石寄馬抑之同年馬號清癡又號華髮山人養病居蘇州不見山人又幾時浮雲流水杳難期頭顱自白非因老心事全清却未癡賀監有船多載酒浪仙無寺不題詩祗因間却經綸手獨向空江把釣絲韓都憲公雍挽詩早騎驄馬出烏臺萬里風雲亦壯哉嶺海威名天下重廟廊謨算古人才寧知晚節終泉石豈合英魂閟草萊京國少年思識面楚歌聲斷使人哀長洲朱氏孝門銘并序長洲朱孝子皓字景南父病癰親為吮滌父喪當盛暑負土成墳哀痛摧裂致有馴烏之異有司上其事詔旌為孝行之門參政祝惟清有傳其孫存理上京師因豫友吳吏部原博以請于豫比去吳公為速豫不置存理素不豫識嘗訪豫族祖雲陽府君遺文手録見寄豫感其義且重吳請作孝門銘以遺之銘曰惟周舊都有宅有表匪徒美觀惟善是寶惟六行有教其先在孝有屋可封仁厚之效惟今南畿實古豐鎬其孝伊何粵有遺老生有致養死有遺報哀感行路信及禽鳥匪人則然驗彼天道孝門煌煌天子有詔其德孔耀惟後人是效井井亭銘有序蘇之天平山白雲泉世傳為吳中第一水山半有井味極清冽蓋其支派也井舊有亭嵗既久亭井俱廢𢎞治庚申封翰林編修吳君仲恆命工治井且伐石為亭于是過者遊者渴可飲倦可憩皆享君之利不厭也南京工部侍郎徐公甫名其亭曰井井君既卒葬于山麓其子編修一鵬請豫銘刻之亭中銘曰有山出雲為雨于天其在地也則為井泉鑿而泓之于山之根不滓而雜不淤而渾仰涵星辰俯鑑毫髮維泉之飲用之不竭有闌護之有亭覆之維名隆隆井實受之嵗久泉湮亭亦云陊有惠封君曰是在我浚深發洪否極終通上為帡幪外廊中空滌煩救暍仁者之功凡厥往來載罌載綆既庇其險亦酌其泂錫名孔嘉義取諸井君之去矣逝者如斯郡守之助鄉人之思有子斯才澤道以施為江為河奚井之為維家有堂維國有楨為棟為梁矧惟彼亭來者朂哉視我兹銘贈徐禎卿李夢陽獨處忽不懌攬衣循東廂樹木何修修春風起飄揚我友駕在門告言適江湘倉皇挈玉壺迢遙臨河陽顧瞻兩飛鳬並戲水中央翩翩厲羽翮鳴聲一何長奈何遊客子一别永相望時澤亮有周天命固有常薄終義所劣别離庸詎傷懿彼回路贈慷慨申此章姑蘇臺送李推官士允少年何官騎白馬秋日經過古臺下回瞻逺慮意戚促下馬行歌淚盈把猗嗟築此誰為臺千年棄土猶崔嵬屧廊館娃瓦礫積美人白骨生青苔枯蒿蟲吟莽颯颯飛雲呌雁雙徘徊當時金屋玉起樓豈謂臺成麝鹿遊寶鈿黃金裹瑟瑟雨時濯出樵人收李生豪士扶風儔悲歌久抱留連憂世家各談日一過獨廢吳越傷春秋復思鴟夷氣益奮怒目每送長濤流抉眼東門事已往兹臺再過君休上日暝煙波湖水深范歸恐有同行槳相逢行贈表永之清晨客叩門投我一書札開緘錦雲爛鏗然玉相戞問客何方來新下黃金臺揚鞭指河洛回斾陵髙崖選珍綴琪草探美收璵瑰路逢赤松子並舉收氛埃道同心乃𡨕神投誼難乖古人重良契豈必聲影偕行行報嘉績貢此明堂材南陽宅訪徐禎卿東閣能留第南人暫亦居琴書遷臥內騎馬到堂除殘樹喧巢鵲微風走壁魚追思秉鈞日冠蓋爛盈閭顧子謫全州楚城悲逺望君去更悠悠十月逢南雁章江况北流寒沙帶宿莽霜月下孤舟明發湘東路應添弔客愁其二蒼梧遺舜迹白雲秋氣愁君得人文地相逢是此州山連夜郎密瘴入桂林收獨有思親淚非緣逐客流寄王子蘇州三十烏臺使投冠竟黑頭田園是故里江海有新舟把酒看鴻舉開忩面虎丘不須慨今古吾伴鹿麋遊其二獨立望南天秋髙月會圓此時一尊酒憶爾隔嬋娟並馬逰燕日孤舟去越年斷腸今萬里心折暮江前其三舊交多鬼録吾子獨仙郎幸自饒強健何心説廟廊稻輸吳郡白橘足洞庭黃飽飯教兒女攤書日溝床聞吳郡黃山人將逰五嶽寄贈昨報三吳客將尋五嶽逰薜蘿應製服春水正宜舟二室雲中峻三花煙外浮住居吾近邇先肯到嵩丘其二天柱峯頭雪蓮花頂畔雲朗吟惟李白獨往更黃昏婚嫁今應畢藜鞋有幸分共躋恆岱遍歸著五逰文别徐子禎卿得江字我愛南州徐孺子明瑶美璧世無雙新從北極看南極便自吳江下楚江日落鷓鴣啼廟口水清斑竹映船忩禰衡王粲皆黃土千載何人復此邦追舊寄徐子憶昔逢君雪滿途遙憐為客向江湖看碑定憶羊開府作賦先投楚大夫日黑魚龍豗夢澤草青麋鹿上姑蘇空揮玉軫思流水不得驊騮見過都寄徐子徐子南逰涉洞庭楚江風浪眼冥冥朅來振玉朝天子忽漫傳書到客心訪戴難移剡溪棹問竒曽過子雲亭煙沙水國催春發楊柳愁邉却盡春哭徐博士二十韻乾坤風色暮江漢哭斯人棘寺翻飛日文園久病身數竒官竟左才大命須貧放浪原違癖羈淹祗為親赤城終羽節璧水暫儒紳雕鶚偏垂翮鯨鯢不縱鱗回殂豈道薄屈憤轉時屯藥石魂能返蛇龍讖亦真楚狂嗟鳯鳥魯叟泣麒麟邂逅京華始風雲氣象新簉鵷陪玉筍倚馬接華茵宅燕南陽月花吟東部春回頭成夙昔開眼漸風塵妻子今誰托文章後益振王喬跨雁鵠傅説化星辰松柏邱墳崛灰沙劍舄陳閶門寒擊甕吳水痛沈珍宿草扁舟阻生芻絮酒伸碑非蔡雍愧誄豈仲宣倫獨把延陵劍吞聲淚滿巾寄徐編修縉題詩傳語玉堂賓想像鳴鞭散紫宸玩弄門前金騕裊宛如天上石麒麟徒誇中論流人世實有新詩泣鬼神密勿願先諧大軸漁樵久巳屬間身送程生兼寄姑蘇五嶽黃山人壓枝梅杏纍纍碧照眼櫻桃的的紅舟楫大江無晝夜路岐初夏有西東淹留欲暮林間日行坐惟便竹下風秋水一帆湖海上為傳雙鯉到吳中寄顧台州巾山何似峴山遊雲島長和海色幽定有兒童笑山簡君今孰與鄭台州怪爾分符坐赤城東南遙見海霞生梅開莫寄西來使春到煩求碧玉精贈黃秀才省曽見訪顧璘養痾伏園廬秉耒顧微養藝苑慨荒落賓階緬虛曠黃生大雅流金玉振髙響念我來何遙澄江進吳舫霞裾泛秋塵羽爵洽朝餉披襟神皆融析疑道彌廣繾綣淹旬留契合終古賞臨岐重解携佇立增惋悵答徐昌榖博士前年共飲燕京酒髙樓雪花三尺厚酣歌徹夜驚四鄰世事浮沈果何有一為法吏少書來心結愁雲慘不開昨傳學省移新籍坐嘯空齋日幾回劍池歌送李司法赴蘇州干將乃是金天精爪髮墮爐神劍成龜文縵理踴髙價駿馬千騎三都城盤魚騰光壯士死闔閭耻作吳公子鳬雁長埋白虎峰蛟龍竟化寒池水池水泠泠百丈深春花覆水紅香沈池頭歌舞日歡賞地下誰識君王心君王已去河山改千年符竹紛光彩畫戟紅旌綺句飛章白風流至今在使君才俊傾梁園登朝執法臨吳門秦鏡光明照人膽漢網踈濶流餘恩青春多暇應出逰劍池正對齊雲樓不厭橋東老居士時來散髮共扁舟寄吳縣楊尹滿目循良事賢侯即古人彈琴變民俗飛舄出風塵棠樹千家頌桃花百嵗春枳栖難久滯天上待持鈞宴守溪相國園亭黃閣辭榮早丹丘托興遙蓉池窺海島芝館踏煙霄臥處蒼生望憂餘素髮飄當筵心盡醉秋爽詎能銷其二窈窕平泉宅清華獨樂園煙霞深晚景花竹靄春溫招隱臨叢桂懷仙倚洞門自慚塵土質聊爾奉琴尊陸子潛子逺携酒過宿贈一首二陸吾邦彥携壺問草亭醇醪雨中醉寒燭夜深青寶氣騰雙璧人倫贍六經坐餘玄論洽傾耳為君聽答徐昌榖博士舊愛張廷尉今知鄭廣文髙情疏法網麗藻播詞芬臺省爾何戀交情殊有聞南樓望明月一倍惜離羣吳門懷古南眺荒原思惘然闔閭城古淡蒼煙吳宫已沒彈絲處胥渚猶傷賜劍年渺渺晴湖浮逺岫萋萋春草下平田長洲廢苑那堪問落日祗餘麋鹿眠答徐昌榖十年書札阻交親忽枉篇章轉愧人何日行臺堪倒屣殊方離恨久傷神楊雄總畏才難敵王翰還要晚共鄰肺病一春拋酒盞問竒虛負故園春臥病寄錢元抑潘嶽愁多病不禁南樓髙枕獨長吟懷人更度西風節望逺徒傷故國心芳草捲簾空暮色亂山回首正秋隂遙憐積雨凋新稼嵗計應資賣賦金逰故相守溪公園亭見中舍君新栽花木丞相園亭舊數來平泉花木後重栽武陵桃苑逶迤轉太華蓮峯綽約開月出衆賓俱酩酊雲移髙閣更徘徊門墻惠澤思無盡踏遍三槐樹下苔文徵仲翰苑約遊西湖不至次韻奉嘲懷君不見動經年有約猶慳訪戴船草閣自含懸榻愧蓮舟終少聽歌緣徒聞避俗稱髙士未必尋幽損大賢落日依闌空佇立海山千點淡蒼煙送客歸吳草際日華淡水邊雲意間翩翩五陵客騎馬入秋山贈文徵仲志士厲清節夫君狷者流舉足惟大道邪徑焉肯由田仁甫弱冠却賻矜清修元城寡內欲亦自既壯秋掩面過行女閉門拒王侯天然氷玉操不與思慮謀師資吾黨少少長咸低頭五車聚腹笥發咏崇溫柔鮮雲淡華澤美玉辭雕鎪待詔入金馬玩世存薄遊脫冠挂神武遂返蓴鱸舟頥神擊罄室放歌埋劍丘掉筆弄圖畫盡掩松雪儔乃驚鐡石腸遺韻仍綢繆伯陽信龍物變化不可求贈蔡九逵文章有神秀譬彼造物宰變發雲霞章煥為日星采自非研精人妙解詎能逮糟粕莽成苴瘡疣祗增痗蔡君事鑽攻搦管四十載攀危屢登天會極已歸海謂兹耀爛間乃有黯者在玄珠得罔象至味失鼎鼐翻然恣揮灑塗轍忽爾改天機互奔湊神化絶需待有靈驅萬象無色備五采遂使郊島徒總獲刻薄罪蹇豫離羣久索居亦荒猥日誦林屋編充然慰飢餒贈蘇州節推陳君天祐赴任星文髙執法地望切專城司馬家風峻王畿宦籍榮吳都包海濶震澤際天清此去懸霜月偏臨萬户明江南樂八首代內作徐禎卿生長在江南不愛江北往家在閶門西門垂雙桞樹陽春二月時桃李花參差寄言諸姊妹莫遣惡風吹還鄉信自樂望近轉於邑阿母見兒歸定自持儂泣野鳬生雛時乃在河沚中可憐生羽翼各自戀菰叢橘生江上洲過江化為枳情性本非殊風土不相似人言江南薄江南信自樂采桑作蠶絲羅綺任儂著與郎計水程三月定到家庭中赤芍藥爛漫齊著花江南道里長荆襄在何處聞郎昨夜語五月瀟湘去贈錢元抑題小像錢郎毛髮鬈且䰄秀骨插鬢蒼崖開驊騮黯黯有竒氣一蹴萬里空長埃今之畫工不可數畫馬無過曽韓武吳生落魄筆有神不求貌馬求貌人英物由來豈殊相麟鳯聖賢俱絶倫却恨丹青損真趣獨事玄毫拂紈素生象蠕蠕指間出大巧無乃遭神怒故人三歲不相見開圖忽訝錢郎面小兒八歲快目睛問之嘻然呼姓名嗚呼畫馬雖工只畫形風雲道路俱冥冥豈知錢郎貌如此馮馮大腹儲滄溟髙蹄昔蹶未可輕今日近前凡馬驚吳江之湄浙之涘我行于南從此始掉頭不見眼中人寂莫行歌向湘水王敬止御史始竄海南繼移永嘉今自燕中迎其親就養朱崖昔長竄連州始量移借問東甌土何如南海湄霞標建台嶽桃源帶武夷雁山榮桂樹象浦合珠漪玉氊非一族海錯被珍竒金盤湛碧露酒名黃柑滿緑枝歡此三春日復愜暮秋時鳴琴坐髙館撫景幸華池迎輿侍潘令進酒舞萊兒顧以今時笑還愴昔朝離豐澤亨雷雨瑶草變芳蕤永嘉多懋宰建德易絃絲昔慕文翁化文宗儒昔宰永嘉有聲今蒙葉尹慈長沙非逺謫宣室契前思光華冀一接胡越詎能追河東欲有獻及此汾隂祠答顧郎中華玉昔居長安西今居長安北蓬門臥病秋潦繁十日不出生荆棘牽泥匍匐入學宫馬瘦翻愁足無力慵疏頗被諸生譏虛名何用時人識京師賣文賤于土飢腸不救虀鹽食去年作吏在法曹月俸送官空署職牀頭一甕不滿儲囊裏無錢作估值歸來困頓不得醉兒女荒涼婦歎息今年調官去懊惱苦笑先生祿太嗇釡中粟少作糜薄白碗盛來映膚色丈夫但免溝壑辱日飲藜藿勝羊肉平生富貴亦何有羸軀幸自弛耕牧但願時豐民物安官府清亷盜賊伏人人鼓腹厭粱菽先生雖病甘苜蓿一朝雷雨濯亨衢坐中諸公執中軸先生翛然卷懷退茆齋歸向南山卜登半塘寺閣夙有山水慕苦為形役拘淡兹夏日永聊得狎浮圖攀雲凌廣閣靄靄見吳都諸川散林上平野鬱芬敷法花垂縹眇晴采動虛無煙火下方雜昏明時態殊境起自生樂疲心忽重蘇因傷人世子擾擾即長途秋日過故尚書吳公池館平泉舊時里秋日水亭開苑樹澗隂合魚梁山照來野人臨逸釣公子進新醅興盡何須謝垂鞭醉即回其二不見尚書履階隂空緑苔菊花三徑在棗熟衆禽來迹為憐幽駐圖因好事開秋風懸劍處落日首重回送友人還吳陽月隨陽鳥遙從塞上來北人江北望不見隴頭梅坐下楊朱淚吟為莊舄哀聊傳數行札千里送君回送盛斯徴赴長沙昔愁越嶲千峯仄轉入巴渝萬里賒豈料聖恩憐賈誼猶煩佐郡出長沙蠻中瘴逺三湘水江畔春逢十月花遙聽嶽陽樓上笛可能回首憶京華唐生將卜築桃花之塢謀家無資貽書見讓寄此以解嘲豫昔攀白日虹霓干紫庭浮沈帝座側無人知歲星側侍公車無所歡聊騎天馬出長安南下蒼江浮七澤還携謝客弄波瀾青霓中開秀廬嶽瀑布灑入千峯寒冥冥仙氣貫南斗直欲凌身燒大丹回裾西拂巫山浦浩蕩歡心間雲雨歸來欲奏楚王書漢主上林方好武黃金不遇心自吁白璧無媒翻見侮昨日結交燕少年酣歌擊築市中眠正逢天子失顔色奪俸經時無酒錢入門百結鷫鸘盡笑立文君明鏡前却思舊日髙陽侣黃公酒壚何處邉天下綈袍誰不憐郤卿未具山中槖何人為買剡溪田唐伯虎真俠客十年與爾青雲交傾心置腹無所惜擊我劍拂君纓請歌鸚鵡篇為奏朱絲繩胡為擾擾蒼蠅之惡聲我今蹭蹬尚如此嗟爾悠悠世上名寄華玉去嵗君為薊門客燕山雪暗秦雲白馬上相逢脫紫貂朝回沽酒城南陌燕山此日雪紛紛祗見秦雲不見君高天白雁南飛盡千里相思那得聞寄子容芳月髙堂晏辭君楚水逰那知臨嵗晚猶此對滄洲津暖空雲度江明霽雪浮新詩仍自惜何以慰離憂登吳城晚眺墟市依依半夕陽憑君指點説興亡河山滿眼孤臣恨天地愁人傀儡場野鹿繞臺煙沒草城烏啼夜月含霜繁華總識豐年樂猶自臨風涕兩行過故宫六首即偽周遺址自畏時譏掩口吟文章曽説築黃金江山不作千年計枉費英雄萬里心城外旌旗蔽日塵賓筵歌酒自逡巡小兒未有平淮捷慚愧圍碁晉室臣士誠建賓筵館延名士鄭元祐輩遊戲文墨國城臨破猶揮灑不輟誰使宫城坐陸沈倉庾食盡亦難禁綺羅一把咸陽火猶是豪雄慷慨心時圍久城中食盡李司徒伯升使人輸情于王師于是大將軍徐達引軍破城入先是士誠與妻約曰設事不濟輒聚宫自焚士誠見縛即使人縱火人盡焚死擾擾干戈誰解紛吾能談笑却三軍江山贏盡將何用銷得荒郊數尺墳感慨當時壯士心不圖行客一沾襟千年劉項元同死垓下何須嘆楚音木葉蕭蕭朝市平空教才子賦蕪城百年銷盡繁華夢唯有寒蛩泣月明次韻石田登姑蘇臺墟城帶山色感慨幾經遊路暗牛羊夕臺空蔓草秋忠何辭佞死國竟與恩休忍説干戈事銷魂萬古愁再咏秋風古城曲落日送清哀吳越今如此忠讒安在哉江流背寒郭山色弔荒臺不見懸門眥空餘血濺苔其二危樓何代譙晚日倚岑寥多病仍傷古悲歌獨聽樵恨緘花下骨怒想月中潮忠魄憑誰吊臨風誦楚騷其三孤城猶突兀往事已茫然青草干戈後荒祠豕鹿前雲遮雙目恨山接五湖船零落爭蝸夢興亡共可憐其四危機豈在明釁釀巳深成劍石真吳寇娃宫有越兵奢淫亡自取孤憤死難平愁殺城南樹昏鴉未息爭遊資慶寺啼禽聲斷野花疏一徑桑麻到淨居松偃重門分兩院竹開别徑有精廬茶炊竈火薪銜鶴飯洗雲波鉢繞魚慚示山僧塵土面靈珠何日拔泥淤歸自松陵十里風帆日未斜江城春晚見桃花深深門巷無人過燕子還隨客到家上林郡侯思銘寶册軒墀親付託句吳土宇古提封腰間左佩緋魚貴户外分排畫戟重漢牧循良無峻法唐租平緩不傷農甘棠今日稱慈父驄馬當年號鐡容奏牘匡時多苦樂文章勝敵有偏鋒暫成逺郡三秋滯堪禦長城萬里衝報捷薦書驚擾擾願遲仁澤慰喁喁相逢舊齒曽聞説要與君王少借龔贈唐居士間居嗒嗒醉嗚嗚轉覺微情與世疏貧剩毹氈猶養鹿伯虎時畜一鹿病拋魚肉久甘蔬一龕碧火蒲圑夜十畝黃柑酒瓿車此事若成須報我莵裘隨分著吾廬懷邢處士參梨花分月一枝明吟著君詩繞樹行聞説里門多下馬若為人世可逃名寂寥風雨眠僧舍談笑杯盤餟豆羮數畝山田是吾志與君終嵗飯香粳讀劉秀才詩秀才名嘉胤字協中夙有文才與余未及見而卒雪白劉郎縞絹裙難將湯餅驗傳聞凄涼絶筆登樓咏協中嘗題唐伯虎樓壁云云是後遂病卒流落誰家弔墓文又有弔范墓文一篇蓋悼宋臣范成大也今無可訪半世苦心惟此在百年評口欲何云寺門秋葉寒相擁下馬曽看陌上墳懷伯虎寒忩燈火張生夢京洛風塵季子金兩地相思各明月關山書尺幾銷沈寄朱隱君性甫自笑千金惜已捐陶然知命且隨緣暌疏故舊家家酒狼籍圖書處處船布被夜寒孫抱足柴門雪滿客無氊陸遊草草真成放千首新詩六十年簡伯虎麻紙功名笑浪傳如今袖裏了塵緣交朋零落看書札花月蕭條問酒錢數里青山騎犢醉一牀黃葉擁秋眠心期兀兀成幽病誰與髙人辦草㕓寄楊儀曹君謙古道重看薦士篇粳粃合在簸揚前絫絫貧賤遭人唾草草心懷難紙傳四海贈襦誰謝眺百年酹酒感楊玄清才江左今無數試一題詩孰後先過故宫二首那有文章充上賓會稽頭白老絫臣當時揮灑臨歌處空使冥冥仰絶塵士誠慕楊維禎之名嘗欲客之楊于席上賦詩江南嵗嵗烽煙起塞北年年御酒來如此烽煙如此酒老夫懷抱幾時開竟不能屈合眼左車難論勇百年心事本相同殿前怒賜丁公死始識規模漢祖雄士誠見太祖瞑日膝坐太祖即命斬李伯升以示士誠長至日重拜文溫州畫像平生袍笏宛如存蕭瑟登堂破淚䀶尹父共憐中洛夭漢阡何處百年魂江山易起英雄恨談笑難酬國士恩寥落一編遺事在公仲子徴明失溫州遺事一卷幾回摩撫掩黃昏吳都文粹續集卷五十二
