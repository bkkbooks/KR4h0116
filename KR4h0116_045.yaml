body:
  text: 呉都文粹續集巻四十五明錢榖撰墳墓太子中舎致仕范府君銘范仲淹府君諱仲温字伯玉四代祖諱某幽州人也唐末為處州麗水縣丞中原亂離遂家於蘇臺曾祖某事錢氏為中呉軍節度判官贈太保祖諱某以神童補官終於秘書監贈太傅考諱某歸皇朝厯眞定府武信軍掌書記贈太師兼中書令府君即太師仲子也生於京師幼孤還蘇臺與諸從兄弟居服勤素業孝悌於門中景祐二年以某遇乾元節恩例補試將作監主簿赴調除越州新昌尉以誠接物民用知勸在邑三年盜不及境外計舉監杭州餘杭縣市征能寛其利商旅便之三載以績聞按察使洎牧守咸有表薦除海寧軍節度推官知台州黄巖縣慶厯七年海潮大至壞州城人皆逃散沒溺者甚衆府君教民為桴晝夜救之全活數千人既而上官知其所存請發衆以治城府君雅喜利人長於慮事衆議築土為城用甓以傅之府君獨不然謂人築且勞又捍水之衝甓何能久乃集民累土以牛數百蹂之堅而後增至于成復表以長石互相銜枕勢莫得動其城八門皆設之閘遇水暴至則障之衆服其善台人遂安時又嵗饑州命邑官率富人出榖俾輕其價以救窮民窮民乏資無以得榖府君諭之曰汝糴之十不若與之二三則富人易辦而貧人易及衆皆恱從飢者獲濟焉永嘉郡禁盜十四人獄具皆當極法外臺請府君慮問府君原盜之情而重其行法固請覆奏朝廷悉恕其死黄巖大邑民數萬户訟爭盈庭府君専尚仁愛多以理遣至有犯徒刑而非巨蠧者府君必為解其仇訟而決平之民自愛服制置按察使交章薦之府君秩滿還家與鄉舊逰曰吾樂矣何用官為遂請老朝廷嘉之遷太子中舎致仕皇祐初某來守錢塘與府君議置上田十頃於里中以嵗給宗族雖至貧者不復有寒餒乏貧之憂府君退居四年賔親盈門以東皋所入日為雞黍之具故貧而常樂顧隣里鄉黨有急難則竭力以濟之皇祐二年九月十三日以疾不起享年六十有六中外宗親莫不過哀里人無老少皆涕下其遺愛感人如是之深娶丁氏夫人男五人長曰純義守將作監主簿四子尚㓜女四人長適進士李洽次適進士沈充二女在室以其年十一月十三日𦵏于吳縣天平山三譲原嗟夫某從事四方與府君別動逾千里及餘杭得請一獲其願相㑹未㡬而有死生之訣泣血灑毫不能成文銘曰烏呼先公五子其三早亾惟兄與我為家棟梁兄又逝焉我獨徨徨諸稚在前未知否臧我其教之俾從義方積善不誣厥後其昌范仲温中舎墓在天平山三讓原宋故左朝請大夫章公墓志銘孫覿建安章氏自郇公以文學道徳仕仁宗為宰執聲號顯融族大以蕃異人軰出事五朝踵相躡為將相寵禄光大為世間人宋初徙平江者尤稱於天下大丞相申公家州南樞密秦公家州北两第屹然輪奐相望為一州之甲吳人號南北章以別之秦公生七子多知名公第三子諱綡字子上為北章氏通亮英敏有大志讀書不治章句屬文辭典麗有古風秦公任子次及公公推與其弟而束書詣太學受業食淡攻苦窮日夜不息然後挾所有從諸生校於有司元祐二年試國子監中第一遂拔其科學者尊其文傳誦以為法調河南府洛陽縣主簿范忠宣公尹洛一見待以國士賔禮奬薦僚吏莫敢望於是故相韓公汝玉中書侍郎范公子功李公邦直皆以文行薦於朝就除京兆府府學教授秦公帥涇原奏充主管機宜文字用舉者改宣德郎太上皇即位推㤙遷奉議郎通判鎮戎軍秦公治兵號名將守邉四年城两州築九砦生致两大酋斥地數千里威名隠然戎人出塞逺遁將吏極一時之選後多為顯人而幕府簿尺籍伍符檄書請奏皆自公手出秦公薨太上皇臨其䘮敕中貴人録嘗為機宜者姓名以進免䘮召對上顧而喜曰名臣子是嘗佐其父者他日謀帥無以易卿也除秘書省校書郎居亡何以為陜西路轉運判官㑹五路漕臣分總邉計而公適當秦公舊治手疏便宜數十條鉤考財用出入之要窒奸偷罷不急以紓縣官餽挽之費皆有法書上而宰相方除不附己者召公還言者隨攻之出知湖州言者不已差主管西京崇福宫未幾公弟綖以飛語聞而章氏一網盡矣崇寧中蔡京用事久權震中外彗出竟天上感悟免就第凡京所建為天下害趣中書亟罷之中書侍郎劉公秦公壻也京懐之未發它日京復用諷御史誣奏綖盜鑄為奸利以併中逵於是詔開封尹李孝壽即吳中署獄連逮千餘人敕州縣發卒䕶送鉦鼔之聲連晝夜不息捕繫累月痩死數百人考騐無所得京怒逐孝夀以嘗建言御史蕭服沈錡代徃獄益急卒不騐又逐御史更用孫傑必煆鍊如章乃止綖坐是除籍為民徙海上兄弟皆坐非法得罪公又免官覊台州嵗餘上辨其誣罷者皆復復公故官通判秀州實大觀三年也已而又坐陜西漕事奪三官公移書當路詆京曰朋黨交舉相謂伊周謇直不平斥為莽卓天下聞而壯之四年復召為校書郎遷倉部貟外郎再遷起居舍人宰相張商英言蔡京紹復熈寕元豐法度率矯誣為奸罔非先帝本意建請置局號皇宋政典擇近官范鏜劉拯纂集為書黜其妄詔公為編修官御府出筆墨端溪研以賜後嘗奏事上追懐秦公且問秦國夫人起居状公頓首言臣等幸因先臣蒙記識不幸屢遭讒慝以見困躓負先臣餘教㓜弟縯臣母憐之未嘗一日相舍中被誣陷屏伏田里母子無聊陛下幸哀憐孤老舐犢之愛加惠縯等復還仕籍臣昧死自言罪萬死上為動容即日詔復縯官而公終無一言自及秦國遇疾移告馳省而蔡京復相同列有徼進者逢京之怒又中公以危語㑹遭秦國䘮䘮除吏部直注岷州長道縣而公亦病矣以政和四年守本官致仕逾年病間即舍旁營一堂號羙䕃聚書萬巻凡國子中秘所有皆具集今古石刻千巻編秦公遺文四十巻奏議三十巻奏議者涇原山川要害行師制勝營陣出入之法公以類分巻每一事為序文識篇首可備一覧而不果上有所感遇則為歌詩音節平緩無戚嗟流落不偶之嘆八年落致仕以朝散郎知觧州轉朝請郎朝奉大夫宣和二年選部使者去為均州提舉两浙常平未至改提㸃刑獄遷朝散大夫妖人方臘稱亂東南新蹂於兵詔升越州為安撫進公直龍圗閣知越州兼管浙東安撫司公事公樂職嗜事所莅有名迹束縛奸吏重足而立愛養百姓則惟恐後解州之神霄宫成廉訪使者劉愇病其隘有改築之意公曰吾民不可以重困即擇日齋戒設壇塲臺官屬行事祠下㑹其徒入居之事訖驛聞愇意亦已房陵婦人越所部訴其子於均公謝曰房非吾治也又訴於轉運使以屬公公召詣庭下不以屬吏諷諭開曉母子感悔再拜稱謝而去秀州嘉興富人髙安與陳氏有故怨間方臘之亂誣之為盜聚羣惡操兵入其室盡殪之以捕盜徼賞平江長洲陸氏怙富横閭里殺人應捕輒求吏執平人代已公一閲盡得其情狀取二人寘諸法衆驩以為神明越新去亂人情危懼日三四驚旁郡守將徃徃益兵自衛公至則延問吏民燕集賔佐如平時於是勇敢卒謀變公飭將吏指取無一人脱者一府大震左丞王安中帥燕山求文武士於幕下欲請公俱宰相以公方撫越人不聼五年中貴人譚楨為宣撫使又請公於上朝廷不能奪除公河東河北燕山府路宣撫使司叅謀官磨勘轉朝請大夫加右文殿修撰賜三品服松亭關戍卒二千人號食粮軍四軍之變遂從奚人破景州楨怒欲盡戮其孥公曰若爾則人不復思漢矣楨悟而止時金人納夏𦍑之請割畀拓䟦故地雲中以北二千餘里遺之止以朔武歸我夏人駸駸向朔州境上楨次河東詔楨發兵討之公言兩國通行嚢槖包藏甚深未可輕動第檄問金人可也而太上皇親筆督戰至八九不已公益持不可曰金人以我納叛渝盟藉為爭端若奉詔出師誤傷金人邉隙一開則齮齕用首事者墳墓矣今困竭天下盡於燕山訖無善後之䇿况議雲中乎退而疏燕雲決不可守之状反復數千言皆社稷安危之決趣楨上之楨讀奏大驚曰安得此不祥之言公曰擇禍莫若輕盍以微罪行乎為楨極論數日楨不得已摭取一二上之書奏楨罷公落職送吏部更命宣撫使童貫出師遂敗績師再出而燕山七郡與朔武皆不守如公言其年㑹㤙上書告老復直龍圗閣致仕七年正月乙未以疾卒于家享年六十有四公少年負所學不由勲閥以文章自奮一出試吏部為范忠宣公所噐天子記姓名禁中以為可備將帥繼秦公後公慨然自任以當世之重而孤立一意衆媚不容將起輒仆遂棄官老扵家宣和末天下多故詔起公再任而大將爭欲引公自助屬時久安軍政大壊而貪功生事之人方欲徒手搏數百萬虎狼之衆以僥倖於一試公於是幡然投劾以歸卒亦無所就命矣夫諸孤以其年葬公臨安縣横谿塘頭隖之原公所自卜也曽祖頻故任尚書刑部郎中侍御史知襍事贈司徒祖訪故任禮賔副使贈太尉父楶故任資政殿學士通議大夫太一宫使贈太師秦國公謚荘敏母秦國太夫人和氏公再娶皆王氏文康公之曽孫元配河南縣君今配太碩人四子男曰蕘曰荷並右朝奉郎曰萊右迪功郎添差監臨安府浙江稅女嫁晋陵孫覿孫男女十七人曰潭曰溍曰澥曰沕曰澮曰淖曰汻曰洋曰曰汭曰洞曰滂曰濛潭溍並右廸功郎汻右將仕郎女適右宣義郎新秀州嘉興縣丞陳文尉進士何顯祖䖏者二人公性剛果胷中無留事與人交明白洞達樂為之盡一言之出終身可復視財如糞土赴人之急不以存亡為觧居官矯矯然見義勇為不計禍福必達其志乃已家無聲伎之奉未嘗一日去書不讀尤尊王氏學著書三十卷醇雅深奥發明經術居多烏乎公之女擇所從而歸覿四年而公歿矣又七年而公之女亦亡又八年而覿銘公之墓公之事可紀者衆矣非搢紳士大夫所共聞者皆不論著故所次止於如此銘曰韡韡章宗維宗巨室秦公有子千夫之特驥墮地走不可係羈籋雲追風一抹萬蹄視天尺五可階而上發論慨然帝悦而向權門衆趨操篲倚旁矯矯介石君子之剛踐艱乗危初終若一方僨而振又以䜛出孰愠孰懟匪神孰尸謂當乗除以訖耄期命也不祥葢棺永已魁名揚厲閲乆愈偉天定勝人徳逺而興蔽芾如林視此孫曽章綡龍圗墓在臨安縣乃吳人也宋故左中奉大夫致仕栁公墓銘紹興六年五月丁亥左中奉大夫德清縣開國男食邑三百户致仕栁公諱瑊字伯玉以疾卒於衢州江山縣之寓舍明年其孤右從事郎滋載其柩歸平江以十二月庚申葬於闔閭門外同涇原上既葬三年左朝散大夫權發遣信州軍州事張公彦狀公爵里行治属余銘以閟諸幽烏乎余故人也遂次其語序而志之而系以銘栁氏自河東節度使綽以功德顯於唐而將相名臣之族多出於京兆唐末子孫散處河岱之間故仍世為魏郡人曽祖灝故任宣德郎累贈通奉大夫自開府公三世皆葬於廬州合肥今又為合肥人公英妙駿發記誦過絶人屬文辭方布帋抒思而數千百言已就與李釡俱馳聲場屋間舉崇寕五年進士第調淄州淄川縣主簿秩滿授蘇州觀察推官知州事盛章去為開封尹而宋康年代為州頗變更章故時約束其僚不悅公者隂譖章以康年所為多公助之章怒愬於上有㫖移公泰州司儀曹事朝廷城四輔徙康年拱州又以公為幹當公事尋差詳定九域圗志所編修官改奉議郎除陜府西路轉運判官故時關陜以觧鹽鈔權鐵錢輕重百賈欣頼芻粮集塞下如山積而縣官無饋師勞民之費自轉運務増收鈔價以為羨餘權貨務漁奪觧鹽之入供京師幣輕貨重商旅不至於是始鑄大錢又更為夾錫宣撫使童貫又創平貨務法益密而物賈日以騰湧公私病之公語貫曰祖宗之法故在公第請於上出片帋行之轉敗為功如反覆手耳不然徒紛紛無益也貫不悦㑹移利州路提㸃刑獄且入對貫始怒旋有㫖送吏部久之授在京西抵當所宣和四年除知濬州河朔盜起洛州不治詔公代之公至則繕治戎噐增浚城隍料兵筭食彌月而辦洛賊張廸者聚黨數萬人掠雞澤進薄城度不可攻遂引去手詔嘉之進公兩官而中貴人陳宥遣小校于演部勝捷兵次雞澤而盜已去輙入青城栅執殺社人數百級以捷聞老幼隨之號呼載道羣噪譙門下公大驚悉歛所納級付其家給棺衾瘞之盡拘羣惡以屬吏勝捷者童貫所部也獄具方上而貫馳騎檄還所𨽻軍籍公曰殺人者死又何待焉即日論殺之貫怒劾公專殺朝廷不得已奪所進兩官自是官軍過州境歛迹無敢犯者有頃公被疾司録事李承勱權州事州兵聞公病唱言倉粟惡逐庾官嗾衆為亂公聞變力疾披衣出譙門坐宣詔亭飭二校率其屬捕殺首亂者而釋其餘已而復卧承勱逢貫之怒以公病不任移書馳告貫而自為功居無幾公黜三官免歸承勱進五官而郡豪納粟賀就者亦進七官莫測其故久之始悟承勱書所薦云是嵗宣和七年也明年復故官當靖康遂告老以朝奉大夫致仕建炎二年詔起公知蔡州稱疾不拜三年落致仕召赴行在又以疾辭差主管台州太平觀紹興元年除福建路提㸃刑獄未赴改兩浙東路尋提舉台州明道觀於是積官至中奉大夫六年感疾又請致仕遂不起享年六十有六公邁爽開濟知世務之要尤長扵議論計一時利害論人物臧否詞辯蜂起聼者竦立居官任職有所施舍問義何如未嘗顧望少貶以求合既屡觸童貫被斥朝廷韙其諒而貫方用事權震天下雖宰相亦憚其威公所至又輙與之遇故終徽宗朝流落不偶命矣夫娶章氏故相申公惇之孫奉議郎持之女封令人恭儉守家法生一男子即滋也監饒州商税務滋㓜時令人手抄孝經語孟授之解悟過人不自標顯年五十六以紹興九年十二月己未卒十年正月甲申祔于中奉公之墓孫男一人曰楙右登仕郎公弟珷家淮陽建炎之亂盜據其城挺身南走歸公公時方上書以郊祀恩任子珷至遂改薦珷今為文林郎徽州軍事判官公好古博雅於傳記無不通達遇古法書圗畫至解衣輟食求之嘗登慈恩寺塔顧見唐進士題名人物風流筆迹竒麗慨然懐想至徘徊其下不能去遂捐槖金命工刻石屬隠士王持第其嵗月釐為十巻書出一時賢士大夫爭得之建炎南渡圗書燔滅公所刻又在長安數千里兵火戰塲中秪今一二尚存者尤為世所寳云銘曰嗚呼世衰道䘮兮閹人用事指鹿為馬兮欺君之不忌謇謇栁公兮孤立一意孰擠之扵險兮又推之扵將墮懐竒負氣兮百不一試埋玉樹於土中兮齎恨永已萬木如茨兮闔門之趾是為公藏兮子孫受祉栁瑊中奉及其子監務滋墓在閶門外同涇内宋故翰林學士莫公墓志銘孫覿紹聖初新宰相用事首按元祐諸臣變更法度和戎棄地之罪生者削籍流竄嶺海死者追貶禁錮子孫不用赦除以示永廢已而蔡京當國盡疏名氏為四等立石朝堂號奸黨碑嗟乎立法本以便民當適變通之宜禦戎本以安邉欲紓戰鬬之禍而權臣修怨建為紹述脅制上下凡議論之臣疆場之吏輙有一言議令便民解仇安邉皆以隂懐異意動揺國是沮壊先烈入元祐黨以故士大夫避䜛畏禍便文自免終蔡京之世二十六年猶有憸佞中傷文致疑似為害紹述而觸大罪者靖康之變金擁騎數萬長驅河朔直犯京闕於時臺諫爭請和戎以偹倉卒不測之難皆斥廢不用而二三狂生抗首大言乗險徼倖起於小吏驟擢將相試之一擲卒至悞國二帝䝉塵中原䧟沒億萬生靈肝腦塗地太上皇狩維揚移蹕臨安國歩阽危至此極矣而進取之士尚循紹述之利終以和戎為諱此翰林莫公所以投閒置散至于老死不用固其理也靖康元年十一月尼瑪哈自河東來頓兵州南青城斡里雅布自河北來頓兵州北劉家寺遣使請淵聖會盟復三關故地時公以翰林學士為館伴又命防禦使髙世賞副公報聘公抵尼瑪哈帳中或折以義理或諭以逆順祻福甚辯凡四反尼瑪哈始改請宰相議和親王割地何㮚以執政宗室代行尼瑪哈大怒不交一談攻圍日急馴致城䧟㮚始遣李若水司馬朴王倫等告知扈淵聖幸青城予三鎮外又割河中府十數州尼瑪哈致酒端誠殿面約土地人民還南宋盡歛城内金銀犒軍而去酒罷淵聖還内而富室大家占吝寳貨莫肯赴國家之急敵中移書皇帝卜日再㑹何㮚入見請行羣臣力爭謂金銀不厭其意故邀天子為質且云卜日設有期㑹尚當辭行人情叵測詎可再乎不聼詰朝淵聖再幸青城有獻計者曰天予弗取反受其咎廢立之議葢啓於此矣於是宰執侍從中貴人衛士悉分置諸寨中外隔絶不相聞逾月張邦昌請馮澥曹輔以下五十餘人公亦在遣中得還邦昌進數從官於政地日詣延和殿後駕玉軒㑹議俟歸師渡河請昭慈太后御簾聼政訪大元帥所在勸進踐天子位外廷無知者五月太上皇自濟州至登至尊六月李綱入相盡按邦昌共事者為偽命入之法除名公自述古殿直學士責授寕江軍節度副使潮州安置建炎三年遇恩北歸議者論徽宗皇帝北遷公與孫傳方欲徼一人之利再徙韶州公既就道妻淑人劉氏詣闕訟寃仍引少保髙世則户部侍郎王侯等十數公為證朝廷下其問騐實如章其年八月得㫖改正自便脱然無事矣而言者終不置也嗚乎噫嘻命矣夫公莫氏諱某字夀朋其先呉興人徙錢塘又徙平江今為平江呉縣人也曽祖延正祖淵左侍禁贈通奉大夫考卞中元祐四年進士甲科以文行為當世大人所噐尤為故相鄭公達夫知樞密院張公賔老所厚歴尚書郎衛尉少卿直秘閣知河中府以公貴贈中奉大夫妣太淑人朱氏公為兒時英妙秀發不類童子誦書日千餘言操筆為文不由師授自中律呂年十八補太學生一年升内舎二年升上舎四年當政和三年大比試廷中徽宗皇帝擢為第一授承事郎越日特奏名士第一人適與公同姓名徽宗曰非其倫也名實混矣命去偏旁名夀比公入謝㑹正奉公以兵部外郎從卿貳奏事殿上上顧見公謂正奉曰儔年少耳草數千言文詞贍麗皆切當世之務遂為諸儒冠卿可謂善教子矣嘉嘆久之授議禮局檢討官四年除秘書省校書郎五年除符寳郎遷起居郎兼國史編修官且召試矣公自以起於書生遭逢千載之遇慷慨感發孤立一意不問權貴人所視天子為知已而大臣懟公不附已移太常少卿臺臣承望風㫖又奏斥公罪為提㸃南京鴻慶宫宣和二年丁正奉公憂憂除除光祿少卿進國子司業六年召試中書舎人賜服三品同修國史公善屬文敏而工先時詞臣草後宮書命莫有中上意者制詞徃徃多自中出徽宗進二婕妤公當制仍命即日進告告入對御輒有詞垣得人之語靖康初除給事中兼侍讀直學士院宰相呉敏伺公入直併下六制欲因是以危公公秉一炬解衣却坐一揮而就醇深典麗各得其體淵聖嘉其敏妙㑹公入對褒譽甚寵除吏部朝士聞之曰宰相以已望人欲擠之而更進可發一大笑也俄拜翰林學士知制誥積官至朝奉大夫爵文安縣開國男食邑三百户未幾國有大故公亦得罪去矣公又曰金人始議置署路允廸允廸不従尼雅滿怒拘留軍中㑹京城父老以張邦昌為請允廸得縱去邦昌既以僭悖誅死而允廸大節宜見褒顯以王黼客遂不録邦昌用呂好問為門下侍郎同時共政者皆坐偽命除名籍竄斥嶺外而好問以蔡攸客本中之父更進尚書右丞相百官合為二状詣軍前乞以土地人民還趙氏如初納御史䑓秦檜為首尚書省誨執禮為首後檜論功誦言於朝位宰相執禮雖已死宜䝉褒贈亦以黼客置不問敵人以刼寨欲覆我軍結于都欲滅我國歸咎淵臣以至廢辱而靖康將相建此議誤社稷者皆以富貴福祿衰榮終始若羣臣偶以一眚挂吏議至終身不齒既以為功功同有不賞者既以為罪罪同有不罰者處白善否一出於愛憎東西黒白變色易位非予一夫之休戚也公兄儗字謙仲孝友過人嘗為勅令所刪定官自公去國亦棄官不仕徙寓華亭築室居焉有女弟適髙氏而寡館之舎傍連遣數夫抵臨川趣公還營一第夾河相望度一梁跨其上以便徃來㓜弟俱宦逰四方代期至則從旁僦舎以俟四人者集處一堂一味之甘未嘗獨享兄先弟從如壎如篪舉熈熈然如是十五年謙仲下世公杜門却掃惟讀傳記著詩文以自娛又十年田園之入不足以卒嵗賔客之奉晨夕之須隨所有無澹然自足未嘗營一毛頭之利弟俱卧疾崑山丞舎公馳小舟冒大暑徃省財過旬公亦遇疾而歸卧起如常日無苦忽一旦自興於榻召家人至前以後事屬其子同畢端坐而逝容貌如生里巷姻族奔走驚呼相望出涕真所謂有以善吾死者是嵗隆興二年七月十五日也享年七十有六有内外制二十四巻四六集十巻真一居士集五十巻辨誣証誤錄一巻藏於家公事親孝心意機微輙逆得之仲弟佋蚤世太淑人哭之過時而悲生子未絶乳而母氏亦改適太淑人鞠飬䕶視至勝衣猶不去側公遇郊恩當任子首以名聞命下太淑人喜甚由是悼念少衰太學與同舍生劉疇善議以從妹歸公方卜日致書幣而公廷唱中首選疇踧縮不敢復議公聞之曰吾親之命有前諾矣今配淑人是也其後淑人詣鼔院上書稱寃名動朝廷公得㫖改正除罪籍還中州殆不偶然也淑人既沒公自為文識其事内之壙中葬湖州長興縣嘉瑞鄊大隖之原生二男子曰初右將仕郎蚤卒曰同能傳父業效張籍哭韓吏部賦詩百韻紀次公行事之實詞句温麗有家法四女適右宣教郎白仲言右文林郎董隣右從仕郎張濤右廸功郎徐瑛孫男曰岐曰道曽孫男女二人其孤同學以其年十二月二十六日合祔于劉淑人之墓公有治命屬予銘銘曰翰林初載文中之虎踽踽羣趨御于帝所奏篇甫上褰旒一覩曰大手筆可配燕許擢冠儒科鵬鶱鵠舉歴井捫參視天尺五獨歩一時聲振海宇亟踐榮路徑躋冊府蟲篆鳥跡汗簡編蒲盡讀平生未見之書入尚符璽廣内寳儲龍文龜畫河洛之圗北門西掖時惟帝俞演綸視草汝言代予思如涌泉沛然莫禦一揮六制噫欠之餘帝悦而嚮將貳政途大厦遽顛一柱莫扶漢厄三七炎正中圯兩地興戎雲擾糜沸將相誤朝天地崩墜一死何逃巢覆卵毁獨屏間處待終而已遇疾不藥但飭後事言笑未卒趺坐而逝死生之變亦已大矣容貌如生不見小異銘以著之欽于世世莫儔學士墓雖不在呉乃呉人故録明故資政大夫南京刑部尚書顧公墓志銘文徴明嘉靖二十四年乙巳閏正月十有八日辛巳南京刑部尚書顧公以疾卒於金陵里第先是公以考績還自京師道聞長子嶼卒驚惋得疾抵家疾甚乆之竟不起嗚呼惜哉公諱璘字華玉別號東橋居士世為蘇之呉縣人國朝洪武中髙祖通以匠作微𨽻工部因占數為上元人曽祖海不仕祖誠以公貴贈資政大夫南京刑部尚書考文號愚逸初封承德郎吏部主事後加贈資政大夫南京刑部尚書祖母陸氏母楊氏俱贈夫人公以應天府學生領𢎞治乙邜鄉薦明年丙辰舉進士庚申授廣平縣知縣甲子徴入為南京吏部騐封司主事進稽勲郎中正德庚午陞河南開封府知府癸酉謫授廣西全州知州丙子起知浙江台州府陞浙江布政使司左叅政嘉靖改元冊立中宫禮成奉表入賀道陞山西按察使以親老辭不允尋以病免庚寅起為江西按察使未行陞浙江右布政使轉左布政使召為都察院右副都御史廵撫山西上書乞終養忤㫖落都御史以布政致仕丁酉再起為都察院右副都御史廵撫湖廣兼賛理軍務己亥陞刑部右侍郎尋改吏部㑹顯陵肇工改工部左侍郎領山陵事進工部尚書事竣還朝改南京刑部尚書公扵是厯任三朝閲五十年厯十九任積階自文林郎厯十有一資為資政大夫正治上卿公融朗濶達精於吏理能激卬任事初莅廣平年甫弱冠或易視之而公關決敏利擿伏若神拊循道利靖而不煩而飾以文學有古循良之風及為開封益更練堅決㑹盜起燕薊流刦中原攻圍城邑所在繹騷兵部尚書彭公澤奉詔疏捕領兵壓境上簡公自輔公亦悉心展措練兵飭甲轉餉傳飱取其呼吸間而解難折衝謀畫居多在郡期年隨事經理多所緒正而彊執不橈鎮守中官廖堂恃逆瑾黨援圉奪自恣公摧抑捍蔽每折其萌芽不令得肆瑾誅廖罷去而錢寧用事羣閹方熾王宏者尤誖謾慄疾繼廖出鎮乗權席寵氣焰讋人一時有司或屈節自容公故不為禮有所徴需一不荅嵗時展謁長揖而已用是積忤宏宏方恃寧為援矯詔逮赴錦衣獄獄吏問狀公據理執誼抗言條對一無所承寧無已遣邏卒隂探郡中無所得乃文致他比以竟其獄獄成鎸三階徙全全即古零陵郡越在嶺嶠僻逺荒陋公不鄙夷其民而翊以文教道化更革誠心拊綏乆之民用乂安而士興於學甫三年而有台州之命台為東南劇郡武衛錯居俗獷而喜訐胥吏並縁其間縱横饕詖更數政不治公至爬疏剔抉求得其弊端與利源所在次第興除之故事武衛諸城郡為修築更費浩穰率為主守者乾沒恒一嵗二築築輙壊公鈎考得所侵漁悉沒入為城費檄義士經理而程督之故他城易堕而台所𨽻三城特完郡瀕海有鹽筴之利貧民業鹽自食苦估𣙜煩苛每迂道轉輸而邏卒乗是為奸利至相賊殺不可止公為弛禁俾得負販出郡下而薄其税入民用便利而國課亦登故時軍餉不時給運軍徃徃稱貸以需而駔儈得肆侵牟公支放有期而勾稽維審軍皆給足而奸民無所牟利矣郡南瀕江卑下多水患地有中津橋且壊公修復之因築石隄而樓其上凡數十楹人初莫喻其㫖已而夏潦水猝至居民得依樓以避所活以千計乃服公先見云公既久於台悉浙中事宜繼以參藩遂得舉而行之雖不及久而宏規碩畫功緒為多及以左轄重臨益諳練宏達而意復周審展采錯事惟志所為而釐革積弊若賦發科讁調補吏胥皆利蠧蟠結前政所不敢問者公排根振蔓絶不少縱而畫一以守要束章程咸正而核吏不得緣以為奸事緒雜襲文牒糾紛隨事剸裁司無留政御史按浙者徃徃袖手無所事事然積不能平乗其解任而躡尋過誤一時雖横被口語而素履明潔望實在人卒亦不能有所汙衊也起撫湖南益事振植湖湘遐曠提封數千里撫臣尊重受計坐理而已公不躡故迹輅車省循徧厯州郡雖偏鄉下鄙莫不臨莅䟦涉險阻蒙犯霜露不少厭却故事廵厯所在必以藩臬守臣自隨公悉謝遣軒車簡易傔從歛約供頓次舎才足周用民按堵不知為勞念荆湖沃衍而流庸堕施地利有所未盡科輸煩擾期㑹迫促民日益貧公私交病故所至勸農振業平繇復税而擿伏省微軌迹夷易民用安集而嵗亦比登在鎮逾年多所建白首言地瘠民貧兵食不足而藩府賦祿無制後繼為難又以湖湘控扼邉徼地大事繁御史按部嵗一更代勢不得周欲乞添差御史分莅湖南北以廣詢謀又言外屬臣僚多有宏才碩望足充任使者比嵗限以藩府戚屬不得内徙此非祖宗舊制乞越例推選以收滯才所言凡數十事皆當時利病深切治理雖不盡施行而論者莫不韙其言云顯陵之作役大事繁經費不貲公既長於料簡而程省弗懈調發有制視他所營率損費十五而功實倍之規制宏偉翬飛赫奕而民不告病有司不以為煩其經理施置有足多者然此特出其緒餘耳非公所用以為才也及是雖典邦刑而留司務簡亦不足以盡其用且鄉里所在父老姻戚不能無望於公而公執志堅定不肯骳骩以徇茍罹於辜必以法䋲之豪植强禦咸不得肆而怨讟興矣言者因得假以為辭肆言醜詆而素所忌嫉之人從而醖醸之公雖内省不媿而不勝浸淫之辱竟鬱鬱以歿嗚呼公論不明是非失實使瓌竒卓越之才不獲究於明盛之世必有執其咎者君子固有竢於百世之下也然則公復奚憾哉公素長者不虞人詆欺而直諒自信不肯脂韋干譽出入中外垂五十年一時新進多非曹耦公既前輩自處論議之間陵轢奮迅侃侃自將每下視諸人人多不能堪徃徃傍睨切齒而公不知也其得謗受禍殆亦以此平居事親孝愚逸公病疽公時已五十餘與同卧起吮濯扶掖舉身親之肉血淋漓十指皆潰曽不肯自佚以委勞於人初公以親故一再解官其後出入靡恒而二親之亡公適皆在告皆得親奉含斂殆不偶然者處羣從兄弟尤極友愛從弟英玉繼公起進士官按察副使仕歸而貧而介潔自將公雅知其志雖日與親接而不輕餽遺然而中心相孚不殊同胞也少學於李璠先生李死一子不立妻萬不免饑寒公在官每分俸資給之既又為其子植産旋植旋廢而其子卒困以死乃迎養萬氏於家死為歛𦵏而給其孫如子終其身不衰友人胡欽死妻方氏食貧養姑公俾里中上其事請表於朝凡推核深究文牒徃來咸具於公而一切更費咸自公出至於里黨族屬婚䘮緩急亦多倚成於公其於倫誼至重也為文不事險刻而鑄詞發藻必古人為師見諸論著雄深爾雅足自名家詩尤雋永雖矩矱唐人而劖除陳爛時出竒峭樂府歌詞不失漢魏風格問學博深既有資地而才敏氣充足以發之自其少時已有名世之志既舉進士即自免歸大肆力於學時侍講魯南王太僕欽佩皆未仕家居皆名能文與相麗澤聲望奕然時稱金陵三俊及官南曹曹事甚簡益淬礪精進居六年而學益有聞自是出入中外所雅逰若李崆峒獻吉若何大復仲黙若朱升之徐昌糓皆海内名流一時詩名震疊不啻李杜復出而公頡頏其間不知其孰為髙孰為下也然李杜位皆不達又皆盛年物故公仕最久官亦寵顯所厯若沅湘若天台雁宕若衡岳皆山水勝處雖簿書鞅掌而不忘觚翰所至領客燕逰感時懐古臨觀賦詩風流文雅照映林壑委蛇弛張有古髙賢特達之風及是將解留務徃來吳門尋鄉里舊逰期于盡遊諸山以畢其平生而事左心違竟成乖越烏乎而今已矣尚忍言哉公所著書曰國寳新編曰近言曰顧氏七記詩文曰浮湘稿曰山中集曰息園集曰登衡小紀總若干巻其生成化丙申七月七日享年七十娶沈氏封夫人子男三人嶼嵗貢生娶羅氏峙娶陳氏峻尚㓜女二人適俞璉趙念孫男八人履祥䕃為國子生次賔祥元祥耆祥應祥楚祥餘㓜孫女二人曽孫男三人履祥等以卒之明年丙午三月廿七日葬公上元縣彭城山之原前事奉公門生太常少卿許榖取為状來乞銘銘曰於穆孝皇立國用明孰言翊之允維邦楨烈烈顧公維時之彦爰外而中式敡用踐起家民牧弗奪弗違言飲之德既去而思豈德則周亦堅厥志志植靡移乃言有濟扶㣲興壊樹之風聲載躓載奮卒偕以升維靖而恭乃剛弗折式遄其歸峻躋華列出將使指入典邦刑以翼以貞以莫不經爰飾用文富兹述作廼古有訓仕優而學其學何如亶言華國敷章帝猷詠歌明徳在孝皇日羣獻英英發藻攄詞式章用明翺翔後先公實曹耦徳音洋洋維學之懋烈烈顧公既瓌既竒學為文宗政為吏師維學維政鮮兹兼徳繄名之髙斯毁之積烈烈顧公連蹇在是豈不顯融迄屯厥施彭城之原公兆於斯尚後有考視此刻詞顧璘尚書墓在上元縣公元吳人故録福建布政司左叅政姜公墓銘王鏊公姜姓諱昂字恒頫生而端重介特不茍言笑數嵗刻礪讀書成化辛酉占應天鄉試明年登進士第出知棗強一意愛民凡所決遣皆恃以不寃門無呵卒獄無滯囚三年召試監察御史時方士李孜省得幸公率同列疏論之命斥於午門外以親老乞改南京河南道出理福建戎籍擢知河南府値嵗大旱公至則雨隨之洛人抃舞每晨吏白事退終日開閤觀書鞭箠縣之不用時母夫人年八十以懐土屬病疏乞近郡便養不許疏復再三上至乞降府佐或教授他日除邉逺自劾乃改知寧波寧波聞公至同官皆减去輿馬華飾俳優雜劇不一陳於前日本人貢過郡望公迎拜六年復以母老歸養進福建布政司左叅政不起且上疏乞終養母卒服闋部使者奏起之而公以某年月日卒某年月日葬郡城之官山公於取予尤不茍在官日買肉少許奉母自食蔬菜子弟學書不得用官紙筆非嵗首未嘗燕客不受人饋遺亦未嘗餽貽於人權要請託一切報罷以是人多不悦而亦不能毁也姜故汴人扈宋南渡家崇明之西沙元時徙崑山之惠安鄉今為太倉州人髙祖諱仲和元海運千户曽祖諱源祖諱箎考諱敏贈文林郎南京河南道監察御史母曹氏封太孺人子男二長龍中應天甲子鄉試次淮女三孫男一女二銘曰抑抑姜侯維行之揚皭然不滓為彼玉堂皇假近郡汝其予守色養以終萬鍾奚有東海洋洋終卧不起嗚呼姜侯可謂君子姜昻叅政墓在呉縣官山廣東按察使趙君墓志銘王鏊成化辛丑春禮部㑹試天下士呉江趙君栗夫名在第一刻其文稿傳播中外名聲大起時年甫二十餘尋登進士上第授刑部主事厯員外郎郎中浙江按察司副使進廣東按察使蒞任甫越月卒年四十有九君諱寛栗夫字生而白晢纎弱若不勝衣而警敏絶人自少讀書五行俱下其于舉業殊不經意下筆即超邁老輩皆推服之及有官益肆力學問自經史以及諸子百家無不淹貫為文䧺渾秀整行草亦清潤時刑曹同官華亭陳一夔崑山秦廷贄天台王存敬皆能詩四人相得歡甚更相倡和時呉文定公在翰林良辰佳節四人輙相過從予時亦徃來公所多相賡和君才尤贍下筆數百言衆皆驚其捷服其公吏事初非所長在刑曹久律例通究曉析訟至立解獄無寃滯及董浙江學政能推所學以變其習士無謏聞狹見之陋凡經指授為文皆有程度不以權勢動揺有所軒輊髙下遇人坦率不事表暴人以是愛而重之曽祖諱銘黄岩典史祖諱瑛湖州梅溪局大使考諱賜封刑部郎中母沈氏封宜人梅溪善星數君之㓜也以為必貴特愛之南京國子監學正莫君竒之歸以其女子男二禧邑庠生餘㓜禧卜以正徳元年葬君於呉横山靈石峰之麓莫冝人祔銘曰孔翠祥鵷其文既鶱麒麟服轅中道忽踠始誰啓之卒誰居之已乎栗夫愛莫起之趙寛廉使墓在呉縣横山靈石峯之麓錢孔周墓志銘文徴明吾友錢君孔周以髙明踔絶之才負陵轢奮迅之氣感慨激卬以豪俊自命雅性濶達不任檢制所與游皆一時髙朗亢爽之士若唐君伯虎徐君昌國其所善者視余拘撿齷齪若所不屑而意獨親時余三人與君皆在庠序故㑹為數時日不見輙奔走相覔見輙文酒燕笑評隲古今或出所為文相訂質以為樂既而唐徐起髙科入仕尋皆病亡而湯君子重王君履約履吉雖稍後出而逰好為密葢君喜問學尤好結納自少至老未嘗一日㤀學亦未嘗一日㤀取友以自益也其所友必勝已者茍不當其意雖富貴有勢力者恒白眼視之或取怪怒不䘏也家本温厚室廬靚深嘉木秀野足以遊適時時肆陳圗籍招集竒勝滿坐酒壺列前棊局旁臨握槊呼盧憑陵翔擲含醺賦詩負軒而歌邈然髙寄不知古人何如也烏乎而今已矣交逰中有如斯人可復得邪性喜蓄書毎併金懸購故所積甚富諸經子史之外山經地志稗官小説無所不有而亦無所不窺尤喜左氏及司馬班揚之書讀之殆遍遇有所得隨手劄記巨積數帙至所不喜雖世指以為切要而君未始一注目也為文竒崛深奥讀之棘口不能句然思𤣥語麗足自成家而尺牘之妙尤其所長一行數字矢口信筆文意燦然如出鉶煉他人沉思極意不能至也早嵗思以功名自奮稍歛鋒鍔以就文場矩矱亦惟渉獵訓故涵泳道腴而已於世所謂帖括關鍵皆不之省人咸非笑之而提學莆田陳公獨識之嘗按試第居髙等咸以為疑公曰吾見其文有古意知其非經生常士也余親聞陳公語喜公能得君而又喜君之為公所得也自陳公去他主司惟取淺近合格者而君不復振矣君自𢎞治辛酉至正徳丙子凡六試應天試輙不售而年日益老遂自免歸烏乎惜哉君長身玉立被服鮮華而舉止軒掲人望而異之謂必有所就而竒窮骯髒迄於不偶烏乎惜哉晩嵗困於征徭家日益落又得末疾行履跛曵每負杖而嬉而髙懐雅致不殊前時文酒過從燕笑謔浪委蛇容與使人意消烏乎君真雄俊不羈之士哉而曽不得一試以死豈不痛哉君諱同愛字孔周别號野亭錢氏其先江都人有諱仲陽者以醫名於宋見國史六世祖益仕元為常州府醫學教諭避亂来呉遂占籍為長洲人益生太醫院醫士原善原善生晋府良醫宗道宗道生太醫院醫士良玉玉生伯寛伯寛生汝式自汝式以上世以醫顯汝式娶何氏生君兄弟二人長同仁太醫院御醫次即君娶張氏子男二人鶴徴太醫院醫生娶呉氏竹徴薊州吏目出後同仁娶朱氏繼湯氏女二人長適余長子縣學生彭次適陳遇側室生子男一人復徴娶傅氏女一人適劉司衡孫男五人孫女三人君生成化乙未七月初二日卒嘉靖己酉六月初九日享年七十有五庚戌十二月初一日葬呉縣横山銘曰氣則揚亦藝而章維命不臧而志弗昌巻而藏而卒困以亡吁其傷故翰林侍講承直郎王君墓志銘楊士竒宣德元年三月二日翰林侍講王璡汝嘉卒館閣自大學士而下咸走會哭已而共嗟咨歎曰當國家用儒之際奈何其䘮賢者且兩朝史事方嚴奈何䘮文學老成人相與悼惜不已汝嘉為人惇實内貞外和行修識明學該博尤熟書春秋為文章和平寛厚一傅於理勤職務雖老不倦雖風雨寒暑不自逸而折衷羣議辭氣雍容簡而適當故所為悼惜之者非徒以寮寀之故交游之私也既卒之两月其子篪奉櫬歸葬其鄉以翰林脩撰張洪所述事狀求葬銘余於汝嘉有斯文之契廿有六年義宜銘故序而銘之序曰王氏其先京兆人唐大理卿藻從僖宗幸蜀家蜀之遂寧九世至拯事宋理宗為吏部侍郎遂家蘇之長洲生矩之元温州路總管總管生光祖常熟縣尉縣尉生平孫黄巖鹽場司令司令生立中松江府知府三子璉洪武中吏部主事汝玉右春坊右賛善兼翰林編修季汝嘉也自幼喜學問穎敏異羣兒十嵗從師受經下筆敷繹義理已津津動其長者侍松江君宦游浙東西所親炙日廣造詣日深矣平居孝親敬兄一本於至性嘗坐累謫戍五年後舉明經為武昌府學訓𨗳厯九年陞大庾縣學教諭所至盡心啓廸學者率見成效初被召修永樂大典為副總裁又召修四書五經性理大全書成皆受重賜遂陞翰林五經博士授迪功郎秩滿陞侍講授承直郎永樂中考鄉試應天府廣西廣東各一考會試禮部三無敢干以私者洪熈初建𢎞文閣時翰林學士楊君溥偕汝嘉二人者受命日直其中禮遇甚厚汝嘉與人交久而敬澹而可親於義當然未嘗有所不盡一時王氏之盛汝玉汝嘉先後入翰林汝玉文名聞天下而士君子論行已有道葢於汝嘉無間言云汝嘉䝉恩贈其父為翰林侍講承直郎母任生母黄皆為安人封其妻葛安人二男子節篪皆好學有立箎選永樂二十一年鄉貢二女子皆有歸一孫欽汝嘉沒時春秋七十有二庻幾可無遺憾者歟銘曰介如石温如玉嗟君子兮不可復兮王侍講璡與其兄文靖公璲墓並在陽山鳯凰峯下故鄉貢進士謝君墓志銘杜瓊君諱㑹姓謝氏維貞字也别號容菴世為蘇之長洲人曾祖祐之祖彦達父以澄三世皆隱約里閈不食非其力人皆以善士目之君生而岐嶷不與凡子類未數嵗即嗜讀書母平氏憐之輙縮其膏油俾毋夜讀君竊入宻室而嘿誦焉既長益究道學歸于厥躬其居家奉二親以孝與其弟維徳篤友愛交朋友以忠信事有不安於義者雖小小不為也業進士業以易經中正統甲子南京秋闈明年㑹試春官登乙科選得學正職君以不能為人師乞罷卒於家故處士錢伯鉉妻張氏墓志銘金問孺人諱善慶蘇之呉邑人曽大父某大父某父仲良俱懐才德不求聞達母周氏有懿行孺人之生性慧而行淑孝經列女傳通曉大義凡於女經其母嘗曰教而不勞組紃文繡之事族人皆曰巧莫可及既笄擇嫁錫山之錢君伯鉉乃呉越王十四世葉之孫元永嘉書院山長彦春之子至正從父避兵於呉因而家焉孺人入門以孝敬事舅姑以寛裕待媵妾貞順之宜恒服於身體忿􅓰之色不作於容貌賛畫家政井井有條鄉里皆曰錢氏得佳婦而家業興矣是以名門右族莫不以為儀範然伯鉉處士嘗逰郡庠學舉子業厥後棄去以疾而不見試踐履儒素有隱君子風不畜羨餘及卒家無長物孺人以嫁時裝送資賄具棺椁盡祭葬之禮鄉族稱之若出一口逮夫男女嫁娶畢悉以家務付子婦司之孺人惟奉佛誦經優㳺自若正統辛酉十一月二十四日以疾終距生於元至正辛丑抵卒之年春秋八十有一子男一曰實娶曹氏女二長靜延適同郡陳常安次志延未行孫男二驥娶蘇氏騏未娶孫女一適玉峯朱瑀曽孫男一曰滸孫女二俱㓜卜正統八年癸亥十月初四日𦵏呉縣胥臺鄉黄山之原從夫兆也將事郎某公以行狀乞銘于予既按狀次第而述之銘白鍾靈毓秀衣纓之家三從四德良玉無瑕思之古人伊誰其偶梁家之婦陶家之母鬛封四尺胥臺之鄉其藏其固彌久彌康此七世祖母張氏墓志銘錢處士墓志銘劉棨處士名孟滸字仲廣初號漁隱裔出武肅王鏐自浙徙常之錫峯時號磚橋錢氏曽祖鼎贅蘇之張氏遂占籍為長洲人祖公隱父惟善俱潜德弗耀母蘇氏處士生有志操知經史工繪事容肅貌端氣宇爽闓作詩時有警句吾祖宗伯文恭公因以女妻之既壮挾貲遊江湖遇佳山水則留連而不忍去詩人學士則親炙戀慕之隠文僻字則退而考諸書必求其通而後已用是見聞益博噐業益宏而名實籍籍士夫間矣晩年卜築於憇橋之右開地數弓鑿池構亭蒔花竹培蔬果春和景明羣芳競秀秋霜氣肅橙橘紅黄縞雪漫空綠隂匝地處士皆披巾曳杖逍遥其間咏風月以適性情圗景物以玩造化客至則觴博茶話陶然㤀其世慮又自號晩圃云最後聞親藩唐王能下賢乃挾策而往王果賢之為書晩圃且賦詩數什以褒之至有詩宗杜甫畫法王維之句大司馬公安王公因為之作記葢與其修于壯而成於老也生於宣德壬子二月十七日卒於正德改元九月二十六日享年七十有五元配即吾姑劉氏生一女適祝蕃皆先卒繼顧氏生一子曰桓桓以才技徴入京師供事内府配張氏女一適計鳯孫男一曰曽娶唐氏卜某年某月某日葬於黄山祖塋之次既而以墓志請予處士内姪也敢以不文辭乃為之銘曰猗維處士行達言誾鑒古書畫服古衣巾遨逰湖海見聞日親王公野叟即之者親所親伊何厥中孔珍晩開小圃樂極天真乗化歸盡不亾者存刻銘斯石用式後人中憲大夫太常寺少卿經筵國史官武丘劉棨撰并書此晩圃曽祖府君墓志銘墓在吳縣黄山陳基傳尤義陳基字敬初台之臨海人父祥多聞好學尤善老子清淨之説平居常黄冠鹿裘與方士㳺沒時基年甫九嵗越五年母夫人姜氏即命與兄聚於杭從師又四年從内翰金華黄文獻公溍受業至正仍紀元之元年從文獻逰京師授經筵檢討其徒有為御史者以言責咨於基基謂並后為致亂之本因草諫章力陳其失冀君覺悟以正始也而上方溺愛詰知其由欲置於罪怒且不可測遂引避南歸臨海奉母夫人西至呉教授諸生備養惟謹為詞章必務上法三代下軼漢唐東南聲聞為之丕變逺近學者爭師之户外之履常滿屬南北用兵朝廷開以樞密府鎮撫南服起君為都事轉江浙行中書貟外郎俄陞郎中時平章張士信統兵鎮杭基以本職參佐道之以正杭有岳飛墳蕪穢弗恭久矣基追慕興感以狀請於朝俾與厯代忠臣並列春秋致祭尋自為文刻石墓上以表其功西湖書院舊有經史書版兵後零落無㡬即白平章出官錢若干補綴成帙夫以天理民彝泯亂之秋干戈相尋日不暇給基乃以贊佐餘力為其所得為使聖經賢傳復明於當時崇德報功無媿於往昔雖武夫悍卒聞下風而望餘光亦知有所興起擴而充之是大有功於名教也未幾由杭来吳參太尉軍府事及太尉自王於呉羣下同聲賀之而基獨諫止太尉欲殺之不果已而超授内史遷學士院學士階通奉大夫覃恩二代凡飛書走檄碑銘傳記多出於基之手基每以為憂而不以為榮也今國家命將平呉呉臣多見誅殺而基晏然無恐朝論多基之能尋召入預脩元史書成賜金而還洪武三年十月壬午以疾卒於常熟河南里之寓舎得年五十有七娶王氏先四年卒無子以弟之子訥為後女四人長適吳顯次適車某三四㓜皆庻出基平居慎重寡黙與物無競家人僕𨽻未嘗見其疾言遽色宗族故舊自浙水東来依率養育奬勸俾各有成士有才德可用必引而進之有喪不能舉者為買棺歛恩義過於平生方太尉僚佐彊占民廬基獨以已俸買宅天心里即舊屋數椽稍加塗塈環蓺花卉之屬號小丹丘休沐之暇輙與客徜徉其中啜茗清談議論古今出入經史百氏危坐終日嵗時有事於祖考始殺牲以展其孝敬初非薄於朋友也吳國將亾食肉者惴惴焉恐陷鼎鑊君子謂基宜保終吉已而果然噫父母全而生之子全而歸之若基者其亦可謂克全而無憾者也今藏於家有夷白齋集二十巻觀其文雄而趣髙可以黼黻皇猷敷陳帝業而乃使留滯江湖之上馳驅戎行竟賫志以没兹其可惜也夫贈敬初并改字陳旅敬初㓜名無逸朋友字之曰敬初比與予同舟北遊謂予言曰吾名與字皆有所未安葢無逸者因吳興陳先生之字也而敬初云者揆之尚書本義則近於僣矣久欲易之以吾父早世無所請命子宗盟之耆長也幸為我易之予遂易其名為基而易其字為敬初云我愛天台陳敬初少日辭家即逺圖上書擬獻賈生䇿入闗便棄終軍繻八月官河秋水大三江親舍暮雲孤名成歸去嵗未晩卜隣有約依東吳石澗先生小傳楊炳石澗先生俞琰者吳處士也先世自河南扈宋南渡家洞庭之西山先生雄邁博聞經史過目成誦宋社既屋掃滌舊業馳騁諸家傳語天文地志仙書怪牒汪洋竒詭恍惚神㑹𤣥解不習而挈其要領好鼓琴嘗疑近代琴操有譜無字失古哲制作之原研究音調述絃歌譜四十餘篇禆漢太史之遺朔南以琴名者駭歎之晨興焚香誦易一過暑寒弗廢四十年手鈔諸家易説百餘巻名曰㑹要註易經并十翼經傳考證古占法纂圖等凡四十巻名曰周易集説所以發先儒之藴又纂校百氏書宻行細字端楷有法垂老不衰喜方士談𤣥學註周易叅同契發揮三篇隂符經觧一巻隂補空同道士鄒訢之不足又易别傳一巻貫融性命推衍程邵張朱言外之意宋狀元阮公菊存國初右丞馬公性齋皆白首北面先生自言遇隱者授讀易法得寰中之秘其闡發圗説演繹參同隂符非苟知之葢嘗試之者也間論蔡季通袁機仲雖與訂正考覈字義未免臆度夫豈無得而有是言哉至於丹砂化煉刀圭𤣥牝神方直造𤣥室靈迹昭著不屑為耳方聞溺嗜者匐伏前席祈請丹㫖先生以養心寡欲之義旁喻善誘来者外恧中服而去終其身不以授人也終嵗寡出葆頥精氣益昌於學從㳺無逺邇飢附而飽去叅政王都中尤卓然者也先生風宇清峻性率機敏畧細節好賔㳺未嘗以有無計然不耐庸俗交華官巨室莫敢延請樂為隠語嘲諧玩世享年七十神閒心虗不累形物體氣彊逾中人一日命侍者具湯沭浴更巾衣危坐召仲温進巵酒飲畢曰吾與汝訣矣諸書未偹者成之言既神采不移翛然而逝非達於幽明生死之故者耶先生字玉吾石澗其號云葉伯卬傳呉敏伯卬名顒東洞庭山後人父國英倜儻豪俠元季兵興欲教子鄉無碩儒緱山王九萬避亂依山前葉氏國英遣子從逰葉以富傲國英國英曰我能使兒讀書成器齊奴不足齒也國英與長興耿炳文為友耿延前應奉翰林文字國子助教宇文子真主家塾國英令子就學館榖豐腆有逾於耿宇文子撤講來國英家適江浙提學雲陽李一初來訪一日忽悵怏國英前謝李曰妻子寓旅邸不能不動於中國英曰已令人省問薪炭酒茗醯醬蔬菓之類皆具李驚喜稱山中宰相於是與伯英之子偕訓顒伯卬大造就而卒業焉後試省浙中上第為和靖書院山長不慊所蘊挾策走燕京㑹風塵道梗流落濠亳間皇明平一區宇始克來歸兵燹之餘母弟俱亡家徒四壁立無意於世號浮丘醉史放情詩酒髙歌感慨人多憐之時炳文助討張士誠累功封長興侯冨貴烜赫聞伯卬困滯遣使招延㑹聚通家之好欲為剙第再娶薦於朝而用之伯卬曰時去志違年既知非毋庸是為也呉興著姓姜仲剛范𤣥德張大聲徐正敬暨聞儒許雪嶠華仲清曹可大呉宗本丁志仁皆訂盟知已從㳺講學留連卒嵗竟旅死長興噫麟鳯之獲於魯狩歌于楚狂而不得為祥瑞非其不靈也出非其時也惟士亦然惜哉蠢齋先生傳朱存理隱君子邢氏名量字用理號蠢齋學者稱蠢齋先生自少以疾不娶居一巷中蕭然室廬讀書樂道以終存理少時從先生講孝經論語日接見先生時年近五十不茹葷酒蔬鹽不給其貌甚臞而脩髯服垢履敝混跡庸人未嘗一至城府閉門靜坐㸃校諸經及博觀子史百家坐中之客惟禅人道侶有顯者知先生因造門先生避去家畜一童既死無應門之人鄰有代勞薪水者輙辭病革豫自為志有書數百巻卒後悉散去存理收其遺文數篇太史呉君序之呉未仕嘗與先生遊者也嗚呼此所謂獨行不愧影獨寢不愧衾先生其人也𢎞治四年三月廿四日門人朱存理謹書落魄公子傳蔡羽呉文定公兄弟三人其季元暉生子名奕字嗣業元暉蚤世嗣業秀而弱文定居京師弗能從獨與母處讀書醫俗年至二十不屑見四方之士然四方賢士譽呉公子者日益衆嗣業不鼎鼎以偷不劬劬以隘不提提柔從不孑孑獨立處乎流俗之世而能翩翩乎邁於衆也嘗嗜杯酒而陶陶乎不至荒也故謂之落魄公子云文定公愛之篤每賔客南來必詢嗣業食飲顔色竟以心疾廢進士業方文定公居喪位盛門不受謁炎熱者求親於呉公子無所不用其心嗣業則深屏宴息開影翠軒築紫筠亭日招致髙人人至不謝而入坐定啜茗賦詩復不謝而去炎熱者不得間然善文定書尤精籀學至堂無虚席常避客東襌竹堂東襌住持為開竹林焚香煑茗不遑及他務其烹泉爇香之法呉僧無不傳習謂之茶香先生眉目疎秀神采焕發望之如神仙而貴能下士樂而不淫文定既歿炎熱者又去而之他嗣業則蕭然東莊之上羙箭嘉木環渠隠岡琴酒欵客來即自如釣而飲飲而歌布素之士無少貶挫可謂炎無所得凉無所失矣嗣業事母孝交朋友以道義一時勝流皆與深相得兄弟婚姻咸篤恩義居家律已無事紛華其堂即封君之廬三世無所加正德丁邜母夫人喪之明年其弟祠部君暴變悲痛相繼遂病不起是冬卒子二人俅雉賛曰泉不自知其清味之而愈長蘭不自知其芳嗅之而愈香溫其君子遁迹韜光生不為用死而徬徨山虚其巢水虚其釣竹無主人偕我言笑雲兮月兮悠悠我照平思忠傳史鑑平思忠者呉江人也少為縣吏役滿厯京考選授禮部主客司主事維時明興四十年矣中國彊盛逺裔向慕文皇帝方事招懐諸國朝貢者蹄踵交於道路烏蠻驛至不能容勞贈宴犒館餼無虚日率主客主之思忠有精力勤敏過人遇事皆應機立辦尚書呂震深器之陞為郎中嘗以事下獄適北使入貢新任主客者區畫多不稱㫖上怒震因言思忠等以微累禁繫罪不至去官且習外國事乞宥之以收其後效㫖可即日釋復任初有楊𢎞者陜西西安府朝邑縣人為刑科都給事中敢直言上特擢為陜西左布政使來部以𢎞陜西人例不該除上曰非爾所知也後不為例𢎞亦以本貫辭不許葢是時有楊太監者數人在陜西故上以楊𢎞往制之也他日上諭執政曰楊𢎞初去時頗肯言事近日又黙然矣可選清彊有膽氣者一人往叅政以察之吏部以思忠應詔上素識其名命之往而思忠有養子曰平安者私以綾羅度潼關為抱關者所發觧陜西布政司思忠時出行部𢎞命收而勿籍候思忠歸私以物還之思忠感愧不已竟不敢有言嘗有某府一推官録事至司思忠知其素貪乃發杖之後其人觧京因招嘗以某事納贓賂思忠刑部併逮至思忠就考適有例凡貪贓官吏妄詐不法者笞殺于市思忠乃誣服謫戍邉會太監劉馬兒奉詔市馬西域以思忠在主客久多識賈胡請以自隨詔釋其戍給冠帶辦事從馬兒西扺吐蕃烏斯藏朶甘隴荅等處齊勤䝉古䍐都安定于闐諸國而還復免官家居以漁佃自給又數十年卒初蘇州知府况鍾亦以吏貟起家繼思忠為主事及思忠叅政又以嗣其郎中寮寀交承情分甚密鍾來知蘇州思忠往見之鍾迎候甚恭呼其妻子出拜謂曰此吾舊長官也飲思忠酒時正暑熱命二子扇之思忠辭鍾曰某沗知貴郡非無僕𨽻可給使令但欲使小兒軰知公為吾故人耳其敬之如此然思忠居貧自守未始以事干鍾人以此多之初思忠未貴時知縣蔣奎嘗延一相者問休咎徧視在座者其言皆了了不失思忠時給事堂下相者數目奎因呼上使相相者曰此人他日富貴位三品然不終奎大笑相者去奎謂坐客曰術士之妄如此一小吏安能頓至三品乎後奎坐事自殺同僚無一顯者思忠竟如其言江湖散人傳陸龜䝉散人者散誕之人也心散意散形散神散既無羈限為時之怪民束於禮樂者外之曰此散人也散人不知恥從而稱之或笑曰彼病之以散而目之子反以為號何也散人曰天地大者也在太虛中一物耳勞乎覆載勞乎運行差之晷度寒暑錯亂望斯須之散其可得耶水土之散稽有用乎水之散為雨為露為霜為雪水之局為瀦為洳為潢汚土之散封之可崇穴之可深生可以藝死可以入土之局塤不可以為埏甓不可以為盂得非散能變化局不能耶退若不散守名之筌進若不散執時之權筌可守耶權可執耶遂為散人傳以志其後甫里先生傳甫里先生者不知何許人也人見其耕於甫里故云甫里松江上村墟名先生性野逸無羈檢好讀古聖人書探六籍識大義就中樂春秋抉摘㣲㫖見文中子王仲淹所為書云三傳作而春秋散深以為然貞元中韓晉公嘗著春秋通例刻之於石今在潤州文宣王廟一以是學為已任而顚倒漫漶胡館切翳塞無一通者殆將百年人不敢指斥疵瑕先生恐疑悞後學乃書摭而辯之其平居以文章自娛雖幽憂疾病之中落然無旬日生計未嘗暫輟㸃竄塗抹者紙札相壓者投於筐箱中厯年不能淨寫一本或好事者取去後於他人家見亦不復為已作矣少攻歌詩欲與造物爭柄然遇事輙變化不一其體裁始則凌轢波濤穿穴險固囚鎖怪異破碎陳敵卒造平澹而後已好潔几格音閣忩户硯席絶然無塵埃得一書詳熟然後寘于方䇿值本即校不以再三為限丹黄二毫未嘗一日去手所藏雖少咸精寔正定相傳借人書有編簡斷壞者緝之文字謬誤者刋之樂聞人為學講評辨論不倦有無頼者毁拆揉汙或藏去不返先生戚然自咎先生貧而不言利問之對曰利者商也今既士矣奈何亂四民之業乎且仲尼孟軻氏所不許先生之居有地數畆有屋三十楹有田畸十萬歩呉田一畆嘗二百五十歩有牛不減四十蹄有耕夫百餘指而田汙下暑雨一晝夜則與江通無别已田他田也先生由是苦饑困食無升斗蓄積乃躬負畚鍤率耕夫以為具具區之具具每嵗波雖至不能跳吾防溺吾稼也或譏刺之先生曰堯舜黴明饑切瘠大禹胼胝非聖人耶吾一布衣耳不勤劬何以為妻子之天乎且與蚤虱名器雀䑕倉庾者何如哉先生嗜荈置園於顧渚山下嵗入茶山在呉興郡嵗貢茶之所租十許簿為甌㩘之實自為品第書一篇總茶經茶訣之後茶經陸羽撰茶訣皎然撰南陽張又新嘗為水説凡七等其二曰惠山寺石泉無錫縣其三曰虎丘寺石井其六曰呉淞江是三水距先生逺不百里髙僧逸人時致之以助其好先生始以喜酒成疾血敗氣索者二年而後能起有客至亦潔尊置觶但不復引滿向口爾性不喜與俗人交雖詣門不得見也不置車馬不務慶弔内外姻黨伏臘喪祭未嘗及時往或寒暑得中體性無事時乗小舟設篷席攜一束書茶竈筆牀釣具櫂船郎而已所詣小不㑹意徑還不留雖水禽戛起山鹿駭走之不若也人謂之江湖散人先生乃著江湖散人傳而歌咏之由是混毁譽不能入利口者亦不復致意先生性狷急遇事發作輙不含怒尋復悔之屡改不能矣先生無大過亦無出入事不傳姓名無有得之者豈涪翁漁父江上丈人之流者乎蘇州府新立義塚記呉寛上世之人親死有舉而委之於壑者塟埋之制未有也中古始有之葬於中野厚衣之以薪不封不樹其制猶未偹也後世作為棺椁其制始備而焚屍之説亦起夫上世荒逺人穴居野處茹毛飲血故親死不葬可謂薄其親矣然卒無所謂焚屍者人情之所不忍也其所以不葬者養生送死庻事草畧其道皆然後世宫室飲食皆極其厚則葬埋之制亦厚而卒有焚其屍者豈人情獨有所忍哉葢西域謂之茶毘自佛入中國中國之人習見其事不以為怪而從之愚者惑其言之妄貧者樂其法之省不忍之心忘矣頑然與木石相類噫何惡俗之不可變也在國朝洪武三年下詔禁之令天下皆立義塚其後又詔立漏澤園至特載之律令犯者其法甚重聖政推仁可謂澤及枯骨矣蘇為郡自國初兵荒之後户口見於版册者其數已甲於天下承平以來生齒益繁殆倍其數死者卜吉安厝固遵禮制至於小民焚屍日亦不絶造飾其語謂之火葬或拾其骨於煨燼之餘而埋之甚者直投之水而已愚而貧者固不足論其有知識而力足以葬者亦從而效之噫何俗之惡久而不能變也𢎞治十年新蔡曹侯以監察御史出知蘇州正身率下令行禁止甫及三年俗乃大變獨視其民不以禮葬痛切於已曰此徒禁之而無以處之不可也慨然有義塚之舉他日移於巡撫都御史彭公巡按御史王君皆曰盛舉也報使行之侯始與僚屬擇地之髙亢者營之城有六門各立一塚其塚廣百畆有竒周植木為限而大書門楣以表識之令初下民感於義或出地以獻其購於民者則勸富家及益以官錢平酬其值若地之賦税則嵗以餘粮代補其餘事悉有區處塚成侯復下令各里有願立者亦從其便始侯為此詢謀於衆皆曰固盛舉事也奈地有限而人無窮何維侯亦疑之既曰古之有仁心者必有仁政使已之何以守兹土以居民上亦惟盡吾心行吾政終吾任而已吾何暇計且後之繼吾者獨無吾心吾政乎當復有以處之夫禮緣人情謂人情之可縁者焚屍可以言人情乎雖然民不可以家諭也非載之文詞不可㑹僚友倪林二同知以公事上京師託以為請予聞嘆曰此前人所不能行者何意行之於今日哉子産曰為善者不改其度故能有濟也侯之為善恐無以助敢不書乎乃悉侯之意以諭其民曰爾有父母有人損其一指爾怒乎爾有妻子有人殘其一目爾怒乎爾怒必訟之於官以報其讐今爾父母妻子之死不以土掩覆乃親置烈火中使其肢體糜爛腸胃斷裂非特毁其一指一目而已旁觀者猶蹙額泚顙不忍爾固人也非木石也何獨忍乎今爾幸遇賢守為爾治塟地爾有喪其安厝於是及爾有力能自擇地則遷塟於外不禁使死者得保其骸骨生者得識其墳墓為爾之慮逺矣其功大矣爾民其知之無惑自是敢復有違其制者朝廷法律具在將加爾身無悔凡義塚在某都某圩與頃畆之數及好義之士出地若財者姓名具列之碑隂義塚記陽逢春揜骼埋胔先王之仁也環封澤枯國之制也是故全而歸之所以教孝歛形還塟亦以引孝火葬而水瘞斯其悖也久矣干和作沴於斯為烈抑澤國苦無所之匪惟民戾逢春來牧是邑耳目所及惻然弗寕爰求故域未之有稽也乃自郭以東貿田九十有二畆自郭以西貿田五十有四畆旋坎而登土乃與民約良者卜兆無告者歸兹土有弗率者刑之以殉越再嵗此風寢息嵗則大稔乃作義塚記嘉靖丙申十月之朔東義塚九十二畆一釐二毫坐落三十保二十二啚姜字圩西義塚五十三畆八分坐落二保十一啚列字圩俱委耆民陳表填築建立墻門一所以嚴啟閉瓦房五間為守者居之又義塚一所九畆二釐坐落六保六啚馨字圩俱免正粮吳都文粹續集巻四十五
