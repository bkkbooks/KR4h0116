body:
  text: 吳都文粹續集巻三十八明錢榖撰墳墓范文正公仲淹神道碑歐陽修皇祐四年五月甲子資政殿學士尚書禮部侍郎汝南文正公薨于徐州以其年十有二月壬申葬于河南尹樊里之萬安山下公諱仲淹字希文五代之際世家蘇州事吳越太宗皇帝時呉越獻其地公之皇考從錢俶朝京師後為武寧軍掌書記以卒公生二嵗而孤母夫人貧無依再適長山朱氏既長知其世家感泣去之南都入學舎掃一室晝夜講誦其起居飲食人所不堪而公自刻益苦居五年大通六經之㫖為文章論說必本於仁義祥符八年舉進士禮部選第一遂中乙科為廣徳軍司理參軍始歸迎其母以養及公既貴天子贈公曽祖蘇州糧料判官諱某為太保祖秘書監諱某為太傅考諱某為太師妣謝氏為吳國夫人公少有大節於富貴貧賤毁譽歡戚不一動其心而慨然有志於天下常自誦曰士當先天下之憂而憂後天下之樂而樂也其事上遇人一以自信不擇利害為趨舎其所為必盡其方曰為之自我者當如是其成與否有不在我者雖聖賢不能必吾豈茍哉天聖中晏丞相薦公文學以大理寺丞為秘閣校理以言事忤章獻太后㫖通判河中府久之上記其忠召拜右司諫當太后臨朝聴政時以至日大㑹前殿上將率百官為夀有司已具公上疏言天子無北面且開後世弱人主以強母后之漸其事遂巳又上書請還政天子不報及太后崩言事者希㫖多求太后時事欲深治之公獨以謂太后受託先帝保佑聖躬始終十年末年過失宜掩其小故以全大徳初太后有遺命立楊太妃代為太后公諫曰太后母號也自古無代立者由是罷其冊命是嵗大旱蝗奉使安撫東南使還㑹郭皇后廢率諫官御史伏闕爭不能得貶知睦州又徙蘇州嵗餘即拜禮部員外郎天章閣待制召還益論時政闕失而大臣權奸多忌惡之居數月以公知開封府開封素號難治公治有聲事日益簡暇則益取古今治亂安危為上開說又為百官圖以獻曰任人各以其材而百職修堯舜之治不過此也因指其遷進遲速次序曰如此而可以為公可以為私亦不可以不察由是呂丞相怒至交論上前公求對辯語切坐落職知饒州明年吕公亦罷公徙潤州又徙越州而趙元昊反河西上復召相吕公乃以公為陜西經畧安撫副使遷龍圖閣直學士是時新失大將延州危公請自守鄜延捍賊乃知延州元昊遣人遺書以求和公以為無事請和難信且書有僭號不可以聞乃自為書告以逆順成敗之說甚辨坐擅復書奪一官知耀州未逾月徙知慶州既而四路置帥以公為環慶路經畧安撫招討使兵馬都部署累遷諫議大夫樞宻直學士公為將務持重不急近功小利於延州築清澗城墾營田復承平永平廢寨熟羌歸業者數萬户於慶州城大順以據要害又城細腰胡盧於是明珠滅臧等大族皆去賊為中國用自邊制久隳至兵與將常不相識公始分延州兵為六將訓練齊整諸路皆用以為法公之所在賊不敢犯人或疑公見敵應變為何如至其城大順也一旦引兵出諸將不知所向軍至柔逺始號令告其地處所往築城至於版築之用大小畢具而軍中初不知賊以騎三萬來爭公戒諸將戰賊走追勿過河已而賊果走追者不渡而河外果有伏賊失計乃引去於是諸將皆服公為不可及公待將吏必使畏法而愛巳所得賜賚皆以上意分賜諸將吏使自為謝諸蕃質子縱其出入無一人逃者蕃酋來見召之卧内屏人徹衛與語不疑公居三歲士勇邊實恩信大洽乃決䇿謀取横山復靈武而元昊數遣使稱臣請和上亦召公歸矣初西人籍為鄉兵者十數萬既而黥以為軍惟公所部但刺其手公去兵罷獨得復為民其餘兩路既得熟羌為用使以守邊因徙屯兵就食内地而紓西人饋輓之勞其所設施去而人德之與守其法不敢變者至今尤多自公坐吕公貶羣士大夫各持二公曲直吕公患之凡直公者皆指為黨或坐竄逐及吕公復相公亦再起被用於是二公懽然相約戮力平賊天下之士皆以此多二公然朋黨之論遂起而不能止上既賢公可大用故卒置羣議而用之慶厯三年春召為樞密副使五譲不許乃就道既至數月以為參知政事每進見必以太平責之公嘆曰上之用我者至矣然事有先後而革弊於乆安非朝夕可也既而上再賜手詔趣使條天下事又開天章閣召見賜坐授以帋筆使疏於前公惶恐避席始退而條列時所宜先者十數事上之其詔天下興學取士先徳行不専文詞革磨勘例遷以别能否減任子之數而除濫官用農桑考課守宰等事方施行而磨勘任子之法僥倖之人皆不便因相與騰口而嫉公者亦幸外有言喜為之佐佑㑹邉奏有警公即請行乃以公為河東陜西宣撫使至則上書願復守邉即拜資政殿學士知邠州兼陜西四路安撫使其知政事才一嵗而罷有司悉奏罷公前所施行而復其故言者遂以危事中之賴上察其忠不聴是時夏人已稱臣公因以疾請鄧州守鄧三嵗求知杭州又徙青州公益病又求知潁州肩舁至徐遂不起享年六十有四方公之病上賜藥存問既薨輟朝一日以其遺表無所請使就問其家所欲贈以兵部尚書所以哀䘏之甚厚公為人外和内剛樂善汎愛喪其母時尚貧終身非賔客食不重肉臨財好施意豁如也及退而視其私妻子僅給衣食其為政所至民多立祠畫像其行已臨事自山林處士里閭田野之人外至夷狄莫不知其名字而樂道其事者甚衆及其世次官爵志于墓譜于家藏於有司者皆不論著著其繫天下國家之大者亦公之志也歟銘曰范於吳越世實陪臣俶納山川及其士民范始来此中間幾息公奮自躬與時偕逢事有罪功言有違從豈公必能天子用公其艱其勞一其初終夏童跳邉乘吏怠安帝命公往問彼驕頑有不聴順鋤其定根公居三年怯勇隳完兒憐獸擾率俾来臣夏人在廷其事方議帝趣公来以就予治公拜稽首兹維艱哉初匪其難在其終之羣言營營卒壊於成匪惡其成惟公是傾不傾不危天子之明存有顯榮歿有贈諡藏其子孫寵及後世惟百有位可勸無怠文正墓雖不在吳而孤忠大節為宋朝第一等人且其義田祖墓在是因録之滕學士甫墓志銘代張文定公作蘓軾神宗英文烈武聖孝皇帝初臨海内厲精為治旁求天下以出異人得英偉大度之士滕公元發始見知于英祖而未及用書其姓名藏于禁中帝以是知之既見公姿度雄爽問天下所以治亂不思而對曰治亂之道如黑白東西所以變色易位者朋黨亂之也帝曰卿知君子小人之黨乎公曰君子無黨譬之草木綢繆相附者蔓草非松栢也朝廷無朋黨雖中主可以濟不然雖上聖不治帝太息曰天下名言也遂以右正言知制誥諌院開封府拜御史中丞翰林學士且大用矣而公性疎達不疑在帝前論事如家人父子言無文飾洞見肝膈帝知其誠藎事無鉅細人無親疎輙以問公或中夜降手詔使者旁午公隨事解答不自嫌外而執政方立新法天下洶洶恐公有言而帝信之故相與造事謗公帝雖不疑然亦出公於外以翰林侍讀學士知鄆州移定與青留守南都徙齊鄧二州用公之意葢未衰也而公之妻黨有犯法至大不道者小人因是出力擠之必欲殺公帝知其無罪落職知池州徙蔡未行改安州既罷入朝未對而左右不恱者又中以飛語復貶筠州士大夫為公危慄或以為且有後命公談笑自若曰天知吾直上知吾忠吾何憂哉乃上書自明帝覽之釋然即以為湖州方且復用而帝升遐公讀遺詔僵仆頓絶乆之乃蘓曰已矣吾無所自盡矣今上即位徙公為蘓楊二州除公龍圖閣直學士復以為鄆州徙真定河東治邊凛然威行西北號稱名將而宦官為走馬者誣公病不任職詔徙許州御史論公守邉竒偉之狀且言公不病詔復留河東而公巳老葢年七十有一矣即力求淮南上不得巳乃以為龍圖閣學士知楊州未至而薨葢元祐五年十月二十四日也方平歴事三宗逮與天聖景祐間賢公卿逰公雖為晩進而開濟之道邁往之氣葢有前人風度以先帝神武英斷知公如此而終不大用每進小人輙讒之公嘗上章自訟有曰樂羊無功謗書滿篋即墨何罪毁言日聞天下聞而悲之嗚呼命也夫公諱甫字元發其後避高魯王諱以字為名而字達道東陽人也滕氏出周文王之子錯封於滕所謂滕叔繡者十一代祖令琮為唐國子司業令琮生太常博士翼翼生贈户部侍郎伉伉生贈禮部侍郎葢葢生户部尚書贈右僕射珦珦生大中大夫睦州刺史邁邁生越州觀察推官􅀈􅀈生祠部郎中文規文規生公之曾祖諱仁俊為温州永嘉令祖諱監不仕皇考諱高贈中大夫曾祖母祖母皆范氏繼祖母陳氏皇妣王氏追封太原郡君生公之夕夢虎行月中而墮其室九嵗能賦詩敏捷過人范希文皇考舅也見公而竒之教以為文希文為蘓州而安定胡先生瑗居于蘓公往從之門人以千數第其文公常為首嘗舉進士試於廷宋子京竒其文擢為第三人而以聲韻不中法罷之其後八年復中第第三授大理評事通判湖州時孫元規守錢唐一見公曰名臣也後當為賢將授以治劇守邉之要召試學士院充集賢校理判吏部南曹除開封府推官三司鹽鐵户部判官同修起居注判户部勾院公在館閣未嘗就第見執政故宰相不恱不遷者十年既遇知神宗為諫官知無不言然御史中丞王陶論宰相不押班為䟦扈上以問公公曰宰相固有罪然以為䟦扈則臣為欺天䧟人矣為開封府三獄皆滿公視事之日理出數百人決遣殆盡京師翕然稱之為御史中丞中書宻院議邉事多不合趙明與西人戰中書賞功而宻院降約束郭逵修堡柵宻院方詰之而中書巳下褒詔矣公言戰守大事也安危所寄今中書欲戰宻院欲守何以令天下願敕大臣凡戰守除帥議同而後下上善之諫官楊繪言宰相不當以其子判鼔院上曰繪不習朝廷事鼓院傳達而已何與於事公曰人有訴宰相者使其子傳達之可乎且天下見宰相子在是豈敢復訴事上悟為罷之种諤擅築綏州且與薛向發諸路兵環慶保安皆出剽掠西人復誘殺將官楊定公上疏極言亮祚已納欵不當失信邉隙一開兵連民疲必為内憂京師郡國地震公三上疏指陳致灾之由大臣不恱出公知秦州上面諭公曰秦州非朕意也留不遣詔館伴契丹使前此館伴非其人使者議神塔子事往復紛然是嵗契丹遣蕭林牙楊興公来聘朝廷憂之公見興公開懐與語問其家世父祖事委曲詳盡興公驚且喜不復論去嵗事將去與公馬上泣别林牙謂興公曰君與滕公善豈將留此乎上聞之大喜因公奏事殿中歎曰朕欲擢卿執政卿逾月不對而大臣力薦用唐介矣公曰臣恨未有死所報陛下知遇豈愛官職者唐淑問孫覺言公短上不信悉以其言示公所以慰勞公者甚厚公頓首曰陛下無所疑臣無所媿足矣河朔地大震涌沙出水壊城池廬舍命公為安撫使官吏皆幄寂居民恐其棄家而茂舍公獨卧屋下曰民恃吾以生屋摧民死吾當以身同之民始歸安其室乃命葬死者食飢者除田稅察惰吏修隄防繕甲兵督盜賊河朔遂安使還大臣將除公并州上復留公開封府民有王穎者為隣婦隠其金閲數尹不能辨穎憤悶至病傴杖而訴於公公呼隣婦一問得其情取金還穎穎奮身仰謝失傴所在投杖而出一府大駭除翰林學士夏國主秉常被簒公言繼遷死時李氏幾不立矣當時大臣不能分建諸豪乃以全地王之至今為患今秉常失位諸將爭權天以此遺陛下若再失此時悔將無及請擇一賢將假以重權使經營分裂之可不勞而定百年之計也上竒其䇿然不果用欲以公為三司使力辭已而除公瀛州安撫使公入頓首曰臣知事陛下而已不事黨人願陛下少回昔日之眷無使臣為黨人所快則天下皆知事君為得而事黨人為無益矣上為改容公以皇考諱辭高陽關乃除鄆州治盜有方不獨用威猛時有所縱捨盜為屏息移知定州許入覲力言新法之害曰臣始以意度其不可耳今為郡守親見其害民者具道所以然之狀至定州以上已宴郊外有報契丹入㓂邉民来逃者將吏大駭請治兵公笑曰非爾所知也益置酒作樂遣人諭逃者曰吾在此敵不敢動使各歸業明日問之果妄諸將以是服公韓忠彦使契丹楊興公迎勞問公所在且曰滕公可謂開口見心矣忠彦歸奏上喜進公禮部侍郎再任詔曰寛嚴有體邊人安焉公因作堂以安邊名之公去國既久而心在王室著書五篇一曰尊主勢二曰本聖心三曰校人品四曰破臣黨五曰贊治道上之其畧曰陛下聖神文武自足以斡運六合譬之青天白日不必㸃綴自然清明識者韙其言天下大旱詔求直言公上疏曰新法害民者陛下既知之矣但下一手詔凡熙寧二年以來所行新法有不便者悉罷之則民氣和而天意解矣富彦國之守青州也嘗置教閲馬步軍九指揮彦國既去軍稍缺不補公至請復完之至溢額數千其後朝廷屢發諸路兵至或䘮失不還惟青州兵至今為盛其謫守池安皆以靜治聞飲酒賦詩未嘗有遷謫意侍郎韓丕旅殯于安五十年矣學士鄭獬安人也既沒十年貧不克𦵏公皆𦵏之著作佐郎木炎居䘮以毁卒公既助其𦵏又為買田賙之敕使謝諲市物于安因縁為奸民被其毒公宻疏奸狀上為罷黜諲自安定先生之亡公常割俸以賙其子及為湖州祭其墓哭之慟東南之士歸心焉自楊徙鄆歲方饑乞淮南米二十萬石為備鄆有劇賊數人公悉知其所舎遣吏掩捕皆獲吏民不知所出郡學生食不給民有爭公田二十年不決者公曰學無食而以良田飽頑民乎乃請以為學田遂絶其訟學者作新田詩以美之時淮南東京皆饑公獨有所乞米為備召城中富民與約曰流民且至無以處之則疾疫起幷及汝矣吾得城外廢營地欲為席屋以待之民曰諾為屋二千五百間一夕而成流民至以次授地井竈器用皆具以兵法部勒少者炊壯者樵婦女汲老者休民至如歸上遣工部郎中王古按視之廬舎道巷引繩棊布肅然如營陣古大驚圖上其事有詔褒美葢活五萬人云徙真定乞以便宜除盜許之然訖公之去無一人死法外者秋大熟積飢之民方賴以生而有司爭糴榖貴公奏邉廩有餘請罷糴一年從之徙知太原府河東兵勞民貧而士豪將吏皆利於有警故喜作邉事民不堪命公始至蕃族来賀令曰謹斥堠無開邉隙有㓂而失備與無㓂而生事者皆斬自軍司馬㳂邉安撫以下皆勒以軍法西人獵境上河外諸將請益兵公曰㓂来則死之吾不出一兵也河東十二將其四以備北其八以備西八將更休為上下畨是嵗八月邉郡稱有警請八將皆上謂之防秋公曰賊若并兵犯我雖八將不敵也若其不来四將足矣卒遣更休而將吏懼甚扣閣爭之公指其頸曰吾已捨此矣頸可斷兵不可出卒無㓂省芻粟十五萬河東之所患者鹽與和糴也公稍更其法明著稅額而通鹽商配率粮草視物力高下而不以占田多少為差民以為便陽曲縣舊治城西汾決徙城中縣廢為荒田公奏還之使縣治隄防如黄河民復成市諸將駐列城者長吏或不恱捃誣以事有至死者公奏立法將有罪徙他郡訊騐諸將聞之喜曰公保吾生當報以死西夏請復故地詔賜以四寨而葭蘆𨽻河東公曰取城易棄城難昔棄囉兀西人襲我不備喪金帛不貲且為夷狄笑乃命部將訾虎蕭士元以兵䕶遷號令嚴整㓂不敢近無一瓦之失將賜寨公請先畫界而後棄不從西人巳得地則請凡畫界以綏徳城為法從之公曰若法綏徳以二十里為界則吳堡去葭蘆百二十里為失百里矣國家以進退尺寸為強弱今一舉而失百里不可力爭之已而諜者得西人之謀曰吾將出勁兵於仁吳二塞之間刼漢使不得出兵則二寨亦棄矣公遂復申前議章九上至數萬言議者謂近世名將無及公者公為文與詩英發妙麗每出一篇學者爭誦之篤於行義事父母撫諸弟以孝友聞臨大事決大議毅然不計死生至於己私則小心莊栗惟恐有過其事上及與人交馭將吏待妻子奴婢一以至誠任自大理評事至右光禄大夫職至龍圖閣直學士勲至上柱國爵至南陽郡開國侯食邑至一千六百户實封至八百戸贈銀青光禄大夫有文集二十巻娶李氏唐御史大夫栖筠之後晉卿之女累封建安郡君先公卒贈永寧郡君子三人祐祁皆承奉郎裕尚幼女五人長適朝請郎知楚州何洵直次適宣徳郎秘書省正字王炳早卒次適宣徳郎太學博士王渙之次復適王炳季適方平之子朝散郎南京通判恕孫男六人將以元祐七年八月二十二日癸酉葬於蘇州長洲縣彭華鄉陽山之栗隖銘曰天之降材千夫一人人之逢時千載一君生之既難得之豈易而被讒人曾不少置昔在帝堯甚畏巧言讒說震驚雖堯亦然偉哉滕公廊廟之具帝欲用公將起輙仆賴帝之明雖仆復興小試於邉戎狄是膺日月逝矣嵗不我與老成云亡吾誰與之若古有訓無競維人公之治邉折衝精神猛虎在山藜藿茂遂及其既亡樵牧所易公官三品以夀考終我銘之悲夫豈為公滕章敏公墓王賔荒涼不見舊碑銘遍問人誰識姓名却是勲賢滕達道幾番為將鎮邉城滕章敏公墓在陽山栗隖樂圃先生墓表米芾樂圃先生吳郡朱氏名長文字伯原光禄公之子十九嵗登乙科病足不肻從吏趨築室居郡樂圃坊有山林趣著書閲古樂堯舜道乆之名稱藹然一邦向服郡守監司莫不造請謀政所急士大夫過者必奔走樂圃以後為恥名動京師公卿薦以自代者甚衆天子賢之起為本郡教授以為未廣也起為太學先生以道授多士未幾擢東觀仍兼樞府屬元符元年二月丙申遘疾不禄享年六十子耜杭州鹽官尉耦耕舉進士以六月葬至徳鄉從光禄之塋先生道廣不疵短人人亦樂趨先生勢不在人上而人不敢議葢見之如麟鳳焉方擢用使大施設而命不假朝野惜之著書三百卷六經有辨說樂圃有集琴臺有志吳郡有續記又著琴史其序畧曰此朝廷成太平志也至於詩書藝文之學莫不造古騷雅死之日家徒藏書二萬巻天子知其清特贈縑百疋嗚呼先生可謂清賢矣予昔居郡與先生逰而知先生者也表曰窮達有命出處有時司出處者非命而誰時與命違士能不出出而無命就諗於時升公之堂理公朱絲清音不改樂圃松悲嗚呼哀哉江淮荆淛等路制置從事米芾表樂圃朱長文墓在支硎山南峰西張景修銘宋定城令方氏夫人墓志銘方汝勉夫人方氏諱靜真世出苕溪皇曾祖朝散大夫渭皇祖朝奉大夫通判紹興府楶皇考迪功郎丹徒縣主簿燠後歸姑蘓故從事郎定城令君趙公用夫人生於乾道庚寅三月二日終於淳祐辛丑三月四日享年七十有二以㔗遇明慶霈封太孺人子三人長勮疾廢次㔗永直郎淮東縂領所凖備差遣皆先夫人亡次鵬舉業儒女三人長適迪功郎江州司户楊澤次適進士張復震孫男七人出繼者一女四人明年壬寅二月庚申鵬舉䕶夫人柩葬於姑蘓長洲縣彭華鄉虎疁之原合定城公之兆也夫人性婉而識明氣剛而志正言動皆典刑趙氏内外五千指咸取則焉治家以儉檏為先初笄之衣暮年翼如也然財不求豐僅足而已姻親貧者賙之恐後每嘆曰吾少時屯棘更嘗至矣今粗得清適於是爐香貝葉自課忘倦淺斟無筭竟日熙熙忽嬰㣲疾卒然而逝得道者莫能過也卜葬有日鵬舉書来求銘汝勉於夫人為内表而夫人之在盛氏也以女娶焉期待慰薦最為深厚且知夫人行實甚熟也其敢以不文辭銘曰苕溪之淑嬪于姑蘓趙族蕃熾間言一無定城公沒撫其諸孤不愧三遷賢譽翕如儉以禮制嚴以恕扶内典逰心能味其腴鬱哉佳城虎疁之墟勒銘堅石萬歲與俱表弟朝奉郎通判福建軍州兼管内勸農事汝勉撰從弟從事郎新建康學教授逢辰書文林郎差充淮東制置大夫凖備差遣王棨題葢宋故武功大夫濮州團練使浙西路縂管開公埋銘趙天瑞公諱趙字興宋世為沂州臨沂縣人公名本姓也因國步中衰以開為姓者欲開大我國家之疆土云耳曾祖喜祖忠俱贈武義大夫父某封武義大夫其封贈皆從本姓則公改姓之意又著矣曾祖妣李氏祖妣張氏母某氏公自紹興二十八年結豪傑起義兵衆推公為首不旬日有衆數萬收復宻州日照縣等處聚集忠勇三十餘萬攻淄齊等州差充忠義軍馬都統制領京東河北路招撫使李寳同逰海道十一月差充山東河北路忠義軍馬都統制將所得大漢軍三千餘人及本部統制將等二萬餘人歸正本朝三十二年春授修武郎閤門祗候充忠義逰擊軍都統制秋轉武翼郎隆興元年二月轉武功郎改差充沂州忠義軍馬都統制告為先海州䇿應解圍之功也當年夀皇登極覃恩轉武英大夫差充鎮江府駐扎御前右軍統制二年召對稱㫖賜金帶差充殿司右軍統領十一月改差充江隂軍駐扎御前水軍統制結局依前殿司供職乾道二年轉武略大夫英州刺史告為膠西宻州之功也三年將歸正人卒或作過例降受武義大夫依前英州刺史添差兩浙西路兵馬都監臨安府駐扎四年叙復武畧大夫充浙西兵馬鈐轄臨安府駐扎七年依前兵馬鈐轄平江駐扎未赴改平江府兵馬縂管轉武顯大夫淳熙改元添差浙西馬步軍副縂管五年轉武義大夫十二年因父武義侯疾危刲股以救事聞於朝上謂公孝其可特授濮州團練使十二月丁武義憂服除再任公以紹熙改元三月一日終于平江私第之正寢享年五十有七是年六月十四日葬于長洲縣彭華鄉管山之原去武義墳無二十步妻令人林氏先䧟敵未歸得㫖許娶乃娶解氏先公十年卒公有子天瑞天錫保義郎從祖武義姓以為繼曰佐保義郎試中材武未注授曰偉保義郎任侍衛步軍司左軍馬軍凖備將曰佑曰伸習舉業曰儀曰侁皆幼孫男四人孫女一人孤子天瑞銜哀識宋鎮東將僉判王公墓志王庚孫先君諱斗文字仰之先世自閩徙吳遂為笠澤人少力學精六典嘉定己夘預鄉薦庚辰登乙科其歴官以丁艱而不赴者一慶元户掾也以選部注者二池陽倉曹金陵酒庫也以為辟差者三當塗差遣淮西縂幕也以京秩之先迭為剡薦則提舉趙公范郡守楊公空雲汪公紹制使陳公善湘以陞削舉制使吳公麟蔡公範帥閫陳公愷楊公恢督視史公守則以改秩舉曹使曾公穎茂鄭公起潛京尹趙公與􅊸郡守高公夢月以陞削舉參政王公伯大侍郎樓公治以特薦舉也其積階則由迪功郎關陞從政郎由儒林郎改通直郎洎轉奉議郎為憲臺誣以他過降授宣教郎越六年而後復繼轉承議郎自淳祐己酉再起合改朝奉郎方磨勘問而先君奉㫖往鄞郡審勘死囚染疾致斃郡守憐其勤勞王事有請於朝令通理納禄矣先君性恬澹雖登仕版不改寒素善與人交手不停編小善一藝無不録也亷以律己勤以盡職若身若家一不暇計故宦逰所至有聲書判成帙飾吏事者爭傳以為法不務進取每以耐菴自號督餉循資則悉遜同寅而不芥蔕獄空底績則三見其效而不自矜處帥幕則放軍請之孤遺宰京畿則以已俸而代賦所施未及萬一竟以淳祐辛亥仲冬七日捐館享年六十有五曾祖閔故從事郎祖亶隠徳不仕父籍累贈朝奉郎母太安人施氏後先君十有一月卒妻陶氏封孺人子庚孫將以次年孟冬癸酉奉柩葬于長洲縣彭華鄉滸墅之原葬且薄未暇乞銘當世君子姑叙梗槩納諸曠云宗弟迪功郎新差充通州州學教授莧填諱孤子庚孫泣血書重封宋圯墓大畧方鵬滸墅虎疁之諱名其地平原葬稍缺處亦不避燥溼惟攢石厚土封為邱嗣祀無恙世逺祀弗嗣民日稠廬竁而居墓罹不仁之害矣予未改厄院為義塾與民比隣古之葬地也蔽於環居而莫知之民惠錦執負租累嵗故納塾傍西園作便所往視北盡圯塜露三木左中並而中䧟右下皆尺餘環木盡脫僅一畦剝塜土而高下未夷詢董工民云趙王墓也録泐志来見則宋承議郎耐菴王先生所葬命完砌移土厚封匝界瓴垣通門於塾以杜外伺夷畦偪垣樹栢數十株飾溝臺得志石一角覓集散泐又宋定城令配孺人方氏刻也緣地連續塟者兩姓合稱日乆傳訛遂爵指之非也兩石尚悉可據聞趙石為奸者滅跡於水無可覓今按方志則三木皆趙定城者或以右木少讓為耐菴之柩斷無此理方以淳祐壬寅合葬於定城之兆趙氏内外取則於方尚五千指而王庚孫瘞耐菴則淳祐壬子相距十年趙豈竟絶而容異姓亂邪况庚孫自志厥考又非昧者必知逺嫌肯自亂其祀邪發人之冢以附其親孝子能為之哉至愚泥術巳葬氣破亦不為也有謂趙之副室附於方之右不敢齊下者理或然耳及審耐菴墓頋澤輩又云前數年有民頋煜訟民孫永吉兄弟發二冢于官今皆不存居方易姓矣耐菴之墓必罹此害也由此觀之發人之冢者安於無主竟為他人圖而招自絶焉天道好還鬼神所司假手之報豈欺無主哉耐菴墓無迹矣幸泐石可集甓立於塾園趙之門南昭昭不雜亦托以綿享祀人為同類斯文更親乏嗣幽𡨕豈無戚焉君子不忍也王先生斯文也時而祀之君子可以觀其仁焉乏嗣之俗庶乎免夫雖然古之人葬親從土自厚慎防也趙之三木三百餘年非堅莫待今完木更重也而今而後仁人孝子鑒亦昭昭矣三圯墓滸墅辟義塾所得事具方鵬封墓畧内韓忠武王世忠中興佐命定國元勲之碑趙雄上纘阼之十五年威行徳孚丕冒海隅出日罔不畏服罔不願為臣妾上益勵精行健冀大有為聞鼔鼙而思勲臣于昕夕不忘乃二月甲午制曰韓世忠感㑹風雲功冠諸將可特賜諡忠武盖太師韓蘄王之薨之葬至是已二十有六年而褒崇益光遂與漢丞相亮唐汾陽王子儀同謚宸奎内出不由有司中外偉之時王子彦古方居蘄國夫人憂聞詔感泣繼血即拜疏謝又拜疏請曰艸土臣彦古謹昧死言臣之先臣世忠發身戎行逮事徽宗欽宗皆著顯效暨委質太上皇帝自大元帥覇府洪濟于中興始終實備大任仰憑宗社威靈與太上皇帝廟謨神算摧勍敵如拉朽芟劇盜如刈菅大戰數十小戰數百豐功盛烈光照古今不幸早棄明時亦既積年陛下憫念勲勞固嘗爵以真王錫之美諡獨墓道之石無名與文惟陛下哀矜究此光寵豈獨諸孤顯耀抑先臣有知猶當效結草之忠天子曰嗚呼惟乃父世忠自建炎中興實資佐命式定王國時惟元勲予其可忘乃親御翰墨大書曰中興佐命定國元勲之碑翌日朝諸將于凌虚閣特詔彦古戎服入見面賜御書俾冠于碑首頋謂諸將曰世忠有大功於帝室今彦古亦克有志世其家予惟寵嘉之是用錫此豐碑諸卿勉哉諸將感激奮躍益知國家之不負臣下也忠孝之不可以不盡也功名之不可以不力也皆趨下再拜彦古亦再拜泣而出既又詔禮部尚書臣雄曰汝其銘世忠之碑臣雄以謂聖主褒崇元臣兹事體大頋末學弗稱且祖諱與王名諡適同尋上書懇辭上遽批出畧曰君前臣名臨文不諱不許辭免臣雄於是惶恐奉詔謹拜手稽首上故太師蘄忠武王遺事曰王諱世忠字良佐姓韓氏韓氏本古列國後為秦所併子孫自韓原渡河散居延安以國為姓故王世為延安人曾祖諱則居鄉以義俠聞家故饒財賑貧藥病多所全活既沒有異人指其所葬地曰代代當生公侯後以王貴贈太師楚國公曾祖妣郝氏吳國夫人祖諱廣考諱慶皆贈太師秦陳二國公祖妣高氏妣賀氏冀楚二國夫人楚國生五丈夫子王其季也始震之夕有光芒出屋間鄉鄰以為火各具綆缾馳救至則聞王生皆異焉就襁褓輒流瞬瞬則目光如電楚國洊驚而心竒之少長風骨偉㟁尚氣節能屈西邉諸豪里中惡少年皆俛首不敢出氣則爭為之服役或負債不償者王輙為償負者後聞亟持所償愧謝里俗為之一變有寃抑不以謁郡縣而謁諸王咸得其平由是名聞關陜嘗過米脂寨姻家㑹飲日已夕而關閉王怒以臂拉門關鍵應手而斷旦視之其木葢兩拱餘關吏駭服年未冠以勇敢應募鄉州挽強弓一百觔嘗乘悍馬手舞鐵槊奔馳二郎山峭壁間觀者膽裂同列無一人敢繼者軍府校藝獨用鐵胎弓所向雖金石皆洞貫其騎射絶人類此時崇寧四年也屬四方多事王每聞邉警至輙上馬或不伺鞍而奮喜與交逰痛飲資用通有無或不持一錢相從謁酒肆貰酒期於戰獲鬻級以償王出必多獲由是同列皆饒給銀州之役將從党萬以行父母素鍾愛不許王固請于陳公曰大丈夫當建功業取公侯豈宜齪齪自守陳公竒其志乃聴去軍甫至而城閉王直排扉入斬主將擲首陴外三軍乘之大克繼而夏人以重兵来㓂次蒿平嶺王與党萬悉精銳鏖戰賊解去而突騎忽出間道𢷬我營將士驚愕王獨部敢死士殊死鬬賊少却王為殿見一騎士甚武揮槍而前問俘者為誰曰十軍監軍駙馬郎君烏貝也王躍馬從之斬其首賊遂大潰由是西邉益服王威名經略司圖上其事且乞優賞㑹童貫専制邉事疑敢勇皆勢家子有所增飾止許補一資衆譁不平而王恬不芥蔕當時識者知王器量宏逺矣從劉延慶築天降山寨敵遽有之延慶令王守北門王夜縋城而下斬二級割䕶城氊以獻繼逢敵於佛口寨斬賊首數級始補守闕進義副尉至臧底河又斬三級轉進武副尉㑹妖人方臘起桐廬自號聖公殺掠吏民自浙河東西至于江南毒流葢千里南方素無兵備詔調西帥討之王部敢勇五十人隨王稟以往遇别將王淵於杭之北關堰橋㑹大潦道不通賊揜至淵惶怖不知所出王造淵說曰今賊據險爭利我不以智勝而以力拒可乎淵怒曰何人敢爾王益辨論不少屈淵曰汝雖能言願聞必勝之說王為調一二且請以所部邀擊淵命取軍令狀以去明日㑹戰賊勢張甚王選敢勇二十餘人伏堰橋傍須㬰伏發賊衆大亂王追至泊舟前斬首數級師遂大克淵乃嘆服曰真萬人敵盡以所隨白金器賞焉與淵定交自此始至今杭人呼堰橋為得勝橋云時天下忘戰日乆盜起倉卒天子宵旰南頋詔能得渠魁者授兩鎮節鉞王單騎窮追至睦之清溪洞賊根據巖屋為三窟諸將繼至莫知所從入王潛行溪谷間問野婦得其洞口即挺身仗戈而前榛棘嶔﨑越險數里𢷬其巢穴縛偽八大王格殺數人臘遂就擒併俘以出辛興宗後至領兵截洞口掠王俘以為已功故王不受上賞别帥楊維忠還闕少伸其事但超轉承節郎朝廷議復燕山調諸軍以行至則皆潰王往見劉延慶抵滹沱河獨與蘓格等五騎列于高岡戒勿動值燕山潰卒來㑹然皆重傷者王即命艤舟河㟁約曰敵奔即鼓噪助聲勢王乃獨躍馬薄敵回折自如敵疑之分為二隊據坡以觀王出其不意突刺二執旗者因縱擊格等五騎應於後舟中潰卒亦鼓噪如約敵疑我伏發遂大潰追斬甚衆是時山東河北盜賊蜂起王從王淵討捕所在摧鋒於大名境中殺水賊幾盡大破湯村強盜累建竒功轉秉義郎以偏將從梁方平經畧東事賊楊天王透手滑聚衆數千㓂尉氏一戰擒其渠帥餘黨悉平臨沂賊武鬍衆數萬戰于韓王店又平之沂州賊徐進衆五萬而官兵不滿五千王止以衙兵五十餘薄賊誅馘悉盡又青社賊張先水鼔山賊劉大郎望仙山賊高托山集路山賊賈進莒賊徐大郎衆皆不下萬人大者或跨州兼邑王每身先諸將次第擒滅又殺獲東海賊張䕫等由濟南振旅而歸於是山東諸盜悉平轉武節郎欽宗即位之初王從梁方平防河濬州金人大軍巳壓濬境方平漫不頋以為他盜王說曰今之来者金人耳願公速整行陣為䕶河計河一失守宗社阽危公可忽乎王忠憤由中詞氣激烈方平怒俾王以三十騎當敵名曰硬探實欲致王死地王遇敵輙戰以實歸報方平猶以為紅巾賊不設備及敵進迫屯子橋則方平脫身遁矣王師既失主帥數萬之衆皆潰敵騎大至䧟數十重圍中意氣彌壯挺鎗奮躍而前所向披靡敵嘆異小却即潰圍出殿諸軍焚橋而歸至京師欽宗聞王勇冠三軍召對便殿且訊方平失律之狀王條奏甚悉轉武節大夫俄召諸路勤王兵入衛王𨽻京城四壁為統領屬敵人許割三鎮而還王淵為河北縂管辟王為先鋒統制有勝捷軍統制張師正者戰敗轉徙大名留守宣撫使李綱斬之以殉師正所部本童貫牙兵初貫創勝捷軍諸軍之選每禁軍一指揮所選止一二人或三四人皆人物魁梧武騎超絶者纔得五千餘人後𨽻師正師正死此軍懐反側遂相約為亂鼓行而東刦掠淄青間影附脅從者四五萬人號二十萬所過無有噍類山東復擾王以戍將寓大名雅為綱所器重遂檄王以所部五百人討之至淄河以軍分為四隊布鐵蒺藜窒歸路令曰前則有功退則死有怯走者許後隊殺以為功於是士皆效死莫敢回頋至夜半縱兵襲賊砦賊皆驚擾旦而接戰大破之斬其魁李復餘悉奔潰王窮追不巳賊伏潰卒數千出我不意王不及介冑上馬趨之矢石雨下指臂吻鼻中四鎌王怒折箭披弓㧞刃徑前殺為首者六人賊衆又奔追至宿遷其衆尚萬餘謂巳逺王不能及方擁其所掠子女椎牛飲酒王單騎疾馳夜造其營呼曰大軍来矣速束戈巻甲吾能保全汝等以共功名賊自淄河破膽皆跪請命曰願吾父貸死因進牛炙斗酒王下馬飲啖輒盡衆莫敢動悉束手降黎明見王所部止此始悔之而業巳解甲莫不相顧失色遷左武大夫果州圑練使將所降朝京師欽宗再賜對慰奬甚渥賜衣甲鎗牌除正任單州圑練使就命將所部屯滹沱河真定失守王知滹沱形勢已蹙去之趙趙守葢王淵云淵得王恃以自固敵再入攻趙知王在焉攻益急粟寡援絶孤城更數日殆破王一夕潛將三百人𢷬其營敵大驚亂翌日遁去後有自敵来者始知大酋二都統是日被鎗已斃衆遂不能支除嘉州防禦使將所部還大名縂管趙野辟為前軍統制光堯夀聖憲天體道性仁誠徳經武緯文太上皇帝時以天下兵馬大元帥駐濟陽王領所部勸進復自濟陽次南京敵縱兵逼城人心洶懼王據西王臺力戰敵稍却翌日再至而其帥白馬三郎以衆數萬薄城王時所將僅千人與敵遇單騎突之斬其帥以還部兵乘勝鏖鬭衆大潰南京圍解郡守率父老迎謁居民香火夾道多感涕者王還詣濟陽勸進遂扈蹕如南京太上即位授光州觀察使帶御器械王請移蹕長安下兵收兩河朝議不從始建御營以王為左軍統制詔平濟州山口賊解大刀李昱等所向剿除陞定國軍承宣使依前帶御器械制曰解趙城之圍威鎮河朔却朔馬之牧效著睢陽皆紀實也車駕幸維揚王以所部扈從甫至賊有張遇者號一窩蠭既破儀真自金山以衆来降抵城而不解甲扈從者危懼王單騎造其壘曉之以逆順禍福叱使速降衆遂解甲聴命李民擁衆十萬亦既来降比至維揚復狼頋整厲器械詔王淵處置淵以屬王王往諭㫖誅梗議者劉彦驅李民以出縳小校二十九人送淵戮之以民𨽻王軍分其衆屬大將軍俊事遂定授王京西等路捉殺内外賊盜時敵再犯河雒王率敢死士戰于孝義橋所殺巳數千人而别將以後軍先退敵衆乘我王身被鏃如棘卒力戰以免後至汴詰先退一軍皆斬左右趾以殉威令大振自是軍不復敗矣召還行在授鄜延路副縂管加平㓂將軍承節帶御營統制如故未幾詔王領所部如山東王聞車駕幸錢塘遂由海道趨行在時建炎三年也未至有裨校叚恩亡至都下詭言王兵潰䧟敵物情震駭殿前統制苗傅劉正彦素蓄異心聞王䧟沒無復忌憚遂勒兵反殺僉書樞宻院事王淵及内侍數十人奉太上居别宫㐫熖熾甚神武中軍統制官吳湛又隂與同惡王在海上聞變望闕慟哭舉酒酹神曰誓與此賊不共戴天舟中士卒亦皆痛哭思奮禮部侍郎張浚在平江方欲議討亂與諸將環坐計未有所出聞王且至更相慶曰韓公之来此事必辦王至見浚相與號泣曰何猶豫為即日與浚定復辟之議乃先諸將行時道路譁言傅正彥謀挾乘輿以出中外洶懼王曰賊素知畏我我至彼敢爾耶尋命偏將張世慶搜絶諸路郵置使偽命不行至嘉禾造攻具甚急傅正彦矯制止王且除節鉞王不受命㑹江淮兩浙制置使吕頥浩亦来王迎謁於郊頥浩問曰賊計無他虞乎王曰彼怙勢憑衆脅取鐵劵自謂不死安有他虞又問可必勝乎王曰以順討逆何為不勝頥浩曰知彼知己可以戰矣時楊國夫人及二子質傅軍防守甚嚴王畧無頋念㑹隆祐太后宣見楊國楊國詣傅紿曰太尉作如許事公来矣於太尉何如傅乃屈膝拜曰願奉兄嫂禮謹具鞍馬煩夫人好為言是日入見隆祐宣問周悉執楊國手垂泣曰國家艱危至此太尉首来救駕可令速清巖陛楊國奉詔馳出都城遇傅弟翊于途告之故翊色動手自捽耳楊國覺翊意非善愈疾驅一日夜㑹王于嘉禾王見之驚曰汝輩在耶俄而明受詔至王曰吾知有建安官家安知明受耶斬其使焚其詔進兵益急傅等大懼遣將領張永載謝罪且出御札曰知卿巳到秀州逺来不易朕居此極安寧苗傅劉正彦本為宗社終始可嘉卿宜知此意徧諭諸將務為協和以安國家王知脅求詔㫖非太上本意諭永載曰天子即復位事乃可緩不然吾今以死決之賊得語知不可解即日復太上明辟王晨夜兼行承宣使張浚遣兵三千助王王頋所部或非素所拊循乃悉收家屬詣軍及合戰臨平艤家屬舟㟁下由是師徒登㟁擊賊無一不用命者賊將苗翊馬柔舌以重兵負山阻河為陣且於中流植木為鹿角以梗行舟岸間塗淖不可馳王乃下馬揮戈令軍中曰今日當以死報國若面不帶數箭者皆斬士殊死鬭轉至剪刀山下賊以其神臂弓數千持滿而待王瞋目大呼挺刅徑前賊辟易矢不及發連戰皆大克直造北關門傅正彦自授江東制置使提禁旅數萬以遁朝廷慮其遂逸去詔能生擒傅正彦者有官人轉承宣使無官人授正任觀察使其餘獲逆黨賞各有差王入朝行宫拜且泣曰逆賊不道主辱臣死臣願受命縛此二逆因奏曰逆賊擁精兵數萬去甌閩甚邇萬一寖成巢穴愈難撲滅臣請速除之未審聖意欲生致之耶抑函首以獻耶太上曰能殺之足矣王曰臣願生致之顯戮都市為宗社刷恥不然則臣為欺天殿前虎賁有宋金剛張小眼者號膂力王乞以從欲俾䕶俘来王時所部纔數千人請止以所部行太上壯之酌巨觥以餞因握手語王曰統制吳湛佐二叛為逆卿知之乎王曰此易與耳時湛已不自安嚴兵為衛王詣湛與語手折其中指遂擒以出門下兵衛驚擾王按劍叱之無敢動又親擒湛黨王世修同日伏誅王遂行詔除武勝軍節度使御前左軍都統制王兼程追襲賊方圍三衢聞王師来即解去將趨上饒王恐其或滋蔓閩廣也徑自浦城捷出迎之漁梁驛與賊黨遇夜半勒兵距浦城十里賊跨溪據險設伏正彦屯溪北傅屯溪南相約為應俄而接戰部將李忠信趙竭節恃勇䧟陣馬彦溥馳救死之王挺鎗徑前賊望見咋曰此韓將軍也乃潰擒傅正彦及傅弟翊遣所乞二虎賁䕶俘獻行宫斬于建康市師還至蔣山太上遣中貴人賜金盒茶藥并御書忠勇二字表王旗幟詔曰餘杭之難卿首奮忠勇已破凶逆朕之復辟惟卿之功除檢校少保武勝昭慶軍節度使御前左軍都統制楊國自碩人超封國夫人制曰智畧之優無愧前史給内中俸以示報焉功臣妻給俸自楊國始改除武勝定國軍節度使依前檢校少師御前諸軍都統制烏珠入㓂車駕復幸臨安命杜充以尚書右僕射守建康王守鎮江兼制海道王方治舟秀之青龍無何充以建康叛降于烏珠烏珠遂自建康取宣城直至廣徳徑趨臨安車駕又幸四明王聞之亟以舟師赴難未發烏珠聞王在京口遽勒三十萬騎北還王即奏願留江上勦除使絶南牧之患遂提兵截大江以要之先降其將鐵爪鷹李選太上賜札曰比在㑹稽吕頥浩獻議欲㑹兵京口邀截歸路遽覽来奏及圖上方畧寔契朕懐惟卿忠憤之誠謀慮之審千里之外不謀而同載觀圖規深所嘉嘆今以獲敵資財物盡與將士并除空名札二百道用資給賞烏珠遣使通問王亦遣使臣石皋報之約日㑹戰戰數十百合敵終不得渡復致詞願還所掠假道不聴請益以名馬又不聴敵乃益兵儀真勢接建康烏珠軍於南達蘭軍于北王提海艦中流南北接戰相持黄天蕩四十有八日烏珠窘甚求打話王酬答如響時於佩金鳯瓶傳酒縱飲示之敵見王整暇色益沮乃祈假道甚哀王曰是不難但迎還兩宫復舊疆土歸報明主足相全也烏珠語塞又數日求登岸㑹語王以二人從見復申前懇而言不順王怒且罵引弓將射之亟馳去敵自知力憊粮竭或生變而王舟師中流鼓枻飄忽若神凡古渡津口又皆以八面控扼生路垂絶乃一夕潛鑿小河三十里自建康城外屬之江以通漕渠刑白馬剔婦人心烏珠自割其額祭天幸風濤少休竊載而逃王諜知其謀悉舟師督戰㑹風弱帆緩敵得以輕舸渡去土人稱為番人河其後秦檜主和更名新開河云先是王治兵鎮江嘗曰是間形勢無如金山龍王廟者敵必登此以觀我虚實乃遣將蘓徳以二百人伏廟中又遣二百人伏岸下約曰聞鼓聲㟁兵先出廟兵繼之數日敵至果有五騎趨入廟廟中之伏喜先鼓而出五騎振䇿以馳僅得其二有一人紅袍白馬既墜復躍馳而脫詰二人者云即烏珠也是舉也烏珠僅以身免俘獲殺傷者不可勝計所遺輜重山積所掠男女獲免者不知數又獲龍虎大王舟千餘艘捷聞太上賜札曰卿比統率舟師要擊勍敵忠勇之節逺近所聞相拒大江殆彌兩月殺傷莫計俘獲良多所有已立功人早以功狀来上當優與推恩又札曰朔馬飲江大肆殘虐卿感激思奮慷慨自期獨提全軍往邀歸路將士用命水陸齊攻捷音遽聞殺獲甚衆言念忠勞不忘嘉歎未幾除檢挍少師武成感徳軍節度使神武左軍都統制時劇盜數起閩中荆湖震擾朝廷為出禁旅遣辛金宗討之師老不能平福帥程邁監司侯慤等力請改命將帥章四十三上太上乃除王福建江西荆湖南北路宣撫副參政孟庾以行賊范汝為據建安衆踰十萬至僭造黄傘等王曰建居閩嶺上流使賊沿流而下則七郡皆血肉矣於是選輕銳航海徑趨福唐擁衆而上福帥迎謁且言賊方銳宜少休以俟元夕王笑曰吾以元夕凱還見公矣因酌酒以别師次延平劍潭湍險賊焚橋以拒我師王䇿馬先浮以濟師遂濟士氣益倍距建寧百里許賊盡塞途路埋巨木為鹿角散布竹簽鐵蒺藜䧟馬坑凡可以抗拒王師者無不用其至王即命諸軍偃旂仆鼓捨正路俾各擇便利沿山塹溪披踐荆棘遂達郡之鳳皇山繞出賊背下瞰城邑如在井底火樓巨石天梯雲梯百道齊攻汝為震怖以為從天而下五日城䧟汝為竄身自焚回源洞中又有陸必強葉鐵骨陸必先張弓手熊致逺等皆號賊驍將分兵四刦而葉諒者别以一軍再㓂邵武王悉擒斬之凡殺賊衆三萬餘人生擒渠首張熊等五百餘人士人之附賊如施逵謝向陸棠等皆械送行在所乃令軍人悉駐城上毋得下植旂城之三隅令士民自相别農者給牛榖使耕商賈者弛征禁為賊者使民得甘心脅從者貸遣建安之民自以為䝉再生家立生祠共刻其事于石至今奉香火惟謹太上賜札曰省奏范汝為巳就滅亡遂釋朕南顧之憂其餘畸零賊黨并葉諒等想巳招捉惟務隨宜處置勿留後患又札曰卿比執訊獲醜安靖一方非特秋毫無犯給耕夫之牛使不失時雖古名將何以加諸朕始聞此喜而不寐是惟威愛兼得體我至仁加惠斯民者卿之勞苦寔永朕懐王遂條奏江西湖南羣㓂要須以時平定乘勝撲滅勢若破竹詔從之王旋師永嘉若將就休息者已而道括蒼上饒徑至豫章江濵連營數十里賊不虞王之猝至以為神大驚於是曹成馬友李宏等次第来降王悉分配諸軍即日移師長沙山東賊白氊笠劉忠有衆數萬嘗與烏珠轉戰頡頏而南據祁陽之白綿山自黔其額號花面獸山險重複營柵相望凡一年莫敢嬰其鋒者王始至即欲急擊之曰少延嵗月湖南生靈無種矣庾不可曰功幸已成而師勞若更趨白綿如有不捷前功盡廢王曰兵家利害世忠䇿之審矣非參政所知請期半月當馳捷以獻庾不能奪王即將所部與賊對壘乃奕碁飲酒按兵不動者累日衆莫窺其際一夕獨與親信蘓格便服聨小騎直穿賊營警夜者呵問王曰我也葢王已諜知賊中約以我字為號故所向不疑遂周覽營而出喜曰此天賜也即下令明日破賊㑹食遂命諸軍㧞柵前行先遣鋭卒二千銜枚夜進伏于白綿山上戒曰賊必空壘来戰若疾馳入奪中軍望樓駐麾張葢既而賊以三萬人拒戰交兵自寅至已賊精兵迭出勝負未分俄而所遣鋭卒二千植旂葢於賊之望樓傳呼如雷震賊回頋驚愕進退無所據遂潰亂王乃傳麾令上下夾撃將士爭奮大破之追斬忠于小舟傳首闕下下令敢掠子女者斬湖南遂平戰克之日與庾所期如合符契詔除太尉餘如故又賜札曰出師嵗今將期以爾勞苦繄我憂忡比又李宏瓌值劉忠敗績益張吾武震撓兇徒朕甚佳之且以防秋戒期狄怨是念卿其振旅来歸竭盡智力以圖大功而後喜可知也王授鉞以出掃清三方太上偉其功詔樞宻院以功狀頒示内外諸將各務奮厲共舉中興以光史冊師還建康乃置背嵬親隨軍皆勇鷙絶倫者除開府儀同三司節制依舊充淮南東路宣撫使泗州置司明年以建康鎮江淮東宣撫使駐鎮江是嵗烏珠與其將托卜嘉合三路兵入㓂騎兵自泗取揚步兵自楚取高郵塵覆飛鳥太上賜札曰覽卿平楚之奏良用駭嘆今敵氣正鋭又皆小舟輕㨗可以横江徑渡想卿謀畫已定可保無虞更宜率勵將士戮力勦除此亦卿前日之所論奏也浙西趨行朝無數舎之逺朕甚憂之卿忠憤憂國朕所素知協濟艱難正在今日切更多筭以決萬全又札曰朕以逆臣劉豫外挾強旅驅率吾民遣兵東向觀其措意必欲圖危社稷人神所共嫉覆載所不容卿為國大臣乃心王室忠憤之氣想實同之今直犯真滁已逼江上而建康諸渡舊當其衝萬一透漏存亡所係卿宜戮力一心以赴國家之急先飭守備徐圖進取無失事機以墮賊計朕雖不徳無以君國子民而祖宗徳澤猶在人心所宜深念累世涵養之恩永垂千載忠義之烈興言及此當體至懐王受詔感泣曰至尊憂勤如此臣子何以生為遂自鎮江濟師以前軍統制解元守高郵候其步兵而王親提騎兵往大儀以當淮泗之㓂伐木為柵自斷歸路大㑹將佐曰金人馬步分道並進車駕方在江南有如不勝必為社稷憂諸軍奮忠義以報國此其時矣吾平昔恨無死所以㧞橋斷路示無生還之望遂大享士俟戰士皆感奮氣自百倍㑹朝廷遣魏良臣使敵至維楊王置酒送别杯一再行流星庚牌沓至良臣問故王曰有詔移屯守江乃撤炊爨班師良臣竊自喜疾馳去王度良臣已出境乃上馬令中軍曰視吾鞭所向於是六軍大集北行至大儀勒精兵為五陣設伏二十餘處戒聞嚴鼓之節則次第起撃良臣至敵營果問我師動息悉如所見以對烏珠號知兵聞大軍倉卒南還喜甚與其將厲兵秣馬且趨江口至大儀五里所王縱敵騎過吾軍之東直北傳小麾鼓一鳴伏者四發吾軍旂與彼雜出敵軍亂我師伍伍迭進步隊各持長斧斫馬足敵全裝䧟塗淖弓刀無所施王東西麾勁騎四面蹂之敵大半乞降餘皆奔潰追殺數十里烏珠乘千里馬以遁積尸如邱垤擒其驍將托卜嘉生俘敵人千五百餘人獲戰馬五百餘匹器械輜重與平山堂齊勢大振烏珠還泗上召良臣詰責其賣已將斬之良臣好詞以免解元至高郵亦遇敵人設水軍夾河而陣列我師皆願効死敵整隊迭出一日之間合戰十三士力稍罷相拒未決王遣成閔將勁騎往援之閔與元軍合復大戰生俘敵人及千户長等遂敗去俄而王至窮追于淮軍復大戰敗之奔走相踏藉沒溺死者不可勝計捷書沓至羣臣入賀太上曰世忠忠勇朕知其必能成功賜札曰聞卿獨抗大敵勦殺俘獲數以萬計攘逐過淮全師而還甚慰朕望烏珠舉國来㓂憑陵邉圉非卿智勇冠世忠義徇國豈能冒犯矢石率先士卒以寡勝衆俊偉如此朕深念卿躬擐甲胄之勞將士摧鋒力戰之苦夙宵震惻痛切在躬得卿来報頓釋朕懐初敵既傾國内侮朝廷過計有勸太上他幸者於是降㫖議散百司物論譁然獨宰相趙鼎與王議合曰戰而不捷去未晩也至是敵既潰散王自淮上振旅南旋江左遂安故論者以此舉為中興第一除少保武成感徳軍節度使淮南東路宣撫使鎮江置司王在鎮江一日方㑹諸將置酒敵帥達蘭恥前敗覆以書幣来約戰王即席遣伶人張軫王愈之持橘茗為報報書略曰元帥軍事良苦下諭約戰敢不疾馳行李以奉承指揮也達蘭謀屈卒不来未幾全軍遁去然諸將徘徊頋望無敢渡江者王獨請移軍窮邉經理中原太上賜札曰昨因敵近議者以經理淮甸為言人多憚行卿獨慨然請以身任其責朕用嘉之又曰今聞全師渡江威聲遐暢卿妻子同行否乍到醫藥飲食或恐未備有所須一一奏来也改除武寧安化軍節度使依前少保充京東淮東路宣撫處置使兼營田大使楚州置司兼節制鎮江時楚累經殘掠邑屋皆邱墟榛棘王至則撫集流亡通商惠工創新營壘民心安固軍氣日益振厲於是曩時煨燼瓦礫之塲化為雄都㑹府隠然為國長城矣劉豫間遣兵入㓂每為王所攻却生擒偽知鎮淮軍王拱食粮軍數百獻于朝是年敵又犯漣水王迎撃殺其將孫統領追至金城時豫鋭卒盡屯宿遷聖女墩王以輕兵破之轉戰至徐之駕口軍既單弱而敵援兵額哩頁筭濟舍人踵至遂以背嵬輕騎五百衝之為敵所圍王突圍㧞衆以出復乘鋭掩撃過落馬湖五十餘里殺傷不可計攻淮陽旦暮且下㑹詔班師王急還道遇偽齊師劉㹸率金國三路都統太一貝勒鑿山水晶相㑹青州五路都統東平府總管及烏珠舉兵自河間與諸道㑹王結陣向敵遣小校郝彦雄造其軍大呼曰錦袍氊笠騘馬立陣前者韓相公也衆咎王王曰不如是不足以致敵及敵騎至王先以數騎挑之殺其引戰者二人諸將乘之大破其衆暴屍三十里捷聞太上賜札曰卿誠存報國義獨奮身長驅濟淮力戰破敵俘獲羣醜撫輯遺黎眷言忠勞實所嘉歎然王師之出本以弔民上將之威尤宜持重軍旅之外毋爽節宣深體至懐副朕倚注特授横海武寧安化軍節度使賜揚武翊運功臣依前少保充京東淮南東路宣撫處置使兼營田大使王以承楚單弱正當㓂衝㓂至無以守乃增大其城身自督役役不勞而城固民恃以無恐家立生祠以報先是移涇陽與敵接境王乃多遣間結山東豪俊俾緩急為應東人及太行羣盜多願奉約束者金人廢劉豫中原軍潰盜起王以為機不可失奏乞全師北討招納叛亡為恢復計懇請誠切太上賜札曰覽卿来奏備見忠義為國之意深用嘉歎今疆場之事以安靜為先變故在彼不必干預當敦信約卿其明逺斥堠謹固封疆以備不虞稱朕意焉既而秦檜議和諸帥已屯建康及武昌詔王徙屯京口王上奏極論敵情叵測其將以計緩我師乞獨留此軍蔽遮江淮太上賜札曰覽奏欲依舊留屯淮甸誓與敵人決於一戰巳悉朕迫於強敵越在海隅每慨然有恢復中原之志頋以頻年事力未振姑鬱鬱於此自去冬敵人深入卿首剉其鋒鼓我六師人百其勇既至彼潛師引遁而卿復率先移屯淮甸進取之計恃此為基朕甚嘉之前恐老小或有未便委卿相度今得卿所奏益見忠誠雖古名將亦何以過此使朕竦然興嗟以為有臣如此禍難不足平也古人有言閫外之事將軍制之今既營屯安便控制得宜卿當施置自便勿復拘執至於軍餉等事已令三省施行初國朝軍政日修敵師屢衂於是隂謀沮撓吾事而秦檜還自沙漠力勸太上屈已和戎銷兵罷將朝廷遣使交割河南境土彼亦遣使来議而使名不遜時檜主議甚力自大臣宿將萬口附和王獨慷慨章上以十數為太上開陳和議不可之狀大畧以謂敵情詭詐且陜西諸路出兵産馬用武之地豈肯真實交割又曰但恐以還地為名先要山東河北等路軍民及北人之歸附者出此聲勢揺動人情我若大加卑屈深慮人心離散士卒凋沮又曰今當主辱臣死之際臣願效死節激昻士卒率先迎敵期於必戰以決成敗若其不克陛下委曲聴從事亦未晩又曰如王倫藍公佐交割南地界别無符合誑賺朝廷雖以王爵處之未為過當欲乞令供具委無反復文狀於朝以為後證如臣言虚妄日後事成虚文亦乞重置憲典其言懇切深到出于忠誠且請單騎赴闕面奏太上率優詔褒答其畧曰卿勇冠世獨當一面國威既震和議漸諧南北兵民可冀休息究其所自卿力居多卿其保䕶来使無致疎虞所乞入朝奏事俟有機㑹當即召卿衆方懐疑疆塲事大正倚卿為重未可暫離軍中也其後敵果負約如王所言檜甚恐即上疏曰臣聞徳無常師主善為師善無常主協于克一此伊尹相湯咸有一徳之言也臣昨見金國達蘭有講和割地之議故贊陛下取河南故疆既而烏珠戕其叔達蘭藍公之歸和議已變故勸陛下定弔民伐罪之計又曰如臣言不可行即乞行罷免以明孔聖陳力就列不能者止之義其詞反覆無據由是天下服王精識而尤檜益深云烏珠既再䧟三京又犯漣水太上賜札曰金人復占據巳割舊疆卿素藴忠義想深憤激凡對境事宜可以結約招納等事可悉從便宜措置若事稍重即具奏来王遂率背嵬軍由加口破走烏珠偽守趙榮以宿州降李世輔以亳州降詔除少卿餘官悉如故明年金都統周太師者以大軍深入水陸並進未及渡淮王督士馬拒戰于淮陽又走之因取劉泠莊設伏揜撃遂至沂水敵溺死不知其數又遣偏將王勝攻下海州取懐仁諸縣破千秋胡陵大寨擒其帥郭太師依前功臣三鎮節鉞淮東宣撫處置使兼河南北諸路招討使營田大使封英國公是年復犯淮西殿帥楊存中合宣撫使張浚之師與戰於鍾離弗克詔王赴援有别軍數萬屯定逺王遣成閔以輕騎撃破之轉戰數日烏珠中克敵弓以走其衆大潰遂奪鍾離捷聞太上賜札曰聞卿親率將士與賊接戰追逼直至城下賊馬一發奔潰過淮卿已復據州卿忠義之氣身先士卒親遇大敵嘉嘆何巳况卿前後所料賊情一一必中今日善後之䇿更為深加思慮措置以聞也王因上章極言爵賞之濫乞自今非破敵復境土不畀崇資以塞倖門時和議復成秦檜權力益盛異巳者禍如發矢王復危言苦諌以謂中原士民迫不得已淪于顛危其間豪傑莫不延頸以俟弔伐若自此與和日月侵尋人情銷弱國勢委靡誰復振之太上復賜札嘉奬又乞與北使面議優詔不許尋再上章力陳檜誤國詞意剴切檜由是深怨于王已而盡撤邉備召諸大將還闕王及張浚岳飛除樞宻副使王上表乞解樞務避寵丐閒時論高之時紹興十一年也又上表乞骸骨不許除太傅依前三鎮節鉞充醴泉觀使進封福國公賜第都城奉朝請其秋顯仁皇后鳳駕来歸王朝謁于臨平以北方獨聞王名特召至簾前曰此為韓相公耶慰問良久其後賜餉無虚月明年進封潭國公十三年進封咸安郡王十七年以郊恩改鎮南武安寧國之節太上數召王同家人燕於苑中眷禮深篤數賜名馬寳劍其他賜予勞問相踵然王老矣二十一年秋王病不能朝乃上表謝事䇿拜太師問疾之使肩摩轂擊於道於是悉召故人列侯勉以忠義大節焚逋劵百萬親視含襚曰吾以布衣百戰致位公王可以無憾矣以是年八月四日薨於私第之正寢享年六十有三疾方革累詔宣醫診視訃聞太上盡然為輟視朝贈通義郡王賻以内帑金帛各三千疋兩錫上方名騄龍腦香以斂襚服用一品所以慰䘏其家甚至遣勅使徐伸䕶葬事以是年十月庚子大葬於平江府吳縣胥臺鄉靈巖山之原有詔命中貴䇿祭於家又詔奉常貳卿軷祭于都門外子孫次第進秩娶白氏秦國夫人梁氏楊國夫人茅氏秦國夫人周氏蘄國夫人子男四人長曰彦直嘗任户部尚書今為大中大夫延水縣開國伯食邑八百户次曰彦朴奉議郎直顯謨閣早世次曰彦質朝奉大夫直徽猷閣知黄州次曰彦古起復朝奉大夫充敷文閣待制知平江府兼節制水軍今家居終蘄國之制女八人長適故朝散郎通判饒州曹霑次適宣教佐郎馮用休次適宣教郎知宣州寧國縣王萬修次適從政郎劉莒次適宣教郎宗正寺主簿胡南逢次適承議郎充集英殿修撰主管神祐觀張子仁二人為黄冠孫男十六人曰梴奉議郎太社令曰杖奉議郎直秘閣曰格宣教郎曰樞承務郎曰松通仕郎曰相承事郎曰椿承務郎曰楷承奉郎曰林將仕郎曰森曰休曰楫曰􅇐曰本曰梓曰樟孫女八人一適將仕郎王大昌餘未行今天子乾道紀元之四年有詔特進封蘄王又八年乃賜諡始王鼎貴嘗戒部下及其家人曰忠者臣子不可一日忘不惟所當常行抑亦人所當常言吾雖名世忠汝曹無得以忠字為諱若諱而不言是忘忠也吾生不取死不享也至是得諡忠武彦古稟述先教不敢辭君子以為通於孝云嗚呼王起西陲布衣仗劍從戎不數年功名與日月爭光何其盛耶為平㓂將軍為都統制為宣撫使為處置使為營田大使為招討使為樞宻使所踐無非達官要職而能益彰平全閩夷江西剪湖湘殱苗劉摧烏珠鏖大儀拓東海扞荆楚震淮陽所當無非勍㓂劇賊而功益俊偉不可及及議和初定來使稍不恭順王則忿其無禮於吾君誦言誅之且下令所部州無得少屈北使為之沮戢性不喜便佞事關社稷必傴僂玉陛上流涕極言之雖不加文飾而誠意真切理致詳盡人主知其出於忠實不以為忤也秦檜用事遣中原人親屬還北其有戀國恩不忍去者械縶以送至謀遣趙榮王力爭曰榮不忘本朝以歸父母妻子悉遭屠滅相公尚忍遣之無復中原望耶岳飛之獄王不平以問檜檜曰飛子雲與張憲書雖不明其事體莫須有王勃然作色曰相公莫須有三字何以服天下於時舉朝憚檜權力皆阿附為自全計獨王於班列一揖之外不復與親每大議讜言家人危懼或乘間勸止王曰明知其誤國乃畏禍苟同異時瞑目豈可於太祖官家殿下喫銕捧耶言雖質而意㫖深士君子至今傳之受人恩則生平不忍去心僉樞王淵識王於㣲時待遇絶等苗劉之亂淵首遇害王為請地厚葬經紀其家不遺餘力初淵輕財嗜義家無宿儲或勸以治生淵曰國家官人以爵使禄足代其耕也若切切事錐刀我何愛爵禄不為大賈富商也王敬服其言故握兵三十年未嘗為乾沒貿遷之私上所錫賚悉分將士將士故樂為之用太上高其義察其亷特賜永豐圩江東田以給其子孫王使上書租賦願與編户同為勢家倡太上欲成其美從之優詔奬諭惟厚撫將士千金有所不吝至一官一級則靳惜如肌肉嘗謂將佐曰為國立功人臣常分吾所以使汝輩功浮于賞者乃所以遺爾子孫也天日昭昭爵祿虚受終必為禍他日為國爪牙尤當戒此舊制戰勝第賞必計首級軍人貪得至殺平人以希賞王始建議不許以首級計功然諸帥保奏將士武功左右各有隊伍惟王所部須寔有功乃奏終不以毫髪假人是以淮東一軍功最多而崇資者少城楚州與士卒同力役黄天蕩之戰楊國在行間親執桴鼓家楚州織薄為屋將士有臨敵怯懦者王遺以巾幗設樂大燕㑹俾為婦人妝以恥之其人往往感發自奮後多得其死力其制兵器凡今跳澗以習騎洞貫以習射狻㹸之鍪連鎖之甲斧之有掠陣弓之有克敵皆王遺法太上以其制下兵部及頒降諸將者是也嘗中毒矢洞骨則以強弩㧞之十指僅全四不能動身被金瘡如刻畫晩以公王奉朝請尤能以道巻舒絶口不言功名葢自罷政居都城高卧十年杖屨幅巾恣意林泉壺觴間若未嘗有權位者而偏裨部曲往往致身通顯節鉞相望嵗時造門類皆謝遣羣工列辟想望風采而不可見則相約於朝班望王眉宇而慰喜焉至於外夷逺人幽閨婦女皆知有所謂韓郡王嵗時輒相從詗王年幾安否以為天下重輕云而王終日淡然獨好浮屠法自號清涼居士雖權臣孔熾王最為所忌嫉而能雍容終始葢詩所謂明哲保身者屬纊之際神爽益清冠佩修然合掌而逝有詔擇日臨奠檜遣中書吏韓成以危言脅諸孤令必辭諸孤亦縁王遺意不敢屈勤君父上表懇免至再太上黽勉從之其終始恩遇如此臣雄曰自起翦以来山西出將尚矣呼吸雷風動揺山岳戰勝攻克卓然以勇略聞者班班不絶于冊至於達之以智謀本之以忠義如古所謂名將者山西葢無幾也秦漢而下可以言智謀忠義如古名將若諸葛亮郭子儀其庶幾乎王本山西之豪與起翦相望而其智謀忠義有過前修無不及焉方逆傅滔天王聞變慟哭士卒皆哭莫能仰視遂自海道徑還吕頥浩以賊為憂王謂賊既取銕劵必無他慮頥浩又慮賊難勝王則深言逆順之理知其必勝於是頥浩計乃決傅卒就擒至如中興之初倡議西都長安乘建瓴之勢東向以圖中原朝議不從識者以為深恨及淮揚危急六飛南渡諸帥咸欲西趨岳鄂徑往長沙王獨以為今已失河北山東惟有淮浙號稱富實若又棄之更有何地太上嘉納江左立國之謀於是乎始定臣雄嘗待罪太史氏獲覩日厯所紀太上皇帝聖語甚詳最後論戰論和章數十上皆筭無遺䇿葢所謂定大事決大疑忠義稟於天資智謀出於人表視山西以勇略稱者不可同年語矣是以太上嘗賜札曰雖古名將何以加諸而皇上以忠武易名葢以王為亮子儀之流惟二聖日月之明知臣莫若君徳音鏗鍧天下傳誦世忠得此嘉奬亦可以死而不朽也耶臣觀宣王中興如采􅉮江漢之詩所述蠻荆来威王國庶定等事雖以褒大方叔召虎之功然其任賢使能致此巍巍則宣王盛徳之形容光明偉傑不可揜也臣願頗采周雅聲為銘詩以彰元勲以歌堯父舜子知人之明以稱明㫖顯耀韓氏以昭示於億萬世其辭曰昔在宣靖崇極而傾邉陲不戒神州震驚天地重開直人龍翔徳業巍巍周宣漢光凡此中興誰實佐命繄時元勲王國以定元勲謂何維師蘄王王奮山西起翦之鄉鐵胎之弓悍馬長槊方在童年氣震山岳逮事徽皇至於欽宗天下兵動外阻内訌王先戎行是磔是剪浙西山東績用丕顯伯府肇新来乘風雲掃清南都大駕時廵淮海之間劇盜蝟起解甲束戈如父詔子帝幸餘杭王征徐方逆臣乘虚反易天常賊虐樞臣都城喋血凶熖孔熾震驚宸闕王在海上聞變號呼凡爾衆士今當糜軀吾與羣兇不共戴天山川鬼神寔臨此言舟師鼓行雷動電撃撓彼兇徒裂膽褫魄天位反正乾清坤夷生擒渠魁梟首大逵有狡汝為盜據富沙流毒全閩血人於牙大江之西重湖之南蜂屯蟻結虎猛狼貪三方皆城地數千里奮攘矯䖍聲勢相倚當宁謀師宜莫如王授以斧鉞往摏其吭覆其穴巢鋤其根萌閱嵗未周三方悉平奔旗奔師捷書相望貸遣脇從旌别善良爾商爾財我弛爾征爾農爾田我資爾耕仁義之兵弔伐是尚帝有恩言卿古名將朔馬飲江充叛以降金陵不支洊窺上邦王整虎旅邀截歸路誰謂敵強望風震怖海艦如雲江之中流北剉援兵南衂歸舟水戰陸攻摧枯拉脆殺傷莫數俘獲萬計渠帥小黠僅脱其身敵勢寖銷皇威益信彼猶不悛纔數年期傾國南侵步騎分馳厥黨成林塵暗穹蒼九重制詔罪巳如湯王曰吁嗟君父旰食臣何生為矢死報國部分將佐直趨淮壖親窒歸途示無生還妙筭既定竒計先施聲言守江已駐大儀衆寡雖殊我整彼亂聨騎紛呶馬足俱斷四面鏖撃若降若屠積骸為邱洒血成渠折馘獻俘千里相踵驍將數百豈計輜重偏裨在楚亦以捷聞王来窮追全師大奔振旅凱歌天子曰都世忠忠勇敵不足誅江左人心恃此寧謐中興以来武功第一淮陽鍾離莫非俊偉生平戰多竹帛莫紀王屯極邉志清中原和議既諧弛強鑠堅王之論和忠憤激烈利害皎然黑白區别聖主俞之權臣讐之明哲令終天實休之孰不為將孰不建功動揺山岳呼吸雷風惟王天資與勇將異達以智謀本以忠義大疑大事決於片詞較彼起翦王其過之王起布衣飯糗衣紵出際盛時蛟龍雲雨解衣推食言聴計從任用不疑天子之明三鎮節鉞三事典䇿報功惟優天子之徳惟聖天子使臣以禮哀榮死生福禄終始重華神武志大有為眷言勲勞恨不同時真王啟封貴窮人爵忠武之諡如葛如郭八言衮褒更瞻雲章誰克有勲上不汝忘豐碑巖巖億載有耀凡百臣子其思忠孝韓蘄王墓高啟宋室中興日將軍武畧優功宜超賈鄧名恥並張劉白馬空南渡黄龍竟北逰誓擒諸部種還報兩宫讐朝使頒金冊邉人識錦裘躍戈衝野陣横棹截江流勁旅亡魂走中原指掌收未終藩閫寄已感廟廊謀殘散熊羆士甘臣虎豹儔和戎詞易屈復漢志難酬闕聳吳山曉陵荒鞏樹秋亷頗歸未老郭令罷誰留折檻言徒切藏弓勢可憂俄看星隕壘永使陸沉州感激思前代凄涼弔古邱劍花埋虎氣碑蘚剥螭頭石騎嘶風雨山僧䕶檟楸鼓旂何寂寂簡冊謾悠悠父老悲猶在英雄事巳休棲鴉嶺前墓聞說更堪愁同前周南老我行靈巖麓豐碑高入雲摩挲石上文有宋蘄王墳惟王著忠勞談笑麾三軍誓雪兩宫恥恢復酬君恩廟堂主和議不克成厥勲湖山縱清隠千載銜寃魂同前王賔石鼓山邉宿草長中興名將舊墳堂雙雙不見南朝樹只有孤臣似岳王謁韓蘄王墓吳寛家國何多難推尋為蔡童嬴秦方逐北周室竟遷東江左朝廷在淮南驛騎通天終憐宋土時則有韓公一劍横天外諸軍在目中南雲當箭鏃黄葢走艨艟伐越期成覇于潛恥㑹戎蕭墻狼䟦盡野穴鼠羣空聚米籌三鎮開門待兩宫齊王真濟美鄂國與爭雄有詔從中制惟詩咏内訌閒逰嗟我獨和議約誰同殉葬長弓勁題名片石穹龜趺呈細刻龍額表孤忠草樹樵蘓斷粢盛享祀豐神靈懸皎日生氣亘長虹異代今全盛當論保障功讀韓蘄王墓碑伊乘力戰艨艟破浪開鼓聲軒岸奮晴雷謀成玉帳無遺筭勢逼刀鐶欲自裁恢復英雄徒有志乘時機㑹不重来九京安得燕昭起國内千金更築臺韓蘄王墓在靈巖山西紹興二十一年王薨太上極優渥勅使徐伸䕶葬縣令執役御題神道云中興佐命定國元勲之碑碑高十餘丈敕趙雄為文初勒文而未立龜趺留木瀆嘉定間敕葬趙希懌有司磨韓碑應用後始樹此為樓三成覆之今碑尚存吳都文粹續集巻三十八
