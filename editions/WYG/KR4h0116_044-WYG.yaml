body:
  text: 吴都文粹續集巻四十四明錢榖撰墳墓宋龍洲先生劉公墓表蔡基先生名過字改之廬陵人宋南渡後以詩俠名湖海間陳亮陸游辛棄疾世稱人豪皆折氣岸與之交宰相周必大聞其人欲客之門下不就故人潘友文宰崑山縣延致先生先生雅志欲航海同抵縣宿留焉先生卒縣主簿趙希楙以友文所賻錢三十萬買地馬鞍山以塟遂立祠東齋久而墓與祠皆廢更一百四十餘年為至正十三年州人顧瑛秦約盧熊等聞之州州下其事徵諸圖籍正其厲域表大石其上題曰宋龍洲先生劉公之墓越六年寺僧立塔其所今知州費侯復初令下僧遷骼復其墓且表樹焉遣客殷奎謁予求表墓辭予昔往來婁間屢詢其遺墓弗得今幸墓復予何辭於言或謂公一窮詩流耳其詩又局於季宋陋習僅如五季羅昭諫爾何以表樹後人哉予曰不然取人以辭不若以節義公嘗抗疏光宗請過宫屢與時宰陳恢復方略請甲兵謂中原討賊之義義士為之激立可以辭客少之乎吾以是復奎使歸告費侯刻石為表大元至正二十一年冬十月五日奉訓大夫江西等處儒學提舉楊維楨撰將仕郎杭州路海寧州判官禇奐書復墓之明年費侯去官石不果立今守高昌偰侯既拜墓遂取其文刻而樹之廿三年夏五月十有一日儒學教授蔡基識平江路崑山州偰徯斯判官丁復初儒學教授蔡基提控案牘趙從周都目謝宏道州人朱珪刻復劉龍洲墓蘇大年平生四海劉龍洲髙臥百尺元龍樓置酒載花過黄鶴江山依舊風雲愁區區禮樂嗟南渡江水奔流自東去英雄潦倒竟何成留得當年舊逰處墓頭無石寫征西墓中無金狐夜啼迷人荆棘不見路傷心禾黍秋淒淒浮雲夢境翻今古子孫散落歸何所有酒如澠醉世人一滴曾澆墳上土斯文契誼千載同驅除樵牧封𤣥宫蒼苔朽骨亦解語何以報徳酬諸公梨花寒食東風曉野烟蒼莽迷芳草行人來經讀殘碑仰天共嘆英雄老君不見五陵無樹起秋風消沉萬古斜陽紅何如馬鞍山邊三尺墓多謝諸公肯垂顧同前潘純夷門王氣横江來秋風落盡梁宫槐鳳皇山頭駐青盖海門樓閣空中開五國城荒雪如席寒擁旃裘兩宫泣帛書不繋雁南飛衰草黄雲淡無色君臣自謂虞重華不識何如司馬家鳳笙龍管將進酒玉闌羯鼔方催花白頭遺老空惆悵鐵鎖長江幸無恙獄中誰捄岳將軍人間知有秦丞相搢紳之士皆汗顔山林氣壓居庸闗那知義膽忠肝者不在貂蟬玉珮間何人好事高千古愛此淳風似鄒魯咸陽寂寞漢諸陵慚愧劉郎一抔土同前王賓生從詩酒過時光到處閒逰半帶狂今日馬鞍山塟處一叢枯棘在殘陽同前沈周龍洲先生非腐儒胷中義氣存壯圖重華請過補缺典一疏抗天肝膽麄中原喪失國破碎終日憤懣夜起呼往籌恢復詣公衮論矛聴盾事大殊芒鞋破韤世塗澀蒯緱短劍秋風孤登髙聊且賦感慨江山故在英雄無權門欲招脚板硬顧逐詩朋兼酒徒尋常一飲空百壺賣文贖券黄公壚酒豪便欲踏東海故人留飲亦須臾玉山固是埋玉地嵗惟三百骨已枯三朝封樹再起廢人重風節非人驅嗚呼人重風節非人驅龍洲龍洲真丈夫劉龍洲墓在馬鞍山下有祠後廢至正中州人顧仲瑛等請於州立石表其墓明正議大夫吏部左侍郎諡文莊葉公神道碑銘彭時公諱盛字與中姓葉世為吳郡崑山人五世祖秀實惇重好義元季有暴僧聚徒事焚刦為鄉里害秀實即圖上其事于官捕斬之時稱為葉義士曾祖茂林妣朱氏祖明贈通議大夫吏部右侍郎妣郭氏贈淑人考春封兵科都給事中贈山西右㕘政加贈通議大夫吏部右侍郎前母湯母陳俱贈淑人繼母沈封太淑人公天資穎異自少博學强記下筆驚人同邑知名士張和見其所業文曰此其志不可量因勸逰邑庠遂駸駸有成矣正統十年舉進士授兵科給事中毅然以言責自任十四年英皇北狩郕王監國公率同列劾將臣扈從者失律敗事請誅夷之以謝天下然後選將練兵以復不共戴天之讐興師問罪以雪䝉塵扵外之恥如此則大綱以正大義以明而聖駕之旋軫可期矣聞者壯之九月監國即位頒賞廷臣公以時艱辭不許十月京城戒嚴公請罷内府軍匠悉遣征操及戰騎近城又請令有司熟粮料以給戰士遣散卒迎取軍器於天津以張外援三四日間凡七八疏悉合機宜師既退公言賞功罰罪治天下要務今日之賞罰既行他日之勸懲攸繫賞罰明信則人人力于事功恥無不雪讎無不復矣今効勞如孫鏜死事如謝澤韓青皆當賞以示勸其他守闗不嚴赴難不力者皆當罰以示懲從之十一月陞都給事中時邊境未寧大臣有奏留邊將守京師者公言今日之事邊闗為急往者獨石馬營不棄則六師何以陷土木紫荆白羊不破則敵騎何以薄都城即此而觀邊闗不固則京師雖守不過僅保九門無事而巳其如寢陵何其如郊廟壇壝何其如田里之民荼毒何宜急遣固守宣府居庸為便巳而河南陳州流民煽動命公往視公即兼程以進除貪虐賑飢寒威惠並行民用安輯景泰元年春還復上言京城為天下根本而八府旱蝗相仍加以邊陲侵擾民不聊生乞議寛恤俾安生理不然臣不能不為社稷憂也八月北人送駕還京將入闗矣有隠名具帖言迎復事者大臣見之顧忌不敢舉公曰此野人無情之言達于上感動必矣或沮以匿名書公不顧具疏言之有㫖令尚書胡濙封進帖雖留中而正論有不泯焉是冬公以南北邊師為患不巳上疏請令中外文武要職各陳安邊濟時之策二年六月天象垂異公又條陳弭災防患十二事以上及聞禁中頗事逰畋又請舉行祖宗午朝故事公當多事之秋遇事輒形於疏每疏不下百千言而大要則以扶忠直抑奸佞恤民生禦外患為主其有禆于時政為多三年遷山西布政司右㕘政監督宣府粮餉尋命協贊獨石等處軍務先是獨石馬營八城遇戰失守殘毁未復公列其利害可興革者為八條以進次第罷行之八城既復乃立社學以教子弟置醫學以濟疾病立義冢以瘞死亡設煖舖以便行旅均蔬圃以給將士制度品式纎悉備具而又請官銀五千兩買牛千餘頭摘戍卒不任戰者俾事佃稼嵗課餘粮于官凡軍中買馬除器勞功恤貧諸費皆于是乎取給自是邊人歡洽嵗亦屢登有嘉禾同穎之祥七年冬以外艱去八城之人如失父母連章乞留而公固辭不可天順二年英宗皇帝嘉其能驛召至京面加奬諭尋擢都察院右僉都御史廵撫兩廣公乞終制不允至廣興利革弊尤盡厥心舊例廣東鹽課不出境嵗久鹽積商困徃往賂守闗津者越過廣西市利公以為聴之則法壞而利歸於商禁之則商滯而利歸於闗津乃請許鹽商計鹽多寡入米邊餉而後出境於是公私兩利焉時廣西流賊多入廣為害而兩廣守將頡頏自異是以討賊不成功公請革兩廣正將立摠鎮於梧州居中調度則衆賊可平矣韙其䇿而不果行公不得巳請益兵英宗命都督顔彪率兵赴之公與彪協議破賊砦八百所擒斬數萬人而還或又以殺降謗之而不知實積年反復之賊也天順八年今上嗣位陞公左僉都御史巡撫宣府修復官牛官田之法墾田益廣積粮益多以其餘易補戰馬千八百餘匹其屯堡廢缺者力修築之不數月完七百餘所兵民始雖怨之既而恃以無恐乃忻戴焉在宣府屢有建白且請行養老之令于邊褒恤巳往賢臣為方來勸上嘉納之三年陞禮部右侍郎五年改任吏部是冬持節封瀋府稷山王六年畿内大饑命公巡視真定保定二府賑恤貧困綏輯流亡既還復命賑濟京民之飢者全活甚衆八年朝臣以河套為西邊患有言增兵守險者有言大舉搜套驅出河外沿河築城堡抵東勝徙民佃守其中公受命徃議方略奏言搜河套復東勝此皆事勢所難不敢妄意惟增兵守險可為逺圖宜令守臣剷削邊墻增築城堡収新軍以實邊選土兵以助守此不但可責近効而亦足為長便也上是其言九年轉左侍郎公自入佐部政每議禮用人從容贊決其間僚長敬信司屬悦服焉至若是非部分而闗當時利害繫生民休戚者遇諸卿必相辨正因而助益者不少一日坐堂署從事忽疾作不能言輿歸西第而卒實甲午三月八日也享年五十有五上聞深悼惜之賜賻鈔三千緡諡為文莊遣官諭祭營葬以明年二月十七日塟于邑之積善鄉湓瀆之原公為人温雅簡重崇道誼尚名節言動思跂古人居家執孝友涖官清慎勤恪設施不茍與僚友論事不激不隨而言色自若其取人先行檢而後才藝然存心寛厚終不及人之過惡所寓門無襍客公退手不釋卷考古辨疑殆忘寢食而於世俗聲色財利之好澹然不以經心平生為文師歐陽而功業自期於范韓以范公為鄊先正尤景慕焉惜乎大用未究而卒所著詩文奏議總若干卷藏于家公凡再娶先金氏贈淑人繼耿氏刑部尚書耿清惠公之女封淑人子男一晨補國子生娶副使張和女女三人一適貢生虞臣一許夏景澄一尚㓜公之卒也晨不在側冢宰尹公旻率僚屬經紀其喪事既又狀公行畀晨奉以徵予文且曰先父雅愛先生言幸勿辭而公内弟司業耿君裕又申其意而請因摭狀言著其槩系之銘曰古稱才難今世尚然彼長此短用各一偏優於政矣其文詎傳文或工矣政舉弗宣達觀於世百靡一全而公兼之寧不為賢惟公問學有本有原公之履操金石其堅清文達識自視無前檢身約已猶恐或愆敡歴中外逾三十年忠君愛民心實勤拳言惟婉切用適方圓惠浹于民威行于邊緬懷鄉衮我道隨肩謀謨事業期著後先何志之逺而去之遄位不滿徳繫命于天墓門有碑徳烈是鐫烏乎文莊百世不諼先民有言林宗不慚予讀文莊公碑信其行亦識無媿彭公所著也何則同鄉稔知其徳業景仰之餘不能不為之感歎嵗乙未仲夏梓林識葉盛侍郎墓在崑山縣積善湓瀆之原浙江按察司副使提督學校張先生墓志銘葉盛英宗皇帝復大位之五年庶政時叙悉如其初於是詔在廷舉文學行誼士仍理學政廷臣合辭以南京刑部郎中張和等名上上特陞浙江按察司副使餘陞擢有差皆畀之璽書以行盖今天下藩臬十有三浙江固其一云今年夏盛自廣赴闕過浙江浙江之三司言張先生病矣先生能仰祇徳意涖事甫期廵行遍屬學者且至再勞憊過甚病矣既而見屬學官弟子皆如三司言未幾先生竟卒于其家其郡邑之賢皆奔走哭弔里巷之民多咨嗟悼惜浙之諸司亦皆致奠其門人學子相與會哭者數郡畢集間作為文詞以致哀傷之意公卿士夫詞苑名流聞其訃莫不嘆息曰哲人亡矣噫先生果何為而能得此于人人哉盖先生天資穎敏絶人成童讀書數行俱下尤績學不怠至忘寢食稍長即知謹義利賢否之辨為文章立就已鏗鏘有竒語聞先生長者有賢名即趨詣請益同邑張伯緒華亭陳文璧翰林尹鳳岐皆器重焉正統已未偕弟穆同登進士第廷對之文稿無竄抹讀卷者竒其才請寘首選以病目創不果擢第二甲第一人不久移疾家居一時碑版之請戸外之屨恒滿執經問業學徒踵至先生率語以科塲易事學者務治身心他日當有益國家耳有以程文請者舉題多百餘言少二三字先生兀坐數誦經傳次牋釋一無所遺言出成文諸先泚筆左右伸紙疾書至廹速不及書雖數十人人各不同莫不滿意而出後頗厭苦之諸生屢却不可去嵗庚午主考江西鄉試五經文字得士為多辛未授南京刑部山東司主事三法司有重獄就咨決所上奏牘皆經詳定尚書侍郎不以郎曹禮稱以先生遣子從之學俄膺召入翰林與分館修纂宋元史事翰林素艷先生名既從事皆以同事得人自慶天順還南京陞署浙江司員外郎明年實授又明年陞陜西司郎中未及書考而提學之命下矣今之士夫君子經先生指教者内而近侍外而藩臬州郡稱能官者皆有人假使處先生養士儲材之地其所就不既多矣乎提學之任亦重矣天與之年其又可量乎盖先生之不盡其用殆非人力矣雖然士之見重於世用不用其何足校也夫先生性孝友治父母喪一遵朱氏禮以家無厚產懼嘗節俸給製衣帛寄其兄以及其弟冀全名節鄉先輩漢陽守章士希老無所于歸嘉興朱鹵菴其校師也皆為之倡醵金以圖其後事廉潔自將權貴之門不一濡足聞忠賢節義之為喜躍如自己出直無他腸有所知必以語人不問交處久近朋友有過舉必面折之是是非非不少容貴近臣嘗有事懷金過先生者雖怒斥之然猶委曲揜䕶之不顯言于人以是人多憚服之歿之日家無一金之資而逺近敬愛先生者多致賻以畢其喪先生諱和字節之號篠菴張氏崑山名家相傳為唐燕國公説之後世有令徳其生邑横塘里曾大父道昇大父文裕皆豪士父用禮贅至和塘北何氏遂家北塘又家妙涇之南後以穆貴贈其父奉政大夫刑部山東清吏司郎中母胡氏宜人先生之妻丁氏封宜人子男二懋甫直甫懋甫邑庠生女三長適諸天叙次受聘配葉晨皆出丁宜人次尚㓜側出也先生永樂壬辰四月廿六日生卒天順甲申六月九日卜是年十二月十八日葬馬鞍山南城隍廟西之先塋先生之平生見其友吴劉昌華亭夏寅所為傳盖於史館秋臺之事加詳其於盛累世通家其相視異姓兄弟也南都之會剪燭劇談有互表祖塋之約而今巳矣盖先生之所厚宜莫如盛雖不忍銘而義宜銘銘曰南峙惟崐婁江洴奔代產豪賢匪獨機雲猗嗟先生超前軼羣百氏楊瀾六籍窮源昌言王廷載筆詞垣粤有文衡式臨大藩兩贊刑書實多平反豈無他人或深以繁十行公方君子之存五色光晶亦大而殷浙俗熙熙童冠詵詵朝勤夕勞輶車軒軒往而不來引領含嚬若人云亡天胡弗仁高墳鬱如一丘環如後欲求之于我斯文張和副使墓在馬鞍山南城隍廟西明故太中大夫浙江右㕘政張公墓志銘楊循吉崑山有二張先生公諱穆字敬之於行為季與其兄提刑公同名于時人尊之故並以先生稱公家世居崑山之横塘後徙婁上正統己未公與提刑公並登進士第當是時提刑公進士出身第一而公又在會試第二天下榮之公初授工部營繕司主事繼移屯田以憂歸與其兄服喪有禮鄉黨稱之以為孝起復改刑部主事陞員外郎郎中公曉暢法律持以仁恕其所斷無以寃稱者盖在景泰甲戌之嵗公以員外郎為會試考官凡曹郎得與此選者非學行超絶者不能有也公之陞郎中也進階奉政大夫而公之考諱禮亦以先贈主事進郎中妣何氏以安人封進宜人天順改元英宗皇帝御極銳於圖治親擢在朝之臣任以法官布之天下使繩刺奸弊而公得山東按察副使陛辭上親御文華殿諭遣兼有寶楮之賚所以倚任公等者甚重公感上知遇思有以為報稱至官奉法不阿直聲著聞盖在山東者九年用己正物人以為無負詔㫖成化元年考績書最例得正三品執政者以公之久伺也舉為浙江右㕘政惟得一級便公也而以公專清軍事軍曾補伍久不勾補者例解丁查往往多死道路間公獨以移文行查不解丁人大便之雖違例不顧也嘉興知府楊公剛勁人也有疑獄不決公為立剖之楊公不覺下拜公至浙江之二年進表入朝時曹州李公秉在吏部雅知公山東之政欲薦公都憲臺適有効奏李公者連及公公遂解官歸其橐蕭然幾無為生門生故人相與買田松江之滸助之公始得濟焉提刑公之卒也公事寡嫂最有禮濮州判官者公季弟也亦先卒公撫其孤尤甚厚在山東所至境内則必求先賢之家䘏之及表葺其墓不以為倦而公之少時所事學師與其舉主皆浙人公在浙時巳死公為之或葬或祭無不報者盖公之天性忠厚如此公好讀書平生暇時書未嘗去手又喜汲引後進而為人性剛直不假借人至評古人亦然茌平之修志也収華歆馬周公曰歆漢賊也何可存存周可耳亟命去之而責怒修者故尚書劉公言于葉文莊公曰敬之好直不揜人瑕垢至品量篇翰亦然可憂也後竟以直致謗不容于時而歸公以既歸之年為成化二十三年丁未三月二十五日卒其生盖永樂十三年乙未十二月二十五日也年七十三配宜人周氏宜人之父為鄭府長史側室有子者鄒氏子男一人平甫娶知武安縣鍾君女女二長適吴縣顧禧故禮部主事顧君叔謙子也次適江陰薛章憲縣學生平甫將以卒之年十二月二十日葬横塘之原與其兄進賢教諭寅甫鄉貢進士安甫奉吾友黄君應龍狀來乞銘應龍文宜銘公而以讓循吉則循吉何敢當也然循吉先舅氏太中劉府君與公兄弟之間甚厚今提刑公談笑容止吾家猶能說之盖府君與公兄弟同在南京以古學相友提刑公讀漢書一傳必三十遍其文雄一時然獨重府君人有就乞文者則辭曰何不詣劉虞部然則循吉雖未嘗得親公亦公友之子弟也銘其得辭乎提刑公名重一時公與之頡頏上下人並稱為先生提刑公入仕遲享年少而公之年仕皆多且久故其閱歴施設著述之事于提刑公為尤焉公屹然為鄉耆徳今巳矣典章故實孰從而質之也此鄉後進之不幸也公所著有勿齋集二十卷勿齋公所號也未盡之志其在兹乎後來者盍以求之提刑公諱和字節之者也銘曰崑山之二張人傑雄文章政事美略同公其季也碩而忠赫然其名配長公多才練達智疏通早以治獄聲譽充平不撓法仁不容于時英皇再御龍簡拔賢俊皆登庸公當此時首進宗匪人達之由帝衷報之難矣乃畢躬煌煌旌節賁山東泰山日觀兩目空奸頑避走寂無蹤惟彼浙藩壯且雄公所宜有曰治戎以民養兵慮其終乃公於此為有功公官日進方顯融徳修毁來衆口攻飄然拂袖還里中膏車逺邁川津逢公略不以存心胷知時委命樂以雍愚有幸㑹賢有窮慷慨好論讒之叢于公何恨何忡忡惟公伯子時所宗文章擊撞間笙鏞公實佐之森前鋒不朽奚假乎鼎鍾横塘之原伊夜宫三品之葬崇厥封其下多土上多松得失何有拙與工且以元氣還鴻濛樂哉地下兄之從明故祁州知州封奉直大夫刑部員外郎張公墓志銘文徵明祁州知州崑山張公致仕家居凡三十有五年年八十有四嘉靖十六年丁酉三月廿又四日以疾終先是公以進士釋褐守祁甫四載以母喪去官既免喪遂不復仕時公年艾服吏部尚書馬端肅公嘉其靜退奏錫四品章服階朝列大夫致仕越二十有八年子寰升朝推恩封刑部員外郎階奉直大夫章服如故公始罷官退居横塘即故廬為圃鑿方池構亭其上曰天方自稱天方子日從親友文酒燕遊聞有佳山水雖逺必至或浹旬累月忘返三吳勝迹登覽殆遍良辰令日未始虚擲壺觴在前圖史肆列握槊呼盧悠然自適或語及時事輒起避去若將凂焉戊辰巳已之間羣倖用事士夫閒居者或攀附驟貴時當路適公同年故人有意羅致之且寓書問訊公亟揺手謝不與通盖其素性閒曠不樂與時徵逐如此其在官乃能勤慎自將不少鰥曠祁故鄙壤民貧而健訟俗喜巫禳公設為科條傅以古訓俾誦以自守民信而格訟用衰鮮不事追呼而民乂以安間出省耕因遂鈎摭民隠民咸得以自實卒嵗踐更用為徵調斟度下上式允以均尤勤於賑恤明慎周審不為虚文以至弭盜緝奸摘伏省㣲悉中綮節凡公所為未始骩法徇民亦不肯苛法以為民病推誠任真軌迹夷易又能飾以儒術故雖不久而文治雍然為一路之冠行部使臣列公治狀薦諸朝會去不果用而公亦既倦逰矣公諱安甫字汝勉其先唐宰相燕公之後宋南渡自洛徙吴世居崑山之蕭墅元以武胄顯國朝有諱道昇者稍徙横塘道昇生文裕文裕生贈刑部郎中用禮始徙今婁上用禮生四子稹和穆种而和與穆聯舉進士和仕終淛江提學副使穆淛江參政並有聲跡為時名臣公則稹之子也母金氏以景㤗甲戌十一月七日生公娶徐氏先卒贈宜人子男一人即寰以家學取進士連守濟寧濮開三州召為刑部員外郎方侍養在告女一人適臨安府經歴趙禧孫男四人恒慕恒純恒思恒學孫女二人公少以舉子知名始為鄉校即為部使者識拔比試應天主試者竒其文用為舉首魁得他卷偶詞氣相類遂兩黜之巳而發封得君名而同黜者為同邑方岳亦知名士乃甚惜之然次舉公竟與方同薦庚戌試禮部遂登上第有司錄其文以傳一時譽聞甚籍謂且繼踵先烈而孤立寡援竟就外補浮湛常調迄以不振嗚呼惜哉公為人不立厓異不事矜持與人處無少長戚疏貴賤一待以誠而人信之亦莫有謾之者平生操家有制教子弟以禮而朂之以學獨不能治生入官數年先世田廬乃損於舊委心任運曾不置懷顧能舉贏急義中外族屬以及鄉黨鄰里緩急有求必委曲赴之其尤可書者副使公和㕘政公穆死皆無後為構特祠置祀田俾羣從子孫世享之盖張氏文獻實始於二公公此舉非獨繼絶而已公生臞瘠纎竦貌古而神清被服蕭散舉止疎慢對客恂恂不能劇談高論望若憒眊而内藴精明雖以經術名家而博綜羣籍不遺餘力竒情逸思發於古文歌詩精警温腴足稱合作所著有天方集二十卷雅善攝生而不為沒溺既病却藥待盡及革手書遺令呼子孫示之泊然而逝嗚呼斯可為達也巳寰以是嵗四月十三日葬公横塘祖塋之次距卒才十有九日從治命也於是寰手具事狀屬予銘銘曰有攸維贏繄禄之徵願言則貞維徳之凝豈有不崇乃心維烈彼啜其腴我行其潔有賢張公徳懿維沖既騫有庸亦飭其躬秩秩方州有民有社弗擾維循爰徳以化匪無榮圖我攸有適舍旃來歸以宴以息憲憲名宗徳聲孔耀孰其承之乃賢有紹不紹其禄紹其忠貞有賢張公矢其英英出正於邦處敷於族既忠亦貞不忝維糓横塘之墟鬱茲新阡生斯藏斯以永無諐張穆㕘政及其姪安甫知州墓並在横塘明故嘉議大夫河南等處承宣布政使司右㕘政吴公墓誌銘文徵明公姓吴氏諱愈字惟謙晚號遯翁世家蘇之崑山曾大父子才大父公式皇贈承徳郎刑部主事父凱字相虞仕終禮部主客司主事修正彊執事母篤孝年四十棄官歸養以髙年令終鄊人私諡貞孝先生母安人陳氏生正統癸亥八月一日成化戊子以縣學生舉應天鄉試乙未舉禮部會試廷試賜進士出身戊戌授南京刑部廣東司主事己亥丁母憂甲辰復除本司主事歴員外郎郎中𢎞治庚戌陞四川叙州府知府癸亥進河南右㕘政明年甲子致仕嘉靖元年壬午以登極恩進階嘉議大夫五年丙戌五月十有九日終于家年八十有四公自少開朗書過目不忘嘗詣外舅夏仲昭閱壁間文累數百言閱已取筆書之不遺一字資既穎異又敏學彊解不遺餘力既連舉得雋益精進不懈初官法比即思明法以達于政毎退自公輒取故獄詞翻閱探竟凡事始章程傳爰論報悉究而通之事至迎解不煩檢會所部兼理畿輔事尤苛劇公省決敏利廷無留獄析律詳明所當必允茍得其情雖貴勢不避時留守中官驕不奉法會有事當按公持之急中官使人宣言欵公且懼以旤公酬對閒整語直而遜卒竟其獄不少骫骳然不為深文内庫遺火事連中司坐死者數人公具獄以比請尚書言情罪既得奚以比為公曰法如是不可踰也尚書執不從獄上何文肅公當讞閱其牘稱善曰此吳郎中筆也但所坐非正律宜以比言卒改用此律奏之尚書乃悔不用公言由是益任公毎公當遷輒奏留之凡一再進官皆不離故署㑹詔大臣舉屬吏尚書鄭時侍郎徐懷聨章薦公堪長藩臬奏上而叙州之命已下叙去京師萬里俗獷喜訐吏多並縁為奸公始至判牘日以百數吏故矯列數事嘗之公且判且閱徐擿所矯數事訊吏吏即叩頭具狀公既精敏慧發擿而濟以嚴重有犯必繩以法吏畏民懷訟用衰鮮尤慎刑獄每行縣録囚必有平反慶符盜正寢刦縣縣誣執二十七人皆抵死公審鞫左騐惟二人真盜乃悉縱遣二十五人其後果獲餘盜貴州都匀用兵叙當轉餉而道路險逺公調遣節適民不勞而事集出諸郡上有詔錫楮繦文幣旌之所屬長寧筠珙夷獠襍居尤剽悍易動公撫以恩信示之禮法久皆懷附然無故不輕調集會撫臣移文發其渠率至省閱習公執不遣曰犬羊之性未易擾伏萬一奔迸不可安輯撫臣不以為然必欲致之已而椎剽鹵掠旋不可制公手書片楮諭之即復弭帖盖公推誠待物素為夷獠信向如此土官安鰲以馬湖叛有詔揜捕而叙實比壤藩臬重臣咸會於叙公言鰲輕剽無逺謀然器甲精利兵亦蹻捷未易攻取不若重圍困之彼中無水不一月可坐而降也議未決而鰲棄城走將糾諸夷為亂衆相顧不知所為公徐曰鰲在吾彀中矣問故曰彼以郡守將兵接戰勝負未可知既離巢穴不過一窮虜耳所轄諸酋長皆其深讐彼且無以自容又何能為因遣人襲而執之曾不血刃而元凶授首及改設流官其醜類不服復嘯境上刼郡印為亂衆益恇擾公親叩其壘好言諭之曰若等情有欲言言之朝當處分何以印為且印出朝廷失一印復制一印於我無損若持出特一敗銅耳吾憐若以無用之物自陷罪辟故為若言若無以印為也衆即委印解散自首事至敉寧公皆在行間謀畫多自公出比奏報而賞不及公衆為不平公曰叙與虜接師或不競叙實先受禍此守臣責也今得無恙幸矣敢覬賞乎在郡九年勸農振業興學教民民靖化洽嵗亦比登乃平徭更賦勾考邊儲之侵於民者得四十餘萬輸將轉調亦數十萬廩庾既充以時賑發流庸來歸戸口增羨郡以大治在河南兼理屯田時田多為藩府乾沒及勢家漁取或假中官庇覆揜抑詆譎莫敢致語公訾省鈎校多所緒正在省一年展采錯事方將有為而廷評出矣會蜀士有不悅公者復從中醖釀之而公亦巳倦逰遂致仕去公識慮精審舉動詳緩每計事尤要其終斟度分劑不少滲漏一時雖若迂逺而積久考成往往有餘沿牒往來非公事不輙乗官舫雖逺不給過所部中餽遺一不受亦不以官物遺人嘗自言在官經費一錢以上皆注籍令不背覆其所為必視法所在故歴官中外未嘗一挂吏議其待屬吏特嚴雖所喜不少假色辭所不喜者亦不輒肆詆挫不立科條不収聲譽而質行履方往往出名上故所在政事卓卓而人鮮復稱之尤不欲有所附離初登第觀政兵部部僚有與當路交比者雖喜公故為引重欲援致要地公謝曰某忝列進士入官自有本末因縁進取非所志也其人媿謝後當路敗所引咸坐廢黜而公無與時已韙公卓識其後益厲不變浮沉常調者垂三十年晚始解后一奮而竟以讒罷嗚乎此足以占公之所立矣家居尤事檢持出入起居咸有常度接人和而有辨故雖讌笑融洽而人莫敢慢易人有過不面加誚讓惟對之不言而巳其待子弟亦然然人毎以是候之顔色所加甚於質責也故諸子若孫咸孑孑自將無少縱弛閨庭雍睦訾毁不聞邑中稱詩禮家必首及之雅喜賓客燕設精鑿禮文詳雅周旋尊俎間終日忘倦晚嵗聰明不衰音吐洪暢俚言遺事憶記歴歴毎對客舉似必深竟顛末風流雅尚奕奕照人盖以高年令徳為鄉邑之望者二十有二年嗚呼今則巳矣有如公者可復得邪公娶夏氏太常卿仲昭女封安人有賢行先公三十年卒無子側室姚氏生子四人長東浦江縣丞次南國子生為仲兄惟明後次西次守中國子生東西皆先卒夏安人生女三人長適王銀以子貴贈翰林院編修次陳伸戊辰進士死逆瑾時追贈大理評事次文徵明翰林院待詔側室趙氏生女三人適陸潔朱希韓餘一人尚㓜孫男四人詩訪許詠詩國子生訪縣學生女五人曾孫男二人女三人塟以卒之又明年戊子十二月甲申墓在邑東積善鄉興仁里夏安人祔銘曰顯允吴公既貞既實有言庚庚亦順其徳侃侃貞孝為時令臣弗大厥施發于嗣人憲憲邦刑翼翼盛業豈曰世踐光于有烈維烈如何肅肅在公入守郎曹出疇民庸維此叙服獠夷易豗有績弗諼式柔永懷豈民則懷亦貞厥履穆穆旼旼納于仁軌道􅂭罔赫功成不言天子有詔往奠中原有攸王臣既貞亦蹇時弗我違身則既倦莵裘既營式遄其歸公歸維何鄉人有依顯允吴公維民之則出建邦猷處範鄉國國則殄瘁斯人云亡後千萬年以允有光人亦有言維徳則久我作銘詞尚詔厥後吳愈參政墓在吾邑之積善鄉興仁里瞿郎中行狀方孝孺府君諱嗣興字華卿姓瞿氏其先居河南後徙通州之海門宋末有諱某者避兵南來至姑蘇之常熟家焉生二子青達俱有才力能服其鄉人元師破江南有劉將軍者徇地至常熟青與達帥里中强壯拜馬前迎之有狂犬突出軍前衆愕然持弓不敢發青直前一箭射殺之衆驩曰壯士壯士可官也青曰吾不如弟達遂求旗號俾招諭未降者承制授達百夫長及宋亡遷蘇州巡鹽大使兼管内六縣捕盜轉怯憐口提領娶某氏府君其子也府君少時家有祿食日從其徒射獵飲酒為樂不喜學書天資仁善和順未嘗有過年十七怯憐口以例革不寘官提領君家食甚貧府君即折弓矢脱去紈綺故態躬力穡事以養二親承顔候色惟恐弗至母嘗病癰時天熱癰潰臭不可聞人皆掩鼻趨過府君跪牀下執蒲葵扇驅蚊蚋以手磨穢剔腐扶起臥不解帶者三月至愈乃止母又嘗患積氣危甚醫不能治或告以股肉可瘳乃置刀盂上而禱于神俟刀躍乃可割府君如其言自旦至晡時頓顙于地顙破血流盈面刀弗動府君泣曰天忍不憫我耶我縱以身易母猶母之肉何暇惜乎知刃卒不可動起引刀割肉覆盂中裂帛漬血裹瘡戒左右弗泄羮之謬稱他肉以進時母不食巳五日矣見羮喜為之握筯食一杯幾盡食巳而瘳母後嘗感疾思啖菱時菱未花遍市之不得解衣入菱澤中哀呼索之竟日手足皆腫俄得菱實三持歸遺母母疾如失既而貧愈甚或隔日一炊府君曰事急矣尚守不變如父母何哉攜家入蘇城謁多錢家願盡力多錢家察府君誠信可仗出資財俾貿遷日分其息十之二府君由是稍裕時父母所欲無不致也府君不妄取而好施嘗朝出道獲人所遺囊有楮帛若干視其名則市中小夫府君坐不貼席走其家還之有遺田宅契書於路者覽之曰契書失將起爭端跡其人呼與之其人貴家奴失主契畏罪涕泣欲求死叩頭謝曰公活我氊工王氏大雪凍餒不能起竈突無烟府君憫之天明攜錢二十緡潛投窗隙而去歉嵗出糶有窶人來糴衣不及脛府君受其錢五千陽忘曰汝糴十千邪倍與其粟鬻蔬者過門府君取其五錢授以楮帛十倍曰吾適無錢汝持楮弊去將以餘錢禆我鬻者笑曰吾安有錢禆君耶府君曰第持去俟錢多歸我不汝急也其意與之而不欲其知皆此類凡負販者必多給其直家人怪問其故府君曰彼胼胝手足以求升合利吾忍與之較邪嵗丙申常熟凶民來依者數十輩府君僦舍以館食之癘氣發病者相枕府君躬親粥藥而時進之卒賴以生府君既喜浮屠言讀其書豁然若會其意者復閱北溪陳氏性理字義即解其要曰聖賢之學盖如是因戒二子懋莊曰我少不學至老而始悔若等其勉之懋與莊服父訓刻志事學莊入國朝為禮部員外郎府君及見之曰吾有望矣洪武乙卯九月府君得疾恐念慮或亂畫紙為圈揭屏間常目之二十七日卒于家卒前一日楚府伴讀陳子成等道府君將之京師問府君欲何言府君以兩手加額曰語吾兒努力供職報天子恩我死不恨享年八十有四莊在禮部絫請於朝未報卒後月餘贈將仕佐郎禮部員外郎配蔣氏安人安人事舅姑如府君之孝舅姑或怒則率子女羅拜於前曰新婦誠可怒願念諸孫貸其罪舅姑意不解悲泣不巳年七十二先九年卒是嵗十月二十三日葬吴縣横山梅家灣之原與安人合兆女三人一夭二適某孫男三人紹緒紳曾孫男二女一府君殁明年莊自員外郎拜福建等處承宣布政使司左㕘政階通奉大夫當得加贈而意欲圖其不朽未暇請云瞿嗣興孝子墓在吴縣横山梅家灣故柳州府通判桑公墓志銘楊循吉吴郡思𤣥先生桑公少好詞賦師司馬相如揚雄以其長擅名一時至為他文章皆本是凡為集十巻既而力探羣經自易春秋周禮皆有義釋又類合數十家總二十餘萬言𢎞治癸亥六月四日以柳州府通判卒于故邑常熟之寓館年五十七邑令計君柳進士也盡發其書觀之為具歛加厚其將葬也其從弟鄉貢進士翹以遺言請銘於我嗚呼先生之道裕而能容介而不羣充其辨可羨於將使極其用宜大于匡國胡獨以一技名邪先生諱悦字民懌其先有舉齋公者仕元為都水庸田副使傳六世至廷貢壻于穿山周氏生先生年十九領鄉薦絫試禮部不第負才游京師無所屈竟以乙牓授泰和訓導三為考官皆大省號能得士秩滿冢宰三原公方執政將薦用之不果以資拜長沙府通判又以催科無績調柳州府柳邊氓襍居多竊發先生出入賊巢穴示以恩信來附者萬家柳人至為繪像以祀然由是名聞于會府因得召致幕下待以賓禮俾司謀畫道方行會父喪歸遂不起以至于沒盖先生之設施不見者若此先是未卒之前一月友人薛大章夢見先生乗高車擁入𤣥㝠云與屈子遨逰巳而果卒説者謂先生躬萃元精以神明其心志又不大於事業以有蓄焉一旦以死其不逐逐為常鬼亦明矣夢所見殆將然乎先生配章氏故贈都御史孟端女男一人阜先卒女二人長適吴樟吴文恪公四世孫次適歸應祥蘇州衞援例指揮僉事孫男二人内曰接外曰溥皆嗣阜為後㓜未克立夫人實主喪事先生先世皆葬故邑虞山今以十月十六日葬湄溪之原從其先君兆禮也在太倉州南四十里與穿山三里而近先屬邑今屬州故先生又為州人銘曰有才不售澤不大施滇粤縱竒以昌厥詞休休三原非不巳知疏直以交始孚終遺黃髪鮐耉世所謂壽賢者不然道徳之富髧彼兩童亦既樹後祭祀克紹在禮不繆歸終于寓邑令是主返葬湄原爰祔父母遺書滿家蠙珠琳琅聲光若斯不腐以亡百世有考尚于銘章桑思𤣥悦穿山人以詞賦鳴于時為栁州通判有恵政卒於常熟寓舘墓今在太倉州南四十里湄溪之原明故資善大夫禮部尚書致仕贈太子少保石城李公墓誌銘梁儲昔成化戊戌常熟李石城先生始自翰林院編修遷侍講又九年丁酉遷侍讀學士後孝宗登極以先生有青宫講讀舊勞稍遷左春坊左庶子學士如故既而憲廟實録成與先生同職纂修者遷少詹事或太常少卿仍兼學士惟先生遷南京國子祭酒以去雖燕賚加祿之禮不缺焉然出入逺近之間禮意不侔矣説者謂當道厭人好直故用意沮尼於其中豈其然乎既而先生連遭内外艱俱特賜祭塟洎服闋起為太常少卿兼侍讀學士遂遷南京禮部右侍郎轉左侍郎拜南京吏部尚書復召為禮部尚書時中官劉瑾亂政受某府親藩重賂欲以鎮國將軍為郡王怒先生執成法議之將中以危法賴上心垂察止令其致仕以歸劉瑾既誅詔吏部疏起舊臣有才識為瑾所擯斥者先生雖名在首列然雅意林泉無復有仕進意矣嗚乎當道者能尼人於祭酒之時而不能尼人於宗伯之日劉瑾能怒人於議禮之際而不能怒人於疏起之時况先生㓜學壯行克全晚節名遂身退貽福無疆是固平生好直之報天定固能勝人也豈瑾輩所干與哉先生諱傑字世賢以世居常熟石城里别號石城雪樵生正統癸亥卒正徳丁丑家譜遭元季喪失無所考今以曾大父居仁府君為始祖云既貴獲贈大父濟父希潤俱禮部左侍郎祖妣徐氏郭氏妣徐氏元配章氏俱淑人側室曹氏生長子曰而達應例授七品散官繼配戈氏生次子曰而進授光祿寺署丞曰而遇授中書舍人皆先生廕也女五人錢奎趙原錫劉夢錫顧榮華翰其壻也孫男四元紹元貴元顯元望初先生為編修侍講時常充經筵及青宫講讀官三為會試同考官兩同兵部侍郎及都察院副僉都御史為清理武職貼黄為學士時嘗主考順天府鄉試及為殿試讀巻又為纂修實録兼校正官為少卿學士時經筵講讀以舊臣仍首為青宫講讀又為纂修大明會典副摠裁官後闕里孔廟災命奉香帛往祭告為禮部侍郎時因夏旱命祭禱天壽山而雨又為㤗陵山陵使既沒䝉賜諭祭二壇有司為造墳安塟凡此皆闗係朝政大體故並書之公自㓜穎悟至老猶手不釋卷在仕路四十年歸田又十餘年有文集若干卷藏於家今其子某等皆淳雅有文行足以增光而裕後先生之澤固未艾也銘曰惟公尚直匪徐與亟雖為當路所抑晚而際遇出入皆榮宗伯歸來道若可行虎狼九闗莫達鴻飛竟爾㝠㝠予之斯言亦豈足以槩公之平生也耶李傑尚書墓在興福寺北明故通議大夫都察院左副都御史思菴吳公神道碑徐有貞通議大夫都察院左副都御史致政吴公之卒也有司以聞賜之塟祭如制於是其外孫中順大夫知荆州府事錢昕狀公之事行使來請銘于墓道之碑有貞之少也盖嘗從逰于公而荷公之知重斯文之誼惟永弗忘如公之徳之學之官政有貞實皆知之雖不文也其何敢辭乃哭拜受狀序其事而銘之公諱訥字敏徳别號思菴吴之士大夫皆稱之為思菴先生而不名後公雖貴不以官稱乃所重在其徳學焉海虞之吴盖仲雍之苗裔也公之曾大考諱清大考諱天佑考諱遵道遵道仕國初為沅陵簿卒以公貴贈僉都御史妣王氏繼陳氏俱贈恭人公之生也早失所恃而逺所怙然天賦高朗能自樹立甫七嵗摘五經之文誦之不訛出語有章老成長者巳識其偉器時沅陵方逺官公獨侍其祖母繼母居海虞且學且養不以憂遺其親沅陵君彼誣繫京師公匍匐訴于廷乞以身代事未白而沅陵君沒公扶柩歸葬未幾而祖母及母亦相繼沒哀毁幾不能存雖在窮約而喪事一毫不茍且歛窆虞祥之禮一依朱子書逺近觀禮焉鄉人化之治喪乃不用浮屠法母族王陳二氏皆徙逺方公迎養兩外祖母於家供養如一其齒益長學益富大江之東稱徳義者必首及公而稱學術者亦必首及公永樂中旁邑之大夫交辟為校官不就乃薦之朝召試翰林優等且授官或言其善醫將使教醫生公不願舍儒從醫上疏懇辭焉時仁廟監國因是知公命之即南宫教六卿子弟有薦公行在者文皇召見齋宫奏對稱㫖命日侍仁廟登極翰林學士沈度秋官郎中王傳交薦之吏部尚書蹇義以聞上曰是嘗教六卿子弟者耶毋使外任即日擢監察御史公素自重又感上知遇遇事直遂知無不言朝野憚之其出巡按至以扶持綱常為巳事在浙江則立高宗九經語孟碑而削秦檜記刺羣賢之文表宣公之奏議褒岳王之精忠而於貴州則以蠻夷襍處務持大體不苛以擾恩威著焉及代還民不逺萬里詣闕乞留先是使貢還者率厚所賚而公獨無宣宗時以南都留臺為重求可任者僉以公應詔進右僉都御史尋陞左副都御史階通議大夫公執法體剛而用正侃侃之言卓卓之行論者謂其得大臣體未幾有與不合者愬之朝公遂以疾求去吏部方秦留之而其辭益力不可奪上宴勞而遣之公既歸家事一不問日惟著述以終所志閉門絶掃而士益歸嚮焉初未嘗寢疾及易簀無一語之亂是惟天順元年三月既望也公兩娶皆張氏贈封皆恭人有丈夫子二曰欽曰銓女子三長歸錢公建次歸嚴顯又次歸俞昱皆善士孫男四長淳受經于公第進士為御史克肖其風裁不幸早死鄉邦惜之次洵浚沫孫女一曾孫男三女一公生洪武壬子享年八十有六葬邑之虞山從先兆也公為人端重純明履方居約不以窮達易所守其學務遵儒先闡經訓以淑人心正士習故凡為文章鑿鑿焉斷斷焉根據義理有裨世教不徒作也所著有思菴前後讀詩文集小學集解性理羣書補注文章辨體祥刑要覽晦菴詩鈔文鈔草廬文粹諸書悉梓行於世烏乎以吾觀乎斯世其功名如公爵列如公者葢多有之矣至求其立心如公制行如公者則未之見焉故少師文貞楊公嘗贊其像曰道古人之道心古人之心君子以為篤論然則有貞之為公大書特書而不讓者豈門人之私哉盖天下之公也銘曰吳出姬姓實惟周宗海虞之裔祖於仲雍雍後迄今綿歴百代代不乏人及公而大孰不為學公學惟正刋落文詞直窮理性孰不為仕公仕惟時進禮退義動合其宜公病士習躐等無序乃訓小學為之章句公患官邪淫刑以逞乃著祥刑俾之警省晦菴我師草廬我友力踵前修以覺於後三品之貴八袠之年世謂達尊公其備焉我為斯文揭於墓道尚俾來者於公有攷中奉大夫江西右布政使何公墓表魏驥中奉大夫江西右布政使致仕吳江何公年八十又六以景㤗四年十一月十三日卒于正寢將以又明年九月十五日塟于里之長山之原先塋之次前期其子玶以兄璫主喪不敢離於殯側乃獨不逺數百里踰湖涉江衰麻踵余門泣拜曰先君沒矣當屬纊時呼玶輩於前屬之懇懇願求執事數語述其生平刻於墓道今塟有日玶謹奉遺命而來惟執事不靳以副先君之臨沒言是望復出公平生行實見示又泣而再拜余念公故人也不相見者幾二十年風晨月夕未嘗不往來於懷以重其為人今而巳矣以其千載不朽者為託且憫玶孝誠切至余何可以不文辭惟公實出吳江望族世以詩禮相傳名源字㓜澄九嵗通四書大義十二能賦詩作文十三讀毛氏詩十七讀蔡氏書膺推擇為郡庠弟子員逰於春坊贊善諡文靖王先生之門而又以周易是明先生見其言行卓卓乃曰是子公輔器也十九失怙獨與母居事母朝夕不離其側且不廢所學洪武甲戌膺貢入太學又明年以易領京闈鄉薦名在第七主司刻其文以示後學明年會試禮部中乙牓名在第一授山西太原之徳保州學正文行昭彰克稱師表膺薦陞山東徳州知州州當南北要衝供給浩穰且罹旱蝗民多乏食公于其間晝夜極力營為致事克濟暇則問民所疾苦於利即興於害即除致民仰之如神明賴之如父母明年蝗生鄰境公率父老齋戒禱于祀典神祇曰蝗將入境神其止之守者有過神其罪之民無所告神其恤之告畢蝗果不入境於是闔州之民號公曰賽包家盖以公之設心制行通於神明得於黎庶似宋包孝肅公焉耳迨丁母憂民扶老攜㓜告於部使者留公勿行公曰聞父母之喪當見星而行見星而止豈可留而勿行耶部使者以公達大體及出郊上馬父老脱公履懸於州門以示去思服闋復膺薦陞梧州府知府值山水驟至人民廬舍漂沒無筭民見存者無以聊生衆議欲具奏發倉賑濟公曰具奏必俟報俟報而發廩民則盡為餓殍矣首出己之俸為僚屬倡及官立券借其粟於富民遂得粟若干石由是民獲免飢而弗死者甚衆毁闔郡之淫祠以耗民財者祠凡若干所革沿江競渡之戲免民沈溺之患者船凡若干艘至今民不敢變尋以詿誤被謫赴交趾英國張公少保戸部尚書黄公所聴調發公於二公一見之頃二公重公辭公動止不凡曰此儒者也面委署交州府學事公嚴立教條用夏變夷致諸生忻然從教未幾選貢得士十有餘人至今有位至方岳者焉還朝除吏部考功員外郎時仁廟御極擇賢以輔導親王膺少師蹇公薦擢任鄭王府右長史公繪欹器圖以進王言其略曰臣欲殿下以盈滿為戒王嘉納其言上聞之特賜誥褒美及侑以白金彩段仍推恩贈及父母久之改除吏部文選郎中膺近臣薦陞江西右布政使時江西民所患者勾補遼東大寧萬全各衞所軍役為累公即具奏江西之民去北數千里且不禁其地之嚴寒至則死亡者多乞於見勾數内存留㓜弱者三千餘名於南昌衞操練上允其奏民甚便之其行利於民者多類此在江西三年年已七十即上章乞致仕朝廷以公輿論所推老於從政不許踰年詔許入覲既見上憫其果老遂獲賜歸既歸鶴髪烏紗優㳺林下者十又六年足跡未嘗入城府終日閉門惟焚香手不釋卷以適其所適而巳卒之前二日覺四肢微倦呼諸子於前曰術者謂我命止八十六嵗昨得一夢測之相協我死後毋作佛事但得蕭山魏尚書公數語述我平生刻於墓道足矣恐路逺不可致耳言訖夷然而逝三日大歛神色如生哭弔者盈門咸曰福徳人也福徳人也曾祖慶逺祖正卿父信之贈奉議大夫鄭王府右長史母顧氏贈宜人配陳氏先卒贈宜人繼室苖氏封宜人側室劉氏子男四曰璠曰瓛陳氏所出曰玶苗氏所出曰瑺劉氏所出女兩姚信張震其壻也孫男九人曰㫤曰旭曰昇曰晟曰杲曰昭曰暹曰暤曰昻昇補邑庠生孫女五鄒致章貴生顧宏李憲皆孫壻也一在室曾孫男三曰復㤗晉平生著述有澄菴稿若干卷藏於家嗚呼公於書無所不讀於政無所不達其所操所履一以廉介正直是務誠勢有所不能怵利有所不能詘者歴事五朝始終一節全而生之全而歸之享有高夀得正而斃況又善教其子孫如璠輩詵詵詩禮足以襲珪組續風聲是則公尤可謂之不沒也其視彼逞智自私以僥倖一世迨没身名俱冺不異與草木同腐者相去為何如也哉余烏得不表其墓以為公鄉邦之士勸噫豈特為公之鄉邦之士勸哉承節郎趙君墓志楊煥淳祐十又二年良月既望友人陳鑒來訪余輦轂下發囊啓緘謂余曰此我故東道主之子之書囑誌岵屺鑒義弗忍辭故請於執事曰公諱應龍字子雲曾祖瑄祖革父朝俊世居吳之嘉定望族也公㓜從吴之名士㳺肄舉子業端平間鶴山魏公督視江淮荆湖四州軍馬公以兵機進攝濠州定逺尉以平寇勞補承信郎嘉熙三年大丞相史公復往視師公語長子涇曰機會之來間不容髮吾與若可以拔樹功名謁隨軍轉運李公曾伯尾督議將軍吕文徳奔走兵間董餫勵師迄相其捷特轉承節郎子涇補進義校尉李公方委采石鎮寄納倉以示優擢公抱疾嘉熙四年九月之癸亥卒于正寢年四十有六娶同邑安陸之陸氏徽猷之後通判之孫名妙智事公姑和親族慈孤弱惠貧窮捐廩入菴溥茶湯供鄉人多徳之卒時淳祐辛亥五月二十八日也享年五十有八長子涇命諸弟卜用壬午十一月壬寅仝窆于蕭水之上四男長男涇進義校尉新兩浙轉運司淮使次曰嗣發曰英發曰嗣昌二女長適國學進士龔天定次適通州進士顧應環用述以誌余聞之哀而感嘗慨汝墳遵化之弗行而孝子之潔白世亦鮮儷古意寥寥今行于趙氏之家矣故為之歌大車之卒章曰穀則異室死則同穴以美其有是夫而有是婦也又為之歌既醉之五章曰孝子不匱永錫爾類以美其有是父而宜有是子也承議郎知處州龍泉縣主管勸農營田公事楊煥撰明故大中大夫浙江等處承宣布政使司右參政陸公墓碑銘吴寛𢎞治七年七月戊申浙江右參政致仕陸公以疾卒于家明年十二月庚申塟于太倉陳門塘先塋初公疾革巳不能言若有所囑其子者於是其子伸以治命泣請銘其墓上之碑惟予與公同朝二十年相知實深毎重公才操當大用於時一旦顧以浮議而去則公不平之氣亦宜假此而發然此亦何足為公重輕哉是宜置之不足道也公諱容字文量姓陸氏先世冒徐氏至公始復未生其母夢紫衣人以笏擊其首曰當生貴子已而得公弱嵗穎敏篤學逰鄉校不專治舉子業日取諸經子史程誦不輟同輩謂非所急曰聊以抵諸君戲耳獨與故翰林修撰張亨又太常少卿陸鼎儀友善三人俱以文行聞於鄉而公尤為葉文莊公所知天順三年中應天府鄉試成化二年登進士第授南京吏部驗封司主事丁外艱服除改兵部職外司擢武庫司員外郎再擢職方郎中丁内艱服除改武選司遂陞右參政致仕卒年五十九公在兵部勤於公事邊報或急奏疏日三四上動輒數千言皆出於公而慮逺持正士論歸之西域賈胡進獅子至陜西嘉峪闗奏乞大臣率軍士往迎公言于尚書外夷以竒獸進朝廷既不能却若復往迎寧不貽笑天下後世邪議上遂巳又安南累嵗侵擾鄰邦有欲加兵者公言安南臣服中國巳久今事大之禮不虧叛逆之形未見一旦以兵加之恐遺祻不細其事亦巳錦衣百戸韋瑛凶悍附勢得罪謫宣府謀再用指良民妖言為功公言于尚書且疏請下法司鞫之瑛竟坐誅而被誣者十餘人皆獲釋京師稱快先時捕妖言者多陞官例得世襲愚民被誣死者無數公請除其例獄遂衰都指揮昌佐求為金齒騰衝㕘將公執不可俄中貴人召公至内諭㫖公言西南夷要地必得堪為將者守禦佐非其人若順成之異日壞事咎將誰執佐計竟沮他日復有中貴人舉都指揮二人為都督僉事者命巳下公益不可言都督大官必積功始得彼何人而欲亂法耶舉者市恩專擅尤宜寘之于法以為後戒疏凡再上言甚切直上從之一時雖曲宥其人而自後犯者必罪著為令他所建白若論馬政四事論儲養台輔教導勲戚愛惜人才久任巡撫經理京衞選練禁兵均平鈔法慎重會議又八事及在浙江益究察民隠振作士風行縣至桐廬且嘗發漁家兄弟殺於潛丐者夫婦事人傳以為神明之政焉既乃條例浙中便宜十事悉見施行間因公務入京又論漕渠利病語斥權貴沮事有人所不敢言者盖公少即有志天下如兵刑水利之類有所得輒手書之册後多見於用云公事父母甚孝父病躬奉湯藥不離左右者累月嘗夜醉歸母不樂自是飲必半杯不敢至醉其居喪盡禮三年不入私室人未嘗見其嘻笑治家嚴肅動容凝重若不可親狎至與人處歡然也性喜聚書政事之餘手不釋卷見於著述率明切平實為詩文凡若干卷外記錄諸書又若干卷陸氏世為蘇之崑山人公之曾祖諱福祖諱繼宗皆不仕父諱裕以公貴累贈奉直大夫兵部武庫司員外郎妣陳氏累封太宜人配張氏河間府通判瑮之女弟封宜人子男一人即伸鄉貢進士女二人長適太倉衞指揮使張漢次適鎮海衞指揮使武勲皆封淑人孫男二人復陽洊陽女一人銘曰瞻彼崑山韞兹良玉玉匪可貴人秀而毓有美陸公白晳而豐少則有志誓終其躬統師籌邊惟大司馬我佐其勞操縱用舍朝有成憲憸人妄干以身障之我力桓桓力所可為夷險一視何以為之國有弊事手削章疏觀者駭焉我職在是位卑亦言彼愚不知指為沽直知者與之則為盡職為上為徳不寧惟斯出㕘政事惠澤益施未究厥才歸與則速逍遥海濱進退不谷白日自顧吾身獨全全而歸之瞑於九泉吴都文粹續集卷四十四
