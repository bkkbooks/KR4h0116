body:
  text: 吳都文粹續集巻十八明錢穀撰第宅臨頓里為吳中名勝之地陸魯望居之不出郛郭曠若郊墅予每相訪欵然惜去因成五言十首奉題屋壁皮日休一方瀟灑地之子獨深居繞屋親栽竹堆牀手冩書高風翔砌鳥暴雨失池魚暗識歸山計村邊買鹿車其二籬踈從緑槿簷亂任黄茆壓酒移溪石煎茶拾野巢靜忩懸雨笠閒壁挂烟匏支遁今無骨誰爲世外交其三繭稀初上簇醅盡未乾牀盡日留蠶母移時祭麴王趂泉澆竹急候雨種蓮忙更葺園中景應爲顧辟疆其四靜僻無人到幽深每自知鶴來添口數琴到益家資壞塹生魚沫頽簷落燕兒空將緑蕉葉來徃寄閒詩其五夏過無擔石日髙開板扉僧雖與筒簟人不典蕉衣鶴靜共眠覺鷺馴同釣歸生公石上月何夕約譚微其六經歳岸烏紗讀書三十車水痕侵病竹蛛網上衰花詩任傳漁客衣從遞酒家知君秋晩事白幘刈胡麻其七寂厯秋懷動蕭條夏思殘久貧空酒庫多病束魚竿𤣥想凝鸘扇清齋拂鹿冠夣魂無俗事夜夜到金壇其八閉門無一事安穩睡凉天砌下翹饑鶴庭隂落病蟬倚杉閒把易燒术静論𤣥賴有包山客時時寄紫泉其九病起扶靈夀翛然强到門與杉除敗葉爲石整危根薜蔓狂遮壁蓮莖卧枕盆明朝有忙事召客斵桐孫其十緩頰稱無利低眉號不能世情都太薄俗意就中憎雲態不知驟鶴情非㑹徴畫臣誰奉詔來此寫姜肱襲美題郊居十首次韻酬之陸龜䝉近來惟樂靜移傍故城居閒打脩琴料時封謝藥書夜停江上鳥晴晒篋中魚出亦圖何事無勞置棧車其二倩人醫病樹看僕補衡茅散髮還同阮無心敢慕巢簡便書露竹樽待破霜匏日好林間坐烟蘿僅欲交其三倭僧留海紙山匠製雲牀懶外應無敵貧中直是王池平鷗思喜花盡蝶情忙欲問新秋計菱絲一畞强其四故山空自擲當路竟誰知秪有經時策全無養拙資病深憐灸客炊晩信樵兒謾欲陳風俗周官未采詩其五福地能容塹𤣥關詎有扉靜思瓊板字閒洗鐵笻衣鳥破凉烟下人衝暮雨歸故園秋草蔓猶記緑微微其六水影沉魚器鄰聲動緯車燕輕捎墜葉蜂懶卧焦花説史評諸例論兵到百家明時如不用歸去種桑麻其七禹穴奇編缺雷平異境殘靜吟封籙檢歸興削帆竿白石堪為飯青蘿好作冠幾時當斗柄同上歩罡壇其八强起披衣坐徐行處暑天上堦來鬪雀移樹去驚蟬莫問鹽車駿誰看醬瓿𤣥黄金如可化相近買雲泉其九野入青蕪巷陂侵白竹門風髙開栗刺沙淺露芹根迸䑕縁藤桁饑烏立石盆東吳雖不改誰是武王孫其十踈慵真有素時勢盡無能風月誰爲敵林泉幸未憎酒材經夏闕詩債待秋徴秪有君同癖閒來對曲肱臨頓里在城東爲吳中勝地陸魯望所居也皮陸俱有詩十首咏之余悉次其韻盖彷彿昔賢之高致云高啟聞說橋東地高人舊隱居養生應有道覔舉絶無書愛救黏絲蝶嗔驚出水魚時尋戴顒宅自駕短轅車其二應愛山齋好秋風不巻茅鑿渠侵螘穴移樹帶禽巢人世真浮梗吾生豈繋匏不逢皮從事誰結歳寒交其三載酒攜山榼安琴製石牀鳬眠皆傍母蜂去自從王穀雨収茶早梅天晒藥忙不扶靈壽杖筋力老能强其四自少圖名意誰言世不知僧求開寺記客送買山資細雨魚生子斜陽燕哺兒平生無事迫辛苦爲尋詩其五斬伐憑樵斧經綸在釣車薄雲還露月小雨不妨花酒債應多處詩名自一家虚煩時主召嬾脱故衣麻其六長物元無有何勞犬䕶扉借看髙士傳學製道人衣牕破容螢入船空載鶴歸定縁幽事繞不是宦情微其七澹泊心情在蕭踈鬂影殘引泉䂓作沼畱笋待成竿自洗沾泥屐誰収挂壁冠毛公新有約月夜禮天壇其八沐罷便輕幘消摇咏晩天清風蘇病鶴驟雨禁鳴蟬舊史堆緗素新經出洞𤣥誰知城郭裏别自有林泉其九汨汨泉通圃蕭蕭柳映門折花摇樹影踏藕損蓮根饑鴨呼歸艦新蠶試浴盆屋前髙石在知是鬱林孫其十茶租催未得菊餌服還能行古時人笑文工造物憎貧畱漁艇載老謝鶴書徴誰識先生樂悠然卧曲肱臨頓里詩周南老吳館曰臨頓里巷因館名地偏足佳勝卜構居幽貞琴書樂蕭散軒墀謝驕榮鹿門隐同癖松陵詩屡賡于今搃閭閻獨有橋庚庚過者爲歔欷猶能慨髙情幽居賦并序陸龜䝉陸子居全吳東距長洲故苑一里闔闗不通人事且欲吟咏性情曰燕居則仲尼有之曰卜居則屈原有之矣曰閒居則潘岳有之矣曰郊居則沈約有之矣既抱幽憂之疾復為低下之居乃作幽居賦其序云余少學窮𤣥早持堅白其生也懸疣附贅其材也戴癭銜瘤居無養拙之資出有倦游之歎初張蓬矢嘗逞志於四方末佩桃殳敢違仁於一旦雖家風未冺而世德全衰門等韋平材兼魏邴激清芬而鎮俗追雅望於圖形荀勗乃天下表儀裴秀爲朝端領袖朱輪十乘紫誥千篇炳若星辰煥乎竹帛俯觀圖諜謬辱孫謀五鼎蕭條賜書零落漆工酒保幾欲沉淪故栗空桑屢瞻摧折劉超劉毅俱無擔石之儲許邁許詢但有山水之志思鑿坯而遁聊倚樹而吟師道氣於龜腸扣兵鈐於魚腹窮年學劍不遇白猿隔日伏痁未逢黄鷁止則葭墻艾席行則葛履柴車仲宣方翫於棋枰叔夜還眠於鍛竈既而草知晦朔木讓榮枯因推墨别爲三復悟儒分至八何晏之言道德不及王生鄭𤣥之注春秋才同服氏初陳梗槩漸入精微探桓範之智嚢掘張憑之理窟遺其耳目然後謂之聰明差若毫釐焉足言乎大小加以病惟鬬蟻力止戡蟬簾幃非翡翠之榮鐘皷豈鶢鶋所樂退惟衡泌聊以棲遲建一畞之宫忝稱儒者置十金之産雅叶中人晏子以囂塵可容曹公以泥水自蔽羅含宋玉嘗戾止於荆蠻蕭相武侯亦潜居於僻陋楊德祖家惟弱柳殷仲文庭只枯槐馮衍薑辛繁欽苔碧復有稻名半夏藥號恒春長榆亦降星精修竹乃生雲母潘尼館􅂻嘗聞柰素瓜甘庾信園中亦話棗酸梨酢旦故切竊觀留咏雅尚清風今古攸同聖賢何逺武仲游於沛澤伊尹耕於有莘予欲無言回不願仕神交六位方爲賣卜之人歌動五噫竟作賃舂之客况布袍綸㡌尚足朝昏羽扇貂裘猶堪寒暑得以書抽虎僕射用牛螉自理茶租閒披釣褐經稱小品還下二百籖賦謂名都略㸃八千處下問得犁塗之義徐聽聞愬怒之詩既巳逢原遂成摛翰非因授簡切擬題鞭不能粉飾大猷且用𤣥黄稗説貽於好事希逢得意而傳責以壯夫甘受子雲之笑賦云泰伯勾吳通侯舊里地接虎邱門連鶴市比顏巷兮非陋方賜墻兮猶峙樂令有名教之樂必以仁行莊生乃道家者流咸從達起彼既得矣余何謝焉欲神游於浩氣法大隱於遺編魯仲孫衣止七升之布欒武子食無一卒之田賤不容憂貧惟可賀冥心而姑務藏疾巻舌而誰能擊惰爭先敢脱乎牛車自給方營於馬磨噫秦時亡命競作帝師吁漢末遺臣皆稱王佐吾焉用此僕病未能藝合歡求解恚之方餌陟釐明攻冷之徴悲少歌於趙壹喜長嘯於孫登萬古騷人逺追乎橘浦百金􅈄事近出於松陵亦慕偷桃還憐嗜芰何悲尺蠖之屈未損丈夫之志投簪隱几聊思夷甫談𤣥搦管彈毫聊效文通奏記夫静者躁之君名者寔之賔進不參乎多士退冝追乎逸人頌厥土之三譲託髙風於四鄰纔祛燥濕稍逺囂塵以日繫時且復窮於魯史穿池種樹正欲類乎齊民室乏崇壇墉非縮板因坎窞以爲洫謝䝉蘢而表限孟介無是非之心阮籍能青白之眼龜牀鹿幘訝招隱兮何遲橡飯菁羮笑謀生之太簡是知名安可釣筆不堪耕有白鳯之才乃先爲贅客有雕龍之辯然後爲狂生雄自投而幾死禰流慟而將行外嬖方施孟子虚陳乎仁義中讒既勝韓非徒恃其縱横况復支離抑鬱尫陋蹇吃才甚微而寡文體素羸而多疾隂鏗藥銚披曉幌以皆來徐邈酒鎗擁寒爐而必出自然忘物我混窮通將大宗師理叶與握真宰情同優游塞馬脱落冥鴻竊慕王晞眷戀於芳辰美景深符謝朓留連於明月清風得不分碕㟁而飾荒臺輟金錢而貿佳樹蓴絲兮欲縈千里草帶兮初圍十歩頽垣抱碧無非海髪山衣暗座飄香盡是松肪桂露加以籬邊種菊後堂生萱覆井之新桐乍引臨牕之舊竹猶存花妨過㡌柳礙移門夣去而雲遮絶洞樵歸而水遶孤村遇境逍遥就魚鳥之性樂開襟散誕見羲皇之道尊早濯言泉屡游經苑憂中廢而將落懼無文而不逺豹管閒窺羊岐忘返搜束晳之三缺補陳農之遺遁梁世祖府充名畫或得奇蹤王子敬家聚羣書率多異本何嘗彷彿莫究分毫徒羡玉杯珠柱上書名下琴名之號美象格犀簪之態髙寧容朴野不稱蓬蒿悵殘編之未購奚雅具之爲勞况乎栖平蕪古木之地壯被褐擁鐮之事冝其梓合巾箱藤交餅笥炊粃糠以爲食剖瓠匏而爲器荷蓧而行㩀梧而睡妖寜勝德休占賈誼承塵醉可全真但舞王戎如意其閒豁爾此外蕭然姜肱則惟眠一被江革則還畱半氊望夫子之門墻仍過數仞顧先生之履韤不啻雙穿敢驚時而獨行聊収視而返聽豈可浪廢𤣥關虚摇譚柄夜將半而誰客月每旦而誰評去聲清言不屈孫劉寕減於中軍善講無窮支許那輕於小令式抽易序或叩老端演精微於簡易甘澹泊於危難澄如止水畟音測若長竿興去聲牛心者赴敵持塵尾者登壇交衡而矛㦸初利頓挫而風霜正寒興公雅對仲祖旁觀始信何才當指地於丞相方知習健抗彌天之道安彼濩落而無容且蕭條而髙寄兼耳目以感外曷丘園之足賁幸春物之向榮列天姿而見遺隂者負而陽者勝孰謂兩儀瘠者緩而腴者先奚云一氣真宰難問洪鈞肯畱人閒未適象表何求縱使陶烟霞而傲睨騎日月以嬉遊乘剛直上躡景冥搜横絶乎四海飛揚兮十洲閲仙苑之琅書安能解愠傾洛公之金醴幾得銷憂不假大招寧馳别國悲舊鄉之何在望平原之無極陸鄉在平原乃逺祖所封之地歎鐘鼎之沉光向漁樵而騁力庚桑有道猶居畏壘之顛接輿佯狂亦取杶音椿櫨之食徐誇下舎陶愛吾廬上法於陵之畦圃旁分建業之村􅇕時牽殗殜自把渠䟽友乏惠施莫解連環之義醫無文摯誰知方寸之虚存其道而或通失其居而或旅才將命兮分坎窞性與時兮甘齟齬閒游廣澤願學弋於蒲且弋或作戈終蹈滄溟更移家於苧嶼夫動以勞吾身静以沭吾神苟能推於用舍自足究乎天人思任誕於窮檐何辭井臼不求容於側徑何患荆榛湛音沉冥者朴素之源毁譽者浮華之轍蓍名聚雪仍招死草之譏琴號落霞亦被枯桐之説值聖則幽賛成功逢賢則雅音攸發同於德者大亦冝然殷宗命相於嵓下周武迎師於渭邊有東山北郭之風纔能養素有左公右侯之計未足圖王嗟浩嘆而哀吟畏蘭凋而蕙歇清尊方灔於瑶水寳瑟坐凝於華月歸田少接猶疑斥鷃追飛羽獵相逢可謂蕪菁唐突陸魯望宅在臨頓橋又有别墅在甫里躬耕於此有地數畝有屋三十楹有田奇四萬畝其居後爲白蓮花寺建祠堂塑像祀焉酉室記江公望王聖時吾畏友也有室曰酉諉予記之室無方不以西名室非時不以秋名非色也不以白名非聲也不以商名非味也不以辛名象数之所不能該也兊不得而名流動非氣也堅利非物也金亦無所名焉是七者酉屬也散一爲七名體各足合七爲一具於一室方其日薄虞淵行龍遯藏獸萃鳥下百物入息吾聖時磅礴於無限逍遙乎其中隣燭光謝石爐燼寒上下一色四方易位蝙蝠野䑕飛走竄伏同㑹於寛閒廣莫之地而自得其樂也秋九月予將訪吳門願從公游而爲公記其屋紹聖十六年七月釣臺江公望書酉室王伯起所居伯起字聖時楊邦弼序其詩有云伯起受經於王臨川學於曾南豐遊於曾宣靖公父子間諸公皆推挽之年未及衰一旦棄去卜居吳門獨處一室扁曰酉室日焚香燕坐於其中其所爲詩若干巻號唱道野集張處士谿居王禹偁雲裏寒溪竹裏橋野人居處絶塵囂病來芳草生漁艇睡起殘花落酒瓢閒把道書尋晩照靜攜茶鼎洗春潮長洲懶吏頻過此爲愛山園有藥苖寄鍾子充錢厚倦倚吳門思泬寥懷人清致滿詩瓢池塘芳草夣初斷風雨落花魂正消一百五日寒食節二十四浦春江潮遥知藥圃晩經劚舍後䕷蕪添綠苗鍾子充隱居舊志弗載以錢厚所寄詩推之恐隱士鍾璇子孫也賢行齋記朱長文德祖少而警敏生數歳其伯父今天章公嘗獲一鑑背題龍朔德祖在旁曰此唐太宗時所鑄也子中奇之他日諸父有所見問之即對皆與史合孔常父掌揚州學德祖年十七試爲諸生冠㑹神宗初罷尊號坐客或論尊號之所起德祖避席曰宇文周宣帝生號天光唐髙宗自稱天皇自是美稱寖多矣常父即取筆札命書之擢爲都講辭不受元豐中試大學博士第一司業博士以爲三舍之置未有此作也厥後試二浙江東漕司嘗在魁選又用賦舉開封名第五而連見黜於禮部一時諸公幸得之以爲功見其失也莫不驚愕嗟惜烏乎近世以糊名取士雖曰至公其弊至於失才如此可爲太息先公太僕當任子德祖以遜其弟碩孺太僕不許德祖即取奏牘以碩孺名上之㑹有詔任子必以長㓜爲之序德祖貽書諌官曰某當以廢疾自棄矣是時岑嵓起仲子亦推與叔弟德祖聞之諗起嵓建請乃得改法碩孺遂得入仕太僕捐館河東號頓幾不勝閒關扶䕶下太行而歸未卒哭葬吳西山所以奉親終顯親之事無不自竭鄉閭敬服其平居論議必以帝王之佐爲師而頗喜賈誼汲黯諸葛孔明魏鄭公之爲人其志可知也賢行齋在大雲坊林虙所居朱伯原記夀櫟堂午坐范成大屋角靜突兀雲氣低鴻濛殘葉颭䟽雨孤花側凄風北忩午睡起一笑萬事空無人共此意苔階咽微蛩夀櫟堂枕上禪牀初著小山屏夜久秋凉枕上清繞髩飛蚊妨好睡臥聽簷雨入池聲范村午坐好風入脩篁槁葉舞而墮斷續一蛩吟高下雙蝶過踈樾午隂圓靜極成癡坐老便几杖供慵廢誦弦課蒲團輭易煖困來百骸惰四傍無人聲誰驚短夢破范村雪後習氣猶餘燼鍾情未溼灰忍寒貪看雪諱老强尋梅熨貼愁眉展勾般笑口開直疑身健在時有句飛來賞海棠三絶芳春隨分到貧家兒女多情惜歳華聊爲海棠脩故事去年燈火去年花燭光花影兩相宜占斷光風二月時但得常時妃子醉何妨獨欠少陵詩憶向宣華夜倚䦨花光妍煖月光寒如今蹋颯嫌風露且只銅瓶滿插看范參政府在西河上文穆公成大所居有夀櫟堂其南有范村以唐胡六子渉海所居爲名中有重奎堂奉孝宗御筆旁有便坐梅曰凌寒海棠曰花仙荼䕷洞中曰方壺衆芳雜植曰露雲其后菴廬曰山長具見公所爲詩和章秀才北城新圖范成大方游桃花隖窈窕入壺天碧城當嵓岫清灣如澗泉風月欲無價聊費四萬錢雪後春事起紅雲蜂蝶邊其二西城如西塞桃花古来多釣艇鱖魚肥前身張志和烟霏幾白鷺風雨一緑蓑清江韻新引清絶勝陽阿北城梅爲雪所厄凍蕋枯枝瘦欲乾新年猶未有春看雪花秪欲欺紅紫不道梅花也怕寒章氏别業在閶門裏北城下今名桃花隖當時郡人春遊看花於此後皆爲蔬圃閒有業種花者自題姚劉沙隠居李重發松竹一茆廬其間隱者居無營心地靜懶出世情踈奉母甘蔬食呼童課古書自知生理拙未敢廢耕鋤嘉樹堂記楊維楨吳之練祁有隱君子家爲恕齋强氏其先八世祖贇自汴居吳遂爲吳人手植嘉木一本在中庭俗名皁角者其根柢貫堂背枝葉輪囷蔽風暑實挺然資澡雪服食之用色理堅緻而不爲螻螘所近其越歳已二百餘榦益碩大枝葉花實益茂美於是强氏子孫繁衍亦且二百餘指而有食君之禄者矣予與恕齋爲昆弟交過其家見其樹而知其先德之覃于後者未已也恕齋持觴爲余壽且請記余聞諸傳季孫宿有嘉樹爲韓宣子所美吾不知其樹何樹也宿曰敢不封殖此樹以無忘角弓之詩遂賦甘棠夫季氏子孫爲魯公室斧斤樹之封殖其敢比德召南哉宣子蔑魯媚季其得果名嘉樹乎嘗論世澤於甘棠之後若孔子之檜下爲田氏之荆王氏之槐是已此非其子孫一時封殖之勤也盖一本之深百世之下固若有神明䕶持之力在焉吁非偶然也諗矣孔子之檜吾不得而見之得見如田氏王氏亦可矣若今强氏之植非可續王氏田氏之后者乎非所謂嘉樹而有光於傳者乎抑聞前人所種期収於後後人所培又以固前人之本恕齋伯仲皆清修好學尊德而尚義周人之急窘至於捐金粟以助國家荒政利禄之心未嘗入焉輈廷業已表其宅里其於樹所培者厚矣前人植之後人培之一元之氣雖貫百世而可矣豈直八世十世而已哉后恕齋之后者尚以余言勉之於是乎書爲强氏嘉樹堂㑹稽楊維楨記文㑹軒記士大夫能成天下之風俗風俗不能病士大夫此天下之名言也林宗之巾爲雨墊人折角以效之安石之詠以鼻疾人亦揜鼻而效之士大夫之聲服係於俗者如此况其下者乎具區之東瀕海之壤其地卑薄俗習多輕浮險急民之秀不入刀筆胥養則睚眦從游俠習弧槊戎行閒者不則寄跡老釋氏以隂結勢利閒有衣冠族子弟與海内名人游其行藝古茂始一洗舊俗則知輕浮險急者不能爲之病祁之大族爲嘉樹强氏强氏之秀而傑爲彦栗自蚤嵗有竒氣遊京國見東閣大臣及一時搢紳先生業將上書見天子值兵變歸歸遷先廬於城南傍孔子廟學觴豆燕集日與佳士以唱和爲事至却聲樂繼筆劄以程之又不逺道里招致名師儒生文評以課文㑹其率作文風非惟丕變陋俗而賓賢能者實於是乎資焉士大夫之家若嘉樹氏者其文雅嗜好不成一時之風俗乎彥栗屢觴余爲尊客觴徹出所㑹文詩請評於西軒軒未名請於余遂命之曰文㑹而樂爲之記彦栗名珇至正閒授從仕郎平江路常熟州判官以侍親弗行親爲嘉樹老人云至正辛丑正月進士楊維楨記如意堂記徐有貞如意堂云者吳儒生杜子用嘉奉母之堂也盖杜子迺生而喪父其母顧氏寡居守志手鍼黹機杼以鞠育而資之學杜子之克以成立率由其教也及杜子之作斯堂也庭有嘉草生焉其花迎夏至而開及冬至而斂其莖葉青青貫四時而不凋也杜子之母每愛而玩焉曰之草也幽芳而含貞殆如吾意也於是杜子喜曰吾奉吾母懼無以如其意而之草也如之吾母之言吾可以不承哉乃以名夫草也又因以命其堂而賦之三吳士大夫凡與杜子游者咸相與和焉以傳于人人東海徐生聞而歎曰杜子之母其知盡母婦之道矣而杜子亦可謂能子也婦以不二其夫爲貞母以能教其子爲慈子以敬承親志爲孝母子能如是足書矣抑予聞之凡人之觸於物而有感者必以其類非夫動乎物也亦其志有在焉耳故勁草之感忠臣烏鳥之感孝子烈風之感義士皆志與物類是也惟夫婦人亦然若衛共姜之賦栢舟陶寡妻之歌黄鵠其貞順純一之志徃徃託物而見焉今杜母之愛夫草也其志亦猶是已夫其花之于夏至而開者順隂道也于冬至而斂者避陽道也其莖葉貫四時而不凋者秉貞德也處隂道而順以貞寔節婦之類焉且不生于他所而特生于其庭爲尤異矣意者天以是旌夫母氏之節也歟天既旌之人有不旌之乎其將至矣歳戊午冬十二月己巳朝廷果下詔旌其門云詠春齋記俞楨儒有毋追以爲冠逄掖以爲衣沈酣黄虞泳游姬孔其所居齋廬敷筍席據梧几函丈中縆朱絃瑟一有客過其廬閭式之曰是南園之居也乃下而入謁先生竢于垣之扉髙柳婀娜拂人衣裳黄鳥相下上或翔而萃或躍而鳴泠然有醒乎耳焉晉于扉之閾豐草披靡嘉花苾芬白者朱者絢且綺者秀緑以藉之甘寒以膏之灑然有沃乎目焉升于堂之階客主人拜稽首琚珩瑽如跪起曄如爲席坐東西條風時如水來煦客而燠體沖然有融乎心焉先生乃援瑟鼓之爲之賦考槃客曰裕哉其順處乎賦伐木曰諒哉其同人乎賦旱麓之三章曰道其全矣夫不囿乎人游乎天瑟且希客起再拜且觴以頌之曰維本始之既萌翕闢絪緼或磅礴以地或渾淪而天槖籥衆萬芸芸紛紛鶱而于雲泳而于川何物何我陶然一春弁而五六士丱而六七人浴沂以嬉風雩以歸而音渢渢而樂怡怡匪列御風匪周觀魚造物者爲徒而曾晳之與居舍曰詠春其曷以名先生之齋廬者哉端居室記端居室者山人俞楨讀書寝處之所也楨㓜尚澹泊於世利紛華無所嗜嘗讀書必冥心端坐以求其理趣因嘆曰學所以適用也不仕則無以及人乃習舉子業將以明經取科第既而幡然改曰學爲已知在人何以投契爲哉於是悉棄所業濳心象彖一室之閒左圖右書漠無外慕乃題其顔曰端居夫學須靜也惟靜可以觀萬化之妙端居一室以擴充吾方寸焉雖天之髙也吾不知其爲髙地之大也吾不知其爲大至於山河之崇深吾不知其崇深也反而觀之以吾𦕈然之身而處乎天地之内涵融自得浩浩焉混混焉不獲其人不見其身㑹彼之萬歸此之一可黙也不可言也室云乎哉因䟽斯語於壁以識名兹室之意盟鷗軒記傍蘓城郡之西南際野水有林木焉其廣袤不知頃畝空濶䓗蒨遊者自能道海鳥從而翔集之林木不見層軒數楹者山人俞楨之居也山人自顔其扁曰盟鷗須予記鷗不待盟也盟鷗鷗將逃焉人惟忘其機也故鷗從之機事一有鷗舉不暇邀而盟之鷗豈畱哉况盟非美事刑牲㰱血要明神而誓之以合其交初非有誠信也口血未乾從而背之生隙長亂莫甚於此君子之有盟夫豈得已哉且夫有機則疑機忘何疑疑而後盟不疑何盟盟何補於疑哉忘其機而已矣吁山人之盟鷗寓言也山人之不得已也吾聞山人於世故泊如也何其利於鷗鷗出沒滄波萬里莫馴亦何求於山人鷗從山人之忘機山人忘其機而從鷗機交相忘何疑不疑何盟孔子云吾非斯人之徒與而誰與山人學孔子者也其盟鷗豈得已哉使百世盟豈盟鷗也鷗盟則舉世之人皆不足與盟矣世皆不足與盟鷗何疑焉匪鷗則盟鷗將乞盟端居室長句鄭元祐先生注易隱南城激石松風答礀聲式玉式金王度在一寒一暑歳功成要參妙理須心悟洞釋羣疑貴理明蔀屋見星元是畫寰瀛括地可無程義精詎忍辭捫舌樂大何妨枕曲肱雨露每滋庭草緑雲霞不礙晩山横成林詎舍千章木求友難忘百囀鶯嵗月推遷陳跡在啓蒙常憶酒同傾題端居室倪瓚五畝幽人宅端居思泬寥圗書充棟積心跡去人遥巻幔松風入當堦蘭雪飄善師顔子意陋巷樂簞瓢石澗書隠石澗姓俞名琰字玉吾號石澗所居在今府學西中有詠春齋盟鷗軒端居室皆玉吾孫貞木所作貞木孫振宗又作九芝堂今皆廢為菜圃耕漁軒銘唐肅軒之幽釋耒而休其樂也由由軒之泰投竿以愒其樂也洩洩朝華其宫莫或易而翁昨鼎其食今或臠其骼勿舍予田勿忘予筌予以老于軒予既爲良甫友契作耕漁軒圖復爲之詩倪瓉鄧山之下其水舒舒林廬園圃君子攸居載耕載漁爰讀我書唐虞緬邈愴矣其悲棲遲衡門聊得我娛敬慎誠篤德罔三二四勿是克三益來萃彼溺于利我以吾義彼棄懦頑我以仁智匪今之同惟古是嗜虚徐逍遥隱約斯世再題溪水東西舍山家髙下居琴書忘産業蹤跡隱樵漁積雨客留宿新晴人趂墟厭喧來洗耳清泚遶前除朱澤民爲徐良甫耕漁軒圖寂寂谿山面碧湖輕舟烟雨釣菰蒲曉耕嵒際看雲起夕偃林閒到日晡漢書自可挂牛角阮杖何妨挑酒壺紅稻西風鱸鱠美依依蓐食待樵蘓七日訪徐良甫十三日至七寳泉上及暮舟還宿耕漁軒二首來看城西十月山桂花風起碧巖閒扁舟夜過溪東宿七寳泉頭日暮還桂樹忩閒臥看雲風吹花落紫綸巾偶來山廨餌蒼术又泛江波采白蘋春日過鄧尉訪良甫士平王璉伊余蹇世用野性遂成疾欲追古人蹤忘此山水癖兹晨屬休暢曳杖窮閲厯憩息嘉樹林逍遥美泉石洞庭縱矚覧鄧尉屢攀陟平湖泛晴緑青苔印行跡雲霄曠清溪烟霞閉幽寂愛兹風月佳樂與禽鳥得宛彼二三友獲此竟晨夕興盡復言還賦詩冩良覿和徐達左之子閥閲門獨抱烟霞疾豈無髙尚心復有詩書癖從宦意茫茫稽古心厯厯乃與茂叔孫結交比金石良辰共攜手佳山每登陟徜徉過禪居路躡麛鹿跡空山春欲歸花落鳥聲寂既感同氣求何嗟晩相得野肴具杯酌髙論倏竟夕分手含餘情清秋重相覿訪徐良甫虞堪鄧尉山中春雨餘髙人開軒方讀書力田歸來飽炊黍垂釣徜徉多得魚滄浪水清白石爛歌濯纓兮夜和旦媿我棲棲澤畔行空復長吟歳將晏寄贈徐良甫周砥夙存邁徃志結茅依山澤不辭沮溺勞更慕濠梁逸既耕亦以釣四體忻蹔息新稼登場邱嘉魚薦晨夕蒸嘗無足患喜復留我客野田荒烟翳平湖澂景寂開襜睇孤雲窅然無遺跡緬惟髙世士何嘗異今昔識達理自周情恬慮非易念子墮紛糾抗俗願有適束帯趨城府愧予尚促戚百年誠草草㑹當從兹役同前髙啟朝聞孺子歌暮聽梁甫吟豈無滄州懷亦有畎畝心昔賢在泥蟠終當起爲霖釣獲溪上璜鋤揮瓦中金兹世方喪亂伊人邈難尋既迷烟波濶復阻雲谷深嗟我豈其偶聊將學幽潛唯子是同袍相期清渭隂同前張羽一作楊基之子住銅坑人傳好事名如何同甲子翻遣昧平生野㟁風中釣湖田雨後耕秋天漸清冷或可赴前盟同前徐賁荷鍤喜逢春雨鳴榔又近黃昏誰道南陽渭水不似湘江鹿門門泊陶朱歸棹家住張翰故鄉霜落鱸魚出水秋晴嘉穀登場耕漁軒在光福徐良甫作良甫有文學所交皆名士爲題咏者甚多水竹居記俞焯洪範五行其一曰水其所以相生者不曰金邪然浮天載地水之爲物至巨也世言河源與天漢接所以洩於尾閭涸於沃焦者抑豈五金所能生哉惟蒸而爲雲霈然以雨也實乾以氣化之故乾爲金而凡火日形氣麗於水者多由金光而變幻之雷電亦然耳故金在鎔化而爲水金非火何以制範而合之非如水火土木著壞相也植物在震曰蒼筤竹一切草木率由子種而生惟竹虚中而有筠驟長而不積於漸抱籜而乘氣猶胎也走根而生不擇地也雷以聲之盤結而族處之區别於草木之中其性其情爲化木之走者受氣於天者正故貫四時而不改柯易葉也受命於地也順故既斬而不復萌焉無求生以害仁也移根必南枝也凝隂而不受暑也義也謂其乘震長男之氣一以清凉而卻俗塵者竹耳勉之曹君以之而名其居所以得順而正者德日新以體聖之情如見成湯與夷齊也詩倪瓉吳下人家水竹居俞公染翰笑談餘記文固已瀾翻甚嘯咏還當雨霽初篇什謾勞陳組繡園池無復有禽魚只今蕭散南湖上種玉䟽清孰侮予曹謹字勉之隱居在吳江國初本學訓導所居有水竹遂名其居玉山佳處記楊維楨崑隱居顧仲瑛氏其世家在崑山之西界谿之上既闢其中爲西第又稍爲園池别墅治室廬其中名其前之軒曰桃源中之室曰芝雲東曰可詩齋西曰讀書舍後之館曰碧梧翠竹亭曰種玉合而稱之則曰玉山佳處也予抵崑仲瑛氏必居予佳處所按郡志崑山縣華亭陸氏祖所窆生機雲時人因以玉出崑而名崑山邑山本號馬鞍出奇石似玉烟雨晦冥時有佳氣如藍田焉故人亦呼曰玉又曰崐而仲氏之居去玉山甚逺奚以佳名哉山之佳在乎山之外者得之山中之人未知也如唐之終南隱者與司馬道人指山之佳身固在山數百里之外也雖然終南之隠者固未知也借山之佳為㨗仕之途千古慚德至于今山無能揜焉若仲氏之有仕才而素無仕志幸有先人世禄生産又幸遭逢盛時得與名人韻士日相優游於山西之墅以琴尊文賦爲吾弗遷之樂則玉山之佳非仲瑛氏弗能領而有之與終南隱者可以辨其佳之誣不誣矣吴國良過玉山草堂轉附長句倪瓉玉山樹色隠朝陽更著漁莊近草堂何處唱歌聲欸乃隔雲濯足向滄浪珍羞每送青絲絡佳句多投古錦嚢幾問棹船尋好事辟疆園圃定非常玉山草堂在崑山元顧仲瑛所居有小蓬萊芝雲室可詩齋讀書舍來龜軒拜石壇碧梧翠竹種玉亭湖光山色樓百花坊其總名曰玉山草堂仲瑛好文喜客楊亷夫諸君往還國初從其子元臣遷鳯陽葑溪草堂與祝大參顥馮憲副定劉僉憲珏暨都憲公雍聨句徐有貞葑溪古無名得名自兹始作堂惟一韓有貞覽景具諸美山川何蔚然靈秀寔鍾此顥東迎滄海濵西接太湖涘定獅峯南面蹲虎阜北忩峙珏波光動園林野色到城市顥池深魚影晦林密鳥聲喜雍天淵飛躍間上下契心理有貞徃古與來今左圖而右史定豈惟賢主樂亦有嘉賓止珏廣席羅珍羞飛觴戰壺矢雍魚芼松江鱸果薦華陽李有貞獻酬心孔歡歌咏情未已嗟予苦衰遲避俗隱桑梓羣公忽枉駕感激欲輕死况辱聨佳章足與風雅比鬬雞不須言石鼎何足齒行當勒貞珉傳播千萬禩雍韓都憲宅在葑門内公既貴歸吳治宅而居溪流環繞宅東有園作堂于其上曰葑溪草堂三辰堂記吳寛維皇明以經術取士士之明於經者或専於邑若莆田之書常熟之詩安福之春秋餘姚之禮記皆著稱天下者易則吾蘓而已蘓之易始於顧順中先生一時游其門者出則取科第以其經轉相傳授嵗久師弟子益衆延及他郡莫非出顧氏人方先生爲漢楊何云先生諱巽順中其字嘗登永樂甲辰進士第後十二年爲正統丙辰而其子今贑州守睢字德明者繼之又三十六年爲成化壬辰而其孫今工部郎中餘慶字崇善者復繼之世三榮顯嵗適皆在辰人以爲異贑州公乃以三辰名其堂而工部以予有鄉黨之好且同年也請爲之記予因嘆曰顧氏則異矣而其盛豈獨以益於蘓人哉粤自國初詔行科舉每三歳一行其後或不行迨永樂甲申至於今日行之皆如制殆三十科于此可謂久且數矣然方州所擢其少者科止一二人若陋邦僻邑至未嘗有薦於鄉之士文教之行經術之明其難也如此而顧氏上下五十年前後三世皆有其人此其盛豈獨益於蘓人哉夫今固有兄弟同升者然其盛止於一時不若父子相繼之逺况又繼之以孫者乎此豈復偶然也哉蓋事之來也有自德之發也有時先生之學固良然聞其先有隱德始於其身發之而又不及授政以沒後僅以贑州公嘗任御史獲贈如其官宜其復發之後人也惟公昔有聲憲臺及出守大郡惠政在人今工部以明敏勤慎爲朝廷任用方奉詔行水淮濟間且有利益於國後世之登第者不必以辰而異也將有䝉其澤繼之而益盛者乎三辰堂乃贑州守顧睢爲之爲其父巽永樂甲辰科本身丙辰科其子餘慶壬辰科故也礪庵記世之夸者待其身甚美自以爲人不可及卒之終身無一德名世以及乎人者惟賢者不然徃徃以樸陋頑劣自處蓋非甘爲庸人之伍其心誠不滿假惟見人之美巳之惡欿然如無能之人此德所以日進而人所以賢也歟礪爲悍石則真樸陋頑劣之物昔之好石者不以爲貴君子獨取之以自况焉毛君貞甫自爲諸生已有賢名及登甲科裒然進士之列人尤材之顧其意未嘗一日足也乃以礪名其菴居而以爲號及是拜給事中將之南京來請予記夫石以堅爲材彼之奇巧秀潤者非不可愛然多不適於用礪固悍石其質雖麄而性則堅惟其麄且堅也物之欲成器者反以資之詩所謂他山之石可以攻玉是也玉物之至美者猶資於礪非礪則不能以成器礪之爲用亦切矣是可與他物之不材者並論邪然則貞甫之去而入官也豈惟使朋友寮寀資其德而已朝廷以機務見屬其責任不小將上有益於君下有利於世又如書所謂茗金用汝作礪者乎盖以礪自處貞甫不以材美爲夸若可缺者孰知人方以材美資之有不可缺者乎吾於貞甫斯文之契至厚者敢以是告之礪菴在閶門下塘都御史毛珵所居也拙政園賦王寵侍御王公敬止世吳人也寓籍于燕弱冠登進士官侍御史出按遼陽以不阿法抗中貴謫上杭丞再丞崕之都許驛徙知永嘉判髙州竟致官歸吳焉公䟽朗峻潔博學能文辭論事踔發一不當當路意三投炎海筆儼然柱下有古直臣風當孝宗朝峩冠簮折翼而下可畏哉戒途之難也公則茫然若遺逍遥以嬉乃築室闔閭之城背廨市面水竹軒蕪糞莽取勝自然頗愛潘安仁閒居之篇附于拙者之政寵遂賦之以歌厥事焉繄蹇蹇之王臣秉靖恭於爾位企遐風於徃哲干青雲而髙議際明時以自奮謂諤諤其無忌冠切雲而直指惟一人之余媚鏌鎁利而鈆刀揮毛嬙都而嫫母恚信人情之翩翻羌受釁其奚自睇天門之遥遥臣得罪而逺去信犬吠而掉尾虎磨牙而蹲踞快一斥之不復薄炎荒而窮馭占巫咸兮則瞢决唐生之猶豫爾乃稅鞅故國徊翔首丘豈宇宙之迢遥何余栖栖而倦遊我䕃有廬我耕有疇彼季子之奚入將褰衣以優游洵伯通之不覊賦五噫而聿遒經山川之故墟眷君子而夷猶撫佳木之蓊翳接吳㑹之長洲羅以園囿言旋于休乃有滄浪之池夢隠之樓臺以遐觀堂則若墅竹栢得真橘柚列樹郁李張梨櫻桃棠棣菡萏荼䕷丹瓜緑芋華實駢羅溝塍錯互於是風妍景熈六合澄朗時鳥變聲鮮雲如掌曳山簡之接䍦披王恭之鶴氅良儔言集恣意偃仰修山隂之故事和蘓門之遺響朱果在摘頳鱗摇網醽醁載浮圖書𢎞敞信巧拙之何居澹𤣥心於天壤眄鴻飛之冥冥知下上之泱漭彼爰居之逍遥奚鐘鼓之爲響吸元化以潛神𠻳瑶津而獨徃永寤歌於聖朝錫萬年之鳩杖寄王侍御敬止宫袍錯落紫麒麟曾是先皇侍從臣海外文章傳諫草天南魑魅識星辰荆蠻流寓真吾土燕趙悲歌見古人渌水名園春更好挈壺花下伴垂綸王侍御園林四首杜韋天尺五歸卧海東偏玉麈開蓮社金貂貰酒錢園居憑水竹林觀俯山川竟日雲霞遶冥心入太𤣥其二共有王猷好同酣修竹林山光雲几淨水色畫堂侵斷續冬花吐玲瓏好鳥吟輞川如有待那得戀朝簪其三即事罕人力林居常晏然天青雲自媚沙白鳥相鮮徙倚隨忘返風光各可憐洞中淹日月人世玩推遷其四薄暮臨青閣中流蕩畫橋人烟紛漠漠天闕敞寥寥日月東西觀亭臺上下摇林深見紅燭側徑去迢遥拙政園在臨頓橋東王侍御顯臣所居小丹丘記陳基予五世祖由永樂徙台之臨海距城百里而逺臨海之山大率自天台支分綿綿延延若萬馬東奔而飲于海余家實在焉余少孤不逮事先君子甫兒時即有四方之役道過天台不復能記憶少長閲天下圖經所載始知天台爲名山而余家去山之逺近了不能遥度也豈惟山哉宗族婣黨親䟽穉耋要亦不能盡悉郷人有自東而西游者與之接音聲相勞苦乃或稍知其䟽戚逺近否則不相知者十七八余少以貧賤役四方久居于吳婚娶於吳育子女於吳衣帛食稻于吳母歿𦵏于吳之壤僕妾厮養皆吳人盡室皆吳語而余獨操越音乎其間余所處亦豈得已乎哉羇旅四方食飲服御與吳人異者或鮮矣四方之人遂皆以吳人目之而余老且仕不出吳境吾自視亦吳人而巳矣今年春余於所居西偏治廢圃可半畝即其中陋屋三數椽稍治葺之因扁曰小丹丘昔孫興公賦天台有曰仍羽人於丹丘後之人遂以丹丘爲天台之别稱余今扁之盖猶有昔人不忘土之意乎余生于台台之戚婣少長不必親也余長於四方而吳之家室子女不必䟽也而治圃獨何以丹丘名哉且余五世祖家臨海而五世之上不必知也余今居吳而後於余者亦不必其知也凡人五世而親盡親盡則塗人而已自余以徃未能爲塗人則或猶用知者故余於圃焉發之余於圃不遑締構之事屋上棟下宇皆仍舊稍加塗塈者余所能也江湖好事者或持梧桐美竹橘柚芭蕉薝蔔萱草蕙蘭之屬來則雜藝於圃客自淮海遺以兩鶴甚潔白可玩同門友起居郎金華戴叔能善爲古文詞余求爲之記而又自著云云者恐人不知余非吳人而後之人不知吾爲台之人故詞繁而不暇畧云小丹丘天台陳基敬初所居基初仕僞周爲内史得小圃於天心里以天台爲丹丘因以名之金華戴良記聽雪齋記陳基顧君仲瑛飾藏修之室於所居小東山之左京兆杜徴君用隸古題其顔曰聽雪齋閒徴記於予予惟天地之氣舒而爲陽慘而爲隂潤而爲雨露凝而爲霜雪而其所以舒所以慘而凝且潤焉亦何與於人而夫人之情見雨露之濡則神夷覩霜雪之嚴則神肅必此有爲之真宰於其間者矣且歳聿云暮雨雪交集君子於此冝感時序之代謝慨物候之變遷退而居重幃襲兼裘徴纎歌選妙舞厲金石之響諧絲竹之音以樂其樂今也則不然斂容以處其獨潛聪以察其微超超然若逃乎虚空薄冨貴而樂枯槁者夫豈所謂瀌瀌奕奕䬠䬠脈脈颺霙而屑玉縁甍而入隙者果足以悅其耳而懌其心乎盖歳功既成嘉瑞時應出無羇旅䟦渉之役入有琴書咏歌之娛而又仰足以致其養俯足以盡其育盖裕於已者不役於物足於内者無待於外於是施施焉衎衎焉與葛天氏之民並游於熈洽之世嗚呼居太平之時聽豐年之雪其得於天者亦厚矣冝其不以人之所樂者以爲樂而以己之所適者以自適然則非仲瑛亦何足以與於此哉雖然吾聞井鼃不可語海夏蟲不可語氷盖泊於虚者猶篤於時也今仲瑛處裕而不嗇居盈而不矜持虚以守實主靜以制動盖庶幾於不溺此不泥彼而能與物推移者故予樂爲之道也是爲記聽雪齋崑山顧仲瑛所居聽雪齋記西夏烏蜜公寓第在吳門天宫里其東偏有屋六楹樸而不陋公即南榮爲小齋西爲壁北爲戸䟽其東南以楮承之中無長物左右琴書晏如也歳方冬公端居肅容虚心無爲與造物者游俄聞中庭桂樹間索索然有聲起而視之則積雪在地皜然矣公因援琴鼓之客有候公於門者公揖使坐且謂之曰客亦知好此乎客曰僕東海之鄙人也何足以知之雖然公所鼓白雪之曲也僕不敏請爲公和之客逡巡就席因歌曰白雪兮交下美人兮猶處歳晏兮何所娛撫陽春兮容與陽春兮遲遲白雪兮飛飛彼美人兮勞我思巾余車兮徃從之端余居兮正余襟若有聞兮青桂林桂樹兮後凋撫白雪兮逍遥時至正十四年十二月也此聽雪齋未知何處茂恩堂記馬廷用古者意之所向則喜隨之而因以名其堂示不忘也王晉公三槐意不在槐而在其後人以爲必有爲三公者其後言果騐韓魏公晝錦意不在錦而直述其仕宦始終之美在當時莫之有或先者矣至于王晉卿寳繪聚古今圖畫以供清玩其意趣識者有取焉夫槐取義於木錦取義於服而繪畫亦不過技藝之末耳皆足以寄吾意而爲堂以紀之况君恩之大乎誥封奉直大夫晉州知州庸菴沈公世爲蘓州右族公自少聰敏喜渉書史開巻輒能了其大意與人交退然言不能出口及臨事則可否立定人有過必面斥之畧不少貸其人改即歡合如初郷人以是多重之有弗平徃質焉有不之有司而之公者所居距葑門東二十里許蛟龍浦上有田若干畞宅一區環以松竹迥然爲隱君子之廬公至是盖八十有二矣乃嗣材美以進士補晉州知州轉刑部員外郎郎中尋改陞順慶太守雲南大參近擢山西右方伯所至皆有政聲其孫知剛知柔俱太學生奉方伯公意謹摘取誥中語服此茂恩益緜夀祉之句扁其堂曰茂恩以悦庸菴將借此爲佚老娱情之具復屬予題諸壁初方伯出守吾順慶幾九年政平訟理父老相見至今爭相問訊以爲美談予所熟知而稔聞者乆矣况二孫於門下有徃還之雅其曷辭夫君推恩以禮乎臣故有錫予之典臣竭忠以事乎君故有佩服之誠古者君賜車馬服以拜賜衣服服以拜賜他如口宣手敕莫不留藏于其家子孫相傳以爲至寳皆所以榮君之賜而彰君之德也且士君子出當世用享有禄秩得貤封於父母峩冠博帶錦軸牙籖爲鄉里宗族之光皆上賜也而可忘乎哉沈氏可謂善名其堂者矣庸菴年躋上壽步履清健仰窺天語所謂益緜壽祉者顧不足徴邪而賢子若孫羣然滿前載觀扁掲於承顔稱觴之際問安領誨之餘則當思吾親之所以累仁積德貽厥孫謀者何如而吾身之所以顯親揚名者盖有所在未必不爲之惕然而恐勃然而興也况飲食寤寐皆在吾君則又當思所以圖惟報稱朝夕匪懈之意自有不容己者矣君子以沈氏一舉而衆善集焉如此予雖未及登沈氏之堂拜庸菴於席末詩云樂只君子遐不黄耉尚請爲我賦之重爲吾庸菴頌也於是乎書正德四年歳在乙巳秋七月吉賜進士第正議大夫南京禮部右侍郎前翰林侍讀學士經筵講讀官纂修㑹典西充馬廷用撰茂恩堂長洲沈林都憲所居在蛟龍浦上即今鑊底潭也吳都文粹續集巻十八
