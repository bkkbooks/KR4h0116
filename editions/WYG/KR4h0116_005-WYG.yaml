body:
  text: 吳都文粹續集巻五明錢穀撰學校長洲縣學記俞掞古者比閭族黨莫不有學今環百里之地而為縣詎可缺與按吳郡自唐置長洲縣距今三百餘年而學不建豈簿書期㑹未遑議俎豆之事與景定壬戌詔縣増主學用丕儒敎宋君楚材實在此選至之日嘆曰官以主學名居無廬士無廩師倚席不講惕然以懼鄉寓劉公震孫列其狀于郡即近縣廢寺為肄習之所士不問逺近裹糧而來旬有講月有試考德問業于此宋君又懼無以繼乃裒俸餘與束脩之入請于郡因寺建學以惠悠久太守陳公均親來相度指寺前一塔矗如文筆曰殆天相與于是徙佛像于他所宋君與諸生經之營之由禮殿至學門煥然一新齋舍庖湢具備起于乙丑春成于丙寅夏民有爭田不決前守撥充養士且上于朝㑹召入季公鏞來守是邦悉令歸之而士有所養宋君之志亦少舒究矣屬予記之辭不敏請益力夫教亦多術矣孟子吃𦂳誨人處曰學問之道無他求其放心而已矣盖人之所以靈于萬物者以其有是心焉耳是心雖依血氣而生而一㸃光眀具衆理應萬事未有觸之而不動感之而不應孩提之童莫不知愛其親及其長也莫不知敬其兄是之謂本心物交物引之而去此心放矣從耳之欲而好淫哇從目之欲而悦紛華從口之欲而飫肥甘鼻之于臭四肢之于安佚亦莫不然若放而不求流而忘反放僻邪侈無所不至而一㸃光眀未嘗冺滅反而求之心在我矣是故出入無時莫知其鄉一息而遊堯舜之天一息而淪盜跖之淵聖狂之分求不求耳然此心之放亦豈俟于形者哉有所忿懥有所恐懼有所好樂憂患而不得其正皆謂之放人能於日用之間每事省察有不善未嘗不知知之未嘗復行顔何人哉希之即是嗚呼孟子之所謂求放心者豈如釋氏死灰槁木付此心于無所用哉自吾惻隱而推謂之仁自吾羞惡而推謂之義自吾辭讓是非而推禮與智無不盡矣舉斯加彼可以參天地賛化育此君子所以大過人者善推其所為而已矣矧今撤緇廬而敞儒宫立師道而新士習同堂合席相與講明當何如哉始而省察以存此心之全體終而充廣以達此心之大用庶乎可以為士矣是又宋君之所深望故併書之咸淳二年四月朔朝請郎權兩浙西路提㸃刑獄公事節制澉浦金山常州江隂水軍同提領鎮江府轉􅀈倉借緋廣信俞掞記禮堂記吳必大禮立乎天地之間而人參焉人之所以異于禽獸者以其有禮也飽食煖衣逸居而無教則近於禽獸人而無禮不亦禽獸之心乎夫唯有禽獸之心也弱之肉强之食爭端起乖氣興而禍亂作矣故曰壊國喪家亡人必先去其禮聖人作因天秩以教為之宮室堂奥之居為之簠簋爼豆之數為之殽胾食􅃵膾炙醯醬葱渫酒漿脯脩之用而恭敬辭遜以出之所以因情立文辨分定志而固人之肌膚之㑹筋骸之束也所以達天理順人道之大端也故惟聖人能知人之不能以無欲也人之欲莫大于飲食也故惟飲食有禮聖人安之君子行之衆人勉焉于是簞食豆羮由是則生而有不屑者矣肉乾人飢日晏不得食而有所不敢者矣吾嘗評斯人可使餓死于首陽立乾于河上而不可使犯非禮取非義夫安得不有益于人之國家長洲故無學撤緇廬以為之學之究也士負笈造焉勸趨成俗則宋君楚材功多君既表其宫而新之燕食有堂命之曰禮堂問故曰吾于禮食有取也君之用心忠矣吾聞古人之在幼也能食教以右手能言教以唯俞教以男女之别長幼之序十年出就外傅乃所謂學也家有塾黨有庠術有序學則古今共之曲禮一書其識飲食之禮備矣嘗試言其略曰共食不飽共飯不澤手夫飽非遜道也不澤手為其近于穢也曰流歠曰固獲曰揚飯曰嚃羮曰嘬炙欲速也求多也凡可以得食者無不力也厚已而薄人也有聲而無容也終食之間須㬰之離而賢不肖之趨胷中莫掩焉是可以觀人矣是故聖人致詳于飲食之際也其㫖深諸生來前吾語子禮其承而師孫而友謹而飢渴之害羣居終日唯善是務觴酒豆肉而成徳寓焉幼之學壯而行禮不可勝用矣昔明道程子至天寧値僧方飯見其趨進揖遜之盛而有三代威儀盡在是矣之嘆禮失而求諸野盛服佩衿不猶愈于野歟必不失是而後人其人廬其居足以闗浮圖氏之口以無墜宋君之善諸生皆曰謹受教宋咸淳二年九月庚寅朔奉議郎添差通判平江軍府兼管内勸農事吳必大記景文堂記趙與鑒吳郡立學自范文正公始附城兩縣其有學也亦宜然自景祐以來二百餘年吳邑有而長洲缺焉按吳郡志縣南一百步有孔子廟邑令王公禹偁嘗為文屬郡侯狀元柴成務為之記今廟與碑不可復考意者强室兼并梵宮侵漁未有能經理之者景定四年制詔天下縣設主學而宋君楚材來主長洲事宋君蜀之眉山人經明行修于易尤䆳避難來吳𨽻職和靖書院嘗為尹肅公請諡趨向端的人皆賢之恕齋洪公勲與法從諸公共薦于朝俾兼書院堂長以其未立學也巳而鄉大夫列詞于郡趣開試乃即近縣廢院為講習之所師友裹糧月試旬課戸履羣集于是宋君就請以廢院為學捐俸餘與束脩之入葺而新之僉判方君山京雅相推敬㑹邑有爭没官田為擬充學廩太守陳公均聞而是之未踰年而學有緒嚴像設崇講座黌舎翼如衿佩襜如始無負天朝建學立師之意乃揭直舎之堂曰景文丏文于守守屬與鑒為之記然則宋君之意其為范希文之是景乎與鑒不文何足以知之竊惟文正公宏勲鉅節掀揭宇宙文章特其餘事方其上宰相書言朝政得失民間利病凡萬餘言文正公曽見偉之及考其平生所為無出是書而尤以興孝為先務慶厯中開天章閣召問輔臣為治之要詔天下立學取士先徳行不專文詞皆公所建請然則文正之所謂文豈特摛章演義云乎哉吳為文正之鄉吳學乃文正所立立學又文正所請今長洲昉有學不于文正乎景其誰景邪凡百君子入斯學登斯堂仰前修之超卓思始創之艱難盍知所以自立云咸淳改元中元日朝奉郎添差通判平江軍府兼管内勸農事趙與鑒記友徳堂記方山京吳附邑獨長洲有縣無學寄廩郡庠養士景定壬戌冬公朝詔各縣置主學宋君楚材始尸其任初至栖栖無依貴寓列其事于郡即廢院講肄宋君繼請于漕臺及郡就改院為學月有試時有習衿佩詵詵文風大振來游兹學者阮公登炳乙丑冠南省以亮隂免廷對賜第登龍首先是淳熈辛丑黄公由孝廟對䇿為天下第一二公俱長洲人也宋君闢一室繪黄阮二大魁之像于上扁其堂曰友徳屬山京紀其成山京辭不克當曰君亦有恵于兹學也奚辭向君賛畫吳幕有廢寺田四百餘畆胡居敬主西湖書院與有力者爭欲得之二劵俱不直君執筆擬曰莫若以長洲之田養長洲之士遂歸于學楚材併復還郡庠之寄廩今士養于斯君亦與有力焉山京諾曰此養也非教也教以徳為先徳以友為輔獨昌黎謂詡詡笑語一旦下石焉者此可為友道一吁也故曰徳有㓙有吉正直忠良和平寛厚恭敬篤實皆吉徳也邪佞剛愎﨑嶮鍥薄慢易輕浮皆凶徳也納交者宜謹擇于斯則切磋琢磨相觀而善麗澤之益滋多矣否則墜韓子之譏雖然以吾有其徳而後能友人之徳善修徳者深造自得居安資深心術之涵養履踐之純固立必有方行無越思友一鄉之士為未足又友一國天下之士直至于尚論古之人取友愈大徳與俱大道義儔匹乎聖賢事業焜耀乎古今豈曰無所自乎宋君蜀士老成有學問觀其興學可以知其徳矣時咸淳丙寅長至前三日承事郎差僉書建康軍節度判官聴公事方山京記咸淳改立學門記錢説友長洲縣舊無學附府學以肄士景定中有㫖剏主學員于是邑之士請諸臺郡即縣西廢寺為學綿蕝集事而宫牆門未正南向之位僉謂缺典咸淳八年春邑之士有請于憲臺今提學損軒洪公亟俞之俾闢寺地以正學門輿望所屬不日而就所以為學之宫者内外于是乎備未幾有譁髠越訴于省部公請而寘之刑事竟帖服諸生銜恩無斁咸願刋石以夀厥傳說友惟夫子之道千萬世一日南門之設制度焉爾于道無増然今之世浮圖之宇徧天下而素王之宫郡縣僅置其一焉而扶植之不力則是有愧于思樂之頌矣公一舉而斥異端興吾道厥功茂焉不惟兹門之正而已矣諸生出入是門藏修游息涵泳公恩且與斯學相為悠久又不惟兹石之刋而巳也説友為文學掾于斯邑樂諸生之請得遂而吾道之振起也故叙其事著于下方以告夫來者使知公徳之無窮云主學錢説友記長洲縣學記陳旅郡邑必設學以教其人而治之徒制民以法而不納民于道非善國也唐武后時以吳縣地大治有所不及始割縣北境置長洲縣而未嘗建學是時豈知教之為足尚哉宋世主學事者常假並縣浮圖氏之室以為學則亦未有專所矣皇元既一六合乃興起學校以崇化基天下莫不向風而當時邑令以浮圖氏之室不可久假遂即長洲驛舎為孔子廟大徳六年縣徙麗郡治眀年移驛材構縣治故址庳隘簡陋師弟子登降周旋相盪摩又無所休息不足副國家右文之盛心郡人陸徳原顧而嘆曰長洲為吳鉅邑自唐至今六百餘載而廟學若此吾雖非其民而與其民同郡况吾學孔子之道者也道有不同者乎幸而席先世貿産足以供公上之賦而具衣食于吾私矣于此而用其贏不亦可乎縣長官雲通公聞而喜曰是能紓吾責者益以禮勸成之于是筮吉日除故縣治地築長垣周之前起禮殿闢廣庭穹門翼以䆳廡後為兩齋為講堂為庖庾凡所宜有者以次皆為之材必良工必善規制嚴壯而攻作堅縝浙右邑校盖未有能勝之者又屬名工凝土為先聖四侑十哲之像而繪羣賢于從祀之位道徳之光宛其在此至元再元之三年三月經始明年十月告成觀者咨嗟謂世之人率罄其所有以為老佛氏之宫今亦有為是者乎徳原又以為學雖美而歲入不足以養士則徒為是虚器也乃又以田若干畝為學田以實之五年秋旅以國史之命如京師道出吳門邑之人士來請記辭弗獲乃與之言曰古者黨庠術序與二十五家之塾皆所以教其人也今長洲之民遠處郡郭外而學設於此無亦不相及乎抑聞之士者民之秀也秀民雖生窮鄉不能自局于耳目所接之近故必遊通都名城以充廣其所學而姑蘇為郡當東南大道之交而名士大夫之所集也邑人之來此者出而有見聞之富退而講道藝于其學學成而歸則以美徳著于其鄉必有觀感而企之者矣一鄉得一士猶足善俗况多士哉子皆邑之秀民也能益美其身以歸表于其人庶幾建學者之意與詩云攸介攸止烝我髦士吾將見長洲之士烝烝然起于田野之間矣是為記徳原字靜逺篤慎闓敏蘊抱美器而退然不自表暴今為徽州路儒學教授云應奉翰林文字從仕郎同知制誥兼國史院編修官陳旅記長洲縣學記金玫長洲蘇之負郭邑也自唐武后始割吳縣之北境為邑而未有學嘗假浮圖氏之室以居焉及元即長洲驛舎建孔子廟甚隘弗稱後至元三年縣長雲通擴充之廟學始備越三十八年歸于我朝閒亦嘗葺之而新者復敝固其所也洪武六年知縣京口張翔躬率僚佐捐俸面諭羣士輸材木之朽者易壁之漫者圬由内暨外靡不用工前大成殿後明倫堂及中門左右廡傾者支缺者補敝壊已極不可支補則撤其舊而新之齋後増置罏亭各一所又剏公廨三間及學門于廟之右泮池架梁圃構亭伍射置各得其所而牆垣之周巋然壯麗重繪兩廡七十二子諸儒像祀延陵季子以下先賢凡七人興學有祀以示有功于學者必報于是長洲之學既完且美教諭周敏書來徴記余謂官之修學職分所當而能加意勤力若是盖可尚已至是士之為學其當加意勤力甚于官之修學可也茍官修其屋室而士不修其行業則游居于學者將何為哉士之為學雖不止乎是然乗是而勉勉勿怠異日學術大振端自今日學舎一新始俾見聞者莫不敬慕不其偉歟此亦邑之職治教者之所望也蘇州府長洲縣重建儒學記夏時正學在郡城之艮隅創于前元至正中乃成化壬辰五月巡按監察御史古趙鄭君銘提學監察御史浮梁戴君珊行部至兹㑹郡守鄱陽邱侯霽始至展謁廟行學禮顧瞻庭宇湫隘弗稱嵗久將壓不治咸曰是我輩責也將撤而新之侯任其事持以告巡撫右副都御史古汴畢公亨因出公帑羨餘金為相邑令余金視職為親恭勤夙夜主簿劉恩委命之嚴守敦厥役貲裕出公材貞且良百役具興羣工和㑹始工于是年八月訖工于明年五月左廟右學式如垣度王屋四柱兩序拱向棨㦸門列靈星外闢廟之規也講肄有堂合食有所庖廩對峙燕私區别學之制也輪奐翬翼丹青黝堊稱所宜有罔或不備落成之日鄭君率屬長貳師生釋菜禮容恪恭氣象彌新黄白之叟衣冠之彦環望咨嗟知所感奮于是教諭陳裕與諸講下欣慶厥美謂宜有述乃具興作請丘侯記之侯惟不伐是崇遜出為誼能示不能問道盲者手書累幅敦勸生員何天衢王泰遠屬時正執筆自揆舊殖老益繁蕪敢請固辭二生曰此太守之意亦泰等師生意也可無辭乃作而言曰道原于天而委重于聖人聖人身備斯道而繼天立極君焉而堯舜禹湯文武斯道行于天下臣焉有皋契伊傅周召斯道行于其君運際亨嘉治隆熈洽不可尚矣吾夫子生于周末適丁衰否道可堯舜禹湯文武而天不君之徳可皋契伊傅周召而君不臣之然吾夫子之心未嘗一日忘天下也聘厯諸國轍環天下卒老而歸繫定刪述傳諸弟子以詔方來天之道以明地之理以察人之極以立兩儀奠位萬物化成以功云賢于堯舜恩云同乎罔極學以宗之萬世無違廟以祀之天下靡間惟蕩蕩巍巍固不以廟學而加隆汚然而由學尊廟恒兆孚顒之化因廟表學式著毓才之重化理攸繫豈不大哉因計兹學多厯年所衣繡分符幾何人也閲歲月之如流樂因循而廢事果何心哉今諸君子于視政之初志惟本始式克從事協心一徳不期月而有成固知風化急所先務其重道興賢端有徵矣維兹髦士有聖賢為之依歸有師友為之講習有餼有居得以優游厭飫于詩書禮樂之域者可不知所自勸而自勉哉我國家自列聖相承道徳齊禮動必吾夫子之道是凖言必吾夫子遺經是稽異端他道不得雜之亦既邁越前代以還虞周雍煕泰和之盛矣其所以建千萬年無疆不拔之丕基而有以資夫股肱耳目左右後先者正有望于後賢也維兹髦士幸際昌期窮經致用惟患無之弗患有之而弗庸惟患不能行知而不能行于窮經也奚為易曰忠信所以進徳也修辭立其誠所以居業也見辭之必以其實也語曰志于道據于徳依于仁游于藝知藝之當後于寔踐也無徒富口耳美文華而亡實行惟孝弟忠信禮義亷恥之敦以無負國家作養之盛心無負諸君子重道興賢之至意維藩維翰為柱為石庻幾皋契諸臣事業堯舜君民尚在諸髦士之自勉也若夫諸駿奔執事姓名工費材具數目則并載之其隂長洲縣初未有學附于府學名曰麗澤齋宋景定三年主學宋楚材率邑人請于守陳均即廣化寺藏室改焉在今府城東北講堂曰禮堂四齋曰富文貴徳廣業博學又建景文堂八年提刑洪起畏拓地闢門南面後毁元至元三年縣長雲通俾教諭顧元龍耆儒邊景元勸前徽州路教授郡人陸徳原剏建之我國朝洪武七年知縣宋敏文張翔修葺闢學門于廟之右故有孔子燕居像又有先賢祠俱廢成化九年邱守霽隘之乃拓地東南改建焉嘉靖中教諭蕭文佐議以此地湫隘白于巡按御史舒公汀郡守王公廷謀廢福寧寺為之今制廟左學右門皆南向前為靈星門次㦸門中為大成殿夾以兩廡殿後有啟聖祠六經閣閣後有土阜建亭其上曰道山學前有門次儀門中為明倫堂有兩齋曰進徳修業庭有碑亭右有射圃剏橋跨玉帶河其隂有鄉賢祠後土山建御製敬一亭其上其陽有名宦祠嘉樹館小淇園河之東為雲川書院雲川乃舒公號也西為宰牲所教諭訓𨗳衙舎分列左右學之外有昇龍橋面陽樹綽楔曰萬代宗師東為玉帶橋有坊曰㑹元西為折桂橋有坊曰狀元規模爽塏亞于府學尚書朱希周侍郎徐縉俱有記崑山縣重修學記范成象皇朝在祖宗時郡國得置學宮弟子員選賢以教者舉天下纔五十有三所而蘓居其一焉崑山寔為蘓之邑其承休尚矣縣有學在西門之内雍熈中徽宗皇帝所書大成寶章雲漢昭回扁榜峩然也然並海之俗易趨利業儒者寡異時以學入仕者越數十年時一慰寂寥耳齊魯之變不同風土之宜異也粤自化龍南渡乾旋坤轉萬靈駿奔海若波立蕩壅決塞百川順理由是此邦潮汐流通溝澮交㑹學之向背二水殆有濉涣之美焉自兹文物之興勃然士爭以儒學自奮接屋連牆絃誦如市隨計公車束書橋門率數倍他邑奉常賜第連大比不乏人近嵗尤輩出嵗時閭里盍簪至環席皆前進士昔所無有也以篤近漸媺力半而功倍也學更數政弗問弗遑日圯月摧風雨弗支乾道改元河陽李侯為邦之二年也蒐慝剔弊無廢不興疏源𨗳利專務以惠愛恤隱雖遇大嗇其民弗疵邑且治喟然謂同列曰百里古子男之國也命之教政以是出所以助王化使民向方者豈屑屑吏能宜稱哉况吾屬奉制書此道固先勸相矣如之何弗敬㑹有浮屠氏以貨殖敗其所自豐者非法官籍之貲以緡績田以頃計侯乃請郡願以貲治廢田為供太守吏部沈公方以儒雅潤色為治嘉侯之意亟言上而從之侯躬揆度鳩工指授斧斤圬墁趨事紛舉經營于良月之初朔一再告而閣宇崇成門闕沈如廊廡矗如殿陛有序飛甍翼如横經肄業有堂有舎像設儼列器陳合儀凡所尊崇規模具備乃㑹邑縉紳逢掖釋菜于先聖先師禮成弗愆萬目交聳猗歟盛哉斯文之壯觀也成象依仁里居獲與崇觀侯以記嵗月請于不腆之文既辭弗獲竊謂古者四民一耕而三食之工商勞食焉而無愧食功也士獨無為食之不惟無愧又加敬焉豈不有大功乎孟子曰無君子莫治野人無野人莫養君子俾三人者共作于其食易易繄君子為之本士之功顧不大矣哉亦有非古之民而食人之食其人已病矣又從而漁獵之如木之有蠧枝葉未害本必先撥為治者常謹視而剔去之今李侯剔其蠧而培其本是真知所以為治者矣本固矣則英華之發又將増是邑文物之光不止誇衣冠之盛于疇昔而巳矣宜有魁壘豪傑之士出于其前聞人一二鉅公以功名徳業焜燿宇宙者今而後或見之毋怠其所自邑人皆曰昔子產不毁鄉校三年人猶誦之今李侯之惠吾邦也如是吾之誦之奚俟三年李侯聞之以為不然一日晨入揖諸生而進之曰昔無廬今大厥居昔無以為養今有儲願諸君朝于斯夕于斯議于斯誦于斯所以居爾業而謀爾躬也議于斯此余之所樂聞也誦于斯以俟後之來者君子以李侯為知言云故余喜而併書之李侯名結字次山左朝奉郎提舉荆湖南路常平茶鹽公事呉郡范成象撰重修縣學記莫子純壯哉崑山之縣也樛結峻絶白石如玉沃野墳腴秔稻油油控江帶湖與海波通山川孕靈人物魁殊則所謂玉人生此山山亦傳此名著于荆國文正公之詠豈徒竦榮于往號抑亦延光于將來也洪惟我朝用儒立國考辟雍泮宮之制京師郡國皆立學飾祠廟以奉先聖闡黌宇以育多士崇稽古之洪道茂長世之善經由是文治勃興炳然與三代同風猶慮湛恩之未廣聲教之未洽也申命縣司更置學麗先聖廟如郡之制景祐四年之詔也嘉猷四塞六合時雍沐浴膏澤漸潤徳教祁祁生徒雍雍儒術而崑三十載濟美焉藻掞天庭延四海而有雋折瓊枝而繼佩固衆芳之所在也日引月長鮮克修事夏誦春絃家自為學先聖之居亦窘風雨朝奉郎知縣事章君萬里之任懼以墜教基授模梓匠夙嚴神棲飾南端之特闈立應門之將將華觀雙建采題相輝乃營新堂乃恢廊廡浚以玉甃繚以崇垣奢未及侈規遵王度是以經始勿亟成之不日昉于慶元五年六月而以八月畢之于顯新宮既閟且康思欲復之而無斁申之而有裕也于是捐供給贏資斧圭租之羨賈易民田幾二頃拓奸民隱占之田溢三頃民之訟田法當没入者復益其二頃畇畇菑町既夷且大俾其儲積供億久而可繼也又為之新館舎之器用潔祭祀之籩豆亦布食之餘財而非重費于公也既壯其室亦豐其儀躬率諸生行釋菜禮告奠于聖靈昭事是肅敬謹威儀示民不佻煌煌乎兹文容之壯觀而王制之巨麗也而後乃知流大宋之徳馨咸在于斯仁風行而四達義方敭而遐騖聲名布濩溢浹邑區菲言厚行陶化染學昭光振耀立事立功効當年之用以對前修之純淑則崖風穴水不特清越餘馨而巳宜伐石以志使其道也不替于後章君以子純常㕘呉門之幕乃列其事來告書之六年三月既朢宣教郎秘書省正字莫子純記崑山州學宮碑楊維楨崑山在唐為望縣學宮在縣治西南一百九十步元祐間縣令杜采之所徙建也國朝以生齒之庶陞州徙治東倉至正丙申海寇毁東倉州復舊治所招還流移民重立宮寺及社稷之壇宓羲神農黄帝之廟至是遂大修孔子廟殿之址拓其舊三之一學禮殿論堂重門廣廡齋廬直舎庫庾庖湢無不畢具又為堂以祀鄉先賢鑿池論堂前以泮制象設先聖先師繪從祀諸賢範祭器理大成樂無不如法寔今費侯為州三年之所成也民之居者知有教士之歸者知有養又侯之仁民禮士一出于誠之所致也役始至正二十年夏四月竣事于明年十二月侯既率文武僚友舎菜告成又命職于校者具書幣状顛末走二百里外請文以志予方悼世變之劇州縣鞠為草棘雖鄒魯地不免况阻江要海與寇争尺寸者哉訖能保障其所如金湯帡幪其居廬校室如安堵之故茍非守將之得其人雄才健政有以濟其民者曷致是耶若侯者是巳傳曰守令者民之師帥也侯非師帥之尤者乎抑聞治暇即過黌舎與為弟子師者辨討名理扶植綱常者切切然恐不及人於乎人之所以為人國之所以為國者綱常也吾所以樂道也叙焉斯治斁焉斯亂世降道㣲而邪説滿天下馴致三綱淪九法斁人類無以别禽獸然理出于天下者未嘗一息而可滅予讀孟子書知先王學校之可美矣其言于戰國之君曰三代之學皆所以明人倫也時方崇功利薄仁義則又告之曰未有仁而遺其親義而後其君者推其效可使制梃以撻秦楚堅甲利兵人心天理之足恃也如此詩曰既作泮宮淮夷攸服又曰在泮獻馘在泮獻功又知古者文武非兩岐也侯于用武之秋不敢斯須忘文教其不以是歟昔魯作泮宮國人有頌竊取其義而繫之以詩云費侯名復初字克明東平壽張人先是立功于鎮江蓋有文武才幹者是役也同知州事海陵梅英寔贊其成事判官齊陽丁復初字克明教授陶植提控案牘陳善都目沈繼祖謝安道也詩曰維呉支邑崑在北東東薄于海捍海作邦陵谷以變井邑以遷人民雞犬往而復還邑有庠序鞠為草莽治必有教復我黌宇展也費侯克長克師文事武事匪曰兩岐在昔受成獻功獻馘我教既成我戰必克化民服敵孰負孰荷侯曰噫嘻豈不在我我部百里我心一家衣冠儼雅籩豆靜嘉天經不斁國紀攸叙如子從父如弟聴傅維崑有石維石有銘銘以著績遹觀厥成重修崑山州學宫記李孝先教民者民從治民者民訟是以學校為重三代之際學校遍天下記稱國有學術有序黨有庠家有塾其大畧可觀矣予嘗考所謂校室之制則塾也即其所以督教之意遂使田廬民氓皆盡躬行孝弟之行其效信美矣及秦并詩書不用學校遂廢至漢孝武時始復興學由漢以下每一改邑學輒隨而弛須久而後復我世祖武皇帝初定天下即使使東祠孔子復延致鴻儒大興禮樂文教之事民占為儒家復其徭役毎詔下首條學校于是聖道章明教化淳美天子坐致太平之功學校不廢也崑山古大縣頃以户滿八萬陞為州後徙治益東僅一舎地舊東倉也既遷有司作新學其制務侈于舊而來者弗察浸久浸弛至正四年春今守王侯世傑來見其蕪陋弗治曰不教民無以為治學廢教將安出矣夫國家隆學校所以樹教本也首捐巳俸俾學掾孫士志興修學宮上者棟宇下者步廡靡不完美又使州之士顧信善夫相地于論堂之北作新堂以為弟子講業問辨之地守以時入學則居于是使論説所授于師者以察其進否又鑿兩池夾室之旁中植蓮花是周子之所愛而為説以喻夫道者也因名堂曰益清是嵗學成而予適至入其境見民有負老持幼望其邑而歌問之而曰前者為政者不我恤故去之日聞新守善養親又多善政是能善民者也故吾還耳余聞其言而嘆之曰斯近于仁矣能使其民親遊于其校士居校者稱侯之美曰仁而不僣徭役節矣勤而不煩田土澤矣亷而不苛盜攘息矣予曰斯寬也能使民遷善予嘗論之夫民易治耳道之仁而仁道之讓而讓設為學校教使皆盡躬修孝弟忠信以行古之制其效亦無不著觀侯之于興學善矣又能躬行使民喻于仁若親父母誠稱國家之明制庶幾知教矣昔魯修泮宮而魯頌作重民彞也予惟竊取其義以教民辭曰句曲之東其縣惟婁地大民夥陞次雄州州既改作民來如屬不教斯悍乃作斯學學誠教首吏闇弗察浸久而弛置若綿蕝守入䖍謁顧瞻怵惕俄而大起棟隆且吉相作新堂使君絃誦更進弟子誠為禮頌守謂弟子力學自躬毋苦徭征咨良友朋父兄圜觀歡喜舞忭挽公之轡願公之念昔我避徭將子車下今絃于宮進豆陳俎池水湜湜菡萏其華錦紳縞帶容色洒如勗哉爾士有敬毋弛作室者誰守世傑氏崑山州重修廟學記上官震欽明聖朝大一統治尊崇儒術命天下建學立廟宇以祠聖賢置師儒以育俊秀厚米廩以養士類于是聖人之道敷被逺近夫道在能明者行之雖或暫有昏翳弗能使其終于不行蓋君臣父子之懿詩書禮樂之教皆天理民彛自然物有其則而心又所同故也呉郡有屬州曰崑山其東一舎而逺曰太倉瀕海通漕商貨湊集民以富庶而舊治過之延祐間奉詔徙治惟時州庠未能隨遷相臺王侯來守是州存舊弗毁更新創建增養士之田禮文學之士彬彬文物于斯盛矣厥後蠧弊蝟生奸宄侵漁經今廿有餘載教官屢缺因循廢弛屏薄士人禮樂弗舉絃誦蔑聞至元丙子六月奉議大夫巴咱爾公以元勛世祿由奉禮事來為監州三年政成需待未至而理民急務益勤適得專于提舉顧廟宇頹圯士類彫落乃率先郡寮首捐巳俸命工度材選吏督工規畫既定百廢具舉改建門垣廣甃庭砌植杏有壇采芹有亭重飾繪像敬録遺士濟濟衿佩來遊來歌嗟乎仲尼之道堯舜禹湯文武之道也在天地間明如日月信如四時確乎其不可易也雖世有升降而道統未嘗不續行之則彛倫攸叙舎之則人心愈危向無斯道維持之則蒸民之極幾不立矣名教之功于是為大觀矣釋老異習不啻霄壤彼則琳宮梵宇所在星列其徒轉相汲引維務興崇而吾儒學廟廢壊人才放失惡乎宜乎雖然世與道未嘗不相須也行之者在乎人而巳方今聖王在位學校育才屢行詔㫖海内之氣清和咸理雖海瀕之邑亦必選賢而撫字之故是邑得公之來崇學校興禮俗養賢材廣聖教可謂徳政兼舉者矣震猥以庸疎備員幕下獲覩盛事故樂公之政有成而為邑之士喜因進諸生告之曰自今至于後日宜亦加格致誠正之心以修其身而成其名庶幾不負賢侯之意毋徒習荒以嬉而貽愚不肖之議諸生唯唯遂畢其説以為之記崑山縣學租記縣有學學有廩教而養之上之加惠于士者厚矣故學校不修則春誦夏絃之習廢廩粟不繼則朝虀暮鹽之嘆興二者常相須而不可闕一也吾鄉之學安于庳陋者垂百年嘉定辛巳知縣巫君以修始撤而新之閎麗雄深十倍疇昔瑞守陳公寺丞嘗欲涉筆登載而弗果然是舉也役鉅而用繁故于學田未暇增益經費之外所餘亡幾何由是食鼓聲沈書燈焰熄朔旦則見大夫凡有職掌之事再拜于庭一揖于堂而退養既不善教安所施若是又十有餘年紹定辛夘户部郎直秘閣鄒公被召相簡知來牧呉郡公淳儒也其為政似陽城其好善似樂克其興起學校似文翁粤自下車未遑他務事闗教養知無不為始于泮宮均逮屬邑捐金置產髙下有差明年秋以二百萬錢俾邑士陳九鼎經理其事得積善等鄉田六十九畆三角十四步嵗租八十九石九斗有竒與故額幾稱晝以禆簞豆之費夜以給膏油之需公之推廣上恩作成士類抑何詳且悉也公之言曰吾之田非不以義得也蓋欲學得有義之租而人得有義之供也公于一政事一念慮之間舉不違乎義義之為用何如哉烏乎一介不取諸人伊尹之義也萬鍾何加于我孟子之義也伊尹孟子出處雖異而所以為義則同士能充此不以窮達得喪亂其所為則亦何往而非義乎此公之盛心士之所當拳拳服膺而勿失者也一日學賓何旦直學陸震持郡符踵門而告曰新租之增為賜多矣是宜刻石以壽其傳盍為我記之嗟夫道古今譽盛徳文士之職也顧衰遲廢學詎能著文獨念丙辰叨末第寔為父兄尚書公榜下士又安敢以不文為辭抑聞之化民成俗學之所由設也理財正辭義之所從出也是故養士而無其財則非所以為學取民而無其制則非所以為義今之所與為共理者惟要途是趨惟捷徑是圖知仕而已于學乎何有逞鞭扑之威急征斂之期知利而已于義乎何有飽鮮醉醲笑與秩終知自奉而已于養士乎何有其間崇儒向道畏清議而恤遊談號稱留意學校者不為無人要亦不過裒科罰之貲括簿録之產僅僅為一州計則巳有徳于屬邑乎何有公則不然寬以愛民而無纎芥之過取也儉以節用而無秋毫之妄費也好清靜而遊觀之弗事也薄滋味而厨傳之弗飾也故能因常富益常產以培養士之基内而一州外而六邑廩無不義之粟學無不養之士峩冠博帶日涵泳于恩波教雨之中公之有功于學校其可淺近論哉雖然飽食用心聖門之所深戒厥既養之矣則教之固不容緩也魯侯戾止在泮飲酒茲不曰養乎載色載笑匪怒伊教兹不曰教乎既飲食之又載教之而使人有士君子之器斯可矣夫豈徒餔啜哉昔昌黎韓愈有言莫為之先雖美而弗彰莫為之後雖盛而不傳今賢侯置有義之租為有義之供以養屬邑之士不能日趨下風奉承色笑則所謂教非賢宰之事歟宰家世三魁以儒術飭吏必能昭明而為之訓𨗳旌秀士而表率藏修遊息金鑄而玉成之美之彰于先者無窮而盛之傳于後者亦無窮矣他日公坐廟堂庇天下之士而其所育士由庠序覲天子之光以行其所學則教養之功作成之效豈直一州六邑而巳哉士乎士乎可不知所以自勉乎若夫名遂身榮志得意滿陳食前方丈而弗念虀鹽之憂棄牆角之短檠而遽忘絃誦之樂是之謂徇利而違義非公之所望于士者也尚相與戒之崑山校官養士之碑袁宗仁國朝崇儒右文自都城洎郡邑皆立學六飛南幸駐蹕武林呉為股肱郡崑山呉屬邑密邇帝都士風殊盛乃考邑陞大縣令宰選闕授受不茍得人遂多有李侯稠章侯萬里皆前政邑大夫擅製錦之譽者也知政化之本能先學校或補修或增廣不遺餘力一時名儒大書深刻鋪張而夸耀之豐碑屹立可攷不誣今君呉侯寔繼諸賢後未下車詣學宮謁先聖先師延見生員周眂旁睇慨然言曰美矣學乎蔚泮宮之制門廡軒陛嚴整像設章服煥耀循左序厯齋舎升講堂閲禮器簠簋尊罍爵坫無一不備此累政所盡心者何更為哉特未知養士之原何如耳合辭對曰學有田田有租以給膳羞不乏也豪民私其利奸胥隱其籍莫肯輸納故時有不給諸生羣萃黌宇朝誦晝習夜焚膏油旬具程課無頃刻暇倘使家居往來道路安得一意于學侯曰唯唯吾將搜括舊租悉奉庖廩侯又曰師嚴然後道尊學有長所以領袖衿佩傳道授業解惑非師而何然均布衣也容有玩易乃請前進士紹興户曹朱起宗臨安簿沈誠為主學為學賓聳其觀聴邊長瀛先進老成談經命題督課具有法度其兼訓𨗳職掌袁宗義沈逢原嚴日明鄉曲所推列職在學俱給月俸以示優異生徒僕僕拜賜始卒若一罔有違闕且是邑之地環數百里户口六萬獄訟錢穀簿書期㑹不無事矣而能委曲規畫教養士類是豈可淺近窺測也耶侯考己三書瓜代有日諸生懐徳惜侯之去且慮侯之美意弗傳也邑之士大夫從而從㬰之欲侈其事丏文于宗仁不獲辭乃正冠肅容濡毫伸楮述其顛末書而刻之石呉侯名㮣字子直義興人今承議郎巳被閒行為中都官其政績備見于當路之所知兹不獲詳記云嘉慶三年嵗在癸亥五月旦文林郎新差充國子監書庫官袁宗仁撰并書崑山州新學記龔璛延祐改元三月平江路崑山州移治于太倉詔天下科舉取士之初年也有司聿新而未有學朔朢馳謁舊學非便是年冬相臺王侯安真來守是州大懼無以作人材而承上意矧兹帶江控海財貨之區漕舟之津既庶且富莫先于教州之士平江路學道書院山長王大年處州路儒學教授杜頥直學陶公甫學賓陶正甫請各視其力相與成之不以煩公家度地治水之北逺去闤闠秀色疎達剏大成殿旁翼兩廡前濶重門像先聖先師繪從祀諸賢又範尊爵罍洗具嚴廟制鳩工僝功費侈矣侯曰止吾豈竭吾力以樹風化哉舊學豈不能偕遷于此顧鄉校不毁因之以嬴諸庶乎其並存也學嘗率鈔以修舊吾以修舊委米廩則以鈔起新學且以紓衆志而廣作成至講堂齋宇直舎儀門庖廩之屬次第完美通為屋五十餘楹置養士田一十頃有竒士民競至膏腴源源而來未巳于是稱為一州之學始于二年四月訖于三年八月教授錫山陸介任職疏状顛末求記璛以固陋弗獲辭謹按呉之初太伯端委以治周禮至于仲雍乃從其俗春秋之世遂為侵奪强暴之國郡縣以來漸號樂土而蒙國家休養之盛雖僻左亦衝要漢史載海陵呉太倉江南亦有其地邪生聚走集當為謹庠序也久矣况于州之既遷刑政號令所自出㣲學則何所本邪夫二帝三王之傳開物成務之道建學立師獨為儒者哉前代失其統明體達用者亦寡見謂迂濶舎此而他求常不足以立治敝而改圖往往復歸諸此蓋君臣父子夫婦長幼朋友之倫仁義禮智之性斯道也所以直道而行也君子小人莫不有學本末先後平寔昭徹彼淺薄近似誠不得而與矣皇上表四書而㑹六經不特九州之内也必使四海之外凡有血氣率由于義理之中明學術正人心建萬世之太平士生斯時抑何幸也昔之士皆曰未有以取之也取之矣士將何以待用乎取其文文浮于行不可也取其材材充其徳可也古之學者為巳成已所以成物也人已之辨善利之分知此則科舉非利祿而設學校又豈飲食課試而巳哉侯由宰邑最入郎省周行直清視邦選侯明治要望于吾黨甚厚噫嘻其亦興于仁讓矣乎工費田畆詳于别珉尚俾來者感于斯云崑山州重修儒學記李祁崑山學校之難為于他郡有三故焉州之舊為縣故其學校視縣為髙下縣既陞州而學校尚仍舊規制卑狹不足以聳觀瞻興士類其故一也又今州治乃舊太倉地地瀕海荒落其後日漸生聚成市蕃漢閩廣雜處混居而土著者十無二三文學之士率自他邦來今之舊𨽻儒籍者數不滿十人盖民非土著則所向無恒心士非土著則所習無恒業其故二也又今之職教者非盡得人經術之未明行藝之未備不能正身檢士而且徇私以縱其奸是以蠧愈深而弊愈甚此學校之通患而崑山為甚其故三也雖然事存乎政政存乎人其轉移作興之機亦存乎為牧守者何如耳至正九年夏史侯來為治既謁廟廷惕然思有以新之先是學贍空于計吏之手嵗所入無幾何入即隨手支付無所儲儲亦無其所侯命先作倉庾為屋者三翼其左右者厰其所為軒者一凡舊時之侵漁窺覬冒占儒額者悉去之節浮費謹出納明號令而是歲之所入者始全所儲者始有餘此侯之所以立其本也乃獲殿西偏地復侵疆三畆有竒築而為牆凡四十丈殿後地舊為汚池旦暮潮汐蕩激幾壊址乃募工興作寔汚池叠石以防河岸而為牆于其上此侯之所以廣其基也基址既固乃建講堂堂之髙二丈三尺其入深五丈以楹數之者八其費出乎州民陳允恭而凡畚築完甃之役則民之願輸力者聴蓋侯之徳惠政教足以動之故其樂于趨事如此若侯自為與資于學廩者則更建大成殿為六楹髙五丈二尺深亦如之為儀門二楹如殿其髙殿不及二丈六尺其入深三丈門東西為堂各四楹堂之東西為齋以居生徒殿之東西為廡以列從事通為屋二十有六先是從祀諸賢並圖于廡翳昧陊剥弗彰至是始改為塑像凡百有五人其門牆亭泮靡不完好始于至正十年之正月而以明年二月成此侯設施之次第也侯之綜理規畫不啻若家事非有公府劇務不得巳者必日一至焉若朝夕程督則授之教官前鄉貢進士蔡君景行景行孜孜展力以相其成于是受業有師執經有徒誦聲洋洋達於閭里觀者易視聞者易聴州人俗尚之變者權輿于此巳而蔡君述其本末以來請為記予前佐領浙江儒學所記學校多矣然因仍者易為力改制者難為功今斯學内外髙深横從巍焉廓焉跨軼前代非力足以任重才足以立功者不及此雖然予嘗徴郡乘所載人物自晉二陸而下多名士然猶曰才華過寔君子所不取如清慎超卓行義不汚者率有其人至近代端拱迄咸淳科第相望為隣邑最其間有以大魁為朝名卿抗疏力詆權要者清節凜凜照映史冊為閭里重州治既遷垂四十年商賈之集生齒之繁財殖之富皆有加于在昔而人才之見于世者猶有愧焉此其故可知矣今侯一舉而新之所以加惠士子者甚至為士子者蓋亦以侯之心為心以聖賢之學為學凡為小學必由乎洒掃應對進退之節必明乎禮樂射御書數之文為大學必由乎格物致知誠意正心以修其身必明乎治國平天下之務以達其用師以是為教弟子以是為學夫如是則徳成于己名揚于時居則善其鄉以成禮讓之風出則廣其施以著行事之寔上以忠于國下以有光于前聞人夫豈非史侯之所望于諸君子者哉史侯為州所增廣創設不可殫記予獨舉其作新學校之功以為州士子勸無負侯之盛心云承務郎前浙江等處儒學提學李祁撰後跋蔡基至正九年夏史侯文彬守崑山始新州校規州制也浙提學李先生祁為之記史侯去而碑未剏立至正十二年春基分教是邦始奠祠而立焉太守楊侯寔董成之烏乎史侯建學功非一日矣而數年間始得刻石庸非政教有所闗係而史侯之徳終不可冺耶明年夏平江路崑山州儒學教授江南蔡基撰重建崑山縣儒學記謝遷崑山縣學在城之西南本宋元以來故址國朝正統景泰間知縣呉昭者嘗改建焉殿堂齋舎咸具厯嵗既久頹弊滋甚有司者未之能新也成化癸夘今副都御史襄城張公淮時以監察御史節按厯兹邑見而嘆曰是而不為將安為乎適縣無長吏即命府判沔陽邵福春陵李智董其事鳩工市材購隣地以拓其基創新易弊增隘就廣辨方正位期年而落成其重門大庭巍然學宮之前者曰大成殿殿之兩旁廡列焉堂有三曰明倫曰育賢曰退省齋有二曰居仁曰由義設門于退省堂之前曰自修築亭于射圃之上曰觀徳而凡鄉賢之祠師生之舎庖廩之次罔不完且美焉蓋為屋以楹計者百三十有九垣以丈計者二百三十至于籩豆簠簋之屬亦考博古圖式參以今制更造二百四十餘器當時未有記其事者頃廵撫都御史四明朱公瑄行郡至崑周覽庠舎而嘆張公之功有不容冺焉無傳者于是知縣張侯鼒適以考績來京遂承朱公之命請予文以記之予惟自古帝王之理天下莫不以求賢為務然不先養士而能得賢者未之有也學校者士之所居以業其業者也語曰百工居肆以成其事士無可居之地而能致力于學者鮮矣又焉得賢才以為國家用有能作興學校如張公者厥功不巳多乎崑山為姑蘓鉅邑素稱文獻賢才輩出代不乏人載諸簡籍班班可考其尤著者理學如李衡志節如范成大勲業如衛涇皆一時之傑士生斯地向方樂學有由然矣矧又有為之作興者哉固宜奮迅激昻十倍于尋常也然學之道奈何曰是不難知也今夫室必有扁勸戒存焉諸生藏修游息朝斯夕斯顧其名而思其義接乎目而警乎心登明倫之堂則思吾之倫果明矣乎入居仁由義之齋則思吾之仁果能居義果能由矣乎踵自修之門則惕然曰身其有未修邪憩觀徳之亭則瞿然曰徳其有未成邪動靜語黙不愧乎退省之私切磋琢磨不負乎育賢之意用是而日勉焉以古之聖賢與鄉之先達自期待雖所至不能盡同要之皆寔學也外此而為學則非吾之所知也巳予既述其事之始末并以是為諸士子勵云題西齋壁勉諸生一絶句林鍾廩食居黌舎差徭不到門若非勤問學何以答皇恩崑山縣學初在縣治之東唐有文宣王廟以兵火廢大厯九年始建學于廟垣之右設博士訓學徒五季廟毁宋雍熈四年因遺址重建元豐四年壊于風潮元祐初知縣杜采遷今縣治西南作廟堂齋廡紹興二十八年知縣程沂闢垣牆外門郡守蔣㻧名堂曰致道隆興間知縣李結葉子强周承勛李裯相繼修之慶元間章萬里又修之改堂曰明倫嘉定間巫以修重建大成殿淳祐初徐聞詩袁歟增建直舎齋凡六曰居仁由義教忠履信致道成徳十二年攝令呉堅建尊道貴徳二祠元元貞初陞為州學延祐元年州移太倉學隨之至正十七年州復舊知州費復初仍建于此國朝洪武二年改為縣額定齋二宣徳元年教諭曹昇修㦸門知縣羅永年修兩廡景泰天順間知縣呉昭等改建大成殿𢎞治五年知縣楊子器建尊經閣今學制左廟右學常熟縣重建學記魏了翁常熟縣學之始圖乘散失僅有梁書至和紀年餘無所考慶元三年縣令孫應時以言游里人也始祠于學新安朱子既為証其事寶慶元年祠遷于學之左而孔子堂闕壊茀不加治今令㑹稽王爚始至大懼無以崇化善俗約縮浮蠧踰年更而正之屬邑士胡洽胡淳庀其役以孔廟居左廟之南為大門北為言游之祠又東北為本朝周子張子二程子朱文公張宣公祠以明倫居右東西為齋廬四以館士為塾二東以儲書凡祭器祭服藏焉西以居言氏之裔通為屋一百有二十楹而為垣以宮之且增田四百畆有竒嵗助公養之費凡言氏之裔官為衣食而延師以教之别為田五百畆以給其費白于郡與部使者為廩以貯之經始于端平二年之冬竣事于明年之秋乃八月丁亥釋奠于新宮屬郡人葉輔之叙其役以求記于了翁竊惟朱子嘗記子游之祠矣如魯論所載二三事皆發揮無餘藐兹孤陋安敢復措一辭然嘗讀禮書而竊有見焉因記廟學之成併附其説夫檀弓不知何人所作而一篇之中獨于子游極其稱譽雖于孔門諸子率多譏評又以言曾並列其是言而非曾者非一幾若偏于抑揚然即其書攷之大扺當典禮訛闕無所考訂之時人之有疑弗決者率以質諸子游故前後典禮所闗者十有四皆以言游一言為可否亦足以見其為時人之耳目雖汰哉叔氏之一語若譏之而寔尊之然則游以習禮列于文學兹其為文為學蓋三代典章之遺頼游以有存者嗚呼信其為豪傑之士矣昔栁宗元謂論語所載弟子必以字惟曾子有子不字遂謂是書出自曾門蓋字與子皆得兼稱如門人之于孔子進而稱子不敢字退而稱仲尼不言子其次亦有既子且字如閔子騫等不一二人或子或字者亦數人然淵弓至游夏最號髙弟字而不能子也有子曾子子而不得字也就二者而論則字為尊孟子雖有師道之稱係于氏者不過男子之美稱耳故孝經字仲尼而子曾子禮運字仲尼而名言偃至于子思字其祖孟子字其師之祖相傳至今人之字仲尼者無敢以為疑仲尼作春秋二百四十二年間字而不名者僅十有二人而游夏諸子門人亦各字其師相承至于漢初猶未敢輕以字許人即是而觀則子游以句呉孤逺之士遂得字而不子以列于髙弟之目此又豈易易然者今呉門密邇行都而常熟為壯縣有如游之北學洙泗遂以習禮輩行顏閔寥寥千載間豈終無其人邪或者狃于習俗未有以自振我朱子既嘗表其事以風厲之予又何言獨推山川風氣古今猶夫人也誦先聖之書服先聖之訓烏乎其必有聞風興起以無負建學尊賢之意者士其勉之端平三年十月戊戌資政殿學士通議大夫提舉臨安府洞霄宮臨邛郡開國侯食邑一千五百户食寔封五百戸魏了翁記吳都文粹續集卷五
