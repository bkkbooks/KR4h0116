不驚人亦起羞夢幻世情何足較嶺雲溪月自悠悠訪靈巖住持僧一元賀元忠一上靈巖感廢興蒼茫雲樹更含情吳王宫闕空遺址智積禪林却擅名香徑有踪疑學步琴臺絶響似希聲悠悠塵世驚千載得繼前修數幾僧次韵遊靈巖楊循吉巖陽草木本芳幽更有寒泉相繞流學道豈須勞乞鑑入山何用待封留東峰西嶺芒鞋下明月清風挂杖頭回首古人皆不見休因越喜為吳羞題靈巖鄺璠靈巖突兀碧雲横嘯倚巔巒百怪驚極目乾坤些子大俯身霄漢一毫輕研池墨洗天潢水琴石絃飛山雨聲莫漫乗槎犯牛斗好依紅日庇蒼生靈巖懷古次劉丈纓韻孫磐簿書堆裏抽身出來侍先生山水遊預辦尊罍供小宴敬從杖履上髙丘皇圖浩蕩乾坤古伯業凄凉草樹羞入夜遐觀更奇絶一輪氷鑑自悠悠靈巖唐寅山鬼踉蹌佛殿荒老僧指㸃説吳王銀瓶物化餘石井柿葉秋深滿屧廊地下有魂悲藥劍草間無處問梅梁伯圖零落何須問越國如今也鹿塲經靈巖謝琛靈巖之山揷天起山巔吳宮遺故址琴䑓石井尚依然不見蕐筵歌皓齒春風夜靜松濤鳴步屧猶疑環珮聲玉釵斜處干戈伏苧蘿之女傾人城江頭古廟蒼烟裏伏劍寃哉子胥死讒言悞國賊忠良當時忍心太宰嚭英雄一去霸業傾卧薪嘗膽人成名文臺宴罷君王樂長頸烏喙謀臣驚玉顔芻狗真成比載入扁舟泛湖水留得空山夜月明蜀鵑叫碎吳人耳欲將興廢問山靈野草年年春自生吳亡越霸今何在慨我千秋萬古情和韵于範湖畔羣山伏且起突兀髙峰餘故址行臺有約偶登臨小徑落花印屐齒吳宫不見山鳥鳴管絃化作風雨聲當年尤物貯金屋君王無意在江城相逢猶恐夢寐裏願與蛾眉共生死粉黛叢中伯業消不必借劍斬宰嚭麋鹿遊時臺己傾館娃猶存舊日名㑹稽塵埃亦己久尋常興廢何須驚吳下新醅琥珀比芳草遙映春江水㑹飲况復盡人豪不學巢由浪洗耳題詩笑我愧山靈負却巖花爛漫生豪吟幸有臨川手寫盡興亡萬古情靈巖歌徐縉當昔靈巖繁盛時吳王曽此宴西施西施洞口傾城姿管絃歌舞日相隨琴臺冉冉烟花滿香徑紛紛蘭蕙滋一朝樂極欻生悲越國兵來那得知臺上空憐走麋鹿江頭却恨投鴟夷離宫別館今塵跡露井殘碑半湮没梵宇蕭條山欲頽見此空為人太息我來日暮松風生獨立荒丘山月明不縁興廢重回首秪為英雄一愴神遊靈巖歌顧鼎臣鐵冠使者江海士及𤓰己了公家事地官分司得清暇玉堂散吏亦相值追陪李郭飛仙艗曉泛春㳺真偶爾姑胥浩蕩開天景重湖碧峰七十二浮沉㶑灧各生態黛髻銀盤繪屏几古木幽沉伍相祠寒食何人薦芳芷吳子么麽輕戰鬬霸業未成謀士死長城豈待玉顔傾故國波生劍光紫扁舟越蠡戒前轍矯矯冥鴻近烟水英雄得喪兩安在俯仰乾坤堪一涕湖山羣木羅紫烟靈巖叠巘開青蓮小輿伊軋松林午髙情直擬山之巔山肴蔬筍襍綺食鬱金美酒搖舲船哨壺羽箭兼勝賞亦有鳯槽和鵾絃山僧指㸃因借問館娃舊跡今茫然琴臺草長迷香砌古井苔花浸乳泉銀床寳柱歸何處屧廊施洞名空傳當年粉黛皆尤物就中西子飄雲仙怪石如人寂無語曾按瓊筵聽歌舞美人進酒甘如飴不道降王嘗膽苦前山髙臺凌杳冥鏤金為梁玉為柱朝朝暮暮恣行樂臺土未乾麋鹿聚興亡豈獨悲吳越秦宫漢苑皆蕪没驕淫無度忘殷鑑山河王氣終消歇我曹撫此百感生欲勸主人為曲突吁嗟富貴能幾何電掣漚消真欻忽共君及時且行樂趂取春光明緑髪林深壑杳不可留落日蒼蒼灝氣浮鳴騶歸路非吾願興在晴沙雙白鷗急流解組何年是掉頭不共妻孥謀縹緲峰前聊卜築清泠淵上重夷猶汗漫尋山遍五岳赤虬黄鶴歸滄洲東風吹破眼前夢天際浮雲千古愁登靈巖贈住持僧雲谷祝允明尋常一種無心物偏與空門法味俱任爾深藏或呈露本來面目自如如登靈巖林庭㭿春日肩輿野外行緑雲髙下晩禾成愁顔剛為貧民解鄉思偏於久客生沙鳥向人如欲語山花過眼不知名我來豈為躭遊樂欲採豳風奏舜廷同前陳璚靈巖千古館娃宫事往名存感慨中形勝當年風景在繁華瞥眼霸圖空春歸香徑遊林鹿月上琴臺起寺鐘老子酣逰挂冠日一畨閒咏付東風靈巖懷古朱兖矗矗湖上峰逺近各含態何必躡兹巖酸風入人肺金碧想故宫歌舞花叢叢吳王樂極時胥骨流江中越山兵馬雄前溪是來處色艷霸氣消腹心向誰慮琴臺雲故散香徑春仍榮湖風激洞庭遺恨殊未平誰招麋鹿羣日繞西施洞娟娟井中月照破千秋夢遊靈巖髙第靈巖下白日萬井動秋風衲子坐烟島田家収嵗功淡雲浮世外清磬落霞中我亦躬耕者蕭然野思通靈巖訪古吳一鵬名山只在郡城西細草青青路不迷訪古却尋僧作伴凌空聊借石為梯峰頭日漏雲初破洞口春歸鳥自啼風景撩人杯入手興豪何惜醉如泥其二絶頂登時暑氣無羣山環拱一峰孤馭風彷彿來仙侶入眼分明列畫圖鉅井似潭深貯月逺涇如箭直通湖勝遊繼此真非易休訪留連到日晡靈巖寺陸俸霸主餘基禮佛壇愁心落日倚闌干猿啼洞口烟蘿暝僧掃堦前木葉乾麋鹿自遊孤月曉魚龍欲動五湖寒東風不管興亡恨吹遍梅花萬樹攅靈巖寺上方宋无霸業消沉烟樹濃吳王臺榭梵王宫屧廊人去土花碧香徑僧歸秋葉紅􅄓母射巖風動地蛟精徙穴霧迷空明朝江郭重回首寺在翠微蒼靄中涵空閣髙啟滚滚波濤漠漠天曲欄髙棟此山巔置身直在浮雲上縱目長過去鳥前數杵秋聲荒苑樹一㠶暝色太湖船老僧不識興亡恨只向遊人説往年同前陳毓層構峰頭切太青凭闌恍若遇仙靈窗開俯挹西湖水簷聳髙懸北斗星足底浮雲生冉冉目中飛鳥去冥冥百年塵海須臾事誰得身閒幾度登靈巖禪寺永樂中燬𢎞治間重建今復燬惟存一殿與塔耳尹山寺東菴王汝玉地湧琉璃界天開翡翠林那知近湫隘誰意得幽尋日麗花臺迥雲横巨闕深紺園浮露彩琪樹帶春隂玉澗珠泉滴丹窻緑嶂臨梵王紅錦服仙女碧瑤簪金作山龍甲朱為海鳥襟鳴鐘驚雉舞講法引猿吟境靜塵難染機深慮不侵願因清淨力從此識真心尹山寺夜咏楊循吉離城至此二十里翻作遲遲半日行古寺夜投僧盡出空廊獨步月初明學披梵策言生澀借浴芳泉體潔清僮僕不諳禪黙相翻憐無侶話覊情尹山精舍王寵古殿深巖曲朱門碧水開鈴聲衝鳥落幢影拂雲迴院入斜丹檻賓迎滑蘚苔東來車馬道聊爾滌塵埃崇福教寺在長洲縣三十一都尹山故稱尹山寺梁天監二年僧左律建國朝洪武初名僧永隆常住此隆乞焚身度天下沙門春日與王卿放舟出陳湖東登大覺寺張適曉日滄江踏釣舟為來林下訪湯休松間老鶴同僧立栁外閒蜂趂客遊半屋雲隂分夜榻一池月色蕩春流髙深堂上多清供琴罷香生夢亦幽宿東明禪院吳寛東明院裏曽投宿偶見前題一慨然欹枕亂蛩如昨夜入門髙樹却多年季方不與元方在小郎還同大郎賢何處玉笙吹未歇山扉新月照人眠和李應禎孤舟出熟秋雨晴如風半日到姚城故人天上新沾禄衲子山中舊識名春日暮雲無限思爐薰茗椀有餘清一夜寒生眠未穏夢迴時聴海潮聲大覺禪寺在長洲縣二十七都大姚山梁天監間僧道邦建寺有東明禪院最為幽勝宿天宫寺陸容閒游三日滯天宫窘步西齋雨又風睡起牀頭書帙亂興來牆角酒瓶空㝠濛野色迎寒碧狼籍春痕弔落紅別後只應如杜老袈裟棋局念旻公再至和前韵此度停橈入梵宫橘花香裏坐薰風閒心頗為江山奪實理元非夢幻空雲隠小窻禪榻靜日斜深殿佛燈紅留題欲和鴻泥句誰復才情似長公天宫教寺在胥山南太湖之濱梁天監三年僧汰雲開山唐徳宗時重建宋天聖中重修進士張汴記昭明寺記虞集吳中多古佛寺往往有蕭梁遺跡郡城西四十里曰錦峰之昭明寺相傳以為昭明太子所建故曰昭明或曰錦峰之山産文石中為用器華采炫爛故有是名或曰其寺中據沃壤羣山如屏如翼去寺皆逺無所障蔽其稱昭明之名此殆是也然而不見於郡志豈㑹昌沙汰之後日就頹廢修志時冺没不聞故耶宋嘉泰中里人周氏子為僧住穹窿白馬寺曰南公歸省其父父曰吾老矣汝毋逺離南乃即昭明故址葺之以居辛苦勸乞周父又以其財力助之己而施與者日至厯數十年法堂僧堂厨庫粗備土田稍為人所侵有者以漸來復其子本立實相其事南沒立躬任作勞思成南之志益殖美壤作佛殿門廡方丈之室度弟子九人約以次相繼嗣主院事至元中執事浸用懈惰遂以中微南公之願力幾息矣一真始出乎其間大有以充闢之山林廣袤而林木足用土田易治而供糗有餘矣屋宇華麗内固外完其計慮久逺者日以周備矣昔之處此者不知有紀述以待來者是以數起數僨相尋於數百年之間而莫之有定獨真公知以此為意亦自其積之不易而成之不可忘也噫為佛者之初固不以植生營業為務然而四方名勝之處或困於主者之不一徒衆之集乃至失其所依曾不若世繼而守之者之為逺也然而得其人則易以興不得其人則易以衰物理之實然豈特昭明而己哉然則真公欲為記之也宜矣予之先隴在吳者與其寺相望為鄰故不辭而為之書錦峰舊有宋穆親書賜貴臣之家者今留昭明寺云年月日虞集記懷陳寅山人時居西山昭明寺作髙啟閒看西澗月秋閣與僧開正是相思夜鐘聲君處來昭明寺陳基山居有餘樂縱遊良不孤生多濟勝具豈辭足力劬處處青蓮座人人僧寳珠雨花無宿蔕玉樹盡增株勞生局形跡矯首􅓽踟蹰昭明教院在吳縣錦峰山相傳為昭明太子所建或謂山産文石故名然不可考矣唐㑹昌中廢宋嘉泰中白馬寺僧南公重建宋理宗書賜鄭起潛錦峰二字藏寺中光福舍利塔記崔􅉇式觀元始𦕈覿𤣥風夏巢冬穴之時茹毛飲血之世一寒一暑一隂一陽其道雖分萬彚猶渾逮乎伏羲氏之王天下也始畫八卦造書契由是文籍生焉然後厯堯舜至周孔由是釋像興焉及乎東被大漢尤加崇飾按牟子云佛生西竺假形王家即其生也又拂衣雙樹脱跡金沙即其滅也雖然示生滅之相詎加恍惚之道何異經巨海者終年不見其涯測虞淵者畢世不知其底吾以此觀之佛理不可盡也若夫舍利者即金人之遺骨堅剛不壞變化自然西天敬之立為塔廟昔育王見而不信吳王修以效䖍迤􅆔南移年代頗久大哉寂滅之理豈一魯男子能探其藴乎余素不留心畧為叙事故經云若能起塔供養皆獲福田此乃聖教所談事豈虚謬固知為善者天報以福為非者天報以殃雖則𤣥妙難求而實精專可驗光福寺者即梁九真太守顧氏之家山也士有惡嫌塵網種植善根遂捨林泉建兹佛刹立寺之始斯其由起焉銀闕移來洪波架出碧岫孤聳青天下臨勝壓洞庭勢控吳苑上止斗牛之宿旁連太伯之墟何必鼇負蓬萊龍蟠閬苑歇樵翁于片石卧禪子於幽林草樹麗而攅花杉蘿深而蔽日長松古栢縁情無塵世之機逺岫平湖舉目入畫屏之色其僧自相謂曰此之靈境爰有上方可以建立亭臺而莊嚴塔廟既而不日不月其功就焉斯塔也梁大同之中建矣唐㑹昌之末燬焉興廢之由是其一也然則基址雖在而乃烟蘿以荒於時咸通中興天子明睿四方清平野人入朝賢士出世維我吳郡之興一也鸞鳯異態龍虎殊姿嘯傲誰同孤髙自得雪霜徒侵碧松色塵埃難染白璧光嚴陵卧時國乏賢良鄭均升時位齊卿相魚腸之劍利斷鯨鯤龍頷之珠光浮日月燒金屑玉間邀蓬島之仙釣月歌風隠笑武陵之客公不惟優游儒籍兼亦探奥釋門故儒則素王間生於釋乃金人謫下則知人情難及智用全殊每登山而踟蹰因驚塔之荒毁是斯塔之將興一也方景運中天聖徳遐被慈心博施行是日之堯風徵當時之漢夢于是三寳起跡十方歸心布金秪園圖像花界今者又澄清域外鏡朗天衢金柯開鼇背之花寳位乾銀河之浪玉潢丹甑坐分瑞應之符樵子漁翁眠唱太平之曲乃遇我公道窮生滅心達苦空信塵刼之迷途悟法門之了性追吾家之舊迹再葺蓮花䕶吾佛之真身重修寳塔然後増基表刹薙草開林剪荆棘而雲平列松杉而洞出時維三月節属九春鶯吟風而千般草垂巖而萬種建金棺而心動羅寳蓋而雲隂緇徒共瞻士籍咸悦芙蓉座上飄三界之異香薝萄花園沛諸天之法雨是時也祥雲結綵氛氳於行道之壇慧日澄華照耀於燃燈之位公乃覩相生善至誠感神遂發善心爰命工者於是依憑氣象結構規模初標覆簣之踪漸著凌雲之勢亦有飛閣周繞回廊接連石工呈奇巧之才梓匠設雕鏤之妙壯觀而龍蹲虎踞巍峩而仙掌蓮峰丹柱屹而星攅雕梁赩而虹指揜映而如蜃吐崚嶒而欲鵬飛不踰一年工築就畢斯狀也險體千仭髙標七層凝然中峙又若神助上穿霄漢下壓雲根豈劍閣之能齊比爐峰而尚峻鶴歸天而一駐雲収霽而半開發郢客之詩情壯吳宮之地勢金輪縹緲亞日月以髙明雁像參差拂虹蜺而若動偉哉塔之美也其功杳莫繼焉至若遊人訪景淑女尋春入幽徑而攀蘿步晴厓而拾翠巢鳥映葉嵐烟惹衣苔鋪石而霞斑花映峰而綺合髙瞻闤闠千家之臺榭龜文迥瞰林巒四面之波濤練色爾乃金飈屆節玉露催寒何用悲秋正堪憑檻天朗而雲霞弄錦風髙而松篠張琴蒹葭之浦上漁歌蒲蓼之汀邊雁影叠浪裁古人之素羣山鬬少婦之眉開謝客之愁襟抒休公之佳咏松間踈韻伴髙鳥而飛來湖上輕烟映孤㠶而掠去斯景也非公不能領矣斯塔也非公不能剏焉時有住持僧道居文瓚崇建寺皆以髙空皎月深谷奇松挂衣錫而雲閒卧烟霞而鶴瘦真宗真理金言積于情田無垢無塵玉蓮生於淨土且鄙人識比求劍材非利錐焚香敢憚其冥捜捫燭常慚於未達辛苦十載每思蚊夢之徵摶躍九衢頗有龍門之志曾勞閉戸何啻仲舒之三年誰念無家更甚相如之四壁惟公不捐質微詞陋命作斯文操觚長吟永日忘輟何以著公之美大播芳風詞曰皇唐之世運啟千秋産公之才當代風流荆聶之氣金張之儔但樂風月不干王侯英明少年卓犖公子傲貴㤀榮時人鶚視洞天常開春風不起金谷看花玉堂攜妓南山積石北溟揚波紀公之徳未足為多年月日唐崔鵬記光福寺在吳縣鄧尉山龜峰上梁大同間建寺有舍利塔奉慈菴吳寛野寺堪逃暑登登逺扣關林深長礙樹路轉又逢山石鉢分中飯雲房借半間玉茶花落盡坐撫不知還奉慈菴在𤣥墓山麓宋靖國元年僧明昕建賦得寒山寺送別髙啟楓橋西望碧山微寺對寒江獨揜扉船裏鐘聲催客起塔中燈照逺僧歸漁村寂寂孤烟近官路蕭蕭衆葉稀須記姑蘇城外酒烏啼時節送君違寒山寺胡纘宗牢落寒山寺鐘聲自往年海風臨客枕江火傍漁船不聽禪心寂偏聞旅思懸誰家管絃急歡笑玉樓邊送僧道性往寒山寺劉溥寒山寺近闔閭城老衲分燈向此行地接楓橋江市逺林開松殿野雲平身經暮雨三衣重影度秋湖一鉢輕後夜相思何處是滿天霜月更鐘聲陪元侍御游支硎寺劉長卿支公去己久寂寞龍華㑹古木閉空山蒼然暮相對林巒非一狀水石有餘態密竹藏晦明羣峰爭向背峰峰對落日步步餘青靄香氣空翠中猿聲暮雲外留連南臺客想像西方内因逐溪水還觀心兩無礙宿支硎山房僧皎然上方精舍逺共宿白雲端寂寞千峰夜蕭條萬木寒山光露下見松色月中看却與西林別歸心即欲闌支公詩支公養馬復養鶴率性無機多脱畧天生支公與凡異凡情不到支公地得道由來天上仙為僧却下人間寺道家諸子論自然此公惟許逍遥萹山隂詩友喧四座佳句縱横不廢禪贈支硎山南峰僧皮日休雲侵壞衲重偎肩不下南峰不計年池裏羣魚曾受戒林間孤鶴欲叅禪雞頭竹上開危徑鴨脚花中擿廢泉無限吳都堪賞事何如來此看僧眠和韻陸龜䝉眉毫霜細欲垂肩自說初栖海岳年萬壑烟霞秋後到一林風雨夜深禪時翻貝葉添新藏閒揷松枝䕶小泉好是清冬無外事匡牀齋罷向陽眠平雲閣范成大背倚天峰湧化宫横空閣道卧雙虹火雲六月應奇絶青瑣玲瓏八面風鐵杖攴道林遺物八環流韵寳枝鳴古鐵無花紫翠明莫遣閒人容易振泉飛石落鬼神驚金沙沙中麩金色取煉多不成莊嚴福地守靈仙不為人間計子錢一掬斕斒光照眼路旁饞𨽻枉流涎遊南峰寺有支遁放鶴亭髙啟每向人間望碧峰石門今得問幽蹤路縁風磴泠泠策寺隔烟蘿杳杳鐘窻下鳥來多墮果亭前鶴去只髙松一龕願借依香火莫道詩人非戴顒支硎山十三咏姚廣孝支硎山南峰一何髙東峰一何壯惟有定餘僧時來泉石上報恩寺舊寺烟霞裡經營東晉時支郎今不見令我起遐思南池秋深水更清游鱗手可摝後來觀咏人誰能繼皮陸石室窈窈環蒼石隂隂覆白雲夜深僧入定鐘磬寂無聲八隅泉池風迴波不動葉落樹無聲却憐清徹底有誰來濯纓寒泉涓涓石上流和雲白于汞閒來試一勺令人毛骨竦石門曉際神龍出宵分猛虎衝白雲開復閉蒼蘚剝還封馬跡石堪笑支道林愛馬却成癖飛走石苔間干年尚留跡南峰竦立去城遙嵐霏近午消奇形常照日雄勢獨凌霄待月嶺盤盤去谷逺矗矗出林危過樵常待月不管到家遲碧琳泉壁間瑪瑙紅澗底琅玕碧童子為煎茶山瓢汲還滌放鶴亭隠隠巖髙處空亭杳靄間神僧去不返空望鶴飛還牛頭峰羣山不同髙一峰嵐翠沍縹緲白雲間惟見牛頭露支硎山十二咏謝縉楞伽院楞伽開靜域聞自道林興山水清佳處由來半屬僧南池平池澄曉鑑虚閣涵秋月時有煉形人閒來照鬚髮石室寒逼禪僧定凉醒醉客眠戸樞從不螙嵗月任推遷八隅泉池鑿石破蒼苔青天地底來夜深寒月映疑是曉奩開石門峭壁擁雙扉亭亭來翠微山靈雖解説不禁白雲飛寒泉空壑積隂晦層厓沍氷雪下有清冷泉終年流不歇馬跡石追風蹄似鐵留跡向山深神力猶呵䕶苔痕不敢侵南峰月出衆山窅月落衆山黑朝來捲幔看氣勢凌秋色待月嶺詩人一壺酒待月升東嶺松壑起濤聲山風吹月影碧琳泉涓涓清澗中長洗山僧鉢還將鉢盛去㵼向玻璃滑放鶴亭久養籠中鶴如何却放歸不知初放日曾别主人非牛頭峯頭角昂藏出經春卧夕曛無人來問喘嘘氣自成雲同前沈大本楞伽院林中禪寂地古木叢青靄當年結屋人惆悵今何在南池丙穴暗泉通清漪浸碧空白蓮秋未老魚戲葉西東石室鑿石容趺坐還將石作牀山中當夏日此處獨清凉八隅泉池不作方圓甃池形似塔形雲光來復去孤影湛渟渟石門設户防來往兩厓相對青山僧無一物入夜不須扃寒泉飲來如雪味入口帶天香流出空山去能令大地凉馬跡石支公有駿馬已騁千里道留跡在空山猶戀山中草南峰迴峰帶秋色蒼翠聳晴昊澗底有寒梅年年看花早待月嶺入谷路己昏逺寺鐘聲歇烟中人語喧歸樵待明月碧琳泉泉流苔石下瀠渟映空碧上有踈篁枝蒼蒼同一色放鶴亭放鶴人何在孤亭横翠微客來亭上坐惟見白雲飛牛頭峰懶隨年共化獨坐空山裏時有牧童來長鞭驅不起初春山居還城却寄支硎僧院一律揚循吉好山不著詩人句辜負浮嵐翠滿空梅子蜕花春事半雨聲追冷昨宵中來尋茗椀梯幽閣却上籃輿别逺公白髮漸添身老大何緣追興逐東風吳都文粹續集巻三十二
