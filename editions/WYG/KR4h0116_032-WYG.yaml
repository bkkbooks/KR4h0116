body:
  text: 吳都文粹續集巻三十二明錢穀撰寺院與客攜樂遊寳積山遂汎石湖髙啟雲山擁春郭烟花漲晴川看花入山中諸峰恣攀援客吹玉管笙合以金柱絃清音度碧嶂松風助泠然宛若鸞鳯吟要𦕈入紫烟行人盡矯首謂遇雲中仙下山興未闌相㩗更登船虹收嶺外雨鳥没湖中天嵐翠破夕陽樓閣影倒懸酒傾緑脂膩鱠作瓊絲鮮獨恨無紅粧清波照嬋娟㣲風吹㠶緩欲使歸途延衆賓起懽呼舟仄水浸舷廻艫掠寺過楊柳山門前此地有離宫美人艷當年羅裙罷春舞草色餘芉綿况我昔此遊冠蓋十里連重來復誰在新知滿中筵人事竟若斯今古俱可憐能遊即稱達何須問愚賢我欲叫馮夷捧月出海邊醉後不歸去月照舟中眠寳積寺八咏謝縉清鏡閣平湖澄碧鑑虛閣瞰清波有月心同賞無風水自磨楞伽室楞伽千載室蘭若一函經為問看經者年來幾百齡青蓮峰影向湖波落青臨梵宇開上人趺坐日髙處作層臺白雲徑一徑蘿霏襍冥冥掃不開空中聞錫響知是有僧來雙冷泉碧甃寒相對瀠渟西復東不縁居一地那得兩心空翠微亭石徑穿雲去山亭傍路安坐來清潤積吟袂欲生寒先月樓層樓面滄海月出預能期想是憑䦨處人間未見時玩古軒欲識古人趣當玩古人心古心既自得視古猶視今又八咏失名白雲徑迢迢白雲徑縈帯入山林未測通幽處氤氲幾里深翠微亭山當翠微半亭住白雲間分得千峰秀都留几席閒清鏡閣髙閣登臨處平湖一鑑澄照心兼照影時有倚闌僧雙冷泉滋益功能竝寒甘味更同只疑深坎底濳有一源通楞伽室髙僧栖息處閉戸讀楞伽山遠無人聽空中自雨花藏暉齋外物豈能昧有光中自韜莫期幽隠室昭晰見秋毫先月樓雲收山吐月樓迥獨先窺清景非偏照迷方見自遲青蓮峰亭亭青蓮峰何年自天闢雲散石湖邊干尋淨如植遊石湖寳積寺追和危太僕吳寛禪堂擁翠總雲岑誤認天平萬石林學士放歌來水曲道人偏袒坐松隂飲泉别澗多溪鹿啄木空山或野禽亦欲他年間倚棹繞湖風雨聽龍吟寳積寺在横山下隋大業四年僧永光建今廢題横山寺戴叔倫偶入横山寺湖山景最幽露涵松翠濕風湧浪花浮老衲供茶盌斜陽送客舟自縁歸思促不得更遅留楞伽寺髙啟夕陽下西嶂返照東湖水來尋古寺遊楓葉秋幾里叩門山猿驚維馬林烏起鐘聲出烟去半落漁舟裏楞伽義未曉塵累方自耻欲打塔碑銘從僧乞山紙同前周南老曳杖行春橋擬向招提宿路過横山阿門挹湖光緑尋幽得清境探奇極遥矚山頭屹浮圖銘碑立蒼玉大業魏瑗書秀整殊不俗老眼為渠醒摩挲再三讀同前釋宗衍叠嶂來山尾平湖對寺門登危逾近郭望迥更連村客醉迷花畔樵歌坐樹根不煩留煮茗雨過井都渾送辰長老住横山寺鄭嘉紫檀烟凝鶴迴翔清磬泠泠出上方嵒畔異花薰講席澗邊修竹䕶禪房東林結社蓮初種南岳分春茗乍香三伏炎蒸應不到緑蘿風洒石龕凉上方姚廣孝蓮宫據山杪岧嶤去天咫風香花雨新僧行白雲裏幽沉樹籟靜蕭散烟鐘起人登石路迷依依縁澗水遊上方小酌僧舍吳文度上方氣壓湖山勝老我登臨思惘然一鳥影沉秋水外千峯勢斷夕陽前青尊白髮酬今日畫舫珠簾記昔年獨倚危闌重弔吉荒臺樵唱起蒼烟上方山懷古錢復亂山髙下半雲裏曾築樓臺倚翠崕句踐有謀臣范蠡子胥無計佐夫差蒿萊滿目悲吳苑麋鹿成羣入館娃千載越來溪上路行人一顧一興懷踏莎行秋夕宿上方寺韓奕秋水平湖夕陽低樹扁舟還覔來時路到城料得幾多程停橈為欲尋僧去杳杳松蘿泠泠鐘鼓上方更在雲深處鬢絲禪榻話今宵從師要了無生句上方山樓春眺皇甫涍落日攀雙樹看山倚畫樓竹氛簷際合蘭色雨餘流叠嶂春爭入長天雁獨浮知予干載意遥在五湖舟上方寺有浮圖在楞伽山上一名寳積寺一名横山寺豈皆一寺蓋不可攷但碑中云横山蓋當時未有楞伽之名此山固横山也與戴叔倫遊寳華山寺因宿陳基上冡桃塢原尋僧寳華麓舟汎石湖清茗煮􅀈泉緑山空木己落天髙氣彌肅松月有餘輝共向西齋宿宿寳華寺袁袠杪秋慘憭慄涉晨事猶豫川原殊氣候臨汎亦寡趣環堵澹澄潦平陸多荒霧水禽紛飛鳴葭葦蔓零露衝風揚夕波進㠶趨廣渡雲霞異彩翠山麓眇昏暮栴林鬱岧嶤始與賞心遇丹楓冠陽阿興矚咸可賦月出照古澗蒼蒼隠寒樹法侶欣招邀禪寂夙有慕清曠屏氛襍沉冥覯良悟萬事徒龍蠖短謡輸情素寳華寺在寳華山舊名智顯禪院􅀈􅀈尊者嘗卓錫於此寺有􅀈􅀈泉太祖髙皇帝御製賜僧無念詩有序皇帝諭僧無念佛生西乾為淨飯國王既長悲憫衆生罪重嵬山􅄽深曠海因是有警於累世因縁遂入雪山栖嵒屋樹六載道成歸演妙法天人感聴其所説也為戒生死解脫其釋伽之道靈通上下妙貫三界博破寰中此其所以尊稱大覺金仙者也邇來通靈侯秘奏知有僧無念者方今羣僧中是可謂神僧陛下可召㑹之於是即遣内臣㠶舟星馳數日達京師即日面見朕目是僧雖壽有年其頂相巍然色聲俱偹者嗚呼自童子忘慾至於壽髙自受業而成人辭本師之席雲水寰中尋方問道謂髙名而不己方乃内觀噫身外無身戒外無戒在處有佛又何指方尋佛本性即佛佛外更何有佛佛外更尋他佛又何佛之有哉今無念定若河山戒照日月於斯之時獨出世界念僧他日脱去其名長壽如日月在天猶諸水所在有水無水皆水也豈不干江有水干江月萬里無雲萬里天嗚呼久同天地名垂不朽此無念者也從師童子問青𤣥世事茫茫學坐禪幻出漸知身是佛老來悟得性通天朱門不謁藏金錫茅屋幽栖飲碧泉召至九重談妙法問伊落魄幾經年覲畢歸舟舟行㠶飽柁機圓船室堪栖老衲便兩岸樹摧風力徤一江波湧蜃威宣邯鄲誰問黄粱夢少室渠參不二禪午夜雪山星忽見前三三是苦空年懷僧無念特賜松實詩有序朕於庶務隙中將世人心意較之是非折之兩端思之再三謀之不己其人之情意變態多端倏此倏彼是非混淆紛然難析朕閲人既多厯事且久尚不能治不善而安良於仁壽之域此果不師古而有此善耶抑人心不古而亦有此耶嗚呼靜觀熟慮人之情意殆至古今倏然忽焉反覆不常艱於治政古人有云犯刑憲如飲食嫉良善如仇隙信有之不誣也嘗聞西方有大聖人不教而自化不治而不亂此大覺金仙之道也朕於繁慮中觀踵佛之道者能如是快美哉出三界而不輪廻神通妙用無礙於上下逍遥乎兩間出世者也前者僧無念戒律明於皎月定慧穏若丘山暫來一㑹去此常懷懷之不已遣人就見特以松寔供之兼勞以詩志空五藴隠藤蘿深行由來積嵗多山鬼鑑知常擁䕶水神到處每撝訶戒如皎月天将説定若威嵬世欲歌幾度有時懷善者命賫松實詣盤陀賜僧無念用松實詩韵談空幽隠入烟蘿路合松苔嵗月多問道無門明五教進齋何處愛三訶殘經對月從容誦補衲朝陽自在歌似影山間真寂寞傳燈松下任坡陀與駱蘄州驥沈石田周馬清癡愈同遊𤣥墓是夜宿萬峰精舍因成十二韵徐有貞山水為吾癖平生不厭遊每迂康樂屐時泛米家舟石磴穿雲逺林扉入洞幽問途從野老結社集緇流自喜逢清世誰能免白頭夣空千代事吟破五湖秋嗜酒憐彭澤參禪悟趙州徑開招二仲亭構擬三休畫與天機㑹詩將險韻酬蠡應羞伯越良也幸封留邀月聊停盞臨風獨倚樓求仙閒即是何必問羅浮山樓雨晴同諸公臨眺具區林屋景象天開遂成聨句湖上雨初晴分明見洞庭驥天光回映日山影倒含青有貞水鳥依清淺風㠶度窈冥周酣來豪興發吹笛與龍聽愈和公素韵蘿逕縈迴手倦攀上方只在白雲間鹿眠花下僧傳法鴉噪林前客扣關石磵流泉和梵響松梢落雪㸃衣斑欲知何處宜蟬蜕秋月娟娟水一灣寫畫贈別傳上人杜瓊欲尋間處遠登攀為愛山房又寫山好被山靈來笑我此生何事不能閒入𤣥墓寺吳寛髙登鄧尉山遥入𤣥墓寺老僧具衣履出門迓予至落落長松間一徑獨深邃鏜鞳鐘磬聲鳥雀少驚異仰面睇山腰殿宇危若墮長松掃清風修竹自為篲結夏四五人趺坐更無事樹密山果懸草深井泉秘旋登小樓幽洞庭正相值洋洋太湖波兀兀林屋翠始知衆山中此寺真畫笥昔聞萬峰老卓錫據此地道行既孤絶遺言有髙致化去動吳人金帛爭布施嵗久骨當朽遺容未全弊禪堂晝仍開向來乏供饋惟餘佳山水不改太古意磨厓紀勝遊吾當一題字𤣥墓寺王鼎馴鴉驚客散種竹與人齊春色閒門靜泉聲就枕低兩山何似裂一劍不空提亦愛全身地誰能學馬啼春夕宿萬峰髙閣晨起留贈敬堂長老陳霽披雲上翠㣲春山縱芒屩和林變明姿菲菲陽卉灼濤驚風繞松泉鳴雨飛壑躡磴石多欹攀嵒葛猶弱空翠拂人衣覽之不可握荒基漫苔痕幽龕翳蘿幕巨浸窟潛蛟層厓樹巢鶴字古壁糢糊禪枯燈寂寞波游揚素㠶雲臥栖香閣睠兹山澤癯外物徒濩落紉蘭擷瓊英斸笋裁氷籜思逺境偏奇𤣥悟情無著願隨王子游吹笙向寥廓過鄧尉山題天真上人新禪院王鏊手斵嵌嵒鄧尉濆五湖風月自平分鐘聲夜扣林間雨蜃氣朝横嶺上雲慧眼又傳新法嗣幔幢曾折古魔君我來亦是尋常事信息誰教野鹿聞為懋上人題畫二絶徐禎卿渺渺洞庭秋水濶輕舟搖動碧琉璃松陵不隔東西望楓葉寒塘露酒旗布衣藤杖稱芒鞋貪看青山獨偶來心與白雲元不礙長天一鶴忽飛回錦上人西堂有作陸無蹇滿山微雨竹烟昬路轉桃羅又一村石燕避寒春落子籜龍驚㬉夜添孫危峰壓殿天初迥缺沼當嵒水乍渾願向西堂分半榻禪翁莫厭客敲門宿遵上人房王寵山僧不厭客留我宿雲島藤蘿半銜日轉覺江山好古厓暗於墨平湖夜如縞遙望鏡中天萬象皆垂倒道人下山去為我摘芝草渴飲石榴羮饑飡鸚鵡稻石牀含雲㽔清寒逼人腦自非烟霞骨安能此投老明發又人間虎溪相送早和湯珍既登烟霞嶺因宿烟霞島日入羣動息嵒居更幽好泉鳴樹間琴月曵湖中縞雲軒夜生白萬想盡傾倒廵簷悉琪花匝地皆瑤草坐之緑竹牀飯以金蓮稻金偈靜降心寳薰清入腦始知名勝地偏與僧栖老一宿媿暫留晨光動林早贈味閒長老顧鼎臣萬玉青林表依然見遠師貝靈翻葉葉蓮漏滴遲遲壽域添黄耉名山見白眉身心兩無礙自在到期頤憇萬峰寺徐縉憶別兹山二十年夢魂常繞白雲巔湖光山色如相待竹徑松堂亦可憐嬌鳥偏啼吟几外寒梅故放酒尊前洞庭西望烟波𣺌媿我時乗范蠡船宿𤣥墓寺碧照軒蔡羽親躡山中雲遙眠樹端閣開窗太湖來當几孤㠶落步步玉青葱曲曲徑盤錯愛倚千尺樹頻頓修廊脚兩㸃包山烟空黛真寂寞飛睇出雲外猶疑十洲薄翠石寒堪摩蒼藤老難斫羅衣濕山霧瓊水飲鍾酪幽縁苦不久一宿深自足同來虎溪游留題在丘壑碧照軒皇甫涍森沈轉幽徑遠近含澄輝秋色引初曙孤軒當翠微𤣥言應虚籟宴坐發清機繕性從兹適丘中無重違題山偈釋時蔚𤣥髙向午面朝湖三鳯三龍天下無左右環盤前後濶此山真好立禪徒𤣥墓寺名聖恩菴在鄧尉山之南岡元至正間僧蔚萬峰自杭來止於此初蔚辭其師千巖請所往荅曰汝名汝所止也及至鄧尉乞葉承三氏地結菴居之其徒大集鋪叙三十年遂成精藍為吳中名刹國朝洪武中僧普壽普隠永樂中僧智璿先後重建内有碧照軒今為勢家所有漸廢無攷矣送僧還文殊菴劉昌袈裟何地更相逢一錫東歸隔萬峰松偃舊窻僧臘久花薰晴殿佛香濃空山晩叫巢雲鶴古洞春藏化雨龍定起有詩還自寫下方驚起夜深鐘文殊菴在金山東嶺以獅子山相對故名亦名金山寺元至正間僧時蔚建宿靈巖山戴叔倫馬疲盤道峻投宿