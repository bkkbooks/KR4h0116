body:
  text: 吳都文粹續集巻七明錢穀撰學校社學義塾燕居殿記朱孔昭道之在天下未嘗一日冺也由其紀於今者或興或廢故道行於世者有明晦焉嘉定州學天厯已已濟寧趙侯撤禮殿以舊聖像制小與殿弗稱易置西廡下既而壊漏弗支冠裳剝落見者病之莫之攸改距今幾三十年矣天祐斯文興起有日至正壬辰夏太守大名郭侯良弼守是邦首謁廟廷亟欲更張適軍務迭興供億未暇次年秋乃新大成殿金碧輝耀庭堂兩廡規制顯嚴位序有次門墀垣橋靡不周備惟至聖舊像未卜祀所侯實懼焉衆曰殿後餘地尚廣若增創燕居則猶愈於廢置而弗祀也侯從其議即鳩工度材州之好義者歡然趨之屬予董其事增土壘石基與殿齊廣袤二丈深亦如之為殿凡八楹翼以軒窻繚以垣壁黝漆丹堊供具器皿實美一新落成且有日仲丁甫臨侯率寮寀暨諸生行釋菜禮及竣事皆翕然若有所歸也嗟乎三十年間往往視為濶迂置之弗顧其端昧於為政之本歟今也妥靈得其所展敬有其地則吾聖人在天之靈有以相侯者必厚矣蓋道之廢而紀於今者可不信乎是舉也神安則人安學興則士興侯之為治可謂不昧其本者乎予既備員冷席樂侯克成其志因紀歲月用彰不朽云至正十四年八月既朢章甫朱孔昭記大成樂記周仁榮大徳十一年詔尊夫子加號大成至聖文宣王於是夫子之殿與祭祀之樂舊名大成者始益尊明越十有七祀嘉定州儒學大成樂成教授劉徳載以知州周思明書請記仁榮曰自漢以降祀夫子用六樂用軒縣用宫縣至用大成樂制樂章十二篇叙一德以降神備衆善以致享然後名正實著因用無損益其器金之音編鐘十有六石之音編磬十有六為一肆絲之音琴瑟十有二琴五絃至九絃凡五等等各二瑟之數如其等簫二管二篪二為竹之音巢笙二和笙二為匏之音土則塤二革則搏拊二木則柷二敔二以簨簴牙業籈麾暈竽流蘇之屬為之飾以五聲六律六同旋相為用焉夫樂與升歌旋相為宫者也樂之宫在律則吕為升歌之宫樂之宫在吕則升歌之宫乃在律隂陽之氣和宫商始得合矣漢儒謂祭尚柔無商音失旋相之義也旋相之樂無射為宫則黄鐘為商宫君象商臣象君聲不可小臣聲不可大因半黄鐘之管為四清宫以是旋相之奏有四清聲者抑臣以尊君也八音與政通樂云乎哉樂象成也夫子之聖猶金聲玉振始終條理合衆小成為一大成故樂修於學可以通神明美教化移風俗古大司樂掌成均之法以治建國之學政樂徳樂語樂舞皆教之事今之日知州與教授興學而修樂知古之教也夫豈曰用於祭祀哉天台周仁榮記局田記楊載嘉定州贍學田五十五頃六十畝有竒歲收米二千二百餘石籍於有司官若吏不能有所齮齧乘好歲荒旱之餘擅減舊額農夫分受其利剙為他名曰減例米比官吏之所受不啻過焉由是倉廩空虚用度不足雖禮文之士猶趨就茍簡學者罕至絃誦之聲不聞棟宇坍頹牆屛荒翳有窮鄉衰陋之風延祐六年興和路周侯思明來視州事進謁廟廷延覽徘徊喟然太息守土於兹以承流宣化為職學校不修無以奉行詔書懼獲罪戾欲謀修飭顧材無所出未得其方會教授缺官請前學教諭三山林君疇權主學事議從耆儒之言請於周侯欲復求舊額而厯時既久頑民必以死爭未易悉勝之也盍先收他名米一歲三百石有竒再歲如之三歲收九百五十七石屬富人出貸而取其息百五十石林君復議從耆儒之言請於周侯合三歲之積僅得千餘石以之營繕復有所不足吾䇿不得行矣用所糶米别買膏腴田三頃八十七畝得米三百四石所收他名米三百石嵗計六百石有竒置局修造不以給他費自是而後財用可使有餘雖撤宫室而新之無不可者先是至元六年林君之父前太學進士諱懋捨田二頃二畝嵗收米九十石有竒給凡繕修之費其後廢弛至是其米悉倂入學中學校既壊則秀異之士無所于歸聖人之道何所辨明庶民之徳何以觀望而興起之哉周侯舉應詔條不廢職守為政如此可謂之忠林君能成父之遺志可謂之孝兼忠與孝有所建立業垂不朽宜矣學者承藉如斯以强立志以敏趨學積累細㣲以至衆盛名實並著自家行之而達於朝廷四方由庶士而至於公卿道徳純備光明顯融聖化宣通流衍無際則可謂無負也已建學於斯不無望於爾也周侯為守五年有惠政於民著績偉然可附於古之循良非有待於講學之功能使爾邪林君用衣冠儒先累世富盛躬行節儉又篤於為義由興學一事觀之其他可知也已教授金華劉君徳載調胹補綴享有成功欲志不忘用彰遺美過徴鄙辭鑱諸堅石一再有請於是乎書翰林編修楊載記興學記薛元徳為一鄉善士使後觀感而興於行思之愈久而不能忘者非其徳之所施者博利澤之所及者深不能也豈惟發一善言行一善行歸美於鄉之一時而能若是哉嘉定自宋始創學宫舊有田租嵗入養士不繼邑士東祁王先生子昭懼鄉校廢弛無以作育善類遂將已田二十七頃六十七畝有竒嵗收租米一千一百一十餘石擬創義塾以教鄉里子弟志未遂而病作臨終乃囑其弟子潤以是田歸於學時至元二十五年也由是學廩充主講席者嵗不乏人迨今成材者衆鄉人感思先生之徳而不能忘也至正丁亥嵗予叨教於兹一日郡士請而言曰吾鄉先輩東祁王先生為一鄉善士以田歸於學迨今六十餘載未能勒石以紀其績吾黨之士與鄉里子弟今日獲飽食而知教朝夕游歌於斯者誰之賜歟願求作文紀其績以勸將來予重衆請之篤於義而勉為記曰古先聖王設庠序學校之教自鄉而行於國自國而達於天下其要本於明人倫厚風俗復乎民生本然之善性故也厯代相承治教雖有興替之殊而人心天理未嘗冺也先生篤意鄉校捐己田以養育羣材倡義於前而後人繼之者衆迨今思之而不能忘復請勒石以紀其績信乎天理人心之不可冺也若此而古先聖王之教其興感於人心者為何如也視世之有務聚歛而致富者不事詩書惟知奉己以私於子孫鮮克保有厥終者良可哀也孟子曰一鄉之善士斯友一鄉之善士從今以後聞先生之風而興起者世必有其人則鄉校日興善士日盛未易量也先生名子昭東祁其號也尚志不羣篤學好義鄉稱善士省府聞知嘗辟為吳郡學道祠官興舉有聲子二人長應龍字剛伯次應鶚字習伯一時俱以文學升上庠鄉人榮之世族昔盛於宋今能紹其傳而光於後者曾孫晉進道其字也至正九年七月教授永嘉薛元徳記嘉定州重建明倫堂記牟巘夫教養必有學學必有講堂堂之扁曰明倫盖取諸孟氏語練川本姑蘇屬邑陞而為州亦既有年而學宫尚仍其舊堂宇湫隘棟梁欹傾觀者陋焉戊申仲夏宛陵貢君松以六館士職教是學即議改作而力不逮心明年春會古汴王侯澤來守是邦始至謁學喟然嘆曰吾為長於斯實領學事而講堂因陋就簡若是不增大其規制何以逭吾責何以振一州之文教其亟圖之勿以費為憚又明年秋貢君以羨餘之積鳩工度材撤而新之時林齊賢沈鈞以値學董其事始於是秋八月迄於是冬之十月計費粟為石五十鈔為錠一千有竒王侯又捐鈔四十錠以助不給乃克告成跂翼翬飛視昔有加來游來歌莫不咨其偉駭其速烏乎斯堂之建豈直為美觀而已正所以明人倫也夫五者之倫非人所自為乃天所叙也自天子至於庶人無一人外此人倫自一家至於天下無一事非此人倫人極之立立此而已人紀之修修此而已仁義禮智之實由是而著禮樂刑政之具由是而修學校庠序之教由是而設易詩書春秋之書由是而作登斯堂者盍亦因名思義是修是明歸於而家父詔其子兄詔其弟亦惟以是庶幾千里之民薫為善良其於風化所闗豈細事哉夫事之廢舉固自有時是堂也微王侯崇儒則不能決計微貢君潔已則不能勇為微沈林二士竭力則不能贊成貢君與予善書來請紀成事予耄矣末由一登斯堂然所喜駭而樂道者使州郡學必來取法云嘉定州重建廟學記智玉成美天下之風化不可一日而無教也隆古盛時上自王宫國都下及閭巷莫不有學所以淑人心一民俗俾遷善向化胥出於教之本原哉嘉定為吳壯邑皇朝元貞初禩例陞中州而學循舊制未克宏拓泰定丁卯冬濟寧趙侯通泰來守是邦首謁宫牆歎其卑陋然未暇改為天厯戊辰僉憲濟南韓公鏞按臨謁廟顧瞻徘徊謂趙侯曰廟與學母相褻當析而二之爾所職也越明年侯請於府得允乃相地之宜卜河西杏壇舊址距學幾廿步令民負土實河易黌于上講肄有堂師生有舍門廡庖湢悉具至順庚午春始構材鳩工大新孔子廟視廩帑不給于供因勸鄉之文獻巨家以佐其費先是坦齋林先生疇梅巖瞿先生懋為時名儒畱志鄉校疇設教時增田七十八畝懋明經然誨人銖累束脩餘資囑子元輔俟為營學計是時林先生子曰仁曰義曰禮曰智曰信聞侯命願助錢六千五百緡元輔助錢一千三百緡捨田五十餘畝收米二十石有司嘉之附其先君子於祠從衆請也是年秋七月新殿落成崇基美材蒼珉蚩獸照耀層漢為吳庠最洎兩廡百六十楹廣廿一丈深一丈有竒工未畢而趙侯代覃懷勒公下車聴政之暇偕州長佐貳詣學以廟貌弗稱庶事簡畧思所以克廣前績會省檄教授楊大倫校日書公即命元輔攝教官董厥事瞿君務繼先志因儲贏撙浮補遺完美肖先聖四配十哲像其中繪從祀百有五人於兩廡植柏六十本於庭煥然而丹雘隆然而甃砌閎敞壯麗視昔倍而有加廟既成釋菜且有日余諗諸生曰三代教民禮義興于學孝弟行于家故治隆于上俗美于下後世道缺學廢不足以勸然人心詩書固未冺也嘉定地瀕海徼習俗未淳將觀感於斯薫而善良自今日始豈特為是邦觀美哉是役也非林瞿好古則不能以佐費非侯牧勇於事則不能以勸功非僚寀協恭則不能迄底於成達嚕噶齊名貝降知州名棟阿皆寛厚賢明所治興學宜有循良稱故次嵗月以記嘉定縣重建儒學記陳鑑為治莫先於教非教則不知天地所以為生之理人之所以為人之道將淪於禽獸矣人為禽獸也奚以生為先王重民五教而不敢後也三代以來無弗學之人無無學之地所以皆可封之俗無媮之民降而叔世利波一興義源既塞沉酣於嗜欲之塲顚躓於譎詐之域而不自知其入於異類也可勝歎哉故世之善為政者必先於學學立而後禮義興禮義興而後民風厚民風既厚求其世之不治不可得矣迂儒俗吏率謂非首務而漫視之是豈先王建學導民之本心哉我國朝法古為治上自國都下及邊鄙莫不有學故百年於兹禮義興行風恬俗熈號稱極治良有以也吾蘇嘉定之學自有宋置縣之始即有之在縣治之巽維有廟有堂有廊有廡左瞰通津右俯周道前臨釋氏之居慮其俗之溷雅也築土山以為障焉髙伉明爽規制壯麗來游來歌者安焉由宋迄今人才彚征民氣朴雅大異往時者正以地之有學學之有教然也厯嵗滋久弊而葺葺而弊者屢矣補苴罅漏雖有其人撤舊而新則難其任不有知所先務者力行先王之道不能振頹而起弊也天順改元丁丑之嵗吉水龍君晉由名進士才御史以廷議忤特出知縣事甫下車謁廟之頃即銳志興建稍徯時和乃集尚義之士於學宫醵金以圖恢拓之計衆欣然曰義事也義而弗為無勇也雖㣲賢令之勸猶强為之況勸之亟也乃協謀捐槖得金若干於是乎飭材鳩工作大成殿靈星門兩廡暨學倉亦新之若夫明倫堂尚完未敝則葺之而已土山則視舊而加崇焉文昌有像先祠於東廡從祀諸賢上揆禮則乖乃改作於學之東南少偏庶幾乎神妥厥靈禮無枉制師儒有廨隘於路隅且迫於儀門行者病焉乃市隙地於學之北而維新之於是乎私有安居而公無隘道以至於垣則加崇衢則加闢凡麗乎學者皆然經始於天順庚辰十月朔日落成於明年辛巳之十一月朢日予友駕部副郎范君誠夫邑人也走告於予曰廟學一新士林增氣然不靡財於公不殫力於民義聲之倡成此偉圖知天下之事不難而難於知所先天下之事不難而難於無所據知所先則天下可不勞而治無所據則事隱然以辦人徒知嘉定之民見治于龍君之速而不知由乎禮義之興行人徒見廟學之興無庸於斯民之力而不知由乎義聲之倡率然茍無其方則耰鋤徳色見於父子之間況令之與民哉民弗之從則無以遂恢拓之計學弗之建則何以致禮義之興哉欲求善治皆妄而已然則龍君何以得此于人哉亦曰徳孚于人民信之之謂也君之徳民如此而已而凡教于兹謀習于兹者一以龍君之心為心足于己無待于人則處可以善鄉俗出可以善天下一邑云乎哉龍君今以勞績進守徽郡吾知他日持是以善天下亦即此而在矣吾黨之士其可不相與勉其在已者哉誠夫曰善請書以記之宣聖燕居亭記張洪嘉定儒學舊有燕居亭元末傾圮國朝興復學校治隆俗美邑中士民嗣昌范氏遊於學宫俯仰顧瞻慨然有修復之志白于邑令校官許之嗣昌不資民財不藉衆力市材僦工築舊址而増拓之甃磚累石既廣且平雖名完舊實則創始作亭翼然為寢之儀廣深三丈髙六尋重檐出陛翬飛矢直櫺牖虚明牆墉言言牖間南向設崇髙之位肖宣聖燕居像其中髹漆之几刻鏤之器陳列有踐莫不静嘉穆穆清廟肅肅令儀瞻仰敬恭升降齊遫千古聖靈洋洋如在始事于宣徳三年營室昏中之月竣事于五年靈雨既零之時煥乎煌乎有加于舊觀其館賓范騰搏霄喟然曰春秋之法常事不書異則書之美惡自見嗣昌為邑之士民而能崇重儒術興起學徒非異之美者乎彼佛寺之居有能為興起廢墜者寺僧且銘刻事功傳示後世吾儒顧弗若耶來徴予言記之予謂廟制有寢所以安神妥靈今學廟無寢燕居之亭其寢之遺制乎且佛氏必有像設以誘其徒吾儒豈為是哉其或肖像者所以狀聖人温良恭儉讓之徳使人敬慕興起今為燕居像亦以著聖人申申夭天之容申申者其容舒舉一身而言有心廣體胖之意夭夭者其色愉舉顔貌而言有自然雍和之氣俾躁者仰之而自抑怠者觀之而自勉士子既嘗鑚仰于經傳之間又得觀感于肖像之側嗣昌之心不既深且厚乎予故不辭其耄勉記其槩以俟後之君子發揮其事云爾常熟張洪記嘉定縣儒學科第題名記徐有貞科第有題名之典昉于唐而盛於宋然唐進士之題鴈塔惟紀其始第游宴之榮而已至宋乃題之學宫盖有責成激勵之意所以為盛也我朝因之於凡厯科登第之士天子既題之名於辟雍部使者守令復題其名於泮宫視宋又加盛焉蘇南畿大郡而嘉定蘇之大邑也其儒學之建自宋理宗朝迄今三百餘年矣中更燬陊而復興修在乎部使者守令代有其人乃者臨海陳選以監察御史提督學校於南畿時巴渝賈爽亦以前御史來領郡計並奉璽書行事而成都洪冕實為邑正三人者皆名進士也其道同其心同以能相率相承而主張焉而綱維焉而作興焉於是學宫為一新而政為之具舉焉學中故有宋進士題名之碑而今則缺侍御乃與守令圖之爰考國初開科以來自洪武庚戌至成化己丑得進士若干列其氏名而勒之於石餘左以俟後之登第者繼題焉使來請記維夫經術所以經濟天下之具也士必用乎經術而後經濟乎天下譬則梓人之必用乎規矩而後可以經營乎宫室也宫室完而功歸乎梓人天下治功歸乎士功之所在名之所在也夫梓人以藝事名猶有得題者士以經術名可無題哉然彼之題在成功之後此之題在成名之初故必有所責成激勵焉責成乎己第之士激勵乎未第之士前乎兹者往矣後乎兹者可無勉哉已第而勉於進修則必成乎其功未第而勉於進修則必成乎其名詩不云乎濟濟多士克廣徳心有貞雖不敏也亦嘗忝乎科第敢以是諗於同志者武功伯徐有貞記嘉定縣學在縣治南宋嘉定十二年知縣髙演孫建堂曰化成紹定二年王選修改明倫堂淳祐九年林應炎塑聖像作直舍咸淳初史俊卿修飾殿宇元至元間邑民王子昭入田租若干元貞二年陞為州學大徳三年教授楊巽繪從祀像天厯二年知州趙通泰重建大成殿移堂於殿南至正十二年郭良弼建燕居殿十六年堂燬國朝洪武二年改縣學六年知縣文殊努修宣徳元年知縣祖述重建燕居殿天順四年龍晉重建殿及門廡築土山學南成化𢎞治間知縣洪冕白思明吳哲相繼修今學制左廟右學新建鎮海太倉衛學記張益正統改元之初朝廷用兵部侍郎毘陵徐公晞言凡天下衛所之附於郡縣者其武弁子弟皆令就教於郡縣之學若其地居邊裔與郡縣相逺者俾得建學以教如郡縣之制命既下四方才武之士莫不懽恱鼓舞遣子入學維時鎭海太倉二衛同蒞一城在姑蘇之境去郡百餘里東西去嘉定崑山二邑又各一舍許乃上禮部請以二衛倂建一學禮部以聞詔許之二衛官僚議欲建創㑹其費億萬計而莫知其所措者乃合辭白其事於巡撫侍郎廬陵周公忱公曰建學教人是吾職也然必使其費不糜於官不厲於民然後為美先是二衛兵士有僦民田以耕者其常嵗之租當輸逺倉而道里舟車之費率與租額相等公乃集衆而諭之曰吾將易而逺輸近倉使各省其舟車之費以為是學之資可乎衆咸曰善於是命所司收其租費得米以石計凡三千有竒公喜曰是足以有為矣乃度城之東南隅得舊官第為地若千畝用加構築命太倉衛鎭撫張贇鎭海衛百户王端崑山縣士民姜塤董其事復命主簿何寅總督之工出雇募力各自効財以估易所致皆良經始於正統戊午之秋落成於己未春正月其明倫堂則因官第之舊而加葺之乃若大成殿㦸門兩廡孝敬忠義二齋肖像之屬庫庾庖湢之所皆從創制及其成也二衛子弟俊秀之來游者恒百餘人師有教授訓導而訓導羅英祖實首至焉贇等以為兹學之創建皆周公主張以成之恐嵗月寖久後之人或莫知之遂相與謀而徴予之記於乎學校之設肇自古昔文武一道豈異習乎洪惟聖明在上廣開庠序務欲四海九州無一人不游於詩書禮樂之場以敦篤孝弟忠信之行而致夫雍熈泰和之治也二衛俊秀雖出於操戈擐鎧之族今也得依夫子之門牆挾䇿以游接席相講皆得以明夫修已治人之方而不昧乎尊君親上之義他日舉而用之文事武備無不得其宜矣是盖聖天子教養之盛心而可不知所自哉雖然斯學之建朝廷之恩厚矣向非周公能欽承而致所區畫之良其學之成有若是之易乎周公之區畫固良矣茍非贇等能盡其力於下則學雖建其於殿堂齋舍百物所需有若是之壯美而畢備乎究其所存皆在於深體朝廷建學育才之盛意而克盡其心也予故特為之書使後之來者有所考焉鎭海太倉衛建學之碑沈魯宣宗皇帝臨御之七年詔天下增建學校廣育賢才將以光隆皇祚益昌文明之化是時鎮海太倉二武衛城守要害以控制江海生齒繁而俗狃於悍其子弟願學雖衆而不能自拔也有𨽻戎伍者査用純以故宋文廟尚在乃奏得請於是有司復命委鎮海衛指揮武政太倉衛千户沈暹覈之適巡撫侍郎周公忱視故址湫隘不可為遂徙舊廟於元之海道萬户府闢地方廣前後臨渠渠淤復奏濬之以利舟楫而中創為學宫厯十科士由之登清要著聲績魁多士於南宫者咸有其人庠之士徐龍金瑢楊星等曰用純有創始之謀盖追紀其實以勸士之崇右文教者則為伐石徴文將勒之㦸門之下予乃言曰昔魯侯以泮宫發頌齊宣以稷下垂聲夫何王景略之雄傑輔世而陽平乃以擅興見劾向非髙子伯之忠言則猛不聞其過而勸懲之典遂缺彼偏據自雄附登記載之國固非所以擬倫而重光奕葉之世絃誦之聲相聞於八表而瀕海之民寜不被聲教耶予為表而出之太倉鎮海衛學題名記李亨天順改元總督揚州等處都督僉事翁公紹宗駐節謁文廟見科第人物題於堂壁曰賢俊登庸國家盛事置之何畧當宗太學勒石以耀久逺遂屬鎮海衛指揮武政董其事浹旬而告成乃命書其名以志之夫衛學之設往古所未有也肇自正統之初凡軍衛於郡縣相逺者則建學立師以教武弁之適庶與營之俊秀以資任用迄今二十三年嵗大比賓興賢能厯科不乏衛學非古所建而古教大行教之所行道之所在也時維甲戌朝廷用臣亨所言許民宻邇於衛者偕得就棫樸之美是以由科第而涉廟廊者彬彬輩出向非建學以教之則安知文武一道並行而不岐乎雖然昔由科目以享榮名者固尚矣必如陸宣公所云上不負天子下不負所學之言庶不負題名之意太倉鎮海二衛學正統間巡撫周公忱始建至𢎞治十年設州乃改州學太倉州儒學記祝允明初兵部尚書徐公晞言天下武衛無有司可附者得輒立學校便詔從之正統戊午太倉衛士查用純以衛與鎮海之士共守一城請如制合建一學報可巡撫周文㐮公忱董其成張内翰益沈處士魯記其事𢎞治十年丁已昉造州緒正百度學制隨以更初守㐮陽李侯端為之補缺飾弊又添闢仁惠齋事事維力他日學正甘君澤等請於侯委允明記之惟天下之治在君臣相遇其治之道一而古今用殊古之用人者二曰士曰民今之用人者二曰文曰武古之為學者由明徳知類由絃誦由諭教以及師旅獄訟之講習咸是出凡民之秀者業於是為士逮入官則文武具矣隨用以成勣其民則官者教而用之故於時文武不角立甲胄無専官由學校一地盡之矣後世裂而兩之茍可任五兵不必讀書為從政然其後也勢終不可若是以班故復為之齊量挈束文可縱武武不得以獵文如官之分典也六而兵刑各典一刑者小兵兵者大刑是皆武道纔萬幾一耳至鎮巡藩牧凡百有位孰不可執干戈以衛社稷若是者咸來自學校是竟不違先王之所以教也夫唯是所以教之地若術弗可異而文弗可以弗右聖人鏡機而操樞乃他術合於一右文焉勣庸以牧始時無學士就邑校以興洎學設乃彌盛於是文學政業詰戎祥刑麗六官㐮萬幾後先煒然有功稱其地與術較然著巳今更一甲子而學還文制聖人右文意愈至則士也將奮興鋪張鴻勲以稱聖人意也應復奚若詩曰周雖舊邦其命維新其斯之謂歟小子幸列下士仰沐皇澤敢不是贊凡宫類規度前纂有掲及陸大參容嘗疑所傳禮殿為宋故與學宮為萬户官第者當失實州志述其說矣維更制之間所以仍舊貫作新民承聖人意以通吾朝君臣間所相遇之機者厥功在當道昔季路將以民社廢學而夫子惡之兹又何敢弗著綱維者都御史朱公瑄彭公禮監察御史方公誌王公鼎劉公昺王公約袁公經郡太守曹公鳳及李侯端也叅佐其務者州同知周君明丁君隆判官陳君璽龔君詔黄君譲而典教席者甘君及訓導林君垍鄒君紈李君相周君幹云太倉州重修文廟記姜龍皇帝御極執三重以躋至治維九載庚寅詔以夫子祀典雖有厯代褒崇其像設儀章罔協於訓宜行稱號曰至聖先師孔子若曰與天地絜大日月比崇堯舜譲功者惟孔子則然萬世宗師以建人極自有常尊莫之與京非衮冕𤣥圭軒縣佾舞所能加重者也制下於時太倉州増修廟學適成太倉古婁地為吳附庸闔閭起南武城以備越盖邊境也自秦為縣未有崑山之名名之自梁始後或治馬鞍山陽升為州世有學宫以祀先聖先師元延祐間移治太倉始剙廟學既復徙而西學隨之國初建兵衛二以控東夷武備既張文教不無少弛垂百年間積靡漸涵日閑輿衛雖有良子弟無由自振以强問學勢使然也正統庚申尚書徐公晞上議天下衛所宜立學畧倣郡縣制朝廷從之先是耆儒沈孟温者通五經即東門塘之郤地為私塾以授徒綿蕞以祀先聖遂因之建學立官扳閭右之秀以充弟子員不數年文教大起或以其學淑鄉閭或以其文魁天下或風節動朝宁或廉孝名四海而拔茅彚征者相望先後蔚為東南名邦學校之功安可誣也𢎞治丁已都御史朱公瑄再議以太倉重鎮非州無以平兵農詔可於是裂崑山之東鄙傅以常熟嘉定地之近者别為治是為太倉州更命學官而廟學仍舊初守李侯端嘗一新之嗣後或飾或拓規制略備唯廟宇經始逼隘春秋釋奠尸祝之餘步或弗舒今守陳侯璜有事於學顧而陋之乃渙釣束之羨乃裒材木乃運陶埴梓圬畚鍤受直於官不以煩民輔以兩楹翬以前榮深廣視舊不啻倍之翼翼躭躭既麗且嚴明年辛卯落成祀事孔䖍籩豆式序禮成罔愆而士庶改觀耆老惟恐子弟弗預於斯其幼亦惟患父兄之弗我教也方來砥節挾能益挺益勵出賛治化者端不肇兹乎又鼎建啟聖祠尊經閣為泮池為射圃以次就緒舉其所重餘無可詳焉耳侯以司馬員外郎出守三年政成民安其惠他尚未遑學校是亟夫惠而不知為政古人病之如侯者其知為政也哉州博吳君大本率其徒之長且賢者陸賜王梁詣龍曰願有記以無忘侯之功龍故諸生也不敢以不文辭敬推聖天子崇儒重道之至意及吾婁有學之顛末如此是役也州貳姜君直楊君盛幕蕭君才用咸相厥成吳君暨其寀謝君詔張君東實親蒞之以上下其功焉敦事者士民錢模也凡得牽連以書於是乎記尊經閣記周廣嘉靖天子龍飛安陸修道立教以化成天下乃歲庚寅冬詔學校毁孔子塑像去王號減佾數以易木主觀聴一新祀典聿正先是我牧伯陳君佩之畱心首務則就闢廟宇疏泮池以仰契徳意又登州之士于堂告之曰大哉聖人之道乎秩秩乎洵帝者之制乎道載之經經以定制州學仍衛舊貫故無閣維閣載建兹將無待與爾諸士當知所尊矣尊經斯為尊孔子尊斯道以自尊道原于天具于吾人由孔子而上堯舜禹湯文武周公之治政教流行宰物經世由孔子而下七十子喪而微言絶大義乖六經之道棄如瓦礫而漢而唐而宋得周程張朱相與講求其義不啻如日中天江河沛地也以迄於今爾諸士當知所從事夫六經之道同歸而散見則異易曰時書曰中詩曰正春秋曰權禮曰敬樂曰和皆統於心此固孔子修明以紹往開來者患未有能真知而力行之以自尊耳今之士其髙亢者隨於虚寂次則溺於功利詞章其能約於中正和敬以趨於時而達之權者實寡也盖經也者常也萬世不易之常道也道率於性性命於天知性知天六經其筌蹄乎道之斯行兹將有待與矧天子躬行於上予承流宣化爾諸士其罔或弗恭以悖戾斯教諸士退相與語夫鄉之彦毛彦深彦深謂廣曰乃歳辛卯春閣成是盛舉也烏庸以弗記廣聞而然之亡何復走書南郡曰石己伐烏庸以弗書廣因以牧伯所以告諸士之言以告後之學者大場鎮重修義塾記王直大場鎮在嘉定縣東南六十里元有義塾邑士沈文輝所建中為殿以先聖四配十哲侍焉其諸賢象則圖於廡之壁有堂有室以為師弟講肄之所其制一倣縣庠而差小割田千畝收其租以供其祭祀飲膳之費謂之義塾盖當時所賜名而趙文敏公題其牓楊文安公為文勒之碑入國朝來田歸於有司師生無所仰給講肄遂廢迄今七十餘年殿堂門廡日入於壊㑹朝命下興社學民居有逺於郡縣學子弟無所受業者俾學於其中而大場鎮當有所建置於是里之士人沈軒以故義塾白於縣丞張鑑欲修葺之以教里中子弟而力有不逮時工部侍郎廬陵周公廵撫諸郡毅然以興學教人為務鑑乃為書請于公公為屬之邑令扆昭及丞俞觀等俾協力治之昭嘗為監察御史亦篤意教事經管規畫市材命工以正統八年八月興工越月而落成壯麗宏偉煥然一新里中子弟得受教于此而頌周公之徳與賢令丞之功不置鑑復與衆謀曰是役也不可無記以示乆逺乃因長洲縣學教諭蕭彦清求予為記古者二十五家為里里必有門門之左右為塾里之仕而歸者大夫為父師士為少師主其教嵗功方興凡子弟皆出學勤農事嵗事既畢則皆入學俾父師少師旦暮坐塾中教之以孝弟忠信恭敬遜讓年十五入小學見小節踐小義焉十八入大學見大節踐大義焉其秀異者則以次而進用之今家於是鎮者累百計非止於二十五為弟子者衆矣且其人多秀而喜文皆不以農為業頗得專志以讀書則學乎此者其成功當易於古人然予聞之師者教之本也塾既新矣將欲成賢才美風俗以稱修塾之意於師可不慎哉今縱不得志士之老者亦必求夫徳成行修之士為之師使凡學者自灑掃應對進退之節禮樂射御書數之文以至修身齊家治國平天下之道皆深究而力行積中而發外蔚乎其有文卓乎其有力始而為閭里之榮終而為邦家之光則於斯塾可無負矣初沈文輝之為此凡教養之資皆其所自出此義舉也故名曰義塾今猶為此名者周公以為興學以教人與人之勉於學皆理之所宜為不可緩也故云然然則師弟子者其可佚居慢遊而已哉太倉州儒學職官題名記胡相國家設天下學校而聨之以師儒之官凡府五人州四人縣三人衛二人於乎多矣非濫也盖風俗之美惡係人材之得失人材之得失係教化之盛衰是故我天子躬行教化於上又専命臺臣提督之又分命天下諸司贊理庶政必以教化為首務而天下師儒之官仰承休風亦與有是責焉故多設以廣教也且儒官之選首用㑹試中一榜者充之而歳貢來廷者天子必親覆試之見可焉然後用之慎厥選也選己又命天下諸司視學必加禮焉重厥責也是儒官者不為位卑而道尊祿廉而責重者乎受兹責者盖亦知所以自立矣先太倉以衛建學𢎞治丁已始立州因而改州學焉額設學正一人訓導三人自建學至今凡若干人今題其名於石予曰名紀於石非徒以不朽為可喜也夫亦可懼也何也諸生後或指其石而曰某也賢吾徳之某也否吾弗徳焉一言而褒貶以形不為可懼也乎固可懼也夫亦可喜也何也僚友後或指其石而曰某也賢吾仰之某也否吾戒之一覽而師資以寓不為可喜也乎知可懼可喜而後可論自立之道矣盖官在師儒職先教化鑒古範今惟義惟道不可以肆而怠者也矧名由石著行由名辨者乎知此義然後可以適道可與適道然後可以與立然後可以立乎諸生之上而期其有真材之出然後可以仰承諸司休風以少禆我天子教化無疆之意也是為記太倉州學𢎞治十年始立州知州李端因舊衛學増建兩廡嘉靖九年知州陳璜建尊經閣今學制左廟右學崇明州遷建儒學記張士堅崇明踞海為州民社屋宇簡朴隘陋俗勤生而嗇力時號易治惟學宫未稱屢有改作弗良於圖並海砂磧傾圮成巨浸州與市益徙以北官民居室庫廩有條有紀徳化沾溉日加殷庶焉達嚕噶齊唐古特氏巴哩顔公知州程公世昌率耆儒徐元鼎朱禎等謀曰孔子之道覆載萬世無古今遐邇所在有學我國家尊事之典視往代特甚窮鄉下邑猶有一畝之宫以備絃誦今州北遷奠厥攸居獨廟學未有卜固吾守之不任亦二三子所當用心也元鼎即捐地十畝亢爽者為基二侯割已俸資選木石材匠剔蠧拉朽益新採堅學正任克明與朱禎等實相經營之工始於至正十二年秋八月至冬十二月告成殿宇門廡雅合法度齋堂庖湢聿佐舊規籩豆圖像丹堊髹漆弗侈而章釋菜落之神人懽慶里人楊文驥來謁記故不可辭夫學校之設非若布帛錢穀尤切於民生日用自天子至於庶人孰有不學而知不教而成者耶綱常之本風化之基漸摩淪浹非日講於學民何從知之乃者四方多壘烟塵所襲潰裂奔竄乞為俘馘之不暇其在承平時有司視學事為迂緩漫不加勵竭力致身之學素晦弗究故也二侯深惟體治之要愛州之人垂教於無窮長育材器以忠孝立節豈特鄉閭之賴為邦家之榮是所謂知所務矣乃作詩曰東海之墟生聚日繁沙滷流移不遑永安比遷既寧民社攸塈維兹廟學風教所係二侯倡之和者躍然神奠廣居瞻企肅䖍叙秩有常講肄有堂良士之願賢侯之光振振二侯教養孔宜勒詩於石後人則之賜進士及第承務郎翰林修撰同知制誥兼修國史院編修官張士堅撰崇明縣廟學記徐有貞成化紀元之六年崇明縣新修廟學成乃秋八月上丁既釋奠於先師其教諭武平胡泰司訓餘姚李居義宜陽王巗率諸生陸孟剛等具是始末來曰惟兹廟學之新實今知縣事廣信汪君士達之績也願有記今天下惟崇明新建邦其始本海湧之沙也沙積而土乂焉土又而民聚焉民聚而官興焉然在唐為游徼之鎮在宋為𣙜鹽之場時猶未入職方也乃自元及我朝始為州𨽻揚於江外今為縣𨽻蘇于畿内眎江外縣為重矧殿國艮維鍵制海道其重視諸赤縣又加焉故雖一邑而常宿重兵守之地既重則官守亦從而重然以沙塗之壤中海而居風濤之所齧蝕蛟龍之所齚齶靡有定時故自入職方以來僅二百年而城治之徙者三矣城治徙則學宫亦從而徙焉盖地之勢北髙而南下故徙而益北至是垂六十年而民無昏墊之虞城守則可謂固矣而學宫則或成焉或毁焉成而毁也則易毁而成也則難城治任在守令得自為也學校任在教官而教官不得自為為之亦在守令爾然自洪武以來為令於斯者厯數十政矣而其於城治於學校為之而能成之者惟前令永平王允威及士達耳盖二君皆名進士也允威以才猷治行累遷郡守方伯至都憲自其去崇明後又更數政政龎事隳迨兹由士達振之士達才猷治行與允威槩同而勞績加多其為之成之不惟廟學而廟學尤其用心之至者也若大成殿若明倫堂暨西齋則因其故而葺焉者若㦸門若靈星門暨學宫之門若兩廡則拓其故而造焉者若廟之神厨及牲牢之所若泮池及池上之橋則皆故所無而今鼎建焉者若諸生之號舍僅數楹今則益而廣焉至二十餘楹學宫之牆故卑且隤幾無完堵今則擴而崇焉為周垣至八十餘丈廟堦之前隘且弗嚴今則闢而為之衢道中衢立科第題名之榜而以禮門義路别左右焉規模斯壯氣象斯新士之游居者為之興其志趣徃來者為之聳動乎觀瞻斯以盛矣及其治事之餘時造學中相與課程諸生又延禮鄉賢翼而迪之凡可以䇿勤勵惰者罔弗盡其方此吾徒所以願記其績者也至若崇明之地故土壘也今則甓而堅矣社稷諸祀故荒壝也今則坦而肅焉縣治故無譙門則作之門海航無艦則作之艦涉川無梁則作之梁自郡使者之署及屬官之廨無弗飾焉此又通邑之人所以願記其績者也予聞而嘉之夫邦新造則難乎治兵民雜處則難乎化於此而能治能化其餘其無難爾矣昔范忠宣公之知襄邑也自公守學校至倉廩一新焉擇賢以教而時躬勸學者宋史美之至今有耀也士達其聞忠宣之風而興起者歟使繼今日往日加懋而弗己則其功名事業豈惟儷美允威乎將匹休忠宣矣此予言所以為士達發也若夫講道之功成材之效則在諸為師生者懋焉於是乎記成化庚寅秋九月十有六日光祿大夫柱國武功伯兵部尚書華盖殿大學士東海徐有貞記崇明州學先賢祠堂記楊維楨崇明州通守張侯翩遣邑士秦約來致其言曰世教莫大於道統自周程張朱先後輩出而衍其傳然得二程之傳者龜山公也得龜山之傳而啟朱子之學者羅李二公也聞濂洛之學而貽南軒之傳者胡文定公也得朱子之傳而表章其學者西山蔡公勉齋黄公九峯蔡公也廓朱子之學而見於事業者真文忠公也八先生之真履實踐皆足以紹往聖開來學其植立世教之功大矣濂洛諸儒已得從祀廟學而八先生者曽未與焉謂有司之缺典非歟於是白於上府上府允之又以邑之先儁時齋李君孝友秦君配八先生之享今年秋丁肇行釋奠祠雖有堂而嵗月未紀敢請子筆之石予惟唐虞夏商周孔之聖顔曽思孟之賢以至濂洛諸儒下及八先生者其道相繼其學術相仍而徳業相肖上下三千餘年之一大源委實天運之所係世道之所闗也國家廟祀之或缺者京學有所未講而侯能於海陬之學講及之一時鴻生碩儒其負媿也多矣矧又能尊奨邑之鄉先生如李如秦者乎吾聞李君操履純確其施之於家庭閭里之間允為可法秦君與其先月山公皆出於蛟峯方先生之學方先生出於朱子父子淵源統緒傳之先覺淑諸後人者焯焯未冺也侯之尊奨為不誣也於乎大道之行天下為公初無古今之異貴賤之等前聖後賢所以得與廟祀之典而物議不能非者亦以其道之傳者異世而同符也侯之是舉豈惟知教之本而繫諸天運世道者其知所講矣孔子曰文王既沒文不在兹乎吾於後之繼先賢者亦云侯字翼之理齋其自號清河大族為政専尚風化其學一宗濂洛云至正庚子冬十一月乙已李黻牓第二甲進士奉訓大夫江南等處儒學提舉㑹稽楊維楨記崇明學在州治之崇文坊宋嘉熈間奉使趙崇侯建書堂元升為州學泰定間建殿堂齋廡未幾壊於潮至正間乃遷今地國朝洪武二年改為縣學宣徳中邑人給事中彭仲玉為置祭器成化二十年邑民傅謹捐貲建靈星門以石今制左廟右學蘇州府社學記徐有貞言吏治於三代之下而能以教道為先務固君子之所為也然知此者鮮矣若吾郡太守朱侯其知先務者哉初侯之至也既行三學率儒官敦教事則又以謂古之學者必自小學而入大學䝉養既正而後進之以成徳故其所至之大非後世之士所可及焉今三學之官之所施者固皆大學之教也然鄉校不立小學教弛士業失序躐等以進安望其才之古若也圖所以立之其責獨不在於為郡守者哉乃行視郡城清嘉坊之東有地焉負隂面陽據爽塏而臨髙明卜之食諗之地主繆賢氏賢固善士亦樂以為學宫也遂獻之侯乃鳩工庀材審方定位中作講堂旁闢兩齋又相其左建祠以祀先師朱子而以鄉先生之應從祀者配焉繚以周垣鍵以重門廩庫庖湢無不飭具經始於正統丁卯之秋落成於戊辰之冬禮聘聞儒陳寛孟賢鄭鏐徳輝以主師席選長吳二邑䝉士之秀者充弟子員而教之遇三學之士有缺員者則進其良以補焉侯於臨政之暇輒至學引師儒坐講堂進諸生親課之以故民間俊秀彬彬焉興於學有古鄒魯之風於乎侯於是可與漢之文翁唐之韓愈宋之范仲淹異世而同功矣或乃以為迂濶而不急於事非也夫事立以賢賢立以教茍不知尊君親上之理而求其仗節死義之行烏可得哉故當經綸以濟世務必明義以正士習君子之為固異於衆矣吾故以侯為知教道者侯名勝字仲髙金華人也以經術進由秋官主事遷郎中尋奉勅出守武昌郡徙吾蘇廉公明恕有守有為盖無愧古之循吏即建學一事餘可以類見云洪武八年詔府州縣每五十家設社學一本府城市鄉村共建七百三十七所嵗久漸廢正統十二年朱守勝乃總建一所於清嘉坊東雍熈寺橋西選長吳二縣民間俊秀子弟教之東陽義塾記鄧文原嘉定𨽻吳為州俗以居積尚贏富幸嵗豐收惟有司繇征是急故每不暇以詩書絃誦為事沈氏居是州之依仁鄉家乘肇自五季以儒聞今忠翊之父仕宋尉安豐之霍邱欲倣古為家塾以訓鄉之子弟庶甿俗尚有勸也不幸賫志以殁則囑其子武畧曰爾兄弟勿忘吾所欲為者武畧又卒忠翊續承其父若兄之遺意乃卜地舍兆周視亢爽為屋三間以象先聖燕居四賢配侑修題敞庭登降嚴翼重門在其南中為方池成梁其上堂在燕居北不庳不踰朋習頥養悉此焉堂西有塾師之舍其東為庖西南屬於兩廡為齋四曰志道進學觀善時習延禮訓導二人以佐塾師又設長是齋者二人分小大學以闡教事買田千餘畝在塾西畦有蔬廩有藏羣聚所須靡不畢給經始延祐乙卯十二月閱七月落成有司狀其事以聞中書表其門曰義塾又八年為至治壬戌忠翊介其友俞觀光走書京師謁余文為記余曰古者二十五家為里則有門側之堂大夫士老歸於鄉曰父師少師以教其鄉之子弟春出東作則里胥鄰長坐左右塾以知昏昕墮勤之節讀書力田道不相悖至秦發閭左之戍而教始大壊然春秋距古未逺己有欲毁鄉校不說學者豈王化陵夷固有漸歟吳自太伯以禮譲為國迄季孔而遺風未冺吾夫子亦以習於禮許之及聘魯觀魯樂皆能因其音節審知興廢盖前是風雅頌吳未有聞也若楚左史倚相之於三墳五典九丘八索晉韓起之於易象魯春秋當時他國卿大夫亦多未之見後世易詩書春秋之文盈四裔而來學篤好者盖鮮豈常人之情忽常生於所易哉吳距魯可一葦航也學於聖門者惟子游一人又能以教施之武城而武城大治若子游之賢信自拔於流俗者士茍志於道信其異乎今而同乎古矣今子弟之藏修游息於斯者勿習於紛華而謂本質為已遷勿競於聲利而謂貧賤為可厭勿謂淫辭詖行為可惑世而正路之不由勿謂小徳細行為不傷己而屋漏之弗戒孟子論友自鄉而之國之天下又尚論古之人誦詩讀書而知人是則沈氏自霍邱以來建塾之意也霍邱諱躍龍武畧諱雷奮忠翊名文輝與其兄武畧俱以航海給餉道論功佩金符千夫長而忠翊益恬於膴仕以上成先志且將庋書結樓其後自始建塾武畧之子鈞既躬其勞復撥地以益之蔡昇劉瑞張瑞亦相協厥成觀光名長孺好修士也今為塾師云崑山縣虞浦社學記王鑑之天下之事毎成於所易而敗於所難盖是非難而敗也處者難之而後之以難膠焉天下之事蔽矣惟知者以無事應之事且理心逸而功倍是故水一也懐山㐮陵滔天鯀治之難逆而塞焉績用弗成身且殛禹治之易順而道之地平天成萬世永賴此大效明驗也𢎞治紀元聖天子嗣極思與天下更新始用大臣言毁天下淫祠復用諫臣言立天下社學朝廷意向異端與吾道正邪消長之判豈細故哉惟時守令愚者惑於禍福暗者昧於意向怠者憚於更張舉諉之曰難可革者因可張者弛方命圮事余竊病焉崑山尹楊君名甫始得㫖輒曰此明天子大意向所在斥異端崇正道撥亂反正之幾有造化存焉者吾能奉詔遂徧籍治内無額寺觀菴院得一百有十以朝廷意諭士民毁諸佛像散遣緇黄之流各歸其宗不易植不改垣因其宇而變其制中貌夫子像旁建社學選幼民之俊秀立行藝師而教之朝夕謹肄其中不旬月間絃誦之聲四達士類驩然以為成周之化復見於今日而君處若無事然未聞以難告也今年夏君懼繼者弗處必有惑亂變遷弊介予同年秋官員外郎管君儒珍來請記以垂永久且示戒焉仁人君子用心故如此維三代佛法未入中國之時上自王國公都下及閭巷莫不有學以陶養斯民無有邪慝汨昏其間故民敏徳咸迪厥正治效易彰自東漢永平中佛法倡和以因果報應之說惑衆愚者篤信而吾道始病衛道者恒攻之不啻千百喙然愈攻愈熾終不能撲其焰者徒以口舌爭之也今幸聖明在上天縱神知袪漢唐之惑以復三代之正拔本塞源用韓子廬其居之術潛圖消伏成百世不易之良規楊君首能奉順旬月之間以正易邪無智名無勇功而事告成績傳所謂君能制命為義臣能從命為信者有司之良疇能出君之右哉余職斯文寄者樂觀其事且重管君之為請也亟書以歸之俾刻諸石後人慎毋替楊君意俾永永無愆庶幾善繼者茍或不然國法具在戒之哉君名子器丁未進士在職清謹六事具舉此其尤美者風紀司累以君政績論薦將有大用云大明𢎞治四年歲在辛亥秋九月朔旦賜進士文林郎江西道監察御史奉勅提督南畿學校山隂王鑑之撰長洲練氏義塾記宋濂皇上建大號之八年以為天下既已安輯而化民善俗之道猶有未備乃下詔郡縣凡閭里皆啟塾立師守令以時程督之於是雖窮鄉陋壌莫不有學吳郡長洲縣之尹山民居繁庶習俗嗜利久不知教有司偶遺不舉大姓練壎自謂其父文達由睦來居嘗有志而未果今明詔如此而塾不時立恐非朝廷淑斯民意乃與弟篪謀夷土治材作堂三楹以為講習之所旁為室以供寢處庖湢延儒士髙平范煥為師俾里中子弟就學焉割田三十畝以食之始以洪武十一年正月越七月而成具以其狀白於縣若郡郡許以為宜壎乃遺書來請文記成績古之為治者其法雖詳然不越乎養與教而已養失其道則民貧教失其道則民暴貧則流而為盜暴則去而為邪二者皆亂之始也是以先王重之二十五家之閭必有左右塾塾必有師師必以仕而老於家者為之故是時無不學之民無無塾之地無邪僻淫靡之俗刑罰置而不用亂亡無所自而起其後强大諸侯欲圖得志相與毁詩書六藝之籍使其教壊而不行然尚踰數百年而後絶一民不忍叛其上教之足以感人若是自秦以降無教者亡有教者存得其道者盛以延失其道者衰以促千載一軌也皇上奮然憫前代之失大設學舍以教之欲使海内之民皆沾沐禮義此與先王之心何異壎非有化民之責乃能以淑其閭里是圖豈非君子哉君子之所為貴乎可法於世他日三呉巨族人人䏻竭奉上設教之義以化其閭巷之民閭巻之民皆知尚禮義恥犯法如成周之民盖將始於兹乎姑刻其事以俟同里社學記呉江之東有市曰同里舊設徴商之署邑大夫金侯請諸朝罷之因其址以建社學𢎞治八年春命里人顧寛董其役越三月學成壬子侯帥博士諸生與大夫士之仕而歸者造而進之釋奠於先聖先師禮也事竣大合樂以落成之邑人史某請紀其事俾來者知作之所始其辭曰維兹同里距江帶湖聚落㕓居實盛於厥初商貨駢臻肆為賈區開局置吏以籠商稅匪曰利之抑末攸宜盛衰靡常日就於涼昔焉貨藏今焉牧場昔焉貿舍今焉草野凡厥吏胥求濟其稅率羣行􅇯日罔於利抉剔剗刮利盡商敝川舟斷行市肆盡閉公私交病㒺有攸濟維金令君聿有隠憂謂此不去民病曷瘳告於御史御史韙之以聞於天子天子曰都維爾言是俞乃省吏函章還之於京以其廢址俾作學宫繚以周垣奠以講堂門廡齋舍靡不中程爰聘儒先以食䝉士俎豆於是詩書於是誦聲洋洋禮容蹌蹌侯來視學逺近咸作觀者從之填郛溢郭謂昔之地惟利之計析錙較銖如火之方熾惟吾令君是艾於今兹邦向義之方誦詩讀書如水之成章惟吾令君是營呉江洋洋特此一方專而不咸民䏻無望我告言者侯將徧舉舉必有初繼之以序伐石鐫辭其放於兹以無忘緝熙侯名洪字惟深世家於覲呉都文粹續集巻七
