body:
  text: 吳都文粹續集巻三十六明錢榖撰橋梁文學橋銘黄士毅魯鄒而降道為絶學千五百年起濓續洛寥寥閩派久幾復絶再起滄洲教脩日揭無極二五在人一源故不同地時生聖賢吳通上國公即㳺魯胡然歴世莫踵公武覩跡亦昧吁方肇祠是用作記意嚴洒譏嗟予小子世閩産吳敢誦所自滄洲之徒登橋而思刻銘述記期我同心如水洊至能令後學本末易明偽行不作踵公自今文學橋在縣治東北子游巷口舊名言偃橋又名醋庫宋慶厯五年録事夏秀建國朝初里人陳貞重建重建跨塘橋記曹緯琴川去京畿八驛而近境大壤平舟車走集東吳之望邑也東吳澤國千涇萬瀆悠然逝隤然止而皆渚於三江浮於震澤縈帯而下至琴川分為五浦而後入于海其經絡於闤闠之間旁注而側出者乃其一也舊有橋曰跨塘凡迎肅朝廷之命令接勞四方之賔客摩肩總轡憧憧於逵路者莫不由斯嵗籥綿稔雨澇衝毁來往患之邑人欲更為石梁久矣上之人獄訟是務踵武怗視莫肯一屑意淳熈癸卯邑大夫曽公為政之明年也嵗物豐成閭里康阜縉紳父老合辭以請公曰衆之所欲茍憚其勞是委民寄於草莽也其可乎然役鉅費夥非號召能集要當以身先乃出公帑之餘為之倡於是逺近士民靡不感動協議畢力克伸僝功故材不賦而美工不發而多曽不踰時汔奏成績公謂是橋之新也玉虹蜿蜒直縣數百步寔東西取道之首一境阡陌之㑹名不可以不稱乃以邑之地名之曰琴川自公改斵蒼珉結址盤固而高廣有加也登焉引目則千里在睫晨霏夕靄春穠秋瘠征帆飈見飛鳥明滅瓌竒萬態間見層出騷人高士過之心景宜㑹則停驂嘯傲躧步微吟江山之樂自適於意之表雖簪纓之風䑓月榭仙釋之紆巖繚壑兼得之也真所謂處喧囂而接遐曠者歟何向晦而今顯自非公之精誠逸韻其能經營裁畫之如是邪且橋梁之興廢先賢以是觀人之政豈細事哉子産以乘輿濟人於溱洧而孟子譏其恵而不知為政公成梁於暇日民無褰裳濡軌之患過子産逺甚濟川之功兆於此矣公天資純粹以文學世其家於書無所不窺施於有政則應機立斷鈎隐察伏洞見精宻而歸於忠厚凡民五過麗刑缿筩投詞有至于庭者涉筆批解而人無不得其情不以吏追民不以政為吏設施見於日用者先定其規模而後從事庭廡肅如也至若通漕渠而賈艦得以貿遷浚福山白茅二浦溉荒蕪為膏腴興學校而子弟知為善之可樂若是者未易一二而詳大凡天下勝處非人莫傳滁山之林泉以醉翁亭而傳西湖之景物以蘇公隄而傳此橋以公之善政遂為一方之超觀将振耀而傳無窮也邑人求文以識其事公之治績赫赫不可掩何待覼縷哉盖人之向慕傾戴而不足者非刋之金石無以垂不冺而慰後人之拳拳也故為之書吉州司理叅軍曹緯記跨塘橋舊名信義在縣治直南宋淳熈十年縣令曽棨建韓氏修造橋梁道路記桑悦天下之事成於義而敗於利義之為字一而己矣視之無形求之無跡頹宇遇之巍巍翼翼曲路得之平平直直城池傾圮有之則飭廩箧落寞值之則溢我為則勇我戰則力大至為臣死忠為子死孝扶天綱立人極義其可少之邪是故事以義成不犯五刑物以義得不勞神力交以義結窶賤不絶甚矣哉天下不可無義也練川之婁溪有故家子韓君玞字良玉寔魏國忠獻公後平生讀書仗義年至六旬顧後無繼因慨然曰吾蓄之富聚之則利散之則義可不為濟人計邪顧婁溪至邑橋梁俱有未修民或病涉邑侯青城孫君璽以名進士宰本邑政通人和百廢具興兹橋心懼煩民尚未之及遂捐已資自韓涇新圑涇譚涇周涇新漕涇袁涇俞項涇莊涇孫涇為橋者俱以木易石足為久逺計共費白金數百兩又造北門城隍橋及砌婁溪街三十丈皆垂成初橋成孫侯申文欽差工部郎中傅公潮大加賞嘆批答云一毫不預慨世俗之可憎九橋連修覩斯人之獨異又曰與其厚之以幣孰若華之以文用旌尚義之賢并作守錢之戒令侯備綵帳俾縣教諭周成彰之以詞併侑以羊尊侯親下其廬鼓樂前導輿從塞途光輝滿路里巷之人無不榮之夫橋之成道路之修使出於官所損不知幾家所刑不知幾人良玉以獨力成之於鄉之人前無所損而後有益是豈易得也耶夫藏經有曰積財不施者自己無分五家子有分今良玉以五家之物為萬民之利所得不既多乎良玉素以乏嗣為憂橋功之就即産一佳兒名錫有符孫侯昔日奨諭之言他日見之成立而閲諸橋或期駟馬之過或詠青龍之現必有待也余以文字為職業因為記其事即可勒之於石以垂永久諸橋在嘉定縣常熟縣新建迎春橋記王宗錫常熟縣治之東南路接崑山太倉為縣通衢舊有橋以木為之易於朽腐修理維艱自吾邑侯下車之明年政事以和即興廢舉墜凡學校城隍廟以至諸司公廨東南濟農諸倉悉一新之因念橋之頹圮行者病涉且慮木之不能久也乃易以堅石申請於今總理河道工部正郎傅公躍然曰此誠經久圗也即命以行於是召匠計之仍命義民唐政侯珮瞿旭董理其事經始於𢎞治己未六月十五日落成于十一月二十八日未幾橋即巍然煥然如長虹駕空見者驚喜橋之麓多侯姓舊名侯家橋邑中積嵗迎春皆從大東門地頗近北外有觀音堂甚卑隘不堪即亊攷之節令春從東方來非北地所宜况官吏師生糧塘里老以及通縣旄倪羣聚而觀地不足容邑侯因易以東門總收倉場即事畢經行此橋其地寛其方正父老歡呼咸曰百年因襲之弊一洗而新之遂改名迎春橋傅公又曰此盛事也不可無言以記其寔邑侯與諸僚佐謂予染指卜商之學徵言志之竊惟鄭子産以乘輿濟人於溱洧孟子譏其恵而不知為政若此橋之建舉之者邑侯也成之者傅公也二君子存公平正大之體而有紀綱法度之施所以集此數百年之事功不煦煦為仁鰓鰓為恵利澤及人真可書也他如福山唐墅小山湖橋皆常熟要津舊悉傾圮侯復次第鼎新均未有記亦缺典也兹併入記中以見侯之恵澤如水行地豈特一橋一事己哉邑侯姓楊名子器浙之慈溪人以名進士起家授知崑山高平常熟三縣今應召而起大用有期傅公名潮江右新喻世家奉命東南大興水利功業未量若治農官趙祥縣丞張翰楊明主簿郝尚質董資皆能贊襄惟謹可以書矣嗚呼後之視今亦猶今之視昔繼斯邑者尚當勿替引之是為記迎春橋在東門利往橋記錢公輔出姑蘇城南走五十里民屋數百間蕞然沙渚之上者今吳江縣也東湖之流寔貫城之中隔限南北横可以渡者今吳淞江也隐然長虹截湖跨江便來濟往安若履道者初作利往橋也橋本無有慶厯七年冬大理寺丞知縣事李問縣尉王廷堅嗟邑民之陋鮮慕學者将改立至聖文宣王廟侈大黌館以進延諸生呼富民譬曉以奉釋氏不若助縣官興學民始聽且駭居一日心曉意解歡然從命遂輸緡錢數百萬未幾詔禁郡縣不可新立學二人胥與謀曰民既從財既輸矣倘不能作一利事以便人吾何以謝百姓遂合傭僝工橋役興焉東西千餘尺市木萬計聞者異之沮議百端不兩月功忽大就即橋之心侈而廣之構宇其上登以四望萬景在目曰垂虹亭並橋之兩涯各翼以亭而表橋之名於其下使往而來者可指以稱曰此某橋也初縣城為江流所判民半居其東半居其西晨暮往來事無巨細必舟而後可故居者為不利縣當驛道川奔陸走者肩相摩櫓相接也卒然有風波之變則左江右湖漂泊無所故行者為不便及橋之成行者便而忘向所謂不便居者利而忘向所謂不利議者皆舌強不敢發噫賢人君子措一意興一役豈直為游觀之美登賞之樂哉往往有悦其景物清絶脱落人世者若居之利行之便則茫乎其莫稱也雖然湖光萬頃與天接白洞庭薦碧雲烟戰清月秋風夏囂滅埃斷牧謳漁吟喑嗚間發榜聲棹歌嘔啞互引後盼前睨千里一素是亦有足樂焉庭堅之字曰世美精敏沉毅顧其胸中不止乎佐一邑李丞仁厚通雅喜其有能而信從之視事幾數月塗巷室閭斬然一變若是橋利大功博可傳可記者餘固不可以一二書也余觀今世人平居燕議時孰不欲求位以伸道試縻以一職則曰職小位隘吾無以伸惟齷齪奉法保己之不暇若世美盡力其任不以小隘自繫者余未之見也始則欲設庠序恢教本使民知堯舜周孔之尊及詔條尼之遂能合財力興功利為永久之便其周旋進退無一不中於道噫豈常人而能至哉世美余友也欲余之文以信本末余嘗學春秋太史氏法乃書曰慶厯八年六月二十八日蘇州吳江縣初作利往橋成吳江州重建長橋記袁桷震澤東受羣川汪洋巨浸至吳江尤廣衍地為南北衝千帆競發駛風怒濤舂激噴薄一失便利卒莫能制唐刺史王仲舒築石隄以順牽挽宋慶歴八年邑宰李某始建長橋由是各捨舟以途來往若織水嚙木腐嵗不一葺葢為民病泰定兀年冬州判張君顯祖始涖事曰兹寔首政稽工程財莫知攸出當茂於民民有調役惟浮屠善計度長衢廣殿瞬息以具吾語諸衆有獲廣濟僧崇敬寔來敬言木為梁弗克支逺易以石其迄有濟參知政事黙古斯以督運至吳乃采其議周詢以籌首捐資以勸敬復曰作事謀始不可不慎有善士姚行滿嘉興人能任大工役必屈必委繪圗相攸經畫畢具咸服姚議於是參政委郡守郭侯鵬翼役未興丞相達爾罕公朝京師回道由吳江郡白橋議丞相曰吾必首倡即捐萬緡而府縣士民相胥以勸平章高公貫乃由湖廣江西來江浙乃属張均俾終是工杜侯真來守是土亦曰張之言然二年閏正月建橋明年二月橋成長一千三百尺有竒揵以巨石下達層淵積石既高環若半月為梁七十有二釃以剽悍廣中三梁為尺三百以通巨舟層䦨狻猊危石贔屭甃以文甓過者如席舊有亭名垂虹周遭嵯峨因名以増榮觀焉是役也敬師鳩徒輸財寔三之二贏財十萬復以為寳帶橋助姚總其綱張均首議出于政事有脗合而是州興役見知于丞相誠出大幸厥今運舟相聨驛使旁午咸曰丞相謀猷經逺張均美績由是得書将永無極繫之以詩茫茫禹甸昔隣于魚維四載功兹為具區有失其防群嗷喁喁曰維李侯構兹虹梁經始孔艱任負揚揚嵗老石泐臨履若驚張侯涖官飭我初政曰兹橋匪修涉者益病召維耆老貨布莫竟相國之來六轡徐徐詢行審宜以究以圖割其民錢俾民樂輸橋既成矣虹飛于江千柱承宇群流廻矼儼予層城爛其軒窗張君籌思相國成之彼清淨士式克承之千載永頼庸以銘之吳江長橋銘有序釋大訢泰定間鹽官海溢江浙故相托歡公憂之有禱於天竺山謂予言比過吳江見僧作長橋不煩於官而工敏于事吾以萬緡助之又閲諸郡志若橋井道路昔之人悉委之僧豈僧有才智而不如耶吾以海患國縻其費民竭其力閔己之勞而羨彼之有成功也予復之曰古之繕修委之僧者非其才智有餘恐吏縁奸而工若賈不盡得其宜故託之僧亦權宜爾且事有人力而成之者有修諸人而仰成于天者是不可㮣論也今言者方興水利地道不寧公能用葢公之言治以清淨使民自安而何有于繕修哉公曰然既而政化大行言水利者亦罷而海循故道矣中外望公如曹參以相齊者相天下而公遽薨惜哉時公所見作橋者僧從雅師立總其役崇敬率衆以給其費居士姚行滿任勞以終事叅政黙古斯州判張顯祖倡義以贊成之橋若干尺費若干緡經始于泰定乙丑二月期年而成後九年州守徳濟哈雅作鉅閣奉觀音像于上以師立之徒永福居之復置田以繼其食他日從雅求記於予予以雅嘗從中峰于天目宜宏其教以拯夫三界之昬墊而為井為梁為筏之諭且不可得况拘拘從事于木石哉雖然道無不在為與無為中峰之教人如是崇敬敦篤好義度量廓然嘗交于予予又受知於托歡公故追憶其語而記其事系之以銘銘曰國之食貨資於東南郵傳星馳朝吳暮燕萬艘千騎水陸㑹同昔危而安今絶而通巖巖之石我礪我砥孰先履之相君至止君之憂民如援其溺輔以吾道乃煦乃翼天嗇其施天下痛之我心匪石敢負所知霖潦夜驚鼉吟風作我安如山禪定寂若寂而恒用人躋壽域于以闡教于以報國重修垂虹橋記錢溥成化十有七年嵗在辛丑暮春之初重修垂虹橋成橋舊名長橋在吳江縣治東三里許泄太湖所滀三郡六縣之水注三江以入于海書所謂三江既入震澤底定是也然水無所洩必有震凌之患人失其濟必有阻溺之虞則是橋也寔據兩浙八閩之衝驛使檄遞者在焉南北興販者往焉葢要地也橋袤千有餘尺下開七十二洞跨鯨波之濶聳鰲背之峻人行其上苐見洞庭諸山出沒於烟霞縹緲之間而東駛諸海日夜不息此真勝境也歴嵗滋久崩隤日甚殆三之一行者病焉去年冬廵按御史高唐劉公魁過而見之召其治縣者修之工鉅費繁未易規復其邑有故義官屠晟之妻趙氏聞之撫其姑遺孤承宗嘆曰而父積鉅資以貽汝兄弟今汝兄弟己歿汝安能保其所有邪令孫壻周禋告于縣曰幸毋黷于官毋擾于衆願自為之庻揚夫名于不朽保㓜孫于有成于是縣達于公公且喜曰以一嫠婦若此非有烈丈夫志者不能宜令縣學官禮于其門奨勵之蘇衛指揮楊端董治之周禋則稟趙以酬應之鳩材庀工籌議克合乃出白金千餘兩經始於其冬不二月遄復其舊煥然維新乃請於公願立石以記述公曰吾聞春秋常事不書此修橋亦常事也奚容書獨以彼稱丈夫者多保利蔑義雖至死不悟而趙乃能之宜書以為積而不散者之勸趙亦遣禋謝曰婦人無聞惟公廵我東吳威聲義聞自足感人而興起焉非有所為而為之也余乃嘆曰此乃一事而數善并焉公能使民以義而加犬勸人之禮趙能捨財取義而存夫保㓜之仁况端與禋内外謀合上不負公之托下卒成趙之志皆得牽連書之使後之有事于斯橋者寧不視以為勸乎詩曰諸水牙湊滙成具區霪潦泛溢東海是趨輦石為梁横亘天衢軒豁呈露㒺測端倪垂虹中斷病涉艱虞繡衣使者不言自孚感兹孀婦善保其孤一揮千金惟新是圖坱坱修造廣袤範模龍翔虎伏玉砌金鋪工甫三月雨霽虹舒勢控山湖秀敓堪輿檄奏書傳如履坦途如矢斯直曽不少迂勒石告成有永不磨長橋王安石三江五湖口地與天不隔日月所蔽虧東西𣺌然白漫漫浸北斗浩浩浮南極誰投此虹蜺欲濟兩間阨中流雜蜄氣䦨楯相承翼初疑神所為滅沒在頃刻晨興坐其上傲兀至中昃猶憐變化工不謂因人力今君持酒漿談笑顧賓客頗誇九州物壯麗此無敵熒煌丹砂柱璀璨黄金壁中間不慮始助我皆豪殖喟乎獨不可還當采民力同前葉夢得長橋跨空水瀰漫北望登天去無岸洞庭自湧東西山驚濤忽起行人斷禹功十年在坤輿東南大浸惟五湖如何狂瀾不少限鐵馬萬騎翻長驅吳江長橋王令老匠鐵手風運斤一挾刃入千山髠明堂有柱不見用此為炎地猶濟人西渚巨澤江海通陽侯屢溺驚濤風當道獨能支險阻更東安得與天窮莫比垂天紳莫比跨地帶渴龍乾死苦無鱗絶海失舟踏鯨背秦帝東游逐仙跡絫重肉多飛不得二州水隔不到山借得紫虹千萬尺平時塵土埋英雄吾亦棄劍來游東欲觀水盡朝宗海安得身乘破浪風為約他年可歸處獨倚䦨干不思去季鷹范蠡不足竒待吾為誦歸歟句長橋吳及有客過津亭高歌願濯纓䦨干聚烟碧波浪捲秋聲蝀飲瀟湘渴龍游河漢横夕陽看不厭待看月華生夜泊垂虹孫元京螮蝀無晴雨横空不計年長身欺浪渺鉅力厭風顛懐古方聞笛題詩且住船飛鳴中夜雁何處得洲眠月下游松江垂虹亭登長橋夜泊南岸口旦㳺寧境禪院因成十絶呈君勉且寄子通朱長文綵衣幾度醉江濱今日重來淚滿巾惟有舊詩存屋壁豈知投老負垂綸前哲臨流猛拂衣身違憂患是先機非才自合居閒曠不泛五湖何處歸雲動鑑中䨇槳飛天圍林外片帆歸䦨干倚遍日欲暮坐看丹霞生翠微人爭軒冕安在哉我愛烟霞歸去來魯望有靈還見笑更回城闕戀塵埃兩山映日磨蒼玉萬頃涵虛皺碧羅不㑹樂天猶近俗謾将弦管雜烟波長虹稳卧碧江心夢寐頻游覺莫尋歡友相逢清絶處酣歌一夕抵千金漠漠秋烟羃故園沉沉暮色暝漁船月華未出詩翁逺樂事人間少十全銀潢倒㵼入滄溟身近魚龍夜不驚鳴艣飛空孤雁過漁燈照浦一星明僧舎蕭踈竹葦間開軒處處面雲山詩家不及禪家樂坐卧湖光百慮閒江裏鱸魚味不羶江頭酒美滑如泉長橋為席雲為幕秖欠洪崖笑拍肩同楊立之步月垂虹因寄章蘇州沈典永萬頃澄江白玉寒金波留影動波瀾明時難賦離騷事獨墊綸巾夜倚䦨踏翻鰲背歩徘徊萬里青山一鑑開欲醉餘醅弔清影自憐非是謫仙才斑葉愁隨晩葉凋天涯牢落一身遥慿君莫惜松陵月且借江邉照寂寥舟過垂虹何應龍垂虹橋下水連天一帶青山落照邉三十六陂烟浦冷鷺絲飛上釣魚船過垂虹姜䕫自作新詞韻最嬌小紅低唱我吹簫曲終過盡松陵路囘首烟波十四橋長橋玩月陳逺世間八月十五夜何處樓䑓得月多不及吳江橋上望水晶宫殿揖嫦娥長橋張元雲收霧霽水風髙百丈虹橋氣勢豪疑是玉龍藏爪距潛來江上看波濤萬頃平湖水接天湖光天色逺相連虹蜺截雨歸未得横在波心幾十年記得當年過此橋月明江上暑風消而今重到經行處空有湖光伴寂寥垂虹晩望僧晦巖老眼青青望洞庭虹垂斷岸月初生滔滔橋下無情水不為吳王洗甲兵垂虹橋沈清女晚來移棹泊垂虹閒倚篷窗問釣翁為甚鱸魚低價賣年來朝市怕秋風長橋揭希韋䨇虹鎖湖湖水長影揺洞庭呑三湘霜飛八月橘柚熟我欲打船聞水香晴天晩眺過湖曲歴歴逺樹波茫茫客中有懐不得盡無人同上三高堂垂虹感慨葉廣垂虹橋頭浪如雪新築層城堅勝鐵長隄十里土花青盡是吳儂戰時血孤兒拾薪臨水渚學得楚歌并楚語仰觀飛矢在浮圖江水江雲駛如雨松江長橋陳孚松江波萬頃橋倚碧雲端白鳥穿屏小青天落鏡寒夕陽明佛塔秋色老漁竿無限凴䦨意何時此掛冠垂虹晩坐成廷珪長橋戎馬後旗幟尚紛紛吳越東西隔江湖左右分荒哉皮學士去矣范将軍誰種千頭橘空山卧白雲題垂虹亭王逢長虹垂絶岸形勢壓東吳風雨三江合梯航百粤趨葑田連沮洳蛟室亂魚鳬私怪䲭夷子初心握伯圗長橋薩都拉挿天螮蝀勢嵯峨截斷吳淞一幅羅江北江南連地脈人來人往渡天河龍腰撐出漁舟去鰲背高駝駟馬過橋上青山橋下水世人能見幾風波吳江長橋李坦之架木為梁若路平朱䦨步步接空明江湖日夜流虹影城郭東西隔水聲賈舶聚橋朝作市戍樓撾鼓暮歸營三高祠畔垂楊柳撩亂春風弔古情吳江石橋新成宋无五色何年補泬㵳百弓無地架瓊瑶老龍千尺卧寒玉雌霓半空横綵綃天路行看星象逼江濤怒息水犀囂騎鯨便欲超銀漢直踐台階挹斗杓垂虹眺望戯作出入韻高文度左右江湖雜帯地天開圗畫信豪雄吳淞潮漲天為岸林屋山高雲是峰上下炊烟生紫翠去來帆影亂空濛䦨干不厭頻來倚要豁平生芥蔕胸垂虹富恕坤軸東南坼兩端巨靈擘華壓平川玉鯨偃蹇呑三峽彩影連蜷落九天有客吹簫明月下何人釀酒大江前䦨干三百風烟晩獨立蒼茫歌洞天同前鈕麟老龍天半倚高寒氣壓三吳控百蠻江海水聲呑合璧東南地坼鎖連環玉䦨凴月天應近石洞藏雲夜不闗老我一雙題柱手釣鰲猶在五湖間垂虹中秋對月蘇舜欽月晃長江上下同畫橋横截冷光中雲頭焰焰開金餅水面沉沉卧彩虹佛氏解為銀色界仙家多住月華宫地雄景勝言不盡但欲追隨乘晩風垂虹亭詞蘇軾飛梁壓水虹影澄清曉橘里漁村半烟草嘆今來古往物換人非天地惟有江山不老雨巾風帽四海誰知我一劍横空幾畨過按玉龍未斷月冷波寒歸去也林屋洞闗無鎖認雲屏烟障是吾廬任滿地蒼苔年年不掃垂虹橋劉斯立路隔横臨鳥倦飛行人恐犯女星機長虹出浪無冬夏老蜃浮空半是非兩岸履聲雲内合三州帆影月邉歸䦨干獨立秋風早豈待鱸魚始拂衣同前林景熈地坼東吳海脈連畫橋兩道跨晴川彩翻河漢蛟龍國勢壓江湖蝃蝀天幾處征帆浮日月四州譙角隔江烟三高逺矣荒祠在一笛䦨干夕照邉同前蘇轍六月長橋斷不收朱䦨初喜映春流虹腰宛轉三百尺鯨背參差十五舟入市樵蘇看絡繹歸家鹽酪免遲留病夫最與民同喜卯酉怱怱無復憂長橋華翥何人㧞起蒼山根挾來壓住江流奔三四百尺斷虹影七十二灣新月痕玉䦨雨過蒼苔滑石洞舟行清水渾幾欲臨風又題柱恐驚司馬未招魂泊垂虹顧悳輝三江之水太湖東浪激輕舟疾若風白鳥羣飛烟樹末青山都在雪花中垂虹橋下新水生白龍廟前雪未晴大風挾帆過江去驚得沙鷗嘎嘎鳴江風吹帆忽數里野花笑日時獨行更須對雪開金盞要聽隣船搊玉箏次韻郯韶洞庭之西湖水東客行三日上江風行行塞雁青天外箇箇輕鷗白浪中江上日日客愁生今朝春雪始放晴舟人捩柂看山影驚起中流鵞鸛鳴鸕鷀鸂鶒總多情蕩漾春江取次行日日沙頭候歸雁為郎彈得小秦箏次韻陳基旭日初生積水東白頭波起鯉魚風洞庭西望平如掌七十二峰圗畫中無限客愁撩亂生春寒強半雨初晴烟波萬頃深無底彷彿鮫人織杼鳴誰是岑參兄弟情好竒長作渼陂行如今翻動江湖興月滿樓船聽按箏垂虹出郭雨如注入舟天欲低飛梁跨雲渚嵽嵲亘長霓三江風水急五湖烟月迷夙昔䲭夷子扁舟此入齊次韻泊舟垂虹倡和何年伐木架危橋鯨浪翻空白雨飄勢控三吳虹倒影氣呑七澤水通潮重淵有怪犀難照蔓草無名火不燒伯國黄金聞鑄像王門白玉想為標功成海上身先退膾熟江東興可邀嵗月幾何流水逝山川如舊古人遥鴻飛矰繳何由篡鶴去樊籠不可招浩蕩扁舟歸鑑曲寂寥方丈似中條越人尚以雞為卜楚俗相傳鵩類鴞自把文章論隐伏敢将交態較淳澆五湖烟景隨時異萬里風萍觸處漂却憶春暉樓上去為君裁取玉為簫垂虹高啟行人脚底響波濤驅石神鞭是孰操影落蛟龍朝窟暗形垂蝃蝀暮天高烟中去憶䲭夷逺月下吟誇長史豪幾度憑䦨賞秋色鱸魚新買繫歸舠長橋陶振道人置立半通仙鞭石平湖挿巨川晝鏁玉環輪影缺夜開金鏡月華圎萬邦冠冕行鼇背三島神仙出洞天最是晩來烟雨後浪花堆裏看龍眠垂虹夜月周忱清波卧長橋深潭漾華月肅肅夜景澄微微天籟發幽人亭宇間鈎簾坐清絶泊舟垂虹橋劉珏買酒烹鱸敵暮寒垂虹橋上倚䦨干行人笑指詩翁嬾不向城中訪縣官長橋晩興吳頥垂虹橋下波濤壯人在黿鼉背上行落日帆檣迴水驛春風鼓角動江城鮫人織杼潛蛟泣戍卒彎弓過鳥驚七十二峰波浪碧卧聽仙客紫鸞笙垂虹橋杜庠天垂螮蝀跨三吳橋上分明見畫圗七十二灣平作路萬千層浪直衝湖石䦨干外青山小蘆葦叢邉釣艇孤老我昔年題柱手舉杯今日醉蓴鱸舟泊垂虹吳一鵬溪亭踈爽枕平波避暑初從此地過高塔風霜僧院古太湖烟水釣舟多試烹蓴菜知佳甚欲采蘋花奈晩何清玩茗杯成久坐月明隨處起吳歌過長橋朱寔昌浪起秋風萬頃花吳江一望太湖賒子胥謀畧原仇楚張翰功名尚憶家廟倚虹橋長卧水舟揺月棹逺侵沙不堪夜靜鳴孤鶴坐看牽牛憶嵗華秋夜長橋遣興周仲仁長橋秋夜月華清共坐江頭楓樹鳴渺渺金波來萬里㳙㳙玉露落三更隔舟漁火明還滅傍晩山雲斷復生張翰扁舟何處是高歌尊酒一含情垂虹晩眺吳復水落沙明露逺洲楚天萬里見飛鷗横空瑞氣張華劍浮世功名范蠡舟落日樓臺吹笛晚高風木葉下林秋青冥共展圖南翼肯學馮唐嘆白頭夜泊垂虹聞笛謝常翦得柯亭碧玉枝誰家哀怨隔江吹玉闗風急飛霜早銀漢雲横月上遲停杼想應鮫淚滴倚䦨聼斷雁聲悲梅花一夕氷肌痩堪竝愁人獨立時垂虹亭孫覿宛宛白虹貫層梯出雲半乘雲來帝旁立侍玉皇案銀河經千里水接天漫漫一杯属明月俯見人影亂張公江海客坐嘯白鷗伴寥寥如清風一笑亦可喚明朝駕我軒挿羽流白翰行矣且勿驅來怪安石緩神光射斗南絢若金碧爛出門問何祥銅章付雷煥同前陳瓘三年為吏住江濱重到江頭照病身滿眼碧波輸野鳥一蓑踈雨属漁人隨船曉月孤輪白入座羣山數㸃春張翰英靈應笑我緑袍依舊惹埃塵同前米芾斷雲一葉洞庭帆玉破鱸魚霜破柑好作新詩寄桑苧垂虹秋色滿東南同前陳珏高壓玉龍腰參差雁勢朝雄呑五湖濶平揖兩山嶢䦨檻中流出炎蒸白晝消暫來塵慮息那復日逍遥夜宿垂虹亭舟中有感龎元英離家無數里客思便侵凌久撥爐無力頻翻被有稜孤蟾如得伴哀雁擬傷矰怪底寒清冽推篷露氣凝垂虹亭楊絳埀虹臨絶景仙隐寄人間遠水平呑野歸雲補斷山空明寛眼界透迥破天慳深羨鴟夷子扁舟竟不還和韻陳武子行樂江亭上情彌天壤間舟譏王訪雪妓鄙謝登山佳致輸公擅清歡愧爾慳賔僚陪宴笑興盡莫輕還同前祝乂冷浸三江碧青圍四面山帆歸烟浪杪人住水雲間風颭波聲碎虹垂雨意閒無端動歸興一棹喜輕還垂虹亭陳直卿西望洞庭突兀東連仙里人家笑指䦨干三百醉來就此乘槎同前蘇舜卿氣象清雄天與鄰世間不合有埃塵擬将琴酌酬佳節只恐江山解笑人同前丁謂悠悠風物四時新苒苒山屏萬古春多少江山人不看却來江上看行人同前錢明逸千里波平瑟瑟風纎雲不解翳虛空素娥自有清光在上下清明一鑑中同前李定一夢江湖三十年青山隐隐水漫漫當時把酒誰人在回首重來獨倚䦨同前王琪紅橋跨浪二千尺橋上危亭在水心六月火雲燒萬里夜來風細似秋深同前王毖長橋千步截江洄虹影隨波綵翠開誰與上皇傳信息定從此路入蓬萊夜泊吳江宿垂虹亭戴良閃閃練月宵稜稜素秋節捨棹上孤亭臨江候歸客佳人殊未來幽意為誰適徘徊當夜半彷彿去天尺仰接銀河横俯照星緯逼直疑穹壤連豈有人世隔飄飄形若蛻眇眇思何極居然怯風露聊復就衾席亦既不成寐将何慰兹夕頼有同心人連牀語疇昔垂虹亭無名氏石橋翊翊如游龍上有亭子名垂虹飛梁横跨碧波上砥柱屹立洪濤中氣呑具區三萬頃目覧洞庭七十峰巖巒顯伏固非一江湖合勢遥相通醒心豐樂昔稱勝斯亭直與之相雄前年烽火亭燒燬刼灰徒逐東流水此邦壯觀己蕭條喜有孔侯復經始侯家清白素王孫葺舊補殘有倫理棟宇翬飛洲渚間窻扉輪奐烟雲裏廟貌三忠自侯建遺像肅然人敬企邦人士卒共樂成鼓舞歌詩頌侯美從今過客踏靈鰲盡説登臨氣象豪秋水芙蓉翻錦浪寒汀落日散金濤風帆沙鳥近隐見烟雲竹樹森相交個中景物吟不足空對山川送游目停杯聽我歌此曲并刀快剪吳淞緑垂虹亭倪瓚虚閣春城外澄湖暮色邉飛雲忽入户去鳥欲窮天林屋青西映吳淞碧左連登臨感時物快吸酒如川垂虹晚眺柳貫山光自獻一螺青人立垂虹酒乍醒兩界星河涵倒影千家樓閣載浮萍欹檣側柁衝風勁密網疎罾刮浪腥正是鱸魚忘世味隨方我亦且笭箵題垂虹亭劉致海神鞭石架穹窿突兀虛亭瞰碧空藻井動揺天上下彩虹拖㳫水西東貫通百粤連吳㑹流接三江究禹功周道於今坦如砥梯航喜與萬方同垂虹亭秋日遣興宋无滿袖玉皇香案烟綵蜺背上眺晴川紅黄霜樹珊瑚海黒白雲光玳瑁天𤣥圃空離樓十二玉墀對罷字三千吟毫醉蘸吳江水冩與騎鯨李謫仙垂虹亭僧仁裕珉玒陸續楚連蠻底定狂瀾萬馬還水府有門容棹入洞天無鎻許誰闗高空勒住黄金索滄海浮來碧玉環月夜江樓看蝃蝀長虬横卧翠濤間同前周宻水國生涯一釣綸荻芽鱸膾四時新安知白首滄洲客不是三高行輩人岸草江花萬古春感今懐古最傷神不知一片垂虹月照却憑䦨幾許人同前李繼本金尊緑酒蕩晴空花壓雲鬟舞袖紅莫唱何戡渭城曲銀筝嗚咽怨秋風同前高啟泊舟登危亭江風墮輕幘空明入空眺天水如不隔日落震澤浦潮來松陵驛綿綿洲溆平莽莽蒹葭積憑䦨不敢唾下有龍窟宅帆歸雲外秋鳥下烟中夕欲炊菰米飯待月出海白喚起弄珠君閒吹第三笛同前周南老虚亭架垂虹宛在水中沚江湖界左右䦨檻俯清泚踈簾動秋碧遥山凝暮紫慿虚際空濶應接殊未己漁歌忽互答聲落烟波裏扁舟去遥遥可是䲭夷子垂虹橋在吳江縣東門外一名利往又名長橋宋慶厯八年縣尉王廷堅以木為之東西長千餘尺中有垂虹亭治平三年知縣孫覺重修至紹興間邉軍犯淮有建議焚橋者郡守洪遵持不可而縣民亦相與聚泣圯下不可焚遂止元泰定二年判官張顯祖復甃以石下開七十二洞國朝洪武元年知州孔克中正統元年廵撫侍郎周忱相繼修治成化十七年重修仙里橋張明達蓬島徒遼逺瑶池更渺茫波間有林屋只是此仙鄉在縣治東世傳陳昉于此仙去故名下有仙人洞庶寧橋比屋連甍棟居民庶且寧早來漁市散終日敗鱗腥在縣治右元初改州又稱州橋大明橋劉嘉謨東望扶桑路迢迢幾萬程滄浪将盡處忽見日華生萬頃橋巨浸莽無極聊為萬頃看世無黄叔度君試倚䦨干定海橋昔日松江上潮翻定海來而今舊橋水不到半江回甘泉橋倪瓚松陵第四橋前水風急猶須貯一瓢敲火煮茶歌白苧怒濤翻雪小停橈吳江第四橋阻風王逢虹梁雪灘光明滅風著岸脅氷鱗生空郵天晩亂木葉太湖日寒多雁聲馬周斗酒足自慰龜蒙扁舟有餘清囊中青錢不滿百聊買小鮮來就烹又名第四橋其下水甚清冽在水品第四新建大有橋記朱存理吳江縣治之東四十餘里地名莘塔旁有橋嵗久傾圮舊址僅存里人凌通慨行者之病涉也思欲新之而力有不逮乃告于鄉之巨室冀助成厥志承事郎周君惟敬慨然捐資助之其妻之祖母趙氏妻母周氏素皆好施聞之亦樂助焉趙嘗以白金千兩修縣城之垂虹橋義聲滿邑雖厚積而人以為難今兹舉也若易易然者凌君遂市石鳩工始於秋七月乙酉落成於九月壬午請予易其名復徴文為記予適至其所秋風澤國黄雲滿野得覩大有之年歡呼笑語聞于疆畝葢樂斯橋之成也因名之曰大有期以為嵗之兆也衆以為然又以為其鄉人之慶也鄉人之相率助君事欲堅久故君督視惟謹而功頗大所費出自君無吝宜其歸功於君誠為義舉也己予雖不文恐後人昧于興創之由故鑱石以記成化甲辰十月朔長洲朱存理性甫記并書篆重建獬豸橋銘吳洪吳江尹侯陳君秉鈞來涖吾邑之三年政平而人愛悦邑衙之前有橋名州橋久圮行者病之侯乃以豐嵗勸衆有力者為之民不勞而功倐成恵于民也寔多其橋名未易也成化癸卯五月六日夜風雨交作侯二鼔就寐夢神衣冠偉然揖而進曰子為斯邑令一下車民無凍餒百廢具修是橋之建為民千祀之利也但橋名當易也吾為子告焉子嘗覽郡志乎是邑儀門舊有亭名獬豸廢久而名存子以斯亭名名橋不亦美乎侯答曰獬豸乃神羊能觸邪古人取以為御史章服之飾是邑鴻碩顯榮之多将兆于兹也神人聞之大笑而去侯覺驚異筆其説以書來京屬予銘之予邑人也知侯為詳侯以鄉貢進士除是官有清白操毅然有為人不可干志在為民省力屢遇威權不少避侯之大節不可及矣士論偉之咸以逺大望侯也况今聖天子簡賢任使凡在郡邑有異能者悉詔補侍御侯之建橋而神假夢如此固為吾邑之禎侯之超遷将先兆於兹乎神之靈不妄也今特為銘以鑱諸石使後人知是橋之名由兹而立是橋之建由侯而始侯之澤兹邑将與橋同久矣肇工於成化十八年十二月畢工於成化十九年三月侯名秉鈞字堯弼銘曰猗歟吳江鉅於吳東陳侯之來憂民若恫室家胥悦嵗屢獲豐乃鑿白石乃建飛虹民不告勞千夫卒從神乃假夢話言從容有亭獬豸載郡志中乃為神羊一角如龍無邪不觸無佞不攻易以名橋足振儒風侯乃稽首禎兆是崇橋由此名沄沄朝宗乃期是邑俊髦烈轟致身執法接武登庸孤忠直節咸躋於公我侯超擢兆先此逢神之嘉兹亦罔有窮登平望橋作顔真卿登樓試長望望極與天平際海蒹葭色終朝鳬雁聲近山猶一作全彷彿逺水忽微明更覽諸公作題髙知姓名吳都文粹續集巻三十六
