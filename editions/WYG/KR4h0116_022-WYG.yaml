body:
  text: 吳都文粹續集巻二十二明錢榖撰山水遊石蛇山記蔡羽龜黿龍蛇之山大抵皆花石之材嵌者空竅灂者亷利然皆不於山之腹特出於波濤龜黿龍蛇皆負林麓走飲於湖惟蛇山為不然當太湖之西北背龍頭而迎風濤截乎大洋故境愈險而愈竒世少得而觀焉正徳己巳清明日與客放舟龍頭西踰小洞庭還見聚落十餘家為烏沙井厥石萬狀恍恍焉洞洞焉縁於㠝岏不敢揺動然去蛇山尚十里客請乗東風之便乃從烏沙井解舟䌫薄蛇山之東還見大石劃下若有門闕而無人跡顧其勢斗峭水尚急舟不能停縁壁里許則山之陽也岸始舒水始緩若有里墟而無烟火鳥巢獸窟以竄其間者大抵皆采石之人厥厓惟廬厥坎惟炊厥寢惟磯以漬以飲維石之宜始舟人與岸人見獲通語言而沙潭詰曲未可進投竿測之視岸人所指而行焉始獲登登其丘山空地險舉足有聲躡其巔梯斷石滑側身而不能前復舉帆去則山之西麓矣壁愈高石愈亦若芙容開花魚龍蜕甲上者屏列下者橋卧隠隠波底者不可窮狀所見既異而境復迂僻由是鎖舟壁下環臥涯滸客皆引滿載歌晨徂而暮忘返夫蛇山掌石耳其勝顧出龜黿龍頭之上余與甚邇而平生不聞其勝一日跨波濤觸烟霧獲覩其竒則古之不言石蛇而言龜黿者有以也噫物愈竒則遇愈難余志石蛇之竒俾好竒者覽焉遊石蛇後記山林之與臺閣其味不相堪非止甘苦也間有勉嗜之者得之必不深與之必不能相忘惟太傅王公則不然去臺閣投山林釋軒冕憇泉石若返古踐眞曽無纎芥耳與目惟恐其不遠情與度惟恐其不廣一日聞濟陽蔡羽言石蛇之竒欣動不已即其歲己巳之臘八挾小舸載輕麾奮發乎銷夏灣之上以羽侑座貳之以扣舷之客縁大小明月灣絕流西去瞬息而達蛇山簫管一鳴林谷振響山精水怪潜匿而不敢出乃與客冥捜乎巖穴循環乎溪磵扶揺乎梯磴之間高駕乎洪濤之上以吐納烟霧履峭絕跨蓁莽與健夫爭先而公不知倦於是水聲洋洋萬籟俱和通乎耳矣東過霅溪西過夫椒通乎目矣仰周八表俯接九淵通乎度矣鼉呼而鼈歡羽翔而鱗集通乎情矣山不必高王公一踐之三萬頃之勝可以撫而有也雖老於山林者不如又何嫌於臺閣日欲落公手剥石衣書名於壁而去蔡羽記過石公山王寵島嶼屢崩奔石林突參錯朝雲正吐秀冬水亦漸涸槎牙熊豹蹲蜷曲蛟龍蠖波濤激中洞嵐靄紛上薄金膏赤日流石鏡青天廓表靈徵名圖延賞諧幽諾蒼䑕不驚人丹楓時自落兹焉可投綸畢志甘塲藿思夫山高啟江上曽看望夫石湖中今見憶夫山夫君好采山中藥獨得長生去不還不似蕭郎與秦女乗鸞同去彩雲間同前周南老峨峨湖中山山崦開石扉應知避秦者遠與世事違良人採藥去歲乆不復歸天寒翠袖薄日夕勞夢思化作山頭石引頸雲依依山石或可轉妾心終不移同前王賔夫來采藥避秦苛妻守空廬獨淚多非是妾身甘憶死恐夫憔悴在山阿思夫山相傳秦時有人採藥不返其妻思之至死故名望大小二貢山王逢大貢如大人小貢如小臣大人方正笏小臣亦垂紳太湖七十山而此我所珍清淑萃間氣端厚凝風神岳露蓮一朶海偃月半輪遠分馬跡秀近奪蛾眉眞岫幌蔽素夕雲盖擁高晨深谷虎豹隠幽絕狐兎隣将軍雖相望邈若越與秦我行柯村外紫翠忽鮮新不無靈異栖飛度招隠淪洶洶白水波杳杳清路塵芳蓴被中沚采之淚盈巾父老昧知識謂我諸侯賔我豈諸侯賔均是天王民琴山蔡昇誰将太古琴横向洞庭隂山泉泠泠響彷彿絲桐音白浮山水面有浮山色白勢突兀浮焉胡不流非浮胡不沒五浮山有客報我五星流隕向太湖為石頭下有巨鼇負之浮羅列水面如仙洲不識其語誠然不誠然亦逾萬萬秋我欲汎彼木蘭舟五處岩壑皆尋幽只恐上帝不肻留故遣夸娥二子收收去人間何所投五岳各與添一丘山靈如此先當愁烏蚌山烏蚌在湖水水流蚌不移圓月出山頂疑是吐珠時緑石山南山層層石非紫亦非白寒暑亘千古長是莓苔色芙蓉峰一朶金芙蓉雲根在土乆伊誰能折之擘山巨靈手𤣥龜山山根有𤣥龜曵尾将若行夜雨長石髮彷彿綠毛生西湖灣湖水清湖堤平薫風芰荷氣急雨菰蒲聲灣中漁人夜吹笛宿雁飛起眠鷗驚禹期山相傳禹會諸侯於此王賔堯時神禹會山巔洪水滔滔勢接天今日三州租賦地秋風禾稻自年年射鶚山吳敏東山空濶原埜平吳王飬雞築高城秋天饑鶚未飽食側翅下攫殊無情守城武士心孔惡旦夕窺兹捕雞鶚雕弓一展羽箭發鶚也時從半空落山人學射藝漸精遂使山無鶚鳥鳴却思勾踐侵吳日何不令之射越兵大小竹山竹繞山山映竹山色長青竹長綠大小兩山何處同瀟湘􅜌頭淇水澳昨朝山上清風生翠梢遥動鳳凰翎今日山前晴旭照綠隂滿地鷓鴣聲鷓鴣聲啼未絶兩山雨溼琅玕節登西湖小洞庭吳鳴翰巻波飛雪打芳汀扶醉來登小洞庭金闕芙蓉千叠嶂玉壺天地一孤亭直須横槊歌明月更擬浮槎作使星不獨坡仙誇嶺海兹遊還許冠平生題煉墩三江引去桃花水露出波心小玉屏四面海天涵地白一方烟霽破湖青登臨有客驚浮世今古無詩咏落星若使湖州仍見此便應添箇看鷗亭鎭下放船過東山范成大打頭風急鼻雷鼾醉夢閒心鐵石頑惟有愛山貪未厭西山纔了又東山老禪竿木各逢塲詩客端來共葦航一任顛風聒高浪滿船歡笑和詩忙社山放船社下鐘聲送客船凌波撾鼓轉滄灣横烟裊處雞豚社落日濃邊橘柚山八表茫茫孤鳥去萬生擾擾一舟間湖心行路平如鏡陸地風波却險艱東山渡湖渡船㠶飽如張弓倐忽世界寒浺瀜堪輿無垠日夜汎浩浩元氣蓬蓬風湖光日色不可辨但見水精火齊合集成虛空波臣川后敬愛客約東秘怪駈魚龍大千總作大圓鏡光中飛度迷西東蒼茫一身無四壁八方上下惟孤篷毛仙出迎笑相問何乃自苦荒寒中吾生盖頭乏片瓦到處漂揺如寓公猶嫌塵土礙人眼兹遊勝絕餘難同九衢車馬恍昨夢付與一笑隨飛鴻歸自西洞庭阻風登黿山頂王鏊親朋挽衣留不住逆風舟向平灘駐灘頭寂莫誰與言青鞋飛縱顛厓步黿頭有山山不崩東望東海西吳興羣峰羅列七十二如拱如立如奔騰我行天下亦多矣所至有山或無水其間有水却無山何處能兼山水美蒼茫萬頃浮孱顔惟有海上三神山杳然可望不可到不如此地日夕隨我往與還胡為十年纔一到風乎爾知吾所好登縹緲峰仄徑盤空艱復艱快哉七十二孱顔星辰可摘九天上吳越平分一水間日轉林梢看鳥背烟横谷口辨人寰居然自可小天下誰道吳中無泰山明月灣石坡巨石陂陀板様平三山當面看雲生何當子夜重來此濯足滄浪對月明石公山石洞石公之景殊不惡巨石懸空欹不落爭知不是補陀山中有仙人儼纓絡石公山試劍石懸厓峭壁立千尺有洞虛明忽中坼吳王寳劍烏能然恐是巨靈神斧劈石公山石公幽處無來跡亦有人家散阡陌我船欲開還不開愛此孱顔蒼雪色崑山滕繼一水浹辰外乍晴如酒醒臨谿照淨練陟巘到高青翠靄俯深樾黄雲迷遠坰超然信塵表風袂襲泠泠同前孫寔絕頂地平易軒忩風怒號半空垂象緯四面湧波濤洞僻荒苔蘚泉深冷骨毛登臨欲忘返城市厭煩勞登玊峰陳省華四望平川獨一峰前峰瀟洒是蓮宫松聲竹韻千年冷水色山光萬古同客到每憐樓閣異僧言因得鬼神功縣民遥喜行春至鼓腹閒歌夕照中同前范周萬叠青鴛壓巨崐四垂空濶水天分夜光晴帶三江月春色隂藏百里雲桂子鶴驚空半落天香僧出定中聞不将此境評張孟三百年來屬老文夜發崑山范成大歲寒人墐户霜裏獨登舟弱艣揺孤夢踈篷盖百憂但吟今不樂寧計幾宜休慚愧沙湖月年年照薄游施元光在崑山病中遠寄長句次韻荅之四海飄蓬客舎邊幾多雲水與風烟絶無膂力駈長轡空有孤忠誓大川參月忽垂征馬上斗牛應挂故山前親交情話知何許詩到天涯喜欲顛舟過崑山與顧仲瑛姚子章張叔厚于彦成郯九成聨句楊維楨二月二十日樓船下婁江破浪擊長艫楊驚颷􅉫高杠梅峰遥古色姚石樹鳴悲腔躡磴屐齒齒張登堂鼔逄逄地險立孤柱郯天岳開八忩烏升海光浴于鳶鶱風力降畨賦夾閩估顧越謡襍吳嚨仙樵椎結萃姚胡佛凹眉厖婆律噴獅鼎楊琉璃照龍釭曽軒坐叠浪郯落筆飛流淙愛此韞玉石豈曰取大矼文脈貫琬琰顧密韻含􅑥缸驅羊欲成萬楊種璧得無雙多今文章伯張萃此禮義邦龍駒幸識陸姚鳳雛亦知龎翠笄掉文舌顧茜衲折㡢幢敏思抽連繭雄心鬬孤鏦句神躍冶劍才捷下水艭磬聲重寡和鼎力輕羣扛昆渠詩已就誰誚隴頭瀧楊登玉峰夏原吉崑阜遥看小一拳登臨渾欲接青天神鍾二陸人林秀勢壓三吳地位偏岩溜下通僧舍井林霏近襍市㕓烟幾時重著游山屐來訪當年種玉仙同前沈以潜嵯峨千仞驀凌空滄海西來茂苑東勢轉江流三里外翠分嵐影半城中岩前有洞仙家近溪口無花釣艇通聞説幽人茅屋底捲簾相對咏無窮陪徐天全夏仲昭遊玉峰劉珏青峰高聳白雲頭今日來陪上相遊甫里晩烟縈茂苑洞庭春水接湖州山中未乏連城玉海上空聞萬斛舟勝會况逢全盛日蘭亭不減晉風流登玉峰吳寛崑岡玉石未俱焚木樹危藤帶白雲小洞烟霞藏木客下方簫鼓賽山君千家居屋黄茅盖百里行人白露分更上雙峰最高處滄溟東去渺斜曛賦得玉峰春霽張適玉峰小朶芙蓉秀嵐氣晴分翠接人一鳥啼殘蘿逕曉萬花開遍石岩春洞雲已出從龍去海燕仍來與客親此日登臨文學彦酒酣離思欲沾巾秋日舟過崑山蘋末起輕颷楓林葉漸凋孤村烟樹鳥遠逕夕陽樵估客收村市舟人候夜潮偶因山水勝暫此繫蘭橈舟中望崑山王鏊雲外孤峰欲墮江船頭風浪共低昂廿年舊事空回首山自閒閒水自忙玉山辭為顧仲瑛作陳基山堪嵁兮磅礴太古木蔥蔥兮雲英英而欲雨日朝出兮在戸光輝輝兮水流其下非君子兮夫誰與處采我蘭兮為佩搴我荷兮為盖從子于山兮聊逍遥以卒歲郎官柏詩序金問蘇之崑山古之婁縣也地大物盛為今圻内望邑按郡志城本吳子壽夢所築山在城中而石多因似玉因以得名自昔靈區奥壤紺園琳宇環布其下傳厯滋乆完葺弗紹則委頓於荒烟野草之間至若名人達士高墳大冢皆厯厯在望仁人孝子於其先塋封樹等威禮所得為者宜無所不用其極矣其或世澤告衰而殘碑賸枿見欺於狐兎而増過客彷徨者自非有忠厚之人居可為之地烏能興起哉正統丙辰廣陽羅延齡由兵馬副指揮來宰是邑既視篆即進父老詢民利病而興除之曽未浹期政和歲稔輿情大悦暇日復從吏民循山之麓顧瞻徘徊喟然嘆曰山為一邑之鎭民頼以安而凋敝若此非古人教護屬功之意乃率其民相與植栢於上鑿石通路而塞其旁路疆理既嚴樵蘇絕跡且方事之際隂雲蔽虧霡霂時至未幾而條枚四合蒼翠彌望邑人感之名其所植為郎官栢儒林君子即其題為詩以美之兵科給事中王用節等謁予文以序其寔詩不云乎維桑與梓必恭敬止靡瞻匪父靡依匪母盖人之思慕其親而不見則寄情桑梓而不能已焉矧體魄之所安乎漢天子以之而來趙陀安君平以之而激密人之忿天理民彛有不容已者不待丁寧訓告而自然之應捷於桴鼓此郎官栢之名所由著也嘗憶徂徠新甫使無生植則亦魯邦之培塿耳而詩人咏之萬邦誦之千古之下傳之者豈徒然哉然則延齡之徳與兹山兹栢同於不朽者寧不本於諸君子之言乎郎官栢張和君不見河陽花胡為蹴踏餘塵沙君不見栁江栁一夕霜風變枯朽何如羅侯種栢盈吾崑佳氣鬰欝山長春草間翁仲仰深庇泉下髑髏懷至仁層隂扶踈覆荒土夜半精神作人語喬柯秀拂寒空雲黛色遥連翠微雨穹碑用表吳民情大刻遂著郎官名我歌狂歌頌侯徳千載芳聲播南國馬鞍山在崐山縣西北廣袤三里高七十丈一名崑山寔因華亭之崐山而名縣境連接湖海而孤峰特秀上有浮圖其陽有慧聚寺東偏有山神祠西有文筆峰相傳孝宗時有魁星現於此山巔有華藏寺南有桃源洞北有鳳凰石及春風亭夏太常㫤建正統間知縣羅永年植栢千章名郎官栢登秦望山薛據南登秦望山目極大海空朝陽半蕩浴晃朗天水紅谿壑爭噴薄江湖逓相通而多漁商客不悟歲月窮振緡早迎潮弭棹候逺風予本萍汎者乗流任西東茫茫天際帆栖泊何時同將尋會稽迹從此訪任公秦柱山在縣南三十里千墩浦南帶海上有烽火樓基吳時望海冦一名秦望山輿地志始皇嘗登因名綽墩高啟淳于曽解救齊城優孟還能念楚卿嗟爾只教天子笑不言憂在禄兒兵同前周南老詼諧多滑稽啟寵納慢侮笑取玉環歡拍按育胡舞天寳志欲滿侈心日益蠱宫車逺播遷魄䘮漁陽鼓胡為王門優有此一抔土遂令村之氓猶能三反語綽墩在縣西十八里相傳唐黄幡綽𦵏此虞山孫應時長嘯虞山迥天開風氣清南窺五湖近北覽大江横厯厯三吳地悠悠萬古情雄觀有如此聊復記平生遊虞山倪瓚陳蕃懸榻處徐孺過門時甘冽言游井荒凉虞仲祠看雲聊㺯翰把酒更題詩此日交歡意依依去後思巫咸山王賔舊説巫咸已上天楚人歌裏亦千年相傳住處今何在一座青山縣郭邊同前王汝玉平生不識海虞山覽秀曽因圖畫間雲入空濛開倒影僧依蒼翠閉禪闗湖田種熟秋千頃烟浦舟行路幾灣天上歸來暫停轡何當留我老年閒登虞山絕頂有懷吳思菴周忱晴登孤嶂俯郊原指㸃東吳遠近村齊女墓荒枯樹老言游祠古斷碑存一泓白水通湖口數㸃蒼山近海門此地舊傳多勝跡重來期與故人論遊虞山吳寛夜宿相川口清晨喚舟人舟人請所之指㸃虞山垠山如知我來笑迓野水濵藹藹春雨餘翠洗雲中身我本重兹山竦然正冠巾虞仲骨已朽高名宛如新悠悠松間路弔古在兹辰放舟轉山塘行行自知津春服亦既成庶以適此春同前沈周虞山我隣壤欲往路非遥比來有好抱風日虛春朝兹藉佳友興理舟訪嶤岧漸喜蒼翠近豁眼嵐霏消上有古松杉落落旌幢標其下見行人往來襍僧樵我坐意亦馳豈倐雙屐超何異謝康樂巫湖眺且遨三月九日舟泊虞山下霽色澄虞山正與遊人偶一年無多月春三及秋九勿厭傾郭人隨俗悦親友春風若招邀處處閙花栁林華競妍新無復見惡醜間見叢綠中遠映紅裙婦休云惱山谷㸃綴亦可取摳趨識壯步屢頓騐皓首尚有散逸流列石自俎豆老夫目中盡未在逐逐走况當氣力衰孤坐還可酒拂水巖李傑六月西巖上南風拂石湍無雲何處雨洒面作輕寒同前沈周只有看山是勝縁青鞋布襪且輕便天收雨脚賖今日我趂花時遣老年絕壁雲扶将墮石豁厓風勒下奔泉此來不愧空歸去旋構新篇揀竹鐫陪邑尹沈侯遊拂水禪菴陳言百丈厓翻白雪堆下穿雲磴線縈迴元陽六月宜飛雨靜夜三冬忽隠雷花墮眞疑龍女散地靈直訝虎跑開八風不動摩尼淨藥我塵心入茗杯遊拂水巖黄省曽玉趾遵虞嶺松途轉泬寥覓泉廻島曲攀嶂厯空遥雲壁懸垂漢風珠細拂霄王孫遊意遠命酒始相招其二振䇿凌丹壑珠琲散紫氛翠嵐浮峻日瑶髓下層雲榻借蒼厓卧琴将玉澗聞萬重湖樹迴杯酒接氤氲舟中望虞山吳寛蜿蜒平野臥青山相見令人獨厚顔徒有詩篇曽記詠已無筋力再躋攀船頭旋轉凴黄帽水面低迷擬翠鬟舊日同遊者誰在欲從東老學清閒與啟南遊虞山斜日下嶺西落日滿川上晩色催人還輕舟復揺漾佳山難為别持酒忽惆悵悠然忽回首舟尾叠青浪故人知我懷捉筆冩其状懷土心未除移山力何壯便如王維詩終南亦可望流觀入中夜鼓枻起高唱舟中望虞山陳基一望虞山一悵然楚公曽此将樓船間闗百戰捐軀地慷慨孤忠罵寇年填海欲銜精衛石驅狼願假祖龍鞭至今父老猶垂淚花落春城泣杜䳌遊虞山陳䝉埜店杏花紅滿枝江南天氣早春時青山笑我來何晩白髮催人老不知雲竇雪消龍澗滿星壇樹偃鶻巢危明朝欲盡登臨興還赴雲間羽士期和計大尹虞山雅集楊循吉鼓櫂琴川來駕言為近遊覽今化方洽豈俟即余謀張宴山之巔有酒滑如油雲開見百里南望古蘇州尚湖當其前揆時惟杪秋仁政召佳瑞岐禾鬱盈疇我醉屬公飲勿遺此遐陬言子本邑産古今契良投有月照松杉賔客起互酬擇勝重移席撫遠還登樓粲粲新篇咏迥若風馬牛良會誠亦難餘歡渺滄洲次韻計明府虞山雅集王鼎西蜀春星杜老堂此軒高檜與天長且尋蕭鼎讀書處莫問夫椒是戰塲空谷葉聲流晩翠遠湖雲影鬭秋光品題消得羅池客名勝如今定不荒晩次虞山皇甫涍清溪杳無際望望遡行舟海縣雲歸市山城樹滿樓桂餘投紱興菊近授衣秋夜發東林磬泠然破客愁虞山溪行朝從虞阜出終日愛溪行鷗近看疑下雲遥望若迎嵐昏作海氣風滿助江聲莫恨三山隔東看烟樹平寺門望虞山王寵禪門吐雲氣前與虞山通大海蒸巨壑烟嵐日蘢葱蓮花挺秀壁繡幛羅高空飛泉四時雨福地千年宫蛟蜃時出没青天乍舒虹是節屬夏首灌木敷丰茸鶯啼紫岩曲鹿騖青林中薫風蕩蔦蘿沃雨鮮篁叢蹇予抱沉瘵未得窺玲瓏還期覽日出夜半千厓紅虞山在常熟縣西北一里高一百六十丈周四十六里六十六步吳地記云孫權置虞農都尉於此故名按吳越春秋吳太子娶齊女病而死曰必葬我虞山之巔以望齊國越絕書云虞山巫咸所居則虞山吳越時已有之或云虞仲葬此得名一名海虞或云海嵎以東臨滄海又名烏目山雖無峰巒而蜿蜒起伏畧如卧龍上有土垤磈礧或疑其古冢而不可攷也山麓有老君殿舊名乾元宫宫側有池宋嘉定間鑿又有雪井南有仲雍墓有維摩菴太公石屋傍有石洞天将雨則雲氣出于中又西北為拂水岩厓石陡峻水奔注如虹凌風飛濺最為竒勝自南循山而西有致道觀又西有招眞宫昭明太子讀書臺又西則岳祠諸廟過吳王廟五六里有試劍石又有三沓石與石城石門諸峰錯峙下有石壇周八十步又西則寳嚴灣其北六里為破山遊破山僧皎然雙峰百戰後眞界滿塵埃蔓草縁空壁悲風起古臺野花寒更發山月暝還來何事池中水東流獨不廻破山山居八咏僧常達身閒依祖寺志僻性多慵少室遺真㫖層樓起暮鐘啜茶思好水對月數諸峰有問山中趣庭前是古松其二晩望立虛庭心心見祖情烟開分岳色雨霽減泉聲遠樹猿長嘯層岩日乍明更堪論的㫖林下笋初生其三一室塵埃外翛然秪麽長睡來開寝帳鐘動下禪牀谿浸山光冷秋凋木葉黄時題諸祖意欹石看斜陽其四西來眞祖意秪在見聞中寒雁一聲過踈林幾葉空心閒憐水石身老怯霜風為報參𤣥者山山月色同其五眞性寂無機塵塵佛祖師日明庭砌暖霜苦藥苖衰汲水和烟酌栽松帶雪移好聽𤣥㫖處猿嘯嶺南枝其六古寺凭闌危時聞舉妙機庭空月色凈夜迥磬聲移漏轉寒更急燈殘冷熖微太虛同萬象相會話𤣥徽其七老僧論的㫖物物唱圓成踈栁春來翠幽窻日漸明禪心親石室蝶趐覆花隂好聽談𤣥處喬松鶴數聲其八祖祖惟心㫖春融日漸長霜輕莎草綠風細藥苖香月滿眞如凈花開覺樹芳谷前鶯囀處時聽話圓常烏目山五題序李堪余被物役塗汙故覊於人務網於吏位誠此身為官府有也今四十加六年始覺老非欲而已至病不期而自來生何常而本空死如歸而共寂由是登水木之虛室過烟霞之美夜聞經梵之清韻覽香花之寔會則心悦以情動目爽以言發綺靡以文著氷釋以意達前月中隨漕輓牒治金榖事至常熟縣過烏目山其山左右前後僧居佛宇者有五因成題五皆率爾所作非高妙也大中祥符三年四月五日序龍院林下金仙坊苔門揜夕陽花飛殿塔頂池照雲霞光松老鶴仍下洞枯龍已翔中宵動清響一磬發虛堂餘題興福寺延福院凈居院永慶寺散見諸寺下破山八咏序劉極元豐元年蘇州常熟縣沙門思雅謁予言曰海虞之勝鍾於破山然林泉之勢遊觀之繁無近與遠傳之盛矣自倪郴州捨宅為寺數百年間偉人竒士往往間出而人無知者願有以發明之余因而咏興福寺峨峨烏目山曽臨貴侯宅重房昔珠翠峻宇煥金碧泉激晨霞明松揺暮雲白宜爾山中人日輪自朝夕救虎閣三昧遊深恩結宇依蒼厓猛虎伏危閣㧞箭非忘骸窮獸雖覆車危雀猶投懷况我見已忘而彼猶其儕宗教院妙義傳天台迷雲凈如掃初終雖五時修短自三草結隠非此峰獲藏亦眞寳秋來月正圓獨照僧已老龍鬭澗白龍鬬危峰長澗落千尺靈泉應竒蹤高連暮雲碧寒影凌蒼厓清流動危石八月苖正枯猶能變甘澤常逵塔圓昔探雙林巵言發南華萬里歸一空誰云正非邪門影揺青松曽廻貴侯車猶遺數層塔岌岌凌飛霞懷述塔妙理悟三伊巍巍抗竒節千尺岩下松蕭然獨凌雪珠影雖青黄月輪豈圓缺危石揚寒泉至今伴清絕空心潭碧潭發幽石瀟洒無纎塵寒光湛秋月有物難比倫羅鈎况無魚千尺徒垂綸到此心已空何用濯吾纓御賜鐘大聲扣洪鐘萬里為彤庭鳥閒樓影重星淡雲氣清餘響繞岩壑林葉如回驚有客發深省塵耳非謾傾題龍山高九萬古澗滄浪外精藍縹緲間木枯曽閱世龍老解分山鳥道秋迷迹禪房晝揜闗詩成游子去流水自潺湲破山世傳龍鬭而山破故名上有興福寺又有鬬龍澗旁有硃砂洞放生池慶元志引山海經曰虞山之北岡壠相接即烏目山今頂山之南有烏目澗疑即此也自此東北九十步有空心潭取唐人常建詩潭影空人心之句又有舜井秋晩有懷頂山孫應時小山揺落故凄凉想像登臨野興長萬里晴空初雁入一年好景又橙黄極須痛飲償秋節生怕踈鐘報夕陽搔首故園歸未得籬邊寒菊為誰香秋晨至頂山散目秋郊趂早凉纎雲不㸃鏡天長松杉沐露連天碧秔稻眠風萬頃黄可惜文書妨勝日又還時節近重陽小山叢桂相撩得故故隨人作陣香中夏獨遊上方澗水有竒觀山蟬發清歌穹林翠光合深谷凉風多孤遊轉寂厯佇立乆婆娑吾生正須此欲去意如何六月宿山禱晴鵲為初晴喜山如秋夜凉蟬聲起竽瑟雲影散牛羊神理應難昧民憂敢自康平生靜中趣未厭宿僧房詰旦喜晴一壑有幽意三年幾獨來龍鱗松薜荔翠羽石莓苔潤喜朝光動清知嵐氣開山前迎父老同作笑顔囘宿頂山白龍祠梅詢千株碧樹挿雲立一綫紅泉透石飛童子怕寒爭閉戸夜深風雨有龍歸頂山上方程凖雨歇黄梅後秋生麥熟前偶因金馬客來訪玉龍泉竹葉一尊酒榴花五月天不妨扶拄杖行到白雲邊頂山周霞賔路轉清風徑泉通古石橋規模靈隠小景像上方遥書壁藤牽袂尋源草没腰每懷登覽日東海暮生潮遊頂山龍潭李光招提清絕冠諸方谿繞山圍勝氣藏好在池塘存舊址依然花木隠禪房風生殿閣元無暑雨後松篁自有香日暮不敎清興盡更登絕頂瞰微茫頂山在破山北十二里上有齊女峰相傳齊景公女葬此白龍池在焉西北有水簾洞兩水合流從石厓下注漫流若簾云福山徐有貞冒雨衝風泛綵舟共君載酒七峰游海門東望天連水江市西來樹隠洲喜有錢劉新著作能無王謝舊風流登樓莫漫題詩句留與山僧作話頭同前李傑九日携壺上釡峰海天萬里凈秋容百年幾度尋清樂廿載重來認舊踪漠漠水雲開復合離離霜樹淡還濃當時老衲今何在窓下依然偃一松福山在縣治西北四十里高九十五丈周五里本名覆釡唐天寳六載改為金鳳後梁乾化三年又改今名山麓有東岳行祠鳯山徐恪家林原在鳳山前緑野茫茫際讓川直道曽遭展禽黜知機不似季鷹先悠悠往事今何較落落虛懷我自便卧起兩峰如濯翠爐薫聊復對遺篇遊秀峰即河陽山楊維楨河陽山色畫圖開絕壑懸厓亦壯哉華表不聞仙鶴語醴泉曽引鳳凰來玉魚金盌埋黄土石獸豐碑長綠苔獨有桓桓丘隴在秀峰相對讀書臺同前陳繹曽平生丘壑愛躋攀此日披圖意任閒江浙去題龍虎牓海虞行看鳳皇山鶴來華表千年後雲在丹厓萬壑間聞有青囊書巻在訪仙求術待秋還登鳳皇山次徐亞卿韻王鼎身世平生此石坳只應猿鶴是心交謾勞神物護丹鼎豈有文章奪鳳巢山鬼吹燈扄夜户石泉分茗趂齋庖苦吟未就渾忘寐雲外霜鍾莫浪敲河陽山一名鳯皇山在縣西北四十里高一百二十丈周七里山頂有井嘗出醴泉見永慶寺碑又有梁朝古檜及唐狀元陸器讀書臺登穿山劉珏屼立晴沙翠作堆是誰移得小蓬萊雙厓不逐秦鞭去一穴渾疑禹鑿開挾雨龍從雲裏出看花人自洞中囘酒酣倚杖層巔上笑指滄溟水一杯馬進士抑之穿山送别用前韻五典三墳滿案堆君才不讓吕東萊池邊夜月蘭舟泊花裏春風綘帳開已見陳蕃待徐孺還期孔子鑄顔囘多情最是穿山色飛入離筵送别杯穿山徐有貞一拳秋水骨兀立浦雲邊地僻通靈島門開似玉闗碧分芳草色蒼入古苔斑為有劉安客題詩咏小山同前陸㫤早朝天上黄金闕墮落腰間白玉環愁殺奚奴尋不見却來此地作穿山同前陳蒙石門空虛誰鑿闢薜荔挂影蒼苔積懸厓偃樹鶻栖巢古洞出雲龍啟蟄穿山在州東北五十里高一十七丈周二百五十步中有石洞前後通徹故名臨海記曰海虞穿山下有洞穴高十餘丈昔有海行者舉帆經其中今考其洞上猶通人往來而其下為地去海已遠舊屬常熟縣今分𨽻太倉州鎭洋山記在州治後壘土為之祝允明𢎞治十年蘇州府新建太倉州成遵詔命也堪輿肆其樞烝黎矢其鏌而廵撫右副都御史朱公瑄建白之太守曹公鳳主維之同知萬公祥等申畫之所以造規考工凝績垂遠咸出於州守李公也初治廨既立百具皆作而相維㳂州之東滄溟環輸揺汨滔溔萬古不休雄邦屹然傲睨踞壓而萬井衡夷無標極之形於是即廨宇後築為崇巒肖像三山中隆夾亞堅壤豐積樂石竒叠材木蔚章鳥獸馴集岌乎摩蒼霄嶷乎跨黄祗風蟠氣廻情愜勢到足以聨絡地軸支控鯨渤而又為亭者三居山之前者曰迎仙次曰來仙西偏曰遊仙為洞一居山之麓曰集仙既成州人讙聳征商歸矚夷倭附服艅舶安流伯若興寳龍魚帖居乃稽勲名山謂之鎭洋同知州事周君明令義官鄭餘慶請記夫兩儀育物而川岳奠位王公設險而城隍作藩肇州封山其來久矣又况維洛食而周鼎定咸陽峙而漢闕依形相之方孰可違廢然而不藉賢宰疇匡聖圖故龍門砥石禹成舜功南交銅柱援標漢業厥今沙海漸暨揚波不聞所謂龜筮恊從神鬼受職困民而利職競由人然非深不足以經遠非明勿庸以輔幽有如兹州俶構斯山罔興化機物情未云周審今則地理順謐水土平康物性充而形勢强隂陽和而陵犯解易曰后以財成天地之道輔相天地之冝以左右民臣也者承君之義以致之民者也則鎭洋之創我后知始羣公作成乾坤交冝人物攸頼豈不謂財成輔相者歟非天下至深至明其孰能與於此惟李公抱英荷傑直氣凛凛殆乎海其知而山其仁者也蚤由進士簡擢御史繡斧所指霜憲峻肅當道駈豺黜落仗馬廟堂揚明特起兹任然臥治東壖絃歌雞割非大賢之路明辰大行獨留巍聲共山無折則民之懷矣永以有託公名端字表正棗陽人董其役者隂陽典術瞿坤醫學典科杜璧也允明既纂瑑勒懿綴為銘詩詩曰繹繹新州嶟嶟崇丘拊寧大流厚土崔崔剛民差差坎絡坤維三壺委形日觀授明五岳連衡陽侯效職波臣屏息其究安宅都臺建勲羣公秉鈞凝於州君六府維修人謀鬼謀以承天休乾清坤夷蒼生熈熈重譯秪一股肱其良庶事其康獻於天王又記桑悦孔子曰譬如為山又曰為山九仭傳曰丘陵學山然則山猶可為可學者歟太倉前横婁江東接巨海元之至元十九年宣慰朱清張瑄於此通海漕兼市易海畨遂成華市延祐元年以崑山州治徙之於此後因海盜陸梁州復移崑山我朝呉元年立太倉衛洪武十二年分立鎭海並治一城荷戈與操耒者游居歲乆芒頓弗倫怯膏餧强𢎞治十年廵撫右都御史朱公瑄奏聞欲割崑山常熟嘉定三邑地之切近太倉者立為州以扶抑之上曰俞廟議僉曰驁悍欲歛跅弛欲繩纒紐欲劃攭裕展拓克勝厥任者毋慮屈一人以伸全州人咸以湖廣之棗陽李侯端素以學行名於時登黄甲官六察平生直道而行有忤權貴乆淹下僚非斯人勿克料理是州其驥足又滯一方混同衆寡筭利害不足為侯惜乃推侯為州守侯至任經營百方整齊州治凡門堂牢庫學校壇宇之屬煥然一新又念州中山寡宻邇巨浸惟土足以勝水效東坡治徐造黄樓意遂於州後隙地因陵為高命典術瞿坤董工採土築為三峰下連坡坂㸃以竒石山成侯名之曰鎭洋盖欲兹山運神畜靈利如五兵之在庫險如長城之臨鄙威如宿将之坐帷幄而凡浮泡微沬足以􅀈途扤屨與夫鯨波陸飛蕩析居民之禍永永其無有也侯心其厚矣哉方為山之初侯與予相其向址告予曰予欲於其處為山山之上下植以錦卉并後凋難老之木絡以亭館公暇與州士夫觴咏其間論道古今斟酌民瘼不亦可乎予應之曰侯廊廟之具浮沉州縣多厯年所公道不冺近司銓衡者舉侯為四川監司官名聞於上不乆将為圖南之舉正王元之所謂未知明年又在何處者侯能一日樂於兹山歟侯笑而不答雖然已之與人相為盛衰草盛則衰榖已盛則衰人故為已千歲計者則不為人一日計計人於千歲者則不計已於一日理之必然者也侯自為吏持亷秉公信於老稚已不待言及治兹州興衰舉廢立綱陳紀恒如不及至於重繁纓惜餼羊辦一身以當是非毁譽之衝凡百建立懇懇若為曽𤣥計者正與為此山同果望身享其樂邪使凡為吏者皆能克其為已之心克之又克馴至於無己已無己斯人皆已如是則利與天下同樂害與天下同憂堯舜君民之道有外是哉若侯者亦可謂不負於吏者矣予舊常熟人新徙名數於州知侯心事最詳因州判官浙江之蘭溪龔侯詔求予言勒石以垂永乆遂為紀其事如此嗚呼開州鼻祖侯功不刋州人後世亦為美談曰猶望高子可望是山賛陸晨巍乎高哉惟兹鎮洋三峰㧞秀五岳獻祥一簣之土一拳之石積之絫之成此茂績卓哉李侯出計孔竒夸娥巨靈天寔相之鎭我海陬固我地軸壯我一州登我百榖路不拾遺海不揚波四境奠安所藉者多龍蟠虎伏鬼護神守巉巉岩岩蒼蒼茫茫有玉可韞有豹可藏紆紆徐徐盤盤曲曲路轉峰廻深奥幽獨旁栽嘉樹襍植幽花恩流雨露秀發烟霞雲氣結構嵐光澒洞韓詩態状諸或兼共侯惟公餘委蛇徜徉一躋其巔俯觀四方民有顛連舉在侯目照被窮隂侯心似燭思𤣥桑子文章大家為侯紀功上磨其厓小子昭甫目擊其盛歌頌攸冝蕪詞罔稱投之山靈侯徳用昭地乆天長山無動揺登鎮洋山沈周水滙風衝海渺茫新州東壓示雄强白滔萬里登臨近青並三山指顧長歲乆魚龍扶地軸春深草樹發天香邦侯卜築功成後從此波濤不敢狂太宗文皇帝御製寳山文碑嘉定瀕海之墟當江流之會外即滄溟浩𣺌無際凡海舶往來最為衝要然無大山高嶼以為之表識遇晴晝風静舟徐而入則安坐無虞其或晝夜烟雲晦冥長風巨浪帆檣迅疾倐忽千里舟師勿戒瞬息差失觸堅膠淺遄取顛躓朕恒慮之今年春乃命将士相地之冝築土山焉以為往來之望其趾東西各廣百丈南北如之高三十餘丈上建烽堠晝則舉煙夜則明火海洋空濶遥見千里於是咸樂其便不旬日而成周圍樹以嘉木間以花竹蔚然竒觀先是未築之前居民恒見其地有山影及是築成適在其處如民之所見者衆曰盖有神明以相之故其兆先見皆稱之曰寳山因名其所稱而不易遂刻石以志之詩曰滄溟巨浸渺無垠混含天地相吐呑洪濤駕山㠎嶫奔巨靈贔屭相噓歕揮霍變化朝為昏駭神禠魄目黯眢蒼黄拊髀孰為援乃啟兹山當海門孤高靚秀猶崐崘千里示表鬱㶿燉永令帆濟無憂屯寳山之名萬古存勒石悠乆同乾坤永樂五年四月初九日寳山晴雲高宗本馳驅萬卒一山成寳藏含輝雲自生隠約壺天浮瑞彩依微海市㺯新晴從龍目駭畨船客捧日歡騰水寨兵珍重吾皇洒宸翰千年草木被光榮寳山在嘉定縣東南八十里依仁鄉永樂十年三月平江伯陳瑄督海運築為表識上建烽火高三十餘丈周圍一十五里震澤賦有序朱右按禹貢震澤底定在揚州之地説者謂太湖也國語太湖韋昭注即五湖也書謂之震澤爾雅謂之具區周官職方楊州藪曰具區浸曰五湖又似與之不同吳越春秋又名笠澤吳地記云五湖者菱湖游湖莫湖貢湖胥湖漢貨殖傳吳有五湖三江之利太史公自序亦云登姑蘇望五湖愚意震澤以其震蕩不定而名具區以其既定而草藪聚為義而五湖者又太湖東岸五灣瀦水之别溆今連屬巳春秋時釣笠澤漢傳吳志指為五湖皆即今之太湖也於是推本作震澤賦以極庶類之䌓衍明禹徳於不朽其辭曰客有鄒陽生號遠遊公子俶儻瑋瑰超竒㧞偉衣白雲之翩翩峩巍冠之韡韡神恍恍以欲逸風飄飄而凝佇於是上會稽探禹穴訪遺踪超洞壑軺車前驅輜重紛錯王子進之以笙鶴江令贈之以芍藥遂乃揚帆錢塘鼓枻中吳将欲窮覽山川壯遊江湖造松陵主人而歡然從予主人曰子號厯覽亦嘗聞澤之大有三萬六千頃者乎生曰未也可得聞歟主人曰唯唯夏名震澤周曰具區下屬三江寔為五湖右接天目宣歙出溪之源左通松婁中江入海之洳衆流之委羣利之儲苕溪出其南溧水經其西五灣瀦其東垂虹界其堤流甘泉之清液隠雪灘於北隈洞庭中起林屋天開渺彭蠡呑雲夢駕雷夏軼孟諸杳不知其幾千里之遠疇能記三萬頃之有餘其澤則汪洋浩瀚洶湧奫潾瀰漫涬溟渙渙沄沄流颷吹波結絡龍鱗日光玉潔澄澶氤氲清瀾凝漪錦花成文浪濤噴濆澎湃汯粼出雷騰虹蒸雨生雲吸呼隂陽呑吐乾坤如潮汐之不測或早暮而異觀飛揚蕩薄迅復汨淪千態萬狀盖不可殫論其藪則碧沙漫衍黄石碔砆莎薜蒹葭白萍青蒲荇芹藴藻茭菰荻蘆蔓菁杜若江蘺蘼蕪芡實雞頭草長龍須芰荷翠沃蓮藕芬旉衆物居之何可勝圖其土埂則塗泥微露埤溼就乾葴菥藨蒿茝芷蘅蘭菖蒲馬荔荃蓀射干圬楊絮白水柳葉丹蘋蓼早緑榆楓暮殷朱橘火齊黄柑金九連枝並秀駢集乎其間爾乃周流梗概溥覽斕斑兩兩相峙蔚乎崇山其山則層巒崑崙叠嶂嶙峋岑嶔參差如陵如墳崔嵬􅒞崒陂陀糾紛上㧞仭岡下臨湄濵控地軸以磅礴逐水曲而折旋馬跡屹立以嶷嶷翠峰峻㧞以盤桓戞浮雲之流景俯蛟龍之深淵空谷谽谺以無底磴道蜿蜒以相連其中乃有奉眞之祠供佛之堂琳宫道觀梵宇禪房雲烟縹緲金碧焜煌黄冠緇衣來往而尚羊談𤣥賛空學幻言哤或登座以演法或擊鮮而稱觴駕白魚之飛艎泝重洑之流光水産則黏蠔旋螺土蛤石花􅗫鱧鯽鯉鱖鱮鱨鯋縮項之鯿頳尾之魴細鱗之鱸紫甲之蝦稻蠏盈尺腯螯載車長蛟巨黿穹龜靈鼉周遊涵泳其樂無涯羽禽則晨鵠荘雞鶄鸛鳬鷖交兼鴇鶂鸂鷘鸕鷀羣鴻來賔陽鳥攸居駕鵞遠舉鷗鷺忘機王睢並鶩屬玉交飛振翮刷羽以遨以嬉來如風飄去似烟晞若乃絕岸之濵漸水之石或伏或倚或側或立或方如珪或圓如璧或矗如峰巒或平如几席或滑如脂肪或廉如劍㦸或頳而赤或蒼而碧或皎如玉或黝如漆為中流之厎柱若逆河之碣石恠恠竒竒熒熒礫礫斯又天造之神功而出於兹水之蕩激也思昔夫差競伯圖勲鏖戰於此勝負未分旌旗蔽空舴艋如雲始魚鼈以為樂終麋鹿以成羣乃若歸釣之徒著書之士去國䲭夷汎舟西子亦復渺渺滄波茫茫白水主人之辭未終鄒陽生肅乎改容喟然而嘆曰甚矣世道愈下而人心之不古也吾子好學頗識典策不述職方之經邦而盛稱兹澤之庶殖不思禹績之胼胝而徒嘆英賢於戰國皆非所以極游覽之望而察五行之至徳也遐思往古擊節太息請即主人所聞而陳予之所得嗚呼噫嘻浩蕩方割懷襄未平九域混而莫辨百潦壅而不行支祁崛强於淮甸天吳披猖於海溟時維兹水震蕩靡寧浡浡洶洶砉砉轟轟疑撼天而動地猶駕雷而鞭霆類不周觸而天柱折若巨鰲抃而洲島傾斯震澤之所以錫名也迨夫九載既南庶土交正波神受職川后奉令應龍畫地以効功庚辰持㦸而制命導吳淞以安流别淮海而表境於時澤安其所水順其性鳴者自停動者自靜斯震澤之所以厎定也千載之下美哉禹功昏墊之害既遠灌輸之利無窮故漁人舟子之出入豪商薄宦之經從擊楫鼓浪引帆隨風莫不連檣接舳往來乎其中斯又具區所以出萬民惟正之供也方今海宇清明朝廷寧謐内宣民化外修貢職農安其耕女效其織工習其業商估其直士守遺經民食餘力風不揚波水不濫泆方鎭以寧土地墾闢開禹之疆廣禹之績是以九州之外咸仰聖育沾濡乎仁義涵泳乎道徳浹洽恩波沐浴膏澤漸摩浸潤流衍洋溢天無亢燥之灾人樂沃土之俗試言其故則辟雍湯湯聖化行矣靈沼洋洋聖澤汪矣御溝溶溶生意茫矣溥徳川流達要荒矣下視一隅寧不隘杯水於坳堂矣主人於是竦乎樂聞憮然自失仰禹功之長存慨餘子其何益相與鼓枻乎滄浪曽不芥蔕於胸臆乃起為詩歌以頌徳詩曰於赫禹功配天比隆生我遺民宅於土中原隰畇畇江漢為東萬世永賴惟禹功是崇於皇禹徳立我民極手胼足胝救焚拯溺鑿井而飲耕田而食靡謝天功焉知帝力於昭太上示民以應眷祐我皇與民立命開禹疆土繼禹作聖其混合四大維民之正於穆聖皇惟上帝不常敬哉有土亹亹不敢康五岳四瀆七澤九岡各修其職來享來王來享來王受天之祐于萬斯年睠我有土有土有民有子有孫有引勿替以頌斯文太湖賦王鵬吳之有太湖彷彿乎三萬六千頃寔水徳之所鍾乃江南之佳境跨三州而無限納大象而絕迥𨽻淮海之維揚頼禹䟽而克靜匪歸虛之可方或雲夢之堪並觀其浩溔潢洋瀰澷渺茫沉沉隠隠訇磕砰磅動盪地軸噴薄穹蒼尋源委而未涯混朝宗而有常鄙綱絡之羣流包涓滴之濫觴鼓洪濤之激逸沃玉蟾之盛光扇大塊之怒氣蕩陽烏於扶桑灔灔乎不可以際飄飄乎莫之能傍滃焉如霧勃焉如烟汯澄澹沱泓漭緜延陽侯崛强而起立馮夷織翠而周旋象未凝之肧渾器已極之幅隕曠矣哉習坎之道不可以計往而𢎞兮罔知津來而濶兮渺無備此則太湖之大畧也若夫大魚崢嶸老蜃蟉蚌巨鱗濯錦而展綃長鬛拂雲而捎斗其靜也則風烟帖寂四望一碧其動也則驚濤觸天高浪沃日撇捩而林谷俱振吞噬而舟航若失其潏湟之際璇環之中𤣥隂連屋而燭夜珠光抹電而燒空神鰲怪鼉間見詫出聳兮可怖邈兮可踪復有豪漁旅旅千檣萬櫓挾任公之竒能效龍伯之歩武運若林之筌笭列排雲之網罟然後鬛掉尾振迅儵撇砉曝采赤腮晃淵起溺大者丈餘小者數尺或迎網而自獻或飲鈎而可得腥烟蔽昏數不可極其山則有東洞庭嶷然如立其上則有神人之府眞仙之宅乃左神幽虛之天南接羅浮北通岱岳王屋東連蛾眉西達故謂之洞庭地脉及有招提蘭若丹青烜赫其石則如煤如鐵谽谺􅌑瓏透眼穿穴龍虬蟠結虎豹嶻嵲文士卑以楚辭謟人貢之魏闕其松則連雲卧島捫參厯昴修百仞廣合抱材中棟梁勢凌穹昊上有白鶴飛翔下有蒼麕出沒其中民居如城如市鱗次櫛比駢甍連墁華榱接址大者則有陶朱猗頓之流海賈畨商之侣絫貨如阜鬻産成庾靡分耄倪惟利是務間有以經史為生涯付光隂於膏晷道宗程朱詩法李杜作為詞章雲騰川鶩亦有務光巢許之徒長沮桀溺之輩待玉帛如塵囂覩爵禄為泥滓樂考槃以自適耐枕流而成趣家必有園則千頭木奴飽霜爛目其他櫻桃枇杷楊梅盧橘梅杏桃李蒲萄椒栗絫絫如綴照曜風日翳游目之觀瞻寔卒歲之衣食更有餘峰七十有二燦焉如羣螺之墮玉盤者又豈勝悉舉其跡哉辭既客有舟而過者曰子之知太湖之樂者如此而可懼者則有未知也是猶知火可燃炙而不顧其燬裂之禍知水之可飲可滌而不顧其沉溺之患者也先生曰噫予非不知也經不云乎飄風不終朝驟雨不終夕天地尚不能乆於其常吾惟謹於涉而簡於出寧揜關高卧之固守何知揚帆騁興之取忒故當順其變之足慮難保乗其勝之偶得也歟客喜而歌曰奫奫太湖其波漣兮覃及四方王道平兮先生於是乃賡再歌曰太湖之深兮可以養我之心兮太湖之浩兮可以泰吾之道兮客乃胡盧舒襟揮袂再揖辭謝鼓枻而去吳都文粹續集巻二十二
