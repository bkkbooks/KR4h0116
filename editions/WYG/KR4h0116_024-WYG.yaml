body:
  text: 呉都文粹續集巻二十四明錢榖撰山水橫塘范成大南浦春來緑一川石橋朱塔兩依然年年送客橫塘路細雨垂楊繫畫船曉泊橫塘短夢難成却易驚披衣起潄玉池清遙知中夜南風轉洶洶前村草市聲出橫塘韓奕未曉出橫塘舟遲覺路長㟁痕秋水落曙色海霞凉短褐迎霜授新粳帶露嘗山中與僧約不比仕途忙出橫塘蔡羽鸎啼呉苑秋千静寒作春陽草色遲髙低紺宇山幾寺逺近青溪花半枝叅燈巳扣松邊笈賽鼔遙從水上祠繡壁丹崖隨意宿梅洲蘭渚纜頻移曉出橫塘路朱琬曉出橫塘路塘横物色賖鶯聲歸柳嫩燕影掠帆斜水積連旬雨溪深夾㟁花孤舟望鄉路去去興無涯其二曉出橫塘路塘幽事事清礙流深樹影喧靜一雞聲蘆葉晴江逺桃花春水生渺然歸興發背日獨含情其三曉出橫塘路塘深趣亦竒野花繁曲㟁江竹靜疎籬順水舟行疾盤雲鶴上遲往來幽玩熟凖擬結茅茨自石湖至橫塘二首王寵山水繡相錯清暉如可餐峰形分塢塢沙曲擁灘灘西蕩荷香拂南屏秋氣寒嘯歌終日裏懶散不簪冠二人家叢水竹厥土沃塗泥澤徑菱花覆霞莊稻葉齊漁人千網集開士五雲栖草履長林下持編且牧羝横塘歸袁袠片月出雲嶠荒烟起茅舍薄暮見漁舟來集澄潭下橫塘晩興皇甫涍郭外有幽棲閒情泝碧溪湖山相映發鷗鳥日招攜霞色浮塘上鐘聲過水西歸來一邱壑源路使人迷長蕩泛舟沈周發迹過長蕩識此平生始春流方漫衍曠蕩彌十里老葑蔽重雲敷芽青􅀈􅀈正如一明鏡㿺蝕銅鏽起西山欲流照掩郤螺髻美山亦拗怒去南走太湖涘羣勢擁疊浪爭捷互排擠我恐先我去揮手喝之止湖山四面好轉側皆可喜此面正佳絶扁舟載西子芳洲有隙地宜賣脱紫綺移家非丹砂所好在山水長蕩汎舟皇甫信清風江上下銀鈎一片蘆花萬頃秋向晩月明洲子畔數聲欸乃起呉謳長蕩在虎丘之北黃天蕩張憲昆明劫燒成灰火臨平葑湖撥不開黃泥萬頃下無底海眼一絲通往來南徐江邊海鰌走江神頓足黃龍吼便翻銀漢濯泥沙要使妖蛇先授首黃天蕩在葑門外過獨墅短棹㣲風窈窕片帆落日橫斜舍傍誰開酒肆牛疲知是田家宿獨墅華幼武獨墅三更月孤舟萬慮人東行聊慰意北望總傷神水濶風烟逺秋髙稌黍新尚憐魚菜美庶以奉吾親黃天獨墅在黃天蕩之東獨墅王墓朝天三湖連綴中㣲隘如川其實一水也過車坊漾蕩舟滄波萬頃搖櫓白鷗渚傍不知新月東起回頭過盡東方宿蛟龍浦口呉一鵬蛟龍浦口夜停船㣲雨初収月滿川只恐蛟龍時崛起忽生風浪攪愁眠蛟龍浦口在獨墅之東一名頳墩湖其東北又有車坊漾比諸湖更深又名鑊底潭過陳湖陳基平湖秋色曉蒼蒼鼓枻聲傳浦溆涼鴻雁欲來天拍水蒹葭初老露為霜菊荒甫里人何在鱸入松江興轉長不用臨流重懷古葦花菱葉滿滄浪泊陳湖華幼武繫纜陳湖口茆簷野趣多薔薇紅炫日楊栁緑涵波漁網依時集農田著處歌地偏苛政少其樂更如何歸闔閭浦極目烟江盡頭屈指姚城渡口世人不理曲肱自餉黃雞白酒陳湖在車坊漾之東又東為闔閭浦過龎山湖楊維楨湖上足晴晝雨餘生緑隂扁舟到城近曲港入村深野叟頻相問郎君不可尋西菴有分席吾亦老山林與龎福一逰龎山留題西隱菴甯玉龎山西隱阿蘭若中有髙人趣不同千偈瀾翻無滯跡一塵不到有清風門前湖水三萬頃雨後雲山八九峰對蜆堂堂無别事一聲漁唱月明中和龎福一松陵城外古招提總入西雲路不迷明月清風深夜靜斷雲流水小橋低香含優鉢花饒笑韻叶頻伽鳥亂啼如此佳山與佳水幾多詞客為留題逰龎山同龎雲翁干文傳山本無名惟有名入山山意自分明墻隨畦畛髙低築船趂沙灘逺近横别墅午晴雞喔喔隔林風細鳥嚶嚶山翁獨把烟霞占五十餘年未入城龎湖旺扎勒特穆爾湖波渺渺鏡光寒湖上逰人得勝觀一片霞鋪紅葉渡數團雪墮白鷗灘再登古宇探龍穴漫汲靈泉煮鳳團聞説鱸鄉何處是明朝猶約弄漁竿登龎山周谷賔意思宛然在命名良不虚林泉儘幽勝地土亦華腴葵韭家家業朱陳世世居山靈應不吝寸地著吾廬過龎山湖龎龍年來問族到龎湖風景分明入畫圖細浪魚吹蕩雲日飛花鳥載度烟蕪憂時范老心常在奉使張騫興不孤却笑十年名利客蹉跎萍迹尚東湖龎山湖在澹臺湖東自分水墩流入甘泉橋滙於此其下流為黎湖菱湖葉澤湖新湖題九里湖呉驥太湖風濤湧銀屋望處令人駭心目豈知數里小澄湖近接吳淞烟水曲未能朝宗會百川頗擅清虚逺塵俗沿堤冉冉春流漫拍㟁溶溶朝雨足桃花浪煖鏡光明時動㣲瀾皺輕縠忘機鷗鳥自往還無意菰蒲為誰緑農憂亢旱資灌溉户有鮮鱗供口腹我㳺朔方思故鄉恒厭黃埃暗山谷此日南歸得縱觀欣聞漁唱聲相續欲収佳景入吟懷俄報斜陽舟去速白蜆江阻風夜宿江口懷徐賁姚廣孝顛風渡江難停櫓依菱葑濤烟翳暝光灘月浸寒夢漁歸候火明鳬眠忘蘆動遇險更思君􅈝覺離愁重八月十三夜汎姚城江陳基畫船撾鼔唱回波皓齒青蛾不用歌好月愛看輪未滿清秋莫問夜如何明將織女機絲動寒恐嫦娥白髪多天上清光應更足羽衣安得共婆娑何年江水出姚城轉覺東南地勢傾彩月夜當河漢動客星秋入斗牛明㣲波不起魚龍靜嘉榖初登海宇清生喜太平仍少壯浩歌擊楫豈無情九里湖在葉澤湖之東亦名同湖急水港杓頭潭清水蕩在焉又東為姚城江白蜆江小龍江汾湖賦陶振釣鼇生朝發乎東海夕將抵乎西都過茫洋之大澤勢滔涵乎太虚以為洞庭耶則層樓不見翬飛乎黃鶴近山不見翠列於蒼梧以為彭蠡耶則㵼不見銀河九天之瀑布而張不見屏風九疊之匡廬扵是東覽三泖西瞻具區然後知三呉之巨浸名所謂汾湖者歟是時也日落蒼灣烟淡平蕪恍東山之月出遇隣舟之老漁停桂楫而揖予曰吾將告子以汾湖之所以得名衍子以汾湖之大義子亦樂而聞之乎是湖也兩界中分南北無虧其南也則千綆之無盡其北也則百弓之有餘故南其半為嘉禾之境北其半為松陵之墟湖之得名其以是歟故老相傳信而不誣原其始别蓋具區之溢出而旁滙乎此瀦然亦安知其不濫觴扵崑崙之頂泄瀚海而來尾閭者耶乃若㣲波不興一碧萬頃如青銅之淨拭似白練之平鋪􅄓風倏起長鯨怒呼㧞銀山之千尺捲驚濤之雪如使觀者不覺心戰而膽慄頃刻碎行人之舳艫其産則辛夷杜若菡萏珊瑚大貝之寳明月之珠春水桃花之鱖秋風蓴菜之鱸白頰奪淮西之風味紫蟹剖呉下之膏腴又有魚鱗之屋水晶之居其源莫測其奥莫覦構波神之窟宅作馮夷之幽都月白風清似或聽廣樂鈞天於縹緲雲消雨霽恍若見金支翠旂之有無既無凌波之仙子豈無騎鯉之仲夫玉宇生涼則足以稱純陽飛劍之渡緑雲曉漲則足以供漢隂抱甕之􅆽散落霞錦光於蕩漾濯殘陽紅纈於扶疎昔杜少陵空有渼陂之樂曽不及此一覩李翰林空有郎官之汎曽不及此一窺故凡㳺乎此者自有以得其樂又何必渡黃陵而逰赤壁隔滄海而望翠蓬與𤣥壺也哉雖然此特其槩耳若夫地靈人傑同徳相符則有陸龜䝉之苗裔陶𢎞景之後徒天㳺子學貫乎載籍六一翁道究乎精粗雲樵先生之磊落采芝逸士之清臞是數公者莫不韜光扵草莽混迹於樵漁披羊裘扵風雨恣綸竿之巻舒一棊不肯却淝水之戰一箭不肯射聊城之書仰髙名扵辭漢之嚴子慕清風扵去越之陶朱悉能葆清光於治世處髙明而不汙吾嘗品其人南州髙士之列孰云誕而為迂若是則今之汾湖不獨有異芳竒物之産神仙巨靈之宅抑且為浙西人物之淵藪東呉學海之歸墟也語畢老漁鼓枻波間倏别而去飛玉龍之一聲捲輕濤於别浦折風木扵太湖八百之西灣不覺七十二峰翠鸞之掀舞紛落葉以相觸洒篷忩之急雨起而視之則時夜將半雞三鳴更四㸃月巳墮海西丈五矣扵是叱湘妃捧研命洛神展素授長杠大筆扵青天蘸蟾窟九秋之清露想老漁所述之前言而遂寫為汾湖之賦陶振字子昌華亭人贅於龎山謝氏遂為吳江縣人㳺汾湖得武字楊維楨盪舟武陵溪朝出伍子浦還過西陸家仙童啟岩户棠樹大十圍桃花燦欲語遺我古鐵枝色比脩月斧為作古江調江鳥凌亂舞攜之謁龍君湖水吹暮雨晩飲花石岡亭臺巳無主瀛橋歩月歸竹枝和銅鼓道人早歸來脱冠挂神武得錦字殷奎平湖天錦落波濤殷寒枕鳶飛下跕跕龍眠驚淰淰道人吹鐵龍百竅聲盡噤柳溪千花明燦若天馬錦交朋類搏沙美會猶拾瀋主人敬愛客十日相泥飲嗟予一介㣲好古亦天稟作詩續貂末芳評賴題品得上字程翼樓船載酒汾湖上萬頃玻璃綠新漲玉簫檀板館娃歌銅鼔雲璈仙侣唱涼蜜金盤荔子漿紫馳銀甕葡萄釀桃心大舞天魔宫分班小擺花神仗人坐盤陀古翠巖鶴立海棠青錦帳醉揮玉塵奪詩魁氣噴鐵龍驅酒將三五朱扉流水香十二闌干花氣王歸來凉月白紛紛湧出銀濤三萬丈得花字王佐青簾畫舫載吳娃皛皛行雲十里賖湖光逺帶栁溪水春色好在桃源家十幅錦帆風正健一聲鐵笛月初斜玉壺香醪興未盡更醉海棠嘉樹花得溪字陸宣翠岩亭下問棠梨上客同舟過柳溪花下停歌聽鸚鵡竹間把酒飲玻璃緋桃照眼春無賴石洞關雲路轉迷金粟彈筝銀甲冷珠簾度曲翠眉低錦帆捲浪風生座羅襪生塵草被堤屢舞不妨飛野馬醉歸遮莫報隣雞梵王臺殿空陳迹鮑氏池亭憶故栖鐵笛吹殘山月白竹枝曲唱駟橋西得陵字陸恒春風畫舫錦帆乘鮑陸池臺次第登翡翠花枝人似玉葡萄銀甕酒如澠泗洲寺裏看題竹伍子灘頭聽采菱歌扇斜搖波縠皺舞衫輕脱唾茸凝七星鐵管金為㸃萬斛珠琴寳作層臂脱朱鞲明越帛燕衝烏帽濕吳綾雄詩奪錦欺三謝俠氣凌雲比五陵醉卧氍毹驚露下芙蓉月浸碧壺氷致仕還汾湖問信海棠陸行直湖濵春水似桃源楊栁青青燕子喧晴日暖雲歌别墅錦天繡地醉金門流光冉冉長為客清夢時時遶故園借問當年花下影紫簫吹斷幾黃昬逰汾湖顧遜武陵溪上花如錦花氣薰人如酒濃簫聲時倚鏌鎁鐵雲影忽落玻璃鍾小娃傳令覆蓮掌逰子掀篷看玉容汾湖歸來夜何許明月近挂青螺峰汾湖一名分湖分屬吳江嘉興也其東流入謝宅蕩蓴菜蕩南陽港又東通三泖鶯脰湖趙時逺鶯去湖存事渺茫梵宫占斷水雲鄉四圍烟樹波濤濶六月橋亭風露凉逺近征帆歸别浦髙低漁網挂斜陽翠㣲深處一聲笛驚起眠沙鷗鷺行春日㳺鶯脰湖偶成陳一初聞記鶯湖舊有名飛湍㵼碧響春聲鮮鱗雪貼銀花細大舶風生竹葉輕西塞𤣥真留勝迹東林白社樂閒情我來半日溪亭坐吟得新詩信筆成㳺鶯脰湖吳億樹色烟光兩㟁分棹歌聲裏散鷗羣船浮春水天疑近人對春風酒易醺翠袖不須花下舞洞簫還待月中聞仙㳺釣客今何在湖上年年自白雲㳺鶯脰湖張淮白鳥眠沙夢不驚寒生水國半隂晴酒涵春色花邊過船載湖光鏡裏行南浦愁連芳草緑東風歌送落梅聲那堪日暮臨岐别更聽河橋栁上鶯鶯脰湖在太湖之南其源自天目東流至荻塘會爛溪水併出平望安徳橋滙扵此以其形似鶯脰故名亦名鶯鬬湖過沈張湖呉復綵舟蕩槳看青春栁色桃花㟁㟁成江國㣲風醒酒力水村落日見漁人沈張湖在鶯脰湖下流之北松江賦葉清臣澤國秋晴天髙水平遙山晩碧極浦寒清循㳺具區之野縱汎吳淞之􅍽東瞰滄海西瞻洞庭槁葉㣲下斜陽半明樵風歸兮自朝暮夕溜滿兮誰送迎浩霜空兮一色橫霽色兮千名於是積潦未收長江無際澄瀾方興扁舟獨詣社橘初黃汀葭餘翠驚鷺朋飛别鵠孤唳聽漁桹之遞響聞牧笛之長吹既覽物以放懷亦思人而結欷若夫敵冦初平霸圖方盛均憂待濟同安則病魚貪餌而登鈎鹿走險而忘命一旦辭禄揚舲髙泳功崇不居名存斯令達識先明孤風夙競又若金曜不融洛塵其䝉宗城寡捍王國爭雄拂衣洛右震耀江東拖翠綸兮波上膾蟬翼兮柈中倘即時之有適遑我後之為恫至如著書笠澤端居甫里兩槳汀洲片帆烟水夕醉酒樓朝盤魚市浮㳺雲外之物嘯傲人間之世富詞客之多才劇騷人之情思緬三子之清徽諒隨時之有宜非才髙見棄扵榮路乃道大不容於禍機申屠臨河而蹈雍伯夷登山而食薇皆有為而然爾豈得巳而用之别有執簡仙瀛持符帝柱晨韜史氏之筆暮握使臣之斧登覽有澄清之心臨遣動光華之賦荷從欲之流慈慰逺逰之以懼肇提封之所履屬方割之是憂將濬疏扵滙川其拯濟乎畛疇轉白鶴之新渚據青龍之上㳺濯埃垢於緇袂刮病膜乎昬眸左引任公之釣右援仲由之桴思勤官而裕民乃善利之逺猷彼全身而逺害蓋孔臧之自謀鮮鱗在爼真茶滿甌少回俗士之駕亦未可為兹江之羞泊松江渡許渾故國今何在扁舟竟不歸雲移山漠漠江濶樹依依晩色千帆落秋聲一雁飛此時兼送客凴檻欲沾衣呉江旅次張喬行人愁落日去鳥倦遙林曠野鳴流水空山響暮砧旅途歸計晩鄉樹别年深寂寞逢村酒漁家一醉吟同前姚鉉勾吳竒勝絶無儔更見松江八月秋震澤波光連别派洞庭山影落中流汀蘆擁雪藏漁市㟁橘風香趂客舟清興不窮聊一望烟空雲霽倚層樓同前孫何晩灘如雪起沙鷗咫尺姑蘇亦勝逰逸勢㵼歸滄海逺冷聲分作太湖秋葑田幾處連僧寺橘㟁誰家對馹樓魯望不存無可語片帆中夜渡清流同前王安石莽莽昔登臨秋風一散襟地留孤嶼小天入五湖深柑橘無千里魚鰕有萬金吾雖輕范蠡終欲此幽尋又張先春後銀魚霜下鱸逺人曽到合思吳欲圖江色不上筆靜覔鳥聲深在蘆落日未昬聞市散青天都盡見山孤橋南水漲虹垂影清夜澄光合太湖與子瞻會松江得浪字秦觀松江浩無旁垂虹跨其上漫然銜洞庭領畧非一狀恍如陣平野萬馬攢穹帳離離雲抹山窅窅天粘浪烟中漁唱起鳥外征帆颺愈知宇宙寛斗覺東南漲太史故文監謝家盡詩將提攜外形檢語笑供頡頏㛹娟幸不棄撥剌亦從放獨留三百缸聊用沃軒曠得㟁字參寥蜿蜒跨長虹呉會振竒觀水連幾萬頃放目失垠㟁倒影射遙山青螺㸃空半從來誇震澤勝事無昬旦破浪湧長鬛排空度飛翰肺腑入清境劃若春氷泮安得徧九垓從公逰汗漫松江晩泊吳融樹逺天宜盡江奔地欲隨孤帆落何處殘日更新離客是淒涼本情為繫滯枝寸腸無計免應只楚猿知同前落日停橈古渡邊古今踪跡一蒼然平沙盡處雲藏樹逺吹収來水定天正困東西千里路可憐瀟洒五湖船如何不及前賢事却謝鱸魚在洛川同前吳臺越嶠兩分津萬萬檣烏簇夜雲吟盡長天一江月更無人似謝將軍白蘋紅蓼間汀洲水鳥飛翔更自由我若功成解簪紱會湏來買釣魚舟松江作趙嘏松江菰葉正芳繁張翰逢秋憶故園千里帆遮館娃寺一川風暖採香村潮聲漸過仙人宅鶴市曽迷子夜魂我有五湖烟艇在不堪殘日動征軒松江秋書陸龜䝉張翰深心怕禍機不縁菰脆與鱸肥如何徇世浮沉去可要抛官獨自歸風度野烟侵醉帽雨來秋浪濺吟衣無人好尚無人貴吟嘯低頭又揜扉松江懷古碧樹吳洲逺青山震澤深無人蹤范蠡烟水暮沉沉松江楊蟠帆落帆開兩渡頭洞庭木葉擾離愁青山帶日低平野白浪隨風過别洲月靜沙寒知雁宿雲深水暖羨魚逰畫橋隱隱橫天漢人度空中影倒流同前郭祥正羣山髙下浸湖漘暝靄朝霞物物新驛道更穿東北去青銅影裏㸔行人軒亭多作碧湖傍蓮子枯時荇葉香最愛夜深鷗鷺散釣船明月似瀟湘同前范致虚黛潑峰巒安用染鏡澄湖面不須磨巳驚張翰鱸如玉想見西施髻似螺目斷樓髙知水濶雲開山盡見天多吾家本是烟波主好律漁翁一曲歌同前楊友䕫落日滿大江孤舟猶獨行蒹葭交相風中有肅殺聲適從城中來始覺秋氣清世路若廹隘江湖自寛宏平生獨往志久與白鳥盟陳人多所閲新事屢可驚惟有江上峰殘年眼中青過松江范成大長虹斗起蛟龍穴朱碧闌干夜明滅太湖三萬六千頃多少清風與明月青鷁驚飛白鷺閒丹楓未老黃蘆折誰將橫笛叫蒼烟無限驚波翻白雪洞庭林屋舊逰處玉柱金庭路巉絶水仙逢迎摻脩袂問我歸計何當決去年匹馬兀春寒今此孤篷窘秋熱人生意氣得失間輕重劍頭吹一吷莫將塵土涴朱顔却待丹砂回白髮松江舟中二首戴復古夜聽楓橋鐘曉吸松江水客行信悤悤少住亦可喜且會鱖魚肥莫問鱸魚美垂虹五百歩太湖三萬頃除却岳陽樓天下無此景范蠡挾西施功名付烟艇泊松江吳瓊孤舟尚逺征向夕泊江城泖口潮初上雲間月正明呉歌聲嬝娜楚客恨飄萍卧穩霜天漏沉沉欲二更呉江曲朱松呉江女兒白如玉花底紗忩傍溪緑玉簫春煖貼朱唇故作陽春斷腸曲扁舟掠水去如飛不見嫣然一笑時回首江城只孤塔向來一念復因誰呉江舟中樓鑰阿連久矣共一被小别愁生夜無寐風帆將我上征途回首江山忽千里小舟橫卧吳江水夢回依約篷忩裏五更漏急月黃昬烏鵲一聲人未起過吳江髙本江吞大澤無西東危亭聳立如驚鴻曉晴不見天地色上下澄碧迷雙瞳菰蒲千頃鷗鷺國風波萬丈魚龍宫逢時自好盡忠義莫學衰世鴟夷公呉江汪藻好在松江水丁年憶此過垂垂梅子雨細細麯塵波花老千頭橘香聞數丈荷百憂今巳矣搔首意如何還吳江黃由歸來三閲月無事一關心刈草尋花徑開池漾桞隂江邊問明月天際數歸禽幸有髙賔至相逢似竹林夜過吳江憶華終之吕寅伯更深無盡燭清氣滿山川沙上風鷗聚烟中霜草鮮故人别何處新月照孤眠欲寄相思意征鴻未可傳吳江春望嚴羽客有東吳别慿髙正憶家春青江上草湖白㟁頭沙去鳥無邊盡歸帆幾處斜音徽不可問惆悵結瑶華松江王安石來時還似去時天欲道來時巳惘然秖有松江橋下水無情長送去來船吳江懷古胡元質子胥今日委東流呉國明朝亦古邱大笑夫差諸將相更無人解守蘇州呉江道中許棐一别吳淞二十秋敗荷枯栁總新愁白頭交友凋零盡賴有寒江幾個鷗呉江陳基城邑帶秋水盈盈笠澤湄西風一夜起鴻雁盡南飛晉日東曹掾唐朝左拾遺長揖謝軒冕悠悠千載期同前釣雪灘頭暫艤舟晴虹千尺飲長流吐吞日月天無際出没魚龍地欲浮濟世誰當扶砥柱乞身吾盍老滄洲裁書為問天隨子杞菊荒來又幾秋自吳江回趙孟頫壯氣浮孤劍餘生寄短篷戰塵昬野色積雪晛春風北望旌旂濶南歸郡邑空江花與江水客思兩無窮呉江晩泊髙得暘江色入秋清蒹葭白露零星移孤雁影月落亂雞聲旅泊常隨處舟行不計程三髙呼莫起誰與話幽情夜汎吳江王原傑小舟輕似葉載月過蘇城柔櫓數聲響長江一派清天低連水色風順送鐘聲隔水疎林外漁燈一㸃明吳江夜泊馬臻不見天隨子令人逸興孤村砧聲自荅㟁鳥影相呼河漢回西極星辰入太湖古情今不盡明月照姑蘇呉江夜泊釋宗衍風壤三洲接江湖一水分虹消滄海雨日落洞庭雲客意終難盡漁歌實飽聞長思陸魯望不出可忘君舟次呉江善住客路渺無際﨑嶇何日平積烟迷逺樹殘照下荒城水宿先歸港朝行暗計程長橋知漸近笳鼔隔林鳴過吳江李孝光左帶吳淞右五湖人家笑我隔菰蒲風濤不動魚龍國烟雨翻成水墨圖越客卧吹船上笛吳姬多倚水邊壚鑑湖道士如招隱一曲他年得賜無舟過吳江十五女郎可憐生牽挽百丈踏泥行洗脚上船歌白苧春風吹過闔閭城舟次吳江寄溉之李學士張雨垂虹散髮思飄然悔不金陵捉酒仙詩有羊何方得和世無李郭更同船金人掌上三危露玉女窗中五色烟莫待遂良鬚盡白共尋瑤草看明年倪元鎮避兵吳江包英不待兵戈即逺移吳淞江上住多時從容只為知幾早阻絶應嗤會面遲角里正堪商谷隱龎公未赴鹿門期山川揺落空相對每切停雲一賦詩同上謝應芳詩中有畫畫有詩輞川先生伯仲之襟懷不着一事惱姓名惟恐多人知竹籜裁冠晨沐髮蓮蓬洗硯晩臨池數年同飲吳江水明月清風有所思過松陵陳謙第四橋下風水惡千斛船中心骨驚蛟龍有時就廟食鴻雁每嵗不南征松江太湖㑹合地莫雨寒潮交戰聲獨客倚篷歸嘆息﨑嶇世路何由平次韻王松陵陳深江上青山擁縣城江頭結屋放歌行散人昔有陸魯望處士今無禰正平萬頃雲濤聊自賞百年肝膽定誰傾何時適有扁舟興趂得垂虹夜雪明將赴京口道出松陵鮮于樞夢裏邱園去未能眼中憂患日相仍向憐楚澤行吟客今羨禪林坐斷僧千里雲山望京口一帆風雪度松陵三髙祠下空低首不獨塵心愧季鷹陪淮南僚友泛舟吳江城下王逢伏波魚龍夜不驚菱花千頃湛虚明吳儂似怪青絲馬漢月重臨白帶城世説竇融功第一獨憐阮籍醉平生樓船簫鼔中流發未及東南早罷兵吳江張翥坐倚風檣看太湖波濤澒洞半三吳寒通上界咸池氣黒入中流水伯都雲暗蛟龍應起立雪深鴻雁自驚呼望亭有酒堪消醉買得漁家一尺鱸避地吳江九日楊維楨行年七十猶為客何處江湖着老夫黒髮空留數莖在黃花也笑一錢無家徒活計如鳩拙病起形容似鶴臞獨把茱茰還自酌酒酣不用阿孫扶吳江夜泊曉向三髙祠下泊滿江秋氣入征袍紅蓮水碧留容色白鳥沙明見羽毛海賈結廬天上住吳兒將艇月中操手斟白酒休辭醉明日西風泛雪濤呉江盧堪三髙祠前流水五湖烟外孤篷楓落呉江夜冷髙情都付漁翁松陵倪瓚松陵原上望長洲緑玉平鋪江水流便取釀為千日酒大瓢酌月散煩憂夜泊吳江城下人家近住江城外月色波光上下天風景自佳時俗異泊舟聞咏白雲篇吳江月下泛舟胡奎餘霞歛遙岑㣲靄生近浦江行坐良夜月出鳴柔櫓茫茫天欲流歴歴星可數水螢乍明滅沙禽或翔舞此意誰與同三髙渺千古松陵道中岑琬野濶烟凝樹湖深水近田丫髻挑菜女獨櫓賣魚船鳥去春山外帆収古驛前孤吟看北斗戀闕意忘眠松江同宿和唐人韻張楷呉江楓葉冷獨客漫多愁月落汀烟曉天晴海氣秋萍踪隨雁鶩鄉夢越汀洲回首青雲路低頭愧白鷗吳江夜泊薛績舟傍垂虹宿夜深飛露華鐘聲來梵刹燈影近漁家葉響風生樹灘明月映沙去家雖不逺惆悵即天涯渡吳松江髙啟稍離城郭喧逺適滄洲趣乘湖動旅榜露散寒江曙蒼蕪靡靡出白鳥翻翻去不識隱人村舟中望髙樹遭時嘆有棘拯物慚無具不向此鄉居飄零復何處至吳松江江淨涵素空髙帆漾天風澄波三百里歸興與無窮心期弄明月迢遞辭金闕晩色海霞銷秋芳渚蓮歇久别釣魚磯今朝始拂衣忘機舊鷗鳥相見莫驚飛過吳松江風雨大作不可渡晚覔漁舟抵松陵官舍風雨方知客路難飛鴻相逐渡江湍港収漁市歸舟晚門掩官㕔對燭寒此地昔年曽逺宿何人今夕共清懽枕邊不為江聲急夢寐憂時未得安松陵江上韓奕閒㳺何處寄閒情江上維舟眺晚晴秋雨荒城猶艸色寒天逺寺又鐘聲支離形影中年過蕭散心情外物輕問信偶來居士室焚香煮茗話無生泊吳江寄僧孫大雅松陵橋畔太湖前斜日青楓繫客船引頸數看花鴨亂含情深愧白鷗賢千鐙庾嶺傳無盡一宿曹溪覺有縁稍待月明風細細卧吹簫管學坡仙吳江中冬至日王禕十年走馬竟何如轉覺謀生事事非時序每驚愁裏換家山長向夢中歸吳江嵗晚寒波積楚塞天空鴻雁稀酒後登樓倍惆悵緇塵猶滿舊征衣往吳江朱文奎一篷涼雨晚初晴煙水蒼茫落日明菱葉荷花偏入眼鵁鶄鸂鷘自同盟釣竿且覔𤣥真子紗帽還從漉酒生笠澤留連今十日只因此地有蓴羮吳江春望呉復二月江南春雨晴雜花開樹栁飛鶯江湖一色葡萄緑呉越千重錦繡明珠箔小娃金縷曲玉樓仙客紫鸞笙白頭庾信思鄉國無限春光感舊情舟次呉江胡奎江上涼生白苧袍荻花楓葉晩蕭騷長虹飲澗天在水怒雷劈山風送濤地勢混茫通九澤風流今古屬三髙収帆暫向楓灣宿喚起吳姬壓小槽回至吳江陶振長憶松陵是故鄉白頭耿耿未能忘綺筵華日三春樂畫舫荷風六月凉橙熟蟹螯催早薦蓴香鱸膾喜新甞交㳺何處皆星散訪舊令人重感傷秋夜呉江汎月陳一初短棹迂程夜渡江蘋香月色滿篷忩天涯流涕青山逺烟際關情白鳥雙赤壁仙逰疑有約滄洲漁唱不成腔明朝訪舊松陵郭對榻挑燈共一缸泊吳江蘇平艤棹垂虹近驛樓水晶宫裏喜同㳺腥風隔浦吹魚網逺火臨流映客舟萬頃烟波寒浸月一天星斗倒涵秋酒醒共向篷忩坐誰詠滄浪起白鷗和尹寛酒醒長歌倚柁樓雪灘祠下又重㳺湖光萬頃沉孤月燈影三人共一舟天轉星河知午夜風吹砧韻報新秋百年身世真萍梗機事何煩問海鷗呉江春思莫禮積雨閒庭春艸長空齋不語坐焚香堦前螻蟻輸糧急花底山蠭課蜜忙處士只應如靖節將軍誰復數糜芳絶憐二月呉江路無數東風開野棠呉江道中卞榮蘇臺東入吳江縣縣郭縈迴枕白沙沿路石橋知幾載隔湖烟樹是誰家水深半浸青蒲葉風急偏欺細麥花一望望亭平野濶欲疑漂泊在天涯吳江阻風驛夫及候趨長道江鳥忘機立淺沙苦被風波欺客棹欲投烟火宿人家月明夜市猶沽酒水滿春瓶自養花坎坷湏㬰何足道也曽天漢泛仙槎吳江舟中聶大年壯懷牢落宦情㣲夢繞鄉山未得歸貌比安仁今覺瘦年如伯玉始知非五湖烟月家何在萬里雲霄鳥倦飛同是一年將盡夜椒盤銀燭賞心違宿呉江楊一清長堤維暮色野况獨蕭然水市魚蝦上江城鳥雀喧疎鐘寒破夜荒菼暗浮烟竟夕淹逰舫揆予有勝縁吳江早發水驛聞殘夜揚帆泝逺流草蟲知急景江樹入深秋寒雨鳴孤棹晨光見淺洲問津應未厭清興若為酬呉江晩眺呉寛霜林搖落洞庭㣲澤國茫茫對夕暉湖上客來金橘熟橋頭人賣玉鱸肥扁舟范蠡當時計獨棹張翰何處歸景物蕭條増客思更堪回首雁南飛過吳江訪張子靜泊南津口沈周吳江南下黃溪路嵗晏逢君溪水頭雙鬢都生五年雪兩人相對一孤舟關前晩纜翻鵶樹夜半寒燈落雁洲未識新春此杯酒更於何地得同㳺與少宰呉江舟中聨句文林望斷平湖浪接天林好風百里促歸船白銀盤裡青螺小寛寳帶橋頭素月圓此地遙知燈滿市林他人休送酒如泉同㳺不是天閑驥寛肯似坡翁石浪鐫林吳江道中杜啟十年來徃鏡光中此日歸來作釣翁香擘霜苞連蔕緑鮮烹銀尾四腮紅乾坤事業雙皤鬢風月平章一短篷欲續江湖散人句天隨何處得相從吳江沈周緑幕紅忩映水開長橋夾岸起樓臺樓前舫子過湖去雙櫓鳴環淅索來泛呉江朱存禮一帆風便到呉江江上飛來白鳥雙舟子飯時吾夢覺起吟新月坐篷忩吳江竹枝歌三首胡奎第四橋頭楓葉青白龍吹雨浪花腥過橋買酒待月出今夜夜宿垂虹亭青裙女兒雙髻螺唱得吳宫子夜歌酒醒月明眠不得秋風吹起洞庭波西山落日東山黃儂唱竹枝行晩涼十幅蒲帆弓様滿南風吹過白龍堂同前都穆雙櫓􅀈船無比輕耳邊唯聽踏車聲龍王堂下風波惡自是儂心耐得驚江上納凉酒餘茶椀手還持水樹風多坐屢移却憶去年城市裏汗衣塵土正奔馳吳江道中陸顒鱸肥蓴脆正秋風緑水紅橋宛轉通不獨季鷹思故里扁舟過此戀吳中吳江舟中謝伯一有詩次韻楊一清寒露初零暑氣収吳中風物此髙秋老須朋從與尋樂興在登臨非浪㳺烟樹夕陽歸鳥盡石橋新水落花浮船頭一嘯悠然去坐愛清溪帶月流山光水色此兼収一棹西風萬里秋病起不勝元亮酌老來猶作子長㳺烟花露栁濛濛溼沙鷺汀鷗故故浮林籟無聲人語靜長空如洗絳河流使浙日承親友送至吳江楊循吉送送未覺逺因留江上眠天寒人共被夜靜水衝船候旦窺雅發離家記月圓未知從此去何處過殘年呉江舟夜二首皇甫涍旅汎季冬時寒深百川滙隂條寂無禽晴蹊雪仍在獨夜湖傍人遙汀霧兼靄望月測虚盈臨流意暝曖懷古發棹謳扁舟寄幽嘅邑壤帶豐津人家映洄汜徙泊眺長原數處征鴻起逺心滄波外客愁鐘聲裏夜寒江舟靜孤月照烟水獨寤方悠哉勞懷曷云巳呉江詞水調歌頭建炎中西浙人作出中吴紀聞甚悲壯録之平生太湖上短棹幾經過如今重到何事愁與水雲多擬把匣中長劍換取扁舟一葉歸去老漁蓑銀艾非吾事丘壑巳蹉跎膾新鱸斟美酒起悲歌太平生長豈謂今日識兵戈欲㵼三江雪浪淨洗烽煙千里手不挽天河回首望霄漢雙淚墮清波巳上諸水並屬吳江長洲過沙湖寄顧玉山楊維楨五月落殘梅子雨沙湖水髙三尺强大風開帆作弓滿白浪觸船如馬狂唱歌賣魚赤鬚老打鼔踏車青苧娘故人相見在婁下坐對玉山懷草堂冒雨過白沙湖髙啟天寒滿湖雨獨棹東歸急遙望水邊村蕭條暮烟濕家人應候我深映柴扄立沙湖一名金沙湖在婁門外二十里湖雖小而與松江諸水吞吐青丘戴墟二浦在焉宿蠡口華幼武春風吹短棹迤邐望歸程刁斗溪邊戍旌旗野外營市橋人跡少官路馬蹄輕欲向東湖去邊烽永夜明蠡口道院胡纘宗面面皆春水臨橋跨小樓帆檣日來往誰解五湖㳺其二橋迥低臨斗樓危逺插河碧桃開十里春興復如何蠡口陳孝子歌孝子名興立蠡口人事載郡志吳一鵬孝子芒鞋并布袍孝出天性由兒曹世居蠡口治農事家無擔石窮無聊白頭阿母卧牀褥病中思食王家糕王家却住臨頓里地隔東西殊路遙去買長從五更起風雨寒暑寜辭勞日髙駐足對流水黃冠邂逅楊涇橋為云病母亦愛此投贈慨然如故交復回雙踵向臨頓阿母頓覺沈疴消豈知黃冠巳相送入口味若吞蟠桃空中仙袂忽遐舉挂壁只見葫蘆瓢舉家驚説事竒異母子喜氣春陶陶却開門第建宫觀引領擬把仙翁招孝名三日傳逺近坐令光彩生衡茅巍巍祠廟衆所仰瓣香男女昏還朝琴川前有周孝子聨璧正協邦人謠法應血食勵風俗誰為草疏揚於朝嗟哉祠廟兵火後頽垣破壁風簫蕭眼前豈無仗義士克復舊觀摩雲霄我慚同里生最晚衣冠瞻拜空英標願歌懿徳播海内孝名永與吳山髙蠡口在齊門外十里發漕湖華幼武漕湖東南大星起灔灔光晶射湖水兩髯搖櫓送風行浪花激船洒飛雨我時起坐推篷忩天地黯慘開鴻龎扶桑日出東海沸波濤滉漾珊瑚光迴風揚帆舟子喜唱歌逕度三十里樓閣參差見吳市晩過漕湖寄楊孟二處士三首秋天澹澹水泠泠十里湖光鏡面平紅日近山霞縹緲扁舟如在畫中行歌聲迤邐瀼西村燈火人家半揜門却憶溪南孟夫子新詩吟罷共誰論浮雲過盡月生光野徑依㣲認草堂獨倚柂樓情思惡不知風露濕衣裳漕湖即事呉一鵬晴光如練繞村居渺渺相望十里餘义港霧迷知有蜃迴波霜落愛多魚送青兩地山長峙陽山虞山相對轉漕千艘粟可儲水際會塤亭早建最宜觀月夜清虚發漕湖孫太初初日浮髙樹清鷗散淺沙挂帆湖水上聞笛野漁家岸坼菰蒲合雲迷山郭斜芳洲動幽興自起采蘋花漕湖本名蠡湖寰宇記范蠡伐吳開蠡瀆通此湖故云唐書地理志云元和八年孟簡開泰伯瀆併導蠡湖故以瀆為孟瀆湖為孟湖其實古之蠡湖也故其東為蠡口西貫無錫之泰伯鄉亦有蠡尖口其稱漕湖不知所始或云以通漕運故名其土屬無錫而其浸皆屬長洲黃埭舟次韓奕野意入新年清溪獨放船曉行衝㟁雪夜泊就人烟古井梁鴻宅空山陸羽泉老來光景短隨處且留連黃埭塘在漕湖之東對蠡口常熟塘紀功碑劉允文呉之藪曰具區郡之大惟蘇州商為貨居農實邦本錫貢多品厥田上中土宜在民地利乎水常熟塘按圖經云南北之路自城而遙百有餘里旁引湖水下通江潮支連𣲖分近委遐輸左右惟强家大族疇接壤制動渉千頃年登萬箱豈伊沿泝之功實由灌溉之利故名常熟嵗無眚焉洎貞元以來時屬大旱繇是填淤荐為塗泥而淪胥怨咨殖物痡矣郡守隴西李素字人原始覩弊則曰在穿導之遂聞於本道亷使吏部尚書韓公秉文惟謹施徳惠人發令功遂觀風悦隨人無間言曰予惟同志攝令吳縣主簿李仲方稟其成規請事疏鑿扵是叅井邑之役則經費其力而長洲當三之一焉縣宰李暵復善供命乃計工量日候隟庀徒為利渉之宜蔽反壤之害詢蓄洩之勢増逺近之防人不告勞事為永逸先期而望表繩直不日而終朝子來塘開地中工畢泉出山澤作氣江湖發源積為長流實自新淛舟楫鱗集農商景從春秋有施水旱斯備嗟乎塘之堙鬱也久矣何壅之無慮而啟之有時非體仁𢎞多應用髙朗曷以越前所未暇逮今而行其志哉則史之決渠書之滌源以澄流其惡潤彼稻田况山川襟帶之廣林盬沃饒之資規同九州殷列七縣其提刑底績固良二千石之能惟李公敏於直方精在損益為信安未半嵗而吳郡餘一年焉政猶風行惠與時至文學備全清慎寡欲通貨豐財五行因之順下致理之實不其偉歟去嵗朱方構患而郡邑連陷公敺白徒以扼狂冦挺拔凶黨修復城池皇帝聞而嘉之俾金章與紫綬給誥垂美必將大闡王度紹休朝廷豈惟與民分憂是塘之為政也彼人士以允文在公之宇備詳其事請刻於石庶垂之可久銘曰瞻彼塘矣昔之所闢物利乘舟土膏其澤嵗有堙塞時罔疏滌誰謂澄流變為廣㵼降是良牧猗歟隴西揆日爰鑿經旬洞開湖水南迤江源北來旁分溝洫潛畜風雷政可施利役無勞止力均二邑功踰百里舟楫攸往田疇所視義實通方智侔經始濬自髙㟁豈云隨山人懽在路魚樂扵泉伊此化逺矧夫事宣立石川上維無窮焉元和四年二月十八日將仕郎前左威衛録事參軍劉允文序雲和塘本名元和唐郡守李素所治成於元和四年故名後譌元為雲今但呼常熟塘尚湖張洪嫋嫋秋風起白波維舟無奈客愁何江湖滿地人來少蒲葦連天雁去多咫尺不遑安信宿百年能得幾經過自憐舊日嬉逰處都被農家插晚禾經尚湖望虞山沈周日午放舟湖上頭虞山隨船走不休髙雲仰見出翠壁飛影下接滄波流青林人家隱山麓雞鳴犬吠聞中洲鸕鷀羣飛竹葉暗蜻蜓特立荷花秋蓮歌漁唱尚互答落景在樹猶堪逰小舟爭渡各先去獨逆風波渾不憂過尚湖韓奕家事不相關扁舟自往還雞聲茅屋外客夢水雲間汀樹村邊宻沙鷗水上閒故人何處訪田舍繞青山秋日同李尚書錢正郎廷瓚弟逰西山下尚湖次韻桑悅霜樹紺紅爛不収畫船如入鏡中逰詩篇􅇎沓多新作風景依稀似暮秋開口幸逢今日笑移家忘却去年愁時流賊劉七在狼山杏花春雨江南醉誰似先生尚黒頭尚湖一名上湖在雲和塘之西長十五里廣九里上有虞山頗為竒勝福山港口待潮陳基吳山如畫楚江平消得孤帆半日程潮落沙頭纔一尺舟停江口復三更時清不識風波險世亂方知性命輕坐擁貂裘待明發臨風空愧魯連生二十日福山港寄諸友漢將西征肅羽儀簡書日日有程期東溟潮上犀船發南斗星横虎節移青入楚封山㸃㸃白添吳鏡雪絲絲美人宴罷芙蓉署一色銀花翠壓枝福山塘自縣城通江門北行四十里入揚子江是為福山港福山渡在焉常熟縣許浦塘疏濬記倪岳四明楊君子器以成化丁未進士來知常熟縣事孳孳治理事有病民者次第罷去惟是縣治濵海其東北有許浦塘上接梅李塘會昆城諸湖水以達於海在宋元時常立水軍寨建為鉅鎮我朝更置廵檢司以事防守歴嵗滋久海水衝潰至今海口巳三十六里廵檢司三易其地浦為潮沙所壅堙塞巳久旱則潮汐弗通澇則沮洳弗泄民兩病之君軫於中思力濬治以工鉅弗穰未易事事適水部郎中新喻傅君曰會奉命來司水政首具始末以請謀之而協遂命治農丞趙祥者董其役民用胥勸役者子來扵是濬許浦之壅者濶十二丈深八尺長四千三百二十丈有竒分占工作稍食稱事為力易者人三尺為力難者人一尺有竒工畢即釋不計早暮不踰月告成凡役二萬二千人有竒鑿地之紆者十有二所除兩厓積土以為坦道植栁扵兩厓之上俾得不善崩以䕃行者得舊石閘於雙墩移置海口俾啟閉以時蓄泄有節旱澇無虞易置廵司扵閘上用便廵邏復謂梅李復居上流水北不通舟行用阻仍以萬二千餘人濬之長六千一百三十丈有竒深濶減許浦十之二始濬許浦繼濬梅李蓋自城東門抵海口七十里有竒凡為工三萬三千有竒木食工之費僅二十緡有竒始工於𢎞治己未十一月壬申訖工於庚申正月癸未為費省而成功速有如此哉邑人咸謂是浦之為民病者幾五十年矣一旦賴賢令尹之力民享其利者將無窮焉茍非紀載其成著斯績於弗渝抑何以昭示於後紹斯績扵弗替也邪乃相率建亭鑿石置諸閘上介邑庠生朱紳來請予言以紀予惟朝廷設官置吏惟以為民故閭閻之下呻吟病苦率於親民者是責也而世之鋭者樂扵速化既無意扵為民鈍者安扵無為又無力扵為民是以民病日深莫可告語徒為竊嘆而巳若今許浦之役其事可謂重大其費可為浩穰而其為民病亦可謂久且深矣先之為政扵斯者亦當有慨然一加之意者否乎使非楊君之篤於為民傅君之樂於從善欲求是浦底績亦難矣於是而知天下之民病亦豈易於瘳乎雖然孔子之論從政嘗曰因民之所利而利之斯不亦惠而不費乎擇可勞而勞之又誰怨觀之斯役尤可信也是亦惟視為政者何如耳然則楊君其無忝扵聖人之徒歟用是具書以告來者許浦按教水軍袁説友小臣銜命入雲屯聖主如天詔語温萬甲衝風揚士氣一言挾纊荷君恩頗驚霹靂燒戎旅更想艨艟上海門欲挽長歌問豪傑豈無擊揖歎中原次韻袁起巖許浦按教水軍二絶范成大橫波組練試揚舲風捲魚龍海欲凝但得綈袍如挾纊何妨鐵甲冷如氷戈船戰棹疾如飛莫遣潮沙澱海湄草奏直須窮利病奉身從此繫安危許浦屯即事袁説友皇家百萬兵一一供行闕盼恩勞軍士有詔涓良月鳴鑾肅天仗君王自親閱旌旗照鼙鼓鎧甲耀氷雪金繒辱君賜再拜嵩呼疊天子曰嘻哉長江殆天設雲屯皆壯士寜有中外别乃命臣説友腆犒均行列許之問軍旅利害興優劣臣聞疇昔論舟師利通渉出入似風馳進退如電掣鄉來經始意規置有餘烈更張一何事事亦隨廢缺横舟卧平沙鍪甲半折裂艨艟纔十五水卒無驍傑祇今衆弊見噤不一語決徃往憂國者無路伸喙舌小臣何肖似銜命紆守節願陳一得慮竹頭而木屑方略許圖上稽首思罄竭君王赦其愚臣敢畢其説許浦在常熟縣東北呉都文粹續集巻二十四
