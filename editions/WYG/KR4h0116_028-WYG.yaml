body:
  text: 吳都文粹續集巻二十八明錢榖撰道觀平江府重建三清殿記牟巘混沌既判惟天為大不可俄而度據逺視之其色蒼蒼以形體則謂之天作善降之百祥作不善降之百殃以主宰則謂之帝元始而亨亨而利貞以性情則謂之乾不疾而速不行而至以妙用則謂之神合理為氣其可得而名言者如此古者祀天雖有壇壝之制配侑之禮五方之名粢盛牲玉之薦大抵一精二純尚忠質而已非若後世為之尊號焉為之宮室焉為之冠冕衣裳焉自唐封天寳以來追尊本始加上徽稱益崇以備豈非神而明之章爾靈度震動宇内俾知所寅奉歟平江𤣥妙觀三清殿寔再建於淳熈丙申殿凡七楹雄傑冠浙右越八十年甲寅住持嚴守柔重覆屋又八年辛酉蒋處仁重葺周欄又三十四年為至元戊子阮籍郡乘政賜額舊觀浸隳處仁之徒嚴煥文興仁作新而為費甚重發心縁募善誘樂施時則今左轄朱公文清與妻若子大捐金錢以相其役煥文不避寒暑致木江淮官易其梁柱以致方圎偃植靡不堅壯圬墁陶甃靡不完宻斧藻像飾靡不嚴潔始于己丑二月成于庚寅十月煥文嘗賤事淳祐大魁黄由之孫孠得其奥㫖恬靜有守人人皆傾住持許孠祖張善淵滕伯淳皆志同慮協故所為必成焯有可記也大徳壬寅十月因吳興趙孟頫諗于陵陽牟巘曰殿成十有三年矣淳熈之役適遇三丙申殆非偶然已治石廡下願為記成事固辭勿獲夫氣有盈虚物有成壊事有因革惟理獨不杼昭昭靈靈千載一日盖覆冒中之主宰性情中之神化也洪惟新殿有嚴典領煥文不有其功方且夙夜祗格用對越在天凡所為民禱禬者固有出于土木科儀𤓰花香燈之外上帝溥臨降觀有赫尚敬之哉是為記𤣥妙觀三門碑銘天地闔闢運乎鴻樞而乾坤為之户日月出入經乎黄道而卯酉為之門是故建設琳宫摹憲𤣥象外則周垣之聫属靈星之横陳内則重闥之劃開閶闔之彷彿非崇嚴無以備制度非巨麗無以竦視瞻惟是勾吳之邦𤣥妙之觀賜額改矣廣殿新矣而三門甚陋萬目所觀譬之神威儀未備一身之内強弱弗侔非欠歟觀之徒嚴煥文深念前功是究是圗時則有夫人胡氏妙能捐其簪珥給其資用爰壬辰之紀嵗亟先甲以庀徒曽幾何時悉更其舊翬飛丹栱簷牙高矗于層霄獸嚙銅鐶鋪首煇煌于朝日大庭中敞峻殿周羅可以樹羽節可以容鑾馭可以陟三層之壇可以通九闗之奏可以鳴千石之簴可以受百靈之翰氣象偉然始與殿稱于是吳興趙孟頫復求記于陵陽牟巘曰土木云乎哉言語云乎哉惟帝降𠂻惟皇建極因人心固有與天下為公初無頗僻無充塞然或者舎舊而求諸逺既昧厥原欲入而閉之門後迷所向孰謂抽闗啟鑰何異摘埴索塗是未知𤣥之又𤣥損之又損也夫始乎冲漠者造化之樞紐極乎中庸之閫盖所謂㑹歸之極所謂衆妙之門庸作銘詩具刻樂石其詞曰天之牖民道由大路未有出入不由于户而彼昧者他岐是騖如面墻壁如弗瞩故脱扄剖鐍孰發真晤乃崇珍館乃延飈馭閈閎洞啟端倪呈露囘達民迷有赫臨顧咨示羽属一爾志慮隂闔陽闢恪守常度蘇州府𤣥妙觀重建彌羅寳閣記胡濙正統五年秋八月望日兵科給事中郭璘禮部司務陳珪率道士張宗繼不逺數千里齎姑蘇道紀司都紀郭貴謙副都紀呂志清䟽狀謁予南宫徴記按狀蘇州府在城𤣥妙觀創自晉朝名真慶道院唐更名開元觀宋賜額天慶觀高宗御書金闕寥陽之閣揭於殿端光榮罕儷有蓑衣何真人寓居其中能愈人一切諸疾靈跡顕著孝宗召赴行在眷賚甚厚人咸傾向郡守陳峴命羽士募縁増崇修建雄冠諸郡寳祐景定間住持嚴守柔蒋處仁重加修飭施以䦨楯元至元間黜天慶之號而改今名道士嚴煥文張善淵復為修理時左轄朱文清大捐帑廪以相其役由是穹門邃廡奥殿巍閣傑出吳中元末至正間燬于兵燹迨今百有餘年殿堂廊廡漸次修建率皆完美惟彌羅寳閣工費浩繁久虚未建誠為缺典宗繼乃募衆縁遂為創始正統三年廵撫侍郎廬陵周公恂如郡守南昌况公伯律因嵗旱率耆老命都紀郭貴謙禱于其觀遂獲甘霖二公暨闔郡吏民咸欲修墮舉廢戮力同心侍郎郡守首捐俸資以興復為己任委都紀郭貴謙鳩材庀工貴謙先令化士尤𤣥真張養正至鎮江市木筏從揚子江歸遇大風衝散化士仰天告曰買木盖造彌羅寳閣供奉玉帝今木衝散不存斯閣莫能成就頃間風恬浪靜忽覩𤣥帝見於雲端化士驚愕再拜至孟瀆河口木皆先集舉無漂遺衆咸駭嘆不勝忻感歸以白于貴謙轉白侍郎郡守罔不驚異悚敬二公為之益力今年夏厥工告成複霤重檐金碧輝煥極其壯麗威儀像設嚴奉惟謹謂不可以無紀神明顯應之靈與夫侍郎郡守作興之績用垂示於久逺也予惟有虞肆上帝成周禋祀昊天而道家者流制為寳閣䖍奉玉帝寔為虞周同一尊事之禮今其閣既成而請記于予又安得不深喜樂道而奨與其能乎是以為之記而不辭俾歸勒諸貞珉庻幾來者知所崇重而祗事於無窮焉重修東嶽行宫記黄省曽東嶽之廟國典在泰安為専祠拱城傑殿煥甲埏海盖自封禪告成以來宗崇久矣然而道家者流以兹嶽天孫也萬物肇始知生算之修短而陶隐居真誥著曰東卿司命統括萬神折衝羣靈者張説頌云泰山受天官之名總人靈之府皆斯㫖也以是洞真之教錯布郡縣嶽廟與之俱流雖濟南且别有行宫矣在吳郡者則建𤣥妙觀左觀晉之真慶道院也歴世因之正統中郡守况公詳神長民旱而作禱曰山川出雲莫大於羣岳乃籲行宫嘉澍其應遂以禄資率歆僚武造五岳樓於宫後而宫之熈飭則成化中監察御史鄭公郡守劉公感岳夢而成之者也是時宫之羽士韓執中寔啟其緒二傳至張日新幼占宫籍近嵗𤣥悟之師不作張莫之風斯冺闕頹牖隕日新憫然悽惻清修齋誦以祈光拓嘉靖己丑里舊葛柟懷謙白之徳慕松喬之勝戾止丹居載興䖍肅感其凋廢昌言樂相創施金錢兼募衆善羅積三載甫克首工或改或仍斟營夙夕凡宫閍前殿内寝樓廡皆材良貌嚴及附祀于宫一切神宇亦奠座飾像若䖍始然冶鐘一懸為晨夕祝釐之節𤣥爐若干求永厥奉始於壬辰四月十六日訖於甲午十五日諸工計三萬二千有竒皆日新與柟之勞績也葛之友管恩時同預厥事宫成乃請記於山人省曽告之曰今宫之成也惟爾勳矣若知所以綿引之術乎亦惟精三一探象先以道徳為父以太和為友毋借仙事為貲階毋移方門為大宅則穢腸可緑佛髓行素紫旄之秉華旙之從玩寳之談将降于爾之庭矣豈但荘嚴而己耶日新曰謹聞戒矣不敢為岳神凟遂書貞珉永耀來祀俾可翹遡高軌而景承之焉嘉靖十三年十一月望日吳郡黄省曽撰長洲章簡甫書并篆章仕刋重修清真觀記俞貞木錢塘黄孤山真士蚤嵗喜道術方藥南遊閩越北上燕趙晩止蘇城蘇人嚴徳昭者抱痼疾因築室建清真壇奉北極元武真君冀遇醫愈疾聞真士醫者多著靈騐求療治之而其疾隨愈乃捨壇以真士主之於是募縁重剏建殿宇廣其廬舎真士故崇安靈寳道士時其師潘雷鑑翁適自崇安來遂延之以開山焉三十八代天師為題其額曰清真道院仍建丹房售藥以給伏臘計既而翁與真士皆高年終其弟子永嘉陳君正孚與其徒陶君希仁又加修葺遂以狀聞於𤣥教大宗師乃移牒集賢院改今額為觀云粤自潘黄二師開山於元之皇慶間以甲乙住山于是希仁求嗣道者得三人焉曰程安道曰馮本原曰楊處靜及乙巳之嵗觀毁於火安道以售藥資粗創未完丁未之嵗而安道又委蜕迄今洪武庚申本原與處靜同心協力重建大殿山門兩廡塑真君與侍從像以明年九月訖工求予為記夫老氏之學以清淨為宗其論谷神𤣥牝乃曰綿綿若存用之不勤則修煉之微㫖存焉至抱朴子著内外之篇陶隐居注本草又皆發明藥石服食之秘然藥與道術相通修真濟人一也孤山既以醫鳴而蘇城之人無逺邇少長咸稱黄孤山道觀之藥之神自兹以往其諸弟子相傳雖無恒産而嵗積藥金有餘至本原處靜悉傾槖中所有以新其觀宇可謂善于繼述者矣噫古之列仙雖與世和光然往往冺其迹今孤山乃能傳之後人俾守其業而本原處靜又能興復之而不墜且追繼開山之勞績念繼承之不可不任其事故又磨石刋之以示永逺是不特将以貽于後人抑亦有光於其教矣本原名寧高年清修退藏弗耀處靜名守中端慤守道闡教今為道紀司副都紀云清真觀在𤣥妙觀東元皇慶元年道士黄孤山賣藥吳城以所得藥資創建武夷潘雷鑑開山初為道院至正間始賜今額為觀周伯琦記洪武中廢永樂中重修福濟觀新建祠宇記徐有貞蘇州之乾維有靈宇焉巋其山峙翼其翬飛傑出乎闤闠之中而超出乎埃壒之外者所謂福濟觀也觀之創自宋淳熈初舊名巖天道院院有真士陸道堅者嘗與省榦王大猷設雲水齋於此感㑹純陽吕仙翁授以神方大猷子孫至今傳以濟生元至大間繼道堅者葉竹居以申請得觀額竹居後王無偽鄒道安繼之所營為嘗盛矣迨元之季國之初洊經兵燹數十年來無能繼者風摧雨剥旁侵中陊寖以敝敗于時卧雲煉師郭君宗衡寔來主之宗衡出自玉峰士族而學道冶城西山初師朝天提舉陳淵黙繼師長春真人劉淵然清微靈寳淨明神霄諸法之傳遊居兩京侍伺行宫久之及領是觀額顧而笑曰主張是綱維是而使敝敗若是前乎吾者往矣後乎吾者誰歟然則吾其可以但己乎乃言於郡守况侯伯律首復觀地之侵欺于旁人者用其法為人禬禳祈禜得佽助焉慎入約出鳩工庀材以漸經營中建𤣥天之殿為祝釐所旁作翼宇二一以祠純陽及南五祖北七真一以祠長春諸師自三門兩廡暨庫庾庖湢畢飭其法中所宜有者像設暨鐘鼓笙磬畢具又樊之樹之有池有島蔚然為城市山林宗衡乃集其徒以言曰吾聞之吾師吾道之所寳者三慈也儉也清淨也是吾教所宜然也今吾徒從事于斯其必寳吾之清浄以養吾之真寳吾之儉以養吾之身寳吾之慈以養吾之人庻乎其可耳吾又聞之儒之君子民生于三事之如一是世教所宜然也今吾徒出乎家而度乎世於君親莫之致力矣将惟師事是嗣而師復遷化如致力何惟是晨而香夕而燈致精誠以慰薦吾師若吾親之靈以祝吾君之釐事庻乎其可耳且吾之觀謂之福濟吾徒将何修而可以稱是名乎嘗試思之夫祝釐者盖祈乎天以祐乎君将以一人之福而敷錫乎天下以福乎億兆之人者也其所濟可謂博矣盍亦修吾清淨致吾之精誠以從事于斯乎雖然吾慮夫後之繼吾事者之或怠且忘也願從君子乎圖之遂因予伯氏以請記予謂宗衡遊方之外者也而予遊方之内者也夫道不同不相為謀予何以為宗衡謀哉然以君子之道而處其中亦惟審夫義理何如耳彼譸張為幻者固予所弗與矣若其為言幾乎義理者亦安得不與之也邪予於是乎為宗衡記之過福濟道觀訪煉師郭宗衡劉鉉爐出龍涎向我焚仙翁留客意殷勤紫簫聲起招黄鶴石榻光浮卧白雲晝日風雷宣帝令夜壇星斗煥兵文於今雖有籠鵝在誰冩黄庭似右軍福濟觀在城西北隅宋淳熈間道士陸道堅建名巖天道院道堅嘗與省榦王大猷設雲水齋于此感㑹吕仙翁授以神方大猷子孫至今傳以濟人元至大間道士葉竹居奏賜今額元季兵燬正統中道士郭宗衡重建徐有貞記清㣲道院三官閣碑都穆姑蘇清微道院在郡治西宋端平中建于法師余靈山至國朝永樂初而廢里人成普𤣥者募縁重建宣徳丁未𤣥妙觀道士王嗣先主之正統丁巳嗣先益廣其地建閣五楹奉所謂三官神者踰六十有五年為𢎞治辛酉閣四楹傾壊風雨莫庇院之道士王源清何惟榮募縁新之又謂斯院自端平至今歴年雖逺然未有文以紀顛末乃來請予将刻之石以示其後人予嘗攷漢有漢中人張道陵與其子衡造符書於蜀之鳴鶴山制鬼卒祭酒等號分領部衆民有疾者俾書其名及謝罪之意一上之天著山上一薶之地一沈之水謂之天地水三官至衡之子魯而其術益盛則三官之名盖昉于此後之道家創為土木之像飾以冠服儼然南面以為寔有其神由是閭巷細民往往趨以祈福夫道家祖陵以為天師今若此無乃背其師之説乎雖然天下之事多出于襲而其襲之之久雖有智者莫能卒變勢則然也故今為道家者亦惟謹守其傳以事焚修求無墜而己矣是閣之壞殆非一日置而不修則無以祝聖釐聳人望非主之者之責乎源清惟榮是舉其費頗鉅而且當盛夏之日身親其事不憚勞苦可謂有功于院者矣因不辭而為之記并系之以詩曰姑蘇為邦多老氏宫有若清微翹然其中由宋逮今久歴年嵗莫為之先後何以繼惟兹層閣穹傑洞明四檐翬飛勢凌紫雲神休是祈聖釐是祝朱檻一慿萬象森目風摧雨剥舊觀莫還爰有真士植仆補刓煥焉聿新煌麗逾昔邦人來遊無不嘖嘖稽之道家其宗無為曰清曰微一而靡他矧兹閣者超乎物表八窗玲瓏纎埃莫擾聖凡同歸其患勿脩人而㝠昏盍媿羽流刻我斯文置閣之右庻幾後人永永其守清微道院修三元閣募縁䟽朱存理伏以三元高閣聳縹緲之雲烟七寳諸坊闡清微之香火覩彼規模宏廓愛其棟宇高明居士辦心于肯構神天著力於圗成小䟽頭敢相伸意大檀越惟願發心金銀財帛之攸充木石磚瓦之既濟輪奐美乎興復丹書飭爾經營遂令光彩此山門䪺見神仙吾世界謹䟽元和道院重修真武殿記蔡羽中吳城直府治之北巍然香火之壇四境之内奔走翼奉於祝於詛天則有旱霖嵗則有豊歉時則有康虞一家一人之得失咸決於神而神答之罔不允惬元和道院之係吳城大矣院故有真武殿厥初胚基維宋端平則顧道堅其人也歴若干年而刦於元又若干年則復於本朝當正統五年太守况公鍾寔新厥廬住持則柴繼宗方思謙其人也思謙一再傳而得謝復清查得真咸克勵守為三官閣李王閣寔宏前規而真武殿未之及𢎞治間殿寔就毁垣頽瓦落梁垂宇敗鼎折于地鐺沉于泥風雨交蠧神衣不完狐穿禽糞人莫之省禱請之禮連年不講弟子陳洞章得真之徒也憂懼莫知所為謀于里人張用節等銜香頂誠祈構宿縁事有㑹興人樂相助鳩工庀役肇于正徳三年三月十五日朞年而工落真武正殿煥然鼎新益以中堂二拜殿三儀門一座門欄甃除墉牖既飭完厥貌像雲霧之衣星辰之座龍宫神女咸極畫繪由是嵗時霖暵祈請之日父老羽士升降有所齋省有堂堂則輝煌室則馨香酒漿清潔神歆人欣矣抑是功洞章微用節罔克贊厥志微其徒若孫罔克相厥力至卓立勤苦誠意感動則皆出于洞章也正徳己巳洞章念施與之人與同勤苦謀立石以垂于後里人崔廷憲嘉之特磨石請文為次其本末并列人氏於隂俾後之人有所攷元和道院秋光道院早雲氣午堂凉向竹開金笈縁桐砌碧房種芝丹洞小放鶴碧空長不滅芭蕉緑偏凝虚室香元和道院在府治後至正間建䟦御書放生碑項公澤臣恭惟仁宗皇帝澤潤四海仁及羣生乃以景祐三年十一月己亥朔詔天下乾元節宴設量事烹炮毋得過殺物命皇乎休哉好生大徳不遺㣲小所以壽我宋於萬年之脈者在是也於時中外之臣靖恭愷悌推廣上意若民若物涵濡闓澤於囿生之内肆惟皇上遵守家法親灑宸翰俾誕節賜宴一遵景祐三年詔書大哉王言上以續仁祖生生之澤下以遂萬有生生之性臣嘗管窺蠡測竊謂聖徳之妙溥博無私仁民而愛物皆此一念充之皇上曩以訓亷謹刑二銘董正吏治兹仁民之本原也今戒烹宰仍于所在放生池刻石其爱物之著見乎臣承恩試邑寅奉徳音敬摹勒清真觀放生之所昭回之光焜燿百里飛雲泳川同躋壽域臣敢不對揚休命奉行寛大詎容徒使恩及禽獸而功不至百姓有負聖天子一視同仁之盛心乎庸敢推明聖心并載于下方淳祐十年正月望日䟦昊天閣記陳振循縣西行一里許少折而東得道家者廬曰清真觀觀有閣傑出曰昊天閣嘉定四年正月知觀事馬拱辰劉道映所建也嵌空為䑓三面扶䦨振嘗夜醮其上月星低垂天地收籟步虚清越珮聲鏘如是心油油以敬以肅閣之建顧不足妥靈斂祉歟觀為放生池振兒時間一至小亭孤立度以浮梁乾道七年道士翟守真來自天台睨縣治四維欠薫崇香火地始匄諸官劬躬經理十五六就緒淳熈初元外大父左史李公帥寓公土民狀翟公有操行遷常熟縣故道宫額牓曰清真而推翟君主之當是先君尚無恙也閲三十一年而馬君嗣又九年劉君嗣至是棟宇之制十偹八九矣而閣又其髙明壯麗者噫老氏學長生不死而神仙得道之士蟬蜕埃􅅽影響不接於人故間館真祠寥寥郡縣距劉用力三世而外大父以下若先君亡慮廿七八人指計惟一存者獨往來逵道巋然壽宫不曰難乎振于是有感焉則又曰雖然績底于勤圮于盈志植於強肆于安劉君乎能念前人所以貽其後者乎朝修有所繙閲有經祝皇之壽酬施者之勲考擊鼔鐘弗渝少分若是則凡厥未成者将百日而成之况其己成者乎茍為不然食飽而衣鮮暑簟而寒氊忘厥由來以嬉以恬若是則雖其已成者懼勿能堅且久也况其未成者乎放生池縣志作蔡仍作秦約碧滿池頭秋漲深芙蕖萬柄翠生隂𤣥田種玉俱成子琪樹開花己滿林道士步虚蒼玦佩仙人吹笛水龍吟西堂風雨清無夢隔竹聲聞搗藥禽同前楊維楨放生池上晩披襟五月凉風草樹隂玉井水寒船作藕葛陂雨過杖成林雙雙竝命烟中下瑟瑟蜿蜒夜半吟道人當晝洗研石自臨青李與來禽同前郭翼放生池上應五月爛漫花開坐夜長月出金盤擎露影天髙玉井散秋香雲邉小溆瀛洲近鏡裏㣲波太液凉準擬王喬借飛舄仙遊從此恣翺翔同前偶桓殿閣峨峨轉夕暉放生池上客來稀應知羽士登真去獨見山童汲磵歸雲冷松巢空鶴氅雨荒丹竈長苔衣野人素有烟霞癖欲向𤣥闗共息機崑山縣清真觀在㑹仙橋東即宋放生池也乾道七年道士翟守真建真武道院淳熈元年移常熟縣清真觀廢額改置嘉定八年建昊天閣陳振記元大徳間燬延祐間重建楊維楨記本朝永樂初重修虞山招真治碑蕭統夫東瀛渌水三變成田西嶽靈桃千年未子尚以星起牽牛部首迢遞律生甲子氣數杳冥况復上遊玉清損之又損高排金闕𤣥之又𤣥豈言像之能詮非時節之所辨海虞縣者則虞農都尉太康置其宰境有虞山越絶書云巫咸之所出也髙巖鬱起帶青雲而作峰瀑布懸流雜天河而俱㑹吳門採藥之地楚望槐椒之歌陽反流沙之魂錦飾汾陽之鼎無以踰焉其峰則有石城石門虚峗自然不度勾吳之馬神功挺起豈似岡陵之畫魏后氷成夜陣權息長安慈石浴塔暫流較跡比期優劣斯逺道士沛郡張君諱道裕字𢎞真漢朝天師陵十二代孫天監二年來至此岫遁十有餘載夜忽夢見其祖云峰下之地面勢闃寂宜立觀宇可以卜居裕師潘洪隐始寧四明山無何有人耳長髪短云從虞山招真治來言訖忽然不見潘馳信報君君因辭山舊居而以夢中所指峰下之地即以為治故號招真髙䑓迥立有類玉䑓之山長廊宛轉還如步廊之岫柱削芳桂豈俟開陽木飛材選海檀無勞豫章神拔黄庭司命之府有類玲瓏朱陵赤后之觀同符宏敞逺望仲雍而高墳蕭瑟旁臨齊女則哀壠蒼茫蘚尋千仭之木氣叶星晷華飛五香之草形圗宮室帷葉綬花舒巻蹊徑陽桃候棗榮落岩厓樹息金烏檐依銀鳥鳯将九子應吹能歌鶴生七嵗逐節成舞旭日晨臨同迎若華之色夕陽斜影俱成拂鏡之暉玉礎微潤應山雲于髙墉鳴籟徐響引和風於空谷方當轉氣致柔入無為之境周行不殆窮混成之致茅子莫歸輟轡無己魏姬燕罷留駕不歸何止持節變淮南之金傳苻蒔北鍾之稻明月蛟龍之騎驅之使鬪四銖七子之鏡引以成刀散季齊之羽起雄鳴之霧而己哉乃為銘曰玉龜二始金書八㑹道浹地心功浮天外故常可小惟真能大徳起同塵善生塞兊物保自然人符交泰掩映緑蘿穹崇紫盖仙治之美此焉為最雄柱千步陽䑓百丈水均下瞩山逾高掌野寂雲興琴繁山響斗虹夕棲豐雷朝上元陽作石竹龍成杖書藏玉匣藥蘊銀筒燒鉛雜鯉折桂和葱羽衣可服雲軿易通斧柯雖朽碑石無窮虞山致道觀新建覽翠樓記楊循吉常熟據郡北境山水咸具領其勝而可遊者無若致道觀觀有古檜七株蕭梁所植也往嵗邑令計侯之宰是邦以其幽麗時至而樂焉而老氏之司存亦於此世産先是有堂曰來雲居其右偏稍却既久而将敝矣計侯相地度勢以為是觀所得非不饒於湖山然而入者有面墻之嘆必欲盡發厥美而致之几下盍即而樓之於是道㑹陳尚義進曰斯堂起林復真歴王志𤣥顧常清皆以羽服司教門事而䝉寔承其派竊謂雲之來自至和奕世是守堂不可去也請兼存可乎計侯頷焉而倡之於是尚義乃益己資乃鳩良工乃市碩材無幾何遂成樓焉又成門屋與兩廡焉落成之日侯坐其下曰雲固無恙宜仍字來雲逮一登覽而羣山咸在右向之翳翳者皆鬱然為吾有矣遂題之曰覽翠云他日尚義以記請凡是邑之遊者必歸致道歸而不獲與峰巒接亦不得謂之遊計侯獨能一旦拔其勝槩俾盡彰顯不有功耶抑古之人所至必崇䑓館延景物盖其志尚清逸使然無足怪而後世按迹而思其人亦於焉有攷則斯樓固侯之峴山也歟侯名宗道桞州馬平人以解元第進士政尚簡易禮賢有文民用是不忘而尚義又克就厥績可書也始正徳丙寅之春訖於是年之冬又明年記乃成是時計侯己遷邵武府同知去踰年矣禮部儀制清吏司主事致仕吳城楊循吉撰乾元宫孫應時塵囂咫尺媿山林勝日追隨得共臨千里江湖堪送目一窗松竹更論心清風正爾生秋意小酌何妨到夕隂歸路踟蹰獨惆悵強須倚卷一微吟致道觀王大成極目𣺌無際洞然天宇寛蒼烟浮逺樹流水繞空山夜月涵丹井晨風拂紫壇山居塵不到心與白雲閒同前鄭昇元撫琴泳泉石霜鶴酹清音惟有七星檜嵗寒同此心秋日登海虞致道觀姚廣孝琳館無塵真福地門前萬竹自青青丹成井底飛雙鴿檜老壇邉布七星鶴舞出林朝每見龍吟歸壑夜還聽我來秖為逃秋暑非是神仙問道經七星檜沈周海虞七星檜宜為羣木冠列生老子宫與邑作竒觀廣墀氣蕭森入門凛欲汗久信天地成沃知雨露灌傳植從蕭梁其説我恐漫騐斗形詎全七既斃其半三株寔聊存難執嵗月算各各具一異形容匪詞翰西體裂多橋豁然敞三判東體活亦裂筋骸互續斷北者蜷而秃袖破舞脱腕葉亦不暇葉榦亦不暇榦左文皮索綯孤蕝頂留繖槎折象齒撓癭決鬼目爛䟽越復叢穴骳骩仍軒􅜌蛟攣及蜺跛努力不得竄矛長及劍短接戰驚楚漢如此紛怪駭聃君不能按知遭幾雷厄還屢兵火難生死付冥然造物反被玩君子重貞固頑醜小人讕縁髙坐吹簫我欲呼鶴鸛從根覓丹埋澆泉覬紅燦長生就其䕃永作婆娑伴登昭明書臺因訪丹井逺秀目巳周復騁登髙足青山不嫌人所取隨我欲巍巍古仙䑓寂寂奠林麓七檜交雲霞靈飈散清馥崇䑓轉磴道攀縁把傍竹同行玉堂彦髙詠應虚谷逍遥東山風能去歌管俗中紙驚連章謬圗附一軸聊以志傾賞流傳亦何卜或恐聞邦人有酒悔無逐寄題虞山七星檜李廷相虞山山高靈異多山高時有仙人過蕭梁羽士張道裕餐霞辟榖開茅窩手栽七檜象北斗龍蟠虬屈交相摩道人仙去神不滅倐忽千載纒烟蘿精神上與元氣接風雨為培鬼為呵復有神丹閲古井紅光夜夜騰岩阿於戯七檜世希有山河或變紅塵走乃知仙家别有傳何時為爾一回首致道觀赴訃明府宴集楊循吉七檜壇前雲水堂使君招飲興何長虞山最好是此處名教清談得幾塲鼔瑟時時驚鳥下開扉隐隐見湖光夜深松竹皆含露重舉金杯吸晩凉致道觀溪口皇甫涍宿處𤣥林靜鐘聲清夜初星河仙嶠滿雲霧洞門虚竹下邀中散松前問隐居溪隂是天路獨往意何如致道觀丹井二首烟駕迢遥向紫微玉泉秋霧閉寒輝君看湖上丹霞色猶似丹砂化鴿飛絳闕晨攀檜樹中尚湖晴望引雲空瑶窗不隔銀河路惆悵仙槎去未通致道觀在常熟縣虞山南嶺下梁天監二年漢嗣天師十二代孫張道裕居此感異夢建招真治并建寥陽殿虚皇䑓手植七星檜其後道裕仙去瘞劍於山之西麓簡文時改乾元宫宋治平中道士李則正浚井得藏丹化雙鴿飛入尚湖政和七年改致道觀元泰定間鄧道樞建知止山房於西北山嶺上國朝洪武中周𤣥初永樂初李本中相繼重建招真菴記康譽之自姑蘇出齊門沿西北望山形如巨鼇横亘原野盖常熟縣之虞山也山之東瞰萬戸治劇邑邑去江不及程陂湖􅅵澮之積自南至者傾馳㑹於江江河既應則迅瀾倒流逆於市橋之下二水相制移時而不能去山無竒谷惟荒墟白草醜石亂散坡陁迤􅆔而西有脩林横抹隐見於兩峰之間其中為招真菴元祐中道人申氏泰陵徐處士高弟也基營于此菴成亟去不知所終松林森茂庭宇簡寂如隐君子之居通州道士喻抱元増治之舊名竹林至是更以招真請記於予乃歌招真之辭以系之辭曰白鶴巢兮丹井空蓬山杳兮烟靄濛陵谷變兮今古木葉下兮秋風飛仙去兮朝太微黄冠野服兮以遨以嬉餐霞卧月兮世不我違與世滌映兮天門可馳蒼龍嘷兮雲漫扉石泉冽兮山芋肥俯仰宇宙兮日月蔽虧靈秀回薄兮野芳呈姿山中之樂兮萬化莫移仙人不來兮隐者曷歸極目亭徐次鐸幾㸃歸舟破暮烟數行雁字落霞邉世間安得王摩詰為冩琴川作輞川同前謝肅虞山積翠横東海上有岧嶤極目亭井屋雞鳴穿曉霧石潭龍影落秋𡨕風回江塹飛濤白天入蘇䑓逺樹青何處言公遺故宅畫橋緑巷眼偏醒乾元次宫在虞山北宋元祐中海陵申元道将南遊請於其師徐神翁翁曰逢虞則止無雪則開申始未悟及至是山遂挿竹為菴名竹林山舊無井一日大雪惟山坳不積因浚井得美泉名雪井紹興丁巳道士喻抱元改築招真菴取致道舊額名乾元宮舊有極目亭米芾書扁元燬國朝永樂初重修申道人煉丹之地别有熈真館在梅里潛真館在福山與此為三真云瑞雲觀記黄潛瑞雲觀在平江城東三十里今所謂笠澤福地者也吳松江由具區來出其西而南為姚城江東為龍江又東為陳湖其北則闔閭浦也重波複浪四望如一其中可居處乃多沃土民安于畊桑皆淳朴有古風水木之清華魚禽上下泳飛之樂􅞅焉若世外然而更千百年棄委於田夫野老之手未有能啟其秘而専其勝者𤣥門有高士陸君志寧始作菴于其處由是昔之秘者無所伏勝者益以發舒君不以得於耳目者為已足復斥故宇易菴以為觀合其徒而居焉凡觀之制中為三清殿而旁為𤣥天北斗太乙三元之别殿祠堂寝室講舍齋廬門廡庖湢次第畢偹惟玉皇上帝之閣為役最鉅久乃訖功而觀以成總為屋以間計者百有二十繚以修垣而除道成梁以属于南埭又割上腴之田千五百畆有竒以資食飲百物所需其法之所宜有者無求而不給為費一出于君而君悉力殫慮二十年於此矣菴之初為觀也教主嗣天師為署今額因命君開山而以甲乙為世守既而所司具以觀之成剡上天子特下璽書加䕶焉若既勵其徒俾勿替且飭其族人毋敢有所預懼後莫之攷而或毁其成也爰伐石以記來属夫乾坤清淑之氣川融山結非有數量而仙經所録洞天福地僅一百二十八神而明之不有其人歟幸而人與境遇又蒙帝力如遊而息焉者衎衎施施未有己也或者真仙異人於此乎出則福地之在笠澤而笠澤之有瑞雲将與金庭玉局並存於天壤間尚何成毁之足慮哉顧不可以無著作始之自乃弗辭而為記其顛末云紹興路諸暨州判官黄潛撰文太常博士桞貫書大明成化十八年嵗在壬辰九月吉賜進士第承徳郎刑部雲南清吏司主事郡人馬愈重書上石募刋瑞雲觀碑䟽朱存理竊惟瑞雲觀陸氏開山舊石碑黄公作記今其地興創於兵燹之後故斯石埋沒荆棘之中使過遊之客遺恨徒多訪集録之家全文具在所謂不朽之托者将以傳焉則其借重乎辭也於斯見矣兹将命工礱石請名翰重書必求好事捐金俾斯文大著為題短䟽特叩高門倐爾完工就請留名石畔慨然樂助遂成壯觀山中謹䟽過吳江瑞雲觀吳寛笠澤磯頭訪瑞雲洞門高掩寂無聞重湖急雨過龍陣小隖亂石眠羊羣有懷廬山陸脩靜敢比㑹稽王右軍與客松隂論往事摩挲殘碣慨遺文瑞雲觀在吳江縣庉邨元泰定間鄉人陸志寧建集仙宫常懋松菊新來入夢頻公餘乘興得尋真紅塵物外長清境白日壺中不老春栢子灰寒烟寂寂桃花風暖水粼粼逍遥羽士閒如許愧我浮名役此身同前盛如梓真宇出闤闠來遊慕虚寂流水環四圍入門松檜碧長廊烟霧生靈貺幡幢宻主人聞客至尊酒延丈室編竹逾萬箇老桂高百尺日色凈不暄松風凉可挹翛然人間世陡覺詩興逸集仙宫在嘉定縣治西南隅宋嘉定十七年高道葉子琬建玉芝祠記張與材至大之三載嵗在庚戌門人傅處潛入侍講席以平江路道録普福觀開山提㸃住持周靜清狀來請曰靜清凡骨未換其於聞道不知塵有幾也唯是焚脩不敢不力以當福地之名乃孟冬朔有見似人入仙官祠者踵之無有啟鑰惟菌生焉其生之氣猶蒸然從地而起一根而為莖四十有二若珊瑚交枝而寳盖其上者明日敷舒可二尺許又明日間以金縁觀者日幾百人辨之者曰是所謂玉芝也非菌也莫不徘徊嘆息共言其瑞踰浹則霏霏化為素烟如瓊花己入天宫矣異哉盖仙官祠分六曹其一曰五芝百榖曹意其觀瑞也非歟世間何物非幻其來也誰使其去也不可執然自有江山幾千年而有普福由普福以有今日玉芝生則亦非偶然之故嗟夫微吾教主吾誰與歸謹為圗以請願有記而處潛又稽首重為之言則諾而記之夫芝者仙家之一草耳不常有於天下忽然而遇未有不以為瑞也古之人箕山為多而未始以為瑞也然許由得之而不食五榖商山所採皆是物也漢武帝時朱草生則紫芝也類以為金人露盤之所謹按五芝五色唯白芝名嬰兒手服之可以通仙然則相期瑶草必蓬萊可也不知何以見於此哉普福所居州為常熟必神人居之物無疵癘而然耳鳥有鳯者恒出於有道之國獨取以名其地千仭之上将覽徳耀而下之三山十洲於是乎在則雖謂普福有瑶草豈不可信靜清吾之子弟于吾祖鶴鳴夜半之所授受無所不備丁丁萬斧如修廣寒與回道人共住于兹有年将由有為而詣無為匪朝伊夕玉皇有詔不翳玉芝不已也抑宇宙間惟應與感禎祥之相值果非偶然者矧精神㑹聚黄冠往來天地神示昭布森列則一芝之瑞是固吾心華之發現而已有以異乎無也或曰芝之為莖常止于九未聞若是再倍于蓂而不足一挂於蓍而大有餘者則又安知其非所見似人者以𤣥帝行滿之期而朂之又以旌陽㧞宅之數而望之歟吾聞之曰或者之言亦是也弟子勉之是為記嗣漢三十八代天師正一教主太素凝神廣道明徳大真人主鎮三山符籙領江南諸路道教所事金紫光禄大夫留國公張與材記題玉芝祠陳䝉玉芝不見草蕭蕭古栢隂廊晝寂寥琳館廢來餘福地名碑留在記前朝碧梧樹老鸞飛逺華表天空鶴去遥惟有迎仙橋上月夜深還自照吹簫玉芝祠在雙鳯鎮元里人周靜清幼穎悟酷嗜黄老書師事元靜真君即其地構普福宫尋改為觀至大庚戌冬仙官祠忽産芝一本四十二莖玉色照耀有色氣直上如縷遂名玉芝祠婁東劉家港天妃宫石刻通畨事蹟記鄭和明宣徳六年歲次辛亥春朔正使太監鄭和王景𢎞副使太監朱良周福洪保楊真左少監張達等立其辭曰勅封䕶國庇民妙靈昭應𢎞仁普濟天妃之神威靈布於鉅海功徳著於太常尚矣和等自永樂初奉使諸畨今經七次每統領官兵數萬人海船百餘艘自太倉開洋由占城國暹羅國𤓰哇國柯枝國古里國抵於西域忽嚕謨斯等三千餘國涉滄溟十萬餘里觀夫鯨波接天浩浩無涯或烟霧之溟濛或風浪之崔嵬海洋之狀變態無時而我之雲帆髙張晝夜星馳非仗神功曷能康濟值有險阻一稱神號感應如響即有神燈燭於帆檣靈光一臨則變險為夷舟師恬然咸保無虞此神功之大概也及臨外邦其蠻王之梗化不恭者生擒之寇兵之肆暴掠者殄滅之海道由是而清寧畨人頼之以安業皆神之助也神之功績昔嘗奏請於朝廷宫於南京龍江之上永傳祀事欽承御製記文以彰靈貺褒美至矣然神之靈無往不在若劉家港之行宫創造有年每至于斯即為葺理宣徳五年冬復奉使諸畨國艤舟祠下官軍人等瞻禮勤誠祀享絡繹神之殿堂益加修飭𢎞勝舊規復重建岨山小姐之神祠於宫之後殿堂神像燦然一新官校軍民咸樂趨事自有不容己者非神之功徳感於人心而致乎是用勒文於石并記諸畨往回之嵗月昭示永久焉永樂三年統領舟師往古里等國時海寇陳祖義等聚衆於三佛齊國抄掠畨商生擒厥魁至五年回還永樂五年統領舟師往𤓰哇古里柯枝暹羅等國其國王各以方物珍禽獸貢獻至七年回還永樂七年統領舟師往前各國道經錫蘭山國其王亞列若柰兒負固不恭謀害舟師頼神靈顯應知覺遂生擒其王至九年歸獻尋䝉恩宥俾復歸國永樂十二年統領舟師往忽嚕謨斯等國其蘇門答刺國偽王蘇幹刺寇侵本國其王遣使赴闕陳訴請救就率官兵勦捕神功黙助遂生擒偽王至十三年歸獻是年滿刺加國王親妻子朝貢永樂十五年統領舟師往西域其忽魯謨斯國進獅子金錢豹西馬阿丹國進麒麟畨名祖刺法并長角馬哈獸木骨都束國進花福禄并獅子卜刺哇國進干里駱駝并駝雞𤓰哇國古里國進縻里羔獸各進方物皆古所未聞者及遣王男王弟捧金葉表文朝貢永樂十九年統領舟師遣忽嚕謨斯等各國使臣乆侍京師者悉還本國其各國王貢獻方物視前益加宣徳五年仍往諸畨開詔舟師泊于祠下思昔數次皆仗神明䕶助之功於是勒文於石次韻倪尚書天妃行宫陸昶海門一水連三島𤣥宫獨數靈慈好文皇在御賜褒崇金額煌煌綵雲繞蒼松樹古偃虬龍翠竹叢深棲鳯鳥灑落可有仙人居層城十二清風曉洞門深鎖碧窗寒滿地落花香不掃一山髙叠青峩峩玲瓏妙奪天工巧羽仙䨇瞳秋水光遐齡直與天地老金母曾分似盎桃安期常啖如𤓰棗我亦玉皇香案吏胸次廓落機心少錦袍天上承恩歸自喜平生事應了培塿西窺泰華卑盃盂東視滄溟小何時同醉碧桃春浩歌一曲眠芳草天妃宫楊維楨海國神風㨗可呼緣林邀福苦相紆片帆尚借周郎力䕶得青龍到直沽黄太倉汝為宴天妃宫二首王寵巖邑表東海名侯握簜符自公豐逸豫延賞濫文儒島日林間吐潮流天外紆平生慕靈氣髙嘯入蓬壺首夏靄清暉琪花應未飛迴巒峙玉館列桂肅金扉琴作鸞皇語雲飄龍虎衣山公殊戀賞不醉且無歸靈慈宫一名天妃宫有二一在太倉城中周涇橋一在劉家港北漕口普福宫記吳澂太𤣥元普福宫者真人周靜清所建也周東吳望族南工臣附之初有顯忠校尉職千戸督海道運糧事真人其子也夙好黄老言既長父命往信州龍虎山師事天師張真君為道士歸剏道院于常熟州之䨇鳯鎮越數年陞為觀又二十餘年陞為宫施水田若干畆收其嵗入以食徒衆大宗師張開府以靜清之名上聞制授職名者二璽書寵異者三號清寧抱一凝妙真人而其徒周應靈保真凝素崇道法師襲其師提㸃之職璽書寵異亦至四錫法師來京師曰道院之興肇自至元乙酉殿閥門廡厨庫至乙丑乃備始得觀額甲午再充拓之飯衆有其所説法有其所燕坐有其所禮上下神祗四方萬靈靡不有其所大徳庚子建書樓貯諸子百家之書辛丑立東岳岱宗祠作止一全真二館以賓南北學道之士至大辛亥作鐘鼓二樓及漢天師殿新觀門為重屋延祐丁巳以來應靈増飭舊規且作石橋曰迎仙遂改宫額自惟晩末忝紹先志薦膺上命其將何以報君師之賜誠宜廣宣以示永久敢有謁於史示予曰道家者流咸刻古柱下史彼盖隐君子也由衰周歴亡秦漢初諸人藉其餘緒亦足以聞於時張文成以之為帝者師曹平陽以之為天下相晉唐而宋以來今源逺而流益别然世之忌盈而引退趨晦而保全者猶或詢其名而寄迹焉真人隐遁之髙法師繼承之善皆人所難能也况以聖恩優渥俾方外畸人享安榮于山間林下此天涵地育之造也其可不紀録以明法師戴上無斁之𠂻以彰真人貽後有光之美乎於是不辭而為之記普福宫在雙鳳鎮髙真堂記王鏊東洞庭之隂有峰端正姢秀曰嵩夏麓嵩之呀然下飲太湖如鳥之張喙曰梁家瀬前為太湖其襟抱虧踈浪石相嚙自宋時則有高真堂以鎮其衝元季兵燬光怪時見行者相戒莫敢出於其途成化間里人上其事於縣作祠肖元武像以鎮之于是光怪滅息人和嵗稔相率請予記其事謹按文耀鉤云北宫黒帝其精元武北方之神也真誥則云昔軒轅子昌意娶蜀山之女生陽徳號顓頊伏萬靈以信順監衆神制百物役御百氣召致雷電此所謂𤣥帝也莊周云顓頊得之以處𤣥宫而道家之説謂有人焉産于淨樂之國來居武當道成飛昇然亦武靈𤣥老始炁之化復位坎宫變化威靈固宜祇事或謂方今川岳太和朝廷崇飭琳宫寳殿照耀海宇顧兹塊焉神其享之乎予以為神之在天其次為奎婁其威為雷霆雲車風馬陟降于天大而大安焉琳宫寳殿不為侈小而小安焉土階采椽不為陋又何擇于高卑之間乎且山人皈依誠敬萃焉吾安知神之不昭答肸蠁依違而不去也故為之記使鑱之石髙真堂在東洞庭山吳都文粹續集巻二十八
