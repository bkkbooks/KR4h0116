body:
  text: 吳都文粹續集巻四十八明錢穀撰詩八闗齋詩三首支遁間與何驃騎期當為合八闗齋以十月二十二日集同意者在吳縣土山墓下三日清晨為齋始道士白衣凡二十四人清和肅穆莫不靜暢至四日朝衆賢各去予既樂野室之寂又有掘藥之懐遂便獨往於是乃揮手送歸有望路之想靜拱虚房悟外身之真登山采樂集岩水之娛遂援筆染翰以慰二三子之情建意營法齋里仁契朋儔相與期良辰沐浴造閒丘穆穆升堂賢皎皎清心修窈窕八闗客無鍵自綢繆寂然五習真亹亹勵心柔法鼓進三勸激切清訓流悽愴願𢎞濟闔堂皆同舟明明𤣥表聖應此童䝉求存誠一室裏三界賛清幽嘉祥歸宰相藹若慶雲浮其二三悔啟前朝雙懺暨中夕鳴琴戒朗旦備禮寢𤣥役蕭索庭賔離飄颻隨風適踟蹰岐路隅揮手謝内析輊軒馳中田熠熠陵電擊息心投倦步鈴鈴振金䇿引領望征人悵恨孤思積咄矣形非我外物固巳寂吟咏歸虚房守貞玩幽賾雖非一往游且以閒自適其三靖一潜蓬廬愔愔詠初九廣漢排林篠流飇洒隙牖從容遐想逸采藥登崇阜﨑嶇升千尋蕭條臨萬畆望山樂榮松瞻澤哀素桞解帶長陵坂婆娑晴川右冷風解煩懐寒泉濯温手寥寥神氣暢欽若盤春藪逺度冥三才怳惚䘮神偶逰觀同隠丘愧無連化肘吳趨行梁元帝水裏生䓤翅池心恒欲飛蓮花逐牀返何時乗䑽歸吳音清柔歌則窈窕洞徹切於感慕故樂府有吳趨行又曰吳歈皆以音擅天下佗郡不及也陸士衡亦有吳趨行道吳風之清淑兹不復採伍子胥鮑機忠孝誠無報感義本投身日暮江波急誰憐漁丈人楚墓悲猶一作空在吳門怨一作恨未申王世容歌王世容政無雙省徭役盜賊空按呉錄曰王鐔字世容為武城令民服德化宿惡奔逃故父老歌之呉孫亮初童謡吁汝恪何若若蘆葦單衣篾鉤絡於何相求楊子閣按宋書五行志曰呉孫亮初童謡按楊子閣者反語其石子堈也鉤絡鉤帯也及諸葛恪死果以葦席褁其身篾束其腰投之石子堈後聽恪故吏收𦵏求之於此堈云呉孫亮初白鼉鳴童謡白鼉鳴龜背平南郡城中可長生守死不去義無成白鼉鳴張籍天欲雨有東風南谿白鼉鳴窟中六月人家井無水夜聞白鼉人盡起考宋書五行志曰呉孫亮初公安有白鼉鳴童謡其曰南郡城可長生者有急易以逃也明年諸葛恪敗其弟融鎮公安亦見襲融刮金印龜服之而死鼉本有鱗介甲兵之象也孫皓初童謡寧飲建業水不食武昌魚寧還建業死不止武昌居按宋書五行志曰呉孫皓初童謡按皓尋遷都武昌郡民泝流供給咸怨毒焉晉呉中童謡寧食下湖荇不食上湖蓴庾呉没命䘮復殺王領軍按宋書五行志曰晋庾義在呉郡時呉中童謡無㡬何而庾義王洽相繼亡送李擢㳺江東王昌齡清洛日夜漲微風引孤舟離腸便千里逺夢生江樓楚國橙橘暗呉門煙雨愁東南具今古歸望山雲收送姚司法歸呉呉掾留觴楚郡心洞庭秋雨海門陰但令意逺扁舟送不道滄江百丈深嚴子瀬東送馬處直歸蘇劉長卿望君舟已逺落日潮未退目送滄海㠶人行白雲外江中逺回首波上生微靄秋色姑蘇䑓寒流嚴子瀬相送苦易散動别知難㑹從此日相思空令減衣帶呉中聞潼闗失守因奉寄淮南蕭判官感興一章並索逺和一鴈飛呉天羇人傷暮律松江風嫋嫋波上片㠶疾木落姑蘇䑓霜收洞庭橘蕭條長洲外唯見寒山出朔馬嘶秦雲漢兵亂相失闗中因竊據天下共憂慄南楚有瓊枝相思怨瑶瑟一身寄滄洲萬里看白日赴敵甘負戈論兵勇投筆臨風但攘臂擇木將委質不如歸逺山雲卧飯松栗送李員外使還蘇州兼呈前袁州李使君别離共成怨衰老更難忘夜月留同舍秋風在逺鄉朱絃徐向燭白髮彊臨觴歸獻西陵作誰知此路長却赴南邑留别蘇䑓知巳又過梅嶺上歲歲北枝寒落日孤舟去青山萬里看猿聲湘水靜草色洞庭寛已料生涯事唯應把釣竿送陸灃還呉中𤓰􅇍寒潮送客楊柳暮雨沾衣故山南望何處秋草連天獨歸使回赴蘇州道中作春風何事逺相催路盡天涯始却回萬里無人空楚水孤㠶送客到魚䑓在江南贈宋五之問駱賓王井絡雙源濬陽侯九派長淪波通地穴輸委下歸塘别島籠朝蜃連州擁夕陽韞珠成積潤讓璧動浮光浮光疑折木積潤疎圓沚玉輪涵地開劍匣連星起風煙標迥秀英靈信多美懷德踐遺芳端操慚謀巳謀巳謬觀光牽迹彊悽惶揆拙迷三省勞生昧兩忘弹隨空被笑獻楚自多傷一朝殊黙語千里異炎凉炎凉幾遷貿川陸疲臻湊積水架呉濤連山横楚岫風月雖殊昔星河猶是舊姑蘇望南浦邯鄲通北走北走平生親南浦别離津瀟湘一超忽洞庭多苦辛秋江無綠芷寒汀有白蘋采之將何遺故人漳水濵漳濵已遼逺江潭未旋返為聽短歌行當想長洲苑露金薫菊岸風佩揺蘭坂蟬鳴稻葉秋鴈起蘆花晩晩秋雲日明亭皋風霧清獨負平生氣空牽揺落情占星非聚德夢月詎懸名寂寥傷楚奏凄斷泣秦聲秦聲懷舊里楚奏悲無巳郢路少叢䑓叢䑓富竒士温輝凌愛日壯氣驚寒水一願重風雲三冬足文史文史盛紛綸京洛多風塵猶輕五車富未重一囊貧李仙非易托蘇鬼曲難因不惜勞歌盡誰為聽陽春夕次舊呉維舟背楚服振䇿下呉畿盛德𢎞三讓雄圖枕九圍黄池通覇迹赤壁暢戎威文物俄遷謝英靈有盛衰行嘆䲭夷没遽惜湛盧飛地古煙塵暗年深館宇稀山川四望是人事一朝非懸劍空留信忘珠尚識機鄭風遥可託關月𣺌難依西北雲逾滯東南氣轉微徒懷伯通隠多謝買臣歸惟有荒䑓露薄暮溼征衣贈萬生下第還呉郎士元直道多不偶美才應息機覇陵春欲暮雲海獨言歸為客成白首入門嗟布衣蓴羮若可憶慚出掩柴扉送文暢上人東逰權德輿桑門許辯才外學接宗雷䕶法麻衣凈翻經貝葉開塵喧知不染妄想自堪哀載結西方社師逰早晚迴送陸書還呉武元衡君住包山下何年入帝鄉成名歸舊業嘆别見秋光橘柚呉洲逺蘆花楚水長我行經此路京口向雲陽贈呉門邕上人皇甫曽春山唯一室獨坐草凄凄身寂心成道花閒鳥自啼細泉松徑裏返景竹林西晚與門人别依依出虎谿送陸鴻漸山人採茶迴千峰待逋客香茗復叢生采摘知深處煙霞羨獨行幽期山寺逺野飯石泉清寂寂然燈夜相思一磬聲送滕元擢第歸州拜親岑参送爾姑蘇客滄波秋正凉橘懐三顆去桂折一枝香湖上山當舍天邉水是鄉江村人事少時作捕魚郎送禇十二藻擢第歸呉覲省錢起林表吳山色詩人思不忘向家流水便懷橘綵衣香滿酌留歸騎前程未夕陽愴兹滄海去誰惜杜蘅芳送陸贄還蘇州鄉路歸何早雲間喜擅名思親盧橘熟帯雨客㠶輕夜火臨津驛晨鐘隔浦城華亭養仙羽許日再飛鳴送蘇州姚長史戴叔倫江城驛路長煙樹過雲陽舟領青絲纜人歌白玉郎葛衣行柳翠花簟宿荷香别有心期處湖山滿訟堂送李明府使蘇州便赴告期莫言水國去迢迢白馬呉門見不遥楓樹林中經楚雨木蘭舟上蹋江潮空山古寺千年石翠色寒隄百尺橋早晚盧家蘭室外珊瑚玉佩徹青霄奉送蘇州李十五長史丈之任杜甫星坼台衡地曽為人所憐公侯終必復經術竟相傳食德見從事克家何妙年一毛生鳯穴三尺獻龍泉赤壁浮春暮姑蘇落海邊客間頭最白惆悵此離筵壯遊徃者十四五出遊翰墨塲斯文崔魏徒以我似班楊七齡思即壯開口咏鳯凰九齡書大字有作成一囊性豪業嗜酒嫉惡懷剛腸脱略小時輩結交皆老蒼飲酣視八極俗物都茫茫東下姑蘇䑓已具浮海航到今有遺恨不得窮扶桑王謝風流逺闔閭丘墓荒劍池石壁側長洲芰荷香嵯峨閶門北清廟映迴塘毎趨呉泰伯撫事淚浪浪枕戈憶勾踐渡浙想秦皇蒸魚聞匕首除道哂要章越女天下白鑑湖五月凉剡溪藴秀異欲罷不能忘歸㠶拂天姥中歲貢舊鄉氣劘屈賈壘目短曹劉牆忤下考功第獨辭京尹堂放蕩齊趙間裘馬頗清狂春歌叢䑓上冬獵青丘旁呼鴈皁櫪林逐獸雲雪岡射飛曽縱鞚引臂落􅒗鶬蘇侯據鞍喜忽如攜葛彊快意八九年西歸到咸陽許與必詞伯賞逰實賢王曵裾置醴地奏賦入明光天子廢食召羣公㑹軒裳脱身無所愛痛飲信行藏黒貂寧免敝斑鬢兀稱觴杜曲晚耆舊四郊多白楊坐深鄉黨敬日覺死生忙朱門任傾奪赤族迭罹殃國馬竭粟豆官鷄輸稻梁舉隅見煩費引古惜興亡河朔風塵起岷山行幸長兩宫各警蹕萬里遥相望崆峒殺氣黒少海旌旗黃禹功亦命子涿鹿親戎行翠華擁呉岳螭虎噉豺狼爪牙一不中胡兵更陸梁大軍載草草凋瘵滿膏肓備員竊補衮憂憤心飛揚上感九廟焚下憫萬民瘡斯時伏青蒲廷諍守御牀君辱敢受死赫怒幸無傷聖哲體仁恕寓縣復小康哭廟灰燼中鼻酸朝未央小臣議論絶老病客殊方鬱鬱苦不展羽翮困低昂秋風動哀壑碧蕙捐微芳之推避賞從漁父濯滄浪榮華敵勲業嵗暮有嚴霜吾觀鴟夷子才格出尋常羣兇逆未定側佇英俊翔送張舍人之江東李白張翰江東去正値秋風時天清一鴈逺海濶孤㠶遲白日行欲暮滄波杳難期呉洲如見月千里幸相思送崔度還呉度故人禮部員外輔國子於其還輒致惓惓之意幽燕沙雪地萬里盡黃雲朝吹歸秋鴈南飛日幾羣中有孤鳳雛哀鳴九天聞我乃重此鳥綵章五色分胡為雜凡禽鷄鶩輕賤君舉手捧爾足疾心若火焚拂羽淚滿面送之呉江濆去影忽不見躊蹰日將曛金陵送張十一再逰東吳張翰黃花句風流五百年誰人今繼作夫子世稱賢再動逰呉棹還浮入海船春光白門栁霞色赤城天去國難為别思歸各未旋空餘賈生淚相顧共凄然贈張旭李頎張公性嗜酒豁達無所營皓首窮草𨽻時稱太湖精露頂據胡牀長叫三五聲興來灑素壁揮筆如流星下舍風蕭條寒草滿戸庭門家何所有生事如浮萍左手持蟹螯右手執丹經瞪目視霄漢不知醉與醒諸賓且方坐旭日臨東城荷葉裹江魚白甌貯香秔微祿心不屑放神於八紘時人不識者即是安期生春日長安送從弟尉吳李嘉祐春愁能浩蕩送别又如何人向呉䑓逺鶯飛漢苑多見花羞白髮因爾憶滄波好是神仙尉前賢亦未過送恂上人還呉儲光羲洛城本天邑洛水即天池君王既行幸法子復來儀虛室香花滿清川楊柳垂乘閒道歸去逺意誰能知送沈校書吳中搜書郊外亭皋逺野中岐路分苑門臨渭水山翠雜春雲春閣多遺典呉臺訪闕文君王思校理莫滯清江濆賦得館娃宫送王山人㳺江東盧綸蒼蒼楓樹林草合廢宫深越水風浪起呉王歌管沈燕歸巢巳盡鶴語冢難尋旅泊彼何夜希君抽玉琴送王錄事赴任蘇州古堤迎拜路萬里一㠶前潮作澆田雨雲成煑海煙吏閒惟重法俗富不憂邉西掖今宵咏還須寄阿連驛中望山戯贈渭南尉陸贄官微多懼事多同拙性偏無主驛功山在門前登不得髪毛衰盡落塵中郡楼春宴韋應物衆樂雜軍鞞高楼邀上客思逐花光亂賞餘山景夕為郡訪凋瘵守程難損益聊假一杯歡暫忘終日迫寄李蘇州兼示楊瓊白居易真娘墓頭春草碧心奴鬢上秋霜白為問蘇臺酒席中使君歌笑與誰同就中猶有楊瓊在堪上東山伴醉翁答劉夢得白太守行吏滿六百石昔賢輙去之秩登二千石今我方罷歸我秩訝已多我歸慚已遲猶勝塵土下終老無休期卧乞百日告起吟五篇詩謂將罷官自吟五首朝與府吏别暮與州民辭去年到郡時麥穗黄離離今年去郡日稻花白霏霏為郡巳周歳半嵗罹旱飢襦袴無一片甘棠無一枝何乃老與幼泣别盡沾衣下慚蘇人泣上愧劉君辭蘇州李中丞以元日郡齋感懷詩寄示微之及予輙依來篇七言八韻走筆奉答兼呈微之白首餘杭白太守落魄抛名來已乆一辭渭北故園春再把江南新嵗酒杯前歌笑徒勉彊鏡裏形容漸衰朽領郡慚當潦倒年隣州喜得平安友長洲草接松江岸曲水荷花鏡湖口老去還能痛飲無春來曾作閒㳺否憑鶯傳語報李六倩鴈將書與元九莫嗟一日日催人且貴一年年入手除蘇州刺史别洛城東花亂雪千花落新絲兩鬢生老除呉郡守春别洛陽城江上今重去城東更一行别花何用伴勸酒有殘鶯赴蘇州至常州答賈舎人杭城隔嵗轉蘇䑓還擁前時五馬回厭見簿書先眼合喜逢杯酒暫眉開未酬恩寵年空去欲立功名命不來一别承明三領郡甘從人道是粗才去嵗罷杭州今春領呉郡慚無善政聊寫鄙懷兼寄三相公為問三丞相如何秉國鈞那將最劇郡付與苦慵人豈有吟詩客堪為持節臣不才空飽煖無惠及飢貧昨卧南城月今行北境春鈆刀磨欲盡銀印換何頻杭老遮車轍吳童掃路塵虛迎復虛送慚見兩州民自到郡齋僅經旬日方專公務未及宴逰偷閒走筆題廿四韻兼寄常州李舍人湖州崔郎中仍呈吳中諸客渭北離鄉客江南守土臣涉途初改月入境巳經旬甲郡標天下環封及海濱版圖十萬戸兵籍五千人自頋才能少何堪寵命頻冒榮慚印綬虚奬負絲綸除蘇州制云藏於巳為道義施於物為政能在公形骨骾之言合郡有襦袴之樂候病須通脉防流要塞津救煩無若靜補拙莫如勤削使科條簡攤令賦役均以兹為報効安敢不躬親襦袴提於手韋絃佩在紳敢辭稱俗吏且願活疲民常常州未徴黄覇湖湖州猶借寇恂愧無鐺脚政河北三郡相鄰皆有善政時為鐺脚刺史見唐書徒忝犬牙鄰制誥誇黄絹美賈常州也詩篇占白蘋美崔呉興也銅符抛不得自謂也瓊樹見無因警寐鐘傳夜催衙鼔報晨惟知對胥吏未暇接親賔色變雲迎夏聲殘鳥過春麥風非逐扇梅雨異随輪武寺山如故武丘寺也玉楼月自新郡内東南楼名池塘閒長草絲竹廢生塵暑遣澆神酎晴教晒舞茵待還公事了亦擬樂吾身寄劉蘇州去年八月哭微之今年八月哭敦詩何堪老淚交流日多是秋風揺落時泣罷㡬回深自念情來一倍苦相思同年同病同心事除却蘇州更是誰喜劉蘇州恩賜金紫遙想賀宴以詩慶之海内姑蘇太守賢恩加章綬豈徒然賀賔喜色欺杯酒醉妓歡聲遏管絃魚葺佩鱗光照地鶴銜瑞帶勢冲天莫嫌鬢上些些白金紫猶來稱長年送蘇州李使君赴郡二絶句憶抛印綬辭呉郡衰病當時巳有餘今日賀君兼自喜八迴看換舊銅魚予自罷蘇州及兹換八刺史也館娃宫深春日長館娃宮今靈岩寺也烏鵲橋髙秋夜凉烏鵲在蘇州南門風月不知人世變奉君直似奉呉王送王卿使君赴任蘇州因思花迎新使君感舊逰寄題郡中木蘭西院一别蘇州十八載時光人事隨年改不論竹馬盡成人亦恐桑田半為海鶯入故宫含意思花迎新使生光彩為報江南風月知至今白使君猶在白太守行劉禹錫聞有白太守抛官歸舊谿蘇州十萬戸盡作嬰兒啼太守駐行舟閶門草凄凄揮袂謝啼者依然兩低眉朱戸非不崇我心如重狴華池非不清意在寥廓栖夸者竊所怪賢者黙思齊我為太守吟題在隠起珪赴蘇州酬别樂天呉郡魚書下紫宸長安廄吏送朱輪二南風化承遺愛八咏聲名躡後塵梁氏夫妻為寄客陸家兄弟是州民江城春色追逰處共憶東都舊主人到郡未浹日登西楼見樂天題詩因即事以寄樂天自此郡謝病西歸湖上收宿雨城中無晝塵楼依新柳貴池帶亂苔春雲水正一望簿書來繞身煙波洞庭路愧彼扁舟人早夏郡中書事水禽渡殘月飛雨灑髙城華堂對佳樹簾廡含曉清拂鏡整危冠振衣步前楹將吏儼成列簿書紛來縈言下辨曲直筆端生交爭虛懷詢病苦懷律操剽輕闗吏告無事歸來解簮纓髙簾覆朱閣忽耳聞調笙郡齋書懷江南白尹兼簡分司崔賓客謾讀圖書三十車年年為郡老天涯一生不得文章力百口空為飽煖家綺季衣冠稱鬢面吳公政事副詞華還思謝病吟歸去同醉城東桃李花詶樂天見貽賀金紫之什乆學文章含白鳯却因政事賜金魚郡人未識聞謡詠天子知名與詔書珍重和詩呈錦繡願言歸計並園廬舊來詞客無多位金紫同逰誰得如送從弟戴𤣥徃蘇州張籍楊柳閶門路悠悠水岸斜乘舟向山寺著屐到漁家夜月江柑樹秋風白藕花江天詩景好迴日莫令賒送陸暢共踏長安街裏塵吳州獨作未歸身胥門舊宅今誰住君過西塘與問人送從弟彤東歸雲水東南兩月程貪歸慶節馬蹄輕春橋欲醉攀花别野路閒吟觸雨行詩價已髙猶失意禮司曽賞㑹成名舊山風月知應好莫過秋時不到京送從弟徹東歸緱山領印知公奏才稱同時盡不如奉使賀成登册禮陪班看出降恩書迴程去在秋塵裏受詔辭歸曉漏初早晩行為朝署拜閒坊買宅作鄰居送人逰呉李頻楚田開霽後草色與君㸔積水浮春氣深山帶雨寒毘陵孤月出建業一鐘殘為把鄉書去因收别淚難尋陸鴻漸不遇皎然移家雖帯郭野徑入桑麻近種籬邊菊秋來未著花扣門無犬吠欲去問西家報道山中去歸來毎日斜送司空曙之蘇州苗發盤門呉舊地蟬盡早秋時歸國人皆乆移家君獨遲廣陵經水宿建業有僧期若到棲霞寺應看江縂碑戯代李恊律松江有贈許渾蜀客操琴呉女歌明珠十斛是天河霜凝薜荔怯秋樹露滴芙蓉愁晩波蘭浦逺鄉應解佩柳堤殘月未鳴珂西楼沈醉不知散潮落洞庭洲渚多宿望亭館寄蘇州一二同志候館人稀夜自長姑蘇城逺樹蒼蒼江湖水落髙楼迥河漢秋歸廣簟凉月轉碧梧移鵲影露低紅葉溼螢光西園詩侣應多思莫醉笙歌掩畫堂送劉禹錫郎中赴蘇州姚合三十年來天下名銜恩東守闔閭城初驚函谷眠山驛漸入梁園問水程霽日滿江寒浪靜春風繞郭白蘋生虎丘野寺呉中少誰伴吟詩月裏行送王閈歸蘇州劉商深山窮谷没人來邂逅相逢眼漸開雲鶴洞宫君未到夕陽㠶影㡬時回五湖汪遵巳立平吳伯越功片㠶髙颺五湖風不知戰國官榮者誰似陶朱得始終西施羅隠讓髙泰伯開基日賢見延陵復命時未㑹子孫因㡳事解崇䑓榭為西施嘲陸暢元和内人十二層楼倚翠空鳯鸞相對並梧桐雙成走報監門衛莫使呉歈入漢宫解嘲陸暢粉面仙郎選聖朝偶逢秦女學吹簫須教翡翠聞王母不奈烏鳶噪鵲橋送常熟錢尉范仲淹姑蘇䑓下水如藍天賜仙鄉奉㫖甘梅淡栁黄春不淺王孫歸思滿江南依韻和蘇州蔣密學餘杭偶得借麾來山態雲情病眼開此樂無涯誰可共詩仙今日在蘇䑓白樂天謂韋蘇州為詩仙依韻荅蔣密學見寄東南為守慰衰顔憂事渾祛樂事還鼓吹夜歸湖上月樓䑓晴望海中山奮飛毎羨冥鴻逺馳騁終慚老驥閑此日共君方偃息是非榮辱任循環成都進士杜暹伯升出家名法通徃來吳中蘇軾欲識當年杜伯升飄然雲水一孤僧若教俯首隨韁鎖料得如今似我能呉中田婦歌今年粳稻熟苦遲庶見霜風來幾時霜風來時雨如㵼耙頭出菌鎌生衣眼枯淚盡雨不盡忍見黄穗卧青泥茒苫一月隴上宿天晴穫稻隨車歸汗流肩頳載入市價賤乞與如糠粞賣牛納税拆屋炊慮淺不及明年飢官今要錢不要米西北萬里招羗兒龔黄滿朝人更苦不如却作河伯婦寄賀方回黃庭堅少㳺醉卧古藤下誰與愁眉唱一杯解作江南斷腸句只今惟有賀方回癸亥立春日泊舟吳㑹亭范成大去年春盤浙江驛湛湛清波動浮石今年春盤吳㑹亭冥冥細雨溼髙城天邊作客風沙裏今年去年成老矣客心古井冷無波過眼人情亦如水憶昔三生住翠微偶來平地著征衣山中故人應大笑扁舟坐稳何當歸半塘桺暗閶門逗曉開半塘塘下越谿回炊煙擁柂船船過芳草縁堤歩歩來送丘為下第歸蘇州嚴維滄江一身客獻賦空十年明主豈能好今人誰舉賢國門税征駕旅食謀言旋皦日媚春水綠蘋香客船無媒既不達予亦思歸田書情上李蘇州東土苗人尚有殘皇皇亞相出朝端手持國憲羣僚畏口喻天慈百姓安禮數自憐今日絶風流空記徃年歡誤著青袍將十載忍來漁浦却垂竿送魏十六還蘇州皇甫冉秋夜沈沈此送君陰蟲切切不堪聞歸舟明日毘陵路迴首姑蘇是白雲維揚送友還蘇州崔顥長安南下幾程途得到䢴溝弔綠蕪渚畔鱸魚舟上釣羨君歸老向東吳贈長洲何主簿戴叔倫挂席逐歸流依依望虎丘殘春過楚縣夜雨宿吳州野寺吟詩入溪橋折笋㳺到官無一事清靜有諸侯口號呉王美人半醉李白風動荷花水殿香姑蘇䑓上宴呉王西施醉舞嬌無力笑倚東窓白玉牀感蘇州舊舫白居易畫梁朽折紅窗破獨立池邊盡日㸔守得蘇州船舫爛此身爭合不衰殘蘇州故吏江南故吏别來乆今日池邊識我無不獨使君頭似雪華亭鶴死白蓮枯蓮鶴皆蘇州同來將歸姑蘇南樓餞别送李明府許渾無處登臨不繫情一憑春酒醉髙城暫移羅綺見山色纔駐管絃聞水聲花落西亭添别夢柳隂南浦促歸程前期迢逓今宵短更倚朱䦨待月明呉門送振武李從事晩促離筵醉玉缸伊州一曲淚雙雙欲攜刀筆從新幕更宿煙霞别舊忩邉馬近秋侵紫塞呉㠶乘月下清江嫖姚若許傳書檄坐築三城看受降呉故宫常建越女歌長君且聽芙蓉香滿水邊城豈知一日終非主猶自如今有怨聲呉苑思陳陶今人地藏古人骨古人花為今人發江南何處葬西施謝豹空聞采香没呉姬十首薛䏻夜鎻重門晝亦監眼波嬌利瘦岩岩偏憐不怕旁人笑自把春羅等舞衫龍麝熏多骨亦香因經寒食好風光何人畫得天生態枕破施朱隔宿粧滴滴春霖透荔枝筆題箋動手中垂天隂不得君王召嚬著青蛾作小詩鈿合重盛繡結深昭陽初幸賜同心君知一夜恩多少明日宣教放德音褪紅香汗濕輕紗髙捲蚊厨獨卧斜嬌淚半垂珠不破恨君瞋折後庭花取次衣裳盡帶珠别添龍腦裛羅襦年來寄與鄉中伴殺盡春蠶税亦無畫燭燒蘭暖復迷殿帷深密下銀泥開門欲作侵晨散已是明朝日向西樓䑓重叠滿天雲殷殷鳴鼉世上聞此日楊花初似雪女兒絃管弄參軍冠剪黄綃帔紫羅薄施鉛粉畫青蛾因將素手誇􅊏巧從此椒房罷更多自是三千第一名内家叢裏獨分明芙蓉殿上中元日水拍銀盤弄化生歳寒堂三題范仲淹堯舜受命於天松柏受命於地則物之有松柏猶人之有堯舜也是故聖人觀有心而制禮體後凋以辨義丁公神遇鑒寐形焉陶相真棲風韻在矣是物也前言徃行豈徒然哉吾家西齋僅百載二松對植扶踈在軒靈根不孤本支相茂卓然有立儼乎若思霜霰交零莫能屈其性絲桐間發莫能擬其聲不出戸庭如在林壑某少長北地近還平江羙先人之故盧有君子之嘉樹清陰大庇期於千年豈徒風朝月夕為耳目之資者哉因命其西齋曰歳寒堂松曰君子樹樹之側閣焉曰松風閣美之以名居之斯逸由我祖德貽厥孫謀昆弟雲來是仰是則可以為友可以為師持松之清逺耻辱矣執松之勁無柔邪矣稟松之色義不變矣揚松之聲名彰聞矣有松之心徳可長念兹在兹我族其光矣子子孫孫勿翦勿伐惟吾家之舊物在嵗寒而後知天地憐其材而況於人乎作詩紀之以永長也歳寒堂我夲先唐相奕世天衢行子孫四方志有家在江城雙松儼可愛髙堂因以名雅知堂上居宛得山中情目有千年色耳有千年聲六月無炎光長如玉壺清於以聚詩書教子修誠明於以列鐘鼓邀賓樂昇平綠烟亦可知終日在檐楹太陽無偏照自然虚白生不向搖落地何憂歳峥嶸朂哉肯構人處之千載榮君子樹二松何年植清風未嘗息夭矯向庭戸雙龍思霹靂豈無桃李姿賤彼非正色豈無蘭菊芳貴此有清德萬木怨揺落獨如春山碧乃知天地威亦向歳寒惜有聲若江河有心若金璧雅為君子材對之毎前席或當應自然化為補天石松風閣此閣宜登臨上有松風吟非絃亦非匏自起簫韶音明月萬里時何必開綠琴鳯凰下雲霓鏘鏘鳴中林淳如葛天歌太古傳於今潔如庖犧易洗人平生心安得嘉賓來當之共披襟陶景若在仙往來吳中岑呉江岸蘇軾曉色兼秋色蟬聲雜鳥聲壯懷銷鑠盡回首尚心驚晩入盤門范成大人語嘲喧晩吹凉萬忩燈火轉河塘兩行碧柳籠官渡一簇紅楼壓女牆何處采菱聞度曲誰家拜月認飄香輕裘駿馬慵穿市困倚蒲圑入睡鄉白雲嶺路入千峯一線通陸離長劍立天風五年嶺客題詩處正在孤雲亂石中天平先隴道中時將赴新安掾霜橋氷磵凈無塵竹塢梅谿未放春百叠海山鄉夢熟三年江路旅愁新松楸永寄孤窮淚泉石終收漫浪身好在隣翁各安健歸來相訪説真情丙戌閏七月九日與王必大登姑蘇䑓招王俊明陳淵叔耿時舉避暑次時舉韻始賀火流西還嗟斗斜閏餘暑猶彊顔新凉頗難進燥剛渇欲折焦巻秃如燼炎官扶日轂輝赫不停運登臨有髙䑓勇徃得三俊仍將王郎子飛步凌刼仭風從噫氣來雲作壞山陣鄉如垂頭魚忽巳蟄蟲振空明晩逾清更要孤月印書生乃易與俛仰更喜愠憑䦨天為髙舉酒山欲近竒書鐵鎖鈎麗句錦窠暈兹逰我輩獨難挽軟紅軔君看籠中鳥寧識咸池韻上沙夜汎七月二日困倚船忩看斗斜起來風露滿天涯亭亭宿鷺明菰葉閃閃凉螢入稻花月下片雲應夜雨山根炬火忽人家江湖處處無窮景半世紅塵老歳華次韻孫長文泊姑蘇館讀書忩下一燈殘忽有詩來為煖寒聞道扁舟春共載雪雲雖冷不相干次韻答吳江周尉飲垂虹亭垂虹亭上角巾傾鼉怒龍唫醉不聽安得對君浮大白想應嗤我汗新青夢魂舞蝶隨春草時節賓鴻㸃暮汀湖海扁舟須及健莫教明月照星星壬辰天中節赴平江錫宴因懷去年以侍臣攝事捧御杯殿上賜二小詩去歳排塲德壽宫薫風披拂酒鱗紅小臣供奉金籠盞親到虛皇玉座東天中繖動玉輿來萬歳三聲徹九街想見牙牀當殿過舜裳雲委拜堯階次韻平江韓子師侍郎見寄三首自古四愁湘水深誰將城郭啟山林有情碧嶂團欒繞無數朱樓縹緲臨蚺鼔掲天驚客坐象鍪航海厭蠻深三千客路長安逺故舊書來直萬金南人以蚺蛇皮作腰鼔響徹異常交趾以象革為兠鍪皆異事靈泉杖屨浙江頭經濟長懷尚典州堂上讀書朝氣爽䑓前呼月海光浮交情尺素勤雙鯉刀筆枯松挽萬牛已把三章翻玉府為君擊節變蠻謳子師新作小舎於浙江號靈泉讀書堂呼月䑓皆其處也前年衝雪過雙谿風帽泥韉騎吹隨爛醉依前逢錦瑟好音惟是欠黄鸝功名未試玉璜玦離别頻傾金屈巵疇昔北征煩吉夢南征合有夢歸時頃年北使時朝野多妄傳被㽞不歸子師家中人忽夢子歸翌日過界報到故末句及之鶯鶯子師家善歌者前年過婺券滿巳去自閶門騎馬入越城日影穿雲亦未濃夜來疎雨洗清空村前村後東風滿略數桃花一萬重斷橋隤岸數家村雨少晴多減漲㾗雪白鵞兒綠楊柳日髙猶自揜柴門閶門行送胡子著作漢州前年送君朝明光今年送君還故鄉錦官樓上一尊酒萬里閶門折楊柳呉波沄沄蜀山蒼人生行路如許長相逢相送鬢如雪人生能禁幾離别房湖風月開春䑓石湖水雲歸去來西棹東㠶君未了相逢還向閶門道閶門初汎二十四韻淳熈丙午重九後十日家人輩以予久病適新修小舫勸扶頭一出以禳祓屯滯遂至北城檢挍桃花塢出闗旁漕河望楓橋横塘中路而還故有即事詠景唐律之作好在馳煙路平生載酒行摧藏身乆病契濶歳頻更昨日燈花曉今朝稻把晴出門新夢境觸目舊詩情水逺推篷眩天寛倚柂驚轉灣添縴挽罨岸併篙撑舫後裝兒女艫前酌弟兄醅香新麹嫩茗味小春輕紅縐分霜果黄嫣撚夕英纈林疎露屋朱閣靜臨城桃塢論今昔楓橋管送迎山腰樵擔動木末酒旗明竟日窑烟直中流塔影橫數㠶殘照滿一笛暮江平曬網楓邊衍牽繒柳際棚岫雲縈石住田水穴隄鳴過渡牛歸速穿籬犬吠獰魚寒猶作陣鴈逺更聞聲急櫓潮痕出踈鐘暝色生鄰翁欣問訊逋客愧寒盟一昨成歸卧於今負耦耕生涯都塌颯心曲漫崢嶸猿鶴休多怨菰蓴尚可羮藥囊吾厭苦扶憊且班荆晚步吳故城下意行殊不計榛菅風袖飄然勝羽翰拄杖前頭雙雉起浮圖絶頂一鵰盤醉紅匝地斜曛暖熨練涵空漲水寒却向東皋望煙火缺蟾光映槲林丹寄虎丘長老誰云簮紱坐成禽亦漫為官漫好音身已備嘗生死病心何曾住去來今一波不動月空照萬籟無情風自吟持此東歸似同志故應分我半牀林送徐叔智運使奉祠歸呉中手種湖邊花百畆東風日夜催歸去當年辛苦種花時不道白頭猶未歸君如肯過城南陌但向水雲紅處覔煩呼猿鶴問平安當有畦丁解看客我今江船亦欲東揖迎楓橋成兩翁壓枝萬朶雖過盡尚及巢龜蓮葉中懷龔頥正好在楚龔子秋來情話稀昨承書素説行侍板輿歸煙水潮平棹風霜歳晩衣㡬時真訪戴莫待雪花霏吳歈一首送丘宗卿自平江移㑹稽吳兒與君縁不薄再騎竹馬迎南郭吳兒與君縁復淺坐席纔温旗脚轉東人賦重越吟悲趣了兹段隨朝鷄胷竒百煉當活國君豈獨私呉與越鶴鳴樟橋猿夜啼匈奴未滅家何為功成他年歸結屋好在山花休斬竹宗卿十三年前嘗守吳今復來㡬年而去越民困於和買蓋有意為蠲減之樟橋宗卿卜築處有山牡丹二夲歳各發百花手植筀竹二十年今一尺圍作舍時悉當伐去皆實錄席上語也翻襪軒夜坐聞雨閒門冷落靜無譁小閤簾幃密自遮日晩課程丹竈火夜深光景佛燈花人生寧有病連嵗身世略如僧在家步屧尋春非老伴任教風雨喚雷車壽櫟東齋午坐屋角靜突兀雲氣低鴻濛殘葉颭疎雨孤花側凄風北忩午睡起一笑萬事空無人共此意莎階咽微蛩次韻袁起巖送示郡沼雙蓮圖珠淵玉水折方圓涌出雙蓮照酒邊壓倒小湖三級草増光後沼兩重蓮苕華名字元相並桃葉根株本自連好把吳歈翻楚些陽阿新曲勝當年洞庭小湖寺舊得瑞象有草繞之投草湖中生三級紅蓮皮日休有木蘭後池重䑓蓮詩云兩重元是一重心皆呉中瑞故事而未有雙蓮之傳也再賦郡沼雙蓮三絶館娃魂散碧雲沈化作雙葩寄恨深千載不償連理願一枝空有合歡心池光䦨檻倚斜暉把酒看花醉不歸但許鴛鴦相對浴休驚翡翠一雙飛兩岐秀罷巳蒿萊春意還從菡蓞回不是使君和氣勝此花應向别人開次韻袁起巖喜雨使君精禱動山靈月御俄從畢噣經昨夜雲頭隨皁蓋今朝雨脚挂青冥池光拍岸浮州宅湖面粘天漲洞庭賸采吳歈歌歳事傳歸擊壤調中聽再次喜雨詩韻以表隨車之應仙篆驅龍効水靈佛螺吹梵演雲經何須礎汗生蒸潤便借爐薫作晦冥一念故應周法界萬神元不隔明庭昌時圭璧形聲應不是周時莫我聽三次喜雨詩韻少伸善頌鄉非賢牧政通靈㡬負松陵耒耜經天籟侵晨占少女雨師連夜檄𤣥冥作霖豈必求商野召見誰能右漢庭聞道追鋒傳好語從今側耳為君聽府公錄示和題喜雨之作輙次元韻雨挾潮痕漲具區流渠決決繞幽居荷鋤日課都忘倦抱甕天機本不踈且喜水平昌谷稻莫教雷假介休車老翁飽外還多事更把林間種樹書賦得桃塢送别髙啓何地芳菲滿呉趨曲陌西藏經非漢壘種樹似秦溪未曙忽霞起過春猶雪迷葉聞渡江唱花憶映門題折時或旁水遊處毎成蹊偶來因送客腸斷有鶯啼遷娄江寓館寓形百年内行止固無端我生甫三九東西宜未闌去年宅山陲今年徙江干野性崇儉陋經營惟茍完閒忩俯平疇幽扉臨逺湍豈忘大厦居弗稱非所安披榛始來兹霜露凄以寒誰云逺親愛弟子相與歡室中有美酒歳暮聊盤桓登西城門登城望神州風塵暗淮楚江山帯睥睨烽火接樓艪并呑何時休百骨易寸土向來禾黍地雨露長榛莽不見征戰塲那知征人苦馬驚西風笳鳥散落日鼓嗚嗚城下水流恨自今古詠雨酬張進士羽見寄珠碎復絲輕飈回乍拂楹望中來曉峽愁裏度秋城沙濕蟲應冷荷響露還驚聽絃知瑟潤卧簟覺幃清一覽停雲句離抱轉難平賦得姑蘇䑓送賈文學麒城上聞啼鴉䑓前見逰鹿悠悠畫簾影薄暮澄潭曲雲隨歌舞散日與興亡促美人不歸來湖水春更綠思君别後登應盡天涯目聞晩鶯時在圍城中作昨歳聞歌囀綠隂山院行今朝寢齋雨重聽獨含情西磵多喬木何為亦到城答宋南宫見寄時寓江上棲寓豈髙遁偶家南渚濱雖欣逺物累終悲寡交親拏舟近入郭言欲訪故人叩門子不在思懷竟難伸歸來揜蓬廬幽卧屬始春風喧柳意動雪霽禽聲新孤逰盼芳物尊酒孰與陳念昔文翰塲弱蹤繼清塵鳴絃東閣夜飛蓋西園晨兹歡與年徂憔悴兩未振朝䝉枉瓊藻慰我遲暮勤深情寄妍辭不殊握中珍居屯在守志養素豈辭貧裁章以少答此道願無淪送家兄西遷昔别歸有期此别去何極西遷屬事變咎責非巳得家貧無行資空槖辭故國怱怱逐徒旅宛宛謝親識牽攀不能留慟哭野水側離鴻為回翔浮雲暮愁色别時雖云苦未若别後憶願行勿憂家養親自我職殊方氣候異炎霧秋未息委命毌怨尤長年彊飱食召修元史將赴京師别内承詔趣嚴駕晨當赴京師佳徴豈不樂獨念與子辭子自歸我家貧賤乆共之閨門藹情歡寵德不以􅐾天寒室仍罄何忍逺去兹王明待紬文不暇頋我私悤悤愧子勤為我烹伏雌攜幼送我泣問我旋軫時行路亦已遥浮雲蔽川坻宴安聖所戒胡為守蓬茨我志願裨國有遂幸在斯加餐待後晤勿作悄悄思酬謝翰林留别啟常與同郡謝君徽同徴又同官翰林洪武三年七月二十八日上御闕樓召對擢啓戸部侍郎謝為吏部郎中俱以踰省辭即䝉俞允賜内帑白金放還於鄉江左稱謝家奕葉多名人君今復秀發瓊枝邁風塵頋予沗鄉里才華敢論美丹詔偶見徴雲蘿歘同起謁帝入九闗咫尺瞻天顔從兹繆通籍接武諸公間朝侍青坊讀夜陪玉堂宿講罷分御羮吟成刻宫燭出入在兩宫與君無不同自慚本鷗鷺亦得隨鵷鴻朝朝禁門下聽雞共騎馬上國多故人情親似君寡並命超列卿寵極翻憂驚我叨掌國計君佐持銓衡偕辭向明主叩天聽天語敕賚内帑金東還特相許拜賜出皇都人言似兩疏月明照宫錦同棹入中呉呉中故鄉道雨歇秋光好青山度水迎喜我歸來早落日下長洲分攜忽解舟如何到家喜却有别君愁别君去還邇只隔呉江水離思與秋長蘆花三十里來徃片㠶通相期作釣翁髙歌雖鄙野猶可賛王風始歸田園辭袂歸故里永言遂遐心豈欲事髙塞崇居難自任清晨問田盧荒蹊尚能尋秋蟲語左右翳翳桑麻深别來㡬何時舊竹已成林父老喜我歸攜榼來共斟問知天子聖歡然散顔襟相期畢租税嵗暮同謳吟其二白露蕪草木荒園揜窮秋歸來一芟理始覺吾廬幽髙柳䕃巷疎清川映閣流落日望禾黍離離滿西疇乍歸意自欣䇿杖頻覽㳺名宦誠足貴猥承懼愆尤早退非引年皇恩未能酬相逢勿稱意不是東陵侯送王太守遷雲間男屠猪羊女􅀈酒共禱神祠留太守太守今年遷太州除書巳下誰能留兩州相去無百里失君應愁得君喜安得如君數十人一時盡福東南民憶昨行寄吳中諸故人憶昨結交豪俠客意氣相傾無促蹙十年流亂如不知日費黄金出㳺劇狐裘䝉茸欺北風霹靂應手鳴雕弓桓公墓下沙草白彷彿地似遼城東馬行雪中四蹄熱流影欲追飛隼滅歸來笑學曺景宗生擊黄獐飲其血皋橋泰娘雙翠蛾喚來尊前為我歌白日欲没奈愁何迴潭水綠春始波此中夜逰樂更多月出東山白雲裏照見船中笛聲起驚鷗飛過片片輕有似梅花落江水天峯最髙明日登手接飛鳥攀危藤龍門路迥不可上松風吹滅岩中燈衆客欲歸我不能更度前嶺緣崚嶒逺攜茗器下相候喜有白首楞伽僧館娃離宫已為寺香徑無人欲愁思醉題髙壁墨如雅一半欹斜不成字夫差城南天下稀狂游累日却忘歸座中爭起勸我酒但道飲此無相違自從飄零各江海故舊如今幾人在荒烟落日野鳥啼寂寞青山顔亦改須知年少樂事偏當飲豈得言無錢我今自算雖未老豪健巳覺難如前去日已去不可止來日方來猶可喜自古達士有名言但説人生行樂耳賀樂丈南郭新居范成大新䑓燕雀喜竹籬挂藤蘿崩奔風濤裏得此龜巢荷西山効爽氣南浦供清波㑹心不在逺容膝何須多先生淮楚俊踏地嘗兵戈飄飄萬里道芒鞋壓闗河風吹落下邑楚語成吳歌豈不有故園荒垣鞠秋莎無容説當歸到處皆南柯閉戸長獨卧奈客剥啄何㑹令蒼苔石屐齒如蜂窠樂菴初成李彦年老子平生可不足菴成那管食無肉終朝閉戸只讀書四面開忩都見竹投老閒居百事宜早眠晏起不論時更長睡足披衣坐傾耳林間聽畫眉期頥堂百事如今與世違一花一木謾兒嬉莫欺兀兀癡頑老曽睹昇平元祐時不服丹砂不茹芝老來四體未全衰有人問我期頥法一味胸中愛坦夷崑山吕正之三男子連中神童科蓋奇事也次嚴别駕韻葉衡三秀標姿穎不凡姓名聨列紫微間已知鳯穴梧棲穏誰謂鵬程雲路艱孔釋當年親抱送由莊逸駕定追攀發揮更有文章伯髙壓淮南大小山送衛狀元著作提舉淮東樓鑰通泰牢盆亘海濱官家專欲用儒臣淮南草木生顔色又見龍頭第一人羨君持節拜庭幃未老雙親著綵衣若遇蓋公煩問信坐曺日念舊逰稀屢從尊酒接從容叔寶風姿對座中他日相逢年益老棊壇尚有角雌雄寓居全吳江上姚申之幅巾蕭散一枝笻身在水雲千頃中抹野亂山隨意碧裊林霜葉可憐紅松江司馬光呉山黯黯江水清欲雨未雨傷交情扁舟蕩漾泊何處紅蓼白蘋相映生秋風索索連江起暮過煙波十餘里長蘆痩竹映漁家燈火𣺌茫寒照水送楊太祝忱知長洲縣三吳佳縣首民物舊熈熈專用清談治非如俗吏為林疎丹橘迥稻熟白芒欹宜使民無忘嚴修泰伯祠送僧歸吳髙枕聊成夢晴空忽見花浮生盡是客何處得為家旅食帝城乆歸舟澤國賖勿因菰菜味回首浩無涯虎丘晚歸呈同逰鄒浩虎丘山色最宜秋山下濺濺亦可舟北去幾年空好夢東來今日快昏眸邦畿正藹無雙譽杖屨仍逢第一流邂逅髙風許追逐異時應擬峴山頭濟明不預虎丘之逰作此寄之虎據千年一故丘邇來形勝絶南州池清不礙龍收影䑓迥猶疑石㸃頭白日青天秋更好幅巾藜杖曉同逰遥知正擁雙旌坐直上雲峯一凭樓送長洲周丞陞吳縣令髙啓青山隔苑牆改邑去非遥官食新添俸民傳舊布條稻花迎午放荷葉待秋凋寂寞長洲路空聞五絝謡錢塘送馬使君之吳中樟亭離席散遥發畫轓車飛雉新阡麥啼鶯故苑花望山登郡閣行水到田家莫道凝香句前人獨可誇送石明府之崑山茂苑行春罷攜琴又向東潮聲數里外山色半城中㠶帶桃花雨衣翻柳葉風鳥夷聞善政為有泊船通吳僧日章講師赴召修蔣山普度佛事既罷東歸送别二首萬人擁坐聽潮音寶刹曾迂玉駕臨佛法曉敷三藏秘帝恩春及九原深鍾山坐處花頻雨練浦歸時樹欲隂擬問楞伽嗟已别楚江飛錫暮沈沈故鄉未解識清容却在金陵闕下逢中禁曽分齋鉢飯上方時叩講筵鐘一㠶細雨迢迢浦半塔斜陽靄靄峯相送師歸忽多感飛雲亦戀舊杉松送賈文學以郡薦赴禮部試畢歸呉匹馬都門候曉開呉公新薦賈生才郡中方待傳經業闕下先稱射䇿才寒食杏花江店雨春衣柳絮驛程埃慚予東掖叨陪講難把長干送别杯送鄰僧淡雲歸笠澤徃來海上獨離羣雅稱身名是淡雲經院葉深秋講散香䑓鳥下午齋分坐間山偈曽同説别後鄰鐘不共聞笠澤到時尋舊業菱池漠漠雨紛紛期徐七㳺雲岩憶與青山别幾時雲僧應恨鶴歸遲少知學道貧非病閒愛談禪偈是詩女浣曉江烟淼淼人行暮苑麥離離明朝風雨還同徃恐負髙僧石上期被召將赴京師留别親友長送逰人作逺行今朝還自别鄉城北山恐起移文誚東觀慚叨議論名路去㡬程天欲近春來十日水初生只愁使者頻催發不盡江頭話别情入郭過南湖望報恩浮圖雨過春陂柳浪香布㠶歸緩怕斜陽漁人為指江城近一墖船頭㸔漸長過保聖寺隔江寒霧隠樓䑓逺逐鐘聲放舸來亂後不知僧已去幾堆紅葉寺門開舟歸過斜塘漫漫村塘水没沙清明初過巳無花春寒欲雨歸心急懶駐扁舟問酒家舟行晚過張林張林地名有土山望山幾欲去尋幽此日雖來不暇逰一棹黄昏過山下疎燈絡緯滿林秋夜至陽城田家東津渡頭初月輝南陵寺裏逺鐘微主人入夜門未揜蒲響滿塘鵞鴨歸呉都文粹續集巻四十八
