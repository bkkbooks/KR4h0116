body:
  text: 呉都文粹續集巻五十明錢榖撰詩立春之二日大雪平地三尺呉中五十年無此雪韓奕蕭條江縣空歲暮寒風積雨雪連日夜平地深三尺逺近寂無喧四顧同十色沾足良可佳有祥詎難識空街人迹斷寒光入虗室重衾不知煖厚纊衣猶慄餘生近老病起卧但㣲息緬彼逺道人驅馳正行役在物實同類有懐屬此夕寄俞立菴相望才一里不到已多時家似山中住人非世上知草深疑斷路水漲訝平池枕簟竹林下乗凉想最宜包山毛公壇㣲茫太湖心諸山此為最宛如海上國平寛納幽邃田廬錯上下人烟萬家聚柤梨及橘柚栽植窮地利想當秦漢間尚未通風氣龍蛇不敢窟人跡未始至毛骨竒公仙有福當此地開荒治丹術道成遂仙去嗟余後千年恨不身親遇願執洒掃役服勤於鼎器㣲生倘有分冀沾餘粒棄嵯峨三尺壇草藥春來異縹緲千仞峯烟霞景仍秘平生出塵想矯首徒仰企浮雲影悠悠無從候仙馭山水漫娱人凌風振歸袂横山西隱菴孤艇溪邉入千峯雨裏登老年雖厭客長夏欲依僧院古青苔滿林寒宿霧凝解衣禪榻上未覺有炎蒸黄埭興國寺粳稻田初熟烟霞日欲西孤舟僧共載古寺鶴同栖樹抱溪流合窻隂月影低紀㳺閒有咏常向壁間題八月十四夜過望亭夜裏行船過望亭滿塘秋月露初零閒吟忽記唐人咏喜見平田晩稻青送友人還崑山張適雨歇東風曙色㣲婁江艇子逆潮歸花明祖席清尊酒栁拂儒冠白苧衣上水海魚堪砟鱠近人沙鳥不知機烟塵滿眼且歸去莫負春山采蕨薇春日登胥門城樓城頭華構勢翬飛西望吴山落翠微春草荒臺麋鹿過夕陽古塞雁鴻歸關河萬里歸興廢城郭千年感是非惟有樓前太湖月夜深依舊弄清輝雨後過海雲菴招提寄徐耕漁王耕雲雨後穹窿萬摺青白雲粘樹溼冥冥寺從栖鶴松邊露泉向啼猿峽口聽徐孺閒居過徑逺王猷茅屋隔林扄相邀共借棲禪榻夜粥燈前煮茯苓送崑山知州任嘉定夕陽江上雨初殘楊桞搖金拂馬鞍白鳥笑予長送别青山留客共盤桓桃花水泛征帆穩燕子風生祖席寒在路獨吟今夜月到州仍作舊時官民罹歉歲傷凋瘵君有長才定治安行見經綸應重托却留遺愛遍江干送長洲主簿兼司税佐令勞才子秋深始到官蒹葭催暮雨蟋蟀泣初寒侯吏迎車近商民望稅寛政聲藩府重寵擢諒非難寄陳山人寅草堂孤在夕陽村每憶城南綠水園春露尚沾萱草背夜寒忽散鶺鴒原孤鴻歸興寄琴調香蟻忘憂到酒尊寂寞楊雄甘老去百年名姓至今存宿山中徐畊漁宅舊業非忘世新朝似隱淪雲生籬徑晩花覆石房春子大憂無似書多未是貧酣歌頻續燭竟忘主和賔題笠澤陸氏隱居隱居何處所笠澤水西偏贍俗田千畆容身屋數椽桂隂侵座薄桞色映窻妍軒羃花前霧亭分竹裏泉磵深忽見日林茂欲無天石壁琴常潤書牀硯已穿俯池厓欲堕登樹薜相牽瓶貯滋花水簾通煮茗烟蓄書千巻足課子一經傳字罷臨流憇公餘選石眠病多諳藥性閒久積書篇奕客爭饒子琴僧上斷絃尋山穿雨屐看竹棹孤船湮沒遵時晦栖遲任性便感恩懐耿耿厭俗思翩翩要我頻相過佳章夜共聨與陸天㳺張南村諸公逰溪西華嚴菴讀書只在松檜林不道春色孤村深鳩啼雲暝亂㳺思花落水流驚客心過溪尋僧蘭若僻掃石坐我莎蘿隂杖藜田路逐樵返落日已下西湖岑寄道衍上人京國徴行喜早歸茅菴屏迹揜柴扉文章留世新編稿絺綌榮身舊賜衣晨鼓憶分天界粥春風還采海雲薇相期共向林泉老已悟年來五十非與王正仲夜話寒過已多時春来不爽期花前初熟酒别後只添詩續燭知宵永聞雞悟睡遲劇談渾莫倦明發又天涯送坦雲軒住中峯寺中峯香刹翠雲邊支遁昔日曽栖禪白馬千年不復返青山萬頃只依然師行氷雪歲云暮舟渡吴淞江可憐名地猶來在人勝好勤修業繼前賢蘇人葛秀才送余至京師及之官又送至大勝驛值大風雪感其髙誼臨别賦此君不見昌黎公藍闗馬蹄風雪中又不見玉局翁黄州路遥如阮窮我生今年五十七讀書呉山畏人識昔年曽作水曹郎聖恩早賜歸蓬蓽邇來又越十六年老病囊無挑藥錢去年府州忽相荐豈謂聰明不及前茅茨驚憂病増劇展轉歲除千感集今年始及趣装行兒女牽衣憐我泣抱痾艱苦至京師上赴天官陳履厯聖恩浩大不加罪命向廣西佐方伯青衫白髪老從事自媿才疎難稱職臘月出皇都白門啼亂烏乾坤忽變色風雪方載途蹇驢凍屢仆瘦僕飢且痛俄至大勝驛面皮盡黎色丁寧僕莫嗔勞役纔第一下車就酒家酒薄殽不佳餒乏敢嫌此情惡良可嗟酒家頗見喜煖湯温我指挹酒為續杯垂情數相語乃知平生交勿薄屠沽子邂逅遇一官問之稱孝亷共買金陵酒同上廣西船廣西在何許浩𣺌烟江水舟師數驛程四千三百里大寒遡大江江流急淙淙沙頭暫停棹飛浪壓蓬窻况乃途路迂老年俄此罹羇情正愁絶忍送葛翁歸葛翁悤悤向我别胸中有言不及説我今竭力報皇恩翁亦還家保名節我家呱呱好孫子翁先還家凴寄語到官急遣汝爺歸男長讀書女鍼黹舟中聞呉歌清湘夜駐木蘭橈月落霜天雁唳遥忽聴呉歌驚夢斷此身只訝泊楓橋過楓橋留别城西諸友煩君逺餞意偏饒念我離羣乍寂寥祖帳雨催詩欲就郵亭風勁酒頻消移舟射瀆黄昏近路轉江村碧樹遥記取今宵分手處烏啼時節過楓橋早春過望亭驛喜晴追次唐嘉祐韻逺墅晴煙散綠蘋推篷起坐整衣巾野花開處多臨驛水鳥飛來似送人愁裏聴窮三日雨客邊吟到一分春今朝已有尋芳客來往東風陌上塵宿閶門霜滿烏啼夜月寒客窻燈火著愁看故園相去無多路便覺今宵睡不安客金陵送盛寅還吴官栁籠隂半已青俄聞歸棹發金陵秦淮雪裏春潮長楚甸雲開晩日昇先我還家緣客久如君多藝更誰能莫辭同醉長千酒明日相思恨不勝送俞立菴應湘府聘鶴書逺聘到岩阿拜手幡然出薜蘿天接孤帆秋水濶門閒五栁夕陽多吴雲漸杳鄉邊樹湘水㣲生渚外波此去賢王應待久安車行斾莫蹉跎宿開元精舎落日樹隂隂禪幽靜客心香烟秋殿寂燈火夜厨深茗熟僧先睡詩成佛對吟自憐躭僻志只合卧雲林賦得秦淮夜泊送吴秀才歸呉烟霧淡籠月泊舟依淺沙且沽今夕酒聴唱後庭花淮水迎歸路呉山看到家鄉中莫留滯慈母在京華賦得太湖春水送華以及歲貢浩浩來天目溶溶接漢津光隨征櫂逺綠染客袍新瑞雪初銷臘恩波總是春明朝禹門外一躍有誰倫賦得劍池送友之京岩樹鱗皴生鐵花一泓寒玉清無瑕山中有穴通海脈人間無地埋青蛇居僧經歲不飲井㳺客常時來煮茶安得干将復飛出贈君佩服歸京華楓橋歌送姜秀才歸金陵君不見楓橋水奔流直下太湖來環繞闔閭城西地其間風土何佳哉層樓叠榭侵雲起望處人家半臨水水邊歌舞不勝春橋下帆檣停似蟻復有大道接金陵送客每來橋上行山寺鐘鳴知夜半漁村月落見燈明今朝却餞呉公子解我金貂沽綠醑帆挂長洲苑外烟衣沾虎阜山頭雨暮烟秋雨益凄其别緒離情無限期昔時不是今時景今人還誦昔人詩見説長干花似綺君歸更莫思鄉里移家将之金陵宿楓橋山寺烟初暝江村月又生辭家無十里不寐到三更犬逐漁燈吠鐘催客棹行從兹去鄉土寧復是呉氓送醫學盛啟東之京欲識軒岐學相將上九天祖陳楓葉下席展杏行邊暫别燒丹竈來登罨畫船衣冠頒賜日雨露想承偏靈岩懐古送瑀上人呉宫成梵刹銷歇尚遺名臺峙荒琴薦池存涸研泓綺羅無復見泉石有餘清相送師歸去重増弔古情送任二尹復官呉縣考績曽聞謁紫宸俄看征棹别江津郎官拜去雖依舊雨露承來又一新古縣花明千樹曉重城栁色萬家春知君徳化吴氓久風俗從兹想更深送金徴士問應書誥薦金卿二十即能文染翰爭誇逼右軍用筆不愁窮兔穎臨池惟愛弄鵝羣常年閉戸稀曽出一日佳聲逺自聞忽睹荐章從聘召為書皇詔錫功勛治装早已辭親舊拜手明當謁帝君花底傾來杯欲盡桞邊携處袂將分嗟余蠖守依環堵羡子鵬摶在五雲聖代英才超往古家鷄野鶩任紛紜逢沈以潜何處移來一艇間褰衣同憇樹隂閒自緣别久多情話不為看山忘却還賦得千人石送沈寅仲林下盤陀石山中不記春竚看無一畆容坐僅千人雲䕶平如砥苔封厚似茵祖筵從廣設懽㑹在逡廵送吴敏學還呉省親雙親白髪老東吴令子丹心向帝都正及歲寒歸故里不辭雨雪載長途無人似爾情偏厚有酒如澠興不孤他日相思凝望䖏暮雲春樹總糢糊登天平白雲亭白雲泉上白雲亭京國歸來喜重登欲試坐間誰老健酒酣先上最髙層送韓伯承還呉今朝佳節是花朝相送重來白下橋老語生憎鶯舌巧新愁翻壓桞眉嬌天街有雨塵還少酒巷無風斾自揺咫尺清明歸未得羨君先上木蘭橈虎邱送别二首天上樓臺海上山何年移却在人間不因此地多清勝那得逰人數往還望䖏已添吟咏興到時頓解别離顔今朝送客同春去門外白雲千頃間相送瀛洲客來登海湧峰岩雲騰白虎池劍躍蒼龍境勝詩情愜盃深别思濃悤悤分袂處髙塔夕陽舂題杜瓊草堂遺意巻二首舊業成都萬里橋百花潭北草堂遥門無縣吏催租税座有鄰翁慰寂寥松影滿庭閒白日茶烟繞榻颺清颷酷憐杜甫成詩史翻笑揚雄作解嘲草堂遺址在重構剪荒榛松偃呉門月花移蜀地春流芳知有本繼業豈無人喜到瓊枝茂詩宗又一新賦得龍門送范原紹應聘凌雲峭壁聳崔嵬不待神功禹鑿開一徑直通天上路雙厓隔斷世間埃雖無鎖鑰常闗閉肯放豺狼恣往來今日送君騰躍起從龍為雨潤枯荄逰天池訪愷上人不遇山中夏将半嘉樹敷隂重閒携綠玉杖拄到青蓮峰苔徑少行客微存舊㳺蹤臨池滌煩襟萬壑來松風蘭若倚天開岧嶤白雲封髙軒蔽嵓穴踈櫺銜翠濃未緣釋子共所欣良友同明當發毫素贅言遺愷公送翰林劉孟功姪鉉還呉君家呉望族名冠儒林表自昔我先人素有通家好若翁余同庚交誼如管鮑翁也早世久余亦慚衰老阿咸能繼業丰姿美年少賦罷擬揚雄詩成驚謝朓一朝省世父治装逺來到欲慰十年别不憚千里道再叙骨月情重講家庭教談話每宵分尊卑愜懐抱昨承訪蓬蓽出迎雙屣倒從容問答間寒威頓除掃髙門産麒麟吾儕亦光耀正欣接吟席又復理歸棹草色瀛洲新鶯聲上林早相送出都門春江波浩浩寄蘇性初辭親逰太學歳月去駸駸夜雨青燈夢秋風故國心一官仍未遂三載又将臨早晩重歸省相隨頼有琴寄沈公濟蕭齋嬰疾久不覩沈休文槐畔愁添雨天邊目斷雲丹青誇獨歩顧陸願同羣擬剪西窻燭連牀話夜分過范氏山荘林靜書聲隔巷聞輪蹄不到絶囂氛天寒鶴立蒼松久童子開扉掃白雲正月三日陪陳士初錢孟書㳺北禪寺訪瑾上人不遇分韻得欵字十六韻昨見葭灰飛玉琯己覺陽和布晴煖條風吹緑草荄萌殘雪消寒栁條短新正擬欲探春㳺今朝便有尋詩伴青鞋布韤慣林泉華髮心情厭林館北禪古刹呉城陲眼界清幽塵跡斷羣賢偶集本無期去路雖遥亦何惮行行不覺到栴檀一徑蒼苔平且坦有意來參孚尹師適逢飛錫歸遲緩惟存法王梵公像趺坐繩牀右偏袒山童見客逺相迎作禮殷勤為延欵盛來香粒堆飯盂供處白花浮茗盌嗟予夙抱烟霞癖野性不羈久踈嬾深冬逺自白門還巾染黄塵衣未澣幸叨方外相追隨得遂閒心適蕭散襟懐頓豁吟思増人境俱寂清風滿詩成坐待師不還白雲散漫無拘管過思菴郊居周忱故人家住碧溪濆出郭書聲白晝聞過訪幾回因看竹歸休何日共論文山容半向窻間出泉脈遥從樹底分最是快人心目處連疇秔稻翠如雲送舉子劉昌赴會試早從侯頖究羣經虎榜新題屬妙齡驥出馬羣空北土鵬因鵾化運南溟功名有待標青史禮樂行看對大廷席上儒珍期自保一尊相送重丁寧送况郎中任蘇州太守擢自儀曺領郡符朱轓熊軾向姑蘇身馳驛傳聲華重手捧天書寵渥殊政洽九江重渡虎時清合浦盡還珠故人尊酒遥相送努力期君展壯圖贈草窗先生詩并序劉鉉詩始以道其所自中則偉其才而惜其不偶故歸之於命以壯其志末則托予徳之之心而必其逺大雖此皆公之寔而語淺意膚拙于形容進教是幸磊落八尺軀魁梧且雄壯靜聴驚論言一見竒貌状早從綵侍下兩京飽逰訪出門狎師友龎卿偕碩相所以韋布間弱冠得聲望而翁醫垣耉和緩相頡頏朅去捐館舎東呉逺歸𦵏朝廷加賻䘏師保為銘壙弔送來親朋駢闐車百兩纍然在衰絰廬墓足愴愴盛暑或忘翣隆冬或不纊時序倐遷移歲月不多譲里閭稱孝亷俊英願隣傍撫臨冬官周𨽻屬郡侯况僉謀起遺野䟽荐交為張百鳥不如鶚一言亦須尚先皇重璠璵雕琢伺宗匠方期就罍自豈復數盆盎鼎湖龍忽升孤臣竟何仰周南雖滯淹坎坷寧悲悵吹嘘豈無媒兹情疇克諒得非命數竒那關遇䜛謗奔趨怪卑汙潔身慮髙亢消息理固然欲得必由䘮窗以草為名志與先賢伉滿庭春不除生生意深廣陟屺空為盱天際孤雲颺王事既靡盬滫瀡誰為養心事一于詩激發何慨慷靜中聊自怡抑菀賴舒暢短章既舂容長篇亦跌蕩府藏出珍竒鈞天奏空曠光華掩魚目鏗鍧咽蟲響正如巨陂中魚龍交蕩漾蒼波合東流滔滔浩難障有時我為歌三嘆而一唱岐黄術精深有似淮隂将克捷若有神鏖攻無不當務施濟利仁札瘥咸倚仗而余病妻孥藥物屢承貺平以補清羸䟽以駈瘧瘴厚徳懐寸心感激忍遺忘擬報持幣金恐君憎冗長擬贈述俚辭恐君厭浮誑惟年改元初青陽日方向國家喜清明輔弼元凱行皇猷足黼黻天工共寅亮氣和時已康物阜民無恙西山雪霽佳潞水澌流漲肩輿既堪命輕舸宜同榜行厨載山肴玉瓶注家釀俯仰天地寛遨逰跡漫浪靈風颯然生送子雲霄上重寄杜用嘉有序余往歲雪中因憶使第梅花已奉鄙作欲為來春之佳約張本今既及期復爾踈濶感時對景不能無言蓋所以歎流光之易邁嘉會之不偶也去年花開雪飛處殷勤曽賦懐君句欲期來歲故山春携酒林間共歡聚豈知于今花發時又復兩地空相思相思正濃花正好千里東西夢魂繞夢魂何處苦思花花總飄零人未老懐陳孟賢緣水園中萬竹深當年曽此寄幽尋芹花池上看垂釣杏樹壇前聴鼓琴投轄豈能忘舊會分題長憶課新吟别來音問如金玉令我長懸一寸心挽陳怡菴先生門外青山架上書東呉佳處是幽居一庭風雨閒芳草十畆園林隱敝廬伯玉有文垂宇宙太丘無意老鄉閭執經猶記相從日寒雪初深聴講餘𢎞文入直被恩私曽受先朝聖主知萬里康荘騏驥逺九重霄漢鳯皇儀金蓮夜草平明詔綵筆朝題應制詩奪得錦袍多意氣賜陪龍駕宴瑶池故里懸車歲月深春風華髪漸盈簮鄭均退後寧無祿䟽廣歸來賸有金湖水烟霞同剡曲竹林觴咏似山隂興闌賔散青天月池上誰歌醉白吟奎星光揜夕雲浮鄰杵無聲巷不謳身世百年雖似夣文章千古更何求詩哀吏部憐張籍諡美河汾念薛収雙淚潺湲何處落盡随江水向東流送真上人住姑蘇寳覺寺聞説湯休最少年早将心印一燈傳滇南鄉土渾無夢呉地江山自有縁暮雨踈鐘烟樹外夕陽孤塔水雲邊遥知聴法龍來䖏香散花飛晝滿天近得家兄書書語欲促鉉歸展誦之際不覺悵然弟兄何䖏憶相違凉月閒齋半揜幃燈下屢看新寄字客邊穿盡舊縫衣參辰欲曙隨雲沒烏鵲驚寒繞樹飛代馬北風猶自戀故園誰道不思歸懐瀚兒憶從生汝在京畿膝下晨昏肯暫違温被每同寒夜宿篝燈曽候晩朝歸留賔歡處傳杯酒為我酣時解帯圍遥想歲闌風雪裏懐親能不思依依贈送吴江僧會杖錫遨逰上九天袈裟曽拜玉階前人間無繫空身相方外浮名逐世縁殘雨踈鐘江寺逺夕陽古塔水雲連贈言好為論吾道聞説聰明似大顛懐杜用嘉十年膠漆重交情憶昔同門聴講經詞足清新皆白雪筆多神妙在丹青彈碁留掃松邊石看竹期過水上亭今夜相思何䖏切半窻殘月上疎櫺輓劉僉事青驄朱節逺觀風銀漢靈槎萬里通頻見槖装貽陸賈又勞束帛起申公九天雨露恩常在百歲衣冠蜕已空聞説西湖湖上路甘棠新長舊時叢寄姪淳澤還家見汝倍多情我昔離家汝未生今夜客窗千里夢竹林誰繼舊時盟望楓橋鄉山遥望翠髙低滸墅橋邊日欲西江郭到城無十里不妨月出夜烏啼吴宫怨張楷江空月冷天如水銅龍漏咽沈檀死宫中粉黛一千人醉眼相看嬌妬起自入朱幃并翠戸幾畨曽得君王數君王好惡自不常豈在區區歌與舞宫門倚天鈴索垂凍霜吹老青銅枝玉鸞隱隱背墻去何人邀得君王歸君前豈無容妾地舊劍猶存肯終棄移居横山謝應芳為愛横山山水清山前築室小溪縈老夫枕石看雲卧兒輩求田候雨畊古井寒泉龍有宅孤村夜月犬無聲廿年老眼風塵暗猶喜如今見太平送道士謝清一歸吴中陳緝丹鼎紅光照洞庭天壇月色帯踈星𤣥都道士蒼精劍上界仙人白鳳翎閶闔朝回天蕩蕩蕋珠經盡晝冥冥欲從杖屨秋山裏風雨篝燈采茯苓送魏司業出守姑蘇陶誼東呉父老候麾旌皂盖朱旛五馬榮名郡暫須煩魏相諸生久恨失陽城麟符剖玉君恩重燕寢凝香吏牘清指日徴黄下丹詔又看環珮入承明姑蘇感事王澤天星夜落水犀軍又見呉宫走鹿羣睥睨金湯徒自固倉皇玉石竟俱焚将軍只合田文死國士應無豫讓聞風雨明年寒食節麥盂誰上太妃墳姑蘇懐古盧大雅胥目懸門烏喙過至今哀怨入呉歌山河不為興亡改城郭其如感慨何廢苑春深芳草滿荒臺秋盡夕陽多醉來一覺扁舟夢也勝豪華逐逝波吴城懐古王恭姑蘇城下刺蘭橈却憶吴王古市朝香輦路邊春寂寂館娃宫外草蕭蕭千年往事空啼鳥半夜踈鐘自落潮明發不堪回首處暝烟秋雨過楓橋謁范祠費貞三百餘年十六朝惟公勲徳著雲霄一時王佐真伊吕十倍雄才過管蕭泮水悠悠文澤逺義田奕奕子孫饒焚香冄拜先生像一束生芻不可招王蘇州綠隂堂俞貞木百尺髙槐十畆隂緑雲簾幙畫堂深魏公相業垂寰宇蘇子文章耀古今厯歲風霜空凛凛近時枝葉更森森忠臣孝子天為鑑行見甘棠自作林暮秋留别吴中諸友黄守蘇臺秋色雨中殘斷雁疎砧送早寒白髪不辭今日醉黄花猶作故園看誰言世路知心少自是人生會面難無那明朝江上别宦情離思共漫漫送沈愚歸玉峯蘇平皇州鶯囀桞條新客裏那堪此送君歸夢不離吴苑月還家髙卧玉峯雲江村貰酒逢寒食驛路看山對夕曛最是臨岐分手䖏落花離思共紛紛夫椒山侯讓曽聞吴越此交鋒回首蘇臺伯業空當日斷岩流戰血至今衰草起腥風裹屍國士浮江上覆面君王死甬東若論滅吴功第一捧心人在館娃宫絸菴為沈孟淵賦丘吉蠶叢國裏結珠龕過盡東風雪未乾玉蛹吹開圭竇小金蛾飛入甕天寛氷絨織箔春無隙香絮䝉頭夜不寒留取獨綸三百尺明朝相約弄漁竿送陳緝熈修撰使髙麗丘濬海上天風吹節旄玉堂仙客錦宫袍詔頒龍闕恩初下詩到雞林價倍髙萬仞鰲金浮曉日一江鴨綠漲秋濤逺夷未識中原鳯爭覩天章五色毛送桑民懌訓導泰和李東陽十年三度試春闈親見聲名滿帝畿甲第久慚唐李郃竒才終誤宋劉幾功名晩歳非蓬鬢湖海官貧尚布衣試看孤鴻下林薄壯心還向碧天飛吴門張泰萬井烟花繞故都闔閭宫苑日荒蕪江魂吼浪空讐越山黛顰秋已破吴臺下草深無過鹿城頭日落有啼烏英雄老去年華在海日曈曈水滿湖東呉棹歌汪廣洋玻璃冷浸洞庭山霜竹攅攅橘柚斑白髪呉娃笑相語官船不似釣舠閒吴中即景白雲収盡晩山青水鳥雙飛入翠屏一派歌聲何處起采蓮人在錦帆涇閶門桞枝詞小蠻能唱白家詞笑把纎腰鬬桞枝愁絶尊前春未老風流太守鬢成絲江南春張楷滿川啼鳥怨殘紅水國春園桞絮風春雨一番江水濶草㾗将綠到吴中吴宫楊時彦畫棟雲消夜氣清宫前溝水作秋聲如何醒得吴王醉多少花枝壓禁城常熟西郊王禕稻禾斂嘉實蘭蕙摧孤芳華滋日已歇逰子多慨慷林臯集鳥雀畎畆散牛羊物情各有適心與歸雲翔吴門贈凌才我家華川上君住蘭江濵百里通一水總是金華人自我與君别三載幽燕住及此會吴門朱顔各如故同為異鄉客誼重情依依東風足擕手君何復言歸歸去金華山日有好山色紫翠積芙容綠草眠白石若逢牧羊子為我寄深情莫令猿鶴怨行矣尋初盟呉江别連上人飄零有若此離别復如何情劇酒杯少愁添詩句多荒村黄葉落極浦白鷗波回首相携處秋風瑪瑙坡呉中客懐獨對一壺酒自斟還自吟句從閒裏得愁到醉邉尋擬廢班超筆猶懐季子金故廬湖上水誰似蹔幽沉過泖入夜初過泖蒼茫興杳然大星懸樹杪新月出帆前夜酒聊供醉漁歌屢惱眠歸歟繡川上欲辦釣魚船十一月十日宿陳敬初館中臨别有作歲十一月當嚴冬江湖水落潜蛟龍蕭條長途客旅散而我買棹過呉淞兹行豈為飢餓逼念子髙誼來相從托交同門己十載䝉被教益開愚憃時時彼此互有激譬持寸筳撞巨鐘姑蘇臺前攬秋色麗正門外尋春容中間欣戚每相繫要復終始猶駏蛩一自去春與子别兵戈滿眼紛横縱又兹相見恍如夢中夜論議披心胸君言爵祿非所願但願撃壤歌時雍却因文章著不朽韜晦飬粹甘為農顧我所願頗異子謂欲與世相奔衝黄金鑄印錦懸綬時至未敢辭侯封丈夫出䖏雖二致非異愚哲由遭逢得意觖望亦常事所貴自寳如璜琮計長較短議輙久坐聴曙鼓聲鼕鼕人生會合良不易奈此物役相牽攻君留仍泛越来水我去猶對金華峯區區離别不足惜且復醉子雙尊醲郊翺自附湜籍輩此事逺矣須追蹤登姑蘇臺有感故壘蕭然起暮塵凴髙何處弔忠臣山連呉越東南近天入江湖上下均歲月多因催髪變文章未足濟身貧悠然今古無窮恨落日商歌倍損神東歸留别呉中一二同志明發閶門一問津梅花有意似留人誰憐孤館青燈夜遥憶髙堂白髪親對酒論文期隔歲到家獻壽及新春石田茅屋猶無恙飄泊江關惜此身常熟舟中一自歸來東海涯每依北斗望京華才疎謾結交㳺廣身逺時驚夢寐賖風雨扁舟今若此功名壮志倍堪嗟故人只在虞山下同看寒梅雪後花呉江客中冬至日十年奔走竟何為轉覺謀生事事非時序每驚愁裏換家山嘗向夢中歸呉江歲晩寒波積楚塞天空鴻雁稀酒後登樓倍惆悵緇塵猶滿舊征衣呉中送僧唐肅師向何方去太湖西復西風傳孤磬逺松偃舊房低煖榻常留兎浮杯不駁犀何時城北寺重聴木鷄啼寄呉思菴敏徳劉溥翩翩孤飛鴻噭噭苦悲鳴凄凄覓故侣悠悠傷我情親交有君子夙昔著徽聲若為久別離愁思極難勝㣲物尚知求人何忘合并歲月已云逺闗山阻修程惟有托柔詞可以通精誠相敦在斯道終當垂令名登蘇臺懐古一上髙城欲斷魂英雄不見水西軍屬鏤劍上飛青血響屧廊中散綵雲日落寒鴉啼古堞月明金虎出孤墳可憐歌舞宫墻地千古蒿萊走鹿羣寄金文鼎寒暑互來往衡紀迭遷移庭柯辭故榮園梅發新滋撫景成時邁跼蹐興翹思我有素心人令徳仰光儀窘然迫冗役煩促苦縈維摶霄羈㣲縶吞舟困汚池仁窮狡乃達斯理信可疑願言慎厥恒毋使此道虧紀懐犀兕秀以角鳳鳥文其翰嗟予七尺軀徒立天地問六齡始讀書八歲吟成篇十一學馳馬賭快爭着鞭十三折右臂積恨存傷瘢其年侍家君受詔辭滇南羊腸古木末鳥道青厓端懼有向時失不敢易躋攀行行近一月始上瀘江船乗流下瞿塘濤聲若雷喧白馬既磥磈黄牛何潺湲東下疾如箭瞬息三四灘出峽何所見蕭蕭江竹斑迴頭望小姑髙髻雲中鬟旦暮屢有聞鷓鴣與清猿逺無羇旅情因在父母前入京見天子寵授家君官賜第全節坊家業裕以寛十四奉嚴命㳺學從所安因之逺揚州尋師志彌專但媿駑鈍姿義理悟見難十八已成冠二十早結婚家居職近侍日夕奉至尊歲時屬廵狩屢作扈從臣皇業開北京庭闈從此分所居未有定使我心煩寃時年二十三辭母省家君惟此去住情憤切廹心肝南風始交夏買舟出龍灣渡江復浮淮心為南北牽千里至吕梁其險不可言亂石列劍㦸崩流激飛湍澎湃千鼓震衝突萬馬奔官艘與民舟誰敢相爭先次泊數十里檣櫓千萬竿縆絡自先後宻若蛛網懸一舟須五牛百丈相鈎連分寸不可上頃刻豈敢延萬一有失勢人死舟亦翻危哉既如此惕惕傷人顔繼至百歩洪咆吼動八垠衛河濫洪波十里九迴盤逆流上潞水五日至通津陸行四十里塵滿雙車輪巍巍見雙闕蕩蕩闢九門家君聞吾至客思即欣欣依依趨膝下眤眤聚至歡如此僅半載命我回南軒南行一月餘復至龍河濵老母正憶我聞至釋憂煎升堂拜嘉慶慰問何諄諄爾父久在客體氣能如前跪答喜無恙家事重勞煩靡靡感歲月不覺十五年迢迢南北京僅得十往還侍養不得并於此常鼻酸江雲與塞雪日夜愁相關南京至北京水路餘三千潦水或驟至舟行如上天枯涸至沒脛閘閉幾欲乾船底沾泥沙颯颯風雨繁啟閘水則過行計數里慳官置運淺夫云是近縣民老少立水中裸體恒苦寒曽向皮家溝風雨近黄昏值淺舟不行舟中水濺濺石格舟底碎一夕不敢眠又嘗渡淮河挂帆當深淵未濟風大作檣斷水入船又于揚子江炎空黑雲盤指語同舟者風雨在逡廵衆言但無害行行勿過論須叟風雨至雷電交轟闐沉沉向昏黑愊愊慘我魂電光燭巨浪排突千銀山我舟若揚簸股慄身欲癱良久幸逢􅜌繫䌫江之干隨浪上復下摩戛将不聮倉皇裂衣被裸䌫始得全浩浩髙郵湖甃􅜌石與甎岸下貫連木槎牙猶樹根或值西北風浪觸湖水渾舟行或遭此粉裂不可完我亦驚此恐百計出危顛聖人戒歴險我乃備苦辛若欲求安居定省違二親昔我宣教公自汴来吴壖彼美白馬澗風氣鬱以蟠六世𦵏于斯巨木青輪囷先祖登仕途墓祭禮遂湮寒雨走狐兎秋風折荆榛前年三十二嚴命致忱恂言歸報先徳穹碑勒名文告祭享族屬先隴幸一新及乎三十四北上履前因别家纔一月閨中失其賢傷哉夫婦情淚下如迸泉今年三十七已繼名家姻携之俱北上敢避所厯艱家君老多疾飬禮庶得申老母仍在南臨别涕滿巾阿姊送弟婦逺至石城闉舍弟挽我衣哭至長江濵悠悠可奈何惻惻将誰陳天地生萬物父母生我身父母幸俱在乃使心忞忞我願天子聖此意早見原不畏行役苦但恨侍養偏又媿學無成久矣負青春壮志日銷鑠碌碌難自伸人願得賢子顧我何如人三子總愚騃不異犬與㹠詩以道性情風化庶以宣吟苦每效之不能致精研舟行適有感述此非自陳隱顯後莫知出處前已真巍巍聖主徳昭昭父母恩徒有一寸心不得通青旻此行固猶昨未可即言旋西風送征帆目接江中蘋寄陳孟賢啾啾田家雀栖栖枳棘叢卑哉獲茍遇反鄙髙梧桐鳳鳥奮文翮来儀翔逺風俾與羣雀隣靈徳終自窮氷炭各有性寒熱由所從君子防未然此意行當崇賦得卧佛寺送僧因覺初祗園隱瓊猊清漢流寳月靈智常湛圓居然示生滅巖巖鷲峯下峩峩表金刹芳㫖存法言端儀儼禪悦于今二十禩廣路多恒轍子得主其宗𢎞慈振餘烈萬壽寺送僧上刹臨東城門峙雙石幢殿宇既壯麗園林亦芬芳法侣偕祝釐報本理所常香檀汎華炬響梵申瑶章子復違同儕凈景開他方願言朝與夕式此期無忘賦得綵虹壽翰林陳檢討嗣初長虹垂青天萬丈騰綵紋紅黄既絢爛青碧尤氛氲朝夕迭東西二氣相蒸薫豈但自輝飭山林亦芳芬孔子作春秋化玉古所聞薛生灌香醴金屑来紛紛斯人妙斯道四海昭雄文英華軼班馬五色同忻忻懸弧紀華誕乗泉應兹辰賦此表嘉瑞庶可道忱恂送况郡守使車何遥遥駕言朝帝鄉載馳復載駈原陸迥且長父老羅道周中心極徬徨扳轅卧車轍願弗去我旁借問此為誰太守忠且良偕彼古名臣四方允為綱挽挽既勿留惕惕徒自傷公當即歸郡慰我遥相望介軒為長洲沈孟淵賦天下有定理中正固無虧君子見其幾毅然堅自持乾坤奠髙厚隂陽迭其時品彚各成形動息有攸宜人心具其性仁義誰無之君臣與父子上下分尊卑明審不違常餘性咸斯推特立茍在躬賁育安能移人能明斯義固執無他疑外物不我加中心洞無私惟此致休徴大易昭其辭願言無謟凟允哉當鑑兹送蘇性初致仕蘇公吴中人風度極雅致昂藏野鶴性貴重瑚璉器早嵗遊邑庠穎出異同類心潜春秋學理發天人際聲華達天聴修纂預中祕名公相引重所藴有根柢文章追古作詩篇亦工緻鳯皇翔紫霄麒麟卧丹陛綿州古名郡逺在萬里外牧者難其人沉憂見先帝爰命公守之于治果有濟綿民滿深望人心感嘉惠豈意丁内艱解綬歸守制故吏擬文翁良有去思計去年服始闋天官有常議衆望若綿民公即思謝事憶昔永樂中南都共文會計齒獨予少公長十餘歲豈惟同邑親抑有同心義鍾山望春雲龍河醉秋霽髙吟叶風雅琅然九臯唳時當八九人偉望皆前輩探賾妙古今擺落無荒穢公官即赴蜀去住從判袂胸中富邱壑摸寫擅清製窮搜遂逰歴星駕未安税長江瀉三峽峨眉倚雲髻畫意公入神懐思余不寐奈何二年别彼此親各逝余歸極恓慘公還更迢逓聚首越三年愈宻向時契祥琴始一奏北上各有為舟行昧先後望望失次第及余至北都公己安族次孟鄰且依栖楊岐釋凝滯粤自别先隴未得躬往祭雲山屢形夢松楸自深閟向公攄此懐山水親㸃綴惟昔曾枉歩布置宛相似心神寓其間暫拭天涯淚冄拜致深感什襲寳珍衛迨至今年春率意謀韞鋭筋力未衰老天聽遂其意二疏去已久亷恥日凋弊屹然立中流允可勸當世瀕行四月初靈雨洗氛翳幡然戒行李髙躅誰可繫悵望逺道車飛塵不能蔽何彼廊廟材舎此玉山桂茫茫薊山雲泛泛呉江枻清風一相激意氣甚凌厲余獨難為别詩餞無婉嬺歸我故山中可寄蘭蕙思萬玉清秋圖為金學士公素賦名園占竒勝萬玉含清秋主人契幽賞賔從迭追逰髙軒擬蓬壺木石擁滄洲金谷差可仿綠水安能儔况此謝豪權黄金積如邱海舶致珍玩蘭車載名謳張筵日為樂豐膳羅庶羞瑶琴奏白雪玉瓉傾黄流鼓鐘朝已陳綬帯夕未休亮有佳倩賢周旋義無尤盛時難久恃人事忽相仇繁華會銷歇露草生煩憂器覆固戒滿水逝誰能収惘然覽遺墨故迹庶兹求送呉邑葉大尹考滿之京美玉抱貞徳表裏無纎塵國士久増重誰能不稱珍始自登黄甲聿充東閣賔竒文粲璚藻華譽邁時倫一朝宰呉邑眷眷為斯民天意䝉斡旋徂秋見陽春兹行報初考維時歲華新人心感離别恓然若霜晨伊昔在京國迹異心實親請告適卧痾不獲展殷勤瘳来轉行念悵望生苦辛翔鴻奮廣陸豈復傾荆榛江海𣺌萬里乾坤浩無垠不知理牧間循良今幾人大松翳髙䕃終非蓬蒿隣還當廣其惠庶使一歡欣寄侍講元玉徂冬雨寒雪霏霏遘新春昨者方雍積今者復紛紜四望千里外川途邈難分胡為咫尺天往路不能遵鴻鵠絶來影芳池無躍鱗飛潛尚有礙奚不阻行人借問張平子中懐何由申且待升陽景走馬釋悲辛送楊貳守歌賢侯楊震之子孫先世清白今尚存早年窮經入太學氣質洒洒仍温温比来蘇郡作貳守竟赴王事留都門豈無美政惠黎庶在郡數日誰憑論彼時吾亦居輦轂悤悤一識侯面目鄉民以役𨽻侯者衣食渾如在鄉曲借問何為致如此盡道賢侯善撫育衆人有事獨當前一已無尤自懐足去年歸郡屬暮秋日日宴坐銷民憂一叚清氷夜光白滿城和氣春風柔令行僅得三四月便著實效醇而優乃知人心樂向善自然感化非要求後来我亦還鄉國又見居民頌侯徳教行忠厚得古道政用疏通合常則我既聞之不勝喜可見始終無矯飭若使守令皆如侯四海人人被君澤南風初薰天正晴江竹解籜江鳥鳴三年通計涖官日駟馬復作朝天行我與儒門二三子一壺出祖臨西城来時更勉當時學莫負如今如此名嘉定族姪遇來詢其支譜書以此復之我家世出陶唐後生子有文在其手是為劉累姓始行厯夏商周徳彌久後来有為魏大夫子孫四出逰逺途至居豐沛有盛業支流蕃衍東西都一支逺出中山下十九世孫唐吏部又至七世徙河南馬監之孫位司尸金吾将軍司戸孫柱國事業昭南昆迨傳五世至趙宋始以醫學為專門其孫官轍来㳺汴名數後占祥符縣峩峩大宅雲翼橋刮骨将軍業猶擅曽孫南扈天子車一子逺從来姑蘇五孫十曽總翹特互有膴仕稱璠璵本朝太宗在潜邸我祖良醫親近侍我父院判主醫垣日覲清光侍天子爾祖徙居東海邊于今幾及八十年至爾從孫僅五代家學久矣忘其傳吴中之族盛支系南渡至我凡七世祥符之族衆且多譜牒未通心獨媿念爾與我心有同尋攷世派来相從欣然為爾舉其概緒徳世世其無窮送劉侍講宗器飬病還吴宗器與予同姓劉予學不如君學優六經一道務該貫諸子百史勞羅蒐文章霍霍吐光燄龍翔鳯舞精靈愁嗟予前道久避路相讓豈但出一頭自從入官二十載史館兩見兼同修三朝寳錄粲班馬列聖大徳光虞周于今經筵職侍講髙歩日與䕫龍㳺非惟轉擢厯清要禆補治道陳嘉猷更嘉丰儀極瀟洒珊瑚玉樹含清秋山東獨歩李承㫖海内願識韓荆州予從論交辱欵納蒹葭倚玉寧無羞自知狷介仰髙義衆口憤嫉徒啾啾慚予胸中本無物交君私幸成良謀有如富翁啟寳藏隨手贈遺皆珍投初焉眇小復何似泛泛不啻滄海漚因君引援頗有得黄河迸裂崑崙丘前年有司謬推荐飢鶻力短難脱鞲君有贈言極慰藉大匠縮手誰賡酬句工韻險造意古鑿破混沌精雕鎪至今篋笥富珠玉常覺几案森戈矛去年寒風襲君臂三月已過猶未瘳奏章陳請乞歸去同事盡欲相挽留二三元老亦自謂賢有在野猶旁搜暫容養疾遂其便肯重瓦礫遺琳球東風二月花滿樓野田處處鳴春鳩西山茶笋味正美北郭詩友情方稠吾鄉往昔最多士前輩落落如星流君歸于道復斯倡大振文氣東南陬惟君素志在匡輔况是先帝親招求遭逢恩遇豈忘報俗子誰敢増愆尤行行保愛早勿藥豈獨為我行離憂明年三月潞河上下馬一俟南来舟送汪清夫赴任蘇州郡守停君五馬車飲我白玉壺玉壺皎皎浸明月一片清光涵九區君今作守蘇州去離思茫茫隔烟樹雪山輕重繫此行故人無奈臨分處昔来挾䇿朝聖人五雲垂輝光景新龍頭一笑得才俊草木盡回天地春一朝忽遇烟塵起走馬横飛三尺水長驅虎豹赴勤王草淺沙平躍弧矢此邦土壌依京師選㧞保障經睿思為有長才備文武義膽忠肝天下知春來半月春未煖玉河氷消桞條短浩蕩江湖料峭風滿眼浮雲吹不斷明到黄堂春未闌桑麻遍野四隣懽他時倘得還鄉願醉倚華筵賦木蘭送盛醫學啟東客来乗曉發惜别意憧憧月淡官橋樹霜清野寺鐘束書還故國對酒問衰容遇有南来使雲箋好寄封次韻金文鼎見寄締交成莫逆契合日頻来去就憐髙誼迂踈媿不才鳯城寒欲雪龍劍鏽生苔偶有經旬别詩篇辱重裁送吴二尹還治復任崑山去從知帝澤深駈馳千里道撫字一生心海樹含春雨沙棠散午隂今朝送行處風外響清砧賀翰林陳檢討嗣初飬病還吴次趙宗文韻十年霄漢被朝紳優掌文衡作史臣深荷聖恩乗寵眷忽辭衰病乞間身田園舊業青山老冠盖春風白髪新見説玉堂同集處尚思先帝夢中人其二學貫詞林衆所師明時咸仰鳯来儀文章妙絶終名世日月光華早見知老去一官誠不忝歸来雙鬢巳成絲獨嗟駑鈍無成久徳業相從亦未遲賀况郡守祈雨有感九重宵旰眷蒼生親選廷臣得老成早歲果為霖雨用清時咸仰景星明不張皂盖回天意惟展丹心達聖情已向東吴施福澤聲名無媿任專城其二田疇龜坼夏将過太守深憂奈若何千里早苖思潤澤九天甘雨會滂沱至誠有感昭孚應盛徳無私載咏歌豈但農夫獲秋望昆蟲亦自受恩多送劉伯慶赴任長洲主簿清時佐邑任才賢相送都門悵别筵仇覽盛名人共惜賈生長䇿世爭傳春風自繞棠梨樹古調誰賡白雪篇我欲便懐良惠去長河須待木蘭船寄陳都憲有戒蘭臺清肅著威儀出使闗中衆所推陸贄奏章皆合道陽城公論不容私秦川萬里風烟靜麥隴三年雨露滋玉節尚風歸未得衡門何日慰栖遲感懐為英廟而作塞雁南飛又北旋上皇音問轉茫然孤臣自恨無容地强敵猶存共戴天王衍昔年知石勒謝𤣥何日破苻堅京城四塞山河固一望龍沙一涙漣送仰宗太復大理右丞致事棘寺平反與願違幾年辛苦脱朝衣故人共惜英才老聖主深憐往事非纔向雲霄承舊寵又從鄉國賦閒歸盛時何處尋蹤跡萬里滄江一釣磯送陳頎永之赴任湖州司訓頎兄亦見任湖庠訓導湖庠二妙一清門先後榮除荷主恩畫舫令兄迎阿弟白頭大母見孤孫天涯碧草春無際溪上香茗晩更繁最是塤篪和奏處道塲山色入芳尊送韓允熈赴任廣東憲副聖主中興事逺圖臺臣分職賛洪謨一杯别酒臨東郭五月官船下直沽定使風塵開百越從来人物盛三吴廟堂若建平成議繡斧行宣入帝都送僧道金還姑蘇定惠寺野鶴孤雲去復還超然不在别離間天河入海傾南斗海月當秋挂北山萬里江湖蘆葉穩一簾風雨桂花閒送師憶得尋師處雙塔南頭第幾闗壽刑部俞尚書士朝十二韻天輔皇明岳降神嵗臨丁夘實申生丕承徳緒超榮祿寅亮天工運大鈞每用輕刑延國脈堅将直道濟時屯黄金暮夜殊無媿白首春秋夐絶倫法府光騰三印重勲階香綻五花新致君堯舜心惟切敷治臯䕫徳有隣兹喜新秋逢誕日仰瞻浮翳散髙旻上林佳氣通西省南極諸星拱北辰畫箑引風銷宿暑玉缸和露醖長春秦中不媿金絲棗吴下虚傳翠縷蓴雲漢昭回曽雨穀海波清淺又生塵他年頓整乾坤了好與松喬作主人與盧中書過虎丘昔人来此寄㳺蹤名字髙題紫翠中刼火蒼苔磨滅盡相看還與不題同寄趙宗文解得禪家性外真不将吟思惱閒身殷勤好禮蓮花漏莫問攅眉出社人雨中與陳孟文投宿覺海寺菴臺殿參差映碧池我来留宿本無期題詩欲紀經行處斜日千山雨到時送劉主事欽謨赴任南京秋入梧桐雨過初黄金臺下送行車西風滿眼傷離早北事闗心老病餘賈誼道孤終是逺張衡愁絶竟何如今朝暫向南都去他日重来挽帝裾送周景通還姑蘇塞雁盡南飛西風及授衣不愁孤客老惟喜上皇歸雪恥心猶壯還鄉夢獨稀怱怱一杯酒何必嘆相違過沈石田有竹居次徐天全韻劉珏烟水㣲茫外舟行一舎餘既覓沈東老還尋陶隱居氷弦三叠弄雪絸八分書醉和陽春曲空踈媿不如送吴匏菴會試秋闈名已動鄉閭得意重驅北上車辭父暫抛萊子服致君今用伏生書香飄玉陛傳臚䖏露溼金花錫宴餘老我閒居憶知己好音頻寄莫教疎送徐天全再赴張湫手足胼胝兩鬢秋功成深慰至尊憂竒文五色駈妖鰐砥柱千年障横流載月仙槎纔北上冒寒驄馬復南㳺垂名竹帛中丞志不在分封萬户侯其二天語新承寵任專御爐烟裏玉階前鹽梅自昔堪調鼎舟楫于今已濟川麟閣曉雲隨綵筆鎬京春酒醉璚筵贈行分得烏絲錦江漢皇華冩數篇賀俞士悦司寇致仕白玉階前拜上皇賜歸爭賀沐恩光尚書已結香山社丞相新開綠野堂物外烟霞容我老陌頭車馬為誰忙緣知蔗境春如海日日邀賔入醉鄉送太保陳有戒致仕分陜功成兩鬢斑便陳骸骨動龍顔仲翁賸有黄金贈廣徳寧無駟馬還翠柏十圍霜後老白雲一片雨餘間懸知别後勞清夢只在蓬萊咫尺間逰呉山寳華寺和錢學士原博韻錦繡河山似十洲重陽未到已先逰向平老去偏多興杜牧重來不厭秋行處却憐雲作伴别時還愛雨相留呼童摘取芭蕉葉冩得新詩贈惠休和錢學士原博宴朱玉雪池亭韻水榭風亭列綺筵白頭相見各歡然地偏似與三山近人樂無如五福全檀板来歌按竹下黄橙薦酒擘霜前蠻牋醉掃三千字渇驥爭奔磵底泉楓橋送憲副劉欽謨闌干三百與雲齊勢壓江橋䖏處低朱雀飛来山雨外彩虹垂在水城西孤舟夜火詩人泊華表春風貴客題此地逢君乗駟馬只疑平歩上天梯送姚郡侯更任鎮江從容旌盖出黄堂今日諸侯舊省郎纔向呉門作霖雨又從京口布春陽袖歸白璧渾無玷移作寒梅不改香我過甕城須下馬坐聴田叟咏甘棠贈夏太常仲昭乞得天恩下九闗容臺爭似釣臺閒白雲不作人間雨黄鶴惟思海上山欹枕北窗風澹澹濯纓西澗水潺潺大江南去三千里幾䖏林泉有客還寄林郡侯一鶚烏府當年拜美官朝朝整豸立朝端青霄露滴朱衣濕白日霜飛鐵面寒折檻尚為明主重諫章不與别人看丈夫憂樂闗天下出守先令一郡安其二春風吹雨過江沙京口吴門路不賖燕寝有香分别院馬蹄無跡到豪家心常戀闕偏多夢鬢為憂民却易華銷盡俸金都奉母一經教子是生涯紫薇精舎為陸大參孟昭賦度水穿林不惮賖為鄰龍耳在烟霞數株枯柏郎官淚千古清風宰相家石壁掃苔看舊刻竹爐炊火薦新茶知君戀闕心猶切夜夜山中夢翠華送杜公序西秦修志聖主垂衣重典章逺勞修志向咸陽文風到䖏皆鄒魯事跡収来盡漢唐銀燭課書雲作紙玉函封進錦為囊懸知太史編摩日才贍惟應説杜郎送張養正起修日錄祖席華觴莫漫傳至尊當宁正思賢周家孝友稱張仲漢室文章重馬遷紫塞地寒知雪徧玉堂天近得春先懸知一代書成後聖徳神功播萬年送况郡侯先皇擇守在廷臣惟我賢侯第一人近向堯天分寵命逺来吴地布陽春疲民得濟官租減枮骼沾恩義冢新今日城西回五馬笑看父老挽朱輪其二兩鬢秋霜一寸丹循良蜚譽滿朝端化教薄俗為君子荐及寒儒作美官亷范来時歌尚在寇恂借去日應難履聲又入明光殿補衮殷勤佐治安送馬進士之穿山五典三墳滿案堆君才不讓吕東萊池邊夜月蘭舟泊花裏春風絳帳開已見陳蕃待徐孺還期孔子鑄顔回多情最是穿山色飛入離筵送别杯送楊郡侯豈弟多年著徳音分符重沐聖恩深陽春有脚来兹郡暮夜無金愧此心風雨一麾勞勸課桑麻千里動歌吟如何便促朱輪去又作他方濟旱霖送陳編修緝熈孝行亷名是䖏聞公門無跡藁無文陳情兩度能終制泣血三年不茹葷天上星辰丹鳯闕江南烟雨白鷗羣官船一路行休緩秘閣諸儒待子雲贈甘大尹𢎞濟君手宜調鼎鼐和暫煩花縣教絃歌疲民盡怨来蘇晩當路曽嫌直道多霜冷玉關皆墮葉月明珠浦不揚波紫泥早晩君應捧思慕其如去後何送仰大理還吴棘寺重登荷聖明賜歸深愜暮年情身如泛梗誰非客官得懸車始是榮醉裏鶯花三畆宅夢中霄漢九重城懸知報國心常在夜夜教兒對短檠答陳醒菴姓名誰為達金鑾老去文章盡學韓海上魚多長作客城西田在不思官音書曉托三湘雁香佩秋紉九畹蘭昨日壺觴論契濶菊花叢裏得盤桓其二玉堂仙去白雲鄉更喜風流得仲将紫玉製簫吹别調黄金換酒滌愁腸百年天地雙青眼十畆園林一舊莊記得去年同看竹水雲深䖏叩僧房其三畫舫頻過桞外莊南溪原得近東陽風来絶磵氷無迹月到空山樹有光愁裏得詩如老杜醉中揮墨過顛張别来兩月無清約孤負寒梅一度香贈黎郡博芝草蘭花滿座香好詩無愧刻青琅燈前教子抄長䇿馬上逢人問故鄉劍氣夜横低北斗詞源春漲倒瞿塘明年諸弟多髙選細看泥金字幾行再夀沈絸菴八十遐齡又六期我慚初度獨来遲玉桃只許東方得紫氣還容令尹知洞裏樓臺千歳藥人間甲子一枰棋多情欲醸滄溟水忝入年年獻壽巵寄沈同齋藥蘭花徑斷紅塵坐閲昇平五十春絸紙有書皆晉體錦囊無句不唐人新圖冩就多酬客美酒沽来只奉親昨夜天涯憶君夢西風吹過楚江濵酬杜東原見寄杜郎髙義薄雲天慚我交来最有緣花徑藥闌三畆宅筆牀茶竈五湖船寫山不讓王摩詰釋難曽輕魯仲連昨日開緘見珠玉老年才思益飄然送沈石田逰金陵丈夫安得守茒茨西上金陵看絶竒為報鳯皇臺上月有人来和謫仙詩同天全宴夏太常仲昭第次韻六首席上歡呼總貴郎早春時節醉江鄉要知勝事傳千載元老題詩贈奉常梅花白白桞條新描出江南一片春莫向東風惜沉醉與君俱是故鄉人潮陽太守青雲器鳯閣仙郎白雪歌銀燭瑶觴鬱金酒好情其奈主人何寳馬香車看物華春城無䖏不開花旁人莫笑躭㳺樂四海于今是一家風流白傅老詩仙製得新詞教李娟翠袖送香来綺席玉杯邀月上青天甲第如雲枕碧流到門時復有王侯花闌竹徑清如洗我亦踈狂五日㳺祝大叅侗軒祖席詩酒前㕔未盡情更移瑶席向園亭最憐一樹垂楊桞眼為行人特地青寄葉與中一從銜命出金鑾玉塞迢遥再拜難惟有長安舊時月幾将幽夢到桑乾赤城西去到雲州禾黍髙低萬里秋聞説盧龍皆竄伏禁中頗牧在邊頭送尤文度歸呉中我友整遐装誓将起旋歸平明發城邑率彼東路肥爰與二三子祖餞臨郊岐中觴趣分袂恨恨使我悲嚶鳴求其友竊慕伐木詩平生携手好何為輕别離行當阻山岫安得覩光儀情敦思苦深久要諒不遺各言崇令徳庶保黄髪期同蔡騏尚逺尤安禮文度朱智仲禮楊翥仲舉蔡胄用嚴逰東山得剪字歩出城東門逍遥望雲巘累月懐佳逰兹晨遂登踐梵宇繞層阿飛樓凌絶峴方塘涵湛碧喬林茂敷衍繁翳幽莫通丰茸紛不剪攀磴窮髙躋緣徑屢回轉是時微雨散輕霞淡舒巻睇遥素横川俯夷綠盈畎陟降體自便顧盼心已緬况接曠士言復偶釋子辯析空理勿昧違喧抱逾展何當此間棲永令浮慮遣寄尤文度苦憶尤參議投簮飬病勞卑棲搃不厭閒散自能髙階䕃淵明栁門深仲蔚蒿平生氷雪意猶足重吾曺又寄三年别帝京歸卧閶闔城貧病疎朋友艱難倚弟兄香焚瓦鼎細寒擁紙屏清自有床頭易時時暢道情約蔡尚逺朱存理蔡用嚴尤文度楊仲舉逰東山東山東望屹如帷久待穿雲躋翠㣲五色烟霞浮寳塔千行松竹䕶禪扉春来况復芳菲盛客裏堪嗟會晤稀為報明朝着雙屐及時清賞莫相違送尤文度赴貴州叅議兼寄武昌故人三十年前江漢上清風瀟洒共襟期折蘭閒咏離騷賦看竹頻過孝感祠已幸兩京重論舊何堪萬里又分岐故人相遇應相問為道非才負聖時送尤安禮集詩歌君子之馬送友也友人歸呉而麗澤之益将日疏逺焉故集詩句以道其情君子之馬六轡如絲言念君子如璋如圭其徳不爽敬慎威儀君子之馬六轡沃若言念君子如金如玉其徳不回威儀抑抑豈無他人不如友生邂逅相遇徳音不忘惠而好我示我周行言笑宴宴惟予與汝汝轉棄予誰與獨處中心飬飬往送于野與子成説方何為期既曰歸止曷云能来子寧不来悠悠我思送尤先輩歸呉門巷蕭條過者稀諸孫憔悴日牽衣豈無幕下三千客又送吴中一棹歸漢樹臨風寒自落江雲帯雪晩猶飛由来去邑懐桑梓不是還山戀采薇呉都文粹續集巻五十
