body:
  text: 呉都文粹續集巻四十一明錢榖撰墳墓明故資善大夫禮部尚書兼翰林院學士掌詹事府事加贈太子太保諡文定呉公墓志銘李東陽公姓呉氏諱寛字原博學者稱為匏菴先生蘇之長洲人祖諱壽宗贈嘉議大夫禮部侍郎考諱孟融累贈亦如之公在成化𢎞治間為翰林院修撰遷右春坊右諭徳左春坊左庶子兼侍讀進詹事府少詹事兼侍讀學士出為吏部右侍郎轉左侍兼學士入内閣典誥敕掌詹事府事終禮部尚書兼職如故生宣徳乙卯十二月丙寅卒於𢎞治甲子七月戊戌壽七十配陳氏累贈淑人貳室陳氏生二子奭奐以明年乙丑十一月丙申𦵏于呉縣花園山新阡之原公早學晩達雖有竒遇殊寵而弗究于用天下有遺望焉烏乎慟哉盖公年十二而為府學生十八而應試三十四而舉於鄉三十八而登進士在官三十三年其得科第也始試久不售已絶意進取提學陳御史士賢見其文竒之敦勸就試為京闈書魁試禮部名第一殿試之日魁選未定憲廟已出御便殿趣讀巻衆亟擬以省元巻上既賜及第時論翕然其校士則辛丑甲辰為同考丁未壬戌為主考皆在禮部得人為多而壬戌所取為庶吉士者即奉詔受之業讀巻例用尚書已未之試公獨以侍郎預其講讀侍從則今上在東宫時為講讀官御極初敕充經筵講官最後乃直日講而今皇太子講讀又以宫僚長日預侍焉其史事則修憲廟實録兼校正修大明㑹典充副縂裁比修厯代通鑑纂要亦如之凡此皆翰林職任自部曹復入領者前所鮮見其居喪則在修撰時以父病乞歸省年不應例特予告遂終制及以侍郎丁繼母憂員載缺吏部仍擬公名服未闋數月朝廷為虚位待之尤仕途所未有其寵遇之典則以三品賜鶴袍犀帶詔㫖稱卿春秋丁遣祭先師孔子御殿傳制皆用内閣禮以疾告則命醫診視遣中官存問賜酒肉疏米諸物訃聞則命有司治𦵏如例而加祭二壇賜鏹楮萬緡為賻驛給舟車遣官䕶送超贈太子太保皆出常格若賜諡文定則本朝自南陽公之外一人而已其長子奭以三品㤙已䕃為國子生比以舊學㤙當官其少子奐特命奭為中書舍人而以奐補國學盖上欲大用公而年已不逮故其既沒尤為之眷注周悉如此云公識趣髙雅行履端潔孝友天至遇族里有㤙其居官㢘慎律物以權勢所在未嘗寧處既復就清簡雖優詔累留而引退不寘惟於學充然自得所為文醇古有法詩得唐格書酷似蘇體辭命在朝廷紀載在史局碑版翰墨遍於天下執此亦可以不朽矣奭奉禮部左侍郎李公世賢狀請予銘乃哭而為之銘銘曰維世有望間不容偽上有廷論下則輿議逺且賤者無間奴𨽻彼懵無知孰強而致其所自致匪爵齒位矧其兼之功詎云易官居六卿孰謂非貴年登七旬夀亦云至惟三不朽公亦有二有徳有言功則未既尚有餘地我銘呉公以俟来世文定公墓表王鏊𢎞治乙丑冬十一月丙申𦵏我文定公於呉之花園山友人王鏊刻其隧首之碑曰烏乎公其至是耶當宁之所倚海内之所望斯文之所屬其遂虚耶烏乎公諱寛字原博世為蘇之長洲人祖諱夀宗考諱孟融皆贈吏部右侍郎公生有異質未冠入郡庠輩流方務舉業公獨博覧羣籍為古文辭下筆有老成風格屢試應天不第以歳資貢入太學東海張汝弼見之曰天下亦有如此貢士也哉江隂卞郎中華伯以詩自負有低頭拜東野之句武功伯徐公髙邁少可而折節與交曰館閣器也公以屢舉不利絶意仕進不肯復應舉天台陳公士賢時御史董學政於南畿以禮敦遣公不得已入試名在第三時猶謂之屈壬辰㑹試第一入試大廷又第一授翰林修撰旋被選侍先皇帝於東宫九年進太子右諭徳先帝即位以舊學進春坊左庶子預修憲宗實録成進詹事府少詹事兼侍讀學士出為吏部右侍郎久之轉左尋以吏部侍郎兼翰林院學士入内閣専掌制誥仍侍今上於東宫充㑹典副縂裁㑹典成進禮部尚書兼學士修厯代通鑑纂要仍充副縂裁公素有古學及入翰林凡有所作輒傳播中外位益髙望益重天下稱為匏菴先生而不敢字每東宫進講閒雅詳明意存諷諫至理亂邪正之際未嘗不反復為上誦之今上或少間公率僚屬上疏曰竊惟東宫講學有寒暑風雨朔望令節外一歳之中不過數月一日之内不過數刻况其間又多間人生八嵗出就外傅居宿於外誠欲離近習親正人也庶民且然况有天下者乎借曰習讀於内終不若出就外傅親近儒臣講明治道尤多得焉建議者謂元儒呉澄出處不正不冝從祀孔子詔廷議之公言從祀亦觀其有益於經傳不耳苟有禆於經傳則揚雄馬融昔皆不廢今獨得廢澄也太皇太后將祔廟詔議其禮公曰昔周祀后稷姜嫄祭於别廟詩謂之閟宮魯桓公之母仲子不得祔廟春秋書考仲子之宫至宋始有兩后並祔之説然豈後世所冝法哉竟如公議公年甫七十數引疾求退屢詔懇留至有學行聞望輿論攸歸方切委任無為固辭之語公乃不敢復請載閱月卒𢎞治甲子七月十日也訃聞先帝震悼命有司治𦵏諭祭者四給驛舟遣官䕶還特贈太子太保長子奭授中書舍人次子奐補國學生皆異數云公好古力學至老不倦於權勢榮利則退避如畏然在翰林時於所居之東治園亭雜蒔花木退朝執一巻日哦其中每良辰佳節為具召客分題聫句為樂若不知有官者被選宫僚人或賀之公蹙然曰我何以當此任哉我何以堪此勞哉及詔選日講尤衆所榮而公辭之至再至三當道見其誠不強也及管制誥久衆望公柄用而邅回不進意公亦不能無少望公曰吾初望不及此吾處此甚冝之甚安之衆意為之冰釋及吏部尚書位缺中外皆屬公公又辭之甚堅人曰今世亦有不肯為天官冢宰者乎公端清淵穆不溷溷為同不嶢嶢為異士無賢愚皆靡然歸心公亦保合兼容不見畛域平生不聞有毁譽之言亦不見其喜愠之色其古所謂大雅之君子乎公為文不事追琢獨嚴體裁緼藉簡淡理致悠長為詩用事渾然天成不見痕跡沉著髙壯一洗近世纖新之習為書姿潤中時出竒崛雖規模於蘇而多所自得雅善裁鑒法書名畫一經品定衆莫能易烏乎公由侍從致位八座啟沃宻勿三十餘年其聲望隆矣爵位崇矣朝廷㤙數不為不加矣年至七十不為不壽矣而逺近齎咨若猶未滿非以其未嘗一日秉鈞當路以行其所學邪夫公之所立自足以不朽雖位卑無年未為不貴且夀也况其兼得之邪學之行不行盖有命焉其人奚歉乎予與公生同鄉仕同朝相知最深且久故以是表諸墓哀而不怨亦公之志也祭呉文定公文王鏊我生雖晩從公則舊科第官階交手授受公為之前我躡其後乙未之春朝班間簉玉署相隨金匱更紬乙亥還南㷀焉在疚公来視之具區之藪至今湖山傑句増秀壬寅至京夙願忻副各事園亭對開户牖雪月之宵花栁之書有倡斯和有集斯湊詩筒酒籌間道互走有出必偕並鑣聫裒陵道馳驅郊壇宿留最後同直文華邃宥經幄敷陳公左予右迹以事同分隨年厚叔度之陂公瑾之酎莫知髙深實忘固陋晩有弱息許奉箕帚通家往還不間子婦人事好乖我馬東首送我於郊欲别且復我言北来㑹合斯又稍聞㣲疴引年屢奏手札頻承墨色如黝宜夀而臧事乃大謬鄉亡典型國喪耆耉如公徳器天何不佑胡不三事胡不遐夀我登公堂不我云覯不與我言有襜斯匶平生此别情曷云究公其聞乎薄薦觴豆呉文定公寛墓在花園山明故中順大夫温州府知府文公墓志銘楊循吉𢎞治丁巳冬十一月上起南京太僕寺寺丞文公於家以為温州府知府公抵廟堂書力辭不果從遂以單車赴任至之日首釋繋徒千人民大悅既而以法約豪強咸遵於令設施詳明恵洽黎庶尊禮耆徳風以丕厚盖一年而政化茂行竟用已未六月乙未卒於官年五十有五凡遺所著文章縂三十巻别為奏議三巻琅邪漫抄一巻烏乎偉哉公諱林字宗儒其先衡山人相傳以為宋丞相信公之族髙祖俊卿元末鎮逺大將軍湖廣管庫都元帥佩金虎符鎮武昌曾從祖定逺從髙皇帝平偽漢賜名天龍功授徐州衛左所副千户曽祖定􅀈從其兄兵中署散騎舍人始徙浙而祖恵遂居長洲不仕父洪易州淶水教諭贈太僕寺丞母陳氏贈安人繼母顧氏吕氏吕以詔㤙封太安人公舉成化壬辰進士宫保尹公典銓除令數人獨以公為永嘉曰此我所知能治繁者也公其時英敏精悍尤銳於治每聴政必闢門從人之入觀環前後無禁剖決神異輒傳為故事有王堅者事李中監為暴於境上率不能制公設䇿捕而斃之獄衆稱快者數郡名遂籍籍他所為鯁卓皆類是於是旌為浙令第一而知者咸期以大用父喪解職起復知博平邑小無事惟以勸農誨士為業人甚宜之而抗捍權要猶向風益勵不貶鑿渠建學雖居弗久亦具有勞可書乙已以績召還朝衆咸擬公必為御史當磊落有所為或曰斯人在小官尚剛訐如是矧列之臺端乎竟補南京太僕寺寺丞太僕政久弛弗振部内史皆驕不奉法公為奏按其罪者數人遂著為令得提問官吏其後又以留都教塲將官不當換官馬又不送烙凡劾大小把縂等四十餘人皆抵罪而詞有所連不少借弊為之清公盡心馬事深究其法以必欲報國自効為已任曰吾言幸叨聴其可有見而弗獻遂調叙古今事冝論畜牧之計上馬䇿三篇冀其道行初兵部尚書馬公嘗延公問邊畧公辭以未習因請論馬遂以謨重至是疏下即議其便者檄公行之㑹公尋已移疾歸歸凡六年不起而温人以其永嘉之政思得公甚故朝廷以為守其民喜若獲父母窮山谷皆提攜出迎惟恐後而不得見温多訟多盜俗尚鬼好溺女悉為科條處分莫不備善郡獄屢空境之暴無一敢肆民生女皆育而前後所毁淫祠殆盡又作俗範訓其民而導以化本温用是清謐禾生駢穂其在郡凡連上七疏皆賦役章程不可已之事中一疏以災異自劾求退而論鎮守剝民尤切百姓益敬事公無敢欺而公思歸日甚將圖潜逸人輒知之閉其城不得行乃留視事以迄於歿然而禱疾哭喪温之人亦於公無廢禮焉公博通當世之故遇事敢言以獻替為心上初即位大延讜論公適朝京師遂進聖政十事畢論所學皆本諸經術立義醇正得匡益之美其在博平又論邑内徳府賜田子粒事謂官校徴収不便極陳利病乞付有司自具以納既上或旁懼嚙指疑事叵料公不恤卒從所請其民歌焉公嘗曰為吏而無建明其何以職盖其素存忠愛固天性然也公為人雅喜交游其於官無所不可為而尤事持㢘臨終或請所囑大言曰我男子死即死再復何言人謂公諤諤不撓至歿猶壯兹可欽憚云公配祁氏先卒贈安人後配呉氏封安人而仲弟森以進士令鄆城且顯於時子男三人奎壁俱縣學生次室尚幼孫男三人孫女三人奎等卜以卒之年十二月丙申𦵏呉縣梅灣之原乃以狀来俾銘以志銘曰烈烈文公信國是承克肖剛大厥氣孔盈包絡洙泗知權守經忠戅自許允惟邦楨公才既優仍篤政理連宰二邑咸肅風紀司民之牧衡秉繩履庸靖乃人納于仁軌帝寵休嘉式還之朝俾職廏圉大閱于郊以威四夷國武光昭司馬曰賢拜疏以薦舍旃来歸處晦用晏山有考槃道在居息温人謳思僉冀公出天子有命往恢故績徳風載揚爰徴治實赫焉方隆胡殞之亟有墓於梅来旐翩翩既耕有田惟靈其旋何以世之垂光永延銘刻兹石用質幽𤣥文温州林墓在梅灣明故劉文學墓志銘楊循吉劉君諱嘉䋭字恊中呉之名士也考諱昌為世大儒著書甚富位廣東左㕘政祖考諱敬封虞衡主事祖妣計氏封安人皆年八十餘終即我外大父母是已善隆厚徳茂異生焉舅氏始苦無子在河南禱而得君母李氏君靈質天稟風儀如玉年數嵗據小几習書儼然成文又選古詩摹其格律皆有妙悟舅平生積書充棟歿時君纔十五嵗學彌篤為文衮衮千百言不竭詩亦思致清逺雋味有餘嘗著弔范墓文意甚髙古而用字艱竒讀者或棘喙不能通及和予逰山詩平妥豐潤又深極𤣥暢之致往嵗予北上操舟百里送予抵無錫酌恵山泉始别不惟親親之厚而名言清勝猶如昨日也予之歸田思得朝夕之士與遊於君指實先屈既而竟蹈長暝違我素心春秋止於二十有四嗟乎痛哉君善書結體妍美最得法予獲君書未嘗不諦觀寳愛嘗書詩二篇寄予不及全為促至歿後檢之尤為予所篤嗜一旦逸去不覺跣足起覓竟忘之念至必惋嘆不樂君為人温厚靜黙對長者無一剰語居家庭孝慈肫篤而性氣超邁髙寄物表不屑羈縶雖士服庠序實淡然有山林情焉配顧氏郡守顧公徳明之女少恭公崇善之妺家亦三世進士子男一人貞方六嵗女一人燭光卜以𢎞治九年十月乙酉𦵏仰天山之原所與游者祝希哲都𤣥敬文徴明唐子畏皆竒士子畏又編其集為之碣文云銘曰呉嶽孔秀斯稟則茂嗟殞之驟雖不年而夀劉嘉䋭乃㕘政昌之子墓在仰天山明故通議大夫都察院右副都御史徐公墓志銘王鏊正徳已亥正月二十九日都察院右副都御史徐公卒於家訃聞上命有司治𦵏事丁丑三月某日𦵏於堯峯山之先塋友人大學士王某刻其碑曰公諱源字仲山世家呉長洲君山之𤓰涇祖孝質贈通議大夫都察院右副都御史考諒初封工部都水主事贈武選郎中加贈通議大夫都察院右副都御史公少則好學工文有名呉下成化乙酉占南畿鄉薦乙未登進士第授工部都水主事理徂徕等處泉源改兵部武庫司主事厯職方員外郎武選郎中廣東布政司左㕘政浙江右布政湖廣左布政都察院右副都御史巡撫山東初武選最號劇司公至洗心自誓一意奉公權貴請囑戒門者一切不通而籍其姓名若將行罰者囑賄遂絶時天下武功爵幾二十萬坐耗天下絶嗣者以疎逺襲公奏宗派許襲旁支者一切罷之大革冗濫舊例以罪亡者落職公謂罪有輕重以笞杖而革其職不已甚乎人又樂其寛大司馬馬公甚委重之廣東勦雲貴猺獞公督粮水陸並進觸瘴癘深入師以克濟山東嵗饑公與刑部何侍郎分行賑濟割臨清倉米八萬有竒以補嵗漕之數明年徴償公奏民頼拯給稍蘇而又遽征之何殊弗給詔免與民涇王就封於沂以水涸將由陸之國民為騷動公檄所司姑緩之亟發卒浚河水旋至坦然之國公私無擾公凡三莅塲屋浙藩拆巻多儒士御史意欲有所前却公曰科塲所取者文即通牓儒士何傷山東歛銀將以鹿鳴宴贐士公曰方筮仕而示以利非為政之體乃已嘗代祀岳鎮東海齋之夕應時㴻雨闕里文廟成有白金文綺之賜累疏乞致仕詔馳驛以歸公温粹寛仁人稱長者而臨事執守堅定雖當官涖政未嘗一日去書不觀文章博雅尤喜為詩力去近世尖新之習書有米家父子風配朱氏封安人加贈淑人子男三栥例授蘇州衛指揮同知先卒棠國子生㰍郡庠生女三孫男三勲烈熊曽孫一予與公交四十餘年公弟南昌府經厯澄狀公行来請銘銘曰端粹温文以富厥有施于有政亦既克守毁或求全非我所取銘于山阿噫奈公何都御史徐源墓在堯峯山亞中大夫雲南按察司副使賀公墓志銘王鏊雲南按察司副使賀公諱元忠字澤民其先自宋南渡来家呉包山之陽曽祖孟安祖文昌世有隠徳考㢘以易學魁應天解試厯官鎮江學訓福建按察知事以剛直不能隨時告歸授徒呉中今呉中易學最盛其淵源盖有自云公得家學之秘成化辛酉占解試髙等壬辰登進士授行人司行人擢江西道監察御史巡視漕河河道為通出按廣西風裁凛然剔奸振滯黜汚崇良名聲大振當道者多才之而亦有不悅者乃除河南按察司僉事以憂去改僉雲南按察司撫夷勦寇茂著勲績鎮守黔國公巡撫巡按僉舉公資望不當尚滯卑官遂進按察副使兵備金齒騰衝時木邦孟養舉兵相攻累嵗不解公躬冒嵐瘴諭以威徳事且就緒而固以病乞歸矣帳下千人以金贐不受夷人為作却金亭以旌其㢘云公歸林下凡二十四年嵗乙丑詔進亞中大夫正徳丙子八月十日以疾卒春秋七十有一其年十二月廿有六日𦵏山之西隖配鄒恭人祔子男六泰以進士厯官御史直言被謫叙遷南京刑部郎晉郡庠生艮漸巽孚孫男二安節安世公為人操執堅定面目嚴冷在道時獨持憲紀輩類御史抑首娖娖不敢出一語親舊或有囑則厲聲曰吾知有國法不知有他他日有言言事當有跡則又厲聲曰御史以風聞言事必竢發而後舉則焉用御史為家居久矣雖子弟不敢媟見泰以御史按閩中還侍立左右惴惴如也近世仕者多崇宅地廣田園以侈相髙公少能以其家富迄老所居狭隘卑陋終不肯覆一瓦增一㕓曰無為子孫累也冠服敝舊飲饌薄能甘之雖宴享賔客亦不肯隨俗奢靡值妓樂必望望然去之出入坐一小航人不知其嘗有官也烏乎其可謂篤於自信不為流俗所變者耶銘曰去官逾逺侈日滋滔滔末俗止者誰嗟允夫子矜獨持毅然不惑行不隨後有考者在扵斯賀元忠副使墓在西洞庭山明故嘉議大夫都察院右副都御史巡撫山東沈公墓志銘王鏊公諱林字村美沈氏世為蘇之長洲人曾大父謐大父洪考傑封奉直大夫晉州知州母張氏封宜人公少好學成化甲午占應天鄉試辛丑進士第時方重内輕外或謂公有倖門可得内除公不從出知晉州州人惰而窳公教之樹藝教之積蓄修城垣興學校民間利害以次罷行州之人皆欣然曰小沈吾父母也時年未三十故云𢎞治乙酉進南京刑部員外郎中出知四川順慶府始至庭㕘鎮守鎮守驕蹇不為禮公一拜而起鎮守怒曰一拜禮乎公曰若不以禮自處安能以禮責人不顧而出巡行二州八邑之間覧觀風土詢求民瘼俗喜告訐株聫蔓引動至百人公一見立決無所牽引人甚便之郡學湫隘文廟列堂之右撤而遷之建御書樓增置黌舍齋廬庖庫祭器又増樂舞生教以聲容舞蹈之節暇則親臨程試講解懇懇無倦士子皆奮文獻遂為諸郡甲郡故無城郭乃鑿西山之石仞溝洫物土方度髙卑厚薄俄遷雲南㕘政後守成之及蜀㓂藍廖輩倡亂所過殘破屢至順慶不能入逺近来依保障民益思之至雲南交人忽耀兵境上逺近恇攘公曰吾在此無恐吾請以身當之已而訖無事正徳丁夘入賀聖節時逆瑾盜政内外官守罔不㕘謁公固不往瑾嗛之銓曹屢上公政不報最後擬山西布政命甫下瑾已遣邏卒詗公公行遇之途抗手而過至摭拾無所得獨以沿途乗傳白瑾有石文義者適在旁曰沈良吏也文義盖未嘗識公而聞公名瑾為免逮繫下巡按御史問狀家人懼禍不測規以賄免御史亦故緩其獄使得為計公曰無庸隳官祿與隳名節孰重竟落職為民罰米輸大同又輸沿邊傭直怡然以歸逆瑾伏誅言者奏起公為廣西左布政司單車就道一如雲南之治近世有所謂公堂錢者多出賦稅之羨名曰公堂盡歸私箧雖號良有司亦然公一無所染凡修葺廨宇立坊牌則取之以其餘鎔範琖斚之屬為公府宴享用時巡撫交章剡薦遂進都察院右副都御史巡撫貴州兼理軍務時鎮筸銅仁烏羅等苗屢出刦掠為患前撫臣率以化外羈縻不究切之公曰是不一揃刈則滋蔓蔓難圖也率勵將士為深入計預給旗牌招徕安輯諸砦皆歸附天生厓囤恃險攻之藺石毒矢交下人莫敢向邇公調兵先絶其餉道賊已困火鎗飛礟繼之賊大窘奔竄俘其衆千餘牛羊器械無算陳家猛溪九十七砦相率来歸給以流官悉𨽻貴前二衛庶革土官貪殘積弊自是内境晏然初藍廖二㓂横行蜀中數年朝廷大發兵翦之公懼奔迸隣境為患分兵守諸要害蜀寇平蕩有犄角之助焉癸酉聞宣宜公訃乞歸守制朝廷遣官諭祭比服闋詔起巡撫山東公在貴用兵勞勩成疾繼以哀毁在途病加劇遂固乞致仕詔命馳驛以歸歸四年辛已十月四日卒春秋六十有九嘉靖元年九月十八日𦵏呉江羅字圩之新阡公娶計氏封宜人子男二知剛知柔皆國子生女二適引禮舍人史相國子生張秉仁孫男四大謨大諄大雅大中大謨䕃國子生孫女二公生而端靜在衆中嘿然若不能言而㮚然穆然之色人望而知其為君子也筮仕之初呉文定公亟稱為處士之秀今少師楊公每言昔在太學為同舎生見公終日手一巻諸生喧鬨其旁若罔聞也順慶之治有遺愛於蜀蜀人至今思之不忘初順慶民相率立公生祠憲副楊錦至郡以書来曰公何修而得此扵蜀人盧御史師召行縣父老請公祠在學宫出入為艱請遷近便許之他日復至則已奭然輪奐盧訝其成之速知其得民之深也題詩歎息而去及家居焚香端坐不以事經心事二親依依不忍去左右雖燕處未嘗敢南向坐初歸自蜀弟麓已别居公亟過之出涕曰吾寡兄弟忍分異耶待族屬鄉黨皆有㤙義烏乎其可謂篤行君子矣銘曰聖貴訥言曰焉用佞嗇夫捷給君子攸病萬石一家醇謹篤行恂恂沈公實維似之于晉于蜀所至則治政聲發聞既去而思苗夷獷頑分北荒服自昔相沿簡節疎目公不謂然孰非王土躬率偏師深入其阻林蠻洞蜒無敢違者昔所未有公行不疑仁者之勇乃見於斯公功既成公力斯憊齊魯翹懸不尚有愒勒石山厓爰告来祀沈都憲林墓舊在吳江羅字圩今遷於長洲縣赧墩附封君庸菴墓旁知永年縣致仕尤君墓碣王鏊孟子曰人有不為也而後可以有為予觀公厚平居恂恂非禮勿踐呐呐然言不出諸口至其居官所至有聲年未老一旦毅然去之世所謂勇者或未能焉烏乎可不謂賢乎予以是知孟子之言不誣也君諱淳公厚字尤之先自汴扈宋来家於蘇三傳為良器仕宋提刑司㸃檢曾祖諱義皇湖廣布政司經厯祖安禮貴州布政司左㕘政考忠君以景泰癸酉占南畿鄉試會試名在乙榜授浙江之平陽縣學教諭以憂去改任濟之沾化考最擢知廣信之鉛山又以憂去改知廣平之永年在平陽以身為教隆冬盛暑冠服坐堂上召諸生講授親為筆削經義夜則巡行各舍聞書聲或見燈燭光則召加奬勞惰者斥之於是諸生奮勵人才輩興平陽法食浙鹽而民資閩鹽以生不禁則戾法禁之則生亂君於是濶畧苛峻視鹽多寡令輸粟扵官為凶歳備又請漕他郡粟以實倉庾於是官儲充民用足嵗旱出禱三日雨合縣霑足而隣境旱如故民歌謡之永年民無宿偫值水旱輒攜妻子去其鄉所遺田稅則里人代輸故去住俱困君榜招歸之約蠲其力役若干嚴禁吏胥不得侵牟流者復歸不歸者計其田分𨽻土著民兩便之年五十有七慨然曰吾其歸哉遂移病不治事當道不許再疏於朝乃得可歸吳闔門自守居守者莫或睹其面年七十有八得疾則却藥不御盥櫛賦詩而逝實𢎞治乙未七月朔日也以庚申正月某日葬呉縣薦福山之原配鄭氏子男四榕樸樾楠樾鄉貢進士孫八人君色温氣莊不為矯詐巉絶之行取予進退之際尤不茍雖致政歸猶為學者指授經義婚喪冠祭必依古昔烏乎其可謂篤行君子矣乎而世莫之知也子少辱公知且知公為深故為碣於墓上以示鄉之人尤淳知縣墓在薦福山趙處士墓表王鏊呉有竒士趙姓諱同魯字與哲年八十有一𢎞治十六年九月九日卒某年月日葬長洲縣趙墓先塋予表其墓曰宋熈陵第八子恭肅王元儼之後有南陽侯仲曠與其子武節大夫處州兵馬鈐轄士融隨宋南渡家扵睦武節之子義郎不玷監浦江稅因家浦江元季有諱良仁者朱彥修髙第弟子所著有天人交氣圖張士誠召之始来居長洲之金莊良仁生友泰友泰生季敕季敕生處士自元至今趙氏為庶而業儒攻文不衰處士偉軀幹志氣髙邁自六經諸子至天文地理黄帝岐伯神仙養生之說靡不涉獵為文下筆數千言滔滔莫禦身居田里而喜論當世事見人之屈抑與民間利害時政缺失憤然若迫於身有裘巡檢者誣民為盜處士論之百方不聽乃曰若解盜將安之於縣於府於院我必隨之裘乃止有王御史者理軍籍呉下鍜鍊齊民以足其數處士争之曰軍以衛民也今誣民為軍軍足民亡何益王為霽威每遇饑嵗則預陳拯濟方於郡邑大夫辛丑大饑以郡邑無足論者乃為書詣金陵上巡撫三原王公大要言宋元時蘇郡嵗入苗為斛者止三十四萬九千至國朝乃至二百六十二萬五千九百地昔之地也何加多如是况今年積雨為害吳幾為沼而徴科不止民其若之何王公讀之甚賞其文而無意於蠲稅書至再上三上不得已許減稅銀若干且欲薦於上亦不果近世論東南水患起於常熟之白茆港開白茆則水患衰堤崑山之沙湖則盜賊息而處士已言於數十年之前矣烏乎處士固未嘗有一命之寄也論及世事感激奮發使其食君之禄立乎人之朝其所建白豈止是乎尚肯脂韋突梯觀望上下若世之患得患失者乎惜乎其不遇也吾故表之以告夫有位者趙同魯處士墓在長洲縣趙墓藻菴居士自誌銘鄒亮居士姓鄒氏名亮字克明世為呉郡人曾祖諱壽良祖諱文華多隂隲俱不仕考顯贈承徳郎刑部主事妣金氏贈安人吾弱不好弄酷嗜讀書凡得天文醫卜兵書必晝夜手録殆忘寢食時工部侍郎廬陵周公以文章政事名重天下為當世儒宗間以所業投贄公誤加稱奬為延譽於兩京公卿間公極欲薦拔同類忌之因掲匿名書於憲臺欲沮焉呉郡守况侯伯律憤然曰薦賢為國非私也特以名聞拜行在吏部司務轉南京刑部又轉都察院復以周公薦陞南京浙江道監察御史政聲無聞尸素而已㬌泰甲戌夏四月敕命褒嘉有發身儒術累更任使暨遷風紀式克勤慎尚有顯秩需爾後効之語㤙至隆也惜乎天不假人以年無以報稱萬一焉其生永樂丙戌九月十七日景泰五年十一月初六日以疾卒扵南京官署春秋四十九早號梅厓後更藻菴有書千餘巻及所著鳴珂潄芳等集二十餘巻藏於家所撰詩宗韻海未能就緒娶梁氏有婦道封孺人子男二瓊為應天府儒學廩膳生瑾尚幼孫一曰豸孫卜以㬌泰六年某月某日窆於長洲縣金鵝鄉先塋之次嘗倣杜牧之故事預為自志曰脩短數也死生命也夫天地萬物莫逃乎數况生死如晝夜然孰能免乎銘曰生也順殁攸寧無遺憾妥幽扃鄒亮御史墓在長洲縣金鵝鄉趙宗文生壙志趙文宗文姓趙氏名文宗文字也世為崇明人曾祖諱興祖積善以行義值元季海盜剽掠徙居長洲之甫里遂占籍焉祖諱成禧考諱華甫為善以相承人屢以横逆加之將攫而取者或告曰奚弗直於官也輒對之曰彼貧無養固恤之不暇直之致其譴豈吾心哉聞者以善人稱之無間言妣沈氏元江浙醫學提領諱徳輝之女生我兄弟三人文居其長甫弱冠不幸先君子棄諸孤遭家多故舊業幾墜頼吾母力以教養漸厎成立洪武間縣令周博舉文為人材召至京以母老得請以歸養母卒永樂五年詔求賢文又以翰林典籍梁用行薦授番陽知縣後以事免官還田里日以吟咏自娯未嘗務外慕今年七十有六老病日侵知不能久於世乃命子鏞築生壙扵依仁鄉西江澤之原先塋兆次且自為其壙志然非任其達也盖為生必死世未能免之者特以平昔之行不可不謹書於埋石茍求他作或過實而可恥孰若知所恥而不敢以自誣乎况學者之立心則必修省扵一息尚存之間此他人所不能知故不容不致力於躬也文生於甲辰二年乙未二月戊午若吾卒之日與吾之享年則俟吾殁併以實之配王氏子男一人鏞娶劉氏嫡孫男安娶方氏庶孫男宣尚幼曾孫男二人慶童夀童皆尚幼文平生所述詩有慎獨齋集四十巻理學直言一巻文則有止義齋集二十巻銘曰承先人之善澤兮際昌期而顯庸中既挫而加厲兮知已修而未隆雖休退而衰邁兮恒惴惴而省躬惟天命之不易兮尚委順而俟終正統三年慎獨趙先生預治幽堂復自銘其墓門之石越二年為庚申嵗五月十九日而先生卒享年七十有八卒之二年為壬戌嵗三月十一日而歸藏焉夫不以終事為諱制事扵未然者世已甚鮮欲望自為墓銘如杜牧之傅奕者又幾何人哉先生實繼之可謂達矣觀先生當死生之際其達如此則其平生又可知矣其自銘者其謙抑而不盡書者其可尚也夫又銘曰保厥始慎厥終預為銘置幽宫全而藏永無窮翰林院侍講承徳郎兼修國史彭城劉鉉識趙文先生墓在長洲縣依仁鄉西江澤林士隆自撰墓志銘林昌吾姓林氏諱昌字士隆號守軒蘇之呉縣人考之族譜其先出於子姓之後放事孔子居魯復移濟南後以晉永嘉之亂始渡江散居南方有諱遹者仕福清尉因家焉稱為福清始祖遹之子仁倜生仲雅仲雅六子髙向喬商扄尚髙任屯田員外郎累贈至成國公妻黄氏封成國太夫人始徙居呉下諸弟子若孫俱隨寓焉稱為平江六房尚生五子棨閱䇿建柔建任大理寺丞生子升任兵部侍郎柔任刑部尚書生子茂先太常寺卿贈紫金光禄大夫升生五子長真卿通直郎任江隂司法七傳而至髙祖茂山曾祖誠山祖清隠父貴和俱質直以善聞祖母范氏文正公世孫日莊女母趙氏長洲著姓士安女皆有善行比吾生未期父因通易書曉卜筮遵朝命五從中貴使西海諸夷邦一往返輒五年幸無恙論者謂積善之報吾六嵗游鄉校頼祖母朝夕訓讀啟䝉等書及長遵奉教誡益勉於學年二十授徒邑中見知於令尹吳公復延教諸子重加禮貌後葉公錫以庶吉士出宰邑荷不鄙建立義學以禮幣招我典教又舉為境内儒士名載須知冊景泰五年朝廷遣使纂修誌書郡侯汪公滸以書敦請獲預紀述平昔守分不矜持不忮求不輕造公門取辱學吟吟以自適情素不為謔浪誚人語飲酒醉而愈謹人不見有落魄態與妹擇配得宣聖五十八代孫孔鏞字韶文時為長洲庠生家甚窘苦志讀書見其器識有用於世遂以妹嫁之後韶文膺鄉薦登進士厯任都御史巡撫貴州復轉工部侍郎譽望甚隆惜吾妹早世鄉族皆稱吾知人與弟士明友愛頗篤成化戊戌子符由進士授廣東道監察御史荷聖朝推㤙封吾如其官妻夏氏封孺人又蒙㤙例分俸養親拜命以来慚無報補及追思吾親俱逝而不得奉養曷勝感懐烏乎自福清始祖相傳至我一十九代中孫顯晦不常顧予菲薄守已安分幸不流於庸人之歸雖未獲禄仕而教子成人効用於時封為御史優游林下叨與鄉飲為僎為賔幾三十年俯仰亦無愧矣死何恨哉子男二長即符以御史九載厯陞廣西按察使以公事今為南雄知府娶范氏封孺人次節鄉貢娶王氏女一淑賢嫁儒士劉潮孫男六原震原復原益原升原泰原鼎女四俱適名門曾孫男一女一吾生於永樂甲午十一月十五日今年八十一祖塋在長洲髙景山之原不揣預書平日之梗槩而自為之銘不知卒扵何年月日享年幾嵗臨終二子為我書之銘曰効乎才也道未明効乎徳也行無成守身素志安分真情老而叨封以沐㤙榮遂吾身後之計永歸妥扵先塋𢎞治七年十一月初吉撰先考府君自撰墓志銘後不幸於𢎞治九年六月十七日辭世享年八十三嵗卜本年十一月十三日安厝不肖等奉遺命謹書刻扵石烏乎痛哉孤哀男符節泣血拜識林君昌墓在髙景山資徳大夫正治上卿南京刑部尚書劉公行狀文徵明公姓劉氏諱纓字與清號鐡柯其先清江人裔出宋集賢學士原父其後有諱持矩者仕元為江西行省都事因徙家新淦之橋埠灘遂為新淦人國朝江西内附持矩之子雲芳以尺籍徙𨽻蘇州衛雲芳子廸吉廸吉二子次曰謙海讀書有行義代兄戍吳遂留居吳中公之大父也父曰中正娶張氏以正統七年壬戌八月五日生公於呉城鳳凰里磥砢英特資復穎異少從鄉先生賀復菴學先生亟稱之既而受易於夏璿先生精研淬礪不拘拘扵師說而剽刺涉獵卓見端緒為文操札疾書未嘗致思視他人追琢衍繹方事竚擬而公數百言已就所作明暢英發以儒士再試不利乃入縣學為弟子員成化辛夘中應天鄉試戊戌中禮部試廷試賜同進士出身已亥授湖廣武陵知縣武陵為常徳輔邑地大而繁公少多更涉習知民隠至扵胥史乾没夤緣請屬之情咸悉其故故視事之始展采錯事無不當允縣多隙地民惰不知溉種又貧什器多不備公處業振贍務盡民利由是民知力本嵗亦比登先是有長賦者亡粟若干石郡坐以侵官帑法死執不從當以亡失既而獄上上官閱其牘曰此良法家也卒從所擬明年庚子母張夫人卒公即日解官持服服闋改知山東兖州之滕縣縣小而僻素多盜荐被荒歉椎埋狼籍更數政益敝不治又其俗狠鬬嚚訟公鈎摭精敏刄迎節解剖析明暢而軌道要束皆中肯綮一時莫不驚服向化盜亦衰止藩臬使者皆稱其能尤為司徒許公進所知丙午召入為河南道監察御史徼巡東城兼督視京倉不事摘抉而繩軌攸當宄弊罔匿戊申孝宗皇帝登極改元𢎞治公多所論奏皆隨事救正達於大體是嵗奉命按福建嘗閱沙縣囚有鄧釗者坐謀殺父繫獄同時麻冕張成富皆坐死公視其所荷校皆新翻閱牘詞多支贅且事發無主名而牘尾云云類隠語曰豈投匿名書成獄邪悉索前後訟牒果得匿名書於吏廨故牘中盖釗父以負貸自刎其姑之夫陳富利釗産欲奪之故為此陷之以冕等其所親昵併及焉前時有司實傅致成獄其後讞者不欲更異又惡骩法故首鼠其事公既閱實即破械釋之一時稱為神明莆田民有隨母出嫁者刲股療繼父疾有司以孝聞公判曰棄本姓而冒他姓義已不明虧父體以濟父讐孝則安在衆服其明識時海外諸番入貢者多挾贋貨貿市於閩監舶者利其賄不禁或不時得賄即忿鬬成隙公謂此非来逺之道且傷國體即下令絶不許通至今以為法庚戌還朝十一月滿三載考最給敕命進階文林郎推㤙贈考宗政文林郎河南道監察御史妣張氏孺人辛亥再奉命按廣東廣並海有别渚曰澳番舶交易之地地有珠市世其業者十人豪民張政者先竄名畨舶商海外諸國致番貨直數十萬夤結中人監舶者假以公牒得捕盜海上憑藉聲勢張甚因欲漁奪十人者之業不得悉誣十人者為盜捕置獄中七人瘐死餘三人當論決公讞得其情並釋三人抵政死指揮倪鳳亦以捕盜椎剽海上忮害尤甚顧鳳隂狡多養死士自衛急之恐變乃以計擒得之竟致之法鎮守中官上言各堡俘獲㓜男寄養軍中宜從宫刑以給内用而實無其人比詔取之則旋買良人子腐以充數腐且三百人而斃者十五所須尚千人方買之海人公聞急渡海抵瓊崖諸屬覈實馳還則所司部五百人方艤舟徳慶公亟下守巡官騐非俘獲即日散遣於是其家人感㤙咸謂曰劉公實生汝汝復有嗣宜以劉姓姓之癸丑還朝十月再滿考留掌本道事時外戚驕蹇結聨中官用事縱横亂政公率同官上疏極言言侵中官中官故激怒上逮繫詔獄罪且不測卒頼上仁明笞而不問公前後兩按大省劾罷不職官省使郡縣守吏而下十有六人誅舞文者百三十餘人平反斬絞罪百二十有三人兩侍經筵統署十一道印事皆集辦丙辰滿九載陞太僕寺少卿時馬政廢弛圉人多肆侵漁馬耗不孳又私相盜鬻遇裱印率滌去舊文更入充數公立法辨審弊為之清又探稽孳畜利病得二十事條列以聞從之已未考滿給誥命進階中憲大夫推㤙加贈考中憲大夫太僕寺少卿妣恭人庚申拜都察院右僉都御史巡撫四川縂督粮儲兼理松潘軍務錫璽書以行蜀去京師萬里而松潘又在荒外濵於諸夷棧道險絶氐獠出没為患撫鎮大臣多不親履其地緩急惟事調遣或控馭失所往往僨敗公曰我為大臣出鎮萬里可自逸以委勞於人邪且吾奉命督理軍務不厯其地何以知其要害險塞以得其事情乃乗竹兠渡繩橋徧行諸砦廣布耳目以求其事端盖諸邊戍守城堡俱在夷中夷人與吾人連結無事則邀勝取功事急則買和滅跡其事在夷者十三在吾者十七公為科條禁誡誕章敷化事以敉寧又有所謂賞畨者凡官府行邊恐夷人出擾有司先事置綵幣牛酒於路以賄之謂之買路公嚴加禁戢官軍奉要束惟謹由是公行邊軍夷帖息莫敢動在蜀甫一年屬子儆卒悲傷成疾上疏乞歸詔予告暫還病痊起用仍給傳以歸壬戌抵家越三年乙丑御史龔元上言劉某舊撫四川老成練諳恊於民夷年力未衰不應閒廢㑹四川缺撫臣吏部即奏起之有詔仍以僉都御史巡撫四川兼理如故再錫璽書以行㑹松荗叠溪木匠兒諸番夷嘯聚醜類連兵剽刦鑿城燒棧勢甚猖獗公親駐境上相機設䇿㑹諸路兵討之衝擊疏捕轉戰折北諸夷懼讋悉投兵羅拜願獻甲馬贖罪列柯空龍諸砦爭斬賊首以降凡降二十餘砦前後俘斬千餘人捷聞降詔奬諭賜白金五十兩文綺二襲横梁麻嗒三哨嘴諸河道逼阽諸夷每餉運輒為邀刼而衛士通畨往往啟釁蒲江闗堡久已頽廢列柯諸番往来結納肆為剽掠一時邊患往往坐此公並議復之仍議各立分司設官守之自是迄公去邊境不擾正徳丁夘再滿考進階中議大夫勲贊治尹時有詔裁革巡撫大臣凡十有一人公得㫖還朝尋奉璽書巡撫湖廣兼贊理軍務先是公在蜀以䕫峽水勢湍急嵗嘗汜溢覆舟傍有小徑盜出沒其間商旅不敢行嵗歉假貨湖陜大費轉輸議自䕫抵荆闢為大道公私便利至是御史王瑾以聞時逆瑾方用事恨公不先聞矯詔逮公下獄公上章自理㑹廷臣亦交章論救得釋仍赴湖廣荆王奏蘄州守余忠擅用兵仗刻減禄米欺侮宗室諸不法論死詔公㑹三法司勘問公為奏辨得末減戊辰二月陞南京大理寺卿六月召為兵部右侍郎初崇明盜起江南諸郡繹騷時承平日久兵衛耗減殘卒莫能支所在募民兵應敵號義勇軍有司上其數請如官軍給餉公不可曰往時王都御史借闗隴民兵討洞蠻從便宜月給米人三斗後皆籍為軍至今遺患於民國家軍餉豈宜輕議事遂寢明年已已年六十有八上疏乞㤙休致有詔不允尋給誥命進階通議大夫推㤙贈公祖考謙海加贈考宗政皆通議大夫兵部右侍郎祖妣某妣張氏皆贈淑人庚午陞南京刑部尚書豪猾非法殺人欲行賍丐免費且鉅萬顧公不可入因公所知乗間言之公不可竟按殺之公素練於事尤長於法比然不為深文巧詆遇獄有疑率下屬吏再三讞必無生理然後付法至於悖謾渫惡必盡法無貸故所屬咸軌法不敢骩濫奸宄屏息辛未兩宫慶禮成覃㤙給誥命進階資政大夫加贈祖考考皆資政大夫刑部尚書祖妣妣皆夫人是嵗公年七十再上疏乞休不允越明年癸酉尚書滿三載三月赴部考績有㫖令復職五月上疏再乞休致有㫖卿才識老成精力尚健宜照舊辦事不允所辭六月再疏自陳老疾乞休以全晚節有㫖卿敭厯中外多効賢勞近疏乞休已有㫖不允宜照舊用心辦事八月還次揚州再申前請因遂歸家待命有㫖卿累疏乞休已有㫖勉留不必再辭十月又連上疏始得請仍詔給月俸給輿皂以示優寵越十年壬午今上入正大統改元嘉靖公年八十有一㑹兩宫尊禮成覃恩進階資徳大夫正治上卿命有司具綵幣羊酒存問明年癸未以疾卒訃聞命有司致祭工部營葬事如制公為人亢爽疏雋明燭事機而嫺於吏政又精明强幹事多迎解然其中有定識雖事出悤遽而銖黍分齊較若畫一彼沉思深處者或不及也故其翕張變化人莫能測而情法不悖所至威愛並立而能飾之以文在蜀大修學校尤敦行義飾祠祀唐西川節度使崔光逺散騎常侍髙適經畧使李徳裕宋知益州張詠修復他名賢祠墓尤多連按閩廣皆值鄉試為監臨官精擇典校尤嚴閑衛而不苛瑣惟詳於檢閱不令有遺在廣嘗親閲落巻得一士以為奇列之首選榜出咸謂得人今翰林侍講湛若水也其他推賢舉能化服道利無所不用其至故侍郎海陵儲公巏稱公經世之務謀國之利往往在刑章訟牒外其為尹如侯覧為御史如唐介其撫湖蜀文教如文翁水利如李冰鎮静如張詠一時以為實録云公長身玉立鬚睂疎秀而舉止軒掲辭吐琅然見者竦企晚嵗家居益事燕整客至未嘗不見雖盛暑未嘗不冠吉凶慶弔未嘗不行四方書疏皆手自裁答不少遺忘尤篤於故舊或在患難必竭力拯之雖犯謗不惜至人有過則多面折之雖貴顯當路無所諱避以故人有讒之者然卒不能没其善之衆也素性儉質既鼎貴非祭祀賔客食不重味尤寡嗜慾故晚嵗神觀不衰對舉舊事如引繩貫珠纚纚不能休年八十餘篝燈作蠅頭字精楷不異壯嵗屬纊之前一日猶對客談洽無所苦抵暮與家人燕語如常明日覺體中不佳稍就枕却藥夜半起坐呼水盥靧及旦奄然而逝實三月十有六日也年八十二公任中外四十餘年積階自文林郎九轉為資徳大夫正治上卿配李氏積封自孺人至夫人生子男一人即儆嘗為縣學生文學行義人謂稱家不幸早卒娶諸氏亦卒女三人長適大理丞仰宗泰之孫灝次適福建僉事杜子開之子恕次適都御史王思徳之子東孫男一人遺以公䕃補國子生女二適張幕林文申曾孫男二人喬祖同祖女一人葬以卒之明年甲申某月某日墓在呉縣羊膓嶺之原徵明先君温州與公同里居既仕同朝相好甚宻徵明以契家子早辱公教愛及公歸里遂得以晚進厠跡賔階竊念先君既殁老成彫謝殆盡而公獨為鄉邦之重每一瞻對未嘗不興前輩典刑之嘆烏乎而今已矣有如公者可復得邪公之孫遺將乞銘於當代名筆且將列之史官屬為事狀徴明自顧蕪劣安能論次而耳受目矚庶幾不誣云爾謹狀劉與清先生纓成化中進士授湖廣武陵縣知縣正徳中歴官至大理寺卿遷南京兵部尚書所在有政績予告歸里卒於嘉靖癸未文待詔為之墓志銘墓在羊腸嶺下大明故光禄大夫柱國少傅兼太子太傅户部尚書武英殿大學士致仕贈太傅諡文恪王公墓志銘邵寳嘉靖三年三月十一日少傅王公卒於呉城里第於是公致仕歸十五年矣先是上即位遣行人即其家存問敕有全徳盛名海内推重之語公上謝疏進講學勤政二篇上嘉納焉官一子為中書舍人越三年又遣有司存問㤙禮隆重時方仰之至是訃聞上為輟視朝一日賜賻米及布命諭祭者九贈太傅諡文恪仍命工部治葬事比葬其子延喆等以其長女壻徐侍讀子容狀屬銘於寳寳以公國元老銘宜館閣大筆且公鄉郡固有作者奚宜至於寳哉延喆曰先公遺命也先公知公深矣寳乃不敢辭公諱鏊字濟之姓王氏别號守溪晚更拙叟學者稱為震澤先生其先自汴扈宋南渡諱百八者始家呉之洞庭山曾祖伯英祖惟道考朝用光化知縣皆以公貴贈如公官曾祖妣陸氏祖妣葉氏妣葉氏皆一品夫人公自幼穎悟不凡年十六隨父在國學始課舉業落筆過人有傳其論䇿於文莊葉公公大奇之曰此子他日忠肅乎忠肅鹽山公諡也公與同姓且嫌名故稱之於是聲名動京師有屈年與行引為友如奚元啟者居二年歸游呉庠凡考必居首陳提學天台先生尤以天下士期之甲午試應天第一主司謂安得東坡復出至全錄其論䇿不易一字乙未㑹試第一廷對䇿入衆擬第一執政有忌其言直而抑之者諉曰文太長難讀也冢宰尹公讀之遂寘第一甲第三初授翰林編修九載陞侍講孝宗初開經筵充展書官憲宗實録成陞右諭徳用徐文靖公薦為侍講學士尋進日講以宫寮選兼左諭徳尋陞少詹事兼侍讀學士擢吏部侍郎丁外艱去終喪復任命兼國史副縂裁繼命以其官兼翰林學士入閣典機務進户部尚書文淵閣大學士國史縂裁同知經筵事再進今官勲柱國階光禄大夫致仕公在翰林益肆力於學閉門讀書避逺權勢如恐不及士子請業者逺近踵至惟中貴弟姪皆絶之在經筵雅志啟沃每講至天理人欲之際及君子小人之用舍必詳必懇上方春出逰後苑左右諌不聽公講無逸至文王不敢盤於逰田反覆規諫上悚聽為之罷逰仍傳飭内侍廣今日講官意指爾爾好為之云云東宫將出閤司馬鈞陽馬公疏請選正人以端國本詔㑹議至公名同聲曰此真其人遂以為首吏部闕侍郎侍郎韓公攝部事以公與壽寧有故交既貴而能逺之其正可敬也首薦而用之在吏部抑躁奬恬清簡得體㑹有邊警上籌邊八事議論激切侵權倖始雖尼之後多施用大學士餘姚謝公以災異求退舉公與吳文定自代時論稱允武宗諒隂時公恊韓司徒將帥諸文武大臣伏闕請誅内侍導荒逰者永成等八人以除亂本疏首當屬冢宰焦公焦辭乃屬韓疏入上大驚怒欲庇八人内閣持不可俄有㫖召公等至左順門中官傳諭甚厲衆相視莫敢發言司禮榮乃曰上言卿等所言罷宴樂勤政事皆當從之惟八人者不可去公曰八人不去亂本何由而除天下何由而治且今日之舉果何為乎侃侃不屈韓亦危言繼之榮等語塞為慰言而罷國論倚以為重既而八人者乞憐於上歸咎岳一人斥之南京尋用八人分布要路瑾入柄司禮而内閣劉謝二公皆去詔補其缺衆推焦公及公公雖以前言見忌然重違公議遂俱入閣時李文正公尚辭疾不出焦公每事推公上見公班尚書後因進公户部尚書文淵閣大學士公以資淺辭不許未幾賜蠎衣玉帶公聞尚寳崔璿郎中張瑋副使姚祥以㣲眚被枷瀕死亟言於瑾曰士夫可殺不可辱今既辱之又殺之吾亦何顔而復立於此由是三人者皆得釋韓公雖逐瑾銜未已必欲置之死無敢言者公言韓清徳粹行海内所知今無故加罪恐不能服人不聴會廷中得匿名書斥瑾罪惡瑾意稍戢韓得紓焉亦以公前言故先是應詔舉經明行修六七輩有餘姚人者瑾欲因是逮謝公并及劉公公與文正公力救乃已司馬華容劉公被逮將坐以激變土官岑氏罪死公曰岑不卒叛何變之激劉得減死或言都憲石淙楊公在陜西築墻太勞費瑾信之屢以為言公曰今安得文學政事作人有功如楊某者為國修邊奈何罪之廢后吳氏之喪將秘不發公不可瑾曰何以成服公曰雖然葬不可茍也景泰汪妃薨於時帝疑其禮曰妃廢不以罪當追復故號葬以妃祭以后皆從之時中外權悉歸瑾公初開誠與之言間亦見聽及焦事媕阿議乃不合瑾益狂悖横厲禍流搢紳公救之不能得蹙然見顔面瑾望見之曰王先生居髙位何乃爾耶公再疏求去甚情而懇或以公咈瑾意虞有奇禍公曰吾自省無咎何畏彼哉瑾使邏者詗公以公絶䞇幣報瑾笑曰過矣於是公疏至三上許焉賜璽書乗傳以歸嵗夫月米具給當時以為異數云公立朝三十餘年㢘正守道恒如一日史館諤諤有所可否不少徇縂裁意經筵之進以不及執政門故遲之然公望重終不能抑也主考南畿知有典法不知權勢絶闗節蔑震撼隠然為吾黨重先後㑹試再為同考主考尤稱公嚴能得人教諸庶吉士不惟其業亦惟身率以道稱能成人論者擬諸泰山喬嶽盖坐鎮之功大矣而東山之望晚繫天下尤重惇叙慎修持身持家表裏周浹讀書著文樂以忘老雖士夫博雅清玩一不屑意人莫敢干以私者公稟少怯臨事接物或不能無動於心偶讀程子明理治懼克已治怒二言箴以警焉及涵養既久進講奏對從容詳雅得告君之體觀公之誠者未嘗不三嘆於斯其為文先愛三蘇才思川涌援筆如不能止既自超蜕力追古作自昌黎上遡秦漢駸駸乎幾矣論起衰者歸之嘗言吾文得法於孟子君子曰信雄而辨鬯而雅晚精理學論辨多古人未發詩蕭散清逸有王岑風格書法清勁自成得晉唐筆意所著有震澤集震澤篇震澤長語紀聞各若干巻公卒時距其生景泰七年八月十七日壽七十五配吳氏繼張氏俱贈一品夫人子男四長即延喆中書舍人次延素南京中軍都督府都事次延陵郡庠生次延昭女五長歸侍讀子容名縉次歸貴州都司都事朱希召次歸庠生邵鑾俱先卒次歸中書舍人靳懋仁其季受庠生嚴濡聘孫男三女二墓在東洞庭梁家山之原葬之日為明年乙酉正月一日庚申銘曰明至中葉道與時升君子觀國人焉是徵我求其人憲孝之世偉哉王公植我元氣公有忠義文章以宣成化制䇿𢎞治經筵在正徳初少宰入轉彼宄濟奸公心獨苦先是伏闕偕二三臣請劍未許徇國以身公如砥柱百撼靡動平生二箴况也自誦豈無加秩少傅尚書奭裕未足伊任其餘時方倚公公去則亟僉曰貞哉亦有殊錫公在廟堂鼎實棟隆公在山林斗掲岳崇公既老矣猶望其起公既壽矣而祝未已震澤萬頃莫釐千尋英靈還止山高水深王鏊相國墓在東洞庭梁家山吳都文粹續集巻四十一
