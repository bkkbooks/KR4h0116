body:
  text: 呉都文粹續集巻二十三明錢榖撰山水五湖賦此賦出藝文類聚上下有缺文重其古也録之楊泉乃天地之𤣥源隂陽之所徂上值箕斗之精與雲漢乎同模受三方之灌溉為百川之巨都居揚州之大澤苞吳越之具區南與長江分體東與巨海合流太隂之所毖𤣥靈之所逰追湖水而徃還通蓬萊與瀛洲爾乃詳觀其廣深之所極延袤之規方邈乎浩浩漫乎洋洋西合乎濛汜東苞乎扶桑日月扵是出入與天漢乎相望左有包山連以醴瀆岝㠋崔嵬穹窿紆曲右有平原廣澤蔓延旁薄原隰陂阪各有條格茹藘菼薍隱軫肴錯衝風之所去零雨之所薄初學記収楊泉五湖賦作西晉楊泉與前文不同復録之余觀夫主五湖而察其雲物皇哉大矣以為名山大澤必有記頌之章故梁山有奕奕之詩雲夢有子虚之賦夫具區者揚州之澤藪也有大禹之遺跡疏川導流之功而獨􅇅然未有翰墨之美余竊憤焉敢忘不才述而賦之其辭曰濬矣大哉於此五湖乃天地之𤣥源隂陽之所徂上屬斗牛之精與雲漢乎同模受三方之灌溉為百川之巨都居揚州之大澤包呉越之具區南與長江分體東與巨海合流太隂之所毖𤣥靈之所逰追潮水而徃還通蓬萊與瀛洲五湖記王鏊吳郡之西南有巨浸焉廣三萬六千頃中有山七十二襟帶三州蘇湖常也東南諸水皆歸焉其最大者二一自寜國建康等處入溧陽迤邐至長塘湖并潤州金壇延陵丹陽諸水會於宜興以入今寜國建康之水不由此矣一自宣歙天目諸山下杭之臨安餘杭湖之安吉武康長興以入而皆由吳江分流以入海一名震澤書所謂震澤底定是也一名具區周禮職方氏其澤藪曰具區山海經浮玉之山北望具區是也一名笠澤左傳越伐呉呉子禦之笠澤是也一名五湖范蠡乘舟出五湖口太史公登姑蘇望五湖是也五湖者張勃吳録云周行五百里故名虞仲翔云太湖東通華亭松江南通烏程霅溪西通義興荆溪北通晉陵滆湖東連嘉興韭溪水凡五道故謂之五湖陸魯望云太湖上稟咸池五車之氣故一水五名然今湖中亦自有五湖曰菱湖莫湖㳺湖貢湖胥湖莫釐之東周三十餘里曰菱湖其西北周五十里曰莫湖長山之東周五十里曰㳺湖㳂無錫老㟁周一百九十里曰貢湖胥山之西南周六十里曰胥湖五湖之外又有三小湖夫椒山東曰梅梁湖杜圻之西魚查之東曰金鼎湖林屋之東曰東皋里湖而呉人稱謂則惟曰太湖云自蠣山東望震澤鮑照瀾漫潭洞波合沓崿嶂雲漲島逺不測崗澗近難分幽篁愁暮見思鳥傷夕聞以此藉沉疴棲迹别人羣結言非盡書有念豈敷文泊震澤口二首薛據日落草木陰舟徒泊江汜蒼茫萬象開合沓聞風水洄㳂值漁翁䆗窱逢樵子雲開天宇靜空明照萬里早雁湖上來晨鐘海邊起獨坐嗟逺逰登㟁望長洲寥落星欲盡曈曨氣漸収行藏空自秉知識仍未周伍胥既伏劒范蠡亦乘流歌竟鼔枻去三江多客愁泛五湖效謝惠連李紳范子蛻冠履扁舟逸霄漢嗟予抱險艱怵惕經瀰漫窮通汎濫勞趣適殊昏旦浴日盪層空浮天淼無畔依灘落葉聚立浦驚鴻散浪疊雪峰連山孤翠厓斷風帆向巨壑雲矗成髙㟁宇宙或東西星辰沉粲爛霞生澒洞逺月吐青熒亂豈復問津迷休為吕梁嘆漂沈身詎保覆溺心長判呉越郡異鄉嬰童及為翫依稀古井邑嘹唳同鵞鸛舉棹未宵分維舟方日旰徵斯濟川力若鼔凌風翰易狎當悔㳺臨深罔知難太湖秋夕王昌齡水宿烟雨寒洞庭霜落微月明移舟去夜靜夢魂歸暗覺海風度蕭蕭聞雁飛泛太湖書事寄元微之白居易烟渚雲帆處處通飄然舟似入虚空玉杯淺酌巡初匝金管徐吹曲未終黃夾纈林寒有葉碧琉璃水靜無風避旗飛鷺翩翻白驚鼔跳魚撥剌紅澗雪壓多松偃蹇岩泉滴久石玲瓏書為故事留湖上所見勝景多記在湖中石上吟作新詩寄浙東軍府威容從道盛江山氣色定知同報君一事君應羨五宿澄波皓月中早發赴洞庭舟中作闔閭曙色欲蒼蒼星月髙低宿水光棹舉影搖燈燭動舟移聲曵管弦長漸看海樹紅生日遙見包山白帶霜出郭巳行十五里唯消一曲慢霓裳宿湖中水天向晩碧沉沉樹影霞光重疊深浸月冷波千頃練飽霜新橘萬枝金幸無案牘何妨醉縱有笙歌不廢吟十隻畫船何處宿洞庭山脚太湖心夜泛陽隖入明月灣寄崔湖州湖山處處好淹留最愛東灣北隖頭揜映橘林千㸃火澄泓潭水一盆油龍頭畫舸銜明月鵲脚紅旗蘸碧流為報茶山崔太守與君各是一家游泛太湖方干長天接廣澤二氣共含秋舉目無平地何心戀直鈎孤鐘鳴大㟁片月落中流却憶䲭夷子當時此泛舟湖中曲李商隱閶門日中吳歌逺陂路緑菱香滿滿後溪暗起鯉魚風船旂閃斷芙蓉榦傾身奉君畏身輕雙橈兩槳尊酒清莫因風雨罷圑扇此曲斷腸惟此聲低樓小徑城南道猶自金鞍對芳艸除夜寄羅同年王禹偁郡僚方賀正獨宿太湖稜堦下羞為吏船中秖載僧折梅和薄雪煮茗對孤燈應笑排衙早寒靴踏曉氷舟泊太湖羅處約三萬六千頃湖侵海内田逢山方得地見月始知天南國吞將盡東溟勢欲連何當洒為雨無處不豐年過太湖范仲淹有浪即山髙無風還練靜秋宵誰與期月華三萬頃其二平湖萬頃碧謝客一開顔待得臨清夜徘徊載月還舟泊太湖楊傑區區朝市逐紛華不信湖心有海槎入十丈虹寒卧影一千頃玉碧無瑕古今風月歸詩客多少蓴鱸屬酒家安得扁舟如范蠡烟波深處卜生涯同前李顒旋經義興境頓棹石蘭渚震澤竟何在今惟太湖浦圓徑縈五百盼目眇無覩髙天淼若㟁長津襍如縷窈窕尋彎碕迢遞望島嶼驚飈揚飛湍浮霄漾懸岨輕禽翔雲漢㳺鱗憩中許黯靄天將隂嶢岩舟航舞馮河安可徇靜觀戒行旅太湖阻雨孫覿白首對瀧吏騂顔媿逐臣溪山不改色風雨解留人轗軻知天意漂浮住此身紛紛小兒女何必淚沾巾大霧中自胥口渡太湖范成大白霧漫空白浪深舟如竹葉信浮沉科頭晏起吾何敢自有山川印此心再渡太湖囊風閣雨半晴隂慘淡誰知造化心委命浮沉惟一葉計身輕重亦千金紅塵猶道不勝險白浪莫嗔如許深晩得薌山堪繫纜卧聽鼉吼與龍吟太湖辭趙孟頫儂住東湖震澤洲烟波日日釣魚舟山似翠酒如油醉眼看山得自由渺渺烟波一葉舟西風木落五湖秋盟鷗鷺傲王侯管甚鱸魚不上鈎雲海亭望具區姜䕫茫茫復茫茫中有山蒼蒼大哉夫差國坐占天一方夫差醉蓮宫巨浪搖不醒越兵從何來奪我玉萬頃年年亭上秋一笛千古愁誰能知往事飛下雙白鷗過太湖唐桂芳向晩推篷望羣山隠約青篙工排陣勢野飯襍魚腥水濶疑無地天低剰有星呉音相爾汝聊復慰飄零同前許謙周迴萬水入逺近數州環南極疑無地西浮直際山三江歸海表一徑界河間白浪秋風急漁舟意尚閒同前張雨溔㵿魚龍戯僻側鳬雁宿併吞三萬頃寜不為小曲唯應鴟夷子曽泊西山麓冬夜震澤風雪異常晴暖不可恃一夕冬令變屢忘和煦恩惟曰祈寒怨老屋雪没隙廣澤風肆便反覆鼓洪濤揚􅉫塞荒塹隱然洞庭樂勇甚闔閭戰萬物芻狗如埋没加蹂踐凌晨往嚴冱野日復葱蒨仁哉天地心觀斯復可見過太湖李洞衆水東南會三江左右通夫差中習戰范蠡此休功鷗鳥青銅鏡魚龍紫目宫扁舟嗟未遂蕭散愧漁翁同前程煜擊楫中流去西風客思催地吞南極盡波撼北溟迴蛟館懸秋月龍宫起夜雷濯纓人不見長嘯倒金罍同前朱徳潤扁舟去何所渺渺太湖隂依依桑梓村拍拍枕寒潯飛雲入遐睇鳥道橫青岑篙師戒勿渡柔櫓力不任我身雖骨立未宜折壯心放船當中流浩歌激清音何當披宫錦再作峨嵋吟同前楊基天帝何年遣六丁鑿開混沌見雙青湖通南北澄氷鑑山斷東西列畫屏揜雨龍歸霄漢暝網魚船過水雲腥乘風欲渡終吾老角里先生在洞庭同前徐賁遙天散曉華疎星歛㣲采鳥聲出林繁木葉過露改荒村幾家成平波衆流滙鴟夷渺無踪空煩艤舟待同前髙啓長溪如白虹分走荆霅派具區納羣流襟帶三郡界太虛混鴻濛元氣流沆瀣初疑溟渤寛稍覺雲夢隘茫茫雁飛遲䬃䬃帆度快雨來鼉報鳴風起鷗驚邁神龍作淵都豈復數鱗介珠光照水府不受白日曬朝看砲車雲雪浪動澎湃聲吹地將浮勢擊山欲壞黃頭雖輕生捩柂不敢懈有時湛明鏡峰吐青幾塊烟中樹若莎波上舟如芥漁就沙㟁炊客來水祠拜震澤思禹功夫椒記呉敗白魚逢夏出黃柑待秋賣我性好遊觀夙負雲水債欲尋鴟夷舸不顧渉險戒人生亦何爲世故自拘械萬事風飄花百年露垂薤何當扣林屋秉炬訪仙怪試探不死方為人起疴瘵月夜遊太湖欲尋林屋隱還過洞庭逰逺水初涵夜長天盡作秋湖如青草濶月似白蓮浮萬壑風傳笛三更斗挂舟葉應隨鳥散山欲趁波流浩蕩吾何適䲭夷不可求舟過太湖張羽具區涵空濶一葦凌風度烟花亂晴天浪色生寒霧遙山含碧氛青蒲冒孤渚解帶俯清流開襟散塵慮乍聞商婦歌或見漁航聚微茫姑蘇城緑縟洞庭樹緬思底定功疏鑿有遺處懷安諒非賢臨深豈無懼且當趣歸棹沿洄難乆住震澤具區維南澤洪瀦奠呉會并包潢汙聚涵育魚龍大崩浪撼坤樞水氣積隂晦蒼茫神靈遇極目光炯碎中有兩洞庭秀色迥相對峭立根虛無接影浸淡瀩飛鳥去何窮長垣亘天外風波多險阻舟檣易傾壞細思懷襄初洪濤渺無界賴兹神禹功底定永無害吳越何區區向此角成敗賢哉鴟夷翁臨風發長慨逰太湖徐有貞逰賞那分雨共晴從教水宿與山行畫船載酒過林屋翠幰衝花入化城半夜放歌驚鶴夢三秋浪迹逐鷗盟閒居每續龜䝉賦醉後時吹子晉笙萬里歸來聊獨樂五湖占斷有誰爭老天於我非無意明月隨人似有情索靖也知憂世事謝安雖起媿蒼生癡翁自笑癡猶在欲為皇家致太平題太湖施槃木喬山秀草惟夭西距姑蘇百里遙水汎具區留禹迹地連南越見胥潮霜林橘熟黃金顆石洞人吹碧玉簫疊巘層厓堪厯覽白雲飛處是夫椒雨中過太湖望洞庭呉寛孤篷遙踔太湖心着雨髙山水墨深積氣上蒸炊巳熟弱流西注壓將沉不因迢遞辭清賞轉覺空濛助醉吟詩裏白公誇月夜未知竒觀屬春隂歸省過太湖王鏊十年塵土面一洗向清流山與人相見天將水共浮落霞漁浦晩斜日橘林秋信美仍吾土如何不少留逰湖㳺徧南湖與北湖畫船隨處宿菰蒲青深著雨山如染緑淨無風水似鋪玉帶蟒衣爭快覩鳳笙龍管醉相扶輕橈又轉東湖去何似當年范蠡圖再㳺南湖漾舟出深港舟人問安之我行無定在信彼天風吹東西與南北逺近齊所宜連朝風雨顛晴明喜今兹鳴笳發湖口蘭橈蕩輕漪紅鱗撥剌驚鷗鷺相與飛扣舷激吳歌續彼滄浪詞風雲忽變色前山雨將來勸君速回棹無為逮崦嵫丁丑八月二十日與弟姪輩泛太湖石蛇山舟發㣲雨後雨大作抵銷夏灣蔡九逵舍明日連雨㳺興索然乘便風還家則日出皎然矣為之一笑賦詩紀之載酒張帆信所如青山含雨轉糢糊虵丘咫尺翻成逺夏渚逍遙可作娱世事無端還自笑秋隂有象若為圖始知白傅真堪羨五宿澄波皓月湖自胥口入太湖徐禎卿洪波終古汎𡨕茫襟繞羣山地軸長水脈潤資南國逺仙家深構玉堂凉沙邊過雨龍腥暗㠶下分飱客鱠香許把一笻隨一杖不將崑閬羨虚皇奉和徴明過太湖浮光滉滉漾瑤空神浸千年説禹功寒漲平烟吞越分虚濤入夜撼蛟宫遙汀嚦嚦悲秋雁落日㣲㣲颺網風堪笑呉兒心似鐵輕舟衝逆駕扁篷與徐太史入太湖胡纘宗十載襟期震澤逰蓬萊仙子忽聯舟巃嵸水抱兩山石縹緲雲連三郡樓輕帆時傍溪橋出明月空隨星漢流七十二峰乘浪起淡烟疎雨帶漁謳泊太湖呈座主守谿公潭潭相府洞庭隈渺渺晴忩馬跡堆常日談經鶴駕至及時束帛龍函來一尊獨俯五湖坐半榻斜依百瀆開東閣門墻趨侍地紫薇猶見燭三台太湖六首茫茫四郡塵嚻外渺渺五湖烟霧中若更無山天地溷縱云有石水雲空澄潭日出漁㠶集遙浦潮平賈棹通為謝東莊王相國金庭玉柱屬三公楚有洞庭江與滙呉有洞庭海欲連水心樓觀疑無地渡口溪橋别是天子夜月波寒浸玉秋空藥杵淨春烟翩然鶴夢驚初覺七十二峰何處仙仙壇窈窕㣲茫外春水瀰漫混池中亂石巉岩猶齧浪羣山縹緲欲浮空沉沉玉洞千年隔皎皎銀河一派通𤣥鶴月明堪載笛扣舷何處覔蘇公傍海月生潮不至縁江路隔水還連太平有垻兩山雲出東西樹五夜星搖上下天洞口鱗鱗千頃玉水心皛皛萬家烟鳥喧花發壺觴亂太守頹然醉若仙即看鶴駕盤湖上擬有仙曹集洞中日月隔橋生碧海星河當户動遥空天圍春樹千村合山漏秋濤十郡通獨放扁舟載王敕白雲深處問三公天外洞庭遙隔絶日邊鍾阜近勾連翩翩鳳馭三千地嫋嫋鸞簫十二天春漲繞湖山潄石秋晴合浦水圍烟百篇斗酒誰能述空憶當時李謫仙胡太守孝思奉詔存問過太湖有作次其韻四首王鏊東南巨浸茫無外吳越交爭向此中漠漠雁飛愁欲墮𡨕𡨕帆逺若乘空樓臺倒影星河動花木交隂島嶼通倘沐皇恩分一曲他年請爵太湖公林屋峰前受一㕓渚鳬汀鷺住相連久塵殿閣三台地歸占東南一洞天詔下屢沾新雨露林間還與舊雲烟自從白傅來㳺後直到君侯兩似仙太湖三萬六千頃七十二峰烟雨中萬壑奔流秋野濶孤松倒挂寒潭空恍疑靈境與凡隔豈謂人寰有路通畫船五宿湖波裏千古風流始屬公洞庭東西雙玉峙物外地脈相勾連雨後人耕隴上陌月明犬吠洞中天紅蒸逺岫上朝日暝入孤村生暮烟漁郎再到忽迷路錯比桃源道是仙入太湖諭祭溪翁相國胡纘宗烟雲淼淼水冥冥七十二峯何處青東山日出魚龍浴西崦風迴松桂馨一代君臣崇舊典兩朝勲業注新銘鑾坡供奉空蓮炬細看三台夜夜星胥口范成大扁舟拍浪信西東何處孤㠶萬里風一雨快晴雲放樹兩山中斷水粘空再渡胥口古來此地快蓬心天繞明湖日照臨一雁雲平時隱見兩山波動對浮沉衰髯都共荻花老醉面不如楓葉深罾户釣徒來問訊去年盟在肻重尋發胥口達包山蔡羽秋水連空鳬鶩長滄洲菰米飯初香地寛不辨帆來影雲起遥疑石上房青壁常含芝草秀朱苞新染橘林霜年年佩劔嗟㳺子莫笑南山豆盡荒旦發胥口經湖中三首王寵瀛壖委菹藪地險隘山川渾沌自太古泱漭開呉天仰飲咸池津俯灌東南偏龍宫掲瑰麗鮫室閟幽𤣥孕化晨陽吐涵虚宵象懸洪流既漰沛列嶂亦迴延雲標海上闕石秀鏡中蓮開冬睠肅氣落木浩無邊黃鵠有竒翼八表恣周還倘遇浮丘公歘忽蓬萊巔其二夙有丘壑尚緬懷鸞鶴踪揚帆忽天矯赤水驂虬龍五湖瀉杯掌三州盪雲胸金屏匝地軸玉鏡開天容秩則四瀆亞浸維百谷宗丹丘駐日月瑤艸連春冬絳氣恣縈薄青霞何複重仙人蜕化處千載容芙蓉咄哉委腐䑕絶頂巢雲松其三逰子戀清暉舟師謔髙浪水宿濟前湍蓐食凌窮嶂雲帆詫多竒霞石非一狀龍性巳難馴鷗機彌浩蕩靈妃曵翠旗川后搴綃帳蒼茫天外殊澒洞風濤壯安流神禹功長嘯鴟夷放昔人巳摧頽宇宙空俯仰感徃不復悲追來胡弗暢縱轡萬壑巔振衣三島上彼美戰勝賢薜蘿遙在望泊胥口太湖月下作胡纘宗一年此夜月如晝萬里兹行榻似桴雲湧樓船天上坐樹圍簫鼔鏡中浮兩山的的河初挂百瀆盈盈星欲流况有玉堂徐學士一尊長嘯洞庭秋晩登木瀆小樓范成大萬象當樓黼黻張闌干一士立蒼茫雲堆不動山深碧星出無多月淡黃宿鳥盡時猶數㸃歸鴻驚處又斜行松陵正有鱸魚上安得長竿坐釣航舟次木瀆聞庶子學士入山不得相見賦詩寄之陳基布帆西望疾如飛影逐髙雲入翠㣲欲與赤松俱隱去却騎黃鶴幾時歸烟霞夢寐無深淺塵世功名有是非白首君恩俱未報可容終采碧山薇過木瀆呉寛舟行三十里初向瀆川過客路偏逢雨人家盡枕河橋横光福嶺水接洞庭波倐爾嗟春及田間見倚蓑木瀆在胥口之東九里香水溪在焉上沙夜泛范成大困倚船忩看斗斜起來風露滿天涯亭亭宿鷺明菰葉閃閃凉螢入稻花月下片雲應夜雨山根炬火忽人家江湖處處無窮景半世紅塵老嵗華上沙水邊犬吠隔疎林籬落蕭森日半隂繁杏鎖紅春意淺晩梅飄粉暮雲深上沙遇雨快凉刮地風來健葛衣一凉便覺暑光低雲頭龍掛如垂筯雨在中峰白塔西上沙田舍更無雲物起㣲隂隴畝人家各好音嵗晩陽和歸稻把夜來霜力到楓林兒童笑裏豐年面鳥鳥聲中落日心釀秫炊秔都入手賸􅂸腰脚辦登臨上沙捨舟登陸村北村南打稻聲竹輿隨處欵柴荆斜陽倒影天如醉明日山行更好晴香水溪分派遶出西山而東為上沙水晩渡白洋灣王鏊扁舟深夜尚孤征兀坐篷窓看月明兩㟁秋蟲互相應不知端復為誰鳴白洋灣亦太湖文流東出呉山之南石湖賦莫旦鱸鄉子歸自天上休於林下户有清風門無俗駕卧白雲扵空山聽天籟於秋夜時維春暮琴書餘暇乃拉客爲石湖之逰聊以樂昇平之化於是乎乘畫舫挂輕帆開芳尊具盤飱往來乎緑楊芳艸之地夷猶乎碧浪清波之灣陋泛舟之訪雪鄙攜妓之逰山酒半顧謂客曰水之瀦而為湖者世固不少湖之著名於世者人亦共曉如彭蠡洞庭震澤青草非不萬頃茫茫千里浩浩然蹈之者身危望之者膽掉不若是湖也規模雖小而有逰觀之美氣候雖㣲而有人物之秀叶觀其一水所滙兩界中分北之半為吳邑南之半為松陵西擁横山東望呉門溶溶漾漾渺渺沄沄入夜則月華而星彩當晝則鏡明而練紋列屏嶂於羣岫開圖畫於諸村九夏之林巒擁翠三春之花栁争妍叶風月富萬家之臺榭帆檣渺千里之烟雲􅇨葉蘋花之遂性浴鷗飛鷺之相親采蓮人欸乃於逺近劬書子唔吚於旦昏佞神徼福者貴賤接踵攜朋玩景者節序相仍肩輿逰騎之不絶朝鐘暮鼔之相聞水際度漁歌兮牧笛谷口依樵擔兮耕犁叶春醉街頭何處勝逰公子晩粧樓上誰家倦繡佳人此其大畧也若夫溪山之美景物之勝則上方矗矗兮臺殿重疊茶磨盤盤兮草木蔥蒨宴宫仙人二里兮秀接楞伽丹霞桃花二塢兮青連吳嶺紅蓼渚兮紫薇村觀音岩兮吳王井治平寳積兮二寺相角姑蘇拜郊兮兩臺未冺行春越城二橋之雄偉御書綺川二亭之深靜魚城兮酒城殳涇兮彭涇越來溪兮未湮越王城兮半崩李墅新郭兮人多龍斷范村莫舍兮家有科名其物則田有嘉榖林有美木水有禽魚原有雁鶩芍藥如楊海棠似菽范村夀櫟綺川夀樸磬口之梅佛頂之菊傷荷藕兮梅花蕈吕公茭兮桃枝竹可以適口而充腸可以悦心而娛目其人則夫差之覇呉夀夣之分封抱越仇而思報乃扵此而卧薪叶雪檇李之前恥會黃池而爭雄可謂能慷慨以立謀隱忍而成功者也夫何狃會稽之得意謂桐夢其佳卜許敵人之行成受美姝與神木起姑蘇之髙臺乃荒滛而縱欲外伯嚭兮舌如簧内西施兮顔似玉朝絃兮夕管燕歌兮楚曲使國祚兮陵夷忍吾民之魚肉太子友徒借螳螂以為喻伍子胥空指麋鹿以忠告抑孰知甞膽之决於復讐猶疽囊之終於潰毒是以蘇臺之歌舞方殷而越溪之兵戈巳逼叶亟起視其四封蔑一夫之持矟嗟乎悲夫可為痛哭於是援舊恩以祈哀竟伏劍而瞑目何昔日之雄飛而今時之雌伏使仲雍之祀中絶而泰伯之風可忸蓋吉㓙由人自召非天為之禍福且也覽遺迹而懷古可殷監而警俗自是以來寥寥千載悵人物之巳非惟湖山之長在有宋隆興人才挺生則有文正范公一代人英銜命帝闕氣壓邉庭二府柄用誠哉股肱文章功業輝輝汗青所以光孝兩朝代有科名厯官郡邑循良有聲括田令下權要縱橫公獨違詔烈哉忠貞所以理宗制詞有仁人之褒至今為湖上之美稱然而丁謂何人亦來經營雖有真宗之詩難逃五鬼之評回視二公不啻井䲭之偎神鳳䑕糞之汙太羮者也惜哉天眷聖朝明良際會則有都司徒之功業許冢宰之聲譽朱訓導之文章呉同知之詩句莫侍郎與陳知府之勲名盛居密與張南村之髙致至於吾師順菴以卓行而諡貞孝吾父由菴以進士而膺郡寄御醫盛公三朝寵遇之數公者俱列鄉賢而祠百世者也其他科目聯翩簪纓熀燿或奮身於鶚薦或筆札之擅妙皆石湖秀氣之所鍾難以枚舉而相告客聞此言唯唯諾諾扣舷浩歌洗盞更酌俄而蘋末風起西山日落皎皎天上嫦娥動人間之鼔角舉百觴而共醉有不盡之餘樂嗚呼噫嘻人才之生何代無之誦孟子然而無有之句則知是湖也豈無如前數公之鳴於盛時者乎遊石湖記朱逢吉姑蘇之西不一舍而近有石湖可千餘頃岸左右皆居人襍植桃栁梅竹其下帀水率蒲荷菱芡之屬中涵澄波猶氷鑑然沙鳥飛帆出没徃來無虚時具區橫其南良田沃壤綿其東越來溪絡其北層巒疊巘環其西背具區行數十里至湖西而止峙為三峰盤旋如蓋由山麓抵絶頂可三里晉支遁嘗棲其上唐因建梵宇曰楞伽後立浮圖岌岌撐太虛若欲飛動前闢小殿列為神像者五自前代時城内外暨村落百餘里間男女稚耋當春夏月逺近各相率舟行載酒肴雜樂戯具徒行乘馬驢竹兠以壺榼食器自隨或登岸以樂神日肩摩跡接畢則宴逰以樂太平逮今如之今年正月余奉詔理水是郡偕呉縣判簿濟陽江君率民循行田間築隄防疏壅障遏奔激夙夜從事罔敢怠舟嘗過之未暇一登覽二月既望行次湖上適以風波遂輟棹登岸君曰今幸農事周水之泊田他鄉者巳漸縮惟濵湖歛否莫覩盍相與凭髙覽之遂登峰之巔四顧其下田向所謂溺者蒼翠覆阡陌井井乃矚呉西羣山如穹窿靈岩如天平陽山薦福如獅子横山黄山吳山小者離離如青鬟螺髻髙者列翠屏參差出烟樹杪湖波瑩然在足底殆天啓畫圖信為逰樂之境餘所莫及抵暮寺主僧德啓倒屣出翠㣲亭延觀雙冷泉掃榻以宿時治平僧清渭先在坐焚香煮茗相與清話翌日下山復歴諸村墟若木瀆若光福若橫金及過具區登包山督促成農功於是堤之圯者整頽者立坎者夷水以車力入於湖溪田野漸復故脩禊日舟過湖濵入治平精舍值僧渭松隂中相與尚羊觀吳之冽泉及深沙神池泉池所甃石巳撤毁所存潢潦一窪而巳遂縱歩登中第二峰披蓁蕪攝衣以上可三百武其顛方整若印故老相傳呉王夫差嘗即此為祀天之所俗因呼拜郊臺外繚崇垣循湖堤坡陀起伏如昔向有寳積寺居其麓今叢荆野蔓悉莽為狐䑕之墟興廢不常無足慨者獨其北第三峰未登翌日老僧淨日直其舍後薙荒穢取道叢篁曲折間攀援而上殆數十尋峰頂狀如磨故名茶磨山當石竅中出泉一泓不溢不涸甚清冽可愛峰之北下瞰湖尾瀦為蓮花陂山之環拱騰蛟翥鳳至湖以峙者竒秀萃此止峰誠中冠治平寺獨當之峰左則枕湖有二橋聯絡東曰越城西曰行春其傍有亭宇俯臨湖波乃即樵徑﨑嶇而下入面湖佛祠祠裂巨石鑿岩洞幽邃清絶襍樹隂翳樛枝交其上岩下泉一池黝碧深百尺許魚洋洋㳺其中飛石梁其上踰數仭過此而北岩中立石斵大士像前為小軒尤竒因少憩俄見樹杪懸一蛇可三四尺色蒼碧初疑為蔓童子以礫擲之輙昻首空中騰及他枝而去老僧以為異云至亭下有刻石湖二字字盈尺其兩間璽文一曰御書之寳小字三曰賜成大且有表文乃知宋人范成大當孝宗朝為參政乞歸老石湖故有是賜表即其上謝者按蘇州志載公以文學政事著名其歸於斯園堂亭榭㳺樂之所非一湖因之以稱今遺址漫不可攷獨湖北數里山曰天平文正公祠猶存今四百年山林蓊蔚如故所置義莊子孫䝉其澤未窮是知君子惟道徳為永世之本山水未足云然古明達士㳺覽所至必紀其見聞所以益智識今余老而無學於格物致知之道不敢不勉故記永樂二年甲申春三月五日檇李芝山老樵朱逢吉記御書石湖二大字跋范成大淳熙八年三月庚戌制書擢臣居守金陵閏六月丁亥朝行在所庚寅辭後殿翼日既望詔錫清燕苑中皇帝親御翰墨大書石湖二字以賜天縱聖能㳺藝超絶典則髙古如伏羲畫體勢竒逸如神禹碑日光雲章垂耀縑素環列改觀禁籞動色臣驚定喜極不知抃蹈昧死奉觴上千萬嵗夀奉寳書以出越五日至石湖藏焉石湖者具區東滙自為一壑號稱佳山水臣少長釣㳺其間結茅種木久巳成趣春秋時吳臺其隂越城其陽登臨訪古往迹具在汙萊露蔓千七百餘年莫有過而問者今猥以臣故徹聞髙清天光溥臨燕及荒野由開闢來未覩斯盛裴度李徳裕皆唐宗臣緑野平泉亦聲震當代揆今所䝉無傳焉何物么䯢獨冒寵赫百身萬殞莫能負載臣蒲柳早秋仕無補益縣官倘晼晩不休奸止足之戒則將上累隆知俯媿初服臣用是懼冀幸少日遂賜骸骨歸老湖上宿衛奎璧與山川之神暨猿鶴松桂同在昭回中一介姓名亦因是不朽使後世知臣屬厭榮禄得全扵桑榆以無辱君賜則陛下丕顯休命不委於草莽庶幾報恩之萬一臣既摩刻扁牓又被之琬琰以傳且附著臣之自叙云聖筆石湖大字歌楊萬里石湖仙人補天手整頓乾坤屈伸肘邇來化作嬾卧龍咳唾珠璣潄瓊玖五雲萬里天九重玉皇深拱蓬萊宫豈無九虎守閶闔北門半扉當朔風夜令雲師敕風伯鞭起卧龍湖底月湖水捲上天中央却鎖北門䕶風雪仙人御風乘綵雲玉宸殿上朝帝真帝將北斗酌天酒氷桃碧藕脯麒麟傳呼玉蜍吸銀浦黟霜調氷澆月兔洒成羲畫河洛書白璧一雙浮雨露石湖二字天上歸奎星璧宿落山扉昭回不飾吳苑艸姑蘇臺前近太㣲詩人不直一杯水自是渠儂命如紙教人妬殺石湖仙手攬星辰懷袖裏又約鄰人至石湖范成大窈窕﨑嶇學種園此生丘壑是前縁隔籬日上浮天水當户山橫匝地烟春入葑田蘆綻筍雨傾沙㟁竹垂鞭荒寒未辦招君醉且吸湖光當酒泉與周子充侍郎同宿石湖幽香馥蕙帳清夢安且吉蘿月墮蒼茫松風隱蕭瑟曉禽啄且鳴喚我起盥櫛鈎忩納雲濤灧灧浴初日金鉦忽騰上倒景落書帙佳晴有新課晒種催蓺秫從今不得閒東皋草過膝壬辰三月十八日石湖花下夜飲海棠月朝漱山茶露􅋯儒枯木形受用侈如許荆扉隔黃塵誰識花島路惟有瘦筇枝共飲園中趣林神釀餘春政爾美無度蔥蘢千萬重芳意未渠暮風香薦秀色鼎爼謝腥腐雖無稻粱謀捫腹有餘飫壬辰七月十六日侵晨石湖路中書事白葛烏紗稱老農溪南溪北水車風稻頭的皪黏朝露歩入明珠翠網中初歸石湖曉霧朝暾紺碧烘橫塘西岸越城東行人半出稻花上宿鷺孤明菱葉中信脚自能知舊路驚心時復認隣翁當時手種斜橋柳無限鳴蜩翠掃空次韻蜀客西歸者來過石湖并寄成都舊僚走遍埃塵倦鳥還故鄉兀在水雲間黃梁飯裏夢魂醒青箬笠前身世閒鷗鷺飛來俱玉立松篁歲晚各蒼顔岷峨交舊如相問鐵鎖無扃任客攀次韻同年楊使君同泛石湖舟中見贈客舫中流下人家夾岸看洛花堆錦煖吳藕鏤氷寒莫厭清歡暫湏知後㑹難小詩煩本事任秃彩毫端曲誤不須顧客狂當好看日斜雙槳急風駛夾衣寒賸説歸田樂休歌行路難石湖三萬頃何處覔憂端北渚乘風渡西山帶霧看袖單嫌翠薄杯淺怯金寒宿雨収全易春酲解却難且留行色住重肯過蘇端乾道辛卯嵗三月望夜與周子充内翰汎舟石湖之間夜艾歸宿農圃距今淳熙巳亥九年矣余先得歸田復以是夕泛湖有懷昔遊賦詩紀事石湖花下浮春空憶共仙人同短篷三年半醉吹笛去棹入濕銀天鏡中鶴鳴喚歸斗未没却歩扶疎花底月不知行到碧桃邊但見天風吹積雪月圓月缺今幾回依舊滿湖金碧堆仙人還上玉堂宿合有片時清夢來一笑流光飛電抹嫦娥相對兩愁絶桂枝應亦老無花蟾光不須疑鶴髮晩歸石湖何須車馬炫鄉關只作歸農老圃看夢裏曽腰青結佩年來新着惰游冠和烟種竹聊醫俗帶月聞蛙不在官久矣此心恬不動如今併與此身安午窓遣興家人謀過石湖雲日初収破柱雷小窓坐穩興悠哉熏爐花氣朝酲解茶鼎松風午夢回謝客門蘭風動竹惜春時節雨肥梅畫船破浪亦一快聞道湖光如醱醅將至石湖道中書事水綠鷗邊漲天青雁外晴柳堤隨草逺麥隴帶桑平白道呉新郭蒼烟越故城稍聞雞犬鬧童僕想來迎三月十六日石湖書事三首春事日以闌暑隂正清美拖筇入林下秀緑照衣袂盧橘梅子黃櫻桃桑椹紫荷依浪花顫笋破苔色起風日収宿隂物色有新意隣曲知我歸爭來問何似病惱今有無加飯日能幾掀髯謝父老衰雪巳如此種术二十年手開南野荒苒苒新嵗月依依舊林塘汙萊擅下濕岑蔚驕衆芳麥母尚能瘦竹孫如許長憶初學圃時刀笠冒風霜今兹百不堪裹帽人舞將龍鍾數能來猶勝兩相忘湖光明可鑑山色淨如沐閒心愜舊觀愁眼快竒矚依然北忩下凝塵滿書簏訪我烏皮几拂我青氊褥荒然賦逺逰幸甚遂初服老紅餞餘春衆緑自幽馥好風吹晩晴斜照入疎竹兀坐胎息匀不覺清夢熟石湖中秋二十韻十二年前嘗與工部兄及賔客為此逰今有隔世者懷舊而作野外行吾意城中寄却愁半秋三夜月千古五湖舟湧地金芒發行天玉鏡流珠星沉不現銀漢黯如収髙浪連三境長風近十洲水天雙對影身世一浮漚逈白包元氣空明熨病眸只憐心浩蕩不管髩颼飀放棹眞狂矣關門有此不四并非易事一笑亦難謀急管參漁笛清歌間棹謳逢迎成邂逅嘯咏勸綢繆女擷蘋花獻妻傾竹葉酬今宵如不飲何處可忘憂憶昔誰同賞於今嵗恰周陟岡睽魯衞伐木愴應劉獨嘆靈光在能追汗漫逰大都縁未盡豈是病都瘳縱意褰篷席輕生倚柁樓節宣誠小爽猶勝賦悲秋與㳺子明同過石湖契濶相逢一笑懽當年森桂共驂鸞試談舊事醒村酒仍趂新晴煖客鞍梅粉都皴啼宿雨栁黃不禁展春寒從今鼎鼎多幽事仍喜蛙聲不在官次韻徐提舉㳺石湖三絶三徑荒蕪岫愰開錦車何事肯徘徊春風想為髙人住落絮殘花好在哉日脚烘晴巳破烟山頭雲氣尚披綿却須多謝朝來雨洗淨明湖鏡裏天天上麒麟翰墨林當年手筆擅文心欲知萬頃波中意但向三篇句裏尋除夜自石湖歸苕溪三首姜䕫細柳穿沙雪半消呉宫烟冷水迢迢梅花竹裏無人見一夜吹香過石橋笠澤茫茫雁影㣲玉峰重疊䕶雲衣長橋寂寞春寒夜只有詩人一舸歸桑間篝火却宜蠶風土相傳我未諳但得明年少行役只裁白苧作春衫遊石湖鄭元祐越來溪上水融融閒驀䲭夷棹底風暖霧黃消治平寺燒痕青入館娃宫笙歌作樂年年少魚鳥關情處處同弔古從來易興感尚循華髪繫孤篷陪陳敬初逰石湖戴良束髪企名都宦逰及兹年遂陪登瀛客來上汎湖船水光耀殘日林影溢中天岩穴停橈見樓臺鼓枻看蒼蒼歛暝色羃羃曵寒烟菰蒲有餘淒鷗鷺相與閒窈窕趨迴浦蕩漾媚遙川水宿怯宵清篷卧愛月穿俯視潛夜魚仰睇衝曉鳶窘身懼浮霄歛迹慚躍淵何當謝冠履歳晏此盤桓石湖寫景髙文度闔閭臺下越來溪處處西風颺酒旗翠壁丹梯開短軸黃花紅葉入新詩鎔金霜蟹需髙價蘸甲香醪輒滿巵落日去程驢背穩短琴雙笈一童隨與客攜樂逰寳積山汎石湖髙啓雲山擁春郭烟花漲晴川看花入山中諸峯恣攀縁客吹玉管笙合以金柱絃清音度碧嶂松風助泠然宛若鸞鳳吟要眇入紫烟行人盡矯首謂遇雲中仙下山興未闌相攜更登船虹収嶺外雨鳥没湖中天嵐翠破夕陽樓閣影倒懸酒傾緑脂膩鱠斫璚絲鮮獨恨無紅粧清波照嬋娟㣲風吹帆緩欲使歸途延衆賔起懽呼舟仄水浸舷迴艫掠寺過楊栁山門前此地有離宫美人艷當年羅裙罷春舞艸色餘芊綿况我惜此逰冠蓋十里連重來復誰在新知滿中筵人事竟若斯今古俱可憐能逰即稱達何須問愚賢我欲叫馮夷捧月出海邊醉後不歸去月照舟中眠石湖與戴叔能懷雪坡大參陳基乘時登掃匪㳺盤故舊相攜盡楚冠兵革戰爭雖未息湖山陶寫有餘歡輞川賔客惟裴廸江左功名獨謝安想見鳳凰池上路秋風吹佩玉珊珊石湖送别王汝玉青山嵯峨雲外起下有澄湖綿十里春風吹雨洗吳天天淨湖明玉鏡圓范公昔日曽逰處水色山光帶烟樹春明畫舫載笙歌獨有逰人自來去美人從此赴京師湖上楊花正亂飛歌罷湖船前度曲珮聲歸去侍丹墀至正戊子春季雨中張伯玉顧仲瑛同遊石湖諸山宿寳積寺賦花㳺曲楊維楨三月十日春濛濛滿江花雨溼東風美人盈盈烟雨裏唱徹湖烟與湖水水天虹女忽當門午光穿漏海霞裙美人凌空躡飛歩歩上山頭小真墓華陽老仙海上來五湖吐納掌中杯石山枯禪開茗盌木鯨吼罷催花板老仙醉筆石蘭西一片飛花落粉題蓬萊宫中花報使花信明朝二十四老仙更試蜀麻牋寫盡春愁子夜篇和顧悳輝真娘墓下花溟濛碧梢小鳥啼春風蘭舟搖搖落花裏唱徹吳歌弄呉水十三女子楊桞門青絲盤髻鬱金裙折花買眼一回歩蛺蝶雙飛上春墓老仙醉弄鐵笛來瓊英起作迴風杯興酣鯨吸瑪瑙椀立接鳴筝促象板午光小落行春西碧桃花下題新題西家忽遣青鳥使致書殷勤招再四當筵奪得鳳頭牋大寫仙人蹋踘篇九月八日逰石湖與祝大參劉廷美僉憲聨句待韓永熙都憲不至徐有貞明日重陽今日逰攙先來賞石湖秋青山有意邀詩棹黃菊多情送酒籌烏帽任從風外落緋袍不向坐中留同歸同老應難得莫把茱茰嘆白頭次天全諸公石湖聯句韓雍吳下衣冠集勝逰扁舟逰遍五湖秋未能執筆陪聯句懶得逢人説運籌緑野文章傳在洛赤松心事棄封留賡歌趣我歸來興莫道非才尚黒頭石湖氷阻聨句王鏊西首戀松楸扁舟乘曉發行行抵斯湖銓望望指巨缺曽氷塞長河流澌截輕筏鏊大塊噫餘威𤣥冥令仍烈帆集比魚鱗㟁妥蜕龍骨銓人斷越城橋雁杳堯峰窟鏊嵯峨峙玉山璀璨恍銀闕或碎若彫鎪銓或銛如斧鉞或垂如玉釵或挂若象笏鏊鼇足欹莫支鵬背負如閼銓造煩魯遽工解倩師襄哲夏蟲語應疑鏊宵孤渉還歇戒自履霜初銓藏豈凌隂節山腰助谽谺澤腹増嵽嵲鏊上下眩坤乾東西混吳粤王祥鯉莫持銓孟宗笋堪掘國忠信難倚靈均未須淈鏊進如狼跋胡行乃車無軏舟子立招招銓行人意忽忽一葦未能航五丁未渠伐鏊飛渡諒斯難來歸怪時咄况當陽生辰正值春王月誰乘浮海桴鏊莫惜凌波韤行止豈偶然聊歌記顛蹶銓石湖兹地屢經行孤亭坐寥濶今來悚具瞻畫棟映轇轕久聞玉川史新表石湖嶭緬懷文穆公弗翦越城茇穹廬受書爭勁氣凜莫奪岷峨開府議髙深藐誰剟阜陵借褒賁益國推挺拔天鏡閣澄泓玉雪坡達枿甫辭狼胡疐尚説虎須捋因人地逾重懷古心尤渇嵗事薦蘋蘩登庸紹衣鉢鄉里重衣冠邦君事袒割君功巳奏成我冗敢辭撥方愁積潦深忽見隂霾豁天公如有待我興其可閼舟借花邊維道屏松下喝未獲從駿奔猶幸瞻履山僧具袈裟田笠襍緇撮展席俯清泠開園擷芳辣野坐厠漁樵叢談參毳褐呦鹿杳不聞㳺儵瀅堪掇盟與沙鷗親吟免山蟬聒陳跡俯頹垣流芳仰先達五湖勝全貢三峽恐始脱帆影逺若凝波光澹如醊石梁臥湖心浮圖見林末髙歌和滄浪清夢𣺌黃闥倡酬忘詮次今古藉囊括歸帆指西日天際雲一抹舟過上方湖桑悅前輩髙賢汎石湖許多好句落姑蘇傷哉兩度湖邊過舊學荒來一字無過石湖徐源湖山不改鬢成秋老興春深一放舟楊栁堤前黃鳥立桃花洞口碧溪流峰巒迓客留青髻波浪驚人自白頭萬里雲霄今杖履祇將風月錦囊収江神子石湖避暑楊循吉船頭翹足卧湖風火雲紅有竒峯多少雲山都在醉眸中萬頃清涼消不盡飛鳥度鏡光中蓮花開遍水晶宫玉玲瓏錦香穠燦燦上方金碧聳虚空痛飲從來真得計堪愛賞碧荷筒泛石湖皇甫信橘緑柑紅秋暮天畫船雙槳石湖邊西風吹酒不知醉落日㣲㣲鎖淡烟諸友泛舟石湖還次治平蔡羽水氣連山靄晨逰夕未窮烟中懸磵暝天畔躡雲空新月在潭底百花燃鏡中竹房禪榻穏處處愛山翁逰石湖記非髙山不能驅吾神非深林不能沈吾思逰虎丘之一日求石湖焉時少雨春盡漲未起舟梗於越來之溪客刺木掲跣始獲登遵岸百歩得茶磨之觀音岩間行憩岩中為間從者至又百歩得治平寺之竹林西起茶磨東繞拜郊臺其山皆墻立其腹多怪木美箭望之蔚然深黒治平之林樾也從郊臺東走環突奔聳為楞伽山顛為楞伽寺有浮圖插雲中呉西南之鎮也竹林逮楞伽不及五里峻甚多石客始輿負以升浮圖之前平展百餘歩有亭其上曰望湖之亭於是石湖徑其陽梅灣出其背左引靈岩右帶呉淞不出十五里林巒疎秀水風清潔生雲之山出泉之谷咸會亭下客始定飲於亭而臨觀焉夫治平深林楞伽髙山入其深搜𤣥鈎僻萬化俱冥登其髙心空目開萬象俱顯於一日之逰而兩極其情四月竹脱節松生花草木灌茂玉膏出林與泉俱香服之巳暍而神生主人王履約讀書石湖蓋三年矣用能抽其竒奥以與客共暮不謀歸而忘其倦則兹逰也王子之功蔡羽記石湖秋汎同段户部子辛文太史徴仲之作王寵濩落類莊瓠㳂洄依孔桴𡨕心委江海屏迹逃人徒鶴厲申獨往蠖屈謝當途持此百年操居然山澤癯兩賢顧同調枉楫臨家湖駢筵屬秋序嘯侣遘元夫初旭洩雲翳落景鮮霞鋪重霖豁朗霽商氣集髙梧南陵絢丹碧北渚冒菰蒲瑤甍遞隱見羽節時有無陟峴禮精室乘峰眺名郛神超體自逸世往迹與徂弔古指逰鹿歡今懷過駒請君謝天伐畢慮収桑榆雪後石湖與諸友同汎二首共有丘中好而揚江上舲花潭氷漾緑松嶺雪含青霽色迴銀漢鮮雲卷畫屏子真歸舊谷為報北山靈其二多才自潦倒孰謂古人無雪照王恭氅雲開范蠡湖故山饒酒伴修竹有行厨且逐林中鹿安能轅下駒石湖作勾吳山水秀西南雲白天青萬嶺含峭壁搏風時卷浪平湖湧日恣成嵐金支翠節虛無見貝闕銀宫縹緲叅漭漭乾坤秖自役草堂長枕百花潭石湖石湖秀色那可奈蛾眉埽鏡丹青開飛浪九天蹴牛渚落霞千里臨髙臺呉王醉卧不復曉西施載去何時來當杯未足轉愁夕霜露沾衣鴻雁哀石湖作自得名川勝沿洄殊未窮秋髙千嶺出地濶五湖空古堞雲橫雉懸梁影卧虹樓船催畫鼔野寺落丹楓綺席波光蕩紗窓霧氣通山人何惜晚歸路便樵風湖上八絶句石湖春色大可憐却似美人明鏡前錦甸平鋪鴨緑水白雲飛動蔚藍天星橋北挂瀉春流映出黃山水面浮霞石天青飛練鵲桃花氣暖醉輕鷗春山面面翠屏開盡繞吳王百尺臺一代覇圖憐燼滅五湖流水恨東迴越來溪上栁千絲畫鼓樓船晚更移一曲紫雲歌越女雙鬟白雪舞呉兒三月暮春春服成含風疊翠越羅輕主憎乳燕撩春色轉遣飛花蕩酒情數松磊落千尺强恰如天際羣龍翔吟風嘯雨聲瑟瑟大澤深山藏棟梁登山臨水春將歸獨樹桃花猶未飛玩世繁華真歘忽後時顔色轉霏㣲古木朱藤疎著花淡雲斜日淨江沙黃金臺上無推轂白石山中有嵗華同王子美湖上看月二首百尺星橋卧綵虹青天飛鏡水涵空憑君看盡人間月誰似湖山枕簟中酒榼茶鐺歩歩隨春江花月夜何其故人明日京華去任説山公倒接䍦湖上逢曹子繩之童子論交二十年舊逰零落巳茫然石湖三月梨花雨忽漫相逢野寺前湖上郡峰合沓錦屏圍樹色泉聲帶晩暉盡日拏舟無一事平川十里看鷗飛脩禊石湖作有引袁􅐆嘉靖丁酉三月三日上巳也其日又為穀雨既欣令節乃集良朋爰脩禊於石湖羨羲之之山隂希㸃也之沂水不有賦咏何以述志陶情乎乃作此詩以倡同㳺之士大化陶天地令節屆春陽澄湖包廣皋翠嶺連崇岡嘉儵躍以嬉𡨕禽翩髙翔㣲雲靄逺霄冷風吟脩篁雖無絲與竹散懷藉壺觴神怡理自足心暢憂可忘既咏舞雩什載奏山隂章悠然傲千古焉用㳺羲唐同諸文學避暑石湖二首理棹泛湖隂停橈占水心風簾煩暑隔氷檻薄寒侵劇飲方河朔良儔選竹林蓬壺何處是只向此中尋彩鷁浮天上紅粧照鏡中歌翻金縷曲人住水晶宫酩酊山公似清狂賀監同歸舟不惜晩為戀舞雩風江寺副季春過飲橫塘莊遂同汎石湖每逢北使問京華忽漫停驂野客家小飲花前張艸具勝逰湖上附仙槎納涼宴坐迎風便聨句忘歸恨日斜怪爾别來才思進江淹今巳筆生花石湖次彭孔加韻秀嶺雲藏鳳刹澄湖月偃虹梁風帆逺隨落雁漁網髙挂斜陽石湖送徐太史子升胡纘宗委佩乘雲入鳳池綵毫染露立丹墀仙桃春醉承顔久御栁晨分退食遲五色初裁天子詔千秋還上侍臣詞石湖風雨那為别白雪陽春獨爾思春日展墓還眺上方石湖皇甫涍松塋畢哀酹返景陟田園天溟悦虚滉霄崿麗嬋媛霞波影共爍鷗鳥自翩翻珠宫鬱翠㣲石磴靄雲門復兹美春仲華日散皋原烟蘿搖絳瀑花竹引清源紛吾羈宦客五載夢歸軒囘首愧伊昔逰目暫遨魂弭節澹容與平蕪落照繁誰能别此去空響北山猿春日石湖望入空氲樹影㣲山雲湖水競芳菲自隨春色桃源去却笑秋風江上歸石湖在白洋灣之北界呉縣吳江之間有茶磨諸峯映帶頗為勝絶相傳范蠡從入五湖處初不甚顯得文穆公而名始大著呉都文粹續集卷二十三
