body:
  text: 吳都文粹續集巻二十明錢榖撰山虎丘山賦繇金閶以北返兮越山塘之七里盼浩袤于平疇兮倏奰屭之崛起儼員嶠而可即兮僅隔乎一水維南迤以入門兮躡仄磴而逡廵冒樷鬱之𤣥䕃兮莓蒳澾而積茵度嶺抵廣硎兮綽可坐夫千人指崛屼之堂封兮於焉弔古曰闔閭之靈竁兮乃在其下粤瘞之三日兮何來乎踞虎由王之好劍兮繫乎衷情殉三千之夥兮扁諸魚腸之異名鏤銀鳬以泛汞海兮遂上發乎金精故結於菟而皎白兮猶帶西方之色訝靈物之迸騰兮劃兩厓而壁立作延平之龍兮躍蚴蟉之千尺通海眼之津津兮渟以為池浸寒碧而瑩徹兮滉而漣漪可潤渴吻兮濯化衣之緇西有陸羽泉兮乃甓甃之方井嘗品為第三兮味曽莫之並時汲以試茗兮牽轆轤之修綆東有石池兮號生公之講臺澄濎濙以周帀兮中擁乎崔嵬謂磥砢皆㸃頭兮殆妄傳其誕哉前有揮巨闕者劈盤陀之齊裂湛憨憨之清冷兮恒不漲而不竭祠以祀短簿兮由其舊營之別業厥後有磵兮遁仙曩占以養鶴登軒則小吳兮示姑蘇于掌握凭樓以望海兮𣺌蓬瀛于遼廓得勝景之過半兮在可中之孤亭所謂接應之不暇兮置物象于丹青欲實三絶之譽兮須崇巔之一登陟五臺以環眺兮萃羣山之滿目逺浮蛾眉之淡掃兮近滴螺黛之可掬肆舒嘯于千頃雲兮湖蕩極瀰漫而漾緑構梵宫殿閣之雄傑兮梯巖架壑之崢嶸聳浮圖于璇霄兮響机簷馬之錚錚奞音迅又音雖翬飛之鸞鵠兮金碧綵繢之晶熒旁花木之深幽兮曲徑通而寥閴颺禪榻之鬢絲兮香烟裊乎經室囂坌因而斂蹤兮奚庸袪乎塵拂若此之靜閒兮漠不知其幾處挾耄以夷猶兮洗煩慮聞所聞而來兮得見所見而去羌遊者之衆兮交冗襟而纚連拉儕伴之什伍兮紛魚貫而蟬聫寡約拏夫沙棠兮奢侈駕乎樓船摐鉦鼓以鍧闐兮奏絃管之淒切絢綺羅之璀粲兮列珍饌之整潔㵼鴟榼之彤霞兮氣氤氲而凛冽兼夫柔淑而㛹娟兮騁刻飾而靚妝嫚豔冶而閒都兮耀珠翠于釵梁式徘徊而容與兮飄褕絏之蘭香宜春陽之趁競兮閒有取乎秋清當炎寒而逮至兮亦靡阻乎隂冥曽弗少感于懷兮率蚩蚩而醉醒嗟古之人不可得而見奈世逺莫值兮激光隙于流電賴紀載之猶存兮豈弗可徵于傳漢清逺之詩兮迥簡古而拔俗梁野王之敘兮良膾炙乎口讀王内史之銘固瞻兮謝太守之賦則獨厯唐白傅之屢遊兮劉禹錫題之不同酬陸乃尚權輿兮詞翰傑出乎魯公佳致誇用誨洎德裕兮唱和由襲美而龜䝉其他靡可悉數兮逮趙宋為尤盛禹偁堯佐之律絶兮近體特重夫文正舜欽伯玉之長篇兮東坡吐摩尼之照乗其他長文寔備諸詠兮與子厚之律咸嘉王紳孫覿而何麒兮摛詞各爛乎天葩程俱方深共擬選兮抵元匪啻數十之鳴家我朝文獻之踔厲兮讓太史髙之開先吉安楊少傅之撰記兮擅史筆之如椽累集幾數百首兮四韻迭推夫大年爰勒諸珉兮或昭之于册輝奪貝錦兮聲諧匏石揆後來繼作兮猶未艾而暫息怪幽獨之慌惑兮曷鬼神而吟之傷悲愉悦踰廿稔之遐兮始足一句之竒皆山中之故事兮宜後人之所知後人之可知兮盍亦鑑夫前修昔有居而志隠兮則廬江之何求洎其弟㸃𦙍兮立心操行之皆優及寓此而淑郵兮為伊洛和靖先生道學出乎程門兮表吾儒之儀形闢書院以授受兮講述闡乎聖經羨流風之未泯兮髙山于焉而仰止法休德以服膺兮侑途蹈夫遺軌豈尋常之事幾要始終究竟乎至理乃作歌曰邱山之殷殷上抗浮雲兮邱山之亹亹音門山繼斷水處弗見哲人兮信賢哲之可見由此心之不殊兮心茍求之彌篤即與伊人俱兮脫恣夫賞適而罔覺其故兮若棄商鼎而寳康瓠兮昧識孔履而闖武庫兮告樂遊于吾子兮覬内走之狂鄙兮毋般誚以為詡兮試劍石賦王寵石在虎丘道傍云吳王鑄劍成而試之或云秦始皇掘得吳殉劍而試之兹兩存其義云赤菫之精耶溪之英伉儷剪爪百鍊始成太陽五金寄氣托靈龜文縵理價重連城其鍔瑩冰其鋒凝霜脊挾霆威鐔流電光赬烏揚輝慧雞刷芒斂以鵜膏磨以粤硎走蚴蟉于娑竭飛夭矯于旋冥十步去一人千里不留行惟時皆順理之事當晦其迹而國有逆理之謀則見其形故無道則去有道則呈也就爾長一國者用之盍斫長頸之宿仇可刎佞舌之宰嚭夫何反賜乎忠臣是倒持而莫知所以乃自絶夫至德之開國致伯業之就圮俾若君天下者得之宜斬臂鷹之禁術當誅指鹿之閹豎夫何反加乎令子是逆施以亂夫人紀乃自傾百二之山河致鮑腥之不已妄肆一時之暴空遺萬年之恥於乎青天可倚白雲可決雖有利器兮那克任其剛烈博浪之挫未明靈姑之辱莫雪彼盤陀有何辜兮徑劈之齊裂徒裝駕乎猛鷙曽未剪除乎妖孽想當時破嶪嶭震訇剨號罔兩于巖扃飛大電之列􅆙駭海山之巨靈迸丹丘之鬼血故于厯世之千祀猶存雲根之兩截蝕苔蘚之青蒼示􅥀磷之瞥屑使後人之來觀訝靈蹤之未滅顧世事之若兹爰長歎而欲咽遊虎丘賦楊循吉汎清溪之浩蕩依茂樹之隂森觴循環而緩轉句搜索而長吟山巍巍以在目風瀟瀟而滿襟歎人生之難偶嗟白日之易沈知江湖之無味思丘壑之可尋藤垂樹以蛇挂草沒岸而腰深應空巖于響屐答幽澗于鳴琴願逍遥而至暮忽輕動于歸心虎丘山序顧愷之吳城西北有虎丘山者含真藏古體虚窮𤣥隠嶙陵堆之中望形不出常阜至乃嵒㟧絶于華峰闕虎丘山序顧野王夫少室作鎮以峻極而標竒太華神掌以削成而稱貴若兹山者髙不概雲深無藏影卑非培塿淺異疎林秀壁數尋被蘭杜于苔蘚椿枝十仞挂藤葛于懸蘿曲磵潺湲修篁䕃映路若絶而復通石將頹而更綴抑巨麗之名山信大吳之勝壤若乃九功六義之興依永和聲之製志由興作情以詞宣形言諧于韶夏成文暢于鐘律由來尚矣未有登髙能賦而韜斐麗之章入谷忘歸而忽鏗鏘之節故總轡齊鑣競雕蟲于山水雲合霧集爭歌頌于林泉于時風清邃谷景麗修巒蘭佩堪紉胡繩可索林花翻洒乍飄颺于蘭臯山禽囀響時弄聲于喬木班草班荆坐磻石之上濯纓濯足就滄浪之水傾縹甆而酌㫖酒剪緑葉而賦新詩肅爾若與三徑齊蹤鎗然以共九成偕韻盛矣哉聊述時事寄之翰墨虎丘山紀畧王珣山大勢四面周嶺南則是山徑兩面壁立交林上合蹊路下通升降窈窕亦不卒至闕與沈炯書陳張種虎丘山者吳岳之神秀者也雖復峻極異于九天隠磷殊于太一襟帶城傍獨超衆嶺控繞川澤顧絶羣岑若其峯厓刻削窮造化之瑰詭絶磵杳冥若鬼神之彷彿珍木靈草茂瓊枝與碧葉飛禽走獸必負義而膺仁是以厯代髙賢輕舉栖托梵臺雲起寶刹星懸自非玉牒開祥金精藴耀豈其神怪若此者乎答書沈炯若乃三江五湖洞庭巨麗冩長洲之茂苑登九曲之層臺山髙水深雲蒸霧吐其中之秀異者寔虎丘之靈阜焉冬桂夏柏長蘿脩竹靈源秘洞轉側超絶逺澗深厓交羅户穴從永陽王遊虎丘山詩張正見滄波壯鬱島洛邑壯崇芒未若兹山麗岹嶢擅水鄉地靈侔少室塗艱像太行重巖標虎踞九曲峻羊腸溜深澗無底風幽谷自涼寶沈餘王氣劍隠絶星光白雲多異影丹桂有叢香逺看銀臺聳洞塔襍山莊瑞草生金地天花照石梁遊虎丘二首王鏊年來偪仄縁何事咫尺溪山到未能郭外清遊還送客林間軟語忽逢僧空庭石在頭寧㸃溪壑龍亡氣尚騰不必懸厓留姓字古苔埋沒幾人曽出城便愛小嵯峨濯足還來碧澗阿飛磴未躋先慘慄斷碑欲認更摩挲溪山有待登臨久今古無窮感慨多我比樂天官更適十年一到意如何奉陪石田先生登覽虎丘楊循吉中年棄予組丘壑固夙心窮探雖未暇邇勝或可尋睠兹西郭表平陸起孤岑水石多秀麗委曲抱幽深丹砂炳雙峽翠罽暗千林何但遊人樂翔泳皆魚禽攝膽靈淵瞰流目髙閣吟况奉鹿門屨𤣥言承滿襟撫已良自足終老復何歆游虎丘和姚侍御闔閭城外虎丘山半日工夫往可還粉牖起船横水次布袍便體混人間石池對闢泉長定寶樹爭開蕊欲殷邂逅禪僧見趺坐世途逾覺倦躋攀虎丘閒泛與伯虎同賦名巖佳麗冠吳州永日逍遥榜綵舟菡萏含嬌呈水面蔦蘿垂䕃覆人頭寂谷𤣥蟬藏影嘒長阿蒼狖領羣遊翠幌金尊何限樂欣逢絶詠媿難酬仲夏三十日奉陪𢎞農楊禮部丹陽都隠君虎丘泛舟作詩一首唐寅朱明麗景屬炎州蘭橈桂楫遂娛遊逐䕃追飇暫容與囘波轉藻若夷猶日承綺扇釵光發山入仙杯酒氣柔幸奉瑶麾論所願皓首期言伏此丘遊虎丘和錢學士韻劉珏仙人騎鶴下瀛洲短簿祠前作勝遊山閣髙寒簾捲暮海天空闊雁來秋洞中棋為消閒著石上詩因弔古留翫水尋山雖可樂紫泥只恐召韓休遊虎丘伊乗舟行山在眼到門山忽失去郭近七里攀磴窮百尺巖姿互明晦潭影窅深黒步倦松暫憩醉眠草堪席不逢鑄劍人猶覩試劍石臺殿半空起雞犬下方隔經聲雜梵唄禪定悟空寂晉唐厯刦多劉白不世出閒劇固殊調登覽各有適重來預作期昨遊宛能憶了性未有因寓形何苦役依此憺忘歸于焉永終日虎丘同王元勲韻凌虚閣勢俯千門在野春光過二分極目天長隨去鳥盪胸山近欲生雲豪華誰復矜門地圖志猶看載舊聞何幸與君成老大相從林下息塵紛春盡虎丘蔡羽日日憂花謝開門緑已齊煖舒雲外服靜轉樹中梯泉古近丹井山空聞碧雞年年春易去列籍俯迴溪春日虎丘名山正與官城近遊女朝朝朝佛壇桃花隔竹飛紅雨游絲牽粉入雕䦨金尊落日江南逺瓊井流香法水寛我欲著經流嵗晩生公明月逼人寒夏日虎丘新開石閣紫芝香遥見松杉隠碧房竹裏鶯啼方日午山頭人坐喜泉涼傳來貝葉繙經古掃得苔花鬬茗長直北數川當檻白晚來帆影轉微茫秋日虎丘陪顧台州二首石壁開青道烟霄結紫閭霜凝秋壑秀人立曉闌虚屢滅雲邊雁傳聞花外車台州才曠達客思亦蕭疎日落歌不已江南滿目烟霜危沙葉紫鳥映浦花鮮屐齒臨虚磴茶爐覔冷泉生公月未起思借上方眠觀郡守胡公所開虎丘新跡顧璘胡公絶代才宰物有精識剖符鎮全吳揮霍破餘力公庭寂無事惠化浹疆域虎丘古名阜標榜厯千億豈乏巖壑姿往往厭偪仄公來登層巔四顧生壯色海岳氣蒼茫曠然吐胸臆剖垣發蒙蔽芟穢出佳植洞庭七十峯厯厯移坐側古人總合愧神鬼難秘嗇華構嵌青巘面埶各有得匪惟拓形勝實以表名德竒文掞精靈光映斗南北古篆蛟螭蟠穹厓示深刻裁成演心神丕變昭政式煜煜千載名永以重吾國遊虎丘二首畫舫疎簾雨溪門落木秋黄花仍對酒白髮兩登樓古井泉香發荒池劍氣浮驅馳吾已懶誰共老兹丘故園初入望嘉客且同盟倚檻觀秋稼吟詩對晩晴浦寒鴻雁起天暝水雲横急管休催發悲歌正有情陪鄭劉二户部徐翰林遊虎丘胡纘宗看山夏日長清茗坐山堂駟馬金閨彦蠻箋玉署香石開泉自出虎伏劍空藏鼓棹隨明月盈盈物外鄉與客登虎丘崇丘夏日涼竹石映空堂樓迥山俱集溪虚寺欲藏詞人奏大雅孺子歌滄浪無那南風迅荷花棹逺將夜登虎丘秉燭登虎丘八月星漢流牙璋迎萬户皁蓋引諸侯溪轉迴雲霧池虚動斗牛佛燈忽千㸃𤣥塔水中浮陪王侍御登虎丘次韻二首春花爛漫照山梯乳燕飛飛自掠泥庭上月華猶繞座池中劍氣欲沖霓三江鶴近招能集十島雲多望不迷驄馬行空風日暖翩翩寶塔望天躋清泉白日照吳門駐馬停杯日未曛塔影青圍江左樹殿光紅映海東雲靈池窈窈能留客明月娟娟欲傍君詩罷聞歌掃花座遷喬春鳥語初勤與客登虎丘望姑蘇臺率然作天上姑蘇繫虎丘迢迢一水傍空流海雲盤鶴庭前起紅樹圍山塔外浮寶劍空餘吳苑草荒臺猶是越姬樓青天斗酒李白醉落日孤帆謝客游再入虎丘聯檣入虎丘又是一年秋海月盈盈起江雲嫋嫋流虎丘次韻虎丘水竹繁二月風花冷歸去月凌溪姑蘇動髙影登虎丘千頃雲閣秋日坐虎丘海鶴盤孤影上有月一方下有雲千頃與湯子重遊虎丘王寵武陵不在逺人事故相違雀舫多君興鶯花日夕稀翠憐平水樹紅指麗人衣江山與歌舞一見一魂飛虎丘作平楚江湖漏炎方霖雨繁排雲攀古磴倒景嘯飛軒靈氣通丹穴天風弄綵幡清虚自無暑吾道賁丘樊劍池伏檻觀竒壑輕身搏翠屏山虚雲裊裊石鬬水泠泠錯落金鳬影翺翔鐵鳳翎風胡去已久神劍泣精靈酌陸羽泉曽甘惠麓水今酌虎丘泉石乳疑飡玉茶經似草𤣥登臨悲代謝著作總留傳挾醉下山閣千林落日懸雪中遊虎丘袁袠瑞雪從空下名山入望來珠林紛玉樹寶地起瓊臺絮雜囘風舞花迎淑氣開剡溪滯幽賞日暮且徘徊雨中遊虎丘愛春常恐盡冒雨亦來遊北郭摇蘭槳山塘近虎丘樹林攒寺密澗水雜花流日暮憑髙閣千峰嵐氣浮陪孟僉事望之登虎丘山孫太初停舟倚暮色開醆對江濆山迥朱薨出鐘鳴碧殿聞林花交野岸石壁動春雲落日狂歌客登臨興不羣偶遊虎丘二首皇甫涍返照開重閣游人在翠微石䦨延暝色烟樹帶春暉卜築容長往安禪喜獨歸白雲吾託慕兹地揜山扉來遊每披豁春亂百城烟雪霽催帆席花深到谷泉雲霞通一徑鐘磬發諸天坐醉山僧酒浮生祗自憐登虎丘作每到丘中寺偏令思惘然登臨千古後容與一樽前鐘梵空烟度樓臺衆壑連惟予獨往意留賞白雲天首夏雨後登虎丘信此登臨美華林洞壑藏隂霞收嶼亂暮雨入溪長象外得吾好丘中宜坐忘藤厓遍幽磬歸徑靄蒼蒼虎丘懷舊郡公胡中丞勝地名賢㑹風流在此山時乗紫霞賞髙詠翠微間合舫烟霄下褰帷士女攀懷哉羊叔子一往竟無還虎丘唐宋元暨我國朝題詠甚多有山志在故不録陽山髙啟我登此山巔不知此山髙但覺羣山總在下坐撫其頂同兒曹又見太湖動我前洶湧三十萬頃烟波濤長風吹人度層障不用仙翁赤城杖峯迴秋礙海鶻飛日出夜聴天雞唱中有一泉長不枯乃是蜿蜒神物之所都老藤隂森洞府黒樹上不敢留棲烏常年禱雨車來此投金符靈旂風轉白日晦馬鬛一滴霑三吳巖巒蒼蒼境多異樵子尋常不曽至探幽厯險未得歸忽聴鐘來澗西寺此時望青冥脫畧塵世情白雲冉冉足下起如欲載我昇天行古來名賢總何有唯有此山長不朽欲呼明月海上來照把長生一杯酒浮丘醉枕肱洪厓笑開口天風吹落浩歌聲地上行人盡回首同前周南老髙出衆山上獨有秦餘杭雲烟度林麓青翠摩穹蒼中有神龍湫以時司雨暘夫差昔夜匿于焉絶餱粮三呼輒三應道窮愈傽偟公孫言可徵山靈為摧傷望陽山王鏊青谿欲盡轉逶迤卧對陽山舟自移聞有髙人何處在白雲紅葉影離離陽山一名秦餘杭山一名萬安在城西北三十里髙八百五十餘丈逶迤二十餘里以其背隂面陽故曰陽亦云四飛以四面視之勢若飛動也大峯一十五而箭缺為絶頂相傳秦皇射于此故其下有射瀆戰國策越王以散卒三千禽夫差于干隧今萬安山有遂山即其地也穹窿山陳徵緑水青山今再遊杜鵑花發雨初收猿聲妤在千章木雲氣深藏萬丈樓麋鹿近人來古磵麒麟無主卧荒邱吏情益愧成羈紲西望太湖烟際頭同前黄漢卿何處春山好物華穹窿山下古烟霞出林澗水作清語上樹藤枝開紫花久住老僧如避世初來塵客懶還家一尊醉倒東風裏更覔沙鍋穀雨茶同前楊基昨日出遊今日還登臨未盡湖東山紫藤花落髙樹下翠羽鳥鳴深竹閒泉渟峻石淨可掬磴倚絶壁危難攀人生跬步即天險不獨瞿塘與劍闗同前吳寛我聞吳中喭陽山髙抵穹窿半壯哉拔地五千仞始羨吳中有寺觀銅坑鄧尉作屏扆天平靈巖當几案其間法華與雅宜水邊横亘如長岸何人著山經宜作吳山冠但嫌地勢髙山家每憂旱舟行半日青已了却被濃雲忽遮斷水田路轉二三里依舊諸峯青厯亂人云山頂百畝平合結茒廬倚霄漢龍門勝迹未遑遊坐向船頭先飽看遊穹窿山王鏊十年林下無羈絆吳水吳山飽探玩穹窿至近髙且險欲至靡由輒興嘆喜聞地主有嘉招春服初成雜童冠畫船載酒出胥口畧綽湖稍旋抵岸民淳地僻客至稀老少相扶出門看吳山種香徑尚存嵗嵗採香多女伴我聞且欲登香山雨脚忽來行渙散明朝雨勢止復作世路隂晴那可算文侯豈失虞人期勇往前行賴明斷籃輿前行那復辭迤􅆔青山開四畔前山雲接後山雲似是山靈顯竒觀嶔﨑犖崅路登登山腹盤迴轉危棧諸峰一望皆下風始信陽山纔抵半買臣駁落讀書臺曽是樵夫終佐漢丈夫出處㑹有時不計當年愚婦訕清泉一脈甘且寒肝肺塵埃得湔浣山頭咫尺不得升甘被同行譏老愞兹行雖勝興未厭斜日歸途幾留盼回頭一笑謝地主他日重來殊未宴晩入穹窿山楊循吉曲曲脩途入徑深已嗟天晩暗生隂誰知輿上方回首衆谷日光方閃金穹窿山比陽山尤髙五湖賦云穹窿紆曲蓋此山實峻而深形如釵股吳地志兩嶺相趨名曰銅嶺越絶書為古赤松子取赤石脂處又神仙傳赤須子豐人秦穆公魚史也食柏實石脂絶穀後往吳山升仙去即此山也山髙而頂平方廣可百畝中壘石為龕名國師菴半山有泉名法雨四時流不絶下注灌田山東嶺下有磐石髙廣丈許相傳朱買臣讀書其上後人號為讀書臺穹窿寺在焉其北有紫藤隖百丈泉海雲菴西址有白馬寺華山道中范成大過午層隂未肯開煖寒村店竹芻灰蕭蕭林響棠梨戰晩恐陽山有雨來華山髙啟羣山瞰笠澤次第記曽到兹峯最靈竒獨失有遺懊故人總時彦休沐偶得告林壑軫逺情招攜誓同造出郭縱鞍輿入谷并牙纛時當寒冬晨嵐霧恣披冒幽幽霜泉微巻巻風葉燥尋溪見人烟問嶺知佛號意行恐迷誤逺托樵子導雲門不為闗地僻夜無盜居僧作蠻音揖杖喜迎勞客來豈先知定有山鬼報方池開層巔旱嵗貯深潦清暉蕩空明萬影鏡中倒雨壁削古屏風林舞髙翿龜巢宜列坐苔淨不用掃浮杯逐流葉宛轉繞涯隩雪餘波更澄照鬢脫烏帽青蓮可服食傳記在仙誥松鳴古壇虚泉滴幽洞奥嶙峋岡頭石突起類爭暴緬懷融結初天巧亦多耗探深識後返升險戒前躁谷猨晚應飢澗鳥寒不噪欲歸更留憩禪榻近茶竈詩歌叢桂篇琴奏猗蘭操樂哉此嘉遊去浴似髙蹈及春幸重來芹藻應可芼何須效羊公登峴發嗟悼世路獨强馳有力漫如奡富貴不可求盍亦從所好斯理茍未宜山水解相傲微言倘或能勿為俗士道天池靈峯可度難昔聞枕中書天池在其巔每出青芙蕖湛如玉女盆雲影含夕虚人靜時飲鹿水寒不生魚我來屬始春石壁烟霞舒灔灔月出後泠泠雪消餘再汎知神清一酌欣慮除何當逐流花遂造仙人居陪臨川公遊天池騎馬尋幽度嶺遲老僧不識使君誰門開紅葉林閒寺泉浸青山石上池殘果已收猿食少枯松欲折鶴巢危壁閒不用題名字無限蒼苔沒舊碑天池周南老泉流出山巔平地聚深洼昔聞父老言曽出青蓮花地靈可度難真隠宜仙家澄泓沁晴碧清溪明白沙山僧不好雅鑿佛臨水涯以金布厓石徒為兒女誇紀遊天池有序吳寛予與李世賢文宗儒諸公徧游西山晩至天池有老僧三人皆垂白髮數寸見客相視􅌓眙其一人明日持巻造予家索詩自言不入城者二十餘年矣憐其意懇既為題二絶句復賦此以紀之怪石巉然鐵削成寺前仍有一泓清山深遊客來應嬾林密居僧見若驚痩骨能支猿鶴老長顱不剃雪霜明將詩何用真堪惜二十餘年復入城游天池和仲山韻王鏊小輿詰曲穿雲岑愛此巃嵸萬石林迴溪倒挂松樹老絶嶂半染蓮花深尋幽偶值此日暇訪古正愜平生心天池小立戒歸去夜來風雨聞龍吟游天池山沈周佛國有池峯頂見樓臺倒影入沄沄源通汞海石中發氣接銀河天上分抱子龍君吟夜雨洗頭玉女動春雲詩腸一沃便歸去過嶺微鐘西日曛天池皇甫涍何處東林寺尋鐘石徑幽雲藏春竹暗路入晩山稠含磵蠻烟下澄泓空翠浮塵纓愧鷗鳥一為洗心留登天池贈毛中丞胡纘宗龍翔鳯舞石縈迴山仄池平雲去來閶闔天空萬笏出洞庭日暖千蓮開花峯影墮門前水玉殿光乘寺後臺一曲丹丘留百代兩朝紫誥燭三台天池王賓藏在山間更不流倒涵空象只如秋碧蓮花朶開時節誰化仙人去逺遊同前王璉清池空山坳止水玻璃淨雲衣汎晴漣天影涵空鏡龍歸海氣寒鳥度烟光暝銀漢此雲通仙槎去非迥石屋鑿石甃圜菴結構因巖谷危梁琢堅珉濕楚裁寒玉梵相終無壞明燈自相續掘斷青山根白雲常在屋石鼓石鼓從何來宛似岐陽璞具相若天成由來匪人鑿雨蘚上重輪天花䕃頑郭定出時有聲逢逢殷山角石鼓王賓那似岐周有篆銘雨淋青處土花生山靈休遣音聲起零落吳儂厭見兵由南峰入天池楊循吉入谷也須縁磵道乗髙忽又度南岑參差石勢雲行細寂寞禪闗樹鎖深春日綺羅偏映水江南櫻笋自成林十年不到天池寺南北峯頭費逺尋支硎山放鶴亭范成大石闗門外古亭基樹老藤枯野徑微放鶴道人今不見故應人與鶴俱飛馬跡石跨馬凌空亦快哉龍腰鶴背漫徘徊遊人欲識仙蹤處自覔蒼厓白墖來支硎山中楊循吉初春好風日命侣共來遊泉噴雪花冷鳥含蠻語柔怪峯藏僻院平野入髙樓總為尋山主何妨此獨留登支硎山樓徐禎卿谷寺憐幽密兹樓表麗觀烟雲連壑動竹樹入門寒獨往迷前徑憑髙遲所歡時聞有清磬遥出暮雲端遊支硎諸山回漫興吳一鵬好山是處一登臨醉裏詩成醒後吟婚嫁尚多兒女債利名無復市朝心江鱸入饌秋方淺庭鶴隨行嵗巳深遊衍日長筋力倦憨眠時就碧桐隂支硎山王寵支硎特峻秀平地插芙蓉面面開霞壁層層折劍峰白鷴巢野竹蒼䑕戲長松逺憶道林輩低頭禮數峰寒泉髙啟逺落叢峰閒平流磐石上月照欲成潭風吹不生浪聲兼寒葉下色映秋苔漲野客照羸顔曽來倚笻杖同前周南老道周有磐石如砥平而廣山泉流石上清泚挹西爽涓涓潄甘寒湛湛㵼淵響支公留馬跡于焉稅歸鞅山以支硎名宜取磐石像髙逸清且幽泉能慰懷想放鶴亭王賓生身髙潔自仙材可使樊籠裏面來人在夕陽闌畔望肯從塵外再飛回南峯王鏊石罅中閒度板輿南峯來叩故人居君謙嘗居此髙齋闃閉松雲外絶棧危分鳥道餘豈謂山僧成泄栁却疑野老是長沮朝來地主如相問但看芭蕉葉上書赴南峯舟中楊循吉四月園林梅子肥遥遥蘭槳弄晴暉抱愁自適尋山興避俗聊穿髙士衣野水鏡空雲倒入晴嵐翠重鳥迷歸巖房芝地將千仞到此應知不用機南峯蔡羽支硎巖石秀偏詫乍遊人玉闕旋輿險丹梯折膝頻琅玕聲雜珮苔蘚蜕松鱗城郭已新夏巖花猶帶春送楊儀部入南峯解組能輕世尋山為著書巖房舊卜築霞舄日虚徐佳麗望殊逺髙明興自疎無心伴禪寂但仰子雲居南峯王寵四月鶯花去重遊似逗春磴危青靄濕郊霽緑苗勻表石天為闕凌霄地阻塵秋毫臨萬象髙處太傷神尋支山作皇甫涍不盡春山路隨人溪水幽石門在烟外蘿徑登雲丘谷口懸清磬我心閒白鷗支公燕坐處日暮寒泉流中峰南峯展眺松色引天路禪門幽靄重嶜崟領一室窈窕迴雙峰巖溜亂游語溪花澄道容每欽支許輩而悵雲泉蹤悟賞復蘿月坐聞南林鐘南峯往北峯王寵南北峯相直中蟠萬石林諸天飛采翠衆壑異晴隂竟日烟霞拂長風虎豹吟此身飛鳥外散落步虚音觀音山白居易好是清涼地都無繫絆身晩晴宜野寺秋景屬閒人淨石堪敷坐寒泉可濯巾自慚衰髩上猶帶郡庭塵遊南峯寺葉夢得澤國鍾下流有山獨西南標竒錯明眼夙昔多窮探腹背眩金碧鐘魚半精藍支郎放鶴地妙解無餘談髙木氣未炎緑隂正清酣我懶倦登陟兹行詫猶堪幽尋雖云初佳處黙已諳久欲謝塵滓往同彌勒龕平生術九九晩識前三三才也實可人窮年玩烟嵐胸中有定水萬境濳包含嚴霜掃赬紫老榦餘楩楠噉蔗要自佳食荼亦云甘坐斷方丈室天花雨毿毿笑我窘世網何如老眠蠶我今已解縛真理早自躭但恐愛山意多求尚成貪願借待月嶺重開頑石菴偃松久傲兀碧琳故澄涵言尋覺菴路更欲從徧參支硎山在隆池山東北以晉支遁嘗居此而山多平石故名按玉篇吳有臨硎吳都賦亦云古號臨硎又按續圖支硎一名報恩山以昔有報恩寺也山有石室寒泉遁詩云石室可蔽身寒泉濯温手相傳遁冬居石室夏隠别峯也泉上刻紫巖居士虞廷臣書寒泉二字徑丈又有放鶴亭馬跡石以遁得名山有南峯寺及中峰北峰二院北峯宣德間移于雞窠嶺中峯在寒泉上又名楞伽院南峯一名天峯即唐支山院也有碧琳泉待月嶺南池新泉馬坡本名飬馬坡諺云馬婆泉者誤也坡南有石門乃三巨石直上干霄西連危峯東臨絶壑中猶棖臬然又有牛頭峯在寺門之下東址有觀音寺故又云觀音山髙景山泉亭范成大峯頭揮手笑紅塵天入雙眸洗翳昏萬里西風熟秔稻白雲堆裏著黄雲自天平嶺過髙景菴卓筆峯前樹作團天平嶺上石成關緑隂帀地無人過落日秋蟬滿四山髙景山夜歸伊軋籃輿草露間夜涼月暗走孱顔忽逢陂水明如鏡照見沈沈倒影山髙景菴讀舊題有感莓苔風雨舊詩留十七年前髩未秋巖桂拂雲篁竹拱樹猶如此一搔頭過髙景山拜謁魏鶴山遺像吳一鵬巍然祠墓尚髙峯時有雲仍為掃松俎豆正隆唐祀典衣冠無愧漢儒宗空山夜靜猶聞鶴怪樹年深已化龍仰止丰神生恨晩九原安得起相従髙景山在定山年山北三里自天平來漫衍數里至此而止越絶作髙頸山其西麓對花覺林厓谷盤拱處曰金盆隖宋鶴山魏公墓在焉其南為斜偃嶺飛泉隖髙啟山空響更逺雨過流還急餘沫洒迴風一林紅樹濕修竹隖色映溪沈沈秋雲在夕隂無限楚山意鶴鳴風滿林丹霞隖遥聞丹霞隖中有飡霞者絳彩發朝朝還同赤城下白雲隖雲開見山家雲合失山路聞語知有人欲尋巳迷誤芳桂隖欲攀淮南樹人去山寂寞嫋嫋涼風生疎花月中落飛泉隖周南老層崖㵼流瀑泓渟貯寒冽乗風曳銀練激湍霏玉屑飛珮聲玎玲揚霓影列缺澗底咽春冰松梢墮暗雪相看頓清洒時能潄甘潔隂生朱夏寒冷然滌煩熱修竹隖隂森如渭川玉潤寒碧鮮林深積重翠風過鳴繁絃勁色凌霜露髙標拂雲烟愛此抱節君不受相拘攣終日淡凝佇瀟洒壺中天再詠淇澳詩清景能留連丹霞隖侵晨挹初暘丹輝粲綺麗朱烟炫羣峯絳津澄曉霽飄颻紫霓旌嵯峩錦紋髻照映靈穴閒翳薈青林際九苞鸞鳳文五采麒麟罽掇之胡可飡逸蹤久忘世白雲隖谷深多白雲盤礴西山西觸石起青嶂垂天覆蒼溪芳林靄朝潤叢竹含晩淒擘絮縈秋練帶日横晴霓悠悠親舍望冉冉巖穴棲白衣忽蒼狗變化胡可齊芳桂隖林隖藏幽芳叢桂圑蒼玉子落明月中香生流磵曲風前墮粟金雨餘明淨緑伍以荃蘭幽愧彼桃李俗中有道人居清名紀仙籙為花歌古香對酒不忍觸自横山歸洞庭王鏊漠漠輕風不滿帆小船載酒舳艫銜陶朱事業今安在皮陸才情兩不凡白鳥斜飛驚鼓吹青山倒影動松杉却憐范老江湖上猶自憂譏與畏讒横山在姑蘇山東隋書十道志云山四面皆横故名又名踞湖以山臨太湖若箕踞也錢氏𦵏忠獻王元璙于此建寺其趾曰薦福因又稱薦福山山有五隖故又名五隖山後人又以堪輿家言稱九龍隖山中舊有朱桓陸雲公顧野王墓續圖經云此山鎮郡西南臨湖控越實吳時要地隋遷都于横山亦以是為屏蔽云堯峰戴良巳従􅀈泉游復向堯峰去堯峯𣺌何所塵俗不知處披拂强追尋疲薾窘凌遽息喘倚莫松濟勝犯零露積石擁古溪飛嵐䕶遥樹仰觀天宇垂俯睨河流注石湖尚波瀾洞庭但烟霧遊子多悲懷觸景増逺慕微迹既漂泊流年復遲暮半生僅一來百齡能幾度回駕悵難渰又復首前路堯峰觀朝雨袁袠山中多幽事幽事殊可悅飛雨黯以暮朝光互明滅崇林嵐氣昏宻徑樵采絶紛吾慕嘉遯兹山亦寂蔑澗水當階鳴岡巒依户列寡欲謝所牽冀與智者悅堯峰山十二詠半峰亭連峯翠岧嶤孤亭半峯上山下雲起時翻向平髙望清暉軒樹杪見風帆正對南湖水山月流清暉來照軒窓裏碧玉沼泠泠碧玉沼青萍鋪水面風吹萍葉開水底魚皆見觀音巖複磴轉危巖寂寥古龍象空林人跡稀但聞清磬響白龍洞隂洞山之阿谽谺石勢逼還疑蟄龍起雲霧閉深黑多景巖應接無閒暇日與賞心遇惟應山中人解識山中趣寳雲井古甃浸寒泉稚子時時汲迎晨入翠微嵐氣浸衣濕偃蓋松髙松若車蓋偃蹇北山隈不蒙匠石顧詎識明堂材鐵塔雁墖蔽浮雲縹緲人天外風鈴鳴四檐獨往聞幽籟妙高峰逶迤羣峰首躋攀興何已曠然心自開盡此邱壑美東齋楓葉紛紛落荒徑無人掃萬念杳虚寂閒門閉秋草西隠朝坐東齋幽夕宿西齋靜跏趺對佛燈沈沈清夜永同前王寵半峰亭孤亭倚翠微青青四山抱期與鹿皮翁石上餐瑶草清暉軒康樂戀清暉徘徊碧霞裏而我愛名山學道終已矣碧玉沼山中百道磵噴薄落金池倒見芙蓉碧洋洋堪療飢觀音巖攀巖采石髓躡磴訪金仙繞壑香花滿祗疑兜率天白龍洞白龍卧巖洞霧雨長冥冥或化白衣老空山來聴經多景巖羣峰翔龍鳳效竒多景巖道人勞應接長日倚松杉寳雲井月照前山寒夜半汲深井鏘然古銅瓶盡投千尋綆偃蓋松蒼松偃巖苔屈曲如盤龍有時風雨來天上聞笙鏞鐵塔鐵墖翔雲表飛從海上來玲瓏七寶碎面面毫光開妙髙峰獨立峯之巔羣山伏在下遨遊青天中雲螭為我駕東齋旭日散髙齋離離檀越影焚香對寶册古院蒼苔靜西隠結庵西巖中落日丹霞爛羣闇將夕隂紫翠交凌亂再遊上方范成大僧共老花俱在客將春雁同回范叔一寒如此劉郎前度曽來早春遊南山楊循吉游思經營兩日前過暄深畏雨遮天啟明下地親張具隔宿抛緡預買船霽景望來欣已動佳朋接到冗俱捐雙摇疾櫓青皮裂四拄明窓碧漢填負北入橋村巳僻投南遵渚路微偏成行梅栁將春妬吐氣禽蟲得暖翾淺浪刺篙篷濺水濕薪炊黍柁縈烟摩空寳塔超雲立湧地螺峰走馬連茶磨髙存玉堆大石湖晴動鏡光圓先朝錫翰亭猶䕶古相營居宅巳遷竹轎候人喧守岸農黎觀客靜依阡僧房臨港舟堪抵佛閣依巖石共肩豆實不離牆下笋杯漿原取澗中泉梵書在手因挑讀道榻逢軀即借眠却顧城闉須返棹欲辭賓客獨參禪林巒自幻闗心事身世從來是業縁又逐濁風歸市郭各扶殘醉别溪筵還家秉燭吟詩句境物捫心尚厯然陪郡守林公遊山二首緑瘦南山正杪秋嘉招欣奉斾旌游烟開湖水臨飛觀樹簇松陵見逺洲近壤風光堪醉杜環滁林壑己名歐使君仁政何從見老稚欣欣擁道周絡緯喓喓鳴草閒漸看水鏡起東山寒旻下露沾衣濕野燎燃松照地丹蕙帳空兮方自笑峴臺登後更誰攀穆生未必堪優禮又踏仙舟醉醴還上方姚廣孝蓮宫據山杪岧嶤去天咫風香花雨新僧在白雲裏幽沈樹樂靜蕭散烟中起人登石路迷依依縁澗水遊上方和錢學士韻皇甫信酒邊竹樹晴猶濕湖上杉松晚更明獨立巖扉傷往事謾磨臺石記來名微微逺水涵雲影落落長松隔鳥聲一嘯空林下山去小窓風月夢魂清上方載詩攜酒到山中冉冉楓林落葉紅斜倚石巖思舊跡數聲啼鳥隔林東同彭宣之上方西澗流觴蔡羽峭壁連峯開碧壇遊人于此解衣寛千松架日巖房秀百道飛泉午殿寒香土不須如意遣炎天還有白蓮看要求慧逺流觴處直枕藤蘿好恣歡題上方望湖亭壁楊循吉湖山開妙境當暑更多風萬頃涵亭下幾帆馳鏡中讓年僧過我極目鳥横空獨酌無人伴衰顔聊自紅與王履約履吉文壽承休承袁補之永之六賢上方山玩月顧璘幽懷怡清夜興言陟穹窿寒景自憭慄况兹山磵中明月出海嵎浮雲淨遥空二八輪正滿桂影虚玲瓏河漢近人㵼衣袂多烈風俯窺震澤外一氣涵鴻濛憑空意惝怳酒酣興彌雄浩歌楞伽巖響振馮夷宫山川閲今昔代謝焉可窮今兹歡樂趣往者誰復同吳越且黄土安問陶朱公不如林壑閒偃仰息微躬神超形無閡道合契有終彷彿絶塵境髙舉凌烟虹暮雨登上方暮踏孤峰雨蒼茫下界分平湖鋪大野髙閣挂行雲霜氣明楓葉天寒叫雁羣擬投僧舍宿清梵夜堪聞登上方上方塔廟倚孱顔千尺懸厓手自攀村村黄葉寺邊寺處處白雲山外山車馬趣城塵泱漭烟霞鋪地錦斕斑東南勝槩秋如畫勝得山翁倒載還上方月夜與段子辛王寵棄世吾慕嚴薄遊君類邴賞心歡笑同烟駕肅塵屏游衍倦平臯遐思集秋嶺頹陽隠半規纎御曜圓景稍稍林霏交沈沈谷神靜仰攀星七襄俯弄波千頃歌翻雲外音舞動天中影野曠羇鴻號露下棲鶴警巖岑已嶇崟吟嘯復孤永疑從靈圃游燕此華胥境若枝巳堪折雲裝爾須整遣彼弱喪情消摇任所秉月夜登上方絶頂五湖湧青蓮削出千丈壁空中構室殿珠光相蕩射明月海上來照見半山赤千秋似竦動鳥獸夜辟易飛馳入中天萬里掃空碧吳越何茫茫俯視一氣白身列星辰閒絶頂布瑶席舉杯酌銀河誤觸支機石回首招王喬吾亦成羽翮其二吳山直牛斗豈必五岳竒飛睇入青天虎視東南陲海水涌吾旁太湖化為池波光蕩寳月萬頃堆琉璃魚龍百處現吞吐珠陸離歌嘯生雄風草木四山披腰佩碧落圖手掣蚩尤旗遨遊五城上極宴不知疲其三大道無端倪人世如蟻蝨泠然馭風行天路非阡術望舒稍西傾東海巳吐日山川兩照耀金波中蕩潏仙人夜行遊巖坐汎寶瑟吐故餐晨霞乗露采芝木巉巉金庭山中有煉藥室却笑尚子平寧須㛰嫁畢其四乾坤一銀海萬境羣動滅狂殺王子猷疑是山隂雪披襟當雄風酒後覺耳熱山精忽夜嘯谷響厓竹裂惝怳非人閒身世如陟絶結束昇天行星斗為珮玦倒窺山河影嵯峨鏡中列始知飛仙人五岳視邱垤紫霧何濛濛入口皆玉屑幾時丹砂成白日翔鸞節上方觀月出歌南州溽暑醉不醒思卧倒景窺滄溟葛裙兩髻跨白鹿直上東山行翠屏翠屏迢迢幾百尺一幅平湖月東出驪龍弄珠吐復吞横抹萬里𤣥雲屯劃然一躍忽千仞青天掃蕩縣金盆巖鳴谷應海水湧星河射人森欲動翠旗金支交盪摩貝闕銀宫光澒洞茫茫塵世愁我心便欲蛻却蜩蟬形蓬萊方丈在何許驂鸞馭鶴多仙靈四筵賔客為起舞禰衡特善漁陽鼓人生反覆何足憑龍或為蛇鼠變虎清風明月鎮常在山川似與人相待勸君滿飲吸金波河横月落奈君何望湖亭寶塔孤撐日華亭迥冠山禹功饒震澤吳服揜荆蠻今古悲歌裏乾坤落照間雄風髙處急莫放酒杯閒陪大中丞金陵顧公玩月上方山袁袠詰旦趨廣渡昬暮陟崇岡川原氣候改林麓鬱蒼蒼隂霞冠陽阿宻徑阻修梁樵采歸以絶游豫樂未央翫往嘉遯儔遂謡叢桂章霜楓麗丹雘秋色紛難詳飛月出層霄泫露沾衣裳列筵面澄湖肆眺臨遐荒不醉諒無歸遡風騰羽觴令德暢徽音示我以周行悅賢喻飢渇覯止承寵光各勉日新志豈弟神所康八月十四夜待月上方慿髙臨寶地選勝陟丹丘海湧金輪出風驅彩霧收素娥懸鏡照神女弄珠游彷彿登緱嶺簫笙滿十洲春日上方皇甫涍芳野尋幽勝春山度翠微裊風溪篠亂揺日谷泉飛洞壑流虚籟烟波靜落暉不聞孫子嘯空望白雲歸春日侍諸父宴上方八韻一往驚蓬髩今來就竹林歸閒偶春服歡賞在雲岑負杖將奚適澄湖試共臨端倪遥莫辨巘崿㑹相尋薜茘連窓暗桃花隔岸深鳥飛殘雨霽鐘散晩霞隂信愜尊中趣聊成谷口吟因書謝當路丘壑本予心上方流雲亭翠微亭榭倚湖光脩竹檀欒隠上方趺坐白雲誰與晤遥心飛鳥共滄浪冬暮上方書事湖岸稍澄霽諸峯連暮暉漾舟靄汀曲幽意生翠微天路望逾邈松門期獨歸鐘聲白雲盡樵采寒山稀烟景自多適年華那遽非上方晚興清溪轉幽棹晩與名山期石几雲低隠巖窓竹礙窺晴開花雨際林靜鳥鳴時莫問金門䇿淹留方在兹重遊上方西津不假問溪路到雲林一徑縁花入疎鐘隔嶺深頻來増往慨惜去戀餘隂迢遞春蘿月空違遊子心觀音巖陳基補陀原是海中山誰遣移來此地安巖下碧潭常浸月雲根瑶草不知寒波涵南國秋千頃景薄西山日半竿為問此行詩幾首一時收拾與人看觀音巖訪楚石和尚袁袠聞有髙僧住翠微雨中來訪白雲扉空山落葉無人跡但聽泉聲百道飛楞伽山一名上方山在吳山東北其頂有浮圖五通廟其下東南麓有丁家山唐人丁公著父喪負土作冢故名北為寶積山寶積寺在焉其北為吳王郊臺東北為荼磨嶼以其三面臨水故云嶼俗云磨盤山東南麓為補陀巖巖前石池深峻陡絶石梁跨其上兩厓壁立蘿木交映特為竒勝登寶華諸山袁袠夙有登臨興春游愜賞心山盤數嶺盡寺轉萬松深樹古同僧臘泉多雜梵音仙津何處問即此可投簪三月十三日晩霽與日宣侃上人循吳山麓徐行看杏花作王寵漠漠春隂睡思慵興來扶䇿過前峯日斜更倚風篁磴試望誰家花正穠宿雨初收麗晩霞江烟淡淡薄籠沙山家翠壁圑春色野客敲門看杏花家叔攜酒横塘餞别晚登吳山皇甫涍香刹隠巖曲烟蘿一徑懸那堪風景處共此別離筵度嶺雲木異浮空島嶼連花穠三月酒春漫五湖天勝托邱中好詩裁塘上篇終期謝塵紱歸賞竹林前寶華吳山俱在楞伽山之西南白石山王賓山前民有顧元新來與南朝抵北人戰敗不降兵數百一齊投在太湖濱白石山在滸墅北越絶書云故為胥女山春申君初封吳更今名宋末顧五二山前民家子為宋起兵拒朔方軍結壘望亭隖設溪上自横塘過黄山吳寛范詩云東風已緑南溪水更染溪南萬栁條溪南萬栁緑成灣先隴頻年抵暮還遥望松楸常洒淚石湖詩裏過黄山黄山皇甫涍兹山亦幽勝横亘西南天一徑聊步趾諸峯猶眼前湖波浩無際雲日爭相鮮霞鶴粲霄色松風清磵泉芳菲亂空翠靡迤浮春烟迥瞰塔寺古下窺樓堞妍近尋侈遐討投跡期忘年未事登名岳俄然意已宣一黄山在茶磨山北四里胥塘之北諸峯髙下相連俗稱筆格山隋志載王世充破劉元進坑其衆于黄亭澗疑即此山其西山之半有二石洞深可三四丈俗名虎洞登獅山徐有貞麥黄天氣爽如秋乗興聊為岝㟧遊香徑踏花來洞口小舟送酒過溪頭横塘樹色連龍隖茂苑烟光接虎丘絶勝竹林觴詠處即今誰數晉風流岝㟧山在金山東俗稱獅子山以形名一名鶴阜又名笮雄吳地記云王僚𦵏此山傍有思益寺和伯氏過何山懷二何之作皇甫涍靈山徵往跡居士𦵏何年哀壑蒼烟斷空林落日懸禪關二隠地花落五雲天共盡悲千古凄涼夜鶴旋其二生時同隠操埋玉復兹巒野寺春常寂泉臺月共寒法筵疑雨散留塚酹花殘不覺青山暮悠悠遡夕湍何山在獅山北一里其地舊名鶴邑墟故山名鶴阜因梁隠士何求何㸃𦵏此改今名其坡有資福寺范志以岝㟧山為鶴阜山巳上四山與諸山不相連香山范成大採香徑裏木蘭舟嚼蕋吹芳爛漫遊落日青山都好在桑閒蕎麥滿芳洲香山與穹窿連屬南趾近太湖為胥口吳地記云吳王種香于此遣美人采之故其下有采香徑光福山遊記吳寛成化十四年五月光福徐翁用莊邀予為西山之遊予諾之然不忍獨遊也則為書招史明古乙酉明古來自吳江丙戌發舟胥門西過横塘由木瀆斜橋折而北行經靈巖讀宋韓蘄王墓碑前望穹窿晩乃至光福首過徐氏用莊喜客至見其子玭其孫天穎更召其里隠士徐孟祥同導予步虎山橋橋南登擅勝亭還飲其家夜宿來青堂丁亥縁玉遮入蒸山謁武功墓循北麓觀眠松遂泛下崦入銅坑還泊虎山橋戊午遊鄧尉山飲七寶泉入𤣥墓寺憩奉慈菴登鳳岡而還已巳過海雲院觀連理山茶讀虞道園百丈泉遺墨已乃別去晡時至胥門明古還吳江予入城是遊也厯四日舟行六十里輿行四十里總得詩三十首悉録歸用莊備山中故事龜峰勝槩記朱存理吳有光福山者一名龜山距縣西南七十餘里相傳梁九真太守顧氏之家山又傳為野王宅山有寺後據岡阜前臨林墅古殿修廊環抱林木蔚為古叢林也中有銅觀音像水旱祈禱屢有靈應載諸名人碑刻并見朱樂圃圖經續記可攷殿右有方丈壁閒寘唐進士顧在鎔詩刻後有墨沼亦云野王物沼水墨色如出染渠中蓋其遺跡歟方丈西従石磴而上有浮圖七級聳出一峰之上即所謂龜峯也今年夏予來避暑山中登其絶頂迴望天平靈巖諸山如在几席雖吾目短不能逺眺是日也風清雨霽微日生涼而能豁然一瞬于軒檻之外波光鏡淨雲帆風鳶𣺌在天際洞庭東西兩峰涌出太湖之心若青螺然殆不可摸擬其形似也寺建蕭梁時日就傾圮寺僧普照首發私願辛勤修復崇臺層宇煥然如新予方修郡志成凡山川寺院悉經紀載厓鐫野刻又嘗備録蓋吾好遊之心老而猶在普照請言然龜峯雖多竒勝而未有記之者長者光臨必有以發吾山中靈秀之秘烏乎靈秀之秘必得磊落瑰竒之士標品纂述然後能發露于世顧氏豈其人哉竊幸一覽其勝自不能已于有言矧普照之請甚勤姑書是為記正德戊辰六月既望光福山吳寛昔年曽學登山法縱步不憂山石滑舍輿徑上鳯頭岡趁此深風當晚發逺山朝士抱牙笏近山美人盤鬒髮我身如在巨海中青浪低昂出復沒山下人家起市㕓家家炊烟起曲突梅林屋宇遥復見一似野鳥巢木末山僧見山如等閒翻怪羣山競排闥偶憑髙閣發長笑笑我胡為躡石鉢夕陽滿目波洋洋西望平湖更空闊水靈為我報水仙預設清泠供酒渇吳人非不好登山一宿山中便愁絶扁舟連夜泊湖口舟子長篙未須刺懶遊已矣斯人駭狂遊不學前輩達若耶雲門在於越何必青鞋共布韈長山楊基隨意扶笻入遠林紫藤花落徑苔深山中莫道無音樂一片鶯聲在緑隂龜峯在鄧尉山東北光福寺在焉又有長山亦附屬鄧尉山遊西山記杜瓊郡城之西多名山山之隠士曰徐拙翁年踰八十强健不衰閒來城中與予相好殊甚其外孫鄭懷敏表姪祖用和交予亦然而華彦謀朱宗廣徐元吉輩又予舊識也而未能一造其第于心恒缺然乃正統庚申九月八日得附戒軒王夢熊之舟與湯至善共載是日早發閶門繚城濠而南抵胥門橋折而西行經横塘由價川餉午于舟中目覽羣山與二子道平生不輟至善又能瀹佳茗飲予既至光福登岸日未夕夢熊引予首謁徐元吉次謁顧孟洪次詣亡友徐可勤宅其子曰立美丰儀以父執相待甚謹予且愴且喜既又識徐孟祥孟祥有竒才吾儕當避路者夢熊歸家至善亦有事夢熊令其倩張佚導予由光福山徒步一里許有人烟處曰於里過此不逺則有洗心亭可憩又緩步二里許有喬木髙恒佚曰此宗廣之居扣其老僕云主逺出俄宗廣歸乃大呼而入以來予為慶具饌晩酌追敘同門好論及卅年前事厯厯如指掌宗廣性剛正鄉人酷信淫祀宗廣酷惡之是夕余少飲惟佚進數觥至夜分就寢明日天未明拙翁巳至宗廣出轎二乗與翁同辭去天色將雨山林皆在烟雲中心殊不樂翁指示曰此即新豐山祖氏居也此即萬安山吾之居也途不逺矣既抵用和而天色開霽用和出迓予未返余入其外門門徑瀟洒與宗廣之居不類傍一室黝堊其中尤可愛右壁有夢熊竹予乃冩松于左以相之并詩如上用和歸而喜躍余戲謂曰涴若粉素矣揮洒未竟而饌出肴核鮮潔與城府販鬻者殊飲畢與翁登轎小徑従畎畝中行時禾稻將收黄雲萬頃田野擔攜餽遺者絡繹男子在田童子騎牛出小兒釣于水際桑柘茅茨閒一老嫗黄髮而瞽者以手摩一婦人肩背嬉嬉然語笑真樂土也畎畝之徑將盡循山之趾入松檜中松檜既盡轉而復然行未逺則萬安山矣瓦屋翼然倚山而構喬松大榆列布門徑下轎而入髙門相角啟翁曰此鄭氏居也懷敏已出矣乃拜翁于堂既觀其家廟之嚴潔子姓之淳謹其子亦白首矣茗飲間出所藏圖書以厯覽之覽畢引入小軒有春官黄養正書樂善之額壁有謝葵丘王司訓先生題志啟窓牖則山嵐壓簷斜光逗户殆非人間世也窓下有石舟舟可貯水浸崑山石其中石山有檜長二尺許本如拇指大翁云已三十年矣其具饌與用和之具不少異而家釀醇醲則過之翁舉酒飲予予不能引滿用和與佚皆不敢辭酒酣翁與予過山麓觀其壽藏予求別翁曰九日不可不登髙翁先予而上振䇿摳衣作矍鑠之狀既至嶺倚䇿而立不勝其喘息矣西望具區波濤皆黄白色天光湛碧山色深青五帆之􅀈若一葉小舉目之頃其趣無窮嶺上之松微風薄之韻如笙竽琴瑟然用和俾予佇聴曰此天籟也其造化自然之妙乎翁舉杖指極嶺曰吾復能登是矣予笑而不言既下嶺入小菴屋宇因山髙下為之壘石為臺編竹為扃菴有二僧其老者年可七十餘白顛黎面齒半脱落猶能誦經偈邀坐啜茶出復登轎謁彦謀彦謀司征在公其少子某迎留夜宿予歸興不可遏某則大張筵于堂作樂以侑食予酣且飽特享其多儀而已既辭與蓊别用和欲從予予止之某欲以騎送予以不善御辭遂復命轎佚乗馬馬騰躍佚不能控遂馳而先予則緩其去不二三里復循昨暮之途細覽羣峯之勝時斜日在山山色青紫光福塔廟倚山而峙山乃南鳯皇山之支人言兹山如龜形曳尾于後後有虎山橋橋極壯麗皆礲黿山之石為偃月形三洞其下橋之北有岡上有岳神祠殿宇與寺相照映金碧翬飛而寺之前後民居競鱗次其景之勝非圖畫之可貌將至寺所佚巳候予久矣入寺中夢熊至善來㑹同觀顧野王墨池池水常黒色主僧本明具蔬飯客畢設榻于方丈之西序予欲留詩寺中值其夜誦不巳竟不能成而寐明日丑刻則又聞扣鐘考鼓而誦蓋寺僧祝釐之常規也世云山寺日髙僧未起何不然邪辭僧早還佚復相送戀戀不已佚青年嗜學沐其外舅之化從予執弟子禮無少懈良可嘉也既而仍與二子還由全塘踵謁耕周先生扣性理之學重開茅塞而返夢熊謂予曰古人山行皆有記述子盍記之予惟是行也既伸報施之勤且識幽隠之趣而弔古探竒増吾聞見登髙望逺擴吾心胸至若髙年有德之可尊後進有才之可畏野無警惕呻吟之虞而有豐年太平之樂非惟有樂于吾心而已誠不可以無志非敢比擬于作者吳都文粹續集巻二十
