body:
  text: 吳都文粹續集巻三十七明錢榖撰市鎮墳墓木瀆道中風雨雷震大作范成大惡風奔雲何壯哉溪水欲立山欲摧石㟁迸裂纜邉樹胡牀動揺船底雷靈巖塔後雨脚挂胥口廟前浪花来篷漏衣沾不足惜酒缾傾側愁空罍木瀆去縣西南三十里光福塘上指㸃炊烟隔𣺌茫午餐應可寄前莊鷄聲人語小家樂木葉草花深巷香春去巳空衣尚絮雨来何晚稻初芒秪今農事村村急第一先陂貯水塘登光福鳯岡吳寛昔年曾學登山法縱步不憂山石滑舍輿竟上鳯岡頭趂此涼風當晩發逺山朝臣抱牙笏近山美人盤鬒髪我身如在巨海中青浪低昂出復沒山下人家成市㕓家家炊烟起曲突梅林屋宇遥隠見一似野鳥巢木末寺僧見山如等閒翻怪羣山競排闥偶凭高閣發長嘯笑我胡為躡石鉢夕陽滿目波洋洋西望平湖更空濶山靈為我報水仙預設清冷供酒渇吳人非不好登山一宿山中便愁殺扁舟連夜泊湖口舟子長篙未須刺懶逰已笑斯人騃狂逰不學前人達若邪雲門在於越何必青鞵并布襪光福鎮在縣西五十里泊横塘倪瓚山寺㣲茫深渡寒烟蒼莽横塘杖梢自挑村酒船頭猶帶漁郎過横塘吳寛夏半横塘風日多畫船載酒壓晴波高田得雨皆秔稻長蕩翻雲盡芰荷未必他年成故事也須隨處結行窩悠悠十里城西路此是登山第一歌横塘鎮去縣西南十三里有横塘風景特勝甫里高啓長橋短橋楊栁前浦後浦荷花人㸔旗出酒市鷗送船歸釣家風波欲起不起烟日將斜未斜絶勝苕中剡曲金虀玉鱠堪誇唼唼緑頭鴨鬭翻翻紅尾魚跳沙寛水淺江穏栁短莎長路遥人爭渡處斜日月欲圓時大潮我比天隨似否扁舟醉臥吹簫懐甫里倪瓚笻竹依依故里石刋翰墨糢糊龎公力田二頃拾遺扁舟五湖甫里去長洲縣東四十里俗名角直浦許市方回太湖晩山雨白鳥去𡨕𡨕古冢多無後荒祠豈有靈異峰巉石骨逺樹聳人形兵革已甦息廢田蒲稗青滸溪姚廣孝青山兩㟁分夕渡舟横口夏雨欲生蓮秋風先到栁聲殘烟寺鐘香餘茒店酒相見無别人唯逢耕釣叟滸墅送别劉貟外胡纘宗去年送客菊初栽今年送客菊全開鄧尉雨晴花造次穹窿雲淨鶴徘徊功名礌礌還堪疏詞賦翩翩亦可裁把酒别君君且醉感時休上鳯凰臺舊說許市去縣西北三十五里一名滸墅詳見古迹民居水際農賈襍處為一大鎮舊有廵司急遞舖景泰中置鈔關於此陸墓韓奕楊栁郭西門人家水上村豐年隨處樂生聚向来繁晩飯蓴全滑村沽酒半渾逢人詢舊俗喬木幾家存陸墓去縣北二十里因宣公墓在焉舟經荻扁阻風王抑夫田舍吳寛嵗暮江村落日懸誰家漁網設平田岸頭行客訟風伯堂上主人疑水仙斗酒急呼聊慰藉扁舟欲去重留連荒溪白屋炊烟少縣吏那堪横索錢荻扁在十七都鶡冠子云四里曰扁尹山陳基人傳周吉甫遺基在勾吳蕭條入墟里泱莽帶烟蕪豈伊姬臣裔散落在江湖負米林丘下客非隐者徒尹山去縣東南十里滯雨夜泊相城寄陳孟賢徐有貞江風吹雨阻行舟薄暮孤村且暫留回首那堪望君處白雲只在水西頭相城訪沈啟南伊乘此日初登君子堂幾回快覩徳星光畫圖神品驚當代詩法名家逼盛唐雲煖石田生玉徧烟晴溪樹對門長不才生忝十年後杖履甘隨老故鄉再往相城忘路誤經湖中渚禽格格樹蒼蒼暝色湖光接混茫始信桃花春岸水仙源回首誤漁郎行次相城有感王鏊幾年約兹逰為訪石田叟石田今已亡不使此言負相知三四人挐舟過湖口行行抵相城自夘將及酉四顧何茫然天水合為藪茒屋幾人家荒蒲與衰栁本来魚鱉宫自合鷗鷺有始田者為誰餒也非自取有司事征求亡者逾八九念此為彷徨獨立延佇乆作詩當風謡以告民父母相城去縣東北四十里許浦按教水軍陳造萬竈連連儼舊屯朝来喜氣襲人温固知除器須平日政復投醪亦至恩帝綍函春周壘壁使星回耀照和門文經武緯君王聖汗簡須知紀治原許浦鎮周霞賔形勢東南地兵戈阻隔時樓船張水陣幕府壯行麾江口衝寒急潮頭應月遲空存舊營樹夜夜海風吹許浦鎮去常熟縣東北七十里思政鄉宋紹興置鎮及水軍寨湖莊即事吳堂十五嫁来時東墻桑壓枝早禾低處熟盛飯滿花瓷自從潦為沴常見水平隄燒桑餉東菑桑濕火力衰兒飢苦啼晝車踏我足胝東圩苗泛青西圩𣺌瀰瀰云是連夜雨海潮漫前陂出門搔首望嵗計嗟安支不愁寒與飢但愁官租遲湖莊市在二都夕次同川李繼本鴉噪晩涼天新晴景豁然栁橋通水市荷港入湖田鷺影沙頭月人烟渡口船相過又相别書到是明年同里倪瓚依㣲同里接松陵緑玉青瑶波繚縈為咏江城秋草色獨行烟渚暮鐘聲黄香宅裏留三宿甫里門前過幾程借書市藥時来往不向居人道姓名同里懐元用一水東西雲窈窕幾家楊栁木芙蓉齋居出入無人到屐齒經行破蘚封密竹窗虚秋半雨楓林寺逺日沉鐘寄詩為道長相憶想亦依依念去蹤夕次同川姚廣孝長江逺接天一望一茫然夕靄迷沙樹寒鴉落渚田林香通佛寺㟁語到商船野路偏難識經逰况隔年重過同川韓奕攜家曾此避兵塵川上花開幾度春頭白重来如故里㸔花應少舊時人同里鎮去吳江縣十六里在二十六都有廵檢司稅課局平望蚊子吳融天下有蚊子候夜􅏐人膚平望有蚊子白晝来相屠不避風與雨羣飛出菰蒲擾擾蔽天黑雷然隨舳艫利觜入人肉㣲形紅且濡振篷亦不懼至死貪膏腴舟人敢停棹陸者亦疾趨南北百餘里畏之如虎貙噫嘻天地間萬物各有殊陽者陽為任隂者隂為徒蚊蚋是隂物夜從喧墻隅如何正曦赫呑噬當通衢人筋為爾斷人力為爾枯衣巾穢且甚盤饌腥有餘豈是陽徳衰不能使消除豈是有主者此鄉宜毒荼吾聞蛇與螫避之則無虞吾聞蠆有毒見之可疾驅唯是此蚊子逢人皆病諸江南夏景好水木多蕭疎此中震澤路風月彌清虚前後幾来往襟懐曾未舒朝幾䝉襞積夜仍跧蘧蒢雖然好吟嘯其奈難踟蹰人生有不便天意當何如誰當假羽翼直上言洪鑪平望驛張祐一派吳興水西来此驛分路遥經幾日身去是孤雲雨氣朝忙蟻雷聲夜聚蚊何堪秋草色到處重離羣平望驛寄吳興徐使君𤣥之故人為作郡百里到吳興藻思江湖滿公平道路稱包山方峻直霅水况澄清佇聴司空第遥知下詔徴平望驛感先輩李從實周錤二故人李郢蘆葦風多驛堠長昔年攜手上河梁青雲才子鴛鴦季白石山人芝术香驊驥欲陪先道路大川斯濟戢舟航少㣲星動桂枝發重整孤㠶過水鄉過平望顔真卿茫茫菰艸平如地𣺌𣺌長堤曲似城日暮未知投宿地逢人便向問前程邂逅劉公尤於平望蘇舜欽昔别蘋初生離謳發清商契濶幾何時遷轉尤在梁我亦宦逰者吳㑹非故鄉三考一瞬息扁舟此尚羊邂逅通夕語弭楫水中央淡影月照户清音雁南翔攄意良未盡詎及羅酒漿予去尚千里道路阻且長﨑嶇慎所歴無令馬𤣥黄過平望范成大寸碧闖高浪孤墟明夕陽水栁揺病緑霜蒲蘸新黄孤嶼乍舉網蒼烟忽鳴榔波明荇葉顫風熟蘋花香鷄犬各村落蓴鱸近江鄉野寺對客起樓隂濯滄浪古来離别地清詩斷人膓亭前舊時水還照雙鴛鴦平望道中王惲今日風日好舟行喜清和吳江抵嘉興逺不百里過解衣坐篷底閒聴吳儂歌大艑從東来帆檣鬱嵯峨云是淮海公赴召躭㣲疴蒼皇不少住進棹如飛梭物情忌太盛從者不得多尚餘蔽川載意氣溢兩河有懐陶朱公伯業刋不磨功成委之去敝屣與棄蓑左頋萬金槖右頋西施蛾可想不可見五湖𣺌烟波平望陳基下田不憂旱高田正宜雨四野已足霖三吳復無暑盂酒及豚蹄盤羞及鷄黍擊鼓樂社翁燒燈御田租泊平望弔𤣥真子孫銳仙非勝地仙不昇地非仙跡地不靈古今絶勝天下景多為羽客梯雲軿松江之南平望驛千古清名垂載籍遺基廢井雖不存依舊湖光接天碧我聞在昔張𤣥真平生活計一釣綸浮家汎宅戯人世龜魚為友蒹葭隣故人分符刺苕水東逰歴遍溪山美翩然聨璧至此鄉回視塵寰如敝屣酒酣水戯身甚輕席行水面同舟聲祥雲瑞鶴歘然至汎此凌空歸太清西塞山邉飛白鷺其間儘有朝元路緑蓑平日恣遨逰何忍臨岐弗相頋爭知萬頃玻璃中清都紫府遥相通故来成此一竒事欲將名姓傳無窮風帆過後沙鳥墜靈跡雖存人不記白蘋紅蓼自爭妍誰識此為真福地何人好事能揮金結廬繪像湖之隂寒泉一盞薦秋菊往来不負詩人心𤣥真今在天何處獨立河梁望飈馭丹臺玉籍若相容携手乘風共歸去平望亭瞿衡懶於篷底閱青編来坐亭前一鏡天識我鷗閒如舊日問人鶯鬭莫知年半竿落日收漁網幾樹春風繫客船邂逅花邉須酌酒囊中賸有賣詩錢平望夜泊僧蕉室風靜寒塘起暮烟數聲秋雁客程前湖波東下青山盡客路南来綵鷁連伯國城空惟燐火升仙祠古有題篇夜深何處漁歌發明月蘆花野水邉泊平望僧道原計程息勞牽日晩江路永連檣如有待聚泊就村井沙明鷗羣回月出人語靜心清獨不寐况乃風露冷因思往来客終日困馳騁得非衣食驅無乃縁造請吾人方外士素志慕箕潁胡為渰水宿混迹問鼃黽丈夫别有念此意誰得領人生未聞道如何卧烟景過平望張觀喚醒江鷗夢舟行認洞庭石橋浮半月漁火㸃殘星驛路三千客春風十里萍逢山青未了回首又長亭過平望陶振平望橋東倚畫舟江天空濶稱𡨕搜瀰漫烟樹村墟晩浩蕩雲濤澤國秋户繞鴨䦨開驛舍旗揺雉尾見譙樓聖恩優老身康健許着羊裘狎海鷗平望八景俞睦雨過南湖水更寛琉璃影裏月光寒雙鶯一去無踪跡夜夜惟㸔浴素鸞鶯湖夜月樹色依㣲欲曙天一㾗殘月墮江烟鶯湖西畔前朝寺惟有鐘聲落釣船殊勝鐘聲蘆荻蕭蕭起晩風行人從此挂歸篷遥㸔隔浦含烟樹尚帶殘陽一抹紅逺浦歸帆畫棟翬飛聳碧空湘簾高捲綠楊風吳山霅水無窮趣都在凭䦨一望中驛樓覽勝當年于頔刺湖州曾築長隄捍逆流兩㟁曉風楊栁緑王孫得意騁驊騮頔塘躍馬桃花流水鱖魚肥之子仙逰尚未歸留得青山苔石在行人錯認綠蓑衣𤣥真仙跡溪橋酒店繫垂楊好鳥多情喚客嘗最愛春風初起處一簾疎雨杏花香溪橋酒店幾家茅屋住烟村桑柘重重綠映門昨夜鶯湖初雨過漸㸔新漲入籬根茅屋桑村平望鎮去縣東南四十里在二十四都有平望驛廵檢司震澤别業自遣陸龜䝉數尺㳺絲墮碧空年年長是惹春風爭知天上無人住亦有春愁鶴髮翁震澤道中王原杰村市蕭條數十家扁舟夜泊傍蘆花江空嵗晩歸心切水逺山長去路賖帶水野田鳴落雁連雲烟樹繞昬鴉勞生徒負燈窗志只合西園學種瓜春過震澤留别智愚隠蘇昌齡謝應芳松江太湖春水生湖上白鷗尋舊盟逺公沽酒壯行色坡老賦詩言别情燕子日長書屋靜栁花風颺釣絲輕相過不負青山約一棹夷猶兩日程震澤分題送李内翰周鼎湖上雨晴添綠波郎船將發唱吳歌誰知三萬六千頃不及儂愁一半多野老乘舟自打橈閒㸔翡翠戯蘭苕連山不斷南山口曲水廻通抵近橋太湖東去水相通大浪掀天難使篷今夜且来洲裏宿明朝又怕日高風震澤鎮去縣西南九十里在十都有廵檢司過梅堰在二十都陸龜䝉一作務觀春行霧雨暗衡茒兒女隨宜治酒肴便覺此身如在蜀一盤籠餅是豌巢過八赤遇雨在三都勝事營居觸事竒酒甘泉滑鱸魚肥松江好處君須記風靜長江雪落時宿庉村在廿七都僧北澗秋風寄衰栁此景亦蕭然月落牛方飲舟行雁未眠蓑衣無吏習茒屋有詩禪村僻人家少烟空水接天栁胥暮歸在二都姚廣孝歸城心欲速短艇夜還乘僧寺烟中磬漁家水際燈遥天昬訝靄高樹聳疑陵隔㟁山偏好徐㸔想舊登寓栁溪感懐陶振漂泊東南萬里船故鄉回首白雲邉慈親白髮三千丈客子貂裘二十年韓信每朝常寄食張衡何日賦歸田不堪腸斷思鄉處風雨瀟瀟暗海天車溪道中在二十三都僧善住葦白茒黄溪水清倚篷閒㸔浪鷗輕板橋横處人家小修竹參天落照明客裡蹉跎嵗欲䦨水邉楊栁尚平安夜来已作還鄉夢滿目西風客棹寒仲雍墓周霞賔虞墓東山頂岐州萬國西人皆憐伯仲心實似夷齊海水龍無害蠻花鳥自啼寂寥懐古意文葆見遺黎同前傅良玉仲雍古冢已丘墟冢上閒雲日巻舒奠薦不聞陳簠簋芟夷端合禁樵蘇杜鵑啼血春風老狡兔穿塋夜月孤過客無勞增悵惘至今讓徳重勾吳同前王賔斷髮文身正隠時清高裏面有權宜空山葬處惟荒草到處人来必拜之訪仲雍墓吳訥虞仲隨伯氏冺跡逃荆蠻至今仲雍處猶自稱虞山遺跡邈難尋廢冢留山間鄉邑失開陳嵗逺埋荒菅賤子忝末裔有淚自澘澘誰為禁樵牧陳辭扣天關同前鄭東野鼠穿黄穴遺封百草深死無歸國夢人識逸民心巒樹冬逾碧江猨夜亦吟海虞山上月梅里共沉沉同前周師敬賢哉虞仲氏讓國来荆蠻㫁髮文其身之死不復還孤冢鬱峨峨屹立山之間高風播宇宙邈矣誰能攀青山得以名萬古永不刋吳仲雍墓吳地記曰在常熟縣西虞山上與言偃冢並列寰宇記曰虞山有仲雍齊女墓吳王闔閭墓張伯玉東客往来過虎丘橘花渡口維扁舟闔閭宫殿不可見但見古墓寒颼颼憶昔吳王全盛日水犀十萬横吳鈎楚山既掘荆人冢越壘仍將勾踐囚豈謂西施能破國誰知麋鹿上臺逰惟有吳王在時月夜深閒照劍池秋同前高啟水銀為海接黄泉一穴曾勞萬卒穿謾說深機藏盗賊難令朽骨化神仙空山虎去秋風後廢榭烏啼夜月邉地下應知無敵國何須深葬劍三千同前周南老穿土鑿山骨積壤崇林丘黄腸錮銅槨玉鳬浮汞溝金精来踞虎瑞兆符眠牛生維寳莫邪于焉殉純鈎池空因劍名寒碧澄隂湫高深胡足恃曷用智力求同前陳毓下穿老骨瘞銅棺要使先王體魄安金虎氣消天地老玉龍光射斗牛寒蓬科有恨埋千載麥飯何人奠一盤休笑子胥無葬所古今廟食拜衣冠干將墓高啟干將善鑄劍劍成終殺身吳伯亦遂亡神物豈不神始知服諸侯威武不及仁徒勞冶金鐵精光動星辰莫邪應同埋荒草千古春青蛇冢間出猶欲恐耕人同前周南老神物須人就爍身劍乃成厥妻剪爪髮投冶濡金精兩龍躍而出干將獲全生獻雌匿其陽殺身逆鱗嬰匠門傳有冢春莎還自青劍化已云乆吳治墓亦平孫武墓王賔行兵無敵顯當年有墓于今是野田八十餘篇書在昔流傳惟有十三篇孫武墓在城北平門外西北二里要離墓楊維楨金閶亭下路春草沒荒丘云是要離冢令人生古愁侏兒三尺餘不佩雙吳鈎中包猛士膽白日照高秋惡死屠骨肉視身若蜉蝣荆軻不了恨慶忌成身謀如何五噫客死與爾同儔同前周南老細人膽氣雄一坐挫壯士臣吳許申胥垂氣刺慶忌兩勇苦相厄多君囊底智棄妻固非仁殺身始全義西出金閶亭亭下幽扃閉年年草自春舉目山河異同前高啟弱夫殺壯士誰敢嬰其怒今日古城邉耕人肆侵墓同前王賔當日要離投慶忌甘從驅使計謀深何如豫讓能明白羞效人臣懐兩心要離墓在吳縣西四里閶門南城内相傳在今梵門橋西城下馬婆墩舊有砲座基宋嘉定十六年提刑司修城此地多得古塜莫詳姓氏瓊姬墓高啟夢别夫差殿頭墮釵零落誰收土昬青鏡忘曉月冷珠襦恨秋麋鹿昔来廢苑牛羊今在荒丘香魂若怨亡國莫與西施共游同前徐賁館娃宫裏巳堪愁况值泉臺閟小丘月冷寶奩無復曉池空玉雁不知秋蘿間舊屋僧来往竹下新亭客過逰不有佳名留郡志誰能識此為停舟瓊姬墓在陽山與夫差塜相近吳女墓高啟魚燈照艶魄夜冷珠衣薄白玉土中埋紅蘭霜後落不乘臺上鳯空舞橋邉鶴韓重未歸来泉宫秋寂寞同前周南老鶴舞導靈輀花落埋香玉幽憤為誰嬌愁鎖春蛾綠不復棲鴛鴦焉知走麋鹿嗟爾韓家兒故為遂所欲相田異死生佳期難再復維鳯鄙衆鳥誰能慰㷀獨同前王賔眼㸔家國把眉顰無奈芳年病損身歌裏分明人聴説苦猜儂意是懐春吳女墳在閶門山塘齊女墓周霞賔帷茀三千里辭親逺結婚浪傳招楚些難返望齊魂蘭麝山頭土蒿萊郭北門生涯歸一瞬標榜至今存同前張洪南風初勁北風㣲爭長諸姬復娶齊越境定須千兩送戒途應拭萬行啼望鄉不憚登臺逺埋恨惟嫌起冢低夢艸萋萋猶泣露倩誰滴向故鄉泥同前吳訥齊景不自強涕出女於吳迢迢三千里百兩来姑蘇死葬虞山顛北望父母都芳魂逐飄風艶骨歸黄壚空餘一荒邱月夜嘷飢狐同前程式宗國中㣲日勾吳始伯時来歸非我志時事有天知身死蘇臺下心馳淄水湄萋萋芳草墓千古不勝悲同前鄭東突兀孤墳在千年恨尚新荆蠻非偶國盤瓠媿吾人躑躅春啼血狐狸夜得鄰營丘無伯業吳治更傷神同前林大同嘗聞齊景公涕出女於吳孟姜志貞烈憂憤身為殂吳亦閔其志卜葬於海虞中宵走飛燐昭明燭太虚有客從宦逰考功朝帝都奕奕有耿光應與忠義俱齊女墓吳越春秋云吳太子娶齊女女思齊而病將死曰必葬我於虞山之顛以望齊國闔閭傷之如其言葬之子游墓王賔有樹枯来不記春却依虞仲冢為隣山家相約休樵采十哲人中第九人子游墓在海隅山上史記吳世家注仲雍冢並列朱梁墓行行一里近婁門有漢朱梁墳尚存人欲知他身種徳其家多代出賢孫朱梁墓在婁門東南二里頋三老墳魯有兩生名姓佚人皆嗟惜信其賢分明名姓稱耆徳何必忉忉史上編頋三老墳婁門塘北漢頋綜為尚書令明帝時三老吳頋氏是其裔梁高士碣梁肅有漢高士梁君諱鴻字伯鸞扶風人天元純白誕其生知囊括道妙而遊於世遭漢㣲缺澆風偃物君以為道不可徇時故安節以高蹈高蹈不可以激俗故登邙以作歌歌不可以遺患故適越以遐遯遯不可以不立故寄食於杵臼是以孟氏恱其道而妻之伯通尚其風而禮之安夫大而遺其細忽夫語而順乎黙樂則行之憂則違之斯可謂高世之逸民矣原夫天之運也曰明與晦人之道也曰否與泰逹人知否與晦之不可為也故耦而耕狂而歌鑿坯以逃荷蓧以晦儉徳避難不成乎名於戯伯鸞非斯人之徒誰與哉唐大厯六年小子旅於吳得君之舊逰焉孟子稱聞栁下惠之風者鄙夫寛薄夫敦然則聞鴻之風聲亦將舍爾朶頥以觀我靈龜乎乃刋貞石以識遺烈銘曰山隠器車河秘馬圖伯鸞不行獨與道俱太虚無際浮雲無繫伯鸞伊何冥跡人世直道辱身三黜魯邦扣馬逆諫餓于首陽邈矣伯鸞靜而含光作銘皋橋萬古是望題梁鴻墓效五噫歌體高啟頋瞻亭皋兮噫丘墳有蒿兮噫鬻舂亦勞兮噫危邦可逃兮噫先生何高兮噫梁高士墓周南老伯鸞抱清節鬻舂苦勞生吁嗟歌五噫豈其相杵聲配無徳耀賢曷以成佳名城西禮讓鄉有此高士塋過者為俯軾路近金閶亭于今冢雖夷指地名猶稱同前王賔憂國心多賦五噫君王清問合尋思埋身客土終傭保正在東京盛治時梁鴻墓在吳縣西四里要離冢北祭梁先生文陸龜䝉先生為五噫之歌漢天子聞而病之南走乎大江之波客皋氏之宇下志沉潛而靡他白吳粲以舉臼夫人之勤亦多不懐志沉潛而靡乎道之無頗比要離之烈魄冢雖夷而不磨嗟予後先生之千祀聊奉奠而求過俯灌地而仰語頋先生之謂何心褊性誕客他人之宇下不得故垣而自翰身病妻弱白吳民之粲不得故力耕而自獲所以法先生之義者庶五噫之可作伯通墩王賔能識梁鴻與孟光生時人已不尋常城西墳上皆荆棘名字流芳却未荒伯通墩在西門即其墳也世稱伯通字奉卿漢吳郡丞武開明碑金石録右漢吳郡丞武開明碑云君字開明而其名已殘缺又云永和二年舉孝亷除郎謁者漢安二年遷大長秋丞長樂太僕丞永嘉元年喪母去官復拜郎中除吳郡府丞夀五十七建和二年十一月十六日遭疾卒其可見者如此其他磨滅不可盡識按後漢書大長秋丞一人秩六百石本注宦者又長樂少府位在長秋上及職吏皆宦者又有太僕二千石在少府上丞六百石據志所載中宫及長樂宫官屬皆以宦者為之而以史傳及漢魏石刻參攷如大長秋少府之類皆襍用士人今武君以孝亷為郎謁者郎中吳郡府丞皆非宦者之職然則兩宦官屬葢亦襍用士人也原闕查金石録亦闕代吳令謝詢求為諸孫置守塜人表張悛臣聞成湯革夏而封杞武王入殷而建宋春秋征伐則晉修虞祀燕祭齊廟夫一國為一人興先賢為後愚廢誠仁聖所哀悼而不忍也故三代敦繼絶之徳春秋貴柔服之義昔漢高受命追存六國凡諸絶阼一時竝祀親與項羽對爭存亡逮羽之死臨哭其喪將以位嘗侔尊力嘗均勢雖功奪其成而恩與其敗且暴興疾顛禮之若舊殘戮之尸乃以公葬若使羽位承前緒世有哲王一朝力屈全身從命則楚廟不墮有後可冀伏惟大晉應天順民武成止戈西戎有即序之人京邑開吳蜀之館興滅加乎萬國繼絶接于百世雖三五𢎞道商周稱仁洋洋之美未足以喻是以孫氏雖家失吳阼而族䝉晉榮子弟量才比肩取進懐金侯服佩青千里當時受恩多有過望臣聞春雨潤木自葉流根鴟鴞恤功愛子及室故天稱罔極之恩聖有綢繆之惠追惟吳偽武烈皇帝遭漢室之弱值亂臣之強首倡義兵先衆犯難破董卓於陽人濟神器於甄井威震羣狡名顯往朝桓王才武弱冠承業招百越之士奮鷹揚之勢西赴許州將迎幼主雖元勲未終然至忠已著夫家積義勇之基世傳扶危之業進為徇漢之臣退為開吳之主而烝嘗絶於三葉園陵殘於薪采臣竊痛之伏見平吳之初明詔追録先賢欲封其墓愚謂二君並宜應書故舉勞則力輸先代論徳則惠存江南正刑則罪非晉㓂從坐則異代已輕若列先賢之數䝉詔書之恩裁加表異以寵亡靈則人望克壓誰不曰宜二君私奴多在墓側今為平民乞差五人蠲徭役使四時修䕶頽毁掃除塋壟永以為常孫王墓辨盧熊右漢豫州刺史孫堅堅妻吳夫人及其子㑹稽太守䇿三墓並列盤門外三里即今齊昇院東南面勢據古蛇門正與府治相向祥符圖經云孫堅墩方俗稱為孫王墓按吳書堅死於初平二年年三十七䇿死於建安五年年二十六吳氏死於建安七年合葬堅墓黄龍元年權追尊堅為武烈皇帝廟曰始祖墓曰高陵吳氏為武烈皇后䇿為長沙桓王太元元年八月朔風㧞高陵松柏石碑蹉動晉陽秋云惠帝元康中吳令河東謝詢表為孫氏二君置守冡五人備掃除有詔從之其文張悛所作今載文選陸廣㣲亦云盤門東北二里有吳武烈皇帝并長沙桓王等三墓前志云宋政和六年村民發墓其磚側有萬嵗永藏四篆字得金銀簪十數枚有東西銀桮初若粲花良久化為腐土并金搔頭十數枚金握臂二悉皆如新一瓦熏爐與近世陸墓所制畧似而箱底灰炭猶存焉碑石斷缺厪餘中平年三字州將遽命揜之所得古物盡歸朱勔家洪伯芻香譜亦畧載此事即楊友䕫所賦孫豫州墓者是也洪氏三庚志云盤門外大冡紹興二年秋雨隤圯牧童入其間得銅器數種持賣於市鄉人往視圯處葢其隧道有石刻𨽻書云大吳長沙桓王之墓赤烏三年凡十二字知府沈揆亟命揜塞仍立石表其所滕宬為記袁席之謂䇿死距赤烏三年巳四十載豈非權稱制之乆復改葬乎所得之器縢藏一小鏡其背有銘十四字一銅小麟鎮紙無欵識以遺席之嘉熙中墓傍土中又得唐孫徳琳墓志云開元十年窆於十四代祖吳武烈皇帝陵東南平地又按丹陽圖經載高陵在縣西練塘鄉吳陵港以傳記證之當是堅葬曲阿後遷于吳史不及詳載爾滕宬所記謂紹熙中提舉常平詹體仁嘗命其屬表之題曰先賢墓徐誼屬宬考訂止從俗稱孫王墓宬葢據陳夀說破虜葬曲阿及䇿之薨其將周瑜魯肅皆赴喪獨指此為伯符之墓亦未嘗及謝詢所表不審三墳同域故論說紛紜自相牴牾在政和知為豫州之墓在紹興知為長沙之墓皆不能質諸傳記以求其說地亦嘗為窰故舊志不復詳究矣因備載始末傳諸好事仍録古今文詞如左云行經孫氏陵何遜昔在零陵厭神器若無依逐兔爭先捷犄鹿競因機呼吸開伯道叱咤淹江畿豹變紛竒略虎視肅戎威長蛇衂巴漢驥馬絶淮淝交㦸無内禦重門豈外扉成功舉以棄㐫徳愎而違水龍忽東騖青葢乃西歸朅来以永乆年代暧㣲㣲苔石疑文字荆墳失是非山鶯空曙響隴月自秋輝銀海終無浪金鳬㑹不飛闃寂今如此望望沾人衣長沙桓王墓下别李紳張南史劉長卿長沙千載後春草獨萋萋流水朝將暮行人東復西碑苔幾字滅山木萬株齊佇立傷今古相㸔惜解携長沙王墓范成大英雄轉眼逐東流百戰工夫土一抔蕎麥茫茫花似雪牧童吹笛上高丘同前劉克莊伯畧誰堪敵伯符每開史䇿想規模一千掃衆横江去十七成名自古無警蹕未迎歸大内英雄可惜死東吳君㸔末命猶餘競指顧張昭為託孤題孫伯符墓韓淲自無太史慈孰對孫伯符羣舒有餘地周郎或知予既推道南宅以溼謾相濡本擬馳中原掃滅鄴下都夭乎許貢客一箭失壯軀黽勉付後事張昭乃其奴赤壁之大攻僅可保全吳公瑾復不長伯業益荒蕪至今春草生高墳在姑蘇傳言尚相㸃經行倍踟蹰異代嵗月速誰為我非夫酹酒起英爽白楊鳴赤烏荆州忽已分曹劉竟稱孤堂堂破虜冢歸命誠是俘孫伯符墓下周弼梧葉蕭蕭墓草長夢魂曽斷九迴膓空聞絳帕離漳水誰見黄旗入洛陽虎峙有基宫樹老龍盤無廟石城荒赤烏不識桑田變猶自棲棲戀白楊吳桓王墓懐古鄭元祐有吳桓王之墓田乃在盤門南郭邉墓中玉鳬乆化土石上赤烏猶記年寒食無人洒麥飯東西滿地飄榆錢功昭前王啟吳阼葬地合擇名山川闔閭城南不百步土薄易致耕夫穿昭紘諸臣號詳宻慮不及此寧非愆緬思山東舉義日媚竈頋已無諸賢惟王父子起相繼黄星閃避東南天假之修齡定四海許下豈容瞞着鞭鑿山揜匠等發掘朽壤一抔誰獨専白楊蕭蕭北邙路姓名能得幾人傳吳桓王墓高啟朝出南郭門高墳鬱蒼蒼借問葬者誰乃是長沙王黄腸豈不錮盜發取所藏金環出世間封樹無輝光緬思衰炎際當途逞奸強英雄失所據虎視誰敢當王初奮稚孤英風凛飛霜談笑定江東賢豪歘来翔少假須臾年足見伯道昌胡為困仇奴輕獵不自防天意豈祐魏遽使斯人亡因觀感往事喟焉令人傷同前周南老城南桓王墓高冢何穹崇昔為盜所發冢開寳氣空孱然一髫孺揮箠定江東闢地餘千里義勇日以雄萬嵗期永藏誰能錮幽宫英雄昔所在燕麥揺春風孫王墓王賔千里爭衡最少年馬驕風疾喜行前正當許下迎天子玉樹生埋在九泉孫王墓在盤門外今為義塜石崇墓高啟虬須欲怒珊瑚折步障圍春錦雲熱真珠換妾勝驚鴻笑踏香塵如踏空酒䦨金谷鶯花醉家逐樓前舞裙墜財多買得東市愁綺羅散盡餘荒丘猶令白首同歸者坐伴游魂楓樹下弔石崇墓周南老城西多巖壑信美非金谷荆州石刺史胡為此埋玉緬懐步障春雲錦爛綺縟買嬌教歌舞不惜珠三斛頋此墮樓人焉知禍所伏蒼蒼墓已墟誰歟悲宰木石崇墓在吳縣西六里張翰墓王賔洛陽城裏秋風起天下紛紛事暗多歸去不將身向酒虚名有後是如何張翰墓在横山東五里陸績墓寥落孤墳荒草深一迴行過一沉吟邉頭有土如栽橘表見當年念母心陸績墓在陽抱山吳地記云在閶門外泰伯廟西元至元間郡人朱澤民祖母病卜地此山夢偉丈夫告曰勿奪吾宅吾且為夫人後既而穿地得石曰鬱林太守陸績之墓别有刻曰此石爛人来換石果斷矣遂揜之而卜兆其傍今狀元朱希周是其裔也頋榮墓謝應芳白髮吳儂說姓名將軍墓近闔閭城徵車入洛稱三俊割炙知人得再生江月似留揮扇影松風猶作鼔琴聲停舟一酹蘋花渚野鶴飛来躑躅鳴同前王賔不見人將琴走過白楊風𦂳獨秋多生同張翰言還在酒可忘憂如病何頋榮墓寰宇記云在赤門外九里吳地記云在吳縣東南二十里側有左威將軍張敏墳今寔在葑門東六里長洲縣黄天蕩南俗訛稱頋邑墓西有祠題曰頋將軍廟或云上將軍榮從子和亦葬吳瞿硎先生墓塼闕名瞿硎先生字鵲子廣川人隠居不仕葬于東陵武安寺重岡之原瞿硎墓慶元志云在直塘市市有廣安寺浚塘得古冡墓磚稱云云武安葢廣安舊額也今其地尚多瞿姓事見晉書隠逸傳頋野王墓高啟南朝舊碑倒墓近樵蘇道應與讀書人離離縂秋草同前周南老迢迢越溪水映帶楞伽山清寂氣所窮鬱鬱佳城環野王識龍穴卜兆于其間平地不起墳乃知防後艱癖愛山水勝清興殊不慳丹青更稱絶猶得留塵寰同前王賔身瘦更兼哀毁甚行應有杖亦難扶提兵慷慨誅兇逆健者臺城赧子無頋野王墓在楞伽山下吳地記云在横塘别隅平地不起墳宋紹興間碑石尚存陸墓忠宣公董生有學似相當文氣從容理又長奔走奉天勞諌諍忠州閒坐集醫方陸墓在齊門北世傳陸宣公贄葬焉朱子云董仲舒陸宣公皆有宰相之學真娘墓李商隠虎丘山下劍池邉長遣逰人嘆逝川罥樹斷絲悲舞席出雲清梵想歌筵栁眉空吐效顰葉榆莢還飛買笑錢一自香魂招不得秪應江上獨嬋娟同前張祐佛地葬羅衣孤雲此是歸舞為蝴蝶夢歌謝伯勞飛翠髮朝雲斷青蛾夜月㣲傷心一花落無復戀春暉同前羅隠春草荒墳墓萋萋問虎邱死猶嫌寂寞生肻不風流皎鏡山泉冷輕裾海霧秋還應伴仙子香徑夜深逰同前頋瑛何處真娘墓雲埋斷石根夜深風雨急誰喚海棠魂同前高啟金釵葬小墳楊栁寺前村巳斷花間信空歸月下魂山鶯留曲韻草露帶啼痕車馬逢寒食還来酹酒尊同前周南老女郎善歌舞日事繁華樂死葬虎丘山未忍甘冷落香魂化蝶飛每為春風托至今墳上花猶能媚輕薄紛紛逰冶兒懽呼為盤礴幽幽短簿祠誰来酹清酌同前蘇衡不見當時窈窕娘空遺孤冢對斜陽凄凉夜雨悲瑶瑟埋沒春風怨錦囊墳上不生連理樹人間那得返䰟香分明蘓小西陵路草緑蘼蕪易斷腸弔幽獨君周南老閴乎山之幽𤣥扃閟覊獨嗟爾長夜魂愁共哀􅆐哭𠂻情見于辭隠石句堪讀形化神不留奚啻同朽木冥􅁳既飄散胡為未忘欲猶知念所親身百其可贖幽獨君墓高啟君本何代人姓名復為誰何年棄人間長眠此山陲荆榛鬱䝉蘢孤墳尚無碑游魂乆未化哽咽還能詩人歿乃歸滅憂樂豈復知君何獨煩寃猶有親愛思一死衆所同已矣焉足悲陳詞為相弔此理君當推幽獨君墓在虎丘山北唐通議大夫和州刺史吳郡張公神道碑銘白居易張之為著姓尚矣自漢太傅良侍中肱晉司空華丞相嘉以降勲賢軒冕歴代不乏肱避地渡江始居于吳故其子孫稱吳郡人嘉以孝悌聞于郡故其所居號孝張里嘉之曾孫裕在宋為司徒即公五代祖也司徒之孫儔在隋為吳郡都督即公曾王父也台州臨海令諱鯤即公王大父也袁州司馬諱孝績即公王考也或以人物著或以閥閱稱迄今為江南右族公諱無擇字無擇未冠丁袁州府君憂廬于墓晝號而夜泣者三年矣有靈芝醴泉出焉既冠好學能屬文從鄉試登經第應制舉中精通經史科補𢎞文館校書郎調左金吾録事尋授杭州録事參軍在杭前後詰偽制補吏者三十八人駁假年侍老者二千人舉而正之人服其明㑹劉幽求來為刺史舉課聞詔授絳州録事參軍絳之郡有主胥者怙寵侮法豪奪人利公數其罪露章奏之章下丞相姚元崇竒之致書褒美尋改太原府功曹參軍給事中張昶為江淮安撫使表公正直奏置部從事吏部尚書陸象先為河東按察使狀公清白奏授懐州獲嘉令在獲嘉以不茹柔得人心以不吐剛得罪於是左選鄂州司馬移深州司馬轉虢州長史時上方思理詔求二千石之良者時宰以公塞詔擢拜和州刺史公在郡奉詔條恤人隠而已不知其他無何水潦害農公請蠲榖籍之損者什七八時李知柔為本道採訪使素不快公之剛直宻疏誣奏以附下為名遂貶蘇州别駕老幼攀泣而遮道者數百人信宿方得去移曹州别駕嵗餘謝病歸老於家天寳十二載正月二十一日終于東都利仁里私第其年二月十二日葬于河南府伊闕縣中李原享年八十三噫公立天地間八十有三年可謂夀矣其間當明皇帝馭天下四十有五年可謂時矣有其才得其夀逢其時然職不過陪臣秩僅至郡守凡所貯蓄鬱而不舒嗚呼其命也夫公之文學嘗為賀知章賈彦璿許之公之諒直常為李邕張廷珪稱之公之政事又為劉姚張陸推之夫以八君子之力援之而不足以一知柔之力排之而有餘厄窮不振以至沒齒嗚呼其命也夫古人云道不虚行又云其後必有達者故公之子大理評事誠以節行聞於時公之孫户部侍郎平叔以才位光於國報施之道信昭昭矣不在其身則在子孫相去幾何哉長慶二年某月某日平叔奉祖徳碣之居易據家狀序而銘之其詞曰有木有木碩大而長破為桷杙不作棟梁有驥有驥規行矩步辱在短轅不駕大輅嗚呼噫嘻公亦如之何時不遇我而我不遇時勿謂已矣天錫多祉既賢其子以濟其美又才其孫以大其門茍無先徳孰啟後昆唐贈尚書工部侍郎吳郡張公神道碑銘并序有唐嶺南觀察推官試大理評事吳郡張公大厯三年十一月八日終于伊川别墅五年八月七日葬于伊闕縣中李原春秋五十五元和十三年詔贈主客員外郎明年贈太常少卿又明年贈尚書工部侍郎夫人吳郡陸氏貞元二年某月某日終于某所春秋六十六追封嘉興縣太君又封吳郡太夫人嗣子通議大夫守尚書户部侍郎判度支上柱國賜紫金魚袋平叔以長慶二年某月某日立神道碑太原白居易文其碑云公諱誠字老莱吳郡人父諱無擇和州刺史祖諱孝績袁州司馬由高曾而上世徳世祿載在和州府君碑内此不書公年十八以通經中第及調判入高等授蘇州長洲尉秩滿丁先府君憂既禫又丁先太夫人憂泣血六年哀毁過制以方寸再亂殆無宦情既除喪退居不調者累年而親友以大義敦責不得已而復起選授左武衛騎曹參軍分司東都屬安禄山䧟覆洛京以偽職滛刑脅刦士庶公與同官范陽盧巽潛遁于陸渾山食木實飲泉水者二年訖不為逆命所汙及肅宗嗣位詔河南尹薛伯連搜訪不仕賊庭隠匿山谷者伯連得六人以應詔而公與巽在焉繇是名節聞於朝野君子以為知道優詔褒美特授宻縣主簿未周嵗遷宋州碭山縣令時睢陽當大兵後野無草里無人公撫之一年襁負至二年汙萊闢三年衣食足及解印去縣民相率泣而餞之君子以為知政嶺南節度觀察使李勉偉人也既高公陸渾之節又美公碭山之政欲以名職禮命起而大之遂奏授試大理評事充觀察推官及除書簡牒到門即公捐館舍之明日也才如是命如是嗚呼哀哉公常自負其才不後於人自疑其命不偶於世及將去碭山而反伊川也頓駕搦管沈嘆乆之因賦咏懐詩云論成方辯命賦罷即歸田竟如是言終于衡茅之下君子以為知命公有三子曰平仲平叔平季夫人陸氏郡國子司業集賢殿學士善經之女賢明有法度初公既歿諸子尚幼夫人勤求衣食親執詩書諷而導之咸為令子又嘗以公遺志擇其子而付之故平叔卒能振才業致名位追爵命碣碑表繼父志揚祖徳此誠孝子順孫之道也亦由夫人慈善教誘之徳浸漬而成就之不其然乎居易常辱與户部逰而知其家事故見託譔述庻傳信焉銘曰猗嗟碭山以文行保家聲以義節振時名以惠政撫縣民而職不登諸侯卿秩不及廷尉評悲哉猗嗟碭山前有和州名徳如彼後有户部才位若此才子之父名父之子賢者兼之可謂具美休哉右二葬碑銘雖不在蘇而皆吳人然孝張里是宋孝武旌張敷字景𦙍之居非張嘉也然必一族也其事見姑蘓志孝友傳陸象先墓王賔皇姑威令震朝中君不低眉暗去從墳上從来松柏樹青青遮莫雪霜濃陸象先墓在光福山西象先不附太平公主𤣥宗謂後凋松栢廣陵錢王墓一鎮中吳三十年農桑處處是人烟于今人到墳山下来見碑亭已泫然廣陵王墓在横山西王名元璙為中吳節度續圖經言其儉約鎮靜中吳賴焉范氏古蹟門稱其喜追逰不事園苑惟見虎丘則色喜至必規劃修繕范氏祖墳隂陽家說到墳前風水真宜子息賢文正有賢君聴取祖宗積徳百餘年范氏祖墳在天平山三讓原丁晉公碑曾鞏丁謂字公言初字謂之蘇州人常袖文謁王禹偁禹偁愛其文即為詩贈孫何及謂比之韓栁名遂大振淳化三年登進士第累擢知制誥諫議大夫兩為三司使大中祥符五年參知政事九年除節制知昇州天禧間復參知政事改樞宻使四年與李迪同相迪對上斥謂為奸邪同罷而謂獨留加司空封晉國公仁宗即位進司徒兼侍中坐雷允恭移山陵皇堂事罷少保分司再貶崖州司户參軍凡五年徙雷州又三年徙道州明道末復秘書監致仕居安州又徙光州卒年七十二詔賜錢十萬絹百疋謂淳化間為福建轉運使初置龍焙嵗貢團茶數品供御咸平初峽路蠻擾邉㑹分州陜為四路謂領䕫州轉運使措置蠻事作誓刻石柱境上其後又入㓂止委其酋領討平之居五年詔許其代乃舉薛顔景徳初契丹入㓂謂知鄆州敵騎稍南民大驚趣楊劉渡舟人邀利不時濟謂斬死罪囚于河上舟人懼不復稽阻又令廣旗幟撃刁斗聲振百餘里敵亟走遁大中祥符初議封禪未決謂因言大計有餘議遂定謂機敏有智謀憸巧險詖亦鮮其儔文字經目雖千百言無遺忘在三司案牘有差老吏不能曉者決於一言皆中其理朝廷營造莫不兼領凡奏祥瑞事皆謂及王欽若與焉少逰江南遇呂洞賔語之曰君狀貌同李徳裕言訖不見其後果騐弟誦說諫子珙珝珷玘丁晉公墓在華山習嘉原吳都文粹續集巻三十七
