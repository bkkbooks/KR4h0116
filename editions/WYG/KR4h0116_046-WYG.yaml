body:
  text: 呉都文粹續集巻四十六明錢榖撰雜文蘇州刺史謝上表白居易臣居易言伏奉三月四日恩制授臣使持節蘓州諸軍事守蘇州刺史以刺史臣某月二十九日發東都今月五日到州當日上訖時當明盛寵在藩條祇命荷恩以感以懼臣某誠歡誠幸稽首頓首伏惟皇帝陛下嗣膺厯數重造寰區將至昇平在先政化詢求牧守勤恤黎元實陛下惟良之秩責成共理之日也臣以微陋早忝班行前自中書舍人出為杭州刺史幸免敗闕實無政能已䝉寵榮入改宫相今奉恩寄又分郡符奬飾具載於詔中慶幸實生於望外况當今國用多出江南江南諸州蘇為最大兵數不少税額至多土雖沃而尚勞人徒庻而未冨宜擇循良之吏委以撫綏豈臣瑣劣之才合當任使然既奉成命敢不誓心必擬夕愓夙興焦心苦節惟詔條是守唯人瘼是求論陛下憂勤之心布陛下慈和之澤則涵育之下疲人自當感恩而嵗時之間㣲臣或希報政塵瀆皇鑒吐露赤誠寵至空驚恩深未答無任慚惶懇激之至謹差軍事散散將某乙奉表陳謝以聞臣某誠惶誠恐稽首頓首謹言蘇州謝上表劉禹錫臣某言伏奉制書授臣使持節蘇州諸軍事守蘇州刺史始從郎署出領郡章承命若驚省躬増感伏惟皇帝陛下受上𤣥之眷祐揚列聖之耿光大康黎元慎擇牧守德音每發品物咸蘇臣本書生素無黨援謬以薄伎三登文科德宗皇帝擢為御史在臺三載例轉省官永貞之初權臣領務遂奏録用並聞虛名唯守職業實無朋附竟坐飛語貶在遐藩憲宗皇帝後知事情却授刺史凡厯外任二十餘年伏遇陛下應運重光物無廢墜收拾耆舊塵忝班行既幸逢時常思展効在集賢院四换星霜供奉新書二千餘巻儒臣之分甘老於典墳優詔忽臨又委之符竹分憂誠重戀闕滋深石室之書空留筆札金閨之籍已去姓名本末可明申雪無路豈意聖慈𢎞納不隔卑微面辭之日特許升殿天顔咫尺臣禮兢惶不敢盡言空懐試懇謝恩而出生光於九陌之間受訓而行布政於五湖之外臣即以今月六日到任上訖伏以水突之後物力索空臣謹宣皇風慰彼黎庶臣聞有味之物蠧魚必生有才之人讒言必至事理如此古今同途了然辨之惟在明聖伏惟陛下察臣此言則天下之人無不幸甚江海逺地孤危小臣雖雨露之恩幽遐必被而犬馬之戀及親為榮蘇州謝賑賜表臣某言伏奉去年三月十五日敕蘇州宜賜米一十二萬石委刺史據户均給者恩降九天澤流百姓伏以臣當州去年災沴尤甚水潦雖退流庸尚多臣前月到任奉宣聖㫖闔境老幼無不涕零詢訪閭里偹知凋瘵方據事實以便奏論聖慈憂人照燭幽逺特有賑䘏救其災荒蒼生荷再造之恩歉嵗同有年之慶臣忝為長吏倍萬常情無任感激忭躍之至蘇州韋中丞自代狀蘇州狀上中書門下諸道鹽鐡轉運使江淮留後朝議郎守太僕少卿兼御史中丞上柱國賜紫金魚袋韋應物右臣䝉恩授蘇州刺史伏凖建中元年正月五日制刺史上後舉一人自代者前件官厯務皆有名執心不囘臨事能斷今預職雖重本官尚輕伏以當州者口賦首出諸郡况經災沴切在撫綏尚省無能輙敢公舉司權筦之利誠藉乎才流豈弟之風以維邦本非敢臆説以塞詔書今具奏聞蘇州上後謝宰相狀朝議大夫使持節蘇州諸軍事守蘇州刺史上柱國劉某右某今月六日到州上訖某山東一書生潦倒疎濶在少壯日猶不逮人况今衰遲智力愈短相公哀憐不遇擢授名邦實荷𢎞奬慚非令器伏以當州繇大祲之後物力蕭然飢寒殞仆相枕於野誓當悉心條理續具奏論才術素空憂勞方始懼無聞問忝負恩知不任瞻望懇迫之至蘇州加章服謝宰相狀右某素乏吏才謬居劇郡以無庸之器當難治之時恭守教條勤求人瘼伏以聖德柔逺皇明燭幽凡具上陳皆可其奏遂令管見得及疲黎自承雨露之恩非有循良之政猥䝉朝奬特降命書顧逄掖之腐儒披華章之貴服有黷陟明之典誠招彼其之譏限以官守不獲拜謝瞻望榮感心魂載馳蘇州謝恩賜加章服表臣某言伏奉去年十一月二十七日詔書加臣賜紫金魚袋餘如故者恩降重霄榮霑陋質虛黷陟明之典恐興彼其之詩寵過若驚喜深生懼中謝臣起自書生業文入仕德宗朝為御史以孤貞在臺順宗朝為郎官以緣累出省憲宗皇帝浸知其寃特降赦書追赴京國緣有虛心稱居清班務進者爭先上封者潜毁巧言易信孤憤難伸俄復一麾外轉三郡伏遇陛下膺期御宇大振淹滯哀臣宿舊猥見收拾職兼書殿官沗儀曹㣲勞未宣薄命多故又離署省重領郡符延英面辭親承教誨銜命即路星言載馳到任之初便逢災疫奉宣聖澤恭守詔條上稟睿筭下求人瘼才術雖短憂勞則深幸免流移漸臻完復皆承聖化所及遂使人心獲安豈由微臣薄劣能致臣素乏親黨家本孤貧年衰無酒食之娯性拙無博奕之藝自領大郡又逢時災晝夜苦心飲食忘味曾經誣毁每事防虞唯託神明更無媒援豈期片善上達宸聰回日月之重光燭江湖之下國絲綸褒異苦節既彰印綬煒煌老容如少望雲天而拜舞豈盡丹誠視環玦以徘徊空嗟白首無任感激屛營之至蘇州謝就除禮部員外郎充天章閣待制表范仲淹臣某言伏䝉聖恩特授臣前件官充職者涣渥自天震惶無地改中臺之華序進内閣之清班盡出髙明殊登秘近臣中謝竊念臣發自顔巷賔於舜門一第為榮四方無効爰自書林預選柱籍升華恥汨沒以懐安或感激而論事惟慕古人之節詎希英主之知伏惟皇帝陛下稟帝堯之聰明加漢髙之豁達坦聖懐而虛受期鴻化以咸孚念三聖之艱難而成丕業求七人之蹇諤以補大猷臣獨愧非才首當清問危言多犯孤立自持斧鉞居前雷霆在上敢避樞機之禍終乖藥石之良陛下日月垂光江海等量恕其萬死假之一麾望已絶於青雲咎未更於鴻霈俄易藩宣之寄寕分旰昃之憂忽降綸章薦加寵數而况闢圗書之府竊處於深嚴踐雲龍之庭當偹於顧問非名儒而不稱豈曲士之能堪矧簉清曹仍居舊治輝榮大集志願何求敢不内守樸忠外脩景行進退惟道遵聖賢視履之方終始一心副君父育材之造臣無任云云知平江府謝表孫覿詔紱疏恩忽返南遷之役嚢封避寵又分東顧之憂擢升内閣之華增重全呉之寄中謝伏念臣憑愚䕶短見誚褊衷觸情妄行自作竒禍厚誣若此一死何逃尚寛東市鈇鉞之誅永畀南海蟲蛇之侣仰止覆盆之照俯矜種豆之寃投豺遽屏於逺方敗履再升於華幄豈堪老退治筆硯於西垣止欲歸休挂衣冠於神武純誠備罄全度務從猥分刺史之符再列從臣之托心勞政拙已憂魏瓠之不容寢愕夢驚可見呉牛之尚喘兹葢伏遇皇帝陛下聖謨天縱盛德日新炎正中㣲肇光武興王之業小雅盡廢賡周宣撥亂之詩深念三呉刓敝之餘改畀千里藩宣之重宛其老矣自惟無益於縣官卧而䕶之尚欲兼安夫民吏龍圗閣學士再知平江府謝表内閣寳儲促上邃嚴之直全呉巨屏叨居方面之崇欣逢白首之遺民還復青氊之舊物恍如昨面祇忝明恩中謝伏念臣渉世濶踈空慚懵學逢辰休顯浸冒官榮獨荷三朝識㧞之恩偏塵兩禁髙華之選分符海上漸收遲暮之身改命呉中又玷藩維之重追尋陳迹宣布寛條千里江山不改承平之觀四隣雞犬一空盜賊之餘閭里呻吟田莱蕪沒攀金城之栁衰病何以堪之訪元都之桃飄零殆無存者兹葢伏遇皇帝陛下官人作哲厚下施仁俯憐簮履之遺加惠桑榆之晚撫三江之壌悼靈光之獨存矜一介之臣望神山而已逺幸擢官於小郡早沐輝榮旋移牧夫通都彌慙保障從此撫綏凋瘵申畫封圻虎頭食肉猶妄意於古人馬革裹屍庶捐軀於異日辭顯謨閣待制知平江府狀臣資稟蠢愚數忤權要一遭誣䧟遂寘嚴科負天下之至寃犯人臣之大惡始則州縣觀望發卒圍守至持梃擊柝以衛終則羣盗入室指為奸細又探嚢胠篋而趨妻子流離兄弟奔散暴露野次不知存亡疾病呻吟日與死迫遽叨嚴詔俾還禁垣削罪籍於城旦之舂收舊物於從臣之槖閭閻驚嘆弛拘維之禁交親改觀通問遺之書痛定之餘恍如隔世理宜扶憊奔走造朝而積憂薰心形癯骨立負薪有疾力難强於馳驅俟駕而行罪不容於逋慢忱辭上扣全度矜從擢之次對清切之塗畀以方郡承宣之寄重惟凉匪彌積兢皇卧漳濵之疴尚未逃於鬼責冒鵜梁之刺必又致於人言伏望聖慈收還成命俾安田里以保餘生雖嘗膽卧薪莫追往咎謬當叩轅擊壤以俟太平張正甫蘇州刺史制白居易浙右列城呉郡為大地廣人庶舊稱難理多選他郡二千石之良者轉而遷焉鄧州刺史張正甫自領南陽僅經三載廣平清簡以臨其人人安政和治行第一宜以大郡推而廣之用旌前勞且佇來効可蘇州刺史賜工部尚書浙西江東制置使兼江西安撫大使知平江府文天祥詔朕未堪多難疆圉孔棘御史㒺不曰艱惟時魁儒秉忠倡義奬率三軍入衛社稷國勢為之增重人心恃以為安精神折衝文武是憲卿器度才猷克邁前哲惟長江之險要未復畿甸之守偹當嚴卿以太常伯兼領二使表裏撐拓以固吾圉東西運掉以清寇氛儒帥一臨士勇百倍用保乂我文祖受民兹惟豐芑貽謀之意䖍共綏靖紓朕宵旰之憂勤所辭不允正言曾唯奏呉門奥區今為邉地掄魁雋望忠孝勤王軍中喧騰小范甲兵之謡河上尚稽光世節制之命徳裕元年八月二十七日工部尚書兼都督府叅賛軍事浙西江東制置使兼江西安撫大使知平江府事文天祥除端明殿學士制敕元戎十乗先行式倚真儒之望師中三命承寵遹降方面之權朕若稽先朝之舊章最重承明之邃職内以傳畿廷之彦外以褒師閫之賢王素之牧平凉程勘之涖益都皆膺兹選今得其人具官文天祥實學濟時英猷緯國文有武偹義㮣質於神明儒知軍情忠忱貫於霜日傳檄召兵而志士奮纓冠赴難而國勢張不負素定之謀允為寡二之傑翰蕃咨爾修扞疆宇命爾攘除予欲壯浙西之略予欲復江表之封將聳前茅之令軍成破竹之威惟任之專者位必崇惟名之至者功必集乃躋班規殿之峻以增華帥闑之嚴噫邦咸喜戎有良翰茂對陟明之渥身雖外心在王室趣成敵愾之勲德祐元年九月十六日賜端明殿學士浙西江東制置使知平江府事文天祥手詔詔曰卿秉忠忱以濟時難倡義旅以衛王室經營四方如召虎奬率三軍如武侯爰始常伯之英趣奮制閫之寄將士用命遂迅掃於㓂氛精神折衝益振揚於勝氣有嘉體國之志亟奏克敵之勲元戎啓行周邦咸喜載加鍚賚式示眷懐今賜卿金二十兩注盌一副金十五兩盤盞一副細色二十匹纈羅二十匹龍涎香三十餅度金香盒一具十兩清溲香三十帖龍茶十觔至可領也故兹札示其體吾倚注之至意胡琴婢勝兒出宋无啽囈集呉俗祈恩泰伯祠爭圗輿馬獻新竒文王三譲周天下翻愛胡琴寵勝兒呉泰伯祠在閶門之西每春市人相率牲醴多圗善馬綵輿羙女以獻飾以金銀復以輕綃畫侍婢捧胡琴以從其貌勝於舊繪者名之為勝兒盖他獻者無以為匹也女巫方舞有進士劉景復送客之金陵置酒於廟東通波館忽欠伸思寢夢紫衣冠者言曰譲王奉屈劉生隨至廟周旋揖譲而坐王語劉生曰適納一胡琴妓藝精而色麗知吾子善歌故奉邀作胡琴一曲以寵之生初不酣命酌人間酒一杯已醉乃作歌曰繁絃已停雜吹歇勝兒調弄邏娑撥四弦攏撚三五聲唤起邉風對明月大聲嘈嘈奔淈淈浪蹙波間倒溟渤小弦切切怨且咽鬼哭神悲秋蟋蟀側腕斜挑掣流電春雷直戛騰秋鶻漢妃徒得端正名秦女虛誇有仙骨我聞天寳十年前梁州未作西戎窟纎歌妙舞揚昇平不省烟塵遽蓬􅘖太平之末兵戈興汗血奔騰恣唐突𤣥宗未到萬里橋東洛西京一時沒海内臣民皆鼎沸飲恨吞聲空咽嗢時看明月望青天怨氣冲星成彗孛國門之西八九鎮髙城深壘閉閒卒河湟咫尺不能收挽粟推車寧復䘏今朝聞撥梁州曲使我心神暗超忽勝兒若得邉塞彈征人血淚應闌干吟畢以獻王召勝兒授之王之侍兒有妬者以金如意擊勝兒劉生驚而寤歌傳於呉中王敬伯歌宛轉歌二首唐郎風已清月朗琴復鳴掩抑悲千態慇勤是一聲歌宛轉宛轉和且長願為雙鴻鵠比翼共翺翔日已暮長簷鳥應度此時望君君不来此時思君君不顧歌宛轉宛轉那能異棲宿願為形與影出入恒相逐同前二首劉方平星參差月二八燈五枝黄鶴瑤琴將别去芙蓉羽帳惜空垂歌宛轉宛轉恨無窮願為波與浪俱起碧流中曉將近黄姑織女銀河盡九曲錦衾無復情千金寳鏡誰能引歌宛轉宛轉傷別離願作楊與栁同向玉窻垂同前江總九夕天河白露明八月濤水秋風驚樓中恒聞哀響曲塘上復有辛苦行不解何意悲秋氣直置無秋悲自生不怨前階促織鳴偏愁便路擣衣聲別燕差池自有返離蟬寂寞詎含情雲聚含情四望臺月冷相思九重觀欲題􅆚藥詩不成來采芙蓉花已散金尊送曲韓娥起玉柱調絃楚妃歎翠眉結恨不復開寳鬢迎秋更全亂湘妃拭淚灑貞筠筴藥浣衣何處人步步香飛金薄屐盈盈扇揜珊瑚唇已言採桑期陌上復能解珮就江濱競入華堂安寳枕爭開羽帳奉華茵不惜獨下眼前釣欲許便作後來新後來瞑瞑同玉牀可憐顔色無比方誰能巧笑特窺井乍取新聲學繞梁宿處留嬌堕黄珥鏡前含笑弄明璫採葹摘心心不盡茱茰折葉葉更芳已聞能歌洞簫賦詎是故愛邯鄲倡宛轉行張籍華屋重翠幄綺席雕象牀逺漏微更踈薄衾中夜凉爐氲暗徘徊寒烟背斜光妍姿結宵態寢壁幽夢長宛轉復宛轉憶憶更未央王敬伯歌李端妾本舟中客聞君江上琴君初感妾嘆妾亦感君心遂出合歡被同為交頸禽傳杯惟畏淺接膝猶嫌逺侍婢奏箜篌女郎歌宛轉宛轉怨如何中庭霜露多霜多葉可惜昨日非今夕徒結萬里懽終成一宵客王敬伯淥水青山從此隔同前髙啟舟初維琴始薦驛亭邊夜相見歌宛轉情綢繆解環珮彈箜篌歌易闌情難歇江波寒堕明月緑壺再傾芳音欲違辟彼林鳥逢晨各飛羅衣沾霜城烏忽起明日相思孤棹千里同前周南老舟泊通波亭琴調離鸞聲美人忽相見感此琴中情侍婢出箜篌低回絃始更扣金歌宛轉意慘琴復清贈以白玉𤓰月落篷窻明少年怪夢作端由起心兵王敬伯事見前集杜蘭香下嫁張碩宋邕天上人間兩渺茫不知誰識杜蘭香來經玉樹三山逺去隔銀河一水長怨入清塵愁錦瑟酒傾𤣥露醉瑤觴遺情更説何珍重擘破雲鬟金鳯凰張碩寄杜蘭香碧落香銷蘭露秋星河無夢夜悠悠靈妃不降三清駕仙鶴空成萬古愁皓月隔花追嘆別飛烟籠樹省淹留人間何事堪惆悵海色西風十二樓墉城仙錄云初漁父於洞庭之岸聞兒啼聲四顧無人惟有三嵗女子在岸側漁父憐而舉之十餘嵗天姿竒偉靈顔珠瑩殆天人也忽有青童靈人自空而下來集其家攜女而去將升天謂漁父曰我仙女杜蘭香也謫於人間呉建興二年復降包山張碩家有侍婢二人大名萱枝小名松枝贈碩詩曰河母處靈嶽時遊雲霄際衆女侍羽儀不出墉宫外颷輪送我來豈復處塵穢從我與福俱嫌我與禍㑹乃出薯蕷子三枚大如雞子云食此令君不畏風波辟寒暑碩問禱祀如何香曰消摩自可除疾淫祀何益消摩謂藥也既成婚授以舉形飛化之道香便絶迹不來年餘碩閒行忽見香車於山之際驚喜徑往造香欲登其車其奴舉扞之遂退聞在西洞庭莫詳其處玉波冷雙蓮髙啟金風暮剪雙頭橤啼臉辭秋嫣血紫宫女三千罷笑喧錦雲陣冷鴛鴦死滿江烟玉流名香尋魂弔影愁茫茫呉天墜露衰紅濕一夜波凉小龍泣同前周南老凉月墮玉波露泣雙蓮冷瑣窻開洞門虛落氷簾影羙人久延竚盈盈素粧靚酒進珊瑚鍾神游蓬海境倚曲歌未終不知秋夜永折得並頭花猶思在烟艇芷秀葯花芷即葯也香草出呉中者佳髙啟春香上羅襦暗引蘭橈渡蝶散揜紅房王孫歸已暮斜條拂蛾鬢采擷同芳杜脈脈烟雨濃江皋斷腸路同前周南老芷秀雜蘭佩葯華出雲房春露發芳采晴曛散麝香峩峩水晶簪舉舉雲霓裳抽簮瑤盤擊扣節歌樂章殷勤贈素綃日射生輝光回首馮夷宫颯然風雨凉唐處士李嬴夜逰震澤逢女郎為歌玉波冷雙蓮之曲曰此哀呉宫二隊長之詞又歌其所製並秀葯華之曲葢龍女云二曲世皆不傳余戯為補之泰娘歌并引劉禹錫泰娘本韋尚書家主謳者初尚書為呉郡得之命樂工誨之琵琶使之歌且舞無幾何盡得其術居一二嵗攜之以歸京師京師多新聲善工於是又捐去故技以新聲度曲而泰娘名字往往見稱於貴遊之間元和初尚書薨於東京泰娘出居民間久之為蘄州刺史張愻所得其後愻坐事謫居武陵郡愻卒泰娘無所歸地荒且逺無有能知其容與藝者故日抱樂器而哭其音焦殺以悲雒客聞之為歌其事以足於樂府云泰娘家本閶門西門前綠水環金堤有時粧成好天氣走上皋橋折花戯風流太守韋尚書路旁忽見停隼旟斗量明珠鳥傳意紺懐迎入專城居長鬟如雲衣似霧錦茵羅薦承輕步舞學驚鴻水榭春歌撩上客蘭堂暮從郎西入帝城中貴逰簮組香簾櫳低鬟緩視抱明月纎指破撥生朔風繁華一旦有銷歇題劍無光履聲絶洛陽舊宅生草莱杜陵蕭蕭松栢哀粧奩蟲網厚如繭博山爐側傾寒灰蘄州刺史張公子白馬新到銅駝里自言買笑擲黄金月堕雲中從此始安知鵩鳥座隅飛寂寞旅魂招不歸秦嘉鏡有前時結韓壽香消故篋衣山城少人江水碧斷雁哀鴻秋雨夕朱絃已絶為知音雲鬢未秋私自惜舉目風烟非舊時夢尋歸路多參差如何將此千行淚更灑瀟湘斑竹枝與劉蘇州書白居易夢得閣下前者枉札數幅兼惠答憶春草報白居易下五六章發函披文而後喜可知也又覆視書中有攘臂痛拳之戯笑與抃㑹甚樂甚樂誰復知之因有所云續前言之戯耳試為留聽與閣下在長安時合所著詩數百首題為劉白唱和集巻上下事具集解中去年冬夢得由禮部中集賢學士遷蘇州刺史郎氷雪塞路自秦徂呉僕方守三川得為東道主閣下為僕税駕十五日朝觴夕詠頗極平生之歡各賦數篇視草而别嵗月易邁行復周星一往一來忽又盈篋誠知老醜冗長為少年者所嗤然呉苑洛城相去二三千里捨此何以啟齒而解頥哉嗟乎微之先我去矣詩敵之勍者非夢得而誰前後相答彼此非一彼雖無虚可擊此亦非利不行但止交綏未嘗失律然得售之句警策之篇多因彼唱此和中得之他人未嘗能發也所以輙自愛重今復編而次焉以附前集合前三巻題此卷為下遷前下為中命曰劉白呉洛寄和卷自太和六年冬送夢得之任之作始居易頓首擬孫權答曹操書蘇軾權白孟徳足下辱書開示禍福使之内殺子布外擒劉備以自効書辭勤欵若出至誠雖三尺童子亦昭然知利害所在矣然僕懐固陋敢略布之昔田横齊之遺虜漢髙祖釋酈生之憾遣使海島謂橫来大者王小者侯獨能以力自剉不肯以身辱於劉氏韓信以全齊之地束手於漢而不能死于牖下自古同功一體之人英䧺豪傑之士世亂則藉以翦伐承平則理必猜疑與其受韓信之誅豈若死田横之節也哉僕先将軍破虜遭漢陵夷董卓僣亂焚燒宗廟發掘陵寢故依袁術以舉義師所指城邑響應天下思得董卓而食之不厭不幸此志未遂而無禄蚤世先兄伯符嗣命馳驅鋒鏑周旋江漢豈有他哉上以雪天子之恥下以畢先將軍之志耳不意袁術亦僣位號汚辱義師又聞諸君各盜名字伯符提偏師進無所歸退無所守故資江東為之業耳不意有荆軻舞陽之變不以權不肖使統部曲以卒先臣之志僕受遺以來卧薪嘗膽感日月之逾邁而歎功名之不立上負先臣未報之忠下忝伯符知人之明且權先世以徳顯於呉權若效諸君有非常之志縱不䝉顯戮豈不墮其家聲耶漢自桓靈以来上失其道政出多門宦官之亂纔息董卓之禍復興傕汜未誅袁劉割據天下所恃惟權與公及劉備三人耳比聞卓已鯨鯢天子反正僕意公當掃除餘孽同奬王室上助天子與宗廟社稷之靈退守藩國無失春秋朝覲之節而足下乃有欺孤之意欲挾天子以令諸侯妄引厯數隂構符命昔笑王莽之愚今竊歎足下䧟覆車也僕與公有婚姻之舊加之同志相求然自聞求九錫納椒房不惟同志失望天下甚藉藉也劉備雖然兵少然僕觀其為人雄才大略寛而有容拙於攻取巧於馭人有漢髙祖之餘風輔以孔明未可量也且以忠義不替曩昔僕以為今海内所望惟我二人耳僕之有張昭正如備之孔明左提右挈以就大事國中文武之事盡以委之而見教殺昭與備僕豈病狂也哉古諺有之輔車相依唇亡齒寒僕與劉備寔有唇齒相須之勢足下所以不能取武昌又不能到成都者呉蜀皆存也今足下使僕取蜀是欲滅呉也蜀亡呉亦隨之矣晉以垂棘屈産假道於虞以伐虢夫滅虢是所以取虞虞不知以故及禍足下意何以異此古人有言曰白首如新傾盖如故言以身託人必擇所安孟徳視僕豈惜此尺寸之土者哉特以公非所託故也荀文若與公共起艱危一旦勸公譲九錫意便憾卒使憂死矧僕與公有赤壁之隙雖復盡釋前憾然豈敢必公不食斯言乎今日歸朝一匹夫耳何能為哉縱公不見害交鋒兩陣之間所殺過當今其父兄子弟寔在公側怨讐多矣其能安乎季布數窘漢王及即位猶下三族之令矧足下記人之過忘人之功不肯忘文若于九錫其肯赦僕于赤壁乎孔文舉與楊德祖海内竒士足下殺之如皁𨽻豈復有愛於權天下之才在公右者即害之矣一失江東豈復悔耶甘言重幣幸勿復再報韓維書蘇舜欽䝉責以兄弟在京師不以義相就獨羈外數千里自取愁苦予豈無親戚之情㑹合之樂安肯舍安逸而甘愁苦哉昨在京師不敢犯人顔色不敢議論時事隨衆上下心志蟠屈固亦極矣不幸適在嫌疑之地不能決然早自引去致不測之禍捽下吏人無敢言共起謗議被廢之後喧然未已更欲寘之死地然後為快來者往往鈎摘言語欲以傳播故閉户不敢見如避兵寇偷俗如此安可久居其間遂超然逺舉羈泊於江湖之上不惟衣食之累實亦少避機阱也况血屬之多資入之薄常相團聚可乏衣食乎不可也可閉闗常不與人接乎不可也與之言必與之還往人人皆如持國則可不逮持國者必加醸惡言喧播上下使僕不能自明則前日之事未為重也即無此事亦終日勞苦應接之不暇寒暑奔走塵土泥淖中不能了人事羸馬餓僕日栖栖取辱於都城使人指背譏笑哀憫亦何顔面安得不謂之愁苦哉此雖與弟兄親戚相逺而伏臘稍足居室稍寛無終日應接奔走之勞耳目清曠不設機關以待人心安閒四體舒放三商而眠髙春而起靜院明忩之下羅列圗史琴尊以自愉悦有興則泛小舟出盤閶二門吟嘯覽古江山之間渚茶野醸足以消憂蓴鱸稻蟹足以適口又多髙僧隱士佛廟道觀家有園林珍花竒石曲池髙臺魚鳥之留連不覺日暮孔子作春秋而夷呉又曰吾欲居九夷觀今之風俗樂善好事知予守道好學皆欣然願來過從不以罪人相遇雖孔子復生是亦必欲居此也以彼此較之孰為然哉人生内有自得外有所適固亦樂矣何必髙位厚祿役人以自奉養然後為樂今雖僑此亦如仕宦南北安可與親戚常守耶予窘廹勢不得如持國意必使我尸轉溝洫肉餧豺虎而後以為安於義何其忍耶詩曰凡今之人莫如兄弟謂兄弟以恩急難必極相救後章曰喪亂既平既安且寕雖有兄弟不如友生謂友朋尚義安寕之時以禮義相琢磨予持國外兄弟也急難不相救又於其安寕之際欲以義相琢磨雖古人所不能受予欲不報乃外吾持國也太祖皇帝圍姑蘇諭張士誠書葢聞成湯放桀武王伐紂漢祖滅秦厯代帝王之興兵勢相加乃為常事當王莽之亡隋之失國豪傑乗時蜂起圗王業據土地及其定也必歸于一天命所在豈容紛然雖有智者事業弗成亦當革心畏天順民以全身保族若漢之竇融宋之錢俶是也自古皆然非今獨異爾能順附其福有餘毋為困守孤城危其兵民自取滅亡為天下笑太祖征張士誠下令王者征伐應天順人所以平禍亂而安生民也張士誠假元之命叛服不常天將假手於我是用行師以致天討况士誠啟釁多端襲我安豐寇我諸金連兵構禍罪不可逭今命大軍致討止於罪首在彼軍民無恐無畏無亡逃竄無廢農業已敕大將軍約束官軍無致擄掠違者以軍律論罪布告中外體予至懐伐張士誠諭士民榜伐罪救民王者之師考之往古世代昭然軒轅氏誅蚩尤殷湯征葛伯文王伐崇侯聖王之起兵也非富天下本為救民近觀有元之末主居深宫臣操威福官以賄成罪以情免風憲舉親而覈讐有司差貧而賣富廟堂不以為慮方參冗官又改鈔法役四十萬人湮塞黄河死者枕藉於道哀苦聲聞於天致使愚民誤中妖術不解偈言之妄誕酷信彌勒之真有冀其治以甦其苦聚為燒香之黨根據汝潁蔓延河洛妖言既行凶謀遂逞焚蕩城郭殺戮士夫荼毒生靈無端萬狀元以天下錢粮兵馬而討之略無功效愈見猖獗然而終不能濟世安民是以有志之士旁觀熟慮或假元氏為名或托鄉軍之號或以孤兵獨立皆欲自為由是天下土崩瓦解予本濠梁之民初列行伍漸至提兵灼見妖言終不能成事又度元運難與成功遂領兵渡江賴天地祖宗之靈及將帥之力一鼔而有江左再戰而定浙東陳氏稱號據我上㳺爰興問罪之師彭蠡交兵元惡授首其父子兄弟面縳輿櫬既待以不死又封以韓爵將相皆置於朝班民庻各安於田里荆㐮湖廣盡入版圗雖徳未及而政令頗修惟茲姑蘇張士誠為民則私販鹽貨行刦於江湖兵興則收聚㓙徒負固於海島其罪一也又恐海隅一區難抗天下全勢詐降于元坑其參政趙璉囚其待制孫撝其罪二也厥後掩襲浙西兵不滿萬數地不足千里僣號改元其罪三也初寇我邉一戰而生擒其親弟再犯浙省揚矛直擣于近郊首尾畏縮乃又詐降於元其罪四也占據江浙錢粮十年不貢其罪五也陽受元朝之詔隂行假王之令挾制達丞相謀害楊左相其罪六也知元綱已墜公然害其江浙丞相達實特穆爾南臺大夫布哈特穆爾其罪七也誘我叛將刦我邉民其罪八也凡此八罪有甚於蚩尤葛伯崇侯雖堯舜禹湯文武與之同世亦所不容理宜征討以拯天下以濟斯民爰命中書左丞徐達率領馬步官軍舟師水陸並進攻取浙西諸處城池嘗戒軍士征討所到殱厥巨魁脅從罔治凢我逋逃臣民被陷軍士咸宥其罪其爾人民果能復業即我良民舊有房舍田土依額納粮以供軍儲餘無科取使汝等永保鄉里以全家室此興師之故也敢有千百相聚旅拒王師者即當移兵勦滅遷徙宗族於五溪兩廣永離鄉土以禦邉鄙果有賢哲或全城歸附或棄故來降予所賞賜非所敢吝凢予之言信如皓日咨爾臣庻毋或自疑故榜送丁謂序王禹偁主上躬耕之嵗僕自長洲宰被召由大理評事得右正言分直東觀既嵗滿入西掖掌誥且二年矣今之舉進士者以文相售嵗數百人朝請之餘無不厯覽有視其命題而罷者有讀數句而罷者有終一篇而止者或詩可采而賦則無有也或賦可稱而文則無有也能全之者百不四五况著書立言之士乎去年得富春孫何文數十篇格髙意逺大得經㫖僕因詢諸同列或曰有遼陽者何之同志也其文與何不相上下僕未之信也㑹有以謂之文示僕視之則前言不誣矣是秋何來訪僕既與之交又得謂之履行甚悉且喜其惠顧今春謂來示以新文并律詩與賦向所號進士者皆莫能及也其詩效杜子羙深入其奥其文則皆意不常而語不俗若雜于韓栁集中使能文之士不能辨也自是人爭願識其面而交其心矣翰林賈公尤加歎服是知道之尊人也豈位也乎學之富人也豈貨也乎哉今之不勤於道不力於學而望人知者宜視丁氏子之道何如哉值其歸贈以序送貢公守平江序王禕上在位二十有三載寤寐治道圗修太平重念天下黎元比嵗失職興師討罪久無成功乃更登庸舊臣屬以政柄於是綱紀薦飭衆正並進始擢南士有時望者為各道亷訪使而吾宣城貢公被命莅閩中居無何遽召為禮部尚書而廷議以平江缺守任難其人俄復用公守平江或者以謂憲使膺耳目之司尚書處㗋舌之地其權位為最要而顧守於一郡於物論疑若有未惬者禕竊以為不然今日郡守之選重矣而平江為江南大郡其守視他郡為尤重以故朝廷恒選剛嚴碩博之材諳人情而䘏民隱者托之以郡寄所以尊大藩重外庸也惟公以文儒名家士林之冠冕厯官中外所至績輒暴著頃曾為都水營田使實治平江其民之利病葢所稔知朝廷視邦選侯其用公為守也固宜公之宏材無施不可亦奚彼此之計乎嗚呼惟我祖宗統一宇内百年於兹重熈累洽式臻承平四方無虞烟火萬里可謂盛矣夫何四三年間海内鼎沸河之南北淮之東西戎馬蹂躪已無完區大江以南列城殘毁生靈塗炭亦靡有息肩之所世故之艱難於是殆有不忍言者幸而平江以地利人和之故隱然為南方之保障然餫餉之給比諸郡率十七八百需供億萬計而其民亦已不勝夫凋瘵今公為郡以父母其民寕不有以輯綏撫摩之以阜其財以結其心乎嗟乎財者民之心也不取諸民無以給國用取之無藝無以得民心品調消息之間公得無有術哉是故一城之完朝廷免一城之憂一民之安國家賴一民之力公也任郡寄之重上體宵旰思治之勤而布宣其及下之仁不久政成天子且亟用之當大任矣邇者濟南韓公鏞守鄱陽南陽成公遵守武昌皆即其官召入參預大政庶㡬漢世郡守入為三公之意朝廷今日之用公意在此豈非天下士大夫之所望者乎顧禕草澤之人而有當世之志於公之行因區區一言之公平日知禕為最厚將以其言為不佞矣贈蕭教諭赴長洲序王直蕭氏吾邑故家詩書相傳也久矣而尤以篤義重鄉邑洪武中鵬舉先生舉賢良太祖皇帝命賦指佞草應口成詩上大喜授蘇州府同知以寛厚清慎得名再任山東鹽運副使潔亷之操老而彌勵至今人能道之彦清其孫也彦清名欒以書經領薦今年㑹試禮部復中教官選得長洲教諭彦清勤學攻文足以得志於有司其試禮部予實典文衡局以科額於是失彦清予與蕭氏有世好意甚惜之而彦清不以望予雖然予固惜失之而喜長洲之得也夫彦偉之才所在有之而不能不賴於師師弟子之所由成也辟若制器然以良才遇良工加之以規矩凖繩而後方圓平直規矩凖繩之不加欲器之方圓平直蓋難矣故雖有材而不得成器以適於用者不遇此也今之士孰無可用之心哉其材有大小之不同而無不可用然所以成之皆於師乎望也因其才而篤焉匡直輔翼而振徳之則才既成矣以是而為世用此治功之所以盛也然而遇良師者固有矣其不遇者蓋多焉不遇則無以成其才猶未為病也茍遇而弗良師之以不正之習而加之以非道之施中才之士隨而變焉豈非學校之不幸哉長洲蘇之望縣其地多良才今其未仕達者日望于成者不少其前所遇之幸不幸予不能知今而得彦清予知其為幸也彦清之學得於家講於師友皆聖賢之法言仁義之達道率是而教之為弟子者勉而學焉其才將無不成予故為長洲喜也彦清克篤於是邦人父老必推本於同知公之賢而誦公之徳不衰是彦清能成其祖之名亦所以為教也彦清勉之因書以贈其行送太守况侯述職詩叙徐有貞大丈夫將有為於斯世必先養其氣節氣節之固則其中浩然以直遇事而不餒介然以正臨變而不敓不餒不敓而後可以任天下之至重處天下之至難矣彼平居悻悻自好恃能舞智以為天下之事無不可為及事變之来無以自守而輙餒以敓者以氣節之素失其養也然欲養其氣節必其天資之髙脩學之勤而後有以致之若吾蘇守况公其庶幾乎侯豫章人也才彊識明胸次磊落而熟聞乎道義故能毅然以正自立而顯於世其為郎禮部已有偉望時宣宗皇帝在御以天下郡守多不得人命舉廷臣之才堪寄者得九人焉特賜璽書諭勉以行蓋國朝郡守之賜璽書始此而侯以大宗伯胡公之舉實居九人者之首故命之守蘇蘇畿内重郡也粮賦居天下之半國用所需多於蘇焉取之土産有餘而民力不足汙吏奸豪敓攘其間故雖有冨庶之號民常苦於他郡而為之守者亦難於他郡侯既拜命即以興利除害為巳任及下車脩政條明禁令一以璽書從事黜汙吏檢奸豪奏減粮額之重者十之三凡諸不便於民者悉陳革之蘇之人始則畏侯之威終則懐侯之惠而樂其利如出幽而明既病而甦也侯去郡者再民輙上書乞留於今七年矣治久而化孚侯坐而撫之民無不順者故論者皆曰自國初以来有功於吾郡未有如侯之多者且謂侯有行必達有言必達可謂有大丈夫之為者余曰此侯之有為人固知之而不知侯之氣節所在也異時謁者專使於外秉威據重以誅求乎民方岳旬宣之臣皆向風而靡部使者亦歛手避焉郡縣奉承不暇冀免督責於已遑恤其民乎所在有一二輩輙騷然失寕而蘇之聚者常三四十輩以其富庶也誅求常倍於他郡矦之至獨挺然以義折之使皆俛首去不得肆乎其害而彼之魁傑者且服公所為謂其人曰况太守清政人也不可犯焉是以朝廷嘉侯之忠而吏民賴侯之徳當是時侯之氣節葢已雄於天下矣余嘗一見侯與論大丈夫之事業侯固欣然以為得其志而余亦以是與之也雖然侯之為郡守亦重且難矣然天下之事尚有重且難於此者以侯當之而不餒以敓是則余之所望於矦者也惟矦勉之侯以述職赴京師郡之薦紳㑹餞侯呉門之外各賦詩一章以為侯贈時余適預焉因衆所彊而序以弁云送太守况公述職序太守况公之述職將行也郡之大夫士舉餞送焉而為之詩文以稱道其德羙余系於郡人之末禮不可以獨已亦既有贈矣而醫學正科盛侃又屬言贈之余嘆曰太守公政績之羙信有足稱道矣然吾郡能言之士十百其人極口之辭殫筆之力稱而道之固已無遺矣使余能言且無以加矧其不能乎敢譲於能者侃曰不然夫羙功頌徳詩人之業也屬辭比事春秋之法也子名在詞垣而任官史局其於叙述固所當然今郡有賢太守如况公者雖屡書焉不為過也子奚辭焉余偪於侃言而領之然余竊以古之君子之樂贈人以言也不徒羙其所已能尤必贊其所未至故聖如大禹而益猶贊之今諸君之稱羙於公盛矣而未有贊其所為者何耶夫以公之所自立而觀其志蓋不止於今日之所見而吾黨之士所為稱説乃止而弗進豈忠告于公者哉昔黄霸治郡常為天下第一後為丞相乃無所建明而功名損於前時韓休亦善治郡以恬和易之及既當國則直道匡君有良相風蓋大臣之道與為郡異霸明於治民而懵於丞弼若休則可為兼矣故漢書傳霸循吏而唐書叙休之相業有以也公之髙才達識其必有見於此者使其果進而大任尚願宜以霸之所不足者自克以休之有為者自勉可也夫有而不自足者必成其大行而不自止者必至於逺古之君子惟日孜孜求進乎道恒若弗及用圗其逺大之功業而已余不敏亦常有志於斯故喜為公道也公於是而加孜孜焉以求其道則雖唐虞三代岳牧卿尹之功業皆有可致又何韓休之不可及哉遂以是言復于侃而為公贈答况太守問芝草書正統戊午年九月十日太守閣下今月初三日承專使親札来慰于墓廬且以靈芝事為問良感良愧某之所以營𦵏于此者蓋以先人平生有鄉土之思而某為子不肖不克奉承親志侍以還鄉不幸先人遘疾竟終于京師不孝之愆無以自逭重惟宗祀在身不敢即死所不忍窆於客土扶柩歸𦵏庶㡬追承先志之萬一以自逭耳豈有纎毫孝行之足言哉既幸克安厝因廬墓所終喪期亦固當爾豈敢沽名釣譽以自附於古人者哉廼者墳堂之上偶生異草三五莖山中人輙相聚觀識其是靈芝鬨然以為祥瑞某即時明以戒止使勿造妖揑怪豈意好事者遂乃傳説入城府以誤閣下之聽耶閣下以聪明正直聞且嘗為禮官所識見逺矣山野鄙人訛言入城正賴閣下約止之奈何従而聴之顧以靈物異事為耶某雖不肖少頗讀數行書常恐隳於匪人之域今者不死方圗自立以為報親之地使天下後世不謂其為不孝子幸矣豈敢復隨人造作以自玷耶夫山中之草百數有之自非神農莫能盡識今此草之生某既不能别識亦不敢承誤公又何庸問之願早約止勿復言至幸至幸某固愚蠢者且方在哀疚不文不次惟閣下諒察巳未春正月再復書某稽顙拜復太守閣下年前承問芝草事既以明白回復今者復䝉教札略其蠢愚顧加奬慰且援引古今的然以為孝徴瑞事至欲枉駕臨視某固知感盛德然憂懼滋甚欲即詣府白止之緣在禫服誼不可入公門故不免復覼縷蓋尚古之世物無所謂祥瑞者若夫古今瑞圗之載皆漢世以來謬儒傅㑹之言也六經豈有是哉經中之言禎祥者葢不過吉善之徴云耳某竊有見于此素不信之故平日於文辭恥及祥瑞事今者不幸而逺𦵏吾親獨廬于此又不意而有此草生于墳所而致人之訛言紛紛如此也然百草皆山之生也誠亦無怪其生者此山本名青芝豈非素生此草乎其何足為異某既以此曉于山林之人矣但其人好事甚又欲承奉賢府主意遂以為素未嘗見此草生就使果非素生亦何必為異山中之物生于山中固其所也不足喜也若其生于人之家庭則非其所矣吾且以為妖而惡之㧞而去之矣今乃在山而又當堂封之上所不敢除故遂置而不問豈意人之好怪乃至喧傳以誤閣下之聴如此耶然某竊惟閣下賢明固非可惑者也意者其將振起風化故假此等事以為人人之勸哉然于他人則可以承命于某則不敢何者已既不以為異而順人以為異已則惡他人之造妖捏怪而復順之其過有加焉茍以為孝之為徴則所不敢者人豈不自知如某者方惴惴懼以不孝而見譴于天又何以徴乎乃徴諸天是誣天也况此草固地之所生者豈某致之生耶若指地之所生以為已徴是誣地也某雖不肖平生所學不過一誠耳方切切自勉以誠而不足安敢以誣天地乎或者又云閣下之意將以聞于朝廷朝廷又豈可誣哉某固不才無可用於朝廷然區區之心未嘗不以樸忠自勵者而乃使之為誣此又不敢之不敢者也太守一郡師表凡一舉動庶民趨之倘枉駕逺臨則必闔郡響動得不大為驚怪耶此又不可之不可者也如將舉之則某有逃遁而已必不能從焉哀疚之餘不事筆札為閣下所廹忍苦告誠閣下鑒之亮之恕其蠢而與其誠不勝哀感之至送葉元圭知呉縣詩序永嘉葉君元圭初以名進士選為庶吉士詔比二十八宿績學翰林五年而出為蘇州之呉江縣令至官期月而民大治以母憂去今年起復赴京師得調于呉凡朝之賢士大夫之知君者咸以君之才行學識之茂宜列之朝著贊經綸司風化以大其用而𢎞其施乃處之一邑且久于外莫不咨嗟以惜之惟呉之人士聞之則私幸於得賢而為之興忭以相慶若余之意則又兼處乎二者之間焉葢予與葉君以聨科進士選入翰林同研席者絫年斯文相契之情若兄弟然其為呉江也余送之行既而各以家艱去官不相見者閲五寒暑矣今余自呉之墓廬起復而來適與君㑹方思與之叙契濶展懐抱而君復有是行夫知之深者期之重余寜不惜君之去然君之所治余父母之邦也君去而大惠吾民又寧不為之私喜耶且呉為泰伯過化之地而子游氏之所生也其民風素厚士習素正而又素為富庶東南財賦所出呉得十二焉然比嵗以來民風寖變而澆薄士習寖流而卑陋而向所謂富庶者亦寖以凋敝寔去而名存究其所以致然者固有由來矣其將振起而復之者獨不在于賢守令乎夫欲民風之厚必本之仁化欲士習之正必先之德教若其富則必由乎安養之闕而致之然長民者恒急於賦役而緩于教化故卒患其未能復也今幸得賢令如葉君其有所望而振起之矣昔子游以絃歌而治武城固曰君子學道則愛人君之學于道也有素果能推愛人之道而極其至雖天下之大可治而况為縣哉君行有日在朝所與同選諸君子相率賦詩送之而推予序其簡首送長洲丞邵君宏啟序古之人所重者父母之邦而邦大夫尤所加敬焉孔子曰居是邦不非其大夫又曰居是邦事其大夫之賢者夫有可非者未必賢也未必賢者且不非之則其賢者固在所當事矣然此特所居之邦爾非父母之邦也于所居之邦且然况父母之邦乎其禮固宜又加重焉耳矣長洲余父母之邦也凡官于是者皆余之所當敬也况其賢而愛民者哉賢而愛民者雖不吾識固亦吾之所當加敬况其賢而又有斯文交親之分者哉此予之於邵君所為眷眷而不㤀者也君名昕字宏啟越之餘姚人也其從兄脩撰君宏譽實余同官之良而相知之深者初君之以文學才行舉而來也余數㑹之脩撰君所觀其儀止而聴其談吐固己知其所存之厚矣及余丁艱歸呉君適為丞于長洲其持已也亷其事上也恭其處寮寀也和其馭吏也明而臨民也惠至於儒紳之士有可言者又必待之以禮焉由是上下之人翕然稱之皆以為賢余聞之良以為鄉邦斯文之休君亦以迺兄之好數枉顧余山中然余以哀事故不及以復也今年君以三載滿秩報治于朝詞林諸公以脩撰君之故又聞其賢也莫不敬之而贈之以文章余其故可恝然而已耶雖然余之敬君者豈以為謟哉所以為禮也以禮敬人必有所忠告焉可也自今已往君其尚加懋哉持已無斁其明也撫民無斁其惠也待士無斁其禮也夫如是則都髙官而享厚祿當重任而臨大事將無往而不可豈惟佐邑之為賢乎君其尚加勉送劉原博序草忩劉先生原博余之斯文交也原博之先世以醫名繇宋暨元代有顯者在國朝則故良醫公彦敬院判公士賔相繼以醫國手擅聲于天下原博實良醫公之孫而院判公之子也然原博之學不專于醫自吾儒經世之學書以及諸子百氏之言靡不讀讀之靡不探其賾而鈎其深其于辯析物理議古論今縷縷其弗絶亹亹其不厭也至發為文章蒼然古色有作者之風焉原博初舉賢良或尼之而止繼以文學舉又尼而止卒以醫舉為惠民局官乃始得之知原博者咸以為原博以母夫人髙年在鄉陳情乞歸省覲既得請而治行其與原博同官及所從游之士謁余謀所以贈之者予曰嗟乎以原博而官于醫有不足為者矣余其奚贈哉雖然原博之志殆不止乎醫而已也余輩之所以知原博期待原博者亦不止乎醫而已也原博固儒者也儒者之事在學與行之修焉耳學不足以明道不足以為學行不足以經徳不足以為行學行之備則以之達焉而可以之窮焉而可以之近焉而可以之逺焉而可達以施之天下窮以守之一身近以行之當時逺以傳之後世余也謬以儒名竊有志乎此久矣然質魯而才下無以副斯志者故願與原博言之幸其有以相發而進我於道焉若夫醫師濟生之術原博固不求聞于余余亦無以告之原博至於寧静致逺之道敬恭桑梓之禮又原博之所素敦焉者其待予言哉其待予言哉吳都文粹續集巻四十六
