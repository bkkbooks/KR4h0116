body:
  text: 吳都文粹續集卷二十一明錢榖撰山水遊郡西諸山記都穆𢎞治己酉秋九月甲戌豫與客泛舟將遍遊吳郡西諸山客曰虎邱之勝甲吳下且密邇闤闠遊必自虎邱始豫諾焉亭午至山下觀憨憨泉泉為人投瓦礫塞之將泥不食從石旁上東山廟即短簿祠中龎然雜以土偶有老僧方閉關坐穴中與語頗可聽下東山北行登千人石旁有古木根出如蟠虬一本而為幹者三經清遠道士放鶴澗澗涸灌莽生焉後人亭其上既而登五聖臺僧供茗命前導西南行至一菴甚幽寂蓋宋和靖書院舊址也悵惋久之南行沿小溪復上千人石度石梁酌陸羽泉近庸僧屋其畔頗減清冽出觀劍池左石刻虎邱劍池四大字是顔魯公書上兩崖壁立數仞勢欲崩裂其隂多昔人題名衆恐不能久讀遂登可中亭北有李陽氷篆生公講臺字分鐫四石而亡其一衆皆從故道下去時已逼暝豫欲止宿客不可乃返乙亥乃泊虎邱午食出射瀆大風西北來舟遲遲行繂屢斷續西望天平岝崿秦餘杭諸山如龍遊馬逸應接不暇過滸墅入竹青塘而西日光反射影在山半霞彩絢爛丹青雜施工不能繪至通安橋已昏黑夜深抵友人朱氏宿丙子早食出朱墅北泛彭山堰午西風甚急遂由堰西北約五里至陳湖莊復五里由望湖橋南出游湖從曲港登新豐南山共坐苔石山人有牧羊者豫問瀕湖諸山始知高出鄧尉者曰銅坑山亞銅坑曰安山牛城嘴居游湖北與安山對峙如兩峽然而其西接太湖極北青霞一抹視洞庭兩山尤遠者無錫之九龍山也下山歡飲盡醉丁丑早霧翳翳布空中疑有變少焉日光曈曨衆遊興勃發由謝莊西行復經游湖南過陸家港二里入西堰水益緩山益近岡嶺稠叠橫回峭拔呈技獻巧殆不可狀而浮圖七級聳龜峰巔影落水中豫笑曰此王摩詰得意筆也泊泰定橋登虎山里許至光福寺主僧聞客至出速入方丈山峙其前者名鉢盂其左鄧尉山也壁有元人聨句詩多剝落皆不著氏名其字書類王豫章有墨沼從窗隙窺之僧云傳為顧野王研池殆或然也過齊堂讀唐進士顧在鎔詩刻遂上龜山坐浮圖下浮圖頂有巢鸛三見人嘎嘎作聲衆方欲酒僧謂七寶泉在鄧尉東麓不三里而近共出登舟經東堰已半淤塞蘆葦叢生其中視西堰少劣至則捨舟導山徑行夾道多古梅長松入僧菴有雙柿丹實絫絫可愛上山行循竹間有亭憩焉其後即七寶泉泉生石間環甃以石形如滿月深尺許掬飲甚甘僧接竹引之然不知發自何處且弔陸子之不能遭與兹泉之不遭也豫索筆題名亭上暮還光福方丈戊寅至姚家河陸行數里遊奉慈菴中故有養賢樓元季里儒徐良夫好客四方賢士多集樓上今亡獨扁存堂背白山茶枇杷臘梅列植左右出僧欲導觀山上泉不果三里至𤣥墓山從松篠間傴僂而上山多楊梅梅樹湖水明滅樹間衆冉冉如空中行約一里入西塔院小飲晚院之僧具湯沐宿焉己卯自西而南四百步路多古梅皆螭蟠蛟結蒼蘚被之如鱗出大道東北千步有長松五株鷹巢其一又西北二百步度石梁上萬佛閣南望太湖法華山橫亘其中漁舟數十出沒若鳬雁然而洞庭長沙葉余梅灣諸山隱隱在烟霧間詩思頓發自北而東二百步有僧揖入小閣閣視萬佛十才一二然所據地高出木杪山四面環之如玦景特竒僧飯客閣上仍出松花餅客作詩有不見太湖真面目眼前終恨法華山之句豫不以為然乃作詩為法華訟寃西行可百步至僧房其扁曰天開畫圖見湖最多兼見小橫山一抹由禪堂西南三百二十步有老僧房前美竹數百挺與松柏爭長地窪然下衆嘯咏焉又西三百步經僧房六已日暮不及遊還塔院宿庚辰僧陪客下山西行復經奉慈菴謁宋金紫光祿大夫黃某墓其傍有香火院僧盡出斷碑五六橫草莽間蓋𤣥墓至是行四里至銅坑山其山一名銅井僧云高二百丈豫與客取捷上由别道山多亂石且峻拔行者多顛踣每一人踣衆皆大笑至僧菴觀所謂銅井已無水深可丈餘上大石若將壓者豫令童子入井大呼聲不得出如甕中山頂多竒石可望見二百里羣山在其下小山浮湖中如杯人人大快以為平生竒觀適山人送酒至遂剖橘作杯飲皆盡興菴僧煮菜供午食循道至山半勢亦斗峻皆掖以童子狼狽而下回視莫不心掉更慶以為無虞去銅坑東北三里謁宋章都官墓抵包河登舟復從西堰過泰定橋東北七里還朱氏宿辛巳朱氏東南三里至蜀山訪王清獻公𤣥孫晉索其舊藏出清獻畫像及孝感詩族譜閲之門內有塑像置壁腳亦云是清獻公墻角塑像為尼相者清獻母張夫人也晉言清獻父死海上張氏年甫三十七抱清獻入覲時清獻生才三歲元主恐張氏二志命殿前祝髮為比邱尼賜號無為大師往住吳中妙湛禪寺出門讀草間碑碑凡三其一為大師塔銘鄧文原撰午還朱氏壬午復經彭山堰行八九里艤舟又二里至秦餘杭山夾道松如步障上六百步息足僧舍復二百三十步至大石下有泉二泓其一為雲泉石錯互若頦頷斷齶從其後視之又若狻猊卬首尻下其前磐石如卧鼓可坐二三十人入雲泉菴躋石級有古梅生石間東折石一股西跨類猛士跂足立人行其下又折而西鑿石為階旁設以䦨杌棿不可憑屋壁讀李武選吳太史張子靜史明古諸公聨句東行有巨石閣崖上欲墮又上得大石岩上俯下嵌中像開山像衆小憩午酌菴之北樓日暮下山與諸客别是夕宿通安橋癸未入城蓋自甲戌至癸未凡十日皆風日清美舟楫往還百數十里厯名山六小山二而諸客者皆衣冠詳雅從容尊俎間莫不目飽意滿充然有得而忘其疲其慶幸不既多乎遂次第筆之以貽同志紀遊朱存理端陽前一日過西崦訪朱叔英西崦舊遊也叔英故人也叔英喜豫至速豫登其新堂拜尊人八十三翁頃具蒲觴為飲雜以山果溪鮮勸酬盡醉留别有詩云西崦重遊日東城闊别時新堂陪杖几舊譜合宗支碧栁垂書幌紅葵映酒巵烟消聽欸乃風遠送吾伊好古吾同志尋幽君有期歸舟山色暝正是雨催詩豫之來也為訪吳中故家文獻叔英不以為迂言王清獻公家蜀山不二里家有藏譜乃為之假故有好古吾同志之句飲散登舟將數里至光福尋張雪槎雪槎與豫論别將三十餘載相見各驚皤然為詢野王雪槎告以故吾張氏從顧姓今始復之矣尚不忘其初作推本堂有瓠翁首倡五言請豫和之不及書即延入鄧尉山後鳯岡之前一草亭中治雞黍相欵讀其所自為草亭記雪槎請留題豫羡其老年有此行樂喜為之賦七言一章鄧尉嵯峨萬叠青鳯岡猶見地稱靈梅林數畝開新徑蘿薜千尋闢廣庭博望古槎仍剡曲醉翁今記似蘭亭岩花谷鳥供行樂日日春風不用扃晚同遊光福寺寺僧普照及其徒曉谷出茗供引客入方丈觀唐人詩刻野王墨沼是夕宿山中為賦詩云短䇿行行一里餘松林過雨步徐徐半泓墨沼窺遺跡數仭龜峰望遠墟石磴夏凉青荔合山扉晝掩緑蕉舒夕陽突兀浮圖影送目長天罨畫如再請作龜峰記未暇復也明日飯於塔下而别便道訪官橋葉氏求觀宋金紫公之譜主人宗佩甫猶子秉衡出示之且幸及觀宋誥敕四道葉氏之居在雅宜山下滄灣修竹逶迤石徑中而入登堂治具歡若平生亦為經宿之留明日别宗佩有詩野人夙昔抱幽期每愛官橋風景竒水竹當門朝爽處山雲入座夕佳時雅宜望去無三里金紫傳來是一支既醉不勝臨别意從前應恨識荆遲慈溪鍾正之昔有一日之雅適主賔孰乃得笑談尊爼之間又可以為樂也日未晡過木瀆登靈嵓山而返抵舍己迫暮篝燈漫書時戊辰歲也野航居士清明後一日獨遊西山楊循吉淨揩雙眼洗心腸領納山光與水光到面春風未全暖離城野興一何長青黃不接麥苗短紅白間開花蕊香隨處有茶堪接納禪林三四遠相望將逰西山道中竹轎晨登數里迂羣山膏沐迓吾徒樹枝拂帽忽低首水影照人堪數須牛犢維門角如栗梅花塞路雪成珠白龍廟中一觀憩祀罷野人方會酺赴西山雨後溪行皇甫涍泝艇看山去溪流行更深春城過雨色芳草入霞隂湖繞連雲度風回灌木吟今宵誰與晤慧遠在東林雨後舟行望大石諸山暝遊清溪上虹雨開西岑纎月照幽意虛舟鳴夜琴寥寥翠微靜靄靄芳樹深雲徑空如此彌年違素心次韻天全公招遊西山祝皓征袍洗盡宦途塵喜荷招遊引興新物外追尋多勝事座中觴咏總儒紳青山不厭重來客黃菊偏娛暮景人况有雄章傳太史蒼崖磨勒照千春洞庭兩山賦王鏊楚之湖曰洞庭吳之山亦曰洞庭其以相埒邪將地脉有相通者邪郭景純曰包山洞庭巴陵地道濳達旁通是未可知也而吾洞庭實兼湖山之勝始山特為幽人韻士之所栖靈仙佛子之所宅至國朝名臣徹爵往往出焉豈湖山之秀磅礴鬱積至是而後泄於人邪東岡子曰山川之秀實生人才人才之出益顯山川顯之維何蓋莫過於文兩山者祕於古而顯於今其實有待子無用辭豫曰然乃為之賦其詞曰吳越之墟有巨浸焉三萬六千頃浩浩湯湯如滄溟澥渤之茫洋中有山焉七十有二眇眇忽忽如蓬壺方丈之倣佛日月之所升沉魚龍之所變化百川攸歸三州為界所謂吞雲夢八九於胸中曽不蒂芥者也客曰試為吾賦之夫太始沕穆一氣推遷融而為湖結而為山爰有羣峰散見叠出於波濤之間或現或隱或浮或沉或吐或吞或如人立或如鳥鶱或如黿鼉之曝或如虎豹之蹲忽起二峰東西雄據有若巨君彈壓臣庶又若大軍之出千乘萬騎旌幢寶蓋繚繞奔赴東山起自莫釐或騰或倚若飛雲旋颷不知幾千百折至長圻蜿蜒而西逝西山起自縹眇或起或伏若驚鴻翥鳯不知幾千萬落至渡渚回翔而北折試嘗與子登高騁望近則重岡復嶺谽呀庨豁縈洲枉渚䖤蟺緬邈遠則烟蕪渺瀰天水一碧帆影見而忽無飛鳥出而復沒靈岩則返照孤稜辨山則輕烟一抹此亦天下之至竒也若乃長風駕浪噴山欱野足使人魂驚而汗駭及其風日晴熙縠紋漣漪又使人心曠而神怡至於瑶海上月流光萬頃星河倒懸蕩漾山影又一竒也遙山霽雪凝華萬叠玉鑑氷壺上下相合又一竒也風雨晦明頃刻異候烟雲變滅咫尺殊狀雖有至巧莫能為像試嘗與子弔古尋幽則有回岩穹壑䆗窱相通琳宫梵宇暮鼓晨鐘壽藤靈藥美箭長松金庭玉柱石函寶書靈威丈人之所窺也貝闕珠宫繡縠鳴璫栁毅書生之所娩也翠峰杜圻范蠡之所止息黃村角頭綺皓之所從逝也而闔閭夫差之跡尤多存者玩月之渚銷夏之灣牧馬之城圈虎之山練兵之瀆射鶚之巒出金鐸於淺瀨逸梅梁於驚湍他若毛公燒丹之井蔡經煉藥之墩聖姑絶雉之塘雪竇降龍之淵其石則岌嶪嶙峋瘦漏嵌空牛竒章有甲乙之品宋艮嶽有永固之封其泉則囦淪觱沸甘寒澄碧墨佐君表無礙之名天衣禪留悟道之跡斯地也昔孫尚書欲卜居而未能范文穆思再至而不果豈如吾人生長兹土依岩架棟占野分圃散為村墟湊為闤闠桑麻交䕃雞犬鳴吠里無郭解劇孟之俠市無桑間濮上之音婚姻相通若朱陳之族理亂不識若武陵之源佛狸之馬跡不到周顒之俗駕自旋星應五車地絶三斑盧橘夏熟楊梅日殷園收銀杏家種黃柑梅多庾嶺梨美張谷雨前芽茗蟄餘萌竹水族則鯸鮧之白鱠殘之銀魴鱸鮒魮自昔所珍吾且與子摘山之毳掇野之茸割湖之鮮釀湖之醲泛白少傅月夜管弦之舟和天隨子太古滄浪之歌弔吳王之離宫扣隔凡之靈窩凌三萬頃之瓊瑶覽七十二之嵯峨其亦足樂乎彼嶽陽彭蠡非不廣且大也而乏巍峩之氣天台武夷非不高且麗也而無浩渺之容蓋物不兩大美有獨鍾兹謂人間之福地物外之靈峰是固極遊觀之美而未知造化之工且夫天地之間東南為下非是湖為之尾閭泄之瀦之則泛濫橫溢江右之民其為魚乎懷襄之世湖波震蕩非是山為之砥柱鎮之繞之則奔激暴囓湖東之地其為沼乎唯夫天作之寬以納以容地設之隘以襟以帶禹順其流分疏别派三江既入萬世永賴而後吾人乃得優遊於此蓋至是而後知造化之意深神禹之功大誶曰吾何歸乎吾將歸乎湖上之青山世與吾而相遺超獨邁其逾遠海山兜率不可以驟到非兹峰之洵美兮吾誰與寄此高蹇洞庭山賦弧擴子賦吳山已精神費勩弛就寢便體瞢騰之際忽􅘅一士竦肩高顴兀然安止而讓豫曰往昔良史寸善必取子何以蒙宅波心居水澨弗獲儕陸處者是齒却與蓬萊方壺邈置溟涬荒唐弗經者同一見棄邪豫猶栩栩覺則蘧蘧緬思所以適有古間先生由震澤至其容凝重與夢者無異豫揖而叩之為道洞庭之自曰雄矣哉其形穹崇其氣鬱蔥嶵㟴嶻嶭漫衍巃嵸圍百四十里高千二百弓宣布靈神品彚所鍾儔類並列共七十二峰環以巨浸正當太湖之中曰維縹眇上有岫穴藹矞雲吐霽虹庨豁崆峒拔萃為宗下有林屋亦曰禹洞谽閜㮤窊杳邃莫窮巉嶮兮儼駘蕩之魏殿南北峨眉王屋達其西東內有金庭玉柱銀房錦鋪鍾乳瓊英之粲紫泉白芝之腴岩霤羣飛石燕沙盆四足龍魚𤣥衣使者入聆浪聲砰耳靈威丈人出探治水靈符號左神幽虛之天誠仙官真人之都壁上堊書隔凡可考岩間靈跡振古不誣爰有丹臺神景宫側昔多至人葆形煉魄漢室劉根成道緑毛被夫肘腋更有得真尸解尤有冲霄拔宅峭壁削下直壁戴上古賢題刻騕裊蹄涔猶在石鼓神鉦可擊歲遣投龍醮祭號為福地靈跡其左之支也翔焉鳳凰矗焉金鐸崦邉遺二老之歌唱冢頂掘九石之濩落婆娑樹兮長青絲竹音兮間作亦有黿頭相配紅鶴採夫玲瓏貢獻存夫形像犖確至今工匠資用碑碣紀功雕琢膚潔者製玩具胎斑者就研璞聖姑靈兮爭携賽酎𤣥夫怪兮猶存蛻殼其右之屬也嶺分王夏步稱大小慈里聚人烟兮雞犬聞乎市心華峰構梵宇兮殿閣聳乎雲表亦有植頭馮嶠湯坎金家雷鳴石􅀈最古而賢兮號曰角頭名重商顔兮配夫四皓出輔漢儲兮羽翼何鴻飛冥冥兮遂杳尚留來裔兮雖繁皆事隱遁兮就老其前麓兮則有躨跜赴水儼若虯龍欲掀播乎濤浪將吸呼乎雷風垂涎渟兮甘冽休殘鏨乎妄庸占侸明灣兮儼織之機杼嶕􅥲圻甸兮猶罩之雞籠何延佇之危石作傴僂之老翁其後趾兮則有疃塘二里新安頭砂揚子兮涵遠峰湖漫浮兮壓芳洲平湖嵐兮霋霩小湖池兮甌窶乃若其中則有邵舍馬石堰黃電紫炭浮一溥兄弟父子天壇玉童之乘飈石穴黃金之化牸秦黃葉之三家蔡王毛之諸墓龜背繅車白茅繞步張彈子之堪擲陸摸壁之可覩天王壽查之攢雲可盤桃花之闌路石屋嵌空枝頭垂露羅漢據座乎上下二方飛仙拋壺於野竹諸塢或顒跂而拱立兮或矯傲而却顧此皆其所有之名號與態度也至若山之所生庶黎奠居至為稠密聚鎮成市比次鱗􅌨棼橑布翼甍楹湊戢亦有漫散墟墅什伍駢集延師教子詩書是習於中豪賈鏟利貨殖衒盈乾關齊物平糴亦有離家旅估槖理糧裹駕巨舶乘𢎞舸揚荆襄之帆鼓瀟湘之柁巴西粵南無往不可但務資崇阜陵奚懾躬蹈坎坷遂致羸同猗頓侈竝烏倮兹山萬室處者鮮而出者夥也山之所産稼穡惟艱桑柘攸廣養蠶拾繭堆雪填幌盆手繅絲呼媪擘纊或衣或貿乃織乃紡是家相襲而里相倣遍種果實既繁且美張公大谷之梨梁侯烏脾之柿周文弱枝之棗房陵朱仲之李㝞􅯼陲耀緋綻紫蒲萄林檎銀杏石榴三桃櫻胡二李粉緅枇杷楊梅丫柯綢繆杏梅椒棣筐貯籠收種類􅾬雜惟柑與柚橙橘大小金碗紅豆味甘蜂脾可奪色蒨蟺血堪鬬霜風園囿璀璨錦繡興販南北遠近鬻售所謂千頭木奴可埒封君之富也若是其山之生息不亦蕃乎曰未也其他岌㠖附麗同峙兹水長沙葉余謝姑售苧兩雷雙獄隂橫琴紙獐頭鹿頭筆格衣杵南烏石蛇峐舍厯耳衝漫浮貢望夫玉柱石牌籃箉三山鷹嘴澤厥王舍湖鼉猫鼠箭浮白浮五姑西里其名近百莫可殫舉或任浪舂撞或可人居處處者種植勿異勤收者孳利同一致皆崇卑遐邇散列四裔若是其山之疇類不亦庶乎曰未也林屋震方十里水程有山巍峩鬱然蒼青伍員迎親以養夙標胥母為名迄後隋代將軍構第偉𢎞郡乘載號莫釐亦依鄉氓所稱比之西山稍亞今總謂之東洞庭是山也席溫法海碧螺翠峰上金白沙象鼻芙容洎二平三灣皆在厥內益廣而增雄至若豢虎射雕王巷長圻韓仙豐壁龍井大龜與高峰雞栖皆在其傍添秀而飭竒蓋可與西山匹之其民劇繁墟鎮市闤業擅商賈積習懋遷藝植果品育産絲綿亦可與西山儷焉猶未足為勝尚其大者焉吁山因人而其靈始著地因人而其譽乃揚麻姑獲稱於太伯諸葛顯跡於南陽原夫天下之竒山川必生竒士以受天之慶叶羌兹山之中有經書萬卷拄腹撐腸作為文章汗漫煒煌里選鄉舉進謁廟堂臨軒策問對天鋪張陳大義通乎天人挽斯世抵於虞唐聖顔霽豫曄然輝光鴻臚唱名賜進士第一領三千英俊之班是為天下之福者乃出於其鄉又有神思藻發天質秀穎五車熟於攻研萬言成於俄頃攄聖賢之藴奧極穹壤之高逈既發解於舊京雙獨步於南省翰林巨公得之珍異文淵碩卿見之首肯登春榜第一表三場程式之綱領是為天下之才者亦出乎斯境斯境也前乎此者已有折天香踏鼇頭使番邦善咨諏參薇垣之大政闡方面之嘉猷及其典兵政於夏官握軍戎之樞密贊旬宣於甌閩重糧賦之儲積其所産人才果何如是里也後乎此者尤有躡雲梯探月窟峩鐵冠簪白筆山嶽為之動搖豺狼因之斂跡及有明刑弼教謹夫三尺平反推讞之公詳摘伏審情之精核其所出人物又何如以至鄉闈掇科彬彬之倫泮黌修德濟濟之輩文物丕振為中吳之最若乃草木禽魚珍怪會萃充牣乎內悉不暇計弧擴子曠然若失矍然若悸進而嘆曰溟渤渺茫以蠡測之不過一滴之濡叢林蓊鬱以鷦息之不過一枝之寄邾婁之察綿邈僅於尋咫俥􅰊之覽峻極惟在峛崺若先生者乃吞雲夢八九曽無胸中之芥蒂走何可跂哉莫闖靈均長卿之門而嚌其胾那弗辭義俳淫而纍乎已鄭郊鼠臘之璞遼東白頭之豕枉為同邑之晚生徒事尋章而摘句遂爾局蹐無地其顙有泚先生曰庸何傷哉無所不知之謂智無所不通之謂睿此幾於聖者能之下此微卯金刀之子不能許其博記非莽大夫之流烏能擅其識字且世多瞽矇昏瞀寤醉黑白罔分方正倒植鄙夫寡識冝爾哉語畢就逝豫不能援長揖判袂搔首踟蹰悵怏而已太湖諸山記王鏊太湖之山七十二其巍然雄峙起伏於東西者兩洞庭偃然橫絶而北首者馬跡自西而南逶迤明滅於天際者衝漫橫三山此皆有居民村市里巷多橘柚茶椒桑梓之利東洞庭之東雲水明麗望之若斷而聨者武山其北穹然若立碑者石牌突然而贅出者餘山其首鋭而末岐者箭浮若屋而欹者王舍王舍之南為苧浮有若葉箉於水者大箉小箉有若籃入水其耳可見者驚籃有若馳於前後追而及之者猫鼠有若船者浮山橫絶西南者三山三山之南為澤山厥山西洞庭之北有若隆然而曝水次者黿山山多石可碑又北為長沙又北為葉余有若石笋嶻嶭對立者玉柱稍却者金庭有若飛而欲集者南烏既集而啄者北烏二女娟好背而立者謝姑其南為峐山若人戴笠者帽山若房者舍山五峰竝起若不相伏者五浮若五浮而少二者筆格驤首掉尾勢欲逝者石蛇若螺者青浮其西大雷北小雷世傳二雷相近而不相見見則風雷作小雷之北㸃㸃水面若人者若禽者若馬驟者若器浮者為大小竹東西獄衣杵疃浮隂山橫山紹山大干小干若琴者為琴山衝漫之北若沉若浮為厥浮殿浮白浮又北為大貢小貢又北為茅浮若五星參錯五石浮又北為思夫山馬跡東可十里為杜圻南為夫椒夫差敗越處也與夫椒對峙而差小者小椒西北錢堆有峩冠立者獨山若二几可憑者大㞦小㞦若雙鳬欲止者二鴨若老人罄折相向者大嶞小嶞然其最大而名者兩洞庭也遊林屋洞序有詩包山之西有洞焉曰林屋廣可坐數十人石皆谽谺中空紺碧深翠夏則凉冬則燠雨入則晴晴則隂森若欲雨者正東有石橫道匍匐可入入則豁然大明行數里有石牀石鉦金庭玉柱柱之上有字曰隔凡相傳吳人嘗遣人窮其境數日乃出宣州世莫知其然否而故武功伯徐公嘗至玉柱之側見隔凡字云𢎞治十三年三月水部郎中傅君曰會以治水至山中公暇約豫同遊豫以治任北上不及偕君遊之明日以詩寄豫曰竒矣竒矣乃作亭於洞之口使遊者憩焉豫生長山之東於所謂林屋洞者嘗一至其處其於所謂隔凡者志欲一詣焉以驗其然否而竟未之能也物有近而難至者豈謂是歟聊因傅君之遊和其詩并鑱之亭上隔凡深處禹書存尚有神靈為守門穴底玉泉流作汞岩前碧月過留痕燕飛尚驗晴為雨龍戰猶疑數應坤聞說遙遙天漢接胸中雲夢不須吞游林屋洞記蔡羽己丑五月十一日通州盩厔焦公被孝豐之驚事寧且還聞林屋洞之勝期與四三士往觀而羽與時霖霡未斂客各求道取疾有頃咸會於洞門天亦霽有小亭與門侍從解冠履釋方袍為山行裝南行繞丙門出於陽谷之上趺于石壁壁高盡見太湖之境從者曰前有曲岩復下壁攀木行里許次於岩畔自亭逮丙門暨陽谷曲嵓皆五步一石十步一潭巉巉焉獸蹲淵淵焉龍伏泉㶁㶁行樹根攬柏翳去豐草然後得一伸足靈祐道士曰此毛公壇水也壇距洞且十里而南流出於洞門大者成川小者為潭為澗用是兹山之樹青蔥堅翠少花而多根焦公有山水之趣與客嵌名岩中還至亭下從者已在洞平坂矣靈祐道士習於乘橇橇以先驅洞口微隘稍前得夏屋穹然黑颯然竪毛髮左右請火公命列炬壁間下燭瀦滷上照銀屋石鐘倒懸無慮數十夾屋為石牀丹竈道士曰兹所謂金庭玉柱者也然距石樓神鉦尚逺道士內鳴鉦外奏樂客各據牀屑石鐘仰砥乳穴暑月如盛寒如是者凡幾室而室室不同乃縱左右各為向道或之丙門或之陽谷屏處或若斷絶而無不穿漏惟之隔凡者久許方有人聲還報火屢滅不能進羽怪兹山大不踰他峰而中包空洞莫知攸際靈威文人所言有無不可知求諸隔凡以外亦已異已果幽明之境殊豈造化者設是神巧不得而窺邪出洞門日已暝煮石乳飲訖各謝去登縹眇峰記滙三州以為澤水始大中五湖以為鎮山始尊然三州之利不同而形勝亦異不厯其尊未易遍也而尊莫尊於縹眇峰其陽空虛無梯可至西為晉陵水最大山最遠第四峰臨之特親第四峰之於縹眇猶人之掉右臂北厯三嶠以由西面東踰莫釐以窺吳江秦家嶺臨之最親秦家嶺之於縹眇猶人之出左臂北為姑蘇城穹窿陽山或遠或邇厥疆不齊砂子嶺臨之最親由砂子嶺厯西湖寺躡峰之隂尤近是升峰之三道也然客終以艱危為病常中陟而罷還於所親以求三方寧隘寧鬱寧受屛蔽而五湖之觀鮮克周遍正德庚辰十月之望中山湯子重太原王履約履吉客余之明日得第四峰之道輿舁以進蓋踰時而造厥巔也遊於空虛忽見大水下求千嵓莫知所在客已有懼色矣居頃獲詢三州之形如螺如黛隱映烟際可以意求難以形辨然東北隱起非河非虹可指者靈岩浮圖也北為無錫其入最深可臆者陽羡諸山也西方不究厥始然卞山獨親南屬苕霅可接餘杭武康霅以東不得而擬矣於是三州始合象緯始親客始吐隘去結消釋壅蔽混元支離浮乎澒洞覽乎杳冥超然萬仞之表矣時冬氣甚肅日白無色密邇天路非人冝居各杖䇿去蔡子記林屋洞范成大擊水摶風浪雪翻烟消日出見仙村舊知浮玉北堂路今到幽墟三洞門石燕翻飛遮炬火金龍深阻護岩根寶鐘靈鼓何須扣庭柱宵晨已默存再遊林屋洞王鏊蓬山有路那曽到林屋無扄可數來寶笈石函那復見金庭玉柱為誰開秪愁黯黮渾無地又恐砰鍧忽有雷不是隔凡凡自隔重門欲叩更徘徊過洞庭山沈以潜芙容縹眇隔烟霞水國茫茫去路賖一望湖光三萬頃兩重山色幾千家角頭有地皆栽橘洞口無村不見花范蠡何須重弔問且尋漁艇作生涯遊林屋洞烟霞縹眇洞中天白石蒼蒼路宛然月落岩頭聞鶴唳雲封洞口識龍眠毛公煉藥壇空在夏禹藏符世尚傳今日我來醫有道不妨深入見羣仙遊林屋洞徐禎卿劃然中豁盎然浮一徑微通玉府幽籠炬漸遙無燕擾相傳有石燕遇火則觸滅扶笻多躓有狼憂余時有蹈坎之危苔泥淺漬寒濡足雲石餘筋鋭觸頭丹刻縱存何處覔十年飽願只虛酬相傳有夏禹丹書石穴遊林屋洞歸道中偶作厯嶺循坡石路紆行邊濟弱有肩輿墻桑覆葉欹僧帽洞草分香上客裾積儉振家風俗美繁寒傷橘地租虛他年若為兒孫計合卜菟裘向此居入林屋洞王寵白觀已仙去碧山遺寶符齊心扣靈闕企石窺清都雲堂裊撐柱百人可跏趺白玉斫隆棟青蓮綴流蘇昔人煉液處牀笫鬱金鋪石乳絫而長交錯如珊瑚蛇行屢回互磬折窮有無恨乏嵇生識鳥篆空糢糊時聞神鉦鳴地底越江湖冥濛翳日月窈窕通蓬壺悠然遂雲卧心將天與徒羽毛如可就千載有龍徂丙洞天傾霞石開日映雲門敞芙容秀絶壁菡萏排仙掌下窺黯無垠側晀紛有象丹藤蔓氷􅊤蒼苔蝕銀榜野鹿浥飛泉寒兔逃外莽攀蘿眷仙靈折麻私向往訪道空名山前途浩漭漭誰令獨世憂扣我陵意想曲嵓乘雲欻先登扳崖紛廣眺孤峰上寒日平楚騰餘燒天高風物緊地迥山川竅饑鼯乍陸梁哀鴻相叫嘯企石揖雲帆披霞迎海嶠空水空泛瀾虛無自余照林深養谷神壁灰圑景曜光風爛芝苓玉髓滋蘿蔦樵隱自夷猶末路多奔峭懷哉角里公千春可同調林屋道中海嶠雲霞虛翠屏閬風吹袂采真行壺中樓閣天齊動石上瑶花冬自榮遂有浮邱來馭鶴似聞子晉解吹笙金庭玉柱千年閟日月崢嶸愧此生遊林屋洞胡纘宗洞中别有天我亦地中仙屈曲山斜入磈礧石倒懸細翻禹貢讀高枕道書眠去去復幾許龍宫還窅然同前繫馬靈宫第九天紫霞丹竈坐羣仙金庭空濶蛟龍鬬玉柱玲瓏日月懸改火欲烹山乳食掃雲初藉石牀眠隔凡不隔嶽陽水黃鶴飛飛何處邊林屋洞口古井二絶王鏊聞有紫隱泉真誥云包山有白芝又有隱泉之水正紫色華陽雷平山有丑公泉飲之除腹中之蟲與隱泉水同味云是玉沙之流津也用以浣衣不用灰此為異矣閟在靈仙境金庭不可扣且此汲寒井洞口有深井雲漿湛虛空我來攜一罌㑹與仙源通縹眇峰范成大滿載清閒一棹孤長風相送入仙都莫愁懷抱無消豁縹眇峰頭望太湖登縹眇峰絶頂蔡羽莫訝登高不用扶手招鸞鶴興如何環來島嶼人間小側去陽烏寒色多岩下雨來浮碧靄杖頭霞去落蒼波千年石上仙人迹為問王喬幾度過登第四峰青磴去已遠蒼藤住未能山高鳥不到天近氣先凝掃石喜無事開岩初得朋落霞三萬頃俯首看吳興登縹眇峰王寵宵夢升天行明登縹眇岑圜海湧鯨脊大漢冠鼇簮吳粵倦周覽乾坤莽浮沉千嵒遞拱帶萬頃逼侵淫歊蒸塞靈灝氣候異陽隂寥寥躡雲磴落落捫河參鵬霄邇靈嶽鳳野開煩襟偓佺空中語蒼虬烟際吟天衢非阡術超駕有遐音覽化自靡足懷仙傷吾心臨風寄瑶草遲爾崑山林縹眇絶頂絶頂親攀日月行五湖如帶自回縈山川厯厯分南服今古茫茫混太清萬里風烟臨海嶠百年身世悵浮萍未驂鸞鶴雲車遠兀坐松杉濁酒傾第四峰登眺絶壁已天半回峰獨翠微磴危尋蘚迹風引曵雲衣野燒孤烟長川光落日霏樵歌深自好應飽北山薇登縹眇峰徐禎卿靈峰峻偉插吳天鹿道斜通密草間波暝遙疑下方雨烟明微見隔州山藥苖細染雲絲碧石翳重生雉尾斑塵骨未仙留不得剛風吹冷布袍還與客至林屋洞蔡羽方丘茂草色五月入溪寒古洞仙媒引丹牀法友觀誰嫌靈迹隱我愛石樓寬袖得長生術常將鍾乳餐林屋洞張雨山中春水泛蛻骨長於樹拏舟探穴口甚深不可渡窮冬桃始華爛然朱光處洞庭山周鼎玉柱金庭古洞天兩峰中斷碧波連歸來角里人如玉老去毛公骨已仙山有樓臺天在水地無蛇虎橘為田沙頭鷗鷺如相識曽駐軺車記昔年自胥口泛舟太湖至洞庭楊循吉西望茫茫接幾州羣山無數障中流飛帆半日才能到賭命今畨始得遊城裏見天無許大漁中覔飯有何愁橘洲渡慣心猶怯怪殺衝波一小舟自靈嵒至西洞庭四首袁袠靈嵒高處是琴臺舞榭歌梁已草萊西施洞指雲中出范蠡舟從海上來龍爭虎鬬事千秋越壘吳宫麋鹿遊更分震澤為彭蠡亦有三江賽十洲天開地缺浸方輿漭漭波濤混太虛縹眇峰頭看浴日毛公壇下閟丹邱七十二峰天削成青蓮萬朵畫分明若為飛舄都遊遍不減蓬萊頂上行遊西洞庭山記夫覽山川辨物宜稽民俗舒性情遊之概也西洞庭去吳城百里豫自胥口抵山館於林屋山人山人負經濟之學數竒而山居因山創樓名曰𤣥秀銷夏環其前縹眇倚其後山之勝萃於兹矣是日也遂登縹眇之顛山有九峰而縹眇獨峻援而上掖而前既登則東洞庭如帶而七十峰特小湖中諸山皆若屏拱落日陷波中金紫萬狀遊之明日泛銷夏灣觴於小龍山而歸又明日渡蔡嶺憩明月灣登石公山山之陽有石坂其半沒於湖猶可坐千人乃相與濯足而歌曰山􅂒㕒兮石如砥湖澒洞兮百川委又觴而歌曰震澤定兮水朝宗億萬年兮仰禹功於是捨陸而遵舟復館於蔡氏明日乃遊上方諸寺山人知豫將歸明日乃同遊毛公壇觀林屋洞洞深黑而中甚卑入者皆俯而進余獨與文子探隔凡而出題其旁曰通仙隔凡洞之最深處也山人曰子歸矣山有曲巖其石如黛峻而秀不可以不觀乃觀之遂張帆而歸袁子曰西洞庭東南之沃壤也梅梨橘柑楊梅枇杷魚鹽茶竹之饒錯以良田山之人朴願而信塗無婦人可不謂美乎自夫差以來不被兵燹抑又美矣同遊者伯氏邦正文子壽丞潘子修伯山人者蔡氏九逵也復有諸蔡皆同遊歸之明日而記其事嘉靖庚寅夏五月六日銷夏灣記蔡羽山以水襲為竒水以山襲尤竒也載襲之以水又襲之以山中涵池沼寬周二十里舉天下之所無竒之又竒銷夏灣是也灣去郡城且百二十里春秋時吳子嘗避暑因名銷夏自吳迄今垂二千年遊而顯者不過五六輩其不為凡俗所有可知己湖之山莫大於包山山之峰莫大於縹眇峰高不知其幾里長袤五十里有竒也峰之南水道三十里為苕溪其弗能與苕溪參者諸巒抱其外也苕之北舟行三十里以求縹眇峰其勿能與峰直者亦諸巒為之拒也四面峰巒交萃獨以一面受太湖中虛如抱甕其南列門闕焉由門闕東西盼西為龍頭山其次為小洞庭為石蛇為含為蕪為鼠鬬之石不得而名焉東為大小明月灣為石公為澤為厥為三山不得而名焉明月之灣其背為梭山厥土墳壚厥産林禽鴨腳櫻桃柚柿梨栗龍頭之背為圻峰厥土白礫厥産玉石盧橘中銷夏之腹印浮其上乍有乍無為衆安之洲帆落洲上則四面環合為屏為翰聳妍效譎以與縹眇朝貢峰之巔有草無木其麓多木無草丹宫梵室䝉蔽林靄至鐘鳴鼓應然後知仙釋之廬魚行鳥過形影交徹帆翔其上而莫之知避也夫地既異而處甚僻信乎遊者之難至矣向使移置之附郭則撰壺觴秣車馬者日不暇給茍日不暇給豈獨為吾灣哉人將僬僬乎劍負以趨萬物失所矣夫造化無意者也設是灣如有意鬼神之能不得而與非冥契其事孰能樂之於戲非惟世之人不得而樂灣之人亦莫得而樂也豫世居灣上有所獨得私志之銷夏灣范成大蓼汀楓渚故離宫一曲清漣九里風縱有暑光無著處青山環水水浮空同前髙啓凉生白苧水雲空湖上曽開避暑宫清簟疏簾人去後漁舟占盡栁隂風泛舟銷夏灣周南老湖流抱山曲平林俯風渚十里足清景六月不知暑隂崖振靈籟飛波灑凉雨桃笙凝翠濤梅寒生白苧氷簾晝不捲恍疑眠洞府時異景亦殊湖上空延佇銷夏灣二首王鏊四山環列抱中虛一碧玻瓈十頃餘不獨清凉可銷夏秋來玩月定何如畫船棹破水晶盤面面芙蓉正好看信是人間無暑地我來消夏又消閒同前王寵千山玩回轉雙闕開嶙峋圍作玉鏡潭流水桃花春雞犬自甲子衣冠乃秦民表裏重湖阻丹青四望勻孤峰表日觀羣嶂摩天垠波光别駘蕩霞采相鮮新疑觴西王池誤攀織女津海鷗戲蘭薄游鯈瑩心神牙檣悲昔幸玉輦罷今巡榮華無常玩山水有天真塵纓聊以濯慚爾櫂歌人灣中覽古帝子樓船天上來渚宫巒殿海中回山河錦繡千年觀歌舞風塵萬壑哀澤國魚龍吟落日荆蠻雲物悵登臺茫茫今古渾無賴直北長安首重回練瀆高啓吳越水為國行師利舟戰夫差開此河艅艎試親練十萬凌潮兒林比佽飛健鼓棹急風濤揚舲逐雷電當時意氣盛謂已無句踐鷗避去沙洲龍愁閉淵殿恃强非伯圖倐忽市朝變臺上失嬌姿泉間掩慚面至今西山月恨浸秋一片猶有網漁人時時得沉箭同前周南老夫差習水戰決瀆湖之傍回瀾滙衝激破浪瀦汪洋千艘連舳艫三軍練艅艎一鼓山嶽傾再鼓波濤揚焉知君子卒潜涉江中央江湖利竝失兵㢮不復張奉陪太傅王公練瀆泛舟蔡羽山曉鐘冥冥石門樹厯厯餘霞蒸初陽微颷轉孤鷁水宿凌晨光境絶欣所適回纜抱長川搜墟踐空壁古人練兵處滄洲長長荻冬曦娛公旌萬壑盡昭析其二逗舟網罟村假楫陽鳥居山從鏡心回水接海表虛羽族憐珍華公行亦觀魚緣霞興悠悠度水行徐徐已叨形骸外獲奉談麈餘謝公從遊徒曵裾容散樗明月灣高啓木葉秋乍脫霜鴻夜猶飛扁舟弄明月遠度青山磯明月處處有此處月偏好天濶星漢低波寒芰荷老舟去月始出舟回月將沉莫照種種髮但照耿耿心把酒酹水仙容我宿湖裏醉後失清輝西巖曉猿起同前周南老秋高木葉下凉月照湖曲隂精濯浮金氷壺炯寒玉露澄彩奪鮮波涵光可掬蘭舟棹空明良宵清氣肅萬象森寒芒川澤盱駭矚把笛不敢吹湫龍豈容觸同前謝縉湛虛一灣秋冷浸萬古色風定水自磨烟消鑑常拭澄光共涵映清氣交侵逼誰將廣寒宫移入水晶域眷言雲皎皎毋使雲霾黑桃花塢徐禎卿猶有嘉名照荒寂百年塵跡已都非繫筐日暖桑錢貴沃土風輕豆葉肥草木歲深應委腐山原春好缺芳菲誰能更買千株種走馬來看十里緋綺里高啓高皇本壯士提劍定四方晚為兒女情悲歌起傍徨愛子欲建儲寵姬方侍側顧驚四老人謂已成羽翼大臣豈不諫孰能斡天機彼翁何為者足見人心歸始潜避秦君終出安漢嗣世羅焉能羈舒卷聊自肆我來角里村如入商顔山紫芝日已老鴻鵠何時還斯人神仙徒千載形不滅猶想蒼苔中白頭卧松雪登莫釐峰記王鏊兩洞庭分峙太湖中其峰之最高者西曰縹眇東曰莫釐皆斗起層波矗逼霄漢可望而不可即成化戊戌豫歸自翰林文吳縣天爵過豫於山中相與窮溪山之勝行至法海仰見異峰寺僧進曰是所謂莫釐者也文振衣以升衆皆繼之或先或後或喘或顛至乎絶頂而休焉天若為之寬地若為之闢西望吳興渺瀰一白有若雲焉隱見天末或曰卞山也北望姑蘇橫金一帶人家厯厯可數有浮圖亭亭曰靈巖上方也東望吳江雲水明麗帆影出沒若有若無蓋七十二峰之麗三萬六千頃之竒皆一覽而在曰大哉觀乎相與席地行觴踞石賦詩久之暝色四合微月破林湖光澒洞岩壑黯黮乃相與循舊路而歸焉語有之不登高山者不知天之高也不臨深淵者不知地之厚也莫釐猶爾况所謂泰岱恆華者哉豫以是知學之無窮也故記之望洞庭寄翠峰長老陳基一上堯峰望洞庭東山咫尺勢堪凌橘林霜老金千顆紺闕雲藏翠幾層弔古獨來尋晉宋酌泉誰與别淄澠戴君自是忘機者相約同參大小乘湖上望西洞庭吳寬百家棧上望西山縱目遙過銷夏灣未遂真遊勞指㸃聊憑高興去躋攀石壇相距才十里林屋都來有萬間報與山靈須少待會將親手扣仙關和徵明登東洞庭徐禎卿塢僻雲深石徑紆漸從平履涉﨑嶇烟迷遠景山藏屋林透微明日墮湖佳境到時應就宿肩輿停處合臨圖莫釐絶頂君還上得似鄰峰縹眇無又和遊洞庭將歸再賦名山本自饒靈異還倚高人品價竒梵宇留將題壁偈水妃傳作步虛詞遙聞暗浪風生早欲發歸帆月落遲知是不貽猿鶴怨雲栖元未有心期自西山歸東洞庭王鏊西來暝色一帆孤才見青山忽又無白借天光猶澒洞黑添雲氣轉糢糊人家遙指諳來舊塵眼頻揩見却初述作惜無摩詰句五湖烟景若為圖與嚴太守道卿同登莫釐峰微雨發春妍東風花外軟良朋約佳遊遙指莫釐巘平生山水心老腳肻辭繭壺觴紛提携曲磴屢回轉小憩山之腰祕景漸披蕆紫翠蓋幢翻青黃繡裀展須㬰造其顛四顧目且眩太湖小汀瀅風帆時隱見吳門俯可掇越嶠杳堪辨摩挲舊題名斑剝半苔蘚日斜下山椒窅爾迷近遠問途值樵夫失腳悔已晚懸崖颭伶俜絶壑窺淟涊熹微認前村山寺吠鳴犬解衣得盤礴仰視坐猶喘韓公鐫華嶽正自恐不免登高勿知厭持用戒軒冕登莫釐峰絶頂朱琬春山結伴好登臨萬仞烟霞屐齒深大海東回拖白練羣山西走列青岑一雙日月懷間玩七十蓬瀛鏡底尋安得神仙不死藥餌之於此捫天心疊前韻殘臘已破春乍臨春雲布地春山深懸崖掛壁入蒼翠翔鸞舞鳳羅嶔岑六龍停車不敢度四海指掌亦易尋我欲乘風跨雲鶴翩然下浴瑶池心洞庭山范仲淹吳山無此秀乘暇一遊之萬頃湖光裏千家橘熟時平看月上早遠覺鳥歸遲近古誰真賞白雲應得知遊洞庭湯仲友寒色滿空山翛然一徑閒鳥啼黃葉外人度翠峰間古殿藏雲氣唐碑帶蘚斑未窮幽絶處興盡忽思還過洞庭唐珙西風吹老洞庭波一夜湘君白髮多醉後不知天在水滿船清夢壓星河洞庭曲十首金信竒峰七十二菡蓞青蓮開遙看出雲雨不似楚陽臺海客走相報龍王嫁女來雷車挾風雨髙浪白成堆波濤三萬頃倒浸中天月蛟精戲神珠開扄白銀闕洞庭西去浪出沒有雙雷遙看青兩兩不識具雪堆浩蕩太湖水東西兩洞庭吹簫明月裏龍女坐來聼毛公來刺船遂入林屋洞洞戶夜不扃風雷自相鬨雌風吹雨腳龍腥湖上聞小姑彭蠡至來謁洞庭君日落洞庭波青山風雨作乖龍挂修尾有似青旗腳湖上望蘇臺水與青天逺長風送飛帆忽到長洲苑有客浮槎去槎頭挂客星仍將莫邪笛吹與老蛟聼望洞庭楊維楨瓊田三萬六千頃七十二朵青蓮開道人鐵精持在手嘯引紫鳳朝蓬萊龍子卧抱明月胎須㬰化作桃花腮爾雲槎子何處忽飛來蓬萊之淺今幾尺黃河之清今幾回雲槎子云是自江上來但知東方生賣藥五湖上不知張使者北犯北斗魁雲槎子吾與爾何哉任公釣竿在東海潮壓桐江江上臺洞庭曲十首日落洞庭波吳娃蕩槳過道人吹鐵笛風浪夜來多道人鐵笛響半入洞庭山天風將一半吹度白銀灣仙橘大如斗泛之過洞庭江神渾未識喚作楚王萍海客報竒事青天火甕飛明朝雷澤底新有落星磯網得珊瑚樹移栽瑪瑙盆夜來風雨橫龍氣上珠根海上雙雷島渾如灔澦堆乖龍拔山腳飛度海門來潮來神樹沒潮去神樹青雲裏天妃過龍旗帶雨腥客入毛公洞洞深人不還明朝探禹穴相見會稽山太液象圓海金蓮夜夜開水中萬年月照見昆明灰秦峰望東海雲氣常飄飄桑田明日事奚用石為橋洞庭山周南老兩峰東西峙對屹具區澤波搖巒嶂浮雲開蒼翠積地古山有靈蛇虎絶踪跡林屋窈而深中有真仙宅靈威探禹符窮幽振金策信有不死方奚為異今昔送人之洞庭姚廣孝西風飛錫渡如舟來向湖間作勝遊七十二峰青一色君看何處獨堪留洞庭謡東洞庭西洞庭兩山突兀摩空青七十二峰在其下氣勢直與秋旻清太湖三萬六千頃芙蓉秀出雙亭亭湖底潜開林屋洞羅浮句曲通仙靈嵐雲水氣互出沒揮灑八極風泠泠晦明變化不可測波濤洶湧如山傾鮫人停織百怪屏滿耳澎湃千雷鳴魚龍騰躍鬼物泣帆檣摧折舟人驚斯須陽動忽開霽波平湛湛琉璃明林巒無處不蒼翠島嶼日照花冥冥斯山景物豈止此千態萬狀描難成中有空宅亦有仙人扃囂塵不可到勝槩如蓬瀛神僧還回看杯渡帝子下降停雲軿我昔畏險曽勿過兩山每對空傷情我歌洞庭謡請子為我聽何由乘槎尋子去翠峰深處藏餘生洞庭育秀歌吳信洞庭之山秀而靈東西屹立如畫屏試歌洞庭育秀歌請君側耳為我聽太初元氣合胚凝上天好竒遣六丁鑿開混沌見兩青鎮以白玉之柱黃金庭副之七十二峰碧崚嶒太湖一水清回縈佳氣四時互鬱蒸儼如蓬萊三島浮滄溟大禹之功何有能真是天造地設成縹眇鬱嵯峨莫釐聳崢嶸勢如虎豹形若蛾眉橫日月互吞吐烟霞發精瑩草木蔥菁紫翠層靈迹勝景難具稱攢雲嶺上雲英英芙蓉山下花冥冥明月灣頭夜深明月明錦鳩峰頂春暖錦鳩鳴王母西來駐雲軿吳王銷夏醉夢醒樂天遨遊為揚舲子美水月鐫碑銘藥墩煉藥有蔡經仙壇仙人緑毛生東園綺里芝草茁紫莖雪竇古井涵清泠翠峰浮來神鐘吼華鯨峯圻海眼瑩碧開兩睛林屋龍洞水氣腥中有石鈕石鼓扣之聲鏗鏗靈威丈人昔曽行神景宫中古檜如龍形上有百尺兔絲下有千年苓道人斸苓食之白日能飛升古來遺跡信可徵總是樂遊耽遁漁樵盟未有政如房杜文如班馬之輩出此垂芳名聖朝文化四海咸賔興國初伯昂山長殊有聲年來吳分當奎星山祗水后合獻禎多士濟濟皆登瀛東麓使君衣錦榮恢𢎞王綱闡帝紘少年狀元何寧馨文魁名振白玉京蔡子干將出豐城藻思如創新發硎後進雖未加冠纓文物禮樂能相承史君精神玉壺氷龍駒已膺月旦評王郎氣象百丈增風雲際會皆可乘偉哉洞庭鍾得天地精千年孕育今大亨虎邱蝟縮獅山驚氣勢直壓華與恆請君為我繼此頌太平吳都文粹續集卷二十一
