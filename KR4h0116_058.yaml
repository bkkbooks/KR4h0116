body:
  text: 吳都文粹續集補遺卷下明錢榖撰雜文長洲縣儒學記至元三年龍集丁丑平江路長洲縣元同等言于大府曰國家疆理際天地糧儲之富吳擅天下什五而長洲一縣又擅吳賦四之一生聚之繁財用之博天下縣未有壯于長洲者而縣學不建職教不修草餘年來父兄之教子弟大率富者侈靡而不知禁貧者偷惰而不知向方自非興學校明義理將何以定民志善民俗哉今天下縣皆有學獨長洲于舊里在廢址之上未設衙門漫名之學誦聲不聞民至縱畜牧佃蔬圃其間昔孔子適衛稱既富庶則必有以教矧今興學勸士之詔數下而坐視其曠墜則豈有司承宣之謂哉奈縣無夙儲官無贏資竊見徽州路學教授郡人陸德原向嘗捐資建甫里書院矩度嚴密列之學官而德原一㕓一區無在縣境者誠得大府觀飭而奬勵之德原宜于此無不盡其心者矣狀上路總管髙昌道童公召德原示所以德原作而起曰公牧吾民厚完吾民者無不至今又將溥善教漸涵之公之德意厚矣然則德原將何以答公意哉惟罄竭心力期于壯厚髙𢎞與公德化同垂永久而已耳于是搜材簡工始于是年三月甲子更八月丙辰學告落成門廡深敞殿寢尊嚴齋宫講廬庖湢庾帑一切大備先是贍士廩餼未給德原復買田以足之于是吳人士與大夫公卿覩學之成歎息言曰長洲為天下壯學使其學聊且粗略何以稱子男邦伯興建之意哉今學成實雄壯與縣敵則其人士藏修遊息庶為稱情也已况明守令為政知本末德原以儒者為學官事皆可書乃相率請記于豫辭不獲為之言曰三代盛時吳蓋陋邦自泰伯端委而君吳久之而子遊北學于中國自是聲明文物煥耀四方蓋子遊生于海虞而長洲則切近地也今學之成豈徒美觀容飾文具哉善教者本諸其身而已矣故子遊之宰武城必曰君子學道則愛人小人學道則易使也郡邑令長誠能推是以修其身以及于邑之民將見民化政成風移俗美其秀民良士顧豈無子遊之徒出而為邦家之光也哉詩曰無競維人四方其訓之有覺德行四國順之此之謂也請以為記白鶴觀祠堂記國家混一之初世祖搜羅海內才俊用之惟恐其或遺于是瓌竒磊落之士往往顯功名于當世若嘉議大夫平江路總管致仕郡人張公正卿是也公初未冠即北上膴仕儤直殿廷出入禁衛成宗愛其小心謹飭賜名巴延大德間出官江南纍升漳州路總管原公自膺柄用四二郡政一留鹽運同知將老而再牧名州所至以清白謹願稱恂恂有古循吏風朝廷推恩纍世于是公大父海贈中順大夫清河郡伯大母何夫人贈清河郡夫人父憲江淮財賦副總管纍贈廣德路總管母鄷氏封清河郡夫人室人沈氏封同于姑公父子自念臣子所以報其君親雖瀝肝膽未足以罄萬分之一矧人之起滅在呼吸間哉審以别業之在郡城鶴舞橋之東者舊為宋信安郡王之藏春園也基頗宏敞近為建構雄麗而敬歸之太上教法大道上以祝釐以報君下則立祀以報親初名之曰報恩道院舊植古松一株于井傍大已合抱髙踰數尋二百年物也道士張應玄始廬其下遂有羣鶴自東南來盤旋于空久之一鶴下峙于松弗去經嵗作巢其顛大如百斗盎每晨長鳴屢獲竒驗張既羽化復請括蒼趙貞士知微鄱陽蕭鍊師玄中皆克修虛淨玄妙之學而行之為人所推重而公益禮之俾相繼主席仍割腴田若干畝飯其徒趙與蕭狀其事于朝乞更道院為白鶴觀當寧可之請降璽書護焉由是白鶴觀之名著于吳中矣未幾公捐館舍趙與蕭亦以此委蛻張弟子席應真博通玄典兼讀儒書踵構觀宇輪奐一新仍即觀東為祠堂以祀公及清河伯以下凡幾主每遇諱日節序用玄教薦享之夫公揚厯中外為時名臣其卒也史有傳家有廟祭有主然而公之神靈無所不至屬厭其恩施者自非揭虔祠宇晨香夕燈則何以妥公之靈也哉觀之始末學士楊公已為之記故于基宇所設道流所聚則蓋略焉席羽士懼更久而張氏之厚施祠禮之報享併所以自别于道家者非勒之金石則何以章示後人此祠堂記所由請作也張氏世居吳長洲之相城公之嗣子都中君以蔭授黃巖州同知克世家業云福山東嶽廟興造記國家思所以惠安元元莫若愼選守令于是浚義王侯某以至正戊戌授平江路常熟州知州蒞政之二年化綏德懷民用大協百廢具舉故福山東嶽廟著興造之績焉按福山距州四十里而近枕大江即唐之金鳯山也後以山形如覆釡覆與福聲相近因名之福山云山崒起于海隅之邦聳秀深特宋仁宗至和初邑人建東嶽廟于山上已為吳下叢祠之冠哲宗元符間復拓其規制而侈大之及髙宗南渡金兵迫逐不少置東南郡縣悉被焚蕩而福山廟與常熟縣巋然獨存吳人益神之紹興二年邑人請于知縣施侯益崇大廟制以答神貺蓋岱宗逺在魯而福山則宋京畿近地東南士民奔走祠下乞靈祈福于是福山嶽廟遂為泰岱行祠之甲宋入職方七十有五年矣而王侯來為是州廟制非不宏大也然歷年滋深棟宇腐撓丹雘䵝昧侯即首捐衣布之贏以奬率州人士撤去弊陋一新廟制而繚以垣墉先是殿無前軒侯建屋若干楹庶朝謁拜跪有餘地仍為若干楹以祠福濟李侯玉以國家漕海運鯨波萬里惟天妃是賴爰即廟之左作天妃宫復别建方丈之室以居司廟之人又作官廳若干楹以待守土吏嵗祀之日憩焉竊惟福山嶽廟由始建至于今兹三百餘年矣顧未若今日之極盛而甚完也于以見王侯為州有餘力為政有餘暇神人于是誠有攸託則侯之賢其可泯泯無聞焉禮五嶽視三公至唐開元中尊封五嶽如王爵及宋祥符五年遂加帝號國家一天下禮秩百神復加徽號以著尊崇之盛典夫岱宗既在魯由魯並海岱東諸侯凡尸冥權以福東土者要皆泰岱宗而主之也則岱宗于東吳有祠廟惡得以封內山川限其逺近哉况福山鎮峙海虞糧儲之富當東吳十之三自非明神依憑山川以出雲雨嵗何以能稔民何以能治國家何以能有所藉于無窮其為之記以章明神之休以著王侯之美匪誇詡也覽者固宜謹志而無忽焉簡材順心菴記普應國師道振東南時所至為寶坊一切棄弗居顧尋山崖水阻草棲浪宿以自遁逃其聲光吳江簡材在震澤東南陲土腴而勢阻由垂虹橋望之其煙林聚落可指顧見也比丘理悟再世有其地可三頃餘草苫田廬僅蔽風雨而悟未祝髮時嘗一再延國師居之俾之安禪而却掃蓋悟雖生長大家而實心慕空宗未幾徒步登天目從國師剃落爰即是為順心禪菴而實激師慈願道力開創厥始庶永其傳已而國師示寂悟于初心尤益勤勵寒暑一衲晝夜一簟草衣蔬飱破弊捐惡同門禪者喜悟頽然委順有若此也于是智者奮謀朴者效力撤去舊小遂成精藍一事素堅不事雕繪屋瓦鱗比出畦町中居者晝而農夜而禪甽澮溝塍近在簷檻粥魚磬鐘吞響風水其三時之勤為終嵗之須要皆食其力而非茍取于人見者以其役力而休知其為勤心行道者之居食其力不足則買田以給之十方禪人拿舟來者飽其飢而憩其勞俾之安居究道而期其必契必澄焉主菴席者必志願敦確僉議允請其𨽻事徒衆則率循菴規分掌庶務其條具碑隂夫悟堅之廣施不惟不有其資觀其放置枯寂且將不有其身誠以佛之道溥博周遍公天下而非已得私觀于此而知易之為卦矣夫同人于宗而有吝之道及同人于野而亨宗狹而野廣也兹則儒與佛其大致雖不同然其道之行俾人不獨親其親而子其子則亦未嘗不同也今是菴當震澤風水之會其來者非有一日之契也然以其規程一出于公而無私觀者固已思過半矣况國師之道厚大深宏可以蔭永久而庇無窮則是菴之期于弗替可保也矣挂蓑亭記宋丞相富文忠公其子孫南渡而散處者往往有之及江南入職貢故家遺轍往往寄迹于釋老異教而公之諸孫紫微者為道士于吳江之昭靈觀為屋不百楹而神明偶像居十六七州境既狹而紫微又不樂與凡構接飄飄有凌雲之思思謝去而不能乃于州東雪灘之上結一亭甚隘覆以緑莎僅庇風雨婆娑焉儼如一蓑之懸也遂扁曰挂蓑蓋將與三髙神遊意猶未足則又繪仙山訪隱圖置于中若將尋真蓬萊訪其師安期羡門于雲海之上以究竟黃老之説而成遐舉之願也余與紫微方外友也乞記于圖之左為之説曰神仙有無不可知然自秦以降世主每甘心焉使誠有之其神靈長年變化于朕兆之表奚必山林巖壑之間哉豈山林巖壑幽間深閟人迹罕到仙者乃始樂居之世固有髙世遁迹之士遁其光而不耀却其名而弗居俯仰以自樂優遊以終老則山棲樹巢不厭深密者古蓋多其人未必一一皆然也槩亦隱者之流耳夫隱者如沮溺荷蕢之徒雖聖人不能語之化其卓識逺見世蓋有不得而聞者今豈無其人乎紫微訪而得之某雖老尚將從而究問焉純素齋記迹沙寺楚漆園吏以內聖外王之道斂之于精神純一之中乃曰其人純素可為真人夫真人者大浸稽天而不溺大旱金石流土山焦而不熱世惡有若人哉蓋指此心而言也人之為心湛然純白一念萬年則為賢聖為佛祖要豈能外于此哉東晉逺法師在廬山修念佛三昧謂之修白業夫白與黑對暗還黑日明還白雪雪山大沙門教學佛者至矣盡矣又豈待豫言哉吳僧如瑛者號白石潔素而好修依止迹沙寺毅公丈室為侍者乃取漆園吏之言扁其齋居之室曰純素漆園之言不惟是而已又曰虛室生白吉祥止止漆園著書時佛之為教東震且未之聞也良以佛教寂滅而莊周老氏者其教清淨而虛無要不可岐而為二雖周之書肆行而與其言自相吻合也瑛也浣濯其心身服膺乎佛祖之所垂訓則雖拾薪鬻石山巔水涯精進不惑則將見純白真人無二無雜我即真人真人即我雖佛與祖亦何異哉瑛年未三十能精進不退定以豫為知言至正己亥玄月朔記虗白堂記葑門東西隱菴西隱菴在吳城葑門東一舍而近郡髙僧賢哲翁之所建也菴非有廣殿修廊之𢎞麗然當江湖之會文漪驚瀾天光雲影朝夕滉漾簸蕩于几席間蓋亦精藍云其徒曰别峯于菴東南創一淨室扁曰虗白索豫記之豫嘗讀莊周氏之書曰曕彼闋者虛室生白謂人能遺聲色之雜去嗜欲之擾而一任夫性則道集太虛之宅而純白生焉其義若此周蓋老氏之流别峯佛者也老佛果同道乎不然老之道清淨亦在乎養性佛之道寂滅亦在乎見性性無不同與生俱生而不可不養者也茍能養而有所見則本性虛明舉天地萬物莫逃乎明鑒之下何虛之不生白也哉别峯寂然燕坐是室以息羣動則必心靜性靈四維上下皆成虛空雖晝之日夜之月其光明亦同普照十方矣何有執著乎何有垢泥乎佛乎老乎莫之同乎莫之異乎此少林指以單傳而神光遂入于雞足山者其能外此虛白否耶姑反訊之用以為記芝雲堂記崑山東瀕海在吳屬邑獨以産石知名海內地志謂山舊嘗産玉玉出河源萬里外而謂玉産是山其信否不可知也然今産石而不及玉其孚尹秀淑之氣宜有人焉得之邑良士秀民非無有也然而農樂于田里者或失之朴為士而攻于文學者或失之鑿工賈末業不齒焉若夫精于士習而不鑿以求異安于田畝而不朴且鄙惟于顧仲瑛氏見之顧于吳為著姓自吳丞相雍以下代有其人仲瑛家界溪溪望崑山裁十里許其家雲雨蒸煙嵐近在目睫間仲瑛家于是蓋纍世矣內附後倜儻非常之人往往自置青雲之上于是仲瑛之大父泉其諸從父皆紆金紫貴顯赫赫使仲瑛少發其所藴出為時用髙可為名卿次不失齒諸父顧方讀書績學臨帖賦詩堂序几案列三代彞鼎唐宋人書畫觴酒為壽以養其親且築室于溪之上得竒石于盛氏之漪緑園態度起伏視之輪囷而明媚既似夫天之卿雲其連蜷而秀潤又似夫仙家之芝草乃合而名曰芝雲遂以其石樹于正寢前而名之曰芝雲堂夫卿雲芝草世以為瑞矣然雲氣之散聚芝草之榮悴豈能久而不變哉惟士君子積其所學尊其所聞孝行著乎閨閫德業彰乎里閭推是美也譬之珠與玉焉玉之韞石珠之藏淵其光氣自有不可掩者吾知仲瑛蜚聲騰實夫豈久淹于吳下者其為名卿而繼諸父有日矣幸先以豫言鑱諸芝雲石上異時與彞鼎旗常併為不朽矣夫豈卿雲芝草之謂乎至正己丑秋八月望遂昌山樵鄭某記讀書舍記君子所以貴夫讀書者豈徒誇多鬬靡而已哉豈徒博聞洽論而已哉豈徒科名利祿而已哉蓋三才萬物之理興壞治亂之效名物度數之詳動靜消息之故是皆非書莫能載故善讀書者其于理無不窮于效無不覩于詳無不考于故無不知夫若然者抑亦可謂繁且多矣然不反求諸身而會于約則豈善學聖人者哉故君子學欲其博守欲其要讀書者舍是吾恐其如大軍之遊騎出太逺而無所歸然竊論之唐虞夏商之時可謂至隆極盛也已士生其間豈非一一本于書也至周而文大備及其衰也聖人出焉六藝百家莫不折衷于聖人而後定由是之後觀于詩而性情得其正于書而政紀得其冝于禮而敬于樂而和于易則有以驗隂陽于春秋則有以定名分是則聖人之功與天地同髙深迄于今而不墜者由書始傳也書之功若是善讀書者即所以善學聖人也更秦書幾泯盡而無餘漢更武帝表章六經及其衰而學者讀書之效至以清言而髙議扶持人極與漢相始終然人自為書家自為説逮乎隋唐而迄于宋明之為日月幽之為鬼神象犀珠玉之富車旗廟朝之貴河海山嶽之深厚風雲雷電之變化可謂衆且多矣然未有不本乎經根乎理以擅専門名家者也書至此而不勝其繁讀之者纍日窮年而莫之究竟自非善讀以致其博善守以歸其要則將何以哉吳人顧仲瑛氏家于崑山界溪之上凡所居室藏修遊覽莫不皆有題扁之名至于其所藏書而翻閲之所則曰讀書舍其所志以揭于兩楹者則曰學時時習德日日新豫喜其有志于讀書也然則本末兼該內外交養則必本于反身窮理庶有以驗夫三才萬物無一不備乎吾心以吾心之所固有推而逺之家國天下所謂成已之仁成物之智非善讀書者不能也雖豫老矣且將扁舟過仲瑛以叩其所造詣仲瑛必有以語我至正庚寅秋七月記玉山草堂記昔王摩詰置莊輞川有藍田玉山之勝其竹里館皆編茅覆瓦相參以為室于是杜少陵為之賦詩有曰玉山草堂云者景既偏勝詩尤絶倫後六百餘年吳人顧仲瑛氏家界溪溪瀕崑山仲瑛工于為詩而心竊慕二子也亦于其堂廡之西茅茨雜瓦為屋若干楹用少陵詩語扁曰玉山草堂其幽間佳勝繚簷四周盡植梅與竹珍竒之山石瓌異之花卉亦旁羅而列堂之上壺槊以為娛觴詠以為樂蓋無虛日焉客有過其家喜即草堂以休偃者仲瑛乞為之記客乃為之言曰夫物貴乎有初其來尚矣在邃古時所謂摽枝而野鹿久之而始知以韋黻及夫上衣下裳之日亦何取乎方尺之韋以蔽乎膝之上也然不若是不足以謂之法服示不忘其初者其意可見竊以上棟下宇之始也其草若以為室當必在乎陶瓦之先今而覆瓦利百倍于草也其索綯以乘屋者貧者不得已也若仲瑛覆瓦而室者且數百楹櫛比而鱗次若波水然然猶構此堂者豈但追慕少陵摩詰乎蓋亦古人不忘其初之謂也仲瑛嗜詩如飢渴每冥心古初哦詩草堂之下既已成篇什又綵繪以為之圖今復命客為之記焉其于草堂拳拳若此勢且與浣花溪輞川莊同擅名于久逺豈特不忘其初之謂哉客者遂昌山樵鄭元祐其為之記則至正九年秋九月一日云前平江路總管多通公去思碑代貢推官作皇帝即位之二年思繩祖武復改至元上顧念萬方惟東南富庶為天下最若吳之賦入則又為東南最于是以通議大夫信州路總管髙昌多通公來為平江平江土壤雖沃腴而頻年暵潦民氣破傷重以貪殘侵牟費出無藝舊號兼并而以財雄吳下者數年來困于誅求殫于掊剝至蕩析奔潰父子兄弟不相保公至吳之明年夏大旱公宿公署屏酒肉恐懼修省祈哀百神吳當南北衝送迎謁候無虛日公晝盡人事夜乘單舸或單騎蓋暴露奔走以請羣望雨以時澍而積隂以風稻因虛秕公曰吳民困久矣兹嵗又大侵使重掊民椎肌骨瀝髓腦亦無不聽令然豈聖天子選以牧守以字其民之謂哉屬邑以災狀聞公遣僚屬出履畝戒之曰民為國家赤子今誠飢虛為之父母者不聽其啼飢而以虛文應謂之為父母之于子固若是乎今若履畝必以實閲時廉訪使者托岱公按部吳下聞公言是之及使者身出履畝所在災狀無少不讐吳多四方寓公喜持量短長往時郡守至必伏謁其門日聽其所言少咈意輒構飛語煽禍福公至吳則曰願已無少愆何恤乎人言一切繩之以法僑居者往往不堪遂身至京邑言公妄以嵗凶誑朝廷事聞乃遣近臣御史乘傳南下鞫究虛實時公已升江淮等處財賦都總管府達嚕噶齊財賦府治臨安公與吳之僚屬皆逮至檇李近臣御史評詰公則其所言皆妄于是朝廷罪言者而公復還臨安三吳之民手額南望拜公言曰儂等困瘁久矣今實嵗侵儂飢使公厚自顧惜不以實聞則儂等何從生活哉其間欲以害公而併及吾儂者自非公清介之實有以孚于人人則何以能感動近臣御史不貽儂子孫萬世大禍哉然則公之于儂生死而骨肉有不足踰者矣于是合三吳之民願立石道左頌公去後思公不忘之心以式示萬世其民之老自吳走寧國乞豫文其實曰檇李廷對時豫在焉固不待父老言而後知也父老則又出事狀以示豫豫以儒素備員平江推官與公共事久讀事狀無一不讐者然其大致則有四焉持身嚴燭理明決事敏待人直由是吏懾其威民懷其惠而爾民遂有所不能忘公者矣謹按江南征夏絲二萬二千餘斤嵗立三限收足其間並緣為姦民受其害公設法周備甫終六月而夏稅足徵吏弊為戢吳屬邑下有民訴于其邑而邑不為之直者于是訴于公公置籍籍民所訟言與夫民訟之未絶者送之屬邑務得其情而早決遣之訟為之簡稅務月虧課郡遣官監收則務司預抑商賈以足之次月則復虧課耳公至務司憚公威明而虧稅之患為之頓絶郡素富侈百姓與寓公宴客排辦皆出于坊正坊正者郡富民輸充宴散家奴留其什器須坊正出鈔乃得什器還公正身率物私第未嘗宴客人家宴席為之稀少坊正獲少蘇云酒課户供蒸席必上等名酒公一切禁止酒課辦集郡以七倉儲糧嵗設所謂杴虛巖切鏊屬又音謙斗者百三十人皆積年在倉蠧納户者公盡逐去之選富實誠慤者為杴斗倉蠧為之一清民輸糧七倉豪右屬官吏初限皆細民其輸糧也石加五六斗不能足豪右至末限什僅納二三即用細民多輸者足之公設法初限必大户齊足而次及細民七倉屋建于宋歷年滋深嵗科里正修葺率具文無實公曰倉不可不修修之不可若是其局也于是躬督倉屋役百工具興撤去弊陋仍復堅完識者謂七倉可以數年不修蓋省惜民力之一端也官以俸養廉禮也而郡科助筵贐客吏虛占月給公筵宴既寡亦不徼譽過客吏俸始獲入其私各官卒使率多猾惡少年公先逐其聽事卒餘多望風避去郡用物和雇和買官償其直動經嵗年公至物裁入官鈔即償民民大便之郡為三吳腹江湖海相通貫公弭盜有方為政野無狗驚之盜公化所被也以至于瀕海軍船給驛舟騎郡庠之養士粒米郊野之勸課農桑與夫鈔庫泉貨軍士器甲凡經郡守所按治者在他人一事已足書若公之惠民者其大者百世不能忘也故其餘皆略而不書若夫田野墾闢流徙復業姦詭遁迹良民奠枕事皆具憲臣薦章又皆略而不必屢書夫今官于其土者其去也率多樹碑頌德及夫深究其實則多諂諛濫詞豈若豫多所紀録者為目所親擊也近臣所鞫問者豫身所親逮也然則民所稱頌公者非夸詡而益美斷可知己公世系出髙昌望族由儤直殿省初命宣授承直郎中書省舍人一再為監察御史比三僉廣東山南廉訪司事及今之為平江也凡十有三命于朝矣歷官不為不多練事不為不精然公家甚貧至無方田以耕無區宅以居其為平江也譬遊崑崙玄圃而瓊瑤瑛璧無所不有而公一無所取可謂烈丈夫矣冝乎其民思之不忘乎是為銘詩使鑱之石其民之沾涵公之厚德者歌之有以興起也詩曰東吳耽耽啓士之貪攫金晝市罔顧北南投身司寇意仍所甘六十年間民牧代有誰如我公有猷有守持官持身其力糾糾譬之泰山巖巖其石萬國具瞻威儀是式崒聳霄漢肯混荆棘公來東吳金晶玉潔試以太阿不缺則折公恩在吳以日以月日月照臨猶有昳微公恩在吳億年依依公去而思民罔或違公始來時民拜牧守公既活我如親父母中更豺虎角崩我首事昧而章益思我公我公不來我淚盈眶徒戴公恩以死以生我死有子子死有孫子孫億年公恩長存樹石道傍以告來者我思公恩豈其自我善法我公誰云不可前海道都漕運萬户大名邊公遺愛碑國家以天眷錫福為萬祀無窮之丕基故中外之臣膺愼選蒙厚任亦必清愼端重維持調護上知欽承天心下知愛養民命庶乎同心同德均固福祉不則何以扶隆平佐休運今夫海天下之至險也而國家嵗漕東南粟由海達直沽自非天佑休顯淵示川后效職致命則何以必其無虞也哉京畿之大臣民之衆梯山航海雲湧霧合輳聚輦轂之下者開口待哺以仰海運于今六七十年矣國家以其事大任重于是開漕府平江而漕臣之選尤難其人清特自守者隘渾厚不遷者迂任者或傷于刻激能者或缺于廉隅兹四者求盡人事尚未可而况于出布皇靈以當大任以培休福哉元統元年天子南面思得漕臣以分顧憂于是輟吏部侍郎大名邊公出為海道都漕運萬户佩之三珠黃金符乘傳至吳下公曰海岐嶺徼民生雖殊其出力以給公上義也至于樂生畏死則皆天性然也今滄海漕挽所謂船户者國家雖捐金以雇募之謂之水腳錢然聞之萬斛巨艦崔嵬如山勢非不髙且大也遇風濤作時掀舞上下若升重雲墜重淵不啻揚一葉于振風耳當此叫呼神明以救死瞬息自非天朝厚福則雖勇力機智超世絶倫槩皆無所施直拱手帖耳以待葬鯨腹其險若此而赤子嵗春夏兩運冒萬死不顧一生亦可念已豫承明命來為漕民父母忍不思所以裕養之蘇息之也哉先是江浙行省所散水腳錢貯之平江官庫方給于時公遽急迫鈔多不堪用鈔貫或不足漕民病之公移文有司躬至庫盤勒檢視于是鈔無不堪用與不足之患民便之猾徒詐增新造船謂之補置吏相與並緣而舊船户虧元額與夫嵗附運香糯并財賦糧罷用之家不得與而其利嵗為富完漕民所掩有公設法為之防使水腳之利溥被于強弱髙下乃令探籌自取而吏不容其姦漕海轉輸古無専祀有尸冥權于沖漠者于是建靈濟宫祀天妃祭秩視海嶽有加每糧船遇風舟之人望拜哀號必覩神燈降舟之柁樓其靈迹彰應如是故所在祠祭惟謹而在吳為尤著太倉之周涇靈濟宫尤大每春夏運行官躬率漕吏守土吏大祭祠下必愼選穀旦而卜之得吉卜舟乃敢動而豪民至侵占官防虞水溝而屋之纍數政莫之問公撤溝上屋而土始大完祭畢靈濟宫官吏因燕享什器辦集皆出于坊正畢皆散去奴卒旁午攘竊公獨坐不動督視盡取什器乃出推公愛民之心形見于酒酣燕散邈然不干已之際顧能若此冝其于漕民無不盡其情焉若夫舟大糧少而舟中百需無一可缺者公則命併運起發以至于民舊造船則以民姓名號其船歷年滋深遂令子冒父諱孫冒祖諱公一一為正其名凡若此類公為漕民曲盡其情者皆可推見也故公臨漕府三四年間漕政無不修漕民無不悅民心和于下神心感于上于是海無惡風漕運直沽羣艦畢集一無驚虞天人祐助所謂維持調護均固福祉于無窮者豈不信哉公仕宦垂四十年廉介之操清愼之實不惟衆所推公而公亦以此自信之篤也故公之貴而能貧約而能守推此言之非履之有素持之有道其能若是哉公代之明年夏運狂風怒雨船多覆溺漕民思公善政遺愛自非形之善頌勒之金石何以章示永久垂之無窮於是為之頌使鑱諸石頌曰稽昔漢史如何君公方在職時無赫赫功及其既去民思不忘譬彼桔橰兩時奚庸捲水旱田功莫與京公來漕府既章國程填以惠安疏以顯明漕民戴公以保其生千艘林林萬檣蓬蓬轉海北上南來其風天吳潛鱗飢鯨帖首篙師下碇仰瞻北斗以達直沽神京用飽萬井炊煙雲散林藪户曹計功嵗書上考是皆我公善總其紐民心悅豫國計斯阜神人依公歡喜噎嘔方公在政民不知有及公既代民病疾首今公既往參東國釣漕運思公靡間神人公不復來川示肆嗔墊溺啼號哀哀水濱求如我公敬神勤民如在嚴冬妄希陽春公佐天子畨畨老臣喉舌翕張民氣用伸豈獨漕民願解戚顰萬方惠和休祥日臻長洲縣達嚕噶齊雲通君遺愛碑髙昌直西北為城郭諸國首稱其人材出當休明服勤王家大而輔相廊廟小而長二府縣班班輩出如星麗天可謂蕃盛也已廊廟公輔勳書太史此不必言其散而試諸長二府縣有大小職任有輕重事勢既殊才任亦異槩可推見也已獨長洲舊為平江望縣其以里計未必數倍子男封邑也其以財計未必男盡田女盡蠶也其秋輸糧夏輸絲也糧以石計至三十萬餘絲以兩計至八萬四千有竒餘蓋皆略之也使錢鎛盡翻其町疃桑柘盡植其垣塍然後輸公上者乃可以無缺也奈之何間田惰農與水旱更相病然則其民力如之何而不瘁哉故自昔號為并兼及今至無塊壤以卓錐無片瓦以覆首者矣其困罷之極若此而國家兩稅銖籥不可減然則為是縣之長民者上何以逭責下何以逃怨哉故每嵗將終大府往往械繫縣長二俾之督稅不少貸民窮無可償官至質朝所授書糴粟補完弗憚也噫官吏窘若此縣之人當何如哉乃至元仍紀元之元年髙昌雲通君來為縣之達嚕噶齊歎曰補甚弊支甚廢非殫竭其才智何由集事哉于是日至野次召農父老相髙下驗腴瘠謹浚塞厚培糞躬勸其力之稍有餘者出飲食以饁之䇿勤惰而列之嚴其程役時其賞罰其隄防不敗于水工作不潰于成矣則又課田之瀕江而枕湖者不能必其無風濤之虞也更科以蕩課而民力或少蘇初至治三年行津助賦役法所謂津助者田畝什抽一以助役二十年間田貿易主屢遷而役悉仍舊殊為民病君考之縣乘驗其消長而均征之君資精明善記憶吏毋敢欺于是民謹趨事甫及期而糧已告足先是縣治所在在郡東北隅縣治既附大府官即治所舊基而為縣學其實民至縱畜牧佃荒圃其間君曰今縣學有學官有弟子員而學宫不可以缺者特空名將何以謂之學于是建言大府勸募徽州路儒學教授郡人陸德原創建禮殿講堂四齋兩廡計為屋若干楹學成慮無以養邑士也復募民捐田以膳學君蒞事勤聽察明鄉者君嘗同知常熟州民已稱其果斷故于吳俗習悉知之大抵吳俗剽輕而嗜利里胥田主其征糧佃客也寬則緩猛則斷甚至傷肢體殘孳息聽訟者不察往往為其所矯誣君既得其情故于征科之際民不慢令糧以時集夫政為于平安易行之時雖中才無難者惟是甚弊而莫窺其迹甚憊而莫知其隙隱之于將潰匿之于垂敗理之者急則傷于刻緩則流于迂若君之理長洲譬之用藥然膏肓針砭既已疏其會腧通其鬱滯又若衛生之經攝養之術固君素具而深練者使其久于斯邑生肓其人而治之涵煦其人而撫之則其顚連而瘁瘠者且將優遊于樂生之域矣無何君以三年告代縣之人念君遺愛不忘者匪樹石于學則後之來遊而來歌者何以知君惠其邑之深及其人之厚也乃相與礱石而請文于豫辭不獲庸序如左乃系之詩曰泰伯君吳端委初其民伾伾樂方蘇至德渾成與化符魚中匕首鬬爭塗沃壤而擅稻蟹區後至射利紛相圖長洲為邑割之吳考之縣賦天下無疃耕寸織殫其軀剝瀝肌髓骨先枯北廷元君至則吁譬醫製劑藥其痡彼豎方執膏肓樞君施芒針伐其隅起偃使直躄使趨謂醫非良爾則誣歘三星霜嵗月徂正猶少愈病復加君不我留我孰扶顚連羇窮孰非夫倚君調護保厥軀君方翺翔上天衢聖主顧憂民力瘏乞君早登朱轓車激水活我涸轍魚懷恩不忘此其粗伺君侯吳筆屢書用章官程警其餘重建天妃宫碑天地既左海故百川混流歸東南而海之功用遂與天地配然自陶唐氏以迄于今王者出而御極蓋非一人未有宏大之量包海宇混南北視鯨波萬里猶一堠龍伯九淵猶一舍凌駕溟渤責成嵗功久之無虞如我朝世祖皇帝者也爰自定都于燕嵗漕東南稻米將由河渠以達畿甸則道里逺而勞費大積力久而用功多于是納海臣之請斷自宸衷始創海運方其波平風順一日千里不踰旬日即詣京畿斯實國家厚福其蟠地際天取道于海若執左券交相付然風濤有所不測雖河流之細猶不免况于海乎設使颶風鼓濤鯨呿鰲抃天跳地掉萬斛之舟輕于一擲當此之時雖有絶倫智力亦必拱手待斃哀號籲天叫呼神明救死瞬息粵有天妃肇迹前宋著靈于我邦家亟揚神光出于腥霧其光煜煜謂之天燈飛泊髙桅不令墊覆舟人稽顙咸稱再生舟遂順濟其靈顯白章章如此于是列聖相承纍加封號爰即江海之要建祠妥靈若夫路漕靈濟宫則尤典禮尊崇者也蓋海舟嵗當春夏運畢集劉家港而路漕實當港之衝故天妃宫之在路漕者顯敞華麗實甲他祠國家首重漕餉既開漕府于吳嵗每分江浙省宰臣一人督餫當轉漕之際宰臣必躬率漕臣守臣咸集祠下卜吉于妃既得吉卜然後敢于港次發舟仍即妃之宫刑馬椎牛致大享禮餼腯牲肥醇酎甕㪺庶羞畢陳絲絃與金石間奏咽軋簫管繁吹入雲舞既歌闋冷風蕭然填境虎臣卒徒擢舟揚舲撾鼓摐金響振川陸文嚴武齊羣拜聽命而後舉由是建宫迄今五十一年矣神人顧歆嵗仍舊章罔敢或怠乃至元仍紀元之五年水嚙方坊日就虧圯翼宫周廬間亦頽壓爰歷五祀審以宫迫海漘波濤浸淫工莫就緒今至正二年江浙行省參知政事燕山圖嚕公實董餫事漕府以有事于妃宫告公即齋沐登舟弭節祠下顧瞻宫宇之弛惕憂形色立漕臣于前戒飭之曰朝廷嚴事天妃潔蠲明誠牲帛器數樂度舞綴悉有攸司載在祀典至于列聖嵗遣近臣錫金函香事事孔誠猶恐弗至今路漕岸坊崩虧若此夫臣子之于君父每先意承顔尚懼或失顧今豈得自安哉漕臣對以非遷宫不可而遷宫之費甚繁計無從出爰積漕餘得中統鈔二萬五千貫計資量工什裁二三無何劉文明者跽于庭拱而言曰某常熟所海船户也蒙神庇庥漕海積年衣食粗給今參政公勵精于漕府羣臣盡瘁于下事神恤民可謂至矣欲徙神宫願以己資合今漕府鈔悉委某料理洎完畢焉庶幾川后安靈官政盡美于是公與羣僚咸加奬豫退而文明相地于神宫之稍西乃徙宫其上土埴燥剛户向髙平經構于是年正月裁二視朔用告落成殿寢言言門廡崇崇梁栱森齊丹雘朗潤凡兹視舊加壯是嵗春運達直沽無一少損文明念舊址已圯嵗久自非分省明公督責嚴切省幕都事王公慶掾之常時等參贊明敏漕府羣公克承公志則是舉也幾何而得就緒文明既礱石紀天妃之聖靈以及官臣之庶績庶幾神人相與取信無窮若天妃之氏族靈異往往散在傳記故兹不書事既鑱于石復為迎享送神曲以繫之其詞曰瀰為洲南海陬精靈淑生川后兮川后生赫明靈帝爰命尸滄溟兮滄溟大森祕怪既咸若不害兮川后來紛雲旗從羣龍耀金支兮川后升海若馴廟食懿千春兮海安流漕政修實畿甸更千秋兮后靈妥恆福我新宫成璨靈瑣兮后馭旋雲滿川依皇元千萬年兮愼獨陳君墓志銘吳有隱君子曰陳君叔方自其上世皆以讀書積學服膺儒術然以隱約終其身至叔方父三世于兹矣始豫東入吳識其尊人寧極先生沈潛問學淹貫羣經年已耄會諸生輩著書立言咸造底藴豫與先生有維私之契而先生長豫草餘年先生降屈齒德時相過從髙談亹亹不絶豫于君一年之長而君能以文行學術結知士林時方承平巨室大家欲淑其子弟者必厚幣延致有非乘壺牽犬所能致禮也君尤篤孝每館授歸其滌浣不但中裙厠牏若夫溫凊室廬則其上世蔽風日者至于􅎵瀡飲食之奉必躬庖烹價固貴有所不計也以故先生老壽體康寧無少不如意者君能力學其為文以經為準貫穿史百氏裒其菁華以立言其為詩尤刻苦精練本之以杜而參以唐諸名家在宋則尤喜陳黃至于畫思之盤礴委輸山林泉石幽篁怪木各盡其變態然貴遊有挾而求之者雖百金不與一筆兼之襟度灑落其割三牲以奉客亦肴膳兼豐潔與人交重然諾至正壬寅辜月五日卒享年七十娶費早世繼夏生二子長訥先歿次謹女二長慧適俞沂次清適曹敬謹以卒後十五日葬吳縣靈巖鄉朱墩之原曾祖考德一配張祖暹配柳寧極先生諱深字微靜配周君諱植自號愼獨叟朋友私諡曰愼獨處士謹乞銘于豫為序而銘曰士而處矣久當舉矣君胡為乎更三世而益傴也身雖屯而道則純豈得天者豐而嗇于人耶既以有行有言無緇磷矣其示不朽有堅珉矣尚何痛慟有弗信者矣王處士墓志銘中吳山水深秀自昔多古仙神人其最顯著則王方平降蔡經家又如王可交久嗜酒斫鱠遇星官七真雖玉壺縹眇不得飲而得啖大棗其骨遂仙事載郡乘豈虛言哉近日王處士蓋亦仙者類其先本會稽人大父以上皆宋衣冠世胄後徙居吳長洲之永昌溪耕遊釣鑿縱浪大化浩然自以為葛天氏之民而獨好飲酒盡擺脫世故以自適于酒而扁其室曰醉鄉當其時悲窮歡達興壞理亂曽弗絲毫係心世降習偷非達人曠士可以外形骸齊物我也于是其家不能無脧削然猶嗜酒不問有無其孫翥能自力于學博洽淹貫鄉人士推重之而翥也能悉意以奉處士于是得陶然醉鄉云處士取朱氏先卒卒後鰥居屏處四十餘年能待其孫之成立以屬其家處士雖飲酒而神觀明朗人不敢欺諱元字元之二子長亨娶周良娶郁二女長清次明清適陸明適陳翥亨之子也卒年七十九顔貌如孩嬰人皆以酒仙稱之而處士亦自笑曰神仙道人亦人而已耳生于戊申卒于丙申七月草日翥卜十月五日葬函骨于滸墅鳯山之先塋翥言處士當屬纊時猶索酒曰吾醉鄉雖蓬萊瀛洲不是過也惜宗人可交福不逮不得分飲玉壺春耳然以遇仙馳名豈若我之樂無涯也哉翥托斯來乞銘是為銘銘曰醉而死其不死者吾不知誰之子斯言也吾聞之𥅆史何以知其然蓋所謂一念萬年不為形毁不為形全是之謂醉鄉之古仙平江路總管致仕張公壙志代其子都中作張氏世占吳郡籍而為長洲之相城人至先公始以謹飭小心入仕于朝儤直殿廬久之成皇以先公忠勤愛之賜名巴延大德五年宣授將作院判官十年冬出為泉州路總管府治中至大初升授同知邵武路府事明年改兩浙都運鹽使司同知丁內艱服闋延祐元年除慶元路同知七年升授奉政大夫池州路同知泰定三年進階朝散大夫福寧州尹至順二年超遷太中大夫漳州路總管至元二年丙子先公年六十有五是夏代歸先公素有止足意即告老于朝于是以正議大夫平江路總管致仕歸卧吳下舂容丘園而以三年夏六月十四日卒于相城之私第不肖孤忍死用是冬蠟月七日函骨葬同邑益地鄉謝澤原清河侯之兆嗚呼先公自元貞初入見闕廷繼拜恩寵一為中朝官四二郡政一佐鹽運司晚年一再典牧藩翰而引退之志亟矣漳州代乞懸車未匝嵗而天奪之痛哉先公諱世昌字正卿先大父諱顯江淮等處財賦副總管纍贈亞中大夫廣德路總管輕車都尉追封清河郡伯祖母酆氏封清河郡君配沈氏子男二人長不肖孤都中次好禮早夭女一人許圖嚕拉嗚呼先公歷政清操善治著之民心傳之士論後來太常議之國史傳之非玄堂所得識也于是不肖孤抆淚托世緒官封卒葬嵗月納諸幽云蜀虞處士墓碣銘宋亡今八十年能以文儒丕顯于國家無如虞雍公子孫其顯者海內章章知其為侍講諱集者矣然族之宗有居吳者至正十五年秋七月庚子公六世孫處士君卒其子堪衰斬哀毁以某先公太史與有世契乃促其從父太常奉禮愷來乞銘哭曰先人生不諧俗竟以隱約終其身顧先人之孝行俱泯泯無聞大父諱栩博極羣書內傳後北南從遊者衆已而病病且一紀先人勤苦以養恆手浣中裙厠牏大母夏氏病目至以舌舐之先人既老而堪問學蕪淺亦館授以為養溫凊之室廬滫瀡之飲食曽不足以少慰其心今沒己未能盡大事嗚呼痛哉夫欲致養而莫遂雖菽水盡歡斯謂養斂手足形無槨斯謂葬今堪是已處士諱炫字明之蜀隆州長壽縣人雍公既相孝廟故其家有在吳者于是處士生于吳其諱兟纍官至朝請大夫户部郎中知鄂州者處士之曽大父也處士生至元十八年辛巳年七十五娶宣氏生二子長堪次坊女一堪既貧重以兵興世艱棘舉無助者能以是年八月庚申奉葬吳縣下駕村蒸山之先塋去其高祖雍郡侯墓在玉遮山張市村者可一望而近冝為之銘曰宋相世系有克保其墓地者百無一二而堪能守其先塋奉其先人以葬以志斯可謂忠孝之懿而詩書之澤百世不墜者已廬山陳天倪墓志銘天倪諱徵字明善姓陳氏藴懷瓌竒不屑屑求世用嘗讀莊周氏書至曰和之以天倪用之以曼衍故以天倪為自號其先本蜀人逺祖篆嘗登宋宣和進士第歷官至左朝散大夫以蜀險逺遂徙家廬山之下其曽大父霦大父洽皆宋鄉貢進士父同隱居不仕娶黃氏生處士始豫在杭計籌山中得從黃松瀑先生遊先生長不踰四尺自六藝百家之書無不讀而尤清介孤峭然以侏儒竟自為道士當時名流如吳興趙文敏公巴西鄧文肅公皆斂袵畏敬其甥陳誠善亦勵志苦學已而先生疾卒誠善亦早夭而豫入吳顧乃于無錫梁溪上始識天倪聚語已洽乃知為黃氏甥而誠善則其兄也始知其幼嘗從草廬吳先生學學于先生之門者蓋夥然獨稱天倪既卒業乃北上燕趙古所謂悲歌慷慨之士今所謂公卿大夫之賢天倪皆得與之握手傾肺腑論天下事甚可措之于用既久之南歸若北庭貫君酸齋山東李君溉之無不稱其才雋如青城虞公伯生豫章揭公曼碩亦盛稱而形之詩文者皆可考見夫士不得志于時浪遊海宇以才氣與人相軒輕觀其所與交可以知其人矣矧重之以黃先生之甥耶已而入吳知舊有延之聚資者于是遂僑于吳娶故宋相古心江公孫女生二男子曰汝秩曰汝言女三人天倪卒于至正八年戊子嵗秋七月草有六日得年五十二而二子能力貧而學養其母能盡歡以至正十六年四月四日葬于吳縣雅冝山大墩之原夫以天倪懷才負氣盍措諸用乃不遇而沒非命也夫非命也夫二子以豫嘗從其外氏遊來拜哭乞銘于是為之銘銘曰嗚呼天倪竟止于是而歸耶保身全歸人孰以汝為非耶沒而有子九原其泯汝輝耶遂昌先生鄭君墓志銘蘇昌齡處州鄭氏遂昌巨族也君世以儒顯曽祖克故宋西川經略使祖開先朝奉郎知道州永明縣考石門髙士諱希逺髙尚不仕國初徙家錢塘結屋湖上以耕釣自樂妣蔣氏二子君其仲也君諱元祐字明德天資穎悟過人垂髫入鄉校日能盡記同坐諸生所授書鄉先生大異之年十五輒弄筆墨作詩賦往往出竒語驚人石門君篤意教君樹樓聚書恣其批閲君不出户庭者十年于書無所不讀作為文章滂沛豪宕有古作者風時咸淳諸遺老猶在君遍遊其門質疑稽隱其見聞充然有得侃侃以竒氣自負諸老皆折節下之江浙中行中書省郎中汴人趙天錫剛正謹嚴愼于交際獨延君于家與其子期頥講學期頥後中甲科授中書參知政事子期公也君既得友益自刻厲于學晝夜不倦由是克底厥成是以名世時薌林平章廉公以朝廷宿望退居錢塘與君為忘年友由是遍交當世之士聲名籍甚四方慕君者識與不識皆稱為明德先生君既以儒業起家仰承石門君夙志而奉養之禮無所不至石門君卒君偕其兄介甫先生移居姑蘇兄沒喪之如父從君學者户外之屨常滿浙省御史府宣閫憲臺交章以潛德薦君于朝君自以臂疾不願仕在庭諸公知君之志亦弗甚相屈也優遊吳中者三四十年富貴聲利一不動其心素不善著書嘗謂學者曰經則經也史則緯也義理淵藪在焉學者能盡得古人之意鮮矣况敢私有所論述乎識者稱其有見于道性平易真率不為矯激之行與人交亦然汲引後進常如不及頭童齒豁壯氣不衰應酬餘暇手不釋卷吳人欽仰風裁罔弗敬禮之者雖小夫賤𨽻亦能知君姓名人有患難拯拔之如救水火士友或貧不能自存度無以相給則遍告諸有力者賙其困厄君兒時乳嫗提攜右臂脫骱以左手寫楷規矩備盡世稱一絶又自名為尚左生至正十七年大府授將仕郎平江路儒學教授君欣然不辭曰講學吾素志也居一嵗即移疾去後七年升江浙儒學提舉君亦不辭曰文臺也儒者之職也居九月感微疾而卒朝官士友逺近聞者莫不奔赴君生至正元二十九年壬辰閏六月六日午時卒于至正二十四年甲辰十一月二十九日未時壽七十有三娶錢俶王十二世孫女三男一女長曰吉次曰起曰貞吉娶陳氏先十年卒貞未娶先君十二年卒起娶陳氏女寧贅蘇州湯惟新女孫二尚幼以明年乙巳正月二十六日葬于平江路吳縣太平鄉橫山之原君所為文原闕僕泣而撫之曰君天地之全人也生長承平晚涉世變骨肉相保無虞又且安享十年之福而後逝蓋君明哲保身行業無愧于造物而造化之報君者亦厚矣君之學淹貫而博洽君之行純誠而篤實君之見髙明而正大君之文雄深而雅健君之詩清峻而蒼古君之書嚴徑而端麗其見之緒餘如清談韻依稀晉人如君者蓋一代不數人也君已矣世不復有斯人矣君末疾前五日與僕會飲檢閲曹新民家歷歷自敘其平生出處語僕僕竊疑其強聒不已無幾而卒乃知君有託于僕也將屬纊又呼僕面焉固冝為之銘銘曰世之人全于人者未必全于天全于天斯可謂之歸全君雄文奧學碩德髙年著名當世追蹤昔賢生榮死哀有德有言謂之歸全孰曰不然勒銘貞石後有稽焉知其為遂昌先生有道鄭君之原僑吳集序謝徽遂昌鄭明德先生天資明敏髙出倫輩其生于杭于書無不讀作為文章抑揚頓挫反覆開闢一主乎理而氣以攄之若長江大河流衍旁沛汩汨數千百里而終歸之溟渤綽有古作者風既北來僑于吳比老乃彚其作之文曰僑吳集授徽曰吾在杭亦嘗有作兹僑吳久而作之為多故名焉子實見而知之者宜為序之徽不敢辭庸復于先生曰先生固僑于吳矣夫吳東南之一都會也山有虎阜靈巖之勝水有三江五湖之饒而遺臺故苑舊家甲第仙佛之宫參錯乎城郭之內民俗富而淳財賦強而盛故達官貴人豪雋之士與夫羇旅逸客無不喜遊而僑焉其僑何如不過即其山川風物之美觴咏娛嬉以各適其所樂而已焉有如先生之僑寓哉先生以吳乃讓王之封國而子遊北學于孔子與聞堯舜禹湯丈武周公之道得聖人一體為文學稱首其流風餘韻未泯也斯其所以僑焉者正欲以聖賢之道資進修之益耳豈徒藉乎山川風物以為觴咏娛嬉之適而止耶則先生之僑異乎人之僑也已惟其異乎人之僑所以發而為文亦有異乎人也雖然文豈易言哉堯舜禹湯文武周公之文禮樂政治皆是也蓋其道之充乎中而其發于外者無非文如天之有氣則有日月星辰之光輝如地之有形則有山川草木之行列文實道之顯不可岐而二之也夫何子遊之為學既絶諸子各以所見著書是不獨文與道二而道之裂也已無有純全者惟董仲舒氏曰正其誼不謀其利明其道不計其功揆其行事不戾斯言可不謂其文與道一者乎而韓愈氏曰所志于古不惟其詞之好好其道焉耳是亦知夫道之與文不可二矣然以實而考之則其文固未能一出于道至歐陽修氏蘇轍氏曽鞏氏文非不能為也豈能與道弗二乎文而一出于道惟周程張朱數君子焉觀其易通易傳正蒙本義等書簡妙精切不惟輔翼聖經而幾可與之並由其得孔孟不傳之學故能若是豈嘗拘拘學為之文哉徽竊聞先生嘗以文師承于金華石塘胡公四明剡源戴公此二公學羣聖賢之道者也其所以授于先生洎先生所自得有蘇曽諸氏之文而不失程朱數賢之道道未必不寓乎文文未嘗不載夫道文與道既一而子遊之所以為學者亦在其中矣奚必果僑于吳而後有所得也哉第假是以名編爾徽也生也後誠吳人也父祖以上居吳纍世矣然于道詎有所聞而文亦莫之能措于先生豈弗甚可愧姑從命強顔為之言是集也為古今詩銘針贊題書疏序記碑志總若干篇釐為十有二卷嗚呼有道之文當傳之天下豈獨吳哉至正二十年嵗庚子仲秋望吳後學謝徽序翰林院修撰施君宗銘改葬銘錢溥正統己未春蘇之吳縣施槃宗銘擢進士第一人入翰林為修撰年才二十三明年夏以疾卒無子以是冬歸葬其邑洞庭山之陽水齧山趾滋及其墓于是去墓三里許擇髙爽地于山右而遷葬焉初宗銘之舉進士也豫同年而又同東吳人情好頗密明年五月十日豫受薦入翰林宗銘見之歡甚豫謂年何長而職且卑哉宗銘善推命握豫手曰以君之命吾自此知不及矣明日宗銘朝遇風雨感寒疾遂不起豫往問之宗銘瞪示豫曰君將以文鳴天下吾不免能不為吾銘乎豫深以理喻之不釋二十六日果卒國朝擢首選而年少者惟宗銘而况其儀度楚楚然性資坦坦然文學擬古作者日蒸蒸然其不已也朝自元老大臣以及館閣諸同寅遇之率愛之重之而推讓之而以逺大期之然宗銘亦善親炙諸元老而禮下諸同寅故譽之無間言殆天授也一旦奄然以歿自元老大臣以及館閣諸同寅相視駭然奔走臨哭于其家者越數日靡寧噫天又何奪之亟耶宗銘既厭于世而世之擬諸大用者猶曰宗銘在何可少也論文學可以傳世猶曰宗銘在豈吾輩所及也何宗銘一䇿首選而天亟奪之而不究其成而吾輩落落然才不重于時位不加于衆而天反久之何耶嗚呼豈誠有命也夫豈誠有命也夫宗銘之墓危矣嵗辛巳適都憲萬安劉公考巡撫東吳豫為言之公至吳訪之果然乃命郡守四明姚侯堂遷之堂亦同年友也為相地度材環以磚垣表以石門載封載樹完固一新明年豫使交南還其父遵道弟宗賢逆豫舟謝之且索銘夫宗銘初葬得廬陵楊文貞公哀詞南郡楊文定公墓銘豫雖未副其所屬然得二公之作亦竊為之喜矣詎虞二十年後而改葬之銘其重違宗銘意乎宗銘既沒其配吳方娠哭甚哀豫使人慰之既而遵道來迎喪豫復戒其待産而殯及歸竟殯于未産吳果哭踊而傷墮一子不育後吳亦自盡今合葬焉以宗賢之子某為之子宗銘其先皆以隱終至遵道始挈之淮依巨姓家就學大有所得歸吳巡撫侍郎廬陵周公竒其才置之吳學一掉鞅魁天下士于是吳之學衢淮之旅次與所居之洞庭皆建狀元坊以歆艷之至今猶重士心而厲鄉俗云銘曰孰鍾其才孰畀其魁孰閼其年而不永其傳蓋已定于天而莫知其為然舍危即安于彼南山既封且完以罔後艱明故曉菴法師塔銘師諱善啓字東白號曉菴俗姓楊氏蘇之長洲人五世祖慶宋發遣常州主管學事贈左朝奉郎家吳之支硎山值兵徙北郭父永年性好善稱楊佛子母陸氏師甫能言通佛典父母異之命入無量壽院禮茂茂院主為浮圖既長屏迹龍山窮日夜力于經史百氏不輟聲譽隱然日起少師姚公廣孝善世洽公南洲皆器重之而典記于洽公者最久永樂元年薦主蘇之永定寺六年主松江延慶寺踰年擢本府僧綱司副都綱尋應召纂修永樂大典預教大藏經賜金織袈裟衣一襲時三殿災詔求直言師上疏陳利病不報內交沈少卿民望王侍講希範王贊善汝玉陳檢討嗣初益深造詣而與璧菴完公輩還有江行倡和詩一卷與甫里趙公宗文酬倡尤多嵗遇牡丹開時必盛集題賞錢塘瞿公宗吉雄于詞賦嘗用一韻往復幾百首而詞鋒益鋭海內皆傳焉正統八年十一月八日卒距洪武三年十一月十五日世壽七十五僧臘六十以其示寂之嵗十二月二十三日弟子慶暲等與其姪是畀奉柩歸葬于舊隱之龍山遵治命也既葬且二十年而溥于塔銘尚未知作者志蓋有待乎叨居侍從之列利澤不加于民空言無補于世則亦負師期望久矣兹使交還獲訪墓于龍山下見其塔銘尚虛以待之則溥亦何待而不言哉夫以交之深者知必至也言之夥者情必厚也昔宣德間大理卿胡公槩巡撫東吳威聲大振而于師獨加敬禮時溥方冠欲應鄉舉謁公師忽見而喜之遂入白于公得預鄉舉然溥亦始聆議論察其動止毅然一儒者由是往還日就欵洽數日不見必折簡招之簡類歐語作字有帖意見必肅衣焚香啜茗坐語移時去則且談且送雖草草禮亦不廢或閉户發篋出古人真迹對閲評品如論宋仲溫陳文東二先生書宋筆正鋒陳或偏鋒故宋優于陳吳中稱髙楊張徐為近代四傑然季迪衆作皆得體如律倣劉長卿選兼韋應物皆所不到冝其為最文則喜柳宗元遇有作必朗誦數篇得其意趣然後下筆而詩則宗季迪也然皆不務蹈襲以為竒至論儒釋之辨曰且各為其教又曰東魯垂道西竺見性皆莫先于厚本故雖離父母而養生送死卒從厚與其兄弟極友厚撫諸姪教養兼至而交四方宿德名緇必以誠末嘗見懈體惰容然非其人亦未嘗一與之交此韓子謂墨名而儒行王文正謂此失之而彼得焉冝為法門之僅有吾人之願交也而况溥也荷師期待既久不亦知之至而情之厚哉倘以餘齒無負于斯世則亦無負于所知矣姑書此以與其徒慶暲等刻石于墓而且系以銘曰唐有暢師曰喜文詞宋有惠勤亦號能詩暢由韓子儒所以彰勤藉蘇公得附歐陽顧令東白有學有德旁邃詩文兼此二釋豈無韓蘇俾世有聞我何人也敢預斯文龍山之陽齊闉之北寂焉淵焉于以埋玉奔走幾年始遂豫謁有言莫酬庶永其揭雅素處士楊君墓志銘君楊姓諱旻字思仁一字師道號雅素蘇之長洲人永樂間君叔父東白啓公為浮圖有文行任松郡副都綱君日侍其側嘗從郡人劉先生鴻授琴豫亦學琴于先生聞君夜恆四鼓坐禪榻對孤燈猶指語鏗鏗不輟故君琴遂精豫舍之遊郡黌時造東白所敘話退則拉君鼓一二引語及相人術輒自謂論人禍福貴賤灼然有不誣者豫訝而叩之曰嘗侍叔應詔校經時親得尚寶袁忠徹指授人亦信其傳之有自往往質之有驗豫既竊第入翰林東白亦物故而聞君還吳中抱藝隱居終日恬處若委薾人灑然一鼓足起人聽兹可以想見三五之盛造而學者户外屨恆滿花朝雪夕扁舟五湖三泖間門生故舊望而留之其淡而可親也願而可信也不激不阿以約自守而不失也嵗壬午豫使交還期君一見明年至蘇則君屬纊兩越月矣喪未能舉豫助舉之長洲庠生吳寬少學琴于君君既歿對琴弗忍御及御之不能成聲士林義之且為狀俾其子凌要豫銘嗚呼代之挾藝術以自矜與夫終日喃喃無一藝可名世以淑人者視君為人不大徑庭哉矧重寬之義而凌之哀也君六世祖慶宋發遣常州主管學事贈左朝奉郎家吳之支硎山值兵始徙城中曽祖景熙祖永年考希哲皆弗仕母陳氏子五人君其四也娶劉氏蘇衛指揮某之孫子即凌孫男定年六十有三而卒是嵗十二月庚寅以明年四月乙酉葬吳縣太平鄉堯峯先塋之側銘曰有樂于已無悶于世率由內得不以外至委順而化是曰歸全銘以舉之為我殯焉吳都文粹續集補遺卷下
