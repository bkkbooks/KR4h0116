body:
  text: 吳都文粹續集卷四十三明錢榖撰墳墓明中憲大夫太僕寺少卿致仕都公墓志銘胡纘宗吳有大雅君子博物洽聞砥節礪行淵澄玉潔蔚為醇儒蓋都公其人也公諱穆字𤣥敬仕為禮部主客司郎中年五十有四即上書乞骸骨歸許之加太僕寺少卿致仕維時京師士大夫見公之歸無留資於囊無田廬圃墅於鄉蕭然戒行視棄官爵如吐唾無毫髮顧藉心爭挽之不得莫不交歎以為公真賢逺於人歸而致苦食淡寢臥圖籍與相婆娑嬉逰屏車斥騶掃迹公門以著書為業或放逐山水冥搜遐寄如是者十餘年嘉靖壬午以撫臣薦進階中憲大夫又三年年六十有七卒實嘉靖乙酉九月二十二日其子元翁等卜以卒之年十二月六日葬公花園山纘宗屬守吳得與其凡役事而又屬之以銘重以工部主事伍君疇中之狀乃不獲辭而為之志曰都氏之先為丹陽人有逺祖稱丹陽先生者仕宋為尚書吏部郎中由丹陽徙蘇居吳縣南濠里曾大父文言大父彥和父卭封工部都水司主事母朱氏贈安人公七嵗能詩及長不習章句泛濫羣籍杜門篤學者幾二十年屢空晏如絶意進取名聲大噪吳下巡撫都御史何公某提學御史林公某重其名强之應舉公乃出以是秋乙卯領應天鄉薦己未第進士甲子拜工部分理器皿厰厰事故旁午多靡費公則鳩匠會計大小贏縮惟其舊有不便輒弛去匹馬入廨自齎米蔬厰人掘地得金貯之庫吏有私請者公斥之曰若曹何敢汚我已而巡視京城浚渠繕壘事咸集丙寅改南京兵部武庫司廉幹如工部日辛未復官工部升虞衡司署員外郎壬申乃進禮部職主客諸夷入貢使者充館公柔逺有道國體以尊慶陽王妃應册封公副崇信伯費公某往使之贐以腆幣拒弗受便道躡終南巔尋過首陽登華嵩兩山抵少林濯溫泉轉入王屋以及三山砥柱龍門伊闕囊括其勝泄之歌詩徜徉而返公性友愛養孀妹撫孤甥恤幼弟皇皇如不及文祖韓歐詩宗陶孟尤長於纂述故郡人稱為南濠先生其行於世者曰南濠文跋南濠詩話玉壺氷聽雨紀談藏于家者曰南濠詩略文略賔話史外類鈔周易考異金薤琳琅云距其生為某年某月某日配徐氏封安人先卒子男二元翁次翁俱府學生女二嫁太倉州學生陸之箕太學生陸采孫一曰祖齡維公束髮好修舊師古人完德邃學星列海內受知兩朝贈貤有赫風流儀矩興懷後賢雖老於食貧不可謂不遇也是宜銘銘曰羣鳥爭擊鵷雛乃鶱炳其五色羽儀翩翻覽德而下終息丘樊矯矯太僕光耀璵璠蟬蛻汚濁霞舉雲掀獵精吐靈綜古立言飲水飯疏清風灑然代有作者興愾文園都穆少卿墓在花園山唐子畏墓志并銘祝允明子畏死余為歌詩往哭之慟將葬其弟子重請為銘子畏余肺腑友微子重且銘之子畏性絶穎利度越千士世所謂穎者數嵗能為科舉文字童髫中科第一日四海驚稱之子畏不然幼讀書不識門外街陌其中屹屹有一日千里氣不妄友一人余訪之再亦不答一旦以二章投余傑特之志錚然余亦報以詩勸其少加𢎞舒言萬物轉髙轉細未聞華峰可建都聚惟天極峻且無外故為萬物宗子畏始肯可久乃大契然一意望古豪傑殊不屑事場屋其父德廣賈業而士行將用子畏起家致舉業師教子畏子畏不違父㫖德廣嘗語人此兒必成名殆難成家乎父歿子畏猶落落一日余謂曰子欲成先志當且事時業若必從己願便可褫襴幞燒科䇿今徒籍名泮廬目不接其册子則取舍奈何子畏曰諾明年當大比吾試捐一年力為之若弗集一擲之耳即墐戶絶交往亦不覓時輩講習取前所治毛氏詩與所謂四書者翻討擬議祇求合時義戊午試應天府録為第一人已未往會試時傍有郡富家子亦巳舉于鄉師慕子畏載與俱北既入試二場後有仇富子者抨于朝言與主司有私并連子畏詔馳敕禮闈令主司不得閲此卷亟捕富子及子畏付詔獄逮主司出同訊于廷富子既承子畏不復辨與同罰黜掾于浙藩歸而不往或勸少貶異時亦不失一命子畏大笑竟不行放浪形跡翩翩逺遊扁舟獨邁祝融匡廬天台武夷觀海於東南浮洞庭彭蠡暫歸將復踏四方得疾久少愈稍治舊緒其學務窮研造化𤣥藴象數等究律歷求揚馬𤣥虛邵氏聲音之理而贊訂之旁及風鳥壬遁太乙出入天人之間將為一家學未及成章而沒其於應世文字歌詩不甚措意謂後世不取在是見我一斑而巳矣竒趣時發或寄於畫下筆輒追唐宋名匠既復為人請乞煩雜不休遂亦不及精諦且已四方慕之無貴賤貧富日詣門求索文辭詩畫子畏隨應之而不必盡所至大率興寄遐邈不以一時毁譽重輕為趨舍子畏臨事果事多全大節即少不合不問故知者誠愛寶之若異玉珍具王文恪公最慎豫可知之最深重不知者亦莫不歆其才望而媢疾者先後有之子畏糞土財貨或飲其惠諱且矯樂其菑更下之石亦其得禍之由也桂近伐漆近割害雋戕特塵土物態亦何傷于子畏余傷子畏不以是氣化英靈大略數百嵗一發鍾于人子畏得之一旦已矣此其痛宜如何置有過人之傑人不歆而更毁有髙世之才世不用而更擯此其寃宜如何己子畏為文或麗或淡或精或泛無常態不肯為鍛煉功竒思常多而不盡用其詩初喜濃麗既又倣白氏務達情性而語終璀璨佳者多與古合嘗乞夢仙游九鯉神夢惠之墨一擔蓋終以文業傳焉唐氏世吳人居吳趨里子畏母邱氏以成化六年二月初四日生子畏嵗舍庚寅名之曰寅初字伯虎更子畏卒嘉靖癸未十二月二日得年五十四配徐繼沈生一女許王氏國士履吉之子墓在橫塘王家村子畏罹禍後歸心佛氏自號六如取四句偈㫖治圃舍北桃花塢日放飲其中客來便共飲去不問醉便頽寢子重名申亦佳士稱難弟兄也銘曰穆天門兮夕開紛吾乘兮歸來睇桃夭兮故土回風衝兮蘭玉摧不兜率兮猶徘徊星辰上下兮雲雨漼椅桐輪囷兮稼無滯穟孔翠錯璨兮金芝葳蕤碧丹淵涵兮人間望思唐寅解元墓在橫塘王家村徐昌國墓志王守仁正德辛未二月太學博士徐昌國卒年三十三士夫聞而哭之者皆曰烏乎是何促也或曰孔門七十子顔子最好學而其年獨不永亦三十二而亡說者謂顔子最好學精力瘁焉夫顔雖既竭吾才然終日如愚不改其樂也此與世之謀聲利苦心焦勞患得患失逐逐終其身耗勞其神氣奚啻百倍而皆老死黃馘此何以辨哉天於美質何生之甚寡而壞之特速也夫鼪鼯以夜出涼風至而𤣥鳥逝豈非凡物之盛衰以時乎夫嘉苗難植而易槁芝榮不踰旬蔓草剃而益繁鴟梟蝮遍天下而麟鳳之出間世一覩焉商周以降清淑日澆而濁穢薰積天地之氣則有然矣於昌國何疑焉始昌國與李夢陽何景明數子友相與砥礪於辭章既殫力精思傑然有立矣一日諷道書若有所得歎曰敝精於無益而忘其軀之斃也可謂知乎巧詞以希俗而捐其親之遺也可謂仁乎於是習養生有道士自西南來昌國與語悅之遂䆒心𤣥虛與世淡泊自謂長生可必正德庚午冬陽明王守仁至京師守仁故善數子而亦嘗沒溺於仙釋昌國喜馳往省與論攝形化氣之術當是時增城湛元明在坐與昌國言不協意沮去異時復來論如初守仁笑而不應因留宿曰吾受異人五金八石之祕服之冲舉可得也子且謂何守仁復笑而不應乃曰吾隳黜昔㫖而遊心髙𤣥塞兊斂華而靈秣是固斯亦去兢兢於世者逺矣而子猶余拒然何也守仁復笑而不應於是默然者久之曰子以豫為非耶抑又有所祕邪夫居有者不足以超無踐器者非所以融道吾將去知故而宅於埃壒之表子其語我乎守仁曰謂吾為有祕道固無形也謂吾謂子非子未吾是也雖然試言之夫去有以超無無將奚超矣外器以融道道器為偶矣而固未嘗超乎而固未嘗融乎夫盈虛消息皆命也纎巨內外皆性也隱微寂滅皆心也存心知性順夫命而巳矣而奚所趨舍於其間乎昌國首肯良久曰沖舉有諸守仁曰盡鳶之性者可以沖於天矣盡魚之性者可以泳於川矣曰然則有之曰盡人之性者可以知化育矣昌國俯而思蹶然而起曰命之矣吾且為萌甲吾且為流澌子其煦然屬我以陽春哉數日復來謝曰道果在是而奚以外求吾不遇子幾亡人矣然吾疾且作懼不足以致逺則何如守仁曰悸乎曰生寄也死歸也何悸津津然既有志於斯已而不見者踰月忽有人來訃昌國逝矣王湛二子馳往哭盡哀因商其家事其長子伯虬言昌國垂殁整袵端坐託徐子容以後事子容泣昌國笑曰常事耳謂伯虬曰墓銘其請諸陽明氣益微以指畫伯虬掌作冥冥漠漠四字餘遂不可辨而神志不亂嗚呼吾未竟吾說以待昌國之及而昌國乃止於是吾則憾焉臨沒之托又可負之昌國名禎卿世姑蘇人始舉進士為大理評事不能其職於是以親老求改便地為養當事者目為好異抑之巳而降為五經博士故雖為京官數年卒不獲封其親以為憾所著有談藝録古今詩文若干首然皆非其至者昌國之學凡三變而卒乃有志於道墓在虎丘西麓銘曰惜也昌國吾見其進未見其止早攻聲辭中乃謝棄脫淖垢濁修形煉氣守靜致虛恍若有際道幾朝聞遐夕先逝不足者命有餘者志琢之未琢豈方頑礪隱埋山澤有虹其氣後千百年曷考斯志徐禎卿博士墓在虎丘西麓彭寅甫墓志銘文徴明彭君寅甫以進士出知湖廣之公安便道過家戒其家人曰吾行服官政義不得顧家慎無以家溷我遂單車至縣縣屬荆南連江帶湖民貧而俗陋君披抉道利悉意拊循稍以經術緣飾之誕章敷化朞年而治成然軌道自信不復以文法自拘一時文法吏咸憎疾之而君不顧也會枝江盜發一夕斬關而入縣故無兵倉卒不能拒盜遂執君讋之以刃不屈摉其橐空無一錢乃舍去曰是廉官也然帑藏所有燒劫略盡矣詔督捕定罪盜既得而贓鏹無獲法得不問而素疾君者從而媒孽之坐不戢盜鐫一官左除廣東德慶州判官久之或言其非罪稍遷知廣之新㑹新會即古之岡州負山阻海夷蛋雜居溪獠峒猺乘間時時竊發君至而鄰境巳為賊據節鎮大臣方事招來而夷性險譎不可擾馴稍急則降已復叛去勢不可終弭始議用兵而賊皆蹻捷阻險乘高出沒不常官軍轉戰不前多所亡失無己取平民被誣者掠訊成獄付縣杖殺之日以百數君既不義其所為多不承令又供需浩穰不忍剝斂以殉用是積忤上官欲求其罪罷之捃托無所得乃以惰溺不勝任劾君而君亦倦逰矣既歸杜門掃軌不與流俗競相還往日發其所藏書披閲涵泳間為論著亦往往賦詩自悼然皆不以示人或時飲酒酣暢輒復理詠意淒然若不能自釋者久之竟以疾不起嗚呼悲哉君性質朗融而氣復邁往少則勤苦自將能以志帥氣既通諸經又貫綜羣籍揚榷探究得其雋腴發為文章馳特奔放頃刻數千言而辭㫖精詣若出鉶鍊激卭蹈厲以古人自期下視曹耦莫有當其意者然數試不偶年四十始領鄉薦繼登上第於是人始望之謂庶有以達其志也而連宰二邑皆值俶擾方以排難折衝從事而剛方直致與物齟齬竟連蹇骯髒以死凡其所負卓越之才精深之學與夫名世經逺之圖曾不得一試而世竟莫有知者嗚呼豈不重可悲哉彭氏世以高資甲於里中君既仕顯而先世田廬乃復加損其貞白之操有不可誣者而世之人顧以官簿不達議君烏乎君則何罪哉君諱昉字寅甫其先清江人高祖學一國初以尺籍徙𨽻蘇州衛遂居蘇之長洲曾祖仲英祖斌父至朴母某氏君生成化庚寅正月三日卒嘉靖七年戊子二月十又三日享年五十有九娶胡氏子男二人長年次科女一人適國子監生劉遺明年庚寅葬吳縣龍池山既而墓為水所嚙嘉靖癸卯某月某日改葬長洲縣九都某字墟銘曰氣則竒亦昌于詞而不利于施甫引而馳端厥綏中蹶以違吁嗟彭君其命之罹邪抑有盩於時邪彭昉知縣墓在長洲縣東川軍民府通判王君墓志銘文徵明余友王君涣文通判嘉興府之三年改蒞東川軍民府東川在蜀省在烏橵之西本烏蠻閟畔部去京師萬里夷獠雜居雖名列郡特遐方一聚落耳君起儒紳通侻夷易居官不修章程不能曲事上官深文苛禮有所不屑用是積忤當路顧其任未久又未嘗一挂吏議乃以逋慢易置之實奪之事任而投之要荒之外也君歎曰吾誠不佞未嘗罔天與人而得是逺徙豈其命邪雖然吾行且暮孱弱之身豈復堪此逺役遂卧不起未幾竟以疾卒烏乎傷哉君正德己卯以尚書領應天鄉薦試禮部數不中卒業太學嘉靖庚寅以太學生釋褐官嘉興受任督賦嘗一再攝縣及轉輸網材皆能其職卒年五十有三嘉靖乙未七月草又五日也君諱渙字渙文别號墨池子世為蘇之長洲人曾大父存心大父以仁父諱銘母陳氏君生精悍穎敏少則勵志彊學既選隸學官益事精進刺經推義不遺餘力而博綜羣籍咸繹而通之鑄詞發藻必皆不經人道語而含咀英華經史錯出緯組爛然人讀之刻深艱棘若出鉶鍛而君頃刻數百言操觚立就曾不經意而思致不窮其亦一時之竒雋矣尤工古賦得漢魏遺意詩宗白傅晚喜陸放翁范石湖然皆自出機杼不拘拘體裁而竒思奕奕始在庠序無所知名會部使者得其文竒之一時隱然喧動吳下當其時莫不偉視其人謂區區制舉不足取也而君亦自負所有不肯碌碌但己厄於時命僅得一郡倅潦倒末秩卒困頓以死嗚呼豈造物者有所靳耶抑有司之失耶君髙朗濶達而舉止疏慢不事矜持出言無所顧藉遇人無貴賤並狎視之其卒被中傷蓋亦以此然其中實無崖異推誠投分簡而有情內之族屬外之里黨朋從莫有間焉余友君三十年知君尤深及是葬其子遂以吳學生陳君曉所為狀來乞銘君娶郁氏先卒子男四人庚壬巳戊女四人適沈大謨顧㒜范善政羅元素孫女一人葬以卒之後二年丁酉十一月草有一日墓在武丘鄉銘曰維材孔良德藝其章既騫用揚而弗利於行維坦有夷弗失其馳乃囏厥罹蹶疐而違而顛蹶以踦吁嗟乎其時兮其數之竒兮王渙通判墓在武丘鄉九都草三圖郭子墓志銘蔡羽郭子諱邵字漢才世為蘇之長洲人入國朝族始大號車坊郭氏六世祖彥珍三傳至用行用行生汝文汝文生謹儀謹儀生郭子邵母張孺人為雲南按察使虛菴公女彥珍號惠寧以善行高於鄊鄉人德之稱曰惠寧長者汝文號絅菴有操行敦修禮文益開厥家以子貴封太常寺典簿謹儀由鄉進士授南京太常寺典簿加文林郎聲稱籍甚方擬大用在任三年遽引退升鴻臚寺丞致仕人歎其高郭子之生敏而嗜學自幼不為嬉戲父之官太常也以郭子從時始數齡已有識度父知其不凡令遍從文章巨公用是器日益充歸逰郡庠郡弟子咸推之御史院試輒居一等與太原王寵齊名意髙第不足取然亦纍蹶場屋郭子則益勵厥志以古人自期逮德業有成渾然不見圭角然其中燦如也時衡山文徴仲濟陽蔡羽年皆倍郭子愛其早成與為忘年交嘉靖壬午秋試復下第遂病不起以其年十月十六日卒以郭之絫德鴻臚公之不盡厥用郭子克讀其家書治二經文為時式由是以顯厥家夀且有後豈足多哉顧皆無之淺薄者出輒第澤未厚者顧祿且夀由此觀之天果靳於善人否耶郭子篤倫理絅菴之喪嘗佐鴻臚公治之斂葬合禮及嫁女弟所以代父母經畫者亦允內外之情平居語不妄發遇事出一言足以斷可謂沉毅明慧之士配徐氏為天平山徐守耕之女無出卒之日以從兄受益之子為後名曰緒郭子生於𢎞治壬子十月草一日距卒三十一年鴻臚擇以卒之嵗十二月十二日葬吳縣至德鄉博士塢先塋側委銘焉陳子道通為狀受狀叙之銘曰孰俾爾完孰鍾爾全謂天匪厚於人不然指取功名赫興厥宗中道則僨胡弗竟從跖顧宜延顔顧宜折謂適其嬰何昭何滅於乎古今旦夕孰為不朽念彼哲人瞻彼靈阜有烈耿光上映箕首郭邵秀才墓在吳縣至德鄉博士塢王履吉墓志銘文徵明嗚呼悲哉王君己矣不可作矣君文學藝能卓然名家而出其緒餘為明經試策宏博竒麗獨得肯綮御史按試輒褎然舉首一時聲稱籍甚隱然為三吳之望三吳之士知君者咸以高科屬之具真知者謂能肆情詞藝非直經生而已然皆非君之極致也乃君之志直欲軼古人而踰之蓋非通古今周一世不足以充其所受也是可以一時一郡論哉君資性穎異將以勤誠於書無所不窺而尤詳於羣經手寫經書皆一再過為文非遷固不學詩必盛唐見諸論撰咸有法程余年視君二紀而長君自丱角即與余逰無時日不見見輒有所著日異而月不同蓋浩乎未見其止也而豈意遽疾而死也嗚呼惜哉君正德初與其兄履約並以俊造選隸學官嫓聲儷迹翹然競爽既而履約舉應天鄉試尋舉進士而君每試輒斥以年資貢禮部卒業太學又試又輒斥蓋自正德庚午至嘉靖辛卯凡八試試輒斥而名日益起從遊者日衆得其指授往往去取髙科登顯仕而君竟不售而死嗚呼豈不有命哉君高朗明潔砥節而履方一切時世聲利之事有所不屑猥俗之言未嘗出口風儀玉立舉止軒揭然其心每抑下雖聲稱振疊而醖藉自將對人未始言學蓋不欲以所能尚人故人亦樂親附之性惡喧囂不樂居㕓井少學於蔡羽先生居洞庭三年既而讀書石湖之上二十年非嵗時省侍不數數入城遇佳山水輒欣然忘去或時偃息於長林豐草間含醺賦詩倚席而歌邈然有千載之思迹其所為豈碌碌尋常之士哉是其志之所存必有出於語言文字之上者曽不得少見於世而僅僅以文傳而其所傳又出於文場困躓之餘雅非其至者嗚呼豈不重可惜哉君孝友天至居常能愈悅其親而順之於道與兄履約少同筆研食息起居未嘗少離既各授室而聨裀共食視室處之時恆倍君卒時履約方官京師及是以都御史出鎮鄖陽便道過家以某年月日葬君於某鄉某原俾徵明為文君諱寵字履仁後字履吉别號雅宜山人父貞以履約貴封中憲大夫太常寺少卿母朱氏繼母顧氏贈封皆恭人君生𢎞治甲寅十一月八日卒嘉靖癸己四月三十日享年四十嵗娶徐氏子男一人子陽太學生銘曰維慧而明亦藝而貞胡不潰於成而卒困以衡吁嗟乎其名王寵太學之墓在武丘鄉某原張太學子饒墓志銘蔡羽蘇郡東城張氏之盛四世矣景暘翁為菊泉封君父富而好逰逰於燕山時諸雄賈角立法書圖刻名器珍玩狼籍大都者持入諸賈人家不省景暘具精鑒善甲乙之故張氏世擅博古多文之譽景暘三子菊泉居仲賞鑒視景暘子孫因是薰炙品藻致情焉夫人情莫不各有鍾不能於經書圖玩諸無賴將靡不至人皆曰張氏遺善并是以遺何如哉菊泉五子獲交者子京子侯子饒子京為吏廉能纍官至光祿署正菊泉所由受封者也子饒名浙太學生以履行雅素受知於前後大司成其逰太學也為嘉靖戊子間時分宜介溪嚴公大整學規積分考行升舍子饒以行得上舍未幾汝南林公四明吳公咸申前法子饒連以行最居上列故諸公喜之召置左右親為解疑惑造就之意不淺辛卯選試順天不第同逰重之然巳瘁于學至矣巳輒告歸省初子饒在本郡學人已多其雅尚師事今太學湯先生子重交逰豫輩故文太史王履約履吉比豫咸獲造其館諸往返無他俗談請其圖刻寶玩過目輒生古氣見古人精思前代制作坐輒移時日間陳佳章筆札請題識故友人從張氏往返若入一古藏因於浙也生于𢎞治乙未八月十二日卒于嘉靖癸巳八月十三日年三十五母吳氏孺人菊泉嫡配同日封自光祿至子饒為一母先娶許氏有賢名先卒繼娶陸氏生二女卒之日菊泉命子侯之子賢為之後名曰公椿公椿聘熊氏女許陳與立次女許石坊子饒性敦孝吳孺人苦多疾疾則子饒侍藥不暫離側又善開母懷故孺人屢病瀕於危竟享高壽處兄弟咸篤友誼能書亦長於歌詩歸省日别購一區宅因厥園池輔以樓館曰庶可以奉二親茍遂吾養吾志畢矣未究而卒卒之三載光祿君居母艱其冬大營葬與子侯協卜隨太孺人同日舉喪蓋十二月草一日合前室許氏之宫也先期光祿以書投南翰曰弟浙生嘗辱諸公教亦嘗用力其間若槩泯不傳恐向上者無以勸諸公辱教亦空言矣汴憐其不瞑目也敢以志瀆展其狀則湯先生所為也因嘆曰父兄師友父兄之言豈無故哉為志而銘之銘曰好修䖍䖍躋于儕輩宜爾家庭孝子弟弟舍選羣公克念克類師與厥進友尚厥志肯構肯堂迄我養事為網不臧報或不至回凋跖榮天道奚昧兄哉光祿遺書哽嗟野有簡青不背于師不間于家無忝厥生沒有榮加勿感下泉石言告遐張浙子饒墓在五峰山博士塢明故資善大夫都察院右都御史致仕盛公墓志銘文徵明嘉靖十四年乙未九月十有三日前都察院右都御史吳郡盛公以疾卒于家訃聞詔下有司俾營葬事賜諭祭者再公仕𢎞治正德間以剛毅廉循著中外蓋自弱冠筮仕郎曹即能抗捍權要得罪貶斥一再下制獄皆瀕於死賴朝廷仁明得不終棄再躓再奮卒至大官凡所臨涖輒著茂績振風紀而軌法緒正益厲不貶以故﨑嶇輾轉多所抵冒而豐功盛烈往往敗於垂成卒坐廢以死一時輿論於公有遺望焉嗚呼惜哉公諱應期字斯徵別號值菴裔出宋文肅公度由餘杭徙汴再徙蘇之吳江今居郡城歷元至國朝衣冠不乏高祖啓東以儒醫際遇文皇為太醫院御醫特被龍眷曾祖佖不仕祖昕父瓘俱以公貴贈通議大夫都察院右副都御史祖妣朱妣胡繼妣蘇俱贈淑人公以𢎞治癸丑進士釋褐拜都水司主事奉使涖濟寧諸閘節適限列啓閉有時公私舟皆以叙進官舟或挾私貨輒沒入之道路恐恐相戒莫敢犯而中官大不便之時大璫李廣方貴幸用事相與流議中傷既不得間則以阻格薦新為大不敬逮公抵罪鐫八階謫受安寧驛丞安寧隸雲南荒逺非人所居久之稍起為祿豐知縣祿豐古之祿琫烏僰蠻所居剽悍梗化前政往往寇賊待之公不鄙其民誕章敷化納之仁軌民用歸集而盜亦敉寧風聲所被洽於鄰壤尋升四川順慶府通判受任督賦輸將摧會咸有法程而鈎稽宿蠧民莫能謾民嵗轉輸松潘往往破産不足更費公審情道利番休而節適之事節而民不病丁父憂解官道升武昌府同知正德已己服除改長沙專理精籍秉公軌法不事鈎托而弊為之清郡中王府官校及衛所餉給多為奸吏侵牟官軍坐困或出怨言㑹公攝郡程督吏胥稽其出納參合分劑得其利弊所在遂推行之上下給足而郡以無擾俄升雲南按察使僉事歷按金滄洱海諸道擲伏省微所部職辦其屬景東諸郡皆土官世襲梟獍桀敖王法有所不治公皆以正臨之莫不偃帖向化知府陶某父子讎怨而奸人實構其間公探得其情縛奸人置之法曉陶以義俾父子如初武定知府鳳英死其妻攝郡所為多不法而其子朝鳴尤陰狡泄惡椎剽圉奪民甚苦之朝廷下所司究按咸憚公不敢行公方入賀萬壽當道議留公公得留疾馳就按之出鳳不意母子震懾伏謁輸情公因簿責其黨窮竟抵罪悉還所奪於民時鳳氏方盛公慮其後必為患請降鳳秩設流官制之奏上朝廷重於改更事格不行鳳後卒叛如公言時鎮守太監梁裕驕蹇侈汰漁取無厭公隨事裁抑不令得肆省內諸銀礦嵗有常課裕擅為己有朘剝苛急民不堪命或緣是賊殺啓釁公議建封禁以絶禍源實抑裕而奪之利也故裕銜之時御史張璞副使朝必登與公協心制裕裕因並奏三人誣以他事悉逮下制獄鞠訊慘毒張竟考死獄中公益不撓諸大臣言官交章論救會乾清宫災遂得貰赧前是公巳進本司副使復任未幾遂升河南按察使策惰警頑風采益振太監孫清欲攬事權擅理民訟民或乘藉為奸利公面數之正言直氣無所回婉孫不能堪欲遂訐公以事公不為讐而孫卒亦莫之能為也丙子升山東右布政使故事右轄多循默逺權公展采錯事無所避遜時僚長持重務存大體事或濡滯而公披決敏利案無留牘所興革緒正皆利病切急身名所繫不可已者故雖嫌於侵權有所不顧戊寅升陜西左布政使時鎮守太監廖鑾陰賊强禦恃有內援縱橫省中諸弟姪席寵翼奸贓賄狼籍動以上供為言有司脅息莫敢問公至首執其左右尤無良者用法剪除之一切橫斂皆格不行又不隨衆加禮廖滋不悅思有以中傷之先是有㫖督造織罽其費巨萬廖以檄公取直檄文嚴峻實以嘗公欲因是激之用為公罪公得檄即閉戶發籍按得所支數巳逾數萬明日詣廖廖方盛氣以待公徐出數示之因問更費如此計所造有贏今皆安在願以上聞廖出不意內愒不能對惶恐跽謝乃已及上西巡駕次榆林士馬滃集蹂躪紛逯人情洶洶而公處之裕如供頓首需取具呼吸間民不加賦境不知擾而事罔不集一時扈從諸璫若諸嬖幸氣熖薰灼自鎮巡而下重足屏氣莫敢與抗公先聲所被既有以讋之而臨事整暇足以坐鎮物情憸人小夫望而知敬一切非分之禮無藝之求消沮殆盡終竟彌縫無少疏脫同事諸公莫不佩歎以為難雖上亦知之明年己卯四川缺巡撫遂用為都察院右副都御史巡撫其地蜀去朝廷萬里夷獠雜居負險易動公練兵飭甲隨時疏捕不少怠縱六畨招討楊文林數出兵攻圍城邑䖍劉吏民而流民謝文義亦糾僰夷為亂皆以次戡定捷聞璽書褒嘉錫以銀幣時朝多秕政權幸縱橫誅求切蹙而蜀尤甚公糾檢緒正首事限列而繩之以法法外科核一切放罷西南數千里為之肅然庚辰丁繼母憂辛巳會今上登極以疾乞休不允壬午服闋被命起撫江西適遭逆濠倡亂之後瘡痍未復加以飢虛所在寇盜充斥而彭蠡為吳楚交會之後盜出沒其中阻險剽劫而漁舟為之嚮導公調遣官兵團軍捶扼併籍羣漁為伍使互相覺察盜不自容一時併散於是平徭省斂疏免雜調緡錢總數十萬而請留以濟民者亦不下數萬檄省臣分地賑恤躬自督率極意撫循民用蘇息而嵗亦比登屬南京諸郡阻飢首輸米七十四萬石銀二十萬兩以濟而奉詔積榖備荒亦百餘萬石有詔嘉奬者再尋被璽書升兵部侍郎兼都察院右僉都御史總督兩廣軍務時嶺南更數政不治兵疲財匱號令墮地土酋玩狎不知稟畏而夷獠悖謾時時竊發公至陳兵大閲料簡鈎托一時逋蕩以次復伍乃飭廥積謹烽燧繕治干櫓部署諸將俾各守要害紀律嚴明精采煥發於是諸夷稍稍知懼而邊徼有恃矣歸善劇賊李文積據桃子園為亂公檄守巡發兵捕斬生擒文積及其黨李萬全等斬首一千一百三十級俘獲男婦四百餘人土官劉召誘執兵官據思恩府以叛即調遣民兵分隸將官授以方略而躬率守巡諸臣繼之進攻岜梅諸寨摧鋒衝擊大破羣酋斬首一千九十七級俘獲男婦五百餘人召被鎗火死餘黨悉平田州土官岑猛懷諼忮狠恃其險逺將為不靖畜聚纍年及是數出燒劫州縣事聞下公經畫公會巡按及三司守臣參審籌畫咸謂此積嵗逋誅不問益熾而一方之民不容不拯於是上疏具陳方略大率誅首惡而貸脅從兵部覆議從之事下而公巳得㫖改官矣先是公稽校尺籍得總兵太監二府脫卒甚侈既勒歸伍而深抑其官屬不令暴橫又檄下兩省及湖廣諸路凡所調遣悉自幕府關決於是二府禁不得肆大興讒構欲以罪去公當道者為之調停遂除工部侍郎提督易州山厰實奪之權而置之散地㑹言官復有論列公遂引咎乞歸得㫖致仕嘉靖四年乙酉也丁亥河決徐沛漕渠淤塞濬治久弗即功有詔集廷臣議舉可以治水者僉以公名上遂錫璽書起公於家即拜都察院右都御史提督南北直隸山東河南等處河道時尚書李承勛胡世寧皆建議欲於昭陽湖東別開漕渠而少卿黃綰詹事霍韜各陳便宜並下公省詳公與郎中柯維熊員外郎土大化參議劉淑相親往相度延訪父老既知利害所在乃上疏言黃河之患古今則然而中原平衍無洞庭彭蠡以為之滙故遷徙不常為患特甚而其性避高就下非多為之委以殺其流未可力勝也𢎞治以前河下潼關即分三大支二支俱出汴城之東南行由泗經淮入海其一支出汴城之北東行至兖分二小支一出沛之飛雲橋一出徐之小浮橋俱入運河經下邳州會淮入海正德以來汴南二支湮塞併入汴北一支於是全河東下至於徐沛俱入運河自此汴河無患而徐與豐沛適當其衝近年河漸北徙小浮橋亦已湮塞曹單城武諸縣及楊家梁諸口奔潰四出徑趨沛縣漕河橫流出於昭陽湖之東泥沙壅遏勢緩則停遇坎則滯致淤運道今非改鑿新河不可蓋上流不殺則決口不可塞長隄不可築而河防不可成河防不成則淤不可濬而故道不可復此今之漕河所以不容不改也廷議是之詔以春和興役公先命郎中等官分治舊河使通漕舟而堅築隄岸以障黃河之衝別濬趙皮寨孫家渡諸處以殺上流之勢於是簡屬吏之賢有才者以任新河之役躬履其地量地授工分程布役時其食作工其勸懲聨絡相維統攝有叙甫四閲月工完十九旦夕告成而讒言遽興有㫖罷役而公去國矣時諸老大臣爭言其枉而戶部尚書鄒文盛刑部尚書胡世寧言之尤力蓋斯役之罷起於一二同事之人以細故更相責望坐失事幾故當時公論如此公家居七年更赦復職致仕既而大臣言官相繼論薦海內士大夫方冀其復用而遽疾不起嗚呼惜哉公為人修正彊執遇事直前不為利害回折奉公憂國之念寤寐不忘體貌嚴重進止有恆居家整肅如臨官府而與賔客談笑雍然有情待諸弟妹甥妷有恩族人孤嫠有給婚喪患難有助於倫誼甚篤也生成化甲午八月草有一日享年六十有二娶沈氏繼顧氏俱贈淑人子男二人長之材郡學生娶王氏次之榮娶王氏繼沈氏女一人適前工科給事中陸粲孫男六人茂勳郡學生茂煕茂廉茂燾茂然孫女一人許適吳治以卒之又明年丁酉十二月十六日葬吳縣橫山感慈塢徵明晚辱公游知公為詳及是葬公子以治命屬銘不可辭銘曰桓桓盛宗立氏以國孰其徵之曰有成伯有顯者吉在漢則良曰苞孝章奕世其揚别籍於杭爰有文肅燁其家聲不忝維榖有展中丞德言則繼於千斯年有衍弗替衍之維何道則有光行則有方政業其章履貞用嚴侃言維直歷險以夷維正而克我循維良我武維揚豈不有庸讒言孔傷彼讒則傷我行維烈道有險夷不易其轍亶其有馳乃端厥綏或失之毗而名匪虧有展中丞維吳之淑豈不云亡公其莫贖盛氏先塋之碑王鏊盛故餘杭聞家然自宋丞相文肅公始大其徙吳中則自判平江府君諱岫始其葬黃山自寓翁府君始黃山在吳縣西南數里而近望之隱然如舟蓋吳山之小者而山水環合草木鬱然青烏家謂其秀當有所屬而盛氏墓在其㢲隅寓翁曾孫俌言于鏊曰先墓在吳中者凡九而黃山巋焉獨存水木本源之義在焉何可忘也蓋自元季兵興所謂凡九者多蕪沒而莫尋則無表識故也先大夫蓋嘗恨之他日世益逺人益衆族益散則又安能保斯之不蕪沒也乎俌用是愳爰用增蒔松柏立享臺樹華表大書盛氏之阡示後人以不忘也唯執事賜之言以昭世德以詔來裔於無窮使盛之子孫繼繼承承永有徵焉孝敬其無衰乎豫惟盛氏在吳中占科第登仕籍者絫絫有焉其餘又各以醫名家通籍於朝官於鄉纍世而不絶也何其逺哉信其先之積纍深且長乎固不獨青烏家所謂山水之秀而山水之秀亦或不可誣水木本源之義則自不可忘也豫故為著之蓋營域之延袤凡若干畝中為繚垣垣之正中為俌曾祖寓翁諱似祖府君之兆其西為伯祖諱賢府君之兆又西為伯考諱宣伯府君之兆其東為祖考諱棣府君之兆又東為御醫諱寅府君之兆又東為太醫院士諱儼暨醫學正科諱侃府君之兆高祖諱宗仁高伯祖諱忠二兆遷自齊門今在垣之外北上諸殤穴在垣之外東西坡下其西南隅為翰林待詔李先生貞臣之兆先生揚州人寓翁故人也老於吳中無所歸遂以葬焉春秋祔享之其諸世系行歷刻之碑陰盛應期都憲𢎞治中進士歷官四川江西巡撫兩廣總督終直𨽻河道有政績載文徵明墓志墓在吳縣橫山感慈塢其王鏊盛氏先塋碑乃在其黃山祖墓上附載於此太子少保資善大夫南京吏部尚書致仕贈太子太保諡文端吳公神道碑羅欽順嘉靖二十一年二月壬子太子少保南京吏部尚書致仕吳公卒於里第之正寢訃聞詔贈太子太保賜諡文端遣官諭祭者四命禮部員外郎王楠護葬事其孤子孝遂以是年十月壬寅葬公吳縣陽山之原事既畢將樹碑隧道以余為公知巳伻來謁文余實知公雖年老力衰短於揚厲然於誼不得辭也公諱一鵬字南夫號白樓世居蘇之長洲山塘里曾祖敬祖琮考行俱隱德不仕以公貴祖贈南京太常卿祖妣周氏贈淑人考封翰林編修纍贈太子少保南京吏部尚書妣司氏繼趙氏俱纍贈夫人公天資秀穎年十六七即慕為古文詞成化丙午以郡庠生中鄉試𢎞治癸丑登進士第改翰林庶吉士乙卯擢編修預修大明會典大臣有遭讒去位者疏請留之以全國體人知其有匡時之志焉丁父憂服除仍舊職預纂資治通鑑攬要及修玉牒正德丁卯升侍講尋兼經筵官同修孝宗實録成例當進秩時逆瑾竊柄公與諸同官見之無加禮瑾銜之因矯詔以擴充政事為名凡與纂修者多改官部屬公去為南京刑部廣東司員外郎明年升南京禮部祠祭司郎中瑾即伏誅詔還舊職尋升南京學士癸酉南京國子缺祭酒以公補之乙亥升南京太常卿丁繼母憂去位嘉靖改元始入為禮部右侍郎尋轉左奉使安陸改題獻皇帝神主迎致京師事竣有白金文綺之賚以內閣薦兼翰林學士掌詹事府事專管誥敕充武宗實録副總裁乙酉實録成進禮部尚書賜賚尤腆其年冬乞假展墓詔給驛以行丙戌還朝時江南亢旱江北大水公具狀以聞請蠲租發廩以濟民艱復請疏導江流以便糧運上嘉納之下其事於戶工二部詔舉堪任內閣者僉以公名上爭進者忌之或謂公可無援乎公笑謝之曰嫠婦老而變節亦可醜也俄被㫖出理部事居數月復改掌南銓加太子少保辭加官不允遂行再踰年懇乞休致時年蓋七十矣前此乞休者數四皆被溫㫖慰留至是始得請重有褒諭仍命有司月給廩米三石嵗給輿夫四名蓋異數也公在翰林纍與纂修恆極精審三充會試同考官一主順天鄉試所得多知名士每進講義必稽古而音吐洪亮足以發之在南都纍年未嘗以留滯為意師範嚴整享祀精潔率於前政有光間值雷變嘗陳修德穰災之道今上初即位進說尤詳要在開悟聖心為宗社生民無窮計也在禮部與尚書汪公協心秉正上欲為獻皇帝建室大內汪公執不可既去而公攝篆乃會議於廷援古證今詞氣侃侃然上意已有主議竟不合公因自劾求去上亦不聽僉事陳洸冒舊銜入疏假大禮以希寵公劾其無恥干進請罷黜之洸竟得罪而去出自東閣桂文襄方為侍郎遇事時有異同亦不能奪公所守嵗貢生就教職者奏乞仍與鄉試公議奏以為可許上從之遂著為令在南銓務持大體品藻人物每留意焉既歸首建崇正書院鄉人子弟來學者無弗受仍割田百畝贍之其傍為真趣園亭館山池清邃幽雅公既有以自適而子孝逺居官次恆思之不置既而得請歸養所以曲致公之樂者率在斯園髙人韻士往來不絶也然公尤以表章先賢風厲風俗為事嘗言於有司即尹和靖先生三畏齊遺址作三賢書院并祝安定胡公文正范公陸宣公墓在齊門外頗為居民所侵亦復其故蠡口陳孝子興立祠圯率衆修葺并海虞周孝子容祠之故劉丞幹遺愛在民為葺其衣冠之藏而立門署榜以從民志民間耳目為之一新其前後義舉尤多惠利所及蓋不止於親故鄉鄰而巳公生天順庚辰十一月二十九日享年八十有三蓋家居十有四年而卒平素篤於事親居喪有禮於故舊有始終之義與物無競雖間遭排抑處之裕如口未嘗道人過惡而妍媸高下中自了了和厚之氣盎然可掬望之知為吉人君子也為文效歐陽子平正豐潤詩宗盛唐有風骨耐咀嚼字亦清徑原配宣氏繼姚氏薛氏宣姚皆纍贈淑人二男子子忠早夭次即子孝勤學善屬文嘗充庶吉士之選既皆中罷循次外補以南京吏部主事歸養於家四女子皆有歸孫男五人尚朴蔭國子生尚儉郡庠生尚默尚遜尚潔女五人其行狀甚詳乃公里姻光祿卿王君履約所述碑蓋不能盡載也銘曰仰止蘇山其高曷稱魁傑嗣興于斯為盛文定文端矧惟同性厚德清文前輝後映官高望著彼此一時或安於近同志相維或暌而逺誰實間之密雲不雨有識嗟咨允懿文端輪轅信美載北載南徐驅直指歸以義榮優游故里亦既有年而又有子寬樂令終實多受祉惟皇念舊恤典加隆續之生氣慰及臣工穹碑在望有巋其封我銘曷以惟德之恭貽孫有裕流聞無窮吳一鵬尚書墓在陽山吏部尚書泰和羅公欽順為撰神道碑明禮曹郎楊君自撰生壙碑楊循吉堪輿上下元化處中是生萬物豫得為人其所居距大海十舍許蓋宇內東南之陋夫也今則素飱於世八十有五年行將奄歸𤣥宅返乎太初相彼廬右有丘焉我之永歸庶幾在是恐一旦先朝露無人紀述乃自為文琢石而鐫之君姓楊氏名循吉字君謙於望𢎞農郡周宣王子楊侯之後漢太尉震之逺裔也唐丞相綰清德著聞宋學士億文辭蓋世至于國朝三內閣文貞敏定名彰華夏門閥盛矣君世家崑山元末雲擾來居吳城西市坊高祖子中性忠勇䇿名霸府戰死妣陶守節婺居洪武中選為內庭姥姥供執事末年放歸今先塋首穴配葬衣冠者是巳陶生子五人曾祖考居長以富民填實京師供億有年仲氏商閩尤富㕓屋跨里叔亦眉夀從居同稱淑士最幼二季由母故得官御用少監及神樂觀提㸃雖非顯融亦不下賤考府君封承德郎母劉封安人安人之兄擢解元於正統間官至三品楊業自此始君少習易弱冠登科又七年憲祖御天成化甲辰科幸叨黃榜擢拜儀曹為京官末職幞簡青袍入參朔望人生之極榮𢎞治初逮事孝廟時五王册封備員執事獲從堂官拜華蓋殿得覲龍顔事竣賜宴直房并賞羅綺福薄命蹇痞癖內攻日食米止三合恐曠職致尤上奏乞換校官不果遂乞歸䝉恩准放次年貤封典下郡諸侯具彩輿迎賜二親兼報劬勞之萬一矣自惟受官無補己未嵗清寧宫災下詔求直言不揣應詔上疏復請建文君尊號以禮文事分所當言用是塞責帝衷欲允大宗伯以事體重大弗敢覆存為文案傳聞收入太史氏未知然不既而謹厚大臣逺貽如瓶之戒一向守默性偶好書結廬天峰院折松枝為籌課麟葩經稍通章句傍涉子史百家又及千卷時或歸省從郡使君游或為文章吐言亦未名家正德初嚴慈既殁寢苫先隴傾資修築靡千金既畢大事每嵗率持齊誦經一百日不出以報如此十三年庚辰嵗武宗在南都䝉呼試樂府三次扈駕凡九易蓂莢告歸是冬復取如京墓辭赴命嵗齊不廢明年夏南歸别業築室支硎山下修葺舊聞名雲峰廣要檢書既多稍諳典故然以筆研度日不作生業有負郭田百畝悉賣不存如此又十年皇上龍飛十五年田野間樂聞盛事時則恭逢九廟肇興上頌文一篇䝉頒史館薄表葵藿之敬諒無補益也外華陽求嗣齊儀十卷同進亦䝉嘉納金枝應禱慶洽普天而有日精射稿之祥屢見于室竒哉山農共覩非敢妄道是年冬自山西還歸故鄉埋頭隱伏終日維與古聖賢相對輪蹄絶迹亦不尤人自是年益老耳聵目昏龍鍾强步起拜必俟扶自知去死不逺昔李白一子逺逰不歸不幸類之君配趙生子二一從北上久遨於外未歸一喪京口舟中今停柩在殯所庶生二𦙍尚幼頗賴應門不得𨽻學書無紹焉有墳自築前溪後城亦足偃卧文集方斟酌未成書三四種有完有未完愧無寸長不欲勞他人之筆所貴以自述為不誣故撰其碑云爾誅曰上古人淳夀常百許今兹耋年久寄逆旅歸休何時宜有告語凡人之生口體為主如何到豫無一克舉彼炫文繡浣衣我處彼富倉箱我乏朝黍靜言思之毋乃自取有官不作身日卑無財可悅親益離古之高行豈汝能追弗䝉其享但招寒飢原憲長貧李廣數竒命也奈何莫為而為抑别有道非時所知景公千駟民稱伯夷念昔辭官嘗虞早萎豈意還存雪鬢霜髭一夀僥幸他從缺遺人之墓也期千百年我則不必其然亦不必其不然掩骸之後悉付于天耕犁表樹皆非己專常存不化惟有神仙廣成千嵗亦隨雲烟不化還孳日增萬千宇宙雖大莫能充填三山六水一分之田穀少人多將何具饘乃生變化陰陽互遷前除後續世以相沿大鈞制則不足深憐古多達士裸葬未䖍從容自祭靖節為賢有書方編有文未鐫無非糟粕不喜流傳且夫生也憂死則否逺恥辱平仇讐萬苦千辛一筆都勾以還造物與鴻濛逰錫汝長眠草緑仍秋所以佚我惟此樂邱自古有死聖謨垂休曾啓手足完軀是謀老佛徒誇忉利瀛洲纒綿不了又起一頭大哉簡要儒家者流時未委順至死彌修舉此玉符更不他求重負國恩涓埃靡酬亦負罔極自同蜉蝣烏乎傷哉嗟斯人之在世無一日得志遭讒履厄人則遐棄夫亦何愆坐不富貴終當舉手永謝塵世陳辭既舉請刻以記過者來觀莫厭辭費公生天順戊寅十一月五日卒嘉靖丙午七月二日享年八十有九卒之年十二月十九日葬吳縣至德鄉碣字墟之新阡楊氏修墓記朱存理楊氏墓在吳縣十一都雁蕩村某字墟楊氏先德卿府君由崑山徙郡中入洪武初以富民久居京師歸營葬地僅四畝卒葬焉子某府君孫某府君咸祔嘗有過其地者曰後其有文而顯哉逮封承德府君始拓之積劵凡四十紙為地通二十畝有竒正德戊辰承德洎劉夫人以高年相繼夀終子禮部主事循吉喪次中日走墓所經營葬事以舊土稍下高之四尺五寸許躬操量度殫心畢力有司遣人助之役悉謝却厥制前立石坊二環匝垣墻坊前有池臨池有屋池之陽將規以樹植而未遑也明年己酉閏九月望日合葬承德夫婦于斯自公卿大夫而下逺近會葬者千人既葬禮部君益葺治不懈謂前制未稱訪于堪輿家數人厥議弗協頃易鄰廬半區倍其值而返其材遂更創之向東有扉逶迤徑自左坊歷祖塋至考妣冢冢前隆阜植檜覆亭明堂中中設香燈几案摘封誥中語扁曰樂善慈惠旁構屋三楹塑高曾祖德卿府君而下三像於左考妣像於右像之設尊所出著有功也若池之廣袤減昔十之幾樹植加焉撤去池後屋鑿塹三圍環植蒲柳墓之背積土為崇丘旁築金星二其平地墾土處開置田五畝兼供稅事别建蓼莪亭以為宗人享餕所規模宏博於制弗越楊氏之墓於是乎大備矣竊怪吳中士大夫家牽於風水之說往往棄祖塋不憚數十里以求山地思為子孫利益亦惑矣夫祖宗之心其為後人計於吾豈異哉獨君不混流俗一意先墓而加治焉且其墓去家半里而近朝暮謁拜無防樵牧其為利不既多乎君之識見則過人逺矣余受知於君謂不可無述爰為詳書創制嵗月以勵其後昆俾毋怠焉秋崖壙志朱紈此蘇長洲第一都之原邑人朱紈歸藏之地枕先塋趾射瀆獅山導其前陽山滸墅擁其後都㑹通津經其左虎丘峙焉紈字子純别號秋崖生於𢎞治甲寅九月朔時父圭菴府君以景寧教諭遭誣罷歸之二載嫡兄衣作亂出走下邳之二月也生母太宜人施坐蓐中毒不死三日保紈就邑禁仲兄冠奪哺者信宿賴伯父孟輝伯兄清爭回冠復遏太宜人餉賴巾網糊口不死居百有十日弛禁百死之身太宜人以百死全之孩提識趨髫齔經史得於府君諄嚴太宜人左右以底於成內難嵗作歷涉艱險皆口不可言者正德庚午入郡庠壬申遭嫡母馬宜人喪乙亥遭府君喪服闋己卯領鄉薦庚辰會舉辛亡對大廷賜進士出身觀工部政乞差歸省天曹懲其初預列外選嘉靖壬午除知景州癸未改開州三年考績進階奉直大夫賜誥命丁亥升南刑部員外郎司浙江巳丑升郎中改南兵部司職方庚寅改南吏部司考功三年考績進階奉議大夫壬辰升江西布政司右參議甲午入賀不承當軸治第之委升四川按察司副使整飭威茂兵備實竄之也丙申平溝深諸賊部院上其功賜白金三彩幣三丁酉遭太宜人喪尋升貴州左參政不拜服闋辛丑補山東左參政癸卯升雲南按察使甲辰升山東右布政使乙己升廣東左布政司時封川奏捷附名薦章賜白金一丙午提調鄉試將入覲過家遭人倫之變父子幾不免升都察院右副都御史奉敕巡撫南贛汀漳等處地方提督軍務丁未改浙江巡撫兼福建海道提督軍務時以海冦猖獗創建此官而禁奸除冦勢利家所深害怠與忌者乘之十月入漳州平同安山寇按閩者信讒追論前任之遺得以功贖平生辱薦二十一章至是始一被論然同安非前任所轄也十二月拜敕歷閲海防請以重典刑亂賜軍令旗牌八戊申三月至寧波撫海島倭夷六百餘人入城悉受約束四月襲破雙嶼賊巢五月寧波詐傳詔㫖教夷作亂以殺巡撫為辭于時駐定海以鎮羣棼渡炎海入雙嶼以定不拔之基計賊失其巢往來外洋者一千二百九十餘艘上下連戰皆捷六月閩人周亮奏革巡撫既而漳囚逸入於海大擔嶼大步門大江諸警繹騷時疾甚呻吟規畫無敗績九月兵部録雙嶼之功奏旌之賜白金一彩幣一十月拜敕改命巡視遂輿疾督兵追賊下溫盤南麂諸洋十二月大捷處州礦賊起衢州告急亦平之時經年建白多見阻撓仕途怨讟盈耳閩人林懋和倡狡夷覘我之說命下遣還業就約束者寧波趙文華啖以南京侍郎脅以身後之禍說以市舶之利與屠僑屠大山內外交煽尤力乃連疏請骸骨申辨蹇蹇已酉自溫進駐福寧漳海大捷擒佛郎機名王及黑白諸畨喇噠諸賊甚衆度其必變乃傳令軍前執訊斬其渠魁安其反側先後以聞浙閩悉定五月得請生還困臥蕭寺屠僑嗾御史陳九德論以殘橫專擅衆欲殺之賴聖明在上姑褫職候勘羣非大來竊自嘆一介書生叨冒至此靜思稱塞不過數事在開州恤里甲均戶役在職方革協守之橫在江西定安福均糧之籍剖東鄉安仁割圖之訟在威茂平畨寨處邊餉在山東奪守涉之議在廣東在贛州平政刮垢而巳然未如今日之自慊也人情如此果貴耳邪遂力疾取所集甓餘各卷刋定之著孤臣孽子之槩作俟命辭曰糾邪定亂不負天子功成身退不負君子吉凶禍福命而巳矣命如之何丹心青史一家非之一國非之人孰無死維成吾是治後事囑諸子以登第三十年府君未霑一命之榮不華送死不訃不受弔不祈碑銘配徐氏封宜人子男六貞元郡庠生貞介貞則貞固貞孚貞訓邑庠生女一適盛之繼孫男七篆符簡簽簴篇簵女六家世劬勞載永感録自撰壙志虛卒葬月日如左此志甫就不意竟卒卒之日乃已酉冬十二月十六日辛亥也姪男貞元等遵遺命不敢久停遂以明年庚戌正月癸酉日葬兄紹抆淚署尾吳都文粹續集卷四十三
