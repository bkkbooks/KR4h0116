body:
  text: 吳都文粹續集巻十明錢穀撰公廨奏立州治䟽朱瑄𢎞治十年巡撫都御史朱瑄奏為立州治以安地方事其畧曰臣惟事有便于民者不嫌于剏改政有益于治者不憚于更張如太倉設州誠于軍民便利有六如崑山管轄唐茜涇等處常熟管轄直塘䨇鳳塗松等處嘉定管轄劉家港等處各離縣逺若干里到太倉各近若干里若将附近鄉都分割則納粮當差不致逺涉一也又太鎮二衛本備倭冦而設近年官運俸粮俱徃别縣關支尤為不便萬一冦發城閉何恃以守若立州則粮積充足有備無患二也又城郭内外軍民雜處大率軍多刁横欺凌民户興訟委官不得約㑹以致監禁日久若立州則民有宗主而不致受欺軍知畏忌而不敢縱惡設有詞訟可以旦夕獄成三也又附近人民每将貨物入城變賣有等光棍用強攙賣尋鬧搶奪以致鄉民别處市集變賣路逺費多若立州庶免前弊四也又崇明離蘇州府若千里太倉城若千里其民到府必經太倉而守禦千户所又屬鎮海衛轄若立州統領崇明逺近相制五也衛學軍生例有歳貢三縣民生附近衛學肄業既無粮廩之資又無歳貢之路科第雖不乏人奈解額有定不無淹滯以致皓首窮經無由補報若立州軍民生徒均有廩貢之沾實為後學之幸六也臣愚見灼知有益乞勅該部查照前後建議施行地方幸甚軍民幸甚前存州勘案劉世龍嘉靖三年巡撫應天等府地方都察院右副都御史吳廷舉為撤毁添設州治以蘇民困事㑹同巡撫直𨽻監察御史朱實昌案騐前事案仰本府抄回著落當該官吏即便行同知羅洪載鎮海衛指揮陳岳生前去太倉州公同太倉鎮海衛掌印軍政指揮太倉知州劉世龍等召集概州里老并二衛各年髙父老暨州學師生到官將進士屈儒所奏太倉衛官幷同知郭田所議多方詢訪逐一查勘要見州治應否撤毁民情土俗有無樂從等因據州學廪膳生員王梁等呈為息羣議以安人心事切見太倉州地方古昔為婁縣為崑山州東控海洋原設衛城四險孤危之地三軍無制之區軍人豪強得以自肆販鹽為盜奸宄百端居民受害及有各縣相近土豪大户多與軍衛構黨聲勢相倚欺虐良善事難枚舉𢎞治十年間巡撫都御史朱瑄巡厯地方因見太鎮二衛殊失文武夾持之義以致軍民不便之嗟乃相地度勢廣詢博採羣議協從廟謨俞允是以割三縣附近土地人户并為一州誠千載増建之宜一方維新之治人人慶幸規模既成民治久安三十年來聲敎文物載之大典版籍輿圗登之天府廟有享壇有祀幽明人神咸知天下有太倉州為百世不易之定制矣邇年以來連遭飢荒崑山低鄉尤甚故崑山人户不察大體蠭起妄議以為膏土割分于州而無復仰頼于東南髙鄉此乃一時不揣其本之論况今州治不過割三縣沿海之地一百餘里如崑山一縣尚有腹内膏土五百餘里縣大州小識者以為割分不均何獨進士屈儒反言州有不利于縣且曰太倉之民不可問太倉生員不可問何其說之卑且陋哉芻蕘之言聖人不棄范文正公為秀才時即有志于天下事何謂生員不可問也前任知州等官因見民貧役煩將寄莊軍户一概照田編當粮長似此軍豪結構民間狡黠之徒造揑妖妄不便之說動摇民業煽惑人心昔人剏立之初意謂三縣人民縣治逺隔徃來未便州立則道路適均此一便也今之說者因道路適均之言無隙可議乃託軍民混處借貸不便為辭此何涉于道路之便與不便耶昔謂二衛官軍俸粮在于各處關支䟦涉不便州立則粮儲充足有備無患此二便也今之說者以謂不䝉㑹計存留本州仍舊撥派各縣殊不知㑹計撥派係干上司坐散下州非有司可得而專况今上司體訪二衛軍粮俱被官豪勢要積年弊串關支貧軍顆粒不得似此不行即派官軍自謀不臧何咎于州耶自今以後官軍粮俸得䝉上司撥派本州支給則粮長無轉輸之勞而官軍有坐享之休軍民兩利羣議息矣昔謂太倉軍民雜處軍刁横而民善良興訟害民委官約問經年不得歸結立州則民有宗主約問可以旦夕成獄此三便也今之說者以為軍民同一詞訟有司並不移文徑自拘問不便于事殊不知軍未必皆横惡民未必皆良善同詞合拘事無回䕶問無寃枉何不便于事乎昔謂三縣民人負貨入城變賣官軍攙賣用強搶奪州立則州官自有禁令此四便也今之說者竟以軍衛搶奪為諱專以民快生事為言殊不知強軍豪舍搶奪之事前此常有由於無所畏立州初議故有此言立州之後鄉民入市民快生事嗁嚇間亦有之然有司知而不治豈其情耶昔謂崇明縣與蘇州府杳隔三百餘里至府必由太倉經過立州統治則逺近相安上下相制有便于民者五也今見立州之後崇明人戸多有徙居本州地方生理其崇明本土之人亦各安業但各沙頑民凴險為盜習染既久一時難免今之說者以為添設州治民窮為盜大禍屢延殊不知州治未立之先若劉通金璠楊企等悉皆大盜抑豈立州以致之邪昔謂衛學奏准許令附郭子弟附學無廩禄又無歳貢州一立而均有廩祿之沾乃為後學之幸有便于民者六也今之生徒作養州學濟濟甚盛武軍民生後先而躋膴仕者繩繩不絶不特廩貢均沾而巳今之說者以為州治雖立其民間子弟皆有故邑之想而武職子弟並無陶成之益謬亂造言一至此哉夫前人建立之初意酌量精審寔以便民為心今以差役煩難供億葺費為不便是乃緦小功而不著三年之察者豈真便之于前而不便于後便之于縣而不便于州邪天下大事當覈寔于大體審㡬于大勢不當聽之于細言拘之于末務伏乞以公天下之心持天下之法正大議以定民心存大體以安民業則一方生民不勝慶幸矣叅照呈掲州衛軍民各執一偏之說審其利害宜合衆論之公太倉之地屏蔽東南襟喉大海當今備倭之重鎮昔時海運之故道也國初開設二衛所以捍禦一方先年建立一州正欲犬牙相制乃前人思患預防之逺識而居重馭輕之㣲意故建州之後居常無事則州有譏察之任而販鹽下海之奸隂有所警盜賊生發則州有擒獲之功而䑕竊狗偷之輩不致横行若一旦撤毁則彼海洋巨浸之區東南要害之處萬一冦盜滋蔓倭夷窺伺則其所費有不止于今日之所省者矣他日之患誰任其咎職等博採羣言揆度事理盖進士屈儒所奏固其節費愛民之心不為無見而生員王梁之論尤為有據且僉謂備倭禦盜之地難以輕毁與其去之為便不若存之為愈縁以承委㑹勘事理未敢擅便今將㑹勘過縁由行關煩轉逹鈞裁施行後存州呈議王梁梁呈為乞定大議以垂永逺事嘉靖三年巡撫都御史吳廷舉㑹同巡按御史朱實昌為屈儒所奏撤毁添設州治以蘇民困事備行同知羅洪載指揮陳岳生前去本州公同太倉鎮海二衛知州劉世龍等召集概州里老州學師生人等逐一查勘明白巡撫衙門參照呈掲見得太倉地方屏蔽東南襟喉大海備倭禦盜之地難以輕毁去後已經三年䝉巡撫都御史陳鳳梧案騐准戸部移咨所聞勘得太倉地方冦盜出沒之地三吳要害之區軍民兩便事勢萬全吏習民安已三十年于兹而太僕寺寺丞姚奎復有此奏擬合再行勘處等因䝉本府知府李顯按臨取具師生呈揭照得本學先因屈儒所奏已經詳與論辨今姚奎仍奏前事請以事勢之大者言之太倉之地保障東南一方重鎮誠海洋之襟喉江湖之門户每歳南風至豫備倭舶之來各沙頑民恃險屢肆猖獗之勢且兹地煑海為鹽鹽徒盜賊不時竊發長艘巨艦西至黄山直出荆楚北循狼山徑抵直沽南從寳山餘杭可通閩廣東則三日夜可上沙門髙麗諸地出入無定哨聚無常獨不觀唐之黄巢元之張士誠皆起自鹽徒為禍不可勝言今有州治無事則譏察之任預備之䇿在州也有事則應調之兵擒獲之畧在州也州可妄舉而輕毁之乎次以事體之先者言之兹土文敎始于周文襄公建立衛學一時詩書絃誦達于里巷秀民俊士相繼而登顯要然猛悍擊搏之徒未免雜馳于儒冠博帶之中立州之後軍職子弟皆知習尚禮讓勤事文學昔日臂鷹走犬之風踴躍格鬭之氣一旦頓除比來三次武舉中式三人實為江南諸州之冠州之有功于衛多矣又可妄議而輕毁之乎今姚奎所奏有云𢎞治十年巡撫朱瑄奏立之後人民自此而困徭役自此而繁百姓自此而逃亡土地自此而荒蕪稅粮飛詭牽制自此累歳不能清楚梁竊考見巡撫王恕朱瑄徳望過人智識逺大慮周民物事中機宜是以先後皆有論列而州乃建于孝皇聖明之朝誠百世不易之制三十年來士民感仰二公皆入名宦祠中與周文襄公同享血食後學淺見烏可輕議所謂民困役繁不在于州之立而在于官之得人與否也百姓逃亡土地荒蕪間有于水旱凶歉之歳今則人户如故田土如故也所謂稅粮不能清楚殊不知黄册造報已經三次何不清楚之有所云東連嘉定西接常熟雞犬相聞無廣谷大川之限州治不必建立殊不知本州去嘉定有婁江之隔去常熟有七浦白茆巴城諸湖之隔皆大川廣谷杳茫逺阻謂之雞犬相聞可乎有云添出一畨冗食官員尤為無見立州以來厯任知州未易悉舉如李端之剛正瞿敬之仁厚劉世龍之端簡今陳璜之豈弟惠澤下施百姓受福多矣又何虎狼吏胥之有哉有云添出一番解户粮里徭役然富家巨室在州當此户役在縣亦當此户役也謂之添出一番可乎所謂三縣額設差科一應如故殊不知割去一畝田地減去一畝差科安得謂之如故乎又云費用之倍出錢粮之難查供應廩祿之費以致民困財匱百姓逃亡土地荒蕪税粮欠缺今三十年來乞杳百姓逃亡㡬何土地荒蕪㡬何税粮迄今欠缺㡬何及其先後援引事類皆𤨏屑鄙陋之言非識大體之論未必皆實也有云劉元兆連名具呈廢州巡撫衙門案巻具在今則案巻並無劉元兆名目又云蘇州即舊日之蘇州何昔日户口之繁而今日之逃亡四散乎識者見此莫不大相駭笑未嘗見一州之立而致一府七縣之困窮也使三十年來如此則地方皆為鬼魅之區矣又云准行革州士民聞之歡聲動地如獲更生中止則士民流涕父老追論立州之誤涕泗沾裳梁等生長此土未聞其歡聲若此亦未見其流涕若此姚奎家居百里之外何由而聞見若此如其情實可痛何本州士民曽無一人倡說具奏又云國初至𢎞治年間未嘗有海冦之犯境殊不知成化先後年間海賊金璠劉通等在海聚衆行刦兇焰甚熾巡撫都御史劉孜􅋵江白昻按臨督剿又云立州之後海冦施鈕作亂直抵太倉北門放火刦掠燒毁居民房屋一空臣所目擊梁生長此土寔見當時施鈕作亂隨潮進港至西門止燒沙船二隻並無刦掠燒毁居民房屋一空之說設或有此則州衛官兵失守之罪豈容逃乎謂之臣所目擊則又梁等所不知矣觀于此言則先後反覆之論奏果為觸目時艱而痛心切骨如此乎抑亦别有意乎嗚呼處天下萬世之事當公天下萬世之心少有一毫私意存乎其間實所以欺朝廷欺天下萬世之人也梁不佞敢言幸賜果納新建太倉州碑記畧桑悦凡事天蟄其機而人啟之天無為而無不為人為而實無為事之順天猶納履赤趾畀裘粟肌騁途之夷應以車輿人心恬愉悠久永宜設若違天而行強以智力為之在人為贅疣在木為寄生人欲去之惟恐不速果能堅凝于無期邪天機之人成之人之所為即天之為故曰天無不為而人無為天人合一之道也太倉一名東倉在元時宣慰朱清張瑄于此開剏海運市民漕户雲集霧滃烟火數里久而外夷珍貨棋置户滿萬室延祐元年遂徙崑山州治于此十有六年張士誠據吳始築城鑿池以禦海冦州治復移崑山我朝吳元年始立太倉衛洪武十有二年分衛鎮海並治一城衆議以城内外兵民糅居歳久脆勍莫埒當設鐍鍵以為之防又兵累歳荷戈時屢乏餫或有庚癸之呼且崑山之東陲常熟之南維嘉定之北隅去邑稍逺艱于追呼合三為一并以崇明為屬足為大州安民足兵計必出此𢎞治十年巡撫右副都御史朱公瑄遂以立州事奏聞上曰俞朝議僉曰立州非艱而成州維艱易之在人兹州之立頼有新蔡曹公鳳為才御史出守于蘇湖廣棗陽李侯端登甲科官六察平生勁氣直節聞于遐邇因忤權貴久屈下僚遂擢侯為州守侯至若門堂庫獄廨宇學校橋梁壇壝公寓整造無遺著為成法足以垂示方來當有紀述求予文勒石以垂永久予聞當國初時有望氣者云此州當復興鄉宦髙君宗本陸君容皆作詩歌以紀其實不可誣也然則上天立州之意巳久天何言哉以氣代言而已矣侯今一新州治非成天意歟人心所在天亦隨之立州之後黄童白叟穰穰熙熙凡所便益咸以為晩天心人心并侯之心混而為一共成是州其果偶然者耶使侯為政不能安集三邑之民一興懐舊之心則州猶未新也新州云乎哉雖然新之與舊相為循環千古在前萬古在後兹州之新為後之舊茍繼侯為政者能鼔舞作興新民之徳又興廢舉墮不替舊規益光前烈則州可常新也是非侯之所以望于後之同志者歟州治之建自成化十五年廵撫王恕創議至𢎞治十年廵撫朱瑄始成嘉靖間常熟寺丞姚奎崑山進士屈儒各具奏乞毁州治春坊庶子方鵬上書撫按言設州有九害時廵撫李充嗣勘覆則知府胡纘宗同知郭田知州劉世龍據州學生王梁等議立州利民六事皆謂毁之不便至巡撫吳廷舉巡按朱實昌覆奏始定後給事中朱隆禧奏革州治奉㫖不必革太倉衛治修復記畧陸容天兵平偽吳首建此衛為保障計急先務也衛之規制盖仍州而一新之閱歳百餘舊制蕩然正統丁卯指揮使汪侯鼎修建一二成化丁亥指揮使張侯羽復加修建至歳壬寅指揮使張侯漢汪侯澄僉事郭侯煒白之上官大為葺治于是一衛之舊規以復而偉觀具矣予嘗愛佛老之徒其于所謂寺觀者上無所督下無所利然前作後述厯久繕完彼豈為身後謀哉其心以為不若是則無以重其道盡其分也國家之待武臣世官世祿與國休戚凡有官者茍能勞其心而事其事殆貽孫燕子計耳顧獨致美私居而使公宇不治曽佛老之徒之不若也何不思之甚邪今澄鼎之孫也漢羽之子也前作後述弈世則效則何利之不興何廢之不舉豈直官宇不治之足慮哉衛本崑山州治固矣有以為左丞朱清第者有以為水軍都萬户府者何居盖嘗攷之矣州治即清廢第為之水軍府之設亦常寓此而尋改今衛特云州治者舉其要也太倉衛修造公署記畧龔𢎞太倉衛公署即元崑山州治之故而新之既久就敝而屬司之署尤甚焉嘉靖乙酉夏五月侍御髙安朱公實昌以巡按至揮使傅侯勲合僚屬請捐俸鈔之在有司者以充厥費公韙之移文蘇郡調度惟勤秋八月㑹少宰泰和陳公拜巡撫之命于南衛以狀聞公特許可而復嚴教誡于是太守胡侯纘宗承之以區畫判府蔣君文奎太倉州守劉君世龍承之以平價郡丞周君仲仁承之以聚財節推左君季賢承之以給餉衆工偕作用殫材良巍巍翼翼氣象宏逺始于是歳冬十月甲午迄明年夏五月甲子凡用夫役若干糜金錢若干各有竒乃者揮使請記其事以勒諸石嗚呼斯舉也都憲公與侍御之知大矣太守與百執事見義有勇諸武弁能勉于辭祿與諸董工捐俸官限于碑制未遑表著者亦當别繫之太倉衛指揮使司吳元年立在鎮民橋西南基即元崑山州治𨽻南京中府始設十千户所統軍萬一千二百人洪武四年并為右左中前後五千户所有經厯鎮撫二司領吳淞江守禦千户所重修鎮海衛治記畧葉盛鎮海衛在崑山之東倉崑山舊無衛國初以其地瀕海自方冦後抄掠之患不息特設鎮海太倉二軍衛禦之鎮海衛治城中東偏治事之堂㕔屋廨宇規制悉出開剏之日無不如法而厯年既久亦漸敝矣正統中衛指揮使武侯政始蒞事即合諸僚寀之議與其屬約曰衛兹不治吾奚得而怠然有司繁且逺民力既竭且重其時毋勞民毋煩有司相宜積力加之以勤勵吾與若事也由是工以防戍之休閒者材合有司之助相者有過之請贖者食以捐俸濟以羨餘獻藝效勞程督不愆期始于某年月日訖工于某年月日輪奐一新盡復舊規盖為楹若干工費若干并協力畢事姓氏名用具刻于碑隂使後來者有攷焉鎮海衛指揮使司洪武十二年分太倉衛官軍之半以立在武陵橋西北基即元之市舶提舉司統左右中前後五千户所有經厯鎮撫二司領崇明守禦干户所兵備道勅諭嘉靖十四年皇帝勅曰蘇松常鎮四府係南畿重地國家財賦取給于此徃年因盜賊生發貽患地方特設專官整飭兵備今特命爾專在太倉州駐劄徃來四府沿江沿海一帶地方督同軍衛有司掌印捕盜官員操練官軍揀選民快修濬城池演習水戰緝捕盜賊巡捉私鹽聽理詞訟兼提督各衛所屯田子粒務令以時耕種依期徴納禁革奸弊官吏旗軍人等敢有越占科歛剝削軍士及侵占屯田包攬拖欠屯種者依法究治其各府水利督令有司官吏設法整理湖蕩河港淤塞淺狹者即為䟽濬閘埧隄防圩岸及禦潮海塘坍塌損壊者即為修築不許豪強之徒侵占毁壊違者一體究治仍聽巡撫官節制捕盜事情有應與縂督備倭官員計議者計議停當而行各該所屬官員有亷能幹濟者具奏旌奨貪殘不職六品以下徑自拿問五品以上并軍職參奏處治爾為憲臣受兹委任須盡心竭力正巳率下務使武備修明賊盜屏息水利興舉屯粮充足斯稱任使如或仍前專事逢迎奔疲道路因循茍且虗應故事責有所歸爾其慎之慎之故勅兵偹道在州治東南成化𢎞治官雖設而未有專治正德七年御史王某始請建立以按察副使謝琛領勅專理刑名兵備九年都御史王某具奏裁革嘉靖間巡撫吳廷舉給事中曹槐御史王某相繼奏復俱不得請十四年給事中朱隆禧復請建至是以按察副使李士允領勅至列衘浙江今更山東其巡視之地則蘇松常鎮四府蘇州太倉鎮海金山鎮江新安宣州七衛其所理則刑名水利捕盜屯田十五年李士允于本道建牌坊二東曰澄清西曰振肅遷建崇明州記巴延特穆爾天下之事有緩急之殊審事勢而度權宜凡切于民生關于利害者皆為急務也庸可緩哉崇明州俗尚簡樸無澆競之風素稱易治以沙滷流移逼于州址久而弗遷民寔病焉至正辛卯春達嚕噶齊巴哩雅公蒞事之初顧瞻公署民居日就傾圯慨然嘆曰明詔以安民任守臣不能與民遷利避害坐視淪溺咎將安歸乃謀諸知州程世昌同知土額森布哈即州北十五里髙阜之基慨然有樂遷之志卜既得吉首捐已俸募民力鳩工市材撤朽益堅分任有役督責有規而民之趨事赴工罔敢或怠經始于壬辰閏三月告成于是年冬十月㕔堂幕廡輪奐鼎新麗譙儀門恢宏舊規捕司庫廪完美有條至于遷其廟祀浚築河堤營樹坊舍鎮守府司功業之有成不一書而足此非切于民生有關于利害者而可緩乎盖嘗聞之民心難于謀始而可與樂成昔州之未遷也洪濤駭浪激之而民物日加殷阜焉是皆州候心乎愛民故能剏基業垂久安為斯民者可不知報所自乎傳曰君子學道則愛人小人學道則易使也是州雖僻居海隅鄉校書堂未嘗廢弛吾州之人盍體侯愛民之心薫陶講學益遷于善以禮義立身以忠孝立節庶幾無負于候作新之美意顧不韙歟余承乏牧賛是州鄉之士民以記為請義不獲辭故書此以為來者勸云至正十三年癸巳十二月賜進士出身承務郎揚州路同知崇明州事巴延特穆爾撰更建崇明州記蔡景行皇元慎選守令分治海隅職專而任重事有利害令舉而行重邦本也善為政者審其勢而度其宜則民不勞事不煩而易底于成此崇明州之所以遷而其理之所當重建也崇明為維揚屬州斥鹵衍沃中海而居非舟楫不能至州之境日為風濤蕩擊浸及治所且歳久署宇卑陋有司視若傳舍秩滿即引去忽焉不加喜戚于其心至正十一年達嚕噶齊巴哩雅侯始至歎曰吾奉天子命來守是邦民之休戚繫于上吾民兢惕既無以奠厥攸居而署宇復若是是皆事所當先者焉可委其責于後人而弗之察也于是周爰咨度得地于州之北十五里曰東沙去海稍逺遂遷焉侯首捐已俸為之倡而知州程侯同知州事王侯用襄其議俾州吏錢寔施思敬魏徳新董其役州之人士聞而樂相者奔走恐後掄材庀工其制尤宏于舊工興于十二年之三月落成于明年二月黄堂重嚴門廡輝映幕㕔吏舍譙樓庫庾靡不完好環州有垣環垣有濠周衛緻宻經畫殊至侯復念朝廷以六事責備守令而敎為之首乃先剏孔子廟大闡學宮仍増廩給之粮若干石以為士養師徒絃誦洋洋盈耳思有以振起次及祀典之神食于其土者咸新廟以祀至若軍校萬夫長府率皆宏敞雄偉式稱演武之所工畢其耄倪雜然而至舉欣欣相告曰吾儕小人不意今日復見是州之鉅麗如此實有以聳吾民之視瞻也不可以不記遂䟽其本末介州士董仁禮來諗記于予時予職敎崑庠而婁江與崇明相望僅百里間每獲聞巴哩雅侯為政之善民之頌之若出一口嘗欲一艤舟東沙造觀新州以挹其土風之美繫官于兹願莫能遂乃今庶托文字載名其間抑何幸焉嗟乎民不可慮始而可與樂成事特易于因循而難于首剏是州之民始亦懼其役繁将無以致其力終則樂其功成而為無窮之利非侯之力足以任重才足以立功能若是乎雖然為政之道豈徒奉法制宣禁令而巳若侯者誠為民之司牧能為之深謀逺慮審其勢權其宜而民賴以寧者也後之來者樂署居之廣而思剏始之不易專心一力無曠厥職以侯之心為心則崇明之民庶相安于悠久矣前年海冦犯境侯親率義兵奮矢石扼其要衝而力攻之海冦由是遁去侯之可書不一而足兹姑述其設施之次第刻之樂石以慰邦人之思去而不忘耳侯以長才早備宿衛由雲南討賊崇勲擢太府監勾管願終外艱服闋授平江路縂管府判官今為州云平江路崑山州儒學教授蔡景行撰崇明州唐武徳間于西州置崇明鎮屬通州海門縣宋名天賜鹽塲提督㕔元至元中升為州𨽻揚州路越七十年為潮汐衝齧弗克居達嚕噶齊巴哩雅等徙于州北一十五里國朝洪武二年改為縣八年以去揚州逺甚改𨽻蘇州其南復為海潮堋逼永樂十八年知縣髙居正王瑛指揮使江麟度地于城北十里許地名秦家符遷之重建永豐倉記陳鑑永豐之為倉奠于閶闔門内所以偫長洲吳縣吳江崑山常熟五縣歳入之賦而凡文武之士官于兹與夫介胄胥史之徒之在官者咸仰給焉倉址既隘浸弗能容屋久滋敝其何能偫前郡守林侯一鶚嘗欲闢而新之遽以節憲蒞江右乃止貳守王君仲顯盧君廷敬與二三僚友合辭請于上詔下都憲劉公顯孜遂以委之今郡守邢侯克寛經營量度布位定方縣木置𣙗條列咸具舊有許溪倉隘其坤維徙而稍西地形乃方于是乎羣工子來五材就飭授之成筭無愆指畫弗為過侈以傷難勿為茍成以傷易朴素堅好實惟永圗倉之為屋凡十有一聨三峙其北聨為間凡十有三峙東西者其聨與間之數皆如北二峙其南其為間則視北為贏其二聨為厫者三厫之為屋或四或五不一其數聨又别為小樓五小樓于屋極䟽其櫺以泄米之氣屋下地衡布以巨杉而閣以甓乃藉以厚版以地之濕通為屋以間計者百四十有七以厫計者三十有三以千字文第厫之名天尊而北中據以專其一一竒數也地卑而南分據以擅其兩兩偶數也天地定位于是自北而南復轉而北而東而西既而復東仍轉而西至于陽字而極為厫貯米以斛計者多或至萬五六干少亦不下萬二三千通可貯四十餘萬歳費若干屋其所積可至七八年雖有凶荒之歳民可無菜色也北之左隙髙掲一樓以司更鼓而守者知警焉繚以周垣守以重門以司出入而主者得以防範焉中為砥道抵倉之半則有㕔事三楹司出納者得以蒞事焉此特取其少蔽風日故仍舊館而巳中門之外左為神祠以棲司倉之神右為寮屋以舍庾官之屬倉中之地空曠平衍可晒可晾可委可積收入之頃民尤便焉經始于天順甲申冬十有一月落成于成化丙戍春閏月工既訖功邢侯授簡俾記其成嗚呼天下之事憚其難則慮事機之失忽其易則非經久之圗惟勿難其難則無棄事勿易其易則無茍成兹永豐倉之為役亦大矣大必難難斯憚矣憚則弗為而止爾茍或易而忽焉忽則茍茍則易敝易敝則弗若弗為之愈也初邢侯之為是也忽罹歉歳人曰可以止矣侯曰吾豈無所用情于斯民者哉亦計之審矣先正范文正公救荒之策政欲貧民仰給于公耳且今之役皆公帑之餘不敢傷民之財竭民之力以糜民之骨月也彼無賴之徒皆得餬口公家不至為溝中之瘠顧不可乎既而民不知勞公無所擾而事隱然以辨覆瓦甃甓堅緻完美不為茍作凡所宬貯無久儲速腐之患而公私逺近罔不隠受其賜者矣論者于是始服其雅量之不可及也侯來吳二年小大之政罔不咸宜乃今歳大歉民心皇皇弗忍釋而他去者以所頼有怙恃也詢諸父老皆謂自我朝置守以來未嘗有然即斯倉一事己足以例其餘况大者乎予故詳著于篇庶㡬來者因此以識彼且時其修葺謹其出納相與保之以無墮其成亦可無媿乎侯之用心也夫若侯所過而入民之深者則有甘棠之思在予奚容喙侯名宥克寛其字東廣之文昌仕族子予同榜進士為明執法知台州府轉吾蘇云永豐倉在閶門内即元舊址四面皆水知府邢宥重建厫屋九連共一百十七間各縣粮自起運之餘悉併偫于此凡蘇州衛官軍俸粮及各項公用俱支給于此吳縣修和豐倉記王鏊近世為政者率重改作雖然政有隳壊将坐視其墜乎有垢弊将坐視其棼乎固有所不能也不能則将起其墜理其棼改其舊而新是圗圗之道有二一曰因天二曰因人因天莫若乎循其迹因人莫善乎順其心今天下財賦大半出于東南蘇郡居十之七八吳為縣居郡之二三焉其歳貢京師者為石至八萬四百留縣者一萬六百轉輸淮揚鳳及兌軍者又三萬九千三百夏稅三千四百有竒又有所謂加耗者不在是數而皆于和豐焉是儲倉剏于正統己巳巡撫周文襄公之為也迄今盖五十六年矣𢎞治壬戌遼陽孫侯伯堅來知縣事政治敷宣奸宄屏息侯憫吳民之􅉵也顧未嘗有所興作甲子二月和豐之月字厫灾民未遽怪也三月張字厫又灾五月視事之堂又灾人情大駭侯獨晏然曰吾知之矣其欲吾之重新焉耳乃命撤汚扶傾鳩工庀材二厫重新堂寢具完非侈非陋經始于五月日至十月日僝功焉非所謂因天而循其迹者乎問材焉取不戒是懲問功焉出不毛是罰非所謂因人而順其心者乎因天之迹則民不怨因民之心則役不勞孫侯可謂善為政也于是吳民相率求予記其成以彰侯之美盖是堂之作有三民財之斂也于斯民財之散也于斯其訟之聽也于斯斂之貴平毋徒取其嬴也散之貴周毋徒取其嗇也聽之貴公且明毋徒取其速也是政之大者也吾故為記之于壁以規于來者和豐倉在胥門内周圍一百五十畝有三門厫屋三十六連共四百三十二間𢎞治十六年連灾焚厫屋三連及㕔事知縣孫磐繕完濟農倉記王直君子之為政也既有以養其民矣則必思建長久之利使得其養于無窮盖仁之所施不可以有間也蘇州濟農倉所謂建久長之利而思養其民于無窮者乎蘇之田賦視天下諸郡為最重而松江常州次焉然豈獨地之腴哉要皆以農力致之其賦既重而又困于有力之豪于是農始敝矣盖其用力勞而家則貧耕耘之際非有養不能也故必舉債于富家而倍納其息幸而有收私債先迫取足而後及官租農之得食者盖鮮矣則又假貸以為生卒至于傾産業鬻男女由是徃徃棄耒耜為游手末作田利減租賦虧矣宣徳三年太守况侯始至問民疾苦而深以為憂㑹行在工部侍郎周公奉命巡撫至蘇州况侯白其事惻然思有以濟之而公廩無厚儲志勿克就七年之秋蘇及松江常州皆稔周公方謀預備適朝廷命下許以官鈔平糴及勸借儲備以待賑恤乃與况侯及松江太守趙侯豫常州太守莫侯愚協謀而力行之蘇州得米二十九萬石分貯于六縣名其倉曰濟農倉盖曰農者天下之本是倉專為賑農設也明年江南夏旱米價翔貴有詔令賑恤而蘇州飢民四十餘萬户凡一百三十餘萬口盡發所儲不足贍田里多餒殍者周公復思廣為之備先是各府秋粮當輸者粮長里胥皆厚取于民而不即輸于官逋負者累歳公欲盡革其弊以惠民是年立法于水次置塲擇人縂收而發運焉細民逕自送塲不入里胥之手視舊所納減三之一而三府當運粮一百萬石貯南京倉以為北京軍職月俸計其耗費每用六斗致一石公曰彼能于南京受俸獨不可于此受乎若請于此給之既免勞民且省耗費米六十萬石以入濟農倉民無患矣衆皆難之而况侯以為善力賛其決請于朝廷從之而蘇州省米四十餘萬石益以各塲積貯之贏及前所儲凡六十九萬石有竒公曰是不獨濟農飢凡粮之逺運有所失及欠負者亦于此取借賠納秋成止如數還官若民夫修圩岸濬河道有乏食者皆計口給之如是則免舉債以利兼併之家農民無失所者田畝治賦稅足矣是冬朝京師以其事咨户部具以聞上然其計于是下蘇州充廣六縣之倉以貯焉擇縣官之亷公有威與民之賢者掌其帳籍司其出納每以春夏之交散之先下戸次中戸斂則必于冬而足凡其條約皆公所定畫俾之遵守又令各倉皆置城隍神祠以儆其人之或怠惰而萌盜心者宣徳九年江南又大旱蘇州大發濟農之米以賑貸而民不知飢皆大喜相率詣况侯請日朝廷矜念吾民輟左右大臣以撫我思凡所以安養之術盖用心至矣而又得我公協比以成之徃者歳豐民猶有窘于衣食迫于債負不能保其妻子者今遇㓙歉乃得安生業完骨肉此天子之仁巡撫大臣之惠我公賛襄之力也今濟農倉誠善矣然巡撫大臣有時而還朝我公亦有時而去良法美意懼其久而壊也則民何頼焉願刻石以示後人俾善繼之永勿壊况侯然之屬前史官郡人張洪䟽其始末因醫官盛文剛來北京以書請予記予觀成周之制縣都皆有委積以備㓙年隋唐社倉盖本諸此我太祖髙皇帝嘗出儲幣恵天下耆老俾積榖以濟民亦成周聖人之意也厯歳積久其弊滋甚至于無所質究有司亦不之問而豪右兼并之家盖無處無之則天下之民受其弊也多矣豈獨蘇州哉今蘇人得我周公以沈毅閎達之資推行天子恤民之仁况侯以闓敏勤慎佐之收其枉費以施實惠而民免于餒殍之患豈非幸哉後之君子因其舊而維持之使上之仁被于無窮而是邦永有頼焉豈持其民之幸乃二君子之欲也故為之記使刻寘六縣之倉以告來者若其為屋若干楹所儲米若干石典守者之名氏與其條約之詳則列之碑隂而諸縣皆載焉使互有攷也獨崇明縣在海中未及建置遇歉歳則于長洲縣倉發米一萬石徃賑焉其為惠亦遍矣周公名忱字恂如吉安吉水人况侯名鍾字伯律南昌靖安人其厯官行事之善當别有紀載之者此不著濟農倉在婁門内東城下宣徳間侍郎周忱建厫四連共五十四間常熟縣濟農倉記張洪理財正辭孔聖之心見于易預防患難周公之志形于詩道雖極隆時雖極治亦必以財為養民之本理財之道備然後防患之慮周故堯湯之世水旱不能為凶荒也欽惟太祖髙皇帝臨御萬方修復古聖王之道樂歳粒米狼戾則斂而藏諸民間凶歳民食不足則發以賑之行之既久下民弗䖍名存寔廢聖天子萬幾之暇惕然念之乃于宣徳五年分命六卿巡撫天下郡縣爰是工部右侍郎廬陵周公來旬來宣以惠南國巡厯江南諸郡惟蘇松常之賦比他郡相為倍蓰壤地不過二千里而京師百萬之衆待之以供物産人力宜其竭矣當春夏之交農民竭力畎畝而饘粥不繼未免出加倍之息資之富人富人與之若投餌穀始登塲則勾取其子本以僅存之餘供倍蓰之賦不足又舉而償之是以常賦未充甑釜己無烟矣公深悼之達旦不寐思所以援之之䇿七年秋㑹詔㫖以庫藏之儲平糴又勸富人之粟以待凶荒公與蘇州府太守况公同心同力以全活窮民為己任出庫儲糴米三萬石勸借富人九萬石撙節漕運浮費五萬石捜剔豪右侵占絶户田租一十二萬石通二十九萬石分貯六縣每縣置倉六十間常熟貯米五萬餘石増置倉四十間共百間縂曰濟農倉盖農為天下本况蘇松之農又為京邑之本之所在哉明年夏江南大旱民無食輟耕行斃公發濟農米賑之困瘁者生氣出死力以挽桔橰轉川澤之流代為霖雨枯槁者潤澤焦卷者俱芃芃矣適遇海舶自諸蕃回供費浩繁庫藏赤立公私洶洶懼弗克供公以濟農米廪食之民不知費邉海軍士乏食公從容措畫餽餉相繼軍民蘇息宜少安矣公方竭心勞思以營來歳之計稽攷民間所入之賦去其浮費三分之一民受寔惠銘刻心骨既而常賦充足又收羨餘得粮積三十二萬盖取豪右侵漁之資非加賦也又増置六縣倉獨常熟居其三分之一盖倉廩四十間通一百四十間㢘隅整飭如矢之直結構完固如竹之宻風雨鳥䑕之害逺不相及工不告勞民不知費何其敏哉以公知人善任使命常熟縣主簿郭南專理賦稅南以感公知巳盡心力而為之防慮周宻􅊏悉無遺滌塲之月賦已告完自洪武初至今未之有也倉廩既成粮米充積居人過客相望者嘖嘖載路既而曰家有成法尚欲傳之子孫上有嘉謨可不貽之于後于是官吏耆民粮長吏胥僉曰天子恩詔公敷布之窮民之生公全活之無所論載寔為缺典乃相率造于舊史氏之廬請紀其寔予按太公立九府圜法所以權輕重之宜使農末相資無甚貴甚賤之貨而常平義倉寔託始于此得聖人理財之遺意今以濟農為名則所重在農農重則本固本固則百度舉常平義倉之制亦行乎其中矣且使農民知其為我而設雖有旱乾水溢之時而不恐誰敢放逸其心志或有侮予者乎有一事而兼衆美者此之謂也詩云君子所履小人所視言君子之所行小人視以為法信斯言也則斯倉之建其引而不替哉重建濟農倉記李傑國以民為本民以食為天故孔子論為政而先于足食孟子論王道而先于養民是誠有民社之責者所當先務而不可緩者也何則歳之豐歉無恒所恃者吾之儲蓄有恒古者三年耕必有一年之食九年耕必有三年之食而縣都之委積則有遺人掌之以待凶荒此所以雖遇水旱而民無菜色也今府州縣濟農倉盖深得古人之遺意然其興廢則存乎有司之良否焉爾常熟縣濟農倉舊在城之東北隅為楹百有四十乃宣徳間巡撫工部侍郎周文襄所剏建者也方是時積餘粮至二十萬石每歳以春夏之交散之先下戸次中户秋成之後止如數輸官自是民免假貸于富室以出加倍之息田資之以治賦由之不逋公私利頼後有司漫不加意倉漸傾圯至成化初年而遺址鞠為草莽有力者佃為已業隣近者侵為私舍餘粮無所儲蓄則寄于東南二倉一耗于侵欺再耗于浥腐而儲蓄蕩然矣先是巡撫都御史某公甞建議命工繪湖州府濟農倉制規授邑令俾圗修復議未幾公遷少司徒還京事未克就𢎞治乙卯巡撫都御史四明朱公旬宣至縣詢及民隱首以是倉為生民休戚所繫命蘇郡節推麻城萬君分治常熟責以設法營建既而有貳守之擢君荷朝廷異恩又感巡撫公知巳盡力而為之君知庫藏虗竭民力疲困乃籍逺年侵逋粮料而繋于獄者得三百餘名召人保領限日鬻産以償其逋而輸銀于官至貯于縣庫出納則君自掌之凡瓦甓木石之價工匠夫役之直皆于是乎取給適郡主洛陽史侯以公務至縣相與謀度區畫務為經久之計君徃來督工不憚勤勩且擇義官數人分董之百需無缺衆力競勸不兩月而公廨五間倉舍六十間修已並建懼風雨之虐凌也四壁皆累之以磚慮潤濕之蒸薄也離地而布之以版君又以嗣是而後餘粮充羨不足以容方鳩工度材復圗増廣至百二十間他若周圍之垣墉左右之橋梁道路靡不修築完固官不知費民不告勞而績用速成人心胥悅于是縣之耆老粮長里胥僉謂巡撫公恤民之深郡侯謀畫之審貳守綜覈之宻剏立之敏均不可無記述以示永逺乃奉重慶太守致仕沈觀蘭之狀屬筆于予且惟我朝洪武中縣設預備四倉以俟賑濟皇祖養民之至仁良法萬世所常遵守者也四倉廢而濟農之倉立實前賢所以奉宣上徳而惠此下民若之何又廢而不復乎况列聖軫念黎元一遇歉歳輙下賑恤之詔有司以儲蓄之乏也束手無䇿坐視民之流離困苦而莫之救食天禄治天民者顧當如是耶是倉之成後之為政者嗣而守之以時克修葺之則常熟之民庶乎永有頼焉為記之俾刻諸石濟農倉在縣北里許洪武間建初名預偹宣徳七年侍郎周忱知府况鍾又即宋順民倉址建厫百間以貯平糴及勸借米後廢𢎞治八年巡撫朱瑄重建祭酒李傑記義役倉記張洪古之役民歳不過三日蘇威父蘇綽任于西魏以國用不足征賦頗重既而嘆曰今所為者正如張弓後之君子其能弛乎威聞其言毎以為己任至隋文帝時威為納言奏减賦役人每歳不過三十日後國用充足益寛徭役自唐至于汴宋役弊未興南宋土窄人稠師旅數起國用不足征役浩繁弊由之生長民者始為義役之舉矣縣之役有押録手力貼書書司㕔子牢子市巡㪷級欄頭務司直司等名其目二十有四鄉役有鄉司鄉戛機察等名其目未詳皆保正保甲供其費未免于常賦之外取之于民宋嘉熈初王爚為常熟縣知縣憫民之誅求立義役荘令富家出助役田共五萬五百餘畝歳收租二萬五千石分撥保正長以供役費咸以為善政自今觀之既無冗役亦無冗費其有科徴亦以備軍國之需耳但循舊弊未能革去之也所謂弊者如所需之物直米五百石毎里該徴一石里長則每甲徴一石已什倍矣甲首徴于編户又加倍蓰一槩動摇民不堪命至有鬻妻賣子又不足供則舉家而逃者民既逃散所徴皆出于甲首有舉償而累歳不償役一年而破家者也又有無籍頑民攬納侵欺為弊百端不可枚舉上虞郭公世南為常熟知縣深知其弊常防其源不敢出一言及科徴事然上司明文有合供者又不可廢乃詢其民曰吾欲令見役里甲毎里均出米五十石邑五百里計米二萬五千石申達上司公同支用庶免以一科十之弊于若等為便耶衆曰昔時甲首應役一年腿無完肌家業蕩盡今助米五石則有十年之安政之善者莫善于此令上之府太守况公曰有善政不宜私吾民當均被于天下遂上之朝報曰可令以邑之羨餘買民田七畝及棟楹椽桷屋瓦級磚之材置倉二十一間南其户者九間為出納之門二東西其户者共六間出納之門各二繚以周垣限之河塹始事于宣徳九年二月初吉用其在官者之餘力不役一夫未踰月而蕆事乃請具興作之始末為之記以貽法于後嗟夫義役之興逺矣予必備述者見力役之始也次及歴朝變法之詳者雖未能復古而亦為救時之善政也今郭令與民相約不遣人追呼期㑹必至昔之諸役一切剷除既無役費矣而義役之儲惟待軍資器物之徴耳若上無所徴則下無所用不将補不足助不給以裕民乎非但力役可以復古而補助之政亦将因是而起矣雖然事有名同而實異者義役而已王令之義役将以供役人之費郭令之義役将以禁其多取于民皆因時制宜名雖同而實不似後之君子為政于斯者當求其實可也常熟縣東西三倉記劉定之夫蘇為郡田土膏沃賦入甲海内常熟在蘇邑中尤地美賦多觀邑所以名則豐稔盖可歳必良由近海潮汐消長自溝港達隴畝無旱乾水溢之患然則治其田賦詎可忽乎舊時各鄉設倉散無統紀弊積于中正統間巡撫周文襄公忱縣設兩倉於東與南去縣甚邇且在水濵民便納賦官易典視弊漸減矣然築土為墉積茨以苫其成弗難隳壊亦易巨魁里胥歳斂于民以補葺之因而侵漁尤妨貧弱自周之後屢易巡撫重臣雖惡是而未暇改為今天子嗣位初令南京刑部尚書劉公孜以都憲踵周之任甘令邦澤自監察御史廣西臺副來綰縣紱綱維舉張枘鑿契合咸以兹倉為念于是謀諸郡守邢公宥捐俸于已鳩材于義易兩倉朽腐以堅木良甓豁狹址以廣之聳卑宇而髙焉倉四方各有門門内各闢為塲塲各有官吏治賦之署各有貯米厫八十間合兩倉八塲計之六百四十間始事于丁亥五月乙丑落成于八月甲午民以賦來者入門而改觀瞻至塲而便委積㑹計明于署轉輸集于厫盖向者厲巳之憂無所與焉助甘處畫是役者典史周從善也叙其事走介京師者義士劉傚也以傚來求文者邑士周中書紹榮也夫今郡縣使民弗獲遂休養庶富多由于稅賦無善政而然然則斯倉之成可無記乎記之非特彰修者美亦以俾後為政者思繼又使鄰封聞善者思傚則于民豈小補哉成化四年歳次戊子八月吉旦賜進士及第通議大夫工部右侍郎兼翰林學士永新劉定之撰二倉一在縣西南二里一在縣東北二里吳江縣重建濟農倉記楊循吉進士廣平郭侯以𢎞治九年奉命來宰吳江縣政令之建茍利于民必黽皇以盡其力于是興作具列而濟農倉之復厥功懋焉倉在邑城北隅宣廟時故巡撫工部侍郎文襄周公所設以貯餘米而賑農者也其法稔則積荒則散若古常平民用利頼而與水次諸倉逺隔三里别而弗混所以分正羨示專獨而清出納先正為人之意甚逺而不可忽也審矣先是景泰中民大飢乃始盡發所積哺民而荐荒相仍莫有以輸倉由是虗廢有司因撤而畦之倉之弗復盖四十年于兹矣侯至首閱廩庾考盈縮而豐年適登陳陳相襲所謂羨餘之粟或塞正厫而不得發乃上稽文襄之制覽故倉之基慨然以為天子仁聖惻憫黎元以屬之邑吏今倉名濟農而漫不加省将非職且俾儲無别而校無徙斯粟之所以敝也盍取而復之乎詢謀既同請諸執政並許得給度支勸從事乃鳩材召工惟賢若能而以屬吏沈經與義民之謹者龎鏞等司其市買而督工程焉凡為厫八十間計其所貯可容八萬而制作堅宻匡直如矢凡官程之茍簡者盖一一皆侯心思目力之所至也其經始在十一年春二月工已垂就而侯以守制去任先期具倉事支費聨為記簿程約一毫絲皆明析有條且督勵主者以速竣事盖侯之律巳嚴潔而國爾忘家如此至是儒學教諭髙公來屬予記昔文襄之為是倉也盖遍于六縣而吏部尚書王公寔記之予讀其文而知當時建立之不易以為後世良法之蔑以加也然昔之畦之者必曰一水次足矣奚濟農為遂使君子澤人之道不旋踵而沮是豈知益國而惠下者㦲今侯乃克重恤民隐舉墜典而復之可謂得為政之大體矣其邑之人将洋洋而歌永永而思乎侯名郛字于蕃肥鄉人髙君名志曲阜人用敢詳書以記于兹石濟農倉在北門内侍郎周忱建厫屋五連共七十二間後廢𢎞治十一年知縣郭郛重建崇明州常平倉記姜漸崇明本唐海漲之地有東西三沙州治東沙之中視兩沙為最貧其地不宜五穀居民恒逐魚鱉之利仰商賈貿遷以為食或風濤寇警縣皆懸釜以待爨其西沙稍出粟米不足以給税賦故三沙米粟之價常倍于他處不待飢歳而已困矣今同知州事孟侯集既眎政之三月乃攷其利弊而閱其官有儲粟因慨然曰此獨非為民父母之所當究心者乎欲拯其困非常平不可按此州舊有二倉久已湮廢遂具文于州轉以達于大府設常平故事大府從其請命以所儲粟二千石令施行之乃與同僚之士判官賀君庸相州治之南建屋凡三楹為常平倉與永豐倉對立其出納仍命永豐倉官屬兼掌之功甫就適春夏之交隂雨鮮霽二麥不登居民嗷嗷米價騰湧遂開倉依舊制損時值十三以糶而米價為之頓平侯喜其政之成而懼其久或廢也走書東吳屬予記其事余以為古者倉廩府庫所以為民豐斂歉散而民無飢之憂後世民之入于官者既不可復冀而凶年飢歳有司坐視而莫敢發則所以周其民者惟常平為近古其法起于西漢而近世講之尤詳豐年則斂飢歳則散可以平物價抑兼并人有接食官無折闕法至良也然法雖存而行之非其人則徒法而已傳曰其人存則其政舉可不務乎侯之于此盖知所本矣侯故宋外戚大家其先世皆以儒術致位通顯而侯尤讀書績文嘗佐大藩為諸侯賔客選受是職則其為民之政盖舉而措之耳噫侯之于民如此民其有不服侯之教者乎此雖非侯所以屬記之意并書以告來者庶㡬承侯之志奉侯之法有以推上之徳惠斯民于永久也至正二十二年冬十月甲子日御史行樞宻院都事姜漸撰常平倉在州治前捕鹽司之東吳都文粹續集巻十
