body:
  text: 吳都文粹續集巻十一明錢穀撰公廨古蹟驛逓重修姑蘇館記吳必大炎宋中天翠華南幸杭為行在所遐方拱衛奔走率職惟是一介行李其過都國必館吳為館二以南北名從其便也門而扁之曰姑蘇最後為百花洲洲旁胥門故址臺而居之亦曰姑蘇羣山拱揖西爽朝暮耕疇漁滸華門茨舎天作地産綺錯而碁布也山之外陽波宅焉其上樓館翼然有光虹貫遐晞近照景態萬千尚想驛官過從瞻仰閎壯固巳目眩心駭不煩專對而語寒内慄嗣是數十餘年兵革稍息館亦浸浸入於壞部使者亦無復知去日始至之義雖寓此不三宿輙脱去如遺鮮過問者大抵豐狐蚍蟻據而宫之矣太守陳公均以老手承敝緒治理勤止期有月郡始神復氣還乃新婁齊二門將繕斯館㑹命召弗果出少府儲錢凡萬五百數告新守古栝季公鏞願訖圖之公延見吏民興行政教迨我暇日爰即爾工既成費視永嘉公有加大合國寄公落之屬雋濵人吳必大為之記客或進議曰臺館常並稱館非臺無以示壯麗臺非館無以欵遊觀子必為記臺為先予曰若安所得此語始吳築臺姑胥高可三百丈宴安鴆毒故自敗也今明天子在上賢卿相在左右宫室苑囿無所増益珠胎翠羽雕文刻鏤之貢先是而戒四方萬里有孚顒若咸曰君王儉徳太平其今日乎承流宣化伊太守職何壯麗遊觀為詩曰殷鑒不逺在夏后之世臺名之存以志古也姑舎是吾請為若言館古者王人出聘館於諸侯之祖廟若朝王若相䀻乃舎之他所故覲禮侯氏天子賜舎晉文公無觀臺榭惟諸侯之館是崇大子産稱之國無寄寓縣無施舎單子知陳侯之必有咎吳去天咫恭行肆覲實京師通逵賓旅或以歲事尊於天子此之弗務至者何觀吾儕小人且滋愧矣萬一有高車華軒馳傳騖至儼然辱而臨之將何容焉寒暑燥濕無所避誰其廢禮則夫翼卑以高砥窪以平規隘以寛登也有臺濯也有池歩也有亭射也有圃堂立五丈之旂廡環萬兵之帳主恬從安各贍其事夫安得不汲汲入如得歸出重回首斯館也其昔所謂傳舎之尤者乎矧方千里王畿之内人從日邊來入有逆勞公其庶幾承事無違以教天下之勤於典職者客謝非所及則書以記而又援愛棠之意告後之人俾勿壞曰惟二康侯蕭規曹隨停舫行艘駐節來麾於我乎館是適是宜是隆藩服實邦之儀匪惟一邦四鄰視之曰治天下亦如此屋先民之辭三極與立非人疇依人之能然惟志所之以是心志孰顛不扶孰危不持將多前功毋替後思來今億年敢以此規宋咸淳二年五月既望奉議郎添差通判平江軍府兼管内勸農亊吳必大記姑蘇館紹興十四年王㬇奏建軒厰壯觀中分南北為二館咸淳中重修姑蘇驛記方回姑蘇山在今吳縣西四十里昔吳王闔閭築姑蘇臺於是山高見三百里秦屬㑹稽郡漢改吳郡東漢分置吳郡於闔閭城隋平陳置蘇州唐因之宋太平興國中改為平江府而紹興初有舊姑蘇館在盤門内河西城上其下有百花洲洲為姑蘇名勝地以故臺與館用姑蘇山名之二字古迹所從來舊矣舊姑蘇館今改為驛若姑蘇郡姑蘇臺皆一新之新之者誰嘉議大夫平江路總管真定董侯也詩曰周雖舊邦其命維新康誥曰作新民易革去故鼎取新四序推遷一寒一暑舊而無以新之則乾坤之生意不幾於息乎東南郡蘇杭第一杭今設行省南海百蠻之入貢者南方數百郡之求仕者與夫工藝貿易之趨北者今日杭州明日而蘇天使之馳驛而來者北方中原士大夫之仕於南者東遼西域幽朔之浮淮越江者今日蘇而明杭是故蘇為孔道陸騎水舫供給良難大徳五年辛丑七月朔淮浙閩海溢動百里潮高數十丈為患巳甚而蘇之颶風尤惡吹郡治離平地起虛空而後墮吳長洲縣亦然僧寺樓二十四撤其樓擲其鐘居民之高者或不免朝棟樑而暮瓦礫太湖之水幾入葑門館亦就圮傳舎蕭條畧如廢寺閱月而董侯至爰建議鳩工築登削憑首新郡治繼及姑蘇驛曰館曰驛曰站名雖三而義一新三站而其地一馬站曰光逺旁曰思政亭水站曰賓賢傍為通波亭以至遞運站鞍韂舳艫僕從烝徒之需無一不飾帷幄瓶盎坐卧飲食之器無一不具而百花洲以娯過徃賓客至者翹首駭目憩勞息倦發喜生欣高則摩雲之鴻梁漢之鵲扳摭於九霄之上逺則飛雪之棹順風之㠶睇眄於千里之外橘柚汀洲蒹葭浦嶼漁榔響而浩歌織杼鳴而幽笑可以拓詩思助酒豪者悉與衆共之而弗靳侯又開驛馬大路平廣十餘里出城與盤門外橋相接大書姑蘇驛三字扁之而他題顏皆侯老筆雖然毅而寛亷而明先有一新乎巳之心而後舉措云為使人改視易聽有以新乎民之心僉謂侯至郡未幾男女異路貞信有别獄訟鮮少道不拾遺城社屏迹巷無鄭聲酤糴烹庖物饒價平究其所以然則知侯公退之暇不入内閾清坐絃歌每過夜分作善教二十四條父老刻梓大抵以勸課農桑敦厚風俗為急務所以新巳之心者既至新民之心何有昔晉文公崇大諸侯之館館如公寢是以得諸侯為中夏盟主銅鞮之宫數里而諸侯舍於𨽻人趙文子是以不競而子産得壞其垣子故俯仰古今而於姑蘇驛之舉必大書特書侯名章字文卿學者稱為小菴先生嘗守當塗年六十餘博學尤精於春秋云姑蘇驛即宋姑蘇館址增飾之大徳五年摧毁董章新之元統元年張惟古乃構亭於南扁曰春澤至元二年道童建館及橋扁曰來逺北館曰瞻儀亭曰凝香南館曰賓賢移建姑蘇驛記丘霽姑蘇驛有二一在府治西一在盤門外丞一人統領之郡當南北要衝授館致餼者無虛日而府西驛巳久廢盤門者存亦就弊矣且去府治逺禮賓徃來上下告勞霽假守是郡之明年思移置之請於巡撫大臣曰可請於巡按御史曰可遂度地胥門外遞運所之南負城面河地頗陿弗稱乃植木水中為滉柱作石堤三面凡四十六丈廣地得縱八丈衡如堤而殺丈十六建屋六十楹皇華亭據其前後有重屋名昭賜之樓著所自也燕休登覽盡得山川之勝庶幾乎所謂中吳之偉觀也檢校舊材更新運所門驛亭費不出民皆自禄餘分減十閱月而告成於時禮賓眡觀衆志咸惬昔晉以𨽻館子産毁之陳無施舍單子譏焉矧兹大邦規畫未備霽不敏恭承天子休命來綏兹土安敢妄自菲薄亦為所當為而巳是役也其容巳乎雖然成之亦不易也來者尚嗣葺焉郡守丘霽記姑蘇館賦惟東南之鉅邦雄峙於徃古蹇予才之撇莩承君命以守土慨夫館傳僻在一隅湫隘弗治使客欷歔粤自春秋之世王人四牡騑騑陳無廬舍之寄而來單子之譏矧大明一統蘇為畿輔地聯乎兩浙八閩翼衞乎神京天府臣工徃來兮絡繹星軺駐止兮旁午烏可庸僻館敗舎漏甕焦釜耶彼前人兮安故循常豈予心兮民勞財傷匪直館舎兮廢墜荒凉徵諸民事兮百孔千瘡海潮汎溢兮無障吳淞壅兮水漲湖隄崩頹兮連遷蕩漾圩塍圯毁兮同波潢瀁民多轉徙兮失厥仰望歸咎凶嵗孰克餔餉余乃窮水利考源流究心力廣咨諏佚道使民兮雖勞勿怨農桑政本兮雖休勿休省費而積厥儲也節勞逸於民力兮養其餘也袪奸頑兮稂莠則芟鋤也革宿弊兮紛亂則爬梳也於是南治太湖及五十里東濬吳淞流澤既底湖隄堅兮石齒齒湖波平兮岸壘壘人事既殫天心協應兩嵗告豐兆庶駢慶予始度地於胥門在姑蘇臺前基負城堞隄廣河堧驛館移建運所比聯民樂趨事工率赴䖍經營規畫不日成焉宿有舎兮深室庖有厨兮廩實𢎞面陽之堂兮寒可攸寧高皇華之亭兮暑以憩息前闢重門兮㕔事言言後起層樓兮䦨楯殖殖偶憑臨而眺逺兮忽山水之呈竒匪造化與心㑹兮何嘉勝之紛如天平􅍶崒兮玉柱中峙秦餘靈岩兮左右拱趨獅峯虎丘兮勢若奔赴伏龍黿頭兮形若飛舞渺渺太湖兮檻外之一泓分支流兮胥口來通横出驛館兮漫流無聲㑹衆派兮翟洋朝宗蘇人兮咸樂遊觀兮聯絡頋笑兮踏歌酒巵兮肉槖余乃諏日與客登樓而落成之客有贊曰館傳之遷不獨便使臣之往來節上下之勞佚俾山水之久沉暢一朝而突出閱他邦之勝概或彼得而此失誠卓冠乎東南宜牓之曰吳中勝槩第一或謂客曰子知遷館傳之便而不知民利興獲有餘力徒知賞勝概之樂而不知豐年屢煖衣飽食向使太湖水漲吳淞壅塞海潮壞稼民用菜色山無蕨而餔飢澤有波而淹洫雖欲遷館疇任作息雖有勝概遑暇崇飾此役之成用民力於普存信一舉而數得客乃舉酒夀余曰太守興利兮萬口為碑太守遷驛兮民如不知眼見吾人含哺鼔腹而遊嬉實由太守瘁心殫力以撫綏余曰子尚未之知也天不遺民兮久􅉵而賜之有秋民不遺天兮力有餘而共成厥謀勝概吐秀而獻美兮亦從民樂而承天休余何功徳之有敢當許予之優於是名曰昭賜之樓客觴未巳余復酬之乃歌曰山峯矗矗兮拱驛樓湖水泠泠兮環驛流羌湖山兮清且幽郡人樂兮守來遊豈予暇逸兮與客倡酬聊亦寓兮江湖之憂昭賜樓記劉昌成化十年知蘇州府鄱陽丘侯以郡城之胥門故姑蘇臺葢宋王㬇作而亭館之廢久矣乃移建姑蘇驛於其下以與遞運所並匪徒舉曠典復舊觀亦以光國容便給役也既又作樓四楹以登以玩而太湖之水由石塘注運河踰城而西以達於驛以北出市衢縈迴映射䦨楯之間光景浮動城西諸山則如旂旄騎從前導後擁滃然而馳集其大者左曰穹窿右曰秦餘杭高拱駢峙若張翼而進者而天平一峯號為郡鎮端重如玊柱以領勝概於羣山之中而樓適臨之其羣山之勝有曰堯峯五塢仰天秦臺皆如正人直士陪位而坐秩秩如也此天所賜以壯固乎我蘇而蘇民若未知者樓居既成山若加培水若加浚若天墜地湧一日而有驛復雄麗且邇遞運所凡禮賔往來百需悉具無向者離越留滯之患此皆丘侯之賜也丘侯曰不然我之成是役實惟洛陽畢公公以天子股肱之臣來撫來巡吳民恬嬉而吾志用成此畢公之賜也畢公曰不然朝廷安養斯民既百有二十餘年禮樂之教仁義之化已深入乎民心民供賦出力之餘益務於忠孝勤敏勤敏則不懈忠孝則易使不懈而是役成此朝廷之賜也而朝廷諸節使之行過是驛者又言天子以四海九州之民付守令茂圖治理而不自居其功今海内乂寧民不知兵以樂農耕蘇為東南大都嵗比有秋民得從丘侯復曠古之典表一郡之望以助成國家萬世之業此又天之賜也夫天之賜朝廷知之而民不知朝廷之賜大臣與賢守令知之而民不知民之所知者曰惟丘侯之賜則丘侯推厥所由可不思所以昭顯天與天子之賜之深於無窮哉裒聚翕合於此而使民知之此樓之所以作也請名曰昭賜樓而為之記丘侯名霽字時雍天順甲辰進士以刑部主事擢今官博學善文而多佳政云姑蘇驛舊在胥門裏河本朝洪武元年知府何質移置盤門外初名姑蘇站提領一人掌之二年改站為驛提領為丞成化九年知府丘霽重改建於胥門外基半築於水廣袤數十丈背城面河北有延賓館後有樓曰昭賜可以登眺丘自有記昇平館釋洪偃蕭蕭物候晚肅肅天望清旅人聊杖策登高蕩客情川原多舊跡墟里或新名宿烟浮始旦朝日照初晴獨遊乏徒侣徐步寡逢迎信矣非吾託賞心何易并昇平館在梵門橋今有昇平橋泊舟吳㑹亭范成大去年春盤浙江驛湛湛清波動浮石今年春盤吳㑹亭冥冥細雨濕高城天邊作客風沙裏今年去年成老矣客心古井冷無波過眼人情亦如水憶昔三生住翠㣲偶來平地著征衣山中故人應大笑扁舟坐稳何當歸吳㑹亭在織里橋西河北岸望亭驛庾肩吾御亭一回望風塵千里昏青袍異春草白馬即吳門獯戎鯁伊洛雜種亂轘轅輦道同關塞王城似太原休明鼎尚重秉禮國猶存殷牖爻雖賾堯城吏轉尊泣血悲東走横戈念北奔方馮七廟畧誓雪五陵寃人事今如此天道共誰論望亭驛酬别周判官白居易何事出長洲連宵飲不休醒應難作别歡漸少於愁燈火穿村市笙歌上驛樓何言五十里已不屬蘇州宿望亭驛寄蘇州同志許渾候館人稀夜更長姑蘇城逺樹蒼蒼江湖水落高樓迥河漢秋歸廣簟凉月轉碧梧移鵲影露低紅葉溼螢光西園詩侣應多思莫醉笙歌掩畫堂望亭驛去郡北五十里先名御亭唐李襲為守以梁庾肩吾詩改稱登松江驛樓北望故園劉長卿淚盡江樓北望歸田園巳陷百重圍平蕪萬里無人去落日千山空鳥飛孤舟漾漾寒潮小極浦蒼蒼逺樹㣲白鷗漁父徒相待未掃欃槍懶息機松江驛張祜山色逺涵空蒼茫澤國東海明先見日江白迥聞風鳥道高原去人家小徑通那知舊遺逸不在五湖中題松江驛方干便向中流出太陽兼疑大岸逼浮桑門前白道通丹闕浪裏青山占幾鄉㠶勢落斜依浦溆鐘聲斷續在蒼茫古今悉不知天意偏把雲霞媚一方晚泊松江驛李郢片㠶孤客晚夷猶紅蓼花前水驛秋歲月方驚離别盡烟波仍駐古今愁雲隂故國山川暮潮落空江網罟収還有吳娃舊歌曲棹聲遥散採菱舟題松江驛羊士諤津柳江風白浪平棹移高館古今情扁舟一去鴟夷子應笑分符計日程松江驛今為松陵驛平望驛張祜一派吳興水西來此驛分路遥經幾日身去是孤雲雨氣朝忙蟻雷聲夜聚蚊何堪秋草色到處重離羣題平望驛寄吳興徐使君𤣥之故人為作郡百里到吳興藻思江湖滿公平道路稱包山方峻直霅水况澄清佇聽司空第遥知詔下徵平望驛懷李從實周鉷二故人李逞蘆葉風多驛堠長昔年攜手上河梁青雲才子鴛鴻秀白石山人芝术香華驥欲陪先道路大川新濟戢舟航少㣲星動桂枝發重正孤帆過水鄉平望驛薩都拉左帶吳淞右五湖人家笑我隔菰蒲風濤不動魚龍國烟雨翻成水墨圖越客卧吹船上笛吳姬多倚水邊壚鑑湖道士如招隱一曲他年得賜無平望驛在吳江縣南四十五里唐屬吳興郡元和間撥入吳縣洪武元年𨽻吳江縣姑蘇臺賦范浚歲崢嶸其聿遒兮冬隆寒老訪蘇臺之遺址兮遵吳都之故道日下平林烟横衰草慨傷時而感徃増予心之慅慅念昔吳王盤遊怠荒臨陂池兮臺榭宿嬪妃兮御嬙于是越人讐之餘兵是棲蠡也揆策種焉建竒葢君臣鳴鐘而謀於漸臺者窮日夜而吳不知種有九術越行其一取文梓楩楠以奉吳王之宫室吳乃營兹崇臺厯三年兮聚材斧集刃兮叠雪杵攢臼兮殷雷金碧梁橑琳珉墄階巖巍兮嶢㟴干霄兮切霓佩長洲兮茂苑帶朝夕兮濬池意將逺眺數百里而下窺雲海之涯當其虐用吾民骸髗莽暴天厭其酷故啟越之謀而夜生神木人罹其毒故勞愁惨悽而途嗟巷哭使臺土未乾兮巳羣遊乎麋鹿至若朝歌淫淫夕管愔愔困醪醴之酣沉則有西施蠱其心是助越人之侵又若奸讒囘沉膏唇鼔舌吠正人而媒糵則有宰嚭閒其説是誨越人之伐嗟乎吳王知西施之姝而不知宰嚭之諛知歌管之娛而不知吳民之痡知華其居而不知其國之墟知勾踐之為奴而不知身之為獨夫信兹臺也實亡吳之權輿吁姑蘇臺覽古許渾宫館遺基輟棹過黍離無限獨悲歌荒臺麋鹿爭新草空苑鳬鷖占淺莎吳岫雨來虛檻冷楚江風急逺帆多可憐國破忠臣死日日東流生白波同前胡曾吳王恃霸逞雄才貪向姑蘇醉綠醅不覺錢塘江上月一宵西送越兵來同前皎然古臺不見秋草衰却憶吳王全盛時千年月照秋草上吳王在時幾回望至今月出君不還世人空對姑蘇山山中精靈安可覩鬼跡人蹤麋鹿聚嬋娟西子傾國容化作寒陵一堆土同前楊萬里我亦年來散髮身遊人不用避車塵挿天孤墖雲中出隔水諸峯雪後新道是逺瞻三百里如何不見六千人吳亡越霸今安在臺下年年花草春同前盧鉞姑蘇臺下百花洲解語香魂此舊遊巧笑己傾吳子國淺顰又涴范公舟湖山四顧無竒骨王霸俱空等拙謀杯酒酹江應自誓男兒西北有神州羽仙歌潘坊雕檐綺户倚晴空如畫曾是吳王舊臺榭自浣紗人去後落日平蕪行雲斷幾見花開花謝凄凉䦨檻外一簇江山多少圖王共争霸莫閒愁金杯瀲灔對酒當歌歡娛地夢中興亡休話漸倚遍西風晚潮生明月裏鷺鶿背人飛下蘇䑓懐古薩都拉閶門楊柳自春風水殿幽花泣露紅飛絮年年滿城郭行人不見館娃宫野水滿城飛燕子誰家小艇載吳姬姑蘇臺上一尊酒落日昏鴉無限悲同前張羽荒臺獨上故城西輦路凄凉草木悲廢塜巳無金虎卧壞牆時有夜烏啼采香徑斷來麋鹿響屧廊空變黍離欲弔伍員何處所淡烟斜日不堪題同前髙啟金椎夜築西山土催作高臺貯歌舞文身澤國構王基却笑先王獨何苦銅溝玉檻幾繁華幻出峯頭一片霞望處直窮三百里役時應發幾千家蟠空曲路迷仙仗攀盡瑶梯纔到上外遶雕龍宛轉欄中施繡鳯葳蕤帳熏爐長爇鬱金香共道千齡樂未央茂苑月來秋佩冷洞庭雨過夏綃凉當窓衆妓如仙女揚袂迎風欲輕舉人從天上見經過鳥向雲間驚笑語日暮横塘花正開巻簾臺上望王來宴舟初自觀魚返獵騎還從射鹿迴從登不用持鈹隊自列紅粧侍高㑹香傳羅帕進黄柑縷切鸞刀供玉鱠燭光逺落太湖波驚起魚龍出没多城上烏啼河漢轉此時誰問夜如何管絃嘈嘈䀨人耳不聞兵來渡溪水欲攜西子走登舟醉倚畫檐嬌不起瞑目無因到甬東可憐一炬綺羅空獻楣竟墮仇人計賜劍應孤諫士忠客來試問遺宫路物色荒凉總非故褰衣始信不虚言滿地荆榛見零露當年爭戰苦勞機却把江山付落暉聞說越王臺殿上如今亦有鷓鴣飛同前周南老高高起臺榭下下深洿池不日臺已成今吳民已疲栅楣巧雕鏤金璧光陸離詰盤路九曲闌檻星斗垂藏春貯歌舞永夜甘荒嬉望窮三百里不見來禦兒同前王賔鄰壤分明隔綺䟽西施歌舞有誰如斜陽衰草遊麋鹿掩面空羞見子胥同前越王巧破夫差國來獻黄金重雕刻西施醉舞花豔傾妬月嬌娥恣妖惑姑蘇百尺曉鋪開鏤楣盡化黄金臺歌清管咽歡未極又見吳宫霸西越寂寞千山皆古墟蕭條兩地空明月靈巖香徑掩禪扉秋草荒凉徧落暉江浦囘㸔鷗鳥浴碧峯斜見鷺絲飛如今白髪星星換孤蹤迫䠞悲秋館吳鄉越國倦淹畱草樹烟霞昔徧遊物外夢魂多感歎不惟惆悵到長洲次韻石田登姑蘇臺徐禎卿墟城帶山色感慨幾經遊路闇牛羊夕臺空草蔓秋忠何辭佞死國竟與恩休忍説干戈事魂銷萬古愁再詠四首秋風古城曲落日送清哀吳越今如此忠讒安在哉江流背寒郭山色弔荒臺不見懸門眦空餘血濺苔其二危樓何代譙晚日倚岑寥多病仍傷古悲歌獨聽樵恨緘花下骨怒想月中潮忠魄憑誰弔臨風誦楚騷其三孤城猶突兀徃事巳茫然青草干戈後荒祠豕鹿前雲遮雙目恨山接五湖船零落爭蝸夢興亡共可憐其四危機豈在明釁釀巳深成劍石真吳㓂娃宫有越兵奢淫亡自取孤憤死難平愁殺城南樹昏鴉未息爭姑蘇臺宋无妖豔分明構禍胎黄金瓌麗更危臺笙歌夜倚東風醉粉黛春從南國來原草翠迷行輦迹野花紅發舞衣灰豪華肯信今為沼烟水翻令後世哀同前蔡羽夜有照題月朝有出棟雲高臺貯歌舞羅綺何紛紛吳月常從越山起越花却種吳宫裏眼前不盡西子歡安用窮觀三百里興亡不自由春草生銅溝惟有横山色空帶娥眉羞香魂想像朝雲廟緑泥繡斷金燕頭朝雲滅金燕冷夕陽滿地青楓影同前丁復白日初高瓦影黑姑蘇臺前春拍塞百花綠洲水曲尺小浪羣吹度遊鯽晴烟漲煖野荒荒箇箇西山澹疎碧海風東來揚短篷吳兒岸坐長歌發逸興遥将白波去送目飛鴻倦低翮扁舟甚有五湖思風雨漂摇從所泊幸逢大國全盛日地極蒼生無裂坼向來時運數更變河山南北烽火隔人攀巖穴恐不險樂土不居何暇擇只今城雉多墾鑿麋鹿所遊盡桑麥自笑生平但為客五十有家無土著有酒不作懷抱惡明日日出巳非昨同前沈周姑胥遺事有荒臺今日登臨尚可哀千載苞桑天子業六宫芳草美人栽南飛鴻雁秋風早西向山川夕照開流水梧桐幾畨夢獨憐公望不重來郊臺盧堪吳王城外拜郊臺山色湖光共繞迴終古翠華隨水去何年玉牒為天開斜陽一笛牛羊下細雨千帆雲鳥來忠死佞存隳霸業登臨不盡客興哀同前髙啟周綱昔隳頓禮樂由諸侯吳子乏代徳居然祀圜丘燔燎升紫壇青紘映𤣥裘靈明豈來享幣玉空旅羞國南見遺壝蕭條委山陬雲和罷九奏草樹鳴颼飅從來䟦扈徒幾人效其尤魯郊失禮始聖筆書春秋同前周南老横山東麓東阜丘高崔嵬猶存壇壝跡云是吳郊臺惟吳本伯命淫名孰先開短垣斯自踰綱紀日巳摧員既請先死億負衆庶哉上帝其可告胡爾干其菑同前王賔先公三讓輕天下孫子縁何却僭王淫祀從來安有福未幾終遇越兵亡登吳王郊臺作唐寅昔人築此不論程今日牛羊向上行吳兒越女齊聲唱菱葉荷花無數生南山含雨眉俱潤西湖映日掌同平本由萬感消未易詎言哀樂過羣情醉登郊臺王寵酒酣更上吳王臺却憶霓旌萬騎來閲世浮雲千古盡麗天春色五湖開平原細草遊麋鹿落日隂風嘯虎豺䟦扈飛揚總黄土當筵須罄掌中杯遊治平寺登吳王郊臺王鏊朝發石湖濆暮抵太湖岸青山亦多情供我船中玩船行山亦行一路青不斷白雲渺渺山重重不知何處昔是吳王宫越來溪邊越城在夫差受困此山中今朝扣禪關訪古尋幽踪僧言事徃那能識鐘鼔聲中度朝夕郊臺漠漠麋鹿遊茶磨團團蔓荆棘不須弔古傷懷抱且欲憑高縱吾眺人家厯厯新郭里川瀆沄沄胥口道吳江塔影崑山城一覽因之發長嘯天風萬里天際來吳王郊祀昔日登斯臺千乗萬騎湖上下祗今安在惟見山崔嵬船來船去湖西畔青山無言人自換來來去去世無窮莫學牛山獨興歎九日泛舟石湖登郊臺作袁袠睠兹季秋月言遊重九辰商颷息逺臯霽旭麗芳津山川信可娛况也諧嘉賓澄湖翔鷁首絲竹紛前陳載登吳郊臺曠望開心神𤣥鶴唳中天逸響落九垠仙菊浮清醴茱茰調紫蓴且顧今日樂焉能知古人馬臺既蕪陁牛山徒悲辛但願坐上客遨戲永千春郊臺在横山東麓石湖之上相傳吳僭王時嘗郊祭於此今壇壝之形尚存館娃宫賦王阮汎浮玉之北堂得館娃之遺基從先生而遊焉揖夫差而弔之或曰是可唾也奚以弔為哉夫沈湎以喪國固君人之失道然而有鐘鼔者胡可以弗考聞管籥者民喜而相告茍厥妃之當愛惟恐王之不好矣是則女樂亦可少乎必曰夏有妺喜商有妲己周有褒姒而吳以西子茍求其故未必專於此也齊有六嬖桓公以興正而不譎聖人稱焉非夫九合一匡之業得仲父以當其任則其一巳之内少有以自適者舉不足以害成邪關大夫進夏徳豈昏㣲子得政商豈穢聞蘇公家父並用則烽火豈得妄舉子胥不見戮則吳之離宫别館至於今可存抑夫差之異資在列國亦翹楚一戰而越衂再㑹而諸侯懼使僅得中佐己如置翼於猛虎惟自剖其骨鯁而放意於一女敵乗其間無以外禦杯酒之失何足問獨為此邦惜殺士之舉也此士不遭殺夫差不可愚苧蘿之姝適足為我娛胡得而竊我之符榮楯可居適足華吾廬胡足以隳吾之都維忠良之既誅始猖狂而自如臺兮姑蘇舟兮太湖食兮鱠鱸曲兮棲烏宿兮嬪嬙修明兮夷光二八兮分眀捧心兮専房徑兮採香􅓏兮響廊笑倚兮玉床奈樂兮東方稻蟹種兮不遺争盟兮黄池無人兮箴規有仇兮相窺至徳之廟遂為禾黍悉陂池與臺榭倐一變而梵宇入笙歌於海雲令聲鐘而轉鼔儼麋鹿之容與瞰僧儀而觀覩駭越壘以在望奚五戎之閱武松引韻以嗚咽柳顰眉而凝佇山黯黯兮失色水洶洶兮暴怒追此謬於千里本差之於毫釐譬之飬生捐其良醫逮疾作於中夜懵藥石之不知志士仁人所為太息於斯焉葢嘗反覆於此竊謂種蠡亦可哂也勾踐方明舉國以聽十年生聚十年教訓以此衆戰何伐不定何至假負薪之女為是可恥之勝哉始其土城誨淫自君終焉五湖合歡其臣青溪之典不正金谷之義不立悠悠扁舟遂其全璧使之脱鼎中之魚而羣沙頭之鷺返邪溪之蓮而吐洞庭之橘竊謂越之君臣何其陋於此役也越則陋矣吳亦太庸士目既抉夫誰納忠何辠人之亡也其自反而責躬乎公慨然雍相與斂容起視四山之中覺蕭蕭兮悲風同前范成大靈巖山寺故吳館娃宫也山上下閒臺别館之迹彷彿可考余少長遊焉感遺事而賦洶西山之南奔勢鬱嵂其巉空若大敵之在前忽踞虎而跧龍半紫厓而砥平訪館娃之故宫是為逸王之舊遊有墟谷之遺恫焉嗟乎悲一作汰哉愎賢胥之忠告㢲隂嚭之詖説闇養虎之後患縱處女使兔脱迨嘗膽之謀成駭疽囊之潰裂葢自有以賈禍非天為之作孽方其衘哀茹痛収淚飲血儼拂士之前庭尅三年而報粤訖甘心之一快夫何初志之英發及其見棲於姑蘇遽雌伏而大壞援宿恩而乞憐或赦圖於臣罪當是之時又何其􅉵也韙禍福之無門曷今愚而昨賢後千載之嗤㸃莫不鍾咎於嬋娟固尤物之移人抑猶可得而言葢嘗觀於若人矣好大而欲速厭常而棄舊狃㑹稽之得意謂周鼎其唾手闖齊楚以朶頥睨陳蔡而驤首道甚逺而疾驅氣巳餒而猶鬭外未寧而内憂東畧之而西否阻關河以頓兵撤牆屋而致冦亟歸視其四封蔑一夫之能守是猶螳蜋之慕蟬不知黄雀之議其後也然以蕞爾之旅而衡行四方攻靡堅郛戰無距行事便時利如徑乎無人之鄉惜也未聞大道宜其逸樂而志荒次有臺池宿有嬪嬙左攜修明右撫夷光粲二八以前列咸絶世而浩倡嗟浣紗之彼姝乃獨係於興亡蕩龍舟之水嬉擷香徑之春芳載夕陽以俱還秉遊燭於夜長灔金鍾之千石倣酒池於舊商歌吳歈而楚舞薦萬夀於君王恨星河之易翻嘉來日之未央錚銅壺之鳴悲爛急烽之淼茫慘梧宫之生愁踐桐夢之不祥歘高陵與深谷委盛麗於蒼茫所謂玉檻銅鈎朱簾椒房理鏡之軒響屧之廊杳烟蕪於露蔓紛日暮之牛羊况於捧心之百媚濯粉之餘妝者哉今則雲雨之巔仙聖是宅研沼蓴浮琴堂松崛封古蘚於井甃宿暗芳於洞穴木鯨吼以清麗金磬隱其蕭瑟彼方外之徒龜藏而蠖屈者又安知徃古與來今方枯禪而縳律翩鴻影之拂坐見山前之銜日館娃宫懷古李白風動荷花水殿香姑蘇臺上宴吳王西施醉舞嬌無力笑倚東窓白玉牀同前白居易吳王心日侈服玩盡竒瓌身卧翠羽帳手持紅玉杯冠垂明月珠帶來通天犀行動自矜顧數歩一徘徊小人知所好懷寶四方來奸邪得藉手從此倖門開古稱國之寶穀米與賢才今㸔君王服視之如塵灰伍員諫巳死浮屍去不回姑蘇臺下草麋鹿暗生麑同前劉禹錫宫館貯嬌娃當時意大誇豔傾吳國盡笑入楚王家月殿移椒壁天花代蕣華惟餘采香徑一帶繞山斜和館娃宫懷古陸龜䝉鏤楣消落濯春雨蒼翠無言空斷崖草碧未能忘帝女燕輕猶自識宫釵江山祗有愁容在劒佩應和愧色埋賴有伍員騷思少吳王纔免似荆懷館娃宫絶句鄭旦無言下玉墀夜來飛箭滿罘罳越王定指高樓笑却見當時金鏤楣其二半夜娃宫作戰場血腥猶雜宴時香西施不及燒殘蠟猶為君王泣數行其三素襪雖遮未掩羞越兵猶怕伍員頭吳王恨魄今如在只合西施灘一作瀬上遊其四響屧廊中金玉步采蘭山下綺羅身不知水一作身𦵏今何處溪月彎彎欲效顰同前皮日休一宫花渚漾漣漪婑嫷鴉鬟出繭眉可料坐中歌舞袖便將殘節拂降旗其二幾多雲榭倚青㝠越焰燒來一片平此地最應沾恨血至今春草不勻生其三江水分明練繞臺戰㠶遙隔綺疏開波神自厭荒淫主勾踐樓船稳貼來其四寶袜香綦碎曉塵亂兵誰惜似花人伯勞應是精靈使猶向殘陽泣暮春經館娃宫于濆館娃宫畔顧國變生嬌妬勾踐膽未嘗夫差心巳悞吳亡昔誰在越勝今何處當時二國君一種江邉墓館娃宫懷古張羽館娃宫中百花開西施曉上姑蘇臺霞裙翠袂當空舉身輕似展凌風羽遙望三江水一杯兩㸃㣲茫洞庭樹轉面凝眸未肯回要見君王射麋處城頭落日欲棲鴉下階戲折棠梨花隔岸行人莫偷看干將莫邪光粲粲館娃閣高啟館娃宫中館娃閣畫棟侵雲峯頂開猶恨當年高未極不能望見越兵來同前周南老綺閣高嵯峨上出研石山飛甍絢金碧館娃貯瑤環笙歌蕩春心嫵媚生歡顔闔閭不懷安自謂吞百蠻夫差竟窮欲亹對知後艱千年足慨歎寂寞棲禪關同前蔡羽青山開玉館緑水帶長洲歌舞一夕散朝雲千載留仰攀巖磴窄遙覔洞花幽楚棹赴關促登高不自由西施洞宋之問越女顔如花越王聞浣紗國㣲不敢寵獻作吳宫娃一行霸勾踐再笑傾夫差一朝還舊都豔粧驚若邪同前羅隠家國興亡自有時越人何苦進西施西施若解亡吳國越國亡來又是誰同前秦約岧岧靈岩山鬱鬱松桂林石路轉隂洞覽勝窅且深如何苧蘿人傾國恣荒淫山花落笑靨山鳥流好音我來重徘徊屐齒苔蘚侵至今山上月猶能照捧心同前髙啟廢宫春盡長蒼苔不見羅裙拂地來只恐西施是仙子洞中别自有樓臺同前周南老岩阿穴空洞中有黄金屋濳通苧蘿山來此長蛾綠深堂春似海嬌貯人如玉貪戀傾城姿寧忘檇李辱烏知無鎖鑰乗風五湖曲摩挲石上痕洞口遺芳躅翫花池高啟桃枝兼杏枝春色繞宫池正愛紅繁處還憐綠凈時芳草泛幽沚媚影照清漪垂條㸔妓折墮萼見魚吹杯涵明月瀉舟逐綵雲移水流花落盡君王醉不知同前周南老花穠池水清碧涵紅影亂波浮緑霧明萍散錦雲燦池上惜花人四時足娛翫胡知若耶妖致使民糜爛一曲舞山香花空時巳換繄彼後所得曷足供把玩翫花池在靈岩山研池髙啟山骨誰鑿破一泓自深黝醉後欲濡毫蜿蜿見科斗同前陳子貞湛湛冷山骨幽幽抱日光曉吟㸔雨氣春供汲花香研池在靈岩山琴臺僧半顛幾彈石上五雲深挑出湖波片月心絃外有聲誰解聽一山春樹曉鸎吟同前張羽坐鼔朱絃日玉人方入吳於今山下月惟聽夜啼烏同前高啟美人玉琴何處遊遺譜寫入清泉秋落葉無人登舊榭滿江明月烏啼夜同前周南老山巔屹崇臺路迥臨草堂紫璚琴巳化州山鳯高翔蘚花漬碧薦草綠侵石牀我來坐臺上瑟瑟松風凉壑隂靈籟生彷彿宣宫商慨彼據梧人山高兮水長琴臺在靈岩山吳王井羅鄴古宫荒井曾平後見説耕人又鑿開拾得玉釵鐫勅字當時恩澤賜誰來其二含青薜荔隨金甃碧砌磷磷生綠苔莫言數尺無波水曾與此花同照來同前高啟曾開鑑影照宫娃玉手牽絲帶露華今日空山僧自汲一缾寒供佛前花同前周南老山腰水一泓吳王甃為井千古瀾不生澄澄倒雲影碧沁氷壺寒香沈蔗漿冷六月消煩歊嬌娃照粧靚銀牀墮玉釵金瓶汲素綆日晏猶醺酣為試先春茗響屧廊高啟廊虛應屧鳴響細識腰輕誰道吳強國惟消舉足傾苔閒滅古跡月下歇餘聲此夕人空聽山僧曵履行同前周南老長廊架空厓屧響因虛迥時聽雙鴛聲人寂晝隂靜接武何輕盈揚儀應秀整風來步摇動月明環佩冷香迹墮塵消化作招提境於今聲巳斷空對屠蘇影采香徑高啟晨粧出采芳零露溼紅裳種徙山中品熏傳海外方抱筐歸蕙徑焚鼎薦蘭堂未足娛君寢西施體自香同前周南老香山昔種香下臨溪水長迢遥採香徑泛舟擷馨香零露溼翠衣膩水明紅粧天既奪之食種遺不復昌寒流去如箭勢直千尺强香消魂不返月落秦餘杭箭涇徐賁清溪無瀠洄西望渺何極岸直形如剡波迅勢如射飛鷗訝流羽亂雨疑鳴鏑天狼不敢渡澤兒應當匿我志弦矢閒一覽如中的采杳徑一名箭涇梧桐園高啟桐花香桐花冷生宮園覆宫井雨滴夜風驚秋鳯不來吳王愁同前周南老碧團宫園樹曾宿朝陽鳯花開襲香霏葉密棲纎蓊雨雜珮璫聲風生金石㺯初秋一葉零深宫愁巳動前園忽横生怪入夫差夢知匪梁棟材麋鹿徒増慟同前王賔七月交秋未變秋輕輕一葉下枝頭君王不在當時悟直到凋殘後始愁梧桐園在吳宫吳王夫差園也樂府云梧宫秋吳王愁香水溪高啟粉痕凝水春溶溶暖香流出銅溝宫月明曾照美人浴影與荷花相向紅玉肌羞露誰能見只有鴛鴦窺半面絳紗圍揜怯新凉歸卧芙蓉池上殿空洗鉛粧不洗妖坐傾人國幾良宵驪山更有湯泉在千古愁魂一種消同前周南老吳宫香水溪俗傳脂粉塘暖波浮漲膩晴渚汎紅芳美人曾此浴魂消水猶香可憐清冷泉照此妖冶粧不濯郎衣塵孰比華清湯只今開寶林曹溪源正長同前王賔春流漲膩蘸紅芳人喜専房更晚粧浴罷氷肌賽蘭蕙那知遺臭累君王香水溪在吳故宫中俗云西施浴處一云吳王宫人洗粧於此故又呼為脂粉塘古詩云安得香水泉濯郎衣上塵即此越來溪范成大西風初入小溪帆旋織波紋皺淺藍行入鬧荷無水面紅蓮沈醉白蓮酣其二一川新漲熨秋光挂起篷窓受晩凉楊栁無窮蟬不斷好風將夢過横塘同前高文度黄池盟㑹井蛙尊同列諸侯氣巳吞忽報鄰兵𢷬空穴巳隨溪水入吳門同前僧半顛九關風月醉傾城歌笑聲中有甲兵却是吳王自亡國枉教溪受越來名同前高啟溪上山不改溪邊臺巳傾越兵來處路流水尚哀聲昨日荷花生今朝菱葉死亡國不知誰空令怨溪水同前周南老踞湖山崔嵬來越溪沿洄美娃獻國色栅楣輸梓材連檣載越貢一一從此來經行路巳熟禍作知有胎兕甲忽夜涉桴鼓喧如雷至今風雨夕溪聲尚餘哀同前王賔吳人地面越人開岸上誰將栁樹栽春水緑波三二月畫船今是賽神囘越來溪懷古王鏊吳國江山亦壯哉一朝誰信越兵來旌旗尚動春波影歌舞翻成子夜哀徃事悠悠餘敗壘傷心眽眽一登臺姑蘇麋鹿何須恨聞道阿房也刼灰越來溪蔡羽越來溪光常浥浥逺接吳江混寒碧暝鐘未起秋霞飛坐眺無如茶磨石越來溪上多遊人香車寶轡俱生塵桃花妬紅芳草綠三月來尋曲江曲春花秋月無盡頭朝來暮徃何時休吳臺越館今何在蒼烟碧石俱含愁我來八月露氣凉常從雲端開竹房溪山一卧便十日形骸爾我渾相㤀沙明鳥白奈不得况是長橋菰米香秋日越來溪十里横山帶藕塘雞聲溪上曉蒼蒼青娥悄映荷花日屬玉羣飛菰米香吳苑樓臺今古壯越城簫鼔水雲長范園最是秋光美甘菊留人不論觴採蓮涇高啟青房戢多子采得儂心喜今夜水風凉君王宿船裏行處綠雲迷歌聲一道齊囘頭調越女何似若耶溪同前周南老採蓮蓮有涇涇帶城西南美人棹輕橈花深采芳甘香風飄翠舉明粧照紅酣摘鮮駢紫菂顧影墮瑶簪藕絲長不斷君情短何慚食甘心更苦君樂非所堪采蓮涇在郡城西南運河之陽今尚可通舟兩岸皆民居而閒有蔬圃曠地即種蓮舊迹也上有采蓮涇橋長洲苑白居易茂苑綺羅佳麗地女湖桃李豔陽時心奴巳死胡容老後輩風流是阿誰其二春入長洲草又生鷓鴣飛起少人行年深不辨娃宫處夜夜蘇臺空月明同前温庭筠錦雉雙飛梅結子平春逺綠忩中起吳江澹畫水連空三尺屏風隔千里小院有門紅扇開天絲舞蝶共徘徊綺户雕楹長若此韶光嵗嵗如歸來同前徐凝吳王上國長洲苑翠黛寒江一道斜傷見摧殘舊宫樹美人曾挿幾枝花同前許渾香徑小船通菱歌遶故宫魚沈秋水靜鳥宿暮山空荷葉橋邊雨蘆花海上風歸心無處托高枕畫屏中同前郎士元草深那可訪地久但相傳散漫三秋雨踈蕪萬里烟都迷采蘭處强記館娃年客有遊吳者臨風思渺然同前劉滄野燒空原盡荻灰吳王此地有樓臺千年事徃人何在半夜月明潮自來白鳥影從江樹没清猿聲入楚雲哀停車日晚薦萍藻風靜寒塘花正開同前趙嘏扁舟殊不繫浩蕩路纔分范蠡湖中樹吳王苑外雲悲心人望月獨夜雁離羣明發還驅馬關城見日曛同前高啟中國久無霸闔閭思騁功講蒐開别苑訓武出離宫宰嚭因參乗巫臣實御戎鼗鳴深谷震罝掩廣場空逺曵捎雲斾高彎射月弓三驅儀巳畢七伐歩還同甲騎從輿後蛾眉侍幄中煑胎須紫豹胹掌得𤣥熊樂事方難及英圖忽易窮城迷歌黍客地屬采蕘童輦道崩秋雨旗門失晚風犬亡㕙肆狡人去雉爭雄草樹迎蕭索湖山罷鬱葱猶疑見獵火寒燒夜深紅同前周南老長洲何迢迢宛在水之涘林麓䕃旉紛原隰平如砥於焉開茂苑娛遊極雄侈講武耀威靈騎趹而車駛繁華忽成夢宫室漫流水信彼公聖占奚庸矜宰嚭同前王賔闔閭遊獵太湖潯老濞來修勝上林除在那時人有後蕭蕭蘆荻到如今吳宫白居易淡紅花帔淺檀娥睡眼初開似剪波坐對珠簾閒理曲琵琶鸚鵡語相和同前一入吳王殿無人覩翠娥臺高時貯舞宫靜夜聞歌半露胸如雪斜囘眼似波媸妍各有分誰敢妬恩多吳宫李商隱龍檻沈沈水殿清禁門深揜斷人聲吳王宴罷滿宫醉日暮水漂花出城同前茂苑城如畫閶門瓦欲流還依水光殿更起月華樓侵夜鸞開鏡迎冬雉獻裘從臣皆半醉天子正無愁同前儲嗣宗亂烏啞啞飛復啼城頭晨夕宫中棲吳王别殿繞江水後宫不聞美人死同前荒臺荆棘多忠諫事如何細草迷宫巷閒花誤綺羅前溪徒自綠子夜不聞歌悵望清秋莫悠悠東去波同前曹鄴吳宫城闕高龍鳯遙相倚四面鏗鼔鐘中央列羅綺春風時一來蘭麝聞數里三度月明落青城醉不起江頭鐵劍鳴玉座成荒壘適來歌舞處未知身是鬼吳宫怨張籍吳宫四面秋江水江清露白芙容死吳王醉後欲更衣座上美人嬌不起宫中千門復萬户君恩反覆誰能數君心與妾既不同徒向君前作歌舞茱茰滿宫紅實垂秋風嫋嫋生繁枝姑蘇臺上夕宴罷他人侍寢還獨歸白日在天光在地君今那得長相棄同前衛萬君不見吳王宫闕臨江起不巻朱簾見江水曉氣晴來雙闕間潮聲夜落千門裏勾踐城中非舊春姑蘇臺下起黄塵祗今惟有西江月曾照吳王宫裏人吳宫曲張祜日下苑西宫花飄香徑紅玉釵斜白燕羅帶㺯青蟲皓齒初含雪柔肢欲斷風可憐傾國色誰信女為戎同前孟遲越女歌長君且聽芙容花發水邊城豈知一日終無主猶自如今有燕聲吳宫懐古劉滄吳苑荒凉故國名吳山月上照江明殘春碧樹自畱影半夜子規何處聲蘆葉長侵洲渚暗蘋花開盡水烟平經過此地千年恨荏苒東風露色清同前貫休夫差昏闇霸圖傾千古凄涼地不靈妖豔恩餘宫露濁忠臣心苦海山青蕭條陵隴侵寒水彷彿樓臺出杳㝠此是前車更非逺六朝何處不星星問吳宫陸龜䝉甫里之鄉曰吳宫在長洲苑東南五十里非夫差所幸之别館邪披圖籍不見其説詢故老不得其地其名存其跡滅悵然興懷古之思作問吳宫辭云彼吳之宫兮江之涯複道盤盤兮高且斜波摇疏兮霧䝉箔菡萏國兮鴛鴦家鸞之簫兮蛟之瑟駢筠參差兮界絲宻燕曲房兮上初日月落星稀兮歌酣未畢越山叢叢兮越溪疾美人雄劒兮相先後出火姑蘇兮沼長洲此宫之麗人兮畱乎不畱霜氛重兮孤榜曉逺樹扶疎兮愁烟悄眇欲摭愁烟兮問故基又恐愁烟兮惟白鳥吳宫在長洲苑東南五十里相傳吳王别宫南宫在吳縣界亦吳王離宫錦㠶涇髙啟水繞荒城栁半枯錦帆去後故宫蕪窮奢畢竟輸漁父長保西風一幅蒲同前周南老闔閭城何高城下環池濠臨隄垂細栁夾水開繁桃春風張錦帆樓船駕靈鼇歡歌雜絃管放情遊以遨載極驕盤樂侈蕩誇雄豪忘爾申胥忠不念汗馬勞錦㠶涇即舊子城濠也世傳吳王嘗作錦帆以遊故名在大街西貫樂橋南北市直抵報恩寺石射堋楊維楨周家十圍鼔散落陳倉野猶有夏駕石盤盤鼔之下秦鞭血山骨吳獵焦野火夏鼔建不拔石鳴知者寡父老懼䜟言山空石長埡同前高啟石射堋張石城石鼔響或發石騎勢欲行彷彿古戰場上有愁雲生餓鴟嘯寒風砉若箭鏑鳴何人作此畱山中鳥獸欲過膽盡驚疑是神禹治水時來教鬼射降妖精至今風雨夕猶聽人馬聲嘗聞父老言鼓鳴則有兵方今瘡痍民脱命見太平我願碎其鼓隳其堋一人安四海清自此萬年無戰爭同前周南老石城山頭石屹立名射堋石鼔儼在簴石騎勢欲騰昔傳父老言鼔鳴即致兵年來屢爭戰斯石還有徵方今氛祲清堋泐鼔不勝何如岐陽石千載紀文明同前王賔石有何憑也好兵射堋張處鳥飛驚思量肅慎將砦貢却是人工後始成石射堋在石城山有石鼔鼔鳴即有兵又有石馬望如人騎走狗塘高啟春堤長春草淺此地吳王曾走犬獵場四面圍畫旗紅炬照輦還宫遲割鮮夕宴誰共食臺上西子非樊姬春苑年來草仍綠韓盧巳去多麋鹿君不見漢皇縱狗殊有功逐兎直到烏江東同前周南老遊田陟長洲塘堤如坦途吳王曾走狗一一皆韓盧犄狡逐潛兎扼噬奔雄狐追蹤極蹂躪徒搏爭馳驅胡為兩黑厖南北同嘷呼隂匿既符夢霸業誰與圖同前王賔吳人來築費黄金縱犬奔騰快一心偏惜子胥先賜劒越王不死役謀深走狗塘在城西吳王遊獵處也越絶書云闔閭走犬長洲百花洲高啟吳王在時百花開畫船載樂洲邊來吳王去後百花落歌吹無聞洲寂寞花開花落年年春前後㸔花應幾人但見枝枝映流水不知片片墮行塵年年風雨荒臺畔日暮黄鸝腸欲斷豈惟世少看花人縱來此地無花㸔同前周南老灼灼洲上花穠纎亞紅白豔冶映朱楹芳菲連綺陌看花春復春豈知兩賢厄再涉没以須人去春寂寂我來千載後繁華總陳迹悵望夕陽低平蕪慘寒碧同前姚廣孝水豔接横塘花多礙舟路波紅晴漾日沙白寒棲鷺縁江魚網集隔渚菱歌度不見昔遊人風烟自朝暮同前王賔當時人到百花洲人面花光照碧流今日人來尋舊跡菲菲芳草没人頭百花洲在西城下胥盤二門之間魚城高文度谷變陵遷自古今耕人指㸃説魚城綠波巳涸無鷗鷺禾黍離離高下生魚城在吳縣横山下越來溪西吳王遊姑蘇築以養魚續圖經云吳王控越之地本名吳城方言謂魚為吳故誤稱耳今山之傍有岡隱隱如城又有射臺亦在横山周益公南歸録云魚城在田閒基厚而方其高二丈博倍之為田百二十畝土極細故久不壞雞陂高啟吳妃不解報朝盈空養雞鳴滿别城畢竟餘杭西走日五更誰唱出關聲同前周南老城東古婁縣門外有雞陂吳雞雖善鬬奮勇若吐竒縱觀曾賜錦激猛猶健兒蹀躞遍城墟棲止不以塒豈獨司晨旦端由肆諧嬉何如夜㝠㝠風雨常安栖雞陂在婁門外吳王畜雞城也又名雞陂墟酒城高啟酒城應與酒池通長夜君王在醉中兵入館娃猶未醒越人宜賞釀夫功同前周南老聞昔酒為池吳今酒有城築城以釀酒不憚民勞生滿貯梨花春賸醖竹葉清沈湎曾亡國有戒寧莫懲醉此越來水晝眠猶未醒城成更不易時得苦酒稱同前王賔只怕酒漿歡飲少那思版築害民多為城恣釀人呼苦伍子胥知沒奈何苦酒城吳地記云在魚城西南故老云吳王築以釃酒今俗呼為苦酒城越城高文度古意猶堪弔南湖不憚遥闔閭開國地勾踐進兵橋城郭高低黍英靈日暮潮蒼茫遺獨立斜日下漁樵越城在胥門外越伐吳吳王在姑蘇越築此城以逼之城猶彷彿在婁城高城一望思茫茫湖轉婁江入海長邊境到今無漢縣古倉何處積吳糧鷗棲淺渚寒蘆靜雁落平疇晚稻香野水閒雲吟不盡玉峯西面看斜陽婁城即崑山故城也圖經云在縣東三百步舊志云吳子夀夢所築言公井高啟寥寥武城宰遺井虞山隂千載汲未竭九仞功應深藝圃自可灌道源誰復尋絃歌聽巳歇瓶綆看還沈無為渫弗食惻惻起歎音一瓢樂未改庶幾回也心言公井一名聖井在常熟縣治北一百九十歩言公宅傍吳地記云宅傍有井二傍有洗衣石蠡口王賔連年謀國甚勞神一旦功成便脱身從此更招同伴去豈思全巳又全人蠡口道院漫興胡纘宗面面皆春水臨橋跨小樓帆檣日來徃誰解五湖遊其二橋迥低臨斗樓危逺挿河碧桃開十里春興復如何蠡口在齊門北角頭高啟高皇本壯士提劍定四方晚為兒女情悲歌起彷徨愛子欲建儲寵姬方侍側顧驚四老人謂巳成羽翼大臣豈不諫孰能斡天機彼翁何為者足見人心歸始濳避秦君終出安漢嗣世羅焉能羈舒巻聊自肆我來角里村如入商顔山紫芝日巳老黄鵠何時還斯人神仙徒千載形不滅猶想蒼岩中白頭卧松雪同前周南老洞庭之西南粤有角里村中藏避秦人實為太伯孫一出安漢嗣始知徳望尊高皇遂悲歌顧寵不忍言羽翼既巳成紛紛奚復論茍非畱侯計元道終丘園同前王賔先生未出去安劉人世那知在此遊西望商山行路逺白雲來往自悠悠角頭即角里在洞庭西山漢角里先生所居史記正義太湖中洞庭山西南有祿里村角里先生周姓字元道死亭灣高啟貧賤衆所棄豈惟愚婦人珪組何重輕能令變交親翁子昔未逢妻去恥負薪五十非晚貴不能待終晨一旦謁帝閽還家繡衣新邸吏驚赤綬邦人候朱輪無縁見故夫自殺此水濱誰知孟徳耀元在爾東鄰同前周南老亭亭金閶亭亭下水一灣水清宜濯纓不照慚婦顏嗟哉翁子妻年少恥苦艱焉知夫晚貴持節衣錦還雉經寧忍死嗤彼真愚頑桓桓㑹稽守終身豈窮孱同前王賔春風縁岸綠楊垂翁子乗軒到郡時逢著故妻加館待不思他怒去求離死亭灣在閶門外七里漢朱買臣妻既棄其夫而再嫁後見買臣貴恥而自縊故名其處吳都文粹續集巻十一
