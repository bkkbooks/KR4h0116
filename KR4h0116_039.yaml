body:
  text: 吳都文粹續集巻三十九明錢榖撰墳墓故翰林侍讀學士錢公墓誌銘曾鞏公錢氏也故為王家有吳越之地五世祖鏐號武肅王髙祖元瓘文穆王曽祖儼昭化軍節度使祖昭慈贈左衛將軍考順之左侍禁閤門祇候贈尚書刑部侍郎公應説書進士賢良方正能直言極諫皆中其科歴宣州旌徳縣尉大理寺丞殿中丞太常博士尚書司部度支司封員外郎工部郎中換朝奉大夫充國子監直講編校集賢院書籍遷秘閤校理選為修英宗實録院檢討官直舍人院同修起居注遂知制誥直學士院遷樞宻直學士翰林侍讀學士嘗通判秀州知婺州入判尚書考功改開封府判官出知鄧州入判尚書吏部掌内銓兼判集賢院又兼判禮部權知開封府數請去得知審官東院兼判軍器監提舉司諸監公事公㓜孤家貧母嫁既長還依其族之大人刻勵就學并日夜忘寢食於書無所不治已通其大㫖至於分章别句類數辨名叢細委曲無不究盡具見於文辭閎放雋偉故出而與天下之士挾其所有較於有司常出衆上以其上名動一時其為尉及為秀婺鄧州皆有治行秀州繫奸仆强果於力行婺鄧更鞏舊壤理具設張為直講以能教誘學者歸之為校理屬英宗之初慈聖光猷皇后聴政公三上書請還政天子為吏部謹繩墨選者稱其平為開封以慈恕簡重為體不求智名以投世取顯為公屬者有不與公合然公遇之未嘗有厚薄意士以此多公而為屬者後卒恧服也公與衆不矯矯為異不翕翕為同以其故人莫能親踈至於利勢之際人所競逐公方隤然跡與衆逺故雖有夸者亦不以公為可忌也公之為判官也府嘗有獄或探大臣意謂欲有所附致公不為動徐論其意而已公平居樂易無崖􅜌及至有所特立人固有所不能及者類如此也公為人謹畏清約與人交淡然久而後知其篤也公之先既籍疆土歸天朝其後至昭化寄和州十有八年以卒詔葬和州子孫因家焉至公始葬其母於蘇州吳縣龍岡村之天平山故今又為蘇州人公諱藻字純老封仁和縣開國伯賜服金紫年六十有一元豐五年正月庚寅卒於位某年某月某甲子葬天平山從其母永嘉郡太君丁氏之兆公妻孫氏泰興縣君男曰某曰某早世曰臯某官孫曰某某官其弟若子孫凡三人公與予嘗為僚相善且其没以遺事屬余而其家因來乞銘曰錢姓武王五世之孫開迹東南以學以文學則知經文則能賦矧曰方聞揚聲天路乃校中書乃掌帝制乃列禁林從容調議治已伊何惟直與清治人伊何惟簡而平人以怒遷公能自克人以利回公能不惑士夫所望天子所器胡不百年胡不三事龍岡之宅考卜惟新公安於此尚利後人代翰林侍讀學士錢藻遺表犬馬之質難駐於頹齡日月之光尚攀於愛景臣藻誠悲誠咽稽首頓首伏念臣出於悴族進以詖材文辭講説制䇿之科衆稱華選儒館掖垣經幄之職世謂清塗獨編竊於美名蓋親逢於亨運至於總銓衡之要劇領京邑之浩繁蔑有勞能可論報稱冒寵靈而過厚致災疚以交攻迫霜露之所侵且將澌盡幸髪膚之無毁得以全歸方去闕廷長投泉壤輒陳遺志猶及能言伏願皇帝陛下御六氣之和慎調興止享萬年之阼永庇華夷再念臣偷殘息之僅存覬餘恩之可丏敢祈仁睿終賜矜憐臣有男進士臯孫男某親堂弟茂共出寒鄉稍親薄技葑菲不棄倘㣲祿之獲霑魚一作水菽可供庶遊魂之未餒伏望聖慈並於文資内安排妄兹干澤愧在忘㢘保存没之孤蹤託始終於大賜生而無益莫及於銜環死或有知猶庶幾於結草仰望宸施臣不勝任朝中祭錢純老文嗚呼公乎窮經及史旁兼百氏廢寢忘食不虚寸晷篤好無倦華顛愈勵强記多識箱輸屋偫濶議崇論河垂海委詩賦講説射䇿三科金馬玉堂經帷三職寒苦自至無與憑翼銓綜再試士曰予歸尹正三歳衆曰予依公於所聞維學之力公於所知則維自得利害之際人鮮能安彼為惴惴公獨坦坦愛惡之情人鮮自克彼有贅虧公為衡石世所並逐公有不求彼囂我靜則莫吾尤曽不三事位云未究曾不百年數云非夀殱國之良在列嗟咨奪民之望耋艾歔欷天子聞喪馳使臨視勞恤㷀孤賙憐乏匱凡我同朝矧曰同志哀由感觸孰知失涕寓焉在庭薦羞在几公乎來哉寄誠兹誄錢學士墓在天平山龍岡村謁墓詩三首虞集玉屛古柏與天齊使過於今又七期各道遣書勾發上西風江水鬢絲絲玉遮墓下有諸孫東望滄波每斷魂泣血三年餘喘在更將哀淚洒荒原族人散處江南郡不識音容但記名世澤須令孫子憶故家今幾尚簮纓虞連州㠭墓在遮山㠭字成夫夷簡長子孫集顯於元追封雍郡侯集謁墓詩序云先君太史棄諸孤之四年集來吳門省連州府君大墓始見叔父南山翁與集同出太史雍國公蓋四從矣翁曰後會未可期幸留數語識歳月翁方客授外鄉人又以推人生年月日論禍福以助道故不能久留城中敢用賦此以承命云耳七姬權厝志張羽七姬皆良家子事江浙行省左丞滎陽潘公皆為側室性皆柔慧姿容皆端麗修潔善女紅剪製文繡經手皆精巧絶倫事其主及夫人皆能以禮其羣居和而有序皆不為怙寵忮美之行公每聞閭閻間婦人能以節概自立者歸必為語其事皆應曰彼亦人為耳公笑曰若果能邪及外難興敵抵城公日臨戰一旦歸召七姬謂曰我受國重寄我義不顧家脱有不宿誡若等當自引決毋為人恥也一姬跪而前曰主君遇妾厚妾終無二心請及君時死以報毋令君疑也遂趨入室以其帨自經死於户六人者亦皆相繼經死公聞之曰何若遽死耶實至正丁未七月五日也以世難弗克葬乃斂其屍焚之復以其骸葬於後圃合為一冢公還啟其封且泣曰是非若所安也行營髙敞地而遷焉時以日薄故未暇為志及踰月始狀其事屬羽將勒石追瘞於冢側嘗觀古之史氏所載貞妃烈婦能識節義決死生而不顧者恒曠世而一見今乃於一家一日而得七人焉吁不竒矣哉乃列其姓氏於石而系之以銘程氏蜀郡人年三十生女一人生奴翟氏廣陵人年廿三徐氏黄岡人年二十生女一人不惜羅氏濮州人年廿三卞氏海陵人年與羅氏同彭氏與卞氏同郡其年與徐氏同叚氏大寧人年十八其先死者也公名元紹字仲昭實宋魏王廷美之裔其先以避禍易今姓未復云銘曰生也同其天死也同其時而瘞又同其封壤樹蕭條匪子之宫尚卜髙原以永無窮七姬墓在郡城東北隅元紹後圃今為謝揮使宅侍郎金公墓誌銘王直公金氏諱問字公素其先杞人世有顯者從宋南渡家於吳故今為吳縣人公曽祖徳久樂善好施有惠及人嘗自郡之滸墅抵楓橋鑿七井以資行旅人徳之因號金井祖國用元河渠提舉父仲旻以公貴累贈至中憲大夫太常寺少卿兼翰林院侍讀學士妣顧氏累贈至恭人公自㓜穎敏莊重喜讀書日記千言悉其大義弱冠從俞先生受易聞講姤復二卦曰勿謂隂㣲當存抑遏之戒勿謂陽㣲當加擴充之功凡所聴聞深悟黙契諸老先生愛重皆折輩行與交兄聲亦好古嗜學有麗澤之益家貧無書嘗從人假借疾讀暗記無所不達其或損壊必為完整永樂初被薦為司經局正字仁宗皇帝在東宫雅知之丁内外艱皆賜楮幣俾乗傳歸葬即奪情起任事雖不獲終制然䘮禮未嘗廢久之坐累訟繫者十年資用或不繼然餽之不以義亦不受時學士永嘉黄公洗馬江陵楊公皆以事在繫三人者甚相得省躬念咎之暇各持一經相與講論曰此吾處憂患之道也仁宗皇帝即位陞翰林修撰偹顧問論時政得失上褒納之賜鈔二千貫衣一襲米十斛宣徳乙夘擢太常寺少卿兼翰林院侍讀學士正統癸亥調南京太常寺乙丑冬陞禮部右侍郎戊辰春正月二十七日以疾卒年七十九事聞上為之嗟悼命禮部致祭工部為治墳塋公天性孝友事父母竭力營飬不以貧故儉其親兄嘗病熱劇醫云必得螺可治方盛寒公解衣循河覔之股皆赤腫得百枚以進疾良己治家以禮内外秩然里有䘮不能舉貧不能自給者每伺夜投錢與之曰吾非為名也娶謝氏封安人加贈恭人生子男二長汝進中書舍人次汝遜女三孫男三平生所為詩文甚富必根於理而達於性情有青陽集桂芳集恥菴集若干巻藏於家恥菴其别號也最善書得晉魏人書法於星厯之學尤精然未嘗語人汝進在北京聞訃而歸以其年某月某日葬公於邑之太平鄉薦福山白雲塢先塋之次而以墓銘屬予予蓋知公者不可辭銘曰有文有行亦克有子光榮始終既多受祉白雲之原公墓在焉刻銘垂休百世之傳金恥庵先生問永樂初被薦為司經局正字歴官禮部侍郎墓在薦福山白雲塢周先生墓碣銘吳沈先生諱南老字正道姓周氏其先汝南人晉太康中有為揚州刺史諱浚者族大且繁散之四方自汝南安城來居處之遂昌其一也唐末避難遷建之浦城在宋宦遊道之營道之營諱固遂為先生逺祖至九世祖諱輔成登大中祥符進士第八世祖諱敦頥官至虞部郎中諡元公七世祖諱夀元符進士司封郎中至孫興裔和州觀察使侍衛馬軍都虞候駐劄平江等處死節王事敕常熟虞山之麓葬焉故今為姑蘇人先生髙祖諱昺迪功郎常熟縣尉曽祖諱璵承事郎歴官為祕書省檢閲文字祖諱才迪功郎沿江制機檢察水部兵元革命征南行省檄令權撫鄉邑時軍伍桀驁公行剽掠乃以仁義説諸帥全活不可數計有他處生口被虜則傾資贖之問所從來而還其家考諱文英元松江府監税先生㓜而聰慧讀書過目成誦比長侍監税於官所從江隂陸先生文圭習舉子業屢試不利退而曰學在我遇不遇命也因授徒於蘇與者成名而去者居多久之用薦者授信州路永豐學教諭嚴條約為諸先生重建禮殿論堂齋廡凡若干楹復侵田若干畆新文昌鄉賢二祠改太平路當塗縣學教諭秩滿還蘇而南北多事矣是時浙省大臣得以便宜除拜奏先生吳縣主簿先生視事振舉大綱紀發摘隠伏羣下莫敢欺縣之濱湖民告僧普益與王益婦私殺其夫鞠問且三月獄不能具則以告者為誣而反坐之先生始至二日閲其牘疑而復聴焉僧露其情而未肯顯言其尸與凶器所在先生躬造其地移檄縣神責以隂報翼日羣烏飛鳴下上若有所訴然良久從西南去半里盤旋於湖旁蘆溆上先生命從者入視之尸則正在尚未腐也僧與所私婦咸叩首曰死矣已而刃出水際巨石下於是正其罪而免告者一縣稱為神明縣賦有額而税無正額民多流亡而吏胥因緣為奸多方飛灑每嵗皆没於官者代輸破産併命不能足先生騐簿籍徵其實在請蠲其流亡民賴以少甦省臣聞其能辟以為掾時軍務方殷應接不暇先生處之裕如上官目指氣使下吏謟䛕成風先生獨裁之以正他掾欲有所為則曰慎勿令周掾知也上書言時政六事曰開荒田節財用通鹽法息奔競辨禮分公銓選累千餘言時至正辛丑嵗也有獻議請開沿海汊港者凡十有三處先生往視還言惟白茒一港地勢卑下衆流所趨開之易為力且為利甚多其他則塗漲已久與陸地無以異居民生長其間享耕種之利若興工疏掘恐未為國利而先與民害矣海濵閒田棄於無用募民立屯使有耕食亦禦冦之一䇿也聞者韙之除兩浙鹽運司知事時國用浩穰仰給於鹽課乃新設分司於平江嵗辦鹽十二萬引鈔七十萬錠帶賣儲偫者又五十萬錠運官缺員先生以一幕職任其事設法既詳處置得冝豪商巨賈無所容其奸繼授淮南行省照磨改江浙進階從仕郎監價平江等處船貨提調嘉興長洲吳縣白徒兵浙省地日蹙而權貴人方大興土木廣生産受投獻與民校錐刀利官冗吏貪先生因復上書言之大忤執政意然猶憚公論外示優容未幾權本省理問録嘉興松湖囚覈實無錫州錢糧人咸服其公丁未嵗蘇州既入版圖例遣赴京與翰林太常諸公同議郊祀禮禮成移臨安府居越數月得㫖放還田里洪武元年也先生既還自朝與諸遊從日以經史自娛客至尊俎談笑與世相忘洪武十六年四月十一日卒春秋八十三嵗卜其月二十七日葬吳縣星涇道山先塋之次娶孟氏元松江府判官諱潼之女先十五年卒今合葬焉子男一人敏長洲縣儒學教諭女一人適元醫學提舉張元善之子昊孫男四人汝浦淵源女三人先生居家篤於友愛女兄弟凡十人多先生所字嫁其他若内外親族之死喪咸給其所不給至於家事則一付之孟夫人宗族間謂非夫人莫能為先生配也先生之學本於義理而以文章發於英華詳於制度而以裁斷定其取舎方術技藝之書靡不旁通而於醫尤精所著有易傳集説喪祭禮舉要大學中庸章句集解地理會要醫方集效拙逸齋稿姑蘇襍咏藏於家先生既葬敏以書抵京請於國子監學録金文徵為之狀而敏之弟子張暉方為太學生為之求銘於予嗚呼先生之徳之才固宜銘矣宜暉之請其可辭乎師生道乖朋友義缺如暉者以其師之㷀然在疚而能代為之請豈不可尚乎予故取金君之狀録之如右而系之以銘銘曰周氏之先自汝遷閩宦遊道州復為吳人子孫綿延文學相繼蜚英上庠策名科第先生之生蔚有榘儀韞玉勿衒人莫我知起為學官敷教百里侵田來歸新宫肇啟相臣便宜試以親民發奸直寃號稱如神虚田額存民代以輸君按其實横斂以除大曹選能衆務叢集剖析若流弗壅弗積港汊之開衆爭獻議君謂不可非我之利海瀕之田可募而耕以屯以禦乃卒不行鹽官分司佐我國用責重事繁倚君為重大商四集貨寶如山設法之詳吏無容奸土疆日削權豪愈肆正色昌言無所畏忌才不克盡運也則移命之不逄奄然其歸道山之麓先塋之旁厥配則賢與之同藏善行之多我撮其要勒之貞珉樹於墓道周南老墓在吳縣落星涇沈公濟先生行實杜瓊先生名遇姓沈氏公濟其字也號臞樵家有雅趣堂人又稱為雅趣先生世為蘇之吳縣人髙祖肖鑑宋咸淳中以冩照妙天下曽祖清之祖成之皆清抗絶倫克世其業父宗徳入國朝亦以是術進事太祖太宗仁宗三朝備見寵遇錫賚廩餼與侍臣等年八十以終先生得家學之秘而又從事儒業讀書學問孜孜不休嘗及青城王文靖錫山王學士二公之門得其漸染結字效章草為五言詩冲淡有陶韋趣作水墨山水師夏圭馬逺淺絳色法李唐深色則全倣趙伯駒皆咄咄逼真其事父能順適其志意曲盡孝誠母王氏先卒恒以不得事飬為終身恨言輒嗚咽不自勝其交人始終不渝犯之者勿與校有過面諭之不恤有危急出力援救勞貰不憚也嘗以世之畫無補於教往往冩古人忠孝節義之跡置之座間使人觀感有求者輒與之永樂中仁宗皇帝在青宫聞其名嘗召見命冩山水人物皆稱㫖甚加寵異間得疾命太醫院判韓公達往視賜藥物相將顯融矣素有羸疾竟丏身歸幅巾藜杖優游泉石人望之儼然圖畫中人絶類西湖林君復也以疾不屢出鉅卿碩儒往候之焚香啜茗講論史學或命酒雅歌情無不適以故雖疾而不致劇忽不知其踰於希年矣初娶濮氏繼徐氏子男四人璜璿珩璵女二人俞全盛愷壻也孫男三人女五人生於洪武丁已年七月廿五日抵今正統戊辰年登七十有二預為夀藏於吳縣五都薦福山先塋之側以俟他日之歸銘亦宜預刻之里生瓊因為述其梗概布諸名筆以備採擇云沈遇公濟墓在薦福山事載姑蘇藝術傳中書舍人周君墓志銘王直永樂中太宗皇帝向意文藝既以經術求賢矣而攻書之士學有師法者亦徵詣京師有所纂述使執筆其間姑蘇周君璿用珍與焉其書宗虞永興在朋輩中最有名久之得官為營繕所丞然未嘗去館閤與人交謙慎有禮士大夫雖前輩名徳多愛之而用珍久益敬不見有闕失遷中書舍人益謹飭不懈而書亦益有名秩滿得推恩封父母而二親皆得享其禄鄉邦榮之母没治喪如禮起復未幾復以父喪去官既即吉將朝京師有疾遂弗起臨終自以不克報君恩為憾而勉其弟與子以忠孝正統辛酉九月七日也年五十七其天資明敏多讀書又通醫術喜吟詩於晉唐名帖所積尤多其畫師董源作古松法畢宏韋偃揮毫洒墨變化不窮京師人多好之用珍亦不厭其求其為人如此周氏之居鄢陵宋南渡時有諱某者為兵馬鈐轄守平江之嘉定州因家焉曽大父繼善元平江路醫學提舉大父自牧為鄉校師父仲立封從仕郎中書舎人母陸氏封太孺人妻張民贈孺人繼室施氏封孺人子男一曰浩女二以卒之明年葬長洲縣彭華鄉金盆隖之原而墓未有銘其弟寧波府學教授璣貽書翰林徐編修良玉請為行狀託中書舍人凌尚義持來謁予銘予於用珍亦素厚嘗憐其以憂去而冀其速來不知其遂死矣惜哉銘曰楚楚兮令儀𣺌𣺌兮予思悵一去兮不復來金盆之原兮此焉歸於乎奈何兮胡寧不悲周中書璿墓在金盆隖支硎山西錢良玉墓志銘王直良玉名瑛姓錢氏其先江都人世以醫名曽祖益元常州醫學教諭因家常州兵亂徙蘓州祖元善洪武中徴入太醫院晉王子有疾奉命往治之愈王竒其術留之卒葬太原父宗道亦精於醫王奏為良醫甚見禮遇久之亦卒良玉奉葬於祖之墓次而奉母歸飬於蘇州遵治命也良玉承家學之懿又博通諸書醫道益大顯蘇人求醫不問風雨寒暑貧富貴賤即往視與藥無不愈名聞京師又徴入太醫院奉公有暇往赴人之急一不異蘇時人之報與否不計也嘗教諸子曰醫仁術也當博施濟衆而可計利乎哉聞者韙其言而美其徳事母極孝能順適其意去年冬母病心憂之為之不遑寧處湯藥親嘗而後進母卒治喪如禮居苫凷之中哀毁踰節將奉柩歸蘇州得寒疾而終正統六年二月十七日享年五十二娶髙氏子男五女二孫男二女二恒兄弟舉二喪歸欲與祖母同域葬焉乃以禮部主事顧謙所為狀來請銘予在京師久見凡為醫者多嗜利而少見其效心竊鄙之嘗問今右副都御史陳君鎰蘇醫之良者為誰得二人焉其一良玉也數欲試之幾緩急可托而卒未能遇嗚呼孰知良玉今遂死矣豈非可惜哉予既重其人而惜其死奚可以不銘其葬以某年月日其墓在某山之原銘曰仁於人孝於親吁奈何返其真善必報利爾昆刻銘章庶永存錢良玉墓未詳何所其事實見姑蘇志藝術傳杜東原先生墓表吳寛先生諱瓊字用嘉姓杜氏蘇之吳縣人以成化十年十月二十六日卒葬既十年其里諸生吳寛始克表其墓曰先生今世之隠君子也學不在於為文而己行修家庭而倫理藹然以厚教不止於授徒而已化及鄉閭而風㫖超然以髙色清而温凡賢愚不齊之人皆可與語然為塾師以其僕一言之慢即日歸家而不可留其守道也甚介行和而易凡巉絶難繼之事有所不為然母病醫藥弗愈則刲股作糜以進其為孝也甚烈姊老而敬事之不衰有類於燎鬚師没而哀慕之無替必為制服孩提不茍取故囊無不義之物白首猶慎交故坐有必端之友至於地侵於隣而不爭金盜於僕而不問又其事之瑣瑣者蓋當宣徳正統間天下承平求賢詔下士之有一行一藝者皆得薦於守令先生顧以母老力辭守令問其所欲卒用旌其母之節而不敢强其仕遂以隠終身所謂隠不違親貞不絶俗者先生其近之故東海徐太史以中行之士與之者以此則先生不謂之君子哉惟昔東漢之世仕者固不暇論矣若危言激論以貶人刺世者每不得全其身至深藏逺引而食力飬親者亦足以遂其志故郭泰雖賢於范滂不免近於俠周爕若亞於黄憲終不失於髙後之論先生者其必有以識之矣先生得宋朱長文樂圃而家其旁自號東原吳人因稱東原先生卒年七十有九三子能世其儒業其登鄉貢者曰啟寛辱先生愛慨先生之没而不可作也用表其墓且以慰吳人之思云爾淵孝先生誅史鑑維年月日東原先生杜氏卒於吳郡之樂圃里第旋殯於如意堂之西階明年夏四月乙酉將葬於横山禮也搢紳大夫與夫及門之士僉以為賢者死有易名今先生問學精深至行純備有合諡典私諡曰淵孝先生後學史某為作誄曰唐堯禪舜受命於天叶惟彼𦙍子遂為虞賓世有名徳啟其後人流衍日滋族姓振振篤生劉累天畀多知學於豢龍能求欲嗜乗龍在夏資之飲食夏后嘉之御龍賜氏以更豕韋傳國歴世自商徂周又更為唐成王滅之邦祀散亡遷封於杜絶而復昌赫赫杜伯巍然允臧保姓受氏以示宗祊世不絶祀於後益光光之伊何代有明哲漢晉揚聲唐宋滋烈立宣定䇿平吳仗節少陵詩史睢陽相業叶族大以繁枝分派别君之髙祖自蜀來吳安其土俗登此版圖曰曽曰祖爰處爰居謹厚自修保族宜家叶伊君顯考信美且都才與徳稱名與行符省弟南都奄忽告殂君生甫月其泣呱呱母氏聖善誓節字孤猗歟夫子年弱體孱譬彼泉水原出於山越澗渡壑衝瀨激湍小受大歸始克成川穎悟之名著自髫齔如珠在淵如玉在韞明潤内含光耀外隠惟不好弄乃克務敏務敏維何篤於求師處端始造孟功繼之明從嗣初究厥指歸抉隠探賾鈎深摘㣲其進不己其得不貲融會貫通萃而為資發為文章浩浩穰穰大包丘壑細析毫芒聲詩可咏金石琅琅不務綺麗乃在和平叶博綜材藝諳悉舊章畫宗氣韻書究偏旁孝友之性本於天賦痛父早亡終天永慕慨想容儀宛然如覩念我劬勞孝飬備具家雖屢空羞無不飫和氣婉容依依若孺徳尊行隆蔚為儒宗講授於鄉以開羣䝉從者日多來自逺方叶屨滿户外席交室中禮容秩秩徳音渢渢太守下車求賢是崇聞君材名謂世無雙叶將獻天子以登以庸君拜稽首告於太守守實過聴我躬何有無實而尸懼忝我后守誠愛徳小人有母保孤嗣宗為徳孔厚守能白之死且不朽守曰為政風教是圖叶矧兹節義為訓實多有子如此胡可滅磨拜疏上陳帝命乃嘉叶肇錫嘉名用表厥家叶龍光有赫川澤増華叶性樂山水甚於渇飢鹿冠峩峩野服是宜躋險造幽樂以忘疲葺亭竹間命名延緑朝暉成隂夕霏滿目於焉逍遥以冩心曲甲午之嵗君年及耆仲子請舉雋於有司謁省告歸將與計偕叶君胡遘疾運極在兹山頽木壊吉往凶來叶嗚呼哀哉邦無老成後生失援弔者塞塗揮淚如霰大夫視歛操文致奠好徳考終於何聞見諡以實稱傳無虚撰嗚呼哀哉吾與夫子人品固殊辱視忘年不尊自居屈已下交屢往吾廬周旋懇欵奬諭吹嘘疇昔有言吾哀子少人夀幾何莫忘久要士感知已此恩未報如何嘯歌竟成悲嘂嗚呼哀哉横山之麓筮人告從叶吉日辰良喪柩啟行叶悲風凄急飛鳥頡頏送者雨泣白驥哀鳴叶嗟嗟夫子永安斯藏視不見形呼不聞聲叶人孰無死身名未喪嗟嗟夫子其有不忘嗚呼哀哉杜淵孝先生瓊隠居事母得宋朱長文之樂圃家焉嘗刲股療母疾正統中下詔求賢有司將以瓊應詔辭不起請旌其母遂以隠終行實具姑蘇志隠逸傳中墓在横山劉文恭墓志銘髙穀嗚呼斯文寥落存者無幾閒居卧病忽有持衰絰者踵門哭泣以墓文為請乃故友少詹事劉公子也且謂公見屬於予俾銘焉嗚呼公復逝矣老成者殆盡予忍銘乎公諱鉉字宗器姓劉氏號假庵其先汴人髙祖順之元為平江路𣙜茶提領家於蘇因占籍長洲焉曽祖元善號雪樓祖徳讓國朝沛縣儒學教諭考仲輿贈中書舎人公生五月而失怙為母陸孺人所鞠稍長即知向學嗜好異於衆授徒里中已有老師宿儒之譽永樂中以善書徴赴京師時予為翰林庶吉士因相麗益往來甚宻庚子秋闈公以易經先多士人益髙其才識未及會試拜中書舍人宣徳已酉預修兩朝實録有白金織綺之賜擢兵部車駕司主事戊午再修宣廟實録成進翰林侍講正統戊辰詔簡進士讀書文淵閤命公教閲優劣士皆有所進名稱籍籍焉已已以公負士林之望特進侍講學士階奉訓大夫庚午為京闈主考得今翰林修撰劉君宣為首冠人號精選宣時由盧龍軍入試故也適開經筵簡儒臣用資講讀公在首列每陳帝王圖治之道聖賢心法之傳且曰必如是而後可辛未夏不雨制遣公祀濟瀆事竣有司懐金幣以餽公笑曰吾之為此蓋為民弭災求福豈容若私獻耶彼媿謝而去壬申春㑹太學闕正員時論難乎得人予以公薦命為祭酒公至嚴條約以身先之為生徒講説道義揚善遏惡覬覦者往往假權豪者以圖進公一不之聴由是倖跡屏息人不能干以私飬母陳氏卒命奔喪公力求終制從之天順改元今上復大寶詔立皇儲必資才徳老成者俾為輔𨗳僉謂在朝宿徳無踰公者遂陞少詹事日侍講讀於正心誠意之學啟沃良多天順二年十月六日以疾卒於官春秋六十有五訃聞上深悼之賜祭以旌其賢皇太子亦致賻以表其行朝臣自六卿以下皆臨奠嗚呼盛哉公為人介特自守言動不欺與人交一以誠恪為主而人亦服其無偽親者亦衆權門要路絶跡不往或疑其太迂公曰吾知安吾分而已當時若楊文貞公士竒楊文定公溥交相推許有志古道如古人之嘆在中書時寮友有卒不克喪者公為具後事復教其孤成學得有顯官鄰有謫戍者天寒不能行公製絮被為重裘遺之吏有病主人勿能容舍之以待痊婚喪貧窶不能自給者周之或恐後天性孝友嘗以二親不及飬每嵗時逄忌哀痛如初喪季父解元君没子天公繼其後兄有疾躬藥食以奉姊寡迎飬於家教諸子以徳義忠孝每舉古人行實為勉子瀚登丁丑進士第嘗奉使東南以無見利忘義為戒平生躭嗜羣書至老彌篤為文渾厚䧺偉務極理趣詩舂容豐雅咸有典律皆足以追配古作四方求者日集户外一時文人咸推服之所著有假庵稿若干巻配陸氏有賢行封孺人先公卒子男四長澄先卒次瀚即進士次滸次泳女四安清適賀庸安福適錢溥安正適吳正安吉未行孫男五橋梓楨檣桐孫女五瀚扶柩南還以明年三月七日葬於其邑武邱鄉袁巷村之原合陸氏兆嗚呼予與公交四十載始終如一日孰計睽違未久公遽永别而屬銘於予哉銘曰惟徳斯純惟學斯正以道自持於物無競遭際盛明歴事列聖黼黻贊襄始終一敬簡輔皇儲弼承永稱位崇望髙由才匪命久矣若人端與古並武邱名鄉水土深靚窀穸是藏百世其定劉鉉墓在虎丘對過袁巷村予家曽祖溥乃其壻翰林修撰施君墓志銘楊溥宗銘諱槃姓施氏正統已未科廷試第一授翰林修撰明年五月丁夘卒於北京從弟宗良輿其喪歸葬奉同郡行人吳惠狀請予為墓銘嗚呼予忍為之銘耶人之不幸莫大於賢而不夀也若宗銘者假之以年所就可量乎予深有望於宗銘今不幸死矣尚忍為之銘耶宗銘姑蘇人曽祖希敬祖志方皆隠終父遵道母金氏有賢行宗銘自㓜警敏異常兒甫成童不屑就家人産業奮然有志於學乃從其父逰淮揚就師授經於大姓家乆之歎曰歸而求之有餘師也乃補鄉校弟子員未幾遂有聲達官君子每加與進既入翰林取中秘書竟日讀之大有所益立程度擬古人詩文未幾盡革其舊習其力學如此宗銘早喪母事繼母嚴氏無間言父嘗來京師侍之出入極其恭謹足為子弟法宗銘在京從學怡怡然誨其所不及遇鄉郡先輩應對間言若不出諸口平居若不知其有官其致行之篤如此正統三年應鄉試明年試禮部皆前列廷試遂魁天下士時年二十有三國朝自開科以來登首選而年少者莫如宗銘故人尤稱重之宗銘恬靜未嘗輕論事一日謁予曰國子司業笞諸生之不律者因是疾故論者欲償死過矣予曰公素厚其人乎曰非厚也為師道故也予於是知其所飬大矣使其年益壯而位益顯則所設施不亦過於人乎宗銘疾方劇翰林諸先生為之求善醫日往視之及卒也又往哭之嗚呼惜哉娶吳氏未有子卒之年十月二十八日葬洞庭山先塋之次銘曰孰豐其才孰嗇其夀嗚呼宗銘孰執其咎施槃狀元墓在東洞庭山黄岡金塔下後又遷於其墓三里許錢溥志明故推誠宣力守正文臣特進光禄大夫柱國武功伯華盖殿大學士天全徐公墓志銘萬安徐公元玉卒於家其子世良以禮歛殯畢逺詣京師持翰林修撰同邑吳君寛所述行實懇懇屬予為銘將納諸墓石用垂不朽予與公相知有素又世良之請仁人孝子之用心也不可辭按狀公初諱程後更有貞元玉其字也世為蘇之吳縣鳯凰鄉集祥里人自㓜穎敏不羣年十二三入小學已能古文詞稍長從都憲思菴吳公遊其議論往往出人意表思菴喜語人曰徐生逺大器也因率之見國子監祭酒頥菴胡先生先生使賦一詩援筆立就語皆老成時先生卧病未出覩公所作為之起坐稱賞不置遂留授業未幾大領要㫖宣徳壬子領順天鄉薦明年登進士第及被選翰林庶吉士公益自砥礪日有造詣久之宣廟御便殿命題親試之公在優列授史館編修公既受直乃取秘書考古軍旅刑獄水利良法孳孳殫究求可以施於今日者而識之蓋期於有用之舉人或譏其非職分所宜為公曰顧此皆學者事所以務之者政恐他日職分有在而有面牆之悔人皆韙其言正統初預修宣廟實録成陞修撰未幾陞侍講嘗簡命修玉牒及分考禮部會試正統中公思承平日久武備日弛上疏極陳外攘之計不可不先時預為之凡數千言皆控禦邊軍良䇿朝廷嘉納焉正統末以邊警故京師戒嚴朝廷選文臣有才畧者授以璽書假御史行事俾守要害一為境土保障一為京師形援公在所選得河南之彰徳比至民老稚潛匿山壑間者甚衆公親詣其所撫諭之浹旬出而復業者數萬人遂鳩為義兵教以戰攻擊刺之法民喜有賴咸踴躍願為之用已而軍退京師解嚴公亦召還矣時奉命出鎮者十餘人迹所施設咸以公為稱首景泰庚午詔公為經筵講官又明年陞春坊諭徳會河決山東之沙灣前此遣治者率即其決築之水大至築輙壊績用勿成朝廷命大臣舉能治之者僉以公應詔陞都察院僉都御史以行至日適河水暴發舟南北通行過者懽呼咸謂神水且以為公成功之兆公竊計是役非積歲不可成役卒久疲不可用悉遣還休息與之期使復來卒既去乃乗舟遡河源踰濟汶沿衛及沁循大河道濮范而返始度地行水而前所遣卒亦如期畢至公因陳治水之䇿其大畧言水性可順焉以𨗳不可逆焉以堙昔禹行水率用是道也蓋河逾雍之險固至豫之平夷其勢漸肆又由豫至兖其勢愈肆而沙灣之東所謂大洪之口者適當其衝一決焉則奪濟汶入海之路而去諸水從之洩矣故隄以潰渠以淤澇則溢旱則涸漕運所為阻也今欲治之宜莫先䟽水勢勢既平乃築其決決既止乃濬其淤因為之方以時節宣俾無溢涸之患必如是而後功可成䟽上詔如所奏於是起自金隄張秋之首凡百餘里至於大瀦之潭踰范暨濮又上數百里經澶淵以接河沁制閘䟽渠用平水勢水勢既平凡河流旁出不順者則堰之堰凡九延袤皆萬丈許其水既不東衝沙灣乃復北出以濟漕渠事既有緒又作大堰其上揵以水門繚以虹隄用平水性水性既平乃濬渠至數百里復作閘於東昌之龍灣魏灣者八涸則閉之蓄溢則啟而泄之皆通由河入於海甫及三年而成功國家永賴之初有發京軍䟽河之議者衆以為未便公乃奏蠲沿河郡邑民之牧馬庸役俾専事河防至是則軍勞省民力紓軍民兩稱便矣歸奏朝廷嘉其功陞左副都御史天順改元英廟以公有迎復功陞兵部尚書兼翰林學士内閣辦事尋封推誠宣力守正文臣特進光禄大夫柱國武功伯食禄一千一百兼華蓋殿大學士辦事如故仍賜誥劵追封其三代子孫世襲錦衣衛指揮使公感上知遇每奏對多剴切上亦才公多所開納一時委任専寵遇厚而曹石輩舊與同功者始忌嫉之㑹廵按山東監察御史楊瑄劾曹石侵奪民田事上既曲宥之而御史費廣又率各道交章劾之曹石以為公所使也遂以事中傷公下獄賴上之明出為廣東參政既行曹石恨猶未釋復誣以事逮致京獄諷所司襍治之三日竟無狀適承天門災上遂宥公謫雲南金齒編民至則僅治一室惟玩易而已時有訐奏守臣胡姓者不法事辭多連公上察其誣置之不問踰三年特詔户部俾公還其家既還杜門却掃雖親隣罕見其面後曹石相繼敗死公始出買田築室為終身之計恒念累被誣陷荷上恩保全之得無大禍故自號天全翁志不忘也今上嗣位詔賜章服閒居自後日與故人耆老徜徉山水間飲酒賦詩相娛樂若是者殆九年一疾竟不起矣春秋蓋六十有六曽祖諱文禎祖諱子復考諱孟聲俱以公貴贈前爵授階勲與公同曽祖妣鈕氏祖妣丁氏妣朱氏俱贈伯夫人配蔡氏宋忠惠襄之裔孫亦封伯夫人子男一即世良儒學生副室蘇出女六祝瓛蔣廷貴朱琇王瑮其壻也二㓜在室孫男美承公為人短小精悍目光烱烱射人與人論及往代興亡成敗之迹輒慷慨激烈聴者為之悚然其初入翰林一時元老若楊文貞文敏諸公雅重其人後凡銜命所至多所建白其作鎮彰徳詢知岳武穆祖父之墓於湯隂奏為即地建祠以祀武穆其治水山東奏復前元所賜顔孟二氏祠田又増置若干畆悉畀嗣人主之供歳祀及遭遇英廟重用方將展厥底藴措諸事業纔五月見沮於讒邪嗚呼惜哉公博學强記自經傳子史百家襍説以及天文地理醫卜釋老之書罔不該究為文雄偉典則詩俊逸足追躅古作者晩年筆力逾健求者愈多所著有史斷文稿若干巻公生於永樂丁亥五月十一日卒於成化壬辰七月十五日葬以成化九年十二月初四日墓在縣玉遮山之原銘曰偉矣徐公駿才碩學才堪濟世學能華國巍巍神功公嘗紀述煌煌玉牒公嘗撰次經幄論道啟沃良多棘闈選賢甄别鮮訛邊師告警東陽震驚持符守鎮民載乂寧河決為患莫或克平銜命往治厥績底成遭時寵用乃秉國鈞方將閎施倐焉而迍行雖或迍名實愈大勒迹堅珉垂示千載祭武功伯文并䟦史鑑於戯丙子丁丑之際天理亦幾乎熄矣惟公不顧殺身滅族之禍起而救之然後君臣父子兄弟之倫一返乎正此蓋天生我公以相皇明無疆之阼也功髙受謗逺竄南服乃天下之不幸豈獨公之不幸也哉竊嘗論之自有生民以來撥亂返正之功惟唐之狄梁與公而已然狄保其身公罹其禍此特出於身存身亡之異耳非智有淺深功有大小也使狄在當時與五王俱存其能免乎三思之殺否耶悠悠之談論人已然之迹以為監國病篤不日當薨神器自有攸屬何必公以生事邀功哉羣議附和如出一口嗚呼為此説者其亦不仁矣夫大寶不可以久虚奸雄之人常利國有釁當此之時歴月不朝中外危疑咸懼生變萬一有亂臣賊子窺其隙則生民之禍未有涯也故公獨決大䇿翊戴先帝宗廟危而復安彛倫斁而復叙四海亂而復正三光晦而復明此所謂萬世之功也而談者反有以病之其亦不仁矣且唐之武氏年已八十旦暮入地中宗已正位東宫民無異望彼易之昌宗輩直狐䑕耳非有絶人之才過人之力也張崔之流胡不待其自斃而奉之顧乃旦夕聚謀稱兵宫禁汲汲以迎復為哉蓋其所慮有與公同也唐之諸臣既不見非於後世則公豈宜得罪於天朝今天不祐善竟奪公夀某等荷公之知痛公之殁用敢論公之大節侑此一奠靈其鑒之或謂鑑曰子為此文子將得罪矣且國家授受自有常典徐公豈當預哉蓋公假迎復之功以為富貴之資爾嗚呼誠是言乎哉夫君臣大倫根於天性茍利社稷當死生以之豈有見其危難而顧利害以為身謀也顧利害以為身謀此乃妾婦也非大臣也當此之際釁隙既成三宫之情不通中外危疑人心洶洶咸不自保而二三用事大臣以預廢立太子之䇿咸懼得罪於先帝其無推戴之心審矣故有選立皇儲圖為自安之計者不一而止一時羣有司百執事之人方將仰承俯就之不暇尚敢措異議於其間哉而先皇帝在幽閉之中至穴牆以通飲食勢同狴犴於時外之君臣惟懼垣牆之不髙扄鎖之不固方日夜宻謀而外求君簒弑之禍將日尋矣然而奸謀之不遂者宗社之靈故耳且自古臣弑君子弑父者皆以身處危疑而然彼亂臣賊子豈忍為是惡逆哉特以逼於事勢不得不為此以絶人望耳考諸史册班班可見故華督之弑宋殤子翬之弑魯隠髙渠彌之弑鄭昭南宫萬之弑宋閔慶父之弑子般商臣之弑楚成李兊之弑主父劉劭之弑義隆皆以得罪畏誅姑欲脱死於一時也然則先帝當此之時豈不謂之至危而極殆乎而公奮不顧身決此大䇿翊衛先帝出險之中尊居九五君臨天下以安社稷其功可謂偉矣但以震主之威易生讒謗此正李泌所謂殺臣者五不可耳豈公之罪也哉彼妨功害能之臣惟以成敗論人而不揆諸理吹毛求疵誣謗百端嗚呼惜哉昔宋光宗以疾不能主其父孝宗之喪宰相留正請立皇子嘉王為太子因内批有甚好及退閒之㫖樞使趙汝愚請太皇太后代行喪禮遂擁立嘉王即帝位於重華宫是為寧宗初不請命於父也然當時不以為要功後世不以為生事良以安社稷之功大也然汝愚為權奸所忌誣以謀為不軌擠之以死然不久復其官爵書册書之以為美談蓋是非之定不於其生前而於身後也且光宗君父也寧宗臣子也先帝君也兄也景皇臣也弟也以比方之孰重孰輕孰順孰逆則是非之辨將不待講説而自明矣鑑之於公雖忝鄉郡人品既殊事功亦異何苦與衆説迕哉况國家之典固非庶人所敢議蓋痛公之忠誠不白於世不勝其耿耿而有此將以竢夫後世之知留趙二公者爾雖以此得罪不悔也謁徐武功墓絮酒來何暮凄凉百感生文名推獨步相業沮垂成才大人多忌功髙謗易行只應墳下水流恨去難平入查山謁徐天全墓吳寛平生晁賈共襟期欲使才名百世垂衆口是非何日定老臣功罪有天知湖山彷彿精神在枝履從容歳月移逝矣姚崇嗟不返憑誰為刻墓前碑祭武功伯墓文祝顥惟公天賦絶倫學精羣籍才髙當世志方古人早發迹於賢科即致身於翰苑論思啟沃足潤皇猷保障綏寧克清時患爰摠紀綱之重懋成䟽𨗳之功而乃明炳幾先宻圖匡復遂成風雲之會親依日月之光寅亮天工爕調元化毅然克以堯舜君民自任謂太平指日可期夫何納牖乍通穿墉既入以是魚水方諧而萋斐交布河山雖誓而陷穽肆張卒至敬輿安忠州之行純仁甘永州之去平平王道蹶驥足於疾驅浩浩長風摧鴻毛於奮舉巷伯之章徒咏緇衣之義誰陳而彼且操戈於入室之後投石於下井之餘攟摭蔓延釀惡未已幸賴皇天顯祐聖主含宏履險如夷完璧往返是雖羣慝之無良亦公矯枉之太峻也夫天地之道寖久斯成化工暴雨疾風無資長育故決防之水必至潰隄髙張之弦必致絶響所以功赫者難成而易堕時驟者易失而難久嗚呼哀哉武功伯徐公有貞宣徳中進士由翰林授璽書假御史鎮彰徳累陞左副都御史天順改元以迎復功陞兵部尚書封柱國武功伯兼華盖殿大學士尋被誣謫雲南成化中赦歸卒於家墓在吳縣玉遮山之原太醫院御醫沈君墓志銘楊士竒仁宗皇帝在東宫二十年太醫惟院判蔣用文最見親厚藥非用文製不進一日用文病且殆上親御寶翰遣中使即其家問之脱不起醫士誰可任者用文書沈以潛氏名附中使以進用文卒踰月上即大位擢以潛太醫院御醫後數月士竒親聞聖語用文真知人以潛真不負用文舉士竒自是始識以潛而與之往還沈之先世皆以醫仕宋南渡由汴徙蘇之長洲思陵嘗書良惠二字賜其家謂其醫之良有以惠民也至今鄉稱良惠沈氏元為醫學提領諱瑛者以潛髙祖也曽祖諱彦才平江路醫學録祖諱徳輝江淛行省醫學提舉考諱孟容以潛諱𤣥蚤喪父能自刻勵於學幾冠盡究其世之傳進而明於素難仲景諸書及潔古東垣諸家之㫖不執古方每審求病源隨證用藥用之必效有為庸醫所治而殆者往往求以潛而安而能報與否一不計也一時鄉之老於醫者多服之而求者日接踵户外矣郡太守舉醫學正科以母老辭禮部以名醫徴至𨽻太醫院即見重於上官有所疑恒就講論既擢御醫為上所信用屢奉命往視總兵官疾而京師士大夫多徳之宣徳壬子秋以潛得疾久未差自歎曰命其止此又聞其長子死疾益加是年十一月三日卒於北京春秋六十有四以潛為人平易質重不為矯激辨巧以華世媚俗工詩好琴閒暇焚香一再鼔自適未嘗求於人故知者亦寡娶滕氏有婦徳先十三年卒子四寅賓宇宙寅先兩月卒女五長未行次歸王某三尚㓜孫男五禧祐禎餘未名女二曽孫男女三人賓將奉櫬歸其鄉竺山先塋之次卜明年十二月庚申合葬滕孺人之墓以治命齎翰林修撰金君問所述事行來求銘為之銘曰醫之克明審覈病源隨宜處方功臻十全彼其昧者執方俟病治十斃五哀哉人命嗟以潛甫允醫之明理究業精厥效孔徵以仁存心以義處物曷不百年恒濟夭折東南其鄉歸藏其墳來世有聞其在斯文御醫沈以潛世以醫仕南渡後由汴遷長洲家焉仁宗皇帝在東宫時以太醫院判蔣用文薦及即位擢御醫頗見信效事行見姑蘇志藝術傳卒於北京墓在竺山都察院右都御史致仕韓公墓志銘劉珝大明成化戊戌十月十五日致仕右都御史韓公以疾卒於家有司以訃聞上遣官諭祭命有司營葬域六部以下暨京師舊好者胥歎曰公一代豪傑而今已矣可惜可惜既而冢嗣太學生文以南京少司冦張公狀徵銘於𤣥堂狀曰君諱雍字永熈蘇之長洲人曽大父諱彦傑積累深厚富貴勿移大父諱舉一父諱貴俱以公貴累贈都察院右都御史祖妣陳妣趙俱贈夫人貴初以閭右起家北京宛平縣故公之發身乃順天府庠弟子員正統辛酉中京闈鄉試明年第進士拜湖廣道監察御史時碭山縣學教諭邱純笞膳夫竹磨兒其父令其逺遁而以死誣告御史勘伏純坐極刑家人累奏寃都憲檄公理之公四散遣人遍訪至河南緝磨兒回純得復職其聲遂大振時三法司刑獄并劾奏章䟽咸經公手未幾廵按江西辨寃獄黜奸貪所至望風解綬廬陵泰和等縣大寇萃至千人乗時刼掠鄉村居民苦之有司不能制公與廵撫侍郎楊寧設法捕之得其首惡并餘黨悉置重典地遂寧代回陞廣東按察副使奉迎二親仍還蘇少保陳循䟽公㢘能幹濟才堪大任陞都察院右僉都御史廵撫江西公至首行均徭法次行歳辨法其法規畫周宻切中時弊民甚稱便值歳飢大發倉廩賑之兼減價糶賣人得以足食天順改元英宗復辟改山西副使尋陞大理少卿又復僉都御史與左都御史寇公同理䑓事有强盜十人當決内二人訴為同起挾仇所指寇云會問已明何仇之有公曰人命至重宜暫留寇不允固諍乃并指事者留之後四人皆得白戍邊翰林學士倪謙主考鄉試得罪於訪事校尉發其結交僚府儀賓事下獄坐重典公復力諍得戍宣府錦衣指揮劉敬因石亨連坐下獄寇欲坐朋黨籍其家公曰東漢時朋黨二字害盡賢人君子公宜審之寇悟改擬敬得遷户於山東大同守臣奏廵撫乏人上即命公奉敕而往至則劾摠兵參將貪財弛備皆逮於法修飭界牆搜括隐占軍士設法俾耕田收米易銀是故邊備之用有餘而無私歛之擾朶顔三衛人要結諸部落率衆犯獨石公合兵出其不意擊之遂驚遁七年議政至京陞兵部右侍郎有權貴者銜之謫浙江左參政成化改元兩廣蠻寇猖獗累征不利上命太監盧永瑄為監軍都督趙輔為征夷將軍和勇為遊擊將軍惟總理難其人僉曰非韓某不可復改左僉都御史公承命益加奮勵時言者謂賊在廣東宜逐之在廣西宜困之衆議紛紛不定公大言曰大藤峽賊巢也舍此而不圖吾未見其能濟遂肅師而行抵廣西界議委都指揮鄒宏副摠兵范信參將孫震都指揮彭倫各授以方畧仍檄湖廣總兵李震隄備公則分營以進至全州諜報賊在陽峒公五發偏師皆捷生擒其魁數人至桂林嚴刑以示軍威大振又以修仁荔浦皆峽賊羽翼乃分兵將二十五哨公與太監總兵領中哨進攻彌月賊遂平路無阻絶捷聞賜敕奬勵陞弟睦為錦衣百户復移師潯州益増器械餱糧令五哨由峽後進公與太監等督八哨從峽南進復令二哨援於後復遣將士斷諸山口賊聞乃挈妻孥輜重於横崖等崖極險處預於山南立排柵滚木礧石標鎗毒矢如雨而下公覘其將怠遂奮甲先登士魚貫而進聲震天地縱火烈焚日色晝暝賊不能支乃遁去衆又云險不可進公曰破竹之勢不可少緩督益急直抵横崖等崖又進九層樓等山壁立萬仞勢控霄漢公復計遣將士於賊所不備處攀縁至絶頂處舉炮為應衆復環攻數十合峽遂破前後得大小寨峒九百餘處改大藤為斷藤刻石山頂以紀厥功初公令士卒得一山一寨即守之勿失故賊無可反之計許生擒被掠男女以准其功故士無妄殺之慘又謂峽内餘孽尚存終必為患宜設土官編管乃奏改上隆州為武靖又徙周冲靖寧二巡司於峽上下水又増土人為宣鄉黄江司隆三巡司副巡檢又置千户所以鎮攝藤縣五屯獞人凡可以固峽之䇿無不行之先是公命將與廣守將共勦髙雷等處流賊尚未成績至是又分遣官軍往助旬月間生擒斬首奪回俘獲共四萬一千七十六名顆口事緩旋至廣東奏捷陞左副都御吏提督兩廣軍務公又奏兩廣地方五千餘里一身不克周悉合用都御史二員巡撫從之㑹以父喪守制於家六部各衙門大臣言梧州城内宜設總府總督等官居中調度殺賊朝廷從其議即其家陞公右都御史總督兼巡撫聴其便宜行事公至築城増兵以鎮禦地方鑄鐵索柱繫浮橋而絶賊船置木牌以覺察奸細買棺以瘞亡卒栽松以葺賢祠皆大服人心九年少監黄沁以公務與公不叶訐奏數事公不與較即具疏乞休家居又六七年以山水為樂壬寅十一月九日卒年五十有七娶王贈夫人繼金夫人子男三長即文王出次斆金出次敞側室王出女一適蘇州衛指揮使謝瑛孫男二女二葬雅山之原嗚呼公之為人爽闓洞達才識髙逺居家孝友與人交有信義下筆為詩文思如湧泉無少滯凝居官處事動以古之豪傑自居每一出師必以曹彬不妄殺為戒故所至全活甚衆累謫累陞未嘗置欣戚於其間天下士大夫無問識不識咸仰其名云銘曰有偉其人有碩其才發身賢科肅政蘭臺副憲於外都憲於内或貳兵曹或貳廷尉載徵浙藩督師潯江巨冦以平吾民用康天書斯頒揚休播美極品斯陟儒紳罕比嘉謨尚在成績孔昭不進之求惟退之髙峩峩吳山悠悠𤣥室勒石刻銘千載無斁吳都文粹續集巻三十九
