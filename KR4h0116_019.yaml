body:
  text: 呉都文粹續集巻十九明錢榖撰山呉山賦并序失名舊志嘗載晉名人左太沖所作呉都賦雖極其鋪張雄麗要非情實其次賦松江者三復有震澤太湖分湖等作近間莫學録景周又賦石湖而于山賦特缺愚嘗憶少時與友遊天平而賦之矣兹不揣蕪陋併効為呉山虎丘洞庭三賦以補之其詞語鄙俚氣勢靡弱所謂俳不俳文不文僅雕蟲篆刻之不遠烏敢望情形乎詞詞合乎理可觀可法而不失騷人詩人之軌度哉然而非所有而妄道之罪庶乎可免耳江南勝景中呉奥區羣山羅列巃嵸逶迤或遠或近或崇或卑試登髙而四顧紛總總而離離爰偏詣而歴覽竟秩秩而差差稜角脈絡之峭厲詎琢鏤之雕巧紀堂椒岊之嵁崿可聯綴而増埤嶕嶢特拔為翠壁丹􅀈之㟞嵼嵂崒岟􅸌乃碧岑紫巖之阽危肆巑岏而偃蹇豈造作之多態忽飄簸而起伏奚變幻之無涯上凌層霄空青聳而嵐漠漠横布曠野濃緑染而烟霏霏玳簪翠翹綰髻鬟于金鏡斑劍雕戈排牙爪于彤墀肖舞鸞兮蕩雁類伏鵠而蹲鴟猿猱攫挐兮駭藪郊之豹兕蛟蜃蟺蜒兮走海堧之象犀閃似旌旄幔訝張幄窪疑盆臼鋭詫立錐執臨莊之士笏抹騁豔之蛾眉浮曉天之沆瀣開秋水之芙蕖如獻如擎如覆如椎若寢若掲若摶若僛或俛若想或閒若癡或向似步或倚若疲或跂然如望或凝然若思或端矣而容正或醉乎而弁欹􅀈兮若章榯晰兮若姣姬日將晴兮似喜天將慘兮若悲狀豈尋常可容指擬勢逾百億莫殫言詞惟萬安之崟嶜萬安山名也一名陽山在郡西北最髙矗千丈于乾維作一郡之鉅鎮育靈物而躨跜躨跜龍動皃山趾繆氏常産白龍立祠以祀載在祀典由龍能興雨以滋稼時化甘澍以甦夏畦管與墡嶺東北有管山白墡嶺拱于艮方彭洎陽抱西北有彭山陽抱山接于西陲甑兮霧蒸籠兮雞栖北有甑山雞籠山皆以形名之此為吳山之宗主其他圌嚴温顧象福爬蹠等類其北有嚴山圌山温山顧山東西有象山即福壽山爬石嶺并南北二𤓰山皆有附麗也由是犬之餓陽山之南有賀九嶺人訛呼為餓狗嶺鳯之飛有鳳現嶺聳碧蓮之娟葩花山也上有池開千葉蓮故名呈玉井之芳姿腰窏停沼滉漾琉璃是謂之天池千瓣萏吐弗涅淤泥載之真經可考老子枕中記云池生千葉蓮服之通神服之羽化可期鹿走乎疃鹿山也在華山之南龍飲乎堤龍池山也攅􅤢㠑簇嵒齬錦峰擺乎步障錦峰山也其石皆紫赤故名玉遮拗乎晴霓玉遮山也虞雍國厯藏雲仍之秀特宋雍國虞公孫夷簡曽成夫皆居遮山鄭兵部䝉表金畫之光輝尚書鄭起潛居錦峯山致政歸時理宗書二大字寵之若乃鄧尉聚塢銅坑蟠螭四山也皆在光福之西切臨澤匯津液沁滋山皆近太湖浪濤激其跟麓栽植遍于址埤其山多出果品朱櫻銀杏之裹樹林檎楊梅之壓枝杏桃粉李之結橙柑金橘之垂居民藉以貿易行商販而奔趨中有𤣥墓異境萬峰樷圍光福有𤣥墓山鄉人稱為萬峯者景幽甲于吳萃聚景象棲息梵緇殿廊燦金杉櫟蔽翬面波光之接天拂嵐翠之濕衣類天童之與雪竇陋開先之在匡廬勝槩壓乎江左清幽擅乎浙西真蓬萊之仙島賁人世之所希周吕繁乎工匠𤣥墓東南有吕山南有周山皆梓人墁人髹工之所居甚衆法華覆乎鉢盂法華山名又名塢鉢山乃夫穹窿駊駥穹窿山名最髙大峻逼秦餘陽山一名秦餘杭山惟此可與為匹巒叠五英山一層謂之一英嶺伸兩波壘師岩于冢巔其山平頂上有國師岩噴法雨于翠微半山出泉謂之法雨磽䂚代赭素産石脂是山産赤石脂古赤松子居此食而仙去赤松服之以成仙買臣樵此而讀書漢朱買臣實隠此負薪讀書遂獻䇿于漢廷守本郡之㑹稽初吳為㑹稽郡至後漢始改名吳郡其顯融也無比故鄉衣錦而歸何終殞于信讒啟仕途之歔欷􅑬嵼而巙砐峨而㟎㟎山相連也兹山右支迤邐而南數里至香山徑采香兮倩宫嬪之纎手香山也下有採香徑廟祀胥兮報直諫之忠壘胥山有伍大夫廟倍城縈紆半舍隇䧅傍浸湖口背繫以胥山下之湖曰胥湖湖所入之港曰胥口迤東則屼􅀈而􅣊岵屺而岨石山戴土曰横以下横山頗大皆石之戴土者也薦福楞伽寶積姑蘇四山相連薦福為大初總名之為横山荒臺廢址何草莽之寂寞歌樓舞榭僅狸貉之慿依但見七峰嶻嶪薦福山有土峯七最髙五塢崔嵬山有五塢曰白雲丹霞修竹叢桂飛泉又名五塢山今云九龍修竹飛泉之查上藍古刹之迴細荈佳𤓰兮馥美是山出茗及𤓰尤甘美名曰薦福𤓰鞠柏稚檜兮葳蕤五塢内生側柏叢檜甚蒼翠婆娑人多買以種玩叢桂香飄嶧表丹霞晴䕶磵隈昔有朱侍中張曹掾皆竁而瘞之吳朱桓晉張翰繼有廣陵王節度使亦兆而記之吳越錢元璙及其子文奉墓並在薦福山塢中裔孫公著撰碑陸雲公顧野王宅峙其朱明山南𦵏處名陸墓山野王墳在楞伽山南鄭太尉富司徒窆穿于感慈宋文肅鄭戡與學士葉清臣二葬俱在寳華山司徒富嚴墓在感慈塢至今有石麟傾在澗寶華花園二山名也前後連贅青霞鴨踏左右繫纚吳山東有青霞塢薦福西有鴨踏嶺吳山道院人往焚修者必上已重陽之取競薦福之東峯號吳山上有真武祠吳人每于三月三日九月九日往焚香者如市上方神廟民來祭賽者雖寒暑旦夕之無違楞伽山一名上方山有神祠人來祭禱者自春徂冬無風雨旦暮之間行春橋畔之泊樓船紫微村裏之舁肩輿二處焚香者皆泊舟之行春橋雇肩輿穿出紫微村而登山白雲散隴𢎞景玩而情悅緋桃滿谷晨肇入而路迷白雲名見前注吳山南有桃花塢巉巉普陀于巖頂楞伽山東北有普陀巖前石池甚竒􅀈􅀈茶磨兮水湄茶磨山也以三面皆水又名茶磨嶼箕踞湖澨薦福諸山初名為踞湖山最為嵰嶮擬夫郡障衛乎坤維已上横諸山皆在郡西南背抵黄岡之擁黄山也儼然筆格之施黄山似筆格亦名筆格山有灌邑之鶴阜何山初名鶴阜灌邑其地名也有鈴索之狻猊獅子山也鈴索其左右之小山中突靈巖靈巖吳山之髙有名者儡硌而嶨儡硌大石也山多大石曰嶨嶙峮匪畸景優當世名重昔時慨霸王之創業即館娃之故基屧廊悄而莫紆蓮步琴臺冷而孰鼓朱絲花罨西施之洞粉凝香水之谿井沼瑩滑山上有吳王八角井并石沼倒涵象緯殿閣鱗眴雄構厜㕒石鼓設兮喑由世泰石馬趿兮望如人騎石鼓鳴即有兵石馬望之如人騎其切附者則嶁岵山也白華山也博士野芝二塢名亦山也其逺接者金井塢名岐禾嶺名官貞二山名雅宜山名􅩯村研璞㠛村山所出研石文房所資趾有宋將之墓王封乎蘄御題佐命元勲文載中興巨碑至今穹碑題云中興佐命定䇿元勲之碑榮聖朝之祀典表激勵之常彞生氣猶存英風凛如更有天平吳山竒而名者秀質美姿為吳之望出類而竒棖臬撐娑竭之闕山竪二大陡石謂之龍門蟾蜍石名卧釣魚石名之磯溜穿綫縷山有一線泉石剜梁楣有大小二石屋峰飛來兮匪彞山有飛來峰湖照徹兮無疵山質有巨石圓而西向謂之照湖鏡亭亭峭崿兮卓筆磊磊嶔崟兮累棊衆石磥砢如棊布列白雲一泉甘洌如飴酌之可滌乎塵襟濯之可淨乎冠緌評水味為第一笑桑苧如偶遺挽秦臺山名羊腸嶺名以肘腋援仰天山名金赤二山名為凥肢豁兮谽谺岰兮甌㬰天台罕儷興公難形容于作賦終南堪匹韓伯盍次序而成詩仰鄉哲之廟貌拜忠烈之威儀繁綿逺之仍裔見義澤之永垂其憂樂先後乎天下而道學授受于横渠此魏公為第一流人物而實鍾秀萃美之于兹夫豈區區陂陀之為嶅瑣瑣􅑬嵼之為巋者哉座椅支硎其北之山南峯支硎山之别名委蛇㠌崖為室道林所居寒泉標踰文之字有泉㵼壑其傍磐石上鐫寒泉二大字文許甚遒勁相傳顔魯公書碧琳縈走磵之綏碧琳亦其山泉名馴牯倚岫兮㸷突兀之首牛頭峯神駿陟磴兮印蹀躞之蹄山有馬跡石篠蕩蔽洑薜蘿沿溪巘闢兩肩兮聱屼而通行山有石門亭放雙鶴兮翩翻而凌虚支公有放鶴亭其址猶存中峰北峯皆列㦸而輻輳報恩髙景二山名總潑黛而淋漓秦國妥靈兮綽楔猶在宋太師秦國公魏鶴山墓在髙景山西金盆塢至今石牌樓柱并墓田碑尚存樂圃歸𤣥兮土饅弗頹宋樂圃先生朱長文墓在天峯寺傍雖云靜定而樵牧之來噪支硎北有定山固號斜偃而棧􅀈之靡隳髙景山南有斜偃嶺是為山之連屬者至此而止矣厥亥隅之徐侯桓桓而拱近望亭有徐侯山其寅方之白石齒齒而齊滸墅北有白石山郡北數里孤竦于平疇者為虎邱之佳致而擅名于嶮巇焉匪詫梵宫寶塔之瓌麗穹樓傑閣之光輝灌木掩映幽徑倭遲曰惟岣嶁山頂曰嶁原瘞闔閭利器三千魚腸盤郢巨闕扁諸皆在所殉洎汞海銀鳬致使金氣發精結成於菟非彪非羆其名以隨至今兩厓嶄絶清波漣漪最肆怪詭號為劍池其他生公臺千人座試劍石陸羽泉養鶴磵短簿祠風景不一而足豈出于人為皆由于天巧屢經墨客之品題隠于此者何求何㸃顧越史德義尹和靖紀其事者王珣謝舉顔真卿白居易蘇東坡王元之播之銘賦猶詳勒之金石無虧有好事者言今之所聞于實不及若見虎丘其實乃逾又有言不抗雲而無藏影異疎林而匪土培一月一遊以數則匪觀是言也既為昔之所愛詎特今之可怡所以當韶華豔冶紅紫芳菲舞粉蜨鳴黄鸝但見泛舟鼓枻槳榼載攜雜簫鼓奏塤篪麝蘭飄香綺羅曳裾逐隊以遨拉伴以嬉殆無虚日亦弗少間于隂雨而炎曦也此皆在於平壤及有㢲位尹張之堬有尹山張林山皆在郡東南堬塚也為周臣尹吉甫昔守張𤣥之所𦵏地也若在太湖中者洞庭林屋金鐸莫釐此湖中四山為尤大者綽著靈跡共七十有二羌不能悉舉乎枚嗟夫山之為言宣也含澤布氣而調神山者産也寶藏風雨之於斯豈特列屏而具瞻良克阜民而造禧况陽起于西北其餘皆為之委支漫衍五六十里之遥何異羣馬之馳而城郭正當其㑹聚坦然得置夫平夷所以屢出乎人物觀之嵩岳之降申甫魯丘之孕宣尼其注意于育賢不然奚古今甲科之冠曽左驗其石之移舊志穹窿山石移狀元定來歸宋穹窿山石移城中黄由冠甲科今𢎞治六年八月十八日蜀山蝦蟇石移九年城中出狀元朱希周良驗詎但為仁者所樂愛者所玩賦之以詞可傳登之以屐未徧師故愚欲道之而猶悱述之而莫揄弗憚博議之所鄙績學之所嗤聊捃摭乎覼縷以祈裁正于深知天平山賦與友遊而作危乎竒哉山之有天平也粤自上升下凝餘滓中停遂成厥形邈不知其幾千萬齡也但有土殷而石蒼倚空而撐漢渟沖和之萃氣作句吳之偉觀其勢脈則戢湊而盤維其位置則負艮而面離椅藉乎支硎盆盥乎天池暱靈巖于前郊朋穹窿于右陲薦福之嶺九叠疑甲屏之列具區之波萬頃訝冰鑑之施芙蓉浸兮軃潤簮笏拱兮參差浮紫金之沆瀣兮掀獰飇以簸蕩綰青螺之髻鬟兮沐膏雨而淋漓語其嵂崒兮逼東魯之鳬繹詫其挺拔兮儕西蜀之峨眉居兮邃奥造兮逶迤詎容凡俗之所闖豈許瞀矇之所知撰地志者闕載修山經者罔遺非養髙肥遯絶粒茹芝者烏能幽敻以宅之微遐覽㝠搜違世通真者何肯逍遥以遊之䝉以素懷宿想旦望宵興買彼輕航拉我友生時春光以明媚矧鳥鳴兮嚶嚶指兹山以為遨爰團辭兮以敘其所經抵岸命僕駕輿挈觥始逗樵子之途遂投化人之城岑樓傑閣碧甃朱甍象犀迭乎隠現鐘鼓訇而交鳴老衲出迓茗甌式陳逸興孰禦然偕登陟其麓盼古松百尺偃若華蓋凌其岡覩飛流一派縈若綫帶石聳龜兮蟾蜍之傍峯卓筆兮飛來之外援樛木之藤藟衝經堂之烟靄半山有亭白雲其名泉出其上名同乎亭憩之煩慮可袪酌之塵縁可清古人多于是兮駐行跡吾儕益于是兮揚心聲去此則有蜿蜒之扃嶻嶪巉崿夸娥之力莫舉巨靈之斧曽斵湛青天之半痕擘孤雲之兩角鯨濤澒洞使人心愕去此則自大小石屋剏由鬼工廣砆覆宇貞珉啓窗蝕壁落之菭蘚填圖幀之青紅于焉䕃息移時從容出則境益險誕步漸陟峭羣巒層巘鬬竒獻巧如虯如龍如虎如豹或縱或却或卧或矯伏者若拜突者若走纎者劍鋩洼者瓦臼欹者醉弁呀者噱口偃若曝鼈翼若搏鷲恣眸子之瞭然得出無而入有動乎動靜乎靜詭乎詭正乎正擁頭陀于猊牀迸蓮花于玉井千態萬狀靡可言罄上則攝衣齊于丹梯紆屐齒于飛磴琪樹發兮葱蒨澗葩敷兮娟靚乃載躋兮載扳務欲殫兮兹辰之興驚鴻翔而脫兔奔共直抵于照湖之鏡至此則去天一握而為山之絶頂胥脫巾兮坦腹肆箕踞兮坐訊迴鸞雝雝兮垂唱踆烏翩翩兮弄影呼長風兮倏來挹飛霞兮何迥羨六合兮無疵賀萬衆兮齊奣坤輿綿兮夷曠乾旋健兮斡運顧吾生之渺然立兩間之末命肯免汗簡之捐徒被嶐嵸之哂陋牛山之沾衣亦微悁之耿耿有蒙告曰其趾西被翼祠巋然是宋之范老而憂樂為天下先扶仁植義延四百年實吾鄉之先正為蓋世之大賢厥神棲于此恍容與而留連惟相距僅伊邇當㑹領而勉旃率客肅容凝望而往拜焉噫醯雞弗足以言海夏蟲莫可以語冰茍察識之匪枉通抑鬱之累情瞻公遺像兮已信抱負之忠貞慕公往烈兮當服德量之恢𢎞若說之築巖兮山固由公而致譽若嵩之誕甫兮公亦由山而孕靈彼有曠百世而相感者雖頑懦兮廉立茍不能彷彿其萬一寧不愧邦之後生奚必仍羽人于丹丘睎不死之福庭捨瑶草騰璇冥脫屣委蛻為不踐實而取躓彼荆榛之鄙抑未布忱而兾醉宴乎蓬瀛之榮者哉咸洗盞起壽而哀樂交并退而要各考其所就庶幾無負于斯行遊山記周必大五月丁亥早范至能顔休文相別于閶門外唐致逺聨舟繞城望姑蘇館而過八里至横塘又數里至横山又數里過木瀆遂至靈巖院至能走价送董香松黄新茶其簡云來日登天平須扳援至逺公亭及諸石屏處白雲泉名在水品其色凝白蓋乳泉也張又新以虎丘視松江在第三第六而下此泉未知如何試一别之向壽老欲作亭泉上及别築逺公亭寺石上山路傍有石龜形極似向亦有名近無知者忠烈廟具有文正已下畫像挂壁謁之丙辰早升小車過天平下嶺甚峻約數里至白雲寺圖經云唐寶厯二年置在縣西南二十五里本逺録公道場今為范文正公功德院文正父祖𦵏山下寺有白樂天蘇子美王君玉蔣希魯詩刻欲同致逺登山而脚力頓疲難之然思至能簡中語遺恨他年遂奮衣右轉而上酌白雲泉甚白而甘躡石磴至卓筆峰峯髙數丈截然立雙石之上附致者甚隍杌疑其將墜餘如屏如矗或插或倚備極竒怪行十六七里石愈衆而力愈憊乃循左徑訪石屋三面壁立覆以二大石少休其中下至小石屋一石覆之又下至飛來峰髙二丈上銳下侈微附磐石前臨屋谷兹其異也又東下逺公菴一名望湖臺正直寺後又下至五丈石亦閣石上次至頭陀巖有蓋斜蔽之次至龜石脊勢隠起名不虚得此山大抵皆石也瑰形詭狀可喜可愕今日適疲倦又當暑不能窮其巔然郡人能至予之所至者寡矣况遊客乎歸寺欲拜文正及四子畫像坐待魚鑰移時乃至明日乃文正忌辰也遊天平山記柯九思中吳之西天平山為之長實為吳鎮原隰環之河江絡之其上多怪石如斵冰如琱木或立或僵或如介夫或如奔馬不可名狀其木多松檜有泉出焉曰白雲之泉㵼于蒼厓激于巨石注于絶澗聲如鳴玉其味甘冽是山也范魏公之祠在焉其祠用中牢魏公吳人有施于鄉黨德義至厚既死而不沒故鉅公名卿髙人韻士經由是邦莫不肅拜祠下顧瞻遺像而仰其休風夫玉藴石而山輝珠藏淵而川媚况德義所加丘陵林麓有不増其髙而發其耀乎故兹山之勝抑亦以其人重也至元再元之嵗冬十有二月江浙行省參政富珠哩公徵拜翰林侍講學士于是郡守濟南張公亦拜吏部尚書趨朝有日適相遇也班荆語舊偕遊是山謁魏公之像臨白雲之泉翰林各賦詩七言四韻九思等屬而和之新除敎授紹興路儒學范文英靜翁魏公八世孫也主奉祠事奉觴為壽而請曰翰林擅詞宗于當代尚書被遺愛于中吳雅道允叶嘉㑹難逢不載以文何以示後請為之記將刻諸祠翰林以命九思固辭不獲因道先生遺德山林勝槩而附以兹游之嵗月焉翰林名翀字子翬尚書名某字淵仲同遊者平江路總管府判官楊時舉思明推官王大有廷秀經厯王諫仲正知事巴圗彦實儒學教授蔣伯昇進之𤣥明通道虚一先生趙嗣祺住持白雲寺沙門淨標為文者奎章閣學士院參書文林郎柯九思遊天平山記髙啟至正二十二年九月九日積霜既霽顥氣澄肅予與同志之友以登髙之盟不可寒也迺治饌載醪相與指天平山而遊焉山距城西南西南水行三十里至則捨舟就輿徑平林淺塢間傍竹石叢翳有泉伏而不見作泠泠琴筑聲皆欣然停輿聴久之而去至白雲寺謁魏公祠憩逺公菴然後由其麓徂􅍻以上山多怪石若卧若立若搏若噬蟠挐撐拄不可名狀復有泉出亂石間曰白雲泉綫脈縈絡下墜于沼舉瓢酌嘗味極甘冷泉上有亭名與泉同草木秀潤可䕃可息過此則峯迴磴盤十步一折委曲而上至于龍門兩厓並峙若合而通窄險深黒過者側足其上有石屋二大可坐十人小可坐六七人皆石穴空洞廣石覆之如屋焉既入則凜然若將壓者遂相引以去至此蓋始及山之半焉乃復離朋散伍競逐幽勝登者坐者哦者嘯者憊而喘者恐而咷者怡然若有樂者悵然俛仰感慨者有悲者雖所遇不同然莫不皆有得也子居前益上覺石益怪徑益狹山之景益竒而余之力益以憊矣顧後者不予繼乃獨褰裳奮武窮山之髙而止焉其上始平曠坦石為池拂石以坐則山之雲浮浮天之風漻漻太湖之水𣺌乎其悠悠予超乎若舉泊乎若休然後知山之不負于兹遊也既而欲下失其故路樹隠石蔽愈索愈迷遂困于荒茒叢篠之間時日欲暮大風忽來洞谷吟嘯鳥獸鳴吼予心恐俯下疾呼有樵者聞之遂相導以出至白雲亭復與同遊者㑹衆莫不尤予好竒之過而余亦笑其恇怯頹敗不能得兹山之絶勝也于是汎酒樂飲將半予啟言于衆曰今天下沸蕩十年之間諸侯不能保其國大夫士不能保其家奔走離散于四方者多矣而我與諸君䝉在上之力得安于田里撫佳節之來臨登名山以眺覽舉觴一醉豈易得哉然恐盛衰之不常離合之難保也請書之石明年將復來使得有所考焉與范文正薦白雲泉書陳純臣粤自剖判融結其中傑然髙嶽巨浸不待標異固已聳動人耳目不幸出于窮幽之地必有名世君子發揮善價所以㑹稽平湖非賀知章不顯丹陽舊井非劉伯初不振惟胥臺古郡不三十里有山曰天平山山有泉曰白雲山髙而深泉潔而清倘逍遥中人覽寂寞外景忽焉而來洒然忘懷碾北苑之一旂煑并州之新火可以醉陸羽之心激盧仝之思然後知康谷之靈惠山之英不足多尚天寶中白樂天出守吾鄉愛貴清泚以小詩詠題後之作者以樂天托諷雖逺而有未盡是使品第泉目者寂寂無聞蒙莊有云重言十七今言而十有七為天下之信非閣下而誰歟恭惟閣下性得泉之醇才猶泉之睿仁秉泉之健智體泉之動竭是四難鍾于一德又豈吝陽春之辭以發揮善價純臣先人松檟寘彼一隅嵗時往還嘗愧文辭窘澀不足為來今之信倘閣下一𠻳牙齒之末擘牒發詠樂天如在當斂䇿避道不任拳拳之誠登天平山頂范成大翠屏無路强扳縁我與枯藤各半仙不敢髙聲天闕近人間漠漠但寒烟重遊舊遊彷彿記三年轟飲題詩夜滿山山上白雲應解笑又將塵土涴朱顔再遊天平有懷舊事且得卓庵之處呈夀老方丈訪舊光隂二十年殘僧相對兩依然木蘭巳老無花發石竹依前有麝眠萬户直須龜手藥一龕何用買山錢從今半座須分我共說昬昬一覺禪遊天平山髙啟入山旭光迎出山月明送十里松杉風吹醒塵土夢兹山凡幾到題字遍巖洞陽厓樹冬榮隂谷泉夏凍怪石立誰扶靈草生豈種白雲蓊然來諸峯欲浮動髙鶻有危棲幽禽無俗哢凌蘚知履滑披嵐覺裘重常登最上巔逺見湖影空漁樵渡溪孤烏鵲歸來衆還尋老僧居隔竹聴清誦慰我躋扳勞為設茶笋供幾年厯憂歡造物若揶弄迷途逺山林遲暮堪自訟難追謝公遊空發阮生慟身今解組紱明時愧無用閒持九節笻尋討事狂縱石屋秋可眠山猿許分共同前倪瓚天平爛漫遊三日林下狂吟石上眠浩蕩春風芳草緑梅花雪滿白雲泉同前楊基細雨茸茸濕楝花南風樹樹熟枇杷徐行不記山深淺一路鶯啼送到家留天平范氏莊韓奕好遊忘六月隨處况相留苗槁石田廢蟬聲山寺秋解衣修竹下濯足石池頭為問髙僧輩何人得自由宿天平白雲精舍張適蟲鳴葉響悲秋思露氣風聲送夜凉自是神清苦無寐翻疑僧境漏偏長重遊天平山伊乗羣峯秀拔亂雲開二十年前記我來路入青松無導騎山中猿鳥莫驚猜登天平山幾度天平遊未登最上頭一身初辭宦海内兩脚再與山靈謀吳中自昔稱山水竒峰併在兹山裏朶朶芙蓉秋岸生亭亭鸞鵠晴空峙仰天大放胸襟開何須弔古重興哀石獸荒烟卧荆棘龍門白晝藏風雷九十春光正明媚况值太平無一事蠟屐追隨麛鹿羣清尊笑傲鶯花醉下山力憊宿禪扃十年塵夢今始醒山之雲英英山之泉泠泠雲我可玩兮泉吾可聴歸來凖欲繼幽賞嵗晚長鑱尋茯苓滿庭芳雨後遊天平諸峯徐有貞水長新波山横爽氣朝來宿雨初晴動人清興紫翠眼中明天也教吾快活要遊處便與完成最好是一峰送過又見一峯迎有舟中絃管車前鼓吹隨飲隨行路傍人覷了還笑還驚道是神仙神仙來也不道是个老儒生知誰解浮沈緑野裴度晩年情遊天平山范公書屋巳蕭然春暮來遊倍可憐江雨暖飄花下路白雲寒㵼岫中泉振衣獨上千峯表引轡徐迴萬木邊為待功成身退日應求一畝種𤓰田遊天平王鏊春風撩我作山行畫舫西來半日程怪石插天欹欲墮冷泉和月滴無聲登臨不盡吳中勝憂樂誰闗范老情晩立龍門最髙處始知身世與天平重遊濯纓重向白雲泉曲磴幽林詰屈穿駁落殘碑猶可讀坡陀巨石自堪眠俯臨人世三千界仰見龍門尺五天此地頻來殊有意肯敎憂樂負前賢登天平絶頂周忱來往姑蘇已十秋西山今日始來遊躋攀不復辭衰病直到中峰最上頭陪天全遊城西諸山劉珏琴臺石屋恣躋攀上相襟懷豈等閒一路兒童皆拍手幾人風雨亦登山乳泉分入茶罏内瑶草收來藥籠間直把天平作盤谷烟霞髙卧不知還天平山蔡羽有峯天然竒發彩自融結椅梓交秀森隂潭厯清徹及兹宴暇辰獲奉親眤轍遊遵坡陀阪爰叩衍奥垤緬瞻范相祠道迥風烈烈斯人義千古豈惟一世傑形疲心益强眼明晝飛雪願言謝衣冠樵蘇寄巖穴重遊采緑南山暮乗霞北塢朝石闌迴碧磵銀磴到丹霄香饌出修竹晴光動逺條平生瞻望處今日坐岧嶤天平山王寵萬嶺遥蹲伏天平勢自雄翠屏藏洞穴紫霧蕩虚空戈㦸龍門拱風雲鳥道通蒼蒼殊不極長此鎮吳中遊天平山白雲泉謝縉白雲泉上白雲亭京國歸來喜重登欲試坐間誰老健酒酣先上最髙層天平山白雲泉范仲淹靈泉在天半狂波不能侵神蛟穴其中渇虎不敢臨隠照涵秋碧泓然一勺深游潤騰雲飛散作三日霖天造豈無意神化安可尋挹之如醍醐盡得清涼心聞之異絲竹不含哀樂音月好羣籟息涓涓度前林子晉罷雲笙伯牙收玉琴徘徊不擬去復發滄浪吟乃云堯湯嵗盈盈長若今萬里江海源千秋松桂隂兹焉如有價北斗量黄金白雲泉錢藻白雲巖靜最深隈泉溜泓容石竇開宿霧不生澄曉月殘風輕颺蟄寒雷源從天漢星邊落流自鰲峰海上回莫謂無心自奔注曽隨霖雨下山來同前范成大龍頭髙啄𠻳飛流玉醴甘渾乳氣浮捫腹煮泉烹鬬胯真成騎鶴上揚州同前髙啟白雲不為雨散在清泉流泉氣復成雲山中同一秋巖前石竇幽寒處雲自長浮泉自注潛龍未起出深泓渇鳥時來下髙樹雲應無心飛上天泉亦不肯隨奔川老僧愛此不復下山去卧雲飲泉終嵗年天平山周南老天平翠嶻嶪髙與霄漢齊星辰手可摘磴道飛中梯偉石聳竒秀巖屋藏幽棲溶溶白雲深流泉瑩玻璃絶頂照湖影光眩眼欲迷我當極遐覽杖屨窮攀躋白雲泉出山為白雲在山為甘泉顧兹白雲深有此清且涓石乳流蒼竇秋碧涵青天乃知氣所鍾靈澤襲九淵水昇即變態彌亘層厓巔散作三日霖造化伊誰權一線泉在山中范成大二十三年再入山此山與我有前縁時人不用憐衰病天與月房一線泉華蓋松俞焯次近勾陳第六星一株相似色冥冥能眠獅子山前路難比龍門石上形此十八公非草草後三千嵗獨青青來遊未怕遭風雨不用秦封請勒銘蟾蜍石楊基神蟇月中來化作千年石曽吞玉杵霜清露時時滴卓筆峰周南老東巖立孤峯上銳如卓筆林表露青岑偉然脫穎出蒼烟潤生花墨光洒淳漆應知定逺投飛來風雨疾遥指研山石雲錦燦緗帙筆下魏公祠忠勲紀勞述大小石屋髙啟雙厓立幽闗一洞開深宇青嶂近為鄰白露閒作主不受杜陵風可避河朔暑華棟幾回新渠渠獨千古同前張羽山根攅棟宇簷梲勢峻嶒卻許誰來住閒雲共老僧照湖鏡上有巨石圓而面湖者楊基圑團山上石下照太湖影如何一鑑中三萬六千頃天平山龍口泉徐有貞一口清泉湛湛流巖前閒度幾春秋風雲㑹有相從日霖雨君看遍九州五丈石髙啟勢危撐月墮影瘦倚雲平彷彿華峰井蓮花一半生雨中過雞籠春雲晻靄澗奔渾風雨行人過一村得似山家深竹裏乳鳩啼午未開門寄琦元璞顧悳輝雞籠山下野人家破曉寫詩邀品茶秋風過樹落紅葉夜雨滿溪流白沙雞籠山在天平之東乃其支嶺也金山杜庠闔閭城外翠微間揚子江心白浪灣踏破芒鞋蹤跡遍始知人世兩金山同前王鏊石徑纔窮忽又通重重臺閣半浮空一林蒼翠瀟湘雨萬頃青黄𥝧稏風鈴語上方雲氣白詩題壞壁蘚痕紅未留玉帶空歸去慚愧山僧問長公金山寺避暑望雨作戲效玉川子體楊循吉山中日日望雨至立向山頭看雨氣今朝且喜雨果來隂雨成片當天墜雲之來兮竒且特有如推山至遮盡半天黒黒雲上有白雲行白白黒黒兮重復輕不知黒雲是風白是雨白雲多處先沾注雲中雨脚畧可觀數條當天大如柱此雲光自北方起汗漫只謂太湖中來返頭看忽然風自東向來却把西方之雲盡吹散衆人觀者都言苦復苦日日望雨又不雨幸得一片雲推來自天北須臾變作大雲有黒亦有白令人覯之恐怖生若要作雨不如此不得雨未至兮雷先鳴驚人不須用多只一聲魈肝鬼膽在何處世上亦有奸人立不住樹頭蕭蕭風作閙如今却是雨真到吾且閉門髙坐看汝落落到三日五日也不惡金山寺蔡羽西寺躡雲去東林觸雨來車前青樹合橋口碧流迴香飯松花早巖房竹葉開磵霞隨屐起飛去䕶山杯同前王寵山雨疎疎㸃藤花滿寺門天香披畫室靈影湛清尊磴接丹臺古碑殘緑字存可憐春草意早晚遲王孫金山亦天平之支壠也初名茶塢山晉宋間鑿石得金易今名頂上磐石有坎闊三尺許長二丈餘深不可測水瑩緑大旱不涸人稱為天山腰有石横偃于兩厓人行其下其趾有育王墖方石池文殊菴在焉東有牛眠崦逶邐五六里直抵大河赤山舊事楊基舊向溪南看蓺麻竹扛兜子一肩斜秧苗尚短仍含穀荷葉才髙巳上花蠶屋柘烟朝焙繭鵲爐沈火晝薫茶而今風雨成抛絶卧聴西園兩部蛙赤山漫興松梢吹粉落衣裳躑躅花開竹笋長可是山中朝洗藥一渠春水茯苓香懷赤山舊業東林攜䇿處南垞釋耕時一徑都縁石諸泉盡到池靜憐松響續涼愛竹隂移盛世容歸隠毋令解組遲其二漸與世紛逺自然塵慮消沼隨碧溪水徑渡緑隂橋岐路迷還識孤村近却遥閒身任來徃不為野人招赤山在秦臺山南羊腸嶺之南長可數里土石多赭色洪武中詩人楊基家其下重九日行營壽藏之地范成大家山隨處可行楸荷鍤攜壺似醉劉總有千年鐵門限終須一箇土饅頭三輪世界猶灰刼四大形骸强首邱螻蟻烏鳶何厚薄臨風拊掌菊花秋得壽藏于先隴之傍密邇松楸地一隅㑹心何必問青烏亢宗雖愧鎮周子沒世尚從先大夫京兆漢阡賢問望邢山鄭冢儉規模家庭遺訓焄蒿在不學邠鄉畫古圖仰天山在赤山之東近天平舊名馬鞍山宋范文穆公成大營墓于此以近天平山慕范文正為人故改今名傍有覺嚴寺為文穆奉祠之所今廢靈巖袁易緒風散林薄洩霧開巖扃兹晨愜清穆曠懷延杳冥九折度峻壁微行窮絶陘夫差昔戾止鏘鏘駐和鈴華旗一以建繽紛朝百靈花飄磴道白松入禪關青吳娃煽方處越甲蔽長坰千秋魂魄歸過市涕亦零嗚呼重華後格鬬何由寧秦宫委蔓草漢闕流寒螢惟應金仙姿空山屹亭亭摩尼耀八極象教垂千齡遊靈巖二首周伯琦丹梯百尺到松林連抱庭杉嵗月深永巷廊虚曽響屧荒岡臺古不聞琴蛾眉傾國悲生樂塵尾談空後視今山下良田川似箭一區那得老雲岑重遊已隔十三春纎緑嬌黄幾度新白髮無情添世態青山有約待詩人菜花間麥畦搊錦薜荔縈藤樹簇鱗香徑斜陽啼杜宇舟迴圓月挂城闉同前髙啟閒上青臺望下方漁村樵塢盡蒼蒼傾城人逺苔生徑歸寺僧稀葉滿廊雲散池邊留塔影雨來閣外失湖光廢興皆幻何須問獨自吟詩送夕陽同前楊基單艫集羣英席窄坐每盍烟横半掩寺木落全見墖斜流出渠分曲徑轉溪合村粧妍醜並野話悲笑雜童操吳音聞僧作梵偈答霜苔滑難躋露棘朽易拉磴紆螘縁樹扉敞蝸啟闔娛賓列五豆禮佛過三帀晴厓暝憂雨秋洞寒疑臘窓扳盜果猿簷入避鸇鴿掬池萍沾袖憩石蘚涴衲琴心荒臺弄屧響迴廊踏值險屢思笻得竒即傾榼感深怒鬚磔愁極衰髩䬃華年倏川融雅量慚海納嘯歌交欷歔雄辨互激發禪寂虚無曇道祖清靜蓋喧囂蝸鬬蠻變幻雀化蛤狂遊類飲酎薄宦避嚼蠟終當謝塵鞅掃屋分坐榻水龍吟徐有貞佳麗地是吾鄉看西山更比東山好有罨樓臺金碧巖扉彷彿十洲三島却也有風流安石清真逸少向西施洞口望湖亭畔對雲影天光上下相涵相照似寶鏡裏翠蛾烟掃粧曉且登臨且談笑眼前事幾多堪弔香徑蹤消屧廊聲窅麋鹿還遊未了也莫管吳越興亡為他煩惱是非顛倒歎宦海風波幾人歸早得在家中老遇酒美花新歌清舞妙儘開懷抱又何須較短量長此生心應自有天知道醉呼童更進餘杯便拚得到三更乗月迴仙棹靈巖山伊乗未愜登臨興兼懷悵望心洞遊環珮逺寺揜薜蘿深吳越有興廢湖山自古今松風䑓上起猶似韻清琴紀遊靈巖有序吳寛靈巖為吳故宫自唐以來詩人題詠甚多而吳人嵗必往遊故范文穆公詩有不到靈巖即虎丘之句予少時猶見山下有石碑曰第一宫後寺既壞而山復遭石工之厄遊者益少𢎞治丁已三月予將北上與文宗儒輩匆匆一行時主僧方戒鑿石種松滿山予喜兹山之復興也賦詩紀之千載吳宫瞰瀆川重巡蹊徑意茫然青山亦有興衰日白髪空懷少壯年巨石鑿殘憐匠斧平湖浮動愛漁船主僧手種松杉徧擬待成林更坐禪同前三十年來續舊遊莫春時節水西頭前朝古跡終難滅半日浮生得自由鳥下林間雙白羽山横湖上兩青漚笛聲忽自琴臺起落日都忘滯綵舟靈巖玩月王鏊浮雲過盡碧天髙把酒層峯氣倍豪明月一年當此夜曠懷千古屬吾曹瓊樓玉宇身親到香徑琴臺首獨搔天柱峯頭那似此淋漓醉墨涴宫袍靈巖懷古夫差伯業今何在香徑琴臺鹿自遊天際青山還故國夜深明月有荒邱濤聲不盡英雄恨草色猶含粉黛羞莫為吳宫多悵望今來古往總悠悠靈巖山天末遥瞻塔影層今朝攜酒試同登吳中信是佳山水人世依然感廢興草滿琴臺微有字鳥鳴禪院寂無僧懸厓斧鑿紛如雪何處題詩記我曽登靈巖蔡羽車前緑草暗遥空山上殘霞積石紅但問袈裟幾時滅不須重歎舊行宫繡嶺岧嶤上碧天山河圍繞幾重烟雙池紅藻胭脂冷常與遊人看月圓登靈巖絶頂二首王寵鳯刹翔天外龍宫倚日邊君王罷歌舞我輩自山川翠壁琴臺傍丹楓石洞懸紛紛見麛鹿怳惚梵輪前氣肅秋如洗山髙興不羣太湖紅浴日林屋翠蒸雲河漢杯中㵼荆蠻掌上分下方鐘磬晚半嶺隔氤氲靈巖袁袠君王歌舞地樵牧使人哀土木遺危刹丹青委廢臺草當香徑合花傍鹿場開且盡登臨興山河望裏來龍門髙啟龍門何崢嶸此地表竒蹟山分兩厓青天豁一罅白知非禹功鑿想是鬼手擘長為風雨闗開闔自朝夕深含未吐雲對峙不崩石日光寒易傾苔色隂更積只疑過此内别與人境隔始窺巳幽深漸入尤險窄暗中把危藤蜿蜒欲驚魄僧留看古刻敲火照絶壁晚聞松聲號洶若波浪激不知神魚飛到此誰㸃額我當謁真龍天門謬通籍何必更區區求為李膺客同前周南老兩崖屹相向中扃啟空廓𤣥闗若天開神孕非禹鑿飛磴盤絶壁巉巗翠如削險隘不容乘幽深未須鑰我嘗振衣過幾見神魚躍變化隨風雲俯愧求伸蠖登龍門次盧師陳王鏊飛步凌虚碧嶂腰雙扶贔屭逼層霄嵌中祗恐蜿蜒蟄缺處猶存霹靂焦擘訝巨靈雄氣力峙瞻元禮峻風標知君頭角嶄然久只候秋風八月潮飛來峯髙啟風吹峨眉雲來依此山住我來不敢登只恐還飛去卓筆峰雲來初似墨雁過還成字千載只書空山靈恨何事研池周南老城西研石山山泓研池水隂靄𤣥雲生誰曽滌龍尾烟光漾晴碧墨花凝暮紫松滋染蛾緑濡漬毛錐子請成書七反揮毫雲落帋研枯池水乾不雪讐父恥靈巖山在天平山之南一名石鼓山山椒有石鼓鳴則有兵禍又名研石山山連􅩯村産石可為研故名又有石馬望如人騎館娃宫在焉西施洞響屧廊香水溪吳王井皆其跡也其詳互見古跡山巔有琴臺刻字猶存又有研池玩花池山頂别有石池相傳生葵蒓今不復見靈巖在焉近燬惟一墖存耳經玉遮山吳寛見山不識山借問山中人玉遮亦深秀翠色聳嶙峋肩輿繞其趾面面松杉新峯巒稍回伏穹窿復呈身細草被長岸盛夏無埃塵乗間即行樂願作兹山賔雨中過玉遮山二首髙啟松頭急風迴飛雨不到面何處豁清愁千山一人見尋鐘入蒼茫一磵復一崦落葉去方深山扉雨中掩玉遮山在陽山之南横川如屏今但呼為遮山舊志為查山雅宜山倪瓉雅宜山舊名娜如山蓋虞道園所命然未若娜如之名近古也因為竹枝歌二首娜如山頭松柏青闔閭城外短長亭來山未久入城去駐馬回看雲錦屏娜如山頭日欲西採香徑裏竹雞啼南朝千古繁華地麛鹿蒿萊望眼迷雅宜山在玉遮之東本名雅兒唐青州刺史張濟女雅兒𦵏此吳語兒為倪因譌為宜或云虞集改今名傍有小山曰􅀢茹初名箬時近時居民掘地得唐元和十九年金氏墓志云葬于􅀢茹山陽始知其譌或云即雅宜山遊𤣥墓山記蔡羽鄧尉之山長不知其幾里負其勝而名吳中者得𤣥墓之萬峯寺甲戌三月十五里僧谿滿崇禮主𤣥墓之遊乃從白馬磵出穹窿南面泥行田中未逺而林木起平野甚適忽從深林入澗道木葉蒙宻日光無所漏泉行樹頭鳥鳴穴中林路斜覆媒引乃通俄從澗道登髙山忽若開霽三里一墟五里一村烟火相望還視故道如在淵底始易綌以褶尋易褶以綌如是者屢屢行幾二十里僅見鄧尉出于烟際乍歛乍長忽又盤結如青髻立霧中萬峯寺藏焉求其道左入右出陟其岡外髙内深巖巧而巒秀峯迴而谷長長松蔽日仰不見天白雲平鋪俯不見地殿屋如烏飛厓間即之心恐客有愛僎上人方丈者飯焉從方丈望太湖如在門中包山烟浮如落几格客曰是所謂十洲三島也𤣥墓實以此勝於戲余包山人也生長太湖中不自知其不凡乃從𤣥墓望包山人皆以為不凡凡不凡在我顧不自愛哉飯巳僎導客從諸院或髙視物表或潛行澗中或脩竹數十百畝䕃坐終日而不思去天黒不逮歸還湢于方丈宿于維摩榻明日繞光福登虎山橋由海雲看茶屏返自官橋則出于穹窿之背矣遊𤣥墓諸山記袁袠吳之山惟𤣥墓最僻而亦最竒面湖而險隩丹厓翠閣望之如屏背鄧尉而來法華障其前銅坑青支迤邐其左游龍界其右岡連嶺屬詭狀異觀相傳郁泰𤣥𦵏此故山以名山之竒經唐宋不顯自萬峯和尚披萊鑿石脩乗其下故山亦名萬峰其陽有萬峰塔院過此則有中井井故萬峯所掘于山為中渟泓觱沸飲之如雪山多美箭薈蔚厓巘間級石而上得浩公房湖閣望中縹緲峯益軒而法華益卑楓林橘岫丹塗綺錯閣下多髙松風起則谷嘯水涌聲聞數十里宴碧照軒宿新院而軒院皆面湖望中如浩公房湖閣惟益􅍶崒也其尤竒則在絶頂一登則洞庭諸山悉陷伏浮于湖而湖波遂混茫蕩為一色不知其所窮山之麓有竒石甚詭麗在盧橘下勢欲飛動兹山之竒晨則觀日出夕則凌倒影而四時皆可居自東崦入四面皆山望鄧尉鬱鬱巳有武陵山隂之想縁溪主虎山橋橋亦在亂山中而六水繞出其下波聫震澤映帶不巳趨𤣥墓者必自兹始而竒亦畧相及是故詳記之舟中望鄧尉山鄭元祐卧枕船舷詩思清望中渾恐是蓬瀛橋横水木巳秋色寺倚雲峰更晩晴翠羽濕飛如見避紅香染嫋似相迎依稀似近誅茅屋雞犬林蘿隠隠聲鄧尉山倪瓚雲卧雨聲集庭樹䬃以秋身同孤飛鶴心若不繫舟燕俎登松菌匏尊㪺澗流蘭芳日彫瘁吾生行歸休不作螻蟻夢遊神鳳麟洲青山淡相對白髮忽滿頭仙去雲冉冉鳳鳴竹翛翛諒哉伐木詩鳥嚶尚相求居吳二十載未及兹山遊君才如鮑謝摛詞亦云優懽然愛敬客能不為爾留桑土夙所徹户牖何綢繆地無車馬塵路轉巖穴幽既晴引飛屩回望林間樓和韻張適城西佳山水不到倏兩秋偶離城外跡逺汎雲中舟况得共良儔放歌蕩中流登眺誓非極兹行弗云休落葉下空渚征鴻度遥洲咫尺接幽巒仙人屋上頭逍遥伺我至環珮風翛翛境勝恍超世愒此復何求扳蘿躡飛嶠窮探恣清遊未工康樂吟巳發劇孟憂樵翁欲邀返白雲奈相留琴尊亦眷戀猿鶴復綢繆既窮竟日樂庶愜平生幽夕陽逐鳥歸殘鐘斷烟樓過鄧尉山二首楊基隨意扶笻入逺林紫藤花落逕苔深山中莫道無音樂一片鶯聲在緑隂浮雲載山山欲動清水煮茶清午夢緑萍風起恰開帆數聲啼鳥來相送遊𤣥墓金問昔年湖上極躋攀萬壑千峰紫翠間風便有時聞梵唄雲深無處覔禪闗鹿鳴過午花隂合鶴夢經秋艸色斑何日相尋重著屐放舟依舊到前灣重遊𤣥墓韓雍湖山如此世希有况是秋髙烟霧空老我重遊尋舊景入門何處覔清公天開圖畫滄浪裏人望樓臺錦繡中苦憶陶朱心未遂羞看短棹駕長風與駱蘄州驥沈石田周馬清癡愈同遊𤣥墓夜宿萬峰精舍因成十二韻徐有貞山水為我癖平生不厭遊每迂康樂屐時泛米家舟石磴穿雲逺林扉入洞幽問途從野老結社集緇流自喜逢清世誰能免白頭夢空千代事吟破五湖秋嗜酒憐彭澤參禪悟趙州徑開招二仲亭構擬三休畫與天機㑹詩將險韻酬蠡應羞霸越良也幸封留邀月聊停盞臨風獨倚樓求仙閒即是何必問羅浮𤣥墓山紀遊張靈寄跡吳山欲奮身心源地境兩無塵石衝細雨飛輕雪沙繡層臺布軟裀迂性不妨村僕怪野懷曽受老僧珍明朝更擬捐城府雲嶺烟巒自有春𤣥墓名山久注思少攜閒伴是春時隔窓湖水坐不起塞路梅花行轉遲清福可教何日領閒情曽有幾人知漫收形勝歸村館夢裏烟霞亦自追遊𤣥墓和韻劉珏梵宇西峯下乗閒作勝遊朱陳慚結好李郭喜同舟嵗稔家家樂村深事事幽鹿迎仙斾上花逐羽觴流星宿瞻箕尾丹青得虎頭酒腸寛似海官况澹如秋閣邃藏諸佛山明麗一州結巢懷李白還俗笑湯休己幸此身健聊將清興酬入雲疑世隔阻雨是天留醉卧三生石豪吟百尺樓推窓看溟渤新月挂閻浮𤣥墓楊循吉尋山行數里自欲展微勞回望太湖闊仰梯青磴髙松聲洗塵耳雲氣襲綈袍何不來歸隠浮生甘二毛登𤣥墓王寵天鑿東南山秀出芙容片萬峰入雲端鳥道懸一線竹色照人衣桃花映人面烟嵐暗松杉采翠飛宫殿金磬忽泠然鳥背明于電忘却靈巖巔怪底江山變憑虚神欲飛久坐心猶戰老僧具袈裟指㸃諸山遍法華掌上螺太湖天上練鸞鳳勢迴翔驪龍珠隠見我欲解儒冠塵纓苦羈纒况復春花開千林落香霰何當投此山寧問蘿衣賤次履吉登𤣥墓湯珍霽色麗春光雲霞落成片嵯峩萬峰山澗道絶飛線異艸未知名珍禽初識面行遵狐跡却入青蓮殿返照漾平湖紅光走金電屹然雙洞庭對壘陣不變諸峯七十二列㦸欲相戰天開西南隅顧覽畧巳遍春花笑碧桃春服明白練飄飄赤雨輕冉冉紫霞見逍遥凌太虚灑落失塵纒孤磬響松間天花散如霰俯視萬家墟陡覺下土賤鄧尉避暑袁袠入山澄世慮攀閣避炎氛林響湖含雨忩隂殿出雲棋枰圍竹靜壺矢隔花聞吾願依清凈長年絶茹暈盧熊武功訪余溪上翌日遊七寶泉同遊者鈕安仲文楊大本景和王諶之常各賦詩分韻終日為樂用杜少陵泥融飛燕子沙煖睡鴛鴦之句摘平聲為韻因賦五絶句徐達左雪消山路躡晴泥七寶泉頭倒接䍦芝草琅玕吾所愛何年卜築近前溪百鳥喧鳴春意同清流搖漾日融融連山十里梅花雪酒興濃時句轉工散䇿行春陟翠微吟朋簮盍興遄飛一尊酒近梅邊倒日墮虞淵未肯歸雨過梅村好物華泉流清淺露寒沙閒時歡㑹須行樂攜酒重尋野老家泉頭酌酒興飛揚十里梅花送逺香雪㸃客衣飄蛺蝶風迴野棹起鴛鴦同諸友七寶泉燕集二首王汝玉磴轉青苔斷泉歸緑竇深擷芳遵澗曲列席就蘿隂野迥寒雲徹山昏夕照沈酒酣情未極延賞洽幽心與子乖違後年華幾度更寧知在兹夕忽復敘幽情山月含秋影風泉急逺聲相看吟坐久中抱有餘清寄七寶泉嶼上人李應禎鄧尉山中七寶泉勝遊回首忽經年近聞新結泉頭屋他日重來借榻眠湖上昔年經月留尋詩載酒作清遊青林曲逕最深處白馬精藍居上頭酒伴常時思顧况詩僧今復說湯休慿師問訊梅花樹待我投閒卧石樓遊鄧尉山煮七寶泉蔡羽玉音丁丁竹外聞璿淵清空出樹根脂光栗栗寒辟塵冰壺越宿長無痕碧山無雞犬車馬不到邨支公三昧火自閉桑下門東風西落巖畔花煎聲忽轉羊腸車建州紫磁金叵羅錢塘新揀龍井茶瓊液津津流馬牙相如有文渇陸羽無宦情相逢開士家七椀同日傾茶爐若過銅坑去石上長罌好自盛七寶泉王寵七寶在空翠谷口桃花流諸天香雨散百道白虹浮華頂通海脈空中鳴天球雪噴石鍾乳練挂銀河秋甘于白獺髓清如赤龍湫隂山落寒氣二月思貂裘漸令神思爽坐使沈痾瘳攜來雙玉瓶酌以黄金甌雲英入兩腋漸覺風颼颼長歌賦歸來去向瑶池頭和韻湯珍月斧斵山骨列壑出清流既如月鏡懸又似太白浮金精食寶甃鐵色惟琳球泓澄自寒暑盈溢無春秋舉手凌白日攀厓弄靈湫隂寒落空翠濕我紫綺裘泉石我膏肓此疾真難瘳山僧頗解事汲取供茶甌芳鮮坐洒沃松風響颼颼塵襟一以滌返䇿曹溪頭七寶泉王鏊嵌巖滴玲瓏七寶甃完月幽亭泉上頭暗道曲通穴剖竹走長蛇晝夜鳴潏潏煎無三昧手渇有七盌啜寒能醒心神澄可鑒毛髮桑苧行不到品第誰為別埋沒向空山惻此行道暍七寶泉謝縉鄧尉山中七寶泉味如沆瀣色如天半泓清淺無窮脈一線長流不記年刳竹引歸香積内試茶烹近白雲邊我來酒渇仍秋熱潄盡餘酣就石眠遊𤣥墓山伊乗酒船曉發官橋路行背玉遮首𤣥墓首式救反趨向也眼前風物及春遊雲外藤蘿接髙步緬思鬱老開山時神輸鬼運非人為架壑梯巖失險阻朱甍碧瓦相參差河源西道流不泄側沈半影崑崙缺日輪月郭爭吐呑暮靄朝霏互明滅波心逺近羅諸峰瑰竒似為觀者容素練平鋪三萬頃飛落七十二朶金芙蓉振衣千仞無塵土指㸃盤桓煩地主草樹汀洲亂帆楫蛟龍窟宅傳鐘鼓古今作者多風流或在靈巖或虎丘安得于斯同倡酬山鳥語留人山花笑迎客長安富兒空有錢好景四時難買得遭逢無以答升平衰鈍何堪近利名飽看湖光與山色醉和漁人歌濯纓𤣥墓書事方太吉最愛青山藏白足雪花松影照清癯銅盤供石當香案竹筧通泉到淨厨却中野人春睡穏可堪工部夜吟孤十年載作梅花夢欲汎扁舟到五湖𤣥墓伍餘福千峰盤錯太湖空曲曲禪房有路通到此儘多投足處謀生何必買山銅寒梅厯雪僧俱老寶劍臨風客自雄十載一遊如昨夢夕陽猶記問漁翁夏日登𤣥墓陸俸百里尋幽去路長千峰蒼翠接林光太湖浪捲羣蛟舞六月烟生萬竹涼龍藏䕶雲金界淨天花飛雨客裾香斜陽更訪髙僧跡松影泉聲繞石牀登𤣥墓顧聞春日開𤣥境桃花然翠微山雲衣外捲湖鳥鏡中飛對雨禪房靜談經客慮稀諸天已昏黒吾意憺忘歸登𤣥墓山皇甫涍西林最幽處迴合度長巒鏡閣來天色山楹動曉寒當杯挹秋色臨澤問仙壇想接浮丘馭時從松際看吳都文粹續集巻十九
