body:
  text: 吳都文粹續集卷六明錢穀撰學校尊經閣記吳訥常熟為吳國子遊言公闕里公北學聖門身通受業得聖人一體以化洙泗以南朴鄙不文之習澤及後人深矣癸亥五月訥抱病家居教諭浚儀趙永言奉書謁曰常熟縣學創于宋之至和重建于端平之初左廟右學大成殿後有言公祠祠右有明倫堂元年丙辰永言承乏是學知縣上虞郭南縣丞分宜李子廉撤堂新之三載知縣郭南又撤兩齋改為重屋市學東地建射圃以便諸生習射辛酉冬縣丞新建陳澄掌邑事永言曰郡庠舊有六經閣吳庠近建藏書樓本學承太祖高皇帝頒大明律等書暨太宗文皇帝五經四書大全等集置廡下地土卑濕倘得樓閣以藏庶盡其宜二令善之撤堂後寢室捐俸為倡復勸邑人佽助錢米鳩工市材建閣五間二夾室名曰尊經之閣時縣令郭南公出而歸因出俸米完其未備經始壬戌季秋既望落成嘉平之月哉生明之日敢求一言垂示不朽然永言讀諸碑志心竊有疑宋寧宗慶元巳未徽國朱子為知縣事孫應時記言公祠後二十八載理宗端平丙申魏文靖公了翁為邑令王爚作新建學宫記惓惓然表章朱子記文之説至篇終引禮書云時人以典禮質問者十有四皆以遊一言為可否三代典章之遺賴之以有存焉此朱子未言者若記中所謂南方之學得其精華及一灑偷懦憚事無亷恥嗜飲食之譏此二事文靖公未嘗發明幸併開釋以告後學於乎訥早遊邑庠睹明倫堂扁左刻新安朱熹書右刻會稽王爚立稍長讀丹陽公祠堂記竊有得其一二焉按隋書儒林傳序云南北所為章句南人約簡得其精華故朱子記稱子遊簡易疏通髙暢宏達意必敏于聞道豈非所謂得其精華者自古而然邪又按荀况非十二子篇云偷懦憚事無亷恥嗜飲食是子遊氏之儒朱子于是引而不辨夫子遊聖門髙弟論子夏弟子之學知大學之本治武城知禮樂之道豈有荀况所議者乎荀去子遊幾二百載其時弟子鄉人或狃于習俗遂乃議及子遊故朱子記云願諸生勉進所謂本所謂道使此邑之人百世之下復有如公者出一灑偷懦憚事無亷恥嗜飲食之譏期望後學至深切矣洪惟聖朝太祖髙皇帝誕膺天命以儒術化行天下即位之初詔天下立學校遴儒師訓迪子弟厥後設科取士以四書五經為主本其四書集注詩集傳周易本義書訂定蔡氏傳率皆朱子之説逮太宗文皇帝命儒臣纂輯大全凡悖朱子者弗録今作閣記舍朱子之言何以為言哉朱子嘗有言曰道在天下原于天命之性行于君臣父子兄弟夫婦朋友之間其文出聖人之手存于易書詩禮春秋孔孟之籍至後世國家行事之迹又皆有史臣之記凡天地隂陽事物之理修齊治平之道禮樂選舉食貨兵刑之制靡不備著于中昔之為師者以是為教學之者以是為學今學者類多記誦剽竊內以傲其父兄外以驕其閭里終身不知自勉而卒就小人之歸然豈專在學者之罪亦典教者不知為教之道也於乎朱子集周程張邵之成以續孔孟之統當時乃有記誦剽竊之弊蓋朱子之學雖不能行于一時而實大行于今日則今日為師為弟子者其可不以朱子之言為法為戒以無負國家建學育賢之意乎昔者張伯玉記吾郡六經閣曰諸子百家皆在而不書尊經也夫尊者恭敬奉持之謂豈徒尊閣奉安而巳抑又惟吾邑山水明秀登閣則一覽在目竊慮昧者罔思天朝祖宗頒降經書在上或説宴閣之上下或酣醟之餘追逐笑嬉非惟墮乎相鼠無禮之惡而墮乎嗜飲食無亷恥之賤矣愚也年登八十筆研久廢故是閣之記五年之間屢辭邑官之請今則弗克終辭者蓋欲因是盡悃愊以告鄉邑後進俾勿悖先聖之訓也若夫本武城絃歌之政推廣學道愛人之心此邑之令佐所當自勉以求無忝其職者然亦耄老之深望云常熟縣學興修記徐有貞常熟蘇上邑也蓋古吳國之虞鄉言遊氏之故里也于今以文獻稱天下然其學宮雖舊而世敝未之改科目雖盛而世風未之振論者病焉先為是邑者率惟簿書會計徴科之急而緩于學事成化改元之秋澶淵甘侯實來令是邑即詣學周爰顧瞻慨然以興修為己任乃咨于學宮及邑之賢者圖惟載度之而次第營為之以明年春蕆事及秋而文廟禮殿洎左右廡靈星戟門像設祭器罔不畢具又明年春及秋乃修子遊之祠繼葺明倫之堂志道據德之齋建育賢之門闢觀德之圃架泮池之橋暨治師生之舍庫庾庖湢周垣坊表罔不畢飭蓋自經始至于落成載厯燠涼為日三百有竒而廟學規制于是乎稱湖廣參政邑人錢君景寅以書來曰願有記於乎興學之舉甘侯惟能之然吾于二三子尚有所諗焉夫上之為教未嘗不欲其古若也下之為學亦未嘗不欲其古若也考其成功卒未古之若者何哉豈其為教與學之實與古異與其在上者不可詰而在下者猶可諉也古之士為道德不為功名不為富貴今則或惟富貴之為而巳為乎道德而功名在其中為乎功名而富貴在其中為乎富貴則出乎道德功名之外矣安望其能古若哉夫言遊氏天下儒學之先哲而常熟之鄉先生也其于孔門以文學為稱首而其言學必曰道曰本曰禮樂之原及其行事見于魯論漢紀彰彰焉然則其為學也豈徒文哉蓋子遊之學之道仲尼之學之道也仲尼之學之道堯舜禹湯文武周公之學之道也學惟其道雖窮而在下可樂也學非其道雖達而在上可恥也古如是今亦如是不如是不足以言學吾願與二三子省之由子遊以求乎仲尼由仲尼以求乎堯舜禹湯文武周公其于道也若泝流而求源也由一心而運之天下小試而為絃歌之治大行而成禮樂之化庶幾哉其古若爾矣吾願與二三子勉之甘侯名澤字𢎞濟以名進士為才御史進憲副敡厯中外以言詘為邑于斯其信為復升也有公道存焉其所資以圖成廟者教諭樂安謝紘訓𨗳嚴陵諸倫開封髙旦及邑義士錢昌劉倣耆彥徐暘曾昻也前太史中執法經筵講官知制誥奉天翊衛推誠宣力守正文臣特進光祿大夫柱國武功伯兵部尚書兼華蓋殿大學士郡人徐有貞記常熟縣修儒學記李傑立學教士自唐虞三代巳然其制度沿革與夫為教考諸經可見矣我朝立學遍天下悉取聖言及先儒格言大訓輯録成書俾士子誦習服行教之之術視古加詳故雖遐陬僻壤文風丕振而况常熟為姑蘇上邑密邇皇都沾被文明之化最深以久士之育才于學而登賢科躋膴仕者獨盛于南畿諸郡顧廟學歲久滋弊弗稱具瞻𢎞治癸丑監察御史劉公奉詔來巡思振士風必先學事乃即贖刑之金以為修飾之費廟自聖賢像以及禮殿兩廡戟門櫺星門煥然維新學自師生舍館會饌之堂習射之圃以及碑亭坊表翼然加飾經始于甲寅之春不五閲月而告成于是合學師生謂豫宜有言以紀成績夫祇宣上德以興學為首務劉公是舉可謂能盡激揚之職者矣吾黨之士所當自勵以副良有司之意宜如何耶嘗聞魯穆叔有言太上立德其次立功其次立言立德云者儀範百王師表萬世若東魯聖人是矣立功云者若臯夔稷契協和神人以贊化源立言云者若周程張朱倡明理學以詔後之為學者所以希聖希賢圖垂不朽之盛事舍是三者何以哉常熟自言子遊氏北學聖門列于文學之科蓋古之立言而庶幾乎立德者使其大用于時則禮樂之化不但施于武城而臯夔稷契之功可立致矣於乎今之人才即古之人才何子遊氏奮于百世之上而後之聞風興起者寡也豈科舉利祿之學有以奪之邪朝家立學教士之意殆不如此吾黨之士知而戒之豈無踵子遊之芳躅于百世之下者哉劉公名廷瓚字宗敬巡厯所至風采凜凜爵祿蓋未可量而知縣事澶淵王綸教諭徐朝翰訓𨗳王淑陳暢皆協力以相廟學之成者是為記賜進士出身朝列大夫南京國子監祭酒前左春坊左庶子兼翰林侍讀學士經筵講官兼修國史邑人李傑記進士題名記章表邑學有進士碑碑記邑之進士者也邑之人受業于學而得以進士名者試之有司試之禮部試之天子每三歲而升四歲而一計焉學故有碑函石于宮之壁歲久馴隘工不就鐫長邑者下謀于屬募石而新碑之新自今始者燭既往而倡後來也後之來惟進士書為進士作也書不以齒而以次用表年也某曰某官官至某無使視其初者鄙其終輕其少者玩其長也碑石既立矗然聳觀碑之中若兄與弟之得與者三豫既記之從而有所感焉夫士遊于學學以從仕曰進士者仕之始也士之始仕而書之于石敷之耳目而傳于後者久也必學與仕終其身求無愧焉可也碑之作幸不致于徒然也此不敢以告邑之士用為豫弟兄告也雖然有作于先可以興其後有鑒于昔得以修于今鄉鄰賜履之間有學有師以惎以養視之碑存之于目存之目思之于心學究乎己師取乎人倬然能自待者矣自待者重不茍進于仕仕必尊其學而石又不晦于名之書日見進士之承承齒齒用裨于時不泯泯于後視此碑也碑作于天順庚辰之歲九月之吉式立錢計石費者萬之竒工計力傭者什錢之四邑長曰唐侯敬身統任厥成云教育言氏子孫記袁甫言偃字子遊舊宅在縣治之西唐開元追爵吳侯本朝升為公慶元間令孫應時即學宮建祠于明倫堂東偏後令遷其祠祀事弗飭有識嗟惋今邑大夫王爚移書諗豫曰聖道榛蕪心甚愧之今且一新矣東廟西學前殿後祠奠薦攸序既順且嚴嘗訪公裔孫則降在編民罕修儒業由是即新學西齋扁曰象賢聚言族子弟其中縣給贍養之資買書延師朝夕訓𨗳擇齒長者主公祠宇又慮歲月寖逺美意難繼則為之節冗費得緡錢六千三百買田以畝計者四百有五十歲收米以斛計者三百有八十庶貽永久願有記焉余嘆息曰是舉也可謂知禮矣禮天之經地之義人道之所由立而國家所以恃為元氣也昔者夫子與于蠟賓實有感于魯喟然發嘆子遊遂問禮而夫子厯言上古中古與後世之變而斷以禮之廢興子遊凡三問而夫子三答皆所以極言禮也異時燕居從容子遊子張子貢侍縱言至于禮而子遊又發領惡全好之問夫子然之考諸檀弓所載以曾子之任道尚推子遊為習禮其裼襲一節則曾子歉然自知其過與他所論禮皆精入毫髮得聖人之傳至于論子夏之門人則謂僅可當灑掃應對進退之志而本之則無然則知本斯可謂知禮此正夫子所以大林放之問而未可以子夏之論小之也且子遊吳人也太伯端委以治周禮其源流有自來矣而况講習于洙泗之間巍然在四科之列武城絃歌之風回視斷髮文身裸以為飾者其氣象果何如故子遊之言曰直情徑行者戎狄之道也禮道則不然品節斯斯之謂禮烏乎一日無禮則自棄其品節甚可懼也故始之創祠知禮也後之遷祠廢禮也今王君大修學宮祠先賢而教養其後裔于是乎能復禮而言氏子孫藏修其間者又能夙夜服習則禮之興也其庶矣乎傳曰禮不明則上下昏何以長世然則斯舉也于國祚亦有關焉是不可以無述乃為之書宋嘉熙改元四月癸未朝散大夫試中書舍人賜紫金魚袋袁甫記常熟縣學田記黃溍常熟故吳地州之西子遊宅在焉當孔子時吳通上國巳久北學宜非一人獨子遊以身通受業列于七十有七人之間而其言行見于紀録為甚具逮今千有七百餘年生其地而好學能文名者猶彬彬焉風氣之厚俗習之盛誠非旁州比縣之所及然自其縣時巳有學而所占田多薄瘠以歲之不易也諸生往往無所仰食學校之養顧出他州縣下絃誦之聲希闕寂寥前後為是州若職教事者思有以裕之而未知所以為計學之賓老以為州之有力而名好事莫如曹君乃相率造君以為言君欣然為輟田之可耕者若干畝山之可樵者若干畝以佐之羣居聚食始無所乏絶莫不德君之為而願得豫文以記之豫聞古昔授田建學悉有成法民之為士固不必廩于學官而大家巨室亦不得有羡田以資施豫也自先王之法壞而不可復見説者蓋以為三千之徒聚而食于孔子或又以飲食之人為子遊氏之儒何言之無稽邪今之去孔子日益以逺有能聞布衣養徒之事而興起焉可謂難也巳若夫為弟子員而藏修息遊于斯者皆生于子遊之鄉而得其風氣俗習之美者也茍無辜乎居之安食之飽而必有事焉將見其處也必無愧乎子遊之文學其出也必無忘乎子遊之學道而愛人一簞一瓢不足為其儉萬鍾之祿不足為其泰孰得以區區飲食之細厚誣君子也哉是用弗讓而為之記以告諸來者云爾常熟縣學在縣治東南前臨運河宋祥符圖經云縣東五十步有文宣王廟初不言學淳熙十年曾棨建堂曰進學紹熙五年葉知幾改名明倫自書扁慶元三年孫應時建吳公子遊祠開禧三年葉凱修廟學端平初王爚倣郡學制東為廟徙吳公祠于後西為學建象賢齋教育言氏子孫扁堂曰明德元升州國朝改縣學洪武建先賢祠闢射圃建觀德亭宣德九年知縣郭南修兩廡學門及厨庫正統二年况守鍾修兩廡六年縣丞陳澄建尊經閣成化二年知縣甘澤修𢎞治八年巡按御史劉廷瓚重修今制左廟右學吳江縣重修廟學記陳從古學校者政本之所自出講禮閲樂習射考藝養老齒胄獻囚告馘無不寓焉詎可一日廢也世之俗吏棄本趨末鰓鰓以簿書獄訟為急視學校為虛器無惑乎風化之不行政本之不立也三代之時家有孰黨有庠遂有序國有學人人安于禮義亷恥之域而無暴慢鄙俗之心故孟子謂學則三代共之皆所以明人倫也人倫明于上小民親于下可謂知本矣自子襟之詩作士子競為城闕遊渙然無所歸宋興尊儒隆道州縣率詔置學自漢及唐未有如祖宗之盛者也中更兵火之變一時學舍莽為盜區浙右尤甚吳江界往來之衝六龍南渡駐蹕臨安實為畿邑士大夫行李取道半天下使客旁午曾不得一夕寧為邑者平旦視事操牒據案獨臺符府檄金穀趣辦之役是憂至學宮廢弛漫不經意故民不知教簪筆健訟視他邑最乾道之初乏宰再歲郡擇人以攝之席未暖即去知縣趙公領事之始慨然嘆曰吾為風化之首今學校鞠為園蔬邑之父兄鮮以夫子之道詔其子孫甚者先聖殿廬上雨旁風春秋奠菜無所存庇此令所當憂也前政石公轍嘗創之矣未幾中輟吾詎忍不終其事也卜日鳩徒撤舊更新夷荒剔蠧周以重階堊以兩廡中奠廟室環列繪像生師有舍禮器有所賓客之廬庖廩之次無一不具公曰學具矣無資財以養士徒學為于是將舊籍漁兒月計錢二十萬永為廩餼之費凡片瓦尺椽市于旁邑不告勞丞俞希尹實贊其事經始于乙未之秋落成于是歲之冬邑之羣士鼓篋歡趨以後為恥絃歌之聲夜以繼日公又嚴規程以防其怠者則公之慮逺不為朝夕計蓋可嘉也吁學校之設不徒設也世知甲兵可以威天下不知學校亦足以威天下蓋甲兵威之而不足學校威之而有餘昔朱泚之亂士皆風靡何蕃以布衣能一叱而回六館之士孰謂學校無益于人之國哉今諸生宜以古學為心不徒為章句誦説之習異時孝于家忠于國無負聖天子教育之意則所以報公者亦無愧矣豫吳人也往來彼數矣見其水波溟渤羣山映帶逺混天碧長橋卧波橫截其中固嘗倚棹岸巾徜徉四顧曰脫屣功名扁舟五湖豈非鴟夷子皮之逺遊者乎秋風颯然蓴鱸芳鮮豈非張季鷹之思歸者乎行歌長吟興渺雲水豈非陸魯望之嘉遁者乎大抵山澤英靈之所萃其寓于物也必有瑰竒雄傑之觀其育于人也必有髙明俊秀之才然物不自顯待人則顯才不自達得人則達彼之為瑰竒雄傑之觀者得三賢然後發明所謂俊秀之才為時而生者今有待于學校作興也趙公既建學矣則才之所成就者吾知必有人焉公名廣字德儉屬籍之賢有文者其為政之本末又能推餘力以及郵亭使館橋梁祠宇一新之部使者以能聲交薦于朝今為南徐别駕公雖去邑之人不忘公賜相與請記于豫欲刻之學石以告後人豫嘉公之政如此不敢以固陋辭淳熙五年五月十八日朝奉大夫直祕閣新權知饒州軍州事兼管內勸農營田事陳從古記重修吳江縣學記盛章嘉定十年十月吳江重修縣學僝工邑之多士合辭來言曰學舊有宮歲久就壓曰殿曰堂前令嘗葺之力未逮以其餘遺後人令吕君宰邑謂是為政之大者首集僚佐謀其議克合乃節嗇銖毫月聚歲贏市材僦工厯吉丕作授成學職俾以分領向所粗備增敞加飾既益嚴翼門廡齋舍撤陋崇庳屹為閎閌雖廩庫庖湢曹胥之局輿隸之所斬斬一新于是率同僚從以士俯仰再拜致敬于先聖先師冠裳韋衣環列後先雍容般辟濟濟咸在觀者侈焉願有以記之章叨居言路天下事無巨細得以商略可否日以酬酢未暇既而復來言曰今之為邑簿書期會獄訟聽斷非才識精敏不能辨詰此其所難也賦斂有常額外鑿空漁以竭澤後反求多日對疲民較量于圭黍尺寸之微不則繩以法雖不忍所不遑恤此又難者也今令能于敲撲喧囂之中知所先務豐宏兹學以幸邑士且役成而民不知此尤其難者也請益堅不得辭因為之説曰學所以明教化美習俗也古者學庠序孰無非此理身修而家齊家齊而國治此學之所以及乎人也自誠而明自明而誠極而至于不可測之神此學之所以合乎天也吳松為邑地占其勝自昔髙人隱士徜徉其間清風峻節聞者興起世降俗下趨尚浸異士之重厚誠篤或隨習而逺民之和順輯睦或怵欲而虧思返古者每致其拳拳也然厥初有生畀賦均一是理茍明轉移易易今教養之地鴻創奐輪威儀文物設飾宣備俾邑之秀民得以優遊涵泳于其中餐和染教以成就其逺大之器業田里之內聞風向化亦將有所勸勉愧恥而乖爭陵犯之習浸以消沮蓋人心之理本與政通以齊魯待其人則人亦以齊魯待其身其機固如此也令之加惠吾邑顧不厚與章既書其事抑有告焉夫人之心不難于觀感動化之速而難于持循蹈履之久使士之尊德樂義積于其身者猶長日加益而不自知民之入孝出弟日以遷善而無復犯禮之俗相與守之而不變則國家崇化道民之意始為無負且有以答令之盛心矣其勉之哉吕君名祖憲婺女人心事平夷政尚簡靜其學問源流蓋有得于伯氏東萊云冬十二月望日承議郎監察御史盛章記重建儒學記錢牧余試令吳江越兩載有壞必葺不敢以傳舍視官府每于日不暇給之中左枝右梧興利補弊驛亭橋梁以及公宇經理粗就緒獨學宮無廳事至則僑寓聚星之津亭環堵瀕湖規制淺狹僅可為蘧廬旦莫之托嘗欲擇曠地屋其上俾挈而居之以稱朝廷設官之意會邑計冗雜道傍作舍此志未償也上踐阼之二年丙寅夏五月荆溪楊鍈來領學事顧瞻聚星代者猶未去東寄西泊靡所居止一日庠校之士過余道所以余曰此令責也二三子之意不可孤邑之後河舊有吏舍一區嘗假務官居其中去代不常至有撤欂櫨抉窗户負之而歸者四壁罄垂日就頽圯無巳則起而新之輒以為學官廳不猶愈于津亭之僑寓邪乃命置材植具瓦甓相率庀徒補苴罅漏興仆植僵不旬浹而工師告成治事有廳肅賓有位藏修有堂庖湢有所一畝之宮具體而微而邑庠師儒之官得之巳不翹足而余之始志亦可粗償矣竊惟國初崇文詔郡邑立學館吳江實居其先然主管學事例以縣官兼之自祥符以來大率然也三數年前有持提學司片紙以白衣來典教者餼廩之外月書季考若罔聞知先皇帝加惠四方學徒景定壬戌昉置為令凡縣悉置學官所以俾之專意教養以幸邑之俊秀者至矣使為長于斯猶茍焉旦暮坐視其東寄西泊不獲安其居豈朝廷專官之意哉矧是役也取辦于學帑者無幾賴以居今芘後者則無窮嗣而葺之尚有望于來者云是歲六月既望奉議大夫特差知平江府吳江縣主管勸農公事兼兵馬都監弓手寨兵軍正賜緋魚袋錢牧記新修大成殿記陳堯佐道濟萬物而萬物不知其所以然故聖人條其教而教之教之弗率而又以刑而刑之由是君于上臣于中民于下尊卑貴賤儼如也故禮樂征伐自天子出後之學者或曰吾師佛也吾師老子也復又有百家之説穿鑿户牖于是教分為三流析為九烏乎教果三乎流果九乎且未論佛何為也老子何為也言之彬彬書之云云是欲化之為善乎果欲善也則孔子之化不使人不善矣水濟水也安得而異曰江曰河曰渠曰溝名斯别矣體復二乎且夫生而免乳必諷其言死而就木必不可須臾而去也雖欲去之有能去之者乎或者北其轅而騁越西其流而走海蓋有之矣未見其至也復之上六迷復凶豫謂迷復之凶又誰咎也國家紹千載之統炳二聖之業東封泰山答天之休也西祀汾壤復地之利也而且謁見靈闕飲至宗廟噫為禮之盛有過于此者乎為孝之大有過于此者乎多士討論之聖君財成之明白光大垂耀永世夫如是則孔子之為道也不為不尊矣孔子之為書不為不信矣王者尊之率土奉之適其宜矣又安從而他師焉姑蘇南門邑曰吳江乃錢氏武肅王之所建置疆畫長洲之苑門涵震澤之源魚鹽蜃蛤既邀逐末之利詩書禮樂遂昧好學之訓會詔下郡邑悉煥儒廟縣令李恭尉聶復等喜而言曰由己而為專也專則有悔自命而作順也順則無咎既而營材具工補壞繕廢棟宇之制遙資乎闕里俎豆之設仰法乎太學門人侁侁書室鱗鱗蚩然之氓于斯改觀卓爾之士可以弗畔又若尊篚之器縣官具之奠獻之數朝文著之雖顓蒙者視之瞭焉兹又上之化下以道而下之奉上以禮可以亘萬古流頌聲于無窮也豫竊大君之祿被外計之寄錢刀之司實曰己任俎豆之化人匪他務會按厯所部戾至新宇唯令及尉趨而言曰天子有命執事不佞廟成弗識歲逺何覩願得正人之論以刻泰山之石豫聞其言而喜當請而諾蓋喜乎播吾后錫羡垂鴻之慶亦樂乎揚孔子垂教化之旨黭淺之説孤陋是懼或曰三教九流之道果何如也三教不二九流歸一吾子思其異不異也宋大中祥符五年歲次壬子仲春十一日陳堯佐記重建大成殿記黃由祥符五年二月吳江縣始建學丞相文惠陳公堯佐為兩浙轉運使實記其成當是時宋興六七十載海內無事文治大興詔郡縣悉置學守若令得祀夫子令李度築縣西偏以奉詔書規制軒偉廟貌遹嚴俊語明章相為發揮學校之盛稱于二浙既厄于兵令石公轍乃改而南大成殿之建距今又七十載棟橈榱腐聖繪漫漶春秋釋奠觀者太息令劉伯麟輦錢五十萬議治不果今令孫君仁榮初拜學宮有慨于心義劉之為願竟其役于是捐金靡穀至割圭租躬執撲略無留難明年夏六月巳成簷楹飛敞像設一新承平氣象宛然如在由有園百畝托上所賜詔墨是名盤野幸與學鄰扁舟過之輪奐奪目乃載酒為諸友賀席間人人言令君之賢豈弟不擾百廢具興未幾皆及吾門且述所以嘉惠鄉校者謁由書之由再三辭不獲則進諸君而告之曰學之廢興時也道之窮通命也惟不以窮通二其心而一以救時行道為事此吾夫子所以異諸子也至于今名教被于四海祀典垂于百王其于啓人心惠斯世者蓋與天地相為無窮豈直籩豆司存歲時奠謁而巳吳江壯哉縣水天寥濶清淑扶輿數千百年間豈無長才秀民行夫子之道于世顧使髙人隱士脫身世鞅者多擅兹邑是豈夫子詔吾黨之意哉夫沮溺耦耕晨門荷蕢謂非知幾有道之士則不可夫子奚不深取以為世道計也噫出處何常惟義之歸屑意軒冕顛倒利害之途而不知返固非也忘斯世獨善其身將與孰任天下之事轍環諸國削迹伐木夫子有不得巳于此者矣諸君勉之入宮牆拜冠履而念及乎此則通經學古期于有用得時行道思濟斯民皆聖門事業無徒狃于章句之學此則由之願也亦令君所以尊先聖淑艾吾黨之意也語曰十室之邑必有忠信不如丘之好學也諸君勉之嘉定八年正月十五日正奉大夫提舉隆興府黃龍萬壽宮寶謨閣學士吳郡開國侯食邑一千七百户食實封一百户長洲黃由記重建儒學記朱子昌吳江平江之屬邑有太伯延陵之遺教故其俗淳以厚有鴟夷子皮季鷹魯望之髙風故其士清以逸有三江五湖之形勝故其地為古今之雄盛豫曩奉三髙祠徘徊學宮摩挲石刻觀陳文惠公所記則知此邑學校蓋甲于吳之諸邑自大中祥符巳然紹興改創規模宏大風驚雨過蕩不復完所僅存者大成殿講堂而巳鎮國上將軍都元帥寧侯玉葺而新之自至元癸巳八月鳩工正殿始復相是役者敦武校尉杜福然講堂齋舍未及也是邑王令君柔勇于為義以明年八月與邑之長二復倡士民捨其舊而新是圖講堂廊廡齋廬下及倉庾庖湢之室具備前學録俞處仁儒林偉士也捐金繼粟賴其力為多落成後教諭王沂李文蘧合辭請記成績豫謂承流宣化之職也政教繫焉漢言循吏以西都為稱首龔遂渤海黃霸潁川不以柔服強暴為能則以發摘姦伏為事文翁治蜀其治辦之迹一無可言不過興學校教生徒而已班孟堅傳循吏顧乃列于龔黃諸人之先豈非詩書義禮之澤入人也深教為政之本顧有在此而不在彼歟是邑當驛道旁午往來仕于此者於將迎中不至廢事亦云可矣何暇他及有能以興學校崇教化為先務者亦可尚矣士之肄于斯者其可負所學歟泮水為頌僖公而作修泮宮一事不書于春秋而見于魯頌蓋泮宮乃因魯舊有而能修故春秋不書然魯人頌美之辭在聖人所不廢也余職儒司因士心從輿論不容以蕪陋辭時元貞元年九月將仕郎浙西道儒學副提舉朱子昌記并書重修吳江州儒學記顧儒寶孔子曰人能𢎞道子思曰道待人而後行道無在無不在所以擴充之者存乎其人矧夫子宮牆宗廟百官之美富莫非道之攸寓惟其寄之于人故有作焉有敝焉有修焉夫作于前者固不能必無敝敝而修之則不無望于後之來者鄭人不修學校無以逭佻達城闕之譏魯僖能修泮宮有以來思樂采芹之美一修一否豈非係于人乎由是知作者未必無修者未必易也吳江有學與州同升初都元帥寧公玉縣尹承務王公柔因其敝而共新之迄今三十有餘稔所修者復敝焉延祐丙辰知州朝列髙公仁甫下車首謁先聖環視內外慨然有志于斯計費捐資無需于學自為謀畫期底于成明年丁巳新靈星門增儀門二大成殿明倫堂廊廡四齋大小兩學瓦垣甃地夾道植槐倉廩庖湢罔有不葺越明年戊午于正門外濱河纍石疊牆映帶左右昔無今有觀瞻聳然蒞斯役者州吏沈慤前直學沈廷玉也既而聖賢像貌彰施一新公之志亦惓惓矣尚猶不寧于是月講季試躬親臨董大小生員勉勵尤至抑嘗論教化為政治之本世之牧民者往往詳于政治而略于教化公之斯舉可謂知本矣茍非其人道不虛行是學之修信乎其有待也訓𨗳趙繼祖曹謹偕學職弟子員謁豫記其成刻辭于石以垂將來公之得士心如此儒寶辱公之知兹幸滿替曷敢以固陋辭時延祐五年歲次戊午前平江路吳江州儒學教授顧儒寶撰興修儒學記陸居仁吳之境以水為勝水之勝在震澤三江之交震澤西受天目宣歙諸山之水東趨三江以入海故澤江之交其境為尤勝交當南北要衝有虹梁亘數里徑交上通驛逵逵左為運渠兩傍居民數千家在宋為縣今為州蓋以鎮其交也州學在其渠東西面震澤山水之勝一覽而無遺長江抱其隈是學又據一州之勝者第學址隘陋又廩粟薄歲久而隳靡措改觀資至正庚寅燕山邵侯子敬守是州蒞學拜謁顧瞻咨嗟慨然圖新之首捐已俸為倡秋八月上丁釋奠率郡民之富而好禮者觀禮既徹俾升堂與燕享以介景福郡人喜曰吾乃今日知禮樂之教也是侯欲厚我州俗吾民何幸也願相勸為善侯曰凡爾之同室而居有父子兄弟之親夫婦之别同里而居有長幼之序同類而有朋友之信主僕而有君臣之義者固彛倫之同秉然微吾聖人述經垂訓以為之教國何以遵為常法民何以質為常典而得相養以生相安以居邪賴其教而不知所以報之無乃昧其本乎夫學校尊崇先聖先師春秋朔望制為祭祀所以報其本也設之師儒以鄉三物樂育羣才所以布其教也今敝陋若此何以稱崇教之意吾將擴而新之以致其報之誠以漸爾禮樂之儀爾民亦願乎民咸稽首曰微侯吾幾不知民生之所由賴猶敢後其報乎乃相率以來助於是大闢舊規廟貌神像華奐莊好髙其閈閎加倉庾廟學於是告備起是年之九月三日乙卯至明年辛卯五月十二日庚申學觀一新而江山之勝若有增偉者學職郡之民交為請記于是記曰信哉善政不如善教之得民邵侯俄頃之教而民即從化學校為之興起使久其任而教不輟為效可勝言邪昔者召公化行南國而封於燕今侯生於燕而欲召公是似雖南陽召父何足多讓哉今守令六事興學為要若邵侯之政可謂知要矣雖然以興學為心相是役者不以利己為心故學之成也偉士之講業於學者相觀孫志而以侯之心為心則業之成也是州當驛逵使驛之過無虛日覽江山之勝瞻學觀之偉挹士風之懋必有舉麾而指之者曰是燕邵侯之甘棠也走也敢不為斯文慶至正十一年五月前鄉貢進士陸居仁記儒學大成殿記許從宣按周制大胥春入學舍菜合舞秋頒樂合聲故凡釋奠必有合也其登歌清廟下管象舞大武是也故月令仲春上丁命樂正習舞釋菜蓋學校以行禮樂小有舍菜而以食為主大有釋奠而以飲為主其于學校習舞與聲大合六代之樂一也吾夫子以聖人享南面王爵厯代尊崇禮頌之縟情文之備至于今而莫之能尚也唐貞觀間太宗以文治然廟享聖人襲用齊典僅設軒架之樂六佾之舞而己繼後開元間釋奠始用宮縣之樂至于故宋崇儒右文可謂至矣然春秋上丁釋奠東序上戊釋奠西序雖登降有部至于用樂不以軒縣而以判架兼不設舞位先儒謂有歌而無樂非古人習樂合舞之意也遂乞釐正以表尊崇至于唐儲君其釋奠于學鐘磬簨虡絲聲在絃匏笙並陳柷敔合止賁鼗間作塤篪和鳴具有成規禮將陳協律郎俯伏舉麾則永和之樂作登歌則肅和之樂奏雍和紓暢悅人心而娛神明者其為樂可謂盛矣今夫路府州縣莫不有學其所謂尊崇聖人者衣冠章服殿寢階陛固巳純乎王者之禮矣若夫廟樂八音並奏蓋有取乎虞廷之簫韶豈不曰後世雖有作者虞舜氏不可及矣吳江之為州也雖于吳為南北津要然州治出乎江湖之上風濤所掀播魚龍所出沒而州學迫市里之隘在垂虹橋之南廟享聖人既有著令學宮與廟雖皆具至于廟樂則有缺焉至正十二年州達嚕噶齊哈蜜勒人濟雅濟公以奉議大夫來監是州既建戟門以大廟制顓命樂師選學之彥肄習廟樂甫及期而樂大備自凝安曲九變成章與八音並奏而無纎毫敢略者廟于是告完蓋公之來是州也適寇犯鄰境州民憂惶而公能鎮之以安舒撫之以仁厚狡猾從化姦凶伏誅民既大和乃能以其餘力重製廟樂成奉議大夫西夏郡趙拜布哈以首領來尹是州同知金剛納昭信哈智承直判官諾海敦武哈扎爾特穆爾從仕提控案牘錢惟賢都目陳濟顧能與公同志協心興學造士州澤國其人士之美者來遊來歌者觀感廟樂以矢其音况當大比之年其為世用必矣若夫琴瑟在御笙歌間奏且將見蛟龍黿鼉祕怪水獸與仰秣之馬出聽之魚咸感化于廟樂之盛者而况于人乎况于鬼神乎至正十二年癸巳十月吉旦亞中大夫福建閩海道亷訪使許從宣記吳江縣重修廟學記趙寬國朝之制縣必有學學必有廟天下皆然然有修飭者有荒陋者各視其地之文獻及作興之人何如耳學所以明人倫育英才欲其寬間靜深以為士君子進德修業存心養性之地廟所以尊祀聖賢報本追逺欲其髙明嚴肅然後人望而敬有以興起夫景仰企慕之心吳江廟學自宋元有之正統中巡撫少司空吉水周文襄公始拓其基宇而改創之規模宏敞他邑莫及也厯歲既久日以頽廢𢎞治戊午春寬以刑部郎中奉使湖南便道鄉閭祇謁先聖廟庭顧瞻宮牆周覽區宇輪焉奐焉鳥翼翬飛丹雘焜煌照映雲日殿曰大成門曰列戟曰靈星祠曰鄉賢曰去思堂曰明倫齋曰日新曰時習以及神厨神庫膳堂射圃學官之居諸生肄業之舍倉庾庖湢之屬昔之卑庳者今則增以崇昔之毁敗者今則完而新昔之圬漫者今則潔而明襟佩之士絃于斯誦于斯藏修退息于斯皆得以安其居靜其慮大肆其力于詩書禮樂之場而無喧囂之雜湫隘墊濕之憂豫喜而問曰孰為之哉何若斯之盛也衆咸曰此吾邑侯之嘉惠也吾侯下車首務斯文近日司宰牧者所未見也豫因問繕工之始末曰侯以丙辰之冬來至任經始于明年暮春之初訖工于孟夏之終問經費之所出曰取財于官而役力于民民欣然趨之命隂陽訓術吳鈭敦匠事鈭公勤有幹略長于料理學諭髙君督視之尤加意焉故其成速而精豫聞而嘉之侯之政豈不異哉侯以進士釋褐來宰邑視事之初錢穀獄訟案牘山積宜若不遑他務者乃能從容有餘以從事于教化之地其才力優于人逺矣世之好興事者厲民惡勞民者廢事今也有子來之樂而無疾首蹙額之怨此何以致之哉秉彛好德人之同心矧吾邑故文獻者侯因民所欲而使之宜奔命之易也教化行而風俗美思樂之風作而棫朴之士興焉必自今日矣髙君與司訓林君陳君聞豫言請書之將刻貞石詔來者豫辭不獲遂書以歸之侯姓郭氏名郛字于蕃廣平肥鄉世家也亷明嚴肅達于政體治邑一年而良法善事具可稱述不獨興學之美云吳江縣學在縣治東南初有文宣王廟在縣治西宋大中祥符間詔天下修廟學縣令李恭尉聶復始作新之轉運使陳堯佐記慶厯七年縣令李問尉王庭堅欲重建勸民輸錢數百萬會詔止不果乃以其財建長橋元祐間知縣程端始竟其事建炎間兵燬紹興間知縣石轍即東門外開江營舊基改建邑人王份獻地廣之即今址也淳熙初知縣趙公廣拓其地建齋三十楹歲入米幾千斛錢若干以給學費嘉定八年孫仁榮重建大成殿宋季悉毁于兵元至元十三年都元帥寧玉校尉杜福重建殿宇塑像三十一年知縣王柔建講堂齋舍元貞二年升縣為州改州學立四齋大德二年教授謝啓東建兩廡繪從祀諸賢四年知州李玘建靈星門延祐至正間知州髙仁孔文相邵子敬達嚕噶齊濟雅濟相繼修之國朝洪武二年仍改縣學定為齋二正統十三年周巡撫忱朱守勝隘之徙左右民居以展宮牆景泰六年知縣賈亮建廟于堂左𢎞治戊午知縣郭郛修今制左廟右學嘉定縣建學記沈璞士生斯世抱負豪傑絶特之資固不待文王而興者至于中人性蕩潏易流雖曰秉彛好德亦必因物有遷茍無詩書以為砭劑無禮義以為繩墨則頑愚鄙野老死奧諜沒沒與草木俱腐自古及今何可勝數使遇真儒碩德以為師友則漸摩誘掖開𨗳激昂誦説乎六經百代之書究明乎三綱五常之道涵茹今古嚅嚌道真學足以充其資才足以伸乎世一旦舒華揚英展采錯事建大勳業立大名節澤流四海事光千載不亦偉歟今焉身為幸民地鄰京國耳接鐘鼓笙鏞之音目見黼黻文章之盛名師益友講道授業者代不乏人然則爾士非學而奚務國家列聖相承右文尊儒度越前古車書萬里聲教四達至于要荒蛋蠻之域悉置學宮以專教養猗歟盛哉吳會今股肱郡嘉定為邑實崑山之東境地連江海炊煙孤迥往來蒲葦間故多盜田里為之繹騷土豪大家或怙資憑強輕死冒法窶弱若益困豈教之未至歟嘉定十一年邑始創令尹髙侯衍孫基之其明年春營學宮乃度地于邑之南面勢軒豁規模顯赫士民翕然殿堂門廡落成髙壯華美廟貌祭器庖湢齋舍罔不備具于是父兄詔其子弟負笈抱經相歡以趨乃立子弟員有倉廩以充其食有課試以較其藝彬彬乎鄒魯之風矣學成迄今十有一年而未有記邑士為之請僕淺陋不學不知為文然惜前人經始之勤久而未彰不敢固辭夫吳會之地非延州來季子之故國邪禮樂遺風猶在兹邑析在崑山崑山衣冠之富為吳最其間佐鈞衡秉節麾者背項相望是邑同一封畛同一風氣爾士其毋棄暴務修潔博習以求合于儒有司勿鄙夷其民務尊吾道使沈浸涵泳期用于世異時來學之士將有躡魁躔登顯任以光耀其閭里豈若鄭鄉校徒議其執政而巳哉於乎髙侯奉天子命以作新于兹邑固職也然畢力殫慮事不可以泯沒相其役者二士曰陳鳴一何夢龍皆力問學厲操行乃以身為邑士倡凡程工度材實尸其勞故併書之使刻于石宋紹定二年中秋日嘉定縣學記林應炎學宮以崇先聖厲後覺也公宇寧儉校庠序古有制雖斗邑無敢不備嘉定邑學創三紀齋可肄堂可踵殿翼以廡可拜可趨來遊者尚陋之然廩斛嵗裁三百半蠧于遙領職員議斧藻匪易應炎戊申秋始至士翕然告顧邑計窮空靡克佐費于是挾貴挾故以職員請者謝弗與今月有學給辭勿願均榷實撙浮銖積錙纍明年夏作中門壯以釘鐶森以戟飾又明年作直廬楹二十有八塑容漫漶久缺彰施又明年外作重門彤其牆以衛表所入坊扁曰興賢橫疏清泚植槐于旁警設鼓講設席祭為設服庶事視舊粗飾力所未逮猶多合數役粟費斛五千餘緡費二萬六千餘皆國學生龔天定以直學董其事典計則有邱煥發張惟一先後焉末邑風尚近市縶于好競甚俠駔于操贏甚譎也朴之犧尊山罍華之逢掖章甫日邁月征耳濡目染稍稍賣刀折券而衡泌有絃誦聲捷貢版鳴圜橋邇歲增見何文也天賦地産知不于此乎祕俠者剛之惡譎者巧之偽銷其惡使善剗其偽使真是機括安在令為多士先士為四民首惟簡御煩尊士之秀選俊以勸𨗳衆異不難一也惟賢詔愚迪愚民之農工商以信向兼善不啻獨也學宮其令問政士議政一大統會之地歟然而昔缺略士謂令奚以教今繕葺令謂士奚其業占畢迹也雕篆技也科級外物也士于學宮猶家然身家是孰若心家是心無他法自主敬始常惺惺其存養活潑潑其形著是心茍存則學宮今之沂泗楹夢非奠廟貌非像真見乎端冕而南面夫子坐如尸振佩而環侍諸子立如齋而吾身即賜于牆由于門外堂不逺伊邇乎淵之寢道豈茫茫無下手處哉如其朔而謁旬而課二丁而祀身退心隨之邑人將曰青襟挑兮是豈墨綬者所望時宋淳祐某年夏五月某日嘉定縣學重建大成殿記林應炎國家自慶厯詔州縣立學必祀先聖明尊師也兵始黃帝農始后稷社始勾龍莫不庭焉壇焉祀之學雖一畝地無夫子宮牆可乎有之矣茍其日月徂邁風雨漂搖可乎今兹邑適與壞會弗動弗治是吾道反不若異端者流其龕廬像設金碧稍漫漶即百千為羣奔走謁資求所以還其舊今天下固無富縣而如曰吾方治賦聽訟姑舍是則朔告丁奠仰梁而摧俯柱而腐于心何如哉嘉定創學未五十年大成殿寖圮今桐川守常君懋為宰請于府得沒官田租市木瓦甓將名匠以畿幕行史君俊卿踵其後至則鳩工度材斧鋸交作始乙丑春仲閲五旬殿宇顯敞廟貌崇嚴有門靈星有橋跨水主學唐均夢翔佐其決學正王子昭相其勞為工千一百五十餘楮六千九百餘米石三十餘既告成邑士相與言曰物之成與壞者數也能俾壞復成者人也今兹常君規之史君隨之一新是殿矣繼今以後安得復如二君者捐巳俸倡諸寓公使是殿久而常新者哉且尊師有殿而養士無廩奈何史君遂撥其功德寺田七十六畝有竒曰是為後之繕修備給縣之廢庵田六十二畝有竒曰為士之供億用于是邑士嘉常君之始謀感史君之終惠以豫常簸粃是邦也合辭請紀歲月余惟唐陸衡山為縣人立宣聖廟堂少陵過而詠其事余老矣弗克賡少陵作為邑士賀辱徴文其敢以蕪陋辭時宋咸淳二年夏四月朝散大夫新除祕書省著作郎兼國子監司業林應炎撰嘉定縣重修廟學碑并銘王遂乾道戊子先君吉州筮仕崑山尉奉大父敷文以行時敷文南定湖湘北守淮楚強敵奪氣退居金壇買書數千卷聚子弟以學有詩寄子亷勤不可纎毫纍歸來使我家中錢可謂仕教之忠矣後縣裂為二以練溪之東為嘉定縣踰七十六年弟選被命典邑曰祖父舊遊何可不力載銀米糗糧自隨朝坐琴堂不夕不休訟于公者手自裁決負于私者寬期以償月輸歲送毫髮不私吏無所措手行道頌之惟是縣之學自令髙衍孫始而養士之費才百石鄭提舉霖繼之增百石有差士始來學有與薦名者其後廢壞而選至首以縣橋厥路不直乃命改作榜曰登龍得池元堅開講周夢虎主之其來講授者皆給之食凡有志者會食而宿于學四經之集來與而課試髙下不輟增其小學三十人迎師以教之縣給之帖糧不繼請尊勝廢田于提舉得畝僅及二百者亦稱足徐知府鹿卿以田四十七畝繼之時講堂更創鼎新寓公周君次臯首助其費邱君斌龍君廷瑞薛君埴王君子昭孫君繼周吳君炎共相其成如其家事自殿及門廊屋三十三間其外則以朱文公舊刋金壇縣學者刻于門講堂則以袁蒙齋所書明倫堂扁示其齋取建寧學宮所以命諸齋者名之規約咸具修葺未備者一切略治計三萬四千餘緡米一十五石未嘗有取于吏胥牙儈而從學者欣然是歲有與薦者以遊學而與名旁郡者以上書賜第者其試入太學者一人有以辭賦與魁選咸曰登龍之效也會選第受代與諸公言者曰諸公之進德也如是此非選謹守祖父之力也亦諸公共成之耳繼治者湯公仕龍吾鄉里敏肅諸孫有不待勉而趨也無疑矣其可無以告謂遂曰兄退居邱園于世事無所及獨于邑之大務胡可無言乃即其事而銘之銘曰明德自始兮制起虞庠逮我聖朝兮化行縣鄉伊吳有邑兮在海之旁始置文字兮士風乃昌帝命立學兮謀不暇詳令弟製錦兮于先有光翼翼濟濟兮明倫設堂有奕斯橋兮渡水之陽俎豆莘莘兮頌詠琅琅朝講四經兮夕以為常登名天府兮辟雍翺翔諸公合力兮講習日長令雖去此兮士胡忍忘俾我後人兮愈大以章益修厥典兮永有馨香嘉定州修學記楊維楨嘉定古婁縣之析也國朝升州孔子宮亦從而大之在州南一百五十九步基于宋縣令髙衍孫大德辛丑儀門圯于颶風至大庚戌守王鐸改創明倫堂大厯巳巳守趙道泰重建大成殿移堂殿之南士論病之擬遷廟東厯守數十而不能更閲三十餘年天將興之固先廢之至正丙申堂燬明年兼攝州事者太尉府分帥張元良以教授陳公禮之請謂時論雖急兵而吾庠序之教綱常所係不可以一日廢也于是撙節浮費及勸率力義之家募貧丁相什伍填淤池成址若干畝甃石隄捍水若干丈構新堂其上前接崇軒旁翼齋舍立教官廳于西舊西齋地也遷學廩于東舊東齋地也與夫直廬庖湢之所靡不新焉惟先聖龕帳與大成樂器泮沼儀門未具教授陳公禮復請于二守鐵侯張侯州倅賀侯遂相與完而成之追理學租以廩生徒廣購書籍以資經訓禮致五經師使日與弟子員討辨道義磨勵忠孝蓋不鄙夷其民實將責成于作養之餘以應賓賢之所需也豈徒輪奐其宮以務觀美哉張侯于政尤明治要與豫有疇昔好使典書者王友諒走書幣請記且曰先生老文學幸有一言以諗諸學者豫辭弗獲則告之曰三代之學之教心而已人心正天下無不治未有不正人心而能治天下者也堯之授舜舜之授禹成湯武王之建中建極同此心也當是時比屋有可封之俗人人有士君子之行人同此心心同此理也上之人作之下之人則之以心感心以理應理固不俟夫威驅勢迫也世教衰人失其本心至或淪于大憝君子救之亦曰治亂不一而心無不一尊君親上之出于天者未嘗滅沒也言教者教以聖賢之心身教者教以聖賢之行况其為州來子之故壤禮義遺風猶有漸漬之地乎民不從治吾不信巳請以是復司教者司教以復三侯時助學田者楊溪楊仁增益其所未備者三山林震林復也邑侯名特穆爾布哈字德剛國族也張侯名經字德常世家金壇宋中書舍人忞之後賀侯名撝字守謙西山居士仲之子也張師字子讓州人教授字子約河南人兄祖仁壬午科狀元提控案牘盧以仁都目宋思讓陸元祐皆有力于文教之事云至正二十一年辛丑歲二月朔旦會稽楊維楨記重修宣聖廟記嘉定州儒學以書抵余錢塘官次言其州太守郭侯之善治也先務以教化為治本至正壬辰夏侯由中臺監察御史厯工部員外郎遂膺守令之選于是州先是為州者咸急權力迂教化聖人俎豆之區往往茍簡狼籍自元貞初縣升州後廟制不加舊棟宇乍修乍圯不能支十年二十年之久侯以為病明年秋且大有民和而寇平又適當聖天子詔下申飭臣工勿以寇攘害文教遂與同知髙昌和侯州判何君暨校官朱孔昭氏計議學事簿書之計得羡資若干緡旁率好義之士林仁王文麟黃澤助資各有差首治大成殿增創挾殿若干楹撤舊兩廡重築崇挾屋凡若干楹前後側廡及儀門周垣廢各以次舉從祀諸像易繪以塑衣冠采章悉合古制爵尊簠簋之物各極齊潔廟有雅樂廢巳久遇祀日旋集市井伎夫玩為故常侯從博雅者復理古樂隸樂胥凡三十六人儀容古茂音律諧暢而昔之規制庳下禮度綿蕝者不作矣海鄉之民扶負而至仰見吾聖人王者之宮南面之位而又俯聽吾侯文告之誡雅樂之設無不欣欣然有喜色思見太平以還絃歌之化殆不勞以威力驅矣侯之為州其得治本如是既乃躬率執事弟子員行釋奠禮于庭竣事州人士相與立石志侯績幸吾子有以書之余曩以公事抵吳下聞侯主辦大府科需皆井井有法少間即究心學事人始難之曰自吾吳遭兵火之變守城社者不啻逆旅人之居談詩書者救死不贍顧欲務不急于此乎侯以為民可一日無食不可一日無名教無名教其號為民者安在哉嘻馬上過魯者急祀孔子軍興于譙者亟令修學而侯于供億繁擾之秋完葺黌廟罔敢一日後其知先務之急者乎噫侯之學于聖人者在是而不在彼也審矣侯名良弼字仲賢大名人和侯名知尚字仲瑄何君名演字伯夫與侯同心而合德校官字用晦實能職教以贊侯之為治者也銘曰皇皇神聖立經陳紀我昏以覺我亂以理海東之荒大邑是疆聲教所暨孔廟將將旅楹既闢陟降有奕鞉磬管笛神聖來假神聖奏假吾侯燕喜允矣郭侯治有本始鄰寇震迫不戁不驚逮寇既平絃誦鏘鳴入禮堂上出教堂下實維民師豈維民父允矣郭侯教民以時厥銘在庭四方其訓之奉訓大夫江西等處儒學提舉會稽楊維楨撰尊經閣記陸釴成化甲午莆田林君正奉命按江南四府以來臨嘉定既視事謁于先師孔子退而詣學考賢問德已復環觀四俯慨維朝廷賜書所以嘉惠承學而於變蒸黎者其風移俗化固已默有成效然所以尊寵而昭示之者略無等威甚無以稱上開示匡直之意為之不自寧者良久因進官屬而商諭之以兹邑為蘇之上縣而承宣昭布之意尚未有成非有司之缺典歟今即欲斂財計日以速乃事恐太傷迫以為民勞請姑俟之明日讞諸訟繫獲非其情怙終者令收贖凡得贖緡若干曰可以有為矣當是時適閭陽吳君哲自進士來令兹邑嘆曰是惟林君宣揚布道明示意向覃恩廣被之嘉猷也哲承乏至此雖無所先且弗敢緩况林君先之哲何敢後哉遂以其資市材鳩工以其部民徐冕劉奕護其事不戒以孚始工于是歲四月丁已成于冬十一月甲子凡八閲月為楹者三掖者二髙七尋深損五之一廣益五之二五分其髙閣之上得二分焉為梯二重繚以闌楯暢以軒櫺逺而望之岸然偉麗入之青碧炫爛而上窈然無窮頃之然後出髙明俯城郭墟市之民川河之舟送迎之客皆若畫然蓋勢髙故視物微眇誠一佳境也畢政務之繁興言邁之樂仰遺言于經帙發奧義于英髦倚衡攀橑而盱目四視豈不有以宣暢優遊而遺底滯哉夫古之為政者草衣木食結繩而治其事逺矣方是時不以忠孝為美談非有慕而為降此則以仁為愛以義為宜以賞罰為勸懲而勃然興起然各在于其人之身非可矯飾懲勸之而莫喻賞罰之而莫覺是其習之久而性之難擾也于是乎言之諄諄書之浩浩至夫仲尼文字彰矣約之為六經侈之為諸子天地之祕聖人之奧盡于是矣及我列聖繼治憂患惟深綸言焜煌詔告無已蓋順時為治而不能有忘于言也兹邑被化百年衣冠禮樂日新月盛其涵濡沾溉之功儒生學士固已欽仰而佩服之矣至于鄉鄙之民風行草偃飽德而歌雖其身之納于平和至靜之域而誠昧于帝力豈非所謂百姓日用而不知哉林君為此祇作而新之以動民之覩吳君承休繼美始終而弗遺所謂成厥功者二君有焉翰林院修撰承務郎郡人陸釴撰重修學舍記王鏊學在縣治之東南右距通衢左距河橫瀝也前有土山松柏鬱然而河水縈之蘇之俗以文勝而嘉定獨簡逺朴茂然其秀民長材往往穎鋭傑出名天下見于科記可考也學屢有興廢大成殿明倫堂則成于前知縣事龍侯晉兩廡則今選部白君思明尊經閣則今御史吳君哲而諸生獨無所肄至河間劉君翔之作縣也摧姦撫良振廢舉墮嘗行學舍喟曰身之不庇學于何有乃召匠經始左即河右即廡列屋若干楹壁其前以為暗窗其後以為明樓其上以為爽闓曰暗吾欲其謝乎外明吾欲其便于業爽闓吾欲其講誦之餘以縱眺其心目時成化壬寅九月十日也民不知勞士用競勸于是教授李君長源來請曰願君記夫劉侯可謂知治者也然吾有問焉侯之所以拳拳新是學者何也所以勸學者之學而其所以學者何也無乃挾䇿而誦乎分題而講乎授簡而書乎是三者今之所謂學也而學之道不止是兹其淺也有深者焉其小也有大者焉夫人之所以學者固將行之于身措之于家國天下其平居所講者則皆彛倫物理之常變天地隂陽造化之精微禮樂術數損益因革經世之具學成而用之則為名臣不用則為名人而豈若今之學哉夫今之學校古之學校也今之人才非古之人才矣則所以學者異也雖然亦為之而已矣夫昔之庳隘是學也忽而髙明爽闓猶是學也况所以學者哉故曰亦為之而巳矣學校人才所從出風俗所由始也不加之意可謂知治乎加之意顧務其小而忘其大務其淺而忘其深可謂知學乎劉侯可謂知治者也余獨恐侯之新其學而所以學者尚循其舊也故進之然豫固亦循乎舊志乎新則未能者也翰林院編修文林郎郡人王鏊撰儒學應奎山記龔𢎞詩曰既景乃岡相其隂陽書曰卜澗水東瀍水西自建邦國都鄙以下咸負毗名山大川為固若山之可築川之可濬乘其周覽未整翼者為之此裁成輔相之功亦聖人所不後嘉之蒸黎資貨甲吳郡維人才恆不勝他邑自宋寧宗嘉定中學隨縣設留光寺適抗前方莫能奮步撤去遺吾道之螙是故有宋及元人材間出我國朝天順間邑令吉水龍晉始築山障之人材為之一盛閲今五十餘祀雨崩土湮山日就卑科目因之又由盛而衰士居常懷憤力莫之能今年春仲進賢饒公榶持憲節至邑曰山學之設也迫甚非宜遷置南許四十尋則學宮髙顯寺幾退隱委伏此明彼障吾道興焉屬邑令涿鹿陳侯淵挈其綱邑丞濟南李均延齡綜其事撿公帑羡餘售工役財力不費于民李均觸盛暑率衆赴事起故積培新壤築其北加闢增以崇髙而漸殺其巔雖汗浹背衣弗倦功速就緒甫及三旬其趾綿亘餘二十丈深一十丈崇髙如深二之一視舊倍其五岡勢蜿蜒分五嶺構竒峰低昂樹之中峰起自沈氏義孰宋時物也先是鄉人夜異其有光久之莫之省神靈豫為默相若此山之前濬河縈回東瀦練祁源水候山澤以通氣河之上架木梁陟山麓作遊息亭瀕河得故山空地為射圃徑百步宜縱矢力圃西蹙民居市其地益之構觀德亭廣廡崇階可以上充于揖讓下周于步武其外薄櫺星門大通衢舊限以垣今易之以闌楯中伐礎為棟作綽楔門顔山之名與櫺星對峙由是乾象坤勢山髙水深土膏育秀靈化潛融巍然為一望宗士折旋出其下可以遊息可以喜好可以登泰山知道在于邇功成一簣早夜淬礪彚出為王乂士則與詩節南山者宜載形諸歌誦雖然饒公由厥翁已以進士傳家為名御史綽有風紀贊天子崇教化以啓來學陳侯臨位未幾務理政優先正禮門康濟斯美李均常築城禦海寇安民兹能協意同符君子謂饒公貽逺之謀興三百餘年之缺典顧不偉歟山之考極相方自北徂南見出吾儒理有不容遏者視愚公宮翊與堪輿家所謂大徑庭焉科目之曠于往初盛自今兹孰不曰此山始時訓𨗳區福典教陳侯乃相與謂嘉士登科肇宋龔識𢎞識之後嘗遊學于斯偕李均典史陳潔合辭以請故忘其不韙強為之記云儒學重築應奎山記都穆嘉定縣學之南有一山焉名曰應奎蓋天順間築于縣令龍晉歲久頽圯前御史進賢饒公榶巡厯至縣嘗命改築參政縣人龔公𢎞實為之記正德己巳莆陽李公廷梧以才御史出按吳中聞縣有淫祠立命毁而市之謂山迫于學且乏崇廣瞻視弗稱乃以市價歸學為修築費俾縣令涿鹿陳侯淵總其綱而其事則專委縣丞清泉王侯輗董之王侯既市民隙地以廣其址遂移山稍上西南十有四武其崇視舊六尋有二尺修加如崇之數廣加二深有三尺復建二亭其在山之東南者可以俯瞰橫瀝其在中峰之西者可以觀射山之北為杏壇面西為射圃亭樹以綽楔而山之前復為亭二東西並峙以置乎碑其下則鑿而為池跨之以梁以通往來漫山雜植檜柏松桂千數百本垣于山之西南餘六十丈池之南復疊石為山以相輝映工始于九月三日僅兩閲月而訖初王侯之經畫是山也豫適留嘉定見其殫心竭慮罔憚勞瘁是以成之之易而士之遊于斯者欣忭賞歎莫不頌李公之政而嘉王侯之不負所委也抑聞之龍令之始為兹山鄉試一科而連登者七人進士一科而連登者三人邑中至今傳為美談謂設學以來之所未有夫人材之生世未嘗乏上之人能作興鼓舞則感奮彚進不然則不免沈晦寥寂此勢之所必至者今李公于學而作興若是安知今日之科目不有符龍令之故事者乎又安知其盛不有過之者乎然則李公之功當久而不忘而王侯之名亦將附此而不泯矣教諭鄧君朴訓𨗳區君福張君相偕來請記云將勒諸石以示永久李公豫進士同年且厚善而學校之事固豫之所樂道也遂不辭而記之承德郎南京兵部武庫清吏司主事郡人都穆撰吳都文粹續集卷六
