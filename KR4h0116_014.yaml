body:
  text: 吳都文粹續集卷十四明錢榖撰祠廟文正公祠記徐琰至元壬辰豫奉命亷訪浙西蒞吳中是為文正范公之鄉尊賢勵俗政所當先既仰慕其餘烈奬進其後人仲秋次丁有司以故事告將舍菜於公祠舍豫肅然偕僚吏拜祠下與觀盛典是日成禮訪義莊登歲寒堂家園之碑巍然獨存祠在其左門堂寢室嚴整合度蓋宋郡守潛公所建牲牢器幣則撥田以給之俾公子孫世守焉薦奠儀文皆當時所定意有所增廣而不遂亦未暇有所記也一日主祠邦瑞踵豫門求記且曰祠雖建於前代禮實存於今日有一言而可以毋底荒墜者繄我公之靈實永賴之豫固辭弗獲移治錢塘再歲徴踐言益勤謹按釋奠必有合也有國故則否説者謂如唐虞有夔夷周有周公魯有孔子則各自奠之近世則通祀孔子向微通祀公獨非故有之夔夷乎而石守道慶厯之詩固巳指公輩為夔卨矣又按鄉先生殁而祭於社社稷民以生先師民所以生師法公獨不祭於鄉乎矧公為政所去見思慶鄧數州之民往往生祠畫像既殁後祠於長白於海堰於睢陽於廣德於鄱陽公蘇人也郡學以建學祠公天平山先壟僧寺舊有祠然稽協古典必專祠於此而後愜於人心夫亦何為而然耶致至之志動物之誠放諸四海則雖百世而下聞者莫不興起也是豈區區富貴利達以炫耀於須臾者可同年而語哉昔宋人定五代軍鎮之亂以儒立國儒而見用者何限以公而不得相其君展其憂天下致太平之略彼一時也非可為之時乎自其入館閣為諫官諫則必黜黜而益諫陳善閉邪寧以身蹈不測而不悔非直以言語侍從為職也故雖當路不容委之邊鎮才兼文武適受主知正巳而不求人相與解仇戮力卒臣夏人以安中土為所當為一以自信其屢為守帥又豈尋常多議論少事功者哉晚參大政請倣周官六職分任輔相漸復古制開陳未終權幸惎間不得安於朝廷之上雖其國家盛衰由此而分而君子小人迭為勝負嘗使人躊躇鑒戒而未巳也嗚呼尚論其世不知其人可乎或以為王佐或以為傑出要其平生則以為有德者又公光明俊偉之本原歟留心聖賢𢎞毅力行漢唐人材鮮克進於是矣初公買田以贍其族而族滋大立孰以教其人而子孫類份份焉遭聖明仁恕恤其科徭祭前古忠烈比有事於公源深流長天佑善人於公蓋無爽者昔朝仲約之款賊完城公不肯加誅文忠富公服其絶識蔡確詩獄公之子忠宣公謂責之太重元祐諸賢亦以自悔即其存至公全大體世之研幾成務不當如是邪人有古今道有顯晦瞻相儀刑是豈一家一鄉所得私者逺惟耉成人宅心知訓而豫也曾何足以發之至元三十一年正月草日中奉大夫江南浙西道肅政亷訪使徐琰撰朝列大夫治書侍郎御史行御史臺事李處巽書并篆額范文正公祠堂重修記張益肆惟我國家敦崇教化尊尚儒賢其於前代良臣誼弼功德及人而廟祀於郡邑者必命守臣嚴祀事葺祠宇示勸之意不既深乎顧在守臣之賢乃克視此為重而盡心焉蘇郡實宋太師魏國文正公范公桑梓之里而其先壟義莊義宅義田義學咸在故公之祠堂久建於此事詳舊刻西江況侯伯律以奉政大夫禮部郎中奉敕來守兹郡政敷民安百廢並舉嘗有事於祠下顧瞻棟宇有圯撓者因喟然曰兹責在我弗急所圖曷稱上意即請於朝用加修治於是卜日鳩工度材築基撤舊易新拓小以大為祠堂前後各五楹後以奉公神像前置纍朝碑刻東西有廊廡東祠宋郡守潛公咸淳中始建是祠者也堂東偏為書院構用舊材以其尚堅好也院亦有堂前後各三楹揭以忠厚舊扁東西有廡齋宿閲牲旁及庖湢莫不有所西偏為范氏家廟歲寒堂者子孫歲祀公父子於其中外為門屋三間亦仍以文正書院舊額揭之垣墉周繚規制宏壯視昔有加凡所用度一皆出粟之羡貯於官者經始於宣德甲寅六月三日畢工於九月十日沉侯謹率寮屬暨學官諸生合范氏子孫以落其成主奉元理及提管希賓爰與族人謀曰祠宇再新既賴郡守盍礱鐫辭用著不忘遂以屬豫豫忝為公郡人於斯盛事在所當述故不敢辭以蕪陋惟公間氣所生心與學術俱正毅然有為於世奈何周旋中外政府方登讒慝巳構雖其才不盡展乃若功德之及人者尚多節義足以厲俗進退綽綽非古之所謂大臣者何能與於此乎當時使能盡用必將成就大業以濟天下此蓋君子所深惜也然而公之自立於天地間者百世不泯祠當百世愈新況侯為郡賢守克承上意亟致修治宜乎在郡多善政也詩云伐柯伐柯其則不逺斯之謂歟故余特為之書重建范文正公祠堂記徐有貞宋有天下三百載視漢唐疆域之廣不及而人才之盛過之此宋之所以為宋者也蓋自太祖而後十有五君君德莫盛於仁宗前後輔政之臣幾百數十人人才亦莫盛於仁宗之朝就仁宗朝之人才論之蓋莫盛於范文正公公之為人剛大清純天資忠孝而為學得聖賢之心庶乎所謂極高明而道中庸者故其為臣表裏一誠始終一正而文武經緯備焉公事仁宗自祕閣登諫垣出入侍從守郡帥邊多所涉厯而不得久處於朝及參大政方將及時復古權幸間之曾不期月而去凡所建明旋亦更革公之所存十不施其四五然而勳業德望之盛視彼久於其位者猶倍蓰焉使其久且盡施則宋之為宋當有不止於是者矣甚矣直道之難行也有君如仁宗有臣如文正公其猶若此此有志於世者所深惜也公之同時名臣莫如韓魏公富鄭公魏公於公每事推重而鄭公因事感嘆至擬公於聖異時大儒莫如朱文公文公謂公傑出之才為天下第一流而吳澄氏亦謂公為百代殊絶人物之數公者豈無所見而言哉是以後之君子聞風而起者未嘗不稱公之為盛也凡公所嘗過化之地皆有祠吳中公之故鄉而文正書院故義莊也其祀事自宋元國朝列於常典春秋享之而其祠宇因故歲寒堂為之屢毁屢葺規制未宏乃者今大司冦萬安劉公孜以都憲奉璽書巡撫南圻而臨是邦因謁公祠顧瞻興懷爰咨所司撤舊為新闢而宏焉協議以贊其圖者前郡守黃岩林侯一鶚今郡守璚臺邢侯克寬承命以董其工者吳邑主簿南昌李榮也於是公之十二世孫主奉祠事從規來以記請有貞聞之君子之於道也其有所立也必有所宗也求乎今而不足則尚友乎古之人所謂世異而道同者也今夫都憲公之巡撫於斯也猶文正之經制於河東陜西也兩郡侯之繼守於斯亦猶文正之為治於蘇潤饒越也事文正之事也心文正之心也是亦文正而巳矣然則三君子之學於公豈非所謂世異而道同者歟有貞於公幸為鄉之後學固嘗寤寐乎公而思所企及者其能自己乎哉雖不文也願執筆焉附名於三君子之後以庶幾夫高山景行之意云成化二年歲次丙戌春三月望日立石武功伯徐有貞記范文正公祠高啓開閣陳書對御筵共言天子得時賢才陪上相趨廷內遽撫豪羌出塞邊松柏自依先壟廟稻禾猶滿義莊田古來直道難終合何必深嗟慶厯年同前周南老天平吳臣鎮奕奕魏公祠靈氣盛鬱積慶源來逶迤䇿勳佐台輔威聲鎮羌陲庶幾百年後忠烈表令儀歲祀具牲醴有司循典彛雲仍蔭垂裕永永惟欽祇同前王賓逺憂人主近憂民心在安邊肯顧身成就人才又多少中庸一語到今新本朝春秋祀祝文學冠天人才兼文武義敦九族名垂千古范文正祠在義宅之東即文正書院也天平山忠烈廟蓋公先祠也此則專祀公而諸子配焉宋咸淳十年知府潛説友奏建自元及今皆因之韓蘄王廟記張習一人之忠義一代之忠義也千古之忠義也忠義本於人心同是心者同是好也烏有彼此久暫之異哉我朝列聖發德音一則曰忠臣一則曰義士每令臣下舉以褒崇之不以古今而間者恩至渥也曩蘇郡守鄱陽邱侯霽以宋名將忠武韓蘄王上聞謂王當靖康建炎間屢立戰功捍衛王室維持駐蹕臨安而三吳實在畿內民獲脫虎口而弗致肝腦塗地者惟王倚賴也王後薨葬於吳墓在靈巖山麓止剩一穹碑而荒涼殊甚雖有裔孫居其傍微若一線時享恆缺據禮凡有勞以衛民者於法當祭矧民至今感之兹臣欲每歲官為一祭所以酬其勞而慰夫民用塞明詔惓惓激厲忠武之盛意敢請制曰可命大宗伯下有司以行事然而祭無常所或借山寺或在城結社而祭如是者三十稔矣今太守新蔡曹侯鳳惻然於懷以為事神報功吾民牧分內事也擬於王墓立廟以為栖神常祭之所兼得灑掃松楸免為貍兔草莽之場乃白於巡按侍御安成劉公丙欣然允俞遂委郡二守吳川林侯廷瓛董其事侯相攸得舒坦之地於冢南為構正堂四楹奉神主前堂四楹列祭儀有寢以安庶職之齋宿有廡以處百工之庖宰繚以周垣闢以儀門甍棟丹堊孔曼且碩侯用心良密矣經始於𢎞治戊午如月丁丑至仲秋之腓落其成於是郡之士庶靡不相慶幸以為順其所望也爰授習志諸石嘗諗王諱世忠字良臣陜右延安人也風骨偉岸目瞬如電蚤抱忠義見國步艱險即躍然應募而起始攻夏城斬關而入斷敵將首擲之埤下掃平南北羣盜既而徽欽北狩高宗渡南而士氣幾淪兵禍方熾神器殆非宋有王於是時以數千殘卒與烏珠四十萬衆小戰百餘大戰數十自黃天蕩之克捷金師北退誓清烽壘克復中原迎回二帝以竭其忠義之氣而後巳奈何主蔽姦相弗圖周漢之中興忘讎忍恥自甘瘡痍其生民棄捐其土地使智勇元勳置而弗用齟齬偃蹇徒老而斃所謂自壞爾萬里長城惜哉豈惟王之不幸實宋之不幸也吁以一人之身為國家之用否而繫天下之安危可見忠義之在斯人與天地之正氣相為周流日月同其光明山川同其流峙草木昆蟲同其生息暢達有不可掩焉者故前後大夫不私於吾郡而揚於大廷襮之天下聖天子於前代之忠義錫之寵光載之祀典俾三百年之隱伏煥然一新於今日由是垂衍千萬世而弗泯曠蕩之恩為何如哉王之行實備載本傳習何人耶敢爾加喙然誠蘇之齊民同一感仰於王者故忘其膚謭謹述如右仍贅詩以道王之功頌朝之恩為迎享送神三章當祭俾歌以侑爵云詩曰延綏山川秀鍾於王英雄慷慨忠義滿腔出為國家掃除粃粳挺身百戰劒弗銼鋩攙搶既滅強禦亦亡誓迎二皇以復舊疆垂四百年汗青有光煌煌天朝褒揚元勳前代忠義廟建于墳牲牡廣腯豆籩旅陳清酤黃流苾苾芬芬灌鬯達泉燔蕭于旻八音和鳴百職駿奔肅肅忱恂致享厥神神既格思吉蠲享饎赤騮朱軝騶從導隨颯然令儀歆畢言旋抑何所之亦惟在兹體物不遺答我聖恩貽我民禧百歲千秋式遵定規允慰慕斯韓蘄王廟在吳縣靈巖山西麓紹興二十年敕葬於此墓有穹碑而廟巳廢成化十年知府邱霽奏入祀典每歲仲秋祀之𢎞治中知府史簡以王舊宅在城內南禪寺之左即其地祭之嘉靖二年知府胡纘宗始以妙隱庵撤去佛像為王專祀俾僧守之胡有記敕祀鶴山先生魏文靖公記吳寬𢎞治十一年四月蘇州府長洲縣民魏芳奏宋魏了翁登慶元五年進士纍官至資政殿大學士參知政事贈太師秦國公諡文靖公嘗講學臨邛白鶴山下及謫居請州建鶴山書院以居學者後在政府理宗親書書院扁仍賜居第於蘇州以疾命就醫郡中及卒遂葬城西高景山下後以居第為書院而墳墓至今有碑在焉惟公立朝大節及講明道學之功當時與真文忠公相上下故人以真魏並稱國朝既以文忠公從祀孔子廟庭而范文正公蘇人也亦有文正書院又以公有功於宋亦命守臣即書院歲時致祭顧獨遺公徒使書院巍然神位虛設實為缺典兹幸遭際聖明崇儒重道屢降明詔表章先賢修舉廢墜如念公之功特賜秩之祀典豈惟為魏氏之榮而巳所以慰吳中士大夫之望者在是蓋芳之自陳如此事下禮部議以公平生具載史傳考論其功於法得祀宜命守臣春秋舉行如范文正公故事覆奏從之芳感激乃謁豫告曰聖朝盛典一旦光賁於斯文至矣幸載之文詞以示後世寬謝不能而其意益懇蓋公居第實在蘇城之南元至順初公之孫起欲以其地規為書院言於侍臣以達於上命以舊扁揭於堂楣復敕學士虞公為之記公之功至是始顯觀記之所云一時尊崇之意雖若甚盛亦不過令其子孫世奉祀事而巳豈若今日酌於禮官之所議出於君上之所從陳其牲醴奉其幣帛內出祝詞俾有司奠讀如儀有國朝之盛者哉公之功至是益顯豈前代之可擬哉抑公之仕宋當冦亂擾攘蹙於偏安之地忠言沮塞厄於權姦之人其事業既不得大行於時獨其講學之迹見於所著如九經要義周易集説等書有不可泯者故雖百世之下學者猶有賴焉則夫論其功者祀之於一郡果足以報之乎蓋國初王忠文公子充嘗著從祀孔子廟庭議其謂厯代儒先有功於聖道者至宋有周元公而程氏兄弟承之逮朱子集其大成中更學禁獨真魏二公不背其學力為巳任其所著述皆黜異端崇正理質諸聖人而不謬足以贊朱子之緒以為當列於從祀其言合於公道君子取之久之詔文忠從祀既如其議然則公固不得而遺之也夫報功之典夫人當言之非一人所能私者則寬之記此亦豈以私於公哉君子其必有以取之宋太師鶴山先生文靖魏公祠堂碑楊循吉𢎞治歲巳未之夏六月詔祀宋儒鶴山先生文靖魏公於蘇先生本蜀之蒲江人蘇得祀先朝賜第與其墓在焉於時中順大夫知蘇州府事河南曹侯實承今上命卜以是年秋吉有事於書院惟謹既而以為先生遭遇明天子得發揚其道光於無窮德意甚盛不可以弗志乃屬愚俾書之石愚按先生諱了翁字華父宋慶元五年進士官至資政殿大學士通奉大夫臨邛郡侯加贈太師進秦國公其曰鶴山先生者著書白鶴峯下學者所共稱也先生學以忠信篤敬為工夫踐履既茂用發而宏故能正色立朝而不附韓史立言垂範而羣經以明所謂有本者如是乎當宋之季宰相行偽禁法天下莫敢言道學先生以其所負者起而振之靡然從風士克返正然則程朱以來吾道嘗中微矣至於先生而又為一始斯文之不墜地實有人焉不然且莫知所紀極也由是言之厥功為大而況有懿德忠節炳炳乎哉是以皇上發綸音稽太常慨焉以列於禮典而不惜者蓋其報宜然也然先生去世且三百載澌融盡寒寂寥無聞而恩命優隆始自今日斯非直以為君子私頌而巳國家崇賢禮德之大於此焉覩而亦世道之所係也歟曹侯蒞郡以正篤尚名教至是尤以風勵為急加勤拳焉故不敢以淺陋辭顛末既具又為樂歌繫其後將請用之獻爵云其辭曰奕奕兮新堂牲醴兮苾芳靈風穆兮絳帷揚皇有命兮神來肅將褒衣兮峩冠有懷兮明德凜正直兮元氣儼靜兮容色擊彼晝鼓兮吹參差蘭煙焚而桂漿淋漓神其樂兮匪土之思徘徊國恩兮按雲節而不倏馳以祐治化兮萬年為期本朝春秋二祀祝文晚宋名儒繼明絶學著書行世抗節立朝遺疏攸存餘風未泯式彰明祀以厲方來魏文靖公祠祀宋參知政事魏公了翁𢎞治十年從郡人魏芳奏即鶴山書院祀之晉顧元公祠堂碑周伯琦吳城之東六里有邱焉曰晉散騎常侍顧元公之墓公諱榮字彥先吳人也仕晉纍官至散騎常侍封嘉興郡伯卒於永嘉六年十二月贈侍中驃騎將軍開府儀同三司諡曰元後追封公至是千有五十年吳人指為顧榮墓者是巳以其地形如鳳又相傳曰鳳凰嶺云墓前有祠前代所建厯年滋多屢修屢圯蚩民雜祀他鬼其中褻而不虔過者病之毗陵老儒謝應芳避地其側睹兹汙瀆惕焉不寧適真定周君舜臣來為長洲今君讀書化民知先務應芳請焉君曰我之責也遂偕詣墓祠展敬乃黜淫祀惟新是圖邑人張實承命惟謹徵工庀材更朽易撓填黫葺缺新像設具器用階庭門墉秩然完飭祠前二墩植以梧桐名雙梧墩以張華嘗稱公為鳳鳴朝陽也踰月訖工周君祇奠而妥靈焉他日應芳介江東文士薛毅夫熊進德謁文於麗牲之碑遂諾之豫按晉史公機鑒絶人器識超逺有文武長材始與陸機兄弟入洛號三雋方厯朝署值宗室相殘宫輿播遷進退觸藩惟以沈酣晦迹﨑嶇而南屬廣陵相陳敏阻兵竊據厯陽姻族盤固志在躡武孫氏鼎峙而國公乃頓首受職佯順風旨潛誘同心曉諭大義羽扇一揮狂豎煙散而六州帖然雖周玘紀瞻甘卓輩合謀協力然非公之言行素孚忠憤感動親冒矢石為衆率先曷能有濟遂使東南人心有所綴繫而司馬氏不絶如線之緒復延百有餘載其功為何如哉司徒王導表江南之望躬致賓禮以振士衆公進謨軍國以定大業觀其陳諫薦才孜孜救弊則其平昔所蘊豈浮虛蕩軼清談惑世者比哉或曰賀循與公齊名士方陳敏之亂循以老疾不起何也夫人品雖同才智各異守道者以全身為潔徇義者以致身為忠未易以輕重之也公之卒也引循代之而終不就亦足以知其志於乎勸善懲惡人心所同不以今古而有間也永嘉之際運祚屯厄其姦邪詭險擅權流毒者為後世唾斥不啻鬼蜮若公之忠義而功在天下者至今人所追慕眷眷不巳此豈人力所致哉記曰以勞定國則祀之顧公之功宜秩祀典其可緩乎作迎送神詩貽吳民俾歌以祀焉其辭曰羣嶽之望兮岱宗南土之望兮顧公岱之雲雨兮歲以豐公之倡義兮功無窮邑有賢宰兮新其宫率吳民兮潔齊以恭千載一日兮人心同樵蘇逺迹兮馬鬛其封鳳皇翽翽兮棲其雙桐吳人追慕兮嘉慶是蒙教我以忠兮繄誰之功大元至正二十五年歲在乙巳仲冬朔日資政大夫江南諸道行御史臺侍御史鄱陽周伯琦撰並書顧榮廟高啓軍司吳國秀機神夙超朗弱冠遊洛師巳蒙南金賞﨑嶇諸王幕沈湎務遵養中罹廣陵艱計服匪誠枉風雲一揮扇義旅臻同響事成恥言勳飄然理歸鞅晉社始東遷羣賢悉收奬道謁真感會矯翼丹霄上德聞一代稱迹泯千齡往時屯乏良佐英謨益堪想墳祠托荒郊蕭條並榛莽蕘童侵雨隧淫巫闖塵幌大夫過停轅式瞻為含愴衣冠復故貌筵几陳新享寡劣忝鄉人因歌表遐仰顧榮墓原注榮與張翰言惟酒可忘憂其如作病何榮好琴及卒家人常置琴座上王賓不見人琴將走過白楊風緊獨秋多生同張翰言還在酒可忘憂如病何晉顧元公廟祀驃騎將軍顧榮也在長洲縣黃天蕩東以其墓在彼故稱其地為顧墓元知縣周舜臣重建晉大將軍右司馬陸士龍祠記徐有貞蘇長洲益地鄉厚生里有祠祠晉大將軍右司馬陸士龍之神祠久廢近里士沈隱君貞吉以巳資興之既落成隱君具顛末徵豫記之士龍雲也雲與兄機士衡並生於吳而仕於晉以文章顯辟為公府掾遷太子舍人出補浚儀令政稱神明去官百姓追思之為立祠於社尋拜吳王晏郎中令一以忠誠輔導之雲愛才好士多所貢達嘗薦衛將軍舍人同郡張瞻時論韙之入為尚書郎侍御史太子中舍人中書侍郎成都王穎表為清河內史時穎將討齊王冏以雲為前鋒都督會冏誅轉大將軍右司馬因督糧過吳婁地見歲祲以所督糧儲盡賑飢民忤成都王穎穎將殺之而孟玖素忿怨於雲由是雲遂遇害雖死一身能救萬民民感其德名其塘曰濟民以衣冠葬陽城湖之濱人呼為陸墓村立祠於相城市中至今民祀之不絶士龍家華亭華亭故吳郡古婁地也正今長洲東北維之壤所謂益地鄉厚生里固其址焉夫陸氏自遜與抗為將於吳有功德遺其鄉國久矣士龍又以賑貸故祠之宜也古之享天下後世祀者必有大功德被於人人思慕之而不忘其祀及乎逺蓋天地之妙萬物者神也神之為之者氣也是氣也得其靈竒則為偉人況雲為時名臣有文武長才故發而為忠義之業及其遭禍之死人皆悼惜之感之深思之久祠之不廢豈非出於天理民彛之正也故記之以告來者知所自焉晉陸內史祠在長洲縣相城益地鄉祀晉大將軍右司馬陸士龍雲也雲為郡人因以督糧賑飢遇害民感其惠以衣冠葬此立祠祀之成化中里人沈貞吉重建短簿祠高啓下馬空林問廟扉衣冠寂寞掩塵幃不能復使桓公怒莫怪年來祭客稀春申君廟封吳開巨壤相楚服強鄰名重三公子謀疏一婦人畫幃留古像珠履絶遺塵簫鼓時迎祭還憐舊邑民同前周南老築居故吳墟封邑遂有吳邑民嚴廟祀高宫儼冠裾説秦歸楚嗣于時多智諝相楚誇豪雄得君良有初胡為惑寵嬖用計計益疏彼謂毋望人英也其置諸同前王賓後來毋望事分明從約當初幸喜成門下客多誰第一蘭陵有令是荀卿甫里先生碑銘胡宿君子之無所失道與世而汙隆聖人之不滯於物因時而遷徙達則奮庸而兼濟否則懷默而獨善堯舜許由昔賢標一揆之論禹稷顔子先民有同道之説繼世而作易地則然自風流之聿頽固先靈之不屬中古以降作者實繁舊史所存孤風可見咸能自潔身纍脫去世紛耕岩石以相高蹈山林而不返語其玉立之節姑得而云體無道勝之韻蓋亦有幾若乃揖紛亂而高謝標耿介而長往漁釣一壑寄傲無何之鄉鼓吹六經圖芳不朽之事非夫高雅淑靈粹溫簡正疇可以議夫是矣先生陸氏諱龜蒙字魯望笠澤之幽居者也吐崇嶽之符倬生民之俊溫其如玉而不加雕琢淵乎似道而無所澄撓神茂初學聲冠當世屬土行標季天宇驛騷俎豆委而不收干戈尋而未巳先生歎深鳳鳥志劇鴻冥著書函谷之關鼓枻滄浪之水棄去驕君之餌謝絶畏友之方於是上會稽探禹穴由臨安訪仙室歸長洲茂苑之下樂松江甫里之勝乃歎曰時無明主安能宗豫施於有政是亦為政退而賦考槃之詩且有終焉之計剃草開徑為臨江之居剪地一作剪茅作堂傲在鄒之宅南挹辨一作岍峰之色西帶重湖之光孤雲無心白鳥可狎道素自處物纍不嬰好事之流或載酒而相訪雅遊之子時款關而請見户外之屨常滿席間之丈屢啓稻田一㕓歲供薪水之費魚陂數頃日充庖膾之事至若金樞之月靜夜赤城之霞啓旦花瀨不逺蘋風甚快先生則必飾軥牛之乘戒白鵠之舫招來僧社之舊申命朋簪之盍泛覽節物從容談燕筆床研格靜置於左右琴歌酒賦相繼以晝夜擊銅鉢而賦詩指石鼎而聫句青溪之曲亦復何窮白雪之唱其和益寡飄然聲利之表自適仁智之樂真所謂風塵之外物天地之逸民者也加以癖好聚書本皆有副得以傳寫則烏闌不計其費躬加校正則雞距未嘗去手亡一簪而不戚似百城而有一作自喜雖張華海內之祕班超禁中之副無以過也由是富擁多聞優入聖域紬六經之妙論泛九家之清流摘發異聞多黃香之不見沈研精義皆郭璞之未詳此又稽古之宗師博物之淵藪也若夫言不詭聖志在拂世英辭闢楊朱之塵高論攻墨翟之守潤色唐虞之際煥乎有章潛心大業之中卓然不類斯又三代之遺英萬世之先覺也自頃元和而下風什陵喪淫哇之響甚喧大雅之作幾墜先生收五際之長波駕四始之高蹈縮制萬變入道奧而惟深刻雕衆形等天機之不宰微言之緒既墜正始之音復聞時皮公日休以高文大筆為世元儒先生幅巾過從一面如舊相與文酒之間坐忘形骸之外凡所賡唱溢於几篋莫不研幾深以繹志叨虛寂以成韻天才艷發縟體交變裊蹄之性百煉而不耗大韻之音九變而彌雅居然嗣響蔚於中興其命世傑出之雄乎昔子山構閔辭多主於悲哀韓非遭亂書頗露於孤憤屈平怨刺托方物以寄懷虞卿窮愁慨詩書而見志何自待之未厚將不遇之所興竊況淵雲曾未髣佛密而不雨嗟乎西郊之雲瑞非其時異哉東魯之獸至於青編紀素尚之節鏤板昭炳蔚之文雖與日月爭光金石無盡可也宿仰企風徽積有年籥經塗所出舊址存焉巋然靈光鞠為茂草憝交照之不接悼園秀之無聞亦猶厯高唐者想綿駒之謳過夷門者感侯生之事導揚盛德其庶幾乎銘曰仰以觀文少微之位含德葆光淪精育粹猗歟先生鍾厥靈氣郁哉懿文倬然上智五代尋戈三靈塞霧鶴在衛軒豺盈漢路衰鳳成歌冥鴻曷慕長洲苑下松陵水邊內樂名教中有聖賢擁書萬卷掞藻千篇江山豈助造化無權名理之言有補於世清高一作尚之風未墜於地壤樹俄空壠書不至清暉眇邈幽靈潛翳鞠草實繁柅車增欷講樹巳凋琴臺久墜茫茫太素英魂兮何歸杳杳終古香名兮獨飛甫里先生祠祀唐處士陸魯望也在長洲縣東五十里甫里白蓮寺即其故宅或云卒後就葬其傍廟食於此嘉定十七年錢塘龔時俌别建祠於左元至正間縣尹馬玉麟重建齊東野語云白蓮寺魯望祠堂像設皆當時物咸淳中有盛氏子醉仆其像於水滿腹皆平生詩稿也知府魏普置盛罪更為塑像其腹稿不復存矣王長洲祠堂記黃由孟子之言大丈夫曰富貴不能淫貧賤不能移威武不能屈蓋古之所謂大丈夫者必有高天下之識容天下之量蓋天下之氣不得志則獨善其身得志則未嘗不欲行其道乘田委吏不敢辭卑而盡吾職之當然及乎立人朝則謀主斷國以身徇義死生禍福不足以動其心此豈尋常瑣瑣者所能為也後世徒見古人功名鼎盛以為是出於偶然不知胸中涵養早由素定非一朝一夕而紀旗常汗簡青特其粗也內翰王公元之自為布衣巳慨然有經綸天下之志洎遭明時事聖君正色立朝凜乎不可犯文忠蘇公至追配以漢唐六君子平生大節載在信史夫人而能言之若夫服勤小官孜孜民事言誼卓然有大過人者國史逸其傳或不得而紀也公以雍熙改元宰吳之長洲首論𣙜酒之弊懼遺斯民之害以至激風俗而厚教化抑兼並而哀流亡形諸壁記而垂詔後來者大率皆有深旨非涵養之厚不以職守大小二其心者能若是乎公沒二百年邦人雖知公之有德於民莫有發其微者今總卿贑川曾侯栗德寬來宰是邑始求公像繪之而並鑱歐陽蘇黃三公詩贊於石嘗屬子序其大概矣蓋曾侯之去十有七年天台黃君宜實來拜公遺像而且嘆祠事之禮猶缺乃闢縣治東偏建堂而奠焉而求文以為記竊謂公之雄文直道暴白天下豈待豫之文而後信況獲附名於三公詩贊之尾尚復何言昔王文公介甫宰鄞有聲利興害除民甚便之其後坐廟堂臨大政乃用其所以治鄞者而治天下惜其學術喜同惡異故為相聲名減於邑公則不然自令滿召試再陟諫坡三登掖垣而晚入翰苑危言讜論裁抑冗費禁戢遊惰緩刑薄賦修德厚本終始為上言之而愛民之意出於一轍咸平以來卒為名臣然則由百里之政充而至於致君澤民果且有異乎哉長洲為今壯縣今宰名德前後相望其間因是有聞而登宰輔者豈公風流在人於今未泯邪黃君舊同學校知其人不茍為政三年去之日如始至燕居之所未嘗葺而獨於此焉惓惓可謂知所本矣豫嘉其志故喜為書慶元六年華文閣直學士通議大夫新知建寧軍府事長洲縣開國子食邑五百户黃由記王元之祠心知百姓在寒飢古寺荒祠有去思清夜虎邱山月上却疑顔色見今時讚范仲淹昔王文正公曾居相位二十年未嘗見其愛惡之迹天下謂之大雅冦萊公凖左右天子却戎狄保社稷天下謂之大忠樞密馬公知節有犯無隱天下謂之大直此三君子一代偉人也公與三君子深相交許情如金石則公之道可知矣翰林王公祠祀宋王禹稱也公嘗為長洲宰天禧四年子嘉言復宰長洲作堂祀之後又建真堂於虎邱藏小畜集其中知州康孝基撰碑景祐間范仲淹守郡嘗為之贊後其子純禮易之而去淳熙九年知縣曾栗復繪公象而祀之黃由記仍刻歐蘇黃三公詩贊於石慶元間令黃宜又作堂於縣治東偏名企賢堂由復記之忠烈廟記牟巘文正范公忠烈廟今在姑蘇三讓里天平山公自睦移守鄉郡再省三世松楸不但漢人過家上冢之榮而巳嘗即白雲菴奉香火洎登政府得追封三世置墳寺始奏改菴為白雲寺祀徐國公唐國公周國公蓋慶厯時也猶未有忠烈廟之名先是元昊據靈武納旌節僭位號威脅諸羌肆為邊患朝議舉兵攻討遂以邊事付公首用种世衡䇿城青澗扼衝要大營屯田聽民互市鄜延乃異時西夏貢路但嚴備不出以示招納又築大順城以捍環慶築細腰胡盧十二塞以制明珠滅臧二族元昊勢漸折乃命公及諸公知兵者分領要害為持久計以待其弊巳而昊卒納款如公言而公在廟堂以議論不同裁削幸濫既遂謝事矣公外剛內和恩威迭用當時邊人相語此小范老子胸中有數萬甲兵不比大范老子大范指雍也或有以龍圖老子稱之其為人所畏愛如此邠慶諸郡與屬羌皆立生祠繪像以事其終也屬羌酋數百舉哀舍哭之如父三日乃去宣和間慶帥宇文虛中以郡人思公不忘祠事甚謹奏賜額忠烈廟他有舊額皆易新榜紹興失秦隴慶陽廟邈邈在他方始改奉於天平山每歲上巳三司率僚屬郡博士率前序偕來致祭廟久頽毁至元乙酉主祭邦瑞提管士貴共議重建取義學餘米歸之義莊為土木費司計邦翰宗遜等佐之其年四月既望新廟成丙戌二月既望率族奉安前設文正公神像內設三國公神儀廟凡十楹黝堊丹漆備極壯麗供具皆完好大德甲辰行省聞於朝禁治煩擾崇奉尤嚴於是士貴以書抵巘俾記厥成謭焉末學固辭弗獲惟昔文正公在朝聞延州危急自請代張存直欲委身不測之地人以為難巘竊謂未若上百官圖詆宰相為張禹雖觸盛怒坐以越職曾不少沮為尤難蓋不顧其一身之利害禍福故能內肅朝綱外正方面諡曰文正廟號忠烈如是之偉也夫士大夫則知尊祖矣尊之者何銘其德善也是宜作為銘詩刻石列廡下其辭曰南陽諸葛蜀漢再造志決身殲民哭陌道乃廟沔陽成都夔子號曰忠武西人悲喜相傳尚記馘雙誅郃於惟文正異世同轍雖老益壯雖死不忘精忠盛烈夏日秋霜昔討靈武皇威逺加聲勢震憚摧其角牙忠烈有廟參錯西土公像在堂莫豫敢侮天平之山白雲之泉公歸自西廟貌宛然誰實新之偉以柱石上公之服揚休山立內祀先公爰備廟制維垣啓宇光榮三世式濟世美忠宣弟昆粵至斯今代有賢孫乃厚義廩乃廣義學同志合慮新廟攸作潔我牲醪率我宗黨竭虔妥靈默通肹蠁公在帝旁玉虬既駕神遊委迤馭風來下佑我後人俾熾而昌廟祏是保千載奉嘗前朝奉大夫牟巘謹撰集賢直學士朝列大夫前行浙江等處儒學提舉趙孟俯書中奉大夫浙東道宣慰使都元帥李果篆額重修范文正公忠烈廟記王直正統八年十一月蘇州府重修范文正公忠烈廟成其十一世孫都察院照磨子易具事始末屬直為之記蓋公蘇人也曾祖徐國公祖唐國公考周國公皆葬蘇之天平山公嘗請於朝改天平山白雲菴為白雲禪寺世度僧守焉作祠於寺之右以奉祀事至公之子孫又作祠於是祠之南以祀公然忠烈之名未有也宋自元昊反西鄙騷動師出無功仁宗乃命公經略公選將練兵築城塞墾屯田據其要害示以形勢招徠屬羌恩信大洽決䇿取橫山復靈武元昊勢屈乃請降西人仰公之德服公之化皆為公置生祠公薨相與哭於祠下者纍日不絶宣和間宇文虛中為慶帥言公忠於朝廷功烈顯於西土至今猶廟祀益虔然廟未有額徽宗命以忠烈名之且為題其榜凡廟之在西者皆易以新名然蘇猶未有也紹興以來西土皆陷忠烈之廟越在異邦蘇之守令與其士夫謀曰蘇公故郡也而天平山則公祠墳在焉公之精神必往來乎此乃更作新廟揭忠烈之榜於廟門由是蘇始有忠烈廟每嵗上巳郡縣長吏率其屬致祭歲久廟壞元至元乙酉嗣孫邦瑞士貴復新之末世兵亂燬焉逾八十年未有能復之者至是工部侍郎廬陵周公忱巡撫至於蘇而監察御史壽光劉君甄武昌劉君仕昌錢塘鄭君顒皆以事蒞焉郡守李侯從智來會政事之暇語及兹廟因相與歎曰公之德業著於當時傳於天下後世不繫乎廟之有無也然表先正以儀來今使後生小子得瞻其廟貌想其精忠偉烈而興企慕之心則廟亦不可無也乃各出資俾吳縣令永嘉葉錫圖其成錫毅然以身任之殫心盡力規畫處置凡鄰邑之令佐皆以資來助市良材命衆工為堂前後各三間以奉公及三世先公像東西廂如其數以藏祭器而齋宿寓焉壯麗嚴整有加於昔中作石橋橋南左右為碑亭前作大門榜曰敕賜范文正公忠烈廟經始於是年九月九日閲兩月而廟成直聞之士之能任天下之重者必以天下為心心之欣戚主乎人而不私於巳是以天下為心者也以天下為心則人庶乎有濟矣初公未顯時巳欲任天下之重嘗曰士當先天下之憂而憂後天下之樂而樂夫憂人之憂而欲免其憂使人皆樂然後與之同其樂此豈小丈夫然哉孟子曰禹思天下有溺者由巳溺之稷思天下有飢者由巳飢之公之心猶是也故其德業之盛不愧乎古人豈特著於西土也哉嗚呼士不以天下重者有之矣不以天下之重自任則其所存所行一主於為巳人之利害不少概於其心而又悻悻然自以為得功烈之卑無足怪也而所為士者固當為是邪然則公之孫與邦之人士及四方之來者拜公之廟慕公之功業必當師公之心充之以仁義而力行之於公其殆庶幾乎故為之記而道愚之所聞使刻諸石告焉凡以資來助者其姓氏皆載之碑陰天平山謁范公祠鄭元祐西望層巒草木青魏公祠下拜儀刑經綸有䇿回天地憂樂無時忘國廷異代蒸嘗遵典禮故山香火下神靈浮雲變滅知何在間聽秋風語塔鈴同前倪瓚魏公祠宇青山麓崖石巃嵸森古木山下居人幾世孫泉道瓜綿分譜族太湖之水去悠悠異代蒸嘗春復秋吁嗟濟世安邊計今日誰先天下憂同前蔡羽春山社日鳥嚶嚶父老銜香忽滿庭西北風雲遺廟貌邦家忠義仰儀刑陰霞細護碑文緑靈谷常籠竹樹青玄酒一巵心不死海空天濶鳳冥冥忠烈廟在天平山白雲寺范文正公先祠也公之先自徐國公而下三世葬此宣和五年慶帥宇文虛中奏賜此額本建邠慶間南渡隔絶改奉於此每歲上巳有司致祭今祭於城中書院此廟則其嗣享焉正統中重修崇本堂記王直崇本堂者姑蘇周浦所作祠之名也祠以祀先昔之作者未有名今名曰崇本尊祖也萬物本乎天人本乎祖古者卿大夫士必有廟祀廟制不行於是而有祠堂取尊祖之義以名之使為子孫者仰而望俯而思油然生其孝敬之心亦君子之所可者也周氏之先居汝之安城晉太康中有諱浚者都督揚州又徙家陽陵其後子孫衆多散處遂昌蒲城營道代有顯人營道之族有輔成者登宋進士第為桂嶺令實生濓溪先生封道國公諡曰元先生嘗過潯陽愛廬山之勝攜長子壽家焉壽之孫興裔官至武功大夫和州觀察使領侍衛軍馬都虞候駐劄平江請立先生祠於吳縣胥臺鄉道山之左武功與金人戰沒於福山敕葬虞山東麓子孫世守焉宋亡祠廢有元盛時浦之曾祖松江監稅文英復建祠於故址監稅卒子江浙行省照磨南奉附於道山子孫因家蘇城中至正兵亂祠又燬焉浦之父長洲教諭敏嘗欲重構而力不逮乃專祠於家浦與弟淵奮欲成父志淵出為遂昌令滿九年銖積寸纍得餘俸若干欲以修祠堂歸至錢塘而卒浦乃極力經營市材庀工共為堂若干楹於正寢之東中祀先生武功以下列置左右凡器用所宜有者無不畢具繚以周垣前為大門以時啓閉而祠堂之制大備正統元年朝廷尊崇儒道凡聖賢子孫皆復徭役其秀茂者收録之恩禮至厚也先生子孫之在姑蘇者初由道而徙郡守況侯驗其實皆復之浦既蒙朝廷之德而益重本源之思至是堂成欲使子孫咸不忘其所自出而恭敬奉承於悠久既以崇本揭於楣使其子融縣丞綱來京師因都察院司務鄒亮屬豫記自孟子沒而聖人之道不傳學者莫知所向先生奮乎百世之下負絶出之資有默契之妙繼往聖開來學圖書之作闡陰陽鬼神之祕啓性命道德之奧使天下後世曉然知聖人之道如日之麗天其本自先生發之今祀於宣聖之廟遍天下蓋不忘本也況為子孫者乎禮不忘其本而君子謂之仁以其心之厚也斯堂也推本於先生而尊事之信可謂厚矣然君子之尊祖豈獨祀享而巳哉遵其道率其教而不違焉斯善矣先生之道載之書其所以為教者蓋曰誠五常之本百行之源也茍能存誠則仁義禮智之具於心孝悌忠順百行之見於事者皆無有不實此大賢君子事也充而至於聖人不難矣今之學者皆知讀先生之書求其為教之本而盡心焉則周氏子孫之當務可知矣朝夕出入於此堂仰先生之德容服先生之教皆有以明善誠身處則為良士出則為良臣斯無愧於先生無負於朝廷優待之盛意崇本之名不亦光逺有耀哉是為記資政大夫吏部尚書前國史總裁泰和王直撰濓溪祠在萬壽寺西濓溪坊內祀宋周元公茂叔初茂叔孫興裔以和州觀察使駐節平江奏立祠吳縣胥臺鄉後裔孫文英南老屢復而廢正統元年孫周淵等遷於家新建和靖尹先生祠記黃幹和靖尹先生寓居平江府虎邱西菴榜曰三畏齋所題雜録論語解皆可考所寓即上方也去之七十有五年郡守直祕閣陳君芾通守太學博士丁君焴始度菴空地為屋繪先生像祀焉尊前賢厲後學也先生諱焞洛陽人年二十師伊川程子舉闈䇿士議誅元祐黨人不答遂棄舉子業靖康初以布衣召不至詔褒為和靖處士洛陽陷家殲焉先生死復蘇竄長安山谷中逆豫以禮聘溺水逃去展轉蜀道纍年紹興五年以崇政殿説書召凡二十辭八年冬始入見除祕書郎明年遷太常少卿權禮部侍郎每選輒力辭其冬除徽猷閣待制提舉萬壽觀辭不巳遂奉外祠即虎邱以居年巳七十矣貧無以為歸也後二年竟沒於會稽之寓舍先生所遇於世如此蓋嘗考先生之所學篤於踐行不為虛語未嘗求人之知人亦莫能窺其所蘊也今其可見者經帷進講門人記録耳惟即其所遇於世者觀其所處然後知先生之於道卓乎不可及矣利害者人心之私義理者道心之公公私之間迭為勝負一取一舍而賢不肖可知也至於厯險難之極而不變處貴顯之驟而不動抱仁戴義終其身而不悔非盛德能若是乎理義充於中則禍福成敗榮辱得失轇轕萬變日陳乎前而心自若也程子之門從遊之士皆宏博俊偉極天下之選而於先生亟稱之其察之審矣顔淵退然如愚而夫子稱之亦曰簞瓢陋巷不改其樂又曰庶乎屢空然則先生者程門之顔氏歟里巷小人顛𡨕利害之塗不足道學士大夫則知禮義矣臨利害未毛髮許棄其所守者可歎也聞先生之風得無小愧有志於道者亦可以自勉歟二君為是祠有補於名教大矣故述其躬行之大節以示學者庶幾驗之於身而得先生之道云嘉定七年六月既望後學黃幹記重遷和靖先生祠堂記黃士毅平江府虎邱西菴尹公和靖先生祠者嘉定甲戌今軍器少監丁公焴通守吾邦之所創也祠在山之西北隅後二年二卿孟公猷聞有殯在西階之上甚懼非所以祓不祥而致蠲祀之誠者告刑獄使者柴公中行乃屬長洲丞趙君崇侃即上方通幽軒之南闢地而遷焉蓋先生寓居之所也知府事沈公皥悉資其役為堂三間西向羣山前列環隴近護老松修竹交閟左右高明靚深稱祀如昔甫成而柴公以召去王公涔繼之復摹先生晚歲片紙手書聖賢格言五千餘字刋置西序常平使者吳公格割公田四十六畝俾住菴者為增葺費孟公以始創遽遷合有以示來者命士毅書之士毅因竊慨念昔登朱子之門獲聞先生之學嚴於持守之本在此用力之真體驗之熟復發主一無適之旨至講説而不踐行則為虛語問答而少差失則至誤人與夫未至於磨不磷涅不淄則不可如聖人之見南子者類皆務於簡實而戒謹恐懼之意隱然於其間未嘗不三復警省是皆持守之功也蓋持守則心存心存則其言斯訒其行斯察有不期然而然者於是深嘆夫周程之所以上續孔孟者至於朱子粲如日星有目咸覩先後本末區别在前大小精粗各有攸屬學者於此不患講習之不能明所患講習之易明而忘持守之為本耳則嘗推明先生之學以勵後進今之祠事仰止遺像如親炙之必求先生之學而學焉是乃興起之漸豈曰小補之哉此又其所可書之大者遂不復辭既次其略輒附所聞如此然自先生來居積七十有五年未有表其事而出之者而二三年間其役再舉始克就緒則感夫事之難成而俾終弗壞焉以興起於無窮者又有待於後之君子也先生居之歲月出處之大致巳詳於黃幹之前記是役也始於四月甲午而訖於六月庚戌實丙子歲云後學黃士毅記尹和靖三畏齋王賓兵後南來巳白頭虎邱行過偶遲留齋居猶自名三畏點檢身心肯暫休和靖祠祀尹肅公焞也在虎邱西菴公紹興中嘗讀書於此扁所居曰三畏齋嘉定七年知府陳芾始繪像祠之九年郡人孟猷請於刑獄使者柴中行即上方通幽軒之南闢地遷焉即先生寓居所也常平使者吳格割公田四十六畝為住庵者增葺費黃士毅記今廢改祀於學宫包山祠皮日休白雲最深處像設盈岩堂村祭足茗柵水奠多桃漿箘䉦突古砌薜荔綳頽牆罏灰寂不然風送杉桂香積雨晦州里流波漂稻粱公惟大司諫憫此如發狂命豫傳明禱祇事實不遑一奠若肹蠁再祝如激揚出廟未半日隔雲逢淡光􅑨􅑨雨點沙漸收羽林槍忽然山家犬起吠白日旁公心與神志相向如玄黃我願作一疏奏之於穹蒼留神千萬祀永福吳封疆同前陸龜蒙靜境林麓好古祠煙靄濃自非通靈才敢陟羣仙峯百重波浪沓中堂簫鼓重直君貝瓊輿髣佛來相從清露濯巢鳥陰雲生畫龍風飄橘柚香日動幡蓋容將命禮且潔所祈年不凶終當以疏聞特用諸侯封包山廟在洞庭西山俗稱包王廟唐咸通中郡從事皮日休禱雨有應與陸龜蒙皆有詩水仙大王廟碑楊循吉人有曲直必告諸吏至於水火疾病之厄吏無能焉神斯專之神之治人比於吏而其可憑過之何也吏未必盡公神則無不公者焉故人之憑神人甚於慿吏敢欺吏不敢欺神人也吾鄉世事水仙大王建廟天子之所封也有鄉者三視他人為貴鄉人有事則告惟大王之神在上巍然而聽之若受焉者及其歸而或賜之或不賜之又若有分别者蓋誠有吏職焉然人得賜於神則喜不得賜於神不怒則神之尊吏不得參焉非其公之至也人烏以若此嗚呼有良吏或易而去神一而巳則吾鄉人其敢不虔矣乎夫牲醴錢幣所以報也若夫無辭以宣神德神謂人莫知其公焉故碑水仙廟在子城東南古蒼龍堂神即柳毅也今為上元鄉土社祠額著靈異一在城西雁蕩村俗名三鄉廟重建武安王廟碑祝允明王勳在劉蜀天下得祀之勸忠也始王官終前將軍既沒蜀人祀之代有崇廣逮宋大觀間追諡又以義勇稱廟而四方之祠亦益廣矣若蘇城之祠則昉見於淳熙三年之公牒蓋當時市户俞拱等請府判執狀置祠基石本也其前後兵火傷剝祠之始構與其歲時與其紀載並為消沈而不可考巳屬者廟旁民湯文淵輩以兹邦荷王休靈人和物蕃感而思報遂與其廟道士張某等謁告於太守太守亦以王忠民思之捐俸餘銀為匠作費並諭長洲吳二縣出銀數佐之俾鼎建焉張等遂購材立殿三間木備而價不及陶甓湯文淵乃獨典領其他裨宇翼舍鄉人又相與共成之廟遂以完以豫亦鄰祠居被王祐深來請紀事嗟夫王之陰力在吾土吾土之民知家寧户嬉之樂而因以知其力之所出知其力之所出而因以知所以報之者是固理之自然而王之忠義勳烈則又足以勸夫人故太守之徇民又所以勸忠也今之後吏益忠於為公民益忠於報上虛玄之徒亦益忠於所事勸忠之效大白當有兹舉始豫受衆請為略工度始末取義之大者記之而又為歌詩三章系其後俾祀者用焉其詞曰秩秩兮王宫桓桓兮王容藹牢醴兮潔豐王之神兮來降惟王之神兮降止鼓鏜鳴兮成禮王之享兮凱如蔭吾民兮翼吾里惟王之去兮莫留神洋洋兮無行不周勸忠兮報德長無絶兮春秋關王廟在武狀元坊東大街上元甲午歲道士李原祐建太倉關王廟記在教場演武廳後陸伸太倉舊有公廟在小北門內教場之西偏𢎞治十年奉命鼎建州治教場南遷於張王倉基越六年州民始請于總督備倭都指揮西公修舉如故或者謂公斃吳人之手當不食於吳殆非通論今天下大一統非復偏據一隅之吳矣況國初定鼎於鍾山鍾山非孫氏開國之地乎故有公廟而新之是時禮官無以為否者必有説也或又謂公之稱號不一當何從伸嘗考之公在漢末封為漢壽亭侯至宋祥符以來始有義勇武安王之號迄於元之延佑則並諸號為一多至八十餘字而濫極矣國初下詔謂忠臣烈士惟當時初封以為實號宜正書其額曰漢壽亭侯關公之廟載記謂公生辰九月十八日今以五月十三日官殺少牢以祭因為詳著其事於麗牲之碑而系之以詩俾有事於廟則歌以侑之其辭曰山西兮河東神靈會兮虎臣以降炎光兆滅兮大統聿分庶還於一兮式𢎞厥功命之不淑兮弗克有終悠悠有識兮孰不哀慟忠魂炳朗兮彌塞區宇鞭霆掣電兮爰上爰下作廟迓神兮于江之滸我心不二兮公將我與維其來兮以祀以妥維公之來兮其從如雲髯之飄飄兮顔如渥丹狐狸遁迹兮魑魅失羣雲風蕭颼兮至止欣欣我心不二兮公寧我嗔無遄其歸兮爰嚌于飱載拜稽首兮無敢不肅曰公是型兮以佑列服公其少留兮旋車勿速神曰醉飽兮既受爾祿爾心不易兮我猶爾復靈祐廟記范成大按元符三年林戊記云梁衛尉卿陸僧瓚捨宅為寺有女不嫁既死祠於寺之東廡開寶中吳越王朝京道出吳江大風幾覆舟見女子拯之自言通玄寺之神本國加封感應夫人郡人於此祈子頗驗元符初夏大旱人多暍死明年疫厲繼作通判祝安上攝州事禱神致雨歲大熟事聞詔封慧感夫人政和二年曹斐記賀鑄書中吳記聞云安上除知台州至錢唐將濟夢一婦人告以風濤之險明日果覆舟數十獨安上得免嘗有祝史竊廟中縣幡縶其身環走殿內自言某實盜也夜半踰城還家神靈潛制於此建炎中嘗有邊警居民有事之者夢神告以兵難不數日陷乾道三年秋禱雨有應父老顧安時上其事加封慧感顯祐善利夫人參政范成大記聖姑廟高啓潮心涌出黿頭山白波翠島非人寰清虛宜作水仙府鱗堂荷屋居其間淵都羣靈孰為主煙鬢翛然一神女柔姿孰敢狎相親笑叱鼉龍起風雨玉骨蛻來經幾秋世緣巳斷信無愁采蘭每約湘濱會拾翠時陪漢上遊水禽翔鳴衛芝蓋長在蒼茫杳冥外鮫人獻綃裁作衣螺女供珠綴為佩花落間祠謝古春蕙幃瑶席掩香塵空山夜夜星河逺芳渚年年蘅杜新霞舒霧捲凝光彩笑語無聞復誰待冷風幾度引舟回宛似蓬萊隔煙海猿呌楓林魚躍波桂旗翻翠莫寒多女巫佇望飛輿度獨奏箜篌引曼歌椒觴奠罷沈玄璧鳥沒遙天湛空碧遺情不結楚臺雲世人何處尋蹤迹同前周南老盈盈粉黛粧遺廟臨芳嶼揚靈洞庭西弭節黿山渚駕龍乘白黿鱗鱗魚媵豫倏來兮忽逝衛風挾雲雨過舟恐濤惡妥靈奠椒醑傳載或可稽曰晉王彪女吳都文粹續集卷十四
