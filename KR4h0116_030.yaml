body:
  text: 呉都文粹續集卷三十明錢榖撰寺院萬夀禪寺重構佛殿記宋濓蘇之長洲東北二里萬夀報恩光孝禪寺在内焉初晉義熈中有沙門法愔自西域至中夏與慧逺法師結社廬山已而來蘇以念佛三昧化道有情蘇人翕然歸之為淨夀院梁時更名安國長夀院二年又更名長夀尋燬于兵呉越錢氏有國中吴軍節度使錢文奉重作之又更名安國長夀禪院始易禪僧明彦主之宋大中祥符二年丁晉公謂奏改為萬夀崇寧二年始加崇寧於萬夀之上政和初又更名天寧紹興七年復詔更今額為徽宗荐嚴之所元至正末天下大亂寺為兵所燬羣僧散鞠為椔翳之場國朝洪武癸丑蒲圻魏觀來吴為郡周視廢基蹙額而言曰是刹之廢不得名浮圖不足以起之行中禪師仁公乃寂照和尚世嫡今住虎丘徳涵道融堪為天人師且兼通儒家經史發為文章嚴簡而有法内外之學並至中興之責其在是乎遣使者致書幣凡三往而後應之視其寝室則牀笫蔑如也稽其榖粟則盎無斗儲也訊其執役則僕𨽻無有也泊然獨居若坐享萬鍾之禄者曽不㡬何僧之散者復還逺近清修之士魚貫而來有餽食者有供三衣者有施黄白金者禪師曰可矣戒左右重構大雄殿五楹間鑿石於山市材於江陶瓦於郊工者奏技壯者獻力鞠明究曛不督而集四阿有嚴若翬斯飛丹雘絢爛炫人心目僝工於甲寅春二月至乙卯冬十月厥事告成禪師太息曰寺之創惟殿為鉅殿既成門廡堂室當易為耳吾耄矣宜選春秋强盛者繼之禪師乃退居松林蘭若集合舊侣議延瑩中瓛公瑩中甞請業禪師不復固辭乃走呉江水月廢刹輦致三世如來像妥奉殿中觀者起敬瓛公晝夜孶孶将次第成禪師之志復來請文以示後之人誠可謂賢也已嗚呼大千界中不離一念建治銷毁隨感而形者也兹刹付之虐焰化樓觀而為灰燼果誰使之哉此一念也翦翳剔荒變瓦礫而成梵宫又孰為之哉亦一念也善惡之所繫其懸隔有如此者可不慎與禪師起廢之功無讓開基瓛公善繼之力必漸復於舊觀皆肇於一念之善者也法社緇衣之士來居於此尚當擴而充之為聲聞為縁覺為菩提埵雖曰等妙是覺亦可拾級而升無有出於此念之外者毋徒諉為有漏因果而忽之哉昔有唐僧貫休所畫十六羅漢像頗著靈異呉越時邵思寳等共建二石幢今猶存詩曰牽牛南斗姑胥墟義熈神僧建梵居相傳正受起凡夫以法籠絡為周阹汚泥欲現金芙蕖盛衰相循雲卷舒嵗㡬及千道如初飛樓湧殿薄太虚鬱攸毒焰翻赤烏化為灰燼無復餘上遮叢棘下夫須白烟斜日寒隼呼虎丘尊者名浮屠見性炯若摩尼珠胷中蔵書比石渠應聘而起三嗟吁食無糗粮衣無襦赤立何以興吾廬蕭然雙榻結雙趺風聲渢渢撼州閭四方聞者魚貫趨布帛盈槖粟滿車捆載有若神鬼輸成此寳構只須㬰龍礎承楹列碔砆榱題攅星塗以朱日月回薄氣扶輿懾慳破執道力驅空中樓閣齊毘盧法筵誰嗣乃其徒利如干将温六瑚呉江有刹委平蕪尚留像變金作膚妙莊嚴相慧且都輦致中座青蓮敷直揭紅日昇天衢大綱既挈萬目攄三門夾序暨堂塗勢可馴致當不孤祗今勝槩夐然殊黑白駢首施拜膜鏜鞳如獲聞鐘魚有情弱質同巴且暮枯寧復論朝腴一念揺曵風中大雄慈憫猶巳痡乃假塔廟作世模由外修内垢淨除事為不落有與無空空色色皆真如作銘者誰列仙儒鐫之青瑶字縈紆後千百載期不渝國史兼太子賛善大夫金華宋濂撰并書萬夀禪寺重修記吳寛佛寺之盛多創于前代自後漢流入中國由三國至蕭梁赤烏天監以來緇流法社幾徧天下習其教者固鋭意剏修而人亦樂為之助至國朝始著於律不得擅有興建况洪武初厭其煩襍且有歸併之令尚何敢於興建乎百餘年來寺復就弊而能修葺者少盖前代寺多腴田略無限制今則悉入於官凡賦稅之徴無可蠲免大率與農民相等則人人謀衣食之不贍何暇於脩葺乎呉城東有萬夀禪寺相傳晉義熈年間有愔法師自西域來始居之梁唐時更名屢易至宋詔改萬夀禪寺厯年既久而寺盖嘗廢矣南渡以來江南有十刹之號而萬夀居其一則其盛非特為吴中禪寺稱首而已由元入國朝歴嵗既久而寺益廢雖行中禪師起廢之功未全周製宣徳間都綱兼本寺住持夢菴南公亦有起廢之意衆服其道行咸出財相助遂建法堂三間廊五十間久之又得白菴金公其道行愈髙衆服而助者愈多建天王殿三間已而其徒僧録司覺義戒瑮請藏經自京師至建閣五間寺之既備至𢎞治初嵗復久矣漸就傾圯而住持定乗俄爾化去始請大覺英公繼之其為人苦行强幹修補塗塈必盡其勞逾年寺訖一新於是白菴金公年八十餘矣退居後院以予家居徒步造門余老不預寺事獨善守之完也惟兹寺甲於呉中然無所攷幸宋學士之記存雖然直遺初迹耳往往興毁不能悉彰復乞一言以示将來予感其言竊有撫嘆夫蕭梁氏至今㡬年矣而區區一寺巋然獨存完美之觀尤加於昔豈佛力之不能䕶持耶盖其人存則其寺存否則鞠為草莽固有不知其處者吾見亦多矣盖物係於人人獨此而巳㑹白菴之裔孫方静上禮部請檄歸住持以振興遺教扶植清修為巳任懇懇申其祖之意來請乃書前寺之所以盛與創守之艱以示其後人俾刻之石通議大夫吏部左侍郎前詹事府少詹事兼翰林院侍講學士郡人吳寛記登萬夀寺佛閣王鏊吴城第一好山川半醉來登意豁然天際雲開雙塔影城頭日出萬家烟宋朝故老空遺宅吴下叢林不記年今日雙鳬同眺望分明身現宰官前萬夀禪寺在府治東北晉義熈中西域僧法愔建名淨夀院梁改安國唐改長夀宋大中祥符二年丁謂奏改萬夀禪院崇寧中改崇寧尋改天寧紹興中改萬夀報恩光孝禪寺為徽宗薦嚴之地唐僧貫休甞居此號禪月大師寺有禪月閣寺前周廣順中所立尊勝石幢猶存上有呉越軍節度上柱國邵思寳周存禮題名元末兵燬國朝洪武中重建宋濓記嘉靖二十年御史舒汀知府王廷長洲縣知縣吴世良改為長洲縣學師子林菩提正宗寺記歐陽𤣥姑蘇城中有林曰師子有寺曰菩提正宗天如維則之門人為其師創造者也林有竹萬箇竹下多怪石有狀如狻猊者故名師子林且師得法普應國師中峰夲公中峰倡道天目山之師子岩又以識其授受原也寺名菩提正宗者帝師法㫖與以是額也按其地本前代貴家别業至正二年壬午師之門人相率出貲買地結屋以居其師而擇勝於斯焉因地之隆阜者命之曰山因山有石而崛起者命之曰峰曰含暉曰吐月曰立玉曰昻霄者皆峰也其中最髙狀如狻猊是所謂師子峰其膺有文以識其名也立玉峰之前有舊屋遺址容石磴可坐六七人即其地作栖鳯亭昻霄峰之前因地下窪濬為澗作石梁跨之曰小飛虹他石或跂或蹲狀狻猊者不一林之名亦以其多也寺左右前後竹與石居地大半故作屋不多然而崇佛之祠止僧之舍延賔之館香積之厨出納之所悉如叢林規制外門扁曰菩提蘭若安禪之室曰卧雲傳法之堂曰立雪庭舊有柏者曰騰蛟今曰指柏之軒有梅者曰卧龍今曰問梅之閣竹間結茅曰禪窩即方丈也上肖七佛下施禪坐間列八境光相互攝期以普利見聞者也大概林之占勝其位置雖出乎天成其經營寔由乎智巧究其所以然亦師之願力所成就也師每説法㕘問多至數百隨其悟解開導誘掖有所質疑剖析至當莫不虚往寔歸至於安衆必擇法器不汎然以容檀施與貲視師意向亦不强委師取共具財足即止諸行省平章若河南之圖嚕江浙之多通江西之敏珠行宣政院使若岳叔夲肅政使者若布達實哩稽顙問道執弟子禮彌恭旁觀異之師法施平等官資崇庳若㒺知也寺成之十三年宜春之比丘之嗣談以臨川比丘克立所撰事狀來京師謁余為記余聞師之名起敬日久既摭其事狀述寺之勝概而記之其師子名義則必有以復於其師與友也古有師子音佛有師子武佛言佛之威徳能制諸魔也又曰師子乳一滴可迸驢乳百斛言佛法之真實能破諸妄也又若文殊之學得於智普賢之學得於行智之勇猛精進莫師子若故文殊之好樂在師子行之謹審靜重莫象若故普賢之好樂在象後之肖菩薩以之莫詰所從也今天目之所謂嵓姑蘇之所謂林其取義居一於是矣而豈獨以山石肖貌言之乎雖然佛有禁格而後有伏降有比儗而後有真贋孰若物我兩忘形勢俱冺以師子還師子以石還石以林還林然後佛自還佛法自還法菩薩自還菩薩哉論至於是師必有以警策其徒矣予聞師所説法不設厓險不輕榆揚不自陳衒悟解縁由以啟學人㨗出蹊徑其為學平寔縝密鞭辟近裏一時諸方之乍見乍聞而張磔旁午未証未得而棒喝生風者聞師所言皆噤故自中峰以來臨濟一宗化機局叚為之一變焉師舊多論建有楞嚴㑹解若干卷有語録别録剰語若干卷行於世近乃一掃空言不尚文字於談之請立之狀余之記能無贅於兹乎師俗姓譚氏吉之永新人江浙諸名山屢請主席堅却不受遁跡松江之九峰間十有二年道價日振帝師與以佛心普濟文恵大辯禪師之號兼與金闌僧袈裟衣至正十四年甲午五月癸未翰林學士承㫖光禄大夫知制誥兼修國史廬陵歐陽𤣥撰奉訓大夫兵部貟外郎臨川危素書宣文閣授經郎兼經筵譯文官王餘慶篆立雪堂記鄭元祐榮禄大夫前江西等處行中書省平章政事髙昌簡齋公懸車吴下休心空寂一日語其門客遂昌鄭元祐曰昔普應國師倡道天目時予之先人秦國公方平章江浙行省以其素所學參叩於國師時國師之門人髙弟東殫三韓南極六詔西抵身毒北彌龍沙則其近地概可知巳今中呉師子林主人天如和尚在國師之門尤為得法上首穎異而秀出者也余也今兹所寓與師子林相宻邇時時扣門瞻禮請益其為室不滿二十楹而挺然修竹則㡬數萬箇師與其徒休止其中蒲團禪板如大叢林勘辨根研以發明國師之道名公貴人向師道風㕘拜跪跽獲聞一言如飲甘露然師機用險峻傾企莫及至乎杜門却掃經嵗不出余雖不敏竊嘗諦觀師方以太虚空含納沙界王公庶士貴賤雖殊若夫生死泡沬起滅須㬰則未嘗少異自非師隨方誘掖以倡明心宗則國師之道幾乎其熄矣余胄出髙昌依佛為命覩兹僧寳敢同寒蟬第以學非房裴艱於賛頌輟為師手書二扁牓名其説法之堂曰立雪禪燕之室曰卧雲仍命工刻諸梓而揭之以寓余㕘承之意子其為我記之元祐曰世習下趨豈但人情而己要雖出世間者亦罕不為名聞利養之所動若天如師者殆所謂香象渡河金翅擘海為砥柱於波頹瀾倒之日振清風於炎埃腥腐之中也歟夫禪自少林立雪傳心垂八百餘載至普應國師而其化益隆今天如師上繼普應直截衆流𢎞倡大法使真㕘實悟之士永有依歸是則簡齋公立雪名堂之意良有以哉至正七年嵗次丁亥秋七月甲子元祐記師子林詩序李祁自天如師坐師子林中地益闢景益竒四方之來得於觀覧悟恱者益衆於是内而京師集賢翰林之名徳重望外而郡邑詞林賦藪之才俊英逸皆託之詩章以寫其景物之勝至有足未及造其境而心與之㳺者亦想像摹寫以極其趣夫如是則師子林之得名當時亦已逺矣余嘗觀其地之廣不過十餘畝非若名山鉅刹之宏基厚址也屋不過一二十楹非若雄殿傑閣之壯麗焜燿也其徒衆僕役不過十數人非若髙堂聚食常數千指也若是而能得名於當時之士大夫無乃以其人而不以其地歟盖天如師夙自警㧞又恒居天目侍中峰國師而盡得其㫖功深力到愈久而彌彰是以世之賢士大夫莫不慕其為人而樂談其道即其地而賦其景耳師之上弟詎可庭将裒之以為卷持以示予予復之曰昔之佛舍僧房託名羣賢集中以不朽者多矣若師子林則固無待於詩也無待於詩而詩以美之者當世之士夫也裒之為卷以傳永久者可庭也可庭之意非天如師之意也欲知師之道者當於此卷之外求之時至正庚寅夏五月茶陵李祁書於呉城之状元坊師子林圖序朱徳潤泰定中僕自京師還吴中適侍御史岳石木公郡守多通公㑹於城南詢僕以歸來意僕告之以歸林泉以遂息肩意二公曰子有退休志盍求侶乎近城東偏有天如則師者舊逰松江九峰間振錫來呉結屋樹竹號師子林其為學也真實謹宻平淡無為子盍與之言也僕於是謁師師喜曰先生來何晩耶相聞舊矣遂欵淨室蒲圑茶具接引清話薄扣其㫖則問辯明敏了無滯礙余益信岳通二公之言為然他日出其所撰語録别録余讀之嘆曰師真所謂有識者耶因觀其林木蔽翳蒼石巉立所謂師子峰者突然乎其中乃諗諸師曰昔達摩傳言法中龍象智度論解曰水行中龍力大陸行中象力大兹林曰師子豈非以其猛威可以懾伏而為名也若以威相則文殊固有精進勇猛之喻矣僕又曰昔人言作師子吼得非以其聲容可以破諸障乎師曰非也以聲容則無此聲容也其有不言而喻者乎僕曰不言而喻余知之矣不言而喻其惟師乎噫世道紛囂不以形色則不能懾諸敬信而吾師以師子名其林者姑以遏世紛而自得於不言者乎矧師之真實可以破諸妄平淡可以消諸欲若以靜黙不二則雖有形有聲猶不能悸况乎無聲無形而託諸狻猊以警羣動者乎雖然觀於林者雖師石異質一念在師石皆師也一念在石師亦石也然不若師石兩忘者耶師曰唯唯余識之久矣不能寄諸筆墨也師既示寂其徒卓峰立師克嗣其學與余交請為圖之且系其説於左至正二十三年嵗在癸卯重陽日老睢陽山人朱徳潤謹序師子林十二咏序髙啟師子林呉城東蘭若也其規制特小而號為幽勝清池流其前崇丘峙其後怪石􅍶崒而羅立美竹隂森而交翳閒軒凈室可息可㳺至者皆栖遲忘歸如在嵓谷不知去塵境之宻邇也好事者取其勝概十二賦詩咏之名人韻士属有繼作住山因公裒為卷帙冠以睢陽朱澤民舊所繪圖而請予記焉夫呉之佛廬最盛叢林招提據城郭之要坊占山水之靈壤者數十百區穹臺傑閣甍棟相摩而鐘梵之音相聞也其宏壯嚴麗豈師子林可擬哉然兵燹之餘皆委廢於榛蕪扄閉於風雨過者為之踟蹰而悽愴而師子林泉益清林益茂屋宇益完人之來逰而紀咏者益衆夫豈偶然哉盖創於天如則公願力之深繼以卓峰立公承守之謹迨今因公髙昌宦族棄其膏粱而就空寂又能保持而修舉之故經變而不堕也由是觀之則凡天下之事雖廢興有時亦豈不係於人哉余久為世驅身心攫攘莫知所以自釋間訪因公於林下周覽丘池復取十二咏者諷之覺脫然有得如病暍人入清凉之境頓失所苦乃知清泉白石悉解談禪細語麤言皆堪悟入因公所以葺理之勤而集録之備者盖為是也不然則飾耳目之觀賞詞華之美皆虚幻事豈學道者所取哉是則來逰而有得者固不得不咏因公亦不得而不編既編則予又不得而不序也洪武五年秋七月渤海髙啟序逰師子林記王彝蘇城之東北區有林若干畝佛者居之曰師子師子者林之一峰如其形故名而其地特隆然以起為丘焉襍植竹樹丘之北窪然以下為谷焉皆植竹多至數十萬本始升其丘之南麓便仰見師子峰高僅若干尺如舞且踞兩傍復各有峰亞匹之東曰含暉作人立左腋下有穴一腹枵然有四穴日始出則其暉映曖相射西曰吐月頗峭且鋭稍夕月即見其上師子之北有室曰禪窩含暉之東有隙地踰尋甃以石子為環坐者之所藉曰繙經臺傍有峰特出曰立玉然其狀嵌若刀劍劃作四五葉者或曰以地肺名之為宜吐月之西有澗自竹谷中來因架石為梁曰飛虹踰飛虹以西而下其西麓乃北入竹谷中委蛇東來折以南出立玉後而上其東麓復折而南且西出師子前而下其南麓凡丘之巔踵自三西峰外諸小峰又十數計且叢列怪石什伯為羣而所取道往往經緯其間既下南麓有二道其循麓而東者至立雪堂方堂之南為卧雲室又南為指柏軒其循麓而西者至問梅閤問梅與指柏相直梅與柏各一皆相結為蛟虬其夀幾二百年柏之南有池曰玉鑑若鑑影以自媚者梅之西有井曰冰壺初鑿井時得古壺罇地下而其泉冽且甘以瀹茗味尤勝云余在昔於斯逰也盖屢焉而不厭今年秋復與茅宅民陳彦濓張曼端來㳺而因師者予故人也止予宿問梅閤得咏歌其丘與谷者累日師曰是果可以咏歌歟願有記也故書之石而使刋之先是有十二咏書石上其倡者髙太史季廸和者張水部子宜王文學止仲謝翰林𤣥懿今亦為同逰者洪武五年秋七月稽丘王彞記記中所述髙張諸公詠不及備録今各採其一於後師子林十二詠師子峰髙啟風生百獸低欲吼空山夜疑是天目嵓飛來此林下含暉峰張適特起雲成朶髙明玉有暉竒岑映初旭霽色舞羅衣吐月峰王行昨吐月不缺今吐遽非圓圓缺㸔多少孤峰只宛然小飛虹申屠衡渴虹飲不足連蜷漸僵縮我來躡其背下瞰無底谷禪窩張簡草窩䨇樹下借與定僧居㑹待虚空境坐卧摠從渠立雪堂陶琛升堂獨立時一言悟未徹皓皓雪齊腰凄凄夜寒切竹谷一作栖鳯亭僧道衍萬竹雲朝合孤亭月夜明鳯來縁覽徳不為玉簫聲卧雲室王彝秋潭㸔月還片雨千山暝獨有鉢中龍蜿蜒伴僧定指柏軒髙啟清隂䕶燕几中有忘言客人來問不譍笑指庭前柏問梅閣張適陽回知幾許問信臘花前月白無言答如㕘不二禪玉鑑池王行方池開玉鑑烱烱湛虚明痩影何須照心源巳共清冰壺井謝徽冰花覆銀床雲液沁瑶甃一勺甘露漿入口不敢潄奉題師子林二十韻就簡天如和尚張翥老佛叢林伯休居得名園幽藏嵓壑勝夐絶城市喧除徑去宿莽引池發真源鳯亭遡澗橋梅閣臨柏軒咄嗟龍象地丹碧峩雲騫怪石洞庭來荒臺洗秋痕散落萬竹裏劣若熊豹蹲中有青狻猊主當衆峰尊凴陵鬼神㑹呀呷風雷奔道人一飯已趺坐蒲圑温來者自名相何有眼耳根伊昔幻住翁千偈波濤翻作大師子吼洪音殷乾坤師傳一燈出與世爍羣昏摳衣雨花外詎厭㕘學繁要知天目下廣闢甘露門平生楞嚴讀衲侶夙所敦身雖縻塵絫是心了然存睠彼中林社遲暮或往論期師法檀度此道非空言小偈奉簡卧雲室中老師六首危素坐禪銘自集雲傳一念還超佛祖前此是菩提真種子成華成實自年年天目嵓前澗水聲絶厓荒徑少人行等閒㑹取楞嚴㫖雲散天空月自明九衢塵土自漫漫瞬息光隂孰控摶師子林中方入定天花如雨落嵓端道人燕坐萬縁空栖鳯亭深一徑通只有庭前柏樹子無言長日倚東風鄉僧幾載客吴門世味蕭然道義尊等是江湖未歸去寸心何日與同論卓峰上人與素同里故云落拓京華久未歸山中閒却緑蓑衣閒來描寫虚空㸔但説虚空早巳非五十六字奉上如禪伯周伯琦多士來㕘萃若林阿師語黙示無心鉢中龍起窺禪定洞口猿吟學梵音鄮嶺寒烟阿育塔祗園秋雨給孤金柏軒梅閣春無恙解組何時遂雅尋夏日過天如禪師錢良石余夏日過天如禪師竹院周覽歡甚師呼茶坐予竹下因問西來意作麽意生師答曰修竹不受暑余嗟嘆而咏歌之不已遂集杜少陵之句以紀師之髙蹈以發來者之清悟云東下姑蘇臺驚浪滿呉楚江山巳定居喜無多屋宇一丘藏曲折户牖粲可數開軒納微凉脩竹不受暑賛老釋門子文物多師古價重百硨磲榮貴如糞土端居茗續煎香美勝牛乳隠几亦無心敢為故林主今我一殘老衰謝身何補瀟洒共安禪沉思情延佇出門復入門天欲今朝雨庶足充淹留夜䦨接軟語獅子林即景十四首維則鳥啼花落屋西東柏子烟青芋火紅人道我居城市裏我疑身在萬山中萬竿緑玉繞禪房頭角森森笋稚長坐起自㩦藤七尺廵林絡繹似廵堂素壁光揺眼倍明隔林風樹弄新晴樹根瓦鼓鳴殘雨恍惚南山水樂聲指柏軒中六七僧坐忘忽怪異香生推窗日色㬉如火薝蔔花開雪一棚相君來扣少林宗官從盈門隘不通散入鳯亭深竹處石林分坐繞飛虹半檐落日晒寒衣一鉢香羮埜蕨肥春雨春烟二三子水西原上種松歸鴉鵲爭巢似憤兵怒鳴死鬬亂縱横可憐踏壊桫欏樹滿地落花無路行道人肩水灌畦蔬托鉢船歸粟有餘飽飯禪和無一事繞池分食餧逰魚卧雲室冷睡魔醒殘漏深深促五更一夢又如過一世東方日出是來生西隣母鶴唳無休鶴意吾知為主憂養得鶴成騎鶴去揚州未必勝蘇州竈兒深夜誦蓮花月度墻西桂影斜經罷轆轤聲忽動汲泉自試雨前茶林下禪闗盡日開放人來㸔卧龍梅山童莫厭門庭鬧不是愛閒人不來斜梅勢壓石闌干花似垂頭照影㸔白晝隂雲天欲雪半池星斗逼人寒雪深三尺閉柴荆嵗晩無心打葛藤立雪堂前人不見秀雲峰似白頭僧師子林三十韻僧道衍上士栖禪地精藍故有名勝逾林屋洞竒冠闔閭城岌岌諸峰秀青青萬竹榮室同圖藻麗地等布金平刹頂靈光集幢隂瑞靄縈梁飛晴蝀見礦踞怒猊獰近恱罘罳擁遥憐睥睨横桂臨經閣暝蕉傍佛龕清井甃冰壺淨池開玉鑑明鉢拘龍伏卧亭接鳯來鳴曇萼還如菊頻伽詎類鶯庭梅新著彈軒柏老垂纓槲葉欺螺翠榴英妬罽赬露晨知蕙吐日午覺葵傾磵覆叢生荔渠隂樹列檉藥欄蜂恣繞蘚砌蟻艱征風籟吟䨇徑天花雨兩楹炊香馴鴿戀屧響睡厖驚日下旛交影雲深磬一聲蘭燈長際曉蓮漏不違更煖觸松煬竈清喧茗沸鐺篆烟重翳幌鏡月獨懸甍僧出齋房靜童歸化器盈蟬號隨梵奏鶴舞逐經行慕境人勤過忘形客倦迎參時機較宻定處步宜輕踈闊縁方絶孤髙道始成逺閒思結社潜醉願投盟要識林中趣應存物外情㑹須來掃石宴坐學無生師子林池上觀魚髙啓穿蒲尾獨掉唼薲口羣仰波平沒見痕池靜跳聞響漁罛已免捕僧盂每分養落日意無驚識我臨流賞同前徐賁微微林景凉悄悄池魚出欲去戯仍戀乍探驚還逸行循曲島幽聚傍新荷密不有濠梁興誰能坐終日七月十五與髙季廸過師林張適方罷文字燕復來釋子居輕颷却暑後斜日下林初非無明旦逰偶此清思餘適當解夏日羣公正安舒或出囊中文或發函中書久論理昭析𤣥談趣中虚仰聽歸林翼俯察沉淵魚物性咸自適逰心亦晏如七月廿七日過東郭師子林蘭若如海上人索予畫因冩此圖并為之詩倪瓉宻竹鳥啼邃清池雲影閒茗雪爐烟裊松雨石苔斑心靜境恒寂何必居在山窮途有行旅日暮不知還師子林菴在城東北隅元至正二年僧維則建多聚竒石狀類狻猊故取佛氏語名一名菩提正宗寺内有十二景名人題咏甚多不能悉録今取其文并人各存其一首其備載紀勝集嘉靖中為勢家所廢萬厯壬辰始復賜額曰聖恩并大藏經一部送𢎞上人住蘇州正覺寺詩序金問蘇城中多名藍勝刹相望而起正覺其一也相傳為岐王公香火院穹堂奥殿宏壯竒麗自剏迨今數百年來固非一人一日之力而纂承繼述自非制行精白願力宏深鮮克有濟滇南𢎞上人自永樂甲午不逺萬里來朝既領職於天界禪寺尋奉詔㫖逰方若湘湖閩浙間名山古跡涉歴殆遍常住福州天王寺伐翳剗莽聿有成功未幾來吴因駐錫焉起閶門釣橋於頽波斷岸之間造承天寺萬佛於層樓傑閣之上與凡方便事力有可及者無不盡其心焉由是道譽益隆禪芳益茂乃宣徳乙卯㑹覺報主席久虚未有當其任者衆舉上人為宜遂達於録教事者𢎞因以寺名奏請特賜今額其所以仰承帝訓往踐祖庭士庶具瞻山川増觀不可無文以表著之也中書舍人姜君子徴得同朝大夫士送上人詩若干篇謁予序首簡予惟佛氏之學外形骸齊恩怨踽踽涼涼将特立於物表其自視不輕矣然自昔神僧勝士能不死其名者亦資文以傳爾予雖未識𢎞而大夫士之詩鏘金戛玉諧鈞協頀必其有可誦之寔矣矧子徴之請予言尚容靳哉是年秋九月初吉行在太常少卿兼翰林院侍讀學士金問公素序正覺寺記呉寛吴城中分四隅惟東南居民鮮少自巷衢外彌望皆隙地大率與郊埜類訪其遺迹先朝廢宅及故佛老之宫為多今正覺寺者相傳其先為宋楊和王别墅後為元人陸志寧寓館既而捨為僧寺號大林菴國朝二十五年洪武詔清理釋教菴併入萬夀寺遂廢久之一内侍有公事於吴得其地適有僧自滇南來曰𢎞此宗者才智人也寓於吴多所興修内侍遂以其地遺之於是此宗上京師奏乞為寺朝廷特從之因賜寺額曰正覺而為住持寔自此宗始時宣徳乙卯嵗也其事見翰林學士金公問所贈序文此宗沒傳其徒福暄暄傳其徒祖鎮再世有戒行能守其業予時故家居與故山西參政祝公往逰坐談竟日留詩而還盖二十餘年矣一日鎮公以書來言寺創於前人巳久未有記之者願書之夫吴自六朝來佛老之宫相望於郡中穹門廣殿長廊傑閣土木之功窮極侈麗所以成此者豈皆其徒之身之所出哉出之人而從其説以為福田利益者也予甞獨愛正覺為寺其地殆百畆非不能為彼侈麗之觀者顧其屋纔數楹於奉佛居僧僅足而已其外悉用以樹藝其徒特食其所入以自足不鼓其説以求人其賢於其類者哉故為記之志寧故大家在當時園亭勝絶尤好植竹至今美種蔓延不絶人猶以竹堂稱之地既幽僻入其寺竹樹茂宻禽聲上下如在山林中不知其為城市也又幸其去予家更邇徒歩可至予将歸老良時策杖與故舊子姪同逰於此即事賦咏其樂有日也正覺寺退居記徐源浮屠氏多衆庶家俊秀子初未喻儒術可以經世故郤歩從釋授佛書稱弟子始祝髮為侍者稍長為維那其進為藏主為首座以至為長老巍然領袖主名山大刹之席凡日用飲食衣服菜果香燈之費慶祝朔望雨暘祈禱之儀悉掌之衆則受成視訓其才且能者從而張大其教崇建乎殿宇麗設乎貌像金碧煥耀鼓動逺近華嚴大藏之書㑹讀羣誦積日絫月動千百部功在沙門於是洗心藏宻異居别處投身物外所謂飲食衣服菜果香燈慶祝朔望雨暘祈禱之事不服治理日維掃榻焚香髙者欵賔談詩下者念佛待老是東堂樂地梵言所云波羅者是也吴城東南有竹堂寺為元陸志寧園亭嘉竹蔓衍幽禽宻樹逰其間者若在山林初為宋楊和王别墅傳之志寧志寧復捨為大林菴國朝宣徳十年滇南僧𢎞此宗者逰寓於此始奏改今寺賜名正覺事載翰林學士金公問贈行序中此宗再傳得今祖鎮清修澹泊於寺為稱成化壬辰推為主席嵗在丙申乃退先是贈侍郎東庄吴翁鄉士叔謙錢翁俱交厚於鎮捐厥材費剏為退居堂室軒墀庖井湢厠秩然就位厥後好事者又助而闢之於是寛衍潔凈幽雅成趣逮正徳改元鎮之居是踰三十年矣乃者磨石介侍郎之孫嗣業過予請記惟鎮初去其家以從浮屠氏而退焉則其志慮澄澈與世相忘所謂見性到㟁久矣回想楊和志寧當時富貴地在而物改時已變而竹獨存則萬鍾之貴千駟之富其於我何有哉夫凡物有其進必有其退雖造物隂陽寒暑皆然也若鎮也可謂達其理矣吾黨之士與鎮少逰竹堂或就假居卒業久之去為有司為京曹其于生民飲食菜果日用能主之否也能不使之告乏否也能𢎞大吾儒之教否也猶且汲汲求進忘其退焉嗚呼異時懸車過鎮得共此樂者不知伊誰人也記之以待通議大夫都察院右副都御史致仕瓜涇徐源撰與參政祝公逰正覺寺吴寛陸公巳逝逐浮塵𢎞老重來刈野榛百畝園林成故事一天風雨醒逰人碧梧淨洗今何在修竹叢生舊有因白髮耆英留醉墨晩凉傳玩席間珍己未春與天台李秋官吾蘇楊黄門同逰竹堂過古石上人梅東房時梅爛開小宴花下賦此沈周竹堂梅花一千樹香雪塞門無入處秋官黄門兩詩客騎馬西來為花駐野翁攜酒亦偶同花不留人人自住滿身毛骨沁冰影嚼蕋含香各捜句吉祥牡丹清本欠定恵海棠幽亦未只凴坡口詫繁華似恐同花不同趣酒酣塗紙作横斜筆下珠光濕春露只愁此紙捲春去明日重尋花滿地竹堂留别金琮問我歸期尚漫然老僧預餞竹堂前此身清淨元無垢今日遲留似有縁栁色到門青送酒梅花開樹白連錢醉來忘却下山路明日滿城生夜烟過正覺寺皇甫信暫著荷衣到上方梅花無數落清香山牕僧定眠雲冷石鉢龍歸帶雨凉舍利有光迷寳座佛燈分影照金廊題詩不覺歸來晩回首遥天落日黄雪晏竹堂寺王寵逺公偏愛客髙㑹園才畫室香貂滿天花寳樹開林端迷塹谷象外徹樓臺對此復能醉長歌甘草萊竹堂皇甫涍香積深藏竹雲寒鐘磬㣲踏花迷雨徑入鳥到林扉真相看猶在浮踪悵屢回來兹躭寂樂清夜坐忘歸正覺禪寺在城東南隅其先為楊和王别墅元為陸志寧寓館尋捨為大林菴洪武中廢永樂中滇南僧𢎞此宗再建奏賜今額吴寛記其地多美竹又稱竹堂寺閒趣軒記徐有貞吴之東禪寺有正受上人者其迹寄浮屠中而志慕吾儒攻詩文善談論賢達士多與之逰居一軒髙敞幽闃中惟貯古今圖籍不設佛事客至則相與倒觴和詩竟日不厭嘗自詫曰世間事無我與矣而求閒者莫我若焉遂大署其軒之楣曰閒趣因予表兄范以清來京師請為之記余以其浮屠能慕吾儒也乃不之拒夫趣向也志意之所向為趣若目向色而有視之趣也耳向聲而有聽之趣也鼻向臭口向味而有嗅嗜之趣也是皆趣也而志意之趣尤大志之向富貴也則有富貴之趣志之向功名也則有功名之趣志之向道義也則有道義之趣富貴之趣淫功名之趣壯道義之趣真天下之趣富貴十八九焉功名五六焉道義一二焉盖耳目鼻口之趣同而志意之趣異異焉者要亦不出乎三者之外矣今受也又獨以閒趣名余不知其何趣也其耳目鼻口之趣乎則色聲臭味皆浮屠氏所幻而空之者也其志意之趣乎則富貴功名亦浮圖氏所幻而空之者也惟道義不可以空幻而浮屠氏又不知求也然則其趣果何在耶雖然受雖迹浮屠其志意非專向浮屠者也使其不迹浮屠則其於富貴功名道義之間亦必有所取矣惟其迹浮屠故棄富貴謝功名越道義而自趨於幽寂無事之域與山水雲月為侣不以閒為趣得乎宜其求閒之深也夫趣富貴者不知求閒趣功名者不及求閒而趣道義者不必求閒求閒者誠莫若受也嗟乎受也予不惜其不得富貴功名之趣而獨惜其不得道義之趣也茍以浮屠氏空幻為言則其所謂閒趣者亦空幻又豈復有軒之可名而待予記哉閒趣軒遇賢門前緑樹無啼鳥階下蒼苔有落花聊與東風論箇事十分春色属誰家宿東禪靜公房吴寛來為東荘逰還作東林宿林下扣禪扉幽徑行自熟齋厨夜寂然倦睡襍僧僕方床習趺坐飲我一茶足坐久湯室温洗沐解塵服袖翁故延欵展畫更燒燭逶迤水上城突兀月中屋夜靜風轉號曠野有髙木踈雨忽復來春夢不可續端如紫極宮百感入詩腹便當逰汗漫安復事拘束晩嵗返舊廬為隣豈須卜同前李應禎松杉滿院風瓜豆一籬緑不聞車馬過時得髙人宿暫來還獨歸悵望城東曲八月廿二日與諸友過東禪蔡羽巳候東林磬仍追緑䕃凉波光廻佛地樹色寂溪堂坐訝尊中翠行憐屐齒香日沉初夢醒黄鳥弄幽房其二廬山月未起座上白蓮開巳識逺公操何妨謝客來秋風動溪籟蘭氣發山盃片石難将去煩君䕶緑苔晩過東禪皇甫涍爐氣花隂禪徑重髙僧出世住中峯尋幽自入清溪路遥聽雲門起暮鐘東禪教寺在萬壽東南臨城濠呉赤烏間陳丞相宅因池中生瑞蓮遂捨為寺名鎮國院唐大中間敕改東禪明覺寺宋異僧遇賢號林酒仙居之元至正間燬國朝洪武間重建過永定廢寺髙啓亂後僧何去門閒落葉時畫昏秋螙老齋斷午禽飢罷説傳心法猶看賜額碑不知興壊理來此豈無悲過永定精舍訪南岳上人劉鉉誰識名林有逺公閒齋只住郡城東詩禪脱悟追靈澈畫墨清虚肖惠崇座上梵追金磬響佛前燈應寳幢紅相過莫問三乗道萬法由來本是空永定精舎楊循吉古刹呉城裏相傳始自唐殿髙鷹磨頂門啟檜成行布地将千載分燈有數房涵空雲沼淨當閣野梅長塵動無餘法經完室藴香暫逰非久住靈境獨徜徉永定講寺在呉縣東南吴地記云梁天監中蘇州刺史吴郡顧彦先捨宅建唐乾符間賜今額陸鴻漸書韋應物罷郡寓居寺中故多賦咏初寺在閶門北景福五年始遷於此天福中更名普慈元僧聲九臯作海印堂又取韋詩作閒齋元末燬國朝洪武中重建嘉靖間郡守胡纉宗廢為金鄉書院惟存一房於後出入蘇州南禪院白氏文集記白居易唐馮翊縣開國侯太原白居易字樂天有文集七帙合六十七卷凡三千四百八十七首其間根源五常枝派六藝恢王教而𢎞佛道者多矣然寓形放言縁情綺語者亦往往有之樂天佛弟子也備聞聖教深信因果懼結來業悟知前非故其集家藏之外别録三本一本寘於東都聖善寺塔院律庫中一本寘於廬山東林寺經藏中一本寘於蘇州南禪院千佛堂内夫惟悉索敝文歸依三藏者其意云何且有本願願以今生世俗文字放言綺語之因轉為将來世世賛佛乗轉法輪之縁也三寳在上寔聞此言開成四年二月二日樂天記南禪集雲寺重建大雄殿記呉寛吴有佛寺曰南禪集雲者國初賜額也寺之始建不可考自唐宋以來多名僧居之皇明又有若寳曇和尚者髙皇帝知其名召赴闕下俾住蜀之峨嵋化行其地久之而還因奏先所居吴門集雲旁有妙隠大雲二寺乞合而一之為是上從之始賜今額寔洪武二十四年也事見左善世𢎞道所制寳曇塔銘乃成化十二年十月十三日寺燼於火主僧徳本以為巳事欲重建之而力未能也於是徧叩富室求施積財蓄料盖越十寒暑爰以二十二年五月十一日興工始克建所謂大雄殿者像設既完供養益盛乃復建方丈以為宴息之所觀者稱歎以本公之勞其心力役其精神不負乎其教有可嘉者然其意猶以寺之規制未備欲悉建之而力亦未能也特求予記其功之成者至於數四而不巳惟兹寺在城之南有山林幽絶之勝自昔賢士大夫嘗辱愛之盖唐開成初寺僧法𢎞恵滿等作千佛堂經藏刺史白樂天既為之記又嘗以文字七帙寘於寺中非以寺之有人而有所託乎及宋蘇子美謫湖州長史流寓吴中作滄浪池以樂今其寺後積水猶汪汪然子美嘗遺洛中故人詩云吴多佛寺可逰兹寺非其首歟夫前賢遺事其可攷如此予獨愛一言而不為本公復哉本公字一源俗出陽湖馬氏而受業於半塘夀聖寺曰顯祖庭為徒今年老退歸舊隠而惓惓於兹寺如此真所謂不負其教者乎贈鏡菴上人徐縉滄浪池頭秋水深滄浪亭上秋月明上人栖隠巳七十披衣擁錫傾相迎竹扉松徑自成趣猶記當年濯纓處從兹借榻學無生笑指天花落庭樹南禪禪寺唐開成間僧元遂建有千佛堂轉輪經藏白居易記居易在郡嘗書白氏長慶集留千佛堂舊稱南禪寺唐有之今失所在按今寺在郡學東本名集雲國朝洪武中名僧示應號寳曇和尚者奏請為南禪集雲寺成化中燬僧徳本重建吴寛記正徳中寺僧良定建天王殿嘉靖中住持祖重修楊循吉記大雲菴重建殿宇記楊循吉天竺聖人一仁而巳矣其法東流二千餘年雅為王公大人之所尊仰所以寳坊金刹隨方顯現吴為大郡尤為櫛比焉大雲庵者南禪集雲之别院也洪武中寳曇師欽奉髙皇帝賜額統之本寺吴中諸蘭若多出前代褒崇至於親承聖渥惟此得之且寳曇遺塔所在前沼後岡古松標夀有廣陵南園之舊跡斯非伽藍之傑然者歟境不能勝必有嗣人燬而復興兹惟道力於是西房一峰嵩公暨徒松嵓鎮公又一治於斯菴也當正徳中菴遭回禄已為瓦礫之塲十二年一峰師徒以已資先建大殿不藉檀施之力閲八月告成至今嘉靖三年又建堂宇門廡自為一房亦成座下半雲雪溪本㛠吟筆馳聲叢林至是咸預駿奔共落勝舉然後祝聖有所居衆有寮美哉輪且奐矣十四年南禪主席缺貟衆推松嵓為綱紀亦為盡力修盖傾嚢無吝明年随牒上禮部領劄住寺既歸具事跡請記尋先約也惟大雄氏之道𢎞被四洲匪徒以寂滅為事其中富貴與世諦等惟善嗣者受其福兹菴化舊為新能恢𢎞先業非其迓承紹續得人之一驗歟且荷國家恩命外縁無擾受賜匪常得不晨香夕燈以竭焚脩之報耶永構法隆傳祀無極可不朂諸一峰妙通醫術體釋行仁由是克裕淨財用充興復既峥嶸於法門矣松嵓剛直有為醫學尤精兼好文字皆前修之上足本山之小宗昔之創固不易也今復尤為難焉是宜書以志之草菴紀㳺詩并引沈周𢎞治十年八月十七日余有役於城東寓草菴為始逰也菴名本大雲菴前有吉草菴者居之遂譌為結草菴菴近南城竹樹叢邃極類村落間隔㟁望之地浸一水中其水從葑溪而西過長洲縣治支港稍南折而東復南衍至菴左流入環後如帶滙前為池其勢縈互深曲如行螺殻中池廣十畆名放生中有兩石塔一藏四大部經目一藏寳曇和尚舍利東西二小洲橢而方浮汨塔下猶筆研相倚東洲南次通一橋惟獨木板耳過洲復接一木橋人行側足慄股徹橋若與世絶自此達主僧茂公房房據東偏中有佛殿後亘土岡延四十丈髙逾三丈上有古栝喬然十尋其枝骳􅀈深翠數百年物西亦有房與東房等寔茂之姪禎公分栖處也山空水流人境俱寂宜為脩禪讀書之地勝國時有斷厓和尚肇業於此繼之寳曇曇傳為斷厓轉生皆了悟之人地理家謂其四獸俱全風氣藏鬱以是觀之吴城諸蘭若莫之及矣是夕宿西小齋紙窓月色耿耿無寐因得五字律一首塵海嵌佛地廻塘獨木梁不容人跬歩宛在水中央僧閒兀蒲坐鳥鳴空竹房巍然雙石塔和月浸滄浪沈石田寓結草僧院次韻楊循吉門前即人世活板作飛梁古殿崇三寳寒泉繞四央松枯老成怪蜂出晩知房更擬分禪榻來聽夜雨浪贈澄上人蔡羽五載栖雲宅如浮海上舟斷梁僧渡熟踈竹鳥啼稠靜得觀魚樂閒堪學道謀棹歌何處起城裏有滄洲寓大雲菴贈茂公王寵趺坐長眉老稜稜挿五峰池開通寳筏巢古挂雲松拄杖胡藤㫁袈裟金縷縫徑行那出户堦蘚自蒙茸贈松嵓顧鼎臣老衲身貧道不貧談經施藥濟貧人嵓松可是千年物影落金山丈六身大雲菴一名結草菴在南禪寺東即其别院也元至正間僧善慶建碧筠精舍記蔡羽天王寺之南洲為精舍竹二畆池倍之閣十尋軒五竹之一客之造南洲先於軒次竹次池次閣還休於軒古器像充焉暑之月池於濯竹於巾窓於書席於琴於奕閣於風酒食之㑹則於軒其霽也池明竹明窓明席明軒明而閣又極明城中之臺榭城外之雲山皆在閣前其晦也池暝竹暝窓暝而閣亦暝聞萍藻之聲竹之韻而巳余之卧是軒也當壬午六月洞心澄覽則得之池焉洒襟臆䬃毛髮則得之竹焉晝書昏誦則得之窓焉慿空御逺觀中吴之氣雲物之變則得之閣焉憩息舒倦守神則得之軒焉彌月居得巳多使終身居之得又何如也書以為碧筠精舍記送常上人住蘇城天王寺謝縉巍巍梵刹古宮邉講席新登况盛年山迥栁橋聞錫振林閒槐市見燈燃芭蕉緑上繙經葉薝蔔香飄煮茗烟好對清風揮玉麈蓮花漏底坐談𤣥再至天王寺有感王鏊深鎖禪扉暫一開竹間那復舊池臺嵗寒只有庭前柏五十年前見我來舊日沙彌今老禪白頭我亦異當年見恒河性依然在莫為浮生一惘然天王寺訪濟之不遇皇甫信特為尋君不見君山牕寂寂鎖秋雲偶然回首逢僧話滿樹寒蟬帶夕曛天王寺胡纉宗叢竹隂隂覆子城煗雲靄靄度瓜涇僧歸何處溪頭雨野寺寂寥春鳥鳴天王寺在子城西唐大厯元年僧不空建姑蘓能仁菴記祖瑛有道者不求人知而人自知之故身彌隠道愈顯天目幻住本公其道大而弟子至者衆逃於窮山海島弟子追逐之不捨髙麗君長即山問道朝廷屢徴不起於其死也諡之以普應國師之號仍賜其書入藏嗚呼何其盛哉夫内不足者急於人知而人不之親窶人之子得一金日抱之以號於道路曰吾甚富吾甚富而人莫不笑之若夫積富之家深藏若虚其有道者亦若是耶方師之逃於潜至乎皖也有祖震者先隠此山願為役終身從逰匡廬金陵旋至天目擇其勞者躬為之如庚桑之於老聃薛勤之於郭林宗明大禪之於妙善必有厭服其心者也至大四年吴江居士陳無心以白洋山新菴施師名之曰順心庵俾震主之震以姑蘇為禪衲逰訪之所而無所歸及至治二年買仰家橋嚴氏地南北至河東西延二百三十三尺卓菴曰能仁以駐飛錫有果菴居士吴志英者佐之施財作觀音羅漢之像自門而室及買菴基之右太湖余氏地為園南北至河東西延八十三尺至順二年復買菴基之左戴氏民地為園南北至河東西延八十五尺爰及松陵贍衆之田六十二畆心之所施者畢應菴既成以順心所度弟子正性領菴事定為甲乙傳授立誓以示誨盖震之侍師既巳得師之道焉用其土苴固足以成教况其精者乎於是震之死又一年矣性慮其後罔念先規而斁成法介吾友福慶院長老從雅求文為記為述本公之行震之能勤其師以告之云元至順三年二月十一日四明沙門祖瑛撰翰林學士承㫖榮禄大夫知制誥兼修國史趙孟頫題篆能仁菴開山祖師遺囑法雷震祖震自幼出家濫叨田服唯清苦自持堅守戒法持往淮西天柱山結茅居之時天目幻住和尚方來兹山遂發志㕘禮而夙縁慶幸乃䝉攝受誓期終身給侍巳而從師過廬岳之金陵歸天目日設夜禪寒暑不憚勞苦至大四年有吴江檀越無心陳君建菴于吴城西白洋山請師開山師名菴曰順心俾震主之領衆焚脩告天祝夀自爾菴縁益隆食指亦衆乃剃弟曰善權善濤正午正等正性正智各領菴務復剃正勤正登正行切念十方禪侶㕘學問道往來無栖宿之所至治二年買府城仰家橋嚴氏宅第卓菴扁曰能仁及承果菴居士吴公施財作觀音羅漢并莊嚴供養之具仍買菴基之左右太湖余氏戴氏地為園其基若園南北抵河東西總延四百一尺及呉江贍衆之田六十二畝九分凡庵之未備者亦化縁而成之復承吾友道翁禪師以長洲之二十都東吴鄉山居施余名之曰能仁慶福菴命徒弟正智掌之泰定間震以老病引退檀越隣峰徒弟正午正等領順心菴事方歸休能仁未㡬衰病日攻復命徒弟正性領能仁菴事自性而下擬為甲乙之傳俾後之來者重念其師建始之心當從佛恩次福檀度㧞濟寃苦超度沉淪自利利他令法久住若不然者即邪魔外道重招來業決非吾之眷屬也大元至順二年春正月十二日老僧祖震遺囑付能仁主僧正性收執元紀元年春正性買東園東北枕河王氏空地一方入深二十丈五尺東西延二十文三尺因付吾師遺囑摹刻上石遂識於後至元二年十月十七日住山沙門正性立石呉興趙孟頫書丹并篆能仁菴在城西北隅仰家橋西元至治間僧祖震建僧祖瑛記今為勢家所有呉都文粹續集卷三十
