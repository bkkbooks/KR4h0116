body:
  text: 吳都文粹續集補遺卷上明錢榖撰雜文吳越故東海徐太夫人墓志李潯夫月滿則虧日平則昃盛衰之道古今而同也其有秀而不實者得無痛乎夫人徐氏其先東海人也粵以玄元降聖盤條仙樹之端洎唐后啓圖析派天潢之側龍飛鳯翥殷鼎闕壇閥閲勳賢無出其右官諱軻任省營田隊夫人媸渤海闕吳皓僕射闕宣賜褐裳之管轄營田隊務文華擅美器宇𢎞深夙嫻闕悌之規抗見熹之色百行之美實無闕焉悲娶闕一卒九乎三紀何期隟駟難追遊波莫遏享年五十有六偶暫攝調闕于顯德三年嵗在丙辰九月庚寅朔五日甲闕寢疾殞于吳縣今德鄉之私第也闕夫人有子六人長曰承嗣效闕衙內直番隊充副將次曰承寵係營田甲將次承鄴營田副將次五兒滿兒淡幼稚未效職員有女三人長曰十八娘聘于金氏次曰十九娘在室未從伉儷次草娘捨棄俗華以投金地于福田寺慕真堅守緇門精專戒行子聟一人金氏𢎞綰新婦二人長曰沈氏次曰曹氏嗚呼封樹告期龜策叶吉以十月庚申十四日癸酉窆于吳縣胥臺鄉尚書里闔閭城西去祔五十餘里先祖塋之側禮也杼恐天地長久陵谷變遷令嗣號訴願勒貞石以志于墓潯忝獲知音得不涕泗揮毫敘録其實而為之銘曰委質荒阡凝神上仙繞繞三界茫茫九泉逺岫煙暝髙空月懸聲沈永矣松檟蕭然右志乃香山潘氏鋤頭而得章簡甫榻得見惠恐嵗久湮沒重録于此顯德乃五代周世宗三年也據志徐夫人生唐僖宗中和元年宋朝散大夫提舉舒州靈仙觀章公墓楊時公諱甫字端叔姓章氏公八世祖乃為康州刺史自南康徙居建州之浦城其孫仔鈞仕王氏官至太傅仔釗為泉州團練副使兄弟皆有功于閩故號仔釗為小太傅仔鈞之後居西村仔釗之後居珠林自是分為二族宋興幾二百年西村世有顯人珠林久不振至景德中公之大王父始以進士中甲科而仕至祕書丞公于熙寧三年繼登科而後珠林之族浸顯矣公資穎悟方幼學已能屬文年十四即辭親求師友薄遊江淮間殆十年能自力卒以名聞于時初調撫州臨川尉盜有劫行商殺人者吏以枝詞蔓其獄連逮者以十數纍日情不得公呼囚令環坐以事驗之俄引三人出曰汝實為盜餘悉縱之使去三人者卒服其辜無異辭其遇事巧發竒中類如此人莫能測也就移壽州壽春令大臣有以公孟子解義進者詔付祕書省除應天府國子監教授用舉者改著作左郎官制行換宣德郎知越州山隂縣事山隂號繁劇訟牒日紛至公處之裕如也巨猾陸璋輩竄易户名以避征役公閲籍具得其情狀坐流配者數人老姦宿吏屏迹聽命無敢復自肆者邑大治境內有海塘瀦水溉民田嵗久湮塞不治為旱患公鳩徒濬之仍為經畫為久計民至今賴焉秩滿轉奉議郎監左藏北庫哲宗即位轉丞議郎通判宿州先是南京押綱侍禁史士宗侵耗官米數百石反訟倉官出納不公獄久不決朝廷以委公至即片言折之士宗雖坐流竄去而自以為不寃又兩遷為朝散郎繼丁親憂去職久之除大府寺丞轉朝請郎召對稱旨除府界提舉常平等鄢陵舊有雙泊河數溢為民害二縣以開濬為請公為親行堤上得舊河經始之意本欲殺惠民河水流而歸之蔡河稍加開濬則惠民之注流益悍而蔡河不足以吞納則為害滋甚不若增濬河外故道雙泊雖溢可恃以無患是嵗河朔飢民流而入畿甸者不可以數計公召而廩給之因以用其力故事成民不告病而飢者得以全活公私之利蓋兩得之也上皇即位轉朝奉大夫未幾除知虔州州為江西劇郡俗健訟公下車痛治妄訴者一人迄公去無或千政犯令者是時承平日久屢豐年天下諱言災傷無以民病告者公還朝首言淮甸嵗凶宜加賑恤大臣初雖不許感公誠意懇惻故卒從之翌日遣使大發倉廩而民賴以濟公之力也崇寧初黨論復興義士膠口無敢竊議者公除郎官得旨陛對抗言元祐臣僚削秩投荒皆緣國事陛下即位制令內徙道路交慶今復刻名著籍禁錮其子孫恐非陛下本意臣竊惑焉上雖優容之然亦由是與時論不合矣會宰相曾公布得罪言者因以微文詆公從坐降一官罷尋知泰州遂挂冠退居吳門未幾上記其姓名特旨落致仕復知泰州之官數月即乞宫祠得提舉舒州靈仙觀崇寧五年六月八日以疾終于平江府之私第享年六十二嵗以其年十二月十六日葬于吳縣長山鄉仕墟道士塢之原公莊重簡默而接人以和氣行已涖官一本于誠不表襮以自售其論天下事不茍不隨期于當理而已方元符末議役法請循元豐時為便或疑其朋附及崇寧陛對抗言黨錮非是聞者駭汗乃知公之用心合天下至公無彼時此時之間公以是數忤權貴竟以不遇公仕于朝兄弟請别居公盡以已所當得田業均之且立券與之約毋得輟典賣而其後兄弟之子有破其産者卒賴此以為生公之惇族為之長慮如此公平生無聲伎珍竒之好獨讀書萬卷讐校精至手澤具在有文集二十卷孟子解義十四卷曽祖可法故任祕書丞祖偃之不仕父説故任通直郎贈朝奉大夫娶沈氏起居舍人諱季長之女也封宜人公襟度簡逺未嘗問生事然奮羇旅起家闔門千指有宅以居有田以食夫人之力也其經理家事無巨細皆有節法豐而不侈儉而不陋調睦內外雍如也自政和以來四方無虞仕進者以攀附為榮而夫人獨戒其子以宜安素分逺權門盜賊且起無逺官以貽吾憂諸子謹奉其教卒無患聞者服其逺識建炎二年八月二十五日以疾終于正寢享年七十有四以是年十月二十二日祔葬于公之兆子男八人長願宣教郎知杭州臨安縣事次師中早世次慤迪功郎池州士曹掾次愈從政郎和政士曹掾次憲次懋次哲皆業儒未仕女四人長適宣教郎知舒州宿松縣事孫實次適朝散郎直祕閣廣東路提舉常平等事王舜舉次適奉議郎秀州司録事邵勳次適奉議郎主管亳州明道宫吕弼中孫男女二十二人建炎之初其子憲不逺數舍詣毗陵踵吾門而告曰先君之亡二十有餘年矣而無幽堂之銘其盛德懿行恐遂泯沒無傳焉敢以是請久之余未暇作也又遭母夫人之喪復以書抵余而請之益至余雖不及見公而公之子憲哲從余遊義不得辭也乃為之銘使歸而揭之墓上銘曰奮用羇旅砥節不移遵義而行不茍不隨黨籍之興公獨有言為人不能展也直言銘以昭之庶永其傳故翰林檢討陳君墓碑銘楊士竒仁宗皇帝初臨御奬用儒術茂興文治首命在廷舉賢薦能于是少保臣士竒言蘇陳繼其文學宜在侍近即日詔驛召之即至授國子博士明旦入謝改翰林五經博士時初建𢎞文閣于思善門之右以儲經籍備訪問而命翰林學士楊溥董之擢侍講王進及繼等三人副之今上嗣大統詔修兩朝實録焉無幾賜敕命實録成賜白金及織金文綺衣遂進檢討宣德七年五月自陳老疾奉命致仕歸又明年疾加遂不起五月某日也于是其子完走北京求文書墓碑嗚呼斯文老成凋喪殆盡士竒忍以衰病而忘情老友哉按其學者大理評事張益狀陳氏其先家蜀與宋文忠公堯叟同祖堯叟從父諱鄴始徙南康之都昌七世至諱篆登宣和六年進士乙科纍官左朝散大夫明州通判再徙星子又五世至諱洽咸淳貢士貢士生元翰林待制諱同待制生諱徵受學臨川吳文正公為通儒至正間廷臣交章起之將授之官以介持不偶自引去又徙蘇州之吳縣娶宋相江文忠公萬里之孫生諱汝言博學有才具洪武初仕為濟南府經歷所設施秩然條理一郡倚重大將軍出師道其境深見奬重娶吳氏初生三女經歷公方以嗣子為念在濟南一夕夢白衣大士已而生男即檢討也初名釋童更名繼字嗣初晚號怡菴嗣初生十月經歷公沒母抱之歸蘇家具蕭然惟存書二萬卷及蔬地二十畝其母知學問謹禮法守節不嫁以教育遺孤嗣初稍長克自奮勵其天資明果曲奉母訓外從良師日益見端緒又進而從明經師遂深于易詩又求邃于古文者而師之其為學自經史百氏皆博考深究久而淹貫沛然為文章根義理辨體製嚴矩矱力去陳言不肯茍率由是聲譽蔚然見重于三吳求文者接踵户外而從學日輻輳講下其施教有本末主敬為要明理為務後在館閣于商確古今講論述作之旨娓娓皆有所自衆推勝之居家篤孝行雖貧而講授之暇躬治蔬圃以資養甘旨恆充有司上其母貞節詔旌表之自是逺近交聘嗣初學官一以親老辭親沒祭葬盡禮與人交以誠善者奬掖之不善者面警飭之不肯媕婀茍容窮乏者賑給之沒無歸者斂葬之雖官于朝其志泊如蓋未嘗一日忘幽間之適既得請歸吳中之學者欣欣皆喜得所依而從遊者益衆既疾革門人請所欲言舉西銘存順沒寧答之遂卒春秋六十有五其卒也族姻門生故舊皆臨哭郡自守二以下咸走弔祭逺近大夫士皆嗟歎悼惜其所著詩文有怡菴集四十卷藏于家其配故蘇守金絅之子儉謹克孝先十二年卒子男五宗寬宏宣完皆志于學女二長適謝璜次在室孫男七傳儀仁偉佃佶俌女四其葬在縣之太平鄉薦福山之原銘曰有碩其光自陳宗室派衍于蜀英傑森出沿江而東來徙南康再徙闔閭代有奮揚卓乎怡菴克奮于孤幼志桓桓壯夫莫踰有書充棟有畦繞宅晝鋤夕誦孝養是力浩乎其學邃乎其文求道請業從遊詵詵辟書駢來親養弗舍晚而幡然玉堂金馬抽思發才效勤紀述長簡巨䇿金匱石室沖淡之志食息靡忘引疾謝榮遄復于鄉邦有耆俊如璞在石山林草木光輝潤澤奄其永逝士林興悲紛彼俗學倀倀奚歸刻詞墓前式示來者尚有懷德車過斯下御醫趙彥如墓志銘楊士竒太醫院御醫趙友同字彥如大臣嘗言其文學于上時方修永樂大典即用為副總裁後修五經四書及性理大全書又用為纂修書成皆被寵賜于是知彥如者皆為之喜且意其將有詞林翰苑之遷也而彥如亦兾得一職于此為其親榮未幾以母喪去又未幾以病不起嗚呼惜哉彥如沈實溫雅有行義自其少篤志學問手一卷祁寒盛暑不釋嘗授經前翰林承旨金華宋先生為文章貫穿經史優柔縝栗或豐或約必歸宿于理今祭酒胡公教諭華亭時首舉為訓導既而浙江布政司聘考鄉試華亭滿九載天官考最當升太子少師姚公言其邃醫詔升太醫院御醫會浙西水有言彥如知水事者又奉詔從今户部尚書夏公往治之士恆患有所負挾無所遇而不見試也若彥如所長數數見用于世彰明如此其可謂榮遇而無憾也矣彥如系出宋南陽侯仲礦仲礦生士翮為武節大夫處州兵馬鈐轄困家處州士翮生武義郎不玷官浦江子孫又徙家焉曽祖崇傒祖必俊父良仁又徙蘇之長洲故彥如今為長洲人母鄭氏彥如卒于永樂十六年四月一日春秋五十有五所著有存齋集若干卷藏于家娶邵氏子男三季珣季諒季成女二華信張瑜其壻也孫男一人興文其子卜以卒之嵗十二月某日葬某鄉某原先事以治命齎監御史張循理所具事狀來求銘蓋余知彥如者銘曰士之所貴實有諸內有藴而竒貴弗時遺崑岡之産用則為寶為瓚為圭彼此奚較嗚呼彥如既試有聞肆豫作銘慰其九原偶得墓志銘數篇補録於右彭循字子陽建國三年海賊丁儀等萬人據吳太守狄君聞循勇謀以守命循與儀相見陳説利害應時俱散民歌之曰循傳作彭修毗陵人時嵗倉卒賊縱橫大戟長弩不可當賴得賢令彭子陽循時為吳令右事出吳録第五倫薦謝夷吾文班固代作竊見巨鹿太守會稽謝夷吾出身東州英姿挺特少膺儒雅綜校圖録昔為陪𨽻與臣從事奮忠毅之操躬史魚之節及應選作宰惠敷百里爰牧荆州威行邦國遷守巨鹿政合時雍冝當拔擢使登鼎司臣以頑駑尸祿負乘願乞骸骨更授夷吾以厭率土之望張霸作郡民語永元中城上烏鳴哺父母府中諸吏皆孝子又越賊歸附童謠曰棄我戟捐我矛盜賊盡吏皆休功曹唐景對太守麋豹問風俗所尚永興中處家無不孝之子立朝無不忠之臣文為儒宗武為將帥東門奐歷吳濟隂二郡太守所在貪濁謠曰東門奐取吳半吳不足濟隂續許貢表孫䇿于漢帝云䇿驍勇與項籍相似宜加賚寵召還京邑若置于外必為世患蔡洪答刺史周浚論吳士吳展書吳時人士季忠足矯非清足厲俗信可結神才堪幹世誠聖世之老臣明時之俊乂也顧榮與親故書時傳咸為吳國內史故也傳長虞徑直忠果雖非周才亦足貴也吳人歌鄧攸云紞如打五鼓雞鳴天欲曙鄧侯挽不來謝令推不去王洽為吳國內史在郡上表云編户僵尸葬薶無主或闔閭餓餒煙火不舉劉損為吳郡至閶門入泰伯廟室宇隤毁牆垣不修損愴然曰清塵尚可髣佛衡宇一何摧隤竟陵王子良與吳郡太守安陸昭王􅒺書云竊承下風數十年來姑蘇未有此政王規為吳郡太守簡文帝為作謝章曰臣今駕吉祥之車入勾吳之境驅緹扇之馬撫奉德之鄉製錦何階棼絲方始開皇十年江南髙智惠作亂州民顧子元應之刺史皇甫績遺子元書曩者偽陳獨阻聲教江東士民困于荼毒朝廷薄伐應時瓦解吳會臣民白骨還肉惟當懷音感德豈冝自同吠主翻成反噬吾是隋將何容外交易子析骸未能相告况足食足兵髙城深塹坐待強援綽有餘力何勞踵輕弊之俗作虛偽之詞以此見期必不可得卿冝曉諭黎元能早改迷失道非逺唐燕王靈夔江王元祥滕王元嬰相繼為蘇州性皆庸懦貪暴時語曰寧向儋崖振白不事江滕燕虢獨孤及代房琯作祭李刺史文孝友慈惠公廉正直姑蘇之役姦鋒構難公秉義勇誅其渠魁海寇圍逼勾吳震駭公率羸師克翦大敵竒謀生于死地貞節見于孤城劉太貞與韋應物書顧著作來已知足下郡齋燕集相契卞何情致暢茂遒逸如此宋齊間沈謝何劉始精于理意緣情體物備詩人之旨後之傳者甚失其原惟足下制其橫流師摯之始關雎之亂于足下之文見之矣韋夏卿為刺史息民令曰矜老疾活艱民凡在庶物令趣其本賜章岵詔元豐元年到任吏不數易然後得以究其才今夫蘇劇郡而爾為之守克有能稱嘉省厥勞仍其舊服往惟率職不懈以稱吾久任之意哉范仲淹舉從事張伯玉辭天賦才敏學窮閫奧善言皇王之治博達古今之宜素藴甚充清節自處邵琪張青反覆為盜命諸將毋得招安知府胡松年上言大軍四合連旬不能破賊今賊據通州崇明鎮沙上寨柵之外水淺舟不可行泥深人不可涉本府錢糧已費十三萬貫石公私騷然而賊未可睥睨况劉光世兵將多西北人一旦從事江海有掉眩不能飲食者安能與賊較勝負于矢石間答向子諲乞休詔紹興中時知平江府卿從朕羇紲晚登禁途昔漢二疏以宦成名立乞骸未若方被寵遇神明未衰如卿今日也劉宰贈知平江王遂言士友當親而賢否不可不辨財利當逺而會計不可不明折獄以情毋為私意所牽薦士以才毋為權要所奪當言則言不視時而退縮可去則去不計利而遲回庶幾名節之全吳樵為平江節度推官嘗謂人曰淳祐中樵居官既久深知吳風吳人尚奢而爭勝所事不切寧拚百萬錢嫁女不能拚十萬錢教子弟寧捨十萬錢遣婢妾不能以一萬錢延好師友故使子弟不知書識字但廣置田宅計較微利殊不思異時反貽子孫不肖之害故人以呆目之蓋以此也王禹稱為長洲令自敘禹稱名利之流也一身之計有親族妻子焉雖內無妾外無僕不可去者凡百指晨有炊爨夕有脂燭伏臘慶弔居其外月得俸金大半長物是以從官三年徒行而已一邑之政有租庸稅調焉土甚瘠而民不懈吏好欺而賦愈重廉其身而濁者忌之直其氣而曲者惡之懇無知音動有變畏去年稼多不登編户艱食賦斂之數有乖其期而民部督成于郡郡侯歸罪于縣鞭笞之人日不下數百輩菜色在面而血流于膚讀書為儒胡寧忍此因出吏部考課厯納質于巨商得錢一萬七千市白粲而代輸之始可免責春夏以來民有歸其直者蓋三分有其二焉入朝又上疏曰臣舊知蘇州長洲縣七千餘家自錢氏納土以來朝廷命官七年無縣尉使主簿兼領之未嘗闕事三年增置縣尉未嘗立一功以臣詳之天下大率如此誠能省尉三千員減俸數十萬以供邊備寬民賦亦大利也范文正公送錢振常熟主簿歸省詩姑蘇臺下水如藍天賜仙卿奉旨甘梅淡柳黃春尚淺王孫歸思滿江南振郡人亦吳越之裔黃震為吳縣尉請禁復創焚尸亭呈府文焚尸外域之法凡史傳所書仇怨刑戮之酷罪盈惡極乃有焚滅遺骸亦戰國以來之事古無有也然殺者常刑焚者非法非法之虐且不可施于誅死之罪人况父母骨肉乎今吾所處中國耶外域耶傷風敗俗莫此為甚其亭冝令勿再置徐珵論吳縣知縣葉玄圭玄圭為治一本經術先律己而後齊人惟理之從法之守他無恤也官長承迎之私不行寮吏比周之情不接豪猾敓攘之姦不得行故雖深得細民之心而忌者亦衆或軋之于上怵之于下咻之于傍玄圭堅不動至是循良之效白焉徐誼論水利之切于時者昔下流不疏而水上溢故鑿直曲港還三江故道開冝興百瀆所以順導下流也惟髙原田徑乃瀦堰之爾昔之言水如單鍔夾亶皆是也今開吳淞江下流與宜興百瀆屬之海者無慮數十百所異時浦港磬折以趨海今近浦之民多取徑直疏決蘇湖常秀舊為澤國比年雨或後至種且不入蓋圍田衆而疏道多也小人見利不畏其害圍于淺水既為髙田圍于茭蕩既為稻田二俱不已復有下腳始之重陂太平為平始之良田背水自曬十日不雨農廢作業然且承用舊説又將疏之失利害之實矣故舊田溝澮當濬治圍田下腳無輒開巳開未填當捺合今之言水能行是三説則髙原舊田還為衍沃而農不病矣間閲書傳中有關吳中吏治者摘録於此嚴助諭淮南王今者大王以發屯臨越事上嘗陛下故遣臣助告王其事朝有闕政遺王之憂陛下甚恨之夫兵固凶器然自五帝三王禁暴止亂非兵未之聞也漢操生殺之柄以制海內之命危者望安亂者仰治今閩越王狠戾不仁陛下為萬民安危久逺之計故遣兩將屯于境上震威武揚聲鄉屯曽未會天誘其衷閩王隕命輒遣使者罷屯無後農時南越王甚嘉被惠澤故遣太子入侍此則陛下深計逺慮之所出也事效見前故使臣助來諭王意陸喜西州清論品格篇或問喜薛瑩國士之第一者乎答曰以理推之在乎四五之間夫孫皓無道若龍蛇其身濳而勿用趣不可測此第一人也避尊居卑祿代耕養玄靜守約第二人也侃然體國以方見憚執正不懼此第三人也斟酌時宜在亂猶顯時獻微益此第四人也溫恭修愼不為諂首從容保寵此第五人也過此以往不足復數故第二已上多淪沒而逺悔吝第二已下有聲位而近咎纍是以深識君子晦其明而履柔順也太康中徵喜詔曰陸喜等並以貞潔不容皓朝或忠而獲罪或退身修志敕所在以禮發遣須到隨才授用陸曄居喪孝顧榮與人書士光氣息裁屬慮其性命言之傷心晉明帝詔曄清操忠貞歷職顯允其兄弟事君如父憂國如家嵗寒不雕體自風義既委以六軍可録以尚書事加散騎常侍王導請婚于陸玩玩對曰培塿無松柏薰蕕不同器玩雖不才義不能為亂倫之始華核薦陸禕表禕體質方剛器幹強固董率之才魯肅不過才武果毅臨財有節夫夏口賊之衝要冝選名將以鎮戍之臣謂莫善于禕華核薦交州刺史陸胤表胤天姿聰朗才通行潔昔歷選曹遺迹可紀還撫交州民心歸附商旅平行民無疾疫田稼豐稔州治臨海海流秋鹹胤又畜水民得甘食惠風橫被化感人神遂憑天威招合遺散在州十有餘年內無粉黛附珠之妾家無文甲犀象之珍冝在輦轂股肱王室王僧達為吳郡太守入閶門曰彼有人焉顧琛一公兩椽英英門户陸子真五世內侍我之流亞慧曉清介正立不雜交遊張緒稱為江東裴樂陸襄為鄱陽內史獲郡賊鮮于琮民歌之曰鮮于鈔後善惡分人無死賴陸君又解彭李二家忿爭民又歌曰陸君政無怨家鬬既罷仇共車陸徽卒太祖下詔曰徽厲志廉潔歷任恬勤奉公盡誠克己無倦褒榮永由不幸夙殞言念在懷以為傷恨可贈輔國將軍賜錢十萬米二百斛諡曰簡子羊希論陸法真與孫詵書足下同僚陸録事東南名地又張玄外孫持身至清年髙官下秉操不衰當日夕相與申意顧雍子裕襲爵詔永安元年故丞相雍至德忠賢輔國以禮而侯統廢絶朕甚愍之其以雍次子裕襲爵為醴陵侯以明著舊勳薛綜讓顧談為選曹尚書奏談心精體密貫道達微才照衆物德允衆望誠非愚臣所可越先吳大帝徵顧承賜顧雍書貴孫子直令問休休至于相見過于所聞顧榮為不復飲酒或問之曰何前醉而後醒耶榮懼乃復飲與楊彥明書曰吾為齊王主簿恆慮禍及見刀與繩每欲自殺汝南王統江夏公衛崇並為庶母制服三年尚書令顧和奏曰禮所以軌物成教故有國家者莫不崇正明本以一其統斯人倫之紀不二之道也為人後者降其所出奪天屬之性顯至公之義降殺節文著于周典按汝南王統為庶母居廬服重江夏公衛崇本由疏屬開國之緒近喪所生復行重制違冒禮度肆其私情皆可下太常奪服若不祗王命應加貶黜詔從之潯陽王子房欲加位號于顧凱之辭曰禮年六十不服戎以其筋力衰謝非復軍旅之日况年將八十殘生無幾守盡家門不敢聞命張溫使蜀對大帝曰臣入無腹心之規出無專對之用懼無張老延譽之功又無子産陳事之效然諸葛亮逺見計數必知神慮屈伸之冝推亮心必無疑二張純字元基有清才與同郡張儼朱異俱童少往見朱據據聞三人才名試之曰今三賢屈顧其為吾各賦一物然後乃坐夫騕裊以迅驟為功鷹隼以輕疾為妙何必積思純賦席曰席以冬設簟為夏施揖遜而坐君子攸冝儼賦犬曰守則有威出則有獲韓盧宋鵲書名竹帛異賦弩曰南嶽之幹鍾山之銅應機命中射隼髙墉張奕卒昭明太子與晉安王令曰近張新安故其人才筆𢎞雅亦足嗟惜張岱為吳郡太守齊髙帝賜手敕曰大郡任重乃未欲回換但總戎務殷冝須望實今用卿為護軍加給事中齊髙帝賜張融手詔曰見卿衣服粗故誠見素懷藍縷亦虧朝望今送一通故衣意謂舊乃勝新也恆州刺史張府君墓志銘張説君諱承休字某吳郡人也留侯與漢播美西京長沙徙吳蔽蔓東土曽祖沖在陳為文帝師入隋為漢王學士祖後胤授經太宗尊之以祭酒既封新野又贈以宗伯考少師位不充量止于朱陽宰班固稱世名忠孝魏武為積善之家昌門一系暉我諸族君受天戩穀傳家業藝希言敦行去華崇實非法不由非禮不動精于物理敏于政事竊以南郊齋郎補兖州兵曹丁太夫人憂廬墓三年加人一等再任闕州司倉應八科舉改鄭州録事參軍又舉賢良方正遷揚州司録參軍移蘇州常熟令歷政皆有能名加朝散大夫入為司農丞實掌錢穀出為原闕使覆囚嶺南是司獄訟聽折惟允乃授濟源令風行畿甸河澗洛師加朝議大夫上柱國拜隆州司馬轉恆州長史簡而有孚權而有中道嬰風憲去職就醫還京春秋六十有二終于領政里夫人成紀郡天水秦氏廬陵郡公行師之孫嗣公遊福之女敬事君子訓成諸孤當代之孟母也年六十二終于許州開元九年十月某日合葬于武功之禮讓原禮也夫道大難合仕屯而不進德髙有後身沒而福流君同生八人半服銀艾祚胤五子率為圭璋比迹于燉煌六龍南鄭千室德門濟美信有徵乎懼陵谷或遷乃勒銘沈石銘曰思文留侯時維皇祖長沙南守分韓東土家有道書門傳相府嵬峩重世通徑二主誕靈上哲克廣斯文造次仁義優遊典墳孝乎事親忠乎事君猗那叔父亦足有云蘇州志作崑山人昌門作閶門蓋其居閶門也張從師墓志張説撰文集無此文沖和純粹辨博宏達卓犖好古儻蕩逸羣忘懷樂道上元二年終葬虎丘西原子惟儉惟靜弟從申沈詢為昭義節度使侍兒與奴歸秦通詢將戮之奴懼結牙將為亂攻詢滅其家僚友著宴辭云莫打南來雁從他向北飛打時雙打取莫遣兩分飛范純仁以弟純粹在陜慮其于西夏有立功意與之書曰大輅與柴車爭逐明珠與瓦礫相觸君子與小人鬬力中國與外邦較勝負非惟不可勝兼亦不足勝不惟不足勝雖勝亦非也丁偃初試邇英延講藝詩白虎前芳掩金華舊事輕天心非不寤垂意在蒼生右吳中名人事迹或議論可採者雜録於此滕茂實自為哀詞虀鹽老書生謬列王都官索米了無補從事敢辭難殊憐復盟好仗節來間關城守久不下川途望漫漫憸輩果不惜一往何當還牧羊困蘇武假道拘張騫流離念窘束坐閲四序遷同來悉言歸我獨留塞垣形影自相弔國破家亦殘呼天曽不聞痛甚傷肺肝相逢有兄弟悼歎安得歡金人自南歸得志鞍馬間波瀾卷大夏一木乃求安世事寧有此聊發我所存爵祿非所慕金珠敢懷貪縱或違我心寧不汗我顔昔燕破齊王羣臣望風奔王蠋獨守節燕人有甘言縊首自絶脰感慨今昔聞未嘗食齊祿徒以世為氓况我祿數世一死何足論逺或死江海近或死朝昏斂我不須衣裹尸有黃幡題作宋臣墓篆字當深刋我妻尚少艾兒女皆童頑四海無置錐飄流倍悲酸誰當給衣食使不厄飢寒嵗時一酹我聊以慰我魂我魂自悠悠異鄉寄沈寃他時風雨夜草木號空山茂實靖康初金人深入假工部侍郎副路允迪出使河東割地太原陷允迪還至代州金人獨留茂實兄祹亦在敵尼雅滿聞其名將屈為用亦遷之代復從京師取其弟華實以慰其意嘗使諭易戎服又驅巾幘稍髙者數人殺之屢加逼脅茂實弗動顧莫能生還乃自為此詞以暴其志讀其詞者忠義之氣可以勃然而興矣張敷死顔延之以書弔其世父湛曰賢弟子少履貞規長懷理要清風素氣得之天然言面以來便申忘年之好雖離隔阻而情問無睽薄暮之人冀其方見慰説豈謂中年奄為長往聞問悼心且兼怛痛足下門教敦至兼實家寶一旦喪失何可為懷晉孝武即位詔曰司徒故左長史張敷貞心簡立幼樹風規居喪毁滅孝道淳至可追贈侍中改其所居為孝張里孟文龍辭元平章史弼等薦書文龍未死慚負神明羣公相國以忠孝文龍為羣公起將何以令今之事君者敢以死辭右皆有關至性者顧阿瑛自題其像云儒衣僧帽道人鞋天下青山骨可埋若説向時豪俠處五陵鞍馬洛陽街玉山風流人豪集中美不勝採復録其題像詩於此湘東王薦顧協表臣府兼記室參軍吳郡顧協行稱鄉閭學兼文武服膺道素雅量邃逺安貧守靜奉公抗直傍闕知己志不自營年方六十室無妻子臣欲言于官人申其屈滯協苦執貞退立志難奪可謂東南之遺寶也矣協卒武帝手詔曰大同八年顧協廉潔自居白首不衰久在省闥內外稱善奄然殞喪惻怛之懷不能己巳傍無近親彌足哀者大殮既畢即送其喪柩還鄉并營冢椁並皆資給悉使周辦可贈散騎常侍令便舉哀鄭思肖常贈人云天下皆變吾觀其不變惟其不變乃所以變其變者物也不變者道也又云古人重立身今人重養身立身者蓋超乎千古之上與天地周流于不知不識之天也養身者惜一粟以活微命役于萬物死于萬變者也何足道哉思肖自贊其像曰不忠可誅不孝可斬可懸此頭于洪洪荒荒之表以為不忠不孝之榜樣唐武后徵史德義詔制蘇州隱士史德義志尚虛玄素履真確沖謙彰于里閈孝友表于閨庭固辭徵辟長往嚴陵之瀨多謝簪裾髙蹈愚公之谷風操可知啓沃攸佇特宜優奬委以諌曹滕元發志侍其沔墓士生斯世有進取出力得時行道功烈被于民者有行義修潔退而講學為一鄉之善士者斯二者用舍不同要皆天下之強立君子也右皆卓行可以風世者公孫聖占詞公孫聖吳王夫差時人夫差興兵將與齊戰道出胥門假寐于姑蘇之臺夢入章明宫見兩䥶蒸而不炊兩黑犬嘷以南嘷以北兩鋘殖宫牆流水湯湯越其宫堂後房鼓震篋篋有鍛工前園橫生梧桐命太宰嚭占之嚭曰美哉王之伐齊也章者德鏘鏘也明者破敵聲聞昭明也兩䥶蒸而不炊者聖德氣有餘也兩黑犬嘷以南嘷以北者四海服朝諸侯也兩鋘殖宫牆者農功就成田夫耕也流水湯湯越宫堂者鄰國貢獻財有餘也後房篋篋鼓震有鍛工者宫女悅樂琴瑟和也前園橫生梧桐者樂府鼓聲也吳王大悅而心不已復召王孫駱問之駱曰臣鄙淺不能占東掖門亭長長城公弟公孫聖多見博觀知鬼神之情狀願王問之王乃召公孫聖聖伏地而泣其妻謂曰子何性鄙今王急召乃涕泣乎聖曰悲哉非子所知今日王午時加南方命屬上天不得逃亡非但自哀誠傷吳王吾受道十年隱身避害欲紹壽命不意急召中世自棄故悲與子相離耳遂詣姑蘇臺吳王告其夢聖曰臣不言聲名全言之必死于王前臣聞章者戰不勝走慞偟也明者去昭昭就冥冥也入門見䥶蒸而不炊者不得火食也兩黑犬嘷以南嘷以北者黑者隂也北者匿也兩鋘殖宫牆者越軍入吳伐宗廟掘社稷也流水湯湯越宫堂者宫室墟也後房鼓震篋篋者坐太息也前園橫生梧桐者梧桐心空不為用器但為盲僮與死人俱葬也願大王按兵修德遣下吏肉袒徒跣稽首謝于勾踐國可安存身可不死吳王怒曰吾天之所生神之所使顧力士石畨以鐡槌擊殺之右伎術王僧達禮致禇伯玉丘僧珍與僧達書聞禇先生出居貴館此子滅景雲栖不事王侯有年載矣自非折節好賢何以致之僧達答書禇先生從白雲遊舊矣冀其來比談芝桂借訪薜蘿若已窺煙液臨滄洲矣吳中流寓髙人韻士不能盡載偶附二書於此姚信上張白妻鬱生貞節表臣聞唐虞之政舉善而教旌德耀異三王所先是以忠臣烈士顯名國朝淑婦貞女表迹家閭蓋所以闡崇化業廣殖清化使茍有令性幽明俱著茍懷懿姿士女同榮故王蠋建寒松之節而齊王表其里義姑立殊絶之操而魯侯髙其門臣竊見故鬱林太守陸績女子鬱生少履貞特之行幼立匪石之節年始十三適同郡張白侍廟三月婦禮未卒白遭罹家禍遷死異郡鬱生抗聲昭節義形于色冠蓋交橫誓而不許奉白姊妹嶮巇之中蹈履水火志懷霜雪義心固于金石體信貫于神明送終以禮邦士慕則臣聞昭德以行顯行以爵茍非名爵則勸善不嚴故士之有誄魯人志其勇杞婦見書齊人哀其哭乞蒙聖朝斟酌前詞上開天聰下垂坤厚褒鬱生以義姑之號以厲兩髦之節則皇風穆暢士女改視矣許邁别妻孫氏書欲聞懸溜之響山鳥之鳴以為簫韶九成不能勝也寓景青蔥之下栖息巖岫之室以為殿堂廣厦不能過也情聽所鍾志絶于此吾其長别離矣孫答書愚下不才侍執巾櫛榮華福祿相與共之如何君子篤其大義輕見斥逐若以此處遐曠非婦人所便昔梁生陟嶺孟光是攜蕭史登臺秦女不舍衛人修義夫婦同行老萊逃名伉儷俱逝豈非古人嘉遁之舉許君行矣李氏女咏破錢詩半輪殘月掩塵埃依稀猶有開元字想得清光未滅破買盡人間不平事右録列女數條梅詢贈東禪寺林遇詩出入常攜一古藤三衣粗重貌稜稜紅塵酒滿何曽醉知是僧中第幾僧蓑衣真人何中立詩為問先生意若何不論寒夏只披簑若人會得蓑衣意一路相將入大羅其二白雲樓閣在煙霞萬里嵯峨是我家莫道太平無一事自然平地有丹砂其三水緑山青好去遊花紅酒醉幾時休轉頭不覺無常别萬古惟存一土丘其四寥寥香散緑沈風野地清間到處逢買得四忩今夜月這回認取主人翁其五夜來斗轉與星移日出扶桑又落西自有金丹光落落千人萬處有誰知其六滿眼紅雲花又新年年香散玉樓春時人笑我顚狂漢我更顚狂笑殺人又雜言詩一首不梳頭不澡浴免得堂前妻兒哭或吟詩或唱曲富貴滎華無所欲身貧道不貧六根常具足又五言絶句三首此寺何年造問僧僧不知下馬問香草拂塵看古詩活得三千歲仍饒八百年若教縫合眼别是一山川白雲山下去山下強人多強人難説話拍手笑呵呵吳中方外靈迹之著者稱宋蓑衣真人其詩多流傳人間附録于此王會之墓志銘王安石君諱逢字會之姓王氏太平州當塗人也嘗舉進士不中去以所學教授于是蘇州士人從轉運使乞君主其學學者嘗致數千百人君所奬養成就者多矣乃始以進士起家權南雄州軍事判官歸試得超等補袁州軍事判官留為國子監直講兼隴西郡王宅教授李某內行修謹君蓋有力焉岐國公主既嫁為君求遷有命矣君辭焉乃已君少以文學知名于書無所不觀而尤喜易作易傳十卷乾德指説一卷復書七卷名士大夫多善其書者于是樞密使張公舉君可試館職而宰相無知君者故不用通判徐州以疾不赴求監蘇州酒以嘉祐八年正月六日不起年五十九終太常博士君為人樂易篤于朋友故舊于勢利無所茍能愛人以得其歡心君皇祖考延嗣祖考皆不仕而皇考以君故贈大理評事前夫人蘇氏後夫人陳氏皆無子陳氏名家子亦有賢行以嘉祐八年四月二日葬君蘇州吳縣三玄鄉陸公原以前夫人蘇氏祔焉銘曰宜壽也五十而已宜貴也止于博士謂卒有後也而終無子嗚呼夫子命不可與謀其歸其永安于兹丘永嘉縣君陳氏墓志銘陳氏于蘇州為大姓夫人者太子中允諱武之子某官贈太常卿諱郁之孫左贊善大夫諱質之曽孫而太常博士王君諱逢之妻也昭明順善動有禮法以不及養姑舅也故于祭祀尤謹博士祿賜盡之宗族朋友不足則出衣服簪珥助之而不言選飾妾御進之不忌然博士終無子蓋吾聞于博士者如此撫博士之兄子如已子哭博士三年未嘗如陳氏除喪大貧顯者求以為妻族人強之不可又強之則涕泣自誓居頃感疾以死蓋吾聞于博士之兄子景元者如此然夫人之行非特出于二人之言凡習陳氏王氏者皆知其為賢而哀其志其封曰永嘉縣君其卒于蘇州以治平二年十一月九日年三十八其葬以三年十一月某日從博士于閶門之西原銘曰穀也從于此喪也隨以死歸義于命奚傷乎無子王博士逢暨配陳氏皆有賢行見荆公集中尚書兵部員外郎知制誥謝公行狀公諱絳字希深其先陳郡陽夏人以試祕書省校書郎起家中進士甲科守太常寺奉祀郎七選至尚書兵部員外郎以卒嘗知汝隂縣校理祕書直集賢院通判常州河南府為開封府三司度支判官與修真宗史知制誥判吏部流內鈐最後以請知鄧州遂葬于鄧年四十六其卒以寶元二年公以文章貴朝廷藏于家凡八十卷其制誥世所謂常楊元白不足多也而又有政事材遇事尤劇常若簡而有餘所至輒大興學舍莊懿明肅太后起二陵于河南不取一物于民而足皆公力也後河南聞公喪有出涕者諸生至今祠公像于學鄧州有僧某誘民男女數百人以昏夜聚為妖積六七年不發公至立殺其首弛其餘不問又欲破美陽堰廢職田復召信臣故渠以水與民而罷其嵗役以卒故不就于吏部所施置類此其在朝大事或諫小事或以言郭太后失位稱詩白華以諷爭者貶公又救之嘗上書論四民失業獻大寶針議昭武皇帝不宜配上帝請罷內作諸音巧因災異推天所以譴告之意言時政又論方士不宜入宫請追所賜詔又以為詔令不宜輕出數易請繇中書密院然後下其所常言甚衆不可悉數及知制誥自以為近臣上一有所不聞其責且預我愈慷慨欲以論諫為吾事故其葬也廬陵歐陽公銘其墓尤歎其不壽用不極其材云卒之日歐陽公入哭其堂椸無新衣出視其家庫無餘財蓋食者數十人三從孤弟姪皆在而治衣櫛才二婢平居寬然貌不自持至其敢言自守矯然壯者也謝氏本姓任自受氏至漢魏無顯者而盛于晉宋之間至公再世有名爵于朝而四人皆以材稱于世先人與公皆祥符八年進士而公子景初等以歷官行事來白願有述也將獻之太史謹撰次如右謹狀謝景回墓志銘君姓謝氏諱景回字師復以泰寧軍節度掌書記諱崇禮者為曽大父以太子賓客陳留公諱濤者為大父而兵部員外郎知制誥陽夏公諱絳者之少子也幼好學有大志聰明卓然不類童子年十九所為文辭已可傳載于是得疾不可治以嘉祐四年十二月丙子棄世于漢東人莫不為謝氏哀之諸兄以八年十月乙酉葬君鄧州穰縣五壟原之兆而臨川王某為銘曰攻乎其為良汰乎其為精吾見其質吾聞其聲如或毁之用不既于成哀以銘詩亦慰其兄户部尚書郁公墓志銘解縉永樂三年八月五日户部尚書郁公薨于位上遣官祭以文命工曹具櫬輟朝一日顧翰林學士臣縉等歎息稱其才嗚呼公之哀榮始終固可美國家所以待臣庶恩禮之厚尤足以激勸于當世公之子孫豈不永有庇賴歟于是其子彬衰麻踵門泣而致公之治命請銘其墓噫公與豫交二十年末嘗爾汝褻狎亦未嘗挾長殺敬禮豫二人者亦自信為誠實洪武二十二年豫侍講華蓋殿中公始受命為户部度支主事賜名新明年改户部司屬十二年升北平部郎中二十四年六月超授嘉議大夫户部右侍郎考滿上于庭中稱譽擢尚書授資善大夫十三年于兹矣非才而能之乎抑公之盛福其祖考以來積纍之慶非偶然而致也公家素饒財慷慨豪舉不為齷齪喜賓客樂于賑窮乏不為德色洪武中奏事庭中被顧問天下户口漕運地里險易計數時日應機響答無遺謬自謂劉晏以下不論也晚嵗多疾乃時在告上甚憐之公亦時自語豫吾覺衰老恐旦夕先朝露不能報國恩吾平生無卓異惟君知也幸與之銘其墓紀其榮遇而已嗚呼公非可謂達歟公蘇人也曽祖神和祖瑜父德字銘本公以至正丙戌正月十四日生于吳縣洪武元年祖父遷居鳯陽臨淮縣公隨而家焉公娶嚴氏綜理家政嚴而有緒子彬字孟文亦克孝敬公嘗屬之豫曰他日視之曰余故人之子即吾子之榮也公墓在臨淮古城之原銘曰古大司徒職惇典禮馴擾兆民豈惟會計惟公奮身非以豈弟恂恂其容爵祿之器厯官有年光榮後先豈曰有才有得于天豈無人謀不如盛福崇崇其阡臨淮之麓尚書郁公神道碑銘國朝復先王之典禮所以付任才能用掌舊典裁成輔相以全天下之士保其初終恩兼新故大小之臣咸稱職業班班有可稱道者豈惟天祐國家而賜之以多賢亦國家深仁厚澤有以積纍克稱天心也嗚呼豈不盛哉乃洪武戊辰嵗子以年少擢進士為中書舍人直翰林日侍講華蓋殿中時時引選官居上前講官不避即顧問可否輒以直對一日見鳳陽郁公于儕衆中姿貌瓌偉音吐宏暢威儀整齊竊心異之上果賜名新即命户部度支主事度支掌內幣賜豫內直所與文淵閣相通時相見與之議論練達經歷久相善也未幾公升北平部郎中先是户部其屬有四是嵗分為十二故有是命進階奉議大夫二十四年超授嘉議大夫户部右侍郎每奏事庭中玉音顧問天下地里隂陽户口漕運之數民間利害無巨細皆響應無所遺謬在廷之臣莫不以難而讓然每事咨度其屬能者未嘗以精敏自多名位自髙人又莫不以為難及考滿晉升尚書益寬大得體不為瑣屑授資善大夫喪母歸葬賓客至者數郡蓋公平生慷慨急于義饒財而好施尊禮儒生雅志喜交遊不為冷熱變親戚有急患難不避治家有法綜理微密而不傷于繁雖國家能成人才如公之才亦可謂難能者也今永樂三年八月五日公卒于官上賜棺殮祭之為素服輟朝一日士大夫盛以為榮公本蘇州吳縣人曽祖神和祖瑜父德字銘本母某氏祖父以洪武初遷鳯陽公隨而家焉公妻嚴氏尤善理家公于家事不以為言而井然有條無不舉公生至正丙戌正月十四日年六十子彬字孟文將奉公之柩歸葬于鳯陽臨淮公嘗託豫銘其墓而神道之碑亦不可無刻也乃敘而係之詩曰泰運肇開賢彚生巨細咸植勳業成有奮布衣位六卿寬裕強敏豈惟承有善不伐貴不盈人道不惡天所矜有崇斯阡其永寧吳山書院記吏部侍郎兼左春坊左贊善許思溫吳郡人也少時躬稼奉親讀書吳山出登太學為御史歷職憲副遂擢今官于豫有同寅之好乃請為文記其吳山書舍豫平生足迹半天下恨不得一至吳中靈巖虎丘天平之雄峙湖海江潮之竒浸四方人物之都會每讀昔人之文未嘗不為之慨然太息也且夫世人之于讀書也髙談道學猶以為喪志近務事功者棄以為無用於戲是豈嘗知讀書之理也哉自怠而厭其勤苦者託辭以飾非自昧而不達乎義理者謗言以護短故例以儒生為迂濶而以文籍為陳言耳究其心亦未嘗不知之也故有因其心而直曉之有不赧然而愧者蓋鮮矣是故文字之作聖人開天闢地之機行乎隂陽而通乎造化萬彚之總鬼神不能違者也而豈出乎此理之外哉而豈可指而謂之喪志而無用也哉六經聖人之書也諸史歷代之書也諸子百家凡能言者之書也下至商賈技術莫不有書擇其善者而行未有不善也自天文律厯地里農田水利風俗人材學校選舉鹽鐵細務皆有書皆所以集事成功者也自昧而不通者而可謗之哉六經所以治心修身治國平天下而為道學之本也自怠而厭其勤者而可假喪志之言以飾其非歟喪志之云為不精專者發耳不專志而務夸多鬭靡以為人也則又反不讀書之為愈此有激而云者而豈可謂書之不必讀也哉豫觀生民以來未有不知書之聖人者豫嘗以為流俗歎也許公之意與豫合故仕既顯矣請為之記其書舍以為子孫後世勸將使之有興起于讀書也為之記而係以詩天開象緯日與星地靈川嶽萬彚形羲書一畫河洛呈萬世照耀傳六經賢傳羽翼衆喙鳴博通貫一量重輕譬猶作室矩度程羣材咸萃無竒贏曲可使直陂可平指顧左右集大成吳山屹立太古青書舍臨髙疏牖櫺紫雲紅霧棲前楹萬家玉樹森在庭牙籖歷歷黃金縢萬軸插架明星熒斗牛午夜虹光頳天官早嵗曽躬耕養志餘力篝火燈布幃黝黑積暈沈秋囊或貯山下螢有草如帶似堯蓂隱德自足通山靈時來九萬隨風鵬橋門璧水揚華英鐡冠弭筆朝承明繡衣持斧白玉京從龍天飛掌銓衡春官侍從鴛鸞停乃知讀書助修能萬事轉圜無滯凝他年有待懸車榮錦袍山下濯冠纓買舟相送試一登吳中俊彥來相迎歡呼共覩名公卿鄉人子弟傳頌聲重作吳山書舍銘南宫生傳髙啓南宫生吳人偉軀幹博涉書傅少任俠喜擊劔走馬尤善彈指飛鳥下之家素厚藏生周養賓客及與少年飲博遨戲盡喪其資逮壯見天下亂思自樹功業乃謝酒徒去學兵得風后握竒陳法將北走中原縱豪傑計事會道梗周流無所合遂遡大江逰金陵入金華會稽諸山搜覽瓌怪渡浙江泛具區而歸家居以氣節聞衣冠慕之爭往迎候門止車日數十兩生亦善交無貴賤皆傾身與相接有二軍將恃武橫甚數毆辱士類號虎冠其一嘗召生飲或曰彼酗不可近也生笑曰彼粗人惡能勇吾即柔之矣即駕往坐上座為語古賢將事其人竦聽引尊下拜起為夀罷會無失儀其一嘗遇生客次顧生不下已目懾生而起他日見生獨騎出從健兒帶刀䇿馬踵生後若將肆暴者生故緩轡當中道進不少避知生非懦儒遂引去不敢突冒訶辟明旦介客詣生謝請結歡生能以氣服人類如此性抗直能辨好針切友過有忤已則面數之無留怨與人論議蘄必勝然援事析理衆中莫能折時藩府數用師生私䇿其雋蹶多中有言生于府府欲致生幕下不能得將中生法生以智免家已貧然喜事故在有饋酒肉立召客與飲啖相樂四方遊士至吳察其賢必與周旋欵曲延譽上下所知有喪疾不能葬療者以告生輒令削櫝疏所乏為請諸公間營具之終飲其德不言故人皆多生謂似婁君卿原巨先而賢過之久之稍厭事將迎闔門闢一室庋歷代法書周彛漢研唐雷氏琴日遊其間以自娛素工草𨽻逼鍾王患求者衆遂自閟希復執筆歆慕靜退時賦詩見志泊然處約若將終身生姓宋名克字仲溫家南宫里故自號云贊曰生之行凡三變每變而益善尚俠末矣欲奮于兵固壯然非士所先晚乃刮磨豪習隱默自將履藏器之節非有得能之乎與夫不自知反違逺道德者異矣右借南宫自書方册上抄之己未七月十日送張同知之官嘉定序鄭元祐吳為澤國獨吳縣為有山山崒起以環具區蹴煙浪多至七十二峯初子胥未入城吳猶宫于靈巖更今二千年故宫陳迹尚多存者登臨探討感念今昔未嘗不令人惻愴興懷也縣令張君德常係金壇文獻故家早以才器知名江表奉其尊嚴避地來吳未幾徒步起家為縣丞遭鄰境失守民心恟恟不安君雖丞其所以撫息之者逾于尹聲聞日章遄升縣尹使為尹承平時猶斤斤不易况軍旅殘破之後乎德常之尊已老白首移孝以為政于一邑其惠及于民者真所謂息黥而補劓生死而骨肉無愧于古之人于是民氣稍稍復完今兹五閲寒暑政譽洋溢用年勞升授嘉定州同知夫既尹大縣民戴恩德自宜守一州然猶任州佐于海隅者千尋之木棟梁之具昭然匠石養之而未之顧者期望者大也早晚施之用且將柱明堂建清廟凝然荷萬鈞而無少危臬危瓦矣吳人分題賦詩以送之而屬某為之敘沈祖母王碩人壽九秩序子于父母其屬近其情昵其恩至故彼此之分顯易以敷施而人情之所以感發而歎咏者亦曰父兮生我母兮鞠我又曰陟彼岵屺瞻望父母與夫堂構災穫又皆屬于父子至謂生之膝下以養父母日嚴凡此聖人皆系乎父母之于子而祖孫不與焉若孫之于祖情非不昵也恩非不至也聖人設教忠厚之至豈不欲引而近之然其等威隆殺自有不得而同者原夫尊親不以逺而可疏也不以近而可褻也故曰尊祖曰敬宗曰睦族職是之故孫之于祖其養當益厚禮當益嚴情當益致然自書傳之所紀載孫及養其祖者蓋甚寡由是李令伯遂著名于不朽也吳人沈君仲説自其先府君不祿于今若干稔矣顧其祖母王碩人綜理家事鞠育仲説以迄于成人今仲説年四十餘不惟讀書積學度越流輩至于履踐之素言行之實無一不求合古人欲所以奉其祖母者食飲溫凊起居定省略弗異乎孝子之事慈母也今年至正庚寅碩人夀登九秩九月草九實其生辰仲説具酒張筵為碩人夀凡親舊里鄰畢至清樾堂先是夏天子賜髙年帛碩人以九十頒雙縑仲説用製衣碩人碩人雖屆期頥而神觀澄徹覩其孫之婦復令曽孫拜于前而親舊里鄰無不拜相次進酒為夀以為世所罕得同郡錢伯行天台陳敬初輩咸奉書以慶而豫後至俾序篇端夫人所以事親者豈不欲致養然未必能享上夀使誠有之又未必如仲説養志不衰也然則天將報仲説者有子有孫皆將如仲説碩人雖老行且見之沈氏其昌大矣乎詩曰孝孫有慶此之謂也右雜文數篇皆取有關風化可敬慕者不復詮次云吳都文粹續集補遺卷上
