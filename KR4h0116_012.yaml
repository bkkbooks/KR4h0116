body:
  text: 吳都文粹續集卷十二明錢穀撰古迹壇廟毛公壇范成大松蘿滴翠白晝隂七十二峯中最深緑毛仙翁巳仙去惟有石壇留竹塢竹隂掃壇石槎牙漢時風雨生蘚花山中笙鶴尚遺響湖外人煙驚歲華道人眸子照秋色要我分山築丹室驅丁役甲莫見嬉渴欲飲泉飢餌术同前張羽方壇蔭竒竹儼彼毛骨秀想見黃眉翁時來濯水澑一往不可得尚問何日又同前高啓欲觀漢壇符東上縹眇峯葛花墜寒露夕飲清心胸月出太湖水鶴鳴空澗松真境久寂寥蒼苔閟靈蹤嘗聞緑毛叟變化猶神龍世人豈得見偶許樵夫逢攀險力易疲探玄志難從歸出白雲外空聞仙觀鐘同前周南老朝遊金庭館解駕毛公壇八景飛高清仰浮紫宸端碧雞耀四靈玉井騰神丹漢符祕真迹宛宛雲龍蟠我來觀妙象月落空壇寒安得呼我起白日生羽翰同前王賔許多靈迹在山頭市上人來只暫遊古樹生衣毛似緑枝柯經度不經秋將遊毛公壇雨不克往王鏊毛公已去有仙壇眼見亭臺欲到難翠壑蒼崖增惝恍玉芝瑶草長闌干洞無金鑰誰能闖井有丹砂尚可餐傳語仙翁莫終棄當時雞犬從劉安毛公壇王寵石門有遺營澗道時屢揭山逈谷籟長地逈琳宫祕近峯鬱交青遙岑蕩虛翠丹井周前除虛堂儼昔位毛公颯羽翼白日翔鸞轡自非山水靈胡為異人至石髓不盈握圖經滅餘字樵人引蔓行鹿子銜花戲蜉蝣不崇朝浮生莽如寄荷蓧斸黃精終以丘園賁謁毛公壇雨不果徐禎卿三宿無緣拜真宰修誠中夜枉齋餐豐泥巳愧妨長屐細雨虛煩淨小壇玉篆定埋雲蘚古劉根有鎮壇符金丹誰鑿井淤乾有丹井今巳涸幽探却負山中勝夢繞空庭檜影寒毛公壇薑龍劉根成道處岩谷氣猶豪曠世留遺躅何時更伐毛春風吹草緑夜月倚壇高苦行有真樂浮生無乃勞同前陳都官古壇疊亂石草木何參差黃衣宇其旁陳迹刋豐碑日初劉真人齒髮不可訾但見組緑毛被體鬖鬖垂雲駕一日去空山留庭壝弟子散岩谷荆榛蔽荒基晚有周息元探訪親斬披白鹿忽跪前靈符見葳蕤地勝人既靈凝嚴起宫祠束帛下幽聘良馬維素絲前朝揖高風有美皮陸詩殆今三百年事去物亦隳喬松委樵蘇野蔓號狐狸惟有煉丹井甘冽無等夷一酌非消渴欽慕尚神禧同前謝晉劉根學道建仙壇清夜朝真風露寒劉根得道登仙籍壇上莓苔日應積知向深山歲月多身生緑毛如短蓑往來樵子或相遇倐爾趨隱岩之阿一朝功滿升仙去羽蓋朱輪曽此駐猶遺漢篆鎮壇符千古相傳為福地毛公壇在西山最深處仙翁劉根身生緑毛故名有小庵在隱泉之上烏夜村髙啓荒村烏夜棲忽繞月明啼生得東家女身為萬乘妻至今種高樹不遣烏飛去居人凡幾家愛聽啼啞啞啼啞啞忽驚怪婦開門向烏拜同前周南老崑玉山南村祥光燭坤倪夜白奪明月羣烏忽驚棲啞啞啼徹旦異此聲太竒村東何家婦夜半生王姬焉知荆布女后服榮翟褘至今村上民不重生男兒同前王賔啞啞月下有時鳴不似當初夜裏驚身賤誰圖生貴女但求寬減得安耕烏夜村在崑山縣晉穆帝時何皇后父準寓此産后之夕有羣烏鳴於村落自後有烏徹夜鳴必有大赦交讓瀆緑楊芳草一泓泉見説多年棄道邊除是平分與風月恰如虞芮有間田交讓瀆在干將坊楊備詩琴丁結交事耕耘似指琴髙丁法海續圖經則指張融陸慧曉今又有交讓巷越公井髙文度甃缺傳歌角巳刓瓶羸鮒射不生瀾曽聞大慧無生法甘露瓶中滴滴寒同前王賔當初開出水泉新日飲長兵百萬人從為僧家消歇後石闌髙處盡泥塵越公井在治平寺前小岡上唐廣明元年修井記云隋開皇十年越國公楊素築城穿此井其徑一丈有竒石闌如屏繞上有刻字丹井銘宋濓海虞有虞山梁天監初漢天師十二代孫張道裕來隱其下建真之治鑿丹井焉宋淳熙中道士李正則浚井得藏丹石䃭啓之化為雙紅鴿飛入尚湖至今湖中丹光煜煜然邇年井且廢莫知其所周尊師玄真窮日力尋獲之重加以甓構亭覆其上時皇明洪武元年也然仙家煉丹必以井故名山多有之其今在海虞者舊廢而新治豈玄學興之徵歟銘曰太隂委精自天一融而為液養萬物神丹煜煜赤如日有夫玄巾發我室雙禽衝霞飛翐翐靈泉甘逾蜜飲焉夀與天地畢登昭明書臺因訪丹井沈周逺秀目巳周復騁登高足青山不嫌人所取隨我欲巍巍古仙臺寂寂奠林麓七檜交雲霞靈飈散清馥崇臺轉磴道扳緣把傍竹同行玉堂彥高咏應虛谷逍遙東山風能去歌管俗中紙驚連張謬圖附一軸聊以志傾賞流傳亦何卜或恐聞邦人有酒悔無逐丹井亭華清留侯孫子燒丹處野老來尋坐落暉大藥已隨神物化寒泉猶在昔人非樓臺抱影湖光動竹樹交隂暑氣微欲借清泠洗塵渴清風吹滿芰荷衣重修山川壇記浦應祥祀事國之重典也禮天子祭天地諸侯祭山川卿大夫祭五祀士庶人祭先祖名分各有攸係而其齋祓對越之誠敷逹精明之德蓋不以大小而有異也然則祀事豈可忽乎哉吾蘇古名郡而封內山川𨽻在吳邑𢎞治辛酉春郡伯曹公將有事於兹而邑宰任邱鄺侯先事而往隨事整飭之餘復瞻顧揣度曰有事則為欵謁之地過事則為草莽之區非所以敬鬼神崇國典亦非所以為國經逺之圖也爰請命於公而增葺之公是其請用是量土地計徒庸開闢方隅補益坎陷礱石而為壇壝甃石而為周垣幽深闃邃廣衍嚴潔齋宿有居庖翟有處高其門域固其扃鑰丹堊輝映品秩森鬱望之而知重祀之所在也工畢合邑之士與夫知禮之氓咸曰侯之功施於位者溥矣然不能悉書而備録之也此而不記將何以昭侯之休嘉於永久哉胥命豫文之以録於石豫鄰侯之治辱侯之愛知侯之為人侯以名進士出知是邑抱明敏便捷之才濟閎肆辨博之學而施之以寬嚴威惠之政六職克舉而發摘姦伏有若鑑燭誠所謂赫赫師尹也其於民隱凋瘵則又深於究理所謂豈弟君子侯實兼焉今六年於兹矣監司知侯之賢上疏而旌别其異能者凡三而侯益勤於政蓋其勵志堅操邁名而顧行者觀其所為有足徵矣更於其平日政事之餘掉鞅藝場遊興詞林殆所謂有乎內而能飾乎外非焚梓毁璞者比也侯超擢有日此略記其名行之概俟其他日負荷重任則其豐功偉績當有秉筆者為之傳焉淳祐重闢社壇記李心傳自昔有邦家者其祀事莫尊於社稷以尚書周禮中庸參考之社之祀率與郊並蓋郊之祭則天也上帝也社之祀則地也后土也天以氣言則一而巳故惟天子則祭之地以形言則提封有廣狹之異故自皇朝列國下逮卿大夫州邑都鄙之間各有祀焉蓋祈報之行於是乎在也後世此義不明而社稷列乎宗廟之下則失之矣今之縣古子男之國也國家欽崇典祀雖循漢唐之舊而社稷壇壝特嚴其制部刺史巡厯所至必謹祀之重民事也平江在東南為大府其所治長洲在浙中為壯縣而長民之吏揭虔者罕春秋二祀有壇無宇榛莽弗治神靡顧歆水旱螟蟲無歲不有而養民餉軍之大計莫知所出矣淳祐元年春趙君汝昌以選來為令濮邸近屬安化王曾也學古入官三試禮部西山真文忠公與羣彥交舉之以是通籍始至按視惕然靡寧載經載營猶未定也會邑之姦民有以資力詒害於私者刑獄使者陳公稔知其惡因其自致按法論罪移之他邦邑父老乃請趙君庚其常售之屋廬為齋居望祀之所趙君以白陳公公許之夏五月巳亥興工冞月而畢壇壝增崇垣墉畢備費出於有司而民不與雨暘以時歲則大熟趙君因心傳之客東陽蔣持志以記文為請且曰害治者既去而訓民事神又得其所是陳公之賜也不可以不書陳公侯官人古靈先生之從曾孫文學政事咸世其家紹定中嘗以尚書郎持斧江右克清羣冦具有芳烈分閫盜城威惠並著江波不驚嘉熙中年適浙右有弄兵之驚上遴選廷臣復被繡斧之命公奏用龔遂之䇿曾未旬月荷耰鋤者皆散歸南畝畿甸以寧公所建立如此則縛一姦民特公之細事顧吳人謂公清明正直彰善疸惡無小無大必行其志多以是稱公者故亦不得而略也公諱塏字子爽今以祕閣修撰為沿海制置使朝廷思其賢將召矣慶元二年冬十月既望朝奉郎新除寶章閣待制提舉江州太平興國宫李心傳記長洲縣社壇記孫應時古之制祀以社次郊郊尊而社親尊故天子専之親故逹於庶人非土不國非榖不食故有社斯有稷勾龍於土棄於穀厥有大造開濟萬世故以為配春秋祈報之外救災出火師田行役獻功戮罪君臣上下日相與聽命於社禮樂刑政於是焉出故曰明乎其義治國其如示諸掌乎世衰王制壞古義隱妖妄百出而祠廟蝟興褻天蠧民幻為妖威日盛月滋上之人不以禁又從臾之天下郡縣雖通祀社稷世守不廢以為三代之舊章然獨其制度之形似儀物之文具而巳有司者一歲再祀民不與觀也民於社日或各從其俚俗鼓舞迎享醉飽相樂不知其何人且何禮也水旱禳祈奔走如織於社稷闕如也嗚呼知古者得無歎息於斯乎今令甲守令下車必視社稷飭壇墠而遵用或寡且諉曰小祀祀亦不親其事至若倚郭之縣自為社於闤闠逼仄之門往往滅裂最甚長洲縣之社在吳郡城內當縣治西南四十九步荒毁有年慶元四年九月知縣事天台黃侯宜一治新之壇宇中度門垣靚深途巷蠲潔身率寮吏時祀必謹黃侯儒者為縣如古循吏多善政可誦此其細事若不待書雖然愛禮者存羊因今之制存古之意君子重之縣實小侯承天子之命司社與民固未有忽略社稷而能父母其民者也然則凡黃侯之善政乃自社稷壇始豫是以記之因詔來者知所繼焉六年八月會稽孫應時記社稷壇在宋有之今皆統祭於府崑山縣社稷壇記項公澤邑有社稷壇春祈秋報重農事也崑山壇壝莽為荒墟雞犬放焉遇歲事則望拜於鄉校大成殿之戟門豈惟祀非其所神弗克歆抑且背先聖先師焉前政嘗有意修復惑於隂陽拘忌之説而未果豫竊謂為宰者膺人民社稷之寄平土播穀神實司之民實賴之詎容不知報本之為急務乎乃即舊址而經營之砌築四壝創造齋室周以垣墉植以松柏幣有瘞所門有扄鐍其神位列於齋室其祭器寄於邑庠至期取用焉典祀於是乎嚴矣惟兹調邑營繕孔艱屢政撫視今乃肇成繼自今其以時整葺母或因循與宗祏相為無疆故書以示來者淳祐壬子中和節永嘉項公澤記社稷壇在縣治西南三里至正七年費復初建洪武二年知縣呼文瞻重修常熟縣社稷壇記陶任古有民人焉有社稷焉民為貴社稷次之臨民所重莫先於社稷也常熟為邑亦古子男之國所寄以奉社稷之祀皆頽垣敗屋壇壝隳圯任古至官之初會春祀莫遑展爼豆之事以薦此誠念無以報神休答隂貺越歲鳩工而治之不謀於公帑不假之民力取其有罪眚而不麗於法者命贖之壯者獻其力富者助其資始於今年之孟秋報成於冬初壇壝垣屋為之一新雖無華麗亦使邑人知社壇之重察邑官之所存焉紹興甲戌冬十月記重修社稷壇記黃應酉開禧三年春霅川葉侯凱奉辟命來宰常熟始至有事於社稷顧壇壝隳圯屋宇荒蕪慨然思葺之方繕學舍不果又明年始克成事舊址築土為壇旁土皆甓雪霜風雨之餘易以動拔寸竹之椽若將壓焉於是更甓以石易竹以木垣分中外低者高之墁者飾之靡罅弗補靡隙弗周紀始於嘉定二年秋八月告成於冬十月既落屬應酉為記應酉何人哉弗敢謝不能君子謂是舉也有可書者三方其始至講明農祀不忘本也及其欲修首其鄉校不先神也迄於巳成費捐公贏不及民也春秋一善必書兹舉而三善備焉得不書十月乙卯迪功郎平江府常熟縣縣尉巡捉私茶鹽礬兼催綱黃應酉記重修社稷壇記王遂端平更化之歲山隂王君爚來宰常熟始至召邑之故老而問政焉曰久矣此邦之不獲乎上下也故老則曰前宰孫應時後皆有以自取也君愀然作色曰是吾邑化未更始也乃新學宫飾教令謂子遊邑人也别為宇為像祀之收言氏諸孫於農圃而教焉招四方之名士邑之秀子弟而學焉士風以變民聽以聳而以為猶未也昔泰伯之有國於此也禮遜之俗推重天下今渡江百年授田無法制賦無藝民無常産則無常心宜也乃通邑而經界之以昌吾邑而猶以為未也有田必有役而役莫便於義合公私高下為之十餘年不止仁聲義氣充塞一同大綱小紀具在方册比及三年教化興而賦役簡士歌於學民舞於途今日之事有大於是者乎設壇以祀社稷而風雷雨附焉皆本於朱文公鄂州社稷記伻來以圖請於郡太守曰豫至之三日檢視壇壝之不如法者命有司循飾畢具又去淫巫之幻以惑衆者期年之間人用安業歲以大熟余非不樂此而不為也祀典之不恭而佛老是徇民義之不務而巫覡是虔余甚不便於此乃掃地而更新之以暮春庀具季夏乃畢將以八月中辛集吏行事俾民與觀焉子其志之遂雖以不文為辭然心許之會聖上不以為不治易郡甬東還家未幾則令巳被命升轄而進諸朝徵豫文益力豫惟文公所記一本政和新儀而類禮有書始自通典終於嘉定新禮往往詳於祼獻陟降而略於壇壝而向有所謂社東稷西風雨少却皆北向者有所謂同壇而共牲者於圖疑未合而未有以證也抑聞之禮曰郊社所以祀上帝也又曰社者所以神地之道也意者古先聖王郊所以祀天人君用之社所以祭地諸侯用之惟天子為能祀郊故得望祭百神若諸侯則止於社稷故勾龍棄以功配風雷雨師以其隂陽晦明及百物者因類而致之上不敢擬於大社王社之制下不以羣姓立社齒其尊罍有數牲幣有式至於車服之微因其尊卑大小咸有科級報本反始禮之至也而别嫌明微於禮之中又有禮焉誠能積精致感於肸蠁之間則於天乎不僭何憂乎釋老盡心竭力於襏襫之務則於神乎無諂何憂乎巫覡自是以往風俗成而氣習厚有以他道惑民者鮮矣子曰明乎郊社之禮禘嘗之義治國其如示諸掌乎令之為此庶乎其善治國矣故特書之以示更化善治之本恤民祀神之務而於祀典禮經因有考云煥章待制知平江府王遂記社稷壇在北門外舊在縣西一里洪武三年移置嘉定縣社稷壇記趙浩昔在顓帝祀共工氏子柱為社稷虞夏因之而不易湯以時旱乃遷柱以棄代之三代以降祀典損益不同皇元奄有天下詔京師郡縣建立社稷在都春秋二祀以大臣行事臨期取旨郡縣致祭則有常典延祐丙辰朝列大夫太原任侯立來守是州先是州以縣升地瀕江海事多闕略舊有社稷在州治西南傍接民居尤為簡陋會壇災惟壇樹不焦若有鬼神相之者於是更治之輦糞壤除煨燼衆庶子來踊躍就工甫三月而壇壝成社居東稷居西築壇四面為門而依方色塗之西為雷雨壇各一繞以周垣截然砥平植以嘉木範為尊罍斫木為俎豆作始於延祐五月落成於秋八月適丁上戊侯偕寮屬齋莊朝服升壇成禮神人協和霧雨澄霽風雲熙然來享來格觀者若堵父老乃相謂曰賢太守敬以事神愛以養民勤勞兹邑得無記之乎衆乃屬浩為之記國子高等生從仕郎平江路嘉定州判官趙浩記重修社稷壇記薛元德有元混一區宇修禮教報本風俗淳厚治定功成自厯代以來混一之盛未有盛於今日者也世祖皇帝即位之初詔天下郡縣祀三皇與先師孔子及社稷焉非惟昭國家盛典亦欲使民歸禮教知報本開萬世太平之基猗歟休哉嘉定州𨽻吳郡三皇孔子皆廟學社稷舊有壇在州治南前太守王侯遷於西南延祐丙辰歲太守任侯立以簡陋不稱增廣而一新之逮今三十餘載厯歲既久風雨震沒壇壝臺門垣牆俱崩摧頽敗榛莽荒穢至正八年夏燕山孫侯伯元來牧是州一日登壇顧瞻矍然興歎曰吾聞聖賢言有民人焉有社稷焉今如是何以仰副國朝崇祀勸民之盛意也遂捐巳俸倡率州民衆皆恱從奔走聽役若歸於市乃除榛莽闢道路修社稷壇洎風雷壇新四方門重築垣牆周圍二百五十餘丈下甃以磚石上覆以陶瓦視昔治工十倍加壇之北舊有屋三間供具祭饌之所勢將傾壓葺而新之又於東西增廣屋二間侯日躬詣董其役冒隆暑亦不倦役興於至正九年七月落成於八月不二月而功告成適值秋祀侯帥寮佐行事是日也積雨初霽午夜清明長空無塵星月呈潔乃肅朝服正笏設庭燎陳禮幣具犧牲奏以雅樂酌以醴齊神其來格觀者環堵三獻禮成咸興贊頌父老相攜子弟以謝復曰不擬今日復覩國朝之盛典使民知有社稷重報本如是也侯曰未也吾將興學校以禮教民父老咸喜再謝而退以元德一州範模力請紀其事辭之不可勉為記曰嗟夫孔子作春秋為萬世勸懲邦君為國大小之事皆書之今之牧守州郡者出一言行一事四民所視為則者也他日載於郡乘書於國史可不謹乎今侯能修社稷使民知勸以報本又欲興學校而教以禮為政之效必見於三年有成是時當代名筆又當為之大書不一書也至正九年八月薛元德記社稷壇在北門外宋嘉定中建元大德八年知州任立重建舊在縣西洪武初移置重修至德廟記潘凱淳祐壬子春凱奉聖天子命來司臬於吳詰暴審刑罔敢怠弛既又懼民之不見德也領事三閲月載以禮欵泰伯祠顧瞻徘徊屋老苔荒喟然歎曰至德者百世祀吏奉弗虔何以存古巳而趨兩廡下土妖木魅詭形罔象簉以淫厲汙以佞慝編氓茍禍福膜拜乞靈滋磨劒好勇之習仍斷髮文身之訛端委雍容之氣象孰識之俗不美刑不清良有以夫退愓然不寧亟戒其屬曰崇明祀禮也黜非鬼義也某日度材某日鳩工某日撤祀之非類者乃攻乃葺乃像仲雍季札侑泰伯祀越月告成率僚吏三獻焉烏乎世澆俗衰馬蠶貓虎之靈往往嚴事之嵬瑣姦回尸而祝者肩相摩也豈復知禮樂鬼神之奧哉泰伯之血食此祠尚矣特以盛德至善民弗能忘堂皇之修不修厖雜之屏不屏於至德乎何損乃若辨禮息刑宣尚德化正人心而興民風者吏獨不任責乎昔唐狄公持節江南毁淫祠千七百所留夏禹泰伯李札伍員四祠凱視狄公無能為役而是廟適在典領抑邪扶正義不得辭廟舊在閶門外錢氏徙今址故有祊田十八畝今益五十九畝有竒粟入五十有五石飯浮屠以守儲其贏以為修祠備俾勿壞並敘其系自古公至友為世三十三刻之石稔來者考焉某年日南至承議郎直寶章閣兩浙西路提點刑獄公事潘凱記重修泰伯廟記周忱宣德五年秋七月禮部郎中豫章况鍾伯律奉璽書擢守於蘇州視事之日吏以囚牘進見民之繫於獄者凡千餘人尚爭務勝交相訐訟有經十餘歲而未決者伯律姑置弗問曰明日率郡之父老祗謁於吳泰伯廟見其堂宇傾仆垣墉頽圯吏民奉祀弗虔乃喟然歎曰民不見德宜乎刑之不清也是非郡守之先務乎即日命工度材撤其舊而新之曰堂曰室曰門曰廡為屋凡四十楹繚以周垣堅以甓甃不十日而告成復率父老潔牲醪祗祀於廟居人過客瞻望咨嗟於是獄之繫囚交相愧悔曰泰伯以天下讓民無得稱焉吾輩所爭僅錐刀之末耳何重貽郡侯之羞乎皆相與俯伏庭下自服其辜不數日而獄以空虛告豫時奉命巡撫於江南列郡至蘇州祗謁祠下父老以其事告且曰昔者狄梁公以冬官侍郎為江南巡撫使毁吳楚淫祠千七百所而此廟則在所留而不毁者去今千有餘年得吾郡侯葺而新之巡撫使之來又適當其時吳民觀感興起自今其無復爭競之風乎豫乃登進其父老而告之曰方泰伯之奔吳也斷髮文身示不可立然荆蠻義之從而歸之千餘家遂端委以臨其民是欲辭富貴而富貴隨之及其後世夫差狃於必勝窮兵黷武破越困齊欲伯中土卒之亡國身戮妻子為虜是欲求富強而失其富強矣然則吳地數千年之富庶由泰伯之三讓有以致之也其鬬訟之成風者亦由夫差之好勝有以啓之也爾民欲為泰伯之讓乎欲效夫差之爭乎一則廟食萬世一則貽譏千載其得與失必有能辨之者孔子曰能以禮讓為國乎何有此豫與太守期望於吾民之意父老曰善請以是為記遂書於麗牲之石使四方之來謁者咸有所觀感而興起焉豈獨蘇州之民而巳哉是歲十一月望日嘉議大夫行在工部右侍郎廬陵周忱記重新至德廟記陳音自泰伯逃於吳民戴其德以有國傳二十餘世而越始入吳吳人懷泰伯之德不忍其竟弗祀也東漢吳郡太守糜豹肇建至德廟於閶門外以慰民望厯六朝至隋而唐狄梁公巡撫江南盡毁諸淫祠而此廟特存五代時錢武肅王徙廟於城中有宋諸名公吏於吳者凡有禱輒應焉國朝宣德間郡守况鍾伯律因舊廟新之凡為屋四十楹閲歲久復敝頃監察御史張淮邦鎮奉朝命按吳祗謁廟下病其敝且隘也命有司撤而新之堂廡門垣之制雖仍乎舊而高敞宏廓則視昔大有加矣於戲天生民有欲易爭爭在利與名耳利莫大於有天下泰伯以天下讓不欲自有其名此其所以為至德而孔子稱之後世雖微利輒爭爭輒自以為是而加不美之名於人小者鬬訟以犯於有司大者興兵戈以糜爛其民是真太伯之罪人哉泰伯之後夀夢欲傳位季札亦猶太王欲立季厯之意也諸樊餘祭夷昧不能如泰伯仲雍之讓吳於是乎不競闔閭夫差復好大喜爭竟召甬東之辱以底於亡嗚呼始以讓而興終以爭而亡民之鑒於是者尚宜慎所趨哉夫民之取舍繫乎上上好廉則墨者息上好直則佞者阻上好讓則爭者愧邦鎮厭吳民多爭訟特新至德廟以重愧之可謂善斡旋民風而使之興讓哉邦鎮河南襄城人登己丑進士厯知山陽蕪湖二縣事務皆以德治今憲節至吳復有旌德化俗之舉可謂讓德君子矣廟功告成郡同知毛瑄推官樊廷選請豫記其事於石用書此以嘉邦鎮之績後之吏民其皆務尚德息爭以仰視斯廟而無愧哉之荆操詠泰伯廟高啓粵我有土岐山之下孰是營之維我考祖今我於邁自岐徂荆豈不懷歸念我弟兄民勿我思我思安只國巳有后先君季子至德廟周南老勾吳始封君實周之長宗三以天下讓去國何從容君親義兩全讓國德愈崇荆夷東海隅黎庶咸來從遂令千載下至德歌遺風周祚亦云竭廟食終無窮同前王賔翦商從父最為難有弟承家此意安逃在荆蠻讓天下荒祠今是一僧看詩至于太王實始翦商左傳太伯不從是以不嗣仲雍當時讓國與兄同廟祀從兄禮並隆此讓豈私起大志武王來克果年豐左傳周飢克商而年豐季札寧從田野去躬耕一節心終不改更哭到墓前來復命便回舊邑向西行右二祠共在泰伯廟頒降春秋二祀祝文三讓至德民無可稱周基三百由斯而成夫差范成大縱敵稽山禍已胎垂涎上國更荒哉不知養虎自遺患只道求魚無後災夢見梧桐生後圃眼看麋鹿上高臺千齡只有忠臣恨化作江濤雪浪堆弔伍君賦楊維楨吾讀伍員事未嘗不悲員處父兄之不幸而訖至倒行而逆施蓋大不獲巳者而世多之以為名不可也當員急於反讐遂不顧急售吳光而進專諸殺人之父以報已之父彼州于之子則將何所報哉此員失也而况父兄之仇費無極也無能有兵於費而鞭墓以仇君益失也然員能用吳以復父兄之仇而又為夫差復父之仇之死不畔以畢志於其所事則忠為有餘矣惜其君不終用逆料後日沼吳之禍徒以表其言之明故豫作哀員辭雖過其孝而多其忠云竊獨悲夫讒人之喪邦兮甚楚子之熊居伻朝吳巳去兮繼出蔡朱何嗣子師之不幸兮與讒而為伍君一過巳多兮奪婦遂及城父殺建嗟奢二子兮一死一生死不可以莫之就兮生不可以莫之行脫身東走兮乃至吳鄙君新有君兮光楚日以駭叶喜不三年其克報兮繼入郢於州來胡罪人之斯失兮而不熸子亷切夫厲階誓包胥以必復兮鞭王靈以為乖犯讐天之弗韙羽鬼切兮曾不異夫鬬懷懷曰平王殺吾父吾殺其子不亦可乎辛曰君討臣臣誰敢讐之君命天也若死天命將誰讐必犯是余殺汝當鱄諸之進士兮始已失其策也知反讐之急兮行之倒而施之逆也吾猶尚論其孤忠兮保先君之嗣也棲越子于會稽兮灑靈姑之恥也越靈姑浮戈擊闔閭闔閭卒于郢夫差使人立於庭茍出入必謂巳曰夫差而忘越王之殺而父乎則對曰不敢忘何甘饋之豢吾兮忘腹心之巨毒也黃池業乎成伯兮忽姑蔑之在目也剄七士以何益兮知員員一作人亡而國隨迫甬東之乞死兮始地下之慚知已矣乎國以人而張兮亦以人而亡始讒費之禍國兮終嬖嚭之亂邦荃不察夫忠貞兮矧外迷而內荒訪胥山之遺廟兮聲烈烈以稱王怒濤忽其殷足兮些靈馬於橫江忠孝威惠顯聖王廟碑鄭元祐孝莫大於雪父讐忠莫大於以死諫能養志者孝矣而忠未之聞能尸諫者忠矣而孝莫之顯故兼全忠孝者自以為難至於王而忠孝全節光映千古論者謂王脫身不死所以為父至其捐身以死所以為君若夫求忠臣於孝子之門則王是也計迄於今幾二千年不特焜耀史牒與夫廟食不毁至於樵童牧豎亦莫不知王之為烈也夫自泰伯以來隱約荆蠻謂其城邑不過三里而縱民耕耨其間則文身斷髮自同俚俗蛙龜與渚不異蠻民及王身事闔閭君臣志合乃擴其小而大是圖屏其陋而明是向圖為之築城郭建宫室實府庫厲兵戎使吳自拔於蠻夷而盟會於上國者大抵皆王之功也於後吳雖盡入於越而吳人思王不忘於是建廟於盤門裏城之西隅宋建中靖國時蔡京為之記記謂圖經與州縣版祝皆為雙廟一為永昌武大王一為福順賢德王若邦人與學士大夫自昔相傳則皆以為子胥廟所為福順則常州陳烈帝異代異邦而吳所以祀烈帝者當吳越錢氏有國時崇報之請也若王忠孝傑然自宜專祀故唐贈右相狄文惠分其持節巡撫江南也毁吳楚淫祠千七百所獨夏禹吳泰伯延陵季子並王四廟而已夫王德化自後漢太守糜豹按行境內其功著二曹唐景曰處家無不孝之子在朝無不忠之臣藹乎其言莫之尚也皇元大德三年王嘗顯靈以止浙江怒潮於是國朝推贈王爵至正十二年廉訪僉事遼東李公書吏絳州屈臣巡撫吳下力為吳民繕完城郭巳而御史臺檄專以築城事委之庸田僉事浚儀馬公二公念為吳建啓土首築吳城者王之功莫大焉今重築於二千載之後大工大役必依神庥庶幾盲雨颶風不為民害城完之日當為王重建廟貌以畣神之庥今城果完廟不可以不作也乃作王新廟於胥門之上按郡乘以為王嘗宅於其傍故城門所由名夫以王之英靈且將與三光五嶽氣併為久逺則其神靈助順福國何有逺近而况於王之故宅與王之故國也哉廟成乃為迎享送神之詩以落之李公名特穆爾布哈字仲善馬公名世德字元臣監郡則六十字子約郡太守則高公名履字德基云詩曰胥門岝岝新廟攸作神顧兹邦昔我是擴雲旗徘徊下寥廓兮神官肇啓殽醑膬美神其顧歆醉飽以喜民安盜弭降福祉兮神之歸兮籋層雲山矗矗兮水沄沄金支孔蓋光繽紛素車白馬還天閽年登穀熟兮神賜者侈樂神無窮兮自今以始遂昌鄭元祐撰伍相廟碑王鏊吳之先介在蠻夷不與中國通者十九世自巫臣來歸而後知射御季札出聘而後得觀周樂及子胥來奔以闔閭伯拔舒伐越滅徐入郢之舉楚國幾墟黃池之會遂冠帶以主夏盟吳之進也非公則誰使之世皆咎夫差不能用公豫獨歎闔閭知公而不能用也柏舉之戰春秋許其與中國之憂而責隨必以周室為請其所仗可知矣使禁兵輯民挈全楚歸之周則是役也秦必不敢救楚可滅吳可強於天下惜乎籍館返夷春秋復夷之此則闔閭羣臣之罪非公意也夫豈獨非其意將必力諍而莫之聽也然吳自此遂通上國至於今禮樂財賦甲天下非公則誰啓之是故自春秋言之則以夷干夏自今日論之則以夏變夷其有功於吳大矣論者又謂公於楚仇不當報於吳諫不必死不知公蓋間世之豪英邁之氣自信不惑志在親則親重親重故可以不死不死以有待也志在君則君重君重故可以無死而死死之以即安也此豈世之齪齪者所及知哉公之廟食於吳也久成化庚子盤門廟災高唐劉君士元以御史按吳命新之豫以公忠孝大節昭焯古今而功在吳尤大也故碑於廟銘曰烈烈英豪楚材吳用茹怨銜辛遵晦時動一舉入荆我仇斯復賊嚭為姦吳亦旋覆越兵之來有材墓檟公雖云亡有不亡者曷不勸之素車白馬出沒潮頭升降於天廟食於吳彌千萬年弔伍胥辭高啓覽勾吳之故墟兮灌莽鬱其蘢蓯館娃廢而為沼兮巋伍胥之遺宫奚千祀而弗毁兮繄若人之死忠昔窮逋而渡江兮奮孤迹於羇旅既入郢而雪恥兮又棲越而攘侮使彼吳之強大兮非夫子其孰為何夫差之自喜兮遽忽戒而荒娛陳昌言之悃欵兮實不忍視國之阽危衆以子為叵信兮肆讒辭之詆欺夫豈不能全身逺適以自庇兮顧先王之舊德卒待隕而何言兮恨終不能悟君之嬖惑載鴟夷以浮遊魂惸惸兮在中流江神為子兮哀憤鼓洪濤於高秋嗟君子之出輔兮孰不願為伊臯使言從而志行兮致雍熙之陶陶何齟齬而多患惟重華之不可以屢遭鄂侯爭而就醢兮龍逢諫而見屠蓋自古而有之兮匪夫子獨罹乎此辜身雖殁而義安兮又舍是而將焉索彼循默而茍容兮寧或免乎泚額想子猶念夫故都兮或乘雲而來歸顧荆棘之多露兮應攬涕而欷歔余亦何為而感慨兮懼直道之墜也聊陳詞而表烈兮亦邦人之志也子胥廟周南老煢煢楚亡臣用吳復父仇倒行而逆施道極將誰尤為吳保先嗣誓雪靈姑羞嗟君嬖讒嚭合比孩童謀員也請溘先懸目東門樓孤忠耿有光實與天地侔同前王賔苦苦鞭平為父讐常常愁越與君謀江山如畫吳城郭人到東門盡淚流同前沈周忠臣有廟千秋祀霸業無蹤一餉煙入幕靈風猶颯颯侵階細草自芊芊存亡好在鴟夷內慚愧當於瞑目前倚壁題詩重惆悵寒鴉飛散夕陽天其二城頭伍相祠堂好眼見香爐生紫煙吳沼巳成花寂寂楚靈何在草芊芊一時遺事千年後此日清談斗酒前落魄布袍冠蓋末悲歌亦得倚秋天本朝春秋二祀祝文孝以雪仇忠以報國白馬素車威靈赫奕吳郡陽山靈濟廟碑胡偉中吳古澤國也當春之季隂晴多不常鄉民以是卜白龍之歸問其所以為白龍則生有定日而母有姓氏塑土刻木繪縑圖楮皆有其像者往往而是歲三月十八日城之內外逺近崇信士女畢集於城西三十里陽山之澄照寺設伊蒲供唄大梵音鼓樂祭賽村疃成市蓋寺之前有二廟焉祀龍母於東祀龍於西瓣香炬蠟釃酒進羞者更出迭入及暮而罷恆以為常謂之龍生日耆老相傳曰東晉隆安中有繆氏家於是山三峯之下其女始笄因出歸途日暮天欲作雨忽遇白衣老人詢姓名居所願假館避雨逮旦而前語竟遽失老人所在今謂之龍塘即此地也巳而有娠父母惡而逐之乞食於鄰踰年今日産一肉塊見者駭愕棄之水中忽焉塊破化為白龍蜿蜒母前若有所告者母驚仆地須臾雷電晦冥風雨交作人面莫相覩良久開霽則見白龍天矯於山椒俄頃還復産所視母巳死乃飛騰而去鄉民厚葬其母於此地今謂之龍塜是也自是馮巫以求立祠且言所産白龍巳廟食長沙於是鄉民建龍母廟於山巔每嵗是日龍必歸省母前期旬日天氣肅然生寒四山煙雨乍晴復合正誕之辰龍必見形或長身尋丈隱顯於衆山之上或小如蜥蜴依伏於母之廟貌暴風雷雨澍溝號木則其驗也昔廬山僧祖照嘗述其本源於壁間矣廟宇則自國初繇山巔一遷於山南之魯巷熙寧丙辰再遷於今所而定建炎中主寺僧覺明禪師又葺今祠宇而新之乃廟號靈濟則紹興己卯四月帥漕以祈雨有應聞於朝而賜也夫人曰顯應則乾道戊子二月郡太守姚公憲奏乞以封也佛殿之西有仙泉者始於後唐天成二年中有鱗物時見紹興壬戍夏大旱郡丞楊公撫帥兩縣令禱於此甫􅡒香鱗物遽出大雨傾注闔境沾足此皆龍之顯應也錫山唐大受歲作倡修是日闔寺連狀供郡人沈鎡主調瀹湯茗以待四方來客紹興癸未三月龍歸有期大受請伐石以紀其事故誦斯言於新安胡偉俾敘其顛末偉曰此固所願也偉聞之歲在庚辰三月三日客有艤舟南徐者忽白衣老人來附舟云吾至自長沙欲省吾親之蘇之陽山願以金十緡為僦直而先酬其半舟師從之辰巳間解維至夜僅行數十里老人怒其緩自為操舟舟師因困卧遲明蹴之使興舟巳近山矣山距南徐三百六十里一夕而至老人翩然登岸徐步入廟舟師隨之寂無形影顧龍母帳前僦舟半直在焉既而雷雨大作舟師問寺僧始知為龍歸乃撤餘直飯僧而去偉嘗書之漫云録中長沙廟食誕辰省母至此益驗矣然考之圖史往牒惜未有傳竊惟古先聖王立祭祀之典曰山林川谷丘陵能出雲為風雨見怪物皆曰神有天下者祭百神諸侯在其地則祭之而况龍之為神噓氣成雲上下於天百穀生成繫乎水旱而龍實隂主其機豢龍御龍古有命氏尤莫近乎人也漦流而遭齔童神遇而産隆凖涇陽報繫木之義中元助落鶩之文函方獻於真人睡法傳於處士一理感通無有異殊吳人敬事龍之母子非一朝夕凡郡之水旱無禱不應祠宇敕書固巳垂當時而昭後世前日是否明晦之迹遑恤其他勒諸堅珉必有丘隴泉澗祕怪百靈通肸蠁於幽明之間亦將默為呵護與此山長久矣乃為迎享送神詩遺諸鄉民俾歌以祀焉命踞湖詹煟書以正體題以古文而併刻之其辭曰春花落兮春服成雨霏霏兮煙冥冥秧針緑兮蛙部鳴風蕭瑟兮林有秋聲縞為旌兮素為葆山之顛兮雲之杪雷車轟兮電光掃龍將歸兮非莫即早簫管沸兮鼙鼓喧肴羞苾芬兮酒醴潔蠲肸蠁通兮精意傳嚴薦享兮屬袂摩肩歲有常兮應期至人與神兮情何異嬰兒慕兮綵衣戲母子樂兮融融泄泄吳沃壤兮千里平勤稼穡兮勞農氓曰雨曰暘兮神有靈願垂隂相兮應其誠眴息萬里兮姑少憩酌獻盡禮兮期終遐惠年登穀熟兮益虔祀事自今以始兮千斯秋而萬斯歲胡偉撰重修白龍祠記胡應青吳城西三十里陽山之麓為澄照寺寺古有白龍祠宋屢封忠烈昭應廣惠陵豐公神母顯正孚順聖善妃邦人奉事惟謹祠重建於宋紹定壬辰歲久圯毁勢凜凜欲壓寺僧守淳裒積衣資復募樂輸者僅營兩廡重繪左右壁殿役最巨力未易就會參政張公謁祠下慨然曰吾歲奉朝命凡餉軍從東南者航海以逹於京風恬浪平舟楫如砥迄濟登兹匪神疇相是山龍所載育而廟貌弗修非闕歟乃捐金出粟掄材簡匠殿廬階戺像設導衛咸撤而新之丹碧髹堊瓦甓甃壘視昔為侈更以田四十餘畝給祠事所以致力於神者至矣噫萬生總總孰迪而康靡陽愆亢靡潦淫汨敷為氣和繄是神靈惟參政公誠與神孚克隆斯舉而淳師又能善信於人皆可書也豫先墓去寺而近知祠宇興復為詳師以記屬義弗得辭初神遊陽山發祥而著迹陳山闡靈湖湘間具前後二記不書公名瑄今為資善大夫江西等處行中書省參知政事祠之修始元貞丁未越明年丙申告成距始建甲子踰一周云重修陽山白龍祠記金幼孜龍之為靈著矣下上日星浮遊海嶽感風雲濡惠澤變幻恍惚不可為像則夫世之所稱神靈無逾於龍者哉宜其肇迹之地人益崇信廟食之久神愈彰應而祀典之盛纍千百年為不替焉距姑蘇郡城西二舍許曰陽山有白龍祠其神誕育之異相傳肇自晉隆安中而其靈顯感應莫盛於唐尤莫盛於宋元之間錫號崇祀後先相望逮我聖朝飭嚴祀事命有司春秋致祭著在令典乃宣德五年禮部郎中况鍾伯律奉命來守是邦歲夏秋之交闔郡大旱禾則盡稿伯律乃攄誠禱神巳而大雨沾溉歲以獲稔仲秋之月適當祀神先期望夕伯律齋宿公館夢神告以祠宇將傾丏即修葺翌日以其故語諸僚佐咸嗟異之將祀之旦天氣澄明靈飇颯爽雲彩發祥蜿蜒焜耀至誠感孚神實降歆既竣事伯律周覽祠下喟然興歎以為神之澤被及一方而祠宇傾圯若是豈所以妥神靈宜乎神之預協夢徵吾儕忝蒞斯郡詎可不思改創以答神休耶遂倡郡邑僚屬捐俸市材鳩工而重修之而民之好事樂助者益衆未幾棟宇赫奕廟貌一新既相與落其成復謀勒貞石以貽永久伯律乃致書請豫文記之惟禦災捍患神之功而事神治人守之職也白龍之神其肇迹之故余不能詳而自廟食以來厯世滋久能霈澤敷惠以蔭蘇人所謂有禦災捍患之功者伯律出牧於兹邦天子嘗賜璽書委以重寄而能欽承德意興利除弊和洽其政人以大治復以餘力修葺神祠徼兹福祉以惠其民可謂盡事神治人之職矣二者皆不可不書也豫故表著之以為蘇人告且俾後之繼守於是者讀斯文尚求如伯律之舉於其政哉宣德六年資善大夫太子少保禮部尚書金幼孜撰陽山白龍神廟重修記吳寬陽山在吳郡西北二十里而近視他山特髙且大蓋吳之鎮也相傳昔有白龍産其下其説載於郡志甚異其神秩於祀典廟而祀之亦甚久矣夫山之高大者能出雲雨必有神司之而龍之為物用雲雨以為靈者也使依得其地則足以致其用昭其靈而山得龍以依其澤益溥其勢益尊而他山固不足以擬之矣陜右孟公以監察御史擢守蘇州明年為𢎞治庚戌入夏不雨公以農事為憂曰國家餉糧多仰給是郡使禾稿不收非惟民無以為食其何以免徵斂之苦乎乃七月朔齋沐巳率僚屬行禱廟中未至而雨逺近沾足民皆歡然頌公公曰此神之賜也其何以為報哉顧其廟貌傾圯弗修者六十年於此若舊有獻殿特存其址而巳乃具材用徵工役擇人董治未及數月而功告成適長洲丞魯聰以公事上京師俾持書來請文為記夫洪範庶徵曰肅時雨若無所謂禱者春秋始書大雩公羊傳曰大雩者旱祭也至漢世令郡國上雨澤旱則公卿官長以次行雩禮則有所謂禱矣世之長民者視範之説其身之修本也春秋之説其事之舉末也不修其身而徒舉其事雖禱於神神將不降其居不歆其祀尚何有雨之應哉故於廟之成因書公之所以感乎神者必有其道則後之禱於此者其亦知所謹哉迎送神曲髙啓薦芳兮奠醑斫氷為梁兮葺荷以為宇神不來兮孰與處空山愀兮暮多雨渺吾望兮瀟湘雲冥冥兮水茫茫有美人兮在堂盍歸來兮故鄉導赤鯉兮從玄鼉冷風回兮水驚波儼靈旗兮來下巫撫節兮安歌安歌兮未極倏回輈兮山之側南有淵兮北有湫神不留兮吾心憂願歲來兮惠我秋白龍廟周南老陽山第三峯雲深神所栖下有白龍冢上有靈母祠昔傳民家女育龍此山陲龍化母驚絶雷電交相馳於今禱必應雨暘無愆期繄靈神變化猶知有母思同前王賔白龍為子去瀟湘母在陽山有廟堂歲歲來纒堂下樹似思劬育意倣徨本朝春秋二祀文撫育著靈變化不測興雲致雨普濟萬化靈濟廟祀白龍神在長洲縣陽山澄照寺初廟在山顛太平興國中移建於山南曹巷熙寧九年又遷於此建炎間主僧明覺重修紹興二十九年賜今額乾道四年奏封龍母為顯應夫人今載祀典建置范文正公祠堂記事潛説友浙西提舉司申照會説友蒙恩守吳懼無補報竊見先賢范文正公本郡人也道德文章功名事業載在國史實為我朝第一流人物身沒之後近二百年凡公過化之地無不尸而祀之獨本府未有專祠附庸學宫而巳其於崇祀勵賢見謂缺典郡雖窘乏而事關風化曷敢弗力乃於范公義莊之東義宅隟土鳩工度材為屋六十楹以奉公祠仍撥沒官田土拘收租米充春秋二祀之費其祠密邇學道書院春秋二祀郡守率其屬親涖及遇月朔則山長率諸生往拜焉又擇公之後賢者一人為掌祠若郡計稍舒别圖教養其子弟並以附於書院巳涓九月十一日立木候成舍菜奉安外所合具申朝省照會仍祈劄下本府照應伏候指揮省劄照得知平江府潛提舉申先賢文正范公本郡人也獨未有専祀今卜范氏義莊義宅之東隟土為屋六十楹以奉公祠仍撥沒官田畝拘收租米充春秋二祀之費巳涓吉立木候成奉安外申乞劄下本府照應合議行下右劄付平江府照應仍具所撥田畝數目尚書省準此咸淳十年九月某日吳郡新建范文正公專祠奉安日太守潛公講義咸淳十年平江府太守潛説友以公鄉郡建専祠為邦人式得地於公義莊義宅之傍祠宇數十楹以奉公祠奉請於朝撥田以供春秋二丁祭祀朝廷從其請奉安日潛公講魯穆叔答范宣子不朽之説曰太上有立德其次有立功其次有立言此之謂不朽此三者春秋魯穆叔答范宣子不朽之説也亦嘗因不朽之義而遡古人之所自立者乎易曰立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義人之所以與天地並而為三者以其能立於仁義故也天之立不根乎隂陽則職覆若為而不息地之立不因乎剛柔則職載若為而無疆人之立不本乎仁義則盛德至善若為而民不能忘何則德以仁義而立則德為純德功以仁義而立則功為宗功言以仁義而立則言為格言固未有無所立而能不朽者亦未有外仁義而能卓然有立者是故本諸身徵諸庶民建諸天地而不悖者仁義而巳矣富貴利逹不與焉夫子曰君子疾沒世而名不稱豈教人以好名哉謂其不知所以立而無善之可稱耳君子而能立萬世不可忘之德業則天下自有萬世不能忘之人心夫舜以孝禹以功臯陶以謨皆非有意於立而自能立者其仁至義盡弗可尚矣後世夷之清惠之和管仲之一正天下史佚周任之有言亦皆隨其所立傳於來世彼晉楚之富趙孟之貴非不自視哆然也往往於榮華之飄風不踰踵而巳為埃塵矣曾子曰彼以其富我以吾仁彼以其爵我以吾義夫仁義理也萬形皆有敝惟理獨不朽宣子乃以世祿為不朽不知物之至易朽者莫世祿若也故穆叔之對以立德為上立功次之立言又次之且證之曰臧文仲既沒矣其言立由是觀之則德也功也言也茍立其一亦可不朽而况三者俱立有如文正范公者乎公生我朝盛時實鍾天地間氣光明俊偉二三百年後猶使人竦然起敬况當時乎考亭朱子論本朝人物或歎其初或議其後獨於公而稱其傑出之才夫才而謂之傑出則必有參天地之化關盛衰之運者矣蓋公之於仁義如飢渴之於飲食須臾不置其見於修身齊家處宗族待閭里居官行事愛民利物浩如也此非昔人所謂道大德具者乎我是以知公之德之立皆仁義之所充拓陳宫壼之戒弭朝廷之憂腹中甲兵西賊破膽而天章一疏實將振起我宋一代之治若使盡見施行則後來者無所用其紛更而國家蒙福莫之與京矣此非韓公所謂大忠偉節者乎我是以知公之功之立皆仁義之所成就公在天聖中遺宰相書無慮萬言經濟規模大抵略見其後為牧守為將帥為執政平生所為無出此書者言之必可行也髙文大册小篇短章靡不粹然一出於正此非蘇子所謂有德有言者哉我是以知公之言之立皆仁義之布濩流衍天地付公以不羣之資而公能自立其於天地相為不朽之事而富貴利達固不足為公輕重也嗟夫孰不為德而立德難若存若亡德烏乎立孰不為功而立功難倏成倏隳功烏乎立孰不為言而立言難可無可有言烏乎立惟立始能不朽惟不朽始可言立若公則言非徒言而功皆酬其言功非徒功而功皆本於德無他仁義以為之主也德立則功與言俱立矣是又合穆叔之所謂三者而一之此之謂不朽信乎其不朽也彼皇皇汲汲於富貴利逹而不知可大可小者之為何事卒於下同衆人泯滅以盡者何可勝紀其視公之所立果何如哉凡公宦轍所至皆祠而奉之吳父母國也乃無専祠以慰里人不朽之思説友景行高風久矣濫茲分牧亦且踰期始克肇新斯堂儼設公像以補此邦之缺典是役也上而朝廷中而士大夫下而閭巷之髦倪莫不謂然然則公之所以深服乎人心而莫間於今古者無他就仁義上立腳做了天地間第一等人而巳做好官易做好事難誰謂華能勝實哉敢因穆叔不朽之説試從諸君評之庶相與勉乎其大者無務為其速朽耳廬陵劉坦陪講孟子曰聖人百世之師也伯夷栁下惠是也故聞伯夷之風者頑夫亷懦夫有立志聞栁下惠之風者薄夫敦鄙夫寬奮乎百世之上百世之下聞者莫不興起也非聖人而能若是乎而况於親炙之者乎蓋謂公兼此夷清惠和聖人之德而可為百世之師也文正公舊無専祠咸淳中太守潛説友建吳都文粹續集卷十二
