body:
  text: 吳都文粹續集卷三十一明錢穀撰寺院平江幻住菴記明本清淨本然云何忽生山河大地楞嚴有是語昔僧問琅琊琊返是語以答之僧頓悟𤣥㫖人徒知山河大地是幻而不知清淨本然亦幻也鏡光本淨物像無狀而生水體元清月影不期而現原夫昭昭影像所現之幻迹也澄澄水鏡能現之幻體也幻與幻盡覺與覺空斯僧所以悟極也大德庚子豫逰吳中郡人陸公德潤施松岡數畝於閶門之西地曰雁蕩結茅以栖禪者踵至𢎞開淨域三見青黃絶際矣上人永中與董菴務一日集衆請名其菴因謂衆曰二千年外大覺世尊棄王位卧深雪覩明星於無邊有情同時涉入如幻三昧嗟乎衆僧逮今沉酣情妄而不自知我曹出家雖依此如幻三昧而住如幻三昧亦有所未悟者宜以幻住名之可乎時有避席而言者曰承教有言幻身滅故幻心亦滅幻心滅故幻塵亦滅幻塵滅故幻滅亦滅幻滅滅故非幻不滅其不滅者是住乎非住乎豫曰子以識量分別欲知幻法是住非住無乃增益幻見安有悟入之理也爾但能藴無義語於識藏以究其心捧應量器於檀門以正其命荷八尺出作入息之具以效其勞守諸祖萬慮氷消之誠以堅其志一旦識解頓盡功用兩忘廓爾無依劃然超悟則是住非住正不待借手於無臂之人也越十八年嵗丁巳中忽相值於吳淞江之舟中從容叙舊亟請筆以為幻住菴記擬相傳於久遠云爾雁蕩除夜茅屋三間冷似氷灰頭土面十餘僧掃除自己閒枝葉不打諸方爛葛藤就手揭開新嵗厯和光吹滅舊時燈頂門別具摩醽眼越死超生似不曾宿幻住栖雲堂髙啓窗白鳥聲曉殘鐘度溪水此時幽夢回獨在空山裏松巖留佛燈葉地響僧履余心方正寂無使羣動起遊幻住精舍寒扉斜向竹間推此日重來是幾回行遍空林僧不見慰人憐有一枝梅宿幻住草菴二首道衍草菴寂寂住城西寒夜重來樂舊栖譙鼓無聲更漏永滿林殘月聽烏啼一燈長夜佛前明庭樹枝多宿鳥鳴野外霜寒人未起林僧肅肅又經行訪幻住院僧不遇張適捫蘿躡髙巖入院分禪席松風來澗阿烟霞護石壁白鶴向人鳴閒雲同客集久為塵緣羈愜此幽境寂道人不知還西崦己含夕幻住木蘭花伊乘春濃桃李競追歡一段幽情在木蘭且得閒身遊寶地憑將老眼送朱丸女郎名在人猶惜甫里才髙和獨難願借黃堂栽數本風流㑹使庶民安幻住菴作王寵春水抱林流緣源曲徑幽石牀喧鳥覆霽宇法雲遊寶思虛空發𤣥機罔象求憑將百年計長此托靈丘同文太史徵仲方山人質父過幻住菴袁袠髙賢勞枉過淨域喜相隨路轉青山郭門臨緑水池一官羞宦業尊酒負花時便欲從蓮社終當與世辭遊幻住趙孟俯雨後溪水溢橫流行地中輕舟何迅邁浩波兼順風碧蘆幹始長柔桑葉己空瞬息抵山曲窈窕微徑通青林夾道周流泉響幽叢多慚衆衲子前路相迎逢禪居新結構斧斤未輟工雙閣出塵囂六窗自玲瓏久矣厭城市飄如脫樊籠妙香清鼻觀新鶯驚耳聾汲水插山花開牖納松風經聲出廊廡寂然聞鼓鐘蔬食欣一飽亦與膏粱同緬懷老尊宿燕坐毗盧峰塵緣苦未斷無由往相從一宿返歸棹回望但青葱題幻住寺善住夾徑列杉竹茅堂絶四鄰野僧秋不到明月夜相親林靜鳥窺室泉清魚避人何時離城市來此寄吟身秋日遊幻住沈德䖍野寺居僧少林扉傍竹幽緑苔沿砌潤紅葉冒霜稠爐靄閒風夕茶烟細雨秋履尋松下月衣涴鶴邊流不是逢心賞那能愜勝遊慮忘因悟幻過此且遲留幻住菴在閶門外雁蕩村元大德間僧明本建初本至吳喜其地名與雁蕩山合遂結草菴於此趙孟俯為名之曰栖雲其後別創精舍改今名本自為記國朝洪武中重建宋濓記相傳結草菴時趙松雪馮海粟為治役云雍熙寺訪友不遇良琦暇日逺相問古寺幽且深青苔餘花落雙樹一鶯吟爐存散微篆茗熟成孤斟明當持山酒慰子客歸心秋日過雍熙寺彩肅二上人劉鉉支許從來說共遊壇場多學冠緇流龍蛇翰墨驚懷素珠玉詩詞壓貫休祗樹繞園靈籟發雨花飄席異香浮多情為我分茶供肯惜徘徊半日留僧院幽深野趣饒浮生來此暫逍遙心當初地機方定身戀塵緣業未消滿座白雲秋寂寂半簾踈雨竹蕭蕭寶幢金磬明燈畔坐看慈航駕海潮雍熙寺在城武狀元坊內本周瑜故宅梁為陸襄太守宅天監二年捨以為寺僧清閒開山名法水寺唐僧壁法重建宋改今名元燬國朝洪武初以其地為城隍廟僧廣宣乃即城隍廟左重建靈鷲寺修造疏祝允明修造雖小果之因不修則壞喜捨乃大檀之願惟捨則成要知來世之緣足證今生之作敬持短疏遍叩髙賢兹為蘇城靈鷲寺者創由天監之朝元是永光之額久安我佛曾降真仙奈日月之漸深致棟梁之甚敝把茆己失巋然病日之維摩諸漏未除辛苦役中之六祖如是如是念哉念哉今者欲辦蓋頭可嗟空手巧婦不為無米粥獨力難成仁恩廣度有緣人衆擎易舉是以托管城子將命乞孔方兄㸃頭所願長者宰官善男信女各發菩提樹同建栴檀林只願損盈而益虛便可鼎新而革故凡諸助力不日成功大完種種之莊嚴重現如如之妙相將見南朝四百八十寺寺寺莫加如來千百萬億身身身不壞千椽正直都是緣根萬瓦清凉無非福䕃功在人天而不朽箇箇圓成福同沙數以無窮人人如願五風十雨萬嵗千秋靈鷲教寺在城東北隅舊名永光院又名東林院梁天監中僧永光建春盡逰馬禪寺蔡羽斜日上河股殘春投佛家維摩元有榻優鉢己無花桑下曽聞道松間聽煮茶坐來心自適此地寂無譁馬禪賞月二首陸川鼓角啞啞漸入更短庭長坐候初生魄虛天影雙鈎小光漏雲層幾片明酒豔瀉霞歸木甕茗波延爽貯磁罌良宵便欲遺書去早訂西堂對賞盟彩雲呈瑞見玲瓏皓魄初懸殿角東好景盡憑今日賞故人聊有一尊同地靈競發金銀氣天巧難描造化工香霧滿庭還散集無窮玉色醉醒中馬禪寺在平權坊內唐大中間郡人司馬厚捨宅建吳越錢氏改寶慶院宋大中祥符初始改西竺寺國朝嘉靖中廢虎丘陳公樓記王曉隆興二年四月己未敷文陳公自天府易鎮吳興憩於蘇臺憚煩人事避暑虎丘寺之衆無慮數百十人庖湢之供日取水劍池當炎赫之時負者登降百級喘吁力屈不暇息肩公惻然念之乃捐金銀二十萬俾創樓其上為井幹以便汲寺僧承公之美意度材鳩工不日而成以陳公名之要與此山俱傳不朽豈非仁人之利士君子志於道一念一慮之間未嘗不以濟人利物為己任初無大小之異推是心以往則知公剖符四郡持節兩道護民之勞所施者博矣有孚勿幕不特為兹設也池泉清而甘不為旱乾水溢而增損其樓懸跨兩崖瞰臨九仭登之者聳然魄動如厯雲棧之險尚慮嵗月浸久震陵所侵藤蔓穿敝勿克保兹成績期後人加護增葺垂諸有永庶無負公之志矧兹名剎誠古道場禪河在傍許三獸度化城不逺才一牛鳴寶閣萬椽宸奎嶽鎮玉車千乘仗蹕天臨其勝概雄視他處為不足道住持廣彥真歇大禪師之嗣子且公之里人也余先君與真歇為世外交識師舊矣一日來告願紀創樓之由於是嘉其意而為書八月丙子右朝請郎主管合州崇道觀王曉記干頃雲記家之巽虎阜為吳㑹絶景幽巖曲沼佳木盤石之瓌麗娟秀悉在寺前劍池鑱山腹以出清泉在寺中寺眂山勢為髙下廣袤規置不能平直而梯空駕虛俯仰避就各有態度丈室盡山之背一目千里以故遐披遠眺空濛浩渺之趣乃在寺後中為致爽閣灌木蔽虧目不得騁少東可十步前無蓊翳望眼始逸屋圮陋弗稱今住山古田師撤而堂之前為軒居東面以延納空翠收拾平逺然後畦疇畎澮之交錯遙岑平湖之隱現出沒風帆陸車樵歌漁唱之斷續欸乃千古塵迹盛衰興亡莽蒼寂寞可悲而不可繪可繪而不可言者莫不悠然翼然於几席之上使騷人墨客登髙能賦之士低徊感慨竟日徙倚而不能去也既成摘坡翁千頃雲之句扁焉性存子來遊而問義師曰宇宙之間人物之衆榮枯生滅之相餞盈虛消息之相禪亦猶夫雲之一聚一散而不可常也以名吾軒使來者悟此觀之本空世諦之非有劃然省覺以求吾常住不壞之實體不與形器俱存亡者其庶幾乎性存子軒然笑曰師贅矣乍有忽無者雲也而雲未嘗盡倏成倏改者世也而世未嘗窮以至天地日月子之教以為劫至皆壞吾意有形雖有數而天地日月無終息也昭昭矣謂雲為有謂世為真是之為縛謂雲為無謂世為幻是之為脫臧與榖俱亡羊也尹與僕俱昔夢也且翁有言自其變者觀之天地不能一瞬自其不變者觀之物與我皆無盡吾謂不變者不能一瞬變則亘千古而不老子知雲則知易之道矣吾不學佛以吾意言之云爾師曰善哉子之言莊周不如願受而藏之為記古田名德垕天台人宗通眼正其主虎丘百廢具舉景物為一新云咸淳九年正月三日性存子家之㢲記并書石像大士記徐恪有聖人焉得大圓通能以善應妙行不拘一方而隨感示現無作妙力不遺一物而自在成就夫何故本如來藏真音聞體如水中月遍一切處觀音大士化道無礙本有如是故佛與辟支聲聞等身隨其得度而為說法人與非人險難諸境隨其恐怖而施無畏則妙相示現妙力成就可思議哉吳興臧逵少侍親嘉禾以瘵疾常茹齊誦觀音夢白衣人針其耳疾遂愈逵善丹青弟寧事鑱刻因願以觀音像於石且首欲繪相為法不敢以意取而祈以夢證心思頗勤十年如是也一夕夢觀音行道之相及覺能追之故臧氏所傳吳人以為應夢觀音焉逵慶厯丙戍自秀如杭復來蘇募衆立像往返經畫二十年晚得鍾離智光者助凡舉大緣無能為之資則誘募必以衆力逵窶且貧獨其心至誠終始不倦雖道途之久羈旅之困世情之艱難人不堪受逵晏如也吳俗樂善好施其視逵所為孰不散所有以助積日月之施為足以成其志因訪太湖之洞庭得石尋餘玉潤而金聲寧像之唯相之肖其瑤冠纓服圓容麗質世人皆能為獨行道之相夢感心得如有所授而不自知雖大巧在前其能毫髮加損耶若厦屋以為帡幪闌楯以為防限大小之材備締構者皆以良石熙寧癸丑得地於蘇州虎丘劍池之西南明年九月朔立宇置像隨各就緒又得時公卿大夫觀音經墨妙終卷字僅百數勒之石壁以永其傳斯時之盛事也且靈明虛寂無相可取上機喻焉中下蔽䝉隨其流轉不以相示之則不信不以善導之則不入此西方聖人於有為中隨所建立或具以威儀而有名相飾以莊嚴而為功德皆以漸次使之信入而己世之佛像其土木瓦甓金碧丹雘取於所募甚衆而所積且勤然成非其材寓非其地一失經始則弊不旋踵斯石藏之湖津融結成就浸漬澡雪其體堅其質粹而成之得其材飛甍峻宇喬松絶嶺青蘿白雲氣象灑落叢林之冠而寓之得其地則創置之美悉具於此足以副聖相感通之意在物所為供養承事依歸瞻仰者愈久而不厭其利可勝計哉夫即相論道而道不異相即方丈之室尋尺之像華藏之道場普門之法身于是乎在以至大干亦復如是何適而非真耶元祐丙寅春季初吉日徐恪記住山慧先立水陸堂記范成象自吳西門出竝城以北十里而近有山孤峙於平田中無有重復綿亘之勢而盤積巨石撐突􅍶崒轉步幽險若在衡廬深窅處中如劈華絶壁劃然湛盧之淵下臨無極即之危懼若墮而稽虎丘之名聞於天下雄勝次當東南二三殆有神明之所扶持哉故大士說法頑礦至於頷首山鬼留咏巖穴為之生悲惟景勝地靈結為佛廬精嚴冠他剎釋氏有教施及杳冥宜其徒號為水陸環浮圖比比是為四方所歸向獨盛者亦莫虎丘若也宜有道場廣博嚴淨然寺之屋踞其巔地不能備衆事所謂水陸之供僅列廡下卑隘不稱威儀前後領徒雖巨擘咸弗克究度今傳法者定慧圓明禪師廣彥始至籌室即慨然有興作意且道行為衆所仰乃有信女張氏法濟欲成夫薛贇之志命其二子曰澄曰潔捐資率諸家總七百餘萬有僧義才運其智巧絫石崇基創營大厦架壑為梁結樓翬飛直小吳軒相對如翼鳩工於乾道乙酉之冬役不踰月藻繪金碧如幻如化既落成又增置田半頃永為祠闈嵗給蘭膏蒲塞之助凡城邑聚落與夫舟車衝衢見聞喜躍輦財為供輻湊沓來想其清夜沉寂太虛泬寥鈴鐸振響梵唄摩空山川草木為之肅然而况三乘十類有情無間靈明所格光湧沉幽法力一加普遍蒙蓋諸法施中此為最宏諸莊嚴中此為最勝彥以一方便成就二善果乃移書屬隨順居士范成象為之記成象嘗讀華嚴經見諸佛用心得水陸起教之源有曰佛住甚深真法本寂然無相同虛空而為第一實義中示現種種所行事此如來以大事出現知諸法差別相住無為開此施門利益一切也又曰菩薩善知權實以行道雖以相如莊嚴其身而示受醜陋貧賤之形常備集衆善無諸過惡而現生地獄畜生餓鬼之界此大士所以隱其福德假諸惡道以應緣闡教也又曰住於涅槃而示現生死究竟寂滅而現起煩惱此慶喜尊者所以內懷智慧外示悲憂以祈哀顯化也此一大教聖賢如是周遮建立於世間法決非小補受付囑者宜何如哉此定慧圓明傳佛祖印而下特垂手以有為法興建佛事也嗚呼善哉先佛以誓願為衆生故此法㑹不斷滅後人以慈悲同一契故此法㑹常相續原闕重修虎丘雲巖禪寺記黃溍自佛學行於中土法幢所建必天下之名山莫不侈為寶構華居以宅夫形勝蓋以表靈山之未散作大衆之依怙俾來者睹相而生信也丹青土木之事雖若涉於有為而事之與理不相留礙推理而適於事清淨覺地即大伽藍混事而歸於理積土聚沙皆以成佛一切世間成住壞空之相固未有出乎心境之外者茍非乘方便力遊戲如幻安能具大莊嚴為無上之勝門也哉吳郡西北有山曰虎丘或謂之海湧峰有大招提曰雲巖寺山之得名寺之創立悉見圖志山則吳王遺蛻之所記秦皇轍迹之所屆劍池及試劍石存焉寺則晉王氏昆弟司徒珣司空珉所施之別業生公講堂處㸃頭石千人坐在焉宋至道中始以寺為禪剎皇祐初又更為十房住持紹興間長老大比丘隆公以圓悟嫡子坐鎮兹山席法鼎盛東南大叢林號為五山十剎者虎丘遂居其一大慧以法門兄弟相依最久翻經有臺聲容儼然繼以雪庭瞎堂松源笑翁諸宿德倡道其中而宗風愈振纂承基緒代不乏人而支傾植仆日不暇給際今昌辰尊崇家教猶或失於因循未克大起其廢重紀至元之四年行宣政院以慧燈圓照禪師普明嗣領寺事至則裝飾佛菩薩阿羅漢金剛神塑造文殊普賢觀世音三大士繕治舍利之塔經營梵律之藏範銅為巨鐘視棟宇之摧墮蠧弊者或因或革百役並舉大佛殿千佛閣三大士殿藏院僧堂庫司三門兩廡古木寒泉劍池華雨諸亭則因其舊祖塔衆寮庾倉庖湢宴休之平逺堂遊眺之小吳軒山之前為重門則改建使一新環寺為渠六十餘尺陻以客土水遏弗行則疏瀹之凡其費一出於經用之羡財而集其衆施以助其不給方謀石築隄屬於城闉以復唐刺史白公故跡未及庀工禪師遷主本郡之承天能仁禪寺爰序其成績來取文以記焉禪師才周而智圓達理事之不二觀一切法皆佛法未嘗以法中妄計無為有為而生欣厭故其經度指授久而弗懈閲七年如一日宜有以底於成而不愆於度也前作後述是在來者可無以告之使勿墮其己成之業而益廣其所為之志乎記為興造而作山水靈異風物之美著於前賢紀咏者此不復出禪師族松江曹氏說法嗣晦機和尚於大慧為五世孫於隆公為五世從孫云至正六年冬十月甲子中順大夫祕書少監致仕黃溍撰并書太中大夫禮書卿台哈布哈篆額建千佛閣疏伏以胥臺㑹府虎阜名山十萬家之華屋相輝軒車鼎盛數百年之精廬聳峙鐘鼓聞聲肆我先朝建之傑閣列聖奎文於此悉聚十方雲集舍是何觀正厯嵗之浸深將振風之可慮倘不重新於殊勝必將盡廢於前功住山人發廣大心立腳處具勇猛力未及一載便成大殿崇龕更結衆緣欲整層甍叠棟仍即小吳軒之地并崇賢剎佛之居要令跂翼翬飛齊烟霄而輝映永使琅函瓊笈與天地以綿長必須十五萬緡錢方可圓成若得千百萬億化身初無難辦作如是念諸天三寶默相扶持畢未了因羣賢信士皆大歡喜共成偉觀竊幸芳題虎丘雲巖禪寺修造記楊士奇蘇長洲縣之西北不十里有山曰虎丘吳闔閭所葬處世傳既葬有白虎之異故名岡阜盤鬱泉石奇詭蓋晉王珣及弟珉之別墅咸和二年捐為寺始東西二寺唐㑹昌中合為一而名雲巖者則昉於宋大中祥符間載盧熊郡志如此始清順尊者主此寺至隆禪師而復振厯世變故寺屢壞輒屢興之洪武之甲戌寺復燬永樂初普真主寺始作佛殿寺僧寶林重葺浮圖七級繼普真宗南作文殊殿十七年良玠者繼宗南是年作庖庫作東廡明年作西廡作選佛場又明年作妙莊嚴閣三年落成蓋寺至良玠始復完所作閣之功最巨凡三重崇一百尺有奇廣八十尺有奇深六十尺上奉三世佛及萬佛像中奉觀音大士及諸天像其財之費為鈔三十餘萬貫金石彩繪之費六十餘萬貫又經營作天王殿以次成良玠杭之海昌人原石其字前僧録闡教止菴其師也余聞諸刑部主事陳亢宗云原石嘗從亢宗遊遂因以求余記其成余聞虎邱據蘇之勝嵗時蘇人耆老壯少閒暇而出遊者必至於此士大夫宴餞賓客亦必至於此四方名流貴人之過蘇者必不以事而廢遊於此也然世亦有興念夫王氏之嘗樂於此者乎當時王氏父子兄弟寵祿隆盛光榮赫奕舉一世孰加也而能遺弃所樂輕若脫屣焉者豈獨以為福利之資乎其亦審夫富貴之不可以久處焉與子孫之未必世有者乎雖其智識趨向髙明正大不敢以庶幾范希文之為而無所繫纍乎外物視李文饒溺情役志下至於草木之微者豈不超然過之也而自建寺以來今千餘年雖屢壞而屢興其飛甍傑構凌切雲漢與其山川相輝煥稱名勝於東南愈久而不衰者固佛之道足以鼓動天下亦必其徒多得瑰瑋踔絶刻厲勤篤材智之人能張大其師之道以致夫多助之力也瑰瑋踔絶刻勵勤篤之人其用意也宏其立志也確有不為之而孰禦其成哉嗟乎其若是也使就於世用有不立事建功而可以佐當時聞後世哉吾又以慨夫屢見之於彼而鮮遇於此也永樂二十二年甲辰嵗二月朔奉議大夫左春坊大學士廬陵楊士奇撰翰林院侍讀承德郎華亭沈粲書徵仕郎中書舍人三山陳登篆蘇郡虎丘修塔記張益虎丘寺有塔凡七級在絶頂故視他塔特髙始建於隋仁壽九年當其掘地築基得舍利一人聞空中奏樂井之吼者三日虎丘既為蘇之勝地而塔之靈異又若此其來遊者不但欲遂登覽之樂且以致崇信之心焉寺凡屢燬塔固無恙洪武乙亥僧舍不戒於火寺焚延及浮圖永樂初住法寶重構殿宇塔則特專托寺僧寶林加葺之宣德癸丑火復作於僧舍浮圖又及於災而加甚於昔焉住山定公南印慨然歎曰是魔耶乎不有廢也則何以興人能興其所數廢無他在其志之所立何如耳乃罄衣資所有粗具材石既而巡撫侍郎周公郡守况公聞南印之有為也即捐己俸首助之郡人爭以財物來施由是材非美者繩墨不加石非堅者磨琢不及經始於正統丁巳之春落成於戊午八月三日露盤初上有白鶴數十回旋塔頂久之乃去舍利之光連夕燭天既閲月復有紅白之光自塔頂出橫亘北斗之下靈異薦彰衆目所睹謂尤甚於塔之初建時也南印又因餘材創構大雄殿丹碧交輝實與塔稱惟兹塔之重建也始發心於南印而力之所成就者多出於周况二公之樂施力於此者又因南印梵行內學髙而且深有以動之也南印字味蘗南印其號也蓋為天界住持蒲室之孫朴菴之子禪派傳自臨濟厯吳江之普濟湖之天聖蘇之承天住持今為郡僧綱司都綱僧臘踰七􅐆矣嘗承詔命校藏典於北京賜賚緇素致榮艷焉其徒永瑞斫石於寺求文以識師之重建是塔之由用示久逺豫嘉印有志於事而竟成也乃為書之石云賜進士行在翰林院修撰承務郎姑蘇張益撰敕賜藏經閣記周忱欽惟我朝奄有萬邦聲教所覃地大且逺列聖相承廟謨迭出爰乃參用直乘助宣皇度廣資福利昭薦國釐故凡神州赤縣必鼎建梵宇增飾莊嚴復有詔校修大藏經典至是事竣頒敕降經於天下寺之暴著者而蘇之虎邱雲巖禪寺與焉適忱叨䝉上命巡撫京畿賫敕護送藏典至於其寺當正統戊辰正月望也主寺照師因聚緇衆大啓寶函同音閲誦忱獲拜瞻何幸躬逢勝事克見其縹帙之整彩焕而光騰奎畫之妙龍翔而鳯舞猗歟盛哉然則天章𤣥文之重奚可不庋而珍藏所司以帑廩羡餘度材庀工為層屋五楹髙六十五尺廣九十七尺深如髙函以龕匱設供以几案雕繪金碧靡不堅完於是臣忱謹題曰敕賜藏經之閣閣後照師復罄衣槖構一軒以待往來休息又建香積堂伽藍殿海泉亭相峙殿塔之左右前後可謂得人矣既而師附狀逺來江右踵門求識其事於石余己衰老獲乞骸骨歸田文思凋落曷足以應其求耶雖然師之勤篤惡能終拒抑豫嘗與焉且春秋之法常事不書今天恩如此之被佛典如彼之全誠曠世盛典其可不書矣乎苐慚拙訥無以昭示後來姑述梗概以復之師嘗奉詔內廷校經名照字照巖林隱其別號也故云資善大夫工部尚書致仕廬陵周忱撰雲巖雅集志徐有貞天全翁自永昌歸吳三載於兹矣閉門却掃非湖山之遊不出出則孤篷短棹飄然往翛然還而未嘗有同遊同樂者甲申秋九月上日自在居士之自玉峰來也始相約為登髙之集約所登曰山之近而佳者則虎丘之雲巖乎約所集曰凡吾詩社中人皆可也然不必期翌旦至者即與及旦而鹿冠道人自東原至愛雲道人自牆東至醒庵未庵文學至自緑水園翁乃與之載酒肴出閶門追及居士於畫舫而長沙幕賓繼至遂即舫中張宴為水戲望山而進日卓午乃至而吾七人皆古衣冠步自山門笑咏以登巖緇野褐􅌓眙相視迎而導之自麓及巔凡臺殿亭館之有名者畢造焉既乃遵鶴澗過松菴循劍池躋雲閣列席而飲用司馬公真率㑹例酒至自斟杯行無算於時黃花方盛開采英浮白薦以紫萸緑橘而山珍海錯間之每酒行三五巡則一瀹以茗故雖酣而不醉醉而不亂間起而延佇巖阿憑軒以眺邇而千章之松萬竿之竹雲作之色風作之聲海濤怒鼓天籟和鳴目眩耳聳應接不暇逺而陽華諸山自乾而離陳列車連衡絶乎莽蒼之野具區之浸自坤而㢲滙乎三江極乎雲海之涯坱圠混茫與天無際使人神爽飛越將與造化上下同流而無間者因相與尋句吳之遺跡弔闔閭之𤣥宫慕泰伯之至德企延陵之髙風嗟霸圖之易泯而知有道者之無窮也居士乃倡為四韵鹿冠繼之兩文學繼之愛雲長沙又繼之而翁則旋酬而遍和之於是六人者齊起舉爵以屬翁曰古今人率以菊節登髙登髙必以詩酒為樂事然能兼之者鮮矣孟參軍之於龍山有酒無詩陶徵士之於栗里有詩無酒老杜之於藍田小杜之於齊山有詩有酒而無屬和之什且彼晉唐中季大亂日滋其皆不能無憂而我輩幸當太平之世以時遊衍而兼有詩酒賡酬之樂然則斯集之雅蓋前此所未有也不可以不志翁乃起而謝曰然哉吾聞君子而有道也其憂以人其樂以天未聞以詩酒也以詩酒為樂者世之流連光景者所為耳君子而樂乎詩酒雖時有之豈其心哉是故居廟堂而憂民處江湖而憂君以人而然也簞瓢陋巷而樂不改蔬食水飲而樂在中以天而然也以人者有時而不樂以天者無往而不樂若夫居士優老而歸幕賓從宦伊始鹿冠愛雲嘉遁丘園兩文學表儀鄉校蓋有樂而無憂者顧吾獨以戅直忤時陟難幾危於人而幸全於天其憂於人者不可勝言矣而樂於天者亦未嘗不泰然而自得也乃復恭承先帝今上之恩賜之環命之服優游田里去危就安時從諸名勝之遊何幸如之何樂如之夫㑹飲食者其得味同而飢渴者若加㫖焉今吾從諸君之逰亦猶是己敢不如語志之居士為玉峰夏仲昭其仕厯踐清華以太常卿致仕詔進階二品鹿冠為京兆杜用嘉愛雲為吳興施堯卿醒菴未菴皆陳氏故太史怡菴先生之子仲為孟賢季為孟英長沙為彭城劉廣洋故大司成假菴先生次子也翁則前國史玉牒經筵官中執法兵部尚書華蓋殿大學士奉天翊衛推誠宣力守正文臣特進光祿大夫柱國武功伯東海徐有貞云虎丘復第三泉記王鏊虎丘第三泉其始蓋出於陸鴻漸品定或云張又新或云劉伯芻所傳不一而其來則逺矣今中泠惠山名天下虎丘之泉無聞焉顧閉于頽垣荒翳之間雖吳人鮮或至焉長洲尹左綿髙君行縣至其地曰可使至美蔽而勿彰乃命撤牆屋夷棘荆疏沮洳荒翳既除厥美斯露爰有巨石巍峙橫陳可數十丈泉觱沸潄其根而出曰兹所謂山下出泉䝉宜其甘寒清冽非他泉比也遂作亭其上且表之曰第三泉吳中士夫多為賦詩而豫紀其事所以賀兹泉之遭也雖然天下之美蔽而不彰者獨兹泉也乎哉因書其後以識詩曰巖巖虎丘巉巉絶壁步光湛盧厥浸斯蝕有支別流實冽且甘昔人第之其品維三嵗久而蕪射鮒且泯其誰發之左綿髙尹寒流涓涓潄於石根中泠惠山異美同論百年之蔽一朝而褫伐石髙崖以記其始虎丘別序胡纘宗汴人郭道符氏自徽郡丞拜陜西按察僉事初郡丞以臺臣薦專治漕舟於蘇兹自蘇將之任陜西其友蘇郡守胡纘宗氏郡丞郭田氏周仲仁氏皆秦人於是載酒虎丘閣再拜而餞之屬纘宗言纘宗辭不可於是再拜而贈之曰吳名山莫如虎丘祖道亦莫如虎丘吾人登髙興懷賦詩叙別亦莫如虎丘於是預餞諸客撫景命題即虎丘而分之曰劍池曰和靖讀書堂曰千人石曰陸羽泉池取其淵也臺取其崇也石取其載也泉取其洞也夫淵則博崇則髙載則厚洞則明曰如何曰今按察古亷訪也振紀綱一風俗秉法度者也於內視都御史臺於外視御史臺非博其何以充也非髙其何以立也非厚其何以受也非明其何以亷也曰如何曰含𢎞灝灝見而博矣真積嵬嵬見而髙矣持載秩秩見而厚矣鑒別粲粲見而明矣公也今之三秦有餘地矣然秦重藩也觀風問俗殆有大於此者曰何如曰吾聞昆明瀰瀰載淵載博也泰華巍巍載崇載髙也秦川納納載振載厚也涇渭差差載洞載明也公也臨斯地大斯觀廣斯義攬轡乘驄立綱陳紀繩愆摘伏振廣平之風沛新安之澤擴姑蘇之才則關中隴西之人莫不仰神明望風裁恨公入秦之不早矣言既諸客賦詩且成洗盞復酌酌且醉於是按察公與諸客停雲拏舟再拜而別虎丘寺災次衍上人䪨沈以潜吳宫消歇梵宫開回祿團烟忽降災神劍有靈先出地佛書無奈亦成灰清泉白石僧重理苦雨酸風鬼自哀今古廢興皆是幻何須惆悵首頻回虎丘萬松堂避暑楊循吉雲巖不一勝窮厯到幽房塢入深林暗風來髙閣凉鳴蟬消永晝懸澗落寒漿擾擾塵途者空知隱策長重題生公講堂池光如鏡影山臺怪石喬松美矣哉昨日曽遊今又到恐遺佳境重徘徊虎丘山房蔡羽去滌崖端茗無如竹裏人妙尋身外境暫浣目中塵好樹偏臨水餘花似逗春風烟步步足欲別轉逡巡虎丘東閣王寵春色憑髙望山河指掌開半空環緯象絶地湧樓臺法雨迎風盡香雲拂霽來登臨千古勝把酒氣雄哉虎丘塔袁袠雁塔翔雲表龍宫湧寺心乘髙宜眺望暇日共登臨山面支硎逼湖窺震澤深平生飛動意慷慨一狂吟虎丘慧上人山房孫太初占勝景相依僧閒水竹居窗幽滋蘚暈樹老帶蟲書石鼎秋聯句溪園野剪蔬買山錢可借許我築茒廬虎丘題咏極富有山志存焉止録近時諸公詩文稚兒塔髙啓黃土但埋骨豈能埋性靈昔聞宿草間曽吐蓮花青身卧長夜臺口誦西方經尋跡殊窅窅聞聲每泠泠寒燈照空塔時有山僧聽應使夢魂裏沉迷盡皆醒同前周南老巍巍半塘塔自昔名稚兒兒葬塔之下臭腐化神奇青蓮開冡土花光凝碧滋謂兒轉法華曽說陀羅尼經聲或夜聞精爽猶嚘咿諒彼義熙人千載疑傳疑宿半塘寺趙與訔夜宿半塘寺惟聞塔上鈴老僧行道影童子誦經聲竹密風猶逗窗幽月愈明瓦爐香斷處一榻灑然清簡默堂記徐有貞虎丘之佛慧蘭若有比丘𢎞簡號曰默堂而請豫為說其義豫應之曰若學佛者佛出西土我東土人不學佛言何以為說佛義然而若必欲我說也是若强問我不得不强答也若佛之學蓋曰空寂而己空則無物寂則無聲無物則無作為無聲則無言語無作為故簡無言語故默若所云簡默者意其在是乎然簡默之近空寂而非空寂也簡有跡空無跡默有意寂無意由有跡入無跡由有意入無意無跡無意果有所云簡默乎果無所云簡默乎於是𢎞簡躍喜合仆起謝曰妙哉言也實開我心豫曰否是若所强問我所强答者也非我所學而知者也我所學而知者可以告我徒不可以告若將無以我為外若也耶佛慧菴在虎丘寺東宋紹興間僧無善建菴有鍾秀軒梁用行記白蓮寺池上次內弟周思敬韵髙啓月出露己白荷花香滿池髙僧愛清夜留客坐題詩竹動鳥驚夢草凉蟲語悲閒齊一瓢酒應不負幽期雨中登白蓮寺閣望故園亭亭髙閣上渺渺清川曲日暮靄羈愁蘺蘅雨中緑聞鐘僧己返荷笠人猶牧歸棹獨難尋江南望雲木獨遊白蓮寺池上看雨輕衣忽變冷池雨來消夏圓紋細細生密響翛翛下荷披魚躍起樹靜禽鳴罷賞淡自忘還非因與僧話白蓮寺讀杜進士喜余話舊之作有感於中次韻酬之不辭鳴棹逺相尋欲向江齊伴旅吟百事未成年己長幾時才到夏將深萱留倦蝶連池緑樹帶殘鶯滿寺隂恐被老僧嫌滯礙舊遊休說更傷心與杜進士登白蓮寺閣對雨逺愁髙樹共離離風逆潮聲上浦遲海客市中烟起處江僧閣外雨來時船歸杳靄惟聞櫓店隱蒼茫不見旗回首南朝今幾寺可堪重咏牧之詩白蓮教寺在長洲縣十五都地名陸塘吳赤烏間僧了然建後燬僧法雲重建建吳井冽泉亭記施清臣侯國而𨽻蘇郡往跡而邇僧居西接橫山治平梵剎之旁吳臺竝峙吳井未眢蓋近關之佳境也粵自姬封斗野都據具區季末侈汰縱無限之欲夷山之巔碧鱗參差以巍其層穴原之腹翠鴛周匝以寬其汲左氏所謂吳夫差一日之行所欲必成珍異是聚遐撫前載莫容問矣然山不可移則兩臺未泐地不可改則一井未湮有臺以娛己有井以蓄衆一千九百餘載所以僅存也顧瞻此井埏土內甓潭焉一規衡石外圍觚焉八鋭旁留識勒模欵可辨首建唐楞伽殿後重修吳朝大井乃廣明元年二月箋演僧茂乾為之記法鏡禪師初造其寺井則吳志言當橫山艮位越來溪西百步隋開皇十年越國公楊素築城浚之唐刻顛末如此去此井南百步又獲深沙亭録神變相記雖在沈瘞略無剝蝕亭則大中六年六月蘇州刺史奏置此寺于上方收拾餘材創立神宇考此寺環於山井屬於寺皆昭昭也乾道壬辰相國周益公南歸録繫日紀行至石湖云初吳王築姑蘇前後兩臺為城三重遺址儼存夫差西施宴遊之地此言臺也遊楞伽治平寺門外八角大井視闌刻字隋初平陳楊素徙吳郡於此近地尚有新郭之名其後吳人不安復還今城此言井也創之於吳則井為臺設浚之於隋則井為城設豈細人能私哉蓋興替藉曩昔而為鑑形勢因天壤而並存一草一木嗜古者必記之方策又豈流俗能識哉逮熙寧中有里胥輩佃其地為塋迄今一百七十餘載挾後冒先廣包臺井治平主僧義超越訴諸節府發運夏卿趙公目擊廣輪力誅其欺由墓之外悉歸之寺義超求叙端倪余曰二卿守吳愛棠奕葉正值庚子厄數十有二政種種加恤捐餘帑一百八十萬緡以代夏賦股肱郡視此特泰山之毫芒耳抑豈算沙能喻哉復畀木章粒斛結屋庇井親以冽泉扁之山靈川后俱賀其遭相與作證云公名與今兵部侍郎知臨安府淳祐二年清明日施清臣記石湖草堂記蔡羽吳山楞伽茶磨並緣於湖茶磨嶼為尤美北起行春橋南至紫薇村五步之內風景輒異是茶磨使之也上為拜郊臺下為越來溪緣溪曲折旋入山腹其林深黑治平寺也夫登不髙不足以盡江湖之量入不深不足以萃風烟之秀平湖之上環以羣峯之隂崖谷之間翳以數畞之竹於其所宜得而有之草堂泉石之位置造物者必有待也使無是堂則遊焉者不知其所領倦焉者不知其所休是湖與山終無歸也辛亥之秋今天子踐阼之初治平僧智曉方謀卜築事與緣合乃諸文士翕至贊助經畫不終朝而成明年改元嘉靖來主斯社爰自四月縮版盡六月九旬而三廡落成左帶平湖右繞羣巒負以茶磨拱以楞伽前䕃修竹後擁泉石映以嘉木絡以薜蘿翛然羣翠之表於是文先生徵仲題曰石湖草堂王子輩以記來屬夫湖之勝概尤萃於茶磨茶磨之勝以其能容深林而尤深於兹竹則是堂也勝將焉讓且地微人雖靈奚傳人微地雖髙奚發向也山猶是湖猶是竹猶是而遊不兼息息不兼遊人與地得無病今也林不加闢地不加深而湖山在函丈禽鳥在尊爼遊於是息於是暝觀霽覽集於是人與地不亦皆遭乎喜二者之遭作石湖草堂記石湖草堂後記形無大小在全其趣而己趣無古今在領之而己東南之形勝萃於吳其大者震澤洞庭穹窿鄧尉小者虎邱石湖為壤不同其為趣則一也禹貢所志周禮所載吳越居先孫錢居後髙人間氣騷士鍾靈故范蠡蟬蛻角皓鴻𡨕松陵發響白傅登臨矧兹近代之賢獨得於形迹之外者乎石湖范文穆歸休之地形視震澤百之一而趣自全當楞伽之北茶磨之南其岡可踰中半而作夫差之郊臺也緣臺而却還顧茶磨進退之間可以憩息治平之竹林也王子輩作草堂之四年為嘉靖丙戍二月余獲繫舟溪口休其楹訊其竹王子輩方攝卷散帙挹芬茹芳笑傲泉石陶寫風烟若將無事人世者然經綸獻納周孔之實用至於科第又細細也迹雖髙能遂忘乎以吳之勝湖得其小矣湖之勝竹得其小矣然而皆全焉湖之觀非楞伽之亭不獲盡至於風雨不侵人聲不至巖巒巉岏隂翠䝉翳暑多其凉雪多其煦晨作暮休飫心醉睇謂亭克盡之乎微是堂將無歸夫夫差騁其巔句踐鬬其下文穆館其間適意不同而皆有所領謂今日之領不在諸子吾不信也雖然堂之外山光水色萬象朝夕之變而己堂之內寒翠滿室而己若夫可以景得而不可以景窮者別有在也諸子當自知之自思益寺次楞伽寺作白居易朝從思益峰逰後晚到楞伽寺歇時照水姿容雖己老上山筋力未全衰行逢禪客多相問坐倚漁舟一自思猶去懸車十五載休官非早亦非遲楞伽寺張祜樓臺山半腹又此一經行樹隔夫差苑溪連句踐城上坡松徑澀深坐石池清况是西峰頂凄凉故國情楞伽寺晨起泛舟道中有懷許渾碧樹蒼蒼茂苑東佳期迢遞路何窮一聲山鳥曙雲外萬㸃水螢秋草中寺掩竹齊微有月棹移蘭渚淡無風欲知此路堪惆悵菱葉蓼花連渚宫題楞伽寺碧烟秋寺泛湖來水浸城根古樹摧盡日傷心人不見石榴花滿舊歌臺游石湖蘭若二首見心荷花蕩西湖水深上有蘭若當髙岑客吟時見猿鳥下僧定不聞鐘磬音雨餘秋林橘子熟雲落空澗棠梨隂閒來掃石坐竹裏靜與山人論素心五龍之峰雲作屏雙崖削出芙蓉青何人澗裏拾瑤草有客松間尋茯苓林風不驚虎卧石山雨忽來龍聽經吳王臺榭今寂寞秋香薜荔花冥冥題楞伽山寺壁髙啓惆悵空山裏寒梅應自開雪中何處覔須待雪晴來留題治平寺吳寬野岸艤舟楫登登扣禪關木杪望飛閣半依茶磨山翻嫌棟宇髙隔林見人寰石湖分一曲殿腳臨潺湲老僧閲梵語趺坐寒雲間不知城中人暫到非長閒棹歌答空谷沿流月中還初夏遊楞伽精舍皮日休越舼輕似萍漾漾出烟郭人聲漸踈曠天氣忽寥廓伊豫愜斯志有似劀􅂒瘼遇勝即夷猶逢幽且淹泊俄然棹深處虛無倚巖崿霜毫一道人引吾登龍閣當中見壽像欲禮光紛箔珠幡時相鏗恐是諸天樂樹杪見觚稜林端逢赬堊千尋井猶在萬祀靈不涸下通蛟人道水色黮而惡欲照六藏驚將窺百骸愕朅去山南嶺其險如卭笮悠然放吾興欲把青天摸紫藤垂罽珥紅荔懸纓絡蘚厚滑似漦峰尖利如鍔斯須到絶頂似愈漸離㸌一片太湖光只恐天漢落梅花脫綸帽乳水透芒屩嵐姿與波彩不動渾相著既不暇供應將何以酬酢却來穿竹徑似入青油幕穴恐水君開龕如鬼工鑿窮幽入兹院前楯臨巨壑遺畫龍奴獰殘香蟲篆薄禠魄窺玉鏡澄慮聞金鐸雲態共縈留鳥言相許諾古木勢如虺近之恐相蠚怒泉聲似激聞之意爭博時禽忽己默衆籟蕭然作遂令不羈性戀此如纒縛念彼上人者將生付寂寞曾無膚撓事肯把心源度胡為儒家流沒齒勤且恪沐猴本不冠未是謀生錯言行既異調栖遲亦同託願力儻不遺請作華林鶴和韻陸龜䝉吳都涵汀渚碧液浸郡郭微雨蕩春醉上下一清廓奇踪欲探討雲物先瘵瘼飄然蘭葉舟旋倚烟霞泊吟談亂篙櫓夢寐雜巘崿纎情不可逃洪筆難暫閣豈知楞伽㑹乃在山水箔金仙著書日世界名極樂薝蔔冠諸香琉璃代諸堊禽言經不輟象口川寧涸萬善峻為城巉巉扞羣惡清晨欲登造安得無自愕險穴駭坤牢髙籬挂天笮池容淡相向蛟怪如可摸苔蔽石髓根蒲差水心鍔嵐侵答摩髻日照狻猊絡仰首乍眩旋回眸更輝㸌簷端礙飛羽磴外浮碧落到迥解風襟臨幽濯雲屩塵機性非便靜境心可著自取海鷗知何煩尸祝酢峰圍震澤岸翠浪舞綃幕㶑灔豈堯遭㟞嵃非禹鑿潜聽鐘梵處別有松桂壑靄重燈不光泉寒網猶薄僮能躡古剎鳥貫親摐鐸服道身可遺乞閒心己諾人間亦何事萬態相毒蠚戰壘競髙深儒衣謾褒博宣尼名位達未必春秋作管氏包伯圖須人解其縛伊豫采樵者蓬藿方索寞近得風雅情聊將聖賢度多君富遒采識度兩清恪詎寵生滅詞肯教夷夏錯未為堯舜用且向烟霞託我亦擺塵埃他年附鴻鶴遊楞伽寺宋無蘿徑入蒼靄鐘聲來翠微招提在何許雲外一僧歸題石湖治平寺徐源青山湖上翠微深誰住僧家第一林暝樹蒼烟古時色劫灰飛盡尚如今讀書治平寺下院蔡羽水房虛繞竹石徑細生霞冬入經深雪春歸盡落花澗香來白鳥草緑鬬新茶久與交遊隔空踈類佛家宿治平僧房古寺雲依靜澄潭夕話長露隨花墮舄竹與月歸房懴悔知前誤恬愈喜夢凉晨鐘催棹發沙樹曉蒼蒼石湖草堂別履吉山深不見草堂晴何事紅燈竹裏明滄洲欲下十年夢禪榻驚啼半夜鶯曲曲巖房留客久悠悠雲水挂帆輕要知後㑹蓴絲早百合花前再定盟楞伽寺王寵雲竹素所愛山林道難忘荆蠻屹水府五湖㵼湯湯連峰枕其腹翠壁森開張流峙兩參錯南斗回文章絶境閟蘭若颯沓開雲堂星河挂北戶日月經其陽法雨不斷灑檀越紛成行時時吐虹霓下飲平波光風帆日如織寶筏度迷方道林更愛客文宴依松篁脫屣石苔滑科頭飛雪凉朱炎久蒸薄卧暍兩月强掃除洞虛白盥浴披天香回思隔朝市執熱渺相望首夏同諸君看竹石湖草堂四首掃竹天花墮看雲石鏡摩百年渾浪迹一月幾酣歌詞賦雕蟲拙山林習氣多角巾全不整長日卧藤蘿其二盤谷藏修竹虛堂吐白雲映空搖水碧面勢坼天文露頂參龍象冥心入鳥羣金繩如有覺寶地㑹平分其三烏皮聊隱几紫籜漫裁冠曝髮雲門嘯澄懷法界觀風花時㸃㸃竹樹靜珊珊直作匡山社金池繞絳壇其四酒聖能齊物鶯歌解損神雲霞千挺竹江海一畸人濩落遲聞道浮游得采真故山芝术在終不誤風塵新築石湖草堂山枕五湖水堂開千樹林棟梁天下任鸞鶴野人心獨插南峰秀平臨北斗侵吾生嚴邴慕灑酒一披襟其二蘿帶還初服山尊落草堂獻書長不達招隱得相將勒字芙蓉壁翻經紫翠房百年何自苦裘劍欲摧藏楞伽精舍話子重精舍橫開干竹林翠微隱瞰石湖隂隔窗雲霧窺青壁入戶山泉寫玉琴向秀真為攀鳯侶孔明聊作卧龍吟草衣木食吾徒事江海冥冥遲暮心夜燕石湖草堂風竹泠泠虛草堂春星厯厯淨琴張冥栖自許專丘壑痛飲寧辭典鷫鸘歌曲玲瓏花鳥恨舞衣飄沓薜蘿長十年獻賦頭蓬葆明發天台度石梁楞伽山栖山栖朝日蕩雲胸坐見桃花映逺峰黃鳥弄音睛靄靄碧天生媚水溶溶齊梁殿角丹青古吳越山河錦繡重謾說平生飛動意十年空聽上方鐘雨後泛湖過楞伽寺湖上羣峰環翠屛雨餘泉壑杳瓏玲鷗鳬故傍山人艇江漢誰占處士星野寺松杉叢古殿竹林風日淨虛㕔空山自結荷衣侶石榻來翻貝葉經散步楞伽諸院口占短句髙下禪房依碧山花枝羃厯鳥間關風光處處能牽惹野鶴孤雲不記年卒業治平寺示同志袁袠干祿游黌校卒業投山林山林從吾好文史可娛心我友粲華實輸衷踰斷金淨域寡營慮墳典共披尋嚶嚶和鳴鳥楊園流好音叢竹無俗氣嘉樹多清隂陶情託毫素遣興唯幽琴寂滅理無昧清虛念斯沉大道究𤣥覽物滓澄冲襟言示諸同好懇悃觀兹吟石湖草堂成即事書懷弱質弛耕牧幽悰眷丘壑章句非吾好狥物豈云樂工拙貴適己焉能縻好爵滅跡投蓬蒿養疴對山郭傾寫諧良知篇翰時間作兹山藴靈異新構果宿諾幽妙難具述烟霞殊丹雘經始寡人力垣墉謝築削叠石即故基傍巖無改鑿枌梓羅軒楹藤花布帷幕啓扉列岡巒抗館來衡霍暮春美遊遨即事多歡謔園桃舒紅英林篁包紫籜物序觀丰容深衷遂栖託隨時任偃息遺情永寂寞將貽匏瓜誚撫躬愧虛薄治平寺皇甫涍風中到香界獨往意泠然步引花木亂坐看洲島連一林寄空水滿院生雲烟坐此化心寂鐘聲松外傳同子魚風雨舟往治平寺顧璘伍胥城東月映樓越王橋下雨隨舟石湖噴薄魚龍氣水國沾濡鳥雀秋竹徑僧房人隱隱酒杯香篆夜悠悠平生白首相知侶對宿空山興轉幽治平禪寺化造竹亭疏唐寅竊聞調御大夫身無剎而不現嵗寒君子心體寂而長虛孰云草木之無知皆是龍神之擁護兹因治平禪寺構基南渡勝概東吳聖凡同所皈依河山鍾其秀麗莊嚴佛土孰云寸草不生回向塵勞便得六根清淨是以香嵒和尚擊節而悟空清平禪師指竿而說法意歆前輩僉發衷情謀建草亭翼輔蘭若波清池水足咏檀欒土地伽藍冥空鍳證撰兹尺牘用告大方開三徑以招賢看笋根之稚子種十箇以醫俗延林下之清風幸拾餘資共成勝事謹疏嘉靖壬午仲秋既望晉昌唐寅撰潁川陳淳書釋方正立石治平教寺在上方山下梁天監二年僧法鏡建舊名楞伽寺宋治平元年改今名寺有石井隋人刻字蓋楊素移郡橫山時也國朝嘉靖三十三年井復浚出吳都文粹續集卷三十一
