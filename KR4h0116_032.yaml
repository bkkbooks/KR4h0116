body:
  text: 吳都文粹續集卷三十二明錢穀撰寺院與客攜樂遊寶積山遂泛石湖髙啓雲山擁春郭煙花漲晴川看花入山中諸峰恣攀援客吹玉管笙合以金柱絃清音度碧嶂松風助泠然宛若鸞鳯吟要眇入紫煙行人盡矯首謂遇雲中仙下山興未闌相㩗更登船虹收嶺外雨鳥沒湖中天嵐翠破夕陽樓閣影倒懸酒傾緑脂膩鱠作瓊絲鮮獨恨無紅粧清波照嬋娟微風吹帆緩欲使歸途延衆賓起歡呼舟仄水浸舷回艫掠寺過楊柳山門前此地有離宫美人艷當年羅裙罷春舞草色餘芉綿况我昔此遊冠蓋十里連重來復誰在新知滿中筵人事竟若斯今古俱可憐能遊即稱達何須問愚賢我欲叫馮夷捧月出海邊醉後不歸去月照舟中眠寶積寺八咏謝縉清鏡閣平湖澄碧鑑虛閣瞰清波有月心同賞無風水自磨楞伽室楞伽千載室蘭若一函經為問看經者年來幾百齡青蓮峰影向湖波落青臨梵宇開上人趺坐日髙處作層臺白雲徑一徑蘿霏雜冥冥掃不開空中聞錫響知是有僧來雙冷泉碧甃寒相對瀠渟西復東不緣居一地那得兩心空翠微亭石徑穿雲去山亭傍路安坐來清潤積吟袂欲生寒先月樓層樓面滄海月出預能期想是憑闌處人間未見時玩古軒欲識古人趣當玩古人心古心既自得視古猶視今又八咏失名白雲徑迢迢白雲徑縈帶入山林未測通幽處氤氲幾里深翠微亭山當翠微半亭住白雲間分得千峰秀都留几席間清鏡閣髙閣登臨處平湖一鑑澄照心兼照影時有倚闌僧雙冷泉滋益功能並寒甘味更同只疑深坎底濳有一源通楞伽室髙僧栖息處閉戶讀楞伽山遠無人聽空中自雨花藏暉齋外物豈能昧有光中自韜莫期幽隱室昭晰見秋毫先月樓雲收山吐月樓迥獨先窺清景非偏照迷方見自遲青蓮峰亭亭青蓮峰何年自天闢雲散石湖邊干尋淨如植遊石湖寶積寺追和危太僕吳寬禪堂擁翠總雲岑誤認天平萬石林學士放歌來水曲道人偏袒坐松隂飲泉别澗多溪鹿啄木空山或野禽亦欲他年間倚棹繞湖風雨聽龍吟寶積寺在橫山下隋大業四年僧永光建今廢題橫山寺戴叔倫偶入橫山寺湖山景最幽露涵松翠濕風湧浪花浮老衲供茶碗斜陽送客舟自緣歸思促不得更遲留楞伽寺髙啓夕陽下西嶂返照東湖水來尋古寺遊楓葉秋幾里叩門山猿驚維馬林烏起鐘聲出煙去半落漁舟裏楞伽義未曉塵纍方自耻欲打塔碑銘從僧乞山紙同前周南老曳杖行春橋擬向招提宿路過橫山阿門挹湖光緑尋幽得清境探奇極遙矚山頭屹浮圖銘碑立蒼玉大業魏瑗書秀整殊不俗老眼為渠醒摩挲再三讀同前釋宗衍疊嶂來山尾平湖對寺門登危逾近郭望迥更連村客醉迷花畔樵歌坐樹根不煩留煮茗雨過井都渾送辰長老住橫山寺鄭嘉紫檀煙凝鶴回翔清磬泠泠出上方嵒畔異花薰講席澗邊修竹護禪房東林結社蓮初種南嶽分春茗乍香三伏炎蒸應不到緑蘿風灑石龕涼上方姚廣孝蓮宫據山杪岧嶤去天咫風香花雨新僧行白雲裏幽沉樹籟靜蕭散煙鐘起人登石路迷依依緣澗水遊上方小酌僧舍吳文度上方氣壓湖山勝老我登臨思惘然一鳥影沉秋水外千峯勢斷夕陽前青尊白髮酬今日畫舫珠簾記昔年獨倚危闌重弔吉荒臺樵唱起蒼煙上方山懷古錢復亂山髙下半雲裏曾築樓臺倚翠崕句踐有謀臣范蠡子胥無計佐夫差蒿萊滿目悲吳苑麋鹿成羣入館娃千載越來溪上路行人一顧一興懷踏莎行秋夕宿上方寺韓奕秋水平湖夕陽低樹扁舟還覔來時路到城料得幾多程停橈為欲尋僧去杳杳松蘿泠泠鐘鼓上方更在雲深處鬢絲禪榻話今宵從師要了無生句上方山樓春眺皇甫涍落日攀雙樹看山倚畫樓竹氛簷際合蘭色雨餘流疊嶂春爭入長天雁獨浮知豫干載意遙在五湖舟上方寺有浮圖在楞伽山上一名寶積寺一名橫山寺豈皆一寺蓋不可考但碑中云橫山蓋當時未有楞伽之名此山固橫山也與戴叔倫遊寶華山寺因宿陳基上冡桃塢原尋僧寶華麓舟泛石湖清茗煮􅀈泉緑山空木己落天髙氣彌肅松月有餘輝共向西齋宿宿寶華寺袁帙杪秋慘憭栗涉晨事猶豫川原殊氣候臨泛亦寡趣環堵淡澄潦平陸多荒霧水禽紛飛鳴葭葦蔓零露衝風揚夕波進帆趨廣渡雲霞異彩翠山麓眇昏暮栴林鬱岧嶤始與賞心遇丹楓冠陽阿興矚咸可賦月出照古澗蒼蒼隱寒樹法侶欣招邀禪寂夙有慕清曠屏氛雜沉冥覯良悟萬事徒龍蠖短謡輸情素寶華寺在寶華山舊名智顯禪院􅀈􅀈尊者嘗卓錫於此寺有􅀈􅀈泉太祖髙皇帝御製賜僧無念詩有序皇帝諭僧無念佛生西乾為淨飯國王既長悲憫衆生罪重嵬山愆深曠海因是有警於纍世因緣遂入雪山栖嵒屋樹六載道成歸演妙法天人感聽其所説也為戒生死解脫其釋伽之道靈通上下妙貫三界博破寰中此其所以尊稱大覺金仙者也邇來通靈侯祕奏知有僧無念者方今羣僧中是可謂神僧陛下可召會之於是即遣內臣帆舟星馳數日達京師即日面見朕目是僧雖壽有年其頂相巍然色聲俱偹者嗚呼自童子忘欲至於壽髙自受業而成人辭本師之席雲水寰中尋方問道謂髙名而不己方乃內觀噫身外無身戒外無戒在處有佛又何指方尋佛本性即佛佛外更何有佛佛外更尋他佛又何佛之有哉今無念定若河山戒照日月於斯之時獨出世界念僧他日脫去其名長壽如日月在天猶諸水所在有水無水皆水也豈不干江有水干江月萬里無雲萬里天嗚呼久同天地名垂不朽此無念者也從師童子問青玄世事茫茫學坐禪幻出漸知身是佛老來悟得性通天朱門不謁藏金錫茅屋幽栖飲碧泉召至九重談妙法問伊落魄幾經年覲畢歸舟舟行帆飽柁機圓船室堪栖老衲便兩岸樹摧風力健一江波湧蜃威宣邯鄲誰問黃粱夢少室渠參不二禪午夜雪山星忽見前三三是苦空年懷僧無念特賜松實詩有序朕於庶務隙中將世人心意較之是非折之兩端思之再三謀之不己其人之情意變態多端倏此倏彼是非混淆紛然難析朕閲人既多厯事且久尚不能治不善而安良於仁壽之域此果不師古而有此善耶抑人心不古而亦有此耶嗚呼靜觀熟慮人之情意殆至古今倏然忽焉反覆不常艱於治政古人有云犯刑憲如飲食嫉良善如仇隙信有之不誣也嘗聞西方有大聖人不教而自化不治而不亂此大覺金仙之道也朕於繁慮中觀踵佛之道者能如是快美哉出三界而不輪回神通妙用無礙於上下逍遙乎兩間出世者也前者僧無念戒律明於皎月定慧穩若丘山暫來一會去此常懷懷之不已遣人就見特以松實供之兼勞以詩志空五藴隱藤蘿深行由來積嵗多山鬼鑑知常擁護水神到處每撝訶戒如皎月天將説定若威嵬世欲歌幾度有時懷善者命賫松實詣盤陀賜僧無念用松實詩韻談空幽隱入煙蘿路合松苔嵗月多問道無門明五教進齋何處愛三訶殘經對月從容誦補衲朝陽自在歌似影山間真寂寞傳燈松下任坡陀與駱蘄州驥沈石田周馬清癡愈同遊玄墓是夜宿萬峰精舍因成十二韻徐有貞山水為吾癖平生不厭遊每迂康樂屐時泛米家舟石磴穿雲逺林扉入洞幽問途從野老結社集緇流自喜逢清世誰能免白頭夢空千代事吟破五湖秋嗜酒憐彭澤參禪悟趙州徑開招二仲亭構擬三休畫與天機會詩將險韻酬蠡應羞伯越良也幸封留邀月聊停盞臨風獨倚樓求仙間即是何必問羅浮山樓雨晴同諸公臨眺具區林屋景象天開遂成聨句湖上雨初晴分明見洞庭驥天光回映日山影倒含青有貞水鳥依清淺風帆度窈冥周酣來豪興發吹笛與龍聽愈和公素韻蘿徑縈回手倦攀上方只在白雲間鹿眠花下僧傳法鴉噪林前客扣關石澗流泉和梵響松梢落雪點衣斑欲知何處宜蟬蛻秋月娟娟水一灣寫畫贈別傳上人杜瓊欲尋間處遠登攀為愛山房又寫山好被山靈來笑我此生何事不能間入玄墓寺吳寬髙登鄧尉山遙入玄墓寺老僧具衣履出門迓豫至落落長松間一徑獨深邃鏜鞳鐘磬聲鳥雀少驚異仰面睇山腰殿宇危若墮長松掃清風修竹自為篲結夏四五人趺坐更無事樹密山果懸草深井泉祕旋登小樓幽洞庭正相值洋洋太湖波兀兀林屋翠始知衆山中此寺真畫笥昔聞萬峰老卓錫據此地道行既孤絶遺言有髙致化去動吳人金帛爭布施嵗久骨當朽遺容未全弊禪堂晝仍開向來乏供饋惟餘佳山水不改太古意磨崖紀勝遊吾當一題字玄墓寺王鼎馴鴉驚客散種竹與人齊春色間門靜泉聲就枕低兩山何似裂一劍不空提亦愛全身地誰能學馬啼春夕宿萬峰髙閣晨起留贈敬堂長老陳霽披雲上翠微春山縱芒屩和林變明姿菲菲陽卉灼濤驚風繞松泉鳴雨飛壑躡磴石多欹攀嵒葛猶弱空翠拂人衣覽之不可握荒基漫苔痕幽龕翳蘿幕巨浸窟潛蛟層崖樹巢鶴字古壁糢糊禪枯燈寂寞波遊揚素帆雲臥栖香閣眷兹山澤癯外物徒濩落紉蘭擷瓊英斸笋裁氷籜思逺境偏奇玄悟情無著願隨王子遊吹笙向寥廓過鄧尉山題天真上人新禪院王鏊手斫嵌嵒鄧尉濆五湖風月自平分鐘聲夜扣林間雨蜃氣朝橫嶺上雲慧眼又傳新法嗣幔幢曾折古魔君我來亦是尋常事信息誰教野鹿聞為懋上人題畫二絶徐禎卿渺渺洞庭秋水濶輕舟搖動碧琉璃松陵不隔東西望楓葉寒塘露酒旗布衣藤杖稱芒鞋貪看青山獨偶來心與白雲元不礙長天一鶴忽飛回錦上人西堂有作陸無蹇滿山微雨竹煙昏路轉桃羅又一村石燕避寒春落子籜龍驚暖夜添孫危峰壓殿天初迥缺沼當嵒水乍渾願向西堂分半榻禪翁莫厭客敲門宿遵上人房王寵山僧不厭客留我宿雲島藤蘿半銜日轉覺江山好古崖暗於墨平湖夜如縞遙望鏡中天萬象皆垂倒道人下山去為我摘芝草渴飲石榴羮飢餐鸚鵡稻石牀含雲㽔清寒逼人腦自非煙霞骨安能此投老明發又人間虎溪相送早和湯珍既登煙霞嶺因宿煙霞島日入羣動息嵒居更幽好泉鳴樹間琴月曵湖中縞雲軒夜生白萬想盡傾倒巡簷悉琪花匝地皆瑤草坐之緑竹牀飯以金蓮稻金偈靜降心寶薰清入腦始知名勝地偏與僧栖老一宿愧暫留晨光動林早贈味間長老顧鼎臣萬玉青林表依然見遠師貝靈翻葉葉蓮漏滴遲遲壽域添黃耉名山見白眉身心兩無礙自在到期頤憩萬峰寺徐縉憶別兹山二十年夢魂常繞白雲巔湖光山色如相待竹徑松堂亦可憐嬌鳥偏啼吟几外寒梅故放酒尊前洞庭西望煙波渺愧我時乘范蠡船宿玄墓寺碧照軒蔡羽親躡山中雲遙眠樹端閣開窗太湖來當几孤帆落步步玉青蔥曲曲徑盤錯愛倚千尺樹頻頓修廊腳兩點包山煙空黛真寂寞飛睇出雲外猶疑十洲薄翠石寒堪摩蒼藤老難斫羅衣濕山霧瓊水飲鍾酪幽緣苦不久一宿深自足同來虎溪遊留題在丘壑碧照軒皇甫涍森沈轉幽徑遠近含澄輝秋色引初曙孤軒當翠微玄言應虛籟宴坐發清機繕性從兹適丘中無重違題山偈釋時蔚玄髙向午面朝湖三鳯三龍天下無左右環盤前後濶此山真好立禪徒玄墓寺名聖恩菴在鄧尉山之南岡元至正間僧蔚萬峰自杭來止於此初蔚辭其師千巖請所往答曰汝名汝所止也及至鄧尉乞葉承三氏地結菴居之其徒大集鋪敘三十年遂成精藍為吳中名剎國朝洪武中僧普壽普隱永樂中僧智璿先後重建內有碧照軒今為勢家所有漸廢無考矣送僧還文殊菴劉昌袈裟何地更相逢一錫東歸隔萬峰松偃舊窗僧臘久花薰晴殿佛香濃空山晚叫巢雲鶴古洞春藏化雨龍定起有詩還自寫下方驚起夜深鐘文殊菴在金山東嶺以獅子山相對故名亦名金山寺元至正間僧時蔚建宿靈巖山戴叔倫馬疲盤道峻投宿入招提雨急山溪漲雲迷嶺樹低涼風來殿角赤日下天西偃腹虛簷外林空鳥恣啼靈巖寺張祜碧海西陵岸吳王此盛時山行今佛寺水見舊宫池亡國人遺恨空門事少悲聊當值僧語盡日把松枝靈巖寺范仲淹古來興廢一愁人白髮僧歸掩寺門越相煙波空去雁吳王宫闕半啼猿春風似舊花猶笑往事多遺石不言唯有延陵逃遁去清名髙節老乾坤靈巖寺趙鼎我為兹山好登臨到日曛巖幽餘暑雪鐘冷入秋雲篇咏唯僧助塵煩與俗分明朝入東棹因得識吾文靈巖寺周南老招提名秀峰昔吳館娃宮繁華頓消滅梵宇峩穹崇禪堂擁深翠虛閣涵遠空曾來西土僧繪像遺廡東赫靈示神異往來咸信從炯炯大智燈明光破羣蒙同前髙啓間上香臺望下方漁村樵塢盡蒼蒼傾城人遠苔生徑歸寺僧稀葉滿廊雲散池邊留塔影雨來閣外失湖光廢興皆幻何須問獨自吟詩送夕陽題靈巖一首兼簡載師長鮮于侁馬繁箠䇿車馳轂終嵗塵勞常碌碌喜聞巖寺並山鐘路轉清溪入幽谷乍行山口疑洞天窮深一上翻平田干層臺殿隱林木四面石壁生雲煙山僧迎門笑相揖為語祖師存往迹屈指於今八百年己在西來達摩前鶴鳴飛上黃金地錫杖湧起清涼泉境稱四絶名天下天台石橋乃其亞干峰不改嵗寒時一水最憐秋月夜半生逰學頗艱辛且向空山老此身也知方丈安禪處解笑東西南北人靈巖次庶子學士韻陳基岧嶤千仞頂髙閣倚空開竿叟栖禪處吳王避暑來汲清尋角井弔古上琴臺回首長洲苑層城擁翠埃靈巖石湖解纜日髙舂同上靈巖最上峰紺闕下臨波萬頃琴臺髙入翠千重客因弔古頻登閣僧為迎官誤擊鐘一碧五湖如鏡淨扁舟歸釣計難從遊靈巖三首周伯琦吳宫花草久為塵千仞空山嫵黛顰雲閣面湖春渺渺天池浸石碧粼粼諸侯互勝猶爭奕三世如來却現身白社楣間留秀氣清遊訪古及芳辰丹梯百折到松林連抱庭杉嵗月深永巷廊虛曾響屧荒岡臺古不聞琴蛾眉傾國悲生樂麈尾空談後視今山下良田川似剪一區那得老雲岑重遊己隔十三春纎緑嬌黃幾度新白髮無情添世態青山有約待詩人菜花間麥畦摛錦薜荔縈藤樹簇鱗香徑斜陽啼杜宇回舟圓月挂城闉靈巖山陳方客吳十五載始上靈巖山入門地如削憑險絶躋攀孰云念鄉國不復憂險艱回首楚與越茫茫一氣間向來朝會時自謂吞百蠻焉知王氣衰空忝禪栖間山川自瀟灑木石饒斕斑俯首萬里外浩歌風雨還題靈巖寺壁倪瓚我到靈巖古寺中雲煙樓閣鬱重重今朝醉到山前石留取綸巾挂偃松遊靈巖寺此山勝景玄賞舊逰今日皆非籃輿林間煙暝爛柯谷口忘歸靈巖寺曺禎青山臺閣共嵯峨玉輦曽於此地過洗硯池頭荒蘚合採香徑裏落花多英豪有恨嗟誰在嵗月無情奈老何欲問鴟夷舊蹤迹天風吹起太湖波又王珍谷口遙聞晚寺鐘又陪吟侶到山中半空樓閣干峯擁十里藤蘿一徑通松下白雲封丈室竹間流水響連筒笑豫好酒非陶令結社何慚覔逺公和况太守登靈巖韻談震騎馬看山度水涯楓林紅葉醉霜華欲窮西子曽遊處踏遍蒼苔一徑斜路轉峰回石磴遙花容含露濕宫袍涵空閣畔登臨處水色山光景倍饒登髙正值菊花時借榻禪房共鶴栖范蠡不來西子去五湖煙雨望中迷登靈巖寺劉珏攀盡藤蘿躡盡雲上方才到又斜曛花空越女曾遊徑草沒蘄王舊葬墳往事不須逰客嘆名山却與老僧分浩歌歸去扶殘醉驚起松梢幾鶴羣遊靈巖遇雨次日至靈巖晴沈周己向靈巖雨裏行靈巖天肯放新晴却從昨日論今日道是無情還有情花下得追佳酒伴石頭多認舊題名人生樂地休輕別況此春明與太平陪計常熟遊靈巖伯業消沉突此峰使車登覽夕陽中衣沾雲氣疑身舉酒挹湖光覺眼空翠雨屧廊苔匼匝緑隂琴石樹玲瓏下山更弔蘄王墓十丈穹碑萬古忠次韻計宗道直上靈巖第幾峰湖山煙景醉眸中吳王寵幸千金地宫殿嵯峩一炬空古井湧泉甘冷冽方池印月碧玲瓏豪華己盡徒興慨酹此椒漿弔世忠靈巖寺虞謙來訪中吳第一峰石林髙聳梵王宫靈巖雨過千山碧香徑花飄十里紅步轉長廊空響屧客來深院喜聞鐘抱琴更與凌髙頂回首姑蘇夕照中次韻陳穎石磴穿雲入亂峰松隂停騎扣禪宫屧廊芳草人何在香徑春風花自紅千古琴臺空對月六時花雨但聞鐘危闌俯瞰平湖近一曲漁歌感慨中靈巖寺徐珵靈巖佳境古禪宫殿塔嵯峨透碧空天際湖山蒼霧裡林間茅店彩霞中猿哀絶頂琴臺月鶴唳西施洞口風昔日香魂何處覔惟存餘景見遺蹤遊靈巖邱霽衝風冒雨費躋攀豈是肩輿愛看山蘄國中興猶有册宋家南去不知還穹碑剝落煙霏外孤塜荒涼草莽間千古英雄有遺恨九泉羞澀懦夫顔同前趙同魯靈巖臺殿古離宫今日繁華事不同嘗膽計成歌舞散捧心人去綺羅空夕陽荒草幽栖處剩水殘山感慨中一段興亡誰管領野花啼鳥自春風同前聶大年迢迢曲徑接平沙一上香臺望眼賒幽澗泉渾初過鹿髙林巢動亂歸雅白雲洞裏神仙境緑樹隂中釋子家下有田園千萬頃穰穰禾黍間桑麻同前杜庠間將往事問田夫越國兵戈入戰圖不待館娃歌舞散知機范蠡己歸湖同前伊乘未愜登臨趣兼懷悵望心洞逰環珮逺寺掩薜蘿深吳越有興廢河山自古今松風臺上起猶似韻清琴送僧住靈巖王汝玉百花深處寺猶指舊吳宫事往人何在香消徑己空今朝送師去兹地闡宗風別意兼鄉思依依雲樹東送僧瀚海住靈巖寺張適靈巖古招提飛閣涵太空我昔登其上題詩碧雲中琴滋松蘿雨衣含澗谷風訪古思耿耿感時心沖沖於焉送吾子因之尋舊蹤境空亂天花林深響鳴鐘車行渡石橋僧候依巖松喜子道門秀應能振禪宗靈巖懷古劉纓官身在告無他事故國佳山得肆遊畫舸春風開碧水皂輿晴日上丹丘飲能從量緣多病句不驚人亦起羞夢幻世情何足較嶺雲溪月自悠悠訪靈巖住持僧一元賀元忠一上靈巖感廢興蒼茫雲樹更含情吳王宫闕空遺址智積禪林却擅名香徑有蹤疑學步琴臺絶響似希聲悠悠塵世驚千載得繼前修數幾僧次韻遊靈巖楊循吉巖陽草木本芳幽更有寒泉相繞流學道豈須勞乞鑑入山何用待封留東峰西嶺芒鞋下明月清風挂杖頭回首古人皆不見休因越喜為吳羞題靈巖鄺璠靈巖突兀碧雲橫嘯倚巔巒百怪驚極目乾坤些子大俯身霄漢一毫輕研池墨洗天潢水琴石絃飛山雨聲莫漫乘槎犯牛斗好依紅日庇蒼生靈巖懷古次劉丈纓韻孫磐簿書堆裏抽身出來侍先生山水遊預辦尊罍供小宴敬從杖履上髙丘皇圖浩蕩乾坤古伯業凄涼草樹羞入夜遐觀更奇絶一輪氷鑑自悠悠靈巖唐寅山鬼踉蹌佛殿荒老僧指點説吳王銀瓶物化餘石井柿葉秋深滿屧廊地下有魂悲藥劍草間無處問梅梁伯圖零落何須問越國如今也鹿場經靈巖謝琛靈巖之山插天起山巔吳宮遺故址琴臺石井尚依然不見華筵歌皓齒春風夜靜松濤鳴步屧猶疑環珮聲玉叉斜處干戈伏苧蘿之女傾人城江頭古廟蒼煙裏伏劍寃哉子胥死讒言誤國賊忠良當時忍心太宰嚭英雄一去霸業傾卧薪嘗膽人成名文臺宴罷君王樂長頸烏喙謀臣驚玉顔芻狗真成比載入扁舟泛湖水留得空山夜月明蜀鵑叫碎吳人耳欲將興廢問山靈野草年年春自生吳亡越霸今何在慨我千秋萬古情和韻于範湖畔羣山伏且起突兀髙峰餘故址行臺有約偶登臨小徑落花印屐齒吳宫不見山鳥鳴管絃化作風雨聲當年尤物貯金屋君王無意在江城相逢猶恐夢寐裏願與蛾眉共生死粉黛叢中伯業消不必借劍斬宰嚭麋鹿遊時臺己傾館娃猶存舊日名會稽塵埃亦己久尋常興廢何須驚吳下新醅琥珀比芳草遙映春江水會飲况復盡人豪不學巢由浪洗耳題詩笑我愧山靈負却巖花爛漫生豪吟幸有臨川手寫盡興亡萬古情靈巖歌徐縉當昔靈巖繁盛時吳王曽此宴西施西施洞口傾城姿管絃歌舞日相隨琴臺冉冉煙花滿香徑紛紛蘭蕙滋一朝樂極欻生悲越國兵來那得知臺上空憐走麋鹿江頭却恨投鴟夷離宫別館今塵迹露井殘碑半湮沒梵宇蕭條山欲頽見此空為人太息我來日暮松風生獨立荒丘山月明不緣興廢重回首秪為英雄一愴神遊靈巖歌顧鼎臣鐵冠使者江海士及瓜己了公家事地官分司得清暇玉堂散吏亦相值追陪李郭飛仙艗曉泛春遊真偶爾姑胥浩蕩開天景重湖碧峰七十二浮沉瀲灧各生態黛髻銀盤繪屏几古木幽沉伍相祠寒食何人薦芳芷吳子么麼輕戰鬬霸業未成謀士死長城豈待玉顔傾故國波生劍光紫扁舟越蠡戒前轍矯矯冥鴻近煙水英雄得喪兩安在俯仰乾坤堪一涕湖山羣木羅紫煙靈巖疊巘開青蓮小輿伊軋松林午髙情直擬山之巔山肴蔬筍雜綺食鬱金美酒搖舲船哨壺羽箭兼勝賞亦有鳯槽和鵾絃山僧指點因借問館娃舊迹今茫然琴臺草長迷香砌古井苔花浸乳泉銀床寶柱歸何處屧廊施洞名空傳當年粉黛皆尤物就中西子飄雲仙怪石如人寂無語曾按瓊筵聽歌舞美人進酒甘如飴不道降王嘗膽苦前山髙臺凌杳冥鏤金為梁玉為柱朝朝暮暮恣行樂臺土未乾麋鹿聚興亡豈獨悲吳越秦宫漢苑皆蕪沒驕淫無度忘殷鑑山河王氣終消歇我曹撫此百感生欲勸主人為曲突吁嗟富貴能幾何電掣漚消真欻忽共君及時且行樂趂取春光明緑髮林深壑杳不可留落日蒼蒼灝氣浮鳴騶歸路非吾願興在晴沙雙白鷗急流解組何年是掉頭不共妻孥謀縹眇峰前聊卜築清泠淵上重夷猶汗漫尋山遍五嶽赤虬黃鶴歸滄洲東風吹破眼前夢天際浮雲千古愁登靈巖贈住持僧雲谷祝允明尋常一種無心物偏與空門法味俱任爾深藏或呈露本來面目自如如登靈巖林庭㭿春日肩輿野外行緑雲髙下晚禾成愁顔剛為貧民解鄉思偏於久客生沙鳥向人如欲語山花過眼不知名我來豈為耽遊樂欲採豳風奏舜廷同前陳璚靈巖千古館娃宫事往名存感慨中形勝當年風景在繁華瞥眼霸圖空春歸香徑遊林鹿月上琴臺起寺鐘老子酣逰挂冠日一畨間咏付東風靈巖懷古朱兖矗矗湖上峰逺近各含態何必躡兹巖酸風入人肺金碧想故宫歌舞花叢叢吳王樂極時胥骨流江中越山兵馬雄前溪是來處色艷霸氣消腹心向誰慮琴臺雲故散香徑春仍榮湖風激洞庭遺恨殊未平誰招麋鹿羣日繞西施洞娟娟井中月照破千秋夢遊靈巖髙第靈巖下白日萬井動秋風衲子坐煙島田家收嵗功淡雲浮世外清磬落霞中我亦躬耕者蕭然野思通靈巖訪古吳一鵬名山只在郡城西細草青青路不迷訪古却尋僧作伴凌空聊借石為梯峰頭日漏雲初破洞口春歸鳥自啼風景撩人杯入手興豪何惜醉如泥其二絶頂登時暑氣無羣山環拱一峰孤馭風倣佛來仙侶入眼分明列畫圖巨井似潭深貯月逺涇如箭直通湖勝遊繼此真非易休訪留連到日晡靈巖寺陸俸霸主餘基禮佛壇愁心落日倚闌干猿啼洞口煙蘿暝僧掃階前木葉乾麋鹿自遊孤月曉魚龍欲動五湖寒東風不管興亡恨吹遍梅花萬樹攢靈巖寺上方宋無霸業消沉煙樹濃吳王臺榭梵王宫屧廊人去土花碧香徑僧歸秋葉紅颶母射巖風動地蛟精徙穴霧迷空明朝江郭重回首寺在翠微蒼靄中涵空閣髙啓滚滚波濤漠漠天曲欄髙棟此山巔置身直在浮雲上縱目長過去鳥前數杵秋聲荒苑樹一帆暝色太湖船老僧不識興亡恨只向遊人説往年同前陳育層構峰頭切太青憑闌恍若遇仙靈窗開俯挹西湖水簷聳髙懸北斗星足底浮雲生冉冉目中飛鳥去冥冥百年塵海須臾事誰得身間幾度登靈巖禪寺永樂中燬𢎞治間重建今復燬惟存一殿與塔耳尹山寺東菴王汝玉地湧琉璃界天開翡翠林那知近湫隘誰意得幽尋日麗花臺迥雲橫巨闕深紺園浮露彩琪樹帶春隂玉澗珠泉滴丹窗緑嶂臨梵王紅錦服仙女碧瑤簪金作山龍甲朱為海鳥襟鳴鐘驚雉舞講法引猿吟境靜塵難染機深慮不侵願因清淨力從此識真心尹山寺夜咏楊循吉離城至此二十里翻作遲遲半日行古寺夜投僧盡出空廊獨步月初明學披梵策言生澀借浴芳泉體潔清僮僕不諳禪默相翻憐無侶話羈情尹山精舍王寵古殿深巖曲朱門碧水開鈴聲衝鳥落幢影拂雲回院入斜丹檻賓迎滑蘚苔東來車馬道聊爾滌塵埃崇福教寺在長洲縣三十一都尹山故稱尹山寺梁天監二年僧左律建國朝洪武初名僧永隆常住此隆乞焚身度天下沙門春日與王卿放舟出陳湖東登大覺寺張適曉日滄江踏釣舟為來林下訪湯休松間老鶴同僧立栁外間蜂趂客遊半屋雲隂分夜榻一池月色蕩春流髙深堂上多清供琴罷香生夢亦幽宿東明禪院吳寬東明院裏曽投宿偶見前題一慨然欹枕亂蛩如昨夜入門髙樹却多年季方不與元方在小郎還同大郎賢何處玉笙吹未歇山扉新月照人眠和李應禎孤舟出熟秋雨晴如風半日到姚城故人天上新沾祿衲子山中舊識名春日暮雲無限思爐薰茗碗有餘清一夜寒生眠未穩夢回時聽海潮聲大覺禪寺在長洲縣二十七都大姚山梁天監間僧道邦建寺有東明禪院最為幽勝宿天宫寺陸容間遊三日滯天宫窘步西齋雨又風睡起牀頭書帙亂興來牆角酒瓶空冥濛野色迎寒碧狼籍春痕弔落紅別後只應如杜老袈裟棋局念旻公再至和前韻此度停橈入梵宫橘花香裏坐薰風間心頗為江山奪實理元非夢幻空雲隱小窗禪榻靜日斜深殿佛燈紅留題欲和鴻泥句誰復才情似長公天宫教寺在胥山南太湖之濱梁天監三年僧汰雲開山唐德宗時重建宋天聖中重修進士張汴記昭明寺記虞集吳中多古佛寺往往有蕭梁遺迹郡城西四十里曰錦峰之昭明寺相傳以為昭明太子所建故曰昭明或曰錦峰之山産文石中為用器華采炫爛故有是名或曰其寺中據沃壤羣山如屏如翼去寺皆逺無所障蔽其稱昭明之名此殆是也然而不見於郡志豈會昌沙汰之後日就頽廢修志時泯沒不聞故耶宋嘉泰中里人周氏子為僧住穹窿白馬寺曰南公歸省其父父曰吾老矣汝毋逺離南乃即昭明故址葺之以居辛苦勸乞周父又以其財力助之己而施與者日至厯數十年法堂僧堂厨庫粗備土田稍為人所侵有者以漸來復其子本立實相其事南沒立躬任作勞思成南之志益殖美壤作佛殿門廡方丈之室度弟子九人約以次相繼嗣主院事至元中執事浸用懈惰遂以中微南公之願力幾息矣一真始出乎其間大有以充闢之山林廣袤而林木足用土田易治而供糗有餘矣屋宇華麗內固外完其計慮久逺者日以周備矣昔之處此者不知有紀述以待來者是以數起數僨相尋於數百年之間而莫之有定獨真公知以此為意亦自其積之不易而成之不可忘也噫為佛者之初固不以植生營業為務然而四方名勝之處或困於主者之不一徒衆之集乃至失其所依曾不若世繼而守之者之為逺也然而得其人則易以興不得其人則易以衰物理之實然豈特昭明而己哉然則真公欲為記之也宜矣豫之先隴在吳者與其寺相望為鄰故不辭而為之書錦峰舊有宋穆親書賜貴臣之家者今留昭明寺云年月日虞集記懷陳寅山人時居西山昭明寺作髙啓間看西澗月秋閣與僧開正是相思夜鐘聲君處來昭明寺陳基山居有餘樂縱遊良不孤生多濟勝具豈辭足力劬處處青蓮座人人僧寶珠雨花無宿蒂玉樹盡增株勞生局形迹矯首謾踟蹰昭明教院在吳縣錦峰山相傳為昭明太子所建或謂山産文石故名然不可考矣唐會昌中廢宋嘉泰中白馬寺僧南公重建宋理宗書賜鄭起潛錦峰二字藏寺中光福舍利塔記崔鵬式觀元始眇覿玄風夏巢冬穴之時茹毛飲血之世一寒一暑一隂一陽其道雖分萬彚猶渾逮乎伏羲氏之王天下也始畫八卦造書契由是文籍生焉然後厯堯舜至周孔由是釋像興焉及乎東被大漢尤加崇飾按牟子云佛生西竺假形王家即其生也又拂衣雙樹脫迹金沙即其滅也雖然示生滅之相詎加恍惚之道何異經巨海者終年不見其涯測虞淵者畢世不知其底吾以此觀之佛理不可盡也若夫舍利者即金人之遺骨堅剛不壞變化自然西天敬之立為塔廟昔育王見而不信吳王修以效虔迤邐南移年代頗久大哉寂滅之理豈一魯男子能探其藴乎余素不留心略為敘事故經云若能起塔供養皆獲福田此乃聖教所談事豈虛謬固知為善者天報以福為非者天報以殃雖則玄妙難求而實精專可驗光福寺者即梁九真太守顧氏之家山也士有惡嫌塵網種植善根遂捨林泉建兹佛剎立寺之始斯其由起焉銀闕移來洪波架出碧岫孤聳青天下臨勝壓洞庭勢控吳苑上止斗牛之宿旁連太伯之墟何必鼇負蓬萊龍蟠閬苑歇樵翁于片石卧禪子於幽林草樹麗而攢花杉蘿深而蔽日長松古柏緣情無塵世之機逺岫平湖舉目入畫屏之色其僧自相謂曰此之靈境爰有上方可以建立亭臺而莊嚴塔廟既而不日不月其功就焉斯塔也梁大同之中建矣唐會昌之末燬焉興廢之由是其一也然則基址雖在而乃煙蘿以荒於時咸通中興天子明睿四方清平野人入朝賢士出世維我吳郡之興一也鸞鳯異態龍虎殊姿嘯傲誰同孤髙自得雪霜徒侵碧松色塵埃難染白璧光嚴陵卧時國乏賢良鄭均升時位齊卿相魚腸之劍利斷鯨鯤龍頷之珠光浮日月燒金屑玉間邀蓬島之仙釣月歌風隱笑武陵之客公不惟優遊儒籍兼亦探奧釋門故儒則素王間生於釋乃金人謫下則知人情難及智用全殊每登山而踟蹰因驚塔之荒毁是斯塔之將興一也方景運中天聖德遐被慈心博施行是日之堯風徵當時之漢夢于是三寶起迹十方歸心布金秪園圖像花界今者又澄清域外鏡朗天衢金柯開鼇背之花寶位乾銀河之浪玉潢丹甑坐分瑞應之符樵子漁翁眠唱太平之曲乃遇我公道窮生滅心達苦空信塵劫之迷途悟法門之了性追吾家之舊迹再葺蓮花護吾佛之真身重修寶塔然後增基表剎剃草開林剪荆棘而雲平列松杉而洞出時維三月節屬九春鶯吟風而千般草垂巖而萬種建金棺而心動羅寶蓋而雲隂緇徒共瞻士籍咸悅芙蓉座上飄三界之異香薝萄花園沛諸天之法雨是時也祥雲結綵氛氳於行道之壇慧日澄華照耀於燃燈之位公乃覩相生善至誠感神遂發善心爰命工者於是依憑氣象結構規模初標覆簣之蹤漸著凌雲之勢亦有飛閣周繞回廊接連石工呈奇巧之才梓匠設雕鏤之妙壯觀而龍蹲虎踞巍峩而仙掌蓮峰丹柱屹而星攢雕梁赩而虹指掩映而如蜃吐崚嶒而欲鵬飛不踰一年工築就畢斯狀也險體千仭髙標七層凝然中峙又若神助上穿霄漢下壓雲根豈劍閣之能齊比爐峰而尚峻鶴歸天而一駐雲收霽而半開發郢客之詩情壯吳宮之地勢金輪縹眇亞日月以髙明雁像參差拂虹霓而若動偉哉塔之美也其功杳莫繼焉至若遊人訪景淑女尋春入幽徑而攀蘿步晴崖而拾翠巢鳥映葉嵐煙惹衣苔鋪石而霞斑花映峰而綺合髙瞻闤闠千家之臺榭龜文迥瞰林巒四面之波濤練色爾乃金飈屆節玉露催寒何用悲秋正堪憑檻天朗而雲霞弄錦風髙而松篠張琴蒹葭之浦上漁歌蒲蓼之汀邊雁影疊浪裁古人之素羣山鬬少婦之眉開謝客之愁襟抒休公之佳咏松間踈韻伴髙鳥而飛來湖上輕煙映孤帆而掠去斯景也非公不能領矣斯塔也非公不能創焉時有住持僧道居文瓚崇建寺皆以髙空皎月深谷奇松挂衣錫而雲間卧煙霞而鶴瘦真宗真理金言積于情田無垢無塵玉蓮生於淨土且鄙人識比求劍材非利錐焚香敢憚其冥搜捫燭常慚於未達辛苦十載每思蚊夢之徵摶躍九衢頗有龍門之志曾勞閉戶何啻仲舒之三年誰念無家更甚相如之四壁惟公不捐質微詞陋命作斯文操觚長吟永日忘輟何以著公之美大播芳風詞曰皇唐之世運啓千秋産公之才當代風流荆聶之氣金張之儔但樂風月不干王侯英明少年卓犖公子傲貴忘榮時人鶚視洞天常開春風不起金谷看花玉堂攜妓南山積石北溟揚波紀公之德未足為多年月日唐崔鵬記光福寺在吳縣鄧尉山龜峰上梁大同間建寺有舍利塔奉慈菴吳寬野寺堪逃暑登登逺扣關林深長礙樹路轉又逢山石鉢分中飯雲房借半間玉茶花落盡坐撫不知還奉慈菴在玄墓山麓宋靖國元年僧明昕建賦得寒山寺送別髙啓楓橋西望碧山微寺對寒江獨掩扉船裏鐘聲催客起塔中燈照逺僧歸漁村寂寂孤煙近官路蕭蕭衆葉稀須記姑蘇城外酒烏啼時節送君違寒山寺胡纘宗牢落寒山寺鐘聲自往年海風臨客枕江火傍漁船不聽禪心寂偏聞旅思懸誰家管絃急歡笑玉樓邊送僧道性往寒山寺劉溥寒山寺近闔閭城老衲分燈向此行地接楓橋江市逺林開松殿野雲平身經暮雨三衣重影度秋湖一鉢輕後夜相思何處是滿天霜月更鐘聲陪元侍御遊支硎寺劉長卿支公去己久寂寞龍華會古木閉空山蒼然暮相對林巒非一狀水石有餘態密竹藏晦明羣峰爭向背峰峰對落日步步餘青靄香氣空翠中猿聲暮雲外留連南臺客想像西方內因逐溪水還觀心兩無礙宿支硎山房僧皎然上方精舍逺共宿白雲端寂寞千峰夜蕭條萬木寒山光露下見松色月中看却與西林別歸心即欲闌支公詩支公養馬復養鶴率性無機多脫略天生支公與凡異凡情不到支公地得道由來天上仙為僧却下人間寺道家諸子論自然此公惟許逍遙萹山隂詩友喧四座佳句縱橫不廢禪贈支硎山南峰僧皮日休雲侵壞衲重偎肩不下南峰不計年池裏羣魚曾受戒林間孤鶴欲參禪雞頭竹上開危徑鴨腳花中擲廢泉無限吳都堪賞事何如來此看僧眠和韻陸龜蒙眉毫霜細欲垂肩自説初栖海嶽年萬壑煙霞秋後到一林風雨夜深禪時翻貝葉添新藏間插松枝護小泉好是清冬無外事匡牀齋罷向陽眠平雲閣范成大背倚天峰湧化宫橫空閣道卧雙虹火雲六月應奇絶青瑣玲瓏八面風鐵杖攴道林遺物八環流韻寶枝鳴古鐵無花紫翠明莫遣間人容易振泉飛石落鬼神驚金沙沙中麩金色取煉多不成莊嚴福地守靈仙不為人間計子錢一掬斕斒光照眼路旁饞𨽻枉流涎遊南峰寺有支遁放鶴亭髙啓每向人間望碧峰石門今得問幽蹤路緣風磴泠泠策寺隔煙蘿杳杳鐘窗下鳥來多墮果亭前鶴去只髙松一龕願借依香火莫道詩人非戴顒支硎山十三咏姚廣孝支硎山南峰一何髙東峰一何壯惟有定餘僧時來泉石上報恩寺舊寺煙霞裡經營東晉時支郎今不見令我起遐思南池秋深水更清遊鱗手可摝後來觀咏人誰能繼皮陸石室窈窈環蒼石隂隂覆白雲夜深僧入定鐘磬寂無聲八隅泉池風回波不動葉落樹無聲却憐清徹底有誰來濯纓寒泉涓涓石上流和雲白于汞間來試一勺令人毛骨竦石門曉際神龍出宵分猛虎衝白雲開復閉蒼蘚剝還封馬迹石堪笑支道林愛馬却成癖飛走石苔間干年尚留迹南峰竦立去城遙嵐霏近午消奇形常照日雄勢獨凌霄待月嶺盤盤去谷逺矗矗出林危過樵常待月不管到家遲碧琳泉壁間瑪瑙紅澗底琅玕碧童子為煎茶山瓢汲還滌放鶴亭隱隱巖髙處空亭杳靄間神僧去不返空望鶴飛還牛頭峰羣山不同髙一峰嵐翠沍縹眇白雲間惟見牛頭露支硎山十二咏謝縉楞伽院楞伽開靜域聞自道林興山水清佳處由來半屬僧南池平池澄曉鑑虛閣涵秋月時有煉形人間來照鬚髮石室寒逼禪僧定涼醒醉客眠戶樞從不螙嵗月任推遷八隅泉池鑿石破蒼苔青天地底來夜深寒月映疑是曉奩開石門峭壁擁雙扉亭亭來翠微山靈雖解説不禁白雲飛寒泉空壑積隂晦層崖沍氷雪下有清冷泉終年流不歇馬迹石追風蹄似鐵留迹向山深神力猶呵護苔痕不敢侵南峰月出衆山窅月落衆山黑朝來捲幔看氣勢凌秋色待月嶺詩人一壺酒待月升東嶺松壑起濤聲山風吹月影碧琳泉涓涓清澗中長洗山僧鉢還將鉢盛去㵼向玻璃滑放鶴亭久養籠中鶴如何却放歸不知初放日曾别主人非牛頭峯頭角昂藏出經春卧夕曛無人來問喘噓氣自成雲同前沈大本楞伽院林中禪寂地古木叢青靄當年結屋人惆悵今何在南池丙穴暗泉通清漪浸碧空白蓮秋未老魚戲葉西東石室鑿石容趺坐還將石作牀山中當夏日此處獨清涼八隅泉池不作方圓甃池形似塔形雲光來復去孤影湛渟渟石門設户防來往兩崖相對青山僧無一物入夜不須扃寒泉飲來如雪味入口帶天香流出空山去能令大地涼馬迹石支公有駿馬已騁千里道留迹在空山猶戀山中草南峰回峰帶秋色蒼翠聳晴昊澗底有寒梅年年看花早待月嶺入谷路己昏逺寺鐘聲歇煙中人語喧歸樵待明月碧琳泉泉流苔石下瀠渟映空碧上有踈篁枝蒼蒼同一色放鶴亭放鶴人何在孤亭橫翠微客來亭上坐惟見白雲飛牛頭峰懶隨年共化獨坐空山裏時有牧童來長鞭驅不起初春山居還城却寄支硎僧院一律揚循吉好山不著詩人句辜負浮嵐翠滿空梅子蛻花春事半雨聲追冷昨宵中來尋茗碗梯幽閣却上籃輿别逺公白髮漸添身老大何緣追興逐東風吳都文粹續集卷三十二
