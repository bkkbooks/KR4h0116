緑芰題宋仲温竹枝倪瓚畫竹清脩數宋君春風春雨洗黃塵小忩夜月留清影想見虚心不俗人題故友楊孟載畫竹張雨數葉蕭蕭洗俗塵人雖物故墨猶新故人清瘦原如竹見竹何殊見故人楊孟載畫竹徐賁江南看竹不為罕水村山郭常栽滿東里千竿繞佛亭西隣萬本連書舘宻葉分隂小閣深斜枝度影虚簾短蕭疎夜月翠羽凉搖曵南風鳥聲暖嗟余好竹處處逰徑造豈減王猷誕湘江淇水無不到嶰谷柯亭亦常欵人間音律性所好収作鸞笙與鳳管或裁文籜製小冠時尋新笋供清饌朝行竹下暮仍往自謂行縁終不斷朅來寒苦并州地沙土撲面心煩懣寜無塞艸共山花惟覺粗疎俗吾眼胸中塵氣久矣積對此汾河詎能澣君心飽有渭川思揮洒風烟意閒散封圖逺送邀我題措語苦澁顔何赧題張來儀畫次髙季廸韵徐賁萬水更千岑朝晴又暮隂猿聲風出樹虎跡雪團林酒具逰曽遍詩材思更深相看畫中客不異共行吟題故友張羽金華山居圖姚廣孝張君留侯孫㳺心在雲山飄飄神仙姿濁世孰可攀廿年不相見或云鬢成斑豈期歘長往墓土埋黃管幽明既夐絶何由聞珮環死生知有數大丹空九還縱成千歳翁寜出虚無間爭如尋竺仙為叩黃龍關二法不可學且須遵孔顔張來儀楚江清曉圖呉寛江州失守遺空宅避難來為吳地客當年北郭擅才名若比唐人是張籍社中四傑知為誰楊炯徐陵暨髙適感時無事相倡和嵗久家家有詩冊呉地非無禄可干直氣填胸羞枉尺筆端奬借意何深試與諸賢題墓石幸逢世道輯干戈山谷遺民總徴辟自信容臺不負丞初行重典難逃責炎荒不及江流清懷沙賦就髯如㦸傷哉社友誰復存霅上孤墳少松栢莆陽朱君㳺宦來得此橫圖殊愛惜登堂示我實失驚展巻茫然為離席此老能詩夙所知丹青豈料居髙格米狂餘事巳盡傳王宰何人敢相廹墨痕流動淡且濃紙上斑斑皆手蹟日光雲氣蕩欲開最愛層層楚山碧竹忩疎雨助新凉坐我扁舟沿七澤更將八詠當棹歌直下龍江酹仙魄題徐幼文畫張羽溪路過橋分晴山自少雲茒堂逺相訪憶似我迎君徐幼文蕭山古寺圖費景祥索題山人手持酒一巵長跪向我求新詩自言此畫君所識乃是河南使君之所為砅崕怒瀑形崛竒天門閣道相因依中有臺殿橫天梯金繩碧瓦光參差使君當年作此時祗是昻藏一布衣豪雄意氣今巳極圖畫應知得者稀右丞輞川不易致此公名位豈卑㣲請語世上悠悠者人生貧賤安可欺金文鼎秋山醉歸圖劉溥霜華灑紅樹頭葉白雲掩映山重疊黃犍駝醉出西莊童僕扶持穏如楫此時陶然那復知世途奚較險與夷眼中萬物一何有只有松風吹接䍦疎林斜光漏殘照酡顔霞影爭輝耀深山閒静不逢人豈有襄陽小兒笑柴門向晩猶未關山妻煮茶方候還人能出飲醉即返千里龍媒應是閒次杜東原與甥魏公美詩畫韻沈周蒼蒼筆力似荆關白髪圖書老不閒未許羊曇乞西墅畫中分與舊溪山題張儀制所藏杜月嘉畫李東陽聞説當年杜陵老老來詩畫滿江干青林白屋蕭條在每到東曹一借看杜東原畫呉寛曽過杜老宅不見舊林亭此日看圖畫多年失典型古藤垂地紫弱柳映門青彷彿當時意吾衰鬢巳星仲昭竹為韓侍御雍題李時勉渭川一千畆此地兩三竿盛夏那知暑隆冬豈畏寒清隂連野外翠色上雲端不是全髙節如何耐久㸔題仲昭竹聶大年舍人老作鄖陽守尚愛揮毫寫竹枝絶似艤舟湘水上鷓鴣啼斷雨來時題夏仲昭墨竹橫巻蓋陳緝熙故物也李東陽崑山夏老能筆耕開雲種玉看崢嶸千條萬葉入霄漢世間草木空有名來持琅玕叫閶闔坐使燕石無光晶北人貴竹如貴玉直以髙價酬丹青衡開丈幅直踰咫不見枝梢見根柢恍疑湘浦推篷行颯雨驚飈過雙耳九疑山髙望不極影落洞庭清徹底靈籟時來天樂風釣竿不動珊瑚水珊瑚水冷魚龍藏此翁一去魂茫茫江山有神故物在環珮無聲凉夜長東吳老子圖書散南國諸生思未忘重向玉堂修竹譜須將偃竹記篔簹夏太常墨竹白髮先朝老夏卿酒酣隨意筆縱橫空梁落月仙臺迥獨聽清秋玉珮聲同前江南墨竹近來荒剰有人傳夏太常圖印秖今猶舊姓風流知是少年狂圖有朱氏仲昭印重題荃之畫蘭李流芳秋風蘭若長干客藂樹隂隂小忩碧千里間關遲子來殘燈細雨為誰劇當時子畫我作詩今日開看巳陳迹我昨送子寒城東荒草茫茫掩阡陌腸摧淚竭無奈何手澤相貽竟何益吁嗟乎人生不死空有情慚媿旁人知愛惜夏仲昭畫竹顧璘石瀨涓涓水風篁裊裊枝塵途貪見畫艸閣夢題詩枕簟橫秋薄尊罍過月遲蒼林殊可老朱紱果何為題崑山屈鑰畫竹李東陽太常墨竹是彭城又到江南屈處誠可是崑山能種玉一枝初老一枝榮謝孔昭臨黃大癡畫呉寛大癡道人避世士移家舊隠虞山裏早年能畫老入神落筆虞山宛相似深林依稀村塢重水口近與崑湖通髙岡磈硊勢欲墮此老前身黃石公百年以後誰其亞昔者呉門稱老謝案頭臨畫似臨書咄咄逼人真可詫風流前輩杳難攀謔語空傳謝疊山忩中逺岫依然在天際春雲仍自還孔昭善寫山自稱謝疊山題劉僉憲寫遺石田畫吳寛寂寂茅亭下悠悠野樹邉扣門無俗客題句有詩仙虎跡黃泥坂鵞羣白石泉相城回棹後畫裏故依然題陳啟東竹巻沈周亭亭碧玉真堪倚矯矯青鸞不受驂豈是𤣥都觀中物秋風秋雨自江南張侯藏張翬山水歌李東陽張翬有名成化間大塗小抹成山水樹石燥硬筆意古往往人間落片紙此幅粗淺色更枯或謂非翬出其子張侯識鑒天下精物物如金見沙底爾家圖盡千萬軸素壁髙堂安用此寜知上智不滯物牝牡不貴貴者骨尺山即如對𤣥圃草屋臨崕氣出没崖根臨堂頗清迥逺雲淡沲開秋嶺霜蘿細紆岩檻暝昬猿接掛花溪靜自從去年抛棄官夢想山逰駕河舸見此拂衣便欲往攀縁轉玩情無那崕亭更著一人坐斗絶看書樹婀娜張侯豪曠人共知敏捷言談皆勝我鹽車鬱没騏驥哀棄拙逢時每相左崑崙洞庭不我隔異時倘結烟霞果沈恒吉小景呉寛扁舟同泛十年前夜宿西山一隖烟逝矣斯人猶在目古邨黃葉帶清泉沈石田畫障為張通守題石田自題楚詞一曲程敏政石田老人非畫師胸中丘壑天所私揮毫便覺真趣發意到豈借丹青施通守張君畫成癖半幅生絹比金璧望中會作雲門山逰人擬辦登山屐峰迴路轉溪流長誰向石林開草堂風簷舉手欲相問扁舟載客來何方老人畫出今人上鄉評未數黃公望一石俄成斧劈痕不類羣羊更竒壯石田隠處輕輞川秀句却似王維傳呉歌一日變楚語幽芳懶鬬春花妍我從胥門八面過古寺長邀聽經坐老人不惜與畫山擊節詩成幾人和上方有詔徴遺才白髮蒼顔能一來還君此圖意無限停雲正結姑蘇臺為周都尉題沈石田畫不見姑蘇老沈郎披圖疑在石田莊眼看雪乳春醒解手拂雲根午坐凉髙栁似填山下缺竒峰如出鏡中粧草庭都尉能珍鑒何日重開寳繪堂題石田畫吳寛麤毫濃墨信手冩長巻初開是誰者溪泉山石斷復連亦著茆亭在林下石翁足跡只吳中意到自忘工不工平生所見亦不少但覺一幅無相同偽作紛紛到京國欲以亂真翻費力我方含笑人獨疑真跡扵今惟水墨我觀此畫雖率然老氣勃勃生清妍江湖欲尋具眼識須上米家書畫船同前閉户蕭然亂雪中巳無賔客晩堂空槁梧獨據忘為我老筆能揮愛此公却構石闌臨絶澗似聞茅屋巻秋風十年别却西莊路嵗暮相思白髪同為史明古題石田畫崒嵂絡南山黃河抱其趾舊聞塞天地延袤幾千里陽烏浴虞淵落霞散如綺層巒靄佳氣蒼翠不可擬史君松陵彦家世昔居此夜夢或見之既覺心亦喜老南為兹圖歴歴宛相似不知經營勞但見邱壑美赤松真吾師白雲是知己為報山中人明年泝江水出閶門與陳味芝諸公送徳純舟經山塘同登壽聖寺閣時雨初霽西山益佳還飲舟中聞文宗儒談龍甚異故及之偶聞客談萬山中靈湫一勺能藏龍春來佳氣滿空谷想見龍起雲爭從誰驅雪浪盪我胸驀然吹散渾無蹤半塘雨過登髙閣引手欲摘青芙蓉題萬壑春雲圖圖為石田寫贈袁徳純袁卿髙爽不可攀平生眼底無吳山肩輿偶度支硎嶺俯視龍池纔破顔前山後山作屏几千歩横岡鋪翠被向曉濃雲觸石生當春好雨從龍起吾鄉沈子今王維筆端萬壑能移之圖成欲贈袁卿去却請我輩仍題詩天台雁蕩東南有卿昔好逰曽遍走縣齋晝靜對新圖從此不須開户牖沈石田擬謝雪邨山水爲楊起元題雪邨巳逝知幾年妙畫曽向呉中傳少時看畫老能憶此事還輸沈石田昨者西閶楊給事乘興放舟過相川坐間偶及雪邨畫為言楊謝世有連石田呼童急展絹冉冉水石兼雲烟兩山秀色相對峙長松落磵聲隨泉秃翁觀泉不歸去豈是澗底尋詩篇石田作畫不賣錢給事得之真有縁墨痕斷爛稱古蹟莫上米家書畫船爲錢世恒題石田雪景歩當斜徑緑成圍賴有長藤葉不稀不恨刺䕷枯朽盡向來行處慣鈎衣題石田倣大癡畫巻為林御史舜舉大癡道人顧長康平生癡絶仍畫絶長卷當年我亦觀大畧猶能為人説山川歴歴百里間彷彿扁舟適吳越平林曲岸客共逰複嶂重湖天所設漁工樵子互出没定有髙人在岩穴墨瀋淋漓拾未能信得畫家山水訣為人説此亦徒然把筆安能指下傳對本臨摹未為苦運思想像誰能専晴窓設色手自改輸與吾鄉沈石田為奎姪題石田雪景瑤林依石斷雲攢雪後西山更好看憶向越來溪上過梅灣玉削數峰寒題啟南寫緋桃圖巻首題石翁樂事字桃作六出時有議其誤者因解之石翁樂事嗟何事終日春風繞筆吹寄語看花人仔細緋桃千葉半開時石田百鴨圖栁塘流水春沄沄誰放百頭花鴨羣石田老翁真好戯㸃染霜毫成錦雲錦雲歴亂不可數飲啄浮沉散還聚白瑩翻令鷗鷺猜彩鮮更被鴛鴦妬菰蒲劍牙一尺强水香烟暖任回翔正憐身上無泥滓安用人間覔稻粱洞庭之波連笠澤深緑晴摇漢江色甫里先生得意時自挈雕欄引文翼我家恰與天隨鄰慣見毰毸弄碧粼就中亦有能言者不取槖金驚使人次韻題石田畫林俊髙雲落水自深秋獨客年華水共流今夜月明何處笛最難割遣是鄉愁雲移石磴峰疑斷溪轉人家樹故重枕股石牀無别事碧天秋水看芙蓉蕷藥苖齊竹又孫渾忘嵗月是烟村貼山墻短雞登樹背路花深鹿卧門到頭竒事只江鄉寂寂溪山歳月長何許將歸同調曲桃花春水就漁郎題石田畫二首為仲深作邊貢夕陽半落羣峰髙古林萋迷猿正號欲招同人眺野色安得揚州何水曹近烟蒼蒼逺烟白此時獨作邨西客君不見石子岡頭蘿薜深麋鹿成羣詎相識平生不識石田子往往相逢畫圖裏世傳百本無一真抹青塗紫俱門人秋堂對此雙眼豁倐然置我溪與壑君不聞畫家貴意不貴工只在冥冥漠漠中沈啟南畫徐渭坐對雲霞坐行隨鷗鷺行巳無烟火氣况有市朝情紅葉從書積青岑帶浦平世間那有此畫裏尚難成便欲招為伴其如不可憑只將題詠處聊寄此心清題朱堯民小景徐禎卿朱君畫法學吳姬盡掃鉛華出稚姿萬里雲山一行墨令人惆悵憶天涯題文待詔春江圖孫一元過午輕雷風色鮮斷虹迎日破寒烟鷗清沙淨宜詩句舊日仙人白下船野樹無人隂自合斷峰隔㟁雨猶青鸕鷀鸂鶒留春住正是江南杜若汀題周臣畫顧璘疊嶂寒松䕶碧霞一溪春水夾桃花山坳若見漁舟入莫問人間舊嵗華文衡山為其友人伍君求作山水小幅十年而始成君求出示余因題孫一元繭光墨色喜新増肯作尋常斷璧稱十載獨留阿堵妙畫師誰是顧金陵題唐子畏畫山水顧璘赤城霞氣連東海九疑綿綿舜陵在曽逰兩地縱竒觀疊嶂填胸何礧磈洞庭波濤拍雲天吳江長橋絶可憐扁舟夜攜二三子髙歌月下招靈仙歸來草堂老無力山水迢遥苦難得蘇臺居士好畫手一幅盡寫蒼茫色林壑髙深氣杳𡨕空潭颯颯水風生開簾對此坐清晝彷彿邀余萬里行同前張琦蠻天梅雨雜江潮五月青林未可樵泥白草深歸舊隠一支山路入中條題子畏古松水壁畫徐渭南京解元唐伯虎小塗大抹俱髙古壁松水閣坐何人若論㳺魚應著我詩餘題子畏所畫美人吳人慣是畫吳娥輕薄不勝羅偏臨此種粉肥雪重燕趙秦娥可是華清春晝永睡起海棠麽只將穠質欺梅壓栁雨罷雲拖唐伯虎畫崔氏鶯鶯并題彷彿相逢待月身不知今夕是何辰行雲總作當年散傅粉空傳半面春嫁後形容能不老畫中臨搨也應陳虎頭亦是登徒子特取妖嬌動世人題文待詔百雅圖歌羅洪先文君寫此百雅果何意把玩令人不忍置憶君曽作金門逰侍直晨趨五鳳樓爾時銀床聲半滑爾時銅剪聲初歇驚羣忽逐禁鐘來弄影遙隨宫霧没光借祥烏一延佇勢凌鳷鵲從來去仙橋有路自飛騰韶樂無聲亦蹌舉托身既得所引類還有時太液分飲九龍水上林更宿萬年枝中郎彈射不敢向内庖烹割多所遺時人每取占王氣競謂禽鳥先得知只今歸來甘寂寞獨卧南窗對山郭窗前古樹大十圍不見羣鴉見饑雀題虎山橋圖吳子孝春湖萬頃玊溶溶橋上春山翠掃空神女月明珠汎浦仙人雲曉笛迎風花枝香覆琳宫外草色青迷紫洞中思挂一颿凌絶頂看圖翻愧賦難工題文待詔𤣥墓四逰小幅俞允文春光著處使人迷栁暗花繁雲水低一路沿洄光福寺太湖還在石湖西千年荒殿滿青苔盡日無風湖上開更是空林春色晩誰人為掃落花來招真觀圖楊仲𢎞欲學無為道來居小有天精神消物怪采氣變風烟恬澹知天徳虚無象帝先髙風何特達古蹟尚流傳地渉洪荒表山開混沌前谷幽疑鬼聚峯巧類人鐫疊起三重閣分流百道泉岩穿留虎跡石冷逗蛟涎放浪曽無日遨逰未有年古經披覽罷毛骨為醒然題松江烟雨圖陳造逺峰近薄鑑中浮每泊行舟十日留雨望晴臨俱不惡最憐烟靄暝髙秋千里湖山宿霧昬倚欄一筆解平吞漁郎好在収綸罷想踞笭箵共一樽呉淞山色圖倪瓚吳淞春水緑搖蕩半江雲峰翠忩前落松聲渚際聞潘郎狂嗜古容我醉書裙鼔柁他年去相從逺俗氛題畫二首舟過松陵甫里邊幽篁古木尚蒼然何人得似王徴士靜看輕鷗渚際眠青山矗矗水舒舒相見郊原霽雨初絶似三髙亭上望人家依約樹扶疎題倪雲林天池石壁為錢雅賦張雨嘗讀枕中記華山閟中吳神泉發其顛青壁繞其隅春風四山來羣緑互紛扶羽觴曲折行浮花與之俱採珠搴薜荔洗玉弄芙蕖聱叟頗好名石窪作魚湖鴻乙志草堂挑燈遂成圖向此滌煩慮閲世如摴蒱發興雲林子盥手與我摹居然縮地法挈入壺公壺題大癡天池石壁圖髙啟黃大癡滑稽玩世人不知疑似阿母旁再謫偷桃兒平生好飲復好畫醉後灑墨秋淋漓嘗為弟子李少翁貌得華山絶頂之天池乃知别有縮地術坐移勝景來書帷身騎黃鵠去來逺縞素飄落流塵緇潁川公子欣得之手持示我請賦詩我聞此中可度難玉枕秘記傳自青牛師池生碧蓮花千葉光陸離服食可騰化逰空駕雲螭奈何靈跡久閟藏荒竹滿野啼猩狸尋真羽客不肯一相顧却借釋子營茅茨我昔來逰早春時雪殘衆壑消寒姿磴滑不敢騎馬上青鞋自策桃笻枝上有烟蘿披拂之翠壁下有沙石蕩漾之清漪晴天倒影落明鏡正是玉女曉沐髙鬟垂飲猿忽下藤裊裊浴鶴乍立風澌澌匡廬有池我未到未省與此誰當竒掃石坐其畔沿洄引流巵醉來自照影俯笑知為誰落梅撲香滿接䍦暮出東磵鐘鳴遲歸來城郭中復受塵土欺十年勝賞難再得恍如清夢一斷無由追朝來觀此圖惻愴使我悲當時同逰巳少在我今未老形先疲人生擾擾嗟何為不達但為髙人嗤漢南巳老司馬樹峴山巳仆羊公碑惟應學道悟真訣不與陵谷同遷移仙岩洞府孰最好東有地肺西峨眉髙崕鐵鎖不可攀援以逕上仰望白雲樓觀空峩巍此山易上何乃遺便與猿鶴秋相期欲借太乙舟夜卧浩蕩隨風吹洞簫呼起千古月照我白髮凉絲絲傾玉醪薦瑤芝招君來逰慎勿辭無為漫對圖畫日夕遙相思題龍門春曉圖為復菴姚廣孝雙崖寂寂翳雲松曙色纔分露氣濃憶得岩僧從定起數聲啼鳥一聲鐘曈曈初日曙光㣲淰淰山雲靄竹扉五丈石邊琴一曲桃花三月鯉魚飛同前梁時一别天平向十年夢魂時到白雲泉今朝重覔山僧話却憶當年秖惘然訪復菴出前畫求題倪瓚天平爛漫逰三日林下狂吟石上眠浩浩春風芳艸緑梅花雪滿白雲泉同前亢宗金烏飛彩上扶桑照見峰頭一抹光空翠浮嵐吹不散清寒飄溼薜蘿裳同前孫作八節龍門迥三生似有縁那知白居士不到白雲泉同前張適仗策長時度翠㣲白雲深處扣禪扉泉頭欲聽松聲坐石上乾苔不涴衣同前金文徴窈窕攀蘿一徑㣲滿林啼鳥掩閒扉城中車馬多如許不信山深有衲衣同前郳素山氣奔騰似浪生雙巒峙立斷塵纓幽人定起無餘思只有梅花照眼明同前張博雨後行吟到石林飛嵐濕翠落衣襟一聲啼鳥無尋處山在白雲深更深同前劉以禮昔時曽看白雲泉兵燹飄零又十年今日重來登眺處野花啼鳥自依然同前沙大用來往天平二十年煮茶飽賞白雲泉扵今吾老僧頭白共倚山忩聽暮蟬同前王行昔年來此是秋時只到龍門便賦歸今日重來登覽遍滿山濃翠濕春衣同前劉屺出郭名山廿里遙松蘿雲石路岧嶤經行喜隔塵凡逺不許人來説市朝同前陶琛曙色㣲茫嶽影髙松風習習鳥嘈嘈白雲盡向龍門去散作岩前萬頃濤龍門茶屋圖倪瓚龍門秋月影茶屋白雲泉不與世人賞瑤艸自年年上有天池水松風舞淪漣何當躡飛鳬去采池中蓮龍門春曉圖為竺芳師賦謝振東方欲明猶未明西林晻靄斜月傾花間百舌弄晴語井上轆轤牽水聲天平寺裏鐘鳴早楞伽山下人行少東風碧樹萬家春海霞紅映龍門曉虎丘春霽圖王行羣巘抱西郭一峯出平田孤秀凌太虚旁絶絡與聯古蹟遍林谷干將閟重泉劃開千尺崕下見清泠淵翠壁絢霞彩葩詞咏前賢扵時屬青春霽色明髙天鳴鳥亦巳和衆卉紛自妍夙駕爰此逰襟懷遂悠然豈曰事賞心觀俗古所傳來牟蔽丘壠饁耕滿疇阡樂土有若兹勤政復勉旃願同擊壤民熙熙度餘年為徐仲山題虎丘觀泉圖呉寛徐子昔年官水部匹馬蕭蕭歴齊魯運河水滿萬艘通汶泗交流無壅土歸來泉誌手親編好與河渠書並傳不識當時陸鴻漸齒牙空味虎丘泉題啟南寫逰虎丘圖啟南初逰靈岩遇雨明日既霽乃與海虞周景新逰虎丘因寫此圖并有詩記其事李貞伯云是日在陽山遇雨而歸陳永之謂雨霽日獨以事在陽山抱恨不能與啟南同樂也皆有詩題其上景新寄予和之雲岩不減靈岩好虎丘又名雲岩昨者胡為渉行潦千人石上兩青鞋日出深林歌杲杲一時取樂能償勞水西山北爭探討澗泉潄齒心亦清石壁題名手親掃西去陽山十里遙冒雨有人歸不早明朝見話入雲岩扼腕捋鬚空懊惱好山不趂晴時㳺此事巳差何足道安知猶有獨逰人隔水相望在陽抱何處攜來此畫圖我方起視俄絶倒詩情畫意各有在嵗月依然仍可攷蟲雞得失不須爭泡影死生難自保永之巳殁再到京華住六年匏翁頭顱欲全皓江南歸計有時成次第山行非草草卧逰且把畫圖開鶴磵松庵亦天造翻嫌二客不能從回望周郎與東老題天平石湖二圖次韵為王應爵萬石如林貌得真縱横碧澗共蒼峋城中拄笏須閒客林下峩冠有正人支老鄰居馳駿馬范家先墓倚危麟峴山未必髙如許遺愛當思繼晉臣時應爵出仕古亭石刻手曾摩宋墨當年記石湖絶澗百盤橫略彴晴波九級蕩浮屠開園種樹山為界放水灌田天賜租重擬四時編雜興范家莫認是堯夫題啟南過吳江舊圖吳淞江腹太湖頭雌霓連蜷卧碧流我昨經行覺尤勝滿船明月一滄洲周用曰長洲沈啟南以詩畫名東南但此老畫筆筆用焦墨人易扵摹搨一時偽作甚多然得具眼者蹊徑了然自别不難也嘗聞其所為過吳江圖而未之見駕部徐君間以示予豈即此物耶吾邑多水田絶無髙丘大木圖乃有之蓋以識松陵也即此巳不可與専求形似者論矣與太常典簿顧謹中題畫董良友彷彿風烟笠澤東呉山不與越山同誰家樓閣停歌舞舊是吳王避暑宫與盛愛臣題山水長卷吳寛城西蕩雙槳遥背伍胥門人家枕河住漸喜歴鄉邨豁然見平田農夫荷鋤去好風低嫩苖㣲雨灑髙樹葦間多放艇栁下或扳罾錦布芰荷蕩沙明鷗鷺汀魚梁接牛宫沽酒新郭市迤邐到横塘虹橋垂四趾亂山似遮路旋轉自長溪水入太湖北雲生光福西扣舷唱呉歌有客中流過千載懷古心悠然欲相和香徑既云殁琴臺亦成空山頭明月上仍照館娃宫登髙信徒勞望逺發深喟間展圖畫㸔舊遊一何類題林屋仙隠圖楊維楨我欲蓬萊一問津蓬萊淺去巳揚塵桃花流水寜無路落葉空山尚有人時見青禽解近客忽聞黃石祇疑神碁邊甲子過容易遲爾山中七日春題黃雲卿林屋先塋圖良琦雲卿祖居洞庭後遷婁東懷其祖父寫圖以自慰揚鐵崖曽題其巻云江夏先塋林屋洞七十二峯碧參差竁道冥冥雲作蓋秋風颯颯樹成帷海鄉西望空情事江水東流永孝思好在詩書光祖禰楊侯佳句有深期同前秦約望洞庭兮極浦長太息兮愁予英英兮白雲乘清氣兮降時雨倚宰木兮聊淹留念我心兮孔抽山有岡兮水有湫駕吾車兮汎吾舟鳥鳴兮嚶嚶鹿鳴兮呦呦激木杪兮迴風奠桂漿兮髙丘髙丘兮何所邅吾道兮西顧西顧兮不忘懷纘言兮遺來者陳履元畫玉山草堂鄭元祐故人陳孟公詞如春雲氣如虹畫法師海岳山如鶱鵬樹如龍騎箕上天二十載有子齄鼻畫極工驚蛟嘘雲海浪白離鸞照水岩花紅皺鱗張鬐聳鬱澗底松中有一畆幽人宫石林支頤睨飛瀑意逺欲托𡨕飛鴻我欲從之不可得青山萬疊金芙蓉題孟用賔崑麓小隠圖岳榆孟觀字用賔以貢士授浙東行省都事元末隠居崑山老松幽壑舊青山朱紱歸來次第閒眼底紅塵公事少天涯芳艸貴人還屋通流水循除活竹隠疎苔綴石斑何日醉逰忘爾汝共將寳玦掛腰間同前㳺詹瑤華省識君王面國破家全欲斷魂每見英雄扶社稷未聞帷簿正乾坤梁園文獻誰能整崑麓詩書子獨存致政歸來成小隠旋栽蔬果洽清尊題雅宜山齋圖倪瓚靈巖對直雅宜山穹林巨石憶蒼灣若翁遁跡在其麓有子讀書常閉關松根茯苓煮可掘林下慈鳥去復還寫圖愛此錦歩障白雲紅杏春斕斑題耕漁軒圖朱澤民為徐良甫作寂寂溪山面碧湖輕舟烟雨釣菰蒲曉耕嵒際看雲起夕偃林間到日晡漢書自可挂牛角阮杖何妨挑酒壺紅稻西風鱸鱠美依依蓐食待樵蘇題鶴亭鬬茶圖鶴亭吕散夫也盧昭花隂小隊鬬龍章巨盌香分第二湯莫倚酪奴風味好内厨催送大官羊題張子政大癡松亭髙士圖盧儒大癡老人天下士結客俠㳺非畫史酒酣潑墨寫荆關咫尺㣲茫數千里筲箕泉頭鶴上仙空遺寳繪人間傳弟子顛張早入室重岡疊嶂開雲烟太山斗絶何由縁下有鳥道丹梯懸此中疑是避秦處仰見茅屋岩崖邊松亭寓目者誰子耳譜流泉横緑綺不知㨗徑在終南每逢佳處輒留止我生亦有山水癖吳楚燕齊遍㳺歴風塵澒洞難再往坐對此圖三嘆息西塘圖為吳隠居題孫蕡放臣海曲懷京華孤旅天涯念鄉國誰傳此意入畫圖令我一見長太息毘陵野老吳中人舊與季子曽相親太湖三萬六千頃蕩漾咫尺閶門雲姑蘇臺荒烟樹緑下有詩翁數椽屋凉風洲渚芙蓉開細雨林園木𤓰熟畫船撾鼔海天晴越女新栽白苧輕館娃宫暗隂雲暮子夜歌闌春水生季家風流誰與比况是吳興外孫子曲几時攤舊賜書牙籖滿插前朝史南來無復少年狂茅棟低低一炷香久嫌塵居隘容膝更置别業開西塘西塘隠約湖山曲塘邊還種虎邱竹對酒菰蒲照坐明捲簾鷗鷺當窓浴此圖風致真可人㸃染直欲窮天真平子愁來獨長咏張衡老去誰為鄰吾觀季子好風骨正好還家及秋律筆床茶竈逐天隨蓴菜鱸魚莫相失題萬玉清秋軒圖郭登王謝堂前久不歸野田荒樹幾斜暉花開花落秋還在年去年來事巳非楊栁風多凋翠縷芙蓉霜重濕紅衣故人空感山陽笛一段傷心畫影㣲同前楊溥社燕賔鴻共嵗華松陵禾黍故侯家誰令千載柴桑里一度秋風一度花題萬玉清秋圖劉鉉蘇人甯某仕元為大中大夫晩年致仕築别業於同川雲間張可觀為作萬玉清秋圖蓋美其所居景物之衆也長洲金仲旻贅其家及甯氏既廢其配尋卒仲旻亦不在甥舘兹圖流落久矣後六十年而仲旻復得之乃爲裝潢噫物在人亡不能無感今其子公素持以徴言為備道其始終云甯公在昔稱時賢頭顱半白来歸田老懷淡薄慕幽雅髙居别築臨同川數畆園林占清勝四時景物誇竒妍賔從日盈北海座琴尊曉載南湖船一朝陵谷那知變廢盡東吳舊庭院扶疎修竹為誰青零落芙蓉不成片白雲飛去鶴不歸只有堂前舊時燕春深幾處桃花開無復當時映人面繁華既往今巳休東床老去還舊逰歌舞重尋舘甥處蕭索碧梧風雨秋陶令宅邊松尚在習家池上水空流追思自足興感歎何獨對此方為愁六十年來駒過隙俯仰之間巳陳迹畫圖寂寞久無聞流落人間匪朝夕客從何處逺持來佳致依然不殊昔夢回昨夜到松陵鐘斷長橋月初白萬玉清秋圖為金公素學士賦劉溥名園占竒勝萬玉含清秋主人契幽賞賔從迭追逰亭軒擬蓬壺木石儼滄洲金谷差可方緑水安能儔况此謝豪權黄金積如丘海舶致珍玩蘭車載名謳張筵日為樂豐肪羅庶羞瑶琴奏白雪玉瓚傾黃流鼓鐘朝巳陳緩帶久未休亮有佳倩賢周旋義無尤盛時難久恃人事忽相仇繁華會銷歇露艸生煩憂器覆固戒滿水逝誰能収惘然覽遺墨故跡庶兹求萬玉清秋軒在吳江同里鎮元江南財賦司副使里人甯昌言之别墅中有菊坡梧桐修竹總謂之萬玉清秋華亭張可觀為之圖追賦虞公務白鶴山房圖錢仲益無錫虞公務與予為從表兄弟居蘇州之陽山山有丁令威祠因名白鶴峰扁所居室為白鶴山房蜀人王息菴為盡山房圖并題詩其上距今三十餘年矣息菴化去巳久公務亦殁於戍所觀圖誦詩不勝悲愴因賦是詩云遼東仙人丁令威千年化鶴曽來歸何年度海到呉下巢松直向陽山飛遂呼山名號白鶴荒祠古木橫烟霏至今仙人煉丹井赤霞煜煜騰光輝陽山山人性髙潔架巖鑿壁開門扉經年讀書不出户超然肯受功名鞿松間行拖緑玉杖石上坐理黃金徽研硃㸃易滴清露采藥穿雲入翠㣲客來隨分設肴核床頭酒熟黃雞肥時招白鶴下庭際按舞翩翩翻羽衣青城仙翁隔鄰住往來慣熟俱忘機為題詩篇寫圖畫染毫粉墨縱橫揮騷人墨客競題咏展圖畫軸皆珠璣邇來轉眼三十載青山不改人民非仙翁騎鶴去不返山人逺戍亦永違孤山無人赤壁靜蕙帳冷落誰相依空餘山房舊時月夜深寂寞穿簾幃嗟余撫巻三太息感今念昔重歔欷題林居圖兼柬盧公武髙啟竹梧翳苔石知是幽人居林間鳥鳴後亭空賔散餘聞有盧鴻愛長年留著書題允中山居圖徐蕡昔年為客處看圖懷故山今日還山住儼然圖畫間泉來繞蘭徑月出對花關應知農事畢髙坐有餘閒竹莊讀書圖為龔彦中題葉盛十里青山近馬鞍一溪晴碧下江湍舍南舍北無他植只有篔簹千萬竿鈍菴髙節望期頥未是尋常句讀師知有名門家學在切磋不忘武公詩題徐氏遂幽軒巻徐有貞隠居求志不求名雙鬢蕭蕭眼獨青吳下詩人多結社閩中才士盡傳經雲迷李白空山塚月落揚雄舊艸亭夜讀遂幽軒裏巻愁看天際少㣲星為都𤣥敬題春山讀易圖吳寛山中春雨過嘉樹如新沐鳥語時復閒惟聞澗聲續對此一欣然孤懷浩無欲便攜童冠人詠懷效沂浴歸來亦何事妙意溢春服寤寐羲文間手持一編讀惓惓濟時心願言均發育題吳白樓借屋巻邊貢草圍亭樹竹圍菴十載真成故事談忽漫得來原不偶總然稱借亦何慙詩篇舊巳傳都下畫筆今須倩魯南陳編修沂之字却過昔逰尋往迹月中門巷幾留驂應制題王朏畫吳王納凉圖邊貢雨過太湖上風生響屧廊紅綃拂几席白紵製衣裳朱光淪厚地明月在髙堂何以保玉體長年樂未央題吳王納凉圖陳旅呉王臺榭滿汀洲湖上風來暑雨収坐有紅粧可娛老市無赤米不教愁采蓮舟載烟岑晚響屧廊通水殿幽歳暮甬東寜有此夜凉歌舞莫令休題吳王納凉圖李孝光六月長洲水殿凉酒酣揮袖倚新粧芙蕖露冷秋雲薄回首西風響屧廊同前袁凱㣲月斜侵響屧廊芙蓉清氣滿金塘鴛鴦只傍雕闌宿也愛君王水殿凉口號題吳王半醉圖李白風動荷花水殿香姑蘇臺上見吳王西施醉舞嬌無力笑倚東忩白玉牀題吳宫衰栁圖袁凱逺岸依依落日明吳王醉處少人行多情獨有垂楊柳猶送深宫夜雨聲題子胥吹簫圖徐有貞行乞吹簫野水濵只縁讒口間君臣鞭尸覆楚由無忌員也何曽是狠人半帶愁音半殺音西風吹入楚雲深丹陽世上人空聽誰識英雄一片心題范蠡五湖圖趙孟頫功名自古是危機誰似先生早拂衣好向五湖尋一舸霜黃木葉雁初飛題扁舟五湖圖陳旅按史記止言陶朱公將徒屬浮海而無載西施事杜牧輩乃誣也故為之辭羑里人歸獻女來帝辛飲酒沙丘臺酒闌不但蛾眉死太白旗竿血花紫會稽凛凛吳日驕少伯乃是師閎天姑蘇城下箭如雨艷骨應成館娃土五湖烟浪搖青春小兒船尾中細君吾王功成境土富扁舟只載妻孥去良工貌得千古心寓形空爾糜黃金朱翁子負薪巻張翥富貴危機解殺身是非千古付樵人當時長史魂應悔不向山中只負薪范莊梓樹圖次石田韻贈施煥伯呉寛行人墻下摩挲處重是范公親手培此日載將嘉樹賦清風長傍義莊來空尋蟻穴難成夢免製犧尊豈不材須信畫家原有意展圖如對北山萊麥舟圖李東陽江東故人半零落江頭石郎淚雙閣三喪未葬家苦貧舉世今無魏州郭睢陽范郎方少年相看不語意范然江舟載麥五百斛揮手付之如一錢歸來侍立庭闈畔白髮聞之為一莞亦知父子本同心若待庭趨嗟巳晩君不見慶州饑民曽告荒使君自發常平倉米元章拜石圖李東陽南州怪石如竒士士有好竒心欲醉平生兩膝不識地石也受之無色媿着袍擁笏當石前禮而不答貌益虔呼為石丈丈不語回視諸峰盡兒女當時觀者笑且嗔眼中見石不見人嗟君好潔巳成癖無乃冠履沾泥塵古來玩物必喪志况爾物役忘其身惟石巖巖瞻赫赫一州雖小寜無民宋家只合米博士誰遣出刺無為軍君不見漢家留侯拜黃石石亦可拜不可眤千載英風石益髙猶憐誤落神仙迹同前儲瓘虎賁猶似對中郎末世那知老子狂才到宣和流落盡眼中誰是丈人行鶴屏皮日休三幅吹空縠孰寫仙禽狀䯔耳側以聽相鶴經云䯓頰䯔耳則聽響逺赤睛曠如望赤睛露眼則視逺引吭看雲勢翹足臨池様頗似近蓐席還如入方丈盡日空不鳴窮年但相向未許子晉乗難教道林放貌既合羽儀骨亦符法相願升君子堂不必思崑閬和韻陸龜䝉時人重花屏獨即胎化狀叢毛練分彩疎節笻相望相鶴經云大毛落叢毛生其色如雪又云髙脚踈節則多跛也曽無氃氋態頗得連軒様勢擬搶髙尋身猶在函丈如憂雞鶩鬬似憶烟霞向塵世任縱橫幽襟自閒放空資明逺思不待浮丘相何由振土衣一舉棲瀛閬呉都文粹續集巻二十五
