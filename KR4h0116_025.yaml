body:
  text: 呉都文粹續集巻二十五明錢榖撰題畫張僧繇畫龍在崑山慧聚寺崔融人莫嫌山小僧還愛寺靈殿髙神氣力龍活客丹青題米南宫畫郯韶風流不見米南宫依舊雲林逺寺重貌得匡廬舊㳺處半江秋色洗芙蓉題米南宫雲山圖來復南宫米黻生殊方馳名畫史妙莫當墨雲翻空太隂黒功奪造化開㣲茫酒酣放筆情爛漫愛寫長林帶溪㟁崑崙移得毫芒間數㸃浮雲落天半鴨嘴灘頭沙浦通鯉魚浪颭菊花風山腰路險不可屐飛瀑倒掛青天虹我憶南逰溯湘沔七十二峰長對面赤壁山髙看洞庭一道澄波㵼秋練人生誰無丘壑懐可奈塵土羈長才子陵不遇劉文叔釣臺未必髙雲臺展圖頗識舊行處彷彿㣲鐘隔烟樹荒盡菱租老未歸寄書欲問沙頭鷺米南宫雲山歌張羽古之畫法不復見六朝人物留遺譜後來山水出新意二李三王差可覩洪谷之後有荆關營丘渾雄獨造古華原處士志竒崛餘子紛紛何足數郭熙平逺疑有神北苑爛漫皆天真畫院宣和衆史集俗筆姿媚非吾倫豈知南宫迥不羣一掃千古丹青塵神閒筆簡意自足窈窕青山行白雲黃侯黃侯安得此元氣淋漓猶滿紙晴窓拂拭對髙秋恍惚神逰華山裏生平畫癖奈此何為子試作雲山歌珍藏什襲子須記世間名畫今無多為陸全卿題米南宫雪景呉寛北固山前江水清長供此老濯冠纓焚香寳晉齋中坐江山冩入毫端輕此老胸中有竒氣不與衆史爭閒名翛然一種自機軸驚倒范寛拜李成昔者吾嘗閲畫史遺蹟人間嗟見此卧逰佳境不逢人但覺寒光浮棐几古樹枝摧瞰急湍雪嶺更從人面起全卿藏此凡兩幅持一贈我分片玉曽是平生好潔人挂處休將手頻觸題米元暉山水趙孟頫卧逰渺萬里楚天清曉秋初日江上出白雲山際浮莽蒼迷烟樹隱約見孤舟丹青不可作思子徒離憂同前澄江漾旭日青嶂擁晴雲孤舟彼誰子應得離人羣同前柯九思帝鄉春日曽舒巻溪館秋風每見之處處雲生山似畫年年老去鬢如絲題米元暉墨山于立生來墮塵網苦為塵所縛暇日起我早騎驢出東郭城門老人髮半垂問我騎驢何所之為言欲向山中去茅屋正在清溪湄山中之人面如玉手把素書跨黃犢石泉夜煮茯苓香滿屋秋雲邀共宿緑蘿曉月懸松風縹緲惟聞烟外鐘十年往事一回首巳隔雲山千萬重潦倒狂吟頭半白把卷令人念疇昔石田瑤艸近如何題詩好寄山中客題米元暉山水張以寧髙堂曉起山水入古色慘淡神靈集望中冥冥雲氣深祇恐春衣坐來濕江風吹雨百花飛早晚持竿吾得歸身在江南圖畫裏令人却憶米元暉題米元暉雲山圖髙啓海岳老仙非畫工自有丘壑藏胸中大兒揮洒亦莫比妙趣正足傳家風敷文閣下書幃淨夢入空山覺衣冷起拈彩筆冩幽跡一片飛來楚雲影彷彿三湘與九嶷翠峰猶抹二蛾眉水生江上鴻歸後樹暗沙頭春去時蒼蒼逺渡連平麓烟火參差幾家屋林深谷靜斷行人惟有禽聲啄枯木偶向髙齋玩此圖斷縑猶費千金沽自縁絶筆人間少如此雲山何處無米元暉雲山圗張羽前代幾人畫山水逸品只數南宫米海岳樓前北固山頃刻烟雲生滿紙古云邱壑起心胸恍惚似與神靈通素壁髙懸卧清晝耳邊恍若聞松風怪底青山起毫末森沈緑樹臨溪活仙人道士疑可招芝艸琅玕俯堪掇千里能移方寸間天機揮洒過荆關如今畫史空無數對此髙蹤詎敢攀題鄭所南蘭倪瓚秋風蘭蕙化為茅南國凄凉氣巳消只有所南心不改淚泉和墨寫離騷同前張賁空谷中留無限春幾年培養此蘭蓀殘花雖小幽貞在不負當時雨露恩長抱幽貞獨自芳芳條日日戀春陽靈均去後無人佩誰念殘英有國香題蘭張弼所南畫蘭不著土抑塞幽懐更無語淮南濠上真龍飛大明一統開洪武從此蘭生始著根所南英魂亦呼舞此蘭不知畫者誰幽篁竒石相為伍蕭蕭凉月浸湘川煜煜光風轉平圃似有芳香撲鼻來襲我衣裾拂尊爼不惹臙脂坡上塵只歸翰墨林中譜援琴欲彈不忍彈空谷佳人心最苦抱素凝和三十年國香將吐猶未吐江蘺掲車不入羣萬古知心賴尼父撫圖握筆驅天風天風吹春滿天宇題鄭所南墨蘭徐禎卿是處丘園成草莽芳根無地著幽蘭愁人自寫西風怨合與離騷一様看同前文徴明江南落日草離離卉物寜知故國移却有幽人在空谷居然不受北風吹張仲敏鈎勒風林張雨墨君神駿出洋州形似無如老薊邱可惜風林半忩月試凴老眼為雙鈎題張遜鈎勒竹倪瓚霜松雪竹當時見筆底猶存歲晏姿文采百年成異物西風吹泪鬢絲絲髯張用意鐵鈎鎖書法不凡詩亦工清苦何憂貧到骨筆端時有古人風題顧定之竹石張雨龍孫乍脱綳兒錦石面都皴彈子窩畫妙通神欲飛去虎頭癡絶奈渠何題顧定之竹郯韶呉下幾人能畫竹風流只數顧叅軍都將數尺雲烟思寫作當年篆籀人同前鄭果眼中得見珊瑚樹無乃佳人碧玉釵酒醒同誰歩清影不勝白露滿秋階題顧定之為周正道寫竹倪瓚蕭蕭瑟瑟一林風寫與城東拙逸翁石室先生仙去逺虎頭孫子獨稱雄霜毫淡墨隂晴外曙月寒窓夢寐中對月懷人一悲慨雪泥蹤跡似飛鴻題顧定之墨竹朱經虎頭諸孫總癡絶老安不癡乃用拙憶在吳中寫墨君雪紙氷紈每飄撇妙處不減文湖州同時更有柯丹丘眼底只今無此客使我悒悒懷風流蒼梧想見斑竹活看盡忽焉幽思豁安得二老從之逰蕭騷凉風起天末同前虞堪録事官常州正是太平日想得鳳凰枝掀髯揮彩筆直節應承雨露恩五色之雲䕶子孫而今飛向南閩去搖蕩春風化墨痕題顧定之出墻竹莫笑虎頭癡偏憐鳳尾垂粉墻遮不斷翠雨濕多時題顧定之畫竹徳祥呉下曽逢顧定之十年長記别來時蕭蕭白髮江南思誰解尊前唱竹枝題朱澤民山水虞集積雪山隂道嵯峨筆底生雲門見童子禹穴閟蛟精髙卧何人在幽情幾詠成杜陵空想像晩飯柁樓晴同前郯韶洞庭南下水如天篷底看書白日眠我亦憐君愛山色直須買酒過秋船題朱澤民秋江獨釣圖鄭果山川無㣲雲萬物粲可數長江秋氣至美人在中渚凉風吹蘭舟木葉下如雨魴鯉豈必多書巻良可咀初非與世殊聊以樂空窶朱澤民山水楊維楨雞林道人落筆竒筆跡逺過李咸熙不畫射洪雪色絲澄心一定光琉璃丹厓碧嶂開參差古木麻立交樛枝崩流千尺晝夜飛練帶不愛山風吹仰見招提出林麓俯瞰略彴橫彎碕碧桃洞深花落處長松樹杪雲生時便從天姥發夜夢况復曲水招春嬉苦無澆筆酒千䲭忽落曉忩神坐馳吁嗟我來山隂正如此山隂道上歸何遲題朱澤民山水陳基東曹興逐秋風起長揖齊王歸故里托言鱸膾與蓴羮逺害全身良有以神交海上陶朱公遭世雖殊心則同讀書把釣松江尾仰矚浮雲行太空八月嚴霜下喬木萬里青𡨕渺飛鵠為謝長安馬上郎世間何物為榮辱同前李祁洞庭之南湘水東青山奕奕蟠蒼龍雲陽峰髙七十一欲與衡岳爭為雄我家近在雲陽下來往看山如看畫十年塵土走西風每憶雲陽動悲咤吳中勝士朱隱君筆精墨妙天下聞畫圖畫出湘江水青山上有雲陽雲雲陽山髙湘水緑十年不見勞心目只今看畫如看山萬里歸情寄鴻鵠朱澤民山水歌虞堪江山青青江水緑市上何人吹紫竹避暑宫前不見春落花滿地逰麋鹿千古江山列畫圖朱侯愛寫咫尺烟糢糊扁舟依然在洲渚應可自此歸五湖昔人去者今有無題朱澤民荆南舊業圖髙啟睢陽醉磨一斗墨夢落荆南寫秋色太隂垂雨尚淋漓哀壑回風更蕭瑟楓林思入烟霧清湖水愁翻浪波白溪上初逢野老航山中逺見先生宅秫田半頃連竿魚芋區茆屋倚蘿薜僧來看竹乘小輿客去尋苓借髙屐任公臺下石可坐周侯廟前路曽識虎跡時留暮苔紫蛟氣或化秋雲黒城郭當年别巳久風塵此日歸不得落日書齋半壁明畫圖卧對空相憶朱澤民畫蘇平仲朝朝謀隱地忽見好山川雄麗皆衡岳幽深有澗瀍羊眠松下石虹挂屋頭泉便欲抽簪去依崕結數椽朱澤民寒林平逺圖張肯凍雲壓空雪欲作曠野隂凝氣蕭索朔風一夜捲長林萬木離披盡搖落天連平逺眼界寛前山宛在空濛間溪頭流水急如瀉日夕噴薄聲潺湲我嘗經行出林際望斷孤村日將暮野鳥啼飢那忍聞瘦馬驚寒倦行歩悄無人跡途路賖此時能不思還家人生慎勿思行邁披圖尚爾添咨嗟陳玉汝所藏朱澤民畫李東陽睢陽書家流作畫如作草松根石崚嶒健筆凌絶島垂蘿飄人衣盤石坐不掃鳴琴聲差差石籟風稍稍君看蕭散姿稱健林下老遺縑百年内嵐氣濕不槁陳郎湖海情得此恨不早我生不學畫入眼分醜好嘗觀耆舊傳歎息風流少此意君獨知丹青安足道題朱澤民集古玉圖後呉寛五瑞示信存虞書𤣥圭錫禹成功初後來列國分寳玉魯璜楚璧皆其餘圓流方折不愛寳昆吾刀銛雪同皓辟邪人馬若天成琨環鞞琫猶反藻卧蠶蟠螭看更好細數三十種非少今世誰為張茂先試言此物何必造雞冠蒸栗及猪肪土花半蝕痕蒼蒼其間直出三代上遺形尚發孚尹光龍眠居士不可作洗玉池中水應涸何如征東舊提學過眼寫之無執著丈紙流傳二百年妙矣宛如新出璞題朱澤民小景律詩後睢陽畫癖不可醫睢陽作畫真畫師豈惟長絹善揮灑只此短紙誰能為野曠天寒氣蕭爽人坐茆亭絶塵想階前舊雨客不來天末晴雲心獨往青山滴滴青於苔平地忽作芙蓉開秋聲似向耳邊起石上喬松若箇栽意長要在無多筆餘墨淋漓綴唐律詩中有畫畫中詩百年再見王摩詰題蘇昌齡畫張以寜徐君逺從西江來親為蘇子作松石松三千年鐵作膚石亦蒼寒太古色幾株老木相因依氣格不敢與之敵洲前搖搖者舟子短棹滄江蕩晴碧著子嘯歌於其中仰視青天岸白幘是時東山月初出無邊露氣連赤壁潛蛟出舞巢鶻翔江姬色動三太息眼中之人有太白風雲變態俱無跡前輩風流今復聞人間絶景豈易得徐君更為添野夫共泛靈槎卧吹笛題顧仲淵臨柯丹丘竹于立湖州去後丹丘老見此風枝露葉新千古中郎那可得虎賁猶是典型人題趙善長為李原復所畫山水王逢日光青寒殺氣白山童林髠似縮瑟城舂指墮株送葉蒼莽坤輿大霄宅齊東趙原呉下人辭榮養母韓康脉酒狂忽憶雍煕時畫法荆關海岳客魁峰傑嶺大將顔秀崕峭壁仙卿班雲氣滃渤月華表石肌犖确崤函間翬飛樓閣深翠隱獸羣逺跡人烟近一瀑天垂雪練紳萬松花落黃金粉森蘿翳檞杳莫盡若聞行歌采芝菌夢覩浩淼妙攘攫心苦良工手獨敏鬼物㑹合毛竦竪樵㸑扁舟露沙溆磨輪新坊俯場圃雌伏雞窠懸在粱罄折田翁飼其牯土膏不假酥雨潤帘脚似逐東風順貢聨包匭旅裹糧驢驅馬䭾力角奮怛然閣筆淚滿腮龍虎虚卧溧陽臺累朝德澤百年運短褐老泫江南哀我詩題罷眼中泣又見他鄉鴻雁回沈仲説畫樹石鄭元祐風流沈傳師浩蕩江海姿黙菴豈誠黙開口談書詩興來捉筆畫樹石溪深㟁髙浪波白毫端無非篆籀法折鐵中郎此其式世人貴耳賤目者扵此却令三歎息題張叔厚白描麻姑像狡獪仙人來自東海波清淺日輪紅翩􅗁雲裏飛霞珮只在鸞笙一曲中題張叔厚白描鸞仙柯九思秦臺縹緲近天涯紅露霏霏隔綘紗蕭史不歸春欲老吹簫秖在碧桃花題夀陽公主梅粧圖張天英正月七日含章殿落梅吹花香撲面玉人睡起猶未知重理新粧鏡中見花如玉貌多嬋娟三十六宫都學遍城中醜婦不解羞采花自㸃雙眉頭題張渥描乘鸞月仙素女乘鸞月下飛飄飄環珮語相依帝家曽識乘槎客笑倚天孫錦字機題馬公振畫竹良琦馬氏白眉者隠居婁水湍閒將筆五色醉掃玉千竿露重鳳毛碧月明龍氣寒春山歸正好稚子喜相看題馬公振畫簫竹圖秦約鳳丘張樂夜厭厭