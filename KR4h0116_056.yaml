body:
  text: 吳都文粹續集卷五十六明錢榖撰詩文集序甘白先生後集序朱逢吉文章聲心也見乎學力之淺深才識之髙下而心為之本焉譬如習樂心所尚者古淡也則蕢桴土鼓不假音律而自然之聲叶焉茍所尚者哇淫也則鄭衛交作流宫泆羽而去古逺矣故觀文章必先觀其人觀其人必先求其心然後其識其才其學可見也古今騷人韻士學博才髙者衆矣而求其識之卓心之古則可屈指焉甘白先生可謂全備者乎余來吳中聞先生之名而不及見矣得見其子用軫淳篤而文雅其鼓琴嘗動乎帝聽其才行克振先生之髙風者也間出先生文集俾余序其端嗚呼先生往矣其出處大節已於貞木俞公志中見之而先生之古心卓識髙才博學則於是編著焉燦然星斗之輝也巋然河海之深也其天地間之正氣乎氣正矣辭嚴義直而理無不致益世教多矣故能委順以時樂天知命不以夷險易其守不以否泰二其中而遂克考終於其官殆猶駕萬斛之舟乘風濤於滄溟洶湧中而終允濟非古心卓識其克爾耶與古之君子不假勳業而名德拔類者同其休聲可謂俯仰無愧者矣用軫其廣傳之以為後學者式斯不負先生之用心焉永樂元年春二月望日修史官奉議大夫大理寺右寺丞朱逢吉序甘白先生詩集序陳鑑甘白先生詩集凡六卷其孫大理評事祝承命于父放翁之所刋也先生姑蘇人姓張氏名適字子宜自幼頴悟年七嵗即能賦詩彈琴九嵗能誦五經十二應江浙鄉試人以神童目之值元運將革遂不仕國朝洪武初與渤海高季迪諸公同徴修元史授工部水部郎中無何乞歸鄉里日與周正道陳惟寅及季迪輩更倡迭和而先生才思尤敏捷方其吟琢直欲旋斡造化牢籠萬物使無一或有可遁者先生將以此自老而復以明經薦授廣西理問厯滇池魚課及宣課二司大使遂終於官先生所作之詩甚多遺稿若樂圃南湖江行滇南諸集藏於家者殆數十卷兩遭回祿今所刻者才得什二三於煨燼之餘及士林傳誦者而已雖然昔人於詩有以一篇之佳一句之美若崔皓題黃鶴樓林和靖之暗香疏影自足使名聞後世今先生之佳篇美句求之集中豈少也哉是亦不足較於此也經曰詩言志蓋詩者志之所發然則誦先生之詩者殆亦可以識先生之志焉先生之志有所未竟其將竟之於祝乎祝豫同學友而放翁又與父友因觀是集故為序而書之正統六年嵗在辛酉仲冬初吉通議大夫都察院右副都御史同郡陳鑑有戒書王先生詩集序鄒亮天地間流行之物皆詩也若夫光華為日月動蕩為風霆森列昭明為星辰河漢燦爛為雲霞輝映為虹霓融潤凝沍為雨露霜雪以至山嶽之流峙花木之妍蔚鳥獸魚龍之飛躍變化何莫而非詩乎是物者人皆得以用之而患不能成乎詩詩之而患不能曲盡其妙詩之道可謂難矣吾鄉王先生汝玊風韻豪邁藻思俊逸學問𢎞博淵邃為文敏捷辭意通暢於詩為尤工蓋嘗馳騁出入古樂府漢魏六朝唐人諸作故其五言古選若三代鼎彛雖朱湮翠融而龍章鳥蹟欵識典雅無雕鎪鏤䤤之狀殊可玩焉七言歌行如奔流出峽汪洋演迤層瀾萬頃自然成文長風衝激駭浪滔天物怪出沒則又可驚可愕焉五七言近體猶大將軍出師紀律嚴整旗旌鮮明劒㦸銛利軍容整肅鼓吹既作其聲悲壯激烈鋭氣憑陵直欲拔唐人之壘焉五七言絶句譬之鶴唳秋空清音嘹亮回視他人之作不啻草根蛩語蚓竅蠅聲焉耳嗚呼先生之詩可謂兼備古人之體製者矣豫自早嵗即䆒心斯事惜乎學識謭陋無所成就不足以窺先生之藩籬尚敢望闖其户而入其室耶鄉友華彥謀雅擅好事之譽嘗編次先生之詩夀梓以傳於後徵序其端輒評先生之詩如此且謂先生得乎兩間萬物之妙用故其詩卓然為一名家云景泰二年嵗在辛未秋九月上浣監察御史郡人鄒亮序青城山人詩集序徐珵國朝文章之盛稱洪武而永樂次之若宋承㫖景濓胡徵君仲申徐徵君大章王待制子元蘇太史平仲高太史季迪張太常來儀輩皆傑然名家者然當其時高皇帝初定天下懲元之寬無制而矯之以猛網羅天下之豪傑用法剪除之而彼諸老皆勝國之遺才雖用於維新之朝而逼於法或死或遁不得以盡其鳴世之能事及太宗之入乘豐富致太平乃崇儒術廣文學之選以潤飾鴻業照耀天下於是士之幸存而後出者始皆濯拂登進以鳴一時之盛而致翰林檢討兼春坊贊善太子賓客諡文靖王公汝玊則其先鳴者也公之學長於春秋其為文蓋兼古今體製而詩則深得唐法其所著述甚富而稿之藏家者皆燼於火獨其詩散逸於四方好事者得而録之公之孫鎧繕寫藏於篋笥友人華彥謀與王氏連姻尤好公詩既為編次復鋟梓以傳於世而諉豫序豫嘗評公之詩清而不刻麗而不靡佚宕而不粗俗驟而見之如九霄一鶴盤雲獨遊如玊井蓮花浥露初發如瑶臺仙子臨風微步殆難以塵情凡態想像如武陵年少衣輕䇿駿馳騁春風紫陌間意氣奕奕不可耐品而第之其大厯貞元諸才子之流乎因並著之序末以與知言者商確之青城山人者蓋公所自號也凡公之生平官簿事行則國史備焉景泰癸酉春正月之望奉直大夫太子諭德兼翰林侍講兼修國史玊牒東海徐珵元玊序後跋王鎧右青城詩集若干卷先大父文靖公之所著也大父自幼以詩文名接交當時海內碩儒非一往來倡和靡不見之賦咏自入國朝登仕籍洎升翰林聲光益著其製作特盛然兩為回祿所虐稿皆殘缺所幸别或收貯得十之二閲嵗既久鎧以菲才宦游古汴束以自隨公暇因掇拾分類繕寫一帙有外集者附之藏之篋中家居以來罔敢失墜偶姻好華君彥謀過而見之三復嗟嘆遂於內各刪百首命工刻次嗚呼大父文名蓋一世著述布天下而遺稿灰滅無幾又弗克傳世豈造物者不使有見於後哉實子孫不肖不能述先業之所致也今大父殁餘三十年而一旦幸表而出之是明珠寶劒之起於重淵必有待其時歟彥謀讀書好義常輯其族譜諸集行世足羡故家子孫立志超卓不屑細故如是時正統十二年嘉平望日孫鎧謹識謝孔昭詩集序周傳詩自國風以降言選者稱漢魏言律者獨稱唐而已為選而不宗漢魏非選也為律而不宗唐非律也選豈易言哉自梁昭明太子選漢魏以來諸傑作者因時所尚分為五言七言皆以偶對切實音韻諧協者中其律而詩以律稱矣則欲學詩者舍古人奚取法哉然後人擬之者不失之疏則失之淺調格似矣而意趣則未易及也由古及今以詩名家者幾何人哉姑蘇自吾朝以來文運與時大興以詩名者則有高君季迪楊君孟載為尤二君之詩言選則入漢魏言律則入於唐音響調格宛然相合而意趣或有過之雖識者莫能辨其異也余友孔昭謝氏自少嗜詩得二君之㫖趣故其為詩不茍必擬於古人調格似矣而音響之不合者不作也音響似矣而意趣之不佳者不作也不作則已作則必欲如古人焉是將駸駸乎漢魏唐者也今編其稿分為選詩律詩絶句凡若干首屬豫為序余豈知詩者哉然聞志於古者即古人也詩而逼於漢魏唐之作則雖以今之詩為漢魏唐之詩可也詩而不能效古其如古人何哉孔昭有志於古而用意若此蘇人翕然稱之則蘇人以詩名家而不絶者將不繫於孔昭乎愧豫非能詩者不足以知之姑序所聞于簡以塞其請云癸未嵗七月既望汝南周傳序又序張肯書云詩言志心之所之之謂志詩者言其心之所之者也在心為志發言為詩有諸內而形諸外也心之所之之不同而其詩亦有憂抑感傷憤怨悲戚喜樂和恱之異觀其詩則知其所志矣故窮夫出婦逐臣逆旅必多憂抑傷感憤怨悲戚之言騷人勝士富翁貴客必多和恱喜樂之語非才之優劣而詩之不同觀其志則知其人矣雖然世道有升降風氣有盛衰而其詩亦然因而隨之者有矣其言之喜樂和恱者大抵多盛世之音也其不然者則其人有大過人而不繫於時者也又豈可一於心之所之而然乎嗚呼詩之言志有不同如是邪詩之言志雖不一然其同者則同得其性情之正也詩而不得其性情之正則不足以言詩矣欲得其性情之正非學問之功其可得乎詩而得性情之正斯可以言詩矣余少也亦嘗執筆而學言也由其志之卑陋而又無學問之功其所言惡能得其性情之正哉今觀夫謝君孔昭之詩凡二百餘篇其憂抑傷感憤怨悲戚而不傷也喜樂和恱而不流也奕奕乎其風韻也翩翩乎其英俊也皓皓乎其潔而白也而又皆得性情之正噫非有學問之功者其能然乎豫方自愧有不可企及之嘆而又命豫序其篇目豫非能詩者將何所言乎姑書詩之言志者以為叙云永樂甲申五月十日浚儀張肯序草窗集序姚綬豫弱冠時草窗先生以詩鳴吳下及豫壯遊學宮先生起為太醫院吏目以詩鳴公卿間聲價籍甚景泰癸酉豫領薦書上京師先生已卒於邸舍竟弗之識往往見談於詩句警䇿而氣舂容恨不得其生平之集而盡觀之爾來餘二十年其子俸手一編於吳門寓館曰此某先君子之草忩集願為之序受而觀之總若干篇諸體悉備釐上下卷以授梓焉嗚呼先生往矣其詩則存往者同存者獨悲其往序其存可也世謂詩人之心聲也豫獨本之氣焉夫氣在天地之間迎之不見其首隨之不見其後洪纎生息者以之人與物同稟而獨得其清故身心之中凡一運動莫不由此養之以直不為勢摧不為利拘不為欲屈則浩然充塞沛然流行有不可得而禦且遏者詩云乎哉吾用是知先生自少至壯優游于典墳涵濡于義理不浮於約不華以實養成是氣罔或少餒故其所發隨扣隨應譬猶富足之家所積者厚一旦用之羡餘尚多誠非一朝一夕之故也其在公卿間彼此忘勢必有忠讜之論可施於用隂為裨益惜無紀載奚止詩而已也論者又曰詩由性情止乎禮義先王典則以垂美刺易風俗係世運非曰小補今先生詞意之正足以風勵來學有非騷囊之風雲月露同日並語又不可以詩為先生少也豫恨未能知言或味乎此幸獲盡觀其所作姑序其所存以歸其子將以俟夫知言者論定之如何先生姓劉氏名漙字原博草忩乃其别號云成化十六年七月上浣賜進士出身第前廣東道監察御史嘉興姚綬書於雲東精舍劉文恭公文集序吳寬文章之士世固有之山林之間賤而在下者其文既多晦而不傳至於貴顯之人或放而無行讀其文者且嗤之况欲其傳哉夫人自少至老矻矻然執筆纘言能造其妙者幾人幸其文之妙矣貴而鄙其行賤而掩其名欲其傳又難如此寬故於鄉先達文恭劉公之集讀之所以深嘆也劉為吳中世家自宋以來以儒官相承入國朝值家中衰而公居貧力學未嘗降志永樂間竟取科第入翰林益篤於學纂修講讀皆稱其任文名既著有求者輒酬應之若不辭拒然平生慎許可少假借言之所施未嘗殉俗以悅人人亦未敢易而求之也蓋公之為人儉質無華而少玩好靜退不競而絶奔趨故形於著作者不以險怪侈靡為工往往於和平簡淡之中而有溫純典雅之意知公者以為似其為人焉公既沒藏於篋中率多亂稿其子瀚從仕中外皆以刑獄為職未暇編次及是以陜西按察副使致仕始以其暇為之以寬居同里及仕又嘗同朝契好甚久乃奉其遺稿以示俾序其首寬生也後不獲承公之教特從諸生中一嘗望見其顔色而已今幸得其遺稿而讀之亦何異蒙公之指授者顧淺陋之學雖按察君謬加委重其非公之望乎既辭不獲他日君則以書俾其子今直閣尚寶卿棨來言曰某老矣先子之文將板刻行世願序文之及見也蓋公在翰林最久後自國子祭酒擢少詹事亦貴顯矣而公所以儉質靜退自持者愈至猶夫山林人也故其行巳鄉人知之同時之人知之逺方後輩或有不知者將無疑其文乎孔子曰有德者必有言敢書曰此有德者之言也學者宜相與傳之公沒數年後天子念公為春宮舊學之臣特贈禮部左侍郎諡曰文恭而有司復祠公於學宮知德者以為合於公議云𢎞治癸丑冬十二月甲申資善大夫掌詹事府事禮部尚書兼翰林學士延陵吳寬謹序感樓集序楊循吉詩在精不在多在専不在備誠以其道之難盡故也有唐氏之世詩莫甚焉然自數大家外其餘諸公之集偏或局於一體簡有止於數篇此豈其力之不能乎亦知詩之難為不必多與備也故其時詩人量力盡智各能自成一家言竟以取名於千載之下者以此大抵詩在天地間實藝之至精者其工可為其妙不可為也妙在觸觸則情感故其句美雖善詩者莫能知之是以求好詩必有所俟俟於事之觸境之觸無故之觸也不觸則不可舉筆就題而浪為然則雖欲其多且備又烏能多且備也先生吳中之耆舊剛明介特有通變之才素不業進遂隱於時其正則不惑鬼神其達則不諱負乏勤儉自持以清儒致産千金持邦人風俗之柄者數十年其為人豈特詩而已哉既沒之明嵗其子慈息抱稿見命定其次初漫録殆千篇三選三減止於闕十闕首或以咎我曰太少哉余曰詩有片紙而存有纍箱而亡者其傳否不在乎多與少也詩人之詩多以迫成非必盡其胸次中語也余用是逆推先生之意以為此編所謂有觸妙作具在焉豈必其多且備哉觀者自知之矣先生姓賀諱甫字美之其仲子恩中戊子解元有學行不第而歿孫放今亦未冠遊場屋其將益顯大先生之隱行而及其詩乎𢎞治四年夏四月二日禮部主事前進士吳人楊循吉序杜東原詩集叙王鏊東原先生諱瓊字用嘉家吳城之樂圃里孝友退讓好古力行於時同志則有陳醒菴孟賢二人皆有高義皆好為詩醒菴詩清脆可誦而先生沈著古雅有風致間喜畫山水故其詩於評畫尤深也詩多散佚不傳鏊從其子啓所得百篇焉讀之為選定如左仍附雜著若干篇於後序之曰先生其隱者歟昔之隱者姓名邑里影響恐聞於人顧其詩乃若有不能自巳者焉而張志和魏野林逋之流尤喜為詩其於世之興衰理亂毁譽得失榮辱進退憂悲愈懌一切末殺不獨玩於烟雲泉石之間其詞冲淡幽深而其名特焜耀在人者蓋世方卓行之為賢而夫人者復高標揭已以驚動流俗萬乘詣而不見千金召而不屈其跡竒其聲烜赫而流於人世謂今之世無隱士是果然哉蓋有之矣而世方以科目是崇是長外是有人皆擯弗用驅一世之人相摩相染於熟爛之程文言竒者得疑行殊者來毁廟堂不聞物色之訪丘園不覩束帛之賁於是時也所謂隱者即有之方且潛身裹跡日遁於大山長谷之中世安得而知世不得而知則遂曰無亦宜也其果然哉鏊猶及見先生與醒菴深衣幅巾曵杖履革蒼顔白髮所至人望之若綺皓郡將縣大夫延禮賓致恐後縉紳之行過吳下者必請造其廬而販夫樵子皆知二先生之為賢也二先生死吳中耆舊亦益衰後生之知者益鮮而知之者顧猶以其詩也惜乎東原詩稿傳世者止此然平生大略具焉讀其詞考其世得其所以為人於戲豈非古所謂遁世無悶之君子歟樂圃里在吳城西其東有原焉故世稱東原先生先生好著鹿皮冠又稱鹿冠道人𢎞治七年二月奉訓大夫右春坊右諭德王鏊序武功伯徐先生文集序萬安文章者期於世用而已非雕蟲篆刻之謂也故學者以此自負朝廷以此取士上下相期莫不以經綸參贊為事也使非期於實用而惟爵祿之為榮雖有文抑末矣將安用哉若武功伯徐公有貞平生立朝大節持危扶顛廷臣無出其右負其豪氣志在行其所學真所謂間世之才而用世之文也公自幼穎敏年十二三入小學巳能古文詞既長登進士第及被選翰林益自砥礪日有造詣凡經傳子史百家雜說以及夫天文地理醫卜釋老之書無不該䆒更取祕書考古軍旅刑獄水利良法孳孳講求明可以施於今者而識之蓋期於有用之學也厥後正統末邉郡繹騷京師戒嚴公出領璽書即往撫諭之比至要害民老稚潛匿山壑間者甚衆見公出慰勞而復業者數萬人遂鳩為義兵教以戰攻擊刺之法民喜有賴而事亦旋定公在經筵時會河决山東之沙灣前此遣治河者卒皆績用弗成公應詔出治乃乘舟遡河源踰濟汶沿衛及沁循大河道濮范而返因陳治水之䇿起自金隄張秋之首凡百餘里便宜法制水勢底平國家永賴之以無虞天順改元以公有迎復功升兵部尚書兼翰林院大學士內閣辦事尋封推誠宣力守正文臣特進光祿大夫柱國武功伯食祿一千一百户兼華蓋殿大學士辦事如故仍錫誥券追封其三代子孫世襲錦衣衛指揮使公感上知遇每奏對多剴切上亦才公多所開納一時委任權力無復有過之矣嗚呼公以用世之學得展經濟之才故一時勳業之隆蓋我朝之韓范富歐而文章之盛則我朝韓栁蘇王也豈非用世之學之文而雕蟲篆刻者云乎哉是集之流傳其有功於學甚大豫故樂而序之賜進士資善大夫禮部尚書兼翰林院學士知制誥經筵官眉山萬安書完菴詩集序吳寬夫詩自魏晉以下莫盛於唐唐之詩如李杜二家不可及巳其餘誦其詞亦莫不清婉和暢蕭然有出塵之意其體裁不越乎當時而世事相隔其情景皆在乎目前而人不能道是以家傳其集論詩者必曰唐人唐人云抑唐人何以能此由其蓄於胸中者有高趣故寫之筆下往往出於自然無雕琢之病如韋栁又其首稱也世傳應物所至焚香掃地而子厚雖在遷謫中能窮山水之樂其高趣如此詩有不妙者乎完菴先生劉公少為刑部屬出僉山西按察司事居三載即棄官歸吳中年始五十耳公神情蕭散無冠裳之纍其家長洲之野江湖之上日玩雲水不足引水為池纍石為山號小洞庭與客登眺以樂興至輒瞪目為吟哦聲其詩専法唐人語多與合當時所與倡和者武功徐公參政祝公及隱士沈石田數人而巳自公之殁而徐祝二公相繼下世吳中風流文雅不可復見矣豫與公為後輩而托交久成化辛卯豫北上與公别明年公遂不起竊恨之於是公之曾孫布登進士第既喜公之有後而布嘗輯公詩名曰完菴集者請序則又喜其詩之不亡也完菴者公歸田時號也自以保其聲名幸而無虧如玉返璞以全其真觀公晚節之善如此又唐人王右軍輩有不可及者其詩僅百篇所遺者尚多讀者如得其為人則又奚以多為哉𢎞治十七年夏五月朔旦資善大夫掌詹事府禮部尚書兼翰林院學士延陵吳寬序完菴詩集後序王鏊故山西按察僉事劉公詩凡四卷公諱珏字廷美自少志向不凡郡守况鍾將引為從事公言於况曰願為儒不為吏况從之遂登應天鄉薦久之授刑部主事擢山西按察僉事三年上疏固乞致仕以歸焉公髙節清操年甫五十脫屣名利而自樂於山巔水涯凡有觸一於詩發之詩多清妙可喜公又喜行草兼工繪事今其斷縑殘墨往往流傳吳下而警句膾炙人口思欲得其集觀之則未能也𢎞治壬戌公之曾孫布登進士始以一編授豫豫疾讀一遍歎其能以眼前語道胸中事信有唐人之風乎而平日傳誦之句或不在焉乃知公之著述遺落多矣其可惜也雖然讀其集論其世見公之胸次翛然超出埃壒之表嗚呼是亦足矣公嘗言士之保身應常如玉之無玷乃為完節故自號完菴卒列祀郡學鄉賢之祠云正德壬申光祿大夫柱國少副太子太傅兼户部尚書武英殿大學士知制誥國史經筵官致仕王鏊序括囊稿序李東陽括囊稿者淶水教諭贈南京太僕丞文君功大所著詩也其子知溫州府林欲刻於郡齊未果而卒今南京太僕少卿森手自編校刻於家比上京師請序首簡夫士之為古文者每奪舉業或終身不相合至於山林巖穴之間雖當有述作或不本之經術卒未免支離畔散而無所歸論者蓋兩難之封君早邃於經學執經問業者往往掇巍科階膴仕以去君獨不時售纍舉僅得一第而程試之暇不廢吟諷其所為詩又尚風韻有節制寧朴而不為巧寧簡而不為泛故雖月纍嵗積而其所自擇者止於如此且其古體有謹身慎獨語又詞人藝匠所不能道非根於經術者能然乎雜文若干篇亦皆平實簡靜類其為詩今並為一集雖非君所自擇而亦君之志也且經學之於詞賦深淺難易固不俟論然茍可以合繩墨取名籍而巳又不若行四方傳後世者其難尤甚故父子祖孫世守經業者時不乏人而詞賦之承傳殆不數見文氏兄弟繼舉進士職業治行光於前人又皆以詞翰侈聲聞東吳文獻於是有徵焉君之孫徵明方績學待用尤善楷書是稿其手録者故附書之正德十年二月朔特進光祿大夫柱國少師兼太子太師吏部尚書華蓋殿大學士長沙李東陽序又序王鏊故易州淶水縣學教諭文先生蘇之長洲人也古貌古心清苦力學學尤深於易吳下士多從之游從游者多去為顯官而先生久不達晚乃授淶水教諭未幾輒自免歸以卒初先生於世無所好顧獨好為詩時有張豫源者實與之相上下豫源天才豪宕奔佚頃刻千言見之辟易先生呐焉如不能言者而興寄閒逺有唐人之風焉初讀之若簡淡咀嚼之久乃有味乎其言也故豫源之名大噪吳下而先生則以經學名非與其游者殆不知其工於詩也憶成化初鏊侍先生傅於太學始學為詩先生過之授以詩法今老矣於其言之未能忘而亦終莫之至也聞其家有所謂括囊稿者思一見而讀之則未暇也今年春先生仲子監察君森始出以授鏊讀之數過未嘗不喜其精而恨其少也雖然詩豈在乎多哉雜著若干篇監察君選附於後先生諱洪字功大贈太僕寺丞今列祀郡膠之鄉賢祠正德辛未二月之吉括囊稿自序文洪古人於詩以發情止義為主故不必工不必不工工則泥於雕琢不工則流於鄙近豫性喜作詩少與內兄張豫源共學日有所課不間寒暑稍長從事舉業遂置去不省潦倒場屋三十年童習忘之久矣然燕居游賞間關羇旅卒不能終忘也一時欲言之㫖略已就之彀率間自評之謂如春山早鶯初出深谷舌弱語澀不能成聲蓋雖不涉於雕琢而鄙近特甚以求所謂發情止義而合和平醇厚之㫖何可得哉暇日檢前後所作汰其已甚得百篇聨録為冊時自展適不敢示人因命括囊稿云容菴集序吳寬鄉校間士人以舉子業為事或為古文詞衆輒非笑之曰是妨其業矣噫彼蓋不知其資於場屋者矣故為古文詞而不治經學於理也必閡為舉子業而不習古作於文也不揚二者適相為用者鄉貢進士謝君少游郡學即好古文詞既取鄉貢不幸未仕而卒其子昞及其二孫雍睦能承其家嘗痛其父祖早世而無所傳搜篋中得遺稿數十篇將刻之以自慰蓋君殁於景泰初至今五十年吳中舉子何啻數百人其中登髙科躋貴仕以功名顯者固有之餘子皆寂然無聞而謝君為當時所不好者獨傳於人不知君者讀之猶知有其人而若不死者則古文詞之為用豈特資於場屋而已睦方為邑學弟子介其友陳維祐持君遺文來請一言豫不及識君竊嘆所傳者止此使更活數十年其成就當何如哉聊書以還之君諱會字惟貞吾長洲人以號容菴故名其集云又序祝允明士之在世要以建志為重而聲業後之今國家以經術取士或以為尚文藝異德行之科不知所以取之者特假筆札以代其口陳之義所主在經術耳非文藝也然其名也遂視經術文藝為二道夫場屋之習固可以為用世之業矣而文藝之云則又何物其果無當於兹道邪國家又豈嘗錮手殱筆使不得一申其遐衷散抱於情性議論邪有人於此知所從事則所謂能建志者非與謝君昞使其二子雍睦持其考惟貞遺文示僕校而叙之以傳乃稍為整齊而歸之且附致此意於編後亦以闡惟貞之所立耳惟貞名會嘗從先參政游以府學增廣生中正統甲子鄉試會試兩得教職遜不就繼在家居朝命特起為御史命下而先一日以病死矣蓋端重士也其所著甚富今定録詩二十三篇雜文九篇𢎞治四年八月一日長洲祝允明序潛齊詩集序吳寬昔在永樂間文治既興人才振迅爭欲出為世用文學吏事蔚然可觀至於書藝醫術亦極一時之選蓋文皇帝在位造就作興以遺後聖無窮之用者也當是時吾吳中則有沈以潛先生以文學之良傳經術之妙初居京師稠人中巳有儒醫稱然上未甚知名也一日太醫院判蔣用文病上遣使問之曰卿即死誰可代者用文以以潛對即日自醫士擢御醫時朝廷方慎名器俄以潛得此人以為榮遇後殁楊文貞公志其墓實載其事以潛有四子寅賓宇宙能世其醫不絶宙有子復以儒顯其仲伯曰杰曰燾相繼登甲科杰守歸德有善政召授京秩而燾且績學翰林為庶吉士相與謀刻其大父著述以顯僅得其詩數十首而巳蓋以潛為學長於詩初有稿號潛齊集後忽散佚而此數十篇則録之人家者其生平得意之作尚多有也沈氏兄弟既以為恨乃視此益重之曰吾大父之言可以少而不傳乎使更訪求之安知其不積纍而多乎乃終刻之而請豫序其首以俟云𢎞治癸丑六月既望後題沈杰先大父御醫府君以儒醫受知於仁宣二廟一時才名德望海內翕然稱之而雅好吟咏特其餘耳杰生也晚不獲親領謦咳於几杖之下每得其片言隻畫未嘗不寶而藏之是編幼與仲弟編修燾季弟譙奉先考誥封歸德府君之命録諸人家而成是全集也恐嵗久湮沒謹用鋟梓藏之家廟寢室以圖不朽嗚呼愚兄弟非知詩者知寶先世之言而已乃若音律格調其工與否安敢容喙於其間哉詩壇老將指麾之下必有定鑒幸為我評之𢎞治戊午孟春孫杰百拜謹識沈石田稿序吳寬詩以窮而工歐陽子之言世以為至矣豫則以為窮者其遇厄必其言悲則所謂工者特工於悲耳故嘗竊以為窮而工者不若隱而工者之為工也蓋隱者忘情於朝市之上甘心於山林之下日以耕釣為生琴書為務陶然以醉翛然以游不知冠冕為何制鐘鼎為何物且有浮雲富貴之意又何窮云是以發於吟咏不清婉而和平則髙亢而超絶求之唐人若陸魯望是巳今其詩具在豫嘗讀而愛之魯望吳人也吳之詩自魯望首倡盛於宋尤莫盛於元然其人多生於季世身雖隱其時既窮則其詩亦悲而巳豫嘗讀而傷之入皇朝來偃兵息民天下向治及承平日久人情熙熙士之求仕者爭治經義取科第而出若相城有沈氏顧獨好隱蓋自絸菴徴士巳有詩名播江南二子貞吉恆吉繼之至吾友啓南資更秀穎雖得父祖之教自能接乎宋元之派以上遡乎魯望且其宅居江湖間不減甫里之勝賓客滿座尊俎嘗設談笑之際落筆成篇隨物賦形緣情叙事古今諸體各臻其妙溪風渚月谷靄岫雲形蹟若空姿態倏變玩之而愈佳覽之而無盡所謂清婉和平髙亢超絶者兼有之故其名大播不特江南而巳豫少居鄉亦喜為詩辱相倡和方自愧於松陵之襲美而其子數以書來欲得豫序其石田稿者豫何以為序也噫聖俞既仕而得以窮名啓南不出而全乎隱節其詩之工一也而悲樂則殊覽者當自得之啓南詩餘發為圖繪妙逼古人或謂掩其詩名而卒不能掩也今年七十餘詩思益發數日輒成什豫雖不能窺其際又安得而盡讀之耶書沈石田詩稿後李東陽右石田沈君啓南詩稿若干卷吳文定公叙之詳矣初文定以寫本帙示余欲有所叙嘗觀擬古諸歌輒愛其醇雅有則忽忽三十餘年間石田年益髙詩日益富至若干篇總之為若干首頃始刻於蘇州而文定已捐館舍翰林吳編修南夫來自蘇則以石田之意速豫豫憮然感之夫形聲之在天下皆出于自然然亦有詩歌以為聲藻繪以為形者其大用之朝廷邦國固未暇論而閭巷山林之下或不能無若論其至亦可以通鬼神奪造化降于後世乃流為文技之末而造其妙者猶以為難說者謂詩為有聲之畫畫為無聲之詩二者蓋相為用而不兩能若詩之為聲尤其重且難者也石田寄竒林壑博涉古今圖籍以毫素自名筆勢橫絶敻出蹊徑片紙匹練流傳遍天下情興所到或形為歌詩題諸卷端互以相發若是者不過千百之什一故多以畫掩其詩及其撫事觸物感時懷古連篇纍牘則藏於其家非遇知者斂不自售今既梓行而人誦則詩掩其畫亦未可知而惜余之不盡見也姑以是復南夫且終文定之諾云石田名周蘇之長洲人石田其所自號年八十正德十二年某月某日先大夫韋菴集序皇甫録録始分司呂梁先師文恪王公道焉録謝公所撰先大夫韋菴府君志銘曲盡平生友誼公止之曰勿言昔吾愛先生詩擬其得冉曾家法先生嘆曰豫嘗力為文思繼持正而起然其集不可概見奈何吾亦為先生憾之近得之祕閣手繕之而先生逝矣歸之以卒先生之意録泣拜受之及觀所謂福先寺碑玊鈎亭記又不具載則知集所遺者尚多重以為憾也既刻之以傳屬者諸兒將刻大夫韋菴集録竊惟持正沒七百餘年而後大夫奮起以繼其業固不難哉大夫負不羈之才有為之志而不遇於時君子謂臣黨分爭當事者斂手避大夫獨上書自劾有耻不與黨人之風施之政事亦若是矣而竟無所表見乃沈酣於詞章翰墨之間適以自終其著述多漫不存稿今所集殆十一耳可勝痛哉後之人有興起於先人如大夫之於持正者不能無憾也嗚呼皇甫氏自宋南渡居吳世富至録則落寞矣録方以仕顯輒獲棄斥是富貴不可常賴以世其家而不隕者斯文而巳遂刻之藏於家俾後之觀是集者無忘世業云耳嘉靖丙戌秋日男録書西村集序周用莊周有言曰刻意尚行離世異俗髙論怨誹為亢而已矣此山谷之士非世之人枯槁赴淵者之所好也語大功立大名禮君臣正上下為治而已矣此朝廷之士尊主强國致功並兼者之所好也夫仁義忠信以為學出則朝廷處則山谷人徒以為為亢也以為為治也而不知亢之未始不為治治之未始不為亢也故曰夫人幼而學之壯而欲行之欲行則君子欲之然能必其行乎哉欲之而不可得則其學猶是也是故亢而不為倍治而不為矜則固世之所謂通儒者巳西村先生自少好學於書無所不讀卓然舉大義不掇拾以為文辭而猶攻於史學於古今治亂之端官府政事名物數紀縱橫上下指掌論說莫不有肯綮歸宿以為學者宜如是而不屑以求一試聲名隱然起東南成化中三原王公巡撫江南以百姓之利病坐先生而問焉則厯厯語所以退復疏其事以道諸所宜更置公歎曰子之才可以當一面乃今得先生所著述自歌詩文辭之外其與旬宣大臣臺部諸使郡縣長吏往復論白及於政事者居其三之一焉莫不適常變盡利害里閭韋布之所推遜而無有選擇縉紳大夫之所以向用致理而不能舍去者皆備也則所謂通儒者非先生歟吾吳中經生學士講求時務水利莫先焉決塞變遷大要歸諸海而已殆難按跡而求復其舊也職方禹貢以來互為援据夫人而能之舉而加諸水則悖矣不然則又吏於兹土者大發在官之蓋藏而以畚鍤從事壞廬舍敝腓脛拓地數千里引旁流納其中而曰水去矣明年不幸而恆雨曾不能損水之分寸其如浮而不實費而無功何哉至讀先生論水利書首以謹隄防其大法有司使田者因地勢豫為防以擬水於是立之表以程其功課之藝以益其用代之粟以博其力夫民水也力為之防民猶踰之况不為之防乎裕民成賦之道未有能行之者其有用之學可以畫一而論也豫生也晚不獲操几杖以從讀其書而每有感焉先生既殁其文孫進士臣裒其稿為集豫曰是集也約而達勤而節謀而有徴不獨論水利若是矣可以傳也豫所嘗欲見先生所著禮纂若干卷者尚不在集中先生史氏諱鑑字明古吳江人學者稱西村先生吳文定公表其墓家世行實可具考也賜進士及第奉敕提督南贑汀漳等處軍務都察院右副都御史邑人周用書又序盧襄余少有志古文辭家無藏書乃取法近代又力不能致逺乃自近地始焉聞之吾鄉長老云吳興有張淵先生長洲有沈周先生吾吳有杜瓊先生吳江有史鑑先生其所論著皆可法也乃日夜求諸先生之文茍獲一篇輒口誦而手抄之然皆未睹其全而史先生者不茍出積日月莫能多得既而復求諸先生為人皆淵潛泥蟠冥探𤣥覽而又守禮謹度純王之民也於是名公卿之在朝野與有事其地者若前武功伯天全徐公禮部尚書文定吳公兵部尚書恭毅王公皆為布衣交上下其論商確古今區畫利害而沈史之名在公卿間尤赫然者也諸先生既沒三四十年間遂不復見有隱君子之作夫豈聲跡俱晦抑偶然無其人邪而諸先生之作尤播在人口嘉靖癸未春史先生之孫臣與豫同舉進士進士之子璧通家往來因請史先生之作凡昔所未覩者悉檢以授有若夜光明月賈人知其至寶求之弗得而一旦盡得之蓋有不勝其喜者乃日夜讀讀其賦其詞𢎞演而不至於淫體斯備矣讀其古詩其詞淡而不厭其雋永者乎讀諸近體其詞峻而整約而逺出乎興比之外者也讀其引膚引旁達秩秩如也章章如也讀其記辭核而事舉謂之善志讀其銘墓之詞實録而不近於諛其生者已慰而死者無遺憾乎讀其雜著其體殊其詞班班乎可觀商彛漢鼎其欵式要自有别也及讀其水利議郡政盡誅巫之文革奸之對則嘆曰繄豈詞人之詞也慷慨憤世懼俗敝而上勿恤政缺而民日以病不得已而言也嗚呼有本哉世嘗謂文學家有二臺閣經世之文山林遁世之文史先生居震澤之濆耕而讀焉釣而游焉爵祿不入於心非所謂山林之士乎然采其論著有足以經世者其於臺閣固已具之而諸名公卿固巳識之矣先生有其具而未發故發之於其子孫天道亦不爽哉璧將請於父以先生遺稿夀諸梓使豫書其言為序先生字明古别號西村故曰西村集云諸體總若干卷嘉靖八年己丑三月上巳兵部職方郎中前進士郡人盧襄師陳甫書匏翁家藏集序李東陽匏翁家藏集七十卷吳文定公所著而手自編輯者也為詩三十卷不分體製以年月先後為序文四十卷則分體彚載而先後亦隱然寓乎其間蓋維輯其所可識而散佚于世者弗與也公之殁其子中書舍人奭刻梓于家既免喪上京師以屬其諸從兄數月報詩成又數月報文卷成奭持以告豫請序首簡豫覽之悵然嘆曰言之成章者為文文之成聲者則為詩詩與文同謂之言亦各有體而不相亂若典謨訓誥誓命爻彖之為文風雅頌賦比興之為詩變于後世則凡序記書疏針銘論贊之屬皆文也詞賦歌行吟謡之屬皆詩也是其去古雖逺而為體固存彼才之弗逮者粗淺局滯欲進而不能强其或過之不失之竒巧則失之詰屈不失之詭誕則汗漫錯亂而無所歸於是作者雖多而文之體亦微矣然言發心而為行之表必其中有所養而後能言蓋文之有體猶行之有節也若徒為文字之美而行不掩焉則其言不過偶合而幸中文以古名者固若是乎哉公以經學為程試既而遍讀左傳遷史韓栁歐蘇諸家之文欲盡棄其舊業及為部使所迫取科甲官史局文名滿天下老居臺閣弗究厥施而終始於所謂文者故其為詩深厚穠郁脫去凡近而古意獨存其為文典而不俗鬯而不泛約諸理義以成一家之言由是觀之則其識見之真正行履之端恪情趣之冲泊無纍者不待挹其容儀聆其議論而後可知也其文之傳世固不可少哉昔人為一代數人一人數篇其漸盡泯滅者弗若今求之成帙之間非世所選者亦難乎其為觀矣知言君子執體裁而求之公之文其有取之無窮而讀之不厭者乎然則其散佚者尚博而求之以盡白於天下無徒曰家藏云爾正德三年冬十月朔又序王鏊文章不難於竒麗難於醇難於典則雖然醇與則可能也醇而不俚則而能暢殆有非力所致而至者焉其必曰所養乎是難能也故禮部尚書兼翰林院學士文定吳公官禁近前後三十餘年文章傳布中外海內宗之公既卒其子中書舍人奭刻其所謂家藏集者授豫請序豫不自揆竊嘗評公之文矣擺脫尖新力追古作豐之千言不見其有餘約之數語不見其不足其為詩寄興間逺不為浮艷之語用事精切不見斧鑿之㾗自謂得公之深也兹復何言乎獨念公生頗好蘇學其於長公每若數數然者及其自著乃獨異焉紆餘有歐之態老成有韓之格信其學力之至自得者深乎其所養可知巳明興作者代起獨楊文貞公為之最謂其醇且則也公之文視文貞吾未知所先後位亦顯矣使獲當路於時其功業豈少哉議者至今惜焉而公之所以自托於不朽者固自有在又何待於外者與余獲從公久每以道義相劘切其於序有不得辭然公此集自當信今傳後云家藏者公之謙也詩諸體凡三十卷序記碑銘雜著四十卷總之為七十卷後叙徐源詩以咏性情文以貫道德立言之純疵世道隆汚之所係也古詩三百篇風雅頌具載國政民風之異唐虞三代典謨訓誥則直言帝王治天下大經大法故誦其詩讀其書而其時其人蓋可想見也降自漢唐其文其詩雖各有表見回視風雅典謨之制迥然不倫何怪乎風頺俗降氣化之機使然也五季不足道有宋真儒輩出則曰詩曰文一以闡明義理而視古作自闢一途矣嗚呼詩之變遷文之造詣而其人之品殆與世相須而莫之能違也如是哉吾故友吳文定公幼游學校稟賦清純志趣超卓涵養端正筆刀雄健賦詩屬文即能鄙逺塵俗追蹤古人豫也叨陪研席同舍橋門出入相友每見一詩一文心竊嘆異館閣之具也巳而禮闈廷對果皆首魁自是入官翰林登樞內相日惟文字啓沃為職位望日益髙製作日益盛凡友朋宴會離合之私君臣吁咈治化之大形之諷詠著之紀述若雅音畢敔山泉宿潭必底其極者不止千篇而巳也方將憤樂忘老而無何痰作遂殞矣既葬之又明年其子中書舍人奭與其從兄奎奫奕搜閲笥稿得公手筆存録諸體詩凡三十卷序記志說之類凡四十卷自題曰家藏集蓋將以遺其後人知精力之有在也奭懼或散失既壽之於梓以公平生知厚莫豫先也請序于帙嗚呼公之名編蓋亦示謙爾若其詩其文豫既知之上而朝廷政治下而父子兄弟友朋載之金石碑版散見於四方者其與孝經小學人知傳誦者為不逺是皆發乎人情止乎理義渾然治世之音也非吾國家當天運之隆臻治化之美安得有是人而有是言耶是集也固藏之天下藏之人人者也豈特家藏乎哉異時史官采輯當代文章求之珠淵玉海以鳴聖世之盛獲見三代之人有不在於是集也耶豫不能辭僭為之序正德三年嵗次戊辰二月朔旦賜進士出身通議大夫都察院右副都御史致仕友人瓜涇徐源書瓜涇集叙王鏊瓜涇集者通議大夫都察院右副都御史長洲徐公源之文也公與豫同年進士而齒先于豫時同年三百人豫獨善公且相約為古文詞志甚鋭務追古作者為徒相與劘切倡和往來然公詞出示豫每詘焉自以為弗及也未幾公以水部分司山東之寧陽地僻務簡益肆力於學及官武選時吳文定公在翰林吳中名士皆集倡和益富而公出補外藩于浙于嶺南于湖襄最後以御史中丞巡撫齊魯所至不獨以政事稱而尤以文學著聞蓋著述滋富矣然豫自是與公濶焉久不聞問𢎞治末公上疏謝政事豫亦旋自內閣告歸乃復聚首吳中追思往時之會蓋三十餘年當時社友幾無存者其存而復會於兹獨公與豫也亦且老矣寧復往時意氣之盛然公遇事感觸必有作作必以示豫顧豫學殖荒落不復能一一追和與之上下其議論也而以為恨近世士爭治文詞以干科第既得第則遂棄去如辨髦蓋以時之進退升詘不在是焉耳公雖老矣而好學不倦是非其出於天性者哉固宜其所得之深且邃也而何可使其無傳焉故公之門下士與弟季止裒類其詩若文得若干卷刻之而豫為之序公名源字仲山瓜涇其所家處也朱性父詩序楊循吉世以位為詩輕重者小人哉里巷之見也人嗜榮利至於朝市而止矣乃詩亦然雅道䝉厄評賞不公與世態俱作可嘆哉然隱士晦處邱樊之中跡不及四方交不遍天下無豐餼大勢以招啖賓客使稱巳則其詩何怪不振悲夫惜哉彼市人者斯亦已矣固為騷友以知其詩不肯出一語褒賞至又為指斥排棄者皆然此則又可為太息者也嗚呼惟女子則妬惟小人則忌掩能蔽才獨何人歟性父居吳葑門之外早嵗力學左圖右史殆於忘寒暑一吟一咏用以自適或應親友之求或寫胸臆之見率皆簡淡髙古有味有法不落穠麗枯澀二境非深妙入悟烏能然邪性父詩未嘗自匿每亦流布在人家而知其詩者蓋鮮性父豈徒自咏自歌而已哉推敲指㸃務盡情境亦誠欲求賞於知己之士也茍使其終身不遇有碧山雙淚之嘆則友朋奚辭咎焉今吳中詩家不少何不共扶少借公論於齒牙間乎性父老矣諸公推轂騷壇幸甚朱性父詩序祝允明古人為詩趣識既卓而齊量又充其命題發思類有所主雖微篇短句未嘗無片意新特今人之詩自數大家外能者甚衆佳篇亦未嘗乏而求其合作者則殊鮮焉豫嘗究之蓋其率有二等而其病之所在則有四其率也守分者多疲詞腐韻無天然之態如東鄰乞一裾北舍覓一領錯雜裝掇識者可指而目之曰此東鄰裾也北舍領也是可謂之陋循質者多穠唇利口無敦厚之氣如丹青塗花伶人倡女茍悅俗目不勝研核是可謂之浮陋與浮皆非詩道與古背馳無惑乎其不合作也至其所謂四病則趣識凡近蹇步茍止望不出檐外行不起户限篇句之就如貨劵公牒惴惴焉不敢超敻常狀之一二抑又齊量寒薄一取便竭言梅必著和羮道鶴不脫九臯至其命題發思往往茍欲娛人不由己主且多為俚題惡目之所縈繞號别縱橫居扁齷齪慶生挽死妄頌謬哀大抵生紐情性趂人道路况其摹倣師法泄邇忘逺祇知繩武雲仍不肯想像宗祖嗚呼以二率為之岐塗而四病根乎其衷則何怪乎古詩之不復見哉僕少有志學詩然暗資謭學雖目力稍知毫釐如此而力之不逺率不能砭􅌊二竪自致古人亦可哀矣友人朱君性父攻詩有年自集其所賦成帙從前後所操曰鶴岑集曰野航漁歌間以屬豫序豫觀君詩之佳已有儀部君之序在無待贅詞竊獨喜其不墜二岐途有觸鄙懷因為之縱論以自致區區之抱如此以相為商度之不知君謂何如也募刻詩疏朱存理伏以嘔心少日已無錦囊之才流淚終年空有碧雲之嘆白髮因他搜索而生雌黃正我推敲而用抹去若干存來二三早䝉知賞前輩推轂之恩晚遇校編同儕斤削之力拈出三十年之前選得一百首之外欲望收拾在後之子孫莫若流傳先自於朋友刻梓不必如宋板之精鑑藻豈覬擬唐風之盛疏請諸盟義當厚助友生朱存理再拜徐迪功集序李夢陽徐迪功集六卷並談藝録子容寄我豫章豫即豫章刋焉印傳同好意表迪功文云初迪功殁京師也豫在梁子容訃豫曰昌穀遺言子序其遺文於是手其文欷歔久之曰嗟乎豫忍序吾友文耶麟鳯芝寶世所希遘見遘見之而遽夭滅亡也天生之故奪之耶抑既巳生而或修或短非天所諳哉迪功以賦文起吳中十數年間鸞翔而虎變彬彬乎出人士前矣然竟轗軻夭滅亡也凡此天果弗諳之邪乃豫觀李唐之李杜轗軻勃賀短夭未始不憐才流涕也然猶異代足寬解孰謂親遘見之如迪功者云客曰氣積久斯漓三代以後聖人罕生孔子以周末故不得位觀其大可占其細若是則魏徵將為鬼魅之說非耶客曰羣體迪功奚以之也豫曰談藝録備矣夫追古者未有不先其體者也然守而未化故蹊徑存焉雖然辭榮而耽寂浮雲富貴慷慨俯仰迪功所造詣豫莫之䆒竟矣今詳其文溫雅以發情微婉以諷事爽暢以逹其氣比興以則其義蒼古以蓄其詞議擬以一其格悲鳴以示不平參伍以錯其變該物理人道之懿闡幽剔奧綜記名實即有蹊徑厥麗鮮矣修短細大又曷論焉不載迪功履厯以别有志述北郡李夢陽叙跋髙第西蜀髙第曰徐迪功豫家食巳聞其名竊慕之末由見也比余遊京師幸賓次一接其顔色未幾迪功遂辭去惜未有以叩益也僅得談藝録讀之余涖長洲始得迪功集以窺其藴亦甚慰矣如九原之不可作何哉才高為造物之所忌豈諒然與觀其祖漢宗魏扢雅揚風蓋將與古作者爭衡於異代造物其尚能忌之邪吁迪功亦可謂無憾也已余又奚悲哉又跋徐縉右迪功集六卷吾友故國子博士昌榖徐君之所作也余嘗校焉以寄獻吉遂刻諸豫章然吾鄉大夫士猶不多見於是昌穀之子伯虬復刋之家孰云初昌穀甫弱冠游郡庠即攻古文詞知所向往談藝録其一也既舉進士與獻吉諸君子游而藝益工其寄興逺修詞潔尤長𤣥理有古詩人之風焉使天假以年所造豈止是耶雖然是亦足以傳矣正德庚辰春正月三日郡人徐縉識朱敬之集序王鏊天之生才甚難而摧之有若易然者夫天欲摧之則勿與之才與之才又曷為亟摧之此理之不可推而天之不可問者也吾洞庭朱氏有子曰敬之生有淑質抱負甚竒學又過苦始讀易又讀春秋日夜不懈遂得疾年二十八以死敬之好為詩遇事有感輒形於詩年少耳已有憫時病俗之志亦自悼其疾傷其生之不永也余讀其詞而悲之孔子曰斯人也而有斯疾也斯人也而有斯疾也哀哉吾洞庭近有黃訓季行者得第甫授給事中即死吳文與成者甫得第入翰林又即死今敬之未得第又死嗚呼吾洞庭之氣數邪三人者之不幸邪敬之有詩若干首其兄琰不忍其泯沒也欲刻行之余因為之序嘉靖癸未仲冬敬之名琬唐伯虎集序袁袠唐伯虎集二卷樂府詩總三十二首賦二首雜文一十五首內金粉福地賦闕不傳唐伯虎者名寅初字伯虎後更字子畏吳人也少有雋才性豪宕不羈家貧不問産業好古文詞與京兆祝公允明博士徐公禎卿內翰文公徴明相友善而尤工四六藻思麗色翩翩有竒氣然行實放曠人未之竒也嘗上書吳文定公寬覽書曰吳安得有此人邪頗為延譽公卿間而提學御史方志惡其不檢將黜之比試大學士梁公儲讀其書驚嘆以為異材遂薦第一由是聲稱籍甚會試禮部衆擬伯虎復當首選伯虎亦自負江隂徐經者通賄考官程公敏政家人得其節目以示伯虎且倩代草文字事露逮錦衣衛獄掠問無狀先是梁公奉使外夷伯虎將持束帛乞程公文送之竟以此論廢為吏耻不就免歸文徵明以書慰之伯虎答書自明文多載集中乃後益自放縱廢灑落魄所著述多不經思語殊俚淺人或規之伯虎曰夫太上立德其次立功其次立言寅遭青蠅之口而䝉白璧之玷為世所棄雖有顔冉之行終無以取信於人而䕫龍之業亦何以自致徒欲垂空言傳不朽吾恐子雲劇秦蔡雍附卓李白永王之纍子厚叔文之譏徒資嗤辱而已且人生貴適志何用劌心鏤骨以空言自苦乎宸濠之謀逆欲招致四方材名之士乃遣人以厚幣招伯虎堅辭不可至則隂知將有淮南之謀遂徉狂以酒自汚宸濠曰唐生庸妄人耳乃放歸得免於難過富春渚想子陵之風慷慨悲歌徘徊者久之築室桃花塢中讀書灌園家無擔石而客嘗滿坐風流文采照映江左外若奢汰而中慕沉𤣥勤究內典旁精繪事袠童時嘗獲侍髙論接杯酒之歡哲人巳逺九京不作撫誦遺文慨仰遐烈爰加搜托存梗概云爾王履吉集序王履吉者名寵吳人也少負逸材博涉墳籍沉精篇翰下筆綺詞壯思滔滔不休補郡學弟子員督學者最其文試必首列然非其好也試于鄉輒弗利乃貢入太學比游燕趙觀朝廟制度與四方縉紳先生游上下其論議而文益竒歸而嘆曰夫神龍升于赤霄尺蠖伏于泥淖黃鵠一息千里而斥鷃終日不過蓬蒿此其志大小懸絶何如哉且夫屈伸者時也利鈍者命也夫儒者握寸管挾方牘而揚聲名於億載彼得志者曵紱乘朱髙爵豐祿以焜耀一時不知駒馳電滅雲浮草腐後世無稱焉此與蠖鷃何異哉由是田佃石湖之旁築室其上臨流賦詩益窺古作者之奧而病作矣乃養痾於虞山之白雀寺泄其精於聲詩而病乃大作歸不逾月竟卒卒之前一日夢兩蝴蝶入袖寤而嘆曰吾殆已矣夫莊叟之言殆謂吾也嗟乎亦異矣履吉詩初宗李白既乃宗杜故其詩才力雄濶詞篇麗贍去輕靡而就沉著尚鋪綴而略陶鎔乃白雀集諸篇又復寄興冲𤣥思調清逸遂窺陶謝之堂幾入王孟之室矣惜乎天抑其進有志未就故所著僅此然亦足傳矣憶與履吉銜杯論文窮夜達旦謂古人之庶幾大雅之可作而竟已矣獨恨夫天之忌才不少假也昔魏之應劉唐之勃賀咸以才夭近代如姑蘇徐禎卿信陽何景明沁水常倫閩鄭善夫亦不享年何天之忌才若斯邪豈天既畀之才乃奪之年邪嗟乎履吉古之稱不朽者不以年也又何憾哉又序顧璘嗚呼觀今滃然雲興燦然星耀豈不有美於當世之士哉然性緣情泊志以習乖考之溫仁成德固以鮮儔矣姑略言之自視有餘者驕視人有餘者妬驕妬所終敗於人國烏用士為也得夭猶幸若吾友王履吉氏遹發鄉國早聞四方龍鳯為章山海為藴不謂有餘既甚者乎然逡巡若處女俯詘若蒙士自余所覩未嘗失色於人及其遇一善覿一才若饑渴之於飲食不厭不止故年逮强仕而海內勝流什五齒交矣乃抱痾長終玉毁牖下嗚呼慟乎人皆曰履吉之才不可再得也余獨曰履吉之清純不可再得也蓋傷人國焉其兄太常履約氏刻其詩余得而論曰古體五言沉鬱有色可憤可樂蓋類曹植鮑照七言跌宕瀏麗號幽吹而靄春雲蓋類杜甫岑參近體亦步驟杜岑而自攄神情殆與盛唐諸家相雄長可謂詩人也特非其致也謂所取於履吉者非以此嘉靖戊戌孟秋望日姑蘇顧璘序又序王守余弟履吉氏弱冠攻古文辭才情俊逸川至雲起垂二十年著述蓋千餘篇余幼共席研交師友蓬蒿環堵彈琴咏歌詬詬朝夕相樂也中嵗慕祿仕散游四方嗟乎遽棄豫而逝耶余悲夫才哲之夭傷顧余蹇劣以獨存每讀其文未嘗不呼天而泣也乃選其詩八卷文二卷因年編次庶可考其進云明嘉靖丙申七月一日中憲大夫太常寺少卿前吏科給事中王守撰吳都文粹續集卷五十六
