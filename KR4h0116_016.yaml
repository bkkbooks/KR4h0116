body:
  text: 吳都文粹續集卷十六明錢穀撰祠廟顧公廟碑石處道建中靖國元年秋九月知吳江縣事石處道以事至顧墟見古祠陋甚問之顧公廟也及進謁祠下惟繪形於板衣冠不正尤可駭焉於是撤除腐敝改作基構立其像設榜以位號春秋祀之按南史公名野王吳郡人精記默識博究載籍天文地理卜筮占候異書竒字莫不貫通其所撰集並傳於後篤誠至性勵精力行志踰其貌勇溢於義內孝外忠罔見其闕當是時東南繼統不一典章制度綴輯僅存使後世可考而知焉公與諸儒之力也惟顧陸朱張吳之舊姓其顯人髙士不為少矣而祀於今者甚寡公之此祠迥立窮闃之濱獨以名存而不廢亦豈偶然乎哉新廟既成民愈知敬皆以不可復默默而無傳也因書其大略且作詩以刻之庶幾有能歌以祀公者辭曰臺城赫赫東南雄纍朝文采諸賢公公之堂堂儒者宗詞學炳煥虎與龍幼則頴悟非常童丹青蓍蔡靡不通字書淵海藏心胸廣吞具區及吳淞入竭我孝出盡忠勇奮徇義忘其躬黃扉棘寺咸雍容國史邦禮任獨隆論著深博堅莫攻特立於世衡廬峯寂寥誰可詢靈蹤烟藹漠漠江波中一新祠像人益恭衣冠倣佛瞻遺風公惠斯民年屢豐德與祀永傳無窮本朝春秋二祀祝文惟公居陳國之顯官任黃門之清職製篇韻以深裨於士教捍湖勢以廣益於農田資其美功合登祀典式陳蘋藻鑒此微誠顧公祠在北門外三里菴側祀黃門侍郎顧野王或云祠即其所居故地名顧墟初廟卑陋宋建中靖國初知縣石處道改建今入祀典三忠祠記趙鈞大丈夫者英雄挺生於當代而威風振拔於古今功業特立於一時而聲名激烈於千載至於殺身成仁捨生取義見危授命非至忠者不能也謹按諸史吳太宰伍員赤心事主犯顔極諫致遭讒毁竟死無辜於吳甚忠唐忠臣張巡獨守孤城糧援俱絶殺愛妾以食將士罵賊就死於唐甚忠宋鄂王嶽飛奮身為國志在恢復中原大功垂成權臣為厄於宋尤忠時惟三子氣足以配天地貞足以貫金石力足以撼山嶽有係國家安危之機行跡雖殊忠則一也是宜載在祀典廟食百世吳江城東之橋曰垂虹上有亭俯瞰太湖近接三江為東南勝概前監州德濟哈雅所建內祀圓通大士命僧主之嵗丙午冬燬於兵明年春知州曲阜孔侯甫下車輒欲經始僚佐克諧其議以時眚未舉也明年秋政通人和庶務具舉遂命工興役陶瓦聚材民趨其事吏督其程逾月而畢亭去三髙祠密邇一日侯瞻眺乃毅然曰三髙泥塗軒冕全身逺害固士君子之所當尚故聞其風而貪夫可廉三忠持厄扶顛以身殉國尤人臣之所當為故聞其風而懦夫可立然使在人人知三髙之見幾孰與共理其國哉要之士亦各從其志而已考昔員飛之忠吳宋保障東南功為甚大巡忠於唐雖逺在睢陽而蔽遮江淮功最居多矧自前代三髙得祠兹土而三忠獨缺使人不能無憾今亭既成祠而像之揭以三忠孰曰不宜俾鈞記之烏乎三忠以文武良將竭忠報國向無奸臣之譖員必不至見殺吳國未亡不有强鄰坐視不救巡何以陷唐室未至陵夷若夫宋雖南渡而中原父老日望恢復使無權臣妄主和議飛不至見殺國將還於故都古所謂身在國安身亡國危三忠有焉惜乎生也不幸死得其所此心一揆異世同符相望於千載之上雖死猶生有志之士蓋深悲之異哉侯建是亭殆有三善表良將以勵臣節重名教也尚忠烈以敦薄俗正風化也繼述古跡不為遊觀之所則又循良之能事也有是三善奚容不書遂識嵗月梗概刻諸石以告來者洪武元年戊申冬十一月初吉大梁趙鈞記三忠祠在長橋洪武元年知州孔克中立以奉吳伍子胥唐張巡宋嶽飛昭靈侯廟碑事詳舊唐書本傳石處道元符三年春正月上以盛德大位旋轉乾坤一正造化號令風動巍巍煌煌窮廣極袤有知無形莫不被服其寵光而翺翔乎和氣凡天下神祠列於祀典者必命有司致祭而修完焉吳江昭靈侯廟內腐外毁左支右吾偶形繪容缺滅弗備春秋薦享亦不復設名在實廢禮甚易而人莫行大恩既降協於輿情乃鳩羣材乃㑹衆工官給其費私獻其力革陋為壯除敝以新門廬潔嚴儀像赫赫幽祕恍惚若慿而安考於圖記乃唐曹王明太宗第十四子也善飛白鳥跡書見稱於時調露中為蘇州刺史遺惠餘愛民不能忘先天二年始立此廟有黃蛇居其中人益異之水旱疾癘是禳是禱罔敢或怠而舊無碑刻俗失其傳朱梁開平間淮冦圍蘇州甚急錢王禱之輒自潰去江表以寧既而奏其事乃以為漢臣而封此侯爵豈褒顯之意歟蓋廟食於縣境凡十有二號曹王者七李明王者五去唐未久載籍具有而時代之差以近為逺稱謂之謬或斥其姓名烏乎修廟之嵗霖雨沾足江湖不淫土田加闢年穀大穰於是邑之僚吏鄉之耆老皆以為祀事不可以不舉也故備禮以格之名號不可以不辨也故論其氏而正之本末不可以不紀也故托其實而書之千以頌上德之萬一而揚神休乎無窮其辭曰皇帝正位浩浩其仁升日之旦發天之春隆恩誕敷流載溢覆于明于幽罔有遺漏具區之旁松陵之墟霄澄壤潔神靈是居有唐曹王太宗之子舊收斯人人懷其惠聖政伊始嚴祠孔新禮舉名辨昔屈今伸報稱維何肸蠁貢祉彌億萬年隂相宸扆知縣事石處道撰曹昭靈侯廟神應記沈義甫朱邑令桐鄉謂後世子孫奉我不如桐鄉民遂葬焉邑祠之如父母李頻刺建州喪歸郡民留之建廟黎山靈響日盛烏乎偉哉善政之得民心如此邪王諱明唐太宗皇帝第十四子也肇封於曹常為吳郡刺史有惠政王薨諡曰恭郡民去思朝命立祠今吳江縣城隍即王妥靈之所也俄而蜿蜒示異邑人異之先天中遂錫廟額惟王生前已分茅裂土矣而僅以侯爵告神議者隘之然昭靈美名邑人至今以為稱夫王以帝子之貴能脫綺紈之習施實惠福千里六百餘年之久吳人至今家祠而人祝之前後守郡者鮮儷其視桐鄉黎山二賢實可比肩凡六邑惟松陵奉之尤謹邑凡二十九都為廟蓋十餘所美哉王之德也非有大功烈大德政入人之深何以得此於吳人耶縣之西南八十里溪號雙楊廟之建已三百載民之家於是境有禱必應籖卜之靈其驗如響嵗在丙子大兵南征民相率禱於祠下王隂有以相之他境則遭焚燬惟此方晏然無虞里人思以答揚保護之庥者備極其至顧惟廟所在迫窄傾欹非所以彰神威而酬靈貺也於是鄉老周德華等捐金穀為東西兩社首倡廣而新之人家富民從而樂助經始於丁丑之春落成於戊寅之夏繼而有徐道興建崇軒於殿階之前土木雄麗舊觀頓改獨像設未飾周彬叔者鄉之儒士信謹者也王復示夢於周俾加繪事自一廟由內及外煥然更新較之近都諸祠允為之冠余鄉震澤去雙溪才五六里市皆火燬而昭靈一祠巋然存於烈焰中民居之附麗者得獨免焉莫不敬異而邑士潘庚金以廟記為請豫仰王之靈欽王之德久矣不敢以謭淺辭乃為之述梗概著之金石以傳永久因作迎享送神辭以畀鄉人俾歌以侑祭焉詞曰帝子降兮涇渭之渚朱兩幡兮為吳邦主仁聲演迤兮實惠溥去之六百載兮威靈如故疫癘驅兮禱而賜雨生我父子兮長我禾黍籖卜錫兮若相告語夢寐接兮如目斯覩干戈搶攘兮室多燬蒙王之庥兮家安堵民思報德兮闢神宇牲潔酒馨兮蘋藻盈俎黃髮兒齒兮式歌且舞靈旗央央兮儼其來下佑吾人兮永為恃怙千秋萬祀兮廟食兹土至元十七年五月既望書昭靈侯廟在縣治東半里祀唐刺史李明明太宗第十四子為吳郡刺史有惠政而民祀之今改衍慶昭靈觀一在縣治西南雙楊鎮滬瀆龍王廟記許約自羲軒肇人文至堯舜而祭法始備如類上帝禋六宗望於山川如泰峙王宫夜明幽宗雩宗牲幣祝號之次壇墠上下之等不過天地山川之神其氣揚詡發泄昭昭以示人者以薦吾誠而焚燎縣祀埋瘞亦各從其類爾宗祀郊祀而配以文王后稷以宣明天地生生之德而成之者在乎聖人之位天地育萬物不負上帝之所托其作配也固宜至呂令始以五行著德立功者王名以人孟冬之月帝顓頊神𤣥冥以為水官之長漢因之嶽瀆山川百神之祀皆以人司之位次之髙下班資之崇卑疏封錫爵命由上出殊非古矣今神龍之祀從漢制也嵗甲辰前運海千夫長任仁發以吳淞故道湮塞使震澤之水失其性為浙西居民害垂三十年慨然上疏條其利病疏道之法中書以其議上聞聖天子惻然憫下民昏墊命立都水監治事浙西以御史臺治書侍御史李公果為省選持命江浙行中書省榮祿大夫平江政事撤爾公董其役公與千夫長仁發等爰諏爰度乃相其山川形勢之宜髙深廣狹之度工役之數錢穀之費畚鍤之用飲食之需乃命民索綯乘屋厚稿秸以防其卑溼時作輟以防其倦怠為醫藥以防其疾疫上以誠感下下以誠應上民乃歡呼四集而樂於趨事赴功始於大德八年十月望前二日西自上海縣界吳淞舊江口東抵嘉定石橋濱迤邐入海長三十八里一百八十一步三尺深一丈五尺濶一丈五尺計夫之數一萬五千為工一百六十五萬一千七百一十有二至九年二月晦日畢工為日一百八十風雨祁寒休假實役七十五日復置閘竇啓閉以時並請明威將軍構石置福山閘物不疵癘民無夭災而事竟集公乃集僚屬命州牧五覆五反潔牲牢以祭民觀者如堵如復觀漢威儀克復舊物仁發等以神龍祠為請公乃顧瞻黃土之灣民物日盛商賈日集兹土可以妥神需余為記余原兹自神禹治三江以泄震澤之勢至錢氏興江再塞嘗導之而迷者復今又塞公等又導之而湮者通使天地山川之氣呼吸吐納與潮汐上下者絶而復續鬱而復伸由是觀之旱乾水溢豐穰饑饉匪降自天亦人之力也吁安得是數君子都俞吁咈游於巖廊之上以復堯舜三代之治使萬物各遂其性如斯江也哉雖然事難於成而尤難於久惟君子其圖之惟神其相之大德九年三月二十四日河內許約記滬瀆龍王廟在嘉定縣西南黃渡鎮元大德八年建白龍廟詩在樂智鄉劉家港北楊維楨金碧龍宫岸海坳海鄉遇旱望雲交空中白氣俄成練不比黃旗滚海蛟東嶽廟靈石贊尹惟一時至元乙酉朝貴命置碑石赴都抵直沽忽爾中斷石中有聖像儼然復使載歸於嶽祠安奉焉道士尹惟一乃敬述其事稽首而獻頌曰天然一片龜山石中有靈異無人識海航萬里趨京邑當與卿相鐫碑刻贔屭擘裂不可測洋洋上帝遺形跡劉公練視志齊莊殷勤扶護還故鄉尚虞湮沒難緼藏博士朱公為舉揚移鎮行嶽古道場人人贊仰功莫量上願聖君夀無疆東嶽行祠在太倉州北五十里橫涇市之南天妃行宫楊維楨海國神風捷可呼緣林徼福苦相紆片帆尚借周郎力護得青龍到直沽天妃宫在劉家港北瀂漕口舊名靈慈宫二卿祠堂記夏時正國家仁愛小民在安之已矣亦既屬之內外羣司而猶慮夫府州縣有不職則民有不安也乃時輟在廷大臣出巡撫焉惟巡撫有地環數千里其地即府州縣之地民即府州縣之民巡撫髙臨州縣之上凡軍務民情咸得便宜處置以振率各府州縣之所不逮發政施仁黜貪去暴簡修進良剔腐蠧補罅漏持欹傾燭幽隱凡可以嫗哺而袵席之者無所不致其極也是以上宣德意下達民情以是對揚天子休命慰答人民願望生則民愛戴之歌頌之去則思之不忘也沒則祠而尸祝焉不亦宜乎工部尚書周文襄公宣德正統中以工侍巡撫南畿謂巡撫事在安靜不擾民自安大江迤南南畿若府州縣皆吾地也而蘇松常三府稅糧淵藪國家之所倚重人民物産官府百凡科率視他或相倍蓰或相十百又前此統紀不一征斂無藝費出非經民病去而田蕪逋征積數十盈萬民力竭矣足國云何故於三府尤注意焉下令置水次倉秋糧不許糧長私家收受一切詣倉抵石輸官起運存留外之贏羡名曰餘米一嵗中若急副和買顧募徭役土木經營之類事起一時胥此焉出若馬草夏稅軍需嵗造鹽鈔之類雖有常額亦此焉出外仍餘者耕補斂助歉儉賑貸恤孤養老均施溥被之也何公心計周密如此至到也邪自是居安逃復愁化咏歌逋負有償宿蠧呈露志漁獵者無地售其巧喜夤緣者無路投其技閭無胥𨽻之迹户絶鼗柝之召雞豚蕃息麻穀被野嵗復連熟米斗錢十七八文或十四五文稀曠僅有者乎如是十有七年還朝升尚書復來又一年致仕歸民思之歌頌之猶洋洋也詩曰有斐君子終不可喧兮此之謂歟嗣公之賢則有南京吏部尚書崔莊敏公天順中以都察院副都御史來其地前日周文襄公之地其民前日之民有其地有其民得其道得其心文襄公心在安民得其心斯得民矣民之愛戴之不猶愛戴文襄公乎崔公於文襄也無所於改而持之特嚴然政由俗革偏滯頽靡整飭疏滌時措之宜乃相成以安民非相軋也是以貧厄在所惠鮮則均徭之法立財貨宜慎出則漕運之費節鑿常鎮一帶運河免孟瀆下港逺涉風濤導吳淞等江下流泄震澤苕霅夏秋泛濫獄有疑濫每與平反崑山縣王阿隆充太倉衛軍死無子里中揭黃册丁盡户絶報無勾矣他日其同姓無賴子利阿隆有舊田廬衛且去其家近冀不出家充軍月得食官廩乃用自誣為阿隆近親先避軍移貫在他戶言於清理軍伍御史御史信之遂逮里中論以隱匿坐充軍者凡二十四人列狀訴於崔公崔公閲其狀非不根且謂律罪人首實則連坐當末減又中更大赦若全坐非律意乃移檄御史復不省崔公曰凡在吾巡撫皆吾民有不幸猶將隱之況充軍乎況二十四人乎竟直此二十四人一旦脫去軍幡然復歸於民逺近莫不大快慊御史自後遇隱匿者猶與論減不充軍人謂由崔公有以覺悟之也在南畿凡五年還朝厯升吏部尚書改南京致仕歸當崔公昭雪二十四人時今浙江參政崑山陸公容之父封職方郎中公名在二十四人中參政公尚未官作雪寃頌頌崔公而職方公欲為立生祠屬制令不可止而此心則懸懸往來不置也適慈溪楊侯子器以進士授知崑山勤慎有立志期月政通民悅繼養以教乃考民風按地圖得城中淫祠與庵院私創者悉毁無遺留而移其材為公廨實館郵傳申明旌善亭鄉賢祠社學材建需縣東去一舍而近太倉鎮海兩衛在焉有三官閣者亦在所當毁參政公言於楊侯周文襄公崔莊敏公嘉惠吾人吾人一日䝉其澤吾人一日甘棠之思也盍釋是屋不之毁改以祠二公永副吾人勿剪勿伐之詠乎楊侯諾之乃獨水火其土木偶而綢繆其牖户汛潔其醜穢正其唐塗飾其漶浸黯黟斥其非度者琢美木為二公之主題曰工部尚書周文襄公之神南京吏部尚書崔莊敏公之神扁其屋之顔曰二卿祠堂而奉安之以少牢酒清辭腆神之格思逺近來觀贊歎悅懌謳歌而退於是參政公手述二公遺惠蘇人者之略來徵為祠堂記辭不獲乃記之曰惟昔皋陶陳謨在知人在安民安民則惠黎民懷之二公惠在蘇民民懷之深也故於祠堂之建其悅之也亦深一誠相孚思之人而不忘者乎是舉也參政公實啓之而楊侯克成之因民心之不忘用以不忘二公是即所以不忘乎民後之繼之知不忘乎民則必不忘二公則此祠堂之建有永其無斁乎周文襄公名忱吉水人崔莊敏公名恭廣宗人謹記南京大理寺卿仁和夏時正撰二卿祠祀周文襄公忱崔莊敏公恭先在陳門橋西南改三官廟為之後移置常春里文昌祠嘉靖二十六年同知周鳯岐立祠儒學附崔巡撫辨誣記吳寬國家屯軍旅為防奸禦侮計自京師逹於邊徼曰衛曰所建置殆遍而所謂軍旅多以罪謫發之人於法子孫絶則以同籍者充補惟别籍於謫發之先者不豫其人書於版冊甚詳里有正有胥有耆老版冊一出其手嵗久弊起或脫漏或隱匿其罪著於律令甚重每嵗部符下府縣州俾專官理之旁稽窮訊若治獄然又數嵗時遣御史理之所以稽且訊者益密謂之軍政其法載於條例甚備蓋使凡名在尺籍者不得幸免然亦不欲誣平民以充什伍之數而吏不察往往失法意以為民患若某衛軍王阿隆者故崑山縣太倉二十九保人也既沒而户且絶其族子凱一旦赴御史郭觀自首為隆之裔匿他里蓋凱固王氏别籍子特利隆所遺田産為是耳觀謂民無自誣以軍者信之二里連坐如律者凡二十四人悉配蘇州衛今職方郎中陸君文量時尚游鄉校以其父某為里正在連坐中即狀其事求白於觀觀以成案為詞衆爭稱寃適今南京吏部尚書致仕崔公以都察院右副都御史巡撫畿內走訴之公覽狀曰是固可辨檄觀辨之觀不理衆乃復訴於公公委所屬衛若府官集二里父老輩核實而凱之兄且自外歸白其事竟坐凱以罪悉復二里二十四人者為農實天順四年之八月也時文量為雪寃頌以獻公其父曰公有恩德於吾人及吾子孫是未足以報乃與其弟祐圖於衆欲建公生祠嵗時祀之顧有禁不可既數年衆益思公文量乃具始末請記曰此吾先職方公與里人之意也幸書之豫因述此以復公名恭字克讓世家順德之廣宗登正統元年進士第厯仕內外四十年政尚忠厚而剛明善斷其出巡撫尤號識大體恩德被人者尚多此其一事耳在公固不足書然在崑山之民不可不書也且世之健吏為民患也久固有與其事類可書以示人者聞昔宣德初所謂軍政條例始行於天下御史李立往理蘇常等府立既刻薄濟以蘇倅張徽之凶暴專欲括民為軍民有與辨者徽輒怒曰汝欲為鬼邪抑為軍邪一時被誣與死杖下者多不可數勝蘇人恨之入骨髓然畏其威莫敢與抗者並時常倅則有張宗璉獨不阿御史意數被辱宗璉痛民無辜竟忿鬱以死死之日民相率奔走哭奠及喪出白衣冠送者數千人至立廟祀於江隂之君山廬陵楊文貞公實記其事而徽後犯法死刑部獄中鼠食其肉其子貧困寄食吳下道路見者猶嗤罵之此善惡之報也夫觀之刻不至立與徽之甚而宗璉之遺愛可倣佛於公因附記之以為當官者之勸懲云兵憲王公生祠記姜龍古先聖王之制祀典其大者三曰能捍大患曰能禦大災曰法施於民惟今兵憲肅菴王公有焉天下之郡劇且弊莫蘇為甚公為名御史銓曹者掄材莫如公宜乃屈公為守屬縣之崇明環海而宅其中厥土惟沙厥民漁稼之餘以巨艑轉販私鹺以為業甚則椎剽江海間莫復誰何沿習已久乃嵗乙未有董五者黨翼千計慿陵唐突稍稍侵漁近地急之則操戈內向邑里震懾耋稚號呼丁壯荷擔跂立晝夜四五動司兵暨守土官大駭以拒則力綿以撫則信尼錯愕相顧莫能出一語建一畫者民曰王公吾父母也來則吾其寧哉冦亦曰王公吾父母也來則屬得生矣公聞之攘袂起曰凡居民凡頑民皆吾赤子也其弄兵政驅之耳夙駕至太倉呼諸耆老諭以刑福利害俾轉相傳告辭氣慷慨志意開爽聞之者不啻挾纊不旬月渠魁授首羣脅解散各安厥生無亡矢遺鏃之費拯塗炭而置袵席之上兹不謂捍大患乎又明年七月颶風勃興雷轟焱發海水皆立決防壞墉民用墊溺我藝我植粳稌藿菽麻茼木棉蔬茹果蓏悉偃悉禠株無孑遺民以大困耕無所業織無所資喁喁嗷嗷死徙充路公時為兵憲坐鎮卧護出餘散實詬病濡枯又借民力以治水利俾就公餉民賴以活土著晏然不異穰嵗兹不謂禦大災矣乎太倉之地襟帶婁江枕藉瀚海厥土沮洳潮汐蕩激盈縮靡恆隆汚相懸田糧紛糾日增月減賦大不均昔割三縣以為州也其土盤錯交互初開闔之際豪緣為奸取甫田者無斗稅無立錐者有宿逋惟公於均賦餘力尤加搜抉銖較寸剖躬握籌算務核其實於是據田者罔隱而失業者蠲纍積弊大鏟民痡有瘳又墟分區布勒之堅珉後雖有桀黠者無所容奸兹不謂法施於民矣乎州之士民願生立公祠永以報祀州太守萬侯敏郡博王君應槐偕鄉仕王世昌等監生劉龍等學生陸之裘等耆老沈鯨陳信甫等太倉衛官軍汪麟馬林等鎮海衛官軍武尚文袁湘等徵詞於余以紀厥績且曰礱石以待久矣余州民也躬承德澤厯厯可徴乃稽古制而為之辭以見祠之非濫也頃嵗王秦劇冦至厪朝命乃克戡定然公之功居多别有紀載公於厯郡美政多有兹特為吾州頌故不得兼載焉公諱儀字克敬畿內文安人兵憲王公生祠祀肅菴王儀在報本寺方丈內孝友先生祠迎享送神詞王逢東海隅兮三州宅黿鼉兮蛟龍湫羌聲教兮悠悠靈斯藏兮道修道不行兮長邁祠學宫兮子孫永賴日薄堵兮風林鳴如聞音之謦咳楚葵青兮靡靡牲甚肥兮酒㫖白駒兮猋馳儼衣冠兮戾止有聖賢兮依歸魚川泳兮鳥雲飛靡潛伏兮弗昭著靈自今兮欽孰違孝友先生祠先生諱玉字德卿少游之裔受學於蛟峯方公隱居崇明淑門弟子若干人先生卒門人私諡孝友請祠於州庠常熟縣城隍廟記吳訥昔在太祖髙皇帝恭膺天命作四海人神之主爰念元季綱淪法斁祀典瀆揉不經馴致禍災薦起民墜塗炭乃屢勤睿思建立制度正名定分為萬世成憲若郡北城隍廟亦其一也初洪武元年戊申詔封天下城隍神在應天府以帝在開封臨濠太平府和滁二州者以王而外此凡在府州縣者以公以侯以伯時常熟循元制為州得封城隍神曰鑒察司命城隍靈祐侯二年已酉州改為縣三年庚戌詔定嶽鎮海瀆俱依山水本稱城隍神號一體改正仍頒格式蓋造廟宇屏去閒雜及泥塑神像於是改題木主曰常熟縣城隍之神四年辛亥特敕郡邑里社各設無祀鬼神壇以城隍神主祭鑒察官吏人民善惡以降福禍未幾復降儀注新官赴任必先謁廟與神立誓期在隂陽表裏以安下民祝詞儀注出自宸衷聖謨洋洋發明福善禍淫之機以警飭下臣至矣然吾邑建廟垂七十餘載朽蠧剝落日就頽圯今知縣事郭南深懼無以揭䖍妥靈躬捐俸資以為衆倡經始於正統庚申落成於次年二月堂寢門廡宏壯軒豁視昔有加適豫致政歸老相率謁文垂示久永豫惟明有禮樂幽有鬼神古昔聖帝明王罔不以事神治民為先務城隍之祀經典弗載蓋後人因其保障民生以義而起也逮宋姚鉉編唐文粹始載乾元中李陽冰縉雲城隍祠記然未有封爵配位也及元草廬先生吳澄記江州城隍廟後殿則曰江右列郡以漢頴隂侯灌嬰配食豈以侯常定豫章諸郡而然歟自後繁䙝日甚聖明統御窮神知化始遂更正豫耋耄筆研久絶兹今弗拒衆請者蓋欲昭揭聖制以示後人俾勿至於違墜也新修城隍廟記錢仁夫城隍廟自京師以達郡邑皆有之其神位號前代不經我太祖髙皇帝詔令天下祀典神祗皆從山川名號一洗前代之陋習其神之職在默相政教康保兆民不既重歟凡有官守者涖政之始必詣祠下與神誓蓋人之交於神明有不可誣者常熟縣城隍神廟在縣治之西背山而面陽有堂有寢左右有廡前有重屋為門有道流以守之自成化初邑令澶淵甘侯宏濟撤其舊而新之厯今三十年來日就摧廢無以妥靈揭䖍今令王君大經亦澶淵人也以進士領邑謁於神欲新其祠以嵗歉不果踰三年為𢎞治乙卯政務粗理喟然歎曰廟之弗葺豫則有咎遂捐已俸以倡首而寮寀相與贊成之始事於四月望日告成於五月之下旬堂寢門廡黝堊丹漆悉還舊觀而又益以前軒易新肖像邑之士紳嘉君之政治民事神知所先後謀於仁夫請記其成立石以告來者仁夫因是而有感焉常熟俗崇事神自廟迤邐而西半里神廟並列雖非祀典所在然有禱輒應民日奔輳擊牲陳醴甚禮甚謹有如城隍之祠朔望有司展謁之外香火稀簡其庭悄然謂之何哉蓋民固愚非有威靈以警動之則其神為不神而怠心生焉今夫神之職之在於默相政教康保兆民是福也民䝉之而不知不知則無所事於祭賽且神以聰明正直為德其貴乎民者寧若世俗之情哉而為之有司者常先民以致敬今者祠宇之修是亦牖民之道也夫祭不欲數數則瀆祠不可壞壞則簡請以告之邑人而為令誦之是為記城隍廟在致道觀東即東靈寺基洪武三年建正統七年知縣郭南修𢎞治八年知縣王大經修重修城隍廟記節文范純嘉定鬱為東南壯縣城隍神祠既作而燬國朝洪武三年始遷於城之㢲隅逮今百年日敝日壞無以揭䖍妥靈祭禱弗應民屢以災告天順改元秋龍侯謁來為令下車謁祠顧瞻興歎即選道士居守以謹防護明年下民信孚百廢修舉捐俸倡率和者如響於是作額亭易儀門新殿宇創廊廡築垣墉中肅像貌側肖司屬規制位次布列以度黝堊丹漆施用合宜輪焉奐焉倐乎改觀是役也經始於三月八日訖於十月十日匠以直庸夫以義集安恬無勞人歡神喜侯乃率厥寮屬告成於祠自是春秋血祭神每顧歆嵗恆有秋而民病以瘳矣奉訓大夫南京兵部員外郎邑人范純撰城隍廟在縣治東舊在富安坊洪武三年移置太倉城隍廟碑陸容太倉城隍廟舊在今太倉衛治前元崑山州志云城隍廟在州治前十餘步蓋衛治即州治也崑山州治太倉時立廟於此及州治西遷其廟不廢皇朝定制凡天下府州縣城隍之神每嵗春秋與風雲雷雨境內山川之神合祭於壇太倉制衛以來無壇祭嵗二祭崑山縣主之蓋百二十餘年矣然此廟地才餘畝逼臨通衢有司歲時來祭齊宿無所先是病其隘陋者亦嘗圖遷之而未果𢎞治庚戌知崑山縣事楊侯子器奉例毁淫祠以太倉東嶽行宫例所當毁乃毁嶽神肖像而改為城隍之廟其地規模宏敞殿宇廊廡復整麗壯觀縣大夫春秋致祭衛武臣朔望展謁鄉兵民日夕瞻依祈禱上下便之既訖事住持道士奚宗哲因太倉衛指揮使張侯漢請豫為文以記之豫維天下之理厯萬世而無弊者曰誠曰正曰時而巳故天下之事去僞而反於誠者其名正違邪而歸於正者其言順由小之大而適逢其時者其事為易成若東嶽宜祀於魯而濫及江淮以南是僞為也城隍捍外衛內庇及生民功誠不在坊水庸下故其神秩在祀典一實理之所在也非去僞而反於誠乎嶽祠像設大率以天堂地獄之說誣惑人心是邪道也國朝制禮凡所謂城隍神者盡革前代封爵前諡號而悉正其名不使雜於叢祠野廟之列非違邪而歸於正乎又嘗考之州初治太倉時廟制未偹蓋嘗即興德廟祠之又嘗即海寧藏殿祠之又泰定甲子始有州前之廟逮今厯一百七十年而改遷於是是非由小之大而適逢其時乎然則是舉也有以萃人心之誠有以成祀禮之正有以適時措之宜上不費於公下不勞於民而事以就緒吾知神居安妥揚明效靈蓋將固金湯於億萬斯年與皇圖同其悠久庸詎直新改作聳觀聽於一時而已哉是宜楊侯有見於此而果於改遷宗哲等圖昭侯之德而不敢後也文既成復請曰謀遷之初從㬰其事而贊成之者張侯漢與其僚汪侯澄江侯英咸與有力焉不可忘也因併記之城隍廟祈晴文倪宗正神奉天命守兹土而惟其禍福宗正奉天子命守兹土而惟其賞罰隂陽職分相為表裏天子又命宗正等嵗祀月謁是又左隂右陽而托以輔宗正之不逮恭惟天以生物為心天子體生物之心以為心神與宗正奉天命天子命守兹土雖一草一木一禽獸不得其生皆神與宗正之責況生人之靈乎兹土去嵗淫雨秋成已虛民久乏食骨肉弗保顛沛流離餓殍載道兹土之民耗半所望者今有年耳二麥將登積雨為淫節枯穗凋蒸鬱內腐田疇既治水潦泛溢插蒔維時無可施功秧始發生隨即黃萎乏食之民上溼下塗不能轉展輸販謀生無門待死而已況疾疫流行十舉九殞兹土之凶災神固監之宗正又瀆言者畏天命畏天子命而神與宗正職守弗稱宜各罹於罰宗正恐懼修省愆德蠧政不敢有於身其才力之不逮惟望神是輔嘗聞天之命官各有攸司風以吹噓雨以潤澤日以烜熯霜雪以摧折四時以生以長以收以藏天特無思無為而已庶官各以生物之心而行其職正也今淫雨為災是坎官浸濫離官罷曠水盛火衰陽伏隂愆非天子之本心明矣且朝廷利病天子許宗正等實封奏聞伏望神悉兹土利病及民物不得其生之狀昭告於天分庶官抑雨師揚日御竄雲霾降風伯用開障蔽聿回清朗天必降聽神言諒無阻遏其或山澤溪潭水陸之妖竊神權而肆虐者神惟指揮神師覆巢搗穴明正厥戮然後聞之於天其或厲鬼潛悲吐氣凝隂神其出陷脫幽超彼逍遙之境無使含寃叫號閭闔如此則神功感通天心喜豫祥颷煽和旭日布輝宇宙澄清山川光霽兹土凶災以弭為生人造福而宗正與有力焉不然則神與宗正惟待天罰與天子罰而已夫以宗正之庸下而受天子之罰無怨矣神之聰明正直豈宜默默無為而受天之罰乎宗正冒昧狂言不知煩陋惟矜其愚悃而錫祐焉不勝悚懼之至城隍廟在州治東南隅即元左丞朱清所建東嶽廟𢎞治十年改建重修城隍廟記略文雷中崇明治西南隅有城隍祠舊遵禮制而建水旱蟲疫必於此禱第狹庳弗稱久未改作一夕回祿盡燬知縣長垣李顯率諸僚屬捐俸一嵗捐白金十兩倡諸好事者出資以助猶不敢專請於郡刺史丘侯然後市良材賃工役易故鼎新作城隍前後殿宇若干楹髙明壯麗加於舊規營治於成化癸已冬落成於甲午春義助可書者則備書於左云崇明城隍廟在縣西南思敬巷新建鄉社亭記顧清𢎞治甲寅任邱鄺侯為吳縣令始至延見其邑人問邑之名德若廢闕之當與舉者禮部主事致仕楊君循吉鄉貢進士史君經醫學訓科盛君俌及鄉之父老合辭而言曰故禮部尚書希顔楊先生博綜經史尚古力行在仁廟初以薦起家入翰林為侍從若干年受知列聖預修纂三朝實録大為館閣諸公所敬禮纍拜郕王府長史升禮部侍郎方大用公而公遽引年去景皇帝念公之賢進尚書為官其一子為吳縣簿其始終全節見於公自撰墓銘少冢宰文莊葉公之日記甚核為人淳厚而坦夷貞靜而直諒非聖賢之書不讀非義理之文不窺孝慈友悌薰於鄉黨考德詢事無愧古人見於少師東里楊公訓導陳君永之之序述甚備蓋宣德景泰之間士大夫稱厚德者莫先焉而殁不數十年垣宇蕩析邱隴弗守雖學宫有祠春秋不廢而閭黨之間聲響殆絶邦人興哀謂德鮮祐振而新之斯亦表俗明民之一事也侯聞而韙之其明年侯作康復之橋於至德鄉既成以贏材屬義官葉璋度地於其北得信心菴廢宇撤而平之構亭焉榜之曰鄉社取史君所刻白鹿洞規古靈諭俗文列置於左右而位先生於其中乃告其人曰古鄉士大夫之賢者沒得祭於社吾具於是焉俎豆公何如皆曰善此吾之志也非侯其孰成之於是以日之良具酒脯肴酹於亭下而作歌曰惟吳有氓侯則煦之惟民之僻侯則矩之民德是懷侯弗我違我甘我辛侯則是知孰新斯亭侯實我教孰嚴公祠俾我民效至德之鄉康履之陌昔為緇廬今也公宅褒德正回示我民極敕爾婦子告爾鄰比侯爾父母公爾師資爾安弗師寧侯忍欺歌竟相與瞻戀徘徊如公復生有感泣者史君曰夫表先賢以勵民大義也興衰振微大惠也咸不可以無紀乃以其事走京師屬豫書刻之貞石用告於後來者先生諱翥字仲舉鄺侯名璠字廷瑞與豫同癸丑進士云翰林國史編修承事郎兼修㑹典華亭顧清記鄉社亭為禮部尚書楊公翥建在信心菴內石湖鄉賢祠記莫旦石湖鄉賢祠祠石湖之鄉賢也始漁陽史君俊之為吳縣也一日觀民風出郊至湖上見穹碑立草莽中上有石湖二大字御寶燦然詢之乃知宋孝宗賜范文穆公成大之碑也有亭曰御書廢亦久矣君慨然太息乃出俸金而作新之一仍其舊既落成而君遷秩以去今任邱鄺君璠以名進士來繼其職暇日與僚屬登亭四顧以為山水滿前景物如畫殆與西湖略同惜不及西湖之有鄉賢祠耳今文穆亦鄉賢也豈不可即是而祠之耶於是考諸郡志詢之故老自文穆以來士之出於石湖者得二十三人或以科第發身或以材諝薦舉或以髙潔見重而其道德功言皆足以師表百世而無間然者也遂準式為主序其時代先後書其爵諡姓名即御書碑後而奉安之題曰石湖鄉賢祠即古者祭鄉先生於社之意也於是醫學正科邑人盛俌來請旦曰俌與君皆鄉賢子孫也史鄺二君作興之功如此事不可以無紀乃伐石為碑而以紀文見屬竊惟石湖為吾蘇勝景當吳縣吳江二邑之交山川清淑之氣鍾而為人者豈止二十有三而已哉然二十三人者逺或數十世近或百餘年其骨已朽何以得後人之尊崇企慕如此哉夫然後知大丈夫之為人生不徒生死不徒死所謂道德功言師表百世足以美教化而厚風俗也不然彼丁謂亦石湖人也而真宗亦有宸翰之賜以世則在諸賢之先以爵則位諸賢之上今乃不獲與諸賢之列者何哉後之人陟降瞻仰可以悠然思惕然懼而思齊內省之心自不能不感發而懲創矣大尹君表先哲而勵後進其功豈小補哉是為記若夫諸賢之出處行實則載於石湖志云范文穆公祠堂記王鏊昔在有宋吾蘇入參大政者有兩范公文正公當仁宗朝開天章閣求治更張庶政將大有為未一年以小人不悅罷文穆當孝宗朝在政府兩月未及有為以言者罷前宋之治莫盛仁宗南渡後莫盛孝宗皆鋭意太平二公皆以身許國可謂千載之遇而皆不能少試其志烏乎道之難行其已久矣忠良不可容於時自昔然矣孔子孟子沮於晏嬰毁於臧倉終身周流不遇以死獨二公乎哉文正子孫今在吳中最盛所謂嵗寒堂者有司春秋享祀不絶而文穆之後無聞焉文正為宋人物第一流文穆其流亞歟觀其使金爭受書之儀舉朝皆悚有蘇子卿囓雪之操繳還閣門張說詞頭有陽城裂麻之忠奏罷明州海物之獻蓋與孔戡之政同其在成都演武修文奬用名節間與陸務觀諸人賡倡流風餘韻漸被岷峨而吳中民風土俗人情物態纎悉備見其詩讀其集知其用世之具素講於胸中固將有以也而時莫之用非其君之不用而小人則尼之烏乎其可惜矣吳城西南十里許有浸曰石湖山曰吳山湖山之間廢壘隱然即所謂越城也文穆之别墅在焉其景最盛周益公謂天閟絶景以須其人而數世之後求其仿佛不可復得所謂天鏡閣玉雪坡之類皆已淪於荒烟野草之中過者傷之而孝宗宸翰碑石巋然獨存若有神物護持者焉監察御史盧君雍家越來溪上少時數過其地與其弟襄約曰他日且將俎豆文穆於斯及為御史始克如志正德庚辰三月廟成肖公像於中移孝宗宸翰陷諸壁間以避風日有司嵗時享祀如儀間屬豫紀其事於麗牲豫聞之禮法施於民則祀之以勞定國則祀之而所謂鄉先生者殁則有祭若文穆所以施於民效於國表於鄉者卓卓如是而其祀忽諸豈先王制禮之義乎侍御君之舉其於禮意協矣既以是刻於廟中又從而歌之曰湖之山兮嶢嶢嗟公之節兮與山俱髙湖之水兮瀺瀺嗟公之德兮與水俱逺吳臺越壘兮既毁且阤行春之圯兮新廟儼而湖山如舊兮公行安之千秋顧享兮慰我吳人之思直道陳公祠記陳公名祚沈燾成化二十三年九月今上初即皇帝位詔天下諸司舉廢興墜凡名臣賢士墳墓所在即時修理吾鄉直道陳公之墓增封加飾如制守臣又以公清忠直節備載國志仍具禮奉公位神於郡學鄉賢祠嵗一修祀越𢎞治十年丁已嫡孫冠以家無專祀懼神有罰乃謀建祠堂數楹將以揭䖍妥靈謁於天官少宰吳先生先生題其額曰直道陳公祠復請記於燾以刻繫牲之石謹按公諱祚字永錫世家吳邑之南鄉曽祖翠山祖正父子敬能自樹立由南鄉徙居郡城甘節坊以資雄里中母顧氏有懿行生四子公居次自幼不羣篤學尚氣治春秋補郡庠生永樂五年以楷書選至京六年應天府鄉試中式七年中禮部㑹試九年殿試賜進士出身尋改庶吉士入翰林明年上拔公河南布政司參議為政持大體多惠愛於民十二年言事坐謫太和佃户者十年洪熙初薦復起宣宗皇帝即位敕所司覆試之公皆擢第一除山西道監察御史彈劾無所避權幸斂迹宣德二年出按福建六年出按江西所至威望並著嘗以大學衍義勸上經筵講說上震怒敕提至京師并籍其家屬繫獄幾五年英宗皇帝嗣位復其家屬詔赦之正統三年出按湖廣發遼王不法事上怒徵繫論死後以王罪當見原改雲南道六年巡視江上盜賊屏息商旅便之八年升按察司僉事激揚有方一道清肅十三年移疾家居久之乃具疏乞歸得報即行囊無長物晚號退翁杜門簡出所著有小學辨惑夫公以清才正學雅惟忠義數以直言遭貶黜而志不少挫信為吾鄉先望卒之後䝉恩詔登國志列鄉賢宜也一時慕公之風而興起焉者遺像有贊入祠有牘石刻有志有表有記藏於家有傳有狀有録與夫哀有詞挽有詩固足以發揚公之盛德無容喙矣燾念自齠齔時聞鄉人誦公之言行每為之拊髀興歎於冠之請敢不勉從是堂之作始於是年正月二十九日集材鳩工衆力齊事踰時棟宇翬飛青赤炳煥其規制悉如五品之式中為一龕以奉僉事公像又為别室四龕以祀髙祖誠齊府君次曽祖即僉事府君次大父教授府君次考存齊府君其曽祖之龕是將親盡不遷而為陳氏之始祖也四月六日工告訖功冠乃備物具服率宗人祭之又垂顯刻以示久逺可謂孝矣因系之以詞其詞曰陳實舜後維世逺哉傳德襲訓踵生多才山川效靈刃發於硎公直如矢為世典刑三黜以言秉志不易朝奏暮疏功維社稷生榮死哀登志入祠宜建影堂維靈居之由髙及曽同堂異置若祖若考爰述爰繼時有明薦孝孫惟寅以延百祀無忝神明陳氏祠堂碑王鏊𢎞治已酉姑蘇陳氏治第於郡城之卧龍街始作祠於正寢之左越三月祠成於是太學生悅率其宗人得是月丁卯祗薦祀事大小和㑹逺近來觀已乃具書走京師求其友翰林王鏊紀其事以示來裔俾知所以作者惟陳氏於吳中為巨姓然自故福建僉事公始益顯公永樂中以進士為河南參議與分巡官交章言事編置均州太和山且十年宣德中起為御史復上疏勸講大學衍義或指其語涉譏訕闔門繫詔獄五年出復發遼府不法事又下獄出又劾法司亂成法其忠義之心剛大之氣踣而復奮幾死而不悔天下想望其風采其後府學生王養浩等數十人相率言於部使者郡學故有先賢祠祀唐賢陸中允而下國朝若周文襄公故提學御史孫公陳公及公或深仁粹德延被吳人或孤忠徑節警動海內而廟祀未及後人曷勸於是有司奉公入鄉賢祠今上即位有詔修名臣墳墓公墓在吳山極花塢葬故有闕所司祗奉詔㫖相與治碑碣華表石羊虎如制且禁人無得樵牧而復其為後者一人使專護守於是其孫悅退而歎曰唯先公忠義聞天下墓有封祀有祠而家顧無專祀嵗時饋獻仍陋就簡不肖不孝罰其可辭乃作祠如禮堂為四龕西以祀髙祖府君次曽祖府君次即公次考教授府君祠之飾悉如五品之制且設巨龕於寢以奉公像曰是將親盡不遷為陳氏始祖云詞曰國有正氣視時屈伸在屈而振展也維人公在河南以言得罪十載太和若終把耒帝思良臣起為御史公拜上言言固臣事臣有一編請置之陛朝夕勸講四海其乂或從間之詔獄是縈闔門縲絏百死而生詔恩朝赦暮已抗章擲藩府隱帝聞為驚初驚後繹維帝之明古有汲黯拾遺為志亦有魏徵勸行仁義較其所處孰難孰易堂堂陳公今復有之廟祀嚴嚴邦人之思邦人之思況其孫子作廟於家爰及其自同堂異置籩豆載登春秋饋獻百世其承劉塘王氏祠堂記楊榮古者諸侯大夫士之祭其先皆有廟庶人無廟則祭於寢而祠堂之制未有也漢世始有即先人之墓以為之蓋禮之變者也宋之大儒乃定其制始去墓而營於家殆又變而得乎義之宜者雖非古制而後之君子皆取焉者何哉蓋諸侯大夫士之有廟者以有祿位之貴也禮度秩然不可亂矣叔世之士庶人不得立廟而祭於正寢者以布衣之賤也禮度秩然不可亂矣叔世之士既無祿位貴雖未逮於諸侯大夫而視庶人之賤則有徑庭祀先之禮奚可終殺歟然以廟則上僭以寢則下淆創祠堂以祗事焉不亦可乎用是沿襲至今雖賢智亦莫之能改也蘇之嘉定王氏居邑之劉塘鄉稱士族之賢曰士昌思自厥考仲名甫以上世事儒書而圖所以紹承之逺力舉子文以世其家且篤於為善以義方訓子孫以雍睦待宗黨以誠敬交際朋舊尤親近士夫君子以游處討論孶孶不怠家素豐財不吝施豫而貧窶多得之所謂富而好禮者歟平居切切於孝思而興夫追逺之念乃命嗣子璿等鳩工萃材於居第之東建祠堂若干楹用妥先世之靈嵗時率諸子孫嚴祀享以展孝敬所以事其先者有道行諸已者有禮矣以篤率其子孫報夫本始者良不在是歟祠堂之創以永樂丁酉之春迄今二十餘年未有紀其實者慮無以傳示乃致書吏部考功主事夏仲昭禮部儀制主事衛以嘉謁豫文歸而勒諸石豫嘉士昌之篤於孝其所以為此者實有關於世教焉故推本祠堂之制如此為文以畀之非徒以示其孫使善繼而不忘亦將以為世之勸也大學士楊榮撰崑山縣城隍廟記沈魯國家受天命奄有方夏奠安元元以統承萬國俾分職任功顯幽罔間惟是小大郡邑山川城社咸秩祀事與天子之命吏同憂恤之寄焉其所以代天理物莫不一極其至而城隍保民為重廟祀固在以義而起崑山自唐為吳望縣光化中錢鏐攻毁其城宋世承平三百年柵竹為防而已元社將屋而始城之城隍則廟於縣治南百步國初增崇祀典規制堂宇徙於馬鞍山麓嵗久摧敗宣德紀元之九年盧龍任侯豫尹兹邑大修山川之祀至於廟下懼日益墜弗舉乃召父老而告之以禮事神之義慮財計庸易故而新之以完固重門後寢深靚嚴密神妥其靈式歆禋祀既落成之明年而侯去十五年而侯之明德克孚民不忘於思於是王惠均澤髙瑞世祥相率而之豫曰吾邑廟祀惟是顯厥靈赫自改創於今七十祀吾境內疾疢不興風雨時正六府三事順成卧赤子於袵席職神之由侯以忠信成民而禮神神人延釐益垂寧祉請於麗牲之碑以紀成事俾為後規隨也竊惟天子之命吏與神同食兹土相須匡輔坐堂陛而司平於民揄方明而禍福之顯幽不同而憂恤之寄同咸有嘉德依人而行則夫神之獲安其室職有由然哉其辭曰有廟奕奕於山之陽有赫厥靈實司其城惟城惟隍民保民障神亦依憑光霽肸蠁嵗厯彌久敝其室廬尹哉任侯為恤為謨式廟以增堂寢具考神有神廟民有攸告司邑惟侯司城惟神咸底於仁合於太鈞我民報祀無怠來者載書示徵勒之宇下正統十三年春正月吉日蘇州府重修城隍廟碑王鏊吳故有城隍祠在子城之西南陬莫詳其所始唐天寶中採訪使趙居貞改作廟宇梁貞明五年刺史錢元璙加宏飾焉至趙宋時有敕封忠安王嘉泰三年加號順應嘉定九年又加號威顯寶祐三年又加號英濟國朝則惟稱蘇州府城隍之神洪武三年以舊祠庳陋乃徙雍熙寺故基在今吳城之乾位蓋百三十年於兹矣𢎞治十三年住持戈原廣言於郡守曹侯鳯謂廟祀載在令甲凡守土官始蒞事及朔望必躬請祠下其嚴如是而嵗久且就壞棟腐桷摧墻頽磩圯肖像䵝昧不稱瞻仰曹侯曰唯神與豫分理吳郡豫理其明神理其幽吳下頻年風雨調順稻麥豐登冦攘帖息疫癘不作兹神之賜豫其敢忘乃下令境中願新神廟者聽又命義官某等董其役於是貧富爭施厥財恐後掄材程役完舊敕新明年春正月始事至九月僝工殿宇峻整廊序逶邃門墻顯赫過者悚悅㑹曹侯遷去東廣林侯世逺繼之求豫紀其事城隍之祀不見禮經蓋起隋唐之際吳越之間今京畿至郡縣遐方絶徼罔不嚴事且山川林谷丘陵表畷坊庸古皆有祭況夫作鎮一方司啓閉捍冦偷婦子安畜牧遂非所謂有功則祀之者邪固可以義起也況時有所尚敬有所偏今自朝廷及於閭閻祈靈丏祥罔有畫夜水旱蝗蝻則禱之疫癘夭札則禱之凡有求則禱之有疑則禱之而神實能昭答隂祐儼乎如臨其上至其家可謂靈也已豫故著文於碑以彰神之威靈詞曰於赫明靈作鎮南服上帝嘉之寄是威福浩浩幽遐星矛霜鍔誅斬妖魔良願攸託祓戾召祥雨暘斯若老稚熙熙閭門夜開維神之賜其可誣哉清廟有嚴曹侯所飭林侯紹之邦典維秩疈牲奠糈嵗事孔修福我邦人億萬斯秋萬夀祠記顧儒寶五王自唐光啓中降靈於徽之婺源其初邦人祠之厯年多而施澤於民久禦災捍患衛國有功登祀典封王爵宜也惟神無方由邇而逺行幾遍天下吳門距徽千有餘里民之敬信過於他邦懷香裹糧而往拜者嵗不知其幾猶為未足以展其朝夕慕仰之誠始建行祠焉祠在吉利橋西南可百步其地乃朱氏故園古木蕭疏清流映帶門徑通徹誠為一郡勝地神之妥靈蓋有攸自或云祠始於宋之建炎正殿則重建於嘉熙時比丘圓明為之洎寶祐甲寅通一鼎創大雄殿於東序景定而後正知善已相繼修廟事一新三門重闢兩廡既而行日亦克善繼月有閲經之㑹嵗修慶佛之儀晨香夕燈靡不崇向皇元混一百神秩序五王靈顯視昔有光至元間行日勸信士孫子發偕弟子榮專建華光前閣而後閣則元貞以來集衆力而成大德間如海出囊中餘資買張氏基地以廣其居復置楓橋常稔之田永為贍衆理葺祠宇及長明燈油之需延祐丁已建圓通寶殿乃寓公葉武德倡率衆緣樂成之其西有菴署曰上善徒弟淨德輩居之以奉祠事斯廟完麗甲於他祠雖曰人謀實由神相轉舊為新化頑為仁亦郡政之一助也邦人語僧曰豈無紀述以傳將來一日僧書其概謁豫記豫謂神之靈無在無不在水旱疾疫有禱必應者神之靈出入起居罔有不敬者人之誠有誠則有神求神於誠之外則荒矣昔人云見廟社則思敬是則廟乃誠所寄也或者以為福善禍淫之道自有默運潛庸於形聲之表其果專在於廟歟曰不然聚其誠而久其敬廟固不容無也甲寅初元敕賜祖廟為萬夀靈順此宜曰萬夀靈順行祠乃甲乙住持燈燈相續至今幾二百載矣成之良為不易嗣而葺之將有望焉郡人顧儒寶撰況知府重建五顯王行祠記劉鉉今之蘇五顯王廟於和豐坊者或謂宋崇寧間其地舊有浮屠嘉泰癸亥僧普智始菴於其旁名如意而與其徒德晟於徽之婺源刻木肖五王及他神之像歸置於菴復售鄰地以易其廬寶慶乙酉遂建閣名華嚴上以度經下以奉五王至咸淳中又撤閣為殿而旱暵水溢癘疫之禱悉有竒驗所以士庶歸心信崇深篤國朝洪武初又規其地以廣府治而廟蓋有改作焉逮今八十年梁棟壞腐甓瓦破缺丹堊漫漶時知府況侯鍾為郡既久弊剗惠敷郡大稱治凡所當行靡不興舉侯乃謂五王既克衛吾民而廟貌不振若是豈稱民之所以報事者乎遂約其聨官同知邵諶通判潘叔正推官方矩經厯王真知事金鑄照磨趙中檢校王善以祿奉之入節縮其出銖積寸纍又率好善樂佽之士共得鈔若干萬貫於是度材鳩工葺舊則正殿旁殿樓閣磚塔楮爐剎竿新作則三門兩廡厨湢正殿之前有亭旁有過廊總二十有六楹先是廟南畫於鄰垣中庭湫隘兩檐相逼至是貿其南地退樓閣之址於南北各丈餘越幾月告成庭既閎豁破完腐堅漫漶鮮好貌位嚴睟者益麗於前威靈炳赫者知信於衆侯間屬豫為記豫聞五王者之降靈於徽以致享祀封王其能禦災捍患可知廟於今固宜且行祠之遍於他郡者亦其神之無方感而即通利澤之施既弗限於遐邇則人心之向又奚當間夫彼此況其精靈之妥於吾邦既久為蘇人之捍禦既多廟於斯亦宜是知侯等之所以新是祠者豈有他哉欲三辰順軌一元調和蓋寒暑節雨暘時百物植上祝聖夀以齊天下福吾民於悠久是皆可書故為之記董其事者郡人王信勝偉徐誠盛泉也正統四年嵗次已未秋七月初吉立行在翰林院侍講承德郎兼修國史彭城劉鉉撰靈官廟舊名靈順行祠在胥門內朱家園名上善菴宋嘉定二年建一在西米巷名如意菴宋嘉熙四年重建國朝正統中知府況鍾重修宋光宗封五龍敕平江府靈濟廟第一位龍王右可特封東靈侯敕平江第一位龍王等朕雖不令祠官祝釐専鄉獨美至四方長吏有為吾民請曰某山川之神能惠於其方則褒崇之典朕靡愛焉以庶幾古蠟百神之義矧惟五龍以時節雨暘功著近甸良二千石雖不言禨祥而具道所以然之故文詞爛焉爰錫命書秩以侯爵則所以寵嘉神貺以從民欲何如哉尚終惠之俾世世享可依前件奉敕如右牒奉行紹熙四年五月九日右敕文五位同但王封號别耳其敕尚存廟中主僧寶之跋王爟東吳靈濟廟五龍之神以時節雨暘功著近甸宋季紹熙間錫命秩以侯爵一以封為東靈侯二為西成侯三為中應侯四為南平侯五為北寧侯各以敕文而寵嘉神貺其利濟之功禱祈之效迄今著於前民懷惠者多矣奈因厯年浸久神廟傾圯惟古碑敕命存焉正統初奉敕知蘇州府事况侯重建祠宇輪奐一新豫忝知屬邑伏覩宋朝褒封敕命卷帙散落恐久而湮沒遂裝潢成冊以圖傳於悠久守斯廟者務在恪遵而珍藏什襲慎勿忽諸時正統六年嵗在辛酉春端月上浣直𨽻蘇州府長洲縣知縣榮昌王爟五龍堂在今長洲縣東南唐貞元中建李紳記宋淳熙間賜額靈濟廟紹熙四年敕封五龍神為侯吳都文粹續集卷十六
