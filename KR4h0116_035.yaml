body:
  text: 吳都文粹續集巻三十五明錢榖撰橋梁乘魚橋髙啟橋上西行人橋下東流水遊人如水流朝暮何時己誰知有飛仙赤脚踏神鯉波警風肅肅渡海秋萬里左招騎龍君右攜采鸞子笑飡紫雲英同歌蕊宫裏歸來舊城郭千載一日耳下看橋上人還隨雞鳴起去者己如灰來者猶如蟻不解養谷神紛紛自生死同前周南老范陽水府仙脚踏赤鯶公乘之過此橋飛昇凌太空御氣鼓兩翼飄飄雲霧中魚化仙己逺橋影架晴虹泠泠橋下水隨風自西東仙鱗或來迎誰與巧相逢同前王賓此處正當城市裏誰知轉眼到蓬萊如今不見真仙過那得神魚再起來重建夏侯橋記潘夢旂六飛駐浙吳為輔藩地望崇重視昔有加井邑阜繁於今為最郡治稍西橋曰夏侯以地有夏侯廟得名締創于皇祐壬辰重修于紹興辛未刻于壁記于志可攷僅此無他聞焉水環樓堞陸帯闤闠左奉䑓府旁聨宫寺右亘蘇館次列津侯糟丘鎮乎其首鹺庾濱乎其腹人物輻輳使客旁午飛轂馳韀曳裾躡履交往迭來必由斯橋曉鼓未作聲迹嘈雜夜漏未半暫止復動嵗久而敝非兩馬力将持厥危非一木支寳慶初元邦人相率出力改作使守嘉其志悉捐金以助逺近翕爾而應乃命工師課貟程具木石以仲秋癸丑撤其故而新之下則叠石為址剡内直外如植半圭䕶以連楹兩㟁對起而合以梁上則鋪石甃面空中偃端如浮脩眉翼以扶闌兩廂互應而接於逵明年七月工以訖告大容九軌髙納巨船不峻而隆不削而垂逺而望之巍巍乎其崇近而履之坦坦然其夷厥材孔良厥砌孔堅足以閲千祀而不朽矣夫自行都抵京口渡維揚直都梁臨中原咸有通溝貫城以行運艦長虹跨水以便徒趨然其源泉併為一川架波取道無幾惟吳呼吸具區灌注五門曲河旁達䟽派且有飛梁錯峙與岐俱多輿轡經隧樓帆過肆左賦美之夜市菱藕春船綺羅韋詩詫之其流所以聚故民愿而富其水清且泚故俗粹而美橋梁道路責在有司吳人尚義爭出巳私閭里興修歴歴可舉兹橋底績其有自哉僕生于吳舉于吳隨牒四方三十年未嘗一日忘父母國甫入都故老貽書述斯役俾作記忻然諾之庻幾登名於碑他日歸老能從容乎其所若勸施位名金榖品目列之左不復書寳慶二年七月朝散郎郡人潘夢旂記夏侯橋相傳夏侯司空建或云橋旁有夏侯廟故名烏鵲橋楊備月滿星移水照天南飛烏鵲影翩翩雖然上属斗牛分不為秋河織女填同前髙啟烏鵲南飛月自明恨通銀漢水盈盈夜來橋上吳娃過只道天邉織女行同前周南老古有烏鵲館橋名因館舊烏鵲己南飛影落蒼石竇彷彿霓横空知是何年構往來頻送迎女牛曾邂逅銀漢秋逾髙靈槎莫予覯愧非濟川才欲進不可又烏鵲橋在吳縣東古有烏鵲館因名白樂天詩云烏鵲橋紅帯夕陽顧家橋王賔水落沙虛古㟁斜垂楊幾樹有慈鴉将軍孝行宜旌表獨見橋名稱顧家顧家橋在樂橋東孫權虎頭将軍顧悌家焉悌在官得父書洒掃設几筵拜跪讀之居父䘮痛不見父終哭泣未闋服卒百口橋王賓百口橋邊春日斜舊時開遍紫荆花山東人説張公藝此是中吳顧訓家百口橋在婁門西東漢顧訓五世同居百口同㸑故名訓嵗朝㑹集行酒子孫三嵗以下皆知位次故又名試飲橋孫老橋王賔白傅經營年紀衰蕭蕭白髪滿頭絲孫公管領來修葺又在衰年白髪時臯橋皮日休臯橋依舊緑楊中閭里猶生隐士風惟我到來居上館不知何道勝梁鴻同前陸龜蒙横絶春流架斷虹凴䦨猶想五噫風今來未必非梁孟却是無人繼伯通同前楊備隐士貧居日賃舂物情歌在五噫中釵荆舉案何人識猶頼橋邉有伯通同前髙啟閶門啼早鴉拂面見飛花綠水通螭舫紅橋過犢車誰尋伯通宅只問泰娘家同前周南老漢郎臯伯通卜居近西城門前橋突兀時以臯為名大横當孔道來往人營營伯鸞操井臼衆中為歡迎豈惟隐士賢乃貴知人明二賢久己矣問橋猶有徵同前王賔伯通家久沒橋邉有姓依橋尚逺傳非是偶然人記取緣他知得伯鸞賢重建虹橋記虞集吳都内外皆鑿溝澮納太湖之水以行舟逾絶為梁經緯聫属其高庳修縮視水大小獨虹橋在郡閶門西跨官河通驛道為咽喉要處水至橋下滙為回淵折而東行勢用剽悍橋舊植以木而加甃嵗久腐橈乃今夏大霖雨遂壞水陸並阻民吏憂騷縣長吏計㑹役大懼不即成郡人鄧文貴詣官自言架木非久計請出家財以成之遂以八月乙丑召工畫圗盡撤其舊而新之絶水下石欵宻鍵固纍起拱合理緻無間下通圜空涵水象月引重過之堅逾寔地泰定元年十月成凡用中統鈔十五萬貫云夫鄭商犒牛敵謀遄沮卜式輸財漢用不匱以一民而専有司之美不可無書也故為備載不辭同前黄溍泰定二年冬十有二月平江閶門外新作虹橋成古者辰角見而除道天根見而成梁有司之事耳春秋常事不書此何以書在有司常事也而此非有司常事者也按郡志橋之載于圖籍者三百五十九而為虹橋者三其一在城西若干步即此橋也去年夏大雨水暴溢橋居兩水之交莫能與水抗一夕盡圯其地適控通衢徴令賜予布政于逺方或奉貢輸賦為行者病謀所以復其故而官帑不可輙發又重以其役厲民未知費所出郡内民人鄧文貴請分家貲之半更為石橋以利永久既又以為此有司者之事非細人所得干也乃飭財用庀工徒以聽要束焉遂以八月乙丑始閲八甲而告訖功橋之修四百尺而其髙十分修之一五分而殺其二乃與㟁等脊之廣得高之半而趾之廣加其什五上設扶䦨為之備怯其下為門如半月以釃漕河而隄其兩垂以度輓者所用錢以緡計者十二萬五千有竒役以庸計者二萬四千有竒今總管郭公既率僚属觴酒橋上以落其成且謂文貴編戸民非有名田稍食貨殖竒贏若他大姓比川梁逵路官寔領之而文貴顧能輟其衣食之餘以紓有司之急務不宜無以示勸相乃伐石俾溍執筆書其凡而記焉夫以一大户利物之功而長民者能表樹之以寓其風厲之意是皆有司常事之所不及而於法宜書者溍不得辭也夜過西虹橋王鏊破楚橋邊步偶停夜船燈火散如星館娃歌舞今何處留得吳歌與客聽西虹橋蔡羽引領烟無際凴虚念自深雲回滿川雁秋起一城碪颯颯閣侵暮纎纎月上林扁舟從此逝把酒不堪禁虹橋在閶門外初木為之元時鄧文貴易以石後復以木俗名釣橋成化六年改名永濟楓橋張繼月落烏啼霜滿天江楓漁火對愁眠姑蘇城外寒山寺夜半鐘聲到客船同前張祜長洲苑外草蕭蕭郤算遊程嵗月遥惟有别時今不忘暮烟踈雨過楓橋同前湯仲友出城纔七里地僻罕曾過孤塔臨官路三門背運河鐘鳴驚宿鳥墻矮入漁歌醉裏看題壁如今張繼多同前髙啟畫橋三百映江城詩裏楓橋獨有名幾度經過憶張繼烏啼月落又鐘聲同前周南老楓橋横廣馹西出閶門西火明江上邨霜紅映清溪舟衝踈雨過帆收暮烟低鐘聲來半夜月落林烏啼景為詩人勝二美留唐題每為弔陳迹過此或少稽歸至楓橋高啟遥看城郭尚疑非不見青山舊塔微官秩加身應謬得鄉聲到耳是真歸夕陽寺掩啼烏在秋水橋空乳鴨飛寄語里閭休復羨錦衣今己作荷衣重過楓橋張羽晩泊楓橋市冥搜憶舊遊月明天不夜江冷水先秋曲㟁依漁艇高林出戍樓堪嗟名與利白却幾人頭楓橋夜宿詩有序壬寅冬余至吳中諸故老與遊石湖上方抵夜還舟宿楓橋飲間陳叟季行為之歌音甚清壯諸老使余為詩和之因以老字為韵云徐有貞總角為儒學未飽讀書不事登科早金門賦䇿愧非時聊向滄洲拾瑶草故鄉風景初未識每聽人來説其好兹因訪舊始得還遊目喜陪諸父老南湖十月波乍寒霜葉紛紛落如掃輕舟䨇櫂木蘭橈乘風放入湖中島紅菱緑橘薦松醪舉觴浩飲開懐抱陳翁醉後高興發擊箸悲歌望蒼昊琅然音韻出金石驚起潛魚躍芳藻小子何知敢申和把筆題詩殊草草月明弭棹宿楓橋狼籍杯盤更傾倒夜半聞鐘想慤孫寒山依舊胥門道楓橋范成大朱門白壁枕灣流桃李無言滿屋頭墻上浮圗路旁堠送人南北管離愁回舟吳城外将由楓橋轉虎丘陳基闔閭城外楓橋畔欵欵移舟近虎丘不用酒觥更慶罰只攜琴册恣遨遊兒郎楚楚春生玉兄弟蕭蕭雪滿頭負郭不求田二頃一竿擬欲釣滄洲楓橋在閶門西七里豹隐紀談云舊作封橋後因張繼詩相傳作楓今天平寺經多唐人書背有封橋常住字顔橋道中范成大村村籬落總新修處處田疇盡有秋一段農家好風景稻堆髙出屋山頭顔橋通支硎山路許市重造普思橋記吳寛滸墅在蘇州西北境上其民際水而居農賈雜處為吳中一大鎮自景泰間朝廷置𣙜司於此舟楫停集居民益繁貿易往來以限于官河皆不稱便成化初雖嘗作橋以免濟渡而南北遼絶人迹折旋猶以為不便也里父老相傳故有橋在周孝侯廟旁訪求之果得石刻題曰普思橋視其時宋慶元三年也乃圗重造而不敢専以户部主事藁城劉君煥方奉命分司於此敏而有為始合言以請君曰是民功也吾何敢阻耶當從而奬厲之他日工部主事貴溪姚君文灝行水至聞其事亦從而相勸之民既樂為則又言於知府史侯侯曰宜又言於廵撫都御史朱公公亦曰宜於是更相告言出財以助凡得白金若干兩擇𢎞治九年五月興工是年十二月工畢劉君喜其事之果成也曰是橋財費甚鉅勞力甚多然而利益甚大不可使後人無所攷也介鄉貢進士浦君應祥請文以記夫事之成未有不由于人和者周之作洛曰四方民大和㑹橋梁之役雖非是之比然而民不欲為則上之人雖驅而使之不能成也至於民既欲為上之人或咈之而不從則其事亦豈能成哉惟夫民欲為之上能從之故雖財用鉅而費力多不待踰嵗而穹然堅厚不易為之役遂以告完雖然人則和矣亦惟得其時耳盖吳自古為澤國數被水患今則大熟粒米狼戾民既有秋成之利視義所在慨然施予亦不知吝此事之所以易成也與橋之修一十二丈其廣二丈三尺崇如廣而堅董其役者曰倪俊凡出財者其姓名則列刻於碑隂云普思橋在滸墅虎山橋吳寛南人相見詫蘇州自料西湖讓一籌天為漁家開下崦晩宜畫舫駐中流新詩已判縱横冩佳景從教次第遊孺子歌聲何處起落霞孤鶩水悠悠同前王鏊湖上仙山翠巘重畫圗面面對芙蓉人家斜日東西崦野寺浮嵐逺近鐘我欲濯纓來此處誰能築室傍前峰放舟又過溪橋去恐有桃源惜未逢同前蔡羽初出山腹中復見水行處逶迤得平墟蒼茫急回顧山梁不為髙延攬自成趣風條薄林翠珍木接葉香前葩未及瘁後萼重競芳朝遊屢過雲霞石夜宿曽投松栢房從來不識銅坑面今日青青落吾掌上崦何明媚下崦亦清朗楊花飛飛青錦陂荇葉差差木蘭槳前帆滅後榜興長川引領雲憑憑㳺絲起暖氣昬須臾不見西華村東風吹亂鸂鶒羣水西顔色何紛紛繫馬荒祠忘夕曛秋日虎山橋訪朱子羽山居皇甫涍春辭五馬到雲莊頭白知君舊省郎二世風流誰得似四愁心事耿難忘歸來獨卧青山逺不盡懐人秋水長悵望桃源遊未遂迢迢孤月限河梁晩過虎山橋楊橈轉溪路山影亂晴沄向暮滄洲上閒來白鳥羣微梁廻落日滿澤散秋雲㑹有行吟客清歌期爾聞拂曙度虎山橋尋𤣥墓谷口望未引前林烟未滋寤言明星夕獨向青山時稍稍衆峰出熒熒孤月隨遥過石梁去庻以邈心期虎山橋在光福西接太湖宋嘉泰中重建元泰定甲子改為圎洞三遂以紀年名泰定橋成化乙未重修郡人陳頎記吳郡溪瀆三橋記陳霽吳郡横山之麓震澤之濆疏流溉壤以通舟楫陸途四達故多橋其東属吳江為越來溪春秋時越伐吳兵從之入故名南距澤水二百里為越地兹寔吳之故郵也橋曰溪橋溪之支流為筆港脩直如筆取象類也橋曰管瀆其南属吳為管瀆因以名橋襟山帯澤厥維要區饒稼舊為木梁朽折且盡溪瀆皆壘石為之亦且堕齧水中鉅石危欹嶪嶪欲奔徒者却顧脅息趨而過舟行者望而憂之經其下驚悸凛汗回視皆相賀或不憚迂路遶出之盖三橋之弗葺先後數年矣尚書工部都水司郎中新喻傅公奉璽書督水利於三吳興廢䟽滯鉅細畢舉既二年行郡經震澤臨視兹土集耆老問狀曰是葺之庶其加崇乎然毋勞爾民下属邑理其役發帑鳩工伐木聚材民争趨之隄塹偕作工用次舉繕危以安代木以石拓舊規新高廣有加焉糜公私錢十有八萬役夫千人始作于𢎞治辛酉春三月成于其冬之十月綜其事者吳令鄺君璠判官吳君秉吳江令劉君澤邑丞于君旺竣事諸吏民謀曰公恵民深矣兹一役也功倍而利博廢而克完亟而勿勞不有述也其奚攷引公徳以詔于後乃相與來請為列其事以書於石吳邑重建永安諸橋記浦應祥吳為蘇之首邑而蘇寔古都㑹覽周職方延連三江浸滙五湖其波流衝射為濠為塹為溪為瀆為津港為陂塘者難以計數茍可以通舟楫處必資橋梁以利涉焉故橋之為數攷之地志城内官橋凡三百九十自其郭外言之則所謂徒杠輿梁者奚啻數倍也承平百年來多所傾圮行者病涉間有好義者欲修葺而作新之顧上之人無有以勸相而倡率之遂至於廢墜而不舉良可惜也𢎞治己未工部郎中新喻傅公奉敕總督江南水利來蘇治水之餘令曰橋梁道路利於民者不細乃檄有司出公帑為倡而民之好施樂助者聽一時要津孔道窮僻陬隅朱䦨碧甃㒺不聿新誠盛舉也兹者自胥門之西二十里許至木瀆為橋者三曰永安永濟永福自木瀆之東南不數里許有塘曰興福為橋者四咸𨽻是邑公爰咨邑令鄺侯璠勸農簿喻君秉躬董其役卑者崇之狹者廣之傾者圮者固之上可以通車輿下可以通巨艦信久逺之良圗而非直目前之美觀其所以利於民者誠溥且博矣公涖政三載将復明天子命鄉之被公之利澤者胥謂予曰公之徳政施於他方者咸有名筆以記公之盛今公去為明天子留而不復至也則公之休美施及吾鄉者嵗月流邁能不有所遺忘乎吾輩敢礱礪堅珉請執事文于上庸以樹於通衢以昭示于來者執事無靳焉予是其請遂不辭而書之里民姓氏當别叙于碑隂故於此而畧圭普二涇通水建橋記楊循吉蘇之郭惟西為盛而吳寔司之有水焉來自太湖引大濠而别注者南曰圭涇北流三里至途而止北曰普安涇南流亦三里至田而止中隔小溪涉不及膝村民以資澣濯灌溉莫之能貫焉𢎞治辛酉胥門浮橋興邑令任丘鄺侯相水至斯嘆曰噫是固有别津而人不知也決途鑿田其克有濟乎于時廵按侍御長沙袁公方祇奉上命孜孜治道郡侯汝寧曹公盡力民事尤敦恵愛侯具以請皆慨然許可乃集地之耆年而敏事者語以故咸曰兹川堙塞且數百年今故形具在龎眉之老思復其舊而不可得大夫有意吾儕其何幸則又諭田者俾售之果以地獻㳙日斵土庻民子來不旬月功告成凡用役一千開地四十丈而南壅之決於一日者不與焉沿流而行又隨在䟽剔其遇地之侵官而屋其上者必斥無貸豪強共命惟恐後伐樹祛藴洞為流波一望洋洋靡有阻遏於是鼓楫而過者無虚晷臨流而宇者競厥居黎庻相慶胥來聚觀若天造地設理固有定而適乎成也方役之始侯欲廣渠容巨艦慮匪卑梁可納乃作十橋跨其上在北者首普安領其五曰昌禄壽安永福積善富民在南者首圭涇領其三曰通恵張盛豐利七之用石三之用木率取隆顯壯于里㕓朱䦨緑波照映逺近級以備兩徒者便之然後鄉人以為舟之出是有二美焉胥不能阻閶不能險是民志也乃謀伐石書偉功謂愚居與水邇宜不得辭愚惟物鬱則思通然必遭而後濟功成則不朽然必協而後克觀之斯渠昔否今亨通于大川其不有遭乎上下一心以建厥勛其不謂協乎雖然由是以求執政之賢不可以不志惟侍御公以公忠持法而憲體振惟郡侯公以亷正率下而牧道立惟令侯承之以勤能潔修而邑政用舉是故吾人安堵樂業熈熈乎無所不遂也若夫浚河作梁乃一時餘事流澤布庥而亦垂之無窮君子居位而荷通物之任乘建功之基既行之矣可無紀乎哉是以敢筆其詳以示于後世與兹流永久饒稼橋記莫正橋以饒稼名志豐年也豐年所以為生民立命也召豐年而立民命豈無自而然哉必有大徳大功以涵煦於其間而人莫之知也橋在郡西南二十里南周村之上跨越來溪之支流左右居民務於耕稼亦有以儒為業者是以人無怠荒而俗多謹厚焉橋之創始不可攷舊壘石為堍上横以木嵗久傾摧将有厲掲之患里士盧綱欲葺之而未能也其子雍以文學受知于欽差提督水利工部郎中新喻傅公間以白焉公檄吳縣簿喻君秉詣示之君謀於大尹鄺侯璠給公錢重建而里之好義者皆樂助乃悉以石為之經始于𢎞治辛酉春三月四日落成於夏四月二十八日遂為溪山偉觀而行者便焉綱謂不可無述以詔後乃以資財立亭於橋之北塊而以碑文見属予惟王政以食為首農事以時為先農事失時而欲為民食足也難矣此橋之所以饒稼名歟抑于是而竊有感焉吳於元末干戈之際淪于僣㩀苦于虐政尚何饒稼之望哉而我聖祖龍飛為中華主命將出師討張士誠空其巢穴遂以平吳為畿輔重地今百四十餘年惟見黄童白叟熈熈然耕田鑿井以樂其樂孰知上之功徳所以涵煦者如此則夫一橋雖小揭以饒稼豈不足以昭上賜而與民同樂也哉余家去橋不逺一里往來於斯習知農事今願與諸父老率其子弟從事於耒耕之間暇則誦詩書習禮義使父子慈孝兄弟友恭夫婦保守鄉里雍睦興禮讓息爭訟自然和氣薫蒸豐年可望而所謂業儒者亦將出膺時需以圗報于盛時也夫然則是橋之建豈止免厲揭之憂也哉公名潮字日㑹今禮部尚書體齋公之弟以名進士累今官所至俱有成績橋梁若越來溪管瀆之數處俱為重建非止是而己也謹記吳縣康履橋記楊循吉蘇環水而城其西曰閶門涇㑹者五奔流蹙束湍益急舟過輙恐由是前人鑿新河以避之而其上因有橋焉以航以塗水陸咸頼利維在人邑政是觀先是壞且有年罔率振興石脱幾墮為行游者憂岌如也鄺侯任丘人也以名進士來令吳力官勤民百廢咸作至是得其宜修狀乃召里之謹愿有力者十人俾任其事咸以為當民心開永利欣然共命則使良工伐美石易故以新寔其中而飭其外非邇之圗惟久之謨而侯朝夕臨視具授以法増隆之凡二尺車馬孔宜大舟得通以其昔危今安克良于行因名之曰康履皆侯意也其經始於𢎞治八年十月僅百日工成父老咸曰自侯之來也強革弱寧四境豐晏吾人受康多矣今也又康吾橋其能無書乎盖衆謀方合而經生朱臣以具石告夫橋仁舉也百冗充庭而能及於是則措心邑事宜無遺焉抑以知賢牧之在上才大而餘功建義感而民力隨其澤人殆如是也是誠宜碑故述焉而以附十人者之名侯名璠字廷瑞有志康世者也兹邑其小試乎重建勝安橋記夏璣蘇城西北虎丘山塘之半有橋曰勝安始于唐舊以木為之至宋端平時里人金暹易以石梁迨我國朝積嵗傾圮不堪於行正統己未廵撫文襄周公郡守况公重建以廣舊制自成化以後累遭大水衝激日底于壞甚於往昔行者病之𢎞治己未耆民周懌郭鑑勸里中義士蔣瓊陸榮為首倡又舉壽聖住山僧圎智里人陸釗勸募朱繼等相為出資以圗重建白其事於欽差總督河道水部正郎傅公曰此王政之一事乃吾責也又請於郡伯曹公公以為宜時通府陳君長洲劉君吳邑鄺君貳尹竇君又復勸諭而奨導之由是瓊等遂經始於是年三月乙酉鳩工聚石財皆民助晨夕監督不憚勞苦匠氏効力而落成於夏六月癸未髙加三尺廣十有六尺翼以䦨石行者始免病涉之勞勝安之西不二里許又有橋名范店者亦病於涉公復命糧長江仁老人朱恵等成之於是逺近靡不贊頌水部公之徳且謂不可無記乃築亭於橋左請予文以刻石垂于永久則瓊等體公之心可見橋成公厚勞之莫不踴躍聞風興起豈曰小補噫天下之道皆然遇水而不貫者非橋梁則患於徒涉也涉水者必橋梁以相濟也橋之濟物如此况以道兼濟天下者是盖傅公相天下之志也民知向義而樂於為善豈非善政之所致歟敬用刻石以為義者之所勸云重建渡水橋記楊循吉東洞庭峙太湖中心厥惟吳邑之重鎮民居鱗次隨高下結屋若古桃源耕田樹果殆無寸地隙人力作耐勤苦以儉為事㕓陌經絡不下萬井其往來上城邑日憧憧然在途摩接無棄隂而宴處者是故道路之宜修急於通都勿可以荒逺視也具區港界二峰之間西五里曰莫釐峰東二里曰武峰其南北貫于太湖太湖本具區也以其水恒出是故以為號焉其流廣而且急隔越行旅為必由之要津故有石梁曰渡水廢四十年矣里人慮其工巨勿敢圗架木以濟高危凛凛每風雨晨夕人之提攜負荷過者多恐怖兢業或仆而溺者有之居武峰之下有曰前賦長吳天禬謹愿人也病人之厄慨然思作之邑令鄺侯美其志白之郡守史公公大善之遣吏奨勸曰汝必亟成乃績無終懈惟汝名侯亦曰汝成予其義汝天禬感厲益勉厥事舊石材惡弗可盡用棄之别購􅩯材之良者甃焉遂以𢎞治九年之九月告成凡長一十六丈高二丈九尺東西為石隄延袤又各四十餘丈其費金將百挺而不吝工部姚公方督水利事亦懿而旌之然後山之人大悦勿憂于雨勿惕于夜坦途下視風濤不驚能即驩焉咨嗟以為盛舉而今賦長吳恪周元鼎寔具石以來願有書也余聞立政以澤人為大澤而不費抑又善焉若夫利害非其獨有而欲使之傾材以濟衆非勸其孰能成之於此以見是役之舉雖營于下而寔出乎上以二三執政之仁而成斯人之義皆永世不可刋也己其能無述乎然天禬之為是不遺其力而務廣其恵故又有餘績者三若遷傍涇之梁出之隄上而道不迂若作屋三楹其旁以迓來往而客有息若浚橋之東故井且亭之而暍者勿病皆其事也是宜得牽連而書故余勿敢畧焉渡水橋在東洞庭一名具區風月橋舊以横木元周富七郎始易以石國朝成化九年吴天禬重建如京橋記葉挺皇帝踐阼二十一年將有事於規恢飭諸郡守臣治橋梁除道路以便王師征行吳郡古都㑹由全蜀荆襄湖廣江淮而下危檣巨舸往來相銜盤門運河環城尤號要津有橋如虹惟波濤洶盪車馬蹙躡嵗久隤圮且路多瀕湖坎窞驊騮過者病焉叅政張公文昌李公俱以碩徳重望來殿是邦朞年調度亦既具舉謂橋道勿治未稱上㫖以吴縣尉羅相刻意事功乃命經理之尉承命勿避勿疑亟募道者徐妙行帥徒鳩工首甃驛衢達於松江幾五十里其旁舊橋有三繼踵營治悉用堅整至是橋也益加其工光闡故壩易陶以石夾㟁雲繞巍䦨翼飛洞門天成面埶山屹在官無費在民無擾厥功告成聞者驚嘆因相與言曰凡四方貢賦之所輸百工技藝商賈之所輳搢紳豪傑文人雋士之所萃九夷八蠻朝聘㑹同之所歸莫過于京師厥今駐蹕錢唐異時還都中原兹橋適孔道寔逺近所必經從者盖以如京名之衆曰韙哉合橋與路積工五萬為費三十萬有竒經始於嘉泰四年正月成於開禧丙寅四月既望民既落之因并識其事朝請郎新知岳州軍州事葉挺記朝散郎直龍圗閣新知贛州軍州事鄒應龍書如京橋即盤門虹橋宋開禧二年重建改今名周虎書三大字刻其下重建越城橋記張習吳邑西南横山之下衍石湖之水而東注者曰越來溪溪之上湖之澨有石橋名越來溪橋又謂之越城橋盖今之新郭即春秋時句踐築城以伐吳之地築城彷彿具存而橋與之尤近故名按之所始悉可據可騐者重建於前元之至正再修於國朝永樂之乙未風激湖波日夜淘嚙嵗久漸圮邑令文侯為令之三年政安民和常號於衆曰王政之一事非杠梁之謂乎其頽而未舉伊誰之任乎有以是橋白者侯即首出俸資以率邑之願助者聽選民之耆而良者徐衢等董其事仍諭以其風波衝蕩之故錘矴提杙務力倍蓰堅固經始於成化乙亥五月之朔落成於明年丙子六月六日崇廣若干丈視舊各加以尺計者二旁増石䦨下袤石址由是人之所履物之所載咸出焉入焉而無少窒也僉感侯之徳以習為邑人授以石庸記焉攷諸成周之言曰辰角見而雨畢天根見而水涸雨畢而除道水涸而成梁此有司濟人分内事也夫何政不果若司民社者視治道梁成事為泛常故民往往有病涉之嘆况吳為澤國舟楫之所通行者侯穎敏好古勇於為義凡諸廢弛必舉而新之則他日為我國家謀猷之逺大豈不猶之治一邑也耶侯名貴字天爵遼陽人成化乙未進士兹奉天章召入憲臺司風紀併係此所以慰民去思之槩云越城橋在石湖北口舊名越來溪橋至正間重修重修行春橋記范成大太湖日應咸池為東南水㑹石湖其派也吳䑓越壘對立兩峙危峰高浪襟帯平楚吾州勝地莫加焉石梁卧波空山映發所謂行春橋者又據其㑹胥門以西横山以東往來憧憧如行圗畫間凡遊吳中而不至石湖不登行春則與未始游無異嵗久橋壞人且病涉湖之萬景亦偃蹇若無所彈壓過者為之嘆息豪有力之家相顧環視莫恤漫以諉之官前令陳益劉棠皆有意而勿果作淳熈丁未冬諸王孫趙侯至縣甫六旬問民所疾苦則曰政孰先於輿梁徒杠者乃下令治橋補覆石之缺易籍木之腐増為扶䦨中四周而兩旁翼之嵗十二月鳩工訖於明年之四月保伍不知工役不預邑人來觀歡然落成而己今天下仕者視劇縣如鼎沸屛氣怵惕猶懼不既侯於此時從容興廢盖亦甚難四鄉之人不能出力傾助者至是始有愧心則相與商畧他日将作亭其上以憇倦游者尚庶幾見之今姑識治橋之嵗月亭成将備書云侯名彦真字徳全舊名彦能隆興元年進士擢第後改今名橋成之明年日南至資政殿學士通議大夫提舉臨安府洞霄宫范成大記重建行春橋記洪武戊午嵗春三月重建行春橋成設大㑹以落之邦人士暨道俗㑹者數千人先是宋淳祐間徑山淮海禪師寔來行橋有文在石于是乃請今徑山以中禪師行橋以修故事人謂相距百三十有餘年猶一日也既事衆請揭其槩示諸來者按狀洪武七年四月橋壞公私大沮計無所出盖橋當郡西北孔道又山水回合為吳中竒觀據要領勝橋不可一日廢也明年優婆塞正宗方事經始懼弗克終乃以属長洲僧善成成傾誠勸募寒暑匪懈由是人孚其化錢布米粟之施日至乃大鳩工發財悉撤而新之取石必堅傭工必良植枋必宻以深以為石湖乃具區之委至是束為澄淵湍流剽疾喜與石鬪弗若是不足以支久也役且半㑹将作大有繕營盡括匠氏以去役幾中止秀州人錢元濟素習橋事機智便巧并善襲斷泅深履險易甚平地來未期月而遂以告完橋之修廣制度一仍其舊而堅緻過之見者驚喜以為天寔有相之道焉夫橋梁有司之事也使諗於有司則必賦於民民将觀望牴牾其能弗擾而集乎就令勿擾而集也則取其苦窳又可冀其堅乆耶佛以慈悲𢎞濟利天下而橋梁居八福田之一鼓其善以勸而人樂趨之故無煩官厲民而卒潰於成也然嵗丁連侵百費騰湧劬躬盡瘁猶閲三嵗更三手而後成抑何其難也二三子之勤亦已至矣來者思其成之不易尚毋忘嗣葺以永其利可無述乎鄉之好義贊助者尚多有人則書於左嵗晩行春橋王寵瀰瀰泛星渚翩翩躡虹橋青山正落日霞彩散層霄天吳靜不發廣川無纎飈蒼林起長烟千丈曝氷綃紫翠杳無端姿態歘横超南疇稻花吐北渚荷香飄禪室隐森薈湧塔翔嶕嶢傲然睨天衢鸞鶴紛相邀寢瘵屏中園煩心劇旌揺兹辰散輕策萬象同逍遥了得養生理長歌白雲謡月夜卧湖梁之上咏蘇長公赤壁賦諸子和而歌之樂甚罾人適致白魚乃遂觴於松下而賦是詩長公胸中足磈礧横覽江山發長愾一時感遇迹已陳千年古月今猶在古月今人代不同倐忽浮雲日千態我曾高卧石湖梁彷彿赤壁江流長長公不死倐來往風馬雲車遊帝鄉琅然夜咏窈窕曲驚起沙上䨇鴛鴦四山草木蝟毛竦星河為之久低昻綃人無聲老蛟泣水面金躍蝦蟆光氣酣風急月正午便須一飲傾千觴白魚出水如人長鸞刀飛割猶崛強三三五五坐松下翛然落雪隂山凉古來賢達皆如此何必山林減朝市嵇康不厭黄公壚酈生放誕高陽里人生有身貴自適枉向侯門躡珠履君不見夫差宫句踐壘狐兎紛紛嘯山鬼夜憇行春橋夏夜繁林莽星橋躡太虚市朝真翕爀江海一蕭踈白露横空下金波滿意舒王喬殊可接騰踏五雲車中秋夜同王子美朱日宣行春橋看月袁袠欲賞中秋月來陪達旦遊月當今夜好客為故人留皓魄渾疑晝寒光更挾秋乘槎吾興發直欲問牽牛其二月白蟾疑動秋清桂欲凋金波浮綺席彩暈射星橋雲遏袁宏嘯風傳子晉簫遥思牛渚㑹未必勝今宵八月十三夜行春橋賞月皎月升清漢金波散碧湍光揺牛渚動氣斂鵲橋寒乍擬弓將滿還愁扇未圑不能明達旦秉燭盡餘懽行春橋在横山東茶磨嶼下跨石湖上與越城橋聫有石洞一十八重建安里橋記姜漸蘇州府城之東南曰葑門其水陸之要衝有橋曰安里自宋歴元嵗久滋廢里人周君𤣥初時修真於城東之丹霞館憫其人民之艱於行也謀於里父老撤而新之經始於甲午秋八月畢工於冬之十一月欲求余文以為記而遭世變故不果閲六年庚子復請記之嘗為之言曰文之有記所以志其制作之勤盖古人經久之意也近世承平日久碑銘墓碣無處無之可謂盛矣自兵革屢興皆靡有孑遺雖古今士大夫之文傳不傳未可知未嘗不竊嘆碑之不幸也向使𤣥初得予文而刻之則其存可復冀乎矧欲以予不足傳之言刻之於既毁之後其不為達人之所慨者希矣辭不獲則書其言俾刻之而𤣥初亦以多故未遑也大明建國之元年師臨於吳凡附城之輿梁悉為内兵所毁獨是橋頼今大丞相信國公駐師其前不敢廢壞及克城之日師由是而進橋有力焉𤣥初竊自慶其功之不冺也復來請曰吾始為是役將以濟夫病涉者也又豈知造物者俾我新之留以濟夫王師也不然何故毁而新獨全乎是宜重記之以夸於無窮也噫余之言其果可傳者歟然自甲午至於今盖十有六年一求余文而不果一為記之而不暇刻凡再罹於兵而橋幸不毁終濟王師以成大功則予之言果可待而傳焉者矣是不可以不記故不辭而具載之使來者有所攷焉安里橋在葑門外葑門塘改造二橋記吳寛吳城東為長洲境其南曰葑門門之東有河河上下有塘塘之東曰梅里涇又東曰金涇舊皆有木橋以通七區之人往來者嵗久傾圮人以為患里有義士盧珪廷玉者居常曰珪遺腹子也惟吾父母早世㓜鞠於伯父以長年十七即自樹立成家今幸有田廬而衣食不缺者豈珪之自能哉吾父母積徳之所由也且聞吾父母嘗有意於義舉而不及為使吾吝所積而不肯為人不惟謂我愚而亦為吾父母辱矣然吾雖常為之顧無以及於衆也惟二橋人跡必由者是宜伐石改造為經久計乃召工市材擇日興工以𢎞治十年二月始造梅里涇橋橋成里人僉名曰通濟明年十月再造金涇橋橋成僉以廷玉之功不可忘也則名曰盧家橋以記之工部郎中張君守之與盧姻家也以其亊當載于文來請且曰葑門有塘長六七里居民稠宻而上塘尤甚塘以土築土既善崩迨天雨更泥濘行者不便數年前廷玉嘗甃以石其費亦不少也乞附書之予嘗觀於今之人凡積之厚者性必吝故好積者早夜汲汲惟其家是圗自門以外與衆共者不肯植一木甃一石者皆是久之其財與身同於澌盡而已不然遭不肖子孫敗之至於踈財者異於是然而家益盛身益康子孫又傳之久久者於人亊若相反而天道則好還有不可誣者予識廷玉已久固知其為人其治生也無悖入之貨其待人也有周急之心及視二橋使若他吝者不以為意必至於大壊人将病涉矣至於泥途不治若無大害然行者有沾濡之苦仆跌之危亦仁人之所不忍也今廷玉不求於閭里不煩於官府一旦捐數百金為此義舉不謂之賢哉夫義舉人多為之有好名而求人知者有求福田利益如佛氏之徒者君子皆無取焉今廷玉念其父母所謂欲報之徳善繼其志者則又出於孝思不又謂之賢哉廷玉常出粟助有司賑饑授承事郎平生義事尚多不能全載予特因守之之請為書此云金涇橋一名盧家橋在葑門塘東重建寳帯橋記陳循蘇州府城東南半舎古運河之西有橋曰寳帯按運河自漢武帝時開以通閩越貢賦首尾亘震澤東壖百餘里風濤衝激不利舟楫唐刺史王仲舒始作巨隄障之以為挽舟之路寔今為郡之要道也然河之支流斷隄而入吳淞江以達於海者隄不可遏橋所為建也仲舒鬻所束寳帯以助工費故因以名宋元以來修葺不繼遂至傾圮無遺有司架木以濟行旅每有覆溺之患正統七年廬陵周公恂如以工部右侍郎廵撫兹地覩之興慨乃與知府朱勝謀曰是役工費浩繁不可輙為乃戒有司預備工材之用又四年為十一年公率知府及長洲知縣張旻吳縣知縣葉錫往訃度之所積咸具而俾耆民李禧等董其工橋長千三百二十丈洞其下凡五十有三而高其中之三以通巨艦其用材計石二千六百丈木四萬二千五百株灰二十四萬三千六百觔鐵一萬四百觔米二千六百石橋既成咸贊頌曰此周公與朱侯經畫之得宜縣大夫奉命程督之有方其惠甚大不可無記㑹錫以攷績至京師來求為文夫為政之道在於惠民惠民之事茍有所當為雖聖賢亦未嘗嫌於勞而不為孔子言政之美而曰惠而不費勞而不怨孟子之謂王政亦曰嵗十一月徒杠成十二月輿梁成而民不病於涉盖謂事之闗于王政雖費且勞亦不為過而况於不勞者乎况於惠而不費者乎諸公之為惠于是邦而能勉聖賢之所樂為其超出於衆人之所從政也逺矣斯橋之建舟楫得往來之安行旅無徒涉之患商賈免盜賊之虞郡邑省屢葺之苦其于惠也孰大焉予故嘉之而為記寳帯橋與履吉同賦袁袠分野表三吳星橋控五湖天河烏鵲起靈渚綵虹孤陸海環荒服江淮委具區濟川懐壯業駈石想雄圖同前王寵春水桃花色星橋寳帶名鯨呑三島動虹卧五湖平表裏闗形壯東南海勢傾當知題柱者猶是一書生寳帶橋去郡城十里跨澹䑓湖南北長三十餘丈今呼小長橋相傳唐王仲舒捐帶助建故名宋紹定五年郡守鄒應博重治之正統間廵撫周忱又為修治重建尹山橋記錢溥天順六年秋七月長洲縣重建尹山橋成其冬予使交南還縣耆老浦嗣昌迓予而請曰尹山距吳城東南十里許有土巋然起若覆笠而枕于運河之陽舊有石梁跨其上廢凡四十餘年有司憚工鉅而費殷僅駕木為梁既高且危每風雨晨夕間商旅提攜樵蘇負荷而往返者不無奔仆跌溺之虞都憲萬安劉公廵撫東吳叢務既飭大慰人望爰命郡守黄巖林侯曰是尹山為民涉之病盍易木以石乎捐俸以倡之橋不踰年而底于成長凡二十二丈三尺高四丈二尺而廣視其高三分之一以石計四千五百五十以工計四千九百有竒堅緻宏壯視昔有加先是滅渡寳帶二橋正統初大司空廬陵周公嘗命郡守况侯成之尹山雖同峙吳城之南獨遺之而勿舉豈非有待二君子乎噫橋聿成於久廢之餘功甚難也劉公能廓先輩之宏規林侯存心爱物將有過于前守之為者宜其同徳協謀成此有不難也願為文誌之以為頌予曰事出於昔人之所難而成於今日之所易非恵而知為政乎鄭子産春秋恵人也捐乘輿以濟人於溱洧孟子譏之盖為政有大於此者諸葛武侯嘗言治世以大徳不以小恵至于治蜀而橋梁道路靡不繕理然則冬月成梁氏自免於病涉矣何必市恵以邀名哉二君子可謂知為政矣蘇人歌頌将踰於乘輿人之頌推是徳于人人當不止于治吳也系以詩曰尹山有橋界于吳域石既云隤木貽其戚都憲治吳大施厥徳命彼郡侯俾復以石過者思焉永其無斁尹山橋跨運河久廢天順六年郡守林一鶚重建重修夾浦橋記沈燾吳號澤國諸水㑹于具區流而為三江以入于海水由地中行其最衝要者莫有甚于夾浦其地去郡城四十里在鮎魚口之下流衆流所經水勢迅疾舟楫不能横絶中流而渡南通閩浙北接淮揚寔為漕運孔道時或烈風甚雨篙人棹卒每多告艱宋紹興初建為石橋人皆稱便橋有五空因以五星為名西納具區之水由吳淞以達諸海奔流日夜靡有停息遂為深淵人疑其下伏蛟龍我朝宣徳間一夕大風雨遂傾圮久未有復之者前廵撫工部侍郎文襄周公忱創為浮橋以代之造船一十六艘鎻以鐵繩架為浮橋上濟渡下通洩權宜無踰此制嵗久屢葺屢壞行者亦每間阻邇者都察院右副都御史𤓰涇徐公源與其弟南昌經歴君澄數過此竊以為憂適冬官正郎傅公潮奉敇治水乃具利害白之公臨視數四擬復建石梁謀于郡守曹公鳯乃集鄉人野老計之濶三十六丈深如五之一或又疑其成之難者乃命長洲尹劉君珂吳江尹孫君傑絡繹往返議皆如前公仰思甚切有間曰得之矣毋易前人成制吾但集材鼎新捐荒圗豐而己又令通判沈君溥陳君暐縣尹劉君澤復視之皆曰宜然遂増船四艘併舊凡二十選真楠募良工俾縣丞竇君𦙍喻君秉協董其事自浦南迤北其維之貫之之具悉備于前斤之構之之工咸精于昔又衡於梁者加豐厚之木繫於㟁者盡鞏固之方步而履之有若平地俯而視之頓忘其險更置守者六人人有厚給寓有安居旁建屋數楹行而勞者有所憇𢎞治庚申季冬十九日橋成鄉人聚而觀之咸曰休哉不煩吾衆而溥其利而享其安其功豈小補哉爰徵文于燾刻石以昭不朽燾以為知水道者事䟽濬利徒涉者建橋梁橋梁建立寔有礙於䟽濬之勢䟽濬川澤每多畧乎橋梁之舉二者将安處乎求其水道䟽通而橋梁修舉並行不悖而彼此均利莫如浮橋其孰能與于此哉傳曰如智者亦行其所無事則智亦大矣是役也其庻幾乎率由美政步武芳躅不倍乎䟽濬之道而得乎博濟之術則其識量宏逺夫豈晩生末學所能窺哉因叙其顛末俾後之人知所攷云夾浦橋在鮎魚口下流吳淞江由此起水勢迅疾疑有深淵下伏蛟龍宋紹興初建為石橋國朝宣徳間風雨傾圮遂不復侍郎周忱創造船十六艘鎖以鐵索架為浮橋至今因之𢎞治間都水郎傅潮又為増置倍於昔矣長洲縣建官瀆朱涇二橋記都穆工部郎中新喻傅公以朝命涖吳水利於兹三年凡政之可以利民而行逺者公悉心為之㒺憚勞瘁而州縣亦奉行惟謹莫之敢後公嘗謂橋梁者水利之首務惟長洲官瀆朱涇二橋在郡東北舊𨽻於縣寔當要衝嵗久傾壞以為此而弗修則行者病而水道壅非所以為政也乃出在公之銀以為之倡而縣民馬璘曹源等復樂助焉公命縣丞竇君𦙍専董斯役撤其舊而一新之經始於𢎞治庚申秋八月至辛酉春二月而工告完官瀆舊修十有五尋崇三尋有四尺廣減崇之二朱涇舊修八尋有四尺崇不及二尋廣減崇過半今視舊減崇三尺廣倍之而洞其下者亦然事雖董于有司趨于小民而所以規畫之者大抵皆出乎公是故成之之易而其堅厚雄偉則又可以久逺而非利於一時者也穆嘗稽之郡志橋梁之盛唐稱三百有九十以今視之其數葢不止是但舊之司水利者皆州縣之佐官無専員其任弗隆往往墜廢自如而水旱迭患邇年以來涖以廷臣由是其事始重而况忠勤諒直如公者哉是舉也官不知費民不告勞而徒者舟者莫不感嘆謂公之愛民如此水道之通誠有藉焉公之恵不其溥哉竇君俾穆為記将刻諸石示不忘公之功穆吳人也葢嘗受公之知而目覩其事故敢執筆而記之公名潮字日㑹由科甲進士典内翰而至今官政事文學與其兄大宗伯體齋齊名於時官瀆橋在婁門外跨至和塘元至正二年建朱涇橋在齊門外冶長涇普濟橋記杜啟長洲縣属里有地名野場涇其處多居大家欲重其地美其名也故易云冶長猶陳太史謂相川沈氏之思賢涇也然亦足以知其民之好事易於為義矣涇逶迤若干里西首鵝湖巨浸南尾漕湖相值葢衆水之瀦也郊原四出則為常熟崑山無錫百里間貿易耕牧弔慶醫卜往返之所必由故有木橋名曰普濟廢己久矣陸行不通若干年𢎞治之七年居民周方等欲創為之募錢於衆得若干貫間歉歲不時集又慮藏之於私家非便白于郡而貯之官既三年嵗稍稔請錢于官時典郡者他費之且半僅給餘錢甃成橋堵自是募緣不属塹壩阻水不通舟行者又三年既而都水郎中傅公奉敇來督三吳水利廵行至其地詢知橋事始末以為於官與民有不得不舉者存歸召知縣劉侯議之侯曰如命究厥費數以補給之尚未敷也公又出公帑若干緡俾之盡斥舊規乃磨巨石為之命水利縣丞竇𦙍董之價充材備民樂趨之不兩月告成縱計一百五十尺横一十六尺隆三十三尺上為懸虹之勢中穹兩垂影飲河流下為偃月之形洞空輪廓帆檣徑度直䦨横楯偉觀村落不誇改名以便稱謂於是諸用事者請紀石以表公績嗚呼民之義舉而幾廢于官閲歴數年公則興之侯乃承之始畢民志亦維艱哉固宜書之以示後者勸懲存焉作冶長涇普濟石橋記公名潮字日㑹别號靜齋江右新喻人成化辛丑進士歴今官公勤亷恕于凡河道事畢盡心力以為民利類此橋者尤多侯名珂湖廣興國人𢎞治丙辰進士初試縣為政修整竇𦙍山西隰州人出身太學生奉事克謹俾姓名刻于隂普濟橋在冶長涇西一名南橋長洲縣十字河重建兩石橋䟽馬愈伏以子産以乘輿濟人恵而不知為政恵州以犀帶布施亦是方便存心雖非雪擁藍闗馬不前奈此流水斷橋人不渡因成短䟽共結良縁恭惟蘇州府長洲縣乃江南奥區武邱鄉彩雲里寔吳中勝地水出五湖巨浸地有十字大河南通長蕩而北貫鵝津豈但有兩個黄鸝鳴翠柳東注漕河而西連野蕩却那看幾林紅葉送秋蟬其東河原有三虹木橋其北橋亦有縻城舊杓蘇松常鎮行走者旁午相通商賈農工往來者絡繹不絶奈何嵗年長久頻遭雨雪崩頺又被水勢奔衝以致堍石壅塞路途阻滯舟楫難行凡遇公私急務因而溺已者有之更兼風雨不時從而覆舟者無數深為未便良可哀憐于是耆儒施文徳者有軫于中義士虞以勤者願𢎞攸濟舉兩橋不通之利害荷二尹李公之賢明詢其所成大為明便爰令㑹計經營其寔工程浩大其東長二十二丈環洞髙三丈五尺有竒其北橋長一十丈環洞髙視東為弱石䦨石塊今無秦始皇用術鞭來石券石梁安得女媧氏通神煉就杉木打樁樁木千餘根盡須錢買油灰陷石石灰數百擔也用柴燒騃大去挑坭難道著他忍餓魯般來下斧也須算與工錢所費不貲急難措手是以持䟽踵門仰叩達官長者捐金甃石俯求君子賢良庶踴躍而同成勝事浩大而廣種善根獨力難成巧婦怎煮沒米粥衆擎易舉消得龍王幾陣風便須壘石成山全仗揮金似土宋郊度蟻尚然感動天心蔡守黏蟶豈不大為隂隲向此際人人歡喜捨祝己後步步好前程東橋造就要看高似昇仙北券落成竚見平如圮下更有相如題柱豈無黄石傳書十一月徒杠成十二月輿梁成民何病涉三百年灰不朽三千年石不壞福利無窮謹䟽成化二十三年四水星舎辛未四月佛誕日大勸縁道人賜進士出身刑部河南清吏司主事在告太湖釣者馬愈抑之甫著并書募修韓墅通濟橋䟽朱存理諺曰脩橋梁利人為事亦曰捨錢財善者發心竊見韓墅村有箇板橋年深壞爛傾圯瑞雲觀伊誰道士日來布施營修是橋也東為龍江西接九里湖寺口而南則同里北即陸道判莊頭通濟之名其斯得矣方便之事誰不為之吾等不敢狥私匿己公輩猶當見義勇為他日橋成共刻芳名於千古後來過客常覺風景之一新謹疏葑門外馬路北募造石橋疏上傅水部伏以出葑門距城三里行由馬路望處一橋寔為舟車之要衝勿憚人烟之冷僻陸以直通婁齊門去水則逺接吳淞江來若干将墩尚存古跡而金涇港直泝上游每嘆嵗深板橋之欹更愁霜曉泥塗之滑将以鼎新革故施財須仗髙明務欲易石鳩工作事必期永久盛徳萬人方便義名千古傳揚江國雲開突見波淩蝃蝀沙隄柳拂笑看人倚䦨干謹䟽辛酉正月修彩雲橋䟽袁袠彩雲橋者據横塘之靈境跨吳㑹之通津葢四達之所經趨九衢之所輻輳者也年悠嵗久石圮㟁崩行人咨嗟居民慨嘆既妨㳺息亦病輿徒嘉靖己亥有胥臺袁子營别業於斯丘繼而處行王翁考新宫於兹壤務躭幽僻永謝塵煩肆顧傾頽爰謀改作於是雲門道人矢心發誓差日鳩工展宏基于曩規無煩驅石之費揭雄觀於今構兾免從橋之危凡我十方各捐一木務使星輝月偃卧蒼龍於水中蝀舞虹騫塡烏鵲於河表自今伊始駟馬瞻題柱之人億萬斯年匏葉免褰裳之咏吳都文粹續集巻三十五
