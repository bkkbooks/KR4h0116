body:
  text: 呉都文粹續集卷二十九明錢榖撰寺院蘓州通𤣥寺法華院石壁經碑文白居易碑在石壁東次石壁在廣徳法華院西南隅院在通𤣥寺西若干步寺在蘓州城北若干里以華言唐文譯刻釋氏經典自經品佛衆號以降字加金焉夫開士悟入諸佛知見以了義度無邊以圓教垂無窮莫過於妙法蓮華經凡六萬九千五百五言證無生忍造不二門住不可思議解脱莫極於維摩經凡二萬七千九十二言攝四生九類入無餘涅槃入無礙度者莫先於金剛般若波羅宻經凡九千二百八十七言壊罪集福凈一切惡道莫急於佛頂尊勝陀羅尼經凡三千二十言應念順願願生極樂土莫疾於阿彌陀經凡一千八百言用正見觀真相莫出於觀音普賢菩薩法行經凡六千九百九十言詮自性認本覺莫深於寔相法宻經凡三千一百五言空法塵依佛智莫過於般若波羅宻多心經凡二百五十八言是八種經具十二部合一十二萬一千五十七言三乘之要㫖萬佛之秘藏盡矣是石壁積四重髙三尋長十有五常厚尺有咫有石蓮敷覆其上下有石神固䕶其前後火水不能燒溺風日不能飄揺所謂施無上法盡未來際者也唐長慶二年冬作太和三年春成律徳沙門清晃矢厥謀清海繼厥志門弟子南容成之道則終之寺僧契元捨藝而書之郡守居易施詞而賛之讃曰佛涅槃後世界空虚惟是經典與衆生俱設有人書貝葉上蔵檀龕中非堅非久如蠟印空假使人刺血為墨剥膚為紙即壊即滅如筆畫水噫畫水不若文石印蠟不若字金其功不朽其義甚深故吾謂石經功徳契如來付囑之心宋徽宗佛牙舍利賛崇寧三年重午日自蘓州報恩寺迎請釋迦佛牙入内致恭祈請舍利感應隔水晶匣出如雨㸃神力如斯嘉嘆何巳繫以賛曰大士釋迦文虚空等一塵有求皆赴感無刹不分身玉磬千輪在金剛百煉新我今恭敬禮普願濟羣倫捨銅龜子文蘓軾蘓州報恩寺重造古塔諸公皆捨所藏舎利予無舍利可捨獨捨盛舍利者敬為四恩三有捨之故人王頥為武功宰長安有修古墖者發舊𦵏得之以遺予予藏私印成壊者有形之所不免而以藏舍利則可以久藏私印或速以壞貴舎利而賤私印樂久存而悲速壊物豈有是哉予其并是捨之平江府報恩萬嵗賢首教寺碑閻復至元壬辰予客呉郡正月望日逰報恩寺南軒薰公大師迎憩丈室導予登塔周覧殿廬師體貌魁梧儼若梵僧問年則與予同庚甲他日肩輿來訪持報恩興替之跡求為寺碑予辭以未暇居數月觸熱復來申命典記往返再三辭不獲命遂書其事俾刻諸石按報恩本呉通𤣥寺吴主孫權為乳母陳氏作也隋伐陳為呉令孫寛所廢唐僧慧頵更築之開元中詔郡國名藍為開元寺郡以此寺應詔大順乾寧復燬於兵錢氏有國日即故址而新之揭以支硎山報恩舊額報恩之名實本於此古塔起於梁僧正慧久墮刦灰元豐重建蘓文忠軾甞捨銅龜以藏舎利崇寧初賜名萬嵗建炎之難鞠為煨燼今所存者九成盖紹興僧金大圎所造寺有古釋迦文佛示寂像長乃數丈弟子環繞擗踊哭泣極形似之工土人呼為卧佛寺近嵗淳祐敕造傑閣以覆兹像改賜今額圖志相傳又有不染塵觀音像唐太和石經像毁於建炎而復於紹興經石則蕩為冷灰矣自呉赤烏紀年迄今千有餘嵗浙右精藍此為最古舊分文殊法華泗州水陸普賢五院合而為一大敞法筵牓曰華嚴性海實出芝林石橋諸師手薰公即開山松鍳義法孫也皇朝混一之初來主教席以謂寳坊凈域臣子祝釐之地不可不嚴於是度材訓工嵗緝月絫起外三門營東西廡中甓法堂上嚴塔刦若賔寮若懴室若土地祠若華嚴祖師殿若僧堂以至井亭浴室猊座法器之屬弊者以新缺者以完墜者以舉輪奐以楹計數百有畸墾闢以畝計數千有畸工用以緡計數萬有畸予既叙寺縁始末且諗以報恩之説曰父子之親人皆有之君臣之義人皆有之今師以無礙辯才闡揚妙法因權顯納民於善俾為子者思竭力以報親為臣者思盡忠以報國豈非真報恩耶什篇之義孰外是乎師曰善哉謹繫以銘其辭曰佛日西暉慈雲東冒赤烏紀祥通𤣥斯肇禎明被兵乾寧陷盜扁去開元廼崇今號塔始蕭梁中嚴佛寳元豐起廢蘓文可攷圯於建炎金圓再造滄海㡬塵炎岡幾燎不壞真如長圓覺照孰主是圓孰明是妙崧秀相傳繼薰克紹載闢堂筵載嚴塔廟彩繪虚空金瑰蓬藋鷲表靈蹤龜呈吉兆花雨晝零蓮燈夕燿啟廸愚迷闡明道要何恩不酬何徳不報為臣思忠為子思孝是名報恩允符真誥厯劫光華恢𢎞象教通議大夫翰林學士江南西道肅政亷訪使閻復撰并書中奉大夫江浙等䖏行中書省㕘知政事新除江南西道肅政亷訪使徐琰題盖至元二十九年八月望日住持傳華嚴教觀慈應大師處薰建報恩萬嵗賢首教寺長生殿記黄溍平江報恩萬嵗寺在府署北五里許其先呉大帝赤烏年嘗為乳母陳買田造寺名通𤣥至唐改賜開元號五代錢氏時更擇地徙置之田亦隨徙已乃取支硎山報恩故額建寺補其處今有寺之始也寺舊有文殊普賢法華泗州水陸五院宋季悉合而一之遂為大叢林凡學乎賢首氏而逰其地者咸聚而歸焉嵗阻入田租不足充其食其徒盖病之久矣大徳中颶風起海上穿城郭壊廬舍寺適當颶風之衝屋盡毁領教事者率為之倚席不講而竭其晝夜之勤以支傾而植仆未暇謀田事也延祐二年夏五月佛性圓融無礙大師被璽書嗣住是山首捐其衣盂之資以倡衆鳩材㑹工構鐘樓髙至百三十尺飭鉅閣覆佛般湼槃像尋又葺栖僧演法之堂方丈之室於是昔之所有皆復完其未始有者亦無或不備而穹檐廣霤厚棟大梁敞顯嚴邃視舊有加焉土木事既訖乃大發其私笈買田三百畆有竒募施者得田又千五百畆有竒以為長生田而别籍之嵗推有齒徳者二人受其入以給學徒之食且俾筦庫毋敢與而聽主教席者稽其出内講事以不廢懼後無所攷而志之弗繼也爰伐石来取文以記之夫報恩之為寺垂數百年而所以食其徒者待師而後具盖師之畢力殫慮於此為不易矣惟逰於斯者毋茍利乎安且飽而務究其學焉庶有以夀國福民而延其施於無窮也是不可無辨廢興以示誡勸乃不辭而俾以文師名傳教字别傳耆舊僧任興造者普修普照輟田以相之者允貞普頎也田步畆鄉落之詳自有籍兹不書應奉翰林文字儒林郎同知制誥兼國史院編修官黄溍撰并篆郡人錢良右書至順三年良月既望住山沙門傳教樹石報恩萬嵗賢首講寺釋迦文佛臥像銘宋濓姑蘓報恩萬嵗賢首講寺乃呉赤烏初大帝為乳母陳氏所建名曰通𤣥唐𤣥宗因其年改作開元呉越錢武肅王為之起廢揭以支硎山報恩寺舊額宋徽宗崇寧初加以萬嵗之號至佛日崧公來為住持專講華嚴經䟽尊為賢首講寺寺有淳祐鉅閣七楹閣下覆釋迦文佛滅度之像相傳自唐即有之州民攀慕邀福者殆無虚日元季偽呉張士誠據有其地惑五行家言以為佛卧非吉徴更造立像民情焦然弗寧及偽呉亡徳嵓法師俯徇羣情起主寺事不二三年易腐為堅殿堂樓閣門廡寳塔之属一一葺之煥焉如新已而嘆曰諸役幸粗完象不可復於古乎於是走告民間不分耄倪皆舉首加額競輸貨泉以後為媿法師乃戒摶土之功斵嘉木為骨骼承以髙座塑卧像其上塗以五色覆以彩衾諸弟子涕淚悲泣環列前後摩耶佛母亦立其側悵然興哀惟文殊普賢二大士神情閒曠超出死生之外用意精致形模宛然像長六十六尺髙一十二尺文殊等像髙一十八尺經始於洪武十一年秋七月十五日眀年夏五月十六日訖工縻錢五萬有竒用功六百有竒伻來俾濓記之嗚呼佛之法身猶如虚空本無去來何有生滅其示八相以覺羣迷不過降本垂跡俾同人法而已本則真諦跡則俗諦真俗混融皆不思議之事烏可以異觀哉况八萬四千無非度門觸類而入洪纎畢達姑以入滅論之實具華嚴五教大百小乗雖除吾執未達性空但知實色故示之以涅槃非近於愚法聲聞教乎色法二相本無自性皆從縁生滅度之際斷縁歸空獨存真空真空既存幻有亦住二體互融了不相礙非近於大乗終教乎滅而非滅非滅而有既滅而空空有俱泯理事交奪如如不動無即無離非近於大乗頓教乎熈連河間居然唱滅靈山㑹上儼爾常存隨舉即色隨舉即空如示一身不起於座如化多身徧滿塵刹無量為一一為無量力用相收縱横自在非近於乗圓教乎諸有情衆若勝若劣來瞻靈像随其機宜證入教位至於混極不翅親聞盧舍那演説圓滿修多羅之為快法師此舉其於樹教基續慧命有功於法門甚大非特福澤被於一州而己抑濓聞昔人設像俱有所表則非茍然也如來中居表衆生大覺之心飲光勝尊在左表自利之行慶喜在右表利他之行文殊乗獅子表大智而降嗔也普賢騎象王表大行以制貪也他日如劍斧兩神則表觀空擇法二智取義深逺使人目擊而道存故歴代襲之定為常法而此湼槃之像奈何獨無所表乎濓因略舉襍華之説斷然謂五教之理咸具不然佛法偏在一切處果何言哉濓既為作説殷勤遐仰復學主夜神以偈賛佛之語繫之於後法師名淨行徳嵓其字也博通帝心雲賢首清凉定慧諸家書力振其宗於将墮之時一彈指間悉起諸廢其化導有縁以成法師之志者善良正宗二沙門也偈曰世雄大悲利羣物果後示權不思議既由應身顯法身從體起用宣妙法人機既得饒益故唱入滅度示化儀化儀有始而有終所以懲創懈怠者七寳牀中右脇卧慧日一朝竟西沒娑羅樹木皆變白諸天衆號雨天花四衆圍繞更悲咽妙香結樓奠金棺發三昧火而自焚各分舍利建塔廟如來雖入涅槃中畢竟終無涅槃者是知一性鎮常住不從變易有生滅倬哉賢首古伽藍三呉法㑹斯第一乃造涅槃微妙相因相攝入有情衆近遭紛更紊常制緇素㷀然失怙依有大比丘起復古最先補苴諸樓閣一一荘嚴成妙境次令埏土肖靈像五色交纒廣博身州民瞻禮至洒泣如還故鄉逄故物此即大乗正法門種種皆能濟郡品觀者毋以像觀像如觀襍華大經王字字化為法燄雲雲中化物皆現前一身示現無量身無量身中現一身令我悉除邪見網直濟難思解脱海行住坐卧皆見佛佛之智慧如虚空無性無生無所依大光明藏時時現與我無同亦無别從上所言真實法衆生慎勿懐疑念重脩報恩寺塔記陳琦呉城之大刹最古而名著者惟報恩賢首講寺焉寺剏於呉大帝赤烏初年而塔則造於蕭梁時凡十一級屢墮刼灰至宋紹興間沙門大圓僅成九級即今塔是也然厯嵗既逺峻峙亭毒風摧雨擊易就隤毁過者興嗟𢎞治庚申今僧綱司副綱法律曽住是山請於呉邑宰鄺侯命僧徳夀鳩工修葺且戒諸人勿得撓其事未久徳夀示寂衆舉僧徳昊道充宗恩師司之善士倪道完復相其役各協乃心不憚勞勩若見若聞悉生喜躍於是大姓割其財小夫奏其力銖積寸絫捴費萬餘緡經始於是年五月明年是月乃底於成易腐為堅増新去舊珠頂光芒金繩交絡飛櫩外飭丹梯上通像設荘嚴天神森衛䦨楯旋繞層層如一風鐸之聲聞乎四境夜燈之焰燭乎半空頋不雄哉諸僧以興修之功不易皆鄺侯外䕶之力不可無文刻諸貞珉用昭永逺乃持其所述本末介士英陳先生謁文於予按佛氏之説釋迦説法於靈山多寳佛塔從地湧出為作証明及其入滅留舍利八斛四斗為浮圖八萬四千遍滿婆娑利樂羣品此塔之所由興也若今之塔蘓文忠公曽施銅龜以藏舍利於中想八萬四千之一也我國家神道設教仁夀躋民而亦妙嚴寳乗乃無象教之功以感蠢愚之善心也哉兹塔之偉麗觀者起敬可以住持佛法鞏固皇圖為東南塔院之冠冕矣但今之學佛者或離乎真或蔽乎物髙者為名下者為利餘波末流無所不至而佛法㣲矣徳昊輩必不若是其得義以了心者乎因其請記故序其事而警之且以告後之同志者嗣而塔之庶斯塔之不朽也報恩佛殿重修記楊循吉凡古之古刹在呉無居報恩先者惟殿亦然由南宋至今三百載而巋存如故然後知佛之道大而尊特一宇盖久若是也然佛言曰凡佛之成必歸于壊而况其久者歟夫值其久遭其壊勝之以力而不移於常數此又存其人焉始殿之敝再修再輟或言趙靈釋文瑛之能而不以佛示者遂迎之至則果以勤役無私動乎人起仆而植易腐而堅入其中靚深壯麗不啻若所謂神通湧化焉者儼乎菩提道塲之𢎞開而天人之翕習也於是其徒嘉之相與言吾佛大師福徳被三界莫不崇欽而一土木之興綿紀弗就何哉誠駕其説者道不足也今若人乃能成是其於道不優而能然乎因偕詣予述其事願書以勵其人乃備録以為記而使鑱之於石為報恩卧佛寺衆請瑛師主修崇寧大塔叙祝允明瑛師字獨輝居大姚之大覺寺始郡人張廷玉以卧佛寺觀音殿久毁請師來主造既完住山澤公以正殿未完與大檀陸明輩止師完之歴七年諸工告成師乃還舊隠於是澤與合山勤舊議以崇寧大塔日就頺敝為山中欠事復圖請師來司嗣葺乃求予言似師以彰前功而表今願以謝以懇予謂佛以其大法力䕃䕶開發我人我人受其䕃䕶開發之力故為修造安奉以報之而為之徒者乃為經營以成就我人報佛之心而使佛之力永行於我人是雖天人小果而經營感應之間實有一因縁且師未來時觀音殿之毁久矣孰意不㡬寒暑而遽完又孰意正殿之敝又繼是而并完也哉以是知修造之果雖在其徒有成就報佛之心而其經營感應之間則難以强也其遂是不可謂非佛縁所致也師於此請安知非未了之縁邪吾聞師先主崑山之趙霛一出山後屢造勝果隨造隨成是則此縁所在當不可外師而他請師乎倘是予言當便飛錫義和尚號了菴記有一苾蒭其名曰義住蘓州城卧龍街上大阿蘭若於大阿蘭若中造一小舍號舍曰了於身稱喚亦復如是來請卧龍街中菩薩弟子眀為説其義我聞世人謂諸心事究竟完結謂之曰了如苾蒭者謂之曰了我未知識譬之如舎於舎一間謂之曰了一間無逆如一間外為當曰了當曰不了謂當曰了則舎有二謂曰不了舎身乃了譬之如舍於舍一間於間一柱謂之曰了一柱無逆如一柱外還有一柱還有十柱百柱千柱還有一梁十梁百梁千梁乃至又還有椽有栱有墻有瓦有門有窓有地有堦當件件謂之曰了為當捴件謂之曰了於件謂了則未完舎於搃謂了件非非了如是苾蒭不謂一舍乃謂一身如謂一身血肉曰了四大見存如謂一身心性曰了心性未泯如日已沒謂曰日了如謂已了明日還日如謂不了日在何處於一夜間為當曰了當曰不了於此境界於此時候為當何稱為當有稱當無有稱我問苾蒭苾蒭何荅所以我於稱喚云未知識云何為説我聞菩薩究竟完結在一大無苾蒭如是當大明心當大見性當大發力如是乃知菩薩究竟完結在無所了亦無不了亦無無了與無不了一念不生萬縁俱息轉轉歸無乃是了義苾蒭聞我所説歡喜解悟乃為重宣此義而説偈曰我觀苾蒭身非無非非無身外復有舎舎外復有稱如是以為了如稱木云灰苾蒭如了此無稱亦無舎無身無我語而究竟完結宿報恩寺水閣皮日休寺鎻䨇峰寂不開幽人中夜獨徘徊池紋帶月鋪金簟蓮朶含風動玉杯往往竹梢揺翡翠時時松子擲莓苔可憐此際誰曾見唯有支公盡㸔來和陸龜蒙峰抱池光曲㟁平月臨虚檻夜何清僧穿小檜纔分影魚擲髙荷漸有聲因憶故山吟易苦各横秋簟夢難成周顒不用裁書勸自得凉天証道情寫墨竹趙孟頫開軒叢竹杪坐久聞清韻重陰結春雲小雨生衣潤親友有嘉集笑語發真藴游衍暮始還流光疾如瞬跋黄潜至大間趙魏公逰姑蘓報恩小憩於丈室乗興寫墨竹一小枝於壁題古詩五言四韻於牕間今垂四十年竹故在而窓紙久不存住山宣公法師聞吴江賢上人裁得此紙物色得之并竹摹刻于石将使久而勿壊庶後來有以想見其清標雅韻也夫襍花境土實報莊嚴毘盧樓閣非我壊相髙人上士㳺戯作如幻事豈以石之夀為真足恃哉姑以備好竒者之一覧云爾遊北寺陳基秋風日蕭爽散策一空林有竹心已清無言念彌深襍花不容把踈磬有餘音逍遥毘盧境落景駐遥岑北寺竹林楊基僧居古城隂迢遞通萬竹林光落虚牖坐愛衣裳緑齋餘孤磬逺茶罷微烟續道人悟重𤣥淡然無衆欲譬彼石根泉亭亭湛寒玉報恩講寺在城北陲故呼北寺即通𤣥寺舊基呉越錢氏移支硎山報恩寺改建於此宋崇寧中加萬嵗尋尊為賢首教寺舊有五子院曰文殊泗洲水陸法華普賢今皆廢浮圖十一級建炎兵燼後紹興中行者金大圓募建九級又有不染塵觀音殿邊知白記後殿七楹下塑釋迦滅度像長六丈六尺髙十二尺張士誠據呉以卧佛非吉之祥更造立像國初僧復之宋濓撰碑宋張即之書華嚴性海四字皆經丈刻牓猶存緑隂堂記虞集至治壬戌集始逰呉斷江恩公住開元光公雪窗客予所同往見焉是時斯堂始成樹隂四合三人者清坐良久共歎韋蘓州緑隂生晝寂之句有心解神釋而不可名言者恩公曰子為吾記之乎予曰諾未幾還禁林緑隂之勝概往來予懐欲以數語道時所㑹了不能成自是居十餘年每初夏時天子燕閒穆清中外靖謐予與學士二三人待顧問於閣下危坐終日遂無一事亦緑隂之一時也及歸江西以久處北方不耐新暑輒求泉石以自容蒼松古磵人跡幾斷此又緑隂之一時也然穆清親切嚴密敬畏端思固不逮開元之適也而山中枯梗寒絶殊乏清潤之意求夫寂然湛然之中純粹洞徹生意充滿融液如開元遇殊不可得然後知韋侯佳句非語言意識所可到也是以終無以復恩公者豈忘之邪昔人以為同此境其人修証造詣不同則所見逺有差别况人境俱不齊者邪今恩公年垂八十歸坐雲門之上道徳日盛予竊諷其舊吟如望積雪映空不見其迹光公據坐此堂亦有如當時可托以記此者乎元統乙亥四月蜀人虞集記呉中禮石佛江淹幻生太浮詭長思多沈疑疑思不慙炤詭生寧盡時敬承積刦下金光爍海湄火宅斂焚炭藥艸帀卉滋常願樂此道誦經空山坻禪心暮不襍寂行好無私軒騎久已訣親愛不留遲憂傷漫漫情靈意終不緇誓尋青蓮界永入梵庭期開元寺樓看雨與皮襲美聨句陸龜䝉海上風雨來掀轟襍飛電登樓一凭闌滿眼蛟龍戰龜蒙須㬰造化慘倏忽堪輿變萬户響戈鋋千家披組練日休群飛抛輪石襍下攻城箭急㸃似摧胷行斜如中面龜蒙細雨洒空冷横飄目能眩垂檐珂珮喧㩧瓦珠璣濺日休無言九陔逺瞬息馳應徧宻處正垂絙微時又懸綫龜蒙瀉作玉界破吹為羽林旋翻傷列缺勞却怕豐隆倦日休遥瞻山露色漸覺雲成片逺樹欲鳴蟬深檐尚藏燕龜蒙殘雷隠轔盡返照依㣲見天光潔似磨湖綵熟於練日休踈帆逗前渚晩磬分凉殿接思强揮毫窺詞幾焚研龜蒙結栗烏皮几輕明白羽扇畢景好踈冷餘凉可清晏日休君擕下髙磴僧引還深院駁蘚凈鋪筵低松濕垂鬋龜蒙齋明乍虚豁林齊逾蔥蒨早晩重登臨欲去多留戀日休開元寺避暑有懐陸魯望因飛筆聨句皮日休煩暑雖難避僧家自有期泉甘於馬乳苔滑似龍漦日休任誕襟全散臨幽榻旋移松行将雅拜篁陣欲交麾龜蒙望塔青􅐴識登樓白鴿知石經森欲動珠像儼将怡筒簟臨杉穂紗巾透雨絲靜譚蟬噪少凉步鶴隨遅日休烟重廻蕉扇風輕拂桂帷對碑呉地説開卷梵天詞積水魚梁壊殘花病枕欹懐君瀟洒處孤夢繞罘罳龜蒙右二詩宜在通𤣥寺作因唐時改開元名而集中仍之附編於此備考逰開元寺憇緑隂堂韋郎句中尋畫境刦灰不盡緑隂増鴻文重記青城客内典新傳瀑布僧石佛浮江輕似葉神珠照鉢隠如鐙桫羅樹子風前落吹滿恩公舊㲩􅚊送恩禪師弟子勤歸開元寺髙啟山衲經寒補襍繒白雲髙寺遍尋登法身已見浮來佛宗㫖曽傳化去僧歸過江城誰施飯定依舊院自懸燈明朝應恨千峰阻欲問楞伽已不能開元寺雨中觀梅姚廣孝遥思西崦開千樹漫往東林見一枝烟雨溟濛香影盡為縁惆悵立多時開元寺聞鐘胡纉宗開元夜半鐘驚起長安夢彤墀曙色寒紫陌春風動開元寺在盤門内有石像石鉢鉢近燬紹興間守臣洪邁作戒壇元至治間寺燬僧光雪窗恩斷江重建取韋詩緑隂生晝寂之句作緑隂堂虞集為文國朝永樂間重修城中登瑞光塔望舊逰諸山姚廣孝寳塔乍登臨靈猋蕩夕隂故山俱對眼此日獨逰心逺水勞歸楫長空倦去禽自非嬰世難何不遂幽尋遊瑞光禪寺沈周城中五日雙脚紅頗有俗氣填吾胸今朝風日弄妍美城南載酒尋花宮古濠流水帯榆栁深居逶迤茶烟中老僧與吾非夙契却許小閣開松風山杯到手送西日醉倒信呼田舍翁未知明日又何處出門大笑歌萍蓬瑞光禪寺在開元寺南赤烏間僧性康建名普濟院宋宣和間朱勔建浮圖十三級五色光現詔賜今額并賜塔名天寧萬夀寳塔靖康兵燬淳熈間重建并復塔七級元季復燬國朝洪武中僧曇芳重修僧大祐記寺有四瑞堂平江承天能仁寺記黄溍平江承天能仁禪寺在府署北之甘節坊梁天監初衛尉卿陸公僧瓉捨宅以建也初賜名通𤣥陳隋之際燬至唐而復廣徳初加號廣徳通𤣥遭廢於㑹昌末重興未幾而又燬至後唐而復宋咸平間更一新之大中祥符初始賜額曰承天宣和中乃改其額曰能仁南渡後燬至建炎末而復於紹興間淳熈初始定為禪居皇朝因之而悉蠲其租賦差役曰承天能仁者並存其故額也先是甞於大界相之内析其地為寳幢永安龍華廣福四院久之復歸於一尋又别立圓通禪院於其後而分立寳幢永安兩教院於其前凡建置沿革與興廢之故可見者如此其易律為禪也妙菴宗公為開山第一祖繼之者有若無門覺菴諸公皆以明徳為世師表法㑹甚盛珍樓寳屋紺殿緇廬雄據乎萬井中而隠然為一大叢林五山十刹殆無以尚也乃當至元之元年冬十有二月寺厄於灾惟無量夀佛銅像及盤溝祠靈祐廟獨存佛身丈有六尺邦人所共瞻仰與盤溝靈異之跡尤著靈祐則衛尉之女不嫁而精於梵行以經營寺事而祀為䕶伽藍神以禱祈有應而賜廟額絫封慧慈靈感顯祐善利夫人者也雖烈焰熾然而不與刦俱化人知為重興之兆矣顧法席久虚越三嵗莫有任起廢之責者行宣政院詢於僉言俾廬山開先南楚説主之其至以四年冬十有二月僅以衣械坐具一布囊自隨聞其風者輸財荐貨川赴山積召匠簡材首建大殿殿楹之髙百三十尺其大圍十有五尺廣加其修若干尺厚棟修杗曲欒方楶咸與楹稱楹之表上至屋極又若干尺脩去其崇若干尺廣加其脩若干尺像設繪事種種莊嚴摶土設色皆出國工之手殿之後有萬佛閣其楹加於殿楹三十尺閣為間五而東西朶樓為間四隆其中而殺其旁縱横脩廣各中於度其上列十五大蓮花一花一佛其花瓣亦各為佛以足萬數下施機輪可以轉運竒詭殊特昔所未覩範銅為鉅鐘至萬八千觔比舊加三之一㑹南楚升居徑山所作無量夀觀世音䕶伽藍神三小殿及演法集僧之堂三門兩廡厨庫之属皆勿克視其成他所宜有而未及為者猶多也今住持雪窓明以至正四年秋九月由虎丘遷主兹寺亟捐衣盂之資構經鐘二樓各為間者三其崇十有七尋脩廣稱是栖經有藏塗以純金一柱八面納匭五百天神環繞力士翊扶旛盖香雲繽紛蒙蔽達官大姓好事之家觀者莫不目眩心駭爭投錢幣以助勝縁雪窓之經畫相勞靡憚其勤甫及三載土木之功秩然有序以老病厭理繁劇悉束衆施併傾巳槖以授提㸃僧而退處虎丘之東菴八年冬行中書省右丞石嵓公左丞呉公謀於行宣政院挽之復出遂以九年春三月再正法席増飾萬佛創造四臂觀世音四天神王䕶伽藍神補畫正殿之八十四龕廡下之五十三參圬墁瓴甓壯麗縝宻髹彤金碧絢耀華美厨堂庫院什器之須纎細畢備南楚之弗克視其成者至是可以無憾矣斥大方丈為間者五上為重閣下為廣堂前為㕔事而蒙堂有位衆寮有閣倉庾湢室亦次第告成南楚之未及者雪窓無不按其法之所宜有而伸其志之所欲為雖曰前規後隨而功實倍之南楚之成其始者奎章閣侍書學士内翰虞公記之而雪窓之成其終者未之有記於是其徒奉耆舊僧所述事状屬溍書而刻焉阿含經世尊説若能補理故寺是為二梵之福南楚虎嵓適嗣雪窓以晦機笑隱為師友相與紹隆祖道扶植教基期與國家億萬斯年永永無極是用假方便力示現有為不離世間法而入第一義豈止可資二梵福而巳雪窓之功倍於南楚而溍於虞公無能為後何以賛一辭哉姑序其嵗月而使來者有攷云爾承天寺重建大雄殿記呉寛蕭梁氏好佛其下化之一時佛寺江左為盛然尤莫盛於呉中若承天又呉中之特盛者相傳寺為衛尉卿陸僧瓉宅而捨以建者自梁以後廢輒興之至元至正間主僧南楚極力改作而其制之壯偉精巧絶矣金華黄文獻公實為記其事入國朝殆歴八十年當正統癸亥之十月寺一夕大火蕩然無存又明年適朝廷頒大藏經至僧綱司都綱永瑞時兼住持特建堂九間以尊奉之其後僧徒相視莫敢復措手者盖三十年於兹今住持道澤謂寺不可終廢也然功宜自大雄殿始乃謀建之盖承天固郡人之所瞻仰者也於時聞有是舉爭出錢粟來助其徒戒昌更刺指血書法華經誓成其事而助者益衆矣竟以成化甲午七月丙辰起功凡六年而功始完髙廣深濶一如舊制凡所像設亦無不備於是澤公領郡薦來受都綱之命乞予書之其言曰寺之功甚鉅未及其半吾當次第成之而未可必也幸先畀之文以記嗟夫大雄之建非奉佛也乎佛之道吾不能知然甞觀於其書務為宏博廣大之説故學其道者每務為宏博廣大之事亦惟好於上者極其䕶持而不拘以法禁化於下者致其崇奉而不惜乎財力此其事之所以成也今夫官府學校所以出政令而資風化是固有益於上下者或病其敝且陋而有所為焉費於公而罪戾至勞乎民而怨謗生繼之者視以為戒故有終其任不易一木増一瓦者此其事之所以廢也則澤公之為此舉固其才之長力之專以出乎其徒亦惟其為彼而不為此其費若勞雖不可以數計而卒能隨其用使致其才力以成乎所謂宏博廣大者而還郡中之舊觀也予故記之以示其後之人重修承天寺記陳繼寺之剏於梁天監初曰通𤣥唐曰廣徳通𤣥宋曰承天後曰能仁元曰承天能仁國朝曰承天歴嵗既深廢而復復而廢者絫矣至元間南楚説公主之繼以雪窓明公二公先後為大殿為穹閣為經鐘二樓及諸殿堂皆極壯麗而天下未有與之稱者也然未百年而剥陊傾敗者日甚其為之主漠然視之莫能葺者已越數輩長其教者恒慮不寧乃謀于衆曰東南大觀而振吾道以為衆之所歸惟在承天主席既虚勿得其人将何所托僉曰南印定公其可為南楚雪窓後者即舉以住之公淡然若無所為唯勤其道敕其行以善化人而已與之逰者薰其仁慈不為殘忍浸其寛裕而黜其隘陋茹其誠篤以謝浮薄跡其剛毅用變柔懦故人皆曰定公賢徳而足以翊吾之為善者也咸傾心向之公乃唱於衆曰吾欲使是寺之輪奐若初也將盡出其資以集工材其樂施占事者源源而至始葺大閣為佛萬數再葺經鐘二樓葺無量觀音二殿而新盤溝殿末理大殿為四天王於三門畫五十三㕘於兩廡凡諸貌像一皆飾之旛幢供具諸所宜有無一不備金碧耀日輝煌映發入而覩者恍然不知其為人境也其功盛哉然公之志未巳也往時南楚雪窓皆為宗門碩徳著聲江湖其欲繼事以雄土木之功猶稱不易况公一身而復新其舊者哉前有作者後無繼之其傳不逺公可謂有功於二公者矣可謂不私於所知者矣公溧陽人也姓李氏生六嵗聞長者誦佛書即忻忻喜恱父母以其有宿故乃命出家於邑之興化寺持規就度即若素習者十七逰京師止天界日接諸老緒論釋然開悟既而泝大江抵荆湘遍求佛祖陳迹盡謁有道以正其學久之超然而還止菴祥公與之語喜而謂曰子能為吾宗嗣矣公始出世於呉江普濟轉湖之天聖寺人皆歸之起廢為新其主承天能仁越十年言行如一日嗚呼公可謂傑然而不凡者歟余記其事述其行以刻於石俾有勸於後來者從其寺之耆舊衆所請也以書數抵北京丏予言者為之後者藏主瑹荆石也繼公之志以無替公之績是余之願也夫同皇甫冉登通𤣥閣李嘉祐髙閣朱闌不厭逰蒹葭白水繞長洲孤雲獨鳥川光暮萬井千山海氣秋清梵林中人轉靜夕陽城上角偏愁誰堪逺作秦呉别離恨歸心雙淚流通𤣥寺雙矮檜皮日休撲地枝迴是翠鈿碧絲籠細不成烟應如天竺難陀寺一對狻猊相枕眠和陸龜蒙可憐烟刺是青螺如到䨇林誤禮多更憶早秋登北固海門蒼翠出晴波承天閣楊維楨荆棘荒凉呉故宫梵王突兀畫圖中地連滄海何曽斷月墮青天不離空螮蝀挂簷秋易雨蒲牢吼屋夜還風越南羇客登臨倦尚賦囚山日月籠承天能仁禪寺在府治北甘節坊梁衛尉卿陸僧瓉捨宅建初名廣徳通𤣥寺宋改承天宣和中禁稱天聖皇王等字遂改能仁寺前有二土阜内有無量夀佛銅像及盤溝祠靈祐廟萬佛閣寺屢燬至元間僧恱南楚重建黄溍鄭元祐記至正末張士誠據以為宮尋復為寺僧綱司在焉國朝宣徳十年尚書周忱建賜經閣正統八年十月寺燬成化十年僧道澤戒昌重建贈無照上人住持定慧寺序祝允明聖朝定制凡釋流之在寰宇者在内有僧録以總之在外有僧綱僧㑹以莅之至於名山大川叢林廣刹物衆而徒多者則推擇衆僧之學識優裕才兼幹濟者以為住持之長俾嵗時朔望倡率其徒諷誦經典上以賛國家之隆禧下以補生民之疵癘無非因其所明之理而導之以當然之務順其所知之學而率之以事上之節此天下所以無棄人也上人文粹字無照蘇郡松陵人自幼慕尚釋氏正統間禮定慧寺僧􅀈公為師誨以離羣絶俗之法景泰初復禮右覺義堅公為宗而得眀心見性之傳由維那而識書記其見知於襌林推服於輩行久矣一日以同門僧戒璇将歸侍師於故里共舉無照以主持定慧住持之席躬來南京領僧録司文劄以往時秋官郎中張公節之以曩甞養疾定慧與無照有夙昔之交因其行也求大夫士作詩以贈來徴言弁諸首予惟贈僧之典一也然有贈之而可為一身之榮者有贈之而可為一世之榮者有贈之而可為萬世之榮者如唐宰相齊映喜僧流遇其人即有衣服之贈此一身之榮也京兆尹楊慿重佛教或置買居地以蔽僧徒此一世之榮也韓昌黎栁宗元擇僧之識達者而交之或贈以詩或贈以文至今光照簡䇿使人傳誦而不已此非萬世之榮者耶若予秋官郎中公嘗由翰林通籍太史氏此固今之文章巨擘也不惟自有所著以贈無照而又求大夫士之詩滿卷軸以華其行鏘鏘乎其音也炳炳乎其耀也彬彬乎其文也無照得此以歸於是過宰相京兆尹之恵矣豈不為萬世之榮者耶雖然東呉名郡也定慧古刹也昔杜陵思慕東南乃致重于若邪雲門之逰今予亦将老矣倘他日辭疾歸休道過蘇臺則青鞋布襪必當自定慧始慎勿如東林逺公以無酒辭淵眀使重足虎谿間也姑為序以贈長洲祝允眀夀寧萬嵗教寺裝佛之記釋普林至元六年庚辰夏初愚因南逰訪於吴城夀寧萬嵗寺住持豳谿講主喆公館留月餘一夕為愚而言曰行喆叨承宣政院委任來主是席有年矣惟以大殿中聖像嵗月浸逺彩繪剥落而塵埃翳積每升堂祝誦輒顧之而慚焉必欲重新装飭媿無餘力矣非誘化凈縁莫能成斯之勝事也方興是念即有東禪寺住持長老澤菴恩公起而言曰泥龕塑像乃住持三寳之依開化人天之先者也使人一瞻一禮俱獲其福而植善種也况世祖皇帝所設御講存焉一邦教化之重寄乎今有其僧𢎞其法且佛像若斯其何以開化蒙俗而啟人信心耶於是以其衣鉢之長易彼金朱之料命良工粧繪釋迦如來之像慶喜飲光妙徳普賢并二䕶神七尊之像煥然一新計所費楮幣七千五百貫莫不金碧輝煌丹青燦爛凡所以往來逰觀者皆肅然改觀而稱賛焉噫澤菴積財能捨而敏於樹福哲誠感慶焉自非道眼眀白神機廓徹孰能見義勇為而成斯之美邪經所云五百嵗之後有持戒修福者佛法為之不衰其澤菴之謂歟願為我記之毋他辭也三輪空寂乃為佛之行也所以一香一花皆為佛事况捨淨財莊嚴佛事乎故曰非莊嚴是名莊嚴其福徳不可思量茍以施受之相而著焉縱傾七寳如恒河沙數雖多亦奚以為故曰凡所有相皆是虚妄矧文諸石以記之乎然則使世之深積厚蓄不能拔一毛以恵人迨終其身而委於糞壤者知所以勸焉是可書也愚既與公有道義之故義不可違輒為記云太中大夫平江路捴管府達嚕噶齊兼管内勸農事額爾吉訥布哈篆額至元六年嵗在庚辰十月朔日記住山釋佛心普智雄辯大師行慧樹石慧林房記吴寛慧林房舊名菴在蘇城東南王司判巷元大徳庚子有吳十四公者捨其居以建而初主之者曰明慶也慶傳宗杰杰傳某珪珪傳某賢賢傳與齊齊傳永黙黙傳宏漸當國初有詔天下佛寺大可領其徒者餘悉撤而遷入之於是慧林入夀寧禪寺更以房名時洪武辛未也漸傳道舒既皆化去舒傳文靖靖傳智勤則嵗久而廬舍益敝矣乃成化己亥其師徒遂相與修葺之且謂慧林自併於此宜得文字使後人可考而知因數請於予惟昔孫吴國於江左蘇之有寺盖自此始至於蕭梁踵其故都好佛愈甚一時穹廬廣殿徧於國中今試詢其肇建之代無非赤烏天監而巳延及後世其君所好雖不及前代之盛然亦有興無廢至其徒又倣其制而致力於斯金碧丹雘往往而是而寺益盛矣皇明有天下政令一新乃以為過而裁抑之百餘年來頹垣壊礎間壟畮秩秩使人得畊種以為食者皆昔之所謂蘭若也京都不暇論凡今四方私創者著於律求一寺之肇建者不可得此固聖政所當紀者豈特使慧林後人攷其始遷嵗月而已漸偉然緇流中與先君友善予幼猶及識之舒能讀儒書靖與勤皆清介謹厚不妄交逰盖予家故居在東城下比嵗與吾弟原輝往理之道中數訪其廬久而益知其行可敬也勤有徒曰恵侃孫曰善秀皆能保其業者云次韵定慧欽長老見寄蘇軾蘇州定慧長老守欽使其徒卓契順來恵州問予安否且寄擬寒山十頌語有璨忍之通而詩無島可之寒吾甚嘉之為和八首左角看破楚南柯聞長滕鈎簾歸乳燕穴紙出癡蠅為鼠常留飯憐蛾不㸃燈﨑嶇真可笑我是小乘僧其二鐵橋本無柱石樓豈有門舞空五色羽吠雲千嵗根松花釀仙酒木客餽山飱我醉君且去陶云吾亦云其三羅浮髙萬仞下看扶桑卑黙坐朱明洞玉池自生肥從來性坦率醉語漏天機相逢莫相問我不記吾誰其四出入白骨觀大士甘露滅根塵各清靜心境兩竒絶真源未純熟習氣餘陋劣譬如己放鷹中夜時掣紲其五誰言窮巷士乃竊造化權所見皆我有安居受其全戲作一篇書千古發爭端儒墨豈相殺予初本無言其六閒居蓄百毒救彼跛與盲依山作陶穴掩此暴骨横區區效一溉豈能濟含生力惡不已出時哉汝非爭其七少壮欲及物老閒餘此心㣲生山海間坐受瘴霧侵可憐鄧道士攝衣問呻吟覆舟弔私渡斷橋費千金其八凈名毗邪中妙喜恒沙外初無往來相二土同一在云何定慧師尚欠行脚債請判維摩憑一到東坡界東坡極愛欽長老寒山十頌今不可考但存和作矣定慧院顒師為予竹下開嘯軒啼鴂催天眀喧喧相詆誚暗蛩泣夜永唧唧自相弔飲風蟬至潔長吟不改調食土蚓無腸亦自終夕叫鳶貪聲最鄙鵲喜意可料皆縁不平鳴慟哭等嬉笑阮生既踈狂孫子亦未妙道人開此軒清坐黙自照衝風振河海不能號無竅寂寂吾何言風來竹自嘯觀定慧寺東坡海棠詩皇甫信當年花發妬春紅今日虚無野寺中留得坡仙詩尚在令人千古挹清風送僧定佩住城東定慧寺吴寛久從𤣥墓山中隠又向湖州市裏行浮世此身皆可托應同圓澤語三生定慧禪寺在雙塔寺西初名西方院本雙塔之子院也天禧中賜今額始貳於雙塔宋僧卓契順常居此訪東坡於惠州者元季兵燬國朝洪武中僧景新恵澤先後重建與薛十二穆過夀寧精舍得歌字姚廣孝同是山中客尋幽入薜蘿草香凝蕙萼鳥韻識鶯歌暖日花隂少晴濤樹杪多不縁經嵗約那得此相過此詩當在前夀寜下重建寳光賢首講寺碑曽棨寳光寺在姑蘇長洲縣治之東北漢末鬱林太守陸績捨宅為之故至今寺門外有巨石曰鬱林石寺盖以此也吴赤烏時郡守請額於朝始賜名曰寳光仍命圓法師主之以為十方講刹歴兩晉六朝隋唐以來廢而復興隳而復振者盖嘗有之而寺之名迹固弗冺也迨元至正間佛殿兩廡三門講堂鐘樓經閣以洎衆屋靡不完具宏壯雄偉冠於一方可謂盛矣國朝洪武初開拓郡城始遷寺於跨塘橋西據齊婁二門之衝去舊址才數百步而近其後有詔并叢林於是境内諸寺悉歸於此方其時郡副都綱湛源圎法師寔居此以領教事乃以所授賢首一宗教親與四方學徒講説究竟克闡厥宗暇日與文儒縉紳之流倡和其間而寳光之勝遂赫然於勾吴之域矣永樂改元之初有楚蘭馨法師繼主於此将欲興造以復前代之規制而被召入京與修大典願勿之遂九年寺僧大禎大衍同心協力出其祖之遺資及傾巳帑仍資檀施庀材鳩工剏建法堂聿新衆屋甫及三載告訖工輪奐重新金碧昭輝真桑門之盛事東南之偉觀也今年冬楚蘭馨以讐校藏典留寓北京遂述僧之夲末偕中書舎人王和用來請予文記之惟佛氏之教入中土而四方禪林講刹星羅棊布不可勝數若求其如寳光之綿歴絫代上下千有餘年而愈逺愈盛者盖亦尠矣是雖佛氏之靈有以黙相隂祐於其間然亦豈非績之孝行素著而其流風遺韻藹然被於其鄉者有不能遂冺者歟是可書也因併書俾刻諸石庶後之人得其所考且系之以詩曰東南名郡粤為姑蘓秀氣所鍾湖山奥區巋彼寳光巍巍梵殿云昔陸績捨宅以建鬱林之石名髙穹窿伊績之遺凛其清風兵燹荐更有隆有替迨際天朝值兹盛世衆刹所歸蔚為叢林曰有湛源克振圎音賢首之宗益暢厥㫖其徒如雲見聞悉喜乞於楚蘭志拓前規承詔在公弗見於為繼此而興曰禎曰衍資帑克捐厥功以顯翼翼殿堂棟宇維新金碧煌煌有光璘霦暮鼓晨鐘幡幢杳靄如旃檀林若華藏海聖夀齊天佛道興隆勒石於斯以播無窮寳光講寺在城東北隅跨塘橋西夲鬱林太守陸績故宅宋紹熈中僧藴仁元至正間僧紹隆先後重建初寺在婁門内鬱林石在焉石今遷察院前國朝洪武中即寺為軍營遂廢其後普熏菴僧善識捨夲菴地改建於此學士曽棨記宿龍興寺綦毋濳香刹夜忘歸松青古殿扉燈明方丈室珠繫比丘衣白日傳心靜青蓮喻法㣲天花落不盡處處鳥銜飛次韻贈閒白雲趙孟頫聞説龍興寺多年未欵扉風林發松籟雨砌長苔衣殿古燈光定房深磬韻微秋風動歸興一錫向空飛同和虞集凌空一錫歸幾日到禪扉野橘隂垂户天花影上衣井牀春露凈檐鐸午風微三藏都看遍相思夢欲飛其二歴歴唐朝寺松闗㡬易扉花交珠寺網苔長石人衣秋水依空凈浮雲映日微白雲無所住此際亦歸飛寄白雲間龍興寺裏白雲房不到於今二十霜橘柚向來垂屋重松筠此日過人長千函秘寳心源淨百嵗長齋齒頰香若念尚書舊行履三生石上莫忘鄉龍興寺在呉縣治西今廢為公廨天恵賢首教寺記陳基呉門天惠賢首教寺郡沙門如山安公之所建也公世居松陵家夲士族父呉伯熈甫隠居奉佛母王氏崇信唯謹及公之生母感異夢爰在穉嵗性稟殊倫少長出則服膺世典入則篤意三乗父母察其不羣聴以出家博訪名師不計寒暑徧探秘義尤嗜華嚴理暢心融殆若天授聞讀大報恩寺篇而歎曰吾佛所說廣大悉備眷求其端實在孝敬於是食粗衣菲而心專於色養錙積寸絫而志存於報夲既由勤儉得致饒益則以其贏購地於郡城之東廣袤若干歩度材鳩工作庵以居日益月増擴而為寺經始於某年某月落成於某年某月門闥宏敞殿寝邃深講堂言言東西有序以至栖經之閣選佛之塲方丈之室與凡齋庖庫庾其法所宜有者靡不完備公於此身先戒律率徒閲藏經梵並宣襍華芬郁荘嚴殊勝士民具瞻前僉行宣政院事張公嘉乃休績為請於帝師寵錫令名俾為十方禮聘清凉疏主之嫡傳者開山演教既竣事尋以事之顛末徴文為記世言浮圖氏善以小致大以難致易盖用力勤者其功博刻意專者其效速矧其心懐頋復嗇已厚親肇開圓頓之門永表追逺之地迓續華嚴之奥學紹隆賢首之正宗且未始持簿走入民間資銖黍之助於人若安公者非用力勤而刻意專者乎為其徒而居其居者皆知以𢎞道報本為務因其所以成嗣而繕葺之則無上福田仰以衍無疆之丕祚俯以答罔極之私恩而呉門之有天恵天惠之宗賢首将與東南列刹競爽於無窮所謂功之博者日以興所謂效之速者日以固此盖公之志而予之所樂道也故為之書使勒貞石云至正十二年某月某日天惠賢首教寺未詳其所今姑録其文俟他日攷之元敕建大昭慶寺碑虞集大昭慶寺者在呉郡城中東北隅朝列大夫前同僉宣政院事僧阿濟喇之所建也阿濟喇蒙古齊蘓台氏哈喇哈之地至元二十四年世祖皇帝親巡朔方以之歸才十嵗爾成宗皇帝時皇姑魯大長公主遣侍輦真國師遂祝髮為僧從其大徒弟曰實喇卜丕勒以榮禄大夫宣政使行院江南公主又為請於成宗皇帝授濟寧僧録武宗皇帝又為之請授饒州路僧録皇慶元年仁宗以呉郡之良田増徽文懿福禎夀大長公主之湯沐命驛至其郡蠲免其賦入焉久之思報君師之徳買地築兹寺以泰定二年閏正月經始公主聞而喜之厚施俾造其寺天厯元年造成前為大門奉四天王像中為大殿奉三世佛觀世音文殊室利之像長夀兩石塔在殿前法堂方丈在殿後翼以兩廡東則伽藍祠神庫堂香積之厨在焉其西雲堂天台智者大師與諸祖之祠在焉買地租以贍衆備鐘磬旛盖之具次供佛事凡事之宜有者無不畢備明年正月以聞於上皇帝嘉之俾官於宣政出璽書䕶其寺御前遣使賫寳香至寺以慶其成至順元年皇帝賜大藏經五千餘卷皇后賜金買田以飯僧使月誦是經以祈祥益夀云三年五月奎章閣大學士中書右丞撤廸傳敕命臣著文刻石以示久逺臣集再拜稽首而對曰聖天子以仁恩厚徳覆幬天下山川草木衣被雨露咸遂生長凡有知覺孰不欲自獻報稱於萬一哉而四方無虞兵措不用勇者無所効其力年榖順成萬民樂業智者無所効其謀於是士大夫歌咏於朝農忭於野商恱於市休休焉重熙累洽而不自知也若臣僧阿濟喇者世為國人身奉梵教深知吾佛之力足以集福於國家垂賴於萬有是以既竭心力不吝財寳㡬嵗之間成此無上之勝因豈非報本者乎敢述賛以系之其辭曰皇帝建元天厯嵗吴郡大昭慶寺興僧徒幼授佛禁戒發此宏願不思議報國報師報佛恩以至皇后后之母煌煌梵宮徧宇内府財民工之所就此稱有縁何以故衣鉢之資積累成願力終始無限轉大作光明梵唄聚三世諸佛儼常住荘嚴相好紫金光文殊室利觀世音來救衆生悉就位四大天王威神力持地結界奉世尊大寳樓閣現空虚梵音法雨普宣布聖皇最勝現在佛念爾善果故垂憫具多寳經㣲妙法無量夀數所表見舟車象馬自逺致實諸天宫龍藏中聖后大慈寳月輪報毋劬勞廣法施供養僧寳令安稳常轉法輪無間斷是時宰臣在法㑹請表功徳示人天䕶聖䕶國䕶羣生回向賛嘆阿僧刦微臣奉勅媿凡劣得以文字為佛事願吾聖皇與佛同夀命福徳無盡藏翰林侍講學士通奉大夫知制誥同修國史臣虞集奉敕撰大昭慶寺旃檀閣記黄溍平江路大昭慶寺新建旃檀寳閣成住持妙辯𢎞教大師懐夀使來求文為記勒於兹石按狀寺始成天厯元年實朝列大夫前同僉宣政院事阿濟喇公所建規制宏偉隠然為吴中一巨刹至順三年奎章閣侍書學士虞公集奉㫖文其碑後十有七年為至正九年公復即大佛殿後度地以建兹閣而妥奉旃檀佛像於其上旁為文殊普賢兩菩薩像壁間圖繪萬佛及五臺山貝函寛大藏經循壁而列其下設普陀落伽山觀世音菩薩像並祠故榮禄大夫宣政院實喇卜丕勒實喇卜丕勒者所從受法之師也其右為公生祠左為公夫人童氏之祠閣凡楹四十有四以間計者三其崇五十有六尺修去崇一十二尺廣加其修一十六尺層榱步檐方櫺曲檻上下四圍悉稱其度髹彤金碧内外光明種種莊嚴殊特妙好庀事於十月甲寅以十一年三月竣事閣之西又建方丈三間其費一出於公官不知而民不與往來過者苐見闤闠萬井中飛紅湧翠突起天半瞻仰賛嘆怪未曽有而莫知其為役之殷也夫旃檀有像自雙林唱滅之後周流中土以示有為驗時盛衰而為去住歴代靈迹紀述莫殫迨我國家聖神撫運握金輪以御區宇與佛之化同一廣大以故其像今乃應祥現瑞於京城之大招提希有殊勝可徴不誣顧惟兹閣佛像亦因無旃檀之名者盖佛之具身徧滿一切三千大千世界在在處處莫不有佛非彼非此無去無來故閣之既成佛即在是閣之未建佛豈離兹而况佛夲一佛無有異象象既無異名何有殊此殊非愚俗之所能知而亦非世諦言語所得稱説若夫公之信力堅固一心觀佛誠以射法二施等無差别故助顯第一義而作是勝縁惟佛有言積土聚沙皆為佛事皆成佛道今木石之役窮極壯麗熾然建立如此其為功徳詎可思議是則不得不托諸字以傳無窮庸不辭而為之記至於寺之顛末及公之行業已具虞公之文者兹不復書夀别號南山族姓董氏以至正四年來住是寺云翰林侍講學士中奉大夫知制誥同修國史同知經筵事黄溍撰昭慶寺看芍藥王渙一半春光過牡丹又開芍藥遍禪闗久辜佳約違蓮社今續清懽到寳蘭垂露㡬團花面濕東風一陣燕泥寒酒邊何味呈竒供緑笋朱櫻正滿盤和文待詔懐昭慶寺之作王寵明光起草五雲邊猶憶同㕘雪竇禪花雨石牀聼説法竹林茶鼎愛談𤣥拂衣未許還廬社飛夢時能墮輞川借問玉皇香案吏何如兠率鍊形仙昭慶寺在城東北隅元至正間宣政院建僧懐夀開山虞集黄溍記今廢呉都文粹續集卷二十九
