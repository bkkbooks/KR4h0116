body:
  text: 吳都文粹續集卷四十七明錢榖撰雜文平江路達嚕噶齊西夏六十公紀績碑頌陳基今天子御極之十有七年為至正六年詔公卿輔弼之臣若曰朕將以天下之治責成守令爾尚各舉所知以稱朕意於是皆拜手稽首曰幸甚臣等不佞敢不慎擇其人以無負聖天子嘉惠元元之意乎四方萬國至於荒外守土之臣莫不各以其職宣布上恩而平江為都控帶楚越所部四州二縣地方千里海陸之産饒於古昔國家常以為奉地根本所繫實異他壤職師帥任保釐於此者尤難其選居久之有以西夏六十公子約之賢為言者宰相曰是故同知濠州有德於民者乎此長者可以復明詔矣即奏為平江路達嚕噶齊時至正九年也公方持江西部使者節命下即由豫章趣吳郡長民者方臨人以嚴而刀筆吏規規守文不知大體公因憮然嘆曰此風其可長子不戢將敗吾改之乃以旦日謁先聖先師飭學官增弟子員聘名師用月書季考之法程試之取中式者補郡曹吏尋飭學宫牆廣倉庾以儲廩粟買學宫南廢囿作櫺星門以正廟貌公餘政隙輒呼吏屬鴈行立從容為言修身理人之術出入經史上下古今亹亹不倦日以為常郡諸生化之爭自激昂以明經取進士髙第者至是彬彬焉公方務與民興利除害㑹有詔罷長生牛水深圍長蕩之屬省憲遣官與公循行其地而崑山嘉定瀕海事故之田病民者為尤甚公因自念使民安其田里而無愁歎之聲者二千石之事也今聖天子下寬大之詔茍不以斯時悉除民所疾苦後悔將焉及因疏其害力請而免之吳介居東南道路之咽喉有田者常賦之外又以餘苗供郡城與吳江平望水陸驛傳勞來之需公曰此非政之善也乃以嵗餘官糧變錢為子母月取其贏以次責郡曺吏生其費號曰祇待民大稱便海運梗於盜行者委公按兵昆山之劉家港公身先士卒戮力海事春夏兩漕皆以時達京師淮右寇竊發攻陷江東西郡縣浙右騷動省憲督吳郡募民大興築城之役周餘四十里費且巨萬然皆不仰之官屬方盛暑公不忍其重困語及且泣下時以身出入版築之間勞苦之海盜復犯崑山公募民為兵選官吏之家居者分守郡地時門之啓閉以偹非常初寇之入杭也行者徴富民引兵入援公曰蘇杭唇齒不應禍且及應之則民不堪命因發所募義兵五百人赴之未幾寇陷常繼湖烽燧漲空鉦鼓四起羽書告急相望資糧兵械什器之求絡繹道路人心恟恟公晝則關決趣辦供億紛紜夜則申嚴約束以死自誓民賴以無恐居久之朝廷除行者臣不逺數千里率䝉古偹禦吳郡已而省臣調他省江浙行中書因檄公兼制軍事公鞠躬夙夜與士卒同勞苦然不動聲色而賞罰號令視前十倍居民安業逺近稱之使者間奉詔募民輸粟佐江西軍視多寡補官有差列郡承風應募比至吳公懇懇為使者言吳民困於糶當春夏米價湧貴斗至錢若干緡小民艱食無賴方發官倉賑糶之實無以應募使者感公言遂以所餘告身還朝廷時論偉之先是𣙜酤官止收其稅後公私漁冒更取酒酤戶吏徒並思乘隙甚者至破民之産公議立罷之征止常稅而已公學醇識正性尚寬和聽政決獄務本經義而參之以章程秉志忠貞律身亷恕而將之以勤敏起官自諸生官二千石而退然身若不勝衣始公之下車也士仰其德久之吏服其能終也民安其業宰相奏公治行最東南詔嘉之特命增公秩復公位三年吳人室家相慶曰聖天子以公保乂我百姓三載告終引例當代復詔以公私我使吾入有父母出有司命俯仰六載夷險一節晏然不與鄰郡之民俱冒矢石殞鋒鏑膏血塗草野者聖天子之賜也盍刻石載德以昭示無極且公旦暮入參廊廟進升臺閣勳進位崇爵與德稱其大書特書屢書不一書者太史公之職也乃具狀授豫俾論著公治吳善政刻而頌之以無忘聖天子之賜公以成均上舍生釋褐授濠州同知調南平浦城二縣長轉南陽府同知富寧庫提舉尋改同知都漕運事由歸德知府拜監察御史又升江西廉訪使副除今職云頌曰明明天子子惠兆民孰宣上恩曰在守臣茫茫疆理廣禹舊蹟孰先農人布時黍稷濟濟在廷奉詔拜手慎肅乃僚旁求逺取九州立牧施及八荒各職方物時節來王眷兹吳㑹東南奧區厥土塗泥化為上腴豈伊人功勝於地力諄諄德音斯民之則孰將眀命往綏兹土抱其嬰孩授之父母宰相薦公天子曰宜彼誠長者朕用弗疑始而吳政逞以刑罰始而吳吏拘以文法公寬理之訓之經義大者賔興小者試吏詵詵多士更化翕然飾其儒宫以表化源公教既施民瘼斯究田疇漏胥驛犒何有公承寬詔上疏貸租使者來責委之吏胥海寇梗漕公威却之船粟億萬往實京師蠢爾妖寇蜂起蟻聚蔓延江南屠州陷府公成郡城載髙其雉公厲郡兵載奮其士吳城匪城公仁可憑吳兵匪兵公義可乘公哺我饑公拯吾溺去其蟊賊滋我稼穯羽檄交馳以急告公徴求調發斯萬不同公曰恤哉此皆王事敢不鞠躬夙興夜寐有卓治行上達九重天子曰都豫懋乃功有臣若斯宜在左右重憂吳人失賢太守詔增公秩詔復公位以公私吳實天子意公之為吏如漢龔黃公嬰其變彼適治康公之愛民如鄭國僑始不忍斯終安其教公留拊我公勿去我公不我遺我忍公舍公惠在人公勳在石天子用公視此成績海道都漕運萬戶府達嚕噶齊托音公紀績碑頌天下之本在京師京師所仰在海運海運所恃在舟楫舟楫之利所以濟不通然振古以來有天下者未有海道為渠轉漕東南億萬之粟灌注天府以偹粢盛祿廩軍旅之儲如今日之盛者也蓋世祖皇帝閎規大略所以為聖子神孫萬世無疆之計殆天授之非人力也一旦有司撫字乖方鯨波鼓怒襲吾糧道堅舟利楫倉黃失措鞠為灰燼於斯時也軍國大計茍非得人以濟之則祖宗七八十年振古所未有之利將有臨流浩嘆而已顧何益於事哉此海道都漕運萬戶府達嚕噶齊托音公所宜大書特書屢書不一書者也初海道之失利也聖天子圖新漕政而難其人廷議奏曰今樞密院斷事官臣托音倜儻喜事忠謹絶人讀書知古今達事變曩執法御史府讜論不回天下偉之臣等敢昧死請以漕事屬托音詔曰可時至正十一年二月也先是每兩漕事竣漕民率以漕隙偹器械舟敝必先期補製謹風信也自海道有變糧艘陷沒者參半㑹公下車申嚴約束且迫漕期衆皆凛凛不知所為公乃下令俾買吳楚商船往來江湖之願售者并日兼工益小為大且戒曰事貴神速慮多決少兵家所忌此漕事吾以軍法治之敢有不用命者乎兩漕賴之率皆以時達直沽公用事精勇類如此上大悅詔賜二尊酒副之束帛公曰此特事之權爾非經久利也易曰通其變使民不倦今漕民告病舟楫不戒危道也變而通之其在斯乎乃移文平江嘉興湖州松江諸路府選民力之勝任者補充漕戶是時鯨波告急新漕之民利涉無虞因樂為之用而軍國大計所謂萬世無疆者克復舊常褒勸之禮視前有加而公之事集矣公雖任專海道然茍有以惠生民利社稷者知無不為去嵗秋吳民阻饑公發漕帑糴粟以賑之今年春陽山愚民竊發縱火剽掠鼓行趨郡西門公身先有司從數騎出萬死不顧一生殺獲甚衆居民安堵省憲聞之皆遣使來賀十五年五月朔日詔拜公為江浙行中書參知政事總制軍民保釐東吳仍督漕事寵賚優渥昭懋績也漕民因有作而言曰公糴粟賑民民誦之以詩公殄賊安民民刻之以石公重興漕政恢復海道制權宜如裴耀卿謀經久如劉晏處身清潔仕不廢學如韓滉唐有三人倚為鄼侯皆以漕運致位宰相公今之鄼侯也三人之長公實兼之而頌聲不作非曠典歟且公居漕臺則功在海運位執政則志存藩省異日登台輔秉機要則又將以德加天下區區之頌於公何有哉雖然無言不酬無德不報詩之善經也乃礱石徴文論著公漕政頌之公字明善世為䝉古某部人頌曰昔秦挽粟漕運乃興一石之利百斛費并漢唐沿之陸運水行負擔操舟乘湍跨陵其一或穿褒斜或歷底柱或鑿三門或役婦女百險備更萬夫疾首庸錢千計得不盈釜其二大哉皇元天闢漕渠匪陸以阻勿川以紆于廓靈海括坤之區噓吸百源卑以自居其三維皇道之濟險以德海若駿奔馮夷戮力掖我靈􅀈贊我文鷁一波不興萬里斯息其四直沽之口析木之津糧艘㑹同伐鼓奫奫六軍騰歡萬姓交欣飽我糗糧樂此富殷其五大略宏規善建不拔詒謀無疆振古莫越孰揚鯨波百怪並發其六燔我樓櫓梗我糧道出沒濤風犯我城堡彼方雷吼此寧電掃孰乖拊循致此俶擾其七既劫之舟復寇之粟上闕粢盛下虧廩祿軍無見糧民食半菽憂貽當寧議諏秉軸其八事有非常得人斯濟孰實堪之惟托音氏昔居諌垣抗言不諱使長漕臺庶展才智其九君命既加公責斯厚金符虎節銀章龜綬秩長萬夫勢崇列守公辰在公公退在酉其十公行雷動公止山立公令一申公事畢集以治兵漕以權濟急勇輸軍儲往實京邑其十一帝命偉之寵賜有加公曰斯權經久則那法貴變通戶别等差損上益下斥寡就多其十二漕民核實舟楫利完春饋夏餉風往浪旋轉粟如山弗危以顛佽飛在後陽侯在前其十三昔焉效逆今則助順威德所加載以明信威德伊何不驕不吝明信伊何克亷克慎其十四天子曰嘉事立功成受以執政升諸外庭拜命分曺督餉治兵公文且武公允且平率我曺事衛我蒼生其十五公今在外保釐吳土邑有長城民有父母公行居中進位台輔室有棟梁穀有甘雨其十六邑傳輿頌野播民謡或聞鄉校或采芻蕘式歌功德嘉歎賢勞爰勒貞珉永繼風騷其十七送張州尹序常熟言子游氏之鄉也子遊當春秋之季列國爭衡而其為武城宰獨尊信孔子之言弦歌禮樂以教之及漢興收秦民於百戰之餘而相國曺參獨師事蓋公用其清淨之說以治齊而齊大治夫清淨之說與君子之道不同然馴而致之亦足以勝殘去殺與民休戚則夫學子游之學仕子游之鄉而所以迓續愛人之休烈於變易使之淳風顧不益簡且易乎然百戰之鋒或不戢於秦漢爭衡之勢或不殺於列國於斯時也欲治之以清淨之化俾致治于隆古而不先教之以禮樂乎則杼柚其空瘡痍未復故今日之務莫要於教民而其為用則莫艱於拯民茍非仁足以周撫字知足以遏彊禦才足以綜繁劇亷足以律頑貪而又將之以老成彊之以精力如保定張侯庸道者亦烏足以守北門之管鑰水陸之咽喉卵翼生民股肱藩省也哉今日用侯與侯之為今日用殆非徇其名而已蓋將有以收其實也吾聞之十室之邑必有忠信常熟為吳大州縉紳之徒豈無忠信非公事不至尹之如淡臺滅明者乎斯行也吾知其不待蓋公而州治矣申公有云為治不在多言顧力行何如耳侯尚勉乎哉送虞秀才序故宋太師虞雍公以雄姿偉略佐宋中興出入將相垂二十年其經國大業之著於章疏忠貞氣節之形於奏對太史氏所録蓋班班焉有志之士聞其風者猶足以興起而况覩其全書者乎其書舊刻蜀中已而燬於兵四世孫通判寶慶府君將復刻之湖南弗果五世孫參政當國初尤篤意於此㑹故人眉州史孝祥守興化聞黃伯固家實有之求之不能得至六世孫學士遭逢盛際復以文章致位通顯其侍書奎章閣時嘗屬閩校官謝中物色之中至閩適閩武官有購得之者將資以見學士未幾學士歸田里尋捐館舍自是書之存亡無復以為意者已與豫友者曰堪字勝伯於公為八世孫一介布衣困窶無聊自勝伯以上居吳吳子弟與勝伯儕輩者往往厭棄筆硯不屑事父兄書自負以班仲叔者無慮十六七否則亦竊自緣飾為公孫子不成其敝猶足以舞文巧詆與鄉里少年爭長雄勝伯之計顧不出此獨折節以紹隆家學經紀遺書為已任間聞松江俞子中為吳理官時得其書於魯人賈景莊氏將親往求之斯行也天其或者未喪於斯文乎吾聞之君子之澤五世而斬勝伯去公八世矣斯文也猶將賴勝伯以弗墜韓愈氏有言莫為之後雖盛弗傳若勝伯所謂善為人後者非耶於其行吳之能言者爭為詩以相之屬豫序之送張同知序張君德常由吳縣長調同知嘉定州事將行或曰德常為布衣時躬耕陽羡里中讀書事親足以卒嵗蓋自以為一世之髙士矣及辟丞吳縣尋由丞升尹出則居官字民入則與子弟侍老先生起居欣欣如也久之咸使民化服而縣因日以理由是治行為郡稱首使者循行州邑而德常遂以最官居上考蓋至此而德常雖欲復以布衣髙一世不可得矣及調官海上或曰州視縣雖已崇然同知為二職縣視州雖益卑然尹為長吏尹之職固專矣然自辰及酉弊弊焉率以事𨽻大府雖饑渴不暇飲食者若干年僅得以最考稱於時由是言之為尹孰與佐州為二職亦較然明矣夫鞠躬州縣與偃蹇布衣出處固大不侔矣然使事親讀書無或慊於心又庸知造物者非所以玉成德常也哉又曰夫祿所貴乎逮養者以其能推以及民也德常為縣治行卓然可稱其殆知所推乎自興兵以來芻糧器械水陸戰攻之具取給於州者不一而足而奸吏並緣為市又貿焉日夜侵牟朘剝乎其間田里之民噢咻呻吟而卒未知所休息者由上之人不知所以推之之道也德常既知推之於縣矣則夫舉而措之於州譬之醫者之用藥取其已驗之方而試之則病未有痿而不起傴而不信者也德常勉乎哉吾恐同知之席不暇暖而有司將不得以尋繩尺較嵗月於德常矣豫與德常善故於其行以或者之言告之然不以頌而以規者蓋知之深所以望之厚也大明吳縣令鄺公遺愛之碑祝允明日月容光天無吝照而局於躔者有限江河潤物人皆仰沐而䝉其福者不忘安上治民實存良牧至於安之深而三績必陟治之久而百里難淹於是恩以陟而始周澤由去而逾覺上之去下之思皆天也非人之所能為也今夫地望莫重於江南臣工莫艱於令長故曰鞭蒲者罷投巫者酷推而究之在在束濕也而况吳之為聚也巍巖巨浸財賦區藪士豪商雄月旦紛午異時為之者惟跋㚄之患𢎞治癸丑天子䇿士於庭得任丘鄺公璠字廷瑞明年吏部以吳縣缺令聞天子曰鄺其可公至曰是惟國家扶馮又特雄緊非堅其操立而宏其範模者不可我知為之者矣蓋公天授英絶才力豪挺明有以洞閫奧智有以斡樞鈐勇有以服彊禦果有以樹事功而又本之以慤慎居之以莊靖籌焉而無弗獲擬焉而無弗中興焉而無弗成簠簋修潔其持躬也廉廢食忘寢其程力也勤裒多益寡其科賦也平均畨時使其力役也準左吐右握其禮才也篤豫明奪公其聼訟也神飭禮舉義不可具指始學宫多缺觀乃引闢正門購拓隅隧移廨植表昉造射圃於邑治則載新門舍祠表尤詳於囹圄之間嚴愼周完囚免非命逺近杠梁鼎立修葺以數十計而西成渡水最巨疏川滌瀦不一而普安歸涇之復最便他如社學倉儲之建運河浮橋之設壇壝祠宇之飾洞庭諸山耗稅之永蠲者歲六千三百石有竒凡制使被朝命協有司集衆思以事事者往往公之禆之為多仕優退食又刻樓氏耕織益以治生日用曰便民圖纂與吳越春秋金石新編養䝉大訓忠孝詩歌流布之或研精吟述音致深切詞華淵雅延鄒召枚賡載連牘於是桑稼條登絃歌響騰民人育而魚鱉若奸盜息而鼠雀稀八年於兹六事交乂今歲壬戌公朝於京師天子曰邑固壯不足以羈吾良惟徽土弗若乏二佐守汝其往哉公乃拜命以行既往而邑之僚屬士庶懷戀迫切不能己巳判簿俞君秉姜君亮幕史蘇君信吏李鏜吳孝糧塘里老王縉徐瑛沈進陳震等千二百人思紀遺愛樹之風聲僉議既協委筆於僕凡公先後建置邦之尊達如少宰吳公等紀勒豐赫懸諸不刋矣惟古之論政孔子曰獲乎上有道周公曰平易近民民必歸之聖人亦若是耳異乎今之談者或一道焉突梯脂韋模稜我三尺以從事曰所以獲乎上也虐㷀畏髙自欺於一朝之革面曰吾民已歸矣其然豈然吾未敢信蓋所謂獲與歸者振古難之而今倍焉古難獨以已今難兼以人已可力人不可力是以曰倍然君子亦曰已而已矣奚人之問矧所謂巳者天之理也天之所定孰得而遷之故聖人法天命運天機於此拔擢而崇進之其來未可涯涘而因以知公之得於上下者由其合於聖言所以久而徴去而思其效不於他而於此故曰天也非人也嘻其懋哉粵觀古之豪傑或列循吏或標文苑飛華汗竹千載可師今公之善固繁約而求之則所以主之者循也所以行之者文也兼彼此而貫昔今吳士與民何幸親遭而穠被之肆不量荒簡登之琬琰云爾烏乎翦石鑱金永口於碑衆有誠思我無僞詞𢎞治十五年秋七月吉旦立石送長洲邢令君詩序黃梅邢公出宰敝邑政明而通化久而富教方深朝天有期民等攀踐嘗假諸詞誦耆民王錡更什數篇并獻行槖頌美不傷於繁復申感無嫌於猥鄙敢復序列焉公之舍我赤子而入朝廷公理在彼則還之者宜私願在我則留之者得將何慰吾儕之情哉潤物之雨匪專一區公在廷陛間調中酌外澄湛聖澤滲浹上下將吾儕終被盥沐孰曰違願侯其升矣煙霄未涯悠悠衆思具如章句太守曹侯十詠詩序楊循吉今之郡比古諸侯國揆厥治要則必以移風為大然而民不易令令必以身率故從政者鮮克由於是焉其惟正己者為能出令而移民之風風移俗美政化以成宜頌之不能已歟有行之者我郡守曹公是已公初以監察御史來知郡事下車之日合郡肅清得綏柔化暴之道然公之所為嘉惠兹土者不寧惟是蓋蘇為江南郡甲民物蕃庶歲賦踰三百萬襲承流風尚鬼好奢昧喪葬之正理習博戲之鄙事其他蠧壞雅俗者又非一而足公深惡之以為為國治郡當澄源培根不宜使百姓重困乃先斥其一二大者而以毁淫祠節喪費絶賭博禁燒香為首號令一出民相戒弗敢纎毫犯既又為蘇人有燒尸之慘則營大冢六區環城而列俾葬其中又盡髮女尼而廬之逐娼優而去之由是人知向方養生送死靡不遵道易澆為淳邪鄙悉去噫此所謂正人君子而能移民之風其功甚大而一本乎躬行之德者也於是少宰吳公首唱一詩以咏毁祠之事而邑之狀元毛君編修沈君吳君陳君進士都僉事憲張公胥謂公美政尚多不可遺則皆次第述作若節喪費禁博遊建冢屏尼逐娼者詳矣或曰公嘗作興學校獨非績乎廉正率下獨非美乎纍致豐年獨非德乎繼而作者郎中黃君鄉進士浦君解元唐君又三人合而書之凡十篇而後公之事偹洋洋乎何其盛也傳曰君子之德風又曰其身正不令而行公實有焉蓋柄也者風化所由以上下者也獨惟我公為能用之以美吳風弗惟其末惟其本不務其小務其大已而果臻實效古道用復此今之稱善治者所以不能及歟夫功德盛則歌頌興公之於蘇誠心愛民有父母之道明理道俗有師範之宜納饑於飽食約蕩於真素推薄於敦厚仁隆義篤不可殫述則其功其德垂於無窮亦蔑以加矣由是而詩歌之作編既成豫以郡人請書首簡以告太史氏夫孰能禦之送二守和侯考績詩序郡别駕之職所以佐牧伯宣化理昔晉太保實陟斯任以基三公君子樂之吾蘇在江南號稱雄邦邦君而下屬於二侯二以贊治莫難於今蓋由我府主廣東林公之賢也惟山西和侯以名進士兩宰劇邑用績擢升是官始至而暗然既而翕然及今而赫然侯連署州縣皆以廉介有為馳聲於時其平居衣袍蔬食誦古人書自娛而已聲利之說不惟不留於耳且不萌於心及其涖事輒如山不移於時我公方以治行為南諸侯冠揆侯之道允合不戾故議則協謀則同事則濟用是以靖我邦人而二於公也無難矣歲𢎞治甲子官三年將起報政於天官我公於是率諸大夫暨郡官為詩以播之夫凡政之報也上官長寮輒以其績書於册將用是為殿最他日考功第其能陟其官以侯言之其最宜然乃公猶以公牘之褒未足以盡意故又著之詩歌焉蓋古者列國陳詩以備采録觀民風則今詩之作其本是歟侯居官不懈持操甚髙及是政成而往其將去是而即夫顯融也亦不逺矣詩不徒作也昔棫朴之詩以得人為周室頌於斯有焉因公之命敢書以為序送史縣侯考績序維吳大邑冠冕南州握銅符而令兹者厥惟艱哉況乎百里之任在今尤重黃甲於焉歷試烏府由兹簡拔豈不以親民體要大化首先者也君左翊英材中都雋望爰釋鵷班之朝來操牛刀之割自臨敝土頌聲載途以信感人不尚朝三之術用簡御物遂興畫一之謡凛兮其潔已恂兮其下士綽兮其寬徑兮其不可犯故得四境修六事治書考惟最語無遺褒允矣哉愷悌之不負人也華舲既駕彩鷁將飛望五雲以張帆端一笏而思對若禹門過而神鯨化若丹藥就而金鼎開在此行也㵼酒在巵何言可復亦聊以補相臺之缺酬花縣之勞焉嗟我吳人豈不縶白駒於今朝固將公霖雨於天下也維時仲夏麥風清淑冠蓋路祖賤子序詩送姜太守改任寧波序王鏊姜侯恆俯初守河南上疏曰臣母老矣願乞江浙間一郡自效且以便臣之私不報㑹述職至京復上曰臣母老矣願乞近郡以便養時寧波缺守詔以畀之於是朝之士夫莫不侈上之仁嘉侯之孝喜得侍其太夫人寧波喜得賢守而河南之人乃獨惜其去也於是寧波之仕於朝者求豫言為贈噫守令之難也頃豫還南歷數十郡縣入其疆其六事舉者蓋少也獨得三四人焉耳三四人外蓋有環數城而不聞善政者何其難也三四人者其政赫然有聞刑獄減賦稅集斯已矣其誠心撫字如古之循吏蓋無有也合郡之所利一人以為難焉憚而不行者有矣合郡之所害一人以為難焉憚而不去者有矣故曰如古之循吏蓋無有也又況先王之世所以治之教之者哉姜侯純孝人也廉平豈弟固巳飫於河南其知寧波也無亦自是而推之乎使一郡之老者無失其為老也幼者無失其為幼也是所謂循吏也乎是孝之大者矣孟子曰老吾老以及人之老幼吾幼以及人之幼請以是贈送劉吳縣考績序蔡羽崑長之墳衍太倉常熟之瀉鹵其稅三倍於吳而吳之境亦三倍於諸邑以其有名山大水也北起吳市南盡歸烏東內三江西薄荆溪湖山相去恆數百里六鄰邑之業農不謀工工不謀賈而吳之業作不齊島居而陸處風土阻越奸胥猾吏得䝉其上豪傑之黨得陵其下六鄰之亡人得匿其中四裔不法之徒得冒突而相冦擊故令得其人則湖山之間樂非其人則湖山之間憂吳非易為者也正德丙寅春吉水劉公來為吳令適郡有崇明之警修戎器選丁壯供餱糧恆若救水火然而烽火之候一日數至為令者內聽其民外禦其侮日中揮汗張燈而不遑寧如是數月乃已丁卯戊辰之嵗時政乖謬貪暴之徒橫索於上非意之變朝不謀夕吳之難為非有甚於逺年也劉公以進士有名首授大邑老才夙學練達之器故能乘時奮發嬰其芒創鎮之以靜處其艱難治之以本下車未遑首敦教化旌廉節寬民於農桑之間講其賢能以勵其頑鈍不激不沮不為竒新而三年之間翕然稱治由是吏不敢挾其刀筆胥不敢紊其科條豪强勸而為義以輔其上而慈其下九流之人各順其道逃亡之息悉為赤子湖山之間盜賊屏息桴鼓不起吳民之樂乃過疇昔而六鄰之中咸來則化矣由是觀之非吳之難得其人之難也公方考滿於部於其行為之序送大參徐公序衒新竒以示譽矯設施以竦衆可得於一時不可得於久逺順流守常無所斟酌可以得博大之名不可成博大之化斯二者非先王之道也先王之道寬而不慢簡而不漏不厲以肅不巧以精始若不快人意終樂且利居之若無能卒成逺大孔子曰無欲速無見小利老子曰其政悶悶其民醇醇是得道者也江西大參永康徐公守蘇五年而擢河南參政假左參治蘇又逾年而下江西之命其刺蘇也六年有畸徐公不新不竒不疾於前不怠於後不巧於始不弊於終布之優優為之紆紆但見學校化其教田里安其令刑無煩暴賦無苛急下無迫切之情上無廢弛之政而公雞鳴聽政張燈而不輟勵精圖治不自滿假其心若一日也夫不事新竒矯激合先王之寬不務博大之名勤勵不息合先王之嚴持是道行之六年厥化大成夫豈盡出於天資哉由公以尚書起家學有端委未仕為名士既仕為名臣自其嘗課諸生而觀之經義之精理學之淵泛濫磅礴莫得其際其度逺其識髙其取舍公要之不外乎一誠夫負公之誠以濟厥學於以臨政未有不合於先王之道者也夫士之命固懸於天亦有得於人者如羽之不肖人之所棄也而公録之不置豈意其有璞中之物耶詩曰采葑采菲無以下體人棄我取公之情可見矣兹將去舊治展大藩賢愚之徒不知所為羽也職當贈言敢托吾邦之慶荷於公者序以獻公用為他邦慶送大參胡公序治劇者身殉案牘不遑旰食而已廉者無所取而已惠者不罰而已三者舉其一人以為難若泰安胡公之治蘇異於是夫政沸於庭持之不遑寧御之不遑食常情也公嬰之平平撫之閒閒不必不意倫次後先米鹽無勞考教行焉案牘無侵賦咏間焉視治劇奚若四郊所興戶口所輸交務所㑹泉布日溢於政堂公視之蔑如知其上供知其出入知其居留乃吏不敢入羡餘之計躬自菲薄以化厥屬視廉者奚若發奸摘伏以破凶憸嚴刑大罰以御寇盜於常民有犯笞不見血法流於下食其利而忘其功視惠者奚若故頌之者無間於四方也烏乎是可以幸致哉亦惟心地才術而已矣夫心不虛則公不至愛不遍矣求廉與惠得乎才不全則用不周政不暢矣求治劇得乎本之以心地輔之以才術故文章德業並光於時也然皖不足盡移於蘇也蘇不足盡移於藩也他日藩不足盡將安歸乎夫心地包天下者也功業其緒餘耳詩曰仲山甫之德柔嘉維則又曰衮職有闕仲山甫補之夫仲山甫有出將入相之望故詩人致意之深也公既效於南國將顯猷於東藩德望遂揚於中外矣於是起自藩宣用秉鈞盡展公之底藴亦不日事也豫拭目焉送邑侯楊子入覲詩引古閩楊子治吳之三年嘉靖乙酉冬將朝京師諸國子在南雍者請為歌其行或曰楊侯於今何如人也羽曰以新以竒非所以觀侯觀侯者取其可久無敗而已夫民詐則怨結而風偷逞則彊兼而弱亡不貴貴則爵輕不賢賢則道喪不恤衣冠則亷恥不立凡兹皆上之人導之也江以南務新竒立異政者不少恐非遺之以長厚之風長久之道也無意無必順俗而治持平守正大小咸得始之以誠終之以誠楊子一人而巳聞牧民之道平易為先如我侯古人中求之可也衆曰如子言遂各賦如左送天水胡公序王寵序曰自秦郡縣天下而有郡縣吏秦吏大抵皆酷也漢良吏為盛班固氏傳循酷而吏道偹矣豫讀循吏傳考論其世未嘗不喟然嘆也蓋鈎奸摘伏取威樹聲赫赫乎若揭日月而行者世所稱良也至若風學敦禮植本培化使民回心而向道漢吏亦無幾焉夫以循名者猶然而況其下乎我皇明受命溥將疆理萬國循吏如林然窘於期㑹書牒者繁焉故聖人作而化窒禮樂衰而風微薦紳先生所扼腕也嘉靖癸未吾師天水胡公自𤾂守徙吳吳啓於太伯春秋時有季札子遊輩興故其民以廉讓文學相髙猶有先王風也然瀕海下濕土浮而民惰卒難帖服亦其地然也公下車葺泰伯之宫崇子遊之祀廣厲學宫躬帥諸生習射鄉冠祭之禮飭匏絲管柷金玉之器磬折盤辟示以揖讓執經講解與相問難酬答褒其異者降為主客之儀不期月而吳之風泱泱矣夫吳號難治以金穀溢騰賓傳狼籍吏𨽻舞法謗刺叢興也而教化獨闕焉豈非降本抑末顛倒無當哉公超然逺覽獨追古之人而與之上下摹畫奮以泰伯子遊為必可師而進我吳於三代之列故化易行而功則倍信道不惑之驗彰明也使吏天下郡縣者皆如吏吳之吏王道成矣乃夫廉以逺利明以蔽獄詳以理賦嚴以督奸儉以節費恤以柔民皆炳然為天下稱首而求所以綱維鼓運回斡轉易則維古之道也故略而弗著焉乃丁亥之秋聖天子擢公為山東左參政吳民丁壯號哭老人兒啼曰公去我乎民將安歸於是其門人王寵識公為政之大者以序其行以為他日傳循良者告也贈長洲馬丞序王鏊古聖王國天下列之土而專治於侯伯長至秦始郡縣之後世繼繼不之改亦勢使然也然以下承上莫極於縣蓋由部省郡以至縣而縣之任則繁焉故邑之巨者必多其官官皆賢相與協治事庶能集否則多弗集也長洲為南輔近地民齒財賦甲諸縣號稱難治宜陽馬君思誠以計偕循選銓曺來丞於是縣淳謹朴懋力於事事居官且久祿入薄其貧猶韋布時雖資鋈充仞左右君不一動心故能始終以廉稱凡佐肆參令令皆賢之縣賴以益治行部使者知其操守檄署他縣事者三所往輒成治每代歸縣他縣民多愛戴不忍舍信乎能廉則公公則明明則民無所屈抑而宜其慕之之若是也君丞於此地幾二考於民愈親於家愈貧而廉聲愈揚其名實固相副矣官階之登為日不久苐其民之欲其留尤甚於欲其陟則君之滯於下僚方且自樂固非他官暫來倐去升沈不固視縣若傳舍然於其民之治與否無暇復謀者比矣噫官有貴賤其為委任則一苟責塞焉則賢矣果何貴賤之有今君如以一日視官以終身視縣隨所遷轉望治而不望擢則長洲治矣他邑治矣嘉靖二年嵗次癸未季冬吉旦贈馬丞署事崑山回任序顧鼎臣立賢無方官人以世二者並列於經傳凡以辨美惡而存訓戒固也自後世觀之勳名節義之士多出於世家舊族而編廬􅡦𨽻之子孫雖或發身科第以取顯仕未幾多以賄敗者何流風餘韻無所從來而聞見者小也如前二說豈可遽為定論也哉在先王舉錯至公至明自在權度存焉耳嘉靖壬午崑尹尹君以考績去上官擇可攝縣事者曰必得亷能吏乃以屬長洲縣丞馬君令置所事事以往君移治數月得代去崑之士大夫耆老吏民罔弗愛敬傾慕焉交謁豫文贈之豫素知君名君來時豫適以展掃南歸目擊一時治效矧彰善吾職也遂樂為之序君體幹魁偉資性敦朴庶幾古之所謂悃愊無華者且持已公而繩下嚴故賦政用刑譴訛振弊雖或弗能堪然皆心服無後言屬飄風甚雨為烖壞民田廬巡撫李公命遍歷四境視狀君撿核精里胥無敢因緣為奸者既而蠲租振窮之惠漸被弗替君之力也國初科貢二途並列庶官無有軒輊自後人情向薄法意寖乖科日重而貢日輕士不偶於場屋積日需次貢禮部入胄監待選吏部且十餘年始沾一命雖有軒揭之才莫能自奮因而頽墮者衆矣君固嘗困頓於是今觀其所立豈下於科目士哉本既正而末從之俾職百司登大寮何往而不可哉蓋君河南宜陽故族厥祖諱旭者景泰中起家任內丘知縣滿九載民騰章籲留遂得增秩再任又滿三考齒逾七十纍疏乞休以去進退有禮如此其牧民持身之道可以槩見子孫業儒不衰婦或以守節顯家世相承傳君之所聞見豈區區寒賤鄙野所可擬哉然則立賢官人之法可泥於古訓而不論其世哉夫丞二職也攝事借乘也而獲上孚下如此他日為令長治專任久聲績所就寧知不肖其乃祖哉於乎凡今之牧民者人人如馬君則民不窮民不窮則賦役有終禮義可興而天下治矣嘉靖癸未秋九月既望日賜進士及第奉直大夫左春坊左諭德兼翰林院侍讀同修國史經筵日講官崑山顧鼎臣序嘉定等處萬戶郝侯政績記黃溍昔成周寓軍政於鄉遂兵與民一後世析而二之為將帥者往往知有兵而不知有民善乎荀卿子之論曰兵要在於附民而已為將帥而不知所以恤民乎若平江十字路萬戶郝侯蓋知兵之要而得先王軍政之遺意者也初豫在金華聞侯奉省檄巡鹽浙東所過無秋毫之擾心已志之及仕於朝往來吳下見士大夫咸言郝侯賢今年春官於儒司嘉定州父老陳銘鉞等以侯政績請記於石豫既知侯久重以耆老請誼不得辭因諏其詳則曰嘉定為吳之要地襟帶海江每歲萬戶府分官出鎮茍非撫馭有方則士譁卒囂適以病吾民耳今郝侯之來紀律嚴賞罰信凡麾下士不以一毫撓吾民海隅晏安奸寇屏跡遇歲旱潦捐俸祿為祈禱費遍禜羣祀齊戒篤䖍雨暘屢應歲既豐則創分府築閲武場皆出資倡始民懷惠者樂相助初未嘗以役勞民也不寧惟是元統二年朝廷徴兵討廣西寇至元四年討漳寇師行多抄掠每過吳侯出郊勞諭稔其長曰出師以靖亂也而首為亂可乎且師出以律令已失律後何以戰吾既以告若若不聽則當從軍法其長惕息戒其下毋犯侯令民安堵如故後省檄徴吳郡兵徂漳侯慮其將發必剽奪或乘以報怨下令趣具軍資器械夜分啓行平旦民始知軍已發莫不感悅時處州沿海翼軍陳慶等戍汀之上杭以餉不給四十餘日亡去吳戍卒賈世兒亦在行總兵官麗之死刑侯言於行省此等本無叛志苐由主將不恤故懼餒死求茍活耳若當以死懼失士心行省韙其議陳慶等得不死者八十三人他翼之亡命者亦由是得免至若建安樂堂以居軍士老疾者雖官與藥物常不給侯每出俸祿以濟其乏其惠於卒伍大率類此侯聞望彰著行省每有訓練按視必檄侯以往嘗屢至浙東福建諸道數軍實察鹽禁惠施威布所部州縣鹽場莫不以侯之政績上聞運司憲臺帥府行省交章稱薦他如廣東帥府湖北憲司聞侯令名亦皆薦舉而侯退然不敢當性端謹好古嗜學淹貫典籍凡賢士大夫必交交則竭誠盡禮終始若一家居延接賓客鼓琴賦詩泊如也昔侯之曾祖元帥公嘗從太祖皇帝定河南祖襄靖公平江南贈效忠宣力功臣正奉大夫江南行省參知政事父明威公踵持武節服勞王家侯以屢世勛舊子弟而務學若醇儒為政若循吏馭兵若古名將無一毫貴官習以侯之賢若此矧吾州之民又沐侯澤茍不紀諸石則不能見吾戴慕之情且無以勸來者豫聞父老言因嘆曰兵民之判久矣為將帥而急於恤民雖古之善知兵者何以加此然古之名將有愛卒伍而驕士大夫有愛禮君子而日鞭撻健兒後皆不能無弊今侯於卒伍既懷以恩而又能好賢下士不倦是又賢於古人者矣至於成其事業惟其所從來則雖先猷祖訓有足取法而其好古嗜學之功亦不可誣也昔晉文公謀元帥趙衰曰卻縠可以說禮樂而敦詩書也孫權之雄材大略而自云孤嘗讀書大有所益及吕䝉奉權教始就學魯肅過潯陽輒稱其才略非吳下比則侯之德業又獨非好古嗜學之功歟侯名天麟世居宣德自元帥公定河南因家宛丘豫既為之序其事如左乃為之銘其銘曰海陬之邦控延大江飈驚濤奔籍兵以防桓桓萬夫闞如虓虎匪帥之良孰靖其旅猗歟郝侯孔惠孔仁匪惟馭兵實綏吾民我有水旱惟侯之惻是禱是禜保我稼穯嵗時豐穰海壖樂康廏馬不譁叢矢在房乃作大府其庭其植我出我資匪藉民力民曰宜哉侯豈我需我懷侯惠曷不相諸侯燕賔士淵淵伐鼓有瑟有琴籩豆攸叙邦人來觀為侯歡呼豈弟君子胡不樂胥昔爾祖父曰維元勳功載盟府裕於後人曽孫孝恭克紹其猷匪惟世美實豫民休天子明聖宜褒爾績維藩維宣以惠四國赫赫厥聲宜公宜卿百祿是膺子孫繩繩我匪俁思人則具知德音不忘永觀厥辭奉政大夫江浙等處儒學提舉黃溍記送陳忠厚秀才還姑蘇序鄒浩通甫少孤舉進士不偶貧甚無以養其母慨然取家藏地理書學焉且歷求一時名人以為師莫不妙盡其長而機圓智獨又自得其象數之外操以涉世其術遂顯今年秋為先考終大事留數十日語豫曰葬有吉凶失得之驗捷於影響甚可畏不戒不愼差若毫釐則禍起泉下而集其家是誰之過歟欲自脫於天刑難矣或者視權勢金帛何似而忘其心殆謂天可誣也我方隂自積德詎敢忽頃有學者憐其勤示其大端已而省其私猶有忘情不知所慎懼將以喜怒行吾術弗與也余聽其言而觀其行蓋君子人也孟子曰君子之所以異於人者以其存心也以仁存心異於人逺矣函人之初設心為利去矢心幾何哉特以術驅故卒以人自異況君子乎通甫葬以千計然其年未老其遊未倦其行術未艾也隂德之積自不可以為量數又況學於其門者必皆心同之人乎今江淮閩浙間由指授以顯者著録踰四十人而踵繼者未止人人以通甫心行術於四方其所業積又豈可以為量數乎通甫有子方十歲知好書成誦日數百言天報將在此乎惟勉旃以待送文溫州序唐寅寅稚冠之歲跌放不檢約衡山文璧與寅齒相儔又同井閈然端懿自持尚好不同外相方圓而實有塤篪之美璧家君太僕先生時以過勤居鄉一聞寅縱失輒痛切督訓不為少假寅故戒栗彊恕日請益座隅幸得逺不齒之流然後先生復贊拔譽揚略不置口先後於邦閭耉老於有司無不極至若引跛鱉䇿駑騟然是先生於後進也盡心焉耳矣且夫周文之聖積纍仁義詩人咏之曰得四臣而天下附孔子之教册籍紀焉曰有顔子季路閔曽遊夏之徒而道益彰今蓬巷之士頌先王守圈模茹藿冠素羮葵飯脫粟逶迤寬博其異於鼓刀負販之人若芥髮耳不先有所引擢後有所推戴輔翼其何能自致於青雲之上傳言曰朋友不信不獲乎上矣此後輩之所以必仰賴也其為前輩者道有所論授相與優息而無獨知無徒之嘆而後輩則髙山在瞻有所標的是上下相成也今之後輩被服驕麗伸眉髙論旁若無忌不復識有前輩之尊與益也是豈長者絶之哉世有後進之彥以寅觀則知前輩之用心待人也矣今先生出刺溫以病謝不報赴郡有期既當為詩以餞敢又書此以叙寅之所德先生而無可為報者蔡侯平海盜叙方鳯昔人論弭盜之方惟濵海難為功攻之則風檣奔駛彼利我鈍招而殺之則信爽舍之則威損故陸宣公真文忠公皆以海盜弭於未發者為上功甚至欲擇守令之善武者久其官其曰茍非逆折其萌芽終恐難圖於滋蔓論則得矣然亦難矣哉吾蘇惟嘉定瀕海海盜出沒為患前此若劉通施天泰足一搖數郡震擾雖終底擒滅而橫罹鋒鏑靡費驚苦其賦虐之禍亦慘矣嗣其惡者曰崇禮亦施姓隂蓄無賴至五千人巨艘五百號橫行水陸民居商舶酷肆劫奪資貨山積佯建田屋雜良民中以自蓋然出入必以兵衛動輒與王法為抗人視之若虎翼然雖官府亦不敢發養成其惡者殆三十年矣今年夏河南蔡侯以名進士來尹兹邑部使者喜曰巨蠧可剔矣侯承命惟謹旦夜蹤跡虛實者凡三月務求不負上官之知而齒頰不一露雖左右信用之人莫知也崇禮於是益縱肆法外挾惡少百餘謀汙鄰婦鄰婦度勢莫支紿許之娛以酒食而侯已廉得其迹密遣人火其舟攣其黨費十夫之力而渠魁就縳烏乎何其神哉人之所甚難而侯獨甚易之侯豈真所謂善武者歟鳯不暇逺引姑即二盜者評之擒通時鳯在垂髫萬方不獲不得已招以不死既而磔於市擒泰時其費不資官蓄告罄擁老弱之頸以赤盜創於乎二盜起於倉卒成於數百烏合而其害至此若崇禮者逞數十年之積而加以數千悍勇之氣一鼓而發江淮亡命應呼紛至東南之害十倍二盜於是乎侯之功之大當享廟食不但上官奬借之榮而已也鄉士大夫司空蒲川龔公侍御沈君輩咸樂侯之成功且以為地方慶也方率耆老持禮幣再拜稽首以頌侯於庭委鳯為文以張其盛若夫厚學校剗吏奸息浮訟篤僚誼揃無益之費薄征斂之法皆侯之政之善之可書者雖然侯以清才重器志期逺大怡然不以一事之遇自侈他日髙名偉績當與宣公文忠並稱蓋區區之私所以望於侯者如此幸相與勉之嘉靖癸未十月望日後崑山方鳯撰崇明勦海寇紀事碑楊循吉明受天命主中國百四十年於兹豐亨豫大寇易蘖芽我孝宗皇帝既靖宇內修武功遂誅蠻夷之干紀者皆以次削平矣惟是東南嘯聚尚稽天刑則兹不能無申焉蓋蘇內地也不當有盜賊有屬邑曰崇明實居海中法制不及恆驕為患往時金璠劉通輩是已以其渠魁既殱餘或寬而不誅故至於今兹尚弗克靖乃𢎞治十六年春賊首施天佩鈕東山焚殺讐家拒官兵據半洋沙為寇亂未幾天佩來歸瘐死明年弟天奉乘潮到太倉西門燒船劫兵既而亦俱與東山來歸先帝用撫臣魏公紳奏赦其死竄諸遐荒其兄天傑當遣不至復與鈕東山煽集寇海上一時有名字附和者其魁以十數曰沈嶽秦綵黃霑尹克文皆用父子兄弟羽翼劫奪四出甚至掠運艘官糧肆無忌憚事聞廷降璽書切責職吏跡捕甚急不能得正德元年正月鈕東山逃歸賊黨滋盛作軍器號衣出入車馬張蓋鳴金鼓為令以舟縱橫其徒至千人恣意殺掠汙良人子女不可勝數且謀陷其邑及上海城池衛所州縣匿不敢報郡守林侯世逺獨曰是不加勦絶復何俟急馳白於巡撫都御史艾公璞巡按御史曽公大有巡江都御史張公昊備言宜決討狀會議常州皆如議今上皇帝方嗣大寶圖纂先志討不恭命奏上詔曰可艾張曽三公乃駐吳中調四府五衛軍壯得二萬人募船得五百艘置軍火器械為件一十四萬六千五百有奇以屬浙江屯田僉事髙公江備倭都指揮王君憲使督之曰港汊要害其各分布以守毌令賊得便又使備其逺境防奔突我師既集艾公曰姑諭之使再往皆不報賊彌猖獗作聲勢自庇大肆焚掠自嘉定常熟靖江江隂諸縣無不繹騷久之施天常始來歸願縛羣盜首領自贖而東山天傑果以嶽霑等來獻皆羈之民舍再令州同知周明往招餘黨被留不遣且邀吾歸其人頃之乃知出二降賊所為艾公由是怒馳檄取明以還而下天常等於獄決議進討㑹上赦亦至於是三公皆詣太倉禡師且申妄殺之禁是年六月六日髙公王君帥師出海分三路薄其沙翌日登岸搗其巢穴賊衆奔潰藏匿大縱兵追勦遍南北大洋至於三爿四爿歷時十日賊設間阻我師師遂西旋艾公及二公議以賊必隨至益犒士卒督其復進至乃獲施安輩殱東山前後撫致七百六十二名口俘獲四百二十七名顆燒獲船四十九隻獲凶械四千一百四十三件金銀錢珠銅錫綺布衣服麥米等物五萬九千六百一十二斤兩錢文件石起七月十日全師凱歸我無傷焉明日告成於學燕賫有差奏捷上悅賜敕褒奬仍令上諸臣功狀冬十一月賊黨於閶門外誅徙其妻子逺地是役也經略處置大抵皆出艾公而曽公綱紀其成其供億則林侯無事不任宣勞為多常守楊和二侯次之而以武進知縣余君濓參謀軍事同知丁君哲指揮使張君斂以計誘賊皆有功蓋始事至賊平甫百日詔改半洋沙為平洋沙添設巡檢司一及禁沙船毌得過上江著為令僉曰昔髙皇帝龍飛時吾蘇實先中原歸附民柔脆奉法令輸稅受事惟恐後不幸海濵襲為狂愚境土因是汙衊其君子羞之非我羣公侯君相與主張協贊底是大功則天子必將大加兵於吾邦民且震恐死無地矣由是言之克清大憝以寧其人國家利賴生民受福焉可誣也乃請刻石為歌詩以垂無窮且示其無良者永為鑒戒毋再罹憲而以有功官屬列之碑隂其辭曰聖朝建國威制中域豈惟版民要荒咸賓孝考臨朝征伐四申懵懵海人顧狂而狺匪無斧鉞憫其來馴卒赦不誅輕典是因帝德廣大彼冥何知負險怙終自同島夷海波滔天操艫若馳謂莫豫迫暴掠以嬉絳襖裸下霜創差差有忤必刈不遺貨資村落遁逃避命流離列邑威震訛言曰疑艾公曰嗟惟是當伐聞於天子我師乃發魚魚我師未至城下旗揚鈴鳴有舟悉駕指授方略先塞港汊飛檄往來靡息晝夜賊懼自暌執黨獻功先聲既致陽許斯從載招其餘載緩其攻尚念黎元𠞰不過窮如何變生以勤艾公公曰爾師文武將吏皇有明詔寇在必刈凡豫同事咸協無異爾其慎殺毌及非戾六月既禡甲寅師行臨送於滸撾鼓揚舲雜以棹謳悠悠斾旌賊則有廬或浮海居海居既除水陸並趨遂搜大洋鬼膠其舟去不可得卒為我漁紛紜自沈十死一俘始誰為謀俾賊相縛賊有故新賊有首屬其羣既渙厥魁可服七月丁亥振旅凱作公及曽公在洋胥樂衎衎燕飲海霧清廓始時議征衆皆謂難彼狃海途我不習船浪簸舟欹戰於何安悉主撫致式養其奸迄乃奏功人寂無言凡兹設施後事先謀裕以籠之迭用剛柔含容奮發蕩平靡留執事始終二公林侯二公林侯詔以狀上賞不遺細悉預旌奬赫赫元功艾公是長刻石摛文永播遺響江淮平亂碑王鏊明受天命君萬邦九聖相傳海㴠天覆休養生息百五十年絶漠遐荒罔不率服而近甸小醜蠢兹勿靖皇上赫怒興師越二年始討平之先是正德初有逆豎盜弄朝祊以淫刑苛政毒海內海內靡然發動逆竪伏誅羣盜遂作五年霸州人劉六與劉七齊彥明相扇起合他盜楊虎橫行齊魯趙魏徐沛間所至張旗蓋鳴金鼓屠城破邑發庾潰獄殺戮燔燒奸淫慘毒僵尸被野千里蕭然甚者竊名號執王臣截漕舸攻宗藩上初命惠安伯張偉都御史馬中錫討之師久無功乃逮偉中錫還而兵部左侍郎陸公完毅然以討賊自任乃命兼都御史節制諸軍且調沿邉驍將健卒以行公以六年八月至涿州中外洶洶言六七彥明將以其衆入寇宜還師以衛京師公曰吾受命至此有進死無退生乃率兵直前遇賊於霸州之平口遣平副總泰郭逰擊永與戰克之又進戰破賊於阜城於景州而楊虎復擁衆北來衆懼不敵適馮副參禎以麾下至與永泰合擊於景州之宋門店大破之虎僅以身免時天下承平久民不見兵革一旦盜起所在或潰或死或迎服羣不逞且蜂起從之勢不可制及是王師屢捷從賊者始悔且懼公因開以生路立招降幟於軍前其衆多散去者又命郡縣各繕城濬池清野以俟賊至無所掠楊虎既敗獨帥其衆而南九月六七彥明寇漕州諸將合擊大敗之於曺之裴子岩是役也賊之鋭卒略盡幾不能軍上復遣中使至督諸軍與戰於湯隂又大敗之永又追敗之於穆陵關劉副總暉又大敗之於滕縣七年賊率其餘衆至下邳淮上總漕張都御史縉遣兵禦之賊破北門有四酋迭進輒斃之乃逡巡遁去參將李瑾又邀擊敗之賊奔登萊公率諸軍追之遇於水淺坡殺其衆殆盡六七彥明獨挾驍猛三百餘騎逸去北奔霸州突過臨清又奔湖南又奔湖廣劉六隨溺水死七與彥明奪船東下犯鎮江江隂栖海之狼山忽泝江上犯南京安慶公復被璽書兼程馳至衆謂賊且北去公曰賊技窮矣必且復南以窺吳㑹乃分兵駐京口張總漕洎王都憲緽俞都憲諌時副總源各分兵守要害賊果復下據狼山公率兵至江隂㑹天大風賊船糜碎遣諸將襲之賊奔據山顛矢石雨下暉引所部力戰暉與任璽戰山北永戰山南咸載盾跽行奪其險賊墜岩下死者無算七乘小舟將遁溺海死彥明為宣府游兵所殺楊虎之南下也官軍扼之河上虎渡河官軍亂石擊之溺焉至是羣盜蕩平中外乂安議者咸曰盜橫南北所至創殘罪稔惡盈肆皇天震怒動威以殄滅之豫以為惟天佑民惟人順天惟節制公殫衷許國運籌料敵指付必戡諸大夫戮力抒忠勢成犄角諸將士摧鋒摩壘賈勇先登相與成此膚功蓋天人協應之效也是役也大戰十二小戰數十斬首一萬五千五百有竒降散者不可勝紀七月甲午班師誅餘賊於市劫脅者悉縱歸之捷聞自節制而下褒賞進爵有差詔建江海祠於狼山相與伐石紀功以示永久詞曰赫赫皇明坐朝萬方克享於天錫祚無疆運鍾百六奸豎亂朝實生厲階逺近綘騷盜賊挺起千萬為羣血人呀呀虎噬蛇吞城市丘墟邑里蕩空有事招徠日奏罔功帝曰來完汝惟豫度其往視師總吾戎務桓桓虎臣雄邉健兒授爾節鉞惟爾指揮公至㑹師誓清大憝受命徂征無或撓退王師並奮孰吾敢遏曽是螳臂而當車轍載扼其吭載斬其枿盜始奔駭顛踣南北飛走計窮海山之嶔狐妖憑丘鹿鋌走隂天厭盜虐海作颶風我師乘之遂殱羣凶王路載夷黔黎相慶江淮克全惟兹天幸始盜之萌豎也當國迄盜誅夷授任必式治亂之萌昭然不忒鐫詞海崖昭勳懲亂後誰效尤視此京觀吳都文粹續集卷四十七
