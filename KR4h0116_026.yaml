body:
  text: 呉都文粹續集卷二十六明錢榖撰題畫題畫二絶鄭允端㸃㸃青山翠欲流短蓑漁子坐扁舟荒村五月凉如水茅屋扶疎艸樹秋青松望極是桃花去去仙源路不賖便好解衣衝水過洞中午飯熟胡麻題畫誰寫江南景風烟萬里寛金銀開佛寺紫翠出林巒逺客馳行役幽人賦考槃蒼茫無限意撫卷為盤桓太湖以下俱竒逰圖詩馮大受東南天盡五湖開萬㸃蒼山鏡裏迴縹緲峰頭明月上懸知一望是蓬萊姑蘇臺吳宫花栁是荒丘臺下惟聞麋鹿遊芳艸青青烟水緑春風總入闔閭愁虎丘寂寂荒臺樹色昬吳王宫闕杳無存月明劍氣還來往留得干將化後魂天池此地湖山是倒懸翻於山上滙清泉更分華嶽峰頭色一朶峰如太乙蓮天平青山繚繞白雲圍似笏千峰擁翠微仙仗一經岩岫過飛霞片片逐人歸靈巖一山青靄日溶溶翠桞隨烟漾碧空紅雨落殘春畫暖舊花重發館娃宫𤣥墓湖外青山湖上看振衣時覺兩眸寛攜笻徧拾金閶景𤣥墓山頭亦大觀支硎蒼崖翠幹碧參差樹色嵐光兩鬬竒只有生公壇下石至今猶似㸃頭時虞山拂水岩頭錦作屏瑶壇朱敞日初明朝看爽氣千峰紫黄鶴飛來翠羽輕題施雅山所藏宋漢國端孝大長公主所題桂花便面手巻後有序虞堪宋端孝公主理宗女也其所自題桂花詩便面以碧紗為襯所折桂淡然與月輝映自是宫製絶俗可知而東廬王野叟名琦字徳玉所識有云在武林時與故舊劉仲鼎邂逅茶話因及楊中齋駙馬事出此製以見遺乃是吾冡婦之母之筆也藏於篋笥三十六年而外孫施宜之其先有兄弟並登科者有雙桂堂尚在堂扁與扇合誠可以再為後來者䜟故装成巻筆其顛末併製桂香詞於後以予焉且曰貴主題此時猶未出閣天上清芬世間何有則知前輩寳重之如此至隆山平先生賦之有滿身風露不知寒之句尤極悽惋使人一讀無限感慨今雅山處士亦既老矣所寳外家遺物又幾五十年自謂雖獲夜光每棄弗顧而獨䕶此巻如新不忍去手時時出以示人諷詠不輟其風韻又可知矣間屬堪賦之惟前代閨門舊物固是罕得然相傳之久殆百有餘年而不出兩家當時遺老又能詳記其事使更千百載足以起人之興懐於無窮若雅山之寳此其意亦有在乎於是追次其韻反而歸之宜之為雅山處士字云一一方諸鏡樣團金壺霑墨豈無端萬年枝上天香盡遺恨青天碧海寒其二誰復風流鬬鳯團天人丰骨想毫端楚吟翻泣銅仙淚共灑秋風玉井寒其三天水雙雙桂影團喜符佳䜟上眉端外家風采今猶在長嘯空山鶴髮寒麗人行題玉山所藏周昉畫楊維楨楊白花飛愁殺人美人如華不勝春錦韉䭾起雙鳳縷黄門挾飛五花雲白石雷霆夾城道樂逰園裏春正好就中小姨最嬌强雌雄雙飛觀者惱瑤池鬬草碧雲移艸青艸歇春不知黄裙有恨隨春水椒房青蠅何處起君不見翠羽颼颼悵一空東方蝃蝀纒紫宫蝃蝀一作螮蝀題玉山所藏唐人呈馬圖張翥天育驥子初長成廄官引轡將進呈頭如戍削兩耳聳青絲絡腦屹不動君王一顧生光輝黃帕巳蓋銀鞍歸當時四十餘萬匹此馬權竒當第一曹將軍畫老有神龍眠居士尤得真兩家翰墨今巳矣今之筆跡無乃似黃門宿衛森羽儀遺事可按開元時古來良馬多泛駕振鬛長鳴思御者君不見材士不可羈寜可呈身如此馬題趙千里金碧山水玉山所藏張天英天上白雲滿空谷樹下三間兩間屋𤣥晏先生不出門自檢殘書手中讀醉翁斜着紫綸巾過水呼童御黃犢犢背之樂不可言王孫寫入氷綃幅君不見戎車萬戰場秦皇失其鹿笑殺當時園綺翁白頭去揖隆凖公子昻蘭梅為玉山題張翥佩纕零落墨香存瑤瑟空彈夜月魂一自江南芳草歇風流誰繼楚王孫為玉山題子昻墨竹竹裏疎花的的開凍香和雪冷蒼苔天寒日暮無人見只有雙峰特地來子昻畫馬君不見漢家將軍求善馬戰骨縱橫血流野歸來作歌薦宗廟寜悲鬼哭宛城下何如聖代徳所懷入獻磊落皆龍媒右牽者誰鬈且偲萬里知自流沙來眼光照鏡蹄腕促老奚識性仍善牧時廵之外逰幸稀飽秣原頭春苜蓿吳興學士藝絶倫妙處不減曹將軍只今有馬無此筆誰與寫之傳世人為君甘作駑駘羣題玉山所藏魏國夫人趙管墨竹夫人自寫坡詩於後自京師寄於仲光龍香暖脱青螺靨麝劑光凝生漆㸃玉臺近曉畫眉殘紫硯新磨𤣥染一枝戯寫碧嬋娟冷雨欲飛粘濕烟雲忩霧閣春窈窕恍如移置苕溪邊苕溪緜緜秋水隔逺眼京塵渺相憶㣲綃一㸃氷雪生弱蕙幽蘭少顔色書中曽有衛夫人畫裏如何崇徳君林下丰神原散朗尚從墨妙見天真題管夫人竹與玉山同賦于立烟消湘月明露下湘波冷翛然林下風吹折琅玕影同題顧悳輝鳯毛輕染碧池春寫作琅玕紙上真試看腕中百斛力前身應是李夫人題玉山錢舜舉畫五栁莊張天英飛泉屋後銀河懸孤松屋上蒼龍眠四山無數白雲出好柳五樹當門前葛巾丈人歩其下悠然别有山中天内人吹篴詞為顧仲瑛題盛子昭畫楊維楨天寳年來教春坊紫雲製曲吹寜王美人何處竊九漏耳譜亦解傳伊凉鵾絃轉斷黃金軸獨據胡床㺯橫玉冶情忽逐野鶯飛十指紅蠶迷起伏御溝水暖浴鵁鶄天地久無征戰聲芙蓉楊栁自搖落豈識黃雲邊塞情西樓今夜月色午内人思仙望河鼓白日蕭條鳳不來井梧風動神烏語内人剖𤓰詞為顧仲瑛題盛子昭畫轆轤索褪垂金井水殿風來晚花靜美人睡起袒蟬紗照見臂釵紅肉影荔子漿酸搖左車阿母新進朱陵𤓰侍女手浴井花冷水冰去聲金盤擎掌窊鸞刀未破圓玉斗斗破紅冰驚落手玉郎渴甚故相嘲可忍食殘團月凹李息齋竹為玉山題張翥竹上千年恨未消湘臯滿踞正迢迢冷烟疎雨無窮恨欲為騷魂賦大招予舊為顧長卿作梅竹圖明日其弟仲瑛於姚君子章席上索題遂成口號柯九思晴雪噤梅蕋春風裊竹枝美人應失笑記得捲簾時題柯敬仲為玉山山人畫竹楊維楨五雲閣吏天上還玉山草堂人正閒自將賜筆寫龍影落日風動江南山題從子倫寫生芍藥於玉山柯九思九十春光事巳非飜堦紅藥尚天機畫工㸃染成生色説與東君作待歸桃源春曉圖為玉山題張翥流水空山幾度春白雲隔斷世間塵桃花一放漁舟入不是秦人是晉人題玉山所藏淵明歸來圖吳克恭陶令昔去官當世豈知賢杖藜柴桑里汎舟即斜川春風五柳隂秋日秫盈田嵗釀杯中物佳辰奉賔筵觴來各有趣斟酌罄交歡為生豈易老藉此一欣然咄哉羲皇人既逺身名全題東山圖玉山同賦于立不起謝安石其如天下何向來逰賞地芳草落花多同題顧悳輝江左風流第一人東山歌舞日紛紜當時不為蒼生起司馬山河總白雲題玉山所藏畫水仙巻書違秘書後袁華窈窕楚皋女委蛇佩陸離臨風倚翠袖椉月靡雲旗含嚬黙延佇怊悵失佳期渉江采璚芳將以慰所思題玉山所藏水仙畫達兼善翠羽靈旗候洛津凌波㣲歩韈生塵可憐金屋重門掩只有陳王夢阿甄題呉山顧玉山一笑三生圖釋來復虎頭應是再來人畫史丹青貌未真一笑溪山如識我三生風月異前身空傳華表歸遼鶴誰向昆明問刼塵吳下艸堂今寂寞獨憐花鳥泣餘春題琵琶仕女圖註云以下二作亦題玉山所藏宗本先江水東流月滿船江風吹怨入氷絃何如銀燭秋堂夜一曲新聲值萬錢題墨竹可人家住篔簹谷明月清風十萬竿一自玉山相見後滿庭清影夢髙寒題吳性存所藏趙仲穆竹枝雙蝶圖與玉山同賦張翥滿叢鮮碧露團香院落春紅過野芳蛺蝶一生花裏活飛來還戀竹風凉同題顧徳輝閣道春風度湘簾夜月初多情雙蛺蝶也解逐羊車呉克明知嘉定為題馬圖吳寛吳卿别我呉門去手把橫圖索題句開圖見馬如見人逸氣稜稜八尺身圉人騎度燕河水萬里長風生兩耳歸來飽餤玉山禾吳門草青奈爾何題孔昭畫吳寛盧鴻艸堂今有無吳中峕見謝翁圖松風澗水書聲合林下髙人不可呼題子善所藏畫張翥江閣空明宿雨殘青山如洗隔簾看神仙不記天台路萬壑千峰暮色寒題盧侯所藏畫册張著露滴天香酒力㣲風迴秋影動秋衣夜深盡醉霓裳曲忘却驂鸞月裏歸右幽人賞桂露濕銀床海月低氷絃寫怨小忩西西鄰止有臨川客莫作秋風烏夜啼右琴月雙清花暝深宫畫漏遲隔花羅襪歩委蛇春愁如海誰相問得似黃鸝盡語時右春畫聞鶯題黃筌畫竹鶴圖并序吕誠黃筌畫竹鶴圖巳入能品余鶴亭舊有此圖心甚惜之散落他室今數十年矣忽扵鄉友處復見之喜嘆無巳然尤物自為脛翼而能傲兀人世不與嵗月同化亦一竒哉因賦此重為覽古者一慨云蜀人黃筌寫竹鶴數百年前一竒作𤣥裳縞衣意閒暇老氣崢嶸重林壑挺挺玉立雙琅玕枝葉扶疎鐵鈎絡憶昔鶴亭有此本鳥散烟銷久𡨕寞今朝忽見喜絶倒老目摩挲殊不惡千年令盛安在哉舊物都非况城郭世間此圖亦希有重襲尤宜置縑槖髙堂夜懸明月中應有仙音下寥廓為開元道士題倪雲林畫徐賁聞説仙翁去採真山中草木幾回春開元堂上重來客猶是當年問道人姚少師所藏八駿圖曽棨周家八馬如飛電夙昔傳聞今始見鋭耳雙分秋竹批拳毛一片桃花旋肉騣疊聳髙崔嵬權竒知此真龍媒霜蹄試踏層氷裂駿尾欲掉長飈迴瑤池宴罷歸來早絡月羈金照京鎬紫鞚飛旹逐落花雕鞍解處眠芳艸由來駿骨健且馴㺯影驕嘶不動塵有時渴飲天津水五色照見波粼粼圉官騎來難久駐飲向春流最深處珠銜寳勒不敢疎直恐飛騰化龍去古來善畫韋與韓此畫豈同凡馬看人間造次不可得苜蓿秋深烟雨寒題乳犬圖為金公鼎賦沈潛花下茸茸細草中羣眠未許識雌雄待看長大平原上一獵秋風狡空題沈孟淵所藏王叔明墨竹劉溥雲漢昭回舞鳳雛海波清淺露珊瑚清風萬古吹不盡錦瑟無聲彈鷓鴣題劉主事廷美所藏墨竹二首愛㸔亭亭碧玉光畫船來往水雲鄊幽林到處森如束只此長梢保雪霜繡幄連雲䕶牡丹玉杯誰問碧琅玕露香飄盡檀心老獨占清風䕶嵗寒終南進士行為劉廷美賦長空糊雲夜風起不分成羣跳狂鬼倒提三尺黃河氷血洒蓮花舞秋水飛螢負火明月羞櫟窠影黒啼鵂鶹緑袍烏帽逞行事磔腦刳腸天亦愁中有巨妖誅未得盍駕飈輪驅霹靂如何袖手便忘機回首東方又生白王舜耕山水為繆行人檏題倪濓烟嵐萬壑吐復吞雨過汛漲溪流渾埜橋山店夜初曉香靄不辨東西村嘉樹蒼蒼迷近逺白雲滚滚銀濤捲苔封古道闃無人未放曦輪上孫巘舜耕王翁八十餘眼前能㸔細字書醉揮老筆元氣俱風景似是圖匡廬多君長才擅専對好山覽遍芙蓉翠看畫駪駪憶曉行詩成正攬皇華轡為李貞伯題朱寅仲小畫呉寛春半扁舟過太湖洞庭著雨翠糢糊惟應舊日同逰者愛此朱郎水墨圖題黃應龍藏巨然廬山圖文徴明筠陽文學倦官職十年歸來四壁立探囊大笑得片紙不啻瓊球加什襲攜來示我俾品評謂是名僧巨然筆渙跡漓踪那辨真白閒雙印還堪識古篆依稀贑州字先宋流傳非一日要知源委出珍藏未論誰何定名跡墨渝紙弊神自存老筆嶙皴况超逸岡巒迤邐䝉宻樹浦溆縈紆帶村室盤盤細路繞山椒斜引魚梁更東出途窮山盡得幽居穹宫傑構臨清渠仙邪佛邪定何處彷彿勝境如匡廬還從文學問何如大笑謂我言非虚自言逺逰真不俗曽見廬山真面目五老之峰披白袍玉虹萬丈峕飛瀑某邱某壑皆舊逰展巻晴忩眼猶熟秖今老倦到無由對此時時作卧逰慙余裹足不出户聞君此語心悠悠髙懷咫尺巳千里眼中殊覺欠扁舟郭忠恕雪霽江行圖附跋程敏政蜀山曉起雪大晴蜀江早有商船行前縴百丈後催舵欲動不動難為情兩舷相依若兄弟雪後風清江水平古來川貨甲天下舟中百物皆充盈一舟繫尾大扵瓦蕩漾不敢相先爭有時遇險即分載主者自解操竒贏長年三老各司職翹首疑聞呼嘯聲紛紛逺樹霧中出㸃㸃玉峰天外明櫂郎呼凍相偶語隔岸恐是夷陵城大灘小灘難悉數自出兩川今幾程嗟哉逺道亦良苦鹽井有戒何相輕披圖一見肌上慄凜然朔氣生簷楹摩挲久之意乃定何人方寸勞經營素縑半幅不盈尺云是東都狂郭生宣和天子愛書畫親與印識題其名一朝桑海忽遭變内局委棄隨榛荆郭生惟餘比干畫猶幸不燬南來兵奎章學士子山子獻納曽傾葵藿誠爾來二百有餘嵗屈指春秋凡幾更不知此本尚在否撫巻益覺心怦怦石田沈君最博雅重購所得人皆驚裝潢完好無璺裂入手坐見増光榮郭生斯圖乃其一餘者徃徃皆精英題詩有暇或臨掃復以丹青呉下鳴聞君家住湖水側青山古木相迴縈何時倚櫂一尋訪君當倒屣來相迎翩然坐我竹忩下石鼎細呼春茗烹揮童開奩取巻軸甲唐乙宋聊相評旁人定誚太古癖塵襟且擬氷壺清却愁玩物犯祖戒未敢先輸他日盟啟南此畫題者巳多不容復贅獨記在宋元史局時嘗見巙子山進郭忠恕比干圖事題者偶未之及爰緝成篇聞啟南家多藏古畫法書甚欲一觀之因復自念啜茶觀畫皆先世所遜謝未諳者不覺惕然為之中沮更俟商㩁云郭忠恕雪霽江行圖沈啟南藏吳寛路出三峽風颼颼江天雪霽宜行舟水枯灧澦髙突兀木葉落盡俱東流艨艟相聨蔽江下半空結構如危樓兩舷之間可走馬主入恐是王益州獨嫌百物具篷底如何不設戈與矛後繫一舟亦千斛什器滿載餘􅀈甌青簾翠幙互掩映綵純錦纜紛綢繆玉爐頻爇沉香火寒氣不到珊瑚鈎篙工舵師禁無語指落層氷誰為収安得挽以百牯牛代汝僕夫力且休人生得意在富貴鄉里小兒驚宦逰望中隠隠連逺洲深樹落照哀猿愁日將暮矣泊何處萬里幾轉青山陬狂仙畫筆窮冥搜圖外意思令人求陶翁願棄五斗米未肯折腰從督郵飄然輕颺孤舟去惟有葛巾猶在頭髙哉斯人誰與儔嗚呼髙哉斯人誰與儔髙克明溪上雪意圖此圖劉僉憲得之任太僕今歸沈啓南後有天全跋克明宋仁宗時人題曰臣克明上進赤脚真人龍鳳姿俯視藝苑時㳺嬉良工待詔金門裏髙生前身應畫師含毫吮墨立良久自言臣是唐王維平生胸中無一物獨有山水能容之郭熙成名乃新進髙宗有詩云克明已死道寜逝郭熙後有新成名范寛得意纔並馳丹青競巧稱院體後來不比宣和時宻竹千岡松萬壑蒼翠峰巒白湖樂岸旁桂楫何處移磵曲茅堂是誰縛行人暮歸天漠漠遙望前村愁雪落船頭一老獨閒暇詩思分明入廖廓劉侯朝回過燕市亦復愛畫入骨髓偶從太僕得此圖每一開之心輒喜天全仙翁惜題字評品數行而巳矣翁今巳逝侯亦亡兩洞庭荒𣺌湖水翁嘗自稱大洞庭主人而僉憲家有小洞庭故云石田多才從後起况有佳兒好文字只今此物欣有託賦詩獨慙前人耳宋社久巳屋宋畫如有神劉侯地下勿長歎楚弓得失皆吾人題海虞錢氏藏王均章虞山圖均章名珪號中陽老人生元盛時年未四十棄官歸隠虞山之下慕丹術尤邃於醫所著有泰定養生主論等書年逾九十而卒見吳思菴記扁舟昆湖去憶向虞山還當時廹日暮未得窮躋攀至今三短章寂寥不重刪安知六載後依然見兹山諒無愚公愚頼有頑仙頑頑仙隠居處深林置柴關丹竈火常伏藥闌苖載芟髙情付縑素丹青色斑斑並山卧平野隠然不成環逶迤亦甚逺攢蹙何其慳咫尺見百里羣峰互垂鬟飛鳥歸易没浮雲出偏閒拂水最竒麗空岩故漩澴天風或稍定石壁仍潺潺仙宫對佛寺妙境非人寰獨憐仲雍墓誰為剪榛管短棹載書巻浩歌水雲間彷彿歸菴翁往來寳岩灣題治平寺琬上人所藏巨然山寺圖追次虞道園先生韻疎林逗晩照際水扄柴關中有方丈室翠納千重山山路多白雲滃然隔塵寰倚笻望崷崪展席聽潺湲願邀巨然老置我水石間忘歸飽清暉從此終日閒層巒結暝色不逐樵夫還題趙仲穆馬圖李世賢藏王孫畫馬兼畫人氣足神全色不均一人汲水來飲馬一馬欲飲將騰身二馬俯首嚙芻藁一人按榭睨櫪皁天閑不待秋髙肥一馬不渴二馬飽朔方用兵萬騎馳三馬並立如不知題世賢太史扇程敏政浦上南風急漁舟破浪還不知離岸逺時見樹頭山題沈氏所藏石田臨小米大姚江圖文徴明長洲沈氏所藏小米真跡成化間有假中官勢取之者石田為追摹此圖春雲沉空山有無眼前見此姚江圖圖窮爛漫得題字照人百顆驪龍珠平生雅識敷文書紹興嵗月仍不誣豈知尤物能媒禍繭紙蘭亭巳非故石翁信是學行人能使邯鄲還故歩憶昔憸人賄為囿黷財更假狂閹手千里珍竒歸撿括故家舊物那容守沈氏藏兹二百年一時掣去心茫然誰言物聚必有散手澤相關常累嘆未能一笑付忘弓且喜百年還舊觀豈余鈍眼錯顔標抵掌真成孫叔敖區區不獨形模在更存風骨驪黃外一時㸃筆迥通神得非小米是前身從來藝事關人品敢謂今人非古人又題敬所藏仲穆馬圖文徴明犖犖才情與世疎等閒零落傍江湖不應泛駕終難用閒㸔王孫駿馬圖為懋上人題畫二絶徐禎卿渺渺洞庭秋水濶輕舟搖動碧琉璃松林不隔東西望楓葉寒塘露酒旗布衣藤杖稱芒鞋貪看青山偶獨來心與白雲原不礙長天一鶴忽飛回題文丈衡山所藏趙子昻馬王寵神馬來從渥洼窟王孫貌得真龍骨天池洗出霹靂聲恍惚似與蛟龍爭奚官厮飬不敢近騰驤蹴踏久乃定朱衣輕拂炤紫雲五花隠起生龍文黃帕髙封碧玉鞍紫絲未挂千金勒九重一笑獨當御天閑萬馬無顔色我聞漢武騋龍媒又聞唐家獅子花常思此物在天上何乃匹素開風沙驊騮自是萬里足豈應流落天之涯嗚呼天地變化兮雲霧晦冥吾知此馬之為龍兮終當飛入扵滄溟余表兄段山大參以自在居士墨竹俾予題詩歸有光奉常余之外髙祖儒雅風流絶近古少年侍直承明廬重瞳屢回加慰拊玉堂無事只寫竹影落縑緗生風雨翠葉蒼筠滿人間凌海越嶂爭購取吾家寳藏三大軸其一今在尚書府二幅翻飛入島夷人物化去不可睹吾兄安得此尺素千緡不吝售海賈盛夏張之紫薇省凉氣歘忽週堂廡劃然北壁開户牖雨勢欲滴風披舞此時靜坐亦何有滿眼不復見塵土湘妃帝子對之泣藐姑神人誰與伍吾兄好畫識畫意余方潦倒困蓬户墨竹昔稱李夫人湖州孟端皆堪譜髙人自有千載名世上兒子何足數作詩題竹非為竹俯仰自覺吾心苦東坡先生豈浪語知吾之兄惟老可題水仙圖劉鉉山中有幽花姿容都且閒水仙之名本洞府何時移出來人間宻葉垂垂冷愈碧烟霏作團曉來積緑羅捲帶未周圍蒼玉簪長巳盈尺齊紈魯縞綴繁英㣲風迴雪飄輕盈湘靈玩月珮環墮神女戯水驪珠明江天搖落氷霜裏開共梅兄與礬弟欲集芳聲厭􅉅蘭肯逐穠華效桃李上人慧性奪仙機毫端幻化多神竒生絹聨幅寫數本彷彿仙子盟瑤池或持金杯倒醽醁或着黃裳面如玉或向雲邊下素鸞或向山頭乘白鹿天然巧相各有為不是爭妍效凡俗門徒得此久珍藏間持索我題詩章我今習靜媿饒舌披圖坐對渾相忘道心由來本空照有言那如不言妙茶餘捲軸客出門獨對南山成一笑夏仲昭竹為劉中孚題亭亭何處出幽姿渭北湘南未足竒青鎖門邊深得地玉欄干外最相宜種分原自蓬萊島影落多臨太液池一寸虚心常自潔百年貞節豈能移欲為笻杖隨龍化定作簫韶致鳳儀好對雲霄看挺㧞莫因風雨笑離披芳同老圃含霜菊節比中庭向日葵猶記斑留堯女淚不慚歌入武公詩偶縁客館披圖處空説家園食笋時幸際聖明無隠逸誰於林下結幽期題畫茉莉吳子孝瓊蕋南中秀竒香世外偏過時君不採惆悵越江邊王禄之畫梅花大湖東畔梅千樹昔我懐之即歸去枝枝疎瘦老槎牙墨色根柯如鐵鑄素枝澹蕋交紛綸物外異香天所付人間花卉不敢先天上曼陀差可伍霜巾氷帨襍瓊旄玉蓋瑤旂障珠組丰姿綽約臨姑射衣佩輕盈凌洛浦騷人題名苦難工疎影暗香非妙句千古知心獨少陵欲亂鄉愁傷嵗暮楊生筆墨頗擅場石湖先生猶未許寫生貴在得風神心與天逰天所與偶從便面見形容徳似玉人非浪語氷雪侵陵氣益伸嫵媚李桃那足數强項令公節不屈鐵面端公色偏毅謂君何必貌孤芳須記廣平題作賦鐵肝石心表幽貞調鼎廟堂方識味范蠡歸五湖圖溥光功遂名成泛五湖知幾千古擅良圖向教勾踐堪同樂不識先生肯退無徐彦明白蓮詩巻沈石田畫金赤松題顧璘珍圖白蓮何皎然盈縑風露臨秋鮮丹青豈同俗匠伍貞素獨與幽情便璚瑤滿池琢不碎翠葉兩重欹仍顛盛開欲落比雲散乍疎復宻如星聨何不放筆鋪十頃中間蕩漾呉姬船嬌歌艷曲互酬答氷肌玉面矜嬋娟風流領袖自石田好事遺之歸攝泉赤松郢倡復絶世後來和者難為前我欲西湖招勝侣金樽美酒斗十千林逋宅前放舟去六橋曲曲相回旋古人今人畫如此安得夀命金石堅人間富貴草頭露不須錦瑟調朱絃與君雪藕擘蓮子共唱新詩湖上眠周臣為余寫水墨山水大障徐子仁特賞其妙因口占謝之崢嶸華岳三神峰移置草堂雲霧濃泉飛樹挺氣生動羽人彷彿中林逢周生作此特神妙髯仙見之欲狂叫眼中失却梅花翁人間豈乏鍾期老題荔枝白練圖王叔承練尾低紅紫玉枝閩南仙色麗相輝却思妃子調鸚鵡笑擘輕紅弄雪衣題畫馬道衍身被五色雲才超冀北羣莫教空老去須借霍將軍題秋寺晩晴圖猿將朔吹哀雲帶溪流駛相送獨歸僧蕭蕭夕陽寺題許由棄瓢圖獨坐雲深處迢迢逺市朝若知身是累應不棄山瓢題獨釣天髙日華明江清水光動何事尚垂釣不入非熊夢題畫小小板橋樵路深深茅屋人家竹塢夕陽微雨桃源春暖多花題菊花三徑歸來巳就荒茆齋觴咏足徜徉籬邊更有琅玕樹不使秋英獨傲霜題雪梅雙鷺圖孤山山下雪茫茫雪裏寒梅巳早芳雙鷺飛來花底立却憐同色不同香題菜花雨餘盈圃嫩還柔小摘調羮玉糝浮不識此中滋味好東坡焉肯友元修題畫景隆橫斜疎影浸漣漪天際初升月半規孰謂林逋仙去逺暗香依舊似當時水仙障歌鄭允端我有一疋好素絹畫出江南無數山筆法豈但李營丘直擬逺過楊契丹良工好手不能遇此畫森然能布置層巒疊翠擁復開怪石長松儼相對板橋茆屋林之隈瀑流激石聲如雷恍然坐我匡廬下便覺胸次無凡埃此身但向閨中老自恨無由致蓬島布韈青鞋負此生長對畫圗空懊惱題周臣畫顧璘石壁烟霏夏氣清水光人影靜分明綸巾羽扇者誰子來共沙頭賦濯纓衡山襍畫巖壑飛塵絶孤亭壓水雲偶來乘野興非是厭人羣其二雨霽春潮濶扁舟坐不還放情親白鳥覔句贈青山題徴仲雲山江聲喧草閣雨氣濕楓林雲外青螺影匡廬幾許深吳中山水歌姚綬呉中佳山水布置巻軸間吾舟煥虹月披展情髙閒自非石田胸中有邱壑安得粉墨相耀霍盤雲絶巘碧玉寒揺天長波素綃薄蘼蕪蒹葭被洲渚楊柳芙蓉此邨落㺯舟釣侶秪綸竿騎馬何人自城郭平橋可度客䇿蹇徐徐來昔人孟浩然夙負清詩才疎林髙低出翠瓦夏屋渠渠付摹冩解鞍相留定盤薄到此誰為局束者蘇臺凌空築不易風撼笙歌落平地刲羊椎牛夜達旦簷花撲酒春無睡一朝臺傾走麋鹿西施載去何年復不如此山此水此畫圖逰客見即償詩逋劉君會當買屐兼買棹合使登山臨水之樂無日無余與石田久同調淡蕩多為俗一笑金壺汁是龍香墨冩時不受人促廹君不見五日一山十日水杜老知人乃如此沈周畫雞為陸浩夀其母魯鐸露立蘐花底鳴當興櫛時北堂延曉色愛日正遲遲陳太學月甫送沈周畫雷思霈本朝畫手誰第一超逸無過呉沈生後來作者文同謝彷彿前代關與荆貪看逺岫似雲起獨立斜陽待月升勞君贈我蓬池閣置之邱壑輕榮名次韵題石田先生摹王大癡山水小障徐禎卿大癡千載秘石叟戯能傳意到機隨手詩成骨欲仙風烟黃葉景水墨白頭縁展玩今何處蒼江落日邊題石田畫上有文徴仲詩栁繫漁舠吹笛子徴君風味誰堪比親題數句感山陽二絶兼稱文太史許章甫以周服卿畫松贈眉公命予作詩葛一龍長松歴落青氤氲垂隂之下多芳芬古石盤根潄香瀑壓枝閣日日不曛岩壑丰神自表表人間桃李何紛紛有時䝉茸挂僧衲有時綽約來仙裙峨嵋雪色太山雨九際雷聲七嶺雲白雲不出山清風惟為君寒齋靜抱月明卧松子打忩誰共聞題白氏畫竹髯郎好竹好神仙収拾清風自賣錢白紙小忩茅屋底夜吹蕭颯曉生烟和韵題石田墨杏花徐禎卿春工束手散花遲二月嬌紅未入枝城草欲攙詩客句故輸新碧映雕旗題徴明墨竹次韵深掩精廬且息忙幽庭春晚百花香竹忩閒對疎疎雨戯寫新枝直過墻題扇三首橋通緑水家家舫門掩清秋處處山住向此中貧亦好却無人肯羨清閒渺渺洞庭秋水濶扁舟搖動碧琉璃松陵不隔東西望楓葉寒塘露酒旗濕重溪雲壓緑楊寂寥深閉雨中堂閒庭盡日無行跡鳥下平苔啄破蒼題徴明戯效元暉小景文技元非千載計江湖卷册幾漂萍元暉槁骨知何在頼是開圖見典型題海棠扇春風吹下胭脂淚散作妖花一樹丹可奈五更清夢短杜鵑聲歇雨絲寒夏仲昭畫竹顧璘石瀨涓涓水風篁裊裊枝塵途貪見畫草閣夢題詩枕簟横秋薄樽罍過月遲蒼林殊可老朱紱果何為美人圖葛一龍無聊聊復掩輕羅花學含顰月肖蛾替入畫圖終是貌繹將愁緒强成歌生烟送緑春天逺艷水埋香畫雨過芳信不通簾半掲喃喃雙燕語何多薛姬小影歌和俞羨長范汭俞生曽言薛家兒筵前醉舞花一枝思之不得心眷眷有歌曽擬歡聞變鶴市東邊虎阜西停橈隔浦驚相見宻語旁人聽轉㣲斜倚方牀掩團扇圑扇輕盈貌女郎是邪非邪太婉孌蘋末風扶江月髙倒翻波影長於練沉沉寒漏夜何其醉起挑燈注目時清矑坐上還相肖嫚靨圖中更不疑是誰解作幻人術圖中坐上分身出魁星圖徐禎卿披雲靜夜觀七星繁珠煌煌赤色殷祥形斗合發天彩芒角下掃昌人文邇來日光照呉分英儒碩學爭奮迅擬向承明獻此圖併為吾皇頌文運題牧牛圖上少宰震澤王公盧雍芳草芊芊春雨餘平原飽卧正安如明公入相隂陽理問喘何煩特駐車受牧勤求牧與芻牛肥自喜事無餘長歌白日何人聽一巻清風角上書題郭次父得収石田松有序沈明臣郭次父王大父仙舟公七十時石田沈先生齒巳八十一髙矣手冩喬松圖為夀上系四十字乃𢎞治丁卯嵗當是時隨輒失去乃今隆慶改元嵗亦丁卯蓋六十年扵兹矣次父得是畫於揚州裝池宛然舊家物也事故不竒甚耶懸之草堂相對悲喜蓋沈先生常徳仙舟公云命臣記事遂有此篇石田先生豪雋士髙誼少年郭公子兩人結交無嫌猜歴盡嵗寒俱皓齒郭公自號仙舟君七十香名滿人耳石田老翁年更强手冩徂崍把相視上有新詩金石聲筆力墨氣殊縱橫兩人自比後凋節直幹並起雙龍精髙堂忽驚風雨走一時賔客皆回首翠色猶疑撲酒缸寒聲即欲生襟袖偷兒何物解爭竒一落江湖甲子移揚州大賈侈至寳持售阿孫驚欲倒傾囊不問幾何錢但買得歸便云好六十年來還故物嵗星合度仍丁卯世間何事無離合樂昌之鏡唐宫葉塞翁歸馬客何疑劍水飛龍君莫懾為王元美題沈啟南畫春山欲雨圖即席醉中作東風吹暖海氣惡黒雲擁山白雲薄眼前疊嶂埋峰頭水北髙林穿日脚鵓鳩亂啼花亂飛溪漲濃嵐雨將作欲來不來天半昬似將混沌疑乾坤推移不識上帝意猛虎如排閶闔門九閽不扣玉女泣天呉播蕩江湖立電母權傾霹靂遲但見烟霏草頭濕芙蓉山前茅屋低東陽老子開剡溪筆端欲奪造化力倏忽雨氣生淋漓詩成繪了巳寥廓天髙地下還清濁花明樹緑呼酒來怪無客至相酬酢百年遺墨塵眼空神物今歸王長公長公兄弟把相示醉後揮毫姓偶同沈周墨牡丹即次周韻許榖入春紅紫開不斷春深更得名花看考功園中品最多贈我向來分一半小臺種成今廿載嵗吐千花足竒玩遮䕶常愁風雨狂喧嚷任教蜂蝶亂我觀此圖善寫生紙上雙枝何爛漫此翁灑墨偏動人西蜀趙昌應不換胸中巧思知幾重圖裏春光鋪一段君來索題花正開一笑揮毫飲無算題著色牡丹圖詞人拈綵筆寫出洛陽花葉似含朝雨花疑簇晩霞繒中看國色圖裏見天葩試問黃筌後何人是作家黃淳父宅觀沈啟南嵐容川色圖是法董北苑及僧巨然梅花道人者為沈畫第一王叔承茆堂酒色垂半酣杯邊忽自開川嵐國朝畫品我呉勝妙亦不過沈啟南此幅却師董北苑梅花道士然瞿曇云是平生第一作即余所見無二三當時此老亦自重小字歴歴詳其端不知畫後幾十載筆氣氤氲不肯乾㸃染無他只水墨淺深若有千重盤徘徊歎息日欲晩夕陽紫翠生欄干有時白雲過天際便覺烟雨蕭蕭寒乃知神物參造化氣候每在圖間看坐久相忘興相迫呼童竟索東山屐飛飛小艇欲渡余樹裏人家恍招客俄思去嵗武夷逰三十二峰翻故蹟百金終不賣價與古畫均古畫世傳少當為後世珍傳來臨本徒效顰輞川石刻逾失真幾人目見古人筆所以學畫難其人非如文詞好梨梓字有刀石能傳神祝生字帖徐生詩沈也丹青髙一時三絶云亡老成盡中興似爾頭髮絲飲君酒洗君耳出門總畫圖入屋惟山水平川可釣嵐可樵謾為兹文嗟後死題沈石田楚山圖熊明遇楚岫千峰照逺碧一江風雨一江晴松根抱嶺龍鱗老石脚吞潮虎眼清芳草自隨流水意斜陽不隔斷雲情仙人黃鶴久騎去吹笛船頭何處聲題黃太史水村圖董嗣成曲水荒村郭外居隔雲林樹半蕭疎漁翁収拾漁竿去拄杖青山暮雨餘題耕牧圖鄭允端幽人薄世味耕牧山之隂自抱村埜姿常懐畎畆心行行南山歌落落梁父吟挂書牛角上揮鋤瓦中金飽飰黃昬後力田春雨深四體勤樹藝三生悟浮沉巢父世髙尚德公人所欽伊人去巳逺髙風邈難尋撫巻空嘆息俯仰成古今題秋胡戯妻巻鄭允端婉彼魯姬姜出採林下桑逺人何處來下馬古道傍黃金致㣲言少年為貴郎婦人秉素心鐵石填𠂻腸豈為物所移古井波瀾揚謂謝道傍子請歌行路章山鬼篇題錢叔寳所摹鍾馗移家圖沈明臣鬼妻鬼妾鬼糗粻鬼婢鬼僕鬼葢藏鬼兒鬼女鬼槖囊鬼車鬼獸鬼篋箱鬼形鬼貌鬼腹腸鬼哭鬼笑鬼跳梁鬼語唧唧鬼胆張魑魅魍魎魈與殤髑髏虚耗孤與尫結束負戴何所將别營鬼窟還鬼方吾聞度索之山近扶桑海外更有酆都王汝既去之弗汝禳急急如律令皇皇老馗欽欽勅帝章不用三尺投八荒人鬼異國兩相當汝疆汝域汝徜祥汝逍遥兮樂無央送汝還兮路茫茫旭日陡挂天蒼蒼題畫菊芙蓉呉子孝水邉纔見木芙蓉籬下湘英又㡬叢嵗晩無窮秋色美可憐桃李只春風呉都文粹續集巻二十六
