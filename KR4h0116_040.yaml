body:
  text: 吳都文粹續集卷四十明錢穀撰墳墓仰大理夀藏記正統癸亥權奸方竊政柄而弄之於內既殺諍臣以杜天下之口乃益為峻法以鉗制人毒及無辜勿惜也時諸輔政大臣暨內外百司之長相率奔走其門如騖雖有平日詡詡自號君子者亦不免詘節毁操以求容其身至其小人則遂奴事之甚而呼之為翁父脂韋淟涊因緣籍聲勢以作奸陵轢自恣者不可指數也其初度諸公卿皆至罄折為夀於其家惟恐後曹署為空而大理獨否心銜之會邏卒有與蔚州衛兵沈榮為怨者誣榮與寡婦嶽郝通使呪詛死其夫而實非也刑部勿為辨而大理辨之移至臺臺遣御史勘得實如辨既免矣而邏卒訴諸內權奸乘之文致煽構以上命并逮辨勘官下錦衣獄會三法司敕窮治法司者雖明知其寃莫敢白遂傅致成獄竟殺榮及二寡婦於是自大理少卿薛瑄以下罷降有差而左寺丞仰公瞻獨從重坐謫戍大同蓋公素以介直不合衆且力雪寃獄故也公既被謫即恬然就道及至謫所居七年安之如一日略無幾微見言色對客未嘗談及公事惟以醫藥濟病者餘無所與或問公寧少自悔乎公嘆曰吾恨不能盡雪人寃耳罪謫非所避也何悔之有及己巳之變權奸既死公議始申景泰改元朝廷用俞司寇陳都憲之薦召公還授右寺丞持法不撓如故久之衆寖不合公亦益厭於時即引年而歸時年六十有四公既得歸常杜門却掃教子外一不問家事日與逋人逸士游於山之崖水之澨竹之林菊之圃優游卒歲蓋不知老之將至也視蘇城東陳公鄉之原隆然中蓄樂而語於人曰此吾之菟裘也遂營為夀藏使其中子來請記公字宗泰别號怡菊其先蓋自雒陽來徙於蘇故今為長洲人其諱萬五君達仁澤者公之曽大父大父父也世隱德仁澤以公貴封徵仕郎母鄒贈孺人有儀範公學明經術旁通醫家言喜為詩尤妙於書永樂辛卯自郡諸生領鄉薦釋褐拜虎賁右衛經歷洪熙改元以舉職有錫命尋遷大理右寺副得馳驛省祭轉左寺副以故少師楊士竒薦而至寺丞奉敕詢求京圻民瘼有所建明其歷任前後皆著績而為寺副時辨神武衛卒毛拜兒等寃獄活人尤多蓋不獨沈榮一事也及更大患再召至而所守益堅不肯俯首隨人後求富貴遂飄然決去而不顧嗚呼此豈可以世俗所見擬論哉昔徐有功之在唐遭武后之虐二張周來邪思膠固滔天燎原之勢不可嚮邇而秉正持平壓而復起身可危而節不可改故令聞長世至今天下聞其名者猶斂袵起敬非過也宜也然自有功後求人蓋亦鮮矣公豈非聞有功之風而興起者歟公娶徐封孺人有丈夫子五人嵩嶽巖崙岐女子三皆歸士族孫男女凡幾人其五子皆克家而巖則來請記者也既記之乃係之以辭曰生寄也死歸也孰委之維達者有不為有以為舍小知得大知學不骩行不缺履險夷惟一節一時詘千載信尚有發在後人景泰三年秋閏九月之望題大理夀藏杜瓊百歲光隂笑易過達人常比夢南柯了知身後遺蟬蛻預向生前製絸窩緑樹一丘封土脈白雲千畝護巖阿髙名直與姚崇並垂世芳聲耿不磨同前陳寬回首西山日欲斜便尋歸計立生涯鑿開一片松根玉卜得千年身後家馬鬛未封閒歲月絸窩不閉露烟霞清風吹破邯鄲夢笑引兒孫醉菊花仰公瞻永樂辛卯鄉薦正統中歷官大理右寺副多所建明以介直忤權幸謫戍大同景泰改元召還授右寺丞引年歸自營夀藏於葑門外保定府知府致仕張公墓志銘錢溥公姓張諱柷字起韶號棲霞子又號錦峯山人蘇之長洲人也初公以春秋舉宣德庚子進士第賜歸省甲寅召試交趾道御史事明年拜大理寺左評事丁卯閩藩聘主文衡得明公之譽丁外艱景泰辛未服闋赴京大學士髙榖欲薦起之㑹都御史寇深鎮遼舉公理刑壬申其鎮文武大臣交薦公才識過人乞升京職以資邊計遂遷刑部檢校乙亥回部天順丁丑升大理左寺正庚辰擢知保定府癸未㑹朝以老疾請致仕其郡民聞之詣闕請留者數百人不可以歸以恩例進階亞中大夫居十有餘年日與鄉之親故四方之尊顯而過吳者酬唱往復或泛樓船駕肩輿登髙臨深以樂其樂享年七十有六而卒成化丙申六月草五日也其先河南祥符人七世祖德成宋鄂州江夏簿靖康初召授保義郎閣門宣贊舍人差提舉宿衛親兵權兩浙淮南東路沿海制置使賜第蘇城之樂圃坊居焉六世祖繼善登進士授餘杭尹遷朝奉郎昭慶節度判官河東節度使致仕五世祖大榮以䕃補迪功郎曽祖澤之髙隱不仕祖子宜八歲能詩稱神童年十三領江浙鄉選元社將傾遂去入國朝起修元史仕至奉議大夫工部郎中號甘白有甘白集行世父用軫善琴事太宗受文綺之賜封左評事母韓贈孺人公生而俊邁警爽弱冠游郡黌即以能詩文出流輩上仕而在大理審録部院所問囚犯不可勝數而平反者多若辨郭旗張匠汪軍宗典史周千户再入大理辨瀋陽留守二衛之軍婦富峪之張軍等之大辟皆藉以不死時論韙之雖處栝幕而遇事鞅掌皆決於談笑之頃衆皆以為不及其開銀場役工匠數千而貧富適均清軍政革弊申寃而民多服屬邑戴丞被誣當死公力辨於憲臣得免後戴俟公出密以白金百兩置家去公歸即召還之保定地逼邊塞軍民雜處以强弱是視公則痛懲其弊黜知縣白忠之貪重建劉靜修郝伯常之祠人知向方嘗因久旱奏免民賦且發倉賑之民賴以全活至今思焉英宗初臨御詔求直言時公在廷評首上四事言畿甸旱蝗宜暫停徵稅匠有老疾幼弱宜驗實放免蠲倒馬之倍償正武臣害軍以法多采用之當時少師楊文敏公重其才屢欲薦不果及大理卿缺冢宰河間王公擬及公而阻於他薦識者咸為公惜而公則聞而歎曰此非吾命也耶卒守一郡以歸尤惓惓憂國愛民雖老彌切至遇撫按之臣郡縣之吏輒懇懇言之人亦重公老成多所敬信使民隂受其賜亦多矣公天性孝友年十七喪母哀毁踰禮父年踰八十所在迎飬得其歡敬事兄嫂罔有間言急於接物雖後生小子亦迎欵無厭閒居手卷不釋遇有求作輒肆筆而成無所靳稿存於家有若干卷配周氏元公十二代孫安溪簿玉成之子媲德齊榮女婦欽式子男二紈綬女五長適吳江醫官盛佾次適陸璜朱珉沈廛鄭鴻孫男三儀長洲邑庠生位侃俱幼女二長適陳謨次未字紈等以歲已亥三月二十八日將葬於吳縣至德鄉隆池山之原乞武陽司訓陳君頎為狀託舉子張泰來請銘噫頎與公中表言足徵而情甚至况余亦同朝交厚且久者烏能不忍哀而為之銘也哉銘曰公出河南節臣裔賜第吳城表忠義隱顯相承今幾世至公崛然起科第職專祥刑在棘寺平反上體欽恤意負屈軍民賴攸暨左遷雖困道則裕作郡罷行多利弊民今思之不能置歸樂丘園好卉樹詩酒徜徉自成趣一曲氷絃拂塵纍髙歌半榻青雲志弗究其施竟長逝憑虛躡雲朝上帝體魄下藏閟深竈後千百載髙軒遇豈無人焉式斯墓我其銘之亦何愧張太守柷甘白先生適孫宣德中進士歷官大理左寺正擢保定知府有惠政墓在吳縣隆池山玉雪朱公墓志銘姚綬成化丙申八月十日蘇州衛指揮僉事朱公瑜之弟瑾席終於正寢卒之日縉紳大夫哭之士君子㑹哭之行路者亦咨齎焉綬交且厚訃聞走弔於其門而哭之有慟宜也後卒之五年其子倫始克舉葬事謂墓石不可無銘謂綬知公最詳銘焉是屬嗚呼雖不忍言忍辭之哉乃按狀瑾公之諱良德字也别號玉雪父質母王氏生公兄弟先世山東魚臺人曽祖善元季從張氏陸參政下行樞密院都事隨陸歸附授管軍政徐丞相取山東克汴梁潼關北平皆與有功授忠顯校尉再傳至公之祖父伯父轉授鎮海衛鎮撫纍升指揮僉事於蘇州衛飾以文事則自兄瑜曰良用者始也公雖出武曹世有勳祿能脫略紈綺讀書郡膠勤苦自勵與諸儒埒時都督翁公奉璽書守三吳聞而賢之以懷材抱德薦於當道公曰吾兄守官日不遑家事瑾當勉力具祀事應賓客鑿池築垣闢圃而蔬庶幾為吾兄助而不使其有內顧憂怡怡相樂終身可也尚敢以菲薄而叨朝廷之一命乎懇辭不就由是逺近聞者莫不賢之願交焉若武功伯徐公吏部尚書錢公右都御史韓公參政祝公輩咸器重之以及內外諸名宦四方之騷人墨客凡道經於蘇者必一識公公輒延之天光雲影亭亭俯葑溪清勝可愛主賓留連詩酒日不足繼之以夕而復達旦忘倦陋劣如綬者嘗辱以兄禮事之况其上者乎人謂公之好客與昔鄭當時不相上下故得所交者詞藻甚富平生飬成直氣與論古今成敗得失歷歷可嘉於人無忤而且不詭隨赴人急難則惟恐後實良用之難弟也不滿下夀僅五十有四而止悲夫其生永樂癸卯娶浦氏有淑德子男四長即倫以恩例授散官次僓仁俊僓湯氏出也孫男女各二卜以辛丑四月十有七日奉柩葬於吳縣陸墓山之原以從先兆兄良用後公卒而葬同日亦自有碣此則公之銘也銘曰武辨而儒談愛兄而好客聿收時名式承世澤人非過譽夀不滿德溪亭之水阡岡之石春雨秋霜易朝夕若人泉扄卉樹碧刻此銘詩示無斁朱瑾玉雪之墓在陸墓山之原事行詳載吳中往哲記同齊沈君墓志銘陳頎同齊沈君既卒之明年子周得吉地於天平山之北隆池之原將葬述其事行來請曰周自幼承先人之教懇懇切切今周髮亦種種不克如教有所成立如時賢之為子祿有飬而爵有封設使潛德不能勒石以載則將就於泯滅而不孝之罪何逭子知其世為詳是以敢請嗚呼君固自有不朽者在矧周亦有顯其親者奚假於不斐之辭雖然不容以遂已乃掇其實叙而銘之君姓沈氏諱恆字恆吉以字行同齊其别號也世居蘇城為長洲人曽祖懋卿祖良琛贅相城徐氏因家相城父孟淵母朱氏生二子長貞吉次則君也其先族最盛元季兵亂家業蕩析良琛始振起孟淵克復之其族之盛不特資産之富蓋亦有詩書禮樂以為之業當其燕閒父子祖孫相聚一堂商確古今情發於詩有倡有和儀度文章雍容詳雅四方賢士大夫聞風踵門請觀其禮殆無虛日三吳間一時論盛族咸稱相城沈氏為之最焉君稟賦清秀穎悟過人五歲授孝經小學朗然背誦屬對如應響然稍長從翰林檢討嗣初陳先生學學日有進甫冠選為鄉賦長不得己役於官者七年有餘非其志也正統間廬陵周公巡撫南畿南昌况公知府事二公皆務剗平宿弊選數輩信任更事時所在錢糧充牣不無有私者惟公一無所汙且其文藝精緻辭論確實尤為二公所優禮歲飢民多貸官粟有司徵斂非時民不堪君率父老請緩其期父老難之曰非徵何以濟後日之乏君言目今農事方興食且不給當助而反徵之是重困其力後雖有濟何瘳於今日之病卒從其言鄉民漕運交輸不足必取辦於豪富之家酬以倍蓰之息鬻子破産往往有焉君每出已資代民足之不加其息一鄉之人獨免此患同邑有王某者隱忌君或傳其訾毁之言君不為意王忽被誣於府憚守嚴莫敢辨君力為辨之得釋王歎曰我今日始知沈君長者我終身愧其人矣友人沈公望卒貧無斂葬公為經理之其子當逺戍又為援例營補近衛其急於行義多類此性至孝先意承志得親之歡心家嘗被盜劫時君處外寢得脫然不知父母所在號呼復還幾遇害而獲免人謂孝感所致工於詩體裁清麗所著有同齊稿藏於家精繪事不茍作作則為世所重善飲酒終席未嘗少亂晚年謝世務寄情於觴詠臨溪有樓登眺其上綸巾氅衣風情都雅儼如神仙者流酒酣愛誦范石湖詩興至輒賡其韻時或命周歌之陶然自得厭人談世俗事一聞孝義之言即感激欷歔至於泣下其胸次可以概見矣患風痺手足拘攣者六年竟以是卒於成化丁酉正月三十日距生於永樂己丑九月一日享年六十有九葬以卒之又明年正月庚申日其娶唯亭張氏子男三長即周次召早卒次豳庶出也女四一端嫁徐綱一莊嫁劉正一寧嫁吳誠早寡矢不更嫁一清嫁陳懷孫男三雲鴻應蟾應奎女四二有歸餘未嫁銘曰前作後述咸有其人承前啓後實維乃身源深本厚其出不訾載發於周益昌乎詩名揚久逺有光所生彼叨貤典未必為榮名浮實亡無譽有毁較厥短長舍彼取此勒銘於石以示識者有過隆池於焉下馬石田先生墓志銘王鏊有吳隱君子沈姓諱周啓南字而世稱之惟曰石田先生先生世家長洲之相城里曽大父良琛始闢田以大其家大父孟淵考恆吉皆不仕而以文雅稱先生風格修潔眉目娟秀外標朗潤內藴精明書過目即能默識凡經傳子史百家山經地志醫方卜筮稗官傳竒下至浮圖老子亦皆涉其要掇其英華發為詩雄深辨博開闔變化神怪叠出讀者傾耳駭目其體裁初規白傅忽變眉山或兼放翁而先生所得要自有不凡近者書法涪翁遒徑竒倔間作繪事峰巒烟雲波濤花卉鳥獸蟲魚莫不各極其態或草草㸃綴而意已足成輒題其上時稱二絶一時名人皆折節內交自部使者郡縣大夫皆見賓禮縉紳東西行過吳及後學好事者日造其廬而請焉相城居長洲之東偏其别業名有竹居每黎明門未闢舟已塞乎其港矣先生固喜客至則相與燕笑咏歌出古圖書器物摸撫品題酬對終日不厭間以事入城必擇地之僻隩者潛焉好事者已物色之比至則履滿乎其户外矣先生髙致絶人而和易近物販夫牧豎持紙來索不見難色或為􅎓作求題以售亦欣然應之數年近至京師逺至閩浙川廣無不購求其蹟以為珍玩風流文翰照映一時其亦盛矣先生自景泰間已有重名汪郡守滸欲舉應賢良不果王端毅公巡撫南畿尤重之延問得失而先生終不及時政曰吾野人也於時事何知焉然每聞時政得失則憂喜形於顔面人以是知先生非忘世者初先生事親色飬無違母氏夫人以髙夀終先生已八十而孺慕毁瘠杖而後興弟病瘵終年與同卧起館婺矛牙妹撫孤姪皆有恩義尤喜奬掖後進有當其意者為延譽不已先生娶於陳生子曰雲鴻官崑山縣隂陽訓術早卒庶子復孫履皆郡學生先生以正德四年八月二日卒夀八十有三復相履治喪以壬申十二月二十一日葬相城西牒字墟之原所著有石田稿石田文鈔石田詠史補亡客坐新聞沈氏交遊録若干卷獨其詩已大行於時文徵明曰石田之名世莫不知知之深者誰乎宜莫如吳文定公及公闡其潛而掩其幽則唯公在豫諾焉銘曰或隆之位而慳其實或嗇之秩而侈其有較是二者吾其奚取嗟嗟石翁掇衆遺棄發為渾鍠震驚一世彼榮而庸磨滅皆是相城之墟湖水之漘於乎邈矣我懷其人沈恆吉墓在隆池其子石田先生周墓在相城西牒字墟之原王聖俞墓志銘江公望君諱仲舉字聖俞王姓其先太原人西晉末徙家福之福清縣七世祖棨仕唐為尚書郎其後仕宦不絶髙祖仁僓為閩王王審知所知以大理評事聘於家辭不受命君子髙其義審知歸朝祖父珣語子弟曰時清可以出仕矣父礎有志之士再舉禮部不偶隱德弗見𤣥素之風流而至君兄弟猶未泯公望初識君之兄聖時於新定一見愛其神情𤣥定有願交之志續見君於廣衆中和其必為聖時之季其風神氣習蓋相若也既交其兄因復得君三人者遂為忘年之友始得之眉睫間今皆白首迄君死無間然君在童稚警敏過人父早世與兄事母孝謹人知王氏有子礪行苦節日益堅業屬文不逐時好三黜於有司慨然有隱居之興僑居吳門生事牢落治田百畝數遭歲登餘數年之蓄儉勤日以給冠婚祭祠以至賓客之豆皆出於是不外取也杜門讀書雖鄰里不識面目教子成就其大者親故艱匱不給者周之族之孤不能婚嫁者婚嫁之妻方氏敬順惠和以承君志族之長者至其家饋事如舅姑無怠容君於閨門間不見細過方氏之力也享年六十有八卒於政和元年二月九日以其年三月二十二日葬於吳縣橫山之原以方氏祔長男蘋次蘩次蕰女一嫁士人蔡元康蘋蘩公望稔知其為人靜願有守蕰與二兄力學嶷嶷有成初聖時之子卒方以老獨為念哭之甚哀君不謀於子亟召蘋告之曰我兄即汝父也拜之即出為聖時後人所難也君安行之不悔君性剛介不可犯與人交如骨肉莫可解不合不復願見事聖時甚嚴憚至於講道酉室不讓故於死生之際泊如也聖時在海外相期晚秋同㑹君於吳門三人者獨君不幸且死矣余有子戚亡聊在人世何如哉銘曰學不務博美身則正行匪蘄聞心不匿愧為生良勤茍完而己年不取贏白首以死聞道之力雖死亦可矣嗚呼是銘足以與金石相敵王君仲舉先世晉末由太原徙福清君始僑居吳門隱居讀書與桐廬江公望友善鄉里重之墓在橫山之原宋王勉夫壙銘薛紹彭嘉定六年四月二十九日笠澤王先生以疾終其年九月二十四日葬於吳縣橫山先壠之側其孤德文號泣致書走介千里訴曰先君不求聞達所以傳信於後者必託諸銘君從先君遊知之實詳敢請初紹彭先大夫僑居笠澤先君年甫弱冠籍籍有能文聲先大夫禮致齊館喜曰汝得所矜式矣受業六載開迪宏多先大夫日夕相與優游宴處定為文字交繼宰華容力挽偕行先生以親老辭雖相望荆浙先生得一善必以告紹彭先大夫一觴一咏未嘗不屬意先生也先大夫平時許與每以逺者大者期之曽不少見於世則次其顛末今何敢辭先生諱楙字勉夫家本福之福清自其曽大父徙平江後居笠澤先生資稟穎悟趨向端方少失所怙事母以孝聞與人交誠實無虛語有義事雖窘匱必竭力為之清淡寡欲刻苦嗜書寬厚長者恥言人過鄉里皆謂之善人君子少嘗有志功名贈蹬不偶自母夫人沒悉棄所習不復逐時好取世資或以勸之泣曰祿不逮親尚奚望榜所居曰分定齊先大夫及浙西參議陳公造為文以記之富貴利達恬不關念安於義命若此杜門著書留意古學有野客叢書三十卷巢睫稿筆五十卷叢書門分類聚鈎隱抉微考證經史百家下至騷人墨客遺草佚事細大不捐士大夫爭先謄寫親族之仕達者欲鋟木以傳先生辭之顧語弟子曰吾目未瞑且將有所增益嘗以文謁石湖先生一見為之擊節雅相推譽客於湖南倉使張公頠之門逾三十年賓主相歡如一日人皆賢之晚得拘攣之疾坐卧未嘗廢卷易簀之夕神觀不亂作詩一絶擲筆而逝享年六十有三詩中有趂著風帆便上船之句胸次夷坦可知娶葛氏能盡婦道男二人德文純文業進士嗚呼才大者用必宏先生之才獨嗇於用德博者夀必遐先生之夀不報其德命矣夫若其譜系之詳與先生履行之美則有樞密曽公孝寬司諌江公公望之志銘在兹不復録銘曰何才之豐何道之窮橫山之中是為先生之宫王君勉夫著書笠澤濵為范文穆所賞有野客叢書行於時墓在橫山宋故提幹王公壙記王敄先君諱德文字周卿家世福之福清自髙祖仲舉徙吳因家焉曽祖諱蕰曽伯祖著作郎蘋伊洛髙弟紹興四年六飛南渡知府事孫公佑以學行薦白衣賜對稱㫖賜秩玉音有通儒之褒嘉熙四年郡侯王遂立祠於學亦先君之請先祖諱大成隱德不耀父楙號分定居士參議陳公造有記有著書三十卷曰野客叢書石湖先生嘉美為之跋先君㩦此書謁鳯山李大參性作序家貧力以版行不負前人著述之志書成焚之墓下見者無不涕服先君資稟穎悟筆端有口屢魁京庠士論推重當世名勝爭願納交顯學盛文昌章自豸冠而師建寧交游二十年終始如一日海陵趙守善湘適值邊兵毁破城壁委請先君協力經理董治版築城壁復完以功奏補承信郎先君蹭蹬不偶弗克以儒科自奮俯首鶡冠調寧國酒稅任滿太守王實齊復挽留一年庚子歲歉發運史侍郎宅之以時多盜命先君攝華亭尉凡兩載餘往來湖泖搜捕殆盡無遺類邑人賴以安妥大漕陳垓亦以先君才能敏邵俾兼造船場市舶未幾徽守鄭宗山奏辟監𣙜貨務造㑹紙門及額受賞轉承節郎受南橋酒官磨勘擬轉保義郎以出仕二十年尚可循轉先君恥於右選意欲世科遂置而不問先君手箋鶴山魏先生渠陽詩集析文辨義詁注甚詳鶴山嘉之亦既鋟板以廣其傳克齊游丞相似為之序真西山德秀杜立齊範王實齊遂皆有跋語亦各舉先君科目祕監李侍郎心傳跋云此五人者天下之正人周卿與之游亦無忝於所生矣近䝉游相召命沓至且有裏除之諾方且自喜夫何一疾醫藥勿療歸正寢而殂矣痛哉先君享年五十七生於紹熙改元四月二十九日終於淳祐六年十月二十二日先君娶周氏男一人敄方志於學忍死竭力擇次年五月十二日卜葬於吳縣橫山桃花塢先塋之側若夫先君平昔云為操履畢載於前之名勝跋序姑掇其大概刻石幽隧以為不朽之識云孝男敄泣血謹書兄奉議郎知處州麗水縣主管勸農公事斗文填諱王君周卿墓在桃花塢王賔傳附跋姚廣孝王賓字仲光蘇人也父安之善相人之術決人死生休咎其驗如影響來求相者肩摩踵接曽無虛日雖紫閣麻衣勿能過之號曰電目湖海間咸呼為王電目云賓生幼穎悟有志周孔之道不傳父之術七八歲即入鄉校幾冠自唐虞三代以降至於秦漢唐宋及元上下數百十年間其中聖經賢傳諸子百家隂陽厯數山海圖志兵政刑律與夫稗官小說之書悉皆覽而傳記間無所不知者賓於醫學尤精用藥多神效然未嘗肯與富貴人醫里巷人貧者及方外人來求醫者即趨往診視施與藥餌一不望其報賓貌甚寢其隱也不於山林僦城市一㕓居之藥㸃其面及肘股皆成瘡髽兩角短布衣芒屩竹杖行市井間或箕踞道旁露兩股爬癢時人見醜惡咸笑之間縉紳中有知賓讀書博古亦以其醜而無薦舉者賓乃熙熙自若賓性至孝父早喪母在堂奉飬每日飰必親煮羮必親調冬寒則溫其衾席夏熱則凉其枕簟日侍左右不敢逺遊賓平生不娶味淡泊無所嗜好多與方外人交或閉户閲佛書以消長日作詩文尚竒崛艱深其辭人讀之卒莫能通其義年七十先母卒至疾革時抱母不舍死半晌復蘇呼母連聲氣方絶葬後魂歸於家夜二鼓曳履拄杖行呼曰娘娘舉室皆驚其母應之曰我在此復曰娘娘兒舍娘娘不得母痛哭既久而息賓之孝行至於此賓之著述甚多稿皆散失不存有吳中名賢紀録吳下古跡詩二集在交游之知已者惟同郡韓先生云君子曰賓竒士也懷材抱德其隱不居山林而居㕓市醜其形骸悠悠忽忽行井里間時人皆不識之間縉紳大夫士有知賓讀書博學亦以其醜而無薦舉者故賓得遂其志而樂於隱也賓平昔奉母至孝雖死為鬼亦不忘乎母而歸省焉嗚呼賓可謂竒士也耶永樂七年余撰王賓傳同郡韓奕公達欲鏤版行於四方此亦君子成人之美也公達其可嘉也哉其可嘉也哉是年五月二十五日姚廣孝識王君仲光性至孝毁容隱城市作詩文尚竒人無識之者墓亦在橫山王君德廣祔志銘陳遜處士王德廣卒己二十有一年其配沈氏孺人殁將祔葬處士之墓其孤敏泣告余曰先考葬時日薄事嚴未暇請銘今葬先妣若不併求志銘則潛德世系終泯焉無聞敢請按處士諱寬字德廣姓王氏知分别號也其先太原人西晉末徙之福清一世祖綮仕唐為尚書郎八世祖仲舉奉議郎其徙家於吳者自仲舉始也九世祖著作郎蘋伊洛髙弟世多聞人宋紹興有通儒之褒髙祖行父號雲嶠曽祖安之善風鑑號電目祖君顯父彥常皆有隱德伯父光庵又以儒醫名處士悉得其傳人賴以全活者甚衆朝廷嘗以明醫徵未赴而卒洪武已酉六月二十七日其生時也宣德紀元十二月初二日其卒時也春秋五十有八配沈氏諱妙真同邑士良之女有淑德生子三人長佐早夭次敏娶嚴氏次政娶蔣氏女四人適陳彧葉茂顧玉朱榮孫男五人鼎節瑾泰珵孫女二人當處士歿時二子尚在孩提間沈氏不憚艱苦撫孤以葺厥家恆恐先業失墜乃課子讀書從明師學醫其子克紹先業者皆沈之力也孺人生於洪武乙卯十二月十四日殁於正統甲子三月二十八日夀七十而終卜明年三月甲申葬吳縣靈巖鄉桃花塢先塋之次嗚呼人莫大乎知分能知其分者必有所見也處士善保宗祧垂裕後昆以世其業抑非知分之驗耶若沈氏善相厥夫夫殁而善教其子不失故物者其亦賢婦也已銘曰知分之心金石堅克紹世德振後先樂只令配婦道全撫孤有成才且賢吁嗟殁兮何憾焉併勒銘辭昭永年明故王聵齊先生墓志銘聵齊王君吳下名士以醫之良而掩其衆長卒莫掩於君子之見知而幽光潛德逺近來弔者各能言其略也母沈氏妊七月而生君至老猶顱𩕄未合父德廣早世家遂落年十六從韓先生伯承學伯承扣其所嘗讀先世藏書幾何隨舉隨答曰不失為世儒世醫家子可教也處一室寫誦不少輟每其師所診療巧出意表處録記成帙曲折不遺伯承曰王生所就當不在人後踰年師亡適盛啓東先生致御醫事閔其孤且貧也曰盍居藥設肆以飬母答曰恐家學世繼自吾而失先生曰志足以繼光庵矣吾受業光庵之門還授之於其裔宜矣留置館下卒業未幾母得乳嵓疾卒大慟脫下頷仆而幾絶衆亟揉合之良久蘇蘇綿州性初諭以傷生之教曰貧而孤不有母不有今日哀慟自不能已也綿州賢之抱疾延治者拒不往綿州曰在禮固自得矣如物何强而往其施治一出乎東垣丹溪不立異以徼近效不乘人之危以射厚利不斥言他醫之悮曰吾藥偶獲中耳蓋韓盛二師之心傳同一仁術君擴充之而及人者大也城內外媪稚愚智皆熟君之名君察脈觀色即得其疾所致治無不愈者惟貴勢人之疾難治羣工爭欲售其能攻補雜施一難也遇下不以禮自重者不茍往往者非所重二難也唯唯取悅孰得盡禁其所欲難之三也奉飬厚而中氣素有奪又難之一君則反是凡所遇言輒易入而投劑又竒中名愈逺而愈尊貴者延聘四至或臨蒞所近雖弗疾亦延訪其謹疾致疾之故甚悉君益以禮自持全活者多而心愈下不易其所易不難人之所難每記人某疾某脈某稟受幾歲治以某法某劑可起與否詳書之不可起之證與脈何似亦詳書之積五十年得百一十八籍曰藥案其間出竒之見暗與古合某婦患血蠱攻以常法君以安胎之劑調治之且曰當得男即愈已而果然秋日受海道總帥翁公燕謝飾優者為女子侑觴無疾也頰赤面青羸而氣微促君謂翁曰火克金之兆也火氣司天必死果明年六月咯血死蘇人衛千户申志年欲近二十忽昏眩譫語體燔而咳以傷寒治者易數手雷然而同聲也君曰痘也以升均湯與之衆相顧疑厥明痘出遍體而愈鍚邑鄒氏疽發於背不腫起衆瘍醫言起即易為治也君診之曰擊指之脈即起亦不治何言之易衆劫以艾起如栗哄然曰保無傷矣竟三日死人又知其不分科而能通也松江富家餽白金數十斤借言於巡撫都御史萬安劉公君麾置之曰吾以醫見重於公而以利脫人之罪非處已之道又以利而覬公之聽非處人之道既而公廉得之作君之贊曰儒通萬理醫鳴一家心淳近古質厚孔嘉豫章羅公亦贊曰心常存古人之風郡人吳修撰曰就而挹之儒者之風則其人非良於方而已也嘗自撰婦嚴氏壙志及家譜後識語又辭致可觀禮部屢薦起為用以聵廢辭居吳城德慶坊宋以來四百有餘年故址也君早孤聞户衰薄僅舊屋五楹門君展拓締構分與弟中半不以新拓置者為已有也又展為新第者三與仲叔季三子以故第與伯子守先祠風日好時迎飬於諸子之家與客觴咏以樂暮還於伯曰此吾瞑目地也今年閏四月二十七日中風越三日為五月朔旦卒夀七十有二永樂甲午五月草四日為君生辰卒之年為成化乙己嚴先卒二十一年繼室谷氏卒先二年長男鼎之卒先五年次男節太醫院醫士次泰邑庠生升貢太學未行次觀應名醫之徵亦未行皆憂制故也五女而夭其一四壻曰莊練陳廉李圭張瑋瑋京闈癸卯貢士孫男七曰槐曰朴曰橒曰榖曰杰曰杲曰慶孫女八曽孫女一君姓王氏諱敏字時勉號訥菴晚以疾不良於聽别號聵齊其心聽之聰未嘗聵也弟政字時學號恆軒亦太醫院醫士此其事行之概其家世之懿自太原徙閩之福清在西晉時逺莫之識其詳者唐水部郎棨登咸通三年進士始見於譜為今初祖慎微大雅為三世之祖連取科第自殘唐來皆有官四世祖仁僓以髙節不受王審知僞命子孫皆隱於農七世祖弟兄七人宋方盛時出而仕者二人八世祖從兄弟十人仕者三人九世亦仕者三人方南渡之初十世則三人仕十一世如之仕於元者亦如之其世次有二派元季則連三世不仕皆讀書而隱我國朝則隱於方術而薦用於時者四人君為世在十有八矣君顯彥常曾祖祖也纍纍譜牒間第進士者十人為中允員外博士節度推官教授僉判提轄幹州郡守縣令簿階光祿大夫奉直大夫中大夫奉議宣議朝奉宣教修職從仕等郎封開國男賜紫金緋後先輝映倡明道學於中吳者九世祖著作郎信伯著書立言從遊於西山鶴山二先生者十二世祖承節郎德文光菴先生諱國賓為王氏十五世孫所著述尤多且神於醫今之業此其以世其家者皆祖之也其徙來於吳則始於八世祖光祿府君叔康葬吳縣橫山桃花塢則始於光祿之從兄仲舉後皆祔也卜以今十二月十三日祔葬君如禮嘉禾周鼎夙交於君自弱冠至白首如一日銘曰嗚呼君有美行在人實多欲盡書之奈片石何尚俟乎他穹碑峩峩具載無遺永耀弗磨欵鶴王君墓志銘祝允明自成化以來江之南北達於京師以及四逺稱上醫有十全功者曰王先生惟顒然而君無庸譽於明其為人秉忠飭行髙簡自愛若氷雪金玉不茍同於人於是更崇其稱曰儒行者也既老深飬俟命乃髙夀考終凡其平生交契老宿為文辭贊詠已多而掩幽之志其二子以豫有舊好也來屬之乃稍為據狀述徵素尚叙之曰君王氏諱觀字惟顒族於長洲最久且望其始出太原晉末徙閩之福清唐水部郎中棨為今譜一世祖三世大雅慎微皆唐季進士四世仁僓不受王審知僞命七世礎贈朝請大夫八世仲舉贈奉議郎始遷吳九世蘋仕宋髙宗為著作佐郎終中大夫稱程門髙第弟子十世以下率茂華實至十五世君顯為君髙祖曽祖彥常祖德廣考時勉時所稱聵齊先生君為聵齊第四子少從文教諭先生洪為進士學既去述聵齊之事其為醫操逺識集竒效先後不可勝算今條大都一二髙御史按吳中病傷寒旦日猶與其鄉人飲酒君語郡太守死應不過丙夜衆駭且疑不然即然寧若是遽也果半夜死王尚書文肅公過訪君㩦其孫在側體魁梧無病君視其脈曰有大疹終不可愈尚書進金請為除治之固辭曰金可受則疾可瘳矣無已少與藥塞其請不逾年死郡守曹公病痔漏漏七孔羣醫劫之火傅以藥弗效君曰不實其虛當奈何能已令服大補劑且甚多孔肉次第盈竟愈後守四會林公疽發於腰才若粟君視之曰在命門無以為也竟如之衛使張君疾衆不能察雜治之無驗君曰是內損得之以虛非藥石所克衆回惑無能更張君法者卒嘔血死死乃驗其果傷也太僕少卿李公病嘈雜問君君云火克肺金金不能制木木挾相火而乘脾土脾土冲和之氣索矣榖之精液乃不行濁液攢聚以為痰痰因火以動故嘈雜不休宜補土伐木治痰為要為之方從服之愈無錫有李御史宿病瘧而不劇比當出按逺方瀕行向君乞攝調方藥既為之論議勸之曰君不若無行之為善也李不聽遂死中道又里中王榮好酒色歲九月乘時患咳君曰此不可概與時疾論明年清明其殆乎榮固信君聞語澘然涕卒如期死又吳江陳璘病肺切脉亦謂若病本酒色不可治不信吾試道其來夫人色荒則本蹶虛火乃熾遂克金肺既其究也聲必瘖酣酒則濕熱萃之髓道壅以蝕土脾既斁究必腹脹又土色黃濕熱蒸之達外必膚發黃斯三者必無來年不至是也金令司天其不免矣越歲之杪秋果發黃皤其腹音啞七日而死常州守李妻病癥腰痛腹鼓滿月事閉不下治者用針刺走他處痛益甚或主以湯液消之咸不應日加憊君曰彼故氣血不周停之以為積盍飬正積當自除不然削本以攻末安所望治投以參蘇飲數服乃已一婦人血敗通一日夜崩不止六脈盡脫氣息垂盡死在呼吸家人姑集羣工餌以膠艾一律比君曰敗者既不可止惟生脈生血為當務耳取膏參益以麥門冬五味子飲之頃之脈復血止婦竟活君素無疾逮七十餘謂家人吾貌雖若無恙脈歇至無何逝矣比終去其語歲間耳大率君為治每主補不輒為瀉若攻擊其言曰若人天真完固則榮衛周流而客感莫搖邪淫悉逺孰自以致病耶初金華朱彥修既得河間真傳以授戴元禮元禮授王仲光仲光即君曽祖彥常之兄名賓字仲光其道髙狷國初以竒節至孝博學富文為吳中卓行君子風烈挺邁學者稱光庵先生其醫既精絶用授之韓布伯承盛寅啓東復授猶子德廣而聵齊承之還卒業於伯承啓東其為儒若醫猶光庵也故君之於二道也亦然早喪母事聵齊曲致其方推而𢎞之自以世德蟬聨朝國有移而家美不匱隱顯聲節蔚炳宗牒所藏唐宋以降數百年遺容誥敕經解文集翰墨卷軸充箱盈目一一裝護次類模刻副本窮歲不息或得之他所重購以歸先墓數十非一地守祭嚴謹始祖之封久沒於鄰償而復之平居矜嚴有度無茍訾笑寡所協諧而當世名德貴達乃相與甚隆且廣如故吳文定公原博李太僕貞伯沈先生啓南李宗伯世賢今柱國少傅王公尚書劉公按察事杜公其尤善者也撫察大吏部使者郡太守邑宰賓敬罔或䙝然不喜交涉必邀致以禮乃往或假以解公府事不屑也成化丙午以名醫徵入太醫院尋丁聵齊喪歸終制遂不復出晚年禮部屢移趣為用終不行性詳雅好古敏學御家勤肅嚴內外奉身儉潔翛然軼塵暇輒閉户翻閲研訂故藏及經方方術無自逸斯其務儒之著者也初自號杏圃吳令文天爵嘗餽之鶴更號欵鶴中歲用例受仕服以正統戊辰五月十八日生正德辛己二月草二日卒享年七十四母嚴氏繼母谷氏娶范氏生一子早夭繼娶錢氏子男二長曰榖禎國子生次曰榖祥縣學生祝氏胡氏二子婦也女二長適吳健早寡次適吳淞而卒孫男二長立賢聘張次檜孫孫女五長許嫁陳其第三許沈其餘皆幼二子以嘉靖壬午十二月草四日葬君吳縣靈巖鄉橫山桃花塢新地鄰於家塋之右銘曰士也願兮為行欲嘉而及欲遐而世欲華猗萃其躬而以亢其家大隧之融融兮往見先以無忝若夫無不之也無不之也而耿耿焉者將大芘以振其來於無涯矣乎王君欵鶴墓亦在桃花塢王氏復墓記劉纓𢎞治十三年夏四月長洲王觀惟顒得復其先世之墓於郡西靈巖鄉橫山桃花塢念其失之久而得之囏思貽示其後人乃磨石請豫記而刻之豫交惟顒久且深知之實真乃詳述其顛末云王氏之先出漢隱士霸魏晉中名德奕世不可勝舉自坦之以後居江左晉室既東有避地遷閩者遂為福清人逮唐咸通間曰棨為尚書水部郎其後世不乏賢至宋曰仲舉字聖俞則著作郎程門髙弟蘋之父也以著作貴贈奉議郎實始遷吳郡政和元年二月九日卒以其年三月二十二日葬於此地事見江司諌公望所為志本朝盧舍人熊作府志具載冢墓條下且謂其從孫浙西參議大本大本從弟大成大成子楙並祔焉蓋宗其尤名者言也著作既以通儒髙節大著於南渡之初後來族益蕃阜而承引得人修於家顯於朝政學隱行粲然相望而凡其先之居室邱壠亦相與紹承不替以逮故聵齊處士敏字時勉益宏拓之蔚為三吳之望初數百年來族之葬者不一其地橫山之塋雖時祀繼修而圖乘所傳若所謂北墳若參議墳若名安人墳若南墳若新墳者咸在其所謂大墳及二十官人墳六孺人墳則曩以兵戈之擾後遂迷失蓋諸墳雖皆在一塢中而各以為封樹故耳於是聵齊廣詢詳究於田甲墓丁若山之老耆歷歲始知之真蓋為鄰壤朱氏所并久矣朱之顯者曰天錫自中進士來吳聵齊即造白求復之不許及其仕柱史時觀以墳山等圖郡墓等志託豫與詳諭之天鍚尚未決後轉蜀憲觀又纍求勿果從後天錫以致仕過吳觀乃持圖譜志乘與之論辨往返數四昭彰可徵朱始詞服焉乃舉而歸之立劵述故以為復據於是所謂大墳者復還於王實即聖俞之藏而王氏始葬之祖也嗚呼豈偶然哉昔者魯失寶玉大弓而復得之孔子作春秋特兩筆之夫二者獨先君之藏物故其失其得有以為後人之勸懲而聖人致之意焉矧我先祖遺軀之所托耶又况失之久而得之囏巋然無恙魂安魄寧而今而後松楸蘩藻展省不衰不亦善乎故為記之俾其來者知惟顒父子之志之力允為王氏之孝子慈孫功德兼盛尚相與謹守嚴護以欽於世世羣相勉為孝子慈孫以無忝其祖考尚有望焉是為記賜進士第中憲大夫都察院右僉都御史奉敕巡撫四川兼提督軍務郡人劉纓撰賜進士出身嘉議大夫南京都察院右副都御史前翰林庶吉士刑科給事中長洲陳璚書丹賜進士出身通議大夫都察院右副都御史奉敕巡撫山東地方長洲徐源篆額𢎞治十四年歲在辛酉冬十月朔旦十二世孫觀立石王氏復墓記碑隂祝允明王氏居吳最久且顯儒通文業宦積功醫大之於忠孝細之於方術五百年來不匱而方滋盛矣哉其德慶坊之居第桃花塢之塋兆皆即宋代之遺也頃者徵君惟顒又得復其先邱之中失者知者皆為之喜而中丞劉公大書之石矣豫固辱世契又姻連也知之尤詳惟中丞公之墳主在復地故所叙未悉其餘乃為列諸其隂曰所謂大墳者其封有五蓋七奉議府君仲舉與配方著作蘋之先配蔡十八儒林府君大中與配陳也二十官人墳者在路家山其封五八府君蘩與配吳二十府君大方與配方百三十府君霦也北墳之封四十一府君蕰與配徐楊袁也參議墳之封二十一參議府君大本與配陸也石安人墳之封一在鄭家墩即安人乃參議之先配也南墳之封四十三府君大成與配趙乙講書府君楙與配葛也六孺人墳在參議墳後六府君之姻與配郭即孺人也新墳之封二十有三承節府君德文與配周雲嶠府君敄與配楊電目府君仁美與配李君顯府君廷貴與配任君善府君廷吉與配徐一伯康府君利賓與配顧二光菴府君國楨三彥常府君嘉賓與配宋五文玉府君瑋與配陸一府君祥與配張知分府君寬與配沈及佐莊諸子孫皆祔焉而政則祔於石安人墳之傍也凡此皆舊地也其外於合又有四封二聵齊之女兄與繼配也曰三節推墳之封一節推泰也曰三娘子墳之封也節推先配文而其諸殤則各有所依祔也凡此皆新地也而皆在一塢惟顒又别購地數畝曰全邱其間將俟百年之藏焉嘻舉吳中塋兆之久且蕃而能善守復如王氏者果多見乎哉宜中丞公之特筆昭眧也凡所以美今而勸後者已備豫無以加贅惟述此以垂示庶覽者如指掌勿迷云耳至於諸封之域址坐向殯祔歲月具在圖乘志銘藏其家惟顒名觀聵齊之季也𢎞治十八年歲次乙丑四月望鄉貢進士姻生祝允明撰并書篆王氏諸墓在吳縣橫山桃花塢詳見劉尚書纓祝京兆允明復墓記并碑隂明故太醫院御醫致仕張公墓志銘祝皓成化十九年十月草七日致仕御醫張公以高夀令終於家鄉之縉紳逄掖耆英碩彥下至里巷耄倪緇黃士庶匍匐赴弔者源源未已而公之子壻乃合其羣從圖舉大事以公女兄之子太守盛君為狀託其孰賓陳君世本引諸子姪過豫謁銘顧惟耄荒無能為役然念公平時每以夀藏之銘見托雖諾而未果今可以存亡易心哉遂為書之公諱豫字至和姓張氏别號恆齊其先汴人有諱彥者仕宋為和州防禦使以兵鎮吳因家於蘇之長洲又三傳至端禮始以醫名生應元嘉興路官醫提領生元善字性之江浙行中書省官醫提舉階保冲大夫卒中書左丞周伯溫銘其墓稱以醫名儒行君子公之曽大父也大父文叔父希文永樂初徵入醫垣三使海外歸自號怡老翁卒巡撫尚書周文襄公銘之稱其學博理明重義輕利其室人陳生三子公其仲也自幼岐㠜凝重屹立如山早從陳太史怡庵讀儒書精義理及閲朱丹溪傳見其由醫入儒慨然慕之曰吾本醫家可自悖哉繼志述事分當然也於是悉取醫門諸書晝夜研究日有領悟而未敢自恃及怡菴歸析疑辨難沛然無滯出以濟人輒收竒效由是請求者門無虛日公既道行益修行檢未嘗緣幸㑹以邀功乘危急以射利琴川大姓錢公達患背疽日久惡證悉見諸醫環視莫措公指之曰疾雖危蓋誤爾非本病也宜大補元氣猶有生意其家歡幸指廩以酬公笑曰吾治疾來非索也疾愈公達婦翁都憲吳思菴親為文張之而公則一以利濟為心未嘗藉此以貧富是計故於顛連無告之疾尤惓惓拯治至或助之薪米以紓困者且曰吾非沽名在治法當然爾景泰間東南水疫大作米價騰湧錢法阻滯道殣相望行旅斷跡公曰此天時天患非藥石可濟古謂上醫醫國者非其時乎乃出餘積減價疏通又煮糜作槥濟饑掩骼助官賑恤上下賴之因而應格冠帶天順初徵天下名醫近百人萃京師拔其尤者止七人而公居首遂入禁近擢御醫賜敕命錫賚駢蕃譽望赫奕一時名公巨卿往往相親以圖康濟而公則以年當休致日就龍鍾屢疏乞身久而得請南轅之日都下相知靡不失望及其懸車鄉之故舊則又莫不歡欣慶幸而四方求請者益衆公亦不以倦勤拒焉蓋公平生學術濟時活人者不可數計而計其術之精妙者則不可逸而不書公在京時通妙邵真人求公診脈公驚曰不出六日法當中風時邵固無恙越六日如其言又視太醫院使董君傷寒病愈而脈未平語其故公曰防四七日已而五日死又診俞司冦風疾衆云不治公曰可治然必遲而後藥力多乃可已而藥至百服愈此皆由公學力之至察脈之精而研幾之審故凡於病如燭照數計而不􅐩毫髮也况其篤於仁而勇於義濟之以有恆之心哉斯無愧於古人無忝於家聲也公生於洪武庚辰四月十九日享年八十有四配顧氏二室王氏子男三長淮卒次曰沐曰淳女六孫男三楠杞楫孫女五韓襄朱繼闕焸陳膺欽沈時澄其壻也沐等以公卒之歲十二月草五日甲申扶柩葬吳縣長洲鄉茅塢山之原銘曰醫稱仁術肇古聖神鄭重立教用濟生人世降俗湔名浮利勝率意任情民斯不幸侃侃恆齊恪守真傳濟之以仁功臻十全既光其先復昌厥後自天佑之俾登遐夀長洲之鄉令終歸藏不亡者存系此銘章張豫墓在茅塢山吳中名醫也其兄飬正名頥與王敏齊名仲兄醒菴先生墓志銘陳完嗚呼完尚忍銘先生之墓邪念吾文學以傳自宋歷三四百年以至於今不絶吾兄弟五人皆承服風接之者中歲兄三人皆早謝獨先生與完白首同聚嗚呼今先生巳溘先朝露逝矣痛矣完又何忍不銘先生之墓邪先生諱寬字孟賢陳姓也醒菴號也其先家蜀與宋文忠公堯叟同祖堯叟從父諱鄴始徙南康之都昌七世至諱篆登宣和進士歷官左朝散大夫明州通判再徙星子篆生永州推官凖有别墅在石屋間講學時考亭朱子知南康為寫石屋書堂凖生池州通判秬常師朱子習義理最精事載郡志秬生靖州判官哇哇生霦霦生咸淳貢士洽洽生元翰林待制全全生徵號天倪受學臨川吳文正公得所指授又徙蘇之吳縣徵生濟南府經歷汝言汝言生翰林檢討繼先生之父也先生幼穎異讀書過目即成誦既長益力學先生性嚴毅教訓甚篤凡天人性命之奧禮樂名物度數之詳得於耳提面命而㑹於歸由是清譽勃勃然動人口矣母金孺人殁先生執喪哀毁過禮父官翰林走省侍之時南郡楊少保見而竒之曰他日獨步東南及還士林爭延師席以不得為歉郡守朱公建社學禮先生為師出其門者皆為名士東吳能詩之士每以所業質焉先生㸃竄純纇莫不心醉而去楊尚書翥嘗語人曰陳孟賢卿雲甘雨也東吳之士將被其澤矣性好潔所居必焚香客至瀹茗論古今興亡得失及時務之宜其言雖簡而察其賢不肖遇之各盡其禮嘗勵後進曰士而貧多於工商而富當以廉恥自重不可干富者之門升斗之粟其孤風雅操過人逺矣好蓄古今書畫古器服古名賢巾服人望見之皆曰此東吳大老也故人評先生之詩其雄渾也則江海澄波涵容一碧其和平也則璜珩琚瑀鏗鏘殿陛之上不求似古人而未始不似也先生風神儀表眉目清朗器識冲逺國子祭酒陳公鑑嘗贊其像曰巖巖乎氣象之峻也坦坦乎履道之慎也文以承詩書之𦙍也坐擁皋比階環襟珮挹後塵以芳潤也蓋非忘世長往庶幾不見是而無悶者也議者不以其言為過初先生喪妻年未四十諸孤無依或勸其更娶先生曰吾見後母虐兒忍令吾兒蹈之耶終不聽人皆義之先生志足以立行才足以適用氣足以蓋世學足以明義嶷然獨任斯文之重不得沾一命君子惜之景泰中朝廷命纂修郡志所司徵先生總其事歲郡庠鄉飲禮賓必於先生郡自守令以下無不即其廬而禮之每宴朝貴獨先生布衣與焉年及耄無衰憊態將卒尚讀書與家人語自若投其書若將寐者遂卒時成化九年十一月二十三日也吳中賢士大夫皆弔哭之盡哀焉配施氏先卒子男三儀偉佶女一適吳容孫男六元鳯元鴻元卿元福元祿元勳女七曽孫男二貢選女一歲己已八月丙午葬吳縣薦福山之原所著醒菴詩集二十卷藏於家銘曰有吳詩派高楊張徐渢渢之音鳴於國初殷敦周匜以變於古卓乎醒菴膺紹其武諷諭抑揚渟蓄淵雅酸醎辨味以㜶作者淑於鄉邦不遺小子化雨之功固不細矣薦福之山松柏鬱靚有墳巋然過者起敬吳都文粹續集卷四十
