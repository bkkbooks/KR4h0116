body:
  text: 吳都文粹續集卷十七明錢穀撰祠廟園池第宅平江路新建三皇廟記牟巘三皇何所本始乎上古有天地人三皇越在無懷大庭赫胥氏以前寥乎邈矣攷易繫辭其惟庖犧神農黃帝乎盖與堯舜並稱焉而周禮春官外史掌三皇五帝之書則搃號三皇又與五帝並稱其書則三墳言大道是也月令迎五德所王之神各於其郊而祭之立春木德以太昊配立夏火德以炎帝配季夏土德以黃帝配則三皇祭法於五德尤爲可攷史記本不紀三皇以黃帝列於五帝而去少昊補史記者遂以女媧氏爲三皇之一非也煉石補天之類語多荒誕要不足信肆惟今日三皇之廟徧天下重祠敬祭固有所本獨以之設醫學置學官者何居夫一隂一陽之謂道生生之謂易自有天地則有隂陽有隂陽則有民物實理流行生生無窮故易以道隂陽天地無私布隂陽闡易道示人以象而已三皇無爲體隂陽周易道爲民立命而已伏羲畫八卦隂陽相生二四成八八卦成列象在其中因而重之爻在其中是時六十四卦巳具伏羲訖神農黃帝制器尚象自我作古爲之網罟耒耜杵臼爲之宫室衣裳舟楫服乘爲之書契市易門柝弧矢凡所以資民用而養其生至於送終過厚者皆有取於十三卦何莫非道也然能使之生而不能使之無疾則五德五運推氣之隂陽本草辨物之隂陽靈樞素問究病之隂陽凡所以療民病而全其生使不至於無妄嘗試者又有出於十三卦之外亦何莫非道也大哉三皇道貫三極德及四海而功施萬代是冝隆廟貌設醫學而置官師焉夫豈小之哉姑蘓名郡地大物衆三皇祠之始建因陋就簡神棲數瓦下盥薦弗嚴歳在辛丑郡侯岳烈公涖事之初首謁祠下瞻顧太息非所以盡尊崇之禮乃欲闢而新之因基址之窄此志未遂大德壬寅七月之朔風烈雨驟吳中之郡衙縣治寺觀亭宇悉爲摧毁即命工鼎剏郡治就移長洲吳縣附庸二邑翼其傍適有吳縣舊址之寛於是岳烈公乃欣然相地亟圖改作遂謀之縂管董侯章及貳佐僚屬皆是其議而賛其成乃官給吳縣廢址俾賦文屬役岳烈公首捐已俸崇象設爲之勸畫宫于堵某任某所某任某費皆讙趨之爰建大殿掲䖍妥靈前爲凌霄門次爲大門翼以兩廡殿後爲講堂東西各立四齋又爲教授㕔於講堂之東南繚以周垣前達於凌霄外臨衢道對峙兩井亭以濟道暍經始於壬寅之秋明年冬新廟成規橅宏傑輪奐華曜甲於諸郡屋凡五十三閒又市學田二百畆祭器靡不偹是役也皆出於郡侯主維是而教授苗寔又深體郡侯之作成職思其居發慮協力董視工役偹著勤勞用能期月之閒成此磊落事有他人視爲虚文積十𢾗年不能辦者可謂難矣今郡侯既受替遷郡掌醫又垂滿解篆有恒齋葛應雷繼其任前爲提領日親承郡侯之命相與協贊勸率衆醫助田今又受任于學視其創始之有闕者必補之未偹者必完之勉勵諸生講明醫義務在濟人庶廣好生之德而無負作新之意新郡侯瑪蘓庫喜功之有成於廟之東南壘土成阜作亭其上扁曰聚逺以快登覧㕔事之前甃亭爲臺禆暑露坐以便講習闢治花圃進修之暇以寓游息亷訪僉事阿勒達覩前後興學之功而嘉之謂當勒石以示永久必徴記於陵陽牟巘以病耄爲解弗獲乃考三皇號名祭法與其用易之道謹書之厥初三皇取法自然開物成務與爲便安神化變通民日用而不知南面無爲而天下已治矣一毫智力靡容其閒設以悶悶求快吾意今日出一令明日立一法朝夕召集其民而繩督之則上下勞敝失其故常雖欲爲摽枝野鹿逰於混沌之天不可復得正如無病之人嘗試無妄之藥藥氣擾於鍼砭粱肉奪於湯劑隂陽舛忤而人始病矣不若勿藥之爲愈也昔人謂誤註本草其害大誤註易其害小夫豈知本草之誤其害止目前易之誤其害及天下可不謹乎因附見其説覧者或有取焉大德十年七月望日記故三皇廟在流化坊内即舊吳縣治也元大德五年乃移縣治於本路儀門西偏而建廟於此常熟州重修三皇廟記伏羲神農黃帝世謂之三皇以其繼天立極教民以相生養之道有大功德於民故凡君天下者咸報祀之方今因前代之制郡府州縣皆立之廟既設醫官以典其祀且詔長吏嵗時率僚屬行奠謁焉常熟初未有廟延祐丁已監州多爾濟始即州治西北若干渉虞山東麓度其地而剏之後二十年知州王侯侃一嘗修舉廢墜又二十年而處兵變流亡之士卒舍之庌馬者趨之烟火相接風雨交摧齋室堂閣鞠爲瓦礫而殿廡亦皆脱落湮蕪守土之吏莫之恤也至治壬寅冬十二月海陽盧侯以守禦元帥兼知州事慨然嘆曰爲治之要在政與教政惟民安教則必專聖賢與禮樂焉三皇孔子皆命世之聖也今學廟墮而弗治其何以爲教之地乎由是首以巳力大修儒宫越明年又勸士民作新是廟時儒氏趙復特承侯志命工傭力掄材運甓由重門兩廡以及禮殿朽者易之剥者飾之圯者培之傾而頽者悉起而正之又造候官之屋凡八楹于㦸門東西繚以周垣前後翬飛丹堊交映自秋徂冬而功告成於是神明有居祀享有具醫師有容齋宿有所而侯尚教之心盖庶幾矣既而侯以内艱去職攝醫學教授陳君仲明徵文以記之予惟三墳之書首言大道開天地之經立民物之命聖聖相傳一本於是奈何世亡其書遂以爲隂陽醫家所宗徃徃視祠宇爲文具而不之嚴吁是果知尊三皇者哉然則盧侯起身汗馬乃能一興孔子之教崇之信賢也已盧侯名鎮字子安其遺愛之在民者不繫於是故不之書按常熟縣三皇廟在縣治西北招真道院之東嘉定三皇廟記柯九思古之祭義思本而報始故法施於人能禦大災捍大患者則祀之今醫家者流以神農氏之制藥也推本而祭之國家稽古考文併置三皇之廟以勾芒祝融風后力牧配而附醫學焉三皇名數先儒所説各異然著見於易者謂伏羲氏沒神農氏作神農氏沒黄帝氏作安國亦云伏羲神農黄帝之書謂之三墳此三皇之明文也漢祠黃帝用梟破鏡唐天寳六載三皇併置一廟有司以時祭享後周以來藉田祭神農氏此厯代祠祭之典也嘉定州舊有廟學至元後六年大梁李侯壽孫來知州事李侯爲趙國忠憲公字清臣之後忠憲之忠勞於國家史牒有傳侯涖官治民亷直而明有忠憲之遺風故於國家之事無巨細悉盡其心視事之初謁三皇廟顧瞻殿宇風雨穿漏凛乎將壓門廡傾圯論堂湫隘像設弗嚴器用不具侯瞿然曰此命祀也其何敢弗恭事事然今水澇爲沴民力未瘳奈何越三月政行化理民俗和恱侯曰可矣乃屬州人士之好義者以修葺廟學之意衆奉命懽趨論堂之後得王氏地闢而廣之侯曰斯廟建於泰定天厯之閒未及乆而巳廢壞是皆前人滅裂之過今也基必堅材具必良惟永乆是圖毋或貽誚於後人如今者之責曩昔也侯日治州事畢必至廟所循撫而程督之興工於至正元年三月甲子六月而畢嚴䆳壯麗䕃以修木繚以周垣其有加於前人矣㑹民有隱斥塹者自歸于官侯命籍而屬之學以供粢盛廪餼爼豆之用於是廟學之事無或不供者矣夫侯先成民而後致力於神則冝四境之内政無不舉由此仕宦而顯於天下忠憲之世爲不墜矣州人請記其事刋諸樂石故不辭而爲之書其好義所助者併刋諸隂奎章閣學士院叅書柯九思記按嘉定三皇廟在登平橋西元泰定三年建崑山州重修三皇廟記許規五稽古鴻荒之世人文未開蚩蚩之氓與鳥獸爭一旦之命不有聖神出而立人極焉生人之類滅巳久矣毛茹而血飲也爲之庖厨巢居而穴處也為之宫室畫卦以通神明之德造契以代結繩之政爲之耒耜以厚其生爲之醫藥以救其死造律厯垂衣裳以開萬世之治其有功於生民甚大廟焉而棟宇撓祀焉而籩豆缺豈教民報本之意哉崑山三皇廟自州治遷後日就隳廢至正十九年州治復還承制以石君賢同知州事奠謁之初顧瞻太息退而謀諸知州費侯侯曰世事草創百廢宜次第舉三皇建極之聖今廟宇崩摧神像暴露國家崇奉之意安在耶冝舉所冝先費侯是其議亟共捐俸爲倡醫流義士翕然和之不数日得錢若干緡米若干石召匠度材以工給其役以吏董其事不数月殿宇之顛覆者隆然起兩廡皇門之朽敝者翼然張堦墀磚級之陊剥者整以宻像塑丹白之澷漶者煥以新所謂人存政舉其以是乎夫張弛繫乎理不係乎時廢興由乎人不由乎数有爲者何所施而不可也學有田若干蕩租若干册籍迷失無所考石君為追究歸之學祭祀饘供之用於是乎不窘矣廟成石君去費侯曰石君之善不可没也徴予文記之余讀邵子經世書至皇帝王霸未嘗不廢書而嘆也皇以道化人民霸以力服人世降俗漓古道茫昧崑山之長獨修舉廢墜而以皇廟先焉其薄利功以尊道德者邪其知報本而善教民者邪詩云有斐君子終不可諠兮後之人庶乎尚有攷也費侯名復初字克明東平人石君字安卿西夏人至正二十三年夏五月望日平江路崑山州知州偰傒斯同知州事郜肅州判丁克明提控案牘趙從周都目謝𢎞道醫學權教授許曄教授許規五撰饒介書余銓篆額按崑山縣三皇廟在縣南闉坊西改修吳延陵季子廟記蕭定有吳之興也泰伯讓以得之有吳之衰也季子譲以失之爲讓之情同而興衰之體異何哉泰伯之讓讓賢也故周有天下而吳建國焉季子之讓賢以讓也當周德之衰而吳喪邦焉或曰非所讓而讓之使宗祀泯絶而不血食豈曰能賢斯可謂知存而不知亡者矣夫治亂時也興亡運也故至至而不可却終終而不可畱黃河既濁阿膠無以正其色鹽池斯鹹弊箅不能匡其味與夫當濁亂之世召力勝之戎讓與爭孰賢乎易曰知幾其神則季子之見可謂知幾矣季子之明可謂知進退存亡而不失其正矣至於聽樂辨列國之興亡審賢知世数之存沒掛劒示不言之信避國保無欲之貞故有吳之祀寂寥而延陵之享如在𤣥風可想至德興嘆美之辭哲人其萎表墓著嗚呼之篆向微德仁兩至則夫子不復嘆美焉其精義被物鈎深致逺之旨烏可究其津涯而窺其牆仞哉是知譲之爲德在於生靈不獨其子孫明矣國有祀典人懐永思定忝列藩條欽崇懿範于以加敬嚴乎閟宫别閨壼之内外正衆神之序位舊以泰伯之廟在於姑蘓臺而制季子之祠像設東面非由典禮諒無取焉必也正名於是乎在祈報獻奠贄幣冝列於軒廂春秋禮薦俎豆當陳於正寢俾觀像者識賢人之遺風可律審度者知經德之禮秩無差末學陋辭不足頌其休烈寒來暑徃敢用同於紀年大唐大厯十四年歳在已未八月戊戍朔二十七日甲子記辟疆園高啓江左風流逺園中池館平賓客久寂寞狐兔自縱橫秋草猶故緑春花非昔榮市朝亦屢改髙臺能不傾題辟疆園周南老晉顧辟疆園中吳稱第一林石萃幽怪勝槩少儔匹遺跡今無知品題存簡帙清景付明晦皮陸曾紀述後先幾百年盛衰成兩失慨彼樂有時每憐魚鳥逸辟疆園自西晉以來傳之地館林泉之勝號吳中第一辟疆園姓顧氏晉唐人題咏甚多陸山人樓亭即戴顒宅儲光羲暮聲雜初鴈夜色㴠早秋獨見海中月照君池上樓山雲拂髙棟天漢入雲流不惜朝光滿其如千里游禇家林亭白居易聞健朝朝出乘春處處尋天供閒日月人借好園林漸以狂爲熊都無悶到心平生身得所未省似而今同前皮日休廣亭遥對舊娃宫竹島蘿溪委曲通茂苑樓臺低檻外太湖魚鳥徹池中蕭踈桂影移茶具狼籍蘋花上釣筒爭得共君來此住便披鶴氅對清風同前陸龜䝉一陣西風起浪花遶闌干下散瑶華髙忩曲檻仙侯府卧葦荒芹白鳥家孤島待寒凝片月逺山終日送餘霞若知方外還如此不要乘秋上海槎同前張貞踈野林亭震澤西朗吟閒歩喜相攜時時風拆蘆花亂處處霜摧稻穗低百本敗荷魚不動一枝寒菊蝶空迷今朝偶得髙陽伴從訪山公醉似泥禇家林亭范志云在松江之傍凌處士莊韋莊一簇林亭返照間門當官道不曾關花深遠岸黄鶯鬧雨急春塘白鷺閒載酒客尋吳苑寺倚樓僧看洞庭山怪來説得仙中事新有人從物外還和周伯温參政九日南園宴成廷珪歩履巉岩若跨鰲望中詩興與秋髙西山拄笏東山屐左手持杯右手螯返照入湖明塔影斷雲將雨過林臯松閒飲散歸來晩金粉霏霏濕錦袍范相南園五百秋重來訪古轉多愁啼烏樹老臺空在飲馬池荒水不流芹泮好從多士樂桂叢誰賦小山幽諸公髙㑹詩如錦授簡安能接勝游南園髙啓君不見平樂館古城何處寒雲滿君不見奉誠園荒臺無蹤秋草繁白日沉山水歸海寒暑頻催陵谷改皇天大運有推移冨貴於人豈長在請看當年廣陵王雙旌六纛何輝光幸逢中國乆多故一家割據誇雄强園中歡㳺恐遲暮美人能歌客能賦車馬春風日日來楊花吹滿城南路疊石爲山引泉爲池辟疆舊園何足奇經營三十年欲令子孫永保之不知囬首今幾時繁華掃地無復遺門揜愁䲭嘯風雨種菜老翁來作主空餘怪石卧池邊欲問興亡不能語春巳去人不來一樹兩樹桃花開射堂踘圃皆青苔何須雍門琴但今對此便可哀人生不飲胡爲哉人生不飲胡爲哉題南園周南老廣陵擬王貴據此南園勝豪奢及年冨樂只名實稱黃州欲歸老徒發功成咏詔賜蔡觀察寵㤙踰衮贈繼入循王家歳晏時難更只今圃已蔬風雨茅簷暝御書石湖二大字䟦范成大淳熈八年三月庚戍制書擢臣居守金陵閏六月丁亥朝行在所庚寅辭後殿翼日既望詔錫清燕苑中皇帝親御翰墨大書石湖二字以賜天縱聖能游藝超絶典則高古如伏羲畫體勢奇逸如神禹碑日光雲章垂耀縑素環列改觀禁籞動色臣驚定喜極不知忭蹈昧死奉觴上千萬歲壽奉寳書以出越五日至於石湖藏焉石湖者具區東匯自爲一壑號稱嘉山水臣少長釣游其閒結茆種木乆巳成趣春秋時吳臺其隂越城其陽登臨訪古徃跡具在汙莱露蔓千七百餘年莫有過而問者今猥以臣故徹聞髙清天光溥臨燕及荒野繇開闢來未覩斯盛裴度李德裕皆唐宗臣緑野平泉亦聲震當代揆今所䝉無傳焉何物么䯢獨冐寵赫百身萬殞莫能負戴臣蒲柳早秋仕無補益縣官尚晼晩不休奸止足之戒則將上累隆知俯愧初服臣用是懼冀幸少日遂賜骸骨歸老湖上宿衛奎壁與山川之神暨猿鶴松桂同在昭回中一介姓名亦因是不朽使後世知臣屬厭榮禄得全於桑榆以無辱君賜則陛下丕顯休命不委於草莽庶幾報恩之萬一臣既摩刻扁榜又被之琬琰以傳且附著臣之自叙云爾七月朔端明殿學士中大夫知建康軍府事兼管内勸農事提轄本府界分諸舖遞差充江南東路安撫使馬歩軍都搃管兼營田使兼行宫畱守吳縣開國伯食邑七百戸賜紫金魚袋臣范成大拜手稽首謹書題御書大字歌楊萬里石湖仙人補天手整頓乾坤屈伸肘爾來化作懶卧龍簸弄珠璣潄瓊玖五雲萬里天九重玉皇深拱蓬莱宫豈無九虎守閶闔北門半扉當朔風夜令雲師敕風伯鞭起卧龍湖㡳月湖水巻上天中央却鎖北門䕶風雪仙人馭風乘綵雲玉宸殿上朝帝真帝將北斗酌天酒冰桃碧藕脯麒麟傳呼玉蜍吸銀浦黟霜調冰澆月洒成羲畫河洛書白璧一雙浮雨露石湖二字天上歸奎章璧宿落山扉昭回不飾吳苑草姑蘓臺前近太微詩人不直一杯水自是渠儂命如紙教人妬殺石湖仙手攬星辰懷袖裏懷石湖舊隱范成大浩蕩沙鷗久倦飛摧頽櫪馬不勝鞿官中風月常虚度夢裏關山或蹔歸橘社十年霜欲飽鱸江一雨水應肥冷雲著地塘蒲晚誰爲披蓑煖釣磯説虎軒夜坐白雲深處卧癡頑挂起東忩水月寛但得好詩來眼底何須寳刹現毫端一身莫作官身想萬境都如夣境看蠏舍隣翁能日醉呼來分與一蒲團北山堂開爐夜坐困眠醒坐一龕多竹洞無關任客過貪向爐中煨榾柮嬾從掌上看維摩閒無雜念惟詩在老不甘心奈鏡何八萬四千安樂法元無祕密可伽陁檢校石湖新田今朝南野試開荒分手耘耡草棘場下地若干全種秫髙原無幾漫栽桑蘆芽碧處重増㟁梅子黃時早濬塘田里只知温飽事從今抛却半年忙石湖别墅在縣西南十二里參政范成大剏因越來溪故地隨地勢髙下而爲亭榭别築農圃堂對楞伽寺孝宗御賜石湖二大字又有北山堂千岩觀天鏡閣玉雪坡錦繡坡説虎軒夢魚軒綺川亭盟鷗亭越來城等處以天鏡閣爲第一一時名人皆爲文詞明道八年周益公過之畱題壁閒云吳臺越壘距盤門才十里而陸沉扵荒烟野草者千七百年紫微舍人始剏别墅登臨之勝甲於東南豈䲭夷之成功於此扁舟去之天閟絶景須苗裔之賢者然後享其樂邪成大愧謝益公曰吾行四方園池多矣如薌林盤圃尚乏此趣非甲而何李行中醉眠亭蘓軾已向閒中作地仙更於酒裏得天全從教世路風波惡賀監偏工水上眠君且歸休我欲眠人言此語出天然醉中對客眠何害須信陶潜未若賢孝先風味也堪憐肯爲周公晝日眠枕麯先生猶笑汝枉將空腹貯遺編題醉眠亭蘇轍是非一醉了無餘惟有胸中萬巻書已把人生比遽傳更將江浦作階除欲眠賓客從教去倒挂氍毹豈暇舒京洛舊時真夣裏秋風無復憶鱸魚醉眠亭宋李無晦作無晦名行中居松江高尚不仕東坡兄弟嘗過訪畱題元豐辛酉冬予解組歸吳明年過故同年朱光禄之舊居周覧園榭感事作詩以詒伯原元絳白頭重到故人家境是人非起嘆嗟三徑未荒陶令菊四時長放庾郎花林風光動藏鶯葉溪浪痕生宿鷺沙肯構有材移病久㑹憑詩酒傲烟霞次韻厚之少保題伯原秘校亭程師孟少年爲學已名家纔折丹枝病可嗟節帶冰霜凌萬竹文含風露麗千花世憐美玉猶存璞人恨良金未出沙賴有隱居如谷口直將髙意撫青霞君家幽寂似山家聞者其誰不見嗟閉户幾多閒日月掃園無限舊烟花書忩燕坐琴橫石吟徑徐行杖卓沙壁有謝公題好句國人方此識餘霞碧瓦春城十萬家可憐夫子獨堪嗟林園猶有前朝木冠盖難尋故主花園乃錢氏所剏亭瞰夕陽鄰古刹池通野水見晴沙天然操尚無塵滓合徃蓬莱弄彩霞校書朱君示及園居勝槩新篇一軸皆有標目輒成長調格詩奉紀清䠱盧革姑蘓右浙㑹園榭森相望之子脱名瑣自放無何鄊虚堂布遺經䆳經堂周孔之文章靜齋播風雅詩齋絃音日洋洋吮毫濯曲溪筆溪泚墨散芳塘墨池抱琴獨登臺琴臺望山閒渉岡釣渚關游泳竹路排青蒼竹路亭幽小勺迥渚亭橋紅白相低昻衆花卉予此謝病歸旅吳歳月長常聞君園勝欲徃兩足僵開緘味題咏恍若披圖詳吾聞玉川子破屋洛之陽東野廢官守止坐叢瀨傍豈如吾子樂游息藹有方朝廷日清明百度良弛張子既難其進論撰亦有光退之謂子厚窮久道益强文辭煜垂後將相未可當窮愁乃著書心志能渾剛倘來奚足䘏令名期自將樂圃林館張適何處是吾廬城西數畝餘坊存前哲號屋貯古人書巳疾親栽藥供飱自灌蔬長年因謝俗戸外少來車其二林密簾櫳暝門清樹石連含香乘雨霽壓酒及花前嗜古思先輩傷今話昔年何由清鬱抱春茗瀹林泉其三園池雖市邑幽僻絶塵縁水活元通港荷稀不礙船竹隂迷藥竈雨氣慢琴絃試理牀頭稿新來益幾篇其四結屋渾依水爲扉半是柴雨紅花落檻地碧蘚鋪階去住梁閒燕公私水際蛙清遊多感慨濁酒始開懷其五方池居圃右幽隱足遊觀疊石花成岸塗丹曲作䦨鵞遊同腕法鶴舞按琴彈清事無時廢歌成擬考槃其六林深招鶴磴地僻見山岡蘿舞春衣緑梅飄臘雪香晩岑畱日露歸翼帶雲藏吟客談詩散充然思不忘其七本是林泉質功名分定慳文章新中綮貧病暗偷顔林鶴心同潔沙鷗迹比閒青燈風雨夕無夣到朝班其八境勝愜栖遲殘尊晩更冝主人因苦咏座客盡能詩令負桮來密聨遲句出竒夕陽在髙樹醉首只低垂其九庭前新種石恨未遇奇章薜荔藤牽密芭蕉影過長坐常忘洒掃對久引壺觴歳晩誰爲侣蕭蕭雪後篁其十登堂無俗物結納豈恒徒小幀藏雲樹昏屏過雨湖書銘臨瘞鶴絃調寄啼烏為樂無他志塵囂覺異途余舊業在城西隅樂圃朱先生之故基也樹石頗秀麗池水迂迴儼有林泉幽趣余亂後多郊居至辛亥春復返舊業二首園池春至凍全融𤣥館穿林路亦通忩響檻前含竹雨座香簾外落花風一餐幾駐縁詩癖萬感都忘是酒功逸思不因貧索莫長時邀月弄梧桐軒居巷陌是通衢流水林齋景自殊寄紙每因人索畫打門豈有吏催租風篁苔石皆詩料吟子琴僧盡酒徒幾度緑忩臨帖後醉眠花外聽啼鴣和甘白先生樂圃林居二首倪瓉闗關幽鳥緑隂穠林麓陂池曲曲通荷雨逗凉侵北牖汀雲度水逐南風清琴詠雅寧諧俗濁酒消愁似有功聞道秋來偏起早一簾晨露引梧桐竹裏㕑齋栁下衢幽林風景自應殊家無擔石惟憂道鄰斷炊烟急索租山水徜徉聊足樂雨雲翻覆豈吾徒蘧蘧曉枕天涯夢楚水湘雲叫鷓鴣宿樂圃林居暮投齋館靜城郭似幽林落月半牀影凉風孤鶴音汀雲縈逺夢桐露濕清琴喧卑淨塵慮蕭爽集冲襟十六日新凉戲呈甘白閒静幽人宅蕭條樂圃亭炎暑浹旬劇逺山當戸青凉生如病瘥愁解如酒醒卧看風篁影落月滿堦庭予來城郭暑氣熾甚偶憩甘白先生樂圃林居不覺數日相與䕃茂樹臨清池誦羲文之象爻弹有虞之南風遂以永日忽忽巳淹畱久趂閒成此二詩冩呈甘白以寓笑樂耳甲寅六月十六日過張水部樂圃林館髙啓清和池館閉閒苔輕幰尋幽觸雨來井桁水聲繩作轉牀屏山色畵初開穿花百舌深緘口吹絮霜鱗半露腮好賦一詩題壁去主人未肯便塵埃題樂圃林館林塢通幽闃山明雲出溪門無俗客至池有水禽啼對酌山花下行吟野竹西石牀春寂寂苔色映青藜其二開軒時野眺山色翠迢遙屏結霜中檜圖開雪裏蕉暖烟初扇圃野水欲平橋曳杖閒來徃時挑酒一瓢其三幽居無洒掃風景自翛然紅濕花間雨青分柳外烟山忩捫蝨坐石榻枕書眠自得閒中趣栽花疊錦川同前陳林桃花夾林館宛似武陵溪醉後抛書枕夢回聞鳥啼水光孤墅外山色小橋西盡日無來客徐吟信杖藜其二見説林居好終朝無雜賓捲簾通紫燕投餌釣金鱗林影雲連榻楊花雪㸃巾開池飬鵝鴨不使惱比隣同前謝恭故人非傲吏舊隱勝愚溪塵世人難到空林鳥自啼青山縣榻下緑水斷厓西終日無餘事全家盡食藜其二門徑稀人跡幽居只自然泉聲三月雨柳色半池烟水檻看鷗浴山忩見鹿眠題詩花墅夕明月滿晴川樂圃舊爲朱長文所居元末張適號甘白築室於上題曰樂圃林館與髙啟倪瓉陳林謝恭姚廣孝賡和爲十詠國朝宣德間杜瓊得其東隅地名爲東原結草爲亭曰延緑又有木瓜林芍藥階梨花埭紅槿籓馬蘭坡桃李溪八仙架三友軒古藤格芹㵎橋凡十景一時名流俱有詩重建延綠亭記吳寛成化八年七月吳郡大風雨鹿冠老人杜先生延緑亭壞焉明日雨霽先生曵杖遊于園中茅茨既摧梁木亦折垣墉且阤竹樹盡偃顧而嘆曰噫嘻亭壞矣殆天意邪雖然獨不有人力乎二子啟咨知其意遂相與召匠氏築之既成邀先生坐于亭上則摧者完折者固阤者立偃者起盖不日而舊觀還矣先生喜曰天意殆欲新吾亭邪他日乃以書來京師謂寛冝有記寛聞大道之世烈風不崇朝驟雨不終日而昔者之風雨也胡爲乎來哉果天邪亦由人邪吾何從而問邪問之人則人非天也惡乎知問之天則天非人也惡乎答既足以惑亦可以憂盖余之居於是而去吳下也逺雖未嘗目擊其變顧其事理有可得而推者故嘗以先生之一亭觀之則四野之外弱夫貧婦其繩樞甕牖豈無有不勝其震凌而相對以怨咨者乎又以先生之一亭前後推之垣墉阤矣則疆畎之欲修也勞乎力竹樹偃矣則禾稼之不登也乏乎食而弱夫貧婦又豈無不勝其沮洳而相對以怨咨者乎當此之時亦有如先生之二子築而新之者乎是固可憂也夫先生隱者知一亭而巳不暇此憂而余亦不敢以此告然而未可知也杜少陵茅屋爲秋風所破歌有安得廣厦庇寒士之語先生少陵之後人也而老於詩爲其後學其學則遇其變獨不憂其憂乎因書以諗於先生不識以爲何如定軒記劉爚震澤楊公以定名軒予謂定一也而有老氏浮圖氏之定未知公之志果奚所屬也自儒者言之則大學自定而靜静而安安而慮慮而得其寂然不動者正所謂感通之體也自二氏言之則其所謂泰定所謂禪定者兀然枯槁而已爾漠然清虚而巳爾人之一心與造化流通者以其徃來闔闢之不窮動靜出入之俱妙也今以兀然漠然者爲定則是無用之體不感之寂也其可乎公以敏達果鋭之材而爲明天子所任屬盖嘗屏上㳺䕶天塹開大幕府制置長淮而又法從近臣而總六師之職其志存乎立功其誼顓乎報主固非棲心無用者比也則其所屬必儒者而非二氏奚疑雖然定之難能也久矣自窮居獨善之士捐百事息萬慮以求之有終其身而弗獲者况於履功名之塗踐富貴之境凡爲吾耳目之塍心志之域紛至錯立於前菀枯榮醜可喜可駭者日百千變其亟疾若破山之霆其震蕩若發屋之風其眩亂反覆又不啻以一葉之艇而舞翻空之濤甚矣哉定之難能也若是者其疾焉在曰心無主而已矣竊嘗聞之敬則心有主而物聽命不敬則物爲主而我從之古之君子對妻子猶君師之臨處幽室如十目之睹所以養吾心而爲萬物之主也心有主然後有定見有定見然後有定力酬酢萬變無不可者是則儒者之定而公之所志也夫理有定而事無方隨事以應之使各通其可即所謂定也若乃處義未精而猥曰吾守之不可易是直私意之錮爾烏足語定乎哉故主敬窮理交相爲用東魯西洛之正傳有不可誣者公之大父紫微公受學於伊川之門人爲先朝侍從公之所學自其家世且方嬰繁劇而不亂遭變故而不懾其於定之一言用力深矣顧何足以發公之志姑誦所聞以復命云權工部尚書兼太子右庶子兼右諭德建陽劉爚記定軒在震澤鎮宋工部侍郎楊紹雲所居有桃源洞廣數畝異石林立劉文簡公真文忠公皆有著述遺址猶存樂庵初成二絶李衡老子平生百不足庵成那管食無肉終朝閉戸只讀書四面開忩都見竹投老庵居百事冝早眠晏起不論時更長睡足披衣坐傾耳林閒聽畫眉樂庵在崑山圓明村宋侍御史李衡彦平歸老之地四傍皆修竹經籍圖史滿堂共樂堂黃由纔到松陵即是家滿堂佳客滿園花看花揖客須清賞休向人閒俗子誇聨德堂纔到松陵即是家便須洗盞泛流霞軟紅塵裏風波惡不似江艫與海槎茆堂觀弈纔到松陵即是家茆堂萬竹緑交加午忩睡起無他想坐看圍碁到日斜登明月臺纔到松陵即是家擎空皎月瑩無瑕自須臺上分明看擬欲呼仙泛海槎登擁書樓有感纔到松陵即是家樓高不管緑楊遮有書萬卷時翻弄千古興亡幾嘆嗟道院獨歩纔到松陵即是家參天檜栢古槎牙杖藜終日頻來徃不羡堤邊路築沙登三清閣纔到松陵即是家三清閣下寂無譁小臣媿乏絲毫報深炷爐香靜㸃茶入園纔到松陵即是家故園喜聽鵲楂楂主人只爲貪風月蠻觸交争笑爾蝸睦鄰纔到松陵即是家民間何處不桑麻欣欣老稚迎門笑斗酒相歡亦孔嘉無題纔到松陵即是家休論恬淡與榮華古來顏跖俱塵土自有時賢定等差思親纔到松陵即是家仙翁詩句發天葩鈍才不及賡餘韻留取時時罩碧紗盤墅黄由之别墅寧宗賜名内有墨莊胡夫人真跡三清閣共樂堂等扁由自作詩松石軒記鄭元祐昔夏后氏畫九州而青州有鉛松怪石之貢當是時未必有耳目玩好也儒先不能無疑於此焉以愚觀之玩好於時未必然然韶樂以球爲主故后䕫言樂獨於石則曰予撃石拊石然後言百獸率舞鳯凰來儀盖石音難和故磬必泗濱之浮今以靈壁所産石用以爲磬然非秀絶者不能有聲音之純故商頌曰既和且平依我磬聲然則怪石之貢盖必異於尋常也巳降自唐宋始以石爲玩好然後石之品益繁宋宣和間於物無不品定顧以太湖石品最髙唐李贊皇牛奇章二人相業雖不同其於愛石則一也中吳在宋爲畿甸至今荒園廢宅一毁於刼灰者在在有之若夫松之爲質棟梁榱桷無不可者至乃盤紐詰屈懸根獻秀始以松爲園池亭沼之觀玩今大參澄江朱公出搃戎機入贊朝政私第在吳城之正中沈深宏敞其客次有松有石左轄鄱陽周公扁之曰松石軒仍爲之作大篆以表章之矣大參公儗之於松則清廟棟梁也儗之於石則韶樂天球也賓至而燕集於兹語笑于兹挹松之堅貞攬石之秀潤其所以爲國幹播民和者夫豈尋常松石之謂哉松石軒詩周伯琦華清貢秀萃雙清石友松君宿締盟鱗甲髙鶱風雨合洞岩虗激珮環聲平泉官暇延遊盼緑野功成寄賞情誰爲澄江修郡乘好將勝迹播芳名同前蔣堂一桁湘簾細織紋軒窗清氣襲書裙盤枝月冷蛟龍骨蹲璞苔封虎豹文隱迹雅同真處士彎弓懸憶舊將軍由來柱石居廊廟况爾雲霄素策勲同前董晉愛此軒忩隔市㕓踈松偃蹇石嶄然瘦蛟匝地弄明月蒼翠拂闌生紫烟大厦棟梁真可擬中流砥柱若爲遷何人下拜清風裏不是韋郎是米顛同前成廷珪長松落落風塵表蒼石堂堂太古心屹立乾坤無改色叩之金玉有餘音人間兒女天機淺海上神仙野趣深獨有奇章知此意子孫清賞到於今同前饒介蒼松鬱鬱石嵯峨上下因依有女蘿虎魄凝流千歳少羊羣分跪一拳多所須爲地期相望遂以名軒示不磨賓客定如東閣盛或來醉卧或吟哦松石軒在吳城中參政宋廷珍之第軒前古松蛟騰怪石鵠峙鄱陽周伯琦扁曰松石有詩詠之緑水園雜咏序高啓吳城南陬有曰朱家園者父老言宋朱勔故墅也廬山陳惟寅氏得之更名曰緑水園中有池且用杜子美詩語也其林沼亭軒亦各有扁焉近雖破廢然寛閒幽勝猶可以釣㳺而嘯歌惟寅以余徃來其中最熟求徧咏之噫當勔以倖貴時窮尚豪侈園中之珍木異石崇臺嶢榭固當百倍於此文人詞客爲之稱美而誇詠者亦多矣今皆跡滅響沉無復可覩惟寅雖窮居隱約而能以詩書為業篤於孝友其清德雅撡固可以蔑視勔矣則余爲之執筆亦可以無愧焉因不復辭且庶幾或傳使父老知園之更名緑水者自惟寅始也詩凡十六篇緑水園宴集平居寡良㑹艱哉况兹時幸逢金閨英中筵接光儀名園過修禊景麗春陽熈緑芷榮曲沼朱華敷廣墀情宣寄髙文憂襟爲之披觴來不敢訴慮此朋歡虧何以淹返斾頽光願遲遲同前張羽芳圃逼江城迴波繞舍清主人擅文學過客搃簮纓適向吳中㑹何殊洛下英唐虞共敷講風雅用和賡矍鑠攻辭健鏗鏘得句精建安方合體大厯却徒名還展花前席仍敲竹下枰吟餘歌杕杜醉裏聽鶬鶊徑竹斑初脱庭蕉緑已呈渾忘在離亂惟欲盼承平蝸窟休圖隠鷄壇可負盟從容四美具感激二難并更願相加勉畱傳汗簡聲緑水園在孫老橋東故爲朱勔别墅元至正中廬山陳惟寅惟允兄弟購得之取杜詩名園依緑水之句更此名中有來鴻軒清冷閣蘿徑等名髙啟爲之序萬玉清秋軒郭登王謝堂中久不歸野田荒樹幾斜暉花開花落秋還在年去年來事已非楊柳風多凋翠縷芙蓉霜重溼紅衣故人空感山陽笛一段傷心畫影微同前楊溥社燕賓鴻共歳華松陵禾黍故侯家誰令千載柴桑里一度秋風一度花同前劉鉉寗公在昔稱時賢頭顱半白來歸田老懷澹泊慕幽雅髙居别築臨同川數畝園林占清勝四時景物誇奇妍賓從日盈北海座琴尊晩載南湖船一朝陵谷那知變廢盡東吳舊庭院扶踈修竹爲誰清零落芙容不成片白雲飛去不復來只有堂前舊時燕春深幾樹花亂開無復當忩映人面繁華事徃今巳休東牀老去懷舊遊歌舞重尋館甥處蕭索碧梧風雨秋陶令宅邊松尚在習家池上水空流追思自足生感慨何獨對此方爲愁六十年來駒過隙俛仰之閒已陳迹畫圖寂寞久無聞流落人閒匪朝夕客從何處逺持來佳致依然不殊昔夢回昨夜到松陵鐘斷長橋月初白萬玉清秋軒在吳江同里鎮元江南財賦司副使里人甯昌言之别墅中有菊坡梧桐修竹搃謂之萬玉清秋華亭張可觀爲之圗團溪魚樂記楊維楨至正八年二月月蕉瞿先生逢祥肥遁海東之團溪雲葉展空烟花膩陌予嘗循鳳溪而下歩自團溪之陽顧瞻周遭若環帶然地固卑而隘中有隱君子之風焉先生居是溪厯宋咸淳僅百五十年予觀東南若震澤諸水道經戚浦㑹歸於海風濤激蕩沙岸日崩走濱浦之人恒懼之而先生則弗懼且樂焉者溪之左枕市㕓障戚水以便商者右遡畎畞引戚水以利耕者乃若細雨侵沙波流若縠魚鳥浮沈天灮上下先生則投竿而漁凉月浸軒秋聲在樹子鶴和鳴人影相逐先生則援琴而歌於乎溪之樂人或見之而不知之先生獨能知而樂之可謂得性情之正矣團溪魚在沙頭鎮月蕉瞿逢祥隱居楊亷夫爲記東莊記李東陽蘓之地多水葑門之内吳翁之東莊在焉菱濠匯其東西溪帶其西两港傍達皆可舟而至也由橙橋而入則爲稻畦折而南爲桑園又西爲果園又南爲菜圃又東爲振衣臺又南西爲折桂橋由艇子浜而入則爲麥邱由荷花灣而入則爲竹田區分絡貫其廣六十畝而作堂其中曰續古之堂菴曰拙修之菴軒曰耕息之軒又作亭於南池曰知樂之亭亭成而莊之事始偹搃名之曰東莊因自號曰東莊翁莊之爲吳氏居數世矣由元季逮于國初隣之死徙者十八九而吳廬巋然獨存翁少喪其先君子徙而西既而重念先業不敢廢歳拓時葺謹其封濬課其耕藝而時作息焉翁仲子原博以狀元及第入翰林爲修撰獲以其官封翁朝士與修撰君遊者聞翁賢多為東莊之詩詩成而莊之名益著修撰君以謂予曰幸吾子之識之也夫人之業未有不勤成而侈廢者翁之爲東莊也承徃弊而修之懇悃劬瘁厯數十年然後備亦既艱矣而翁又遵道畏法雖處富貴泊然與韋布者類則所謂保其業者豈茍然哉易曰幹父之蠱有子考無咎厲終吉由是觀之翁之業雖百世可知也吾又聞翁積而能散衣寒食餓汲汲若不暇則是莊也寧直以自樂爲燕游而巳今脩撰君科甲重朝廷文章望天下愛民憂國恒存乎心而見乎睂睫則推翁之心以達之天下又豈直足保其私業爲兹莊山水之重而巳邪然君子論家業之艱考世德之有歸信文獻之不可無者必自兹莊始作東莊記成化已未秋七月既望翰林院侍講李東陽書東莊詩劉大夏吳下園林賽洛陽百年今獨見東莊廻溪不隔柴門迥流水應通世澤長十里香風來桂塢滿簾凉月浸菱塘天公自與莊翁厚又把栽培付令郎同前沈周東莊水木有清暉地靜人閒與世違瓜圃熟時供路渇稻畦收後問鄰飢城頭日出啼鴉散堂上春深乳燕飛更羡賢郎今玉署恩封早晩著朝衣聞奕姪構二亭於東莊以爲予佚老喜而有作吳寛爾父西菴扁拙脩當年種樹帶平疇遥聞肯構爲予計專待歸休與客游山上看雲依鶴洞池邉臨渚對桑洲只憂筋力非輕健更欲沿洄具小舟和韻沈周特意作亭知好脩石基髙築樹爲疇欲承伯氏歸休樂未許他人造次游細路矮橋縁麥隴長濠新水漫蘋洲宰公果遂南歸興我亦浜頭艤小舟東莊吳文定公寛父孟融所治也中有十景孟融之孫奕又増看雲臨渚二亭晩圃記王軾予初仕大理時寺正姑蘓劉公約之與予僚寀多所禆益嘗造其室見有肅然其容蔚然其文者列座隅問其姓則錢而孟滸其字也乃常之巨族唐武肅王之裔今著籍長洲又聞孟滸渉獵經史精通繪事營以養親致聲搢紳閒公之先人文恭先生聞之嘗館於貳室後予仕南畿孟滸亦嘗訪於寓舍比挾繪事來游於京甚有所獲歸鄉里闢地數畝於城憩橋之南鑿池構亭蒔花卉培蔬果每春和景明羣芳競秀衆香馥郁孟滸則逍遥野服謳吟懙懙以自適及夫秋霜既肅則向之脆者堅而好華者斂而實橙黃橘緑畦蔬溪荇髙者可采下者可拾孟滸則邀朋速客觴咏其閒談笑竟日其樂陶陶因以晩圃自號人亦以晩圃翁稱之去年春有南陽之行時藩府唐王尚文喜賢聞孟滸至特書晩圃二字為裝潢成巻士大夫多咏歌以侈之未有記其首者孟滸寓書速予言以弁其端久未復又書促之予惟物之囿於氣化猶人囿於兩間囿於氣化者有春榮秋成之序囿於兩閒者有少壯老成之稱故有囿之物苟培植之固人力之齊則秋成可望而人得以収其利矣人之生也苟能脩之於少壯趨向之善持守之堅則老而有成而得以享其樂矣今觀孟滸之立於身行於家而接人者循循雅飭則其修於少壯者可知矣而今年逾七十康强自如有子有孫足於奉養良朋益友日相遨遊况其子桓又善持已而精脩世業見徴於朝將有禄養以及親矣孟滸之享其成於晚年者為何如晩圃之號不亦冝乎夫然則藩府之書士夫之歌詠以褒美孟滸者端不負矣予乃嘉之摭以爲記𢎞治十六年歳次癸亥三月既望賜進士第資善大夫南京兵部尚書叅賛機務公安王軾記晚圃歌伊乘華髪䰐鬖籠席㡌半世丘園事髙蹈滿畦青甲長初齊一㸃紅塵飛不到今世於君見古人搰搰抱甕全吾真苦厭桔橰作機事肯紆紫綬勞心神金谷風光回首廢白露清霜賸幽致菊徑不栽桃李花菘根勝似羔豚味我愛此中樂事偏願陪杖履相周旋醉君瓷瓦􅎆中酒共向藤蘿石上眠晩圃予曾大父孟滸所葺在今憩橋巷巫咸宅王賓舊説巫咸已上天楚人歌裏亦千年相傳住處今何在一座青山縣郭邊巫咸宅按越絶書圖經皆云虞山巫咸所居舊志云在婁縣山下今婁縣止馬鞍一山無巫咸宅當在虞山無疑太公石室林大同虚巗宛如室空洞神仙宅既非巨靈剖何勞五丁鑿閒門鎖薜蘿寒烟縈翠幕疑通少室山或與紅塵隔具瞻同廣厦生民誠可託大庇安如山何愁風雨作太公石室在虞山室凡十所續圖經山東二里有石室范志太公避紂居東海濵常熟去海近或是言偃宅周霞賓列國雄呑際人材此學難凄凉吳邑里悵望魯衣冠舊宅歸蓬顆新祠倚杏壇一橋通夾巷蔽井樹隂寒子游遺址吳訥勾吳昔要荒俗鄙人不文叔氏豪傑士北學遊聖門身通列四科文學冠同倫井堙宅巳荒橋巷名猶存至今里中子千載沾遺芬言公墨井高啓寥寥武城宰遺井虞山隂千載汲未竭九仞功應深藝圃自可灌道源誰復尋絃歌聽已歇缾綆看還沉無爲渫弗食惻惻起嘆音一瓢樂未改庶幾回也心言偃宅在常熟縣西今稱言公巷吳地記云宅有井井邊有洗衣石皆故物輿地志云石爲太守蕭正德持去范蠡宅吳莱漠漠寒雲鶴影邊荒山故宅忽千年大夫巳賜平吳劔西子還隨去越船白石撐空存贔屭青松落井化蜿蜒徒憐此地無章甫只解區區學計然同前髙啟功名不戀上將軍一舸歸游笠澤雲載去西施豈無意恐畱傾國更迷君范蠡宅在太湖包山任昉述異記洞庭湖上有釣洲蠡嘗乘舟至此遇風止釣于上刻字記焉或又云在杜圻洲馬跡山南方十里多桑苧菜果又前志云在東山翠峰寺丁令威宅在陽山有丹井髙啓令威作仙上天去舊宅留在青山阿千年宅廢尚遺井何處更聞華表歌南陌黄塵足去客東流碧海絶迴波鶴歸重覧應惆悵地上邱墳今又多同前周南老鶴仙丁令威宅枕陽山陲仙化鶴不返宅廢人已非餘遺丹井在井口苔生衣丹光時夜發猶能照巖扉月斜人籟寂鶴自遼東歸爲歌華表吟但傷知音稀梅福隱居相傳在吳門西市黃庭堅吳門不作南昌尉上䟽歸來朝市空笑拂岩花問塵世故人子是國師公蔡經宅高啓崑崙主者王方平身騎黄麟朝紫京舉手長辭漢公卿得道不願世上名徃來隱𤣥與朱明洞中各有白玉城絳衣游空擁幢旌三山五嶽自按行泠風吹送天樂鳴瓊簫琅璈和鸞笙羽衞蹙踏山海崩龍車鶴馭紛相迎嘯呼神官走吏兵魑魅罔兩號且驚暫來經家駐雲程人馬不見但有聲虎頭鞶嚢佩蒼精神光赫然照軒楹授以至言可長生凡骨巳作蟬蜕輕麻姑來㑹尋仙盟芳姿娉婷似飛瓊言從昔年宴蓬瀛又見弱水三淺清爪可爬背念始萌仙意已識遭笞榜餘杭阿姥酒罷傾攝景忽去烟雲横家人悲望空惸惸桑田回首幾變更神仙在世每自呈凡夫不識等瞽盲丹元有田不解耕但愛狗苟與蠅營榮華未滿咎責盈忽化腐鬼歸荒塋金丹可學道可成木鑽石盤貴精誠誰能自拔水火坑飛遊徃來瑶樹英千載或有歸來情同前周南老胥門一區宅居幽混民㕓中有求道子骨相應當仙方平弭靈莭搃轡停雲軿麻姑適來㑹行㕑進芳鮮若人既委化虚形抱重𤣥胡爲感外象背癢寧受鞭蔡經宅吳地記云在珠明寺西王方平與麻姑嘗過其家張融陸慧曉宅王賓兩處樓臺一樣髙空餘烟雨到今朝清心不見當時水楊栁名存讓木消二宅並在承天寺其間有池池上有二柳廬江何㸃曰池便是醴泉木便是交讓後沛國劉璡至吳謂人曰吾聞張融與慧曉並宅其間有水此水必有異味命駕徃酌之曰鄙吝之萌盡矣屈突明府㕔李白陶令八十日長歌歸去來故人建昌宰借問幾時迴風落吳江雪紛紛入酒杯山翁吟已醉舞袖爲君開明府㕔不知所在明府唐人以建昌宰休官吳中韋承縂幽居孟郊才飽身自貴巷荒門豈貧韋生堪繼相孟氏願依隣夜思琴語切晝情茶味新霜枝畱過鵲風竹掃䝉塵郢唱一聲發吳花千片春對君何所得歸去覺情真徐修矩宅皮日休東莞爲著姓奕代皆雋喆强學取科第名聲盡孤揭自爲方州來清操稱凛冽唯寫墳籍多必云清俸絶宣毫利若風剡紙光於月札吏指欲胼萬通排未闋樓船若夏屋欲載如垤㙞轉徙入吳都縱横礙門闑縹嚢輕似霧緗帙殷於血以此爲基構將斯用貽厥重於通侯印貴却全師莭我愛參卿道承家能介潔潮田五萬歩草屋十數楶微宦不能去歸來坐如刖保兹萬巻書守慎如覊紲念我曾苦心相逢無間别引之看秘寳任得窮披閲軸閒翠鈿剥籖古紅牙折帙解帶芸香巻開和桂屑枕兼石鋒刃榻共松瘡􅟻一卧寂無喧數編看盡徹或攜歸廨宇或把穿林樾挈過太湖風抱宿支硎雪如斯未星紀悉得分毫末翦除幽僻藪滌蕩𤣥微窟學海正狂波予頭向中聖人患不學垂戒尤爲切茍昧古與今何殊瘖共􅫣昔之慕經史有以傭筆札何况遇斯文借之不曾輟吾衣任縠纑吾食甘糠覈其道茍可光斯文那自伐竹青誠堪取蒲重自可截如能盈兼兩便足酬饑渇有此競苟榮聞之兼可噦東臯耨烟雨南嶺提薇蕨何以謝徐君公車不聞設和陸龜䝉嘗聞四書曰經史子集焉苟非天禄中此事無由全自從秦火來厯代逢迍邅漢祖入關日蕭何爲政年盡力取圖籍遂持天下權中興延嘉時教化還相宣立石刻五經置於太學前賊莽亂王室君臣如轉圜洛陽且煨燼載籍冝爲烟逮晉武革命生民纔息肩惠懷亟寡昧劉石搤其咽已覺天地閉競爲東南遷日既不暇給墳索何由專爾後國脆弱人多尚虚𤣥任學者得謗清言者爲賢直至沈范輩沈約范雲皆藏書数萬巻始家藏簡編御府有不足仍令就之傳梁元渚宫日盡取如蚳蝝兵威忽破碎焚爇無遺篇近者隋後主搜羅勢駢闐寳函映玉軸彩翠明霞鮮伊唐受命初載史聲連延砥柱不我助驚波湧淪漣遂令因去書半在餘浮泉貞觀購亡逸蓬瀛漸周旋炅然東壁光與月爭流天偉矣開元中王道正平平八萬五千巻一一皆塗鉛案開元麗正殿書録云人間盛傳寫海内奔窮研自云西齋書有過東臯田吾聞徐氏子奕世皆才賢因知遺孫謀不在黄金錢插架幾萬軸森森若戈鋋風吹籖牌聲滿室鏗鏘然佳哉鹿門子好問如除㾓倏來參卿處遂得參卿憐開懷展㕑簏唯在性所便素業巳千仞今爲峻雲巔雄才舊百派相近浮日川君抱王佐圖縱歩凌陶甄他時若報德誰在參卿先徐修矩宅未詳其處修矩㤙王府㕘軍世守書萬巻皮日休嘗借書吳都文粹續集巻十七
